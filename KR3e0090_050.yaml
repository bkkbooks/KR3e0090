  text: 編輯幼科雜病心法要訣目録四診總括面圗察色聽聲審病切衇虎口三闗衇紋圗虎口三闗部位衇紋形色初生門上拭口甘草法黄連法硃蜜法豆豉法斷臍胡粉散烙臍餅子浴兒藏胎衣法剃頭不啼鞭背法熏臍帶法不乳一捻金匀氣散理中湯眼不開生地黄湯熊膽洗法吐不止一捻金香蘇飲黄連二陳湯理中湯不小便導赤散八正散豆豉膏不大便硃蜜法一捻金大小便不通木通散紫霜丸肛門内合黒白散蘇合香丸噤口龍膽湯紫霜丸秘方擦牙散辰砂全蠍散匀氣散撮口辰砂殭蠶散紫霜丸龍膽湯撮風散臍濕臍瘡滲臍散金黄散臍突犀角消毒飲二豆散臍風驅風散黒白散理中湯辰砂殭蠶散龍膽湯益脾散撮風散天釣九龍控涎散牛黄散鈎藤飲蘇合香丸内釣鈎藤飲木香丸養藏散盤腸氣痛白豆蔲散熨臍法御纂醫宗金鑑卷五十目録欽定四庫全書御纂醫宗金鑑卷五十編輯幼科雜病心法要訣目録四診總括面圗察色聽聲審病切衇虎口三闗衇紋圗虎口三闗部位衇紋形色初生門上拭口甘草法黄連法硃蜜法豆豉法斷臍胡粉散烙臍餅子浴兒藏胎衣法剃頭不啼鞭背法熏臍帶法不乳一捻金匀氣散理中湯眼不開生地黄湯熊膽洗法吐不止一捻金香蘇飲黄連二陳湯理中湯不小便導赤散八正散豆豉膏不大便硃蜜法一捻金大小便不通木通散紫霜丸肛門内合黒白散蘇合香丸噤口龍膽湯紫霜丸秘方擦牙散辰砂全蠍散匀氣散撮口辰砂殭蠶散紫霜丸龍膽湯撮風散臍濕臍瘡滲臍散金黄散臍突犀角消毒飲二豆散臍風驅風散黒白散理中湯辰砂殭蠶散龍膽湯益脾散撮風散天釣九龍控涎散牛黄散鈎藤飲蘇合香丸内釣鈎藤飲木香丸養藏散盤腸氣痛白豆蔲散熨臍法御纂醫宗金鑑卷五十目録欽定四庫全書御纂醫宗金鑑卷五十編輯幼科雜病心法要訣四診總括兒科自古最為難毫釐之差千里愆氣血未充難據衇神識未𤼵不知言惟慿面色識因病再向三闗診熱寒聼聲審病兼切衇表裏虚實隨證叅註兒科一道自古為難盖以小兒形質柔脆易虚易實調治少乖則毫釐之失遂致千里之謬氣血未充者氣血尚未充盈也難據衇者衇無定凖不可祇以衇為主也神識未𤼵者茫然無知識也不知言者不能言其疾苦也診小兒之病惟慿察面部形色識其因何而生也三闗者手虎口處風氣命三闗也當視衇紋形色以診其屬熱屬寒也聼聲者聼其五聲所主之病也審病者審其安煩苦欲飲食二便也切衇者切衇之浮沉遲數滑澁大小有力無力也醫者誠能以四診參合表裏虛實寒熱之病則可保萬全也察色欲識小兒百病原先從面部色詳觀五部五色應五藏誠中形外理昭然額心頦腎鼻脾位右腮屬肺左屬肝青肝赤心黄脾色白為肺色黒腎顔青主驚風赤火熱黄傷脾食白虛寒黒色主痛多惡候明顯濁晦輕重參部色相生為病順部色相尅病多難相生實者邪助病相尅虛者正難堪天庭青暗驚風至紅主内熱黒難痊太陽青驚入耳惡印堂青色驚瀉纒風氣青驚紫吐逆兩眉青吉紅熱煩鼻赤脾熱黒則死脣赤脾熱白脾寒左腮赤色肝經熱右腮發赤肺熱痰承漿青驚黄嘔吐黒主抽搐病纒綿此是察色之大要還將衇證一同參註小兒之病先從面部氣色觀之詳察五部之色則五藏之病自昭然可見矣五部者額屬心頦屬腎鼻屬脾左腮屬肝右腮屬肺也五色者青為肝色赤為心色黄為脾色白為肺色黒為腎色也如面青主是驚風之證面赤主火熱面黄主傷脾傷食面白主虚寒面黒主痛多是惡候總之五色明顯為新病其證輕濁晦為乆病其證重部色相生為順者如脾病色黄此正色也若見紅色乃火能生土故為順也若見青色乃木来尅土故為逆也餘病倣此若氣血充實又遇部色相生縱有外邪助病亦易為治療若乆病氣血虛弱又遇部色相尅則正氣不支每難治療如天庭青暗主驚風紅主内熱黒則不治太陽青主驚風青色入耳者死印堂青主驚瀉風池在眉下氣池在眼下二處青主驚風紫多吐逆兩眉青主吉紅色主多煩熱鼻赤主脾熱鼻黒則死脣赤主脾熱白主脾寒左腮𤼵赤主肝經有熱右腮發赤主肺熱痰盛承漿青主驚黄主吐黒主抽搐此皆察色之大要再以衇證參之庶治得其要矣聽聲診兒之法聼五聲聆音察理始能明五聲相應五藏病五聲不和五藏情心病聲急多言笑肺病聲悲音不清肝病聲呼多狂呌脾病聲歌音顫輕腎病聲呻長且細五音昭著證分明啼而不哭知腹痛哭而不啼將作驚嗞煎不安心煩熱嗄聲聲重感寒風有餘聲雄多壮厲不足聲短怯而輕多言體熱陽府證懶語身冷隂藏形狂言焦躁邪熱盛譫語神昏病熱凶鴨聲在喉音不出直聲無淚命將傾虛實寒熱從聲别聞而知之無遁情註小兒之病既觀其色又當細聼其聲盖笑呼歌悲呻五聲内應心肝脾肺腎五藏也五聲不和則知五藏有病之情矣如心屬火病則聲急喜笑肺屬金病則聲悲音濁肝屬木病則聲狂呌多呼脾屬土病則聲顫輕如歌腎屬水病則其聲長細如呻吟有聲有淚聲長曰哭有聲無淚聲短曰啼如啼而不哭則氣不伸暢主腹痛哭而不啼則氣急心煩将成驚也嗞煎不安者乃心經内熱故煩躁不寧也嗄聲音啞也聲重聲濁也此為外感風寒也有餘之證其氣實故聲雄大而壯厲不足之證其氣虛故聲怯弱而輕短多言與身熱皆陽也陽主府故曰陽府證也懶語與身凉皆隂也隂主藏故曰隂藏證也狂言焦躁者邪熱盛也神昏譫語者熱乗於心故曰病熱凶也鴨聲聲在喉中而啞氣將絶也直聲聲無囬轉而急氣將散也二者俱為不治之證醫者果能以此察之則知表裏藏府寒熱虚實諸病之情態無所遁矣審病審兒之病貴詳參要在安煩苦欲間能食不食渴不渴二便調和通秘勘發熱無汗為表病内熱便鞕作裏看安煩晝夜隂陽證苦欲冷暖定熱寒能食不食胃壮弱渴與不渴胃濕乾便稠黏穢為滯熱尿清不赤乃寒占耳尻肢凉知痘疹指梢發冷主驚癎肚腹熱悶乃内熱四肢厥冷是中寒眉皺曲啼腹作痛風熱来臨耳熱纒腹痛須按軟與鞕喜按不喜虚實參欲保赤子誠心辨對證施方治不難註小兒有病貴乎詳審先問起居安煩苦欲何如次問飲食能食不食渴與不渴又次問二便或通或秘而後病源可識矣如發熱無汗此邪在表也内熱便鞕此邪在裏也安煩者謂晝若煩熱而夜安静是陽旺于陽分其病在陽若夜煩熱而晝安静是陽陷于隂分其病在隂苦欲者喜冷惡熱皆屬陽病故為熱也喜熱惡冷皆屬隂病故為寒也胃壯者能食胃弱者不能食胃乾燥者口渴胃濕盛者口不渴至於大便稠黏穢氣難聞者是内有滯熱從熱化也小便清白不赤為虚寒從寒化也若耳梢冷尻骨冷四肢發冷者此痘疹欲發之候如單指梢𤼵冷者此驚癎將作之徴肚腹熱悶主内熱手足厥冷主中寒小兒無故皺眉曲腰啼呌者主内因腹痛也兩耳常常𤼵熱者主外因風熱也然腹痛又當按其或軟與鞕若喜按者為虚不喜按者為實保赤者須誠心勘問對證施治庶隨手奏效矣切衇小兒週嵗當切衇位小一指定三闗浮衇輕取皮膚得沉衇重取筋骨間一息六至平和衇過則為數減遲傳滑衇如珠多流利濇衇滯濇往来艱三部無力為虚衇三部有力作實言中取無力為芤衇㣲衇㣲細有無間洪衇来盛去無力數緩時止促結占𦂳衇左右如轉索弦則端直張弓弦浮為在表外感病沉為在裏内傷端數為在府屬陽熱遲為在藏乃隂寒滑痰洪火㣲怯弱弦飲結聚促驚癎芤主失血濇血少沉𦂳腹痛浮感寒虛主諸虛不足病實主諸實有餘看痘疹欲𤼵衇洪𦂳大小不匀中惡勘一息三至虚寒極九至十至熱極炎一二十一十二死浮散無根沉伏難表裏隂陽虚實診惟在兒科隨證參註週嵗者一嵗也有疾則當切衇但部位甚小不能以三指診之須用一指以定三闗三闗者寸闗尺也浮衇者輕取皮膚之上即得故曰浮也沉衇者重按筋骨之間則見故曰沉也一息者人之一呼一吸也至者衇之至數也一息六至為和平之衇則曰無疾至數若過者七至八至也謂之數衇至數若減者四至五至也謂之遲衇滑衇如珠往来流利濇衇滯澁往来艱難三部者衇之浮中沉也浮中沉三部無力為虚浮中沉三部有力為實芤衇者中取無力㣲衇者按之㣲細若有若無洪衇者来時雖盛去時無力促衇者數而時止結衇者緩而時止𦂳衇者左右如轉索之象弦衇者端直如張弓弦此皆言脈之形象至數也浮衇病在表外感風寒也沉衇病在裏内傷飲食也數衇病在六府屬陽也遲衇病在五藏屬隂也滑主痰盛洪主火熱㣲主怯弱之證弦主停飲結主積聚促主驚癎芤主失血濇主血少沉𦂳主腹痛浮𦂳主感寒虚為不足主諸虛實為有餘主諸實洪𦂳者痘疹欲𤼵也大小不匀者中惡之證也一息三至是虚寒之極九至十至乃火熱太甚此諸衇所主之病也若一息只一至二至或十一十二至者皆死衇也浮散無根及沉浮取之不應指者皆難治之衇也凡病之隂陽表裏虛實雖可以診衇而得惟臨證時合望聞問三者細為參考焉虎口三闗部位衇紋形色初生小兒診虎口男從左手女右看次指三節風氣命衇紋形色隱隱安形見色變知有病紫屬内熱紅傷寒黄主脾病黑中惡青主驚風白是疳風闗病輕氣闗重命闗若見病多難大小曲紫傷滯熱曲青人驚走獸占赤色水火飛禽撲黄色雷驚黑隂癎長珠傷食流珠熱去蛇吐瀉来蛇疳弓裏感冒外痰熱左斜傷風右斜寒鍼形鎗形主痰熱射指射甲命難全紋見乙字為抽搐二曲如鈎傷冷傳三曲如蟲傷硬物水紋咳𠻳吐瀉環積滯曲蟲驚魚骨形似亂蟲有蜖纒衇紋形色相參合醫者留神仔細觀註凡初生小兒有疾病者須視虎口义手處衇紋之形色以决病之生死輕重男先看左手次指内側女先看右手次指内側指之三節初節曰風闗次節曰氣闗三節曰命闗其紋色紅黄相兼隱隱不見則為平安無病若紋色紫屬内熱紅屬傷寒黄為傷脾黒為中惡青主驚風白主疳證紋在風闗主病輕氣闗主病重若過命闗主病危難治又當視其紋形大小曲灣色紫者主傷食内熱色青者主人驚及走獸驚色赤者主水火飛禽所驚黄主雷驚黑主隂癎如指上紋形一㸃紅色名曰流珠紋主内熱圓長者名曰長珠形主飲食傷上尖長下㣲大者名曰去蛇形主傷食吐瀉上大下尖長者名曰来蛇形主濕熱成疳弓反裏者形灣向中指主感冒寒邪弓反外者形灣向大指主内熱痰盛紋斜向左者其紋斜向中指主傷風紋斜向右者其紋斜向大指主感寒鍼形者直若懸鍼㣲短鎗形者直射如鎗㣲長皆主痰熱透闗射指射甲者其紋直射指甲指端主脾氣大敗病危不起二者俱屬不治乙字紋似乙字主驚風抽搐二曲如鈎主傷生冷三曲如蟲主傷硬物水紋形似水字主咳𠻳環形聨絡如環主疳病曲蟲紋如灣蟲主積滯魚骨紋如魚刺主驚熱紋形如亂蟲者主蜖蟲纒擾習幼科者必以此形色合叅留神診察始不悮矣初生門上拭口附下胎毒法拭口須用燕脂法穢浄方無口病生古云未啼先取穢只縁未察此中情註嬰兒初生須用軟棉裹指拭浄口中不潔繼以燕脂蘸茶清擦口舌齒頰之間則不使一切口病生矣古云子未啼時先取穢血此古人不詳體察盖兒在胞衣之中以臍蒂資生胞中皆是氤氲精氣生長蒸化並無血衇兒口之血從何而来此說不經不可為訓也甘草法甘草之法自古稱能觧諸毒性味平濃煎頻令兒吮服免使胎毒藴腹中註甘草味甘平和五藏解百毒之藥也四時皆可用虛實皆可服取中指一節用水煎濃以棉纒指蘸水令兒吮之其毒自觧黄連法素禀胎熱藴于中惟有黄連法最靈水浸濃汁滴口内臍糞胎毒自此清註黄連清熱觧毒之要藥也凡夏月及四時看兒有胎熱者恐熱藴於中致生他病故宜用之須取黄連數塊搥碎用湯浸出汁時時滴兒口中以臍糞下為度其毒自解矣硃蜜法硃蜜鎮神利腸胃清熱防驚大有功胎熱便秘皆堪用禀賦怯弱慎而行註硃砂鎮心定驚兼能除邪蜂蜜觧毒潤腸更能清熱一鎮一潤功效殊常胎熱便閉者四時皆可用之取一大豆許研細水飛過煉蜜調匀乳汁化服最佳惟胎禀太弱者不宜用也豆䜴法怯弱之兒豆䜴法宣𤼵胎毒功最良兒生冬月亦宜此煎取濃汁當乳嘗註淡豆豉輕腐宣𤼵之藥也凡怯弱之兒或值冬月欲觧胎毒者只將此藥煎為濃汁與兒三五口其毒自開矣斷臍臍帶剪下即用烙男女六寸始合宜烙臍炙法防風襲胡粉封臍為避濕註嬰兒初生先用剪刀向火烘熱剪斷臍帶次用火器繞臍帶烙之當以六寸為度不可過為短長短則傷藏長則損肌斷訖又用烙臍餅子安炙臍上以防風邪外入隨用胡粉散敷臍帶間用軟絹新棉封裹之以避尿濕風邪如藥不偹即以細熟艾一塊照依前法封裹胡粉散胡粉甑帶灰乾薑白石脂棉灰各等分麝香少許右共為細末每用一錢敷臍上封之烙臍餅子豆䜴黄蠟等分麝香少許右以豆豉麝香研匀鎔蠟量臍大小捻為餅炙用浴兒浴兒之法五枝湯冬夏寒温適可當加豬膽汁去汚穢且滋肌膚免生瘡註斷臍後三日浴兒此法其来舊矣為其革汚穢也臨浴時須擇無風宻處適可而止不可乆在水中冬月恐其受寒夏日恐其傷熱其為湯之法須用桃槐桑梅柳枝熬成再加豬膽汁以去其汚穢且能滋潤肌膚令兒胎瘡不生藏胎衣法藏衣新瓶用帛纒埋築天徳月空邉向陽髙燥宜嚴宻令兒無疾夀綿綿註凡藏胎衣盛在新瓶内以青帛裹瓶口擇向陽髙燥之地天徳月空處掘地三尺埋之兒自長夀無疾若藏衣不謹於兒不利天徳月空正月在丁二月坤三月居壬四月辛五乾六甲七月癸八艮九丙十乙宫十一巽兮庚十二此是天徳牢記心月空單月壬共丙䨇月俱在甲與庚註天徳如正月在丁二月在坤三月在壬四月在辛五月在乾六月在甲七月在癸八月在艮九月在丙十月在乙十一月在巽十二月在庚是也月空如正月在丙壬二月在甲庚三月在丙壬四月在甲庚五月在丙壬六月在甲庚七月在丙壬八月在甲庚九月在丙壬十月在甲庚十一月在丙壬十二月在甲庚是也天徳方向俱依此圗為凖其月空方向單月在丙壬方䨇月在甲庚方四處如值天徳方向不便即按圗尋丙壬甲庚所在用之如值月空方向不便亦按圗尋天徳用之剃頭小兒彌月剃胎頭宻室温和適可求杏麻薄膩揉頭上胎毒瘡癤一切休註兒滿月剃頭須向宻室温煖處剃之為其氣血未盈寒風易入剃後須用杏仁三枚研細入薄荷三葉再同研將麻油滴三四㸃合膩粉拌匀擦頭上能避風邪免生瘡癤熱毒等證不啼小兒生下不能啼俗語名之為草迷多因臨産難生育或值嚴寒氣所逼氣閉不通聲不出奄奄呼吸命須㬰氣閉不通葱鞭背寒逼急用火熏臍註兒生落地啼聲即發形生命立矣有不啼者俗云草迷多因臨産時生育艱難以致兒生氣閉不通所以不啼也急以葱鞭其背使氣通則啼又有時值天寒之際兒氣為寒所逼亦不能啼宜用熏臍𢃄法急為挽回庶氣通而啼聲出也若氣絶無聲面青甲黑是形雖存而命已不立安望其生哉鞭背法小兒初生氣不通奄奄呼吸少啼聲用葱鞭背輕輕擊須臾聲𤼵可回生註葱辛通氣擊動醒神用葱鞭背者取開通擊醒之義也如無葱以手輕擊之亦可熏臍帶法小兒生下或冒寒氣閉無聲啼則難油撚熏臍休剪帶煖氣入腹自通安註兒初生方離母腹若值天寒氣為寒閉使兒聲不出須急用棉絮包裹抱于懐中且勿斷臍用紙撚蘸油㸃火于臍帶下往来熏之令火氣由臍入腹寒得温散氣得煖通啼聲自出矣不乳兒生能乳本天然若不吮兮必有縁腹中穢惡未下浄或在胎中素禀寒穢惡不浄一捻效胎寒不乳匀氣先若更面青肢冷厥此是寒虚理中煎註不乳謂初出胞胎不吮乳也其故有二不可不辨兒生腹中臍糞未下能令小兒腹滿氣短嘔吐不乳當用一捻金治之若兒母過食寒凉胎受其氣兒必腹痛多啼面色青白宜匀氣散主之若四肢厥逆者理中湯主之一捻金大黄生黑丑白丑人參㯽榔各等分右為細末每少許蜜水調服匀氣散陳皮桔梗各一錢炮薑砂仁炙甘草各五分木香三分右共為細末每服五分紅棗煎湯調服理中湯人參白术土炒乾薑甘草炙引用紅棗肉水煎服方歌理中人參並乾薑白术甘草共為湯胎寒諸疾皆當服不乳肢冷更堪嘗眼不開兒生眼閉不能開皆因脾熱受於胎内用地黄湯最妙熊膽洗目效靈哉註小兒初生眼不開者因孕婦飲食不節恣情厚味熱毒熏蒸以致熱藴兒脾眼胞屬脾其衇絡𦂳束故不能開也内服生地黄湯外用熊膽湯洗之自愈生地黄湯生地黄赤芍藥川芎當歸天花粉甘草生水煎服方歌目閉不開胎熱成生地黄湯赤芍芎當歸花粉生地草水煎速服莫消停熊膽洗法熊膽黄連各少許用滚湯淬洗其目自開吐不止兒吐不止何因生穢惡停留胃内成或縁禀賦胎寒熱或因生時感寒風穢惡一捻金散下外感香蘇温散能熱涎酸黏連陳治寒吐清沫用理中註兒自胞胎既脫以後有因便秘腹中穢惡不浄令兒腹滿其吐不止者一捻金主之若生育時觸冒寒邪入裏犯胃則曲腰而啼吐沫不止者香蘇飲温散之又有胎前受熱面黄赤手足温口吐黄涎酸黏者二陳湯加黄連主之若胎前受寒面青白四肢冷口吐清稀白沫者理中湯主之一捻金方見不乳香蘇飲藿香蘇葉厚樸薑炒陳皮枳殻麩炒茯苓木香煨炙甘草引用生薑水煎服方歌香蘇飲用藿香蘇厚樸陳皮枳殻茯甘草木香一併入生薑為引吐能除黄連二陳湯半夏薑製陳皮茯苓生甘草黄連薑炒引用生薑水煎服方歌兒生胎熱吐頻頻醫治須當用二陳半夏陳皮茯苓草薑連加入效如神理中湯方見不乳不小便小便不通胎熱壅導赤八正二方從外用豆豉貼臍法須臾小便自能通註小兒初生不小便者乃胎熱流於下也宜導赤散熱盛者八正散主之外用豆豉膏貼臍上則小便自通矣導赤散生地黄木通甘草生引用燈心竹葉水煎服加黄連滑石赤苓更妙方歌方名導赤妙難言生地木通甘草煎引用燈心共竹葉清熱利水便如泉八正散扁蓄瞿麥滑石飛木通赤苓車前子生大黄梔子生引用燈心水煎服方歌八正散治小便秘扁蓄瞿麥車前利木通滑石赤茯苓大黄梔子合成劑豆豉膏淡豆豉一勺田螺十九個葱一大束右搗爛用芭蕉汁調貼臍上不大便大便不通名鎻肚皆緣熱毒受胎中硃蜜捻金俱可用急咂五心臍下通註小兒初生之日或次日即大便者俗云下臍屎此腸胃通和幽門潤澤也若至二三日不大便者名曰鎻肚乃胎中受辛熱之毒氣滯不通也其兒必面赤腹脹不乳多啼宜先用硃蜜法治之設若不應用一捻金量兒與之繼令婦人以温水潄口咂兒前後心手足心並臍下共七處以皮見紅赤色為度須臾大便自通矣硃蜜法方見拭口一捻金方見不乳大小便不通二便俱秘胎熱極木通散與紫霜丸行熱開結真神妙口嘬之法悉如前註小兒初生大小便不通者最為急候乃胎中熱毒太甚而成也急用前口咂五心臍下法再以木通散行其熱紫霜丸開其結庶可望生若延至七日謂之一臘肚腹硬脹常作呻吟則難治矣木通散車前子扁蓄瞿麥术通赤苓山梔滑石飛黄苓生甘草大黄引用燈心水煎服或入薄荷同煎方歌二便閉兮如何醫木通散用甚為竒車蓄瞿通苓梔子滑芩甘草大黄宜紫霜丸代赭石一両醋浸三五次研火煨赤石脂一両杏仁六十粒尖炒去皮巴豆三十粒去油膜右為末飯糊如麻子大日服三丸白水下肛門内合有因熱毒肛門結或是内合無隙通清毒宜服黑白散脂瞞簮通導法精註小兒初生肛門内合有二一者熱毒太甚壅結肛門一者脂膜遮瞞無隙可通如肛門壅結者急服黑白散外用蘇合香丸作棗核狀納入孔中取其香能開竅又能潤澤大便一下庶可望生如脂膜遮瞞無隙可通者先以金玉簮透之刺破脂膜再以蘇合香丸照前法導之庶可挽回於萬一耳黑白散黑牽牛半生半炒白牽牛半生半炒大黄生㯽榔陳皮各五錢生甘草三錢元明粉一兩右除㯽榔不過火餘五味或晒或焙仍合㯽榔為末同元明粉入乳鉢内研細每服五分至六七分温蜜湯調化蘇合香丸蘇合香油五錢息香内入安安息香一兩末用無灰酒半觔熬膏另為丁香青木香白檀香沉香蓽茇香附子訶子煨取肉烏犀鎊硃砂各一兩水飛薰􅀢香片腦各五錢研麝香七錢半右為細末入安息香膏煉蜜和劑圓如芡實大空心用沸湯化下酒下亦可噤口噤口舌上如黍米吮乳不得啼漸難清肝龍膽湯極妙腹硬便秘紫霜丸吐涎牙𦂳擦牙效次用辰砂全蠍煎病勢稍安勿過劑調和脾胃匀氣先註小兒噤口之證失治多至不救其候舌上生瘡如黍米狀吮乳不得啼聲漸小因胎熱所致也法當清熱疏利以龍膽湯主之若肚腹脹硬二便不通者紫霜丸主之又有一種口吐白沫牙闗𦂳急者此胎熱内結復為風邪外襲當以秘方擦牙散先擦其牙闗次服辰砂全蠍散中病即止不可過服證退當調和脾胃以匀氣散主之龍膽湯柴胡黄芩生甘草釣籐鈎赤芍大黄紙裹煨龍膽草蜣螂去翅足桔梗赤茯苓引用棗肉水煎服方歌噤口龍膽湯極靈柴胡黄芩草釣藤赤芍大黄龍膽草蜣螂桔梗赤茯苓紫霜丸方見二便不通秘方擦牙散生南星二錢臍去皮龍腦少許右研為極細末用指蘸合生薑汁放大牙根擦之立效如不開者將應用之藥調和稀糊含在不病人口内以筆管挿入病人之鼻孔用氣將藥極力吹入其闗立時即開此法有通仙之妙不可不知辰砂全蠍散辰砂五分水飛全蠍三枚去毒硼砂龍腦麝香各一分右為極細末用乳母唾調抹口脣裏及齒上匀氣散方見不乳撮口撮如囊口吮乳難舌強脣青吐沫痰面色赤黄胎熱極四肢厥冷命難全痰盛宜用殭蠶散便秘須進紫霜丸驚熱龍膽湯極妙抽搐撮風散自安註撮口者口撮如囊口也吮乳不得舌強脣青面色黄赤乃心脾之熱受自胎中而然也其證為危候急當隨證治之如氣髙痰盛者辰砂殭蠶散主之二便秘結者紫霜丸主之身熱多驚者龍膽湯主之手足抽搐者撮風散主之若更口吐白沫四肢厥冷雖有神丹終屬無濟辰砂殭蠶散辰砂五分水飛殭蠶一錢去系嘴炒直的蛇蛻皮一錢炒麝香五分右為末用蜜調敷脣口紫霜丸方見二便不通龍膽湯方見噤口撮風散赤脚蜈蚣半條炙釣藤鈎一錢五分硃砂水飛直殭蠶焙全蠍尾各一錢麝香一字右為末每月一字竹瀝調下臍濕臍瘡浴兒不慎水浸臍或因䙀包濕漬之臍間淋漓多痛癢甚則焮腫作瘡痍臍濕必用滲臍散瘡腫金黄散最宜治療之法須如此臨證施之不可疑註兒生洗浴不可乆在水中任意洗濯既包裹畢宜時常留意勿令尿濕浸臍如不知慎遂致肚臍浸漬不乾名曰臍濕須以滲臍散敷之甚則焮赤成瘡名曰臍瘡須以金黄散敷之庶不致寒濕之氣内攻也滲臍散枯礬龍骨各二錢煆麝香少許右研細末乾滲臍中金黄散川黄連二錢半胡粉龍骨各一錢煆右為末敷患處臍突嬰兒藴熱在腹中伸引頻頻卧不寧努脹其氣冲臍本虚大光浮臍突成速服犀角消毒飲二豆能消腫赤攻最忌寒凉敷臍上氷凝毒熱反成凶註嬰兒熱在腹中無所𤼵瀉故頻頻伸引睡卧不寧努脹其氣衝入臍間所以臍忽腫赤虛大光浮名曰臍突此乃胎熱所致非斷臍不利之過也内服犀角消毒飲外敷二豆散其腫自消最忌寒凉之藥敷于臍上恐寒凝毒熱反為害也犀角消毒飲牛蒡子炒研生甘草荆芥防風金銀花水煎熟臨服入犀角細末調匀服方歌犀角消毒牛蒡加甘草荆防金銀花細研犀角調匀服臍突能消功最佳二豆散赤小豆不去皮豆豉天南星去皮臍白歛各一錢右為細末用五分芭蕉汁調敷臍四旁日二次臍風斷臍不慎起臍風感受風寒濕水成將作驅風散最效已成兼證要分明腹脹便秘黑白散面白肢寒用理中痰涎壅盛殭蠶散壯熱面赤龍膽清嘔吐多啼益脾治脣青撮口撮風平臍青口噤為不治一臘逢之命必傾註臍者小兒之根蔕也名曰神闕穴近三隂喜温惡凉喜乾惡濕如斷臍悉遵前法臍風何自而起惟不知慎重以致水濕風冷之氣入于臍中兒必腹脹臍腫日夜啼呌此臍風之將作也須急用驅風散治之若寒邪深入已成臍風者又當視其所兼之形證治之如肚腹脹硬大便不通者風兼實也黑白散主之面青肢冷二便不實者風兼虚也理中湯主之痰涎壅盛氣髙喘急者風兼痰也辰砂殭蠶散主之身體壯熱面赤口乾者風兼熱也龍膽湯主之面青嘔吐曲腰多啼者風兼寒也益脾散主之撮口脣青抽搐不止者風兼驚也撮風散主之若臍邉青黑口噤不開者是為内抽不治臍風見於一臘者亦不治一臘者七日也兒生七日血衇未凝病已中藏醫之無益驅風散蘇葉陳皮防風厚樸薑炒枳殻麩炒木香煨殭蠶炒釣藤鈎生甘草引用生薑水煎服方歌臍風將作用驅風蘇防陳樸枳香從殭蠶釣藤與甘草生薑加入更通靈黑白散方見肛門内合理中湯方見不乳辰砂殭蠶散方見撮口龍膽湯方見噤口益脾散白茯苓人參草果煨木香煨炙甘草陳皮厚樸薑炒紫蘇子各等分炒右為末每服一錢薑棗湯調服撮風散方見撮口天釣天釣邪熱積心胸痰涎壅盛氣不通瘈瘲壯熱同驚證頭目仰視若釣形九龍控涎醫搐掣牛黄散用善驅風瘈瘲减參釣藤飲爪甲青色蘇合精註小兒天釣證由邪熱痰涎壅塞胸間不得宣通而成𤼵時驚悸壯熱眼目上翻手足瘈瘲爪甲青色證似驚風但目多仰視較驚風稍異痰盛兼搐者九龍控涎散主之驚盛兼風者牛黄散主之搐盛多熱者釣藤飲主之爪甲皆青者蘇合香丸主之九龍控涎散赤脚蜈蚣一條炙乾酒塗滴乳天竺黄各一錢匀二味研臘茶雄黄炙甘草各二錢荆芥穗炒白礬各一錢枯菉豆一百粒熟半生半右為末每服五分人參薄荷湯調下牛黄散牛黄一錢細研硃砂一錢細研水飛麝香五分天竺黄二錢蠍梢一錢釣藤鈎二錢右研匀每服一字新汲水調下釣藤飲人參全蠍去毒羚羊角天麻甘草炙釣藤鈎水煎服按天釣乃内熱痰盛應減人參方歌天釣須用釣藤飲瘈瘲連連無止歇人參羚羊與釣藤炙草天麻共全蠍蘇合香丸方見肛門内合内釣内釣肝藏病受寒糞青潮搐似驚癎傴僂腹痛吐涎沫紅絲血㸃目中纒瘈瘲甚者釣藤飲急啼腹痛木香丸肢冷甲青脣口黑養藏温中或保全註内釣者多因肝藏素病外受寒冷其候糞青潮搐者作止有時也傴僂腹痛者曲腰而痛也口吐涎沫證雖與驚癎相類但目有紅絲血㸃瘈瘲甚者釣藤飲主之急啼腹痛者木香丸主之若肢冷甲青脣口黑者養藏散主之然内釣至此乃中寒隂盛不治之證用此救治庶或保全鈎藤飲方見天釣木香丸沒藥木香煨茴香炒鈎藤鈎全蠍乳香各等分先將乳香沒藥研匀後入諸藥末和畢取大蒜少許研細和丸如桐子大晒乾每次二丸鈎藤湯下養藏散當歸沉香木香煨肉桂川芎各半兩丁香二錢右為末每服一錢淡薑湯調服盤腸氣痛盤腸寒搏腸中痛曲腰不乳蹙䨇眉定痛温中豆蔲散熨臍外治法堪垂註凡盤腸氣痛皆由寒邪所搏肝腎居下故痛則曲腰宜白豆䓻散主之外用熨臍法其效甚速白豆䓻散白豆䓻砂仁青皮醋炒陳皮炙甘草香附米製蓬莪术各等分右為末每服一錢紫蘇煎湯調下熨臍法淡豆豉生薑各二錢切碎葱白五莖食鹽一兩同炒熱置臍上熨之御纂醫宗金鑑卷五十
