body:
  text: 編輯刺灸心法要訣目録手太隂肺藏圖肺藏經文肺經循行圖肺經循行經文肺經循行歌肺經穴圖肺經穴歌肺經分寸歌手陽明大腸府圖大腸經文大腸經循行圖大腸經循行經文大腸經循行歌大腸經穴圖大腸經穴歌大腸經分寸歌足陽明胃府圖胃府經文胃經循行圖胃經循行經文胃經循行歌胃經穴圖胃經穴歌胃經分寸歌足太隂脾藏圖脾藏經文脾經循行圖脾經循行經文脾經循行歌脾經穴圖脾經穴歌脾經分寸歌御纂醫宗金鑑卷八十一目録欽定四庫全書御纂醫宗金鑑卷八十一編輯刺灸心法要訣目録手太隂肺藏圖肺藏經文肺經循行圖肺經循行經文肺經循行歌肺經穴圖肺經穴歌肺經分寸歌手陽明大腸府圖大腸經文大腸經循行圖大腸經循行經文大腸經循行歌大腸經穴圖大腸經穴歌大腸經分寸歌足陽明胃府圖胃府經文胃經循行圖胃經循行經文胃經循行歌胃經穴圖胃經穴歌胃經分寸歌足太隂脾藏圖脾藏經文脾經循行圖脾經循行經文脾經循行歌脾經穴圖脾經穴歌脾經分寸歌御纂醫宗金鑑卷八十一目録欽定四庫全書御纂醫宗金鑑卷八十一編輯刺灸心法要訣肺臟經文經曰肺者相傳之官治節出焉其形四垂附著於脊之第三椎中有二十四空行列分布以行諸藏之氣為藏之長為心之蓋又云是經常多氣少血難經曰肺重三斤三兩六葉兩耳凡八葉主藏魄中藏經曰肺者生氣之原乃五藏之華蓋張介賔曰肺葉白瑩謂為華蓋以覆諸藏虛如蜂窠下無透竅吸之則滿呼之則虛一呼一吸消息自然司清濁之運化為人身之槖籥肺經循行經文肺手太隂之脈起於中焦下絡大腸還循胃口上膈屬肺從肺系橫出腋下下循臑內行少隂心主之前下肘中循臂內上骨下廉入寸口上魚循魚際出大指之端其支者從腕後直出次指內廉出其端肺經循行歌手太隂肺中焦生絡腸循胃散流行上膈屬肺從肺系橫出腋下臑肘中循臂寸口上魚際大指內側爪端通支絡還從腕後出接次指屬陽明經注手太隂肺經之脈起於中焦者言起於任脈中腕穴也下絡大腸還循胃口者謂本經之絡散布流行下則絡於大腸還上而循胃口非上膈屬肺直行之經也夫經絡流行循還無端故手太隂之脈必自足厥隂經之支者期門穴循行中脘穴上膈屬肺以交於手太隂肺經也從肺系橫出腋下至於中府雲門穴下循於臑內天府俠白穴從俠白行少隂心主經脈之前下行肘中尺澤穴從尺澤循臂內上骨下廉孔最穴從孔最入寸口列缺經渠太淵穴從大淵上魚句入魚際穴從魚際出大指之端少商穴而終焉其支者從腕後直出循行次指內廉出其端以交於手陽明大腸經也肺經穴歌手太隂肺十一穴中府雲門天府列次則俠白下尺澤又次孔最與列缺經渠太淵下魚際抵指少商如韭葉肺經分寸歌太隂中府三肋間上行雲門寸六許雲在任璣旁六寸大腸巨骨下二骨天府腋三動脈求俠白肘上五寸主尺澤肘中約紋是孔最腕上七寸擬列缺腕上一寸半經渠寸口陷中取大淵掌後橫紋頭魚際節後散脈裏少商大指端內側鼻衄刺之立時止注中府在任脈中行華蓋穴旁直開去六寸乳上三肋間陷中動脈應手仰而取之是其穴也上直行一寸六分在手陽明大腸經巨骨之下陷中動脈應手舉臂取之雲門穴也從雲門穴下循臑內腋下三寸動脈陷中以鼻尖點墨取之天府穴也從天府穴下行肘中約紋上去五寸動脈中俠白穴也從俠白穴下行肘中約紋上屈肘橫紋筋骨罅中動脈應手尺澤穴也從尺澤穴下行腕前約紋上七寸上骨下骨間陷中孔最穴也從孔最穴循外側行腕後側上一寸五分以兩手交叉當食指末筋骨罅中列缺穴也從列缺穴循行寸口陷中經渠穴也從經渠穴內循手掌後陷中太淵穴也從太淵穴上魚手大指本節後內側陷中散脈中白肉際魚際穴也從魚際穴循行手大指內側之端去爪甲角如韭葉許白肉際少商穴也大腸經文經云大腸者傳道之官變化出焉又云回腸當臍左回十六曲大四寸徑一寸寸之少半長二丈一尺受穀一斗水七升半又云廣腸附脊以受回腸乃出滓穢之路大八寸徑二寸寸之大半長二尺八寸受穀九升三合八分合之一是經多氣少血難經曰大腸重二斤十二兩肛門重十二兩張介賔曰按回腸者以其回疊也廣腸者即回腸之更大者直腸者又廣腸之末節下連肛門也大腸經循行經文大腸手陽明之脈起於大指次指之端循指上廉出合谷兩骨之間上入兩筋之中循臂上廉入肘外廉上臑外前廉上肩出髃骨之前廉上出於拄骨之上會下入缺盆絡肺下膈屬大腸其支者從缺盆上頸貫頰入下齒中還出挾口交人中左之右右之左上挾鼻孔大腸經循行歌陽明之脈手大腸次指內側起商陽循指上廉出合谷岐骨兩筋循臂肪入肘外廉循臑外肩端前廉拄骨旁從肩下入缺盆內絡肺下膈屬大腸支從缺盆直上頸斜貫頰前下齒當環出人中交左右上俠鼻孔注迎香注手陽明大腸經之脈起於大指次指內廉之端出於大指者謂出於大指少商穴也本經之絡其支者直出於次指之端以交於手陽明大腸經之商陽穴故曰起於大指次指之端也從商陽穴循食指上廉二間三間穴也從三間穴循出兩骨之間合谷穴也從合谷上兩筋之間陽溪穴也從陽溪穴循臂上廉至偏歷溫溜下廉上廉三里穴也從三里穴入肘外廉曲池穴也從曲池穴上臑外前廉肘髎五里臂臑穴也從臂臑穴上肩肩髃穴也從肩髃穴出髃骨之前廉巨骨穴也從巨骨穴上出於拄骨之會上言會於督脈之大椎穴也自督脈大椎穴入交足陽明胃經之缺盆穴絡肺下膈屬大腸者謂其支從缺盆上頸復循本經之天鼎穴貫頰至扶突穴也從扶突穴入下齒中禾髎穴從禾髎穴還出挾口交人中左之右右之左上挾鼻孔迎香穴而終以交於足陽明胃經也大腸經穴歌手陽明穴起商陽二間三間合谷藏陽溪偏歷歷溫溜下廉上廉三里長曲池肘髎迎五里臂臑肩髎巨骨起天鼎扶突接禾髎終以迎香二十止大腸經分寸歌商陽食指內側邊二間來尋本節前三間節後陷中取合谷虎口岐骨間陽溪上側腕中是偏歷腕後三寸安溫溜腕後去五寸池前五寸下廉看池前三寸上廉中池前二寸三里逢曲池曲肘紋頭盡肘髎上臑外廉近大筋中央尋五里肘上三寸行向裏臂臑肘上七寸量肩髃肩端舉臂取巨骨肩尖端上行天鼎喉旁四寸真扶空天突旁三寸禾髎水溝旁五分迎香禾髎上一寸大腸經穴自分明注商陽穴在手食指內側端後去爪甲角如韭葉許是其穴也從商陽穴循食指上廉本節前內側陷中二間穴也從二間穴循食指本節後內側陷中三間穴也從三間穴循行手大指次指岐骨間陷中合谷穴也從合谷穴循行手腕中上側兩筋間陷中張大指次指取之陽溪穴也從陽溪穴上行手腕後上側三寸偏歷穴也從偏歷穴上行三寸溫溜穴也從溫溜穴上行二寸五分輔鋭肉分下廉穴也從下廉穴上行一寸上廉穴也從上廉穴上行一寸鋭肉之端按之肉起手三里穴也從手三里穴上二寸以手拱胸屈肘橫紋頭陷中取之曲池穴也從曲池穴上行大骨外廉陷中肘髎穴也從肘髎穴循行肘上三寸向裏大脈中央五里穴也從五里穴上行四寸兩筋兩骨罅宛宛陷中伸臂平手取之臂臑穴也從臂臑穴上行髆骨頭肩端上兩骨罅陷處宛宛中舉臂取之有空肩髃穴也從肩髃穴上行臂端兩叉骨間陷中巨骨穴也從巨骨穴循頸缺盆上直行扶突下一寸天鼎穴也從天鼎穴上直行曲頰下一寸人迎後一寸五分仰而取之扶突穴也從扶突穴貫頰直鼻孔下水溝旁五分禾髎穴也從禾髎穴上一寸鼻孔旁五分迎香穴也胃府經文經云脾胃者倉廩之官五味出焉又云胃者水穀氣血之海也又云胃大一尺五寸徑五寸長二尺六寸橫屈受水穀三斗五升其中之穀常留二斗水一斗五升而滿又云是經多氣少血難經曰胃重二斤一兩張介賔曰胃之上口名曰賁門飲食之精氣從此上輸於脾肺宣布於諸脈胃之下口即小腸上口名曰幽門胃經循行經文胃足陽明之脈起於鼻之交頞中旁約太陽之脈下循鼻外入上齒中還出俠口環脣下交承漿却循頥後下廉出大迎循頰車上耳前過客主人循髮際至額顱其支者從大迎前下人迎循喉嚨入缺盆下膈屬胃絡脾其直者從缺盆下乳內廉下挾臍入氣街中其支者起於胃下口循腹裏下至氣街中而合以下髀關抵伏下膝臏中下循脛外廉下足跗入中指外間其支者下廉穴三寸而别入中指外間其支者别跗上入大指間出其端胃經循行歌胃足陽明交鼻起下循鼻外入上齒還出俠口繞承漿頤後大迎頰車裏耳前髮際至額顱支下人迎缺盆底下膈入胃絡脾宫直者缺盆下乳內一支幽門循腹中下行直合氣街逢遂由髀關抵膝臏胻跗足指內間同一支下膝注三里前出中指外間通一支别走足跗指大指之端經盡已注足陽明胃經之脈起於鼻者是謂由迎香穴上交頰中兩旁約過足太陽脈之睛明穴分下循鼻外始交於足陽眀之承泣四白巨髎穴也從巨髎入上齒中還出俠口之地倉穴還繞脣下交會任脈之承漿穴却循頤後下廉復交本經之大迎穴由大迎出循頰車穴上行耳前過客主人穴合少陽經循髮際至額顱兩旁之懸顱穴頷厭穴復交足陽明之頭維穴下關穴其支者行大迎穴從大迎前循入迎水突穴氣舍穴循喉嚨入缺盆穴下膈屬胃絡脾散布藏府其直者從缺盆穴直行氣户庫房屋翳膺窗乳中乳根等穴下乳內廉不容穴也從不容循承滿梁門關門太乙滑肉門等穴下俠臍天樞穴也從天樞外陵大巨水道歸來等穴入氣街中氣衝穴也其支者起於胃口是謂前之屬胃絡脾之支下循腹裏下至氣街中而合氣街穴會衝脈上行者也其下行本經者髀關穴也抵伏至伏穴下從伏行隂市穴梁邱穴下膝臏中犢鼻穴循足三里上巨虛條口下巨虛等穴下循脛外廉豐隆穴也從豐隆循解溪穴下足跗衝陽穴也從衝陽行陷谷穴內庭穴入次指外間也其本支别支一自下巨虛穴下入次指外間一别循跗上入大指次指間厲兑穴出其端交於足太隂脾經也按足陽明是足大指之次指不是中指必傳寫之誤胃經穴歌四十五穴足陽明承泣四白巨髎經地倉大迎登頰車下關頭維對人迎水突氣舍連缺盆氣户庫房屋翳尋膺窗乳中下乳根不容承滿出梁門關門太乙滑肉起天樞外陵大巨裏水道歸來逹氣街髀關伏走隂市梁邱犢鼻足三里上巨虛連條口底下巨虛下有豐隆解溪衝陽陷谷同內庭厲兑陽明穴大指次指之端終胃經分寸歌胃之經兮足陽明承泣目下七分尋再下三分名四白巨髎鼻孔旁八分地倉俠吻四分近大迎頷下寸三中頰車耳下八分陷下關耳前動脈行頭維神庭旁四五人迎喉旁寸五真水突筋前人迎下氣舍喉下一寸乘缺盆舍下橫骨陷氣户下行一寸明庫房下行一寸六屋翳膺窗乳中根不容巨闕旁二寸一寸承滿與梁門關門太乙滑肉門天樞臍旁二寸尋樞下一寸外陵穴陵下一寸大巨陳巨下三寸水道穴水下二寸歸來存氣街歸來下一寸共去中行二寸勻髀關膝上尺二許伏髀下六寸是隂市伏下三寸梁邱市下一寸記犢鼻膝臏陷中取膝眼三寸下三里里下三寸上廉穴廉下二寸條口舉再下二寸下廉穴復上外踝上八寸却是豐隆穴當記解溪則從豐隆下內循足腕上陷中衝陽解下髙骨動陷谷衝下二寸名內庭次指外岐骨厲兑大次指端中注承泣穴在目下七分目下胞陷中上直瞳子正視取之是其穴也從承泣直下三分顴空骨內亦直瞳子取之四白穴也從四白下行俠鼻孔旁八分亦直瞳子取之巨髎穴也從巨髎下行俠口吻旁四分外許近下微有動脈地倉穴也從地倉行腮頷下前一寸三分骨陷中動脈大迎穴也從大迎行耳下曲頰端近前八分陷中側臥開口取之頰車穴也從頰車上行耳前動脈側臥合口有空取之下關穴也從下關上行額角入髮際以督脈中行神庭穴旁開四寸半頭維穴也從頭維下行頸下俠結喉旁一寸五兮大動脈應手伸頭取之人迎穴也從人迎下直行頸大筋前內貼氣喉水突穴也從水突下直行頸大筋前結喉下一寸許陷中貼骨尖上有缺處氣舍穴也從氣舍下行肩上橫骨陷中缺盆穴也從缺盆下行巨骨下一寸旁開中行四寸陷中仰而取之氣户穴也從氣户下行一寸六分亦旁開中行四寸陷中仰而取之庫房穴也從庫房下行一寸六分亦旁開中行四寸陷中仰而取之屋翳穴也從屋翳下行一寸六分亦旁開中行四寸陷中仰而取之膺窗穴也從膺窗下行當乳頭之中乳中穴也從乳中下行一寸六分亦旁開中行四寸陷中仰而取之乳根穴也從乳根行在第四肋端旁開中行二寸不容穴也從不容穴下一寸亦旁開中行二寸承滿穴也從承滿下一寸亦旁開中行二寸梁門穴也從梁門下一寸亦旁開中行二寸關門穴也從關門下一寸亦旁開中行二寸太乙穴也從太乙下一寸亦旁開中行二寸滑肉門穴也從滑肉門下一寸俠臍旁二寸許陷中天樞穴也從天樞下一寸亦旁開中行二寸外陵穴也從外陵下一寸亦旁開中行二寸大巨穴也從大巨下三寸亦旁開中行二寸即水道穴也從水道下二寸亦旁開中行二寸即歸來穴也從歸來下行在腿班中有肉核名曰鼠溪直上一寸動脈應手亦旁開中行二寸氣街穴也從氣街下行膝上一尺二寸許中行左右各三指按捺上有肉起如伏之狀故名伏在此肉起後交紋中髀關穴也從髀關下行膝上六寸起肉間正跪坐而取之伏穴也從伏下行三寸在伏兔之下陷中拜揖而取之隂市穴也從隂市下行一寸兩筋間梁邱穴也從梁邱下行過膝蓋骨下胻骨上陷中俗名膝眼此處陷中兩旁有空狀如牛鼻在外側者犢鼻穴也從犢鼻下行䯒骨外側大筋內宛宛中足三里穴也犢鼻即膝眼處也從足三里下行三寸兩筋骨陷中舉足取之上巨虛穴也從上巨虛下行二寸舉足取之條口穴也從條口下行一寸兩筋骨陷中蹲地舉足取之下巨虛穴也從下巨虛復斜向後上行在足外踝上八寸䯒骨外廉陷中豐隆穴也從豐隆內循下足腕上中行陷中解溪穴也從解溪下行足跗上即腳面也髙骨間動脈衝陽穴也從衝陽下行二寸至足大指之次指本節後陷中陷谷穴也從陷谷下至足大指之次指本節前岐骨外間陷中內庭穴也從內庭下行足大指之次指之端去爪角如韭葉許厲兑穴也脾藏經文經云脾胃者倉廪之官五味出焉又云諫議之官知周出焉又云形如刀鐮與胃同膜而附其上之左俞當十一椎下聞聲則動動則磨胃而主運化其合肉也其榮脣也開竅於口又云是經常多氣少血難經曰脾重二斤三兩廣扁三寸長五寸有散膏半斤主裹血溫五藏主藏意與智中藏經曰脾主消磨五穀養於四旁脾經循行經文脾足太隂之脈起於大指之端循指內側白肉際過核骨後上內踝前廉上腨內循脛骨後交出厥隂之前上膝股內前廉入腹屬脾絡胃上膈挾咽連舌本散舌下其支者復從胃别上膈注心中脾經循行歌太隂脾起足大指上循內側白肉際核骨之後內踝前上腨循胻經膝裏股內前廉入腹中屬脾絡胃與膈通俠喉連舌散舌下支絡從胃注心中注足太隂脾經之脈起於足大指之端隱白穴也從隱白循指內側白肉際大都穴也從大都過核骨後太白穴也從太白循公孫穴商邱穴上內踝前廉三隂交穴也從三隂交上腨內循脛骨後漏谷穴也從漏谷交出厥隂之前地機穴隂陵泉穴也從隂陵泉上膝股內前廉血海穴箕門穴沖門穴也從沖門入腹屬脾絡胃循行府舍腹結大橫腹哀食竇天溪胸鄉周榮大包等穴而上行咽喉俠咽連舌本散舌下也其支者從胃之絡别行上膈注心中以交於手少隂心經也脾經穴歌足太隂脾由足拇隱白先從內側起大都太白繼公孫商邱直上三隂塢漏谷地機隂陵泉血海箕門衝門前府舍腹結大橫上腹哀食竇天溪連胸鄉周榮大包盡二十一穴太隂全脾經分寸歌大指端內側隱白節後陷中求大都大白內側核骨下節後一寸公孫呼商邱內踝微前陷踝上三寸三隂交再上三寸漏谷是踝上五寸地機朝膝下內側隂陵泉血海膝臏上內廉箕門穴在魚腹上動脈應手越筋間衝門橫骨兩端動府舍上行七分看腹結上行三寸入大橫上行一寸三腹哀上行三寸半食竇上行三寸間天溪上行一寸六胸鄉周榮亦同然外斜腋下六寸許大包九肋季脅端注隱白穴在足大指內側端後去爪甲角如韭葉許是其穴也從隱白行足大指內側次節末骨縫赤白肉際陷中大都穴也從大都行足大指後內側內踝前核骨下赤白肉際陷中太白穴也從太白上行足大指本節後一寸內踝前陷中公孫穴也從公孫上行內踝下微前陷中商邱穴也從商邱上行內踝踝尖上三寸夾骨陷中三隂交穴也從三隂交上行三寸夾骨陷中漏谷穴也從漏谷上行五寸在膝下五寸內側夾骨陷中伸足取之地機穴也從地機上行膝下內側曲膝橫紋頭陷中隂陵泉穴也從隂陵泉上行在膝臏上一寸內廉白肉際陷中血海穴也從血海上行在魚腹上越兩筋間隂股內廉動脈應手不禁重按箕門穴也從箕門上行橫骨兩端約紋中動脈去腹中行旁開三寸半衝門穴也從衝門上行七分去腹中行亦旁開三寸半府舍穴也從府舍上行三寸去腹中行亦旁開三寸半腹結穴也從腹結上行一寸三分去腹中行亦旁開三寸半大橫穴也從大橫上行三寸半去腹中行亦旁開三寸半腹哀穴也從腹哀上行三寸或從乳上三肋間動脈應手處往下六寸四分去胸中行旁開六寸舉臂取之食竇穴也從食竇上行一寸六分去胸中行旁開六寸仰而取之天溪穴也從天溪上行一寸六分去胸中行亦旁開六寸仰而取之胸鄉穴也從胸鄉上行一寸六分去胸中行亦旁開六寸仰而取之周榮穴也從周榮外斜下行過少陽膽經淵液穴下三寸至液下六寸許九肋間季脅端大包穴也御纂醫宗金鑑卷八十一
