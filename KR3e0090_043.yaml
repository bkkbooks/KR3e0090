body:
  text: 編輯雜病心法要訣目録頭痛眩暈眼目牙齒口舌咽喉肩背痛心腹諸痛胸脇痛腰痛小便閉癃遺尿不禁大便燥結御纂醫宗金鑑卷四十三目録欽定四庫全書御纂醫宗金鑑卷四十三編輯雜病心法要訣目録頭痛眩暈眼目牙齒口舌咽喉肩背痛心腹諸痛胸脇痛腰痛小便閉癃遺尿不禁大便燥結御纂醫宗金鑑卷四十三目録欽定四庫全書御纂醫宗金鑑卷四十三編輯雜病心法要訣頭痛眩暈總括頭痛痰熱風濕氣或兼氣血虚而疼在右屬氣多痰熱左屬血少更屬風因風眩暈頭風痛熱暈煩渴火上攻氣鬱不伸痰嘔吐濕則重痛虛動增註頭痛屬痰屬熱屬風屬濕屬氣或兼氣虚血虚因風而痛謂之頭風必眩暈因熱而痛暈者則煩渴因氣鬱而痛暈者則志意不伸因痰而痛暈者則嘔吐痰涎因濕而痛暈者則頭重不起因虚而痛暈者動則更痛更暈也頭痛眩暈死證真頭腦痛朝夕死手足厥逆至節青瀉多眩暈時時冒頭卒大痛目瞀凶註真頭痛痛連腦内手足青冷至肘膝之節朝發夕死凡頭痛眩暈時時迷冒及頭目卒然大痛目視不見或瀉多之後皆凶證也蓽茇散芎芷石膏湯頭痛㗜鼻熱蓽茇濕盛瓜蒂入茶茗風盛日久三聖散内服芎芷石膏靈芎芷石膏菊羌藁苦加細辛風防荆熱加梔翹芩薄草便秘尿紅消黃攻註一切頭風兼熱者以蓽茇散㗜鼻即蓽茇一味為末用豬膽汁拌過㗜之作嚏立愈一切頭風兼濕者以瓜蒂松蘿茶二味為末㗜之出黃水立愈頭風風盛時發日久不愈則多令人目昬以三聖散㗜之方在中風門内用芎芷石膏湯即芎芷石膏菊花羌活藁本也苦痛者加細辛風盛目昬加防風荆芥穗熱盛加梔子連翹黃芩薄荷甘草大便秘小便赤加消黃攻之自愈也茶調散清震湯滚痰丸人參芎附湯風熱便利茶調散雷頭荷葉蒼與升痰熱滚痰芎作引虚寒真痛附參芎註雷頭風痛頭面疙􅜀耳聞雷聲宜清震湯即荷葉蒼术升麻也人參芎附湯即人參川芎川附也芎犀丸偏正頭風芎犀丸血虚四物薄羌天氣虛補中加芎細氣逆降氣黑鉛丹註血虚面少血色或久脱血也天天麻也降氣蘇子降氣湯也芎麻湯半夏白术天麻湯欲吐暈重風痰痛芎麻湯下白丸寧虚者六君耆乾蘗天麻麯糵澤蒼同註麻天麻也白丸青州白丸子也虚者謂風痰兼氣虚者宜半夏白术天麻湯即六君子加黃耆乾薑黃蘗天麻神麯麥糵澤㵼蒼术也荆穗四物湯頭暈頭痛同一治血虚物穗氣補中氣血兩虚十全補上盛下虚黑錫靈註頭暈之虚實寒熱諸證同乎頭痛一治法也其有因血虚宜用荆穗四物湯即當歸川芎白芍熟地黃荆芥穗也氣虚宜用補中益氣湯氣血兩虚宜用十全大補湯上盛下虚宜用黑錫丹眼目總括目為五藏六府精氣白筋黑骨精瞳血為眥絡肉約束褁擷系屬腦項中經熱腠開因風入合邪上攻赤腫疼輕者外障生雲翳重者積熱頓傷睛註經曰五藏六府之精氣皆上注於目而為之精精之窠為眼氣之精為白眼筋之精為黑眼骨之精為瞳子血之精為絡眥肉之精為約束即眼胞也裹擷筋骨血氣之精而與衇系上屬於腦後出於項中因經熱蒸開腠理故風邪得以入之風熱之邪合上攻於目赤腫疼痛輕者則為外障或暴生雲翳重者則積熱之甚陡然痛傷睛也外障病證火眼赤腫淚澁痛鞕腫多熱軟多風瞼粟爛弦鷄蜆肉努肉赤衇貫瞳睛血灌瞳人髙突起旋螺尖起蠏睛疼拳毛風淚風痒極赤膜下垂黃膜衝註風熱上攻目赤腫痛多淚隠澁難開火眼也腫而硬者屬熱盛也宜先下之腫而軟者屬風盛也宜先發散兩瞼上下初生如粟漸大如米或赤或白不甚疼痛謂之瞼生風粟兩瞼粘睛赤爛痒痛經年不愈謂之爛弦風又名赤瞎瞼内如鷄冠蜆肉翻出視物阻礙痛楚羞明謂之鷄冠蜆肉此皆脾經風熱為病也兩眥筋膜努出謂之努肉攀睛兩眥赤衇漸漸侵睛謂之赤衇貫睛兩眼混赤如朱痛如鍼刺謂之血灌瞳人兩眼痒痛忽然突起謂之突起睛髙目中大痛忽生翳膜狀如旋螺謂之旋螺尖起目中大痛忽然瞳睛努如蟹目謂之蟹睛疼痛又名損翳此皆肝心二經積熱也兩瞼燥急睫毛倒刺謂之倒睫拳毛兩目衝風淚出涓涓冬月尤甚謂之迎風流淚兩目連眥痒極不痛謂之風痒難任目中從下忽生黃膜侵睛疼痛謂之黃膜上衝目中從上忽生赤膜垂下遮睛謂之赤膜下垂又名垂簾翳此皆心肝脾三經風熱為病也内障病證内障頭風五風變珠白黃緑不光明頭風痛引目無淚相注如坐暗室中緑風頭旋連鼻痛兩角相牽引目疼時或白花紅花起同緑黑花為黑風烏花不旋漸昬暗黃風雀目久金睛青風微旋不痒痛青花轉轉目昬蒙註内障之病每因頭風五風變成初病瞳珠漸漸變色睛裏隐隐似翳或白或黃或緑雖與不患之眼相似然無精彩光明射人病頭風者發則頭痛引目無淚或左目或右目或先左目或先右目相注不定如坐暗室之中此頭風傷目之漸也緑風者頭旋兩角連鼻相牽引目疼痛時或見起白花紅花此緑風傷目之漸也黑風者證同緑風時時見起黑花此黑風傷目之漸也烏風者亦同黑風但不旋暈而見烏花漸漸昬暗此烏風傷目之漸也黃風者久病雀目瞳睛金色此黃風傷目之漸也青風者頭微旋不痒不痛但見青花轉轉日漸昬蒙此青風傷目之漸也菊花通聖散洗刀散暴發火眼通聖菊外障等證減加方風盛羌加防麻倍熱盛加連倍消黃痛生翳膜多傷目洗刀更入細獨羌元參木賊白蒺藜草决蝉蜕蔓青箱註菊花通聖散即防風通聖散加菊花也洗刀散即本方更加細辛羌獨蔓荆青箱子等藥也内外障治外障無寒一句了五輪變赤火因生内障有虚心腎弱故如不病損光明火能外鑑水内照養神壯水自收功五風内變諸翳障眼科自有法能攻註外障目病子和曰目不因火不病所以五輪變赤氣輪白睛火乗肺也肉輪目胞火乗脾也風輪黑睛火乗肝也木輪瞳人火乗腎也血輪兩眥火自甚也故能治火者一句便了也治火之法在藥則鹹寒吐之下之在鍼則神庭上星顖會前項百會刺之翳者可使立退痛者可使立已昧者可使立明腫者可使立消矣内障目病雖亦無寒然有虚也虚或兼熱亦屬虚熱故不赤腫疼痛如不病眼人但不精彩光明也心虚則神不足神者火也火内暗而外明故不能外鑑而失其光明也腎虚則精不足精者水也水外暗而内明故不能内照而失其光明也心虚者則養心神腎虚者則壯腎水自可收功於不明也其五風内變諸翳如圓翳氷翳清翳澁翳散翳橫翳浮翳沉翳偃月棗花黃心黑風等翳俱列在眼科方書自有治法難以盡述此特其大㮣耳牙齒口舌總括牙者骨餘屬乎腎牙齦手足兩陽明齒長豁動為腎憊牙疼胃火風寒蟲不怕冷熱為風痛火腫喜冷得寒疼寒不腫蛀喜熱飲蟲牙蝕盡一牙生註牙齒者骨之餘屬乎腎也若無故齒長疎豁而動則為腎衰憊也上牙齦屬足陽明下牙齦屬手陽明牙痛皆牙齦作痛惟寒牙痛則為客寒犯腦多頭連齒痛為寒邪也故喜熱飲不腫不蛀也餘者皆為胃火邪風濕熱也火牙疼多腫喜得冷得寒則更疼者讐仇之意也蟲牙則一牙作痛蝕盡一牙又蝕一牙作痛也骨槽風牙疳瘡骨槽齦頰腫硬疼牙齦腐爛出血膿牙疳腫硬潰血臭皆因痘疹癖疾成註骨槽風者牙齦連頰硬腫疼痛牙齦腐爛出血膿也牙疳以骨槽潰後腫硬不消然出臭血而不出膿水也且皆痘疹癖疾之後而成也清胃散清胃血分火牙痛生地歸連升牡饒氣分宜加荆防細積熱凉膈入升膏註胃火牙痛赤腫出血者則為血分宜用清胃散即生地當歸黃連升麻牡丹皮也饒者倍加升麻丹皮也若腫痛牙齦不出血者則為氣分宜加荆芥防風細辛以散其熱若腸胃積熱腫痛爛臭宜用凉膈散加升麻石膏以下其熱可也溫風散溫風風牙歸芎細蓽茇藁芷露蜂房寒牙痛加羌麻附半服含潄吐涎良註不甚腫痛不怕冷熱為風牙痛宜用溫風散即當歸川芎細辛蓽茇藁本白芷露蜂房也不腫痛甚喜飲熱湯為寒牙痛宜本方再加羌活麻黃川附子溫而散之二方俱服一半含潄一半連涎吐之自好也一笑丸玉池散薰藥諸牙椒巴飯丸咬玉池藁芷骨槐辛歸芎大豆升防草蟲牙葱韭子烟薰註諸牙謂諸牙痛也均宜一笑丸即川椒七粒為末巴豆一粒去皮研匀飯為丸綿裹咬痛處吐涎即止均宜用玉池散即藁本白芷地骨皮槐花細辛當歸川芎黑豆升麻防風甘草煎湯熱潄冷吐蟲牙亦宜此咬潄更須用韭子或葱子置小爐中燒之擱在大水碗内覆以漏斗口向蟲牙痛處薰之其蟲極小皆落水碗之中累效蕪荑消疳湯牙疳雖有專科治然皆未曉累攻神能食便軟猶當下雄荑黃薈二連芩註牙疳一病殺人最速雖有專科然皆未曉累攻之法累攻者今日攻之明日又攻之以腫硬消黑色變臭氣止為度若不能食或隔一日或隔二三日攻之攻之後漸能食不必戒口任其所食雖大便溏仍量其輕重攻之自見其神若竟不思食難任攻下則死證也攻藥用蕪荑消疳湯即雄黃蕪荑生大黃蘆薈川黃連胡黃連黃芩也口舌證治脣口屬脾舌屬心口舌瘡糜蘊熱深口淡脾和臭胃熱五味内溢五熱淫木舌重舌舌腫大脣腫脣瘡緊繭脣暴發赤痛多實熱淡白時痛每虚因註口舌生瘡糜爛名曰口糜乃心脾二經蘊熱深也平人口淡故曰脾和口出氣臭則為胃熱不因食五味而口内溢酸味者乃肝熱淫脾也苦味者心熱淫脾也甘味者本經熱自淫也辛味者肺熱淫脾也鹹味者腎熱淫脾也木舌謂舌腫硬不痛也重舌謂舌下腫似舌也舌腫謂舌腫大也脣腫謂脣腫痛厚也脣瘡謂脣腫潰裂成瘡也緊繭脣謂脣緊小燥裂也以上之證皆屬心脾胃經蘊熱若暴發赤腫痛甚多為實熱宜以凉膈散梔子金花湯急下其熱可即愈也若日久色淡瘡白時痛不痛每屬虚熱宜清心蓮子飲知蘗四物湯補中兼清可也或服凉藥久不愈者以七味地黃湯冷服引火歸原不效甚者加附子可立愈也咽喉總括胸膈風熱咽喉痛邪盛單雙乳蛾生熱極腫閉名喉痹語言難出息不通痰盛涎繞喉間響内外腫閉纒喉風喉痹纒喉皆危證潰後無膿腫閉凶註胸膈上有風熱則咽喉腫痛風熱之邪若盛則生單雙乳蛾在會厭兩傍髙腫似乳蛾故名也熱極則腫閉湯水不下言語難出呼吸不通名曰喉痹若熱極更兼痰盛則痰涎繞於喉間聲響咽喉内外腫閉湯水不下名曰纒喉風皆危病也或服藥或吹藥或鍼刺潰破出膿血則愈若潰後不出膿血仍然腫閉湯水不下則死矣如意勝金錠雄黃解毒丸咽痛消毒凉膈散單雙乳蛾刺血痊喉痹纒喉勝金錠急攻痰熱解毒丸昬噤牙闗湯不下從鼻吹灌度喉闗吐下之後隨證治潰爛珍珠散上安註咽喉初起腫痛宜用消毒凉膈散即防風荆芥牛蒡子梔子連翹薄荷黃芩甘草大黃芒消也單雙乳蛾則刺少商出血在左刺左在右刺右在左右刺左右也喉痹纒喉初起病勢未甚或狀如傷寒宜服如意勝金錠即硫黃川芎臘茶火消薄荷生川烏生地黃各等分為末葱自然汁合為錠重一錢薄荷湯磨化服甚者連進三次若痰涎壅盛喉間内外腫閉湯水難下病勢危急宜用雄黃解毒丸即雄黃水飛鬱金細末各二錢半巴豆仁肥白者十四粒微去油以成散為度合均醋糊為丸如菉豆茶清下七丸便利吐痰則愈若昬冒牙闗噤急湯不能下將藥用醋化開十丸按中風門之法㗜入鼻内吐下則愈其後隨證調治可也若雖愈咽喉潰爛以珍珠散上之即好吹喉七寳散咽喉諸證七寳散消皂􅙴雄硼二礬細研如塵取一字吹中患處效如神註咽喉諸證謂咽喉腫痛單雙乳蛾喉痹纒喉也七寳散即火消牙皂全􅙴雄黃硼砂白礬膽礬也肩背總括通氣防風湯通氣太陽肩背痛羌獨藁草蔓防芎氣滯加木陳香附氣虚升柴參耆同血虚當歸白芍藥血瘀薑黃五靈紅風加靈仙濕二术研送白丸治痰凝註李杲羌活勝濕湯又名通氣防風湯治太陽經風濕肩背痛即羌活獨活藁本甘草蔓荆子防風川芎也兼氣鬱滯痛者則常常作痛加木香陳皮香附也氣虚鬱痛者則時止時痛加升麻柴胡人參黃耆也血虚鬱痛者則夜甚時止加當歸白芍藥也血瘀鬱痛者則夜痛不止加薑黃五靈脂紅花也風氣鬱盛者痛則項肩强加威靈仙也濕氣鬱甚者痛則肩背重加蒼术白术也痰風凝鬱者痛則嘔眩用本湯研送青州白丸子也心腹諸痛總括心痛岐骨䧟處痛橫滿上胸下胃脘當臍脾腹連腰腎少腹小大腸脇肝蟲痛時止吐清水疰即中惡寒外干悸分停飲與思慮食即停食冷内寒水停痰飲熱胃火氣即氣滯血瘀縁随證分門檢方治真心黑厥至節難註岐骨䧟處痛名心痛橫滿連胸名肺心痛下連胃脘名胃心痛連臍名脾心痛連腰名腎心痛連少腹名大腸小腸痛連脇名肝心痛時止吐清水名蟲心痛中惡腹痛名疰痛寒邪外干名中寒痛悸而痛名悸心痛水停心下屬飲也思慮傷心屬傷也停食痛停水痛停痰痛胃火痛氣滯痛血瘀痛皆不死之證也當分門施治惟真心痛面色黑四肢逆冷至節死證也化滯丸清中湯攻濕積熱求化滯攻寒積水備急丹火痛二陳梔連䓻蟲用烏梅飲控涎註化滯丸成方也清中湯即陳皮半夏茯苓甘草薑炒山梔黃連草豆䓻也木香流氣飲七情鬱結流氣飲思慮悸痛歸脾湯内寒理中外五積疰痛備急血抵當小建中湯木來乗土腹急痛緩肝和脾小建中血虚寒痛羊肉治氣虚理中加陳青註羊肉謂羊肉湯也烏頭梔子湯刦諸鬱痛烏梔子刦而復痛入元明已經吐下或虚久急痛欲死求鴉鳴註諸鬱謂諸寒火鬱而痛也寒多炮川烏為主熱多薑炒梔子為主元明元明粉也鴉鳴謂以真鴉片末或加麝香少許飯丸如桐子大每服三五丸引在本草名一粒金丹胸脇總括栝蔞薤白白酒湯栝蔞薤白半夏湯栝蔞薤白白酒湯胸痹胸背痛難當喘息短氣時咳唾難卧仍加半夏良註栝蔞薤白白酒湯即栝蔞實小根菜水白酒煎也顛倒木金散胸痛氣血熱飲痰顛倒木金血氣安飲熱大䧟小䧟治頑痰須用控涎丹註胸痛之證須分屬氣屬血屬熱飲屬老痰顛倒木金散即木香鬱金也屬氣鬱痛者以倍木香君之屬血鬱痛者以倍鬱金君之為末每服二錢老酒調下虚者加人參更效胸中有痰飲熱作痛者輕者小䧟胸湯重者大䧟胸湯丸治之若吐唾稠黏痰盛則用控涎丹枳芎散枳橘散柴胡疎肝湯加味逍遥散左金丸當歸龍薈丸脇痛左屬瘀留血輕金芎枳草重攻右屬痰氣重逐飲片薑橘枳草醫輕肝實太息難轉側肝虚作痛引肩胸實用疎肝柴芍草香附枳陳與川芎肝虚逍遥加芎細陳皮生薑緩其中肝虚左金實龍薈一條扛起積食攻註左屬瘀血輕謂瘀血輕者宜用枳芎散重攻謂瘀血重者宜以攻血之劑也枳芎散即枳殻撫芎鬱金甘草也右屬痰氣重逐飲謂以控涎十棗逐痛之重者也枳橘散即枳殻橘皮片子薑黃甘草醫痛之輕者也柴胡疎肝散即柴胡白芍甘草香附枳殻陳皮川芎也逍遥散即白术茯苓當歸白芍柴胡炙草薄荷少許加川芎細辛陳皮生薑也左金即左金丸呉茱萸黃連也肝實火旺者當歸龍薈丸積食者以化滯丸積飲者以控涎丹腰痛總括腰痛腎虚風寒濕痰飲氣滯與血瘀濕熱閃挫凡九種面忽紅黑定難醫註腰痛之證其因不同有腎虚有風有寒有濕有痰飲有氣滯有血瘀有濕熱有閃挫凡患腰痛極甚而面色忽紅忽黑是為心腎交争難治之證也安腎丸腰痛悠悠虚不舉寄生青娥安腎丸胡盧骨脂川楝續桃杏茴苓山藥鹽註寄生謂獨活寄生湯青娥丸即補骨脂杜仲核桃仁也安腎丸即胡盧巴補骨脂川楝肉川續斷桃仁杏仁小茴香茯苓山藥也鹽鹽湯為引也羌活勝濕湯通經丸腰痛屬寒得熱減五積呉萸桃杜安寒濕重著勝濕附内實通經硫麵牽風痛無常掣引足經虚當用寄生痊經實非汗不能解續命湯加牛杜穿註五積散加呉茱萸桃仁杜仲羌活勝濕湯即防風通氣湯加附子也通經丸即硫黃黑牽牛頭末麥麫合丸煮浮起服方出本草小續命湯加牛膝杜仲炒穿山甲也通氣散活絡丹氣滯閃挫通氣散木陳穿索草茴牽血瘀不移如錐刺日輕夜重活絡丹註通氣散即木香陳皮穿山甲元胡索甘草小茴香白牽牛也活絡丹即川烏草烏南星地龍乳香沒藥也加五靈脂麝香丸效蒼蘗散煨腎散濕熱熱注足蒼蘗二妙牛杜己瓜芎腰如物覆濕痰畜煨腎椒鹽遂有功註蒼蘗散即蒼术黃蘗牛膝杜仲防己木瓜川芎也煨腎散即猪腰子剖開入川椒食鹽甘遂末濕紙裹煨熟酒食之小便閉癃遺尿不禁總括膀胱熱結為癃閉寒虚遺尿與不禁閉即尿閉無滴出少腹脹滿痛難伸癃即淋瀝㸃滴出莖中澁痛數而勤不知為遺知不禁石血膏勞氣淋分註膀胱熱結輕者為癃重者為閉膀胱寒虚輕者為遺尿重者為不禁閉者即小便閉無㸃滴下出故少腹滿脹痛也癃者即淋瀝㸃滴而出一日數十次或勤出無度故莖中澁痛也不知而尿出謂之遺尿知而不能固謂之小便不禁小便閉遺尿死證嘔噦尿閉為闗格若出頭汗命將傾傷寒狂冒遺尿死尿閉細濇不能生註上為嘔噦不入下為小便不通則陰陽之氣闗格若出頭汗則為陽絶故命傾也傷寒狂冒屬陽邪盛遺尿屬陰不守若尿閉衇細澁知陰亦竭故俱死也治癃閉熨吐汗三法陰陽熨臍葱白麝冷熱互熨尿自行宣上木通葱探吐逹外葱湯薰汗通註用葱白一觔細剉入麝香五分拌匀分二包置臍上先以炭火熨斗熨之半炷香時換一包以冷水熨斗熨之互相遞熨以尿通為度服諸藥不效或服藥即時吐出或服攻下藥不利宜用宣上法以木通老葱煎湯服頃時探吐再服再吐以尿通為度服諸藥不效或身無汗宜用逹外法以葱湯入木桶内令病人坐於杌上沒臍為度匝腰繫裙以覆之少時汗出其尿自出欲尿時不可出桶即於桶内溺之恐出桶氣收而尿又回也小便不通通闗丸熱實不化大便鞕癃閉八正木香痊陽虚不化多厥冷惡寒金匱腎氣丸陰虚不化發午熱不渴知蘗桂通闗氣虚不化不急滿倦怠懶言春澤煎註小便不通熱實者宜用八正散加木香陽虚者宜用金匱腎氣丸陰虚者宜用通闗丸即知母黃蘗肉桂少許也氣虚宜用春澤湯即五苓散加人參也八正散石淋猶如鹻結鐺是因濕熱煉膀胱一切熱淋八正扁通滑梔瞿草車黃註八正散即扁蓄木通瞿麥梔子滑石甘草車前子大黃也小薊飲子血淋心遺熱小腸實熱仍宜下之良清熱小薊梔滑淡歸藕通蒲草地黃註淡淡竹葉也藕藕節也蒲蒲黃也海金沙散鹿角霜丸膏淋尿濁或如涕精溺俱出海草滑熱盛八正加蒼术虚用秋苓鹿角佳註海海金沙也秋秋石也苓茯苓也鹿角鹿角霜糯米糊為丸也加味八正散氣淋肺熱難清肅八正石葦木葵沉内傷氣虚不能化五苓益氣自通神註八正散加石葦木香冬葵子沉香五苓合補中益氣湯補中益氣湯合五苓散清心蓮子飲勞淋内傷補中苓腎氣知蘗過淫成勞心清心蓮地骨耆芩車麥草參苓註内傷勞脾用補中益氣湯合五苓散勞腎陽虚用金匱腎氣湯陰虚用知蘗地黃湯思慮勞心用清心蓮子飲是方即蓮子地骨皮黃耆黃芩車前子麥門冬生甘草人參白茯苓也琥珀散痰淋七氣白丸子熱燥清熱用滋陰諸淋平劑琥珀木葵蓄通滑歸鬱金註七氣湯見諸氣門青州白丸子見類中風門滋陰通闗丸也木木香也葵冬葵子也桂附地黃丸補中益氣湯加白果方坎離既濟湯加山萸肉五味子方遺尿不禁淋尿白桂附補中白果煎補之不應或尿赤生地知蘗萸味攅註遺尿不禁及諸淋尿色白者皆屬寒虚寒者用桂附地黃湯加白果虚者用補中益氣湯加白果凡遺尿不禁諸淋尿色赤者或補之不應者亦有熱虚用坎離既濟湯即生地知母黃蘗加山萸肉五味子也大便燥結總括熱燥陽結能食數寒燥陰結不食遲實燥食積熱結胃食少先鞕後溏脾氣燥阻隔不降下血燥乾枯老病虚風燥久患風家候直腸結鞕導之宜註熱燥即陽結也能食而衇浮數有力與三陽熱證同見者也寒燥即陰結也不能食而衇沉遲有力與三陰寒證同見者也實燥即胃實鞕燥也與腹滿痛同見者也虚燥即脾虚先鞕後溏之燥也與少氣腹縮同見者也氣燥即氣道阻隔之燥也與噎膈反胃同見者也血燥即血液乾枯之燥也與久病老虚同見者也風燥即久患風病之燥也從風家治直腸結即燥屎巨鞕結在肛門難出之燥也從導法治之結燥治法溫脾湯握藥法熱實脾約三承氣寒實備急共溫脾大黃薑附桂草朴寒虚硫半握藥醫虚燥益氣消黃入血燥潤腸與更衣氣燥四磨參利膈風燥捜風順氣宜註溫脾湯即大黃乾薑附子肉桂甘草厚朴也硫半丸即硫黃半夏也握藥即巴豆仁乾薑韭子良薑硫黃甘遂白檳榔各五分為末合均飲和分二粒先以花椒湯洗手麻油塗手心握藥移時便㵼欲止則以冷水洗手益氣即補中益氣湯加大黃朴消潤腸丸即當歸生地枳殻桃仁火麻仁各等分為末蜜丸米飲早服更衣丸即生蘆薈硃砂末等分飯丸酒服四磨湯即人參烏藥沉香檳榔也參利膈即人參利膈丸也搜風順氣即搜風順氣丸也御纂醫宗金鑑卷四十三
