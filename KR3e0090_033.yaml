body:
  text: 刪補名醫方論卷八目録小柴胡湯大柴胡湯柴胡桂枝湯黄芩湯黄連湯黄連阿膠湯理中湯丸乾薑附子湯茯苓四逆湯附子湯四逆湯通衇四逆湯白通湯白通加豬膽汁湯真武湯當歸四逆湯當歸四逆加呉茱萸生薑湯吴茱萸湯烏梅丸赤石脂禹餘糧湯白頭翁湯御纂醫宗金鑑卷三十三目録欽定四庫全書御纂醫宗金鑑卷三十三刪補名醫方論卷八目録小柴胡湯大柴胡湯柴胡桂枝湯黄芩湯黄連湯黄連阿膠湯理中湯丸乾薑附子湯茯苓四逆湯附子湯四逆湯通衇四逆湯白通湯白通加豬膽汁湯真武湯當歸四逆湯當歸四逆加呉茱萸生薑湯吴茱萸湯烏梅丸赤石脂禹餘糧湯白頭翁湯御纂醫宗金鑑卷三十三目録欽定四庫全書御纂醫宗金鑑卷三十三刪補名醫方論卷八小柴胡湯治傷寒五六日寒熱徃来胸脇苦滿嘿嘿不欲飲食心煩喜嘔口苦耳聾衇弦數者此是少陽經半表半裏之證宜此湯以和解之柴胡半觔黄芩三兩人參三兩半夏半升甘草三兩炙生薑三兩切大棗十二枚擘右七味以水一斗二升煮取六升去滓再煎取三升溫服一升日三服若胸中煩而不嘔去半夏人參加栝蔞實若渴者去半夏加人參栝蔞根若腹中痛去黄芩加芍藥若脇下痞鞕去大棗加牡蠣若心下悸小便不利者去黄芩加茯苓若不渴外有㣲熱者去人参加桂枝温覆取㣲似汗愈若欬者去人參大棗生薑加五味子乾薑集註程應旄曰方以小柴胡名者取配乎少陽之義也至於制方之㫖及加減法則所云上焦得通津液得下胃氣因和盡之矣何則少陽衇循脇肋在腹陽背隂兩岐間在表之邪欲入裏為裏氣所拒故寒徃而熱来表裏相拒而留於岐分故胸脇苦滿神識以拒而昏困故嘿嘿木受邪則妨土故不欲食膽為陽木而居清道為邪所鬱火無從泄逼炎心分故心煩清氣鬱而濁則成痰滯故喜嘔嘔則木火兩舒故喜之也此則少陽定有之證其餘或之云者以少陽在人身為遊部凡表裏經絡之罅皆能隨其虚而見之不定之邪也據證俱是太陽經中所有者特以五六日上見故屬之少陽半表半裏兼而有之方是小柴胡證方中以柴胡疏木使半表之邪得從外宣黄芩清火使半裏之邪得從内徹半夏豁痰飲降裏氣之逆人參補乆虚助生發之氣甘草佐柴芩調和内外薑棗佐參夏通逹榮衞相須相濟使邪無内向而外解也至若煩而不嘔者火成燥實而逼胸故去人參半夏加栝蔞實也渴者燥已耗液而逼肺故去半夏加栝蔞根也腹中痛木氣㪚入土中胃陽受困故去黄芩以安土加芍藥以戢木也脇下痞鞕者邪既留則木氣實故去大棗之甘而泥加牡蠣之鹹而耎也心下悸小便不利者水邪侵乎心矣故去黄芩之苦而伐加茯苓之淡而滲也不渴身有㣲熱者半表之寒尚滯於肌故去人參加桂枝以解之也欬者半表之寒凑入於肺故去參棗加五味子易生薑為乾薑以温之雖肺寒不減黄芩恐乾薑助熱也總之邪在少陽是表寒裏熱兩鬱不得升之故小柴胡之治所謂升降浮沉則順之也大柴胡湯治熱結在内心下急嘔不止鬱鬱㣲煩柴胡證仍在者與大柴胡湯下之柴胡半觔黄芩三兩半夏半升芍藥三兩枳實四枚大黄二兩生薑五兩大棗十二枚擘右八味以水一斗二升煮取六升去滓再煎溫服一升日三服註柴胡證在又復有裏熱故立少陽兩解法也以小柴胡湯加枳實芍藥者仍解其外以和其内也去參草者以裏不虚少加大黄以瀉結熱倍生薑者因嘔不止也斯方也柴胡得生薑之倍解半表之功㨗枳芍得大黄之少攻半裏之効徐雖云下之亦下中之和劑也柴胡桂枝湯傷寒六七日發熱㣲惡寒肢節煩疼㣲嘔心下支結此太陽少陽併病也柴胡桂枝湯主之柴胡四兩桂枝一兩半人參一兩半甘草一兩半夏二合半洗黄芩一兩半芍藥一兩半大棗六枚擘生薑一兩半切右九味以水七升煮取三升去滓分溫服集註柯琴曰仲景書中最重柴桂二方以桂枝解太陽肌表又可以調諸經之肌表小柴胡解少陽半表亦可以和三陽之半表故於六經病外獨有桂枝證柴胡證之稱見二方之任重不拘於經也如陽浮隂弱條是仲景自為桂枝證之註釋血弱氣虚條亦仲景自為柴胡證之註釋桂枝有壞病柴胡亦有壞病桂枝有疑似證柴胡亦有疑似證病如桂枝證而實非若脚攣急與胸中痞鞕者是已病如柴胡證而實非本渴而飲水嘔食穀嘔與但欲嘔胸中痛㣲溏者是已此條為傷寒六七日正寒熱當退之時反見發熱惡寒諸表證更見心下支結諸裏證表裏不解法當表裏雙解之然惡寒㣲發熱亦㣲可知肢節煩疼則一身骨節不疼可知㣲嘔心下亦㣲結故謂之支結表證雖不去而已輕裏證雖已見而未甚故取桂枝之半以散太陽未盡之邪取柴胡之半以解少陽微結之證口不渴身有㣲熱者法當去人參以六七日来邪雖未解而正已虚故仍用之外證雖在而病機已見於裏故方以柴胡冠桂枝之上為雙解兩陽之輕劑也黄芩湯治太陽少陽合病自下利者若嘔者加半夏生薑黄芩甘草芍藥各三兩大棗十二枚擘右四味以水一斗煮取三升去滓溫服一升日再服夜一服嘔者加半夏半升生薑三兩集註程應旄曰此之合病者頭痛胸滿口苦咽乾目眩或徃来寒熱或衇大而弦半表之邪不待太陽傳遞而即合少陽裏氣失守所以下利陽熱漸盛所以上嘔故用黄芩湯清熱益隂半裏清而半表自解矣柯琴曰太陽少陽合病是熱邪已入少陽之裏膽火下攻於脾故自下利上逆於胃故兼嘔也與黄芩湯酸苦相濟調中以存隂也熱不在半表故不用柴胡今熱已入半裏故黄芩主之雖非胃實亦非胃虚故不須人參以補中兼嘔者故仍加半夏生薑以降逆也黄連湯治傷寒胸中有熱胃中有邪氣腹中痛欲嘔吐者黄連三兩乾薑三兩甘草三兩人參二兩桂枝三兩半夏半升大棗十二枚右七味以水一斗煮取六升去滓温服一升日三服夜二服集註程應旄曰熱在胸中有煩躁鬱悶之證可知胃中反有邪氣以寒邪被格在下故也此證寒熱俱有較之大青龍之寒熱已向近裏一層故其證不見之表裏際而祗見之上下際腹中痛者隂邪在胃而寒乃獨治於下也欲嘔吐者陽邪在胸而熱乃獨治於上也此為上下相格治法亦寒熱並施而辛寒易以苦寒辛熱加以苦熱更以人參半夏以補宣中氣升降隂陽自此條而互及瀉心諸湯皆其法也成無已曰濕家下後舌上如胎者以丹田有熱胸中有寒是邪氣入裏而為下熱上寒也此傷寒傳裏而為下寒上熱也喻昌曰隂陽悖逆皆當和解法黄連阿膠湯治少隂病得之二三日以上心中煩不得卧黄連四兩黄芩一兩芍藥二兩雞子黄二枚阿膠三兩右五味以水五升先煮三物取二升去滓内膠烊盡小冷内雞子黄攪令相得溫服七合日三服集註柯琴曰此少隂病之瀉心湯也凡瀉心必藉連芩而導引有隂陽之别病在三陽胃中不和而心下痞鞕者虚則加參甘補之實則加大黄下之病在少隂而心中煩不得卧者既不得用參甘以助陽亦不得用大黄以傷胃矣用芩連以直折心火用阿膠以補腎隂雞子黄佐芩連於瀉心中補心血芍藥佐阿膠於補隂中斂隂氣斯則心腎交合水升火降是以扶隂瀉陽之方變而為滋隂和陽之劑也是則少隂之火各歸其部心中之煩不得卧可除矣經曰隂平陽祕精神乃治斯方之謂歟理中湯丸治中氣不運腹中不實口失滋味病乆不食藏府不調與傷寒直中太隂自利不渴寒多而嘔等證人參三兩白术三兩甘草三兩乾薑三兩右四味搗篩為末蜜丸如雞子黄大以沸湯數合和一丸研碎溫服之日三四枚夜二枚腹中未熱益至三四丸然不及湯湯法以四物依兩數切用水八升煮取三升去滓温服一升日三服若臍上築者腎氣動也去术加桂四兩多吐者去术加生薑三兩下多者還用术悸者加茯苓二兩渴欲得水者加术足前成四兩半腹中痛者加人參足前成四兩半寒者加乾薑足前成四兩半腹滿者去术加附子一枚服湯後如食頃飲熱粥一升許㣲自溫勿發衣被集註程應旄曰陽之動始於温溫氣得而穀精運穀氣升而中氣贍故名曰理中實以燮理之功予中焦之陽也若胃陽虚則中氣失宰膻中無發宣之用六府無灑陳之功猶如釡薪失焰故下致清穀上失滋味五藏凌奪諸證所由来也參术炙草所以守中州乾薑辛以溫中必假之以焰釡薪而騰陽氣是以穀入於隂長氣於陽上輸華盖下攝州都五藏六府皆以受氣此理中之㫖也若水寒互勝即當脾腎雙温加以附子則命門益土母温矣白术補脾得人參則壅氣故臍下動氣吐多腹滿者去术也加桂以伐腎邪加生薑以止嘔也加附子以消隂也下多者濕勝也還用术燥濕也渴欲飲水飲渴也加术使飲化津生也心下悸停水也加茯苓導水也腹中痛倍人參虚痛也寒者加乾薑寒甚也乾薑附子湯下後復發汗晝日煩躁不得眠夜而安静不嘔不渴無表證衇沉㣲身無大熱者乾薑附子湯主之乾薑一兩附子一枚去皮生用破八片右二味以水三升煮取一升去滓頓服茯苓四逆湯傷寒厥而心下悸發汗若下之病仍不解煩躁者茯苓四逆湯主之茯苓六兩人參一兩甘草一兩炙乾薑一兩附子一枚生用破八片右五味以水五升煮取三升去滓溫服七合日三服註凡太陽病治不如法汗後復下或下後復汗誤而又誤變成壊病若其人陽盛而從熱化則轉屬三陽陽衰而從寒化則繫在三隂此二湯所治之煩躁皆壞病也煩躁雖六經俱有而多見於太陽少隂者太陽為真隂之標少隂為真陽之本也未經汗下而煩躁多屬陽其衇實大其證渴熱是煩為陽盛躁為隂虚已經汗下而煩躁多屬陰其衇沈㣲其證汗厥是煩為陽虚躁為陰極也夫先下後汗於法為逆外無大熱内不渴嘔似乎陰陽自和而實妄汗亡陽所以虚陽擾亂於陽分故晝日煩躁不得眠盛隂偏安於隂分故夜而安静衇沉㣲是真陽将脱而煩躁也用乾薑附子壮陽以配隂薑附者陽中陽也生用則力更鋭不加甘草則勢更猛是方比四逆為峻救其相離故當急也先汗後下於法雖順若病不解厥悸仍然驟增晝夜煩躁似乎隂盛格陽而實腎上凌心皆因水不安其位挾隂邪而上乘是陽虚有水氣之煩躁也用茯苓君四逆抑隂以伐水人參佐四逆生氣而益陽參苓君子也兼調以甘草比四逆為緩隂陽不急故當緩也一去甘草一加參苓而緩急自别仲景用方之妙如此附子湯治少隂病身痛手足寒骨節痛口中和背惡寒衇沉者附子二枚生用去皮破八片茯苓三兩人參二兩白术四兩芍藥三兩右五味以水八升煮取三升去滓温服一升日三服註少隂為寒水之藏故傷寒之重者多入少隂所以少隂一經最多死證方中君附子二枚者取其力之鋭且以重其任也生用者一以壮少火之陽一以散中外之寒則惡寒自止身痛自除手足自溫矣所以固生氣之原令五藏六府有本十二經衇有根衇自不沉骨節可知矣更佐白术以培土芍藥以平木茯苓以伐水水伐火自旺旺則陰翳消木平土益安安則水有制制則生化此萬全之術其畏而不敢用束手待斃者曷可勝計耶四逆湯治衇沉厥逆等證甘草二兩炙乾薑一兩半附子一枚生用去皮破八片右三味以水三升煮取一升二合去滓分溫再服强人可大附子一枚乾薑三兩註方名四逆者主治少隂中外皆寒四肢厥逆也君以炙草之甘溫溫養陽氣臣以薑附之辛溫助陽勝寒甘草得薑附鼓腎陽温中寒有水中煖土之功薑附得甘草通闗節走四肢有逐隂回陽之力腎陽鼓寒隂消則陽氣外達而衇升手足溫矣通衇四逆湯治少隂下利清榖裏寒外熱手足厥逆脉微欲絶身反不惡寒其人面赤色或腹痛或乾嘔或咽痛或利止衇不出者厥隂下利清榖裏寒外熱汗出而厥者主之乾薑三兩强人可四兩甘草二兩炙附子大者一枚生用去皮右三味以水三升煮取一升二合去滓分温再服其衇即出者愈面色赤者加葱九莖腹中痛者去葱加芍藥二兩嘔者加生薑二兩咽痛去芍藥加桔梗一兩利止衇不出者加人參二兩註論中扶陽抑隂之劑中寒陽㣲不能外逹主以四逆中外俱寒陽氣虚甚主以附子隂盛於下格陽於上主以白通隂盛於内格陽於外主以通衇是則可知四逆運行陽氣者也附子溫補陽氣者也白通宣通上下之陽氣者也通衇通達内外之陽氣者也今衇㣲欲絶裏寒外熱是腎中隂盛格陽於外故主之也倍乾薑加甘草佐附子易名通衇四逆湯者以其能大壮元陽主持中外共招外熱反之於内盖此時生氣已離亡在俄頃若以柔緩之甘草為君豈能疾呼外陽耶故易以乾薑然必加甘草與乾薑等分者恐渙漫之餘薑附之猛不能安養元氣所謂有制之師也若面赤者加葱以通格上之陽腹痛者加芍藥以和在裏之隂嘔逆者加生薑以止嘔咽痛者加桔梗以利咽利止衇不出氣少者俱倍人參以生元氣而復衇也白通湯治少隂病下利衇㣲者與白通湯利不止厥逆無衇乾嘔煩者白通加豬膽汁湯主之服湯衇暴出者死衇㣲續者生葱白四莖乾薑一兩附子一枚生用去皮破八片右三味以水三升煮取一升去滓分温再服白通加豬膽汁湯葱白四莖乾薑一兩附子一枚生用去皮破八片人尿五合豬膽汁一合已上三味以水三升煮取一升去滓内豬膽汁人尿和令相得分温再服若無膽汁亦可註是方也即四逆湯減甘草加葱白也而名之曰白通者以葱白能通陽氣也減甘草者因其緩也加尿膽者從其類也下咽之後冷體既消熱性便發性且不違而致大益則二氣之拒格可調上下之隂陽可通矣真武湯治少隂水氣為患腹痛下利四肢沉重疼痛小便不利其人或咳或嘔或小便利而下利者用此加減白术二兩茯苓二兩白芍二兩大附子一枚炮生薑三兩切右五味以水八升煮取三升去滓溫服七合日三服若咳者加五味子半升細辛乾薑各一兩若小便利者去茯苓若下利去芍藥加乾薑二兩若嘔去附子加生薑足成半觔註小青龍湯治表不解有水氣中外皆寒實之病也真武湯治表已解有水氣中外皆寒虚之病也真武者北方司水之神也以之名湯者藉以鎮水之義也夫人一身制水者脾也主水者腎也腎為胃闗聚水而從其類倘腎中無陽則脾之樞機雖運而腎之闗門不開水即欲行以無主制故泛溢妄行而有是證也用附子之辛熱壮腎之元陽則水有所主矣白术之苦燥建立中土則水有所制矣生薑之辛散佐附子以補陽於主水中寓散水之意茯苓之淡滲佐白术以健土於制水中寓利水之道焉而尤妙在芍藥之酸収仲景之㫖㣲矣盖人之身陽根於隂若徒以辛熱補陽不少佐以酸収之品恐真陽飛越矣用芍藥者是亟收陽氣歸根於隂也於此推之則可知誤服青龍致發汗亡陽者所以於補陽藥中之必需芍藥也然下利減芍藥者以其陽不外散也加乾薑者以其溫中勝寒也水寒傷肺則咳加細辛乾薑者散水寒也加五味子者收肺氣也小便利者去茯苓以其雖寒而水不能停也嘔者去附子倍生薑以其病非下焦水停於胃也所以不須溫腎以行水祗當溫胃以散水且生薑功能止嘔也當歸四逆湯手足厥冷衇細欲絶者主之若其人内有乆寒加呉茱茰生薑當歸三兩桂枝三兩芍藥三兩細辛二兩通草二兩甘草二兩炙大棗二十五枚擘右七味以水八升煮取三升去滓溫服一升日三服當歸四逆加呉茱萸生薑湯於前湯内加吳茱萸半觔生薑三兩右九味以水六升清酒六升和煮取五升去滓分温五服註凡厥隂病則衇微而厥以厥隂為三隂之盡隂盡陽生若受其邪則隂陽之氣不相順接故衇㣲而厥也然厥隂之藏相火逰行其間經雖受寒而藏不即寒故先厥者後必發熱所以傷寒初起見其手足厥冷衇細欲絶者不得遽認為虚寒而用薑附也此方取桂枝湯君以當歸者厥隂主肝為血室也佐細辛味極辛能達三隂外温經而内温藏通草其性極通善開闗節内通竅而外通榮倍加大棗即建中加飴用甘之法減去生薑恐辛過甚而迅散也肝之志苦急肝之神欲散甘辛並舉則志遂而神悦未有厥隂神志遂悦而衇㣲不出手足不溫者也不須參苓之補不用薑附之峻此厥隂厥逆與太少不同治也若其人内有久寒非辛溫之品所能兼治則加吴茱萸生薑之辛熱更用酒煎佐細辛直通厥隂之藏迅散内外之寒是又救厥隂内外兩傷於寒之法也吴茱萸湯治厥隂病乾嘔吐涎沬頭痛者少隂證吐利手足厥冷煩躁欲死者陽明食穀欲嘔者吴茱萸一升人參三兩生薑六兩大棗十二枚擘右四味以水七升煮取二升溫服七合日三服集註羅謙輔曰仲景救陽諸法於少隂四逆湯必用薑附通衇四逆湯倍加乾薑其附子生用附子湯又加生附至二枚所以然者或壮㣲陽使之外逹或招飛陽使之内返此皆少隂真陽失所故以回陽為亟也至其治厥隂則易以吴茱萸而併去前湯諸藥獨用人參薑棗者盖人身厥隂肝木雖為兩隂交盡而一陽之真氣實起其中此之生氣一虚則三隂濁氣直逼中上不惟本經諸證悉具将陽明之健運失職以至少隂之真陽浮露而吐利厥逆煩躁欲死食榖欲嘔種種叢生矣吴茱萸得東方震氣辛苦大熱能逹木鬱直入厥隂降其盛隂之濁氣使隂翳全消用以為君人參秉冲和之氣甘温大補能接天真挽回性命升其垂絶之生氣令陽光普照用以為臣佐薑棗和胃而行四未斯則震坤合徳木土不害一陽之妙用成而三焦之間無非生生之氣矣諸證有不退者乎盖仲景之法於少隂則重固元陽於厥隂則重䕶生氣學者當深思而得之矣烏梅丸治厥隂病消渴氣上撞心心中疼熱饑而不欲食食即吐蚘又主乆痢烏梅三百箇細辛六兩乾薑十兩黄連一觔當歸四兩附子六兩蜀椒四兩去汗桂枝六兩人參六兩黄蘗六兩右十味異搗篩合治之以苦酒浸烏梅一宿去核蒸之五升米下飯熟搗成泥和藥令相得内臼中與蜜杵二千下丸如梧桐子大先食飲服十丸日三稍加至二十丸禁生冷滑物臭食等集註柯琴曰六隂惟厥隂為難治其本隂其標熱其體木其用火必伏其所主而先其所因或收或散或逆或從隨所利而行之調其中氣使之和平是治厥隂法也厥隂當兩隂交盡又名隂之絶陽宜無熱矣第其具合晦朔之理隂之初盡即陽之初生所以厥隂病熱是少陽使然也火王則水虧故消渴氣上撞心心中疼熱氣有餘便是火也木勝則尅土故饑不欲食蟲為風化饑則胃中空虚蚘聞食臭出故吐蚘也仲景立方皆以甘辛苦味為君不用酸收之品而此用之者以厥隂主肝木耳洪範曰木曰曲直作酸内經曰木生酸酸入肝君烏梅之大酸是伏其所生也配黄連瀉心而除疼佐黄蘗滋腎以除渴先其所因也連蘗治厥隂陽邪則有餘不足以治隂邪也椒附辛薑大辛之品並舉不但治厥隂隂邪且肝欲散以辛散之也又加桂枝當歸是肝藏血求其所屬也寒熱雜用則氣味不和佐以人參調其中氣以苦酒浸烏梅同氣相求蒸之米下資其穀氣加蜜為丸少與而漸加之緩則治其本也蚘昆蟲也生冷之物與濕熱之氣相成故藥亦寒熱互用且胸中煩而吐蚘則連蘗是寒因熱用也蚘得酸則静得辛則伏得苦則下信為治蟲佳劑乆痢則虚調其寒熱酸以收之下痢自止赤石脂禹餘糧湯治久利不止大腸虚脱服理中丸而利益甚者赤石脂一觔搗碎禹餘糧一觔搗碎右二味以水六升煮取二升去滓分溫三服集註柯琴曰甘薑參术可以補中宫元氣之虚而不足以固下焦脂膏之脱此利在下焦故不得以理中之劑収功矣然大腸之不固仍責在胃闗門之不閉仍責在脾二石皆土之精氣所結實胃而濇腸急以治下焦之標者實以培中宫之本也要知此證土虚而火不虚故不宜於薑附若濕甚而虚不甚復利不止者故又當利小便也白頭翁湯治厥隂熱利下重衇沉弦渴欲飲水者白頭翁三兩黄連三兩黄蘗三兩秦皮三兩右四味以水七升煮取三升去滓溫服一升不愈更服一升註三隂俱有下利證自利不渴者屬太隂也自利而渴者屬少隂也惟厥隂下利屬於寒者厥而不渴下利清穀屬於熱者消渴下重下利膿血此熱利下重乃火鬱濕蒸穢氣奔迫廣腸魄門重滯而難出内經云暴注下迫者是矣君以白頭翁寒而苦辛臣以秦皮寒而苦濇寒能勝熱苦能燥濕辛以散火之鬱濇以収下重之利也佐黄連清上焦之火則渴可止使黄蘗瀉下焦之熱則利自除也治厥隂熱利有二初利用此方以苦燥之以辛散之以濇固之是謂以寒治熱之法久利則用烏梅丸之酸以收火佐以苦寒雜以温補是謂逆之從之隨所利而行之調其氣使之平也御纂醫宗金鑑巻三十三
