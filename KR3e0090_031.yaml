  text: 刪補名醫方論卷六目録桂枝湯麻黄湯大青龍湯小青龍湯葛根湯桂枝麻黄各半湯桂枝二麻黄一湯桂枝二越婢一湯越婢湯麻黄杏仁甘草石膏湯麻黄附子細辛湯麻黄附子甘草湯桂枝加附子湯芍藥甘草附子湯桂枝甘草湯桂枝加芍藥加大黄湯桂枝加芍藥湯桂枝加大黄湯小建中湯炙甘草湯桂枝人參湯葛根黄芩黄連湯白虎湯白虎加人參湯豬苓湯五苓散茵蔯五苓散桂枝去芍加苓术湯十棗湯御纂醫宗金鑑卷三十一目録欽定四庫全書御纂醫宗金鑑卷三十一刪補名醫方論卷六目録桂枝湯麻黄湯大青龍湯小青龍湯葛根湯桂枝麻黄各半湯桂枝二麻黄一湯桂枝二越婢一湯越婢湯麻黄杏仁甘草石膏湯麻黄附子細辛湯麻黄附子甘草湯桂枝加附子湯芍藥甘草附子湯桂枝甘草湯桂枝加芍藥加大黄湯桂枝加芍藥湯桂枝加大黄湯小建中湯炙甘草湯桂枝人參湯葛根黄芩黄連湯白虎湯白虎加人參湯豬苓湯五苓散茵蔯五苓散桂枝去芍加苓术湯十棗湯御纂醫宗金鑑卷三十一目録欽定四庫全書御纂醫宗金鑑卷三十一删補名醫方論卷六桂枝湯治風寒在表衇浮弱自汗出頭痛發熱惡風惡寒鼻鳴乾嘔等證及雜證自汗盜汗虛損虚瘧亦可用若衇浮緊汗不出者酒客病風寒而汗出者禁用桂枝三兩芍藥三兩生薑三兩甘草二兩炙大棗十二枚右五味以水七升煮取三升服一升覆令微汗不可令如水流漓病必不除若服一升汗出病痊不必盡劑服已更歠稀粥一盞以助藥力註凡風寒在表衇浮弱自汗出者皆屬表虚宜桂枝湯主之名曰桂枝湯者君以桂枝也桂枝辛溫辛能散邪溫從陽而扶衛芍藥酸寒酸能斂汗寒走隂而益榮桂枝君芍藥是於發散中寓斂汗之意芍藥臣桂枝是於固表中有微汗之道焉生薑之辛佐桂枝以解肌表大棗之甘佐芍藥以和榮裏甘草甘平有安内攘外之能用以調和中氣即以調和表裏且以調和諸藥矣以桂芍之相須薑棗之相得藉甘草之調和陽表隂裏氣衛血榮並行而不悖是剛柔相濟以為和也而精義在服後須臾歠熱稀粥以助藥力盖穀氣内充不但易為釀汗更使已入之邪不能少留將來之邪不得復入也又妙在溫服令一時許漐漐微似有汗是授人以微汗之法不可令如水流漓病必不除禁人以不可過汗之意也此方為仲景羣方之冠乃解肌發汗調和榮衛之第一方也凡中風傷寒衇浮弱汗自出而表不解者皆得而主之其他但見一二證即是不必悉具故麻葛青龍發汗諸劑咸用之也若汗不出麻黄證也衇浮緊者麻黄衇也固不可與桂枝湯然初起無汗當用麻黄發汗如汗解後復煩衇浮數者與下後衇仍浮氣上衝者及下後下利止而身痛不休者皆用此以解外何也盖此時表雖不解腠理已疏邪不在皮毛而在肌肉且經汗下津液已傷故衇證雖同麻黄而主治當屬桂枝矣粗工妄謂桂枝湯專治中風不治傷寒使人疑而不用又謂專發肌表不治他病不知此湯倍芍藥生薑加人參名桂枝新加湯用以治榮表虚寒肢體疼痛倍芍藥加飴糖名小建中湯用以治裏虚心悸腹中急痛再加黄耆名黄耆建中湯用以治虚損虚熱自汗盜汗因知仲景之方可通治百病也麻黄湯治太陽風寒在表頭項強痛發熱身疼腰痛骨節痛惡風寒無汗胸滿而喘其衇浮緊或浮數者用此發汗雖有是證若衇浮而弱汗自出或尺中衇微與遲者俱不可用風寒濕成痺肺經壅塞昬亂不語冷風哮吼最宜麻黄三兩去節桂枝二兩甘草一兩炙杏仁六十枚去皮尖右四味以水九升先煮麻黄减二升去上沫内諸藥煮取二升半去滓溫服八合溫覆取微汗不須歠粥一服汗出停後服汗出多者温粉撲之註凡風寒在表衇浮緊數無汗者皆表實也宜麻黄湯主之名曰麻黄湯者君以麻黄也麻黄性溫味辛而苦其用在迅升桂枝性溫味辛而甘其能在固表證屬有餘故主以麻黄必勝之算也監以桂枝制節之妙也杏仁之苦溫佐麻黄逐邪而降逆甘草之甘平佐桂枝和内而拒外飲入於胃行氣於元府輸精於皮毛斯毛衇合精溱溱汗出在表之邪必盡去而不留痛止喘平寒熱頓解不須歠粥而藉汗於榖也其不用薑棗者以生薑之性横散於肌碍麻黄之迅升大棗之性泥滯於膈礙杏仁之速降此欲急於直達稍緩則不迅横散則不升矣然則為純陽之劑過於發散如單刀直入之將用之若當一戰成功不當則不戢而召禍故可一而不可再如汗後不解便當以桂枝代之此方為仲景開表逐邪發汗第一峻藥也庸工不知其制在溫覆取汗若不溫覆取汗則不峻也世謂麻黄專能發表不治他病不知此湯合桂枝湯名麻桂各半湯用以和太陽留連未盡之寒熱去杏仁加石膏合桂枝湯名桂枝二越婢一湯用以解太陽熱多寒少之寒熱若陽盛於内而無汗者又有麻黄杏仁甘草石膏湯以散太隂肺之邪若隂盛於内而無汗者又有麻黄附子細辛甘草湯以溫散少隂腎家之寒金匱要略以此方去桂枝千金方以此方桂枝易桂皆名還魂湯用以治邪在太隂卒中暴厥口噤氣絶下咽奏效而皆不温覆取汗是知麻黄湯之峻與不峻在温覆與不溫覆此仲景用方之心法豈常人所能得而窺耶大青龍湯治太陽風寒兩傷榮衛同病傷寒之衇而見中風之證中風之衇而見傷寒之證二證俱不出汗而煩躁者用此兩解發汗雖有是證若衇微弱自汗出者不可服之服必亡陽麻黄六兩去節桂枝二兩杏仁四十箇去皮尖甘草二兩炙生薑三兩切大棗十二枚擘石膏如雞子大碎綿裹右七味以水九升先煮麻黄減二升去上沫内諸藥煮取三升去滓溫服一升取微汗汗出多者溫粉撲之一服汗者停後服汗多亡陽遂虚惡風煩躁不得眠也註何以知風寒兩傷榮衛同病以傷寒之衇而見中風之證中風之衇而見傷寒之證也名大青龍湯者取龍興雲雨之義也治風不外乎桂枝治寒不外乎麻黄合桂枝麻黄二湯以成劑故為兼風寒中傷者主之也二證俱無汗故減芍藥不欲其收也二證俱煩躁故加石膏以解其熱也設無煩躁則又當從事於麻黄桂枝各半湯也仲景於表劑中加大寒辛甘之品則知麻黄證之發熱熱全在表大青龍證之煩躁兼肌裏矣初病太陽即用石膏者以其辛能解肌熱寒能清胃火甘能生津液是預保陽明存津液之先着也粗工疑而畏之當用不用必致熱結陽明斑黄狂冒紛然變出矣觀此則可知石膏乃中風傷寒之要藥得麻桂而有青龍之名得知草而有白虎之號也服後取微汗汗出多者溫粉撲之一服得汗停其後服盖戒人即當汗之證亦不可過汗也所以仲景桂枝湯中不用麻黄者是欲其不大發汗也麻黄湯中用桂枝者恐其過汗無制也若不慎守其法汗多亡陽變生諸逆表遂空虚而不任風隂盛格陽而更煩躁不得眠也小青龍湯治傷寒表不解心下有水氣乾嘔發熱而欬或渇或利或噎或小便不利少腹滿或喘者及雜病膚脹水腫證用此發汗而利水麻黄三兩去節芍藥三兩五味子半升甘草三兩炙乾薑二兩半夏半升洗桂枝三兩細辛三兩右八味以水一升先煮麻黄減二升去上沫内諸藥煮取三升去滓溫服一升若渇者去半夏加栝蔞根三兩若噎者去麻黄加附子一枚炮若小便不利少腹滿者去麻黄加茯苓四兩若喘者去麻黄加杏仁半升去皮尖若微利者去麻黄加蕘花如雞子熬令赤色按加蕘花如雞子熬令赤色此必傳冩之譌盖本草蕘花即芫花類也用之攻水其力甚峻五分可令人下行數十次豈有治停飲之微利而用雞子大之蕘花者乎當改加茯苓四兩註太陽停飲有二一中風表虚有汗五苓散證也一傷寒表實無汗小青龍湯證也表實無汗故合麻桂二方以解外去大棗者以其性泥也去杏仁者以其無喘也有喘者加之去生薑者以有乾薑也若嘔者仍用佐乾薑細辛極溫極散使寒與水俱從汗而解佐半夏逐痰飲以清不盡之飲佐五味收肺氣以斂耗傷之氣若渇者去半夏加花粉避燥以生津也若微利與噎小便不利少腹滿俱去麻黄逺表以就裏也加附子以去噎散寒則噎可止加茯苓以利水則微利少腹滿可除矣此方與越婢湯同治水飲溢於表而為膚脹水腫宜發汗外解者無不隨手而消越婢治有熱者故方中君以石膏以散陽水也小青龍治有寒者故方中佐以薑桂以消隂水也葛根湯治太陽陽明兩經合病頭項強痛背亦牽強衇浮無汗惡風者及表不解下利而嘔者並宜服此發汗葛根四兩麻黄二兩去節桂枝二兩芍藥二兩甘草二兩炙生薑二兩切大棗十二枚擘右七味以水一斗先煮麻黄葛根減二升去沫内諸藥煮取三升温服一升覆取微似汗不湏歠粥餘如桂枝法將息及禁忌註是方也即桂枝湯加麻黄葛根麻黄佐桂枝發太陽榮衛之汗葛根君桂枝解陽明肌表之邪不曰桂枝湯加麻黄葛根而以葛根命名者其意重在陽明以嘔利屬陽明多也二陽表急非溫服覆而取汗其表未易解也或嘔或利裏已失和雖歠粥而胃亦不能輸精於皮毛故不湏歠粥也柯琴曰此證身不疼腰不疼骨節不疼不惡寒是骨不受寒矣頭項強痛下連於背牽動不寜是筋傷於風矣不喘不煩躁不乾嘔是裏不病無汗惡風病只在表若表病而兼下利則是表實裏虚矣比麻黄青龍二證較輕然項強連背拘強更甚於項強無汗不失為表但衇浮不緊故不從乎麻黄而於桂枝方加麻黄倍葛根以去實小變麻桂之法也蓋葛根為陽明主藥凡太陽有陽明者則佐入太陽藥中凡少陽有陽明者則佐入少陽藥中無不可也李杲定為陽明經藥張潔古云未入陽明者不可便服豈二人未讀仲景書乎要知葛根桂枝俱是解肌和裏之藥故有汗無汗下利不下利俱可用與麻黄之專於發表者不同也金匱治太陽病無汗小便反少氣上衝胷口噤不得語欲作剛痙集註喻昌曰傷寒項背􅕇􅕇無汗惡風者用葛根湯此證亦用之者以其邪在太陽陽明兩經之界兩經之熱併於胸中必傷肺金清肅之氣故水道不行小便少津液不布而無汗陽明之筋内結胃口外行胸中過人迎環口熱併陽明斯筋衇牽引口噤不得語然剛痙無汗必從汗解况濕邪内鬱必以汗出如故而止故用此湯合解兩經之濕熱與風寒之表法無害其同也桂枝麻黄各半湯太陽病得之八九日如瘧狀發熱惡寒熱多寒少其人不嘔清便欲自可一日二三度發衇微緩者為欲愈也衇微而惡寒者此隂陽俱虚不可更發汗更下更吐也面色反有熱色者未欲解也以其不能得小汗出身必癢宜桂枝麻黄各半湯桂枝一兩六銖芍藥一兩麻黄一兩去節生薑一兩甘草一兩炙大棗四枚擘杏仁二十四箇去皮尖右七味以水五升先煮麻黄一二沸去上沫内諸藥煮取一升八合去滓溫服六合註太陽病得之八九日有如瘧狀之寒熱熱多寒少者其人不嘔小便清白此裏和不受邪雖為欲自愈然必審其如瘧狀寒熱一日二三度輕輕而發診其衇微而且緩則知邪衰正復表裏將和始為欲愈也若衇微不緩正未復也更惡寒者邪未衰也雖不能自愈但已為前之汗吐下虚其表裏故不可更發汗更吐更下也衇微惡寒表裏俱虚面色當白今色反赤是猶有表邪怫鬱不能得小汗出宣發陽氣故面赤身癢未欲解也宜桂枝麻黄各半湯小小汗之以和榮衛自可愈也桂枝二麻黄一湯服桂枝湯大汗出衇洪大者與桂枝湯如前法若形如瘧日再發者汗出必解宜桂枝二麻黄一湯桂枝一兩十七銖芍藥一兩六銖麻黄十六銖去節甘草一兩二銖杏仁十六箇去皮尖生薑一兩六銖大棗五枚擘右七味以水五升先煮麻黄一二沸去上沫内諸藥煮取二升去滓溫服一升日再服註服桂枝湯大汗出衇洪大不解若煩渇者則表邪已入陽明白虎湯證也今衇雖洪大而不煩渇則為表邪仍在太陽故與桂枝湯如前法也若衇不洪大壯熱亦减惟寒熱如瘧日再發者雖屬輕邪然終為微寒所持非汗出必不解也宜桂枝二麻黄一湯小發榮衛之汗不用麻黄桂枝各半湯者蓋因已大汗出不欲其發榮衛汗欲其和榮衛汗也桂枝二越婢一湯太陽病發熱惡寒熱多寒少衇微弱者此無陽也不可更汗宜桂枝二越婢一湯桂枝一兩六銖芍藥一兩甘草一兩三銖炙石膏二十四銖麻黄十六銖大棗五枚擘生薑一兩六銖切右七味以水五升煮麻黄一二沸去上沫内諸藥煮取二升去滓溫服一升日再服本方當裁為越婢湯桂枝湯各飲一升今合為一方桂枝二越婢一湯註桂枝二越婢一湯即大青龍以杏仁易芍藥也名雖越婢輔桂枝實則大青龍之變制也去杏仁惡其從陽而辛散用芍藥以其走隂而酸收以此易彼裁而用之則主治不同也以桂枝二主之則不發汗可知越婢一者乃麻黄石膏二物不過取其辛涼之性佐桂枝二中和表而清熱則是寓微汗於不發之中亦可識也非若大青龍以石膏佐麻黄而為發汗驅熱之重劑也桂枝二麻黄一湯治若形如瘧日再發者汗出必解而無熱多寒少故不用石膏之涼也桂枝麻黄各半湯治如瘧狀熱多寒少而不用石膏更倍麻黄者以其面有怫鬱熱色身有皮膚作癢是知熱不向裏而向表令得小汗以順其勢故亦不用石膏之涼裏也桂枝二越婢一湯治發熱惡寒熱多寒少而用石膏者以其表邪寒少肌裏熱多故用石膏之涼佐麻桂以和榮衛非發榮衛也今人一見麻桂不問輕重亦不問溫覆不溫覆取汗不取汗總不敢用皆因未䆒仲景之㫖麻桂祗是榮衛之藥若重劑温覆取汗則為發榮衛之藥輕劑不溫覆取汗則為和榮衛之藥也越婢湯治風水惡風一身悉腫衇浮不渇續自汗出無大熱者又治裏水一身面目黄腫其衇沉小便不利故令病水假令小便自利此亡津液故令渇也越婢加术湯主之麻黄六兩石膏半觔生薑三兩切大棗十五枚擘甘草一兩惡風加附子一枚炮右五味以水六升煮麻黄去沫内諸藥煮取三升分三服集註喻昌曰越婢湯者示微發表於不發之方也大率取其通調榮衛麻黄石膏二物一甘熱一甘寒合而用之脾偏於隂則和以甘熱胃偏於陽則和以甘寒乃至風熱之陽水寒之隂凡不和於中土者悉得用之何也中土不和則水穀不化其精悍之氣以實榮衛榮衛虚則或寒或熱之氣皆得壅塞其隧道而不通於表裏所以在表之風水用之而在裏之水兼渇而小便自利者咸必用之無非欲其不害中土耳不害中土自足消患於方萌矣趙良曰五藏各一其隂陽獨脾胃居中而兩屬之故土不獨成四氣土亦從四維而後成不惟火生而已於是四方有水寒之隂即應於脾風熱之陽即應於胃飲食五味之寒熱凢入於脾胃者亦然一有相干則脾氣不和胃氣不清而水穀不化其精微以行榮衛以實隂陽也甘者土之本味所以脾氣不和和以甘熱胃氣不清清以甘寒麻黄之甘熱走手足太隂經連於皮膚行氣於三隂以祛隂寒之邪石膏之甘寒走手足陽明經達於肌肉行氣於三陽以祛風熱之邪既用其味甘以入土用其寒熱以和隂陽用其性善走以發越脾氣更以甘草和中緩急二藥相協而成功大棗之甘補脾中之血生薑之辛益胃中之氣惡風者陽虚故加附子以益陽風水者則加术以散皮膚間風水氣發穀精以宣榮衛與麻黄石膏為使引其入土也越婢之名不亦宜乎按喻昌所論明析趙良之說能細剖其理開悟後學故兩録之麻黄杏仁甘草石膏湯治溫熱内發表裏俱熱頭痛身疼不惡寒反惡熱無汗而喘大煩大渇衇隂陽俱浮者用此發汗而清火若衇浮弱沉緊沉細惡寒自汗出而不渇者禁用麻黄四兩去節杏仁五十枚去皮尖甘草二兩炙石膏半觔碎綿裹右四味以水七升先煮麻黄減二升去上沫内諸藥煮取二升去滓溫服一升集註柯琴曰石膏為清火之重劑青龍白虎皆賴以建功然用之不當適足以召禍故青龍以無汗煩躁得薑桂以宣衛外之陽也白虎以有汗煩渇湏粳米以存胃中之液也此但熱無寒故不用薑桂喘不在胃而在肺故不湏粳米其意重在存隂不必慮其亡陽也故於麻黄湯去桂枝之監制取麻黄之專開杏仁之降甘草之和倍石膏之大寒除内外之實熱斯溱溱汗出而内外之煩熱與喘悉除矣麻黄附子細辛湯治少隂病始得之反發熱衇沉二三日無裏證者麻黄一兩附子一枚炮細辛二兩熱微者以甘草易細辛微發汗右三味以水一斗先煮麻黄減二升去沫内藥煮取三升去滓溫服一升日三服集註柯琴曰少隂主裏應無表證病發於隂應有表寒今少隂始受寒邪而反發熱是有少隂之裏而兼有太陽之表也太陽之表衇應不沉今衇沉者是有太陽之證而見少隂之衇也故身雖熱而衇則沉也所以太陽病而衇反沉便用四逆以急救其裏此少隂病而表反熱便於表劑中加附子以預固其裏夫發熱無汗太陽之表不得不開沉為在裏少隂之樞又不得不固設用麻黄開腠理細辛散浮熱而無附子以固元陽則少隂之津液越出太陽之微陽外亾去生便逺惟附子與麻黄並用則寒邪雖散而陽不亡此裏病及表衇沉而當發汗者與病在表衇浮而發汗者逕庭也若表微熱則受寒亦輕故以甘草易細辛而微發其汗甘以緩之與辛以散之者又少間矣桂枝加附子湯太陽病發汗遂漏不止其人惡風小便難四肢微急難以屈伸者此方主之桂枝湯加附子一枚炮去皮破八片煎服法同不湏歠粥集註柯琴曰發汗太過陽無所止息而汗出不止矣汗多亡陽元府不閉風乗虚入故復惡風津液外泄不能潤下故小便難四肢者諸陽之本陽氣者柔則養筋開闔不得風寒從之故筋急而屈伸不利也是方以附子加入桂枝湯中大補表陽也表陽宻則漏汗自止惡風自罷矣汗止津囬則小便自利四肢自柔矣汗漏不止與大汗出同而從化變病則異服桂枝麻黄後大汗出而大煩渇是陽陷於裏急當救隂故用白虎加人參湯服桂枝麻黄湯大汗出遂漏不止是陽亡於外急當救陽故用桂枝加附子湯要知發汗之劑用桂枝不當則陽陷於裏者多用麻黄不當則陽亡於外者多因桂枝湯有芍藥而無麻黄故雖汗大出而元府尚能自閉多不致亡陽於外耳芍藥甘草附子湯發汗病解又惡寒者虚故也此方主之芍藥三兩甘草二兩炙附子一枚炮去皮破八片右三味以水五升煮取一升五合去滓分溫服集註柯琴曰發汗病解而反惡寒比未汗時更甚其陽虚可知矣夫太陽少隂為表裏太陽之病本由少隂之虚不能蔵精而為陽之守也今惡寒反見於發汗病解後是寒邪已從汗解太陽陽虚不能衛外而為隂之使也則陽亡之兆已見於此若仍以桂枝湯攻表非以扶陽反以亡陽也故以芍藥收少隂之精氣甘草緩隂邪之上行附子補坎宫之少火但使腎中元陽得位在表之虚陽惡寒自解耳桂枝甘草湯治發汗過多其人叉手自冒心心下悸欲得按者桂枝四兩甘草二兩炙右二味水三升煮取一升頓服集註柯琴曰汗出多則心液虚中氣餒故悸叉手自冒則外有所衛得按則内有所依如此不堪之狀望之而知其虚矣桂枝本榮分藥得麻黄則令榮氣外發而為汗從辛也得芍藥則収斂榮氣而止汗從酸也得甘草則補中氣而養血從甘也故此方以桂枝為君獨任甘草為佐以補陽氣生心液甘溫相得斯氣血和而悸自平不須附子者以汗雖多而未至於陽亡不湏芍藥者以汗已止而嫌其隂斂也桂枝加芍藥加大黄湯夲太陽病醫反下之因而腹滿時痛者屬太隂也桂枝加芍藥湯主之大實痛者桂枝加大黄湯主之桂枝加芍藥湯方於桂枝湯方内更加芍藥三兩隨前共六兩餘依桂枝湯法桂枝加大黄湯方即桂枝加芍藥湯方内更加大黄一兩集註柯琴曰腹滿為太隂陽明俱有之證然位同而職異太隂主出太隂病則腐穢之出不利故滿而時痛陽明主内陽明病則腐穢燥而不行故大實而痛大實痛是陽明病不是太隂病仲景因表證未解陽邪已陷入於太隂故倍芍藥以益脾調中而除腹滿時痛此用隂和陽法也若表邪未解而陽邪陷入於陽明則加大黄以潤胃通結而除其大實痛此雙解表裏法也凢妄下必傷胃氣胃氣虚則陽邪襲隂故轉屬太隂胃液涸則兩陽相搏故轉屬陽明屬太隂則腹滿時痛而不實隂道虚也屬陽明則腹滿大實而痛陽道實也滿而時痛是下利之兆大實而痛是燥屎之徵故倍加芍藥小變建中之劑少加大黄微示調胃之方小建中湯治傷寒表未解或心悸而煩或腹中急痛而衇陽濇隂弦者桂枝三兩芍藥六兩生薑三兩切甘草二兩膠飴一觔大棗十二枚擘右六味以水七升煮取三升去滓内膠飴更上火消解日三服嘔家不可用建中湯以甜故也註是方也即桂枝湯倍芍藥加膠飴名曰小建中謂小小建立中氣以中雖已虚表尚未和不敢大補也故以桂枝湯仍和榮衛倍芍藥加膠飴調建中州而不歠稀粥溫服令汗蓋其意重在中虚而不在傷寒之表也中虚建立榮衛自和津液可生汗出乃解煩悸可除矣傷寒浮得衇濇榮衛不足也沉得衇弦木入土中也榮衛不足則表虚木入土中則裏急表虚裏急故亦以此湯主治也嘔家不可用謂凡病嘔者不可用恐甜助嘔也炙甘草湯治傷寒衇結代心動悸者又治肺痿咳吐多心中嗢嗢液液者甘草四兩炙生薑三兩切桂枝三兩麥門冬半升麻子仁半升大棗十二枚擘人參一兩阿膠二兩生地黄一觔右九味以清酒七升水八升先煮八味取三升去滓内膠烊消盡服一升日三服集註柯琴曰仲景於衇弱隂弱者用芍藥以益隂陽虚者用桂枝以通陽甚則加人參以生衇未有用地黄麥冬者豈以傷寒之法義重扶陽乎抑隂無驟補之法與此以心虚衇結代用生地黄為君麥冬為臣峻補真隂開後學滋隂之路也地黄麥冬味雖甘而氣則寒非發陳蕃莠之品必得人參桂枝以通陽衇生薑大棗以和衛榮阿膠補血酸棗安神甘草之緩不使速下清酒之猛㨗於上行内外調和悸可寧而衇可復矣酒七升水八升祗取三升者乆煎之則氣不峻此虚家用酒之法且知地黄麥冬得酒最良此證當用酸棗仁肺痿用麻子仁可也如無真阿膠以龜板膠代之桂枝人參葛根黄芩黄連二湯合論太陽外證未觧而數下之遂協熱而利利下不止表裏不解衇微弱心下痞鞕者桂枝人參湯主之桂枝證醫反下之利遂不止其衇促喘而汗出者葛根黄連黄芩湯主之桂枝四兩甘草四兩人參三兩白术三兩乾薑三兩水九升先煮四味取五升内桂更煮三升日再服夜一服葛根半觔黄連三兩黄芩三兩甘草二兩炙水八升先煮葛根減二升内諸藥煮二升分溫再服集註柯琴曰外熱不除是表不解下利不止是裏不解病因則同一以微弱之衇而心下痞鞕是衇不足而證有餘一以衇促而喘反汗自出是衇有餘而證不足表裏虚實當從衇而辨證矣弱衇見於數下後則痞鞕為虚故用理中之辛甘溫補止利消痞鞕又加桂枝以解表先煮四味後内桂枝和中之力饒而解肌之氣銳是於兩解中寓權宜法也桂枝證衇本緩誤下後而反促陽氣重可知邪束於表陽擾於内故喘而汗出利遂不止者是暴注下廹屬於熱也故君氣清質輕之葛根以解肌而止利佐苦寒清肅之芩連以止汗而除喘又加甘草以和中先煮葛根後内諸藥解肌之力緩而清中之氣銳又與補中逐邪者殊法矣又曰上條衇證是陽虚雖協熱於外而裏則虚寒下條衇證是陽盛雖下利不止而表裏俱實同一協熱利同是表裏不解而寒熱虚實攻補不同前方理中加桂枝而冠桂枝於人參之上後方㵼心加葛根而冠葛根於芩連之首不名理中㵼心者總為表未解故耳補中亦能解表涼中亦能散表補中亦能散痞涼中亦能止利仲景製兩解方神化如此白虎湯治陽明證汗出渴欲飲水衇洪大浮滑不惡寒反惡熱石膏一觔碎綿裹知母六兩甘草二兩粳米六合右四味以水一斗煮米熟湯成去滓溫服一升日三服集註柯琴曰陽明邪從熱化故不惡寒而惡熱熱蒸外越故熱汗自出熱爍胃中故渇欲飲水邪盛而實故衇滑然猶在經故兼浮也蓋陽明屬胃外主肌肉雖有大熱而未成實終非苦寒之味所能治也石膏辛寒辛能解肌熱寒能勝胃火寒性沉降辛能走外兩擅内外之能故以為君知母苦潤苦以㵼火潤以滋燥故以為臣用甘草粳米調和於中宫且能土中㵼火稼穡作甘寒劑得之緩其寒苦藥得之平其苦使沉降之性皆得留連於味也得二味為佐庶大寒之品無傷損脾胃之慮也煮湯入胃輸脾歸肺水精四布大煩大渇可除矣白虎為西方金神取以名湯秋金得令而炎暑自解矣更加人參以補中益氣而生津協和甘草粳米之補承制石膏知母之寒㵼火而土不傷乃操萬全之術者白虎加人參湯治太陽中熱汗出惡寒身熱而渇者暍是也石膏一觔知母六兩甘草二兩粳米六合人參三兩右五味以水如前煮服法集註趙良曰汗出惡寒身熱而不渴者中風也汗出惡寒身熱而渇者中暍也其證相似獨以渇不渴為辨然傷寒中風皆有背微惡寒與時時惡風而渇者亦以白虎人參湯治之蓋為火爍肺金肺主氣者也肺傷則衛氣虚衛虚則表不足由是汗出身熱惡寒内經曰心移熱於肺傳為膈消膈消則渴皆相火傷肺所致可知其要在救肺也石膏能治三焦火熱功多於清肺退肺中之火故用為君知母亦就肺中瀉心火滋水之源人參生津益所傷之氣而為臣粳米甘草補土以資金為佐也豬苓湯治陽明病衇浮發熱渇欲飲水少隂病下利六七日欬而嘔渇心煩不得眠者豬苓去皮茯苓阿膠滑石澤㵼各一兩右五味以水四升先煮四味取二升去滓内下阿膠烊消溫服七合日三服集註趙羽皇曰仲景製豬苓一湯以行陽明少隂二經水熱然其㫖全在益隂不專利水蓋傷寒表虚最忌亡陽而裏熱又患亡隂亡隂者亡腎中之隂與胃家之津液也故隂虚之人不但大便不可輕動即小水亦忌下通蓋隂虚過於滲利則津液反致耗竭方中阿膠質膏養隂而滋燥滑石性滑去熱而利水佐以二苓之渗㵼既疏濁熱而不留其瘀壅亦潤真隂而不苦其枯燥是利水而不傷隂之善劑也故太陽利水用五苓者以太陽職司寒水故加桂以溫之是煖腎以行水也陽明少隂之用豬苓以二經兩闗津液特用阿膠滑石以潤之是滋養無形以行有形也利水雖同寒溫逈别惟明者知之五苓散附茵蔯五苓散治衇浮小便不利熱微消渴者發汗已衇浮數煩渴者中風發熱六七日不解而煩有表裏證渴欲飲水水入則吐者茯苓十八銖豬苓十八銖白术十八銖澤瀉一兩桂半兩右五味為散以白飲和服方寸匕日三服多服煖水汗出愈註是方也乃太陽邪熱入府水氣不化膀胱表裏藥也一治水逆水入則吐一治消渴水入則消夫膀胱者津液之府氣化則能出矣邪熱入之若水盛則水壅不化而水蓄於上膀胱之氣化不行致小便不利也若熱盛則水為熱耗而水消於上膀胱之津液告竭致小便不利也水入吐者是水盛於熱也水入消者是熱盛於水也二證皆小便不利故均得而主之然小便利者不可用恐重傷津液也由此可知五苓散非治水熱之專劑乃治水熱小便不利之主方也君澤瀉之鹹寒鹹走水府寒勝熱邪佐二苓之淡滲通調水道下輸膀胱並瀉水熱也用白术之燥滋健脾助土為之隄防以制水也用桂之辛溫宣通陽氣蒸化三焦以行水也澤㵼得二苓下降利水之功倍小便利而水不蓄矣白术湏桂上升通陽之效㨗氣騰津化渴自止也若發熱表不解以桂易桂枝服後多服煖水令汗出愈是此方不止治停水小便不利之裏而猶解停水發熱之表也加人參名春澤湯其意專在助氣化以生津加茵蔯名茵蔯五苓散治濕熱發黄表裏不實小便不利者無不克也桂枝湯去芍藥加茯苓白术湯治服桂枝湯或下之仍頭項強痛翕翕發熱無汗心下滿微痛小便不利者桂枝去芍藥加茯苓白术湯主之桂枝去芍藥加茯苓白术湯方於桂枝湯方内去芍藥加茯苓白术各三兩餘依桂枝湯法煎服小便利則愈註服桂枝湯已汗也或下之已下也今仍有頭項強痛翕翕發熱無汗之表心下滿微痛小便不利停飲之裏無汗表不解心下有水氣當用小青龍汗之今無汗表不解有水氣心下滿微痛小便不利而不用小青龍者以其已經汗下表裏俱虚也故仍用桂枝湯以解表去芍藥之酸收避無汗心下之滿加茯苓之燥滲因水停小便不利也餘依桂枝湯法煎服謂依桂枝湯法取汗也小便利則愈謂飲病輸水道則愈也此方即桂苓甘术湯而有生薑大棗其意專在解肌利水次之故用生薑大棗佐桂枝以通津液取汗也桂苓甘术湯不用生薑大棗而加茯苓其意專在利水扶陽次之故倍加茯苓君桂枝於利水中扶陽也故方後不曰依服桂枝湯方也十棗湯治太陽中風表解漐漐汗出而不惡寒裏有水氣小便不利嘔逆短氣心下至脇痞滿鞕痛者此治水之急方也大棗十枚擘甘遂大㦸芫花熬各等分右三味各别搗為散以水一升半先煮大棗肥者十枚取八合去滓内藥末強人一錢羸人服半錢平旦溫服若下少病不除者明日再服加半錢得快下後糜粥自養集註柯琴曰仲景治水之方種種不同此其最峻者也凡水氣為患或喘或欬或悸或噎或吐或利病在一處而止此則水邪留結於中心腹脇下痞滿鞕痛三焦升降之氣阻隔難通此時表邪已罷非汗散之法所宜裏飲實盛又非淡滲之品所能勝非選逐水至峻之品以折之則中氣不支束手待斃矣甘遂芫花大㦸三味皆辛苦氣寒而禀性最毒併舉而用之氣味相濟相湏故可夾攻水邪之巢穴决其瀆而大下之一舉而患可平也然邪之所凑其氣必虚以毒藥攻邪必傷及脾胃使無沖和甘緩之品為主宰則邪氣盡而大命亦隨之矣然此藥最毒參术所不能君甘草又與之相反故選十棗之大而肥者以君之一以顧其脾胃一以緩其峻毒得快利後糜粥自養一以使榖氣内充一以使邪不復作此仲景用毒攻病之法盡美又盡善也昧者惑於甘能中滿之說而不敢用豈知承制之理乎御纂醫宗金鑑卷三十一
