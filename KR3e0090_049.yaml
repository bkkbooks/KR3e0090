  text: 編輯婦科心法要訣目録乳證門乳汁不行證治加味四物湯湧泉散乳汁自湧證治兔懷散麥芽煎乳癰吹乳乳巖妬乳乳懸總括乳癰證治消毒飲加味消毒飲益氣養榮湯吹乳證治栝蔞散外敷法乳巖證治十六味流氣飲青皮甘草散十全大補湯八珍湯歸脾湯妬乳乳懸證治鹿角散連翹散芎歸飲前隂諸證門隂腫證治龍膽湯薰洗法騰尉法隂痛證治加味逍遙散乳香四物敷法逍遙散四物湯隂癢證治桃仁雄黃膏逍遙散龍膽㵼肝湯隂挺證治蛇床洗法藜蘆敷法逍遙散龍膽㵼肝湯隂瘡證治加味四物湯四物湯加味逍遙散補中益氣湯隂痔證治烏頭薰法逍遙散歸脾湯補中益氣湯隂冷證治溫中坐藥桂附地黃丸隂吹證治膏髮煎十全大補湯交接出血證治加味歸脾湯桂心釡墨散雜證門熱入血室加味小柴胡湯刺期門法清熱行血湯血分水分總括血分證治加味小調經散水分證治茯苓導水丸夢與鬼交證治加味歸脾湯歸脾湯梅核氣證治半夏厚朴湯血風瘡證治加味逍遙散益氣養榮湯臁瘡證治桂附地黃丸人參敗毒散補中益氣湯六味地黃丸足跟痛證治六味地黃丸八珍湯御纂醫宗金鑑卷四十九目録欽定四庫全書御纂醫宗金鑑卷四十九編輯婦科心法要訣目録乳證門乳汁不行證治加味四物湯湧泉散乳汁自湧證治兔懷散麥芽煎乳癰吹乳乳巖妬乳乳懸總括乳癰證治消毒飲加味消毒飲益氣養榮湯吹乳證治栝蔞散外敷法乳巖證治十六味流氣飲青皮甘草散十全大補湯八珍湯歸脾湯妬乳乳懸證治鹿角散連翹散芎歸飲前隂諸證門隂腫證治龍膽湯薰洗法騰尉法隂痛證治加味逍遙散乳香四物敷法逍遙散四物湯隂癢證治桃仁雄黃膏逍遙散龍膽㵼肝湯隂挺證治蛇床洗法藜蘆敷法逍遙散龍膽㵼肝湯隂瘡證治加味四物湯四物湯加味逍遙散補中益氣湯隂痔證治烏頭薰法逍遙散歸脾湯補中益氣湯隂冷證治溫中坐藥桂附地黃丸隂吹證治膏髮煎十全大補湯交接出血證治加味歸脾湯桂心釡墨散雜證門熱入血室加味小柴胡湯刺期門法清熱行血湯血分水分總括血分證治加味小調經散水分證治茯苓導水丸夢與鬼交證治加味歸脾湯歸脾湯梅核氣證治半夏厚朴湯血風瘡證治加味逍遙散益氣養榮湯臁瘡證治桂附地黃丸人參敗毒散補中益氣湯六味地黃丸足跟痛證治六味地黃丸八珍湯御纂醫宗金鑑卷四十九目録欽定四庫全書御纂醫宗金鑑卷四十九編輯婦科心法要訣乳證門乳汁不行證治加味四物湯産後血虛乳汁少四物花粉不留行木通豬蹄湯熬服葱白煎湯乳房淋注産後乳汁不行因去血過多血少不行者宜四物湯加花粉王不留行木通豬蹄熬湯煎藥服外用葱白煎湯時時淋洗乳房以通其氣湧泉散氣衇壅塞乳脹痛湧泉散用白丁香王不留行天花粉漏蘆殭蠶豬蹄湯注産後乳汁不行因瘀血停留氣衇壅滯者其乳必脹痛宜用湧泉散即白丁香王不留行花粉漏蘆殭蠶豬蹄湯煎服也乳汁自湧證治兔懷散麥芽煎産後乳汁暴湧出十全大補倍參耆食少乳多欲廽乳兔懷紅花歸芎膝無兒食乳乳欲斷炒麥芽湯頻宜服注産後乳汁暴湧不止者乃氣血大虛宜十全大補湯倍用人參黃耆若食少乳多欲廽其乳者宜兔懷散即紅花歸尾赤芍牛膝也若無兒食乳欲斷乳者用麥芽炒熟熬湯作茶飲之乳證總括乳房忽然紅腫痛往來寒熱乳癰成乳被兒吹因結核堅硬不通吹乳名初起結核不腫痛年深內潰乳巖凶乳頭生瘡名妬乳細長垂痛乳懸稱注婦人乳房忽然紅腫堅硬疼痛增寒壯熱頭痛者此欲成乳癰也若乳兒之時乳被兒口中氣吹以致乳管不通結核者名曰吹乳更有乳內結核如圍棋子不腫不痛但堅硬不散日久內潰者謂之乳巖其證甚凶若乳頭生小細瘡痛者為妬乳若瘀血上攻乳房忽然細小下垂長過於腹此名乳懸惟産後有之乳癰證治消毒飲乳癰初起消毒飲青芷歸柴浙貝蠶花粉銀花甘草節寒熱荆防羌獨添膿成皂刺穿山甲潰後益氣養榮煎注乳癰乃陽明厥隂二經風熱壅盛初起宜服消毒飲即青皮白芷當歸柴胡浙貝母殭蠶花粉金銀花甘草節也若兼增寒壯熱者加荆芥防風羌活獨活以解散之若服後不消其膿已成者宜加皂角刺穿山甲以穿發之若潰後氣血虛者宜益氣養榮湯培補之他如潰久膿清不斂又須急服大劑參耆桂附矣益氣養榮湯方見前首卷彚方內吹乳證治栝蔞散外敷法吹乳結核栝蔞散乳沒歸甘用酒熬更加皂刺名立效已成膿潰未成消外敷星夏蠶芷刺草烏為末蜜葱調注吹乳結核不散者當早消之久則成癰宜用栝蔞散即栝蔞實乳香沒藥當歸甘草酒熬服也若服後不散者加皂角刺名立效散膿成者潰未成者消外用南星半夏殭蠶白芷皂角刺草烏為末用葱汁合蜜調敷乳巖證治十六味流氣飲青皮甘草散乳巖鬱怒損肝脾流氣飲歸芍參耆芎防蘇芷枳桔草檳榔烏朴桂通隨外尉木香生地餅青皮甘草服無時潰後不愈須培補十全八珍或歸脾注乳巖之證初起結核如圍棋子大不痛不癢五七年或十餘年從內潰破嵌空玲瓏洞竅深陷有如山巖故名乳巖皆緣抑鬱不舒或性急多怒傷損肝脾所致宜速服十六味流氣飲其方即當歸白芍人參黃耆川芎防風蘇葉白芷枳殼桔梗甘草檳榔烏藥厚朴官桂木通外以木香生地搗餅以熱器尉之且不時以青皮甘草為末煎濃薑湯調服戒七情逺葷味解開鬱怒方始能愈若潰後久不愈惟宜培補其氣血或十全大補湯八珍湯歸脾湯選用之十全大補湯八珍湯歸脾湯方俱見首卷妬乳乳懸證治鹿角散連翹散妬乳甘草鹿角散雞子黃調炙敷之連翹散防升元芍斂射消黃甘杏宜瘀血上攻乳懸證芎歸湯飲更薰鼻不應萆麻貼頂上乳收即去莫遲遲注乳頭生瘡謂之妬乳宜鹿角散敷之即鹿角甘草為末雞子黃調銅器內炙敷之內服連翹散即防風升麻元參白芍白斂射干芒消大黃甘草杏仁也若産後瘀血上攻兩乳細長下垂過腹者謂之乳懸宜濃煎芎歸湯不時飲之以其餘藥薰鼻則瘀散乳即上升如不上者更以萆麻仁搗貼頂心收即去之芎歸飲即佛手散方見首卷乳證門彚方消毒飲青皮白芷當歸柴胡浙貝母殭蠶花粉金銀花甘草節各等分右銼水煎服栝蔞散栝蔞乳香沒藥當歸甘草各等分右為末酒煎服加皂角刺名立效散十六味流氣飲當歸白芍人參黃耆各二錢川芎防風蘇葉白芷枳殼桔梗各一錢甘草檳榔各五分烏藥厚朴官桂木通各八分右銼每服五錢水煎服青皮甘草散青皮甘草各一錢右為末煎濃薑湯調服鹿角散鹿角甘草各等分右為末雞子黃調銅器內炙敷之連翹散防風元參各二錢白斂芒消大黃射干各一錢升麻五分白芍一錢甘草五分杏仁二十粒右銼薑水煎服加味四物湯當歸白芍熟地川芎花粉王不留行炒木通各二錢右豬蹄熬湯煎藥服湧泉散白丁香王不留行花粉漏蘆各一錢右豬蹄湯煎服兔懷散紅花赤芍歸尾牛膝各二錢右銼水煎服麥芽煎麥芽三兩右一味水煎作茶飲前隂諸證門隂腫證治龍膽㵼肝湯薰洗法騰尉法婦人􅴖痃兩拗痛玉門腫脹墜而疼濕熱龍膽㵼肝治導赤車前澤㵼芩當歸梔子龍膽草氣虛下陷補中升艾防大㦸熬湯洗枳實陳皮炒熱騰注婦人子戶腫脹墜痛及兩拗疼痛者謂之􅴖痃乃肝心二經火盛濕熱下流所致宜服龍膽瀉肝湯其方即導赤散生地木通甘草冉加車前子澤瀉黃芩當歸黑梔子龍膽草也若因中氣素虛下陷重墜者用補中益氣湯以升舉之外用蘄艾防風大㦸熬湯薰洗更以枳實陳皮二味為末炒熱騰之其腫自消而痛自定也隂痛證治加味逍遙散乳香四物敷法隂中痛名小戶嫁痛極手足不能舒內服加味逍遙散四物乳香搗餅敷注婦人隂中作痛名小戶嫁痛痛極往往手足不能伸舒由鬱熱傷損肝脾濕熱下注所致宜內服逍遙散加丹皮梔子外以四物湯料合乳香搗餅納隂中其痛即定逍遙散四物湯俱見首卷隂癢證治桃仁雄黃膏濕熱生蟲隂戶癢內服逍遙龍膽方桃仁膏合雄黃末雞肝切片納中央注婦人隂癢多因濕熱生蟲甚則肢體倦怠小便淋漓宜服逍遙散龍膽㵼肝湯外以桃仁研膏合雄黃末雞肝切片醮藥納戶中其蟲一聞肝腥皆鑽肝內吮食將肝提出其病即愈逍遙散方見首卷龍膽㵼肝湯方見前隂腫條隂挺證治蛇床洗法藜蘆敷法隂挺下脫即􅒃疝突物如蛇或如菌濕熱腫痛溺赤數氣虛重墜便長清氣虛補中青梔入濕熱龍膽㵼肝尋外熬蛇床烏梅洗豬油藜蘆敷自升注婦人隂挺或因胞絡傷損或因分娩用力太過或因氣虛下陷濕熱下注隂中突出一物如蛇或如菌如雞冠者即古之􅒃疝類也屬熱者必腫痛小便赤數宜龍膽㵼肝湯屬虛者必重墜小便清長宜補中益氣湯加青皮梔子外用蛇床子烏梅熬水薰洗之更以豬油調藜蘆末敷之無不愈者逍遙散方見首卷龍膽㵼肝湯方見前隂腫條隂瘡證治加味四物湯䘌蝕成瘡膿水淋時疼時癢若蟲行少腹脹悶溺赤澀食少體倦晡熱蒸四物柴梔丹膽草潰腐逍遙墜補中注婦人隂瘡名曰䘌由七情鬱火傷損肝脾氣血凝滯濕熱下注久而蟲生蟲蝕成瘡膿水淋漓時疼時癢有若蟲行少腹脹悶溺赤頻數食少體倦內熱晡熱經候不調赤白帶下種種證見宜分治之腫痛者用四物湯加柴胡梔子龍膽草若潰爛出水而痛者用加味逍遙散若重墜者用補中益氣湯加味逍遙散方見前隂痛條四物湯補中益氣湯方俱見首卷隂痔證治烏頭薰法隂中突肉名隂痔或名茄子疾俗稱黃水易治白難治烏頭存性醋熬薰內服逍遙與龍膽補中歸脾酌量行注婦人隂中有肉突出者名曰隂痔俗稱茄子疾也流黃水者易治流白水者難治用烏頭燒存性釅醋熬薰內服逍遙散補中益氣湯歸脾湯量其虛實酌而行之逍遙散歸脾湯補中益氣湯方俱見首卷隂冷證治溫中坐藥隂冷風寒客子臟桂附地黃丸最宜逺志乾薑蛇床子吳萸為末裹納之注婦人隂冷皆由風寒乘虛客於子臟久之血凝氣滯多變他證且艱於受孕宜多服桂附地黃丸外以逺志乾薑蛇床子吳茱萸研細綿裹納隂中日二易桂附地黃丸方見首卷隂吹證治膏髮煎胃氣下泄隂吹喧金匱方用膏髮煎豬膏亂髮同煎服導從溺去法通元氣虛下陷大補治升提下陷升柴添注婦人隂吹者隂中時時氣出有聲如榖道轉矢氣狀金匱謂由榖氣實胃氣下泄用膏髮煎即豬膏煎亂髮服也導病從小便而出其法甚奧若氣血大虛中氣下陷者宜十全大補湯加升麻柴胡以升提之十全大補湯方見首卷交接出血證治加味歸脾湯桂心釡墨散交接出血傷心脾伏龍肝末入歸脾千金桂心釡底墨酒服方寸匕相宜注婦人每交接輒出血者由傷損心脾二經也宜用歸脾湯加伏龍肝煎服或用千金方中桂心釡底墨二味為末酒冲服方寸匕自愈前隂諸證門彚方龍膽瀉肝湯生地二錢木通車前子各一錢五分澤㵼黃芩各二錢當歸二錢黑梔仁龍膽草各一錢生甘草五分右燈草一團水煎服洗方防風三錢蘄艾一團大㦸一錢右熬湯薰洗騰方枳實廣皮各等分右為末炒熱騰之敷方四物湯一料乳香一錢右搗餅納戶中其痛即定桃仁雄黃膏桃仁五錢研膏雄黃三錢末右二味研勻用雞肫肝切片蘸藥納戶中其蟲即鑽入肝而癢自止隂挺洗法蛇床子五錢烏梅九枚右二味熬湯乘熱薰洗敷方藜蘆為末右用豬脂油調敷自收隂痔薰法烏頭右用釅醋熬薰自消溫中坐藥方逺志乾薑吳茱萸蛇床子各等分右為末綿裹納戶內一日二次換膏髮煎婦人亂髮一團右用豬膏熬化服之小便利則愈桂心釡墨散桂心釡底墨各等分右二味為末酒服方寸匕雜證門熱入血室加味小柴胡湯熱入血室經適斷邪熱乘虛血室寒熱有時如瘧狀小柴胡加歸地丹注金匱云婦人中風七八日續來寒熱發作有時經水適斷此為熱入血室其血必結故使如瘧狀發作有時小柴胡湯主之此言邪熱未盡值經來乘虛入於血室之間而潛藏之故令血結而寒熱有時如瘧狀也血室肝主之肝與膽為表裏膽因肝受邪而病寒熱故用小柴胡湯主之也加當歸生地丹皮者所以清血分之熱也小柴胡湯方見首卷柴胡四物湯注中熱入血室經適來晝日明了夜譫妄無犯胃氣上二焦熱隨血去自無恙注金匱云婦人傷寒發熱經水適來晝日明了夜則譫語如見鬼狀此為熱入血室治之無犯胃氣及上二焦必自愈也此言熱雖入於血室然經行不斷則熱不留結勿謂譫妄遂以消黃犯其胃氣刺傷榮血小柴和解犯上二焦但俟其熱隨血去病必自愈傷寒論曰血自下下者愈此之謂也刺期門法清熱行血湯熱入血室成結胸下血譫語頭汗出二者皆當刺期門隨其實取泄而去清熱行血桃紅丹靈脂地草穿山赤注金匱云婦人中風發熱惡寒經水適來得七八日熱除衇遲身涼胸脅滿如結胸狀譫語者此為熱入血室也當刺期門隨其實而取之又云陽明病下血譫語者此為熱入血室但頭汗出當刺期門隨其實而瀉之濈然汗出者愈此二條一言適來即斷血結在裏為實證一言陽明病亦有熱入血室但下血頭汗出為不同故為熱入血室亦由肝實故均謂當刺期門也不能刺者以清熱行血湯治之其方即桃仁紅花丹皮五靈脂生地甘草穿山甲赤芍也合四證觀之大抵有寒熱如瘧之證方可用小柴胡否則或不藥自愈或刺期門而清熱行血以隨其實而瀉之此仲景心法也不得概以小柴胡治之也血分水分總括經水先閉後病腫任衝寒濕血壅經先發水腫後經閉水溢皮膚泛濫行血分難醫水易治二者詳參要辨眀注婦人經水先閉後病腫者乃寒濕傷於衝任血壅經隧也名曰血分若先病腫而後經閉者乃土不制水水邪泛濫溢於皮膚也名曰水分血分難治水分易治二者須當詳辨血分證治加味小調經散血分血壅不能行四肢浮腫病非輕但使經通腫自散紅丹膝入小調經注血分腫乃血壅不行流於四肢故令浮腫此不必治腫但調其經經通其腫自消宜小調經散加紅花丹皮牛膝治之小調經散方見三卷浮腫水分證治先腫後閉名水分停飲膀胱氣不行水消腫退經自至茯苓導水效通神注水分腫乃水飲內停膀胱之氣化不行水溢皮膚故令浮腫經閉也此但宜治水水消腫退其經自通用茯苓導水丸治之茯苓導水湯方見胎前門子腫條夢與鬼交證治加味歸脾湯獨笑獨悲畏見人神虛夜夢鬼邪侵歸脾湯調辰砂珀定志清心魂魄寧注婦人七情內傷虧損心脾神無所護鬼邪干正魂魄不寧故夜夢鬼交獨笑獨悲如有對忤是其候也宜用歸脾湯調辰砂琥珀末服之則志定心清魂魄安而無邪夢矣歸脾湯方見首卷梅核氣證治半夏厚朴湯婦人咽中如炙臠或如梅核結咽間半夏厚朴湯最效半朴蘇茯薑引煎注千金方云咽中帖帖如有炙肉吐之不出吞之不下即所謂咽中如有炙臠也俗云梅核氣蓋因內傷七情外傷寒冷所致宜用金匱半夏厚朴湯主之即半夏厚朴蘇葉茯苓生薑煎也血風瘡證治加味逍遙散遍身㾦㿔如丹毒癢痛無時搔作瘡血風風濕兼血燥加味逍遙連地方愈後白屑肌膚强血虛不潤養榮湯注婦人血風瘡證遍身起㾦㿔如丹毒狀或癢或痛搔之則成瘡由風濕血燥所致宜用加味逍遙散加黃連生地如瘡結痂而愈復起白屑肌膚强硬者乃血少不潤也宜服益氣養榮湯加味逍遙散方見前隂痛條益氣養榮湯方見首卷臁瘡證治桂附地黃丸憂思鬱怒肝脾損濕熱生瘡長兩臁外屬三陽為易治內屬三隂治每難初起紅腫敗毒散膿水淋漓補中煎晡熱隂虛宜六味食少畏寒桂附丸注婦人憂思鬱怒傷損肝脾或飲食不調損其胃氣則濕熱下注更被寒濕外邪所客則必兩臁生瘡外臁足三陽經尚屬易治若生於內臁屬足三隂經每多難愈初起紅腫宜人參敗毒散潰後膿水淋漓宜補中益氣湯若更晡熱是為隂虧宜兼服六味地黃九若食少體倦畏寒則為真陽不足宜服桂附地黃丸即六味地黃丸加肉桂附子也人參敗毒散方見産後痢條補中益氣湯方見首卷血崩條六味地黃丸方見首卷足跟痛證治督衇發源腎經過三隂虛熱足跟疼六味地黃滋真水腫潰流膿用八珍注足跟乃督衇發源之地足少隂腎經從此所過若三隂虛熱則足跟疼痛宜用大劑六味地黃丸料煎服以峻補其真水若痛久不愈腫潰流膿者宜服八珍湯以大補其氣血雜證門彚方半夏厚朴湯半夏厚朴蘇葉茯苓各二錢右生薑煎服清熱行血湯桃仁一錢紅花一錢丹皮五靈脂生地各二錢甘草五分穿山甲赤芍各一錢右水煎服八珍湯方見首卷御纂醫宗金鑑卷四十九欽定四庫全書御纂醫宗金鑑卷四十九編輯婦科心法要訣乳證門乳汁不行證治加味四物湯産後血虛乳汁少四物花粉不留行木通豬蹄湯熬服葱白煎湯乳房淋注産後乳汁不行因去血過多血少不行者宜四物湯加花粉王不留行木通豬蹄熬湯煎藥服外用葱白煎湯時時淋洗乳房以通其氣湧泉散氣衇壅塞乳脹痛湧泉散用白丁香王不留行天花粉漏蘆殭蠶豬蹄湯注産後乳汁不行因瘀血停留氣衇壅滯者其乳必脹痛宜用湧泉散即白丁香王不留行花粉漏蘆殭蠶豬蹄湯煎服也乳汁自湧證治兔懷散麥芽煎産後乳汁暴湧出十全大補倍參耆食少乳多欲廽乳兔懷紅花歸芎膝無兒食乳乳欲斷炒麥芽湯頻宜服注産後乳汁暴湧不止者乃氣血大虛宜十全大補湯倍用人參黃耆若食少乳多欲廽其乳者宜兔懷散即紅花歸尾赤芍牛膝也若無兒食乳欲斷乳者用麥芽炒熟熬湯作茶飲之乳證總括乳房忽然紅腫痛往來寒熱乳癰成乳被兒吹因結核堅硬不通吹乳名初起結核不腫痛年深內潰乳巖凶乳頭生瘡名妬乳細長垂痛乳懸稱注婦人乳房忽然紅腫堅硬疼痛增寒壯熱頭痛者此欲成乳癰也若乳兒之時乳被兒口中氣吹以致乳管不通結核者名曰吹乳更有乳內結核如圍棋子不腫不痛但堅硬不散日久內潰者謂之乳巖其證甚凶若乳頭生小細瘡痛者為妬乳若瘀血上攻乳房忽然細小下垂長過於腹此名乳懸惟産後有之乳癰證治消毒飲乳癰初起消毒飲青芷歸柴浙貝蠶花粉銀花甘草節寒熱荆防羌獨添膿成皂刺穿山甲潰後益氣養榮煎注乳癰乃陽明厥隂二經風熱壅盛初起宜服消毒飲即青皮白芷當歸柴胡浙貝母殭蠶花粉金銀花甘草節也若兼增寒壯熱者加荆芥防風羌活獨活以解散之若服後不消其膿已成者宜加皂角刺穿山甲以穿發之若潰後氣血虛者宜益氣養榮湯培補之他如潰久膿清不斂又須急服大劑參耆桂附矣益氣養榮湯方見前首卷彚方內吹乳證治栝蔞散外敷法吹乳結核栝蔞散乳沒歸甘用酒熬更加皂刺名立效已成膿潰未成消外敷星夏蠶芷刺草烏為末蜜葱調注吹乳結核不散者當早消之久則成癰宜用栝蔞散即栝蔞實乳香沒藥當歸甘草酒熬服也若服後不散者加皂角刺名立效散膿成者潰未成者消外用南星半夏殭蠶白芷皂角刺草烏為末用葱汁合蜜調敷乳巖證治十六味流氣飲青皮甘草散乳巖鬱怒損肝脾流氣飲歸芍參耆芎防蘇芷枳桔草檳榔烏朴桂通隨外尉木香生地餅青皮甘草服無時潰後不愈須培補十全八珍或歸脾注乳巖之證初起結核如圍棋子大不痛不癢五七年或十餘年從內潰破嵌空玲瓏洞竅深陷有如山巖故名乳巖皆緣抑鬱不舒或性急多怒傷損肝脾所致宜速服十六味流氣飲其方即當歸白芍人參黃耆川芎防風蘇葉白芷枳殼桔梗甘草檳榔烏藥厚朴官桂木通外以木香生地搗餅以熱器尉之且不時以青皮甘草為末煎濃薑湯調服戒七情逺葷味解開鬱怒方始能愈若潰後久不愈惟宜培補其氣血或十全大補湯八珍湯歸脾湯選用之十全大補湯八珍湯歸脾湯方俱見首卷妬乳乳懸證治鹿角散連翹散妬乳甘草鹿角散雞子黃調炙敷之連翹散防升元芍斂射消黃甘杏宜瘀血上攻乳懸證芎歸湯飲更薰鼻不應萆麻貼頂上乳收即去莫遲遲注乳頭生瘡謂之妬乳宜鹿角散敷之即鹿角甘草為末雞子黃調銅器內炙敷之內服連翹散即防風升麻元參白芍白斂射干芒消大黃甘草杏仁也若産後瘀血上攻兩乳細長下垂過腹者謂之乳懸宜濃煎芎歸湯不時飲之以其餘藥薰鼻則瘀散乳即上升如不上者更以萆麻仁搗貼頂心收即去之芎歸飲即佛手散方見首卷乳證門彚方消毒飲青皮白芷當歸柴胡浙貝母殭蠶花粉金銀花甘草節各等分右銼水煎服栝蔞散栝蔞乳香沒藥當歸甘草各等分右為末酒煎服加皂角刺名立效散十六味流氣飲當歸白芍人參黃耆各二錢川芎防風蘇葉白芷枳殼桔梗各一錢甘草檳榔各五分烏藥厚朴官桂木通各八分右銼每服五錢水煎服青皮甘草散青皮甘草各一錢右為末煎濃薑湯調服鹿角散鹿角甘草各等分右為末雞子黃調銅器內炙敷之連翹散防風元參各二錢白斂芒消大黃射干各一錢升麻五分白芍一錢甘草五分杏仁二十粒右銼薑水煎服加味四物湯當歸白芍熟地川芎花粉王不留行炒木通各二錢右豬蹄熬湯煎藥服湧泉散白丁香王不留行花粉漏蘆各一錢右豬蹄湯煎服兔懷散紅花赤芍歸尾牛膝各二錢右銼水煎服麥芽煎麥芽三兩右一味水煎作茶飲前隂諸證門隂腫證治龍膽㵼肝湯薰洗法騰尉法婦人􅴖痃兩拗痛玉門腫脹墜而疼濕熱龍膽㵼肝治導赤車前澤㵼芩當歸梔子龍膽草氣虛下陷補中升艾防大㦸熬湯洗枳實陳皮炒熱騰注婦人子戶腫脹墜痛及兩拗疼痛者謂之􅴖痃乃肝心二經火盛濕熱下流所致宜服龍膽瀉肝湯其方即導赤散生地木通甘草冉加車前子澤瀉黃芩當歸黑梔子龍膽草也若因中氣素虛下陷重墜者用補中益氣湯以升舉之外用蘄艾防風大㦸熬湯薰洗更以枳實陳皮二味為末炒熱騰之其腫自消而痛自定也隂痛證治加味逍遙散乳香四物敷法隂中痛名小戶嫁痛極手足不能舒內服加味逍遙散四物乳香搗餅敷注婦人隂中作痛名小戶嫁痛痛極往往手足不能伸舒由鬱熱傷損肝脾濕熱下注所致宜內服逍遙散加丹皮梔子外以四物湯料合乳香搗餅納隂中其痛即定逍遙散四物湯俱見首卷隂癢證治桃仁雄黃膏濕熱生蟲隂戶癢內服逍遙龍膽方桃仁膏合雄黃末雞肝切片納中央注婦人隂癢多因濕熱生蟲甚則肢體倦怠小便淋漓宜服逍遙散龍膽㵼肝湯外以桃仁研膏合雄黃末雞肝切片醮藥納戶中其蟲一聞肝腥皆鑽肝內吮食將肝提出其病即愈逍遙散方見首卷龍膽㵼肝湯方見前隂腫條隂挺證治蛇床洗法藜蘆敷法隂挺下脫即􅒃疝突物如蛇或如菌濕熱腫痛溺赤數氣虛重墜便長清氣虛補中青梔入濕熱龍膽㵼肝尋外熬蛇床烏梅洗豬油藜蘆敷自升注婦人隂挺或因胞絡傷損或因分娩用力太過或因氣虛下陷濕熱下注隂中突出一物如蛇或如菌如雞冠者即古之􅒃疝類也屬熱者必腫痛小便赤數宜龍膽㵼肝湯屬虛者必重墜小便清長宜補中益氣湯加青皮梔子外用蛇床子烏梅熬水薰洗之更以豬油調藜蘆末敷之無不愈者逍遙散方見首卷龍膽㵼肝湯方見前隂腫條隂瘡證治加味四物湯䘌蝕成瘡膿水淋時疼時癢若蟲行少腹脹悶溺赤澀食少體倦晡熱蒸四物柴梔丹膽草潰腐逍遙墜補中注婦人隂瘡名曰䘌由七情鬱火傷損肝脾氣血凝滯濕熱下注久而蟲生蟲蝕成瘡膿水淋漓時疼時癢有若蟲行少腹脹悶溺赤頻數食少體倦內熱晡熱經候不調赤白帶下種種證見宜分治之腫痛者用四物湯加柴胡梔子龍膽草若潰爛出水而痛者用加味逍遙散若重墜者用補中益氣湯加味逍遙散方見前隂痛條四物湯補中益氣湯方俱見首卷隂痔證治烏頭薰法隂中突肉名隂痔或名茄子疾俗稱黃水易治白難治烏頭存性醋熬薰內服逍遙與龍膽補中歸脾酌量行注婦人隂中有肉突出者名曰隂痔俗稱茄子疾也流黃水者易治流白水者難治用烏頭燒存性釅醋熬薰內服逍遙散補中益氣湯歸脾湯量其虛實酌而行之逍遙散歸脾湯補中益氣湯方俱見首卷隂冷證治溫中坐藥隂冷風寒客子臟桂附地黃丸最宜逺志乾薑蛇床子吳萸為末裹納之注婦人隂冷皆由風寒乘虛客於子臟久之血凝氣滯多變他證且艱於受孕宜多服桂附地黃丸外以逺志乾薑蛇床子吳茱萸研細綿裹納隂中日二易桂附地黃丸方見首卷隂吹證治膏髮煎胃氣下泄隂吹喧金匱方用膏髮煎豬膏亂髮同煎服導從溺去法通元氣虛下陷大補治升提下陷升柴添注婦人隂吹者隂中時時氣出有聲如榖道轉矢氣狀金匱謂由榖氣實胃氣下泄用膏髮煎即豬膏煎亂髮服也導病從小便而出其法甚奧若氣血大虛中氣下陷者宜十全大補湯加升麻柴胡以升提之十全大補湯方見首卷交接出血證治加味歸脾湯桂心釡墨散交接出血傷心脾伏龍肝末入歸脾千金桂心釡底墨酒服方寸匕相宜注婦人每交接輒出血者由傷損心脾二經也宜用歸脾湯加伏龍肝煎服或用千金方中桂心釡底墨二味為末酒冲服方寸匕自愈前隂諸證門彚方龍膽瀉肝湯生地二錢木通車前子各一錢五分澤㵼黃芩各二錢當歸二錢黑梔仁龍膽草各一錢生甘草五分右燈草一團水煎服洗方防風三錢蘄艾一團大㦸一錢右熬湯薰洗騰方枳實廣皮各等分右為末炒熱騰之敷方四物湯一料乳香一錢右搗餅納戶中其痛即定桃仁雄黃膏桃仁五錢研膏雄黃三錢末右二味研勻用雞肫肝切片蘸藥納戶中其蟲即鑽入肝而癢自止隂挺洗法蛇床子五錢烏梅九枚右二味熬湯乘熱薰洗敷方藜蘆為末右用豬脂油調敷自收隂痔薰法烏頭右用釅醋熬薰自消溫中坐藥方逺志乾薑吳茱萸蛇床子各等分右為末綿裹納戶內一日二次換膏髮煎婦人亂髮一團右用豬膏熬化服之小便利則愈桂心釡墨散桂心釡底墨各等分右二味為末酒服方寸匕雜證門熱入血室加味小柴胡湯熱入血室經適斷邪熱乘虛血室寒熱有時如瘧狀小柴胡加歸地丹注金匱云婦人中風七八日續來寒熱發作有時經水適斷此為熱入血室其血必結故使如瘧狀發作有時小柴胡湯主之此言邪熱未盡值經來乘虛入於血室之間而潛藏之故令血結而寒熱有時如瘧狀也血室肝主之肝與膽為表裏膽因肝受邪而病寒熱故用小柴胡湯主之也加當歸生地丹皮者所以清血分之熱也小柴胡湯方見首卷柴胡四物湯注中熱入血室經適來晝日明了夜譫妄無犯胃氣上二焦熱隨血去自無恙注金匱云婦人傷寒發熱經水適來晝日明了夜則譫語如見鬼狀此為熱入血室治之無犯胃氣及上二焦必自愈也此言熱雖入於血室然經行不斷則熱不留結勿謂譫妄遂以消黃犯其胃氣刺傷榮血小柴和解犯上二焦但俟其熱隨血去病必自愈傷寒論曰血自下下者愈此之謂也刺期門法清熱行血湯熱入血室成結胸下血譫語頭汗出二者皆當刺期門隨其實取泄而去清熱行血桃紅丹靈脂地草穿山赤注金匱云婦人中風發熱惡寒經水適來得七八日熱除衇遲身涼胸脅滿如結胸狀譫語者此為熱入血室也當刺期門隨其實而取之又云陽明病下血譫語者此為熱入血室但頭汗出當刺期門隨其實而瀉之濈然汗出者愈此二條一言適來即斷血結在裏為實證一言陽明病亦有熱入血室但下血頭汗出為不同故為熱入血室亦由肝實故均謂當刺期門也不能刺者以清熱行血湯治之其方即桃仁紅花丹皮五靈脂生地甘草穿山甲赤芍也合四證觀之大抵有寒熱如瘧之證方可用小柴胡否則或不藥自愈或刺期門而清熱行血以隨其實而瀉之此仲景心法也不得概以小柴胡治之也血分水分總括經水先閉後病腫任衝寒濕血壅經先發水腫後經閉水溢皮膚泛濫行血分難醫水易治二者詳參要辨眀注婦人經水先閉後病腫者乃寒濕傷於衝任血壅經隧也名曰血分若先病腫而後經閉者乃土不制水水邪泛濫溢於皮膚也名曰水分血分難治水分易治二者須當詳辨血分證治加味小調經散血分血壅不能行四肢浮腫病非輕但使經通腫自散紅丹膝入小調經注血分腫乃血壅不行流於四肢故令浮腫此不必治腫但調其經經通其腫自消宜小調經散加紅花丹皮牛膝治之小調經散方見三卷浮腫水分證治先腫後閉名水分停飲膀胱氣不行水消腫退經自至茯苓導水效通神注水分腫乃水飲內停膀胱之氣化不行水溢皮膚故令浮腫經閉也此但宜治水水消腫退其經自通用茯苓導水丸治之茯苓導水湯方見胎前門子腫條夢與鬼交證治加味歸脾湯獨笑獨悲畏見人神虛夜夢鬼邪侵歸脾湯調辰砂珀定志清心魂魄寧注婦人七情內傷虧損心脾神無所護鬼邪干正魂魄不寧故夜夢鬼交獨笑獨悲如有對忤是其候也宜用歸脾湯調辰砂琥珀末服之則志定心清魂魄安而無邪夢矣歸脾湯方見首卷梅核氣證治半夏厚朴湯婦人咽中如炙臠或如梅核結咽間半夏厚朴湯最效半朴蘇茯薑引煎注千金方云咽中帖帖如有炙肉吐之不出吞之不下即所謂咽中如有炙臠也俗云梅核氣蓋因內傷七情外傷寒冷所致宜用金匱半夏厚朴湯主之即半夏厚朴蘇葉茯苓生薑煎也血風瘡證治加味逍遙散遍身㾦㿔如丹毒癢痛無時搔作瘡血風風濕兼血燥加味逍遙連地方愈後白屑肌膚强血虛不潤養榮湯注婦人血風瘡證遍身起㾦㿔如丹毒狀或癢或痛搔之則成瘡由風濕血燥所致宜用加味逍遙散加黃連生地如瘡結痂而愈復起白屑肌膚强硬者乃血少不潤也宜服益氣養榮湯加味逍遙散方見前隂痛條益氣養榮湯方見首卷臁瘡證治桂附地黃丸憂思鬱怒肝脾損濕熱生瘡長兩臁外屬三陽為易治內屬三隂治每難初起紅腫敗毒散膿水淋漓補中煎晡熱隂虛宜六味食少畏寒桂附丸注婦人憂思鬱怒傷損肝脾或飲食不調損其胃氣則濕熱下注更被寒濕外邪所客則必兩臁生瘡外臁足三陽經尚屬易治若生於內臁屬足三隂經每多難愈初起紅腫宜人參敗毒散潰後膿水淋漓宜補中益氣湯若更晡熱是為隂虧宜兼服六味地黃九若食少體倦畏寒則為真陽不足宜服桂附地黃丸即六味地黃丸加肉桂附子也人參敗毒散方見産後痢條補中益氣湯方見首卷血崩條六味地黃丸方見首卷足跟痛證治督衇發源腎經過三隂虛熱足跟疼六味地黃滋真水腫潰流膿用八珍注足跟乃督衇發源之地足少隂腎經從此所過若三隂虛熱則足跟疼痛宜用大劑六味地黃丸料煎服以峻補其真水若痛久不愈腫潰流膿者宜服八珍湯以大補其氣血雜證門彚方半夏厚朴湯半夏厚朴蘇葉茯苓各二錢右生薑煎服清熱行血湯桃仁一錢紅花一錢丹皮五靈脂生地各二錢甘草五分穿山甲赤芍各一錢右水煎服八珍湯方見首卷御纂醫宗金鑑卷四十九
