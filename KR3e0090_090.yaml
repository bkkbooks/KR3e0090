之軟弱者此陰盛發熱也宜用四君子湯加炮薑附子若發熱煩躁肉瞤筋惕者此亡血也宜用聖愈湯如發熱汗出不止者此血脫也宜用獨參湯血脫之證其衇實者難治細小者易治當歸補血湯黃耆一兩炙當歸三錢水煎服聖愈湯人參川芎當歸熟地黃生地黃耆各等分炙水煎服四君子湯獨參湯俱見傷損出血肌肉作痛傷損之證肌肉作痛者乃榮衛氣滯所致宜用復元通氣散筋骨間作痛者肝腎之氣傷也用六味地黃丸六味地黃丸熟地黃八兩山萸肉四兩去核懷山藥四兩牡丹皮三兩澤㵼三兩茯苓三兩共為末煉蜜丸桐子大空心白湯服三錢復元通氣散方見傷損內證骨傷作痛傷損之證骨傷作痛者乃傷之輕者也若傷重則或折或碎須用手法調治之其法已詳列前篇此乃磕硼微傷骨間作痛肉色不變宜外用葱尉法內服沒藥丸日間服地黃丸自愈矣沒藥丸沒藥去油乳香去油川芎川椒去閉口及目芍藥當歸各半兩自然銅二錢半七次火煆淬右為細末用黃蠟二兩溶化入藥末攪勻丸彈子大每服一丸酒一鍾化開煎五分熱服葱尉法方見囱骨傷地黃丸方見肌肉作痛胸腹痛悶傷損之證胸腹痛悶者多因跳躍捶胸閃挫舉重勞役恚怒所致其胸腹喜手摸者肝火傷脾也用四君子湯加柴胡山梔如畏手摸者肝經血滯也用四物湯加柴胡山梔桃仁紅花若胸脅悶痛發熱晡熱肝經血傷也用加味逍遙散若胸脅悶痛飲食少思肝脾氣傷也用四君子湯加芎歸柴梔丹皮若胸腹脹滿飲食少思肝脾氣滯也用六君子湯加柴胡芎歸若胸腹不利食少無寐脾氣鬱結也用加味歸脾湯若痰氣不利脾肺氣滯也用二陳湯加白术芎歸山梔天麻釣藤鈎如因過用風熱之藥致肝血受傷肝火益甚或飲糖酒則腎水益虛脾火益熾若用大黃芍藥內傷陰絡反致下血少壯者必成痼疾老弱者多致不起加味歸脾湯黑梔一錢牡丹皮一錢人參一錢黃耆一錢五分炙白术一錢五分炒茯神二錢棗仁一錢五分炒當歸一錢木香五分逺志八分去心圓肉二錢甘草五分炙引用薑棗水煎服二陳湯陳皮一錢五分半夏二錢製茯苓二錢甘草五分引用薑水煎服六君子湯即四君子湯加陳皮半夏各一錢五分引用薑棗水煎服四君子湯四物湯加味逍遙湯俱見傷損出血脅肋脹痛傷損脅肋脹痛之證如大便通和喘咳吐痰者肝火侮肺也用小柴胡湯加青皮山梔清之若胸腹脹痛大便不通喘咳吐血者乃瘀血停滯也用當歸導滯散通之內經云肝藏血脾統血蓋肝屬木木勝侮土其脾氣必虛宜先清肝養血則瘀血不致凝滯次壯脾胃則氣血充盛若行剋伐則虛者益虛滯者益滯禍不旋踵矣當歸導滯散川大黃一兩當歸二錢五分麝香少許右三味除麝香另研外為極細末後入麝香令勻每服三錢熱酒一杯調下又方川大黃當歸各二兩右共為細末每服三錢不拘時溫酒調服小柴胡湯方見瘀血泛注腹痛傷損腹痛之證如大便不通按之痛甚者瘀血在內也用加味承氣湯下之既下而痛不止按之仍痛瘀血未盡也用加味四物湯補而行之若腹痛按之反不痛者血氣傷也用四物湯加參耆白术補而和之若下而胸脅反痛肝血傷也用四君子湯加芎歸補之既下而發熱隂血傷也用四物湯加參术補之既下而惡寒陽氣傷也用十全大補湯補之既下而惡寒發熱者氣血傷也用八珍湯補之下而欲嘔者胃氣傷也用六君子湯加當歸補之下而泄㵼者脾腎傷也用六君子湯加肉果補骨脂補之若下後手足俱冷昏憒出汗陽氣虛寒也急用參附湯若吐㵼而手足俱冷指甲青者脾腎虛寒之甚也急用大劑參附湯口噤手撒遺尿痰盛唇青體冷者虛極之壞證也急用大劑參附湯多有得生者加味承氣湯大黃朴硝各二錢枳實厚朴當歸紅花各一錢甘草五分水酒各半煎服參附湯人參或五錢或一兩製附子或三錢或五錢引用薑水煎服四君子湯四物湯俱見傷損出血六君子湯方見胸腹痛悶八珍湯十全大補湯俱見瘀血泛注少腹引隂莖作痛傷損而少腹引隂莖作痛者乃瘀血不行兼肝經鬱火所致宜用小柴胡湯加大黃黃連山梔服之待痛勢已定再用養血之劑自無不愈矣此病若誤認為寒證而投以熱藥重則必危輕則損目治者宜慎之小柴胡湯方見瘀血泛注腰痛傷損腰痛脊痛之證或因墜墮或因打撲瘀血留於太陽經中所致宜地龍散治之地龍散地龍官桂蘇木各九分麻黃七分黃蘗當歸尾各二錢五分桃仁九箇甘草三錢五分右水煎食前服眩暈傷損之證頭目眩暈有因服剋伐之劑太過中氣受傷以致眩暈者有因亡血過多以致眩暈者如兼腹脹嘔吐宜用六君子湯兼發熱作渴不思飲食者宜十全大補湯六君子湯方見胸腹痛悶十全大補湯方見瘀血泛注煩躁傷損之證煩躁而靣赤口乾作渴衇洪大按之如無者宜用當歸補血湯如煩躁自汗頭暈宜用獨參湯如煩躁不寐宜用加味歸脾湯如煩躁脅痛宜用柴胡四物湯如亡血過多煩躁者宜用聖愈湯加味歸脾湯方見胸腹痛悶當歸補血湯聖愈湯俱見發熱柴胡四物湯即四物湯加柴胡黃芩方見傷損出血獨參湯方見傷損出血喘咳傷損之證而喘咳者若因出血過多靣黑胸脹胸膈痛而發喘者乃氣虛血乘於肺也急用二味參蘇飲緩則難救若咳血衄血而喘者乃氣逆血藴於肺也只宜活血行氣不可用下法宜十味參蘇飲治之二味參蘇飲人參一兩蘇木二兩水煎服十味參蘇飲人參紫蘇半夏茯苓陳皮桔梗前胡葛根枳殼各一錢甘草五分引用薑二片水煎服昏憒傷損昏憒乃傷之至重以致昏憒不知人事宜急灌以獨參湯雖內有瘀血斷不可下急用花蕊石散內化之蓋恐下之因㵼而亡陰也若元氣虛甚者尤不可下亦用前散以化之凡瘀血在內大便不通用大黃朴消血凝而不下者須用木香肉桂二三錢以熱酒調灌服之血下乃生怯弱之人用消黃而必加木香肉桂同煎者乃假其熱以行其寒也花蕊石散石硫黃四兩花蕊石二兩右二味合勻用瓦罐一箇入藥在內封口外用紙筋鹽泥周圍固濟候泥乾安四方磚上書八卦五行字用炭十斤籠疊周匝自午時從下著火漸漸上徹直至經宿炭盡火冷又放經宿罐冷取出研細用絹羅羅過磁盒收貯每服三錢以童便調服作嘔傷損作嘔若因痛甚或因剋伐而傷胃者宜四君子湯加當歸半夏生薑因忿怒而肝傷者用小柴胡湯加山梔茯苓因痰火盛者用二陳湯加薑炒黃連山梔因胃氣虛者用補中益氣湯加生薑半夏因出血過多者用六君子湯加當歸四君子湯補中益氣湯俱見傷損出血小柴胡湯方見瘀血泛注二陳湯六君子湯俱見胸腹痛悶作渴傷損作渴若因亡血過多者用四物湯加人參白术如不應用人參黃耆以補氣當歸熟地以補血或用八珍湯若因胃熱傷津液者用竹葉黃耆湯如胃虛津液不足用補中益氣湯如胃火熾盛用竹葉石膏湯若煩熱作渴小便淋澀乃腎經虛熱非地黃丸不能救竹葉黃耆湯淡竹葉二錢人參黃耆生地黃當歸川芎麥冬芍藥甘草石膏煆黃芩炒半夏各一錢水煎服竹葉石膏湯竹葉三把石膏一斤人參三兩甘草二兩炙麥冬一升半夏半升粳米半升引用生薑水煎服四物湯補中益氣湯俱見傷損出血八珍湯方見瘀血泛注六味地黃丸方見肌肉作痛祕結傷損之證大便祕結若因大腸血虛火熾者用四物湯送潤腸丸或以豬膽汁導之若腎虛火燥者用六味地黃丸若腸胃氣虛用補中益氣湯若大便祕結裏實氣壯腹痛堅硬者用玉燭散潤腸丸大黃當歸尾羌活各五錢桃仁麻仁各一兩右為末煉蜜丸彈子大空心白湯送下豬膽汁導法大豬膽一枚㵼汁和法醋少許以灌穀道內如一時頃當大便出宿食惡物甚效玉燭散生地黃當歸川芎赤芍藥大黃酒浸芒硝引用生薑水煎服四物湯補中益氣湯俱見傷損出血六味地黃丸方見肌肉作痛挾表傷損之證外挾表邪者其衇必浮緊證則發熱體痛形氣實者宜疏風敗毒散形氣虛者宜加味交加散或羌活乳香湯以散之疏風敗毒散當歸川芎白芍藥熟地黃羌活獨活桔梗枳殼柴胡白茯苓白芷甘草紫蘇陳皮香附右生薑生地黃煎入酒和服加味交加散當歸川芎白芍藥生地黃蒼术厚朴陳皮白茯苓半夏羌活獨活桔梗枳殼前胡柴胡乾薑肉桂甘草右生薑煎服有熱者去乾薑肉桂羌活乳香湯羌活獨活川芎當歸赤芍藥防風荆芥丹皮續斷紅花桃仁乳香右生地黃煎服有熱者加柴胡黃芩補遺方補損續筋丸治跌打撲墜骨碎筋斷肉破疼痛不息當歸五錢酒洗川芎白芍炒熟地各三錢廣木香丹皮乳香去油淨沒藥各五錢去油淨骨碎補自然銅紅花瓜兒血竭各三錢朱砂五錢丁香一錢人參一兩虎骨二兩炙酥油古銅錢三文共為細末煉蜜為丸每服三錢淡黃酒童便化服補損接骨仙丹治證同前當歸酒洗川芎白芍炒熟地補骨脂五靈脂廣木香地骨皮防風各五錢乳香去油淨沒藥去油淨瓜兒血竭各一錢右銼一處用夜合花樹根皮五錢同入大酒壺內加燒酒同煮一炷香取出溫服止血定痛生肌散治傷損等證失血過多或因剋伐致血氣耗損惡寒發熱煩躁乳香去油淨沒藥去油淨龍骨各三錢血竭二錢黃丹五錢飛過香白芷二錢五分軟石膏一兩火毒煆去潮腦少許共為細末磁器盛之每以糝患處止痛生肌敷跌打青腫方生梔子同飛羅麵搗塗之以布纒褁拔出青毒即消回陽玉龍膏專敷跌打損傷氣虛寒冷草烏二錢炒南星一兩煨軍薑一兩煨白芷一兩赤芍一兩炒肉桂五錢共為末葱湯調搽熱酒亦可太乙膏治傷口不收貼之生肌長肉香麻油當歸生地生甘草三味入油內煠枯去渣再以絲棉濾淨再入淨鍋熬至滴水不散入炒飛黃丹八兩又用慢火熬至滴水成珠取起少傾入白蠟黃蠟各一兩微火再熬取起少定入去油淨乳香沒藥各五錢攪勻收磁器內過三宿可貼御纂醫宗金鑑卷九十
