body:
  text: 編輯正骨心法要㫖目録內治雜證法方法總論傷損內證傷損出血瘀血泛注瘀血作痛血虛作痛嘔吐黑血發熱肌肉作痛骨傷作痛胸腹痛悶脅肋脹痛腹痛少腹引陰莖作痛腰痛眩暈煩躁喘咳昏憒作嘔作渴祕結挾表補遺方御纂醫宗金鑑卷九十目録欽定四庫全書御纂醫宗金鑑卷九十編輯正骨心法要㫖目録內治雜證法方法總論傷損內證傷損出血瘀血泛注瘀血作痛血虛作痛嘔吐黑血發熱肌肉作痛骨傷作痛胸腹痛悶脅肋脹痛腹痛少腹引陰莖作痛腰痛眩暈煩躁喘咳昏憒作嘔作渴祕結挾表補遺方御纂醫宗金鑑卷九十目録欽定四庫全書御纂醫宗金鑑卷九十編輯正骨心法要㫖內治雜證法方法總論今之正骨科即古跌打損傷之證也專從血論須先辨或有瘀血停積或為亡血過多然後施以內治之法庶不有誤也夫皮不破而內損者多有瘀血破肉傷䐃每致亡血過多二者治法不同有瘀血者宜攻利之亡血者宜補而行之但出血不多亦無瘀血者以外治之法治之更察其所傷上下輕重淺深之異經絡氣血多少之殊必先逐去瘀血和榮止痛然後調養氣血自無不效若夫損傷雜證論中不及偹載者俱分門晰類詳列於後學者宜盡心焉傷損內證凡跌打損傷墜墮之證惡血留內則不分何經皆以肝為主蓋肝主血也故敗血凝滯從其所屬必歸於肝其痛多在脅肋小腹者皆肝經之道路也若壅腫痛甚或發熱自汗皆宜斟酌虛實然後用調血行經之藥王好古云登高墜下撞打等傷心腹胸中停積瘀血不散者則以上中下三焦分别部位以施藥餌瘀在上部者宜犀角地黃湯瘀在中部者宜桃仁承氣湯瘀在下部者宜抵當湯之類須於所用湯中加童便好酒同煎服之虛人不可下者宜四物湯加穿山甲若瘀血已去則以復元通氣散加當歸調之內經云形傷作痛氣傷作腫又云先腫而後痛者形傷氣也先痛而後腫者氣傷形也凡打撲閃錯或惱怒氣滯血凝作痛及元氣素弱或因呌號血氣損傷或過服剋伐之劑或外敷寒凉之藥致氣血凝結者俱宜用活血順氣之劑後列諸方以偹選用犀角地黃湯犀角生地黃酒浸另搗丹皮白芍各等分水煎服桃仁承氣湯大黃芒硝桃仁桂枝甘草水煎服以利為度抵當湯水蛭虻蟲各三十枚去翅足大黃一兩酒浸桃仁三十枚去皮尖水煎去渣取三升溫服一升不下再服復元活血湯柴胡五錢當歸穿山甲炮栝蔞根各三錢甘草紅花各二錢桃仁五十箇去皮尖大黃一兩酒浸右將桃仁研爛餘藥銼如麻豆大每服一兩水二鍾酒半盞煎至七分去渣大溫食前服以利為度巴㦸湯巴㦸去心大黃各半兩當歸地黃芍藥川芎各一兩右為末水煎服以利為度破血消痛湯羌活防風官桂各一錢蘇木一錢半柴胡連翹當歸梢各二錢麝香少許另研水蛭二錢煙盡另研炒去右為粗末共一服酒二大盞水一盞水蛭麝香另研如泥餘藥煎至一大盞去火稍熱調二味服之兩服立愈清心藥牡丹皮當歸川芎赤芍藥生地黃黃芩黃連連翹梔子桃仁甘草各等分右引用燈心草薄荷煎入童便和服止痛藥當歸牛膝川芎懷慶生地赤芍藥白芷羌活獨活杜仲續斷各一兩肉桂八角茴香乳香沒藥各五錢南木香丁皮沉香血竭各二錢半右為末老酒調用活血順氣何首烏散何首烏三錢當歸赤芍藥白芷烏藥枳殼防風甘草川芎陳皮香附紫蘇羌活獨活肉桂各一錢右薄荷生地黃煎入酒和服疼痛甚者加乳香沒藥調經散川芎當歸芍藥黃耆各一錢半青皮烏藥陳皮熟地黃乳香另研茴香各一錢右作一服水二鍾煎至一鍾不拘時服牡丹皮散牡丹皮當歸骨碎補紅花酒浸續斷乳香沒藥桃仁川芎赤芍藥生地黃各等分右水酒煎服却用秫米飯熱罨縛冷又蒸熱換縛橘术四物湯當歸川芎白芍藥懷慶生地各二錢陳皮白术紅花各一錢桃仁十枚右生地黃煎服骨節疼加羌活獨活痛不止加乳香沒藥當歸補血湯當歸川芎白芍藥熟地黃防風連翹羌活獨活乳香沒藥白芷續斷杜仲各等分右生地黃煎入童便和服不可用酒氣虛加人參白术黃耆復元通氣散木香茴香炒青皮去皮穿山甲酥炙陳皮白芷甘草漏蘆貝母各等分右為末每服一二錢溫酒調下傷損出血傷損之證或患處或諸竅出血者此肝火熾盛血熱錯經而妄行也用加味逍遙散清熱養血若中氣虛弱血無所附而妄行用加味四君子湯補中益氣湯或元氣內脫不能攝血用獨參湯加炮薑以回陽如不應急加附子如血藴於內而嘔血者用四物湯加柴胡黃芩凡傷損而犯勞碌或怒氣肚腹脹悶或過服寒毒等藥致傷陽絡者則為吐血衄血便血尿血傷於陰絡者則為血積血塊肌肉青黑此皆臟腑虧損經隧失職急補脾肺二臟自愈矣加味逍遙散白术茯苓當歸白芍各二錢柴胡一錢薄荷五分黑梔丹皮各一錢五分水煎服補中益氣湯人參二錢黃耆二錢炙白术一錢五分炒當歸一錢五分升麻五分柴胡五分陳皮八分甘草三分炙引用薑棗水煎服四君子湯人參白术茯苓各二錢甘草一錢炙引用薑棗水煎服四物湯當歸三錢川芎白芍藥二錢熟地黃三錢水煎服獨參湯人參一兩水煎服瘀血泛注傷損瘀血泛注之證乃跌仆血滯所致蓋氣流而注血注而凝或注於四肢關節或留於胸腹腰臀或漫腫或結塊初起皆屬肝脾鬱火急用葱尉法內服小柴胡湯以清肝火次用八珍湯以壯脾胃或益氣養榮湯久服自然收功若日久潰破而氣血虛者宜十全大補湯若潰而寒邪凝滯不斂者宜豆豉餅祛散之此證若不補氣血不慎起居不戒七情或用寒凉剋伐俱屬不治小柴胡湯柴胡二錢黃芩一錢五分半夏製人參各一錢甘草五分炙引用薑二片水煎服八珍湯即四君子湯四物湯相和為劑也益氣養榮湯人參黃耆炒當歸川芎熟地黃白芍炒香附貝母茯苓陳皮各一錢白术二錢柴胡六分甘草桔梗各五分引用薑水煎服口乾加五味子麥冬往來寒熱加青皮十全大補湯即八珍湯加黃耆肉桂各一錢豆豉餅江西豆豉右一味為末唾津和作餅子如錢大厚二分置患處以艾壯於餅上灸之乾則再易葱尉法方見囱骨傷瘀血作痛傷損之證腫痛者乃瘀血凝結作痛也若脹而重墜色或青黑甚則發熱作渴汗出者乃經絡壅滯陰血受傷也宜先刺去惡血以通壅塞後用四物湯以調之四物湯方見傷損出血血虛作痛傷損之證血虛作痛者其證則發熱作渴煩悶頭暈日晡益甚此陰虛內熱之證宜八珍湯加丹皮麥冬五味子肉桂骨碎補治之八珍湯方見瘀血泛注嘔吐黑血傷損嘔吐黑血者始因打撲傷損敗血流入胃脘色黑如豆汁從嘔吐而出也形氣實者用百合散形氣虛者加味芎藭湯百合散川芎赤芍藥當歸百合生地黃側柏葉荆芥犀角丹皮黃芩黃連梔子鬱金大黃各一錢水煎加童便和服加味芎藭湯芎藭當歸白术百合水浸一日荆芥各一錢水一鍾半酒半鍾煎八分不拘時服發熱傷損之證發熱者若因出血過多衇洪大而虛重按之全無者此血虛發熱也用當歸補血湯衇若沉微按之軟弱者此陰盛發熱也宜用四君子湯加炮薑附子若發熱煩躁肉瞤筋惕者此亡血也宜用聖愈湯如發熱汗出不止者此血脫也宜用獨參湯血脫之證其衇實者難治細小者易治當歸補血湯黃耆一兩炙當歸三錢水煎服聖愈湯人參川芎當歸熟地黃生地黃耆各等分炙水煎服四君子湯獨參湯俱見傷損出血肌肉作痛傷損之證肌肉作痛者乃榮衛氣滯所致宜用復元通氣散筋骨間作痛者肝腎之氣傷也用六味地黃丸六味地黃丸熟地黃八兩山萸肉四兩去核懷山藥四兩牡丹皮三兩澤㵼三兩茯苓三兩共為末煉蜜丸桐子大空心白湯服三錢復元通氣散方見傷損內證骨傷作痛傷損之證骨傷作痛者乃傷之輕者也若傷重則或折或碎須用手法調治之其法已詳列前篇此乃磕硼微傷骨間作痛肉色不變宜外用葱尉法內服沒藥丸日間服地黃丸自愈矣沒藥丸沒藥去油乳香去油川芎川椒去閉口及目芍藥當歸各半兩自然銅二錢半七次火煆淬右為細末用黃蠟二兩溶化入藥末攪勻丸彈子大每服一丸酒一鍾化開煎五分熱服葱尉法方見囱骨傷地黃丸方見肌肉作痛胸腹痛悶傷損之證胸腹痛悶者多因跳躍捶胸閃挫舉重勞役恚怒所致其胸腹喜手摸者肝火傷脾也用四君子湯加柴胡山梔如畏手摸者肝經血滯也用四物湯加柴胡山梔桃仁紅花若胸脅悶痛發熱晡熱肝經血傷也用加味逍遙散若胸脅悶痛飲食少思肝脾氣傷也用四君子湯加芎歸柴梔丹皮若胸腹脹滿飲食少思肝脾氣滯也用六君子湯加柴胡芎歸若胸腹不利食少無寐脾氣鬱結也用加味歸脾湯若痰氣不利脾肺氣滯也用二陳湯加白术芎歸山梔天麻釣藤鈎如因過用風熱之藥致肝血受傷肝火益甚或飲糖酒則腎水益虛脾火益熾若用大黃芍藥內傷陰絡反致下血少壯者必成痼疾老弱者多致不起加味歸脾湯黑梔一錢牡丹皮一錢人參一錢黃耆一錢五分炙白术一錢五分炒茯神二錢棗仁一錢五分炒當歸一錢木香五分逺志八分去心圓肉二錢甘草五分炙引用薑棗水煎服二陳湯陳皮一錢五分半夏二錢製茯苓二錢甘草五分引用薑水煎服六君子湯即四君子湯加陳皮半夏各一錢五分引用薑棗水煎服四君子湯四物湯加味逍遙湯俱見傷損出血脅肋脹痛傷損脅肋脹痛之證如大便通和喘咳吐痰者肝火侮肺也用小柴胡湯加青皮山梔清之若胸腹脹痛大便不通喘咳吐血者乃瘀血停滯也用當歸導滯散通之內經云肝藏血脾統血蓋肝屬木木勝侮土其脾氣必虛宜先清肝養血則瘀血不致凝滯次壯脾胃則氣血充盛若行剋伐則虛者益虛滯者益滯禍不旋踵矣當歸導滯散川大黃一兩當歸二錢五分麝香少許右三味除麝香另研外為極細末後入麝香令勻每服三錢熱酒一杯調下又方川大黃當歸各二兩右共為細末每服三錢不拘時溫酒調服小柴胡湯方見瘀血泛注腹痛傷損腹痛之證如大便不通按之痛甚者瘀血在內也用加味承氣湯下之既下而痛不止按之仍痛瘀血未盡也用加味四物湯補而行之若腹痛按之反不痛者血氣傷也用四物湯加參耆白术補而和之若下而胸脅反痛肝血傷也用四君子湯加芎歸補之既下而發熱隂血傷也用四物湯加參术補之既下而惡寒陽氣傷也用十全大補湯補之既下而惡寒發熱者氣血傷也用八珍湯補之下而欲嘔者胃氣傷也用六君子湯加當歸補之下而泄㵼者脾腎傷也用六君子湯加肉果補骨脂補之若下後手足俱冷昏憒出汗陽氣虛寒也急用參附湯若吐㵼而手足俱冷指甲青者脾腎虛寒之甚也急用大劑參附湯口噤手撒遺尿痰盛唇青體冷者虛極之壞證也急用大劑參附湯多有得生者加味承氣湯大黃朴硝各二錢枳實厚朴當歸紅花各一錢甘草五分水酒各半煎服參附湯人參或五錢或一兩製附子或三錢或五錢引用薑水煎服四君子湯四物湯俱見傷損出血六君子湯方見胸腹痛悶八珍湯十全大補湯俱見瘀血泛注少腹引隂莖作痛傷損而少腹引隂莖作痛者乃瘀血不行兼肝經鬱火所致宜用小柴胡湯加大黃黃連山梔服之待痛勢已定再用養血之劑自無不愈矣此病若誤認為寒證而投以熱藥重則必危輕則損目治者宜慎之小柴胡湯方見瘀血泛注腰痛傷損腰痛脊痛之證或因墜墮或因打撲瘀血留於太陽經中所致宜地龍散治之地龍散地龍官桂蘇木各九分麻黃七分黃蘗當歸尾各二錢五分桃仁九箇甘草三錢五分右水煎食前服眩暈傷損之證頭目眩暈有因服剋伐之劑太過中氣受傷以致眩暈者有因亡血過