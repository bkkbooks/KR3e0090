body:
  text: 編輯外科心法要訣目録股部附骨疽咬骨疽股陰疽横痃疽陰疽伏疽股陽疽環跳疽肚門癰箕門癰腿遊風青腿牙疳膝部膝癰疪疽膝眼風鶴膝風下石疽緩疽委中毒上水魚人面瘡御纂醫宗金鑑卷七十目録欽定四庫全書御纂醫宗金鑑卷七十編輯外科心法要訣目録股部附骨疽咬骨疽股陰疽横痃疽陰疽伏疽股陽疽環跳疽肚門癰箕門癰腿遊風青腿牙疳膝部膝癰疪疽膝眼風鶴膝風下石疽緩疽委中毒上水魚人面瘡御纂醫宗金鑑卷七十目録欽定四庫全書御纂醫宗金鑑卷七十編輯外科心法要訣股部附骨疽咬骨疽附骨大腿外側生在腿裏側咬骨名體虗寒濕乘虛入寒熱往來不焮紅痛甚徹骨難屈轉寒濕化熱腫胖形蒜灸起皰無皰逆潰後最忌敗漿膿註此二證生於大腿裏外外側屬足三陽經裏側屬足三隂經附骨疽生於大腿外側咬骨疽生於大腿裏側由體虛之人露卧風冷浴後乘涼寒濕侵襲或房慾之後蓋覆單薄寒邪乘虛入裏遂成斯疾初覺寒熱往來如同感冒風邪隨後筋骨疼痛不熱不紅甚則痛如錐刺筋骨不能屈伸動轉經久隂極生陽寒鬰為熱熱甚腐肉為膿外形腫胖無頭皮色如常漸透紅亮一㸃内膿已成凡治此證初起寒熱往來覺痛時輕者即服萬靈丹重者服五積散加牛膝紅花痛處用雷火鍼鍼之發汗散寒通行經絡膿成開之潰後餘治俱按潰瘍門又有漫腫疼痛發於尻臀部位者宜服内托羌活湯又有發於腿之裏側近膝者屬足太隂脾足厥隂肝二經部位宜服内托黄耆湯又有發於腿外側者屬足少陽膽經部位宜服内托酒煎湯又有發於腿之正面者屬陽明胃經部位頭目昏眩嘔吐不食胸膈不利心煩熱悶者宜服茯苓佐經湯又有發於腿之裏側屬太隂脾經部位骨節焮痛四肢拘急自汗短氣小水不利手足浮腫者宜服附子六物湯又有發於腿之後面屬足太陽膀胱經部位腿足攣痺闗節重痛憎寒發熱無汗惡寒或兼惡風頭痛者宜服麻黄佐經湯又有三隂不足外邪過盛大腿通腫皮色不變疼痛日增不消不潰者此屬虛寒骨冷急服大防風湯補虛逐寒日久消之不應者勢欲作膿外用隔蒜片灸之起皰艾爆有聲為吉灸之無皰骨中不覺熱者屬逆灸後宜服十全大補湯加牛膝羌活防己或八珍湯加附子補托之膿成脹痛鍼之出黏白膿為順若出白漿水或豆汁者俱為敗漿終屬險候數證潰後内外治法亦俱按癰疽潰瘍門以上之證皆由沉寒痼冷中來外敷内服不可用苦寒損脾泄氣等藥犯之必至氣血氷凝内肉瘀腐日久化為汚水不治之證也按凖繩等書云傷寒汗後餘邪成流注流注之壊證成附骨疽夫汗後流注易愈惟失治乃為壊證不能復生似不能變成附骨疽况附骨疽係調治可愈之證若果數變之後則壊而又壊矣又豈能復有成功乎是流注壊證變成附骨之説存而不論可也雷火神鍼蘄艾三錢丁香五分麝香二分藥與艾揉和用夾紙一張將藥平鋪紙上用力實捲如指粗大收貯臨用以紙七層平放患處將鍼㸃着一頭對患向紙捺實待不痛方起鍼病甚者再鍼一次七日後火瘡大發其功甚效方歌雷火神鍼攻寒濕附骨疽痛鍼之宜丁麝二香共蘄艾燃鍼痛處功效竒内托黄耆湯黄耆鹽水拌炒當歸木瓜連翹去心柴胡各一錢羌活肉桂生地黄蘗各五分酒水各一鍾煎一鍾空心熱服方歌内托黄耆歸木瓜羌柴翹桂地蘗加疽生膝股肝脾位酒水煎之服最佳内托酒煎湯當歸黄耆各二錢柴胡一錢五分大力子連翹去心肉桂各一錢升麻黄蘗甘草各五分酒水各一鍾煎一鍾食前服方歌内托酒煎寒濕凝腿外少陽附骨生歸耆大力柴翹桂升蘗甘加酒水靈茯苓佐經湯白茯苓蒼术米泔水炒陳皮白术土炒半夏各一錢製厚朴薑炒木瓜柴胡藿香澤瀉葛根甘草各五分生薑三片水二鍾煎八分食前服方歌茯苓佐經足陽明腿面焮疼煩熱乘平胃木瓜柴术半藿瀉加薑葛引經附子六物湯附子甘草各一錢防己白术土炒白茯苓各八分桂枝五分生薑三片水二鍾煎八分食逺服方歌附子六物風寒濕流注脾經須服之四肢拘急骨節痛防己术甘苓桂枝麻黄佐經湯麻黄蒼术米泔水浸炒防風防己羌活白茯苓葛根各一錢桂心甘草生細辛各五分生薑三片紅棗肉二枚水二鍾煎八分食前服方歌麻黄佐經足太陽風寒濕注本經傷蒼术二防羌活桂苓甘細葛棗生薑大防風湯人參二錢防風白术土炒黄耆牛膝杜仲當歸熟地白芍酒炒川芎羌活甘草附子各一錢製生薑三片水二鍾煎八分食前服方歌大防風療寒邪傷附骨疽腫色如常參术黄耆牛膝仲四物羌甘附子薑萬靈丹方見腫瘍門内托羌活湯方見臀部上馬癰隔蒜灸法方見首卷灸法十全大補湯八珍湯俱見潰瘍門五積散見内癰部腎癰股隂疽股隂疽發大股中隂囊之側堅腫疼七情不和憂憤致潰後纒綿功難成註此證一名赤施發生於股内合縫下近隂囊之側因偏在厥隂經故名大股也堅硬漫腫木痛由七情不和憂思憤鬰凝結而成因在隂經起長潰膿俱屬遲緩潰後尤見纒綿收斂成功者甚少初起與附骨疽治法同腫潰俱按癰疽腫瘍潰瘍門横痃疽隂疽横痃疽左隂疽右股内合縫腫硬疼痛牽睾丸長蛤様三隂七情鬰滯凝註此二證俱生股内合縫摺紋間左為横痃疽右為隂疽屬三隂經由七情鬰滯凝結而成漫腫堅硬時疼甚則痛牽睾丸上及少腹形長如蛤一兩月方能潰破其膿深可知破後膿稠可愈敗漿最難斂口久必成漏初治同附骨疽潰按癰疽潰瘍門若膿水淋瀝日久有生蟲者形類蚘蟲亦係膿深鬰久之所化也屬逆伏疽伏穴處忌生疽腫硬鍼灸不相宜疼痛徹心寒熱作胃火毒滯潰難醫註經云伏不宜生瘡葢伏乃胃經穴道在膝葢之上六寸正中用力大如掌一堆髙肉處禁用鍼灸始發寒熱交作疼痛徹心由胃火毒滯而成潰後最難收斂初治同附骨疽潰按潰瘍門股陽疽環跳疽股陽疽生股外側内搏於骨不變色環跳疽腫腿難伸俱由風濕寒凝結註股陽疽生於股外側胯尖之後其毒内搏骨節膿深至骨故漫腫不變色也環跳疽生胯骨節間之環跳穴所以腰難屈伸漫腫隠痛也此二證皆由風濕寒凝結而成屬足少陽膽經初起宜服黄狗下頦方更刺委中穴出黑血其腿即能轉動若漫腫大痛者俱宜服内托黄耆湯痛而筋攣者萬靈丹汗之痛止換服神應養真丹徧身走注作痛兩脚面胖腫者亦服萬靈丹汗之痛止則宜服大防風湯倍加參术歸耆等藥宣消之若時時跳痛將潰宜托裏透膿湯服之潰後膿清稀者宜十全大補湯加牛膝外以豆豉餅灸之瘡口紫陷者十全大補湯加附子服之外換附子餅灸之食少者胃弱也諸虛皆禀於脾胃宜香砂六君子湯減去砂仁加當歸服之俟胃口强盛仍服十全大補湯潰而反痛者氣血虛也治宜峻補始終外治法俱按癰疽腫瘍潰瘍門但環跳疽潰破多成踵疾黄狗下頦方黄狗下頦連舌皮毛劈下入罐内鹽泥封固鐵盞葢口煆一炷香覺烟清即止務宜存性取出色黑如炭為度若𢃄白色其性已過則無用矣用時研極細末用下頦宜於屠家已殺者製用若生取特殺恐反招不祥豌豆粉白歛末三味各等分共和勻每服五錢溫黄酒空心調服外以此藥用香油調敷患處服藥之後出臭汗及熟睡為凖方歌黄狗下頦連舌皮入罐泥封火煆宜豌豆粉研加白歛酒調臀腿疽盡醫内托黄耆湯大防風湯俱見附骨疽萬靈丹見腫瘍門神應養真丹見頭部遊風托裏透膿湯見頭部侵腦疽十全大補湯香砂六君子湯俱見潰瘍門附子餅見首卷灸法肚門癰箕門癰肚門癰在股肚生股内近膝箕門癰二證紅腫焮熱痛膀胱脾經濕熱成註此二證俱屬濕熱凝結而成肚門癰生於大腿肚屬足太陽膀胱經箕門癰生於股内近膝屬足太隂脾經初起紅腫焮痛者宜服神授衞生湯若焮腫便秘煩躁飲冷衇數者熱淫於内也宜内疎黄連湯或䨇解貴金丸下之若腫痛寒熱衇沉而無力胸腹脹滿飲食如常者宜服檳蘇散如腫痛寒熱已止即換服逍遙散若腫痛色不變寒熱食少體倦者由肝虛濕痰下注也宜補中益氣湯加茯苓半夏芍藥服之若患此入房腫硬二便不通者宜六味地黄丸加牛膝車前俟二便通利仍服補中益氣湯餘治按癰疽腫瘍潰瘍門檳蘇散檳榔紫蘇香附木瓜陳皮大腹皮各一錢羌活五分木香三分生薑三片葱白三寸水二鍾煎一鍾空心服方歌檳蘇腹脹氣不舒股内箕門癰可除香附木瓜陳大腹木香𦍑活檳榔蘇神授衞生湯内疎黄連湯䨇解貴金丸俱見腫瘍門逍遙散見背部上搭手補中益氣湯見潰瘍門六味地黄丸見面部雀斑腿遊風腿遊風在遶腿生赤腫如雲焮熱疼榮衞風熱相搏滯宜砭出血䨇解清註此證兩腿裏外忽生赤腫形如堆雲焮熱疼痛由榮衞風熱相搏結滯而成凡遇此證先施砭石放出惡血隨服䨇解通聖散次以當歸拈痛湯清解治之外貼牛肉片以㧞風毒甚效當歸拈痛湯當歸羌活茵蔯蒿蒼术米泔水浸炒防風各一錢苦參白术土炒升麻各七分葛根澤瀉人參知母黄芩豬苓甘草各五分黄蘗三分水二鍾煎八分食前服方歌當歸拈痛腿遊風羌活人參二术升茵蔯葛草芩知蘗苦參風瀉共豬苓䨇解通聖散見唇部唇風青腿牙疳青腿牙疳何故生只緣上下不交通陽火炎熾隂寒閉凝結為毒此病成青腿如雲茄黑色疲頑腫硬履難行牙疳齦腫出臭血穿破腮唇腐黑㐫註此證自古方書罕載其名僅傳雍正年間北路隨營醫官陶起麟頗得其詳畧云軍中凡病腿腫色青者其上必發牙疳凡病牙疳腐血者其下必發青腿二者相因而至推其原皆因上為陽火炎熾下為隂寒閉鬱以至隂陽上下不交各自為寒為熱各為凝結而生此證也相近内地間亦有之邉外雖亦有不甚多惟内地人初居邊外得此證者竟十居八九盖中國之人本不耐邊外嚴寒更不免坐卧濕地故寒濕之痰生於下致腿青腫其病形如雲片色似茄黑肉體頑硬所以歩履艱難也又緣邊外缺少五榖多食牛羊等肉其熱與濕合蒸瘀於胃毒火上薰致生牙疳牙齦腐腫出血若穿腮破唇腐爛色黑即為危候邊外相傳僅有令服馬乳之法麟初到軍營診視青腿牙疳之證亦僅知投以馬乳閱歴既久因悟馬腦之力較馬乳為效倍速令患者服之是夜即能發出大汗而諸病减矣盖腦為諸陽之首其性溫煖且能流通故耳兼服活絡流氣飲加味二妙湯宣其血氣通其經絡使毒不得凝結外用砭法令惡血流出以殺毒勢更以牛肉片貼敷以㧞出積毒不數日而愈盖黑血出則隂氣外泄陽氣即隨隂氣而下降兩相交濟上下自安也由是習為成法其中活者頗多因不敢自私著之於書以公於世並將所著應驗諸方備詳於後服馬乳法治青腿牙疳用青白馬乳早午晩隨擠隨服甚效如無青白馬雜色馬亦可服馬腦法治青腿牙疳用馬腦子一個用竹刀挑去筋膜放在盌内先將馬腦攪匀再用滚黄酒冲服或一觔或半觔俱可倘一次不能服盡分作二次冲服亦可活絡流氣散一名和中既濟湯蒼术木瓜羌活附子生山查肉獨活懐牛滕麻黄各二錢黄蘗烏藥亁薑檳榔枳殻各一錢五分麩炒甘草黑豆四十九粒生薑三片水四鍾煎一鍾服渣水三鍾煎八分如牙疳盛减去亁薑附子加胡黄連二錢龍膽草二錢如牙疳輕而腿疼重加肉桂二錢如寒熱已退减去羌活麻黄加威靈仙二錢五加皮二錢方歌活絡流氣去風强青腿牙疳初服良除濕清胃通經絡加减臨時莫執方蒼术木瓜羌附子山查獨膝蘗麻黄烏藥亁薑榔枳草引加黑豆與生薑加味二妙湯黄蘗生蒼术米泔浸炒牛膝各三錢梹榔澤瀉木瓜烏藥各二錢當歸尾一錢五分黑豆四十九粒生薑三片水三鍾煎一鍾渣水二鍾半煎八分方歌加味二妙行歩難青腿牙疳齦腫宣蘗蒼牛膝歸榔瀉木瓜烏藥豆薑煎砭刺出血法此方用三棱扁鍼形如錐挺者向腿之青黑處勿論穴道量黑之大小鍼一分深或十鍼二十鍼俱可務令黑血流出外以牛肉割片貼鍼眼並黑處次日再看如黑處微退仍鍼仍貼如無牛肉當頂刺破用罐㧞法搽牙牛黄青黛散牛黄青黛各五分硼砂二錢硃砂人中白煆龍骨各一錢煆氷片三分共研細末先以甘草湯將口潄淨再上此藥方歌牛黄青黛散硼砂氷片硃砂中白加龍骨共研為細末牙疳腫腐此藥搽一方用煑馬肉湯燙洗一方用羊肝割片貼黑處一方用芥菜子搗麫燒酒調敷黑腫處青腿牙疳不治證一形氣衰敗飲食不思者不治一牙齒俱落紫黑流血腐潰穢臭者不治一腿大腫腐爛或細乾枯者不治膝部膝癰疪疽膝癰焮腫色紅疼疪疽如癰色不紅宣輭為順堅硬逆脾腎肝經邪所乘註膝癰生於膝葢色紅焮腫疼痛屬氣血實疪疽亦生在膝葢腫大如癰其色不變寒熱往來屬氣血虛宣輭為順堅硬如石者為逆經云肉之小㑹為谿谿者二肘二膝四腕也凡脾病在谿腎有邪其氣留於兩膝凡筋病皆屬於節筋乃肝之餘故又屬肝是以谿㑹有病皆從脾腎肝三經邪氣乘之也始終内外治法俱按癰疽腫瘍潰瘍門惟兩膝俱生屬敗證不可治也膝眼風膝眼風在鬼眼生疼痛如錐胖腫形下虛風濕寒侵襲屈伸不遂溫散靈註此證生於膝眼穴又名鬼眼穴在膝葢之下左右兩骨空陷中由下焦素虛外邪易於侵襲先從膝眼隠隠作疼如風勝其痛則走注不定寒勝則痛如錐刺濕勝則外見胖腫屈不能伸其病在筋伸不能屈其病在骨動移不遂沉寒痼冷之候也惟在臨證宜詳辨之初服萬靈丹溫散之其痛即止次服獨活寄生湯宣補之效遲者兼用火鍼鍼膝眼穴此轉重就輕之法也單膝生者輕雙膝生者重若左膝方愈復病右膝右膝方愈復病左膝者名過膝風屬險治法同前獨活寄生湯獨活桑寄生如無真者以川續斷代之人參茯苓川芎酒洗防風桂心杜仲薑汁炒去絲牛膝秦艽細辛各一錢五分當歸酒洗白芍酒炒熟地甘草各一錢生薑五片水二鍾煎七分食前服方歌獨活寄生肝腎虛寒濕注膝腫痛居參苓四物防風桂杜膝秦艽甘細宜萬靈丹見腫瘍門鶴膝風鶴膝風腫生於膝上下枯細三隂虛風寒濕邪乘虛入痛寒攣風筋緩濕註此證一名遊膝風一名鼓搥風痢後得者為痢風單生者輕雙生者最重因循日久膝腫粗大上下股脛枯細由足三隂經虛風寒濕邪乘虛而入為是病也膝内隠痛寒勝也筋急而攣風勝也筋緩無力濕勝也初腫如綿皮色不變亦無焮熱疼痛日增無論單雙俱宜服五積散汗之次服萬靈丹溫散之外敷回陽玉龍膏常服換骨丹或蛜􅖉丸以驅其邪若日久不消勢欲潰者宜服獨活寄生湯或大防風湯補而溫之痛甚加乳香潰後時出白漿浮皮雖腐腫痛仍前不可用蝕藥只宜芙蓉葉菊花葉各五錢研末大麥米飯拌均貼之亦可止疼或用豆腐渣蒸熱揑作餅貼之亦可此證係外證中之敗證也收功甚難換骨丹蒼术四兩枸把二兩五錢茄根二兩洗當歸牛膝敗龜板防風秦艽獨活萆薢羌活蠶沙松節虎骨各一兩酥炙共用酒浸曬乾研為細末酒糊為丸如梧桐子大每服三錢食前白滚水送下方歌換骨丹歸膝枸蒼龜板風艽獨薢羌蠶沙松節茄根虎鶴膝風生服最良蛜􅖉丸蛜􅖉一箇蠍生者即全白芷桂心安息香阿魏以上各用童便酒炒熟威靈仙白附子童便酒炒當歸羌活桃仁童便酒炒牛膝北漏蘆地骨皮白芍各一兩酒炒乳香没藥各七錢五分酒炒二味用童便共研末煉蜜為丸桐子大每服三錢空心溫酒送下方歌蛜􅖉丸治鶴膝風芷桂安息魏威靈白附歸羌桃乳没膝漏骨皮芍蜜成五積散見内癰部腎癰大防風湯見股部附骨疽萬靈丹回陽玉龍膏俱見腫瘍門獨活寄生湯見本部膝眼風下石疽下石疽在膝上生堅硬如石牽筋疼皮色如常難潰斂證由血滯外寒凝註此證生於膝間無論膝葢及左右俱可以生堅硬如石牽筋疼痛腫如鷄卵皮色不變並無焮熱難消難潰既潰難斂最屬疲頑由身虛寒邪深襲致令血瘀凝結而成腫潰内外治法俱與中石疽叅考但此證腫潰俱涼若涼化為熱見諸善證者始吉仍見惡證者難痊緩疽緩疽血滯外寒凝腫硬如饅膝上生紫黯潰遲多焮熱腫久漸腐爛皮疼註此證由外寒深襲血瘀凝滯而成生於兩膝上或生於膝兩旁腫硬如饅木痛日增其色紫黯積日不潰證之情形與下石疽相似惟多焮熱腫久則腐爛肌肉皮膚初服當歸拈痛湯以宣通濕熱次按中石疽治法内宜溫補外宜灸法虚甚者十全大補湯相兼治之當歸拈痛湯見股部腿遊風十全大補湯見潰瘍門委中毒委中毒在膕紋生屈伸木硬㣲腫紅膽熱流入膀胱遏速宜活血刺委中註此證生委中穴穴在膝後膕中央約紋動衇陷中即是約紋者摺紋也又名血郗穴屬膀胱經俗名腿凹經曰膕中由膽經積熱流入膀胱壅遏不行而成木硬腫痛㣲紅屈伸艱難治宜速用活血散瘀湯逐下惡血為效緩則筋縮而成廢疾諸書皆云兼刺委中穴出血自消然刺穴必兼有腰痛不能轉移者方可刺之即出血亦不可過多多則令人身撲面見脱色其餘内外治法俱按癰疽腫瘍潰瘍門亦有焮痛色赤潰速者由濕熱凝結所致治法亦按腫瘍潰瘍門活血散瘀湯當歸尾赤芍桃仁去皮尖大黄各二錢酒炒川芎蘇木各一錢五分丹皮枳殻麩炒栝蔞仁各一錢㯽榔六分水二鍾煎八分空心服渣再煎服方歌活血散瘀委中毒皆因積熱腫其處歸芍丹皮桃枳榔栝蔞大黄芎蘇木上水魚上水魚生委中旁摺紋兩稍疼埂昻長若魚形瘀熱結外施砭血敷二黄註此證生委中摺紋兩稍腫如髙埂長若魚形色紫作痛由血熱遇外寒稽留則血瘀凝結而成外用砭法向腫埂上砭出惡血兼用二黄散香油調敷甚效二黄散即顛倒散見鼻部肺風粉刺人面瘡膝肘瘡生如人面自古傳來係孽因流氣苦參敷貝母從善改惡自察心註此證自古傳來乃竒病也多生兩膝或生兩肘腫類人形眉目口鼻皆具本事方云瘡口能飲食施治諸藥絶無所苦惟敷貝母其瘡皺眉閉口自此日用貝母末和水敷灌數日瘡消結痂而愈又諸書皆以為素積寃譴須自清心懴悔初宜服流氣飲日久宜用大苦參丸今據所用之藥俱係辛熱疎散之品其證或因風寒濕三氣凝合之所化亦未必盡由寃譴所致也依古施治諒可奏效大苦參丸苦參二兩蔓荆子赤茯苓山藥白芷荆芥防風白附子川芎山梔生何首烏白蒺藜皂角川烏炮黄耆赤芍獨活羌活各五錢草烏一錢五分炮右為細末麵糊和丸如梧桐子大每服五七十丸空心黄酒送下不飲酒者以茶代之方歌大苦參丸人面瘡蔓苓山藥芷荆防白附芎梔何蒺皂川草烏耆芍獨羌流氣散方見背部痰注發御纂醫宗金鑑卷七十
