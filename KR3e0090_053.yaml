  text: 編輯幼科雜病心法要訣目録感冒門感冒風寒總括傷風杏蘇飲金沸草散傷寒九味羌活湯雙解通聖湯柴葛解肌湯大柴胡湯感冒夾食雙解通聖湯藿香正氣湯平胃散感冒夾熱雙解通聖湯涼膈散天水散感冒夾驚疏解散涼驚丸柴胡溫膽湯瘟疫門瘟疫總括溫病雙解通聖湯風溫荆防敗毒散桂枝合白虎湯熱病瘟疫荆防敗毒散普濟消毒飲二聖救苦丹瘟癍疹痧升麻葛根湯合消毒犀角飲三黃石膏湯消癍青黛飲雙解通聖湯暑證門暑證總括中暑加味人參白虎湯傷暑二香飲六合湯加味香薷飲暑風加味香薷飲玉露散暑厥清暑益氣湯辰砂益元散抱龍丸霍亂門霍亂總括濕霍亂二香飲辰砂益元散乾霍亂桂苓甘露飲理中湯痢疾門痢疾總括寒痢理中湯真人養臟湯熱痢當歸芍藥湯白頭翁湯香連丸時痢倉廪湯噤口痢參連開噤散瘧疾門瘧疾總括寒瘧風瘧麻黃羌活湯桂枝羌活湯食瘧柴平湯大柴胡湯瘧痰瘧飲加減清脾飲咳嗽門咳嗽總括肺寒咳嗽聖惠橘皮散補肺阿膠散肺熱咳嗽加味㵼白散涼膈散食積咳嗽麯麥二陳湯蘇葶滚痰丸風寒咳嗽參蘇飲金沸草散加味華蓋散喘證門喘證總括火熱喘急涼膈散涼膈白虎湯導赤散知蘗地黃湯肺虛作喘潔古黃耆湯百合固金湯本事黃耆湯風寒喘急華蓋散紫蘇飲子蘇子降氣湯痰飲喘急蘇葶滚痰丸蘇葶丸馬脾風五虎湯一捻金御纂醫宗金鑑卷五十三目録欽定四庫全書御纂醫宗金鑑卷五十三編輯幼科雜病心法要訣目録感冒門感冒風寒總括傷風杏蘇飲金沸草散傷寒九味羌活湯雙解通聖湯柴葛解肌湯大柴胡湯感冒夾食雙解通聖湯藿香正氣湯平胃散感冒夾熱雙解通聖湯涼膈散天水散感冒夾驚疏解散涼驚丸柴胡溫膽湯瘟疫門瘟疫總括溫病雙解通聖湯風溫荆防敗毒散桂枝合白虎湯熱病瘟疫荆防敗毒散普濟消毒飲二聖救苦丹瘟癍疹痧升麻葛根湯合消毒犀角飲三黃石膏湯消癍青黛飲雙解通聖湯暑證門暑證總括中暑加味人參白虎湯傷暑二香飲六合湯加味香薷飲暑風加味香薷飲玉露散暑厥清暑益氣湯辰砂益元散抱龍丸霍亂門霍亂總括濕霍亂二香飲辰砂益元散乾霍亂桂苓甘露飲理中湯痢疾門痢疾總括寒痢理中湯真人養臟湯熱痢當歸芍藥湯白頭翁湯香連丸時痢倉廪湯噤口痢參連開噤散瘧疾門瘧疾總括寒瘧風瘧麻黃羌活湯桂枝羌活湯食瘧柴平湯大柴胡湯瘧痰瘧飲加減清脾飲咳嗽門咳嗽總括肺寒咳嗽聖惠橘皮散補肺阿膠散肺熱咳嗽加味㵼白散涼膈散食積咳嗽麯麥二陳湯蘇葶滚痰丸風寒咳嗽參蘇飲金沸草散加味華蓋散喘證門喘證總括火熱喘急涼膈散涼膈白虎湯導赤散知蘗地黃湯肺虛作喘潔古黃耆湯百合固金湯本事黃耆湯風寒喘急華蓋散紫蘇飲子蘇子降氣湯痰飲喘急蘇葶滚痰丸蘇葶丸馬脾風五虎湯一捻金御纂醫宗金鑑卷五十三目録欽定四庫全書御纂醫宗金鑑卷五十三編輯幼科雜病心法要訣感冒門感冒風寒總括小兒肌膚最柔脆偶觸風寒病榮衛輕為感冒病易痊重為傷寒證難退夾食夾熱或夾驚疏散和解宜體會注小兒氣血未充肌膚柔脆風寒所觸邪氣入于腠理榮衛受病輕者為感冒易痊重者為傷寒難治又有夾食夾熱夾驚等證或宜疏散或宜和解臨證時細為體察焉傷風肺主皮毛感邪風發熱憎寒頭痛疼有汗嚏涕脈浮緩鼻塞聲重咳嗽頻杏蘇飲同金沸散疏風解表莫從容注傷風者風邪傷衛也衛主皮毛內合于肺故令身體發熱憎寒頭疼有汗嚏涕鼻塞聲重不時咳嗽也脈浮緩宜杏蘇飲解散外邪繼用金沸草散開通氣逆則愈杏蘇飲杏仁炒去皮尖紫蘇前胡桔梗枳殼麩炒桑皮黃芩甘草生麥冬去心浙貝母去心橘紅引用生薑水煎服方歌杏蘇飲治風傷肺杏仁紫蘇前桔同枳殼桑皮黃芩草麥冬貝母合橘紅金沸草散細辛荆芥半夏薑製旋覆花前胡甘草生赤苓引用薑棗水煎服方歌金沸草散微傷風細辛荆芥半夏同旋覆前胡生甘草生薑紅棗赤茯苓傷寒小兒傷寒表感寒發熱無汗而惡寒頭痛身痛脈浮緊嘔逆煩渴病邪傳初用羌活熱通聖邪傳柴葛大柴煎注傷寒者乃寒邪傷表營分也其證身體發熱惡寒無汗頭痛身痛而脈浮緊若嘔逆煩渴者則為邪盛欲傳經也此證初宜九味羌活湯如熱盛者以雙解通聖湯治之服此藥後已汗下不解而傳經者用柴葛解肌湯兼裏證者用大柴胡湯以解表通裏因證施治庶不致誤九味羌活湯蒼术炒白芷川芎細辛羌活防風生地黃芩甘草生引用生薑蔥白水煎服大便祕者加大黃方歌傷寒初起羌活湯蒼芷芎細合羌防生地芩草薑蔥入便祕之時加大黃雙解通聖湯麻黃朴消大黃當歸赤芍川芎白术土炒石膏滑石桔梗梔子連翹去心黃芩薄荷甘草生荆芥防風引用生薑蔥白水煎服方歌傷寒熱盛通聖湯表裏兩解麻消黃歸芍芎术膏滑桔梔翹芩薄草荆防柴葛解肌湯葛根柴胡白芷羌活桔梗石膏黃芩赤芍藥甘草生引用生薑紅棗水煎服方歌柴葛解肌解三陽葛根柴胡白芷羌桔梗石膏芩赤芍甘草煎服自安康大柴胡湯柴胡黃芩赤芍藥半夏薑製枳實麩炒大黃引用生薑大棗水煎服方歌大柴胡治邪傳經少陽陽明表裏通柴胡黃芩赤芍藥半夏枳實大黃同感冒夾食內傷飲食感寒風發熱憎寒頭痛疼惡食噯臭吐酸物便祕尿澀腹熱膨雙解藿香正氣飲化滯平胃斟酌行注小兒平日飲食無節內傷停滯外復為風寒所襲故成是證也其候發熱憎寒頭痛惡食噯臭吐酸便祕尿澀腹熱膨脹也熱盛者用雙解通聖湯兩解之內無熱者用藿香正氣湯和解之表邪既解然後調理其脾用平胃散消導之庶幾外無餘邪內無滯熱而病自愈矣雙解通聖湯方見傷寒藿香正氣湯蘇葉白芷藿香陳皮半夏薑製茯苓大腹皮甘草生厚朴薑炒桔梗引用生薑紅棗水煎服方歌和解藿香正氣湯蘇葉白芷共藿香陳半茯苓大腹草厚朴桔梗引棗薑平胃散方見哯乳加山查神麯麥芽感冒夾熱平素有熱感風寒面赤脣焦口鼻乾憎寒壯熱頻飲冷心煩譫妄便多艱㵼熱先宜用通聖清熱涼膈天水煎注小兒臟腑素稟多熱今復為風寒所傷風熱相搏則火邪愈盛故其現證有面赤脣焦口鼻乾燥憎寒壯熱口渴飲冷心神煩燥譫語狂妄二便祕澀治宜散其風寒更宜兼㵼其熱須用雙解通聖湯兩解之若服藥後汗出便利病雖少減熱猶不退者治宜清熱為主當以涼膈散合天水散治之則表裏清而病愈矣雙解通聖湯方見傷寒涼膈散方見急驚風天水散滑石六兩飛甘草一兩生共為細末每服一錢燈心湯調下感冒夾驚感冒病時觸驚異心驚膽怯睡不安身熱煩躁面青赤疏解散與涼驚丸和以柴胡溫膽劑寧神定志效通仙注小兒感冒邪氣未解復為驚異所觸故見心驚膽怯睡卧不安身熱煩躁面色青赤之證先以疏解散疏散之再以涼驚丸清鎮之如病雖退尚覺心驚不寐者宜用柴胡溫膽湯和解之疏解散羌活蘇葉防風枳殼麩炒桔梗前胡赤芍藥杏仁炒去皮尖殭蠶炒甘草生黃連酒炒引用生薑水煎服方歌疏解散治感冒驚羌活蘇葉及防風枳桔前胡黃連芍杏仁殭蠶甘草同涼驚丸方見急驚風柴胡溫膽湯柴胡陳皮半夏薑製茯苓甘草生竹茹枳實麩炒引用生薑水煎服方歌柴胡溫膽感冒驚病後餘邪尚未寧柴胡陳半茯苓草竹茹枳實薑用生瘟疫門瘟疫總括瘟病傷寒傳變同感寒即病傷寒名冬受寒邪春復感因感而發瘟病成至夏感發為熱病逐户相傳乃天行四時不正為時氣痧疹瘟癍要詳明注瘟病之傳變與傷寒無異有冬感于寒而即病者名曰傷寒有冬傷于寒而未即病者寒邪藏于肌膚之內伏于榮衛之間至春復感春風發為溫病至夏復感暑熱發為熱病若逐户闔門老幼相傳乃天行瘟疫其害更烈或春夏應暖熱而反寒秋冬應寒涼而反熱此為四時不正之氣名曰時氣相感為病亦與傷寒同其治也其間或發癍發痧發疹要當詳明其證治法在後溫病冬受寒邪不即病復感春寒發名溫證同傷寒治雙解嘔加生薑半夏均注溫病一證乃冬受寒邪不即為病至春復感春風而發者也現證與傷寒相同用雙解通聖湯兩解之若嘔吐者以生薑半夏入之其嘔自止雙解通聖湯方見傷寒風溫風溫復感春風發汗熱身重睡鼾眠汗少荆防敗毒治汗多桂枝白虎煎注風溫冬受寒邪復感春風而發為病也其證身重睡憨發熱自汗汗少者以荆防敗毒散解之汗多者以桂枝合白虎湯清解之荆防敗毒散荆芥防風羌活獨活柴胡前胡甘草生川芎枳殼麩炒桔梗茯苓引用生薑水煎服方歌荆防敗毒宜時氣風溫無汗用之靈荆防羌獨柴前草川芎枳桔與茯苓桂枝合白虎湯桂枝芍藥石膏煅知母生甘草生粳米引加生薑大棗水煎服方歌桂枝湯合白虎湯壯熱多汗服此方桂芍石膏知母草粳米大棗共生薑熱病冬受寒邪不即病至夏復感暑熱成身不惡寒而多渴證同溫病治亦同注熱病乃冬受寒邪不即為病至夏復感暑熱而成故名曰熱病現證與溫病相類但不惡寒口乾作渴為少異耳治法亦與溫病同瘟疫天行厲氣瘟疫病為病挨門合境同皆由邪自口鼻入故此傳染迅如風當分表裏隂陽毒因時取治審重輕古法皆以攻為急荆防普濟救苦攻注瘟疫一證乃天地之厲氣流行沿門闔户無論老少強弱觸之者即病蓋邪氣自口鼻而入故傳染之速迅如風火但毒有在表在裏在隂在陽之分其或發或攻或清當因春風夏熱秋涼冬寒之四時各異隨人虛實量乎輕重以施治也古法皆以攻毒為急者以邪自口鼻而入在裏之病多故也發以荆防敗毒散清以普濟消毒飲攻以二聖救苦丹則酌量合宜審度醫治庶幾臨證時有得心應手之妙矣荆防敗毒散方見風溫普濟消毒飲黃芩酒炒黃連酒炒陳皮桔梗板藍根升麻柴胡薄荷連翹去心牛蒡子炒研殭蠶炒馬勃甘草生元參引用燈心水煎服方歌普濟消毒清時瘟芩連陳桔板藍根升柴薄荷翹牛蒡殭蠶馬勃草元參二聖救苦丹大黃四兩皂角二兩右為末水丸每服一錢量兒大小與之用無根水下瘟癍疹痧傷寒疹癍失汗下時氣初感即其然表邪覆鬱榮衛分外泛皮脈痧疹癍痧白疹紅如膚粟癍紅如豆片連連紅輕赤重黑多死淡紅稀暗是隂癍未透升麻消毒治熱盛三黃石膏煎已透消癍青黛飲痧疹表裏雙解先注傷寒發癍疹痧皆因汗下失宜外邪覆鬱內熱泛出而成也惟時氣傳染感而即出亦猶疫之為病烈而速也發于衛分則為痧衛主氣故色白如膚粟也發于榮分則為疹癍榮主血故色紅膚淺為疹深重為癍癍形如豆甚則成片連連癍疹之色紅者輕赤者重黑者死此以色辨熱之淺深驗死生也若其色淡紅稀暗者皆因邪在三陽已成癍疹由外入裏邪從隂化或過服涼藥所致是為隂癍隂痧隂疹法當從隂寒治也癍出未透表熱輕者宜升麻葛根湯合消毒犀角飲治之表熱重者宜三黃石膏湯發之已透者用消癍青黛飲加減清之疹痧初起表裏不清用雙解通聖湯先通表裏餘法同前升麻葛根湯合消毒犀角飲升麻葛根芍藥甘草生牛蒡子荆芥防風犀角引用芫荽水煎服方歌升麻消毒表癍疹升葛芍草蒡荆防倍加犀角急煎服表實熱盛另有方三黃石膏湯黃連黃芩梔子黃蘗豆豉麻黃石膏引用生蔥水煎服方歌三黃石膏發癍疹表實熱盛有竒功連芩梔蘖與豆豉麻黃石膏生用蔥消癍青黛飲石膏煅知母犀角甘草生梔子生川連生青黛元參柴胡生地人參大黃引用薑棗水煎臨服入苦酒一匙和服方歌消癍青黛消毒癍石知犀角草梔連青黛元參柴生地人參大黃斟酌添雙解通聖湯方見傷寒暑證門暑證總括小兒暑病有四證中暑陽邪傷暑隂暑風攻肝抽搐見暑厥攻心不識人注中暑為陽邪單中暑熱也陽邪身熱有汗傷暑為隂邪中暑復感寒也隂邪身熱無汗中暑熱極攻肝則抽搐攻心則厥昌不省人事治者果能因證分别施治自無難矣中暑中暑汗出身壯熱頭痛大渴煩不寧氣乏神倦兩足冷加味人參白虎靈注中暑之證身熱有汗因暑熱熏蒸故頭痛口渴煩躁不寧甚則氣乏神倦足冷惡寒須以加味人參白虎湯治之加味人參白虎湯人參石膏生知母生粳米甘草蒼术水煎服方歌加味人參白虎湯暑熱傷氣服最良參膏知母粳米草停飲嘔水更加蒼傷暑傷暑受暑感寒風無汗熱渴面赤紅乾歲惡心腹絞痛嗜臥懶食肢重疼清散二香飲極效氣虛六合湯奏功夾食惡食多吐㵼加味香薷法最靈注小兒傷暑謂受暑復感風寒也其證發熱無汗口渴飲水面色紅赤乾嘔惡心或腹中絞痛嗜臥懶食以二香飲治之此內清外散之法也若正氣虛弱當補正除邪以六合湯治之若傷暑夾食大吐㵼者以加味香薷飲治之二香飲蘇葉藿香白茯苓扁豆炒厚朴薑製陳皮半夏薑製甘草生大腹皮白芷桔梗川黃連香薷引用生薑燈心水煎服方歌二香飲治風暑病蘇葉藿香白茯苓扁豆厚朴陳半草腹芷桔連香薷靈六合湯人參香薷半夏薑製甘草生砂仁木瓜赤茯苓藿香杏仁炒去皮尖厚朴薑炒扁豆炒引用薑棗水煎服方歌六合虛暑用人參香薷半夏草砂仁木瓜赤苓藿香杏厚朴扁豆棗薑勻加味香薷飲香薷厚朴薑炒陳皮扁豆炒山查肉豬苓甘草生枳實麩炒水煎服方歌加味香薷治夾食香薷厚朴共陳皮白扁豆配山查肉豬苓甘草炒枳實暑風暑風抽搐似驚風煩渴汗熱便黃紅先用加味香薷飲繼用玉露散即寧注暑風者手足搐搦狀似驚風者也由暑熱攻肝內生風病其證煩渴身熱有汗二便黃赤先宜加味香薷飲疏其風繼以玉露散清其熱暑熱一解而搐自止矣切不可當驚癎治之加味香薷飲香薷黃連扁豆炒厚朴薑炒羌活引用燈心水煎服方歌加味香薷治暑風香薷黃連扁豆同厚朴薑炒羌活入燈心煎服效從容玉露散方見火㵼暑厥暑厥昏眩不知人氣虛挾痰上衝心虛者清暑益氣治挾痰益元抱龍均注暑厥之證昏昧不省人事因其人元氣素虛暑熱衝心或挾痰上衝以致精神昏憒虛者以清暑益氣湯治之實者以辰砂益元散合抱龍丸治之清暑益氣湯人參黃耆炙當歸酒洗白术土炒甘草炙陳皮麥冬去心五味子青皮炒蒼术炒黃蘗酒炒升麻葛根澤㵼神麯炒引用薑棗水煎服方歌清暑益氣虛受暑參耆歸术草陳皮麥味青皮蒼术蘗升葛澤㵼炒神麯辰砂益元散辰砂三錢水飛滑石六兩水飛甘草一兩末每用一錢薑燈心湯調勻合抱龍丸服抱龍丸黑膽星四兩者佳九轉天竺黃一兩雄黃水飛辰砂各半兩另研麝香一錢另研右為細末煮甘草膏和丸皂莢子大溫水化下霍亂門霍亂總括霍亂風寒暑飲成卒然吐瀉腹心疼飲暑盛兮濕霍亂寒勝為乾症不輕注霍亂者乃風寒暑飲之雜邪為病卒然揮霍變亂心腹大痛吐瀉交作也其能吐能㵼者謂之濕霍亂夫暑飲雖盛若已經吐㵼其邪即解故易治也若欲吐不能欲㵼不能者謂之乾霍亂蓋寒盛則凝既不吐㵼則邪無去路故病多不救也濕霍亂吐㵼不已腹頻疼口渴引飲胸悶膨飲盛主以二香飲暑盛益元散最靈注濕霍亂者乃暑飲合邪也其證吐㵼不已肚腹疼痛口渴引飲胸膈膨悶飲盛者以二香飲主之暑盛者以辰砂益元散主之因證調治則暑飲之邪既清而霍亂之證立愈矣治者宜詳辨之二香飲方見傷暑辰砂益元散方見暑厥乾霍亂欲吐㵼之不吐㵼腹中絞痛不能堪煩渴大飲甘露飲肢厥不渴理中煎注乾霍亂者乃寒暑凝結欲吐不吐欲㵼不㵼腹中絞痛俗名絞腸痧病也治者當分寒暑如煩渴大飲者為熱以桂苓甘露飲主之若厥逆不渴者屬寒以理中湯主之因證調治其病自愈桂苓甘露飲白术土炒茯苓澤㵼豬苓肉桂少許石膏滑石水飛寒水石水煎服方歌寒暑凝結霍亂成桂苓甘露莫從容白术茯苓豬澤桂膏滑寒水石相同理中湯方見不乳痢疾門痢疾總括痢疾暑濕生冷成傷氣為白傷血紅後重裏急腹窘痛寒熱時痢噤口名注痢之為證多因外受暑濕內傷生冷而成傷于氣者色多白以肺與大腸為表裏也傷于血者色多赤以心與小腸為表裏也裏急者腹窘痛也後重者頻下墜也又有寒痢熱痢時痢噤口痢之别醫者須詳察之寒痢寒傷久痢藏虛寒腸鳴切痛實難堪面脣青白喜飲熱理中養藏效通仙注寒痢者寒冷傷胃久痢不已或藏氣本虛復為風冷所乘傷于腸胃故痢時腸鳴切痛面脣青白口雖渴喜飲熱此裏寒虛之證也初宜理中湯久則真人養藏湯治之寒得溫散而證愈矣理中湯方見不乳真人養藏湯人參白术土炒木香煨當歸土炒白芍炒肉桂甘草炙罌粟殼蜜炙訶子肉麯煨去核肉果煨引用烏梅水煎服方歌寒痢須用養藏湯人參白术廣木香歸芍肉桂炙甘草粟殼訶子肉果良熱痢痢初實熱腹窘痛下痢無度尿短紅舌赤脣焦喜飲冷芍藥白頭香連靈注熱痢者皆因濕熱凝結于腸胃以致腹中窘痛頻頻下痢尿短色紅舌赤脣焦喜飲冷水此裏熱之證也重則當歸芍藥湯主之輕則白頭翁湯主之或香連丸主之當歸芍藥湯當歸白芍木香黃芩黃連肉桂大黃甘草生檳榔水煎服方歌熱痢當歸芍藥湯裏急後重服最良歸芍木香芩連桂大黃甘草共檳榔白頭翁湯黃連黃蘗秦皮白頭翁水煎服方歌白頭翁湯治熱痢腹中窘痛溺短赤連蘗秦皮白頭翁煎服之後痢自愈香連丸木香川黃連各等分共為細末醋糊為丸如桐子大量兒大小用之空心米飲下時痢時痢痢疾感時氣發熱無汗遍身疼熱為邪束因作嘔倉廩湯散有竒功注時痢者乃痢疾時復感時氣也身熱無汗遍身疼痛熱為邪束頻作嘔逆須以倉廩湯散之先解時邪其痢自止倉廩湯人參茯苓獨活桔梗前胡川芎甘草炙枳殼麩炒倉米柴胡羌活引用生薑水煎服方歌時痢須用倉廩湯參苓獨活桔梗良前胡川芎炙甘草枳殼倉米及柴羌噤口痢火毒沖胃成噤口脈大身熱不能食舌赤脣紅惟飲冷參連開噤散功竒注噤口痢一證乃火毒沖胃而成其證脈大身熱不能飲食舌赤脣紅惟喜飲冷急宜參連開噤散救之參連開噤散人參川連薑炒蓮子肉各等分右為細末米飲調下瘧疾門瘧疾總括瘧疾夏暑秋寒風榮衛合邪病始成隂陽相並發寒熱日間淺深作分明注瘧疾者多因夏傷於暑其氣舍于榮內至秋復感寒風則榮衛合邪而成瘧發時或寒或熱者隂陽相並也每日作者因初病邪氣尚淺伏藏于榮隨經絡而行故也其間日作者因邪已深入脊膂間伏藏于衝脈故也其晝發者因邪在三陽之淺夜發者因邪在三隂之深瘧將退者亦由夜而晝由間日而至每日此為去隂就陽由深而淺其病欲已也治者須詳細分别可也寒瘧風瘧先寒後熱身無汗此為寒瘧不須評先熱後寒身有汗此為風瘧須詳明寒宜麻黃羌活劑風惟桂枝羌活從注此瘧疾初起發散之法也先寒後熱者因先傷于寒後傷于風寒多熱少身無汗者謂之寒瘧以麻黃羌活湯主之先熱後寒者因先傷于風後傷于寒熱多寒少身有汗者謂之風瘧以桂枝羌活湯主之麻黃羌活湯麻黃羌活防風甘草生引用生薑水煎服方歌麻黃羌活湯醫瘧身體無汗寒熱增麻黃羌活防風草引薑煎服體安寧桂枝羌活湯羌活防風桂枝甘草生引用生薑水煎服方歌桂枝羌活湯治瘧豈尋常羌活生甘草防風桂枝良食瘧食瘧寒熱腹脹膨面黃惡食悶不通輕者須用柴平劑便鞕加味大柴攻注食瘧者因食而病瘧者也由小兒飲食無節復受風暑之氣以致寒熱交作胸腹脹滿否悶不通面黃惡食也但食有輕重須當别之輕者宜柴平湯主之重者宜大柴胡湯加檳榔草果主之治者果能因證調理則積滯清而瘧漸退矣柴平湯陳皮半夏薑製蒼术米泔水浸炒厚朴薑炒黃芩柴胡甘草人參引用薑棗水煎服方歌柴平湯治傷食瘧陳半蒼术同厚朴黃芩柴胡草人參薑棗作引為良藥大柴胡湯方見傷寒瘧痰瘧飲瘧痰瘧飲多嘔逆面黃目腫胸膈膨痰盛清脾加橘半飲盛加蒼倍入苓注小兒素有痰飲復因外邪凝結脾胃故嘔逆也若瘧疾或經汗下之後表裏無證宜用清脾飲以和之痰盛者本方加橘紅倍半夏飲盛者加蒼术倍茯苓若兒氣已虛弱更當加人參以扶其正加減清脾飲柴胡黃芩半夏薑製甘草炙厚朴薑製青皮醋炒檳榔茯苓草果人參白术土炒橘紅南蒼术炒引用生薑水煎服方歌清脾治瘧兼痰飲柴芩半草朴青榔苓果氣虛參术入痰盛加橘飲盛蒼咳嗽門咳嗽總括肺病咳嗽有痰聲有聲無痰咳之名有痰無聲謂之嗽為病寒熱食與風注病機式要云咳嗽謂有聲有痰因肺氣受傷動乎脾濕而然也咳謂無痰而有聲肺氣傷而不清也嗽謂無聲而有痰脾濕動而為痰也二者雖俱屬肺病然又有肺寒肺熱之分食積風寒之别醫者宜詳辨之肺寒咳嗽肺虛飲冷致咳嗽面色㿠白痰涕清聖惠橘皮宜初進補肺阿膠久嗽靈注寒嗽者因平素肺虛喜啖生冷以致寒邪傷肺發為咳嗽其證面色㿠白痰多清稀鼻流清涕初宜聖惠橘皮散主之若日久不愈者須以補肺阿膠散主之則氣順痰清而嗽自止矣聖惠橘皮散人參貝母蘇葉陳皮桔梗杏仁去皮尖炒引用紅棗水煎服方歌肺虛受寒頻咳嗽橘皮散治效通仙參貝蘇葉陳皮桔杏仁微炒去皮尖補肺阿膠散人參阿膠麩炒牛蒡子炒杏仁去皮尖炒糯米甘草炙馬兜鈴水煎食後服方歌小兒肺寒時時嗽補肺阿膠效若神人參阿膠牛蒡子杏仁糯米草兜鈴肺熱咳嗽火嗽面赤咽乾燥痰黃氣穢帶稠黏便軟加味㵼白散便硬加味涼膈煎注火嗽一證乃火熱薰擾肺金遂致頻頻咳嗽面赤咽乾痰黃氣穢多帶稠黏也便軟者加味㵼白散主之便硬者涼膈散加桔梗桑皮煎服則熱退氣清而嗽自止矣加味㵼白散桑皮蜜炙地骨皮甘草生川貝母去心碾麥冬去心知母生桔梗黃芩薄荷水煎服方歌加味㵼白治火咳桑皮地骨甘草合貝母麥冬生知母桔梗黃芩同薄荷涼膈散方見急驚風食積咳嗽食積生痰熱薰蒸氣促痰壅咳嗽頻便溏麯麥二陳治便燥蘇葶滚痰攻注積嗽者因小兒食積生痰熱氣薰蒸肺氣氣促痰壅頻頻咳嗽便溏者以麯麥二陳湯消導之便祕者以蘇葶滚痰丸攻下之麯麥二陳湯陳皮半夏薑製茯苓甘草生黃連薑製山查麥芽炒神麯炒栝蔞仁枳實麩炒引用生薑紅棗水煎服方歌麯麥二陳食積嗽陳半苓草川黃連山查麥芽神麯炒栝蔞枳實一同煎蘇葶滚痰丸蘇子一兩炒苦葶藶一兩微炒大黃四兩一次酒蒸沉香五錢黃芩四兩青礞石五錢如金為度火煆右為末水為丸量兒虛實服之薑湯送下風寒咳嗽風寒咳嗽頻嚏涕鼻塞聲重唾痰涎疏風參蘇金沸散散寒加味華蓋痊注小兒脫衣偶為風冷所乘肺先受邪使氣上逆衝塞咽膈發為咳嗽嚏噴流涕鼻塞聲重頻唾痰涎先以參蘇飲疏解表邪再以金沸草散清其痰嗽若寒邪壅蔽當以加味華蓋散治之則風邪解而氣道通氣道通而咳嗽止矣參蘇飲蘇葉乾葛前胡陳皮半夏薑製甘草生枳殼桔梗赤茯苓水煎服方歌參蘇飲治風寒嗽蘇葉乾葛前胡從陳皮半夏生甘草枳殼桔梗配赤苓金沸草散方見傷風加味華蓋散麻黃杏仁去皮尖炒蘇子炒前胡橘紅甘草生桑皮炒桔梗赤茯苓水煎食後溫服方歌華蓋散治風寒盛氣促胸滿咳嗽頻麻杏蘇子前橘草桑皮桔梗赤茯苓喘證門喘證總括喘則呼吸氣急促擡肩欠肚哮有聲實熱氣粗胸滿鞕寒虛痰飲馬脾風注呼吸氣出急促者謂之喘急外候擡肩欠肚若更喉中有聲響者謂之哮吼然致病之原不一如氣粗胸滿痰稠便鞕而喘者此實熱也氣乏息微不能續息而喘者此虛邪也其中有風寒鬱閉而喘者又有痰飲壅逆而喘者更有馬脾風一證最為急候醫者須分别詳明庶用藥如響矣火熱喘急火喘燥渴面脣紅肺胃涼膈白虎清㵼心宜用導赤散隂虛知蘗地黃靈注火邪刑金作喘者多口乾舌燥作渴面赤脣紅也因于肺熱者以涼膈散主之胃熱者涼膈白虎湯主之心火刑金者導赤散主之腎虛火來爍金者宜知蘗地黃湯主之醫者果能審察精詳按證調治庶幾用藥如響而不致有虛實之誤矣涼膈散方見急驚風涼膈白虎湯大黃生朴消甘草生連翹去心梔子黃芩生薄荷葉石膏生知母生引用粳米水煎溫服方歌涼膈白虎肺胃熱梔子連翹薄荷葉黃芩大黃朴消草知母石膏粳米列導赤散方見不小便知蘗地黃湯乾生地黃山茱萸肉山藥炒知母炒黃蘗鹽炒牡丹皮澤㵼茯苓水煎服方歌知蘗地黃隂虛熱知母黃蘗牡丹皮乾生地黃並澤㵼茯苓山藥共茱萸肺虛作喘虛喘氣乏聲短澀潔古黃耆湯效捷百合固金化虛痰本事黃耆清虛熱注虛喘之證氣乏聲音短澀以潔古黃耆湯主之若喘促夾痰者以百合固金湯主之夾熱者以本事黃耆湯主之潔古黃耆湯人參黃耆炙甘草炙地骨皮桑白皮炒水煎溫服方歌潔古黃耆湯虛喘最為良人參黃耆共甘草地骨桑百合固金湯百合天門冬麥門冬去心生地黃熟地黃當歸白芍藥炒甘草生貝母去心元參桔梗水煎服方歌百合固金虛痰喘百合二冬二地黃當歸白芍生甘草貝母元參桔梗良本事黃耆湯五味子白芍藥天門冬麥門冬去心人參黃耆炙熟地黃甘草炙茯苓引用烏梅薑棗水煎服方歌本事黃耆虛熱喘五味芍藥二門冬參耆熟地炙甘草烏梅薑棗白茯苓風寒喘急風寒傷肺氣喘急表熱無汗華蓋方肺虛被邪紫蘇飲無邪氣逆降氣湯注肺主皮毛一受風寒內閉肺氣則氣逆不降呼吸氣急故作喘也發熱無汗宜以華蓋散汗而散之若肺氣本虛外復被風寒所傷者宜以紫蘇飲子補而散之若肺虛外無風寒所傷內無痰涎壅塞惟氣逆喘急者以加減蘇子降氣湯降其逆氣其喘自愈治者宜詳察之華蓋散方見風寒咳嗽紫蘇飲子蘇葉杏仁炒去皮尖桑皮炒陳皮青皮醋炒半夏薑製人參五味子甘草生麻黃引用生薑水煎服方歌氣虛又被風寒傷紫蘇飲子最相當蘇葉杏桑陳青半人參五味草麻黃蘇子降氣湯蘇子炒當歸陳皮半夏薑製甘草生前胡厚朴薑製桂心沉香引用薑棗水煎服方歌氣逆喘用降氣湯肺虛無邪服最良蘇子當歸陳半草前胡厚朴桂沉香痰飲喘急痰飲壅逆因作喘痰飲蘇葶滚痰從停飲喘急不得臥㵼飲降逆用蘇葶注小兒痰飲作喘者因痰壅氣逆也其音如潮響聲如拽鋸者須急攻痰壅蘇葶滚痰丸主之若停飲喘急不得臥者又當㵼飲降逆蘇葶丸主之醫者須分别施治庶幾曲中病情矣蘇葶滚痰丸方見食積咳嗽蘇葶丸南蘇子炒苦葶􅐗子各等分微炒右為細末蒸棗肉為丸如麻子大每服五丸至七丸淡薑湯下馬脾風暴喘傳名馬脾風胸髙脹滿脅作坑鼻竅搧動神悶亂五虎一捻服最靈注馬脾風俗傳之名即暴喘是也因寒邪客于肺俞寒化為熱閉于肺經故胸髙氣促肺脹喘滿兩脅搧動陷下作坑鼻竅搧張神氣悶亂初遇之急服五虎湯繼用一捻金下之儻得氣開其喘自止如兒生百日內見此者病多不救五虎湯麻黃蜜炒杏仁炒去皮尖甘草生白石膏研為末細茶引用生薑水煎臨時用藥沖石膏服方歌五虎湯治馬脾風麻黃蜜炒杏仁從甘草石膏細茶葉煎服之後喘自寧一捻金方見不大便御纂醫宗金鑑卷五十三
