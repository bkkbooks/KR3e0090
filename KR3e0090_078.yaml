硝大黄車前子各一錢黒參一錢半黄芩知母梔子炒茺蔚子各一錢右為粗末以水二盞煎至一盞食後温服赤膜下垂歌赤膜下垂覆睛瞳赤膜從氣下垂風此屬肝肺熱衝眼淚流痛癢如朱紅羚羊知母黄芩黒桔梗柴胡梔子茺註赤膜下垂初患之時氣輪上邊起赤膜一片垂至風輪下覆瞳人縁肝肺之熱衝於眼内致生赤膜淚流痛癢宜服羚羊飲羚羊飲羚羊角一錢五分鎊知母黄芩黒參桔梗柴胡梔子各一錢炒茺蔚子二錢右為粗末以水二盞煎至一盞食後去渣温服黄膜上衝歌黄膜一片氣輪起上衝風輪覆盖瞳赤澁淚眵疼痛極此因脾胃熱風攻通脾㵼胃黄芩黑防軍知母梔膏茺立應白芷羊躑躅鵝不食草麝歸雄註黄膜上衝自氣輪而起一片黄膜從下直衝風輪上掩瞳人乃脾胃風熱上衝於眼致生黄膜淚流赤澁疼痛極甚宜通脾㵼胃湯外㗜立應散通脾㵼胃湯方黄芩一錢五分黒參防風大黄知母炒梔子各一錢炒石膏二錢煆茺蔚子二錢右為粗末以水二盞煎至一盞食逺去渣温服立應散方白芷羊躑躅花減半鵞不食草洗淨晒亁麝香少許當歸雄黄各等分入另研後右為細末每用少許含水㗜鼻内去盡濁涕淚出為度蠏睛疼痛歌蠏睛努出蠏睛形烏珠極痛澁羞明肝膽積熱腎虚熱虚軟不疼實鞕疼實者㵼肝車地骨消黄知母黒柴茺虚宜鎮腎味知地山藥兎辛石决靈註蠏睛之證烏睛努出如豆如珠形似蠏睛疼痛極甚澁淚羞明初起為實鞕而極痛久則為虚軟而不疼總因肝膽積熱衝睛腎中虚熱注目所致實者宜㵼肝湯虚者用鎮腎决明丸瀉肝湯方車前子地骨皮芒硝各一錢大黄知母各一錢半黒參一錢柴胡二錢茺蔚子二錢右為粗末以水二盞煎至八分去渣空心温服鎮腎决明丸方五味子半兩知母炒生地黄山藥各一兩半炒兎絲子一兩細辛半兩石决明一兩煆右為細末煉蜜為丸桐子大空心茶清送三錢旋螺尖起歌旋螺尖起如螺殻烏睛色變極痛疼殻形尖起色青黒肝經積熱血瘀凝輕宜瀉腦防辛梗赤芍天冬五味茺重者瀉肝硝黄桔柴芩知母細車行註旋螺外障氣輪之内烏珠色變青白如螺螄之殻其色初青久黒其形尖圓乃肝經積熱亢極瘀血凝滯所致輕者宜瀉腦湯重者用瀉肝飲子瀉腦湯方防風二錢細辛五分桔梗一錢赤芍藥一錢天門冬一錢去心五味子五分茺蔚子二錢右為粗末以水二盞煎至一盞食後去渣温服㵼肝飲子芒硝大黄桔梗柴胡黄芩知母炒細辛車前子各一錢右為粗末以水二盞煎至一盞食後去渣温服努肉攀睛歌努肉攀睛大眥起初侵風輪久掩瞳或癢或疼漸積厚赤爛多年肺熱壅初起紫金膏㸃效久宜鈎割熨烙攻内服除風湯蔚桔細辛連味大黄風註努肉攀睛之證起於大眥初則漸侵風輪久則掩過瞳人或癢或痛漸漸積厚此證多因赤爛年久或肺經風熱壅盛所致初起可㸃紫金膏努瘀自退久則堅靱難消必湏鈎割熨烙後服除風湯除風湯方茺蔚子一錢桔梗一錢細辛五分黄連一錢五味子五分大黄一錢防風一錢右為末以水二盞煎至一盞食後去渣温服紫金膏方見卷末雞冠蜆肉歌雞冠蜆肉内眥生胃心積熱共肝風或青或赤如雞蜆輕侵風輪重掩瞳鈎割後服抽風桔消黄車黒細芩風茺蔚丸芩石决黒軍苓山藥地黄茺註雞冠蜆肉之證起於睥眥之内或青或赤如雞冠蜆肉之形漸漸而長從大眥侵及風輪久則掩及全目此乃脾胃積熱肝風上衝所致先宜用手法鈎割後服抽風湯或茺蔚丸抽風湯方桔梗一錢芒消一錢五分大黄一錢車前子一錢黒參一錢五分細辛一錢黄芩一錢五分防風右為粗末以水二盞煎至一盞食後去滓溫服茺蔚丸方黄芩一兩石决明一兩煆黒參一兩大黄一兩茯苓一兩山藥二兩炒生地黄一兩五錢茺蔚子二兩右為細末煉蜜為丸桐子大空心茶清下三錢神祟疼痛歌神祟疼痛忽然發胞熱睛疼緣肺肝洗肝散用消黄桔梔子黄芩知母添黑參熱甚加歸地外㸃還宜石燕丹註神祟疼痛之證平素無病忽然發動瞼皮火熱睛珠如刺極痛難當此肺肝風熱上攻於眼不可劆洗宜服酒調洗肝散外㸃石燕丹酒調洗肝散方朴消大黄桔梗梔子黄芩知母炒黒參各等分熱甚者加生地黄當歸尾右為末每服二三錢温酒調下日服二次石燕丹方見卷末突起睛高歌突起睛高珠腫疼風熱毒火上衝睛鍼後退熱桔梗飲消黄茺芍黒芩風還睛五味參苓細山藥車防逺志茺註突起睛髙之證緣風熱火毒上衝於眼疼痛難忍睛珠突髙脹起宜先用鍼出其青涎毒水後服退熱桔梗飲子用還睛丸調理可愈退熱桔梗飲子桔梗芒消大黄茺蔚子白芍藥炒黒參黄芩防風各一錢右為粗末以水二盞煎至一盞食後去渣温服還睛丸方五味子半兩人參二兩茯苓一兩細辛半兩山藥一兩車前子防風逺志茺蔚子各一兩右為細末煉蜜丸桐子大空心茶清送下三錢漏睛膿出歌漏睛膿出瞼眥間或流膿汁或清涎目無翳障不疼痛風熱攻衝心火炎竹葉㵼經湯柴㵼升麻竹葉草車前黄芩草决川羌活苓芍將軍梔子連註漏睛膿出之證生於瞼眥或流膿水或淌清涎目無翳障不疼不痛乃風熱攻衝心火上炎宜用竹葉瀉經湯主之竹葉瀉經湯方柴胡五分澤瀉四分升麻五分青竹葉十片甘草五分炙車前子四分黄芩六分草决明四分川羌活五分白茯苓四分赤芍藥四分大黄六分梔子仁五分炒川黄連五分右為粗末以水二盞煎至一盞食後温服鶻眼凝睛歌鶻眼凝睛睛突定目珠脹鞕痛難當積熱上衝腦熱注外用摩風鍼血良内服瀉肝湯桔蔚柴防芩黒共消黄註鶻眼凝睛之證睛突於外不能動轉堅鞕髙努如鶻眼脹滿疼痛難忍此積熱上衝腦中風熱壅注於目所致宜先用金鍼出血瀉毒外敷摩風膏内服瀉肝湯摩風膏方見卷末瀉肝湯方桔梗茺蔚子柴胡防風