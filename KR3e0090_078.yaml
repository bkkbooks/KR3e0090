甘草五分研細麝香五分氷片五分如法炮製各研極細無聲用好白蜜十五兩入鍋内熬去沫只用白蜜十兩先下爐甘石攪匀次下黄丹攪匀再下諸藥不住手攪匀如紫金色不粘手為度石燕丹方爐甘石爐甘石入大銀罐内鹽泥封固用炭火煅一炷香以罐通紅為度取起為末用黄連水飛過再入黄芩黄連黄蘗湯内將湯煮亁以甘石如松花色四兩硼砂銅杓内同水煮乾石燕琥珀硃砂水飛各取淨末一錢五分鷹屎白一錢如無白丁香代之氷片麝香各分半右為極細末研至無聲每用少許水蘸㸃眼大眥枯澁無淚加熊膽白蜜血翳加真阿魏黄翳加鷄内金風熱翳加蕤仁熱翳加珍珠牛黄冷翳加附子尖雄黄老翳倍硼砂加豬􅏬子摩風膏方黄連細辛當歸杏仁去皮尖為霜防風松脂各五錢白芷黄蠟各一兩麻油四兩先將蠟油溶化前藥共研為細末慢火熬膏貼太陽穴摩障靈光膏方黄連剉如豆大一兩童便浸一宿晒乾為末黄丹三兩水飛當歸二錢酒洗麝香五分乳香五分輕粉一錢磠砂一錢白丁香一錢龍腦一錢海螵蛸一錢細俱另研末爐甘石六兩以黄連一兩煎水淬七次研細先用好白蜜十兩熬五七沸以凈紙搭去蠟面除黄丹外下餘藥用栁木攪匀次下黄丹再攪慢火徐徐攪至紫色却將乳香麝香輕粉磠砂和匀入上藥内以不粘手為度廣大重明湯方防風菊花龍膽草甘草細辛各等分右為粗末水一盞煎半盞去渣帶熱薰洗五膽膏方豬膽汁黄牛膽汁羊膽汁鯉魚膽汁各二錢五分白蜜二兩胡黄連研末青皮研末川黄連研末熊膽各二錢五分右將諸藥末與蜜並膽汁和匀入磁瓶内以細紙封頭牢繫坐飯甑中蒸待飯熟為度御纂醫宗金鑑卷七十八
