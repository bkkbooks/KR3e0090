咳嗽血風勞劫勞散用參苓芍歸地甘耆半味膠注經閉久嗽又見骨蒸潮熱盜汗自汗飲食減少之證則謂之血風勞宜用劫勞散即人參茯苓白术當歸生地甘草黃耆半夏五味子阿膠也婦人經斷復來芩心丸益隂煎經斷復來血熱甚芩心醋丸溫酒吞益隂知蘗龜生地縮砂炙草棗薑尋血多熱去傷衝任十全大補與八珍暴怒憂思肝脾損逍遙歸脾二藥斟注婦人七七四十九嵗後天癸不行若止而復來無他證者乃血有餘不得用藥止之若因血熱者宜芩心丸用黃芩心末二兩醋丸溫酒送下或用益隂煎即知母黃蘗龜板生地縮砂炙草也若血去過多熱隨血去衝任虛損其血不固者宜十全大補湯八珍湯若因怒氣傷肝肝不藏血憂思傷脾脾不攝血者宜於逍遙散歸脾湯二方斟酌用之十全大補湯八珍湯逍遙散歸脾湯俱見前調經門室女師尼寡婦經閉證治大黃䗪蟲丸澤蘭葉湯柏子仁丸室女經閉多血結大黃䗪蟲桃杏仁虻蛭蠐螬甘草芍乾漆生地及黃芩不足澤蘭歸草芍柏子仁丸用柏仁熟地澤蘭牛卷續相兼久服自然行師尼寡婦逍遙散附蘭丹地鬱梔芩注室女經閉多有氣血凝結者宜用大黃䗪蟲丸破血行氣其經自通方用大黃䗪蟲桃仁杏仁虻蟲水蛭蠐螬甘草白芍乾漆生地黃芩蜜丸服若其人虛弱不任攻下則用澤蘭葉湯即澤蘭葉當歸甘草白芍也兼服柏子仁丸方用柏子仁熟地澤蘭葉牛膝卷柏續斷丸服煎丸並進久久其血自行至於師尼寡婦經閉之證多屬鬱熱宜用逍遙散加香附澤蘭葉丹皮生地鬱金黑梔黃芩以和肝理脾清心開鬱其經自通也逍遙散方見前調經門婦病難治諺云婦病不易治蓋以幽居情鬱疑執拗不喜望聞問諱疾忌醫術莫施注寇宗奭曰寧治十男子莫治一婦人謂婦人之病多不易治也蓋以婦人幽居情鬱憂恚愛憎多疑所懷不遂性執偏拗診時又不令醫師觀形望色聞聲問病富貴之家居奧室之中處幃幔之內且復以帕蒙手既不能行望色之神又不能盡切衇之巧未免詳問問之覺繁反謂醫學不精往往並藥不信不知問非易事非精於醫者必不能問也夫望聞問切四者欲去其三即是神醫亦無由施其術也此古今之通患謂之曰婦人不易治不誠然哉診看婦人須先問經期妊娠未診婦人女子病先問經期與妊娠不詳誤藥非細事疑似難明昧所因注未診婦人女子之病必先問經期與有無妊娠若不詳細審問倘用藥誤觸之則所關匪細多變生他證疑似難明豈不昧其病之所因哉經閉門彚方三和湯當歸川芎大黃朴消白芍地黃黃芩梔子連翹薄荷甘草各等分右銼每服八錢水煎服六味地黃湯熟地八錢山萸肉山藥各四錢丹皮澤瀉茯苓各三錢右清水煎服劫勞散白芍六兩黃耆四兩炙甘草炙人參去蘆當歸去蘆酒洗熟地洗淨焙乾五味子阿膠各一兩炒珠右㕮咀每服三錢水一盞生薑七片棗三枚煎至九分溫服無時日三芩心丸用黃芩心枝條者三兩米泔浸七日炙乾又浸又炙如此七次右為末醋丸如桐子大每服七十丸空心溫酒送下日進二服益隂煎生地三錢知母黃蘗各二錢龜板四錢醋炙縮砂仁甘草各一錢炙右銼水煎服大黃䗪蟲丸大黃赤芍生地桃仁杏仁乾漆甘草䗪蟲虻蟲蛭蟲蠐螬黃芩各等分右末煉蜜丸每服丸數量虛實增減澤蘭葉湯澤蘭葉三兩當歸白芍各一兩甘草五錢右為粗末每服五錢水二盞煎一盞溫服柏子仁丸柏子仁炒另研牛膝酒洗卷柏各五錢澤蘭葉續斷各二兩熟地三兩五錢酒浸半日石臼內杵成膏右為細末煉蜜丸如桐子大空心米飲下三十丸御纂醫宗金鑑卷四十四欽定四庫全書御纂醫宗金鑑卷四十四編輯婦科心法要訣調經門婦科總括男婦兩科同一治所異調經崩帶癥嗣育胎前並産後前隂乳疾不相同注婦人諸病本與男子無異故同其治也其異於男子者惟調經經閉帶濁崩漏癥瘕生育子嗣胎前産後諸病及乳疾前隂諸證不相同耳故立婦人一科以分門而詳治焉業是科者必先讀方衇心法諸書然後讀此自有豁然貫通之妙天癸月經之原先天天癸始父母後天精血水穀生女子二七天癸至任通衝盛月事行注先天天癸謂腎間之動氣乃禀自父母資其始也後天精血謂水穀之所化得之形成之後資其生也經曰女子一七而腎氣盛謂腎間動氣盛也二七而天癸至謂先天癸水中之動氣至於女子胞中也衝為血海任主胞胎衝任皆起於胞中所以任衇通太衝衇盛月事以時下故能有子也婦人不孕之故不子之故傷任衝不調帶下經漏崩或因積血胞寒熱痰飲脂膜病子宫注女子不孕之故由傷其任衝也經曰女子二七而天癸至任衇通太衝衇盛月事以時下故能有子若為三因之邪傷其衝任之衇則有月經不調赤白帶下經漏經崩等病生焉或因宿血積於胞中新血不能成孕或因胞寒胞熱不能攝精成孕或因體盛痰多脂膜壅塞胞中而不孕皆當細審其因按證調治自能有子也月經之常月經三旬時一下兩月並月三居經一年一至為避年一生不至孕暗經注女子隂類也以血為主其血上應太隂下應海潮月有盈虧潮有朝夕月經三旬一下與之相符故又謂之月水月信也女子月經一月一行者其常也或先或後乃其病也然亦有兩月一行謂之並月者有三月一行謂之居經者有一年一行謂之避年者有一生不行而依然能孕育謂之暗經者此所禀之不同而亦非病不須治也月經異常經期吐血或衄血上溢妄行曰逆經受孕行經曰垢胎受孕下血漏胎名注婦女月經一月一下此其常也若經行而吐血衄血上溢妄行者是謂逆經有受孕之後月月行經而産子者是謂垢胎有受孕數月其血忽下而胎不隕者是謂漏胎此皆月經之異乎常者也外因經病天地溫和經水安寒凝熱沸風蕩然邪入胞中任衝損婦人經病本同參注經曰天地溫和則經水安靜天寒地凍則經水凝泣天暑地熱則經水沸溢卒風暴起則經水波湧而隴起六淫之邪入於胞中則損傷衝任故婦人經病本此同參也如寒則血凝熱則血沸風則血蕩然波湧而大下亦猶經水之被寒熱風而不得安瀾也內因經病婦人從人不専主病多憂忿鬱傷情血之行止與順逆皆由一氣率而行注婦人從人凡事不得専主憂思忿怒鬱氣所傷故經病因於七情者居多蓋以血之行止順逆皆由一氣率之而行也不內外因經病血者水穀之精氣若傷脾胃何以生不調液竭血枯病合之非道損傷成注血者水穀之精氣也在男子則化為精在婦人則化為血上為乳汁下為月水若內傷脾胃健運失職飲食減少血無以生則經必不調亦有女子天癸既至踰期不得與男子合未期思與男子合與夫經正行時而合此皆合之非道亦致不調或過淫合多則液竭産多乳衆則血枯亦皆能損傷隂血致成經病也血色不正病因血從陽化色正紅色變紫黑熱之徴黃泔淡紅濕虛化更審瘀塊黯與明注血屬隂從陽化故其色以正紅為正雖有經病亦易為治也若色變深紅紫黑乃熱之徴也或黃如米泔乃濕化也淺淡紅白乃虛象也更當審其有瘀有塊色黯色明以治之若黯而紫黑兼見冷證多屬寒凝若明而紫黑兼見熱證多屬熱結也氣穢清濁病因熱化稠黏臭必穢寒化清徹臭則腥內潰五色有臟氣時下而多命必傾注凡血為熱所化則必稠黏臭穢為寒所化則必清徹臭腥若是內潰則所下之物雜見五色似乎膿血若更有臟腐敗氣且時下不止而多者是危證也其命必傾矣愆期前後多少經來前後為愆期前熱後滯有虛實淡少為虛不脹痛紫多脹痛屬有餘注經來或前或後謂之愆期皆屬經病經來往前趕日不足三旬者屬血熱若下血多色深紅而濁則為有餘之熱若下血少色淺淡而清則為不足之熱也經來往後退日過三旬後者屬血滯若色淺淡血少不脹痛者則屬氣虛血少澀滯不足之病若色紫血多腹脹痛者則屬氣實血多瘀滯有餘之病也經行發熱時熱經行發熱時潮熱經前血熱經後虛發熱無時察客熱潮熱午後審隂虛注經行發熱時熱潮熱之病若在經前則為血熱之熱經後則為血虛之熱發熱時熱多是外感須察客邪之熱午後潮熱多屬裏熱當審隂虛之熱也經行寒熱身痛經來寒熱身體痛當分榮衛與虛實有汗不脹衛不足無汗而脹榮有餘注經來之時惡寒發熱身體疼痛者當分榮衛虛實若發熱惡寒身痛不脹而有汗者屬衛虛榮不足若發熱惡寒身脹痛而無汗者屬榮實衛有餘也經行腹痛腹痛經後氣血弱痛在經前氣血凝氣滯腹脹血滯痛更審虛實寒熱情注凡經來腹痛在經後痛則為氣血虛弱經前痛則為氣血凝滯若因氣滯血者則多脹滿因血滯氣者則多疼痛更當審其凝滯作脹痛之故或因虛因實因寒因熱而分治之也經行瀉吐經行泄瀉是脾虛鴨溏清痛乃寒濕胃弱飲傷多嘔飲食傷必痛吐其食注經行泄瀉乃脾虛也若鴨溏冷痛是寒濕也經行嘔吐是胃弱也若嘔出涎飲則是傷飲若吐出食物則是傷食然傷食者多痛而吐食傷飲者不痛而嘔飲也錯經妄行成吐衄崩逆行吐血錯行崩熱傷隂陽絡妄行血多熱去當用補血少雖虛須主清注婦女經血逆行上為吐血衄血及錯行下為崩血者皆因熱盛也傷隂絡則下行為崩傷陽絡則上行為吐衄也若去血過多則熱隨血去當以補為主如血少熱尚未減雖虛仍當以清為主也經水過多兼時下白帶多清淺淡虛不攝稠黏深紅熱有餘兼帶時下濕熱穢形清腥穢冷濕虛注經水過多清稀淺紅乃氣虛不能攝血也若稠黏深紅則為熱盛有餘或經之前後兼赤白帶而時下臭穢乃濕熱腐化也若形清腥穢乃濕瘀寒虛所化也調經證治四君子湯異功散六君子湯香砂六君子湯七味白术散參苓白术散歸脾湯逍遙散八珍湯十全大補湯雙和飲養榮湯理中湯補養元氣四君子參苓术草棗生薑異功加陳兼理氣虛痰橘半六君湯嘔吐香砂六君子渴瀉七味藿葛香脾瀉參苓白术散薏桔山蓮砂扁方思慮傷脾損心血歸脾歸耆棗逺香減參加柴歸芍薄逍遙調肝理脾方合物八珍兼補血耆桂十全大補湯去參苓术雙和飲去芎加陳養榮湯脾胃虛寒吐且瀉理中減苓加乾薑注四君子湯補養元氣虛弱通用之方即人參茯苓白术灸草引用棗薑也異功散是於補氣中兼理其氣即四君子湯加陳皮也六君子湯治脾虛痰飲即四君子湯加橘紅半夏也香砂六君子湯治胃虛嘔吐即六君子湯加藿香砂仁也七味白术散治脾虛渴瀉即四君子湯加藿香葛根木香也參苓白术散治脾胃虛瀉即四君子湯加薏苡桔梗山藥蓮肉砂仁扁豆也歸脾湯治思慮損傷心脾氣血即四君子加當歸黃耆棗仁逺志木香也逍遙散調肝理脾即四君子湯減人參加柴胡當歸白芍薄荷也八珍湯於補氣中兼補其血即四君子湯合四物湯也十全大補湯大補氣血即八珍湯加黃耆肉桂也雙和飲平補氣血即十全大補湯減人參茯苓白术也人參養榮湯於補氣中專養榮血即十全大補湯減川芎加陳皮也理中湯治脾胃虛寒吐瀉即四君子湯去茯苓加乾薑也四物湯桂枝四物湯麻黃四物湯柴胡四物湯玊燭散婦人血病主四物歸芎白芍熟地黃血瘀改以赤芍藥血熱易用生地黃表熱有汗合桂草表熱無汗合麻黃少陽寒熱小柴並陽明熱合調胃湯注四物湯乃婦人經産一切血病通用之方故主之也其方即當歸川芎白芍藥熟地黃凡血瘀俱減白芍藥改用赤芍藥破之血熱俱去熟地黃易用生地黃涼之風感太陽衛分發熱有汗夲方合桂枝湯以桂枝甘草解之名桂枝四物湯寒傷太陽榮分發熱無汗本方合麻黃湯以麻黃杏仁桂枝甘草發之名麻黃四物湯邪傳少陽半表半裏往來寒熱本方