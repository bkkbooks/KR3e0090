  text: 編輯婦科心法要訣目録調經門婦科總括天癸月經之原婦人不孕之故月經之常月經異常外因經病內因經病不內外因經病血色不正病因氣穢清濁病因愆期前後多少病因經行發熱時熱經行寒熱身痛經行腹痛經行瀉吐錯經妄行成吐衄崩經水過多兼時下白帶調經證治四君子湯異功散六君子湯香砂六君子湯七味白术散參苓白术散歸脾湯逍遙散八珍湯十全大補湯雙和飲人參養榮湯理中湯四物湯桂枝四物湯麻黃四物湯柴胡四物湯玉燭散先期證治芩連四物湯地骨皮飲膠艾四物湯芩术四物湯桃紅四物湯當歸補血湯聖愈湯薑芩四物湯佛手散過期證治過期飲雙和飲聖愈湯人參養榮湯經行發熱時熱證治加味地骨皮飲六神湯逍遙散經行寒熱身痛證治羌桂四物湯逍遙散黃耆建中湯經行腹痛證治當歸建中湯加味烏藥湯琥珀散大溫經湯吳茱萸湯經行吐瀉證治參苓白术散理中湯七味白术散香砂六君子湯錯經妄行吐衄崩證治三黃四物湯犀角地黃湯經閉門血滯經閉血虧經閉血枯經閉經閉久嗽成勞婦人經斷復來室女經來復止師尼室寡經閉血滯經閉證治三和湯吳茱萸湯琥珀散四物湯血枯血虧經閉證治六味地黃湯玊燭散養榮湯十全大補湯經閉久嗽成勞證治劫勞散婦人經斷復來證治芩心丸益隂煎十全大補湯八珍湯逍遙散歸脾湯室女師尼寡婦經閉證治大黃䗪蟲丸澤蘭葉湯柏子仁丸逍遙散婦病難治診看婦人須先問經期妊娠御纂醫宗金鑑卷四十四目録欽定四庫全書御纂醫宗金鑑卷四十四編輯婦科心法要訣目録調經門婦科總括天癸月經之原婦人不孕之故月經之常月經異常外因經病內因經病不內外因經病血色不正病因氣穢清濁病因愆期前後多少病因經行發熱時熱經行寒熱身痛經行腹痛經行瀉吐錯經妄行成吐衄崩經水過多兼時下白帶調經證治四君子湯異功散六君子湯香砂六君子湯七味白术散參苓白术散歸脾湯逍遙散八珍湯十全大補湯雙和飲人參養榮湯理中湯四物湯桂枝四物湯麻黃四物湯柴胡四物湯玉燭散先期證治芩連四物湯地骨皮飲膠艾四物湯芩术四物湯桃紅四物湯當歸補血湯聖愈湯薑芩四物湯佛手散過期證治過期飲雙和飲聖愈湯人參養榮湯經行發熱時熱證治加味地骨皮飲六神湯逍遙散經行寒熱身痛證治羌桂四物湯逍遙散黃耆建中湯經行腹痛證治當歸建中湯加味烏藥湯琥珀散大溫經湯吳茱萸湯經行吐瀉證治參苓白术散理中湯七味白术散香砂六君子湯錯經妄行吐衄崩證治三黃四物湯犀角地黃湯經閉門血滯經閉血虧經閉血枯經閉經閉久嗽成勞婦人經斷復來室女經來復止師尼室寡經閉血滯經閉證治三和湯吳茱萸湯琥珀散四物湯血枯血虧經閉證治六味地黃湯玊燭散養榮湯十全大補湯經閉久嗽成勞證治劫勞散婦人經斷復來證治芩心丸益隂煎十全大補湯八珍湯逍遙散歸脾湯室女師尼寡婦經閉證治大黃䗪蟲丸澤蘭葉湯柏子仁丸逍遙散婦病難治診看婦人須先問經期妊娠御纂醫宗金鑑卷四十四目録欽定四庫全書御纂醫宗金鑑卷四十四編輯婦科心法要訣調經門婦科總括男婦兩科同一治所異調經崩帶癥嗣育胎前並産後前隂乳疾不相同注婦人諸病本與男子無異故同其治也其異於男子者惟調經經閉帶濁崩漏癥瘕生育子嗣胎前産後諸病及乳疾前隂諸證不相同耳故立婦人一科以分門而詳治焉業是科者必先讀方衇心法諸書然後讀此自有豁然貫通之妙天癸月經之原先天天癸始父母後天精血水穀生女子二七天癸至任通衝盛月事行注先天天癸謂腎間之動氣乃禀自父母資其始也後天精血謂水穀之所化得之形成之後資其生也經曰女子一七而腎氣盛謂腎間動氣盛也二七而天癸至謂先天癸水中之動氣至於女子胞中也衝為血海任主胞胎衝任皆起於胞中所以任衇通太衝衇盛月事以時下故能有子也婦人不孕之故不子之故傷任衝不調帶下經漏崩或因積血胞寒熱痰飲脂膜病子宫注女子不孕之故由傷其任衝也經曰女子二七而天癸至任衇通太衝衇盛月事以時下故能有子若為三因之邪傷其衝任之衇則有月經不調赤白帶下經漏經崩等病生焉或因宿血積於胞中新血不能成孕或因胞寒胞熱不能攝精成孕或因體盛痰多脂膜壅塞胞中而不孕皆當細審其因按證調治自能有子也月經之常月經三旬時一下兩月並月三居經一年一至為避年一生不至孕暗經注女子隂類也以血為主其血上應太隂下應海潮月有盈虧潮有朝夕月經三旬一下與之相符故又謂之月水月信也女子月經一月一行者其常也或先或後乃其病也然亦有兩月一行謂之並月者有三月一行謂之居經者有一年一行謂之避年者有一生不行而依然能孕育謂之暗經者此所禀之不同而亦非病不須治也月經異常經期吐血或衄血上溢妄行曰逆經受孕行經曰垢胎受孕下血漏胎名注婦女月經一月一下此其常也若經行而吐血衄血上溢妄行者是謂逆經有受孕之後月月行經而産子者是謂垢胎有受孕數月其血忽下而胎不隕者是謂漏胎此皆月經之異乎常者也外因經病天地溫和經水安寒凝熱沸風蕩然邪入胞中任衝損婦人經病本同參注經曰天地溫和則經水安靜天寒地凍則經水凝泣天暑地熱則經水沸溢卒風暴起則經水波湧而隴起六淫之邪入於胞中則損傷衝任故婦人經病本此同參也如寒則血凝熱則血沸風則血蕩然波湧而大下亦猶經水之被寒熱風而不得安瀾也內因經病婦人從人不専主病多憂忿鬱傷情血之行止與順逆皆由一氣率而行注婦人從人凡事不得専主憂思忿怒鬱氣所傷故經病因於七情者居多蓋以血之行止順逆皆由一氣率之而行也不內外因經病血者水穀之精氣若傷脾胃何以生不調液竭血枯病合之非道損傷成注血者水穀之精氣也在男子則化為精在婦人則化為血上為乳汁下為月水若內傷脾胃健運失職飲食減少血無以生則經必不調亦有女子天癸既至踰期不得與男子合未期思與男子合與夫經正行時而合此皆合之非道亦致不調或過淫合多則液竭産多乳衆則血枯亦皆能損傷隂血致成經病也血色不正病因血從陽化色正紅色變紫黑熱之徴黃泔淡紅濕虛化更審瘀塊黯與明注血屬隂從陽化故其色以正紅為正雖有經病亦易為治也若色變深紅紫黑乃熱之徴也或黃如米泔乃濕化也淺淡紅白乃虛象也更當審其有瘀有塊色黯色明以治之若黯而紫黑兼見冷證多屬寒凝若明而紫黑兼見熱證多屬熱結也氣穢清濁病因熱化稠黏臭必穢寒化清徹臭則腥內潰五色有臟氣時下而多命必傾注凡血為熱所化則必稠黏臭穢為寒所化則必清徹臭腥若是內潰則所下之物雜見五色似乎膿血若更有臟腐敗氣且時下不止而多者是危證也其命必傾矣愆期前後多少經來前後為愆期前熱後滯有虛實淡少為虛不脹痛紫多脹痛屬有餘注經來或前或後謂之愆期皆屬經病經來往前趕日不足三旬者屬血熱若下血多色深紅而濁則為有餘之熱若下血少色淺淡而清則為不足之熱也經來往後退日過三旬後者屬血滯若色淺淡血少不脹痛者則屬氣虛血少澀滯不足之病若色紫血多腹脹痛者則屬氣實血多瘀滯有餘之病也經行發熱時熱經行發熱時潮熱經前血熱經後虛發熱無時察客熱潮熱午後審隂虛注經行發熱時熱潮熱之病若在經前則為血熱之熱經後則為血虛之熱發熱時熱多是外感須察客邪之熱午後潮熱多屬裏熱當審隂虛之熱也經行寒熱身痛經來寒熱身體痛當分榮衛與虛實有汗不脹衛不足無汗而脹榮有餘注經來之時惡寒發熱身體疼痛者當分榮衛虛實若發熱惡寒身痛不脹而有汗者屬衛虛榮不足若發熱惡寒身脹痛而無汗者屬榮實衛有餘也經行腹痛腹痛經後氣血弱痛在經前氣血凝氣滯腹脹血滯痛更審虛實寒熱情注凡經來腹痛在經後痛則為氣血虛弱經前痛則為氣血凝滯若因氣滯血者則多脹滿因血滯氣者則多疼痛更當審其凝滯作脹痛之故或因虛因實因寒因熱而分治之也經行瀉吐經行泄瀉是脾虛鴨溏清痛乃寒濕胃弱飲傷多嘔飲食傷必痛吐其食注經行泄瀉乃脾虛也若鴨溏冷痛是寒濕也經行嘔吐是胃弱也若嘔出涎飲則是傷飲若吐出食物則是傷食然傷食者多痛而吐食傷飲者不痛而嘔飲也錯經妄行成吐衄崩逆行吐血錯行崩熱傷隂陽絡妄行血多熱去當用補血少雖虛須主清注婦女經血逆行上為吐血衄血及錯行下為崩血者皆因熱盛也傷隂絡則下行為崩傷陽絡則上行為吐衄也若去血過多則熱隨血去當以補為主如血少熱尚未減雖虛仍當以清為主也經水過多兼時下白帶多清淺淡虛不攝稠黏深紅熱有餘兼帶時下濕熱穢形清腥穢冷濕虛注經水過多清稀淺紅乃氣虛不能攝血也若稠黏深紅則為熱盛有餘或經之前後兼赤白帶而時下臭穢乃濕熱腐化也若形清腥穢乃濕瘀寒虛所化也調經證治四君子湯異功散六君子湯香砂六君子湯七味白术散參苓白术散歸脾湯逍遙散八珍湯十全大補湯雙和飲養榮湯理中湯補養元氣四君子參苓术草棗生薑異功加陳兼理氣虛痰橘半六君湯嘔吐香砂六君子渴瀉七味藿葛香脾瀉參苓白术散薏桔山蓮砂扁方思慮傷脾損心血歸脾歸耆棗逺香減參加柴歸芍薄逍遙調肝理脾方合物八珍兼補血耆桂十全大補湯去參苓术雙和飲去芎加陳養榮湯脾胃虛寒吐且瀉理中減苓加乾薑注四君子湯補養元氣虛弱通用之方即人參茯苓白术灸草引用棗薑也異功散是於補氣中兼理其氣即四君子湯加陳皮也六君子湯治脾虛痰飲即四君子湯加橘紅半夏也香砂六君子湯治胃虛嘔吐即六君子湯加藿香砂仁也七味白术散治脾虛渴瀉即四君子湯加藿香葛根木香也參苓白术散治脾胃虛瀉即四君子湯加薏苡桔梗山藥蓮肉砂仁扁豆也歸脾湯治思慮損傷心脾氣血即四君子加當歸黃耆棗仁逺志木香也逍遙散調肝理脾即四君子湯減人參加柴胡當歸白芍薄荷也八珍湯於補氣中兼補其血即四君子湯合四物湯也十全大補湯大補氣血即八珍湯加黃耆肉桂也雙和飲平補氣血即十全大補湯減人參茯苓白术也人參養榮湯於補氣中專養榮血即十全大補湯減川芎加陳皮也理中湯治脾胃虛寒吐瀉即四君子湯去茯苓加乾薑也四物湯桂枝四物湯麻黃四物湯柴胡四物湯玊燭散婦人血病主四物歸芎白芍熟地黃血瘀改以赤芍藥血熱易用生地黃表熱有汗合桂草表熱無汗合麻黃少陽寒熱小柴並陽明熱合調胃湯注四物湯乃婦人經産一切血病通用之方故主之也其方即當歸川芎白芍藥熟地黃凡血瘀俱減白芍藥改用赤芍藥破之血熱俱去熟地黃易用生地黃涼之風感太陽衛分發熱有汗夲方合桂枝湯以桂枝甘草解之名桂枝四物湯寒傷太陽榮分發熱無汗本方合麻黃湯以麻黃杏仁桂枝甘草發之名麻黃四物湯邪傳少陽半表半裏往來寒熱本方合小柴胡湯以柴胡黃芩半夏人參甘草和之名柴胡四物湯邪傳陽明裏熱便結本方合調胃承氣湯以大黃朴消甘草下之名玊燭散先期證治芩連四物湯地骨皮飲膠艾四物湯芩术四物湯桃紅四物湯當歸補血湯聖愈湯薑芩四物湯佛手散芎歸湯先期實熱物芩連虛熱地骨皮飲丹血多膠艾熱芩术逐瘀桃紅紫塊黏血少淺淡虛不攝當歸補血歸耆先虛甚參耆聖愈補熱滯薑