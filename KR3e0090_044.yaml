甚則爍其血血海乾枯故月事不下宜以玉燭散泄其胃熱則經血自行若因素有吐衄之證或生育過多則血海乾枯及房勞過傷隂血乳衆傷其血液皆足以致經閉失血多者宜養榮湯主之房勞過者以六味地黃湯滋之即山萸山藥白茯苓丹皮澤瀉熟地黃也乳衆者以十全大補湯培補之玊燭散養榮湯十全大補湯俱見前調經門經閉久嗽成勞證治劫勞散月水不行蒸潮汗食減咳嗽血風勞劫勞散用參苓芍歸地甘耆半味膠注經閉久嗽又見骨蒸潮熱盜汗自汗飲食減少之證則謂之血風勞宜用劫勞散即人參茯苓白术當歸生地甘草黃耆半夏五味子阿膠也婦人經斷復來芩心丸益隂煎經斷復來血熱甚芩心醋丸溫酒吞益隂知蘗龜生地縮砂炙草棗薑尋血多熱去傷衝任十全大補與八珍暴怒憂思肝脾損逍遙歸脾二藥斟注婦人七七四十九嵗後天癸不行若止而復來無他證者乃血有餘不得用藥止之若因血熱者宜芩心丸用黃芩心末二兩醋丸溫酒送下或用益隂煎即知母黃蘗龜板生地縮砂炙草也若血去過多熱隨血去衝任虛損其血不固者宜十全大補湯八珍湯若因怒氣傷肝肝不藏血憂思傷脾脾不攝血者宜於逍遙散歸脾湯二方斟酌用之十全大補湯八珍湯逍遙散歸脾湯俱見前調經門室女師尼寡婦經閉證治大黃䗪蟲丸澤蘭葉湯柏子仁丸室女經閉多血結大黃䗪蟲桃杏仁虻蛭蠐螬甘草芍乾漆生地及黃芩不足澤蘭歸草芍柏子仁丸用柏仁熟地澤蘭牛卷續相兼久服自然行師尼寡婦逍遙散附蘭丹地鬱梔芩注室女經閉多有氣血凝結者宜用大黃䗪蟲丸破血行氣其經自通方用大黃䗪蟲桃仁杏仁虻蟲水蛭蠐螬甘草白芍乾漆生地黃芩蜜丸服若其人虛弱不任攻下則用澤蘭葉湯即澤蘭葉當歸甘草白芍也兼服柏子仁丸方用柏子仁熟地澤蘭葉牛膝卷柏續斷丸服煎丸並進久久其血自行至於師尼寡婦經閉之證多屬鬱熱宜用逍遙散加香附澤蘭葉丹皮生地鬱金黑梔黃芩以和肝理脾清心開鬱其經自通也逍遙散方見前調經門婦病難治諺云婦病不易治蓋以幽居情鬱疑執拗不喜望聞問諱疾忌醫術莫施注寇宗奭曰寧治十男子莫治一婦人謂婦人之病多不易治也蓋以婦人幽居情鬱憂恚愛憎多疑所懷不遂性執偏拗診時又不令醫師觀形望色聞聲問病富貴之家居奧室之中處幃幔之內且復以帕蒙手既不能行望色之神又不能盡切衇之巧未免詳問問之覺繁反謂醫學不精往往並藥不信不知問非易事非精於醫者必不能問也夫望聞問切四者欲去其三即是神醫亦無由施其術也此古今之通患謂之曰婦人不易治不誠然哉診看婦人須先問經期妊娠未診婦人女子病先問經期與妊娠不詳誤藥非細事疑似難明昧所因注未診婦人女子之病必先問經期與有無妊娠若不詳細審問倘用藥誤觸之則所關匪細多變生他證疑似難明豈不昧其病之所因哉經閉門彚方三和湯當歸川芎大黃朴消白芍地黃黃芩梔子連翹薄荷甘草各等分右銼每服八錢水煎服六味地黃湯熟地八錢山萸肉山藥各四錢丹皮澤瀉茯苓各三錢右清水煎服劫勞散白芍六兩黃耆四兩炙甘草炙人參去蘆當歸去蘆酒洗熟地洗淨焙乾五味子阿膠各一兩炒珠右㕮咀每服三錢水一盞生薑七片棗三枚煎至九分溫服無時日三芩心丸用黃芩心枝條者三兩米泔浸七日炙乾又浸又炙如此七次右為末醋丸如桐子大每服七十丸空心溫酒送下日進二服益隂煎生地三錢知母黃蘗各二錢龜板四錢醋炙縮砂仁甘草各一錢炙右銼水煎服大黃䗪蟲丸大黃赤芍生地桃仁杏仁乾漆甘草䗪蟲虻蟲蛭蟲蠐螬黃芩各等分右末煉蜜丸每服丸數量虛實增減澤蘭葉湯澤蘭葉三兩當歸白芍各一兩甘草五錢右為粗末每服五錢水二盞煎一盞溫服柏子仁丸柏子仁炒另研牛膝酒洗卷柏各五錢澤蘭葉續斷各二兩熟地三兩五錢酒浸半日石臼內杵成膏右為細末煉蜜丸如桐子大空心米飲下三十丸御纂醫宗金鑑卷四十四
