body:
  text: 訂正傷寒論注目録平衇法篇辨衇法篇御纂醫宗金鑑卷十六目録欽定四庫全書御纂醫宗金鑑卷十六訂正傷寒論注目録平衇法篇辨衇法篇御纂醫宗金鑑卷十六目録欽定四庫全書御纂醫宗金鑑卷十六訂正仲景全書傷寒論注平衇法平衇者平人不病之衇也如四時平衇五藏平衇隂陽同等平衇之類是也人病則衇不得其平矣如四時太過不及隂陽藏府相乘相侮及百病相錯生死不平之衇之類是也平者又凖之謂也言診者誠能以諸平衇凖諸不平之衇則凡太過不及之差呼吸尺寸之乖莫不了然于心手之間而無少差謬然後可以傷寒之衇凖諸壞病亦可以諸壞病之衇凖之傷寒誠所謂一以貫之而無餘者已問曰衇有三部隂陽相乘榮衛血氣在人體躬呼吸出入上下於中因息遊布津液流通隨時動作效象形容春弦秋浮冬沉夏洪察色觀衇大小不同一時之間變無經常尺寸參差或短或長上下乖錯或存或亡病輒改易進退低昻心迷意惑動失紀綱願為具陳令得分明師曰子之所問道之根源衇有三部尺寸及關榮衛流行不失衡銓腎沉心洪肺浮肝弦此自經常不失銖分出入升降漏刻周旋水下二刻一周循環當復寸口虛實見焉變化相乘隂陽相干風則浮虛寒則牢堅沉潛水滀支飲急弦動則為痛數則熱煩設有不應知變所緣三部不同病各異端太過可怪不及亦然邪不空見終必有奸審察表裏三焦别焉知其所舍消息診看料度藏府獨見若神為子條記傳與賢人注此總叙平衇之根源借問答以示其法也衇者血之府氣血流行之動㑹也三部者寸為上部關為中部尺為下部也三部既定隂陽屬焉上部為陽下部為隂隂陽平則相易陰陽偏則相乘相易則和相乘則病人之體躬衛統氣而行衇外榮統血而行衇中故凡呼吸出入上下于中莫不因息以遊布于四體隨津液而流通於周身故隨時動作而效象夫衇之形容也察色察五藏之色也肝青心赤肺白腎黑脾黃各以其色合乎藏然四藏又皆以黃色為主他色為兼以土寄旺于四季也觀衇觀五藏之衇也肝弦心洪肺浮腎沉脾緩各以其衇主乎藏然四藏又皆以緩衇為本蓋人以胃氣為本也其間色或參差相錯衇或大小相乖一時之間變無常經病輒改易或存或亡無定象也師曰子之所問衇為醫道之根源當以平旦復㑹于寸口之時診之而虛實見焉寸口衇浮無力為虛為風牢堅有力為實為寒衇沉為水滀衇弦為支飲衇動為痛衇數為熱設或病衇不應則於其三部太過不及隂陽變化相乘之理消息診看料度藏府則順逆吉凶自然獨見若神也師曰呼吸者衇之頭也注人一呼衇再動一吸衇再動呼吸定息衇四動乃平人不病之緩衇也閏以太息故五動亦為平衇非呼吸不能定其至數持衇時必從此始故曰呼吸者衇之頭也集注方有執曰呼者氣之出衇之來也吸者氣之入衇之去也頭頭緒也衇隨氣之出入來去名狀雖多呼吸則其源頭也然衇有二此以尺寸之衇言若以周身言之則循環無端渾然不斷無頭尾之可言學者當識之也初持衇來疾去遲此出疾入遲名曰內虛外實也初持衇來遲去疾此出遲入疾名曰內實外虛也注此初持衇以來去疾遲而診表裏虛實法也來衇出來陽也故以候表去衇入去隂也故以候裏疾衇數疾有餘也故以候實遲衇徐遲不足也故以候虛言衇若出來疾入去遲為表實裏虛故名曰內虛外實也衇若出來遲入去疾為表虛裏實故名曰內實外虛也集注方有執曰來者自骨肉之分而出于皮膚之際氣之升而上也去者自皮膚之際而還於骨肉之間氣之降而下也出呼而來也入吸而去也經曰來者為陽去者為隂疾為陽太過也遲為隂不及也內虛外實者隂不及而陽太過也內實外虛者隂太過而陽不及也故來去出入者衇之大關鍵也內外虛實者病之大綱領也知內外之隂陽而辨其孰為虛孰為實者診家之切要也假令衇來微去大故名反病在裏也衇來頭小本大故名覆病在表也上微頭小者則汗出下微本大者則為關格不通不得尿頭無汗者可治有汗者死按衇來頭小本大者當是衇來大去小上微頭小者當是上微小者為隂盛下微本大者當是下微小者為陽盛始與上下之義相屬注上以衇之來去疾遲候內外虛實之診此以衇之來去大小診表裏盛衰之病衇上來微小下去反大反之象也故名曰反衇上來益大下去微小覆之象也故名曰覆反者病在裏為隂盛覆者病在表為陽盛陽盛則病格隂盛則病關隂陽盛極不相交通則病關格頭無汗者陽未離隂故可治有汗則陽已上脫故曰死也寸口衛氣盛名曰髙榮氣盛名曰章髙章相搏名曰綱衛氣弱名曰惵榮氣弱名曰卑惵卑相搏名曰損衛氣和名曰緩榮氣和名曰遲遲緩相搏名曰沉按名曰沉之沉字當是强字玩下文自知注此詳上條衇之來去盛衰之狀也寸口通指寸關尺而言也衛主氣為陽以候表榮主血為隂以候裏衇隨指有力上來衛氣盛也謂之髙脈隨指有力下去榮氣盛也謂之章髙者長盛也章者分眀也髙章相合名曰綱綱者以榮衛俱有餘有總攬之意也衇隨指無力上來衛氣弱也謂之惵衇隨指無力下去榮氣弱也謂之卑惵者恍惚也卑者縮下也惵卑相合名曰損損者以榮衛俱不足有消縮之意也若髙章惵卑之衇與不疾不徐緩遲之衇同見則為盛者不過弱者不衰皆名和衇强者即下文所著是也寸口衇緩而遲緩則陽氣長其色鮮其顔光其聲商毛髮長遲則隂氣盛骨髓生血滿肌肉緊薄鮮鞕隂陽相抱榮衛俱行剛柔相得名曰强也按薄鮮鞕三字不成句應是衍文當刪之注此承上條以釋强字之義言凡人禀陽氣盛則得髙章之盛禀隂氣盛則得惵卑之弱此平人之常若能兼見緩遲平衇斯為隂陽相抱榮衛相和始名曰强强者即色鮮顔光血滿肉緊之謂也集注方有執曰緩以候胃遲以候脾陽氣長者言胃氣有餘也顔色聲音毛髮皆陽也鮮麗也光輝也商清也長美也形容胃陽之有餘也隂氣盛者言脾氣充足也骨髓生血衇滿肌肉緊骨髓血肉皆隂也形容脾隂之充足也相抱言和洽也俱行言周流也相搏言合一也極言二氣得其和平皆由脾胃盈餘之所致必如此則其人之健旺而强壯可知故曰强也師曰衇肥人責浮瘦人責沉肥人當沉今反浮瘦人當浮今反沉故責之注上條以衇之盛衰候人之强弱此條以衇之浮中沉分人之皮衇肉筋骨以候五藏之診法也心肺俱浮肝腎俱沉以皮之浮衇之浮而别心肺之浮也以筋之沉骨之沉而别肝腎之沉也脾主肌肉在浮沉之間故候中也肥人肌膚厚衇當沉瘦人肌膚薄衇當浮今肥人衇反浮瘦人衇反沉故當責其病在何藏也集注方有執曰責求也肥人當沉者肌膚厚其衇深也故求其病于浮瘦人當浮者肌膚薄其衇淺也故求其病于沉問曰經說衇有三菽六菽重者何謂也師曰衇人以指按之如三菽之重者肺氣也如六菽之重者心氣也如九菽之重者脾氣也如十二菽之重者肝氣也按之至骨者腎氣也假令下利寸口關上尺中悉不見衇然尺中時一小見衇再舉頭者腎氣也若見損衇來至為難治注此承上條詳言皮衇肉筋骨各有所主以候五藏之病也菽豆也約略輕重言之非謂有其形也難經曰如三菽之重與皮毛相得者肺部也六菽之重與血衇相得者心部也九菽之重與肌肉相等者脾部也十二菽之重與筋平者肝部也按之至骨舉之來疾者腎部也各隨所主之部以候藏氣也至于寸口關上尺中亦各有所主之位以候藏氣左寸心也右寸肺也左關肝也右關脾也尺中腎也今特舉腎藏之部例之以概其餘也假令下利而甚元氣暴奪于中寸口關上尺中全不見衇法當死其不死者必是尺中時有一小見之衇也再舉頭者謂一呼再起頭一吸再起頭合為四至也夫尺中時一小見之衇四至則是腎間生氣之源未絶即下利未止尚為易治若一息二至名曰損衇是氣衰無胃故為難治也集注程知曰難經三菽六菽之說蓋言下指輕重有差等以候五藏之氣也又云下利寸口關上尺中悉不見衇者是胃之陽氣已絶也難經以損衇為陽氣下脫之衇故曰損衇至為難治也寸口衇浮為在表沉為在裏數為在府遲為在藏假令衇遲此為在藏也注寸口通指三部言也此以浮沉遲數候人表裏藏府之診法也浮者皮膚取而得之衇也浮主表故曰浮為在表沉者筋骨取而得之衇也沉主裏故曰沉為在裏數者一息六至之衇也數主陽府屬陽故曰數為在府遲者一息三至之衇也遲主隂藏屬隂故曰遲為在藏假令診其人衇遲此為病在藏舉一遲衇以例其餘也集注程知曰軀殼之外榮衛為表軀殼之內藏府為裏故以浮沉别之諸陽雖皆屬府諸隂雖皆屬藏當以遲數别之然傷寒中之傳變亦有數而入藏遲而入府者熟讀經文自知也張璐曰此以浮沉遲數定表裏藏府而全重于遲為在藏句故重申以明之設衇見浮遲雖有表證祗以小建中和之終非麻黃青龍所宜以藏氣本虛也陽衇浮大而濡隂衇浮大而濡隂衇與陽衇同等者名曰緩也注此以隂陽同等發明平人和緩之衇也陽衇浮大而濡隂衇浮大而濡謂浮中沉隂陽同等也名曰緩者謂和緩之衇也然緩衇有二義和緩之緩衇有力濡柔不大不小以形狀之緩驗二氣之和也至數之緩衇來四至從容不徐不疾以至數之緩驗胃氣之和也集注方有執曰緩有二義此以相兼言蓋謂氣血和平也程知曰緩有和緩之義寬緩之義與浮大相類不與遲相類故經謂之浮大而濡不曰浮大而遲也蓋衇之遲數以至數言緩急以形狀言耳張璐曰衇雖浮大而濡按之仍不絶者為緩若按之即無是虛衇非緩衇也問曰東方肝衇其形何似師曰肝者木也名厥隂其衇微弦濡弱而長是肝衇也肝病自得濡弱者愈也假令得純弦衇者死何以知之以其衇如弦直此是肝藏傷故知死也注此已下四時五藏平衇病衇死衇之診法也東方屬木主春令風在天為風在地為木在人為肝故曰肝者木也名足厥隂經其衇當弦若得微弦濡弱而長此弦而有胃是肝平衇也病自易愈也若得微弦而長而少濡弱和緩為弦多胃少肝病衇也若得純弦而直無濡弱和緩為但弦無胃是肝死衇也下三藏雖無純洪純浮純沉之文省文也當倣此集注方有執曰微非衇名蓋微微之弦有胃氣之謂也魏荔彤曰微弦不甚弦且帶濡弱如短促亦非木之本性又必兼長衇是象木之柔和而修長此肝之本衇肝衇見此肝藏平衇如有微疾亦易愈也假令純弦如樹木將枯枝幹乾硬故知死也問曰二月得毛浮衇何以處言至秋當死師曰二月之時衇當濡弱反得毛浮者故知至秋死二月肝用事肝衇屬木衇應濡弱反得毛浮衇者是肺衇也肺屬金金來尅木故知至秋死他皆倣此注二月春令也毛浮秋衇也春得秋衇何以斷言至秋當死蓋春肝木旺秋肺金旺二月肝旺之時尚得毛浮肺衇其衰可知至秋金氣愈旺金乘木木愈受尅則絶故知至秋當死也餘藏皆倣此集注方有執曰此以四時衇氣屬五行生尅應病以主吉凶生死之理揭一以例其餘所以示人持診之要法也南方心衇其形何似師曰心者火也名少隂其衇洪大而長是心衇也心病自得洪大者愈也注南方屬火主夏令熱在天為火在地為熱在人為心故曰心者火也名手少隂經其衇當洪若得洪大和緩此洪而有胃是心平衇也雖有心病自易愈也若得洪大而少和緩此洪多胃少是心病衇也若得洪大而無和緩此但洪無胃是心死衇也集注方有執曰其衇洪大而長應萬物盛長之象也立夏得洪大衇是其本位其人病身體苦疼重者須發其汗若明日身不疼不重者不須發汗若汗濈濈自出者明日便解矣何以言之立夏得洪大衇是其時衇故使然也四時倣此注凡四時之病當以四時之衇期之期之者期其愈不愈也立夏之日得洪大衇是其本位應得之衇其人病身體苦疼重者須發其汗若明日身不疼不重雖衇仍洪大必非邪衇乃時衇也不須再汗謂已解也設若本日汗濈濈然自出者此解兆已見雖衇洪大不須發汗明日便自解矣何以言之立夏得洪大衇是得其時衇故也四時倣此集注方有執曰此言衇得應時而王則病有當解之時舉夏以例其餘示人推倣之意程知曰春弦夏洪秋毛冬石當其時得之則為平衇雖外感寒邪但微汗出自愈耳重則治之輕則不必治也內經曰衇得四時之順者此也程應旄曰洪大為夏令之衇亦為邪盛之衇有病則從邪無病則從令解不解不須另辨西方肺衇其形何似師曰肺者金也名太隂其衇毛浮也肺病自得此衇若得緩遲者皆愈若得數者則劇何以知之數者南方火火尅西方金法當癰腫為難治也注西方屬金主秋令燥在天為燥在地為金在人為肺故曰肺者金也名手太隂經其衇當浮若得毛浮緩遲此浮而有胃是肺平脉也雖有肺病自易愈也若得毛浮而少緩遲此浮多胃少是肺病衇也若得毛浮而無緩遲此但浮無胃是肺死衇也若得毛浮而數則為病劇何以知之數者南方火也火尅西方金法當發癰腫而難治也集注方有執曰肺主皮毛上為華蓋故衇毛浮緩遲者脾土之衇也兼得緩遲為愈者肺金得土為逄生也法當癰膿者金逢火化也北方腎衇其形何似師曰腎者水也名曰少隂其衇沉滑是腎衇也腎病自得沉滑而濡者愈也按東南西方皆有其文惟缺北方倣經文補之注北方屬水主冬令寒在天為寒在地為水在人為腎故曰腎者水也名足少隂經其衇當沉若得沉滑而濡此沉而有胃是腎平衇也雖有腎病自易愈也若得沉滑而少濡和此為沉多胃少是腎病衇也若得沉而無滑濡此但沉無胃是腎死衇也問曰翕奄沉名曰滑何謂也師曰沉為純隂翕為正陽隂陽和合故令衇滑關尺自平陽明衇微沉食飲自可少隂衇微滑滑者緊之浮名也此為隂實其人必股內汗出隂下濕也按滑者緊之浮名也此為隂實二句與上下之義不屬當是錯簡注此冬月之平衇也若陽明關衇微沉而不滑是失正陽為胃不和故其人食飲僅自可也若少隂尺衇微滑而不濡是失純隂為腎不和故其人汗出隂下濕也問曰衇有相乘有縱有橫有逆有順何謂也師曰水行乘火金行乘木名曰縱火行乘水木行乘金名曰橫水行乘金火行乘木名曰逆金行乘水木行乘火名曰順也注此以人之五衇候人五藏不平之診法也人之五藏法天五行肝木心火脾土肺金腎水此相屬也木生火火生土土生金金生水水生木此相生也木尅土土尅水水尅火火尅金金尅木此相尅也相生者生相尅者死人之藏氣亦然故其衇有相乘有縱有橫有逆有順也水乘火金乘木乘其所勝是相尅也名曰縱火乘水木乘金乘所不勝是反侮也名曰橫水乘金火乘木子乘其母是倒施也名曰逆金乘水木乘火母乘其子是相生也名曰順五藏之衇肝弦心洪脾緩肺浮腎沉五藏各見本衇自無病也若見他衇以此推之縱者病甚橫者病微逆者病虛順者病實也集注方有執曰乘猶乘舟車之乘縱直也橫者縱之對順從也逆者順之反程知曰非其時而得之則為相乘縱橫為患最重順逆猶無大害也問曰何以知乘府何以知乘藏師曰諸陽浮數為乘府諸隂遲澀為乘藏也注上條發明五藏相乘縱橫順逆之衇此條發明隂陽相乘各從其類之診府陽也浮數陽也藏隂也遲澀隂也陽乘陽隂乘隂各從其類而相乘也其隂邪乘陽陽邪乘隂府邪乘藏藏邪乘府各以衇證錯綜參之可類推矣集注方有執曰浮數陽也以陽部而見陽衇故知乘府也遲澀隂也以隂部而見隂衇故知乘藏也問曰濡弱何以反適十一頭師曰五藏六府相乘故令十一注此承上條發明五藏六府不平相乘之衇也適者至也頭者數也凡人若見濡弱之衇而相乘者是因我虛而彼乘及之也越人祗曰一衇輒為十變何以至十一數也越人遺包絡三焦故十也今五藏六府相乘故十一也然隂乘陽陽乘隂府乘藏藏乘府錯而綜之豈止十一耶集注程知曰此總揭衇之大要言衇得濡弱則可以和適五藏六府也經曰呼吸者衇之頭濡弱者軟和以滑內經謂之有胃氣也五藏六府之邪不能不相乘如金邪乘木木邪乘火之類惟諸相乘中有軟和以滑之意則為易愈故濡弱可以和適十一藏衇氣也問曰病有灑淅惡寒而復發熱者何答曰隂衇不足陽往從之陽衇不足隂往乘之曰何謂陽不足答曰假令寸口衇微名曰陽不足隂氣上入陽中則灑淅惡寒也曰何謂隂不足答曰尺衇弱名曰隂不足陽氣下陷于隂中則發熱也注此以寸尺發明隂陽相乘為病之衇也若衇緊無汗灑淅惡寒發熱者是傷寒也衇緩有汗灑淅惡寒發熱者是中風也今寸衇微灑淅惡寒者是陽不足隂氣上乘入于陽中也尺衇弱發熱者是陰不足陽氣下陷入於隂中也此內傷不足隂陽相乘有休止之惡寒發熱非外感有餘風寒中傷榮衛無休止之惡寒發熱也集注方有執曰陽先乎隂以陷入也故曰從諱之也隂隨于陽以上入也故曰乘傷之也惡寒者陽不足以勝隂而與隂俱化也發熱者隂不足以勝陽而從陽之化也程知曰此辨隂陽相乘之衇也往來則隂陽之氣更盛更虛隂併則寒陽併則熱矣凡瘧與往來寒熱之衇皆然也問曰衇有陽結隂結者何以别之答曰其衇浮而數能食不大便者此為實名曰陽結也期十七日當劇其衇沉而遲不能食身體重大便反鞕名曰隂結也期十四日當劇注上條以衇之寸尺微弱辨隂陽不足此條以衇之浮沉有力别隂陽結實為病之診法也衇浮大而數藹藹如車蓋者陽結實衇也衇沉石而遲纍纍如循長竿者隂結實衇也夫衇既可以别隂陽之結實又不可不以隂結陽結之證而合隂結陽結之衇相參看也陽結證身輕能食陽能消榖也不大便期十七日當劇者陽體終燥故遲三日也隂結證身重不能食隂不能消榖也不大便期十四日當劇者隂體終濡故早三日也劇者謂不大便裏急下重且滿且痛不可再待時日宜早圖之也故或潤竅以導之耎堅以下之不致臨期燥屎巨鞕榖道難出窘苦萬狀也凡病後傷液多有此證閲歷深者自知之也集注程應旄曰不曰病有而曰衇有二氣所禀有偏勝也陽結者偏於陽而無隂以生液隂結者偏於隂而無陽以化液皆於衇之浮而數沉而遲辨之也陽衇浮隂衇弱者則血虛血虛則筋急也其衇沉者榮氣微也其衇浮而汗出如流珠者衛氣衰也按陽衇浮其衇浮之二浮字當是濡字若是浮字則與衛衰汗出如流珠之義不屬其衇沉之沉字當是弱字若是沉字則與血虛榮氣微之義不屬注此以浮沉别隂陽不足為病之診法也陽衇濡浮而無力衇也隂衇弱沉而無力衇也其衇弱者榮氣微也榮微則血虛故不止于發熱而且筋急也其衇濡者衛氣衰也衛衰則表不固故不止于惡寒而且汗出如流珠也集注方有執曰沉以候裏榮行衇中故衰微可知浮以候表衛行衇外汗出如流珠則表不固故衰憊可知衇藹藹如車蓋者名曰陽結也注藹藹如車蓋形容衇之浮大有力即前陽結浮數之衇也因其有力而盛故名曰陽結也集注程應旄曰衇藹藹如車蓋者形容其浮數中有擁上之象衇纍纍如循長竿者名曰隂結也注纍纍如循長竿者形容衇之沉石有力即前隂結沉遲之衇也因其有力而盛故名曰隂結也集注程知曰纍纍如循長竿直引强硬之貌為隂氣固結陽不得而和之前言隂結陽結蓋指便鞕一證言之此則専言衇象也衇瞥瞥如羮上肥者陽氣微也注瞥瞥如羮上肥者形容衇之浮而無力即前衛氣衰之濡衇故曰陽氣微也衇綿綿如瀉漆之絶者亡其血也注綿綿如瀉漆之絶者形容衇之沉而無力即前榮氣微之弱衇故曰亡其血也集注成無己曰綿綿者連綿而軟也如瀉漆之絶者前大而後細也衇縈縈如蜘蛛絲者陽氣衰也注縈縈如蜘蛛絲者形容衇之細小難于尋按而浮中沉似有似無即前陽不足之微衇故曰陽氣衰也集注方有執曰縈縈如蛛絲牽惹旁旋微細欲絶之狀師曰寸衇下不至關為陽絶尺衇上不至關為隂絶此皆不治决死也若計其餘命生死之期期以月節尅之也注此已上發明平衇已下皆死候之衇也寸關尺三部衇之上下以候隂陽五藏升降也寸位乎上候心肺之陽主升升極而降降不至關是為孤陽故曰寸衇下不至關為陽絶也尺位乎下候肝腎之隂主降降極而升升不至關是為獨隂故曰尺衇上不至關為隂絶也關位乎中以候脾界乎寸尺所以升降出入者也今上下不至關是升降出入息矣故曰此皆不治决死也若隂陽已離胃氣未絶尚可計餘命之期期以月節尅之如經曰隂勝則陽絶能夏不能冬陽勝則隂絶能冬不能夏肝死於秋心死於冬脾死於春肺死於夏腎死於長夏之類是也推之于日于時亦然又未知何藏隂陽前絶若陽氣前絶隂氣後竭者其人死身色必青隂氣前絶陽氣後竭者其人死身色必赤腋下溫心下熱也注經曰人有兩死而無兩生有兩死者謂隂陽皆可死也無兩生者謂隂陽不能獨生也故陽先絶隂後竭死則身青而冷隂先絶陽後竭死則身赤而溫也集注成無己曰陽主熱而色赤隂主寒而色青其人死己身色青則隂未離乎體故知隂氣後竭也身色赤腋下溫心下熱則陽未離乎體故知陽氣後竭也程知曰陽氣前絶寒病隂氣前絶熱病也寒熱之治法一悮雖死尚有徵驗誠可畏也師曰衇病人不病名曰行尸以無王氣卒眩仆不識人者短命則死人病衇不病名曰內虛以無榖神雖困無苦注衇者人之根本也衇病人不病者謂外形不病而見真藏病衇其內本已絶雖生猶死不過尸居餘氣耳故曰行尸也餘氣者未盡五藏生旺之餘氣也若旺氣一退即卒然眩仆不識人而死矣若良工早察于旺氣未退之先而圖之未必無所補也人病衇不病謂外形羸瘦似病其衇自和以根本尚固不過榖氣不充名曰內虛非行尸可比雖困無害胃氣復榖氣充自然安矣穀神即穀氣也集注方有執曰周氏云形體之中覺見憔悴精神昏憒食不欣美而衇得四時之從無過不及之偏是人病衇不病也形體安和而衇息乍大乍小或至或損弦緊浮滑沉澀不一殘賊冲和之氣是衇息不與形相應乃衇病人不病也張錫駒曰榖神乃水穀所化之神人賴此以資生也內虛食少穀氣不充即無穀神矣故曰無害若無本然之胃神安得謂之無害耶又未知何藏先受其災若汗出髮潤喘不休者此為肺先絶也注此申上條不知何藏先絶而詳言其證也肺主皮毛肺絶汗出不流故髮潤也肺主氣肺絶張口氣出不能復還也故曰為肺先絶也集注成無己曰肺為氣之主為津液之帥汗出髮潤者津脫也喘不休者氣脫也衇浮而洪身汗如油喘而不休水漿不下形體不仁乍靜乍亂此為命絶也注身汗如油液外亡也喘而不休氣上脫也水漿不下胃氣絶也形體不仁榮衛敗也乍靜乍亂精神散也此皆命絶之候由此推之衇雖浮洪必然無根是為真藏孤陽飛越之證也集注王肯堂曰火之將滅也必明衇來浮洪涌盛此將去人體之兆也然又必兼下一二證始可斷其命絶陽反獨留形體如烟熏直視搖頭者此心絶也注心絶隂盡惟陽獨留故身體大熱形如烟熏從火化也心藏神直視神去也頭屬陽陽無所依故搖頭也集注成無己曰心衇俠咽系目直視者心經絶也頭為諸陽之㑹搖頭者隂絶而陽無根也脣吻反青四肢漐習者此為肝絶也注脣吻之色當赤而黃反見青色者木土相尅也四肢汗出漐漐不已此為肝絶也集注成無己曰脣吻者脾之候肝色青肝絶則真色見於所勝之部也四肢者脾所主肝主筋肝絶則筋衇引急發于所勝也方有執曰口脣邉曰吻四肢手足也漐汗出貌習鳥數飛也言手足顫搖如鳥之習飛奮振而不已也環口黧黑柔汗發黃者此為脾絶也注脾之華在脣四白環口黧黑其華萎矣冷汗隂黃皆脾絶也集注方有執曰口為脾之竅黧黑者熏黃黑暗土敗之色也柔汗俗謂冷汗是也張錫駒曰脾主四白環口黧黑土敗而水侮也柔汗者柔軟而膩脾之真液黃者脾之真色真液泄而真色見故為脾絶也溲便遺失狂言目反直視者此為腎絶也注腎司二便溲便遺失腎絶也腎藏精與志狂言直視精志俱敗也集注方有執曰溲便遺溺也腎司闔闢闔闢廢故二便皆無禁約也經曰腎藏志狂言者是失志矣失志者死腎主骨骨之精為瞳子目反直視者骨之精不上榮于瞳子而不能轉也問曰上工望而知之中工問而知之下工衇而知之願聞其說師曰病家人請云病人苦發熱身體疼病人自臥師到診其衇沉而遲者知其差也何以知之若表有病者衇當浮大今衇反沉遲故知愈也注此下皆詳望問而知之之類也望謂觀其形之盛衰色之深淺問謂詢其情之苦欲病之根因衇謂診其衇之隂陽合乎形色也設病家人來請告以病者苦發熱身體疼師到病人自臥診其衇沉而遲知其差也何以知之表有病衇當浮大今反沉遲而無表衇且無表證故知愈也集注張錫駒曰有問發熱身疼衇反沉遲是陽病而見陰衇何以說得愈也答曰是必望其有恬然嗜臥之狀問其有熱除身輕之意而後合衇以斷其愈也假令病人云腹內卒痛病人自坐師到診衇之浮而大者知其差也何以知之若裏有病者衇當沉而細今衇浮大故知愈也注病家人來請告以病者腹內卒痛醫師到病人自坐無苦容診其衇浮而大知其差也何以言之裏有病衇當沉細今反浮大而無裏衇且無裏證故知愈也師曰病家人來請云病人發熱煩極明日師到病人向壁臥此熱已去也設令衇不和處言已愈按不和當是自和若不和如何言愈注此申上二條之義也病家人來言病者發熱煩極師未即去明日到病人向壁靜臥此熱已去因知其差假令衇不和緩未可言愈必和緩而始可斷其已愈也推之腹痛亦然此篇首所云設有不應消息診看消息者謂今日之望異于昨日之問聞也假令向壁臥聞師到不驚起而盼視若三言三止衇之咽唾者此詐病也假令衇自和處言此病大重當須服吐下藥針灸數十百處乃愈注此設治詐病之法也蓋仲景不欲人售其欺亦不欲醫為其欺而妄治也醫者玩此而揣摩之則彼不敢欺而我不妄治矣集注程知曰彼以詐病我以詐治非良工不能具是巧也師持衇病人缺者無病也衇之呻者病也言遲者風也搖頭言者裏痛也行遲者表强也坐而伏者短氣也坐而下一腳者腰痛也裏實護腹如懷卵物者心痛也注隂陽相引故缺缺者先引氣入而後呵之故謂之呵缺隂陽不相引則病相引則和故曰缺者無病也診衇時有呻吟病苦之聲故曰呻者病也言遲者語言蹇澀故曰言遲者風也搖頭言者痛極艱於發聲搖頭以意示緩故曰搖頭言者裏痛也行遲者風病筋絡不利故曰行遲者表强也坐而伏者氣不能接故曰坐而伏者短氣也凡腰痛者皆不能坐即略坐非伸足依倚不可故曰坐而下一腳者腰痛也凡心痛者皆傴僂護其痛處故曰裏實護腹如懷卵物者心痛也集注方有執曰舌强則言遲經絡牽急則舌强筋攣則經絡拘急肝屬木其合筋其主風頭屬陽裏屬陰頭搖者隂不與陽和也短氣者裏不足也此條八者皆望而知之之事也張志聰曰師持衇者猶言師但持衇而不問也八條皆察人之神情得人之病機所謂望而知之者問曰人恐怖者其衇何狀師曰衇形如循絲纍纍然其面白脫色也注人病恐怖者陽神不足也陽不足則恐神不足則怖恐則血隨氣下故面白脫色不潤澤也怖則氣隨神亂故衇形如循絲纍纍然而亂也集注方有執曰恐怖惶懼也循理治也絲言細也纍纍聨絡貌脫色猶言失色也蓋內氣餒者則外色奪所以有卒然之變也程應旄曰此示人察色合衇之法恐則氣下神被奪矣故衇細而且不定面色白而且脫也問曰人不飲其衇何類師曰衇自澀脣口乾燥也注津液少則衇澀脣口因以乾燥此因不飲而然非由此而不飲也集注程應旄曰不飲如與人彆氣至二三日湯水不沾脣之類肺失游溢精氣故衇澀而脣口乾燥也問曰人愧者其衇何類師曰衇浮而面色乍白乍赤注愧者羞也羞則神色蕩而不定故衇浮而面色乍白乍赤也此皆察色合衇以意消息而知之之類也集注程應旄曰以上數條不論有病無病凡人有所負于中輒復形之色與衇也于此推之以意消息則諸病之情無不可即外以徵內矣問曰衇有災怪何謂也師曰假令人病衇得太陽與形證相應因為作湯比還送湯如食頃病人乃大吐若下利腹中痛師曰我前來不見此證今乃變異是名災怪又問曰何緣作此吐利答曰或有舊時服藥今乃發作故名災怪耳注衇有災怪謂因藥而變災怪也假令人病太陽病得太陽衇衇證相應因為作太陽病湯藥與服之比還如食頃病人乃大吐下利腹中痛師問曰我先來不見此證今乃災變怪異緣何作此吐利病者答曰或有舊時服藥今乃發作故為此災怪耳望問固醫家之事亦須病人毫無隱諱方能盡醫所長仲景為病家服藥未告于醫醫失問先服何藥故出此條以示戒耳集注成無己曰醫以衇證與藥相對而反變異為其災可怪故名災怪張志聰曰衇得太陽與形證相應者如太陽病衇浮頭項强痛而惡寒此衇與形證相應也或有舊時服藥今乃發作者言送湯如食頃所投之藥未周于經必舊時服藥之故也辨衇法辨者别也辨衇者辨别諸衇之名也法者諸衇部位至數形狀相類相反别之各有其法也衇名者如浮沉遲數滑澀諸衇之名是也部位者如浮中沉上下之部位是也至數者如遲三至數六至之至數是也形狀者如滑流澀滯之形狀是也相類者如弦與緊滑與動之類是也相反者如浮與沉虛與實之反是也皮膚取而得之謂之浮筋骨取而得之謂之沉此以衇之上下部位而得名也是則凡衇因部位而得名皆統乎浮沉矣如浮而無力謂之濡沉而無力謂之弱浮而極有力謂之革沉而極有力謂之牢浮中沉俱有力按之且大謂之實浮中沉俱無力按之且大謂之虛浮中沉極無力按之且小似有似無謂之微浮中沉極無力按之且大渙散不收謂之散浮沉有力中取無力謂之芤按之至骨推尋始得謂之伏此皆以部位兼形狀相反而得名者也一息三至謂之遲一息六至謂之數此以衇之至數而得名者也是則凡衇因至數而得名者皆統乎遲數矣如一息四至謂之緩一息七至謂之疾數時一止謂之促緩時一止謂之結至數不乖動而中止不䏻自還須臾復動謂之代此皆以至數兼相類而得名者也流利如珠謂之滑進退艱難滯澀謂之澀此以衇之形狀而得名也是則凡衇因形狀而得名者皆統乎滑澀矣如衇形粗大謂之大衇形細小謂之小來去迢迢謂之長來去縮縮謂之短來盛去衰謂之洪其形如豆動搖不移謂之動狀類弓弦按之端直且徑謂之弦較弦則粗按之左右彈指謂之緊此皆以形狀兼相類相反而得名者也此辨衇之大概也診者於此能詳審而擴充之則進乎法矣今以浮沉遲數滑澀六衇别之以為綱以大小虛實諸衇辨之以為目務使隂陽標本虛實寒熱心中有據指下無差庶心手相得而辨證處方自無錯謬矣問曰衇有隂陽何謂也答曰凡衇大浮數動滑此名陽也衇沉澀弱弦微此名陰也凡陰病見陽衇者生陽病見隂衇者死注此以衇之隂陽辨病之隂陽生死法也浮大數動滑五者比之諸衇為有餘陽道有餘故曰陽也沉澀弱弦微五者比之諸衇為不及隂道不及故曰隂也隂病謂陰寒病也見陽衇謂見陽熱衇也陽熱衇即浮大數動滑類也以隂病得隂衇證衇相應死難必也隂病若得陽衇猶冬盡春生萬物雖未即生然日進生機故曰生也陽病謂陽熱病也見隂衇謂見隂寒衇也隂寒衇即沉澀弱弦微類也以陽病得陽衇證衇相應生可卜也陽病若得隂衇如暑去秋來萬物雖未即死然日趨死候故曰死也蓋天人無二理春夏為陽秋冬為隂陽主生隂主殺故也集注方有執曰隂陽者通臟腑血氣表裏虛實風寒寒熱而總言之也程知曰陰病見陽衇而主生者邪氣自裏之表欲汗而解也陽病見隂衇而主死者邪氣自表入裏正虛邪盛也故正氣實者多見陽衇正氣虛者多見陰衇衇來緩時一止復來者名曰結衇來數時一止復來者名曰促陽盛則促隂盛則結此皆病衇注緩四至衇也緩時一止復來者名曰結衇數六至衇也數時一止復來者名曰促衇陽盛則促隂盛則結隂陽偏勝則病故曰此皆病衇也衇按之來緩時一止復來者名曰結又衇來動而中止更來小數中有還者反動名曰結隂也衇來動而中止不能自還因而復動者名曰代隂也得此衇者必難治按衇按之來緩時一止至名曰結隂也數語文義不順且前論促結之衇已明當是衍文注衇來至數不乖而中止不能自還因而復動名曰代乃一藏無氣求他藏以代續之故也凡病得此代衇者必為難治蓋以促結之止如急行而蹶雖然中止即能自還非代衇之止可比也隂陽相搏名曰動陽動則汗出隂動則發熱形冷惡寒者此三焦傷也若數衇見于關上上下無頭尾如豆大厥厥動搖者名曰動也按素問曰陽加於隂謂之汗陽加於陽豈有汗出之理陽動則汗出二字當是發熱二字隂動則發熱二字當是汗出二字注動者躁動也謂隂陽互相鼓擊而不寧也動陽衇也寸為陽陽乘擊于陽故陽動發熱也尺為隂陰乘擊于隂故隂動汗出也關界乎隂陽則隂陽互相乘擊故發熱汗出同見也此為動而有力陽盛之候若按之不鼓是為陽衰之證則必形冷而不發熱汗出而必惡寒非搏擊陽盛之動乃擾亂陽虛之動也由三焦之陽氣傷則不能外溫肉分故有是證也動衇之狀頗似數衇惟上下無頭尾如豆大厥厥動搖故名曰動也厥厥者謂似有根之搖動動而不移非若滑衇之流動動而不居也集注方有執曰隂陽相搏之隂陽以二氣言陽動隂動之隂陽以部位言下言動衇之定位與其形狀厥厥舉發貌程知曰陽升隂降交通上下往來於尺寸之間則冲和安靜惟陽欲升而隂不足以和之使降則兩相搏擊其衇必數而厥厥搖動見于關上也衇浮而緊者名曰弦也弦者狀如弓弦按之不移也衇緊者如轉索無常也注衇浮而緊者名曰弦也此非謂浮緊即弦衇乃謂浮而徑緊弦之狀也弦緊相類惟恐人將弦作緊將緊作弦故並舉相形以别之也弦者狀如弓弦按之不移即所謂端直也緊者如轉索無常即所謂不端直也端直則不䏻如轉索轉索則不能似端直其為徑急則同所以相類也集注方有執曰此明弦緊之辨按之不移言如弦之張于弓一定而不可動移也轉索無常言左右旋轉而不可拘也程知曰緊為寒邪方盛直細中有轉動急疾之意故謂如轉索也張錫駒曰弦緊之分在移與不移耳衇弦而大弦則為減大則為芤減則為寒芤則為虛寒虛相搏此名為革婦人則半産漏下男子則亡血失精注衇形粗大有力謂之大浮沉有力中取無力狀如葱管謂之芤沉而且大按之徑急有力謂之牢浮而且大舉之徑急有力謂之革革衇者以鼓革而得名外急中空之象也弦則為徑減其中取之徑外急象也大則為實小其中取之實中空象也此以弦減芤虛二衇形容革衇也女子得之半産漏下男子得之亡血失精寒虛相搏故也集注程知曰言弦而虛大之衇也弦則為減謂陽氣減少而寒也大則為芤謂似革中空而虛也虛寒相搏則精血漏失故有革象也問曰衇有殘賊何謂也師曰衇有弦緊浮滑沉澀此六衇名曰殘賊能為諸衇作病也注此下皆殘賊為病之證也相乘之衇為正氣虛隨我所虛而乘及之之謂也殘賊之衇為邪氣實恃彼之强而虐及之之謂也此六衇者名曰殘賊殘則明傷賊則暗襲衇中有此當屬實邪不論何部但本衇中兼見此衇輒防邪至也集注方有執曰諸衇謂各部之衇也作起也言六者若見于各部之衇中則皆䏻于其部生起病端張錫駒曰殘傷殘賊賊害也言此六者之衇足以暗傷人之經衇血氣如賊之害人而不覺故曰䏻為諸衇作病也寸口衇隂陽俱緊者法當清邪中于上焦濁邪中于下焦清邪中上名曰潔也濁邪中下名曰渾也隂中于邪必內栗也表氣微虛裏氣不守故使邪中於隂也陽中于邪必發熱頭痛項强頸攣腰痛脛酸所謂陽中霧露之氣故曰清邪中上濁邪中下隂氣為栗足膝逆冷便溺妄出表氣微虛裏氣微急三焦相溷內外不通上焦怫鬱藏氣相熏口爛蝕齗也中焦不治胃氣上衝脾氣不轉胃中為濁榮衛不通血凝不流若衛氣前通者小便赤黃與熱相摶因熱作使遊於經絡出入藏府熱氣所過則為癰膿若隂氣前通者陽氣厥微隂無所使客氣入內嚏而出之聲嗢咽塞寒厥相追為熱所擁血凝自下狀如豚肝隂陽俱厥脾氣孤弱五液注下下焦不闔清便下重令便數難臍築湫痛命將難全注寸口隂陽俱緊者謂六衇浮沉俱緊也浮衇緊則霧露之邪中于上焦沉衇緊則寒邪中於下焦上焦指太陽也下焦指少隂也霧露之邪曰潔曰清清邪中上發熱頭痛項强頸攣腰疼脛酸者霧露之邪中于太陽表也寒邪曰渾曰濁濁邪中下隂氣為栗足脛逆冷便溺妄出者寒邪中於少隂裏也經曰虛邪不能獨傷人必因身形之虛而後客之也蓋因其人表氣虛裏氣不固清濁之邪中傷上下三焦相溷表裏不通以致上焦清氣不宣邪氣怫鬱與藏相熏口爛蝕齗中焦不治胃氣主下而反上衝脾氣主運而反不轉中焦皆濁榮衛不通血凝不流行也若正能勝邪衛氣先通其人必先小便赤黃熱傷之經必血凝肉腐而外發為癰膿也若榮氣先通其人必先嚏嗢咽塞熱擁於裏之血凝者自下狀如豚肝也若正不勝邪隂陽俱逆榮衛不通脾氣孤弱不能散精五液注下下焦不闔裏急墜痛圊便數窘命將難全也集注沈亮宸曰傷寒之證轉熱即佳故少隂厥隂皆以發熱而愈而凡下膿血與癰膿皆非死證若隂陽俱厥厥者必利故五液注下下焦不闔命將難全也方有執曰清指風濁指寒曰潔曰渾以天地之偏氣言也隂中於邪已下至濁邪中下一節是釋上文陰即下焦陽即上焦也隂氣為栗已下至血凝不流是言證若衛氣前通已下言變癰膿之故若隂氣前通已下言變膿血利之故衛氣即陽氣榮氣即隂氣乃承上榮衛不通而言而清濁之所以為病在其中矣隂陽俱厥已下言證併於裏而加重故曰命將難全也衇陰陽俱緊者口中氣出唇口乾燥踡臥足冷鼻中涕出舌上胎滑勿妄治也到七日以來其人微發熱手足溫者此為欲解或到八日已上反大發熱者此為難治設使惡寒者必欲嘔也腹內痛者必欲利也注此承上條互詳其證戒人臨此陰陽混淆之病慎勿妄治也此條之踡臥足冷即上條之濁邪中下也此條之鼻涕舌胎即上條之清邪中上也此條之唇口乾燥即上條之口爛蝕齗也此條之反大發熱即上條之癰膿下血也此條之腹中痛即上條之下重湫痛也此條之惡寒即上條之必內栗也衇陰陽俱緊傷寒衇也口中氣出唇口乾燥胃經熱也踡臥足冷少隂寒也鼻中涕出表傷風也舌上胎滑裏無熱也似此表裏隂陽寒熱虛實雜揉未定之病慎勿妄治則當審其孰輕孰重孰緩孰急先後施治可也到七日已來其人微發熱手足漸溫者此隂退陽復為欲解也若到八日已上反大發熱者乃邪盛正衰此為難治也設使惡寒知尚在表若嘔必欲入裏也腹內痛者知邪已入裏內攻必欲下利也集注方有執曰微發熱邪退也大發熱邪盛也惡寒尚在表也腹內痛已入裏也衇隂陽俱緊至于吐利其衇獨不解緊去入安此為欲解若衇遲至六七日不欲食此為晚發水停故也為未解食自可者為欲解按緊去入安之入字當是人字人安謂不吐利也必是傳寫之訛此為晚發水停故也二句與上下文義不屬當是衍文注此發明衇隂陽俱緊內外寒甚至于吐利解不解之義也吐利後衇仍緊為邪未盡不解也緊去衇緩為邪盡人安欲解也若緊去衇遲至六七日不欲食者則胃未和為未解也若欲食者則胃已和雖衇遲亦為欲解也集注成無己曰衇隂陽俱緊為寒氣甚於上下至于吐利之後緊衇不罷者為其衇獨不解緊去則人安為欲解也寸口衇浮而大浮為虛大為實在尺為關在寸為格關則不得小便格則吐逆注平衇以衇內外候關格此以衇尺寸候關格於此推之凡陰陽盛極皆病關格而不必定在內外尺寸也寸口衇浮而大浮為正氣虛大為邪氣實在尺則陰邪實關閉正氣不䏻宣名曰關關則不得小便也在寸則陽邪實格拒正氣不䏻化名曰格格則吐逆也集注張錫駒曰浮大之衇在於尺則為關隂陰氣不能施化故不得小便浮大之衇在于寸則為格陽陽氣不䏻宣通故吐逆衇浮而滑浮為陽滑為實陽實相摶其衇數疾衛氣失度浮滑之衇數疾發熱汗出者此為不治注浮為陽滑為實陽實相摶其衇行於衇外者數且疾矣衛氣行疾榮氣行遲榮衛不相輔而行故曰失度浮滑數疾有餘之衇見發熱無汗有餘之證衇證相合則為可治若見發熱汗出不足之證衇證不合不治明矣集注成無己曰浮滑數疾之衇發熱汗出解者邪氣退也若不解者正氣脫也必不可治經曰衇隂陽俱盛大汗出不解者死衇浮而數浮為風數為虛風為熱虛為寒風虛相摶則灑淅惡寒也按數為虛之虛字當是熱字風為熱虛為寒二句當是衍文風虛相摶之虛字亦當是熱字注風寒在表則衇浮緊風熱在表則衇浮數表受風邪故灑淅惡寒也諸衇浮數當發熱而灑淅惡寒若有痛處飲食如常者蓄積有膿也注諸衇浮數謂寸關尺六衇俱浮數也浮則為風數則為熱風熱遏鬱于表則當發熱而灑淅惡寒也若有隱痛之處飲食如常者非表邪之證乃內癰蓄積有膿之證於此知浮數之衇不可概為風熱也集注王肯堂曰人身有焮腫痛楚處未有不自覺者此條所言必是內癰故曰蓄積有膿也如胃脘癰肺癰腸癰皆各有辨而胃癰之衇人迎反盛未有不悮以為傷寒者故宜察之程應旄曰衇證似傷寒若不於若有痛處飲食如常之證參酌而悮以辛溫發散助其陽熱否則誤以寒涼徹熱遏住邪氣滋害深矣張璐曰若有焮腫為熱壅經絡若無腫處必邪留藏府隨內外而發癰膿也衇浮而大浮為風虛大為氣强風氣相摶必成癮疹身體為癢癢者名泄風久久為痂癩注六衇俱浮而大浮為風虛大為氣强强者熱也風熱相摶必成癮疹也身體為癢癢者肌虛熱氣外薄故也名為泄風若久不愈則成痂癩痂癩疥癬癘癩之類是也集注成無己曰痂癩者癘風也眉少髮稀身有乾瘡而腥臭經云衇風成癘是也朱震亨曰經云諸癢為虛血燥不榮肌腠所以癢也方有執曰經云外在腠理則為泄風寸口諸微亡陽諸濡亡血諸弱發熱諸緊為寒諸乘寒者則為厥鬱冒不仁以胃無榖氣脾澀不通口急不能言戰而栗也按濡浮而無力候陽虛也豈有亡血之理弱沉而無力候陰虛也豈止發熱而已諸濡亡血當是諸濡衛虛諸弱發熱當是諸弱榮虛注寸口者指寸關尺三部而言也諸微謂凡病見微衇皆亡陽也諸濡謂凡病見濡衇皆衛虛也諸弱謂凡病見弱衇皆榮虛也諸緊謂凡病見緊衇皆為寒也諸乘寒者謂諸微濡弱衇亡陽榮衛不足之人一病即見殘賊緊衇則為寒乘病厥也厥於中者鬱冒昏迷不知痛癢厥于經者戰栗口噤不能言語以平日胃虛損穀脾虛不運中虛不勝外邪也集注程知曰諸乘寒者則以陽極虛而陰寒直乘之也故為厥逆其所以昏冒不知人强直而無覺者則以胃無穀氣脾不流通故使口噤不能言外戰內栗而厥也問曰曽為人所難緊衇從何而來師曰假令亡汗若吐以肺裏寒故令衇緊也假令咳者坐飲冷水故令衇緊也假令下利以胃中虛冷故令衇緊也注此詳申上條諸亡陽榮衛不足之人而見緊衇之義也曽為人所難問緊衇為寒實之證虛冷亦見緊衇是從何而來也師曰假令其人亡汗表虛若吐胸虛下利裏虛寒邪乘虛為病或外感寒邪或內飲冷水或中寒陰化皆令衇緊也若與浮同見無汗則為傷寒實邪有汗則為亡陽虛邪與沉同見腹痛不便則為中寒實邪腹痛下利則為中寒虛邪由此推之凡諸實衇從虛化者即未可謂之實矣集注程應旄曰緊則為寒稱曰乘衇今復列之殘賊何義曰虛則為人乘實則乘人凡衇皆然不獨緊也寸口衇微尺衇緊其人虛損多汗知隂常在絶不見陽也注上條以浮沉見微緊此條以寸尺見微緊皆陰盛陽亡之證故曰知隂常在絶不見陽也祗曰虛損多汗者略言之也集注程知曰言寸微尺緊為虛損多汗之證也寸微弱為亡陽尺緊疾為陰勝隂勝於內陽絶於外故為虛損多汗師曰病人衇微弱澀者此為醫所病也大發其汗又數大下之其人亡血病當惡寒後乃發熱無休止時夏月盛熱欲著復衣冬月盛寒欲裸其身所以然者陽微則惡寒隂弱則發熱此醫發其汗使陽氣微又大下之令隂氣弱五月之時陽氣在表胃中虛冷以陽氣內微不能勝冷故欲著復衣十一月之時陽氣在裏胃中煩熱以隂氣內弱不能勝熱故欲裸其身又隂衇遲澀故知血亡也按又隂衇遲澀故知血亡也二句與上文義不屬非有闕文即是衍文注病人衇微而澀詢之為醫大發其汗又數大下之所以致此病也其人亡血略辭也謂亡其血氣也氣亡則陽微陽微則惡寒血亡則隂弱隂弱則發熱陽微隂弱故病當惡寒後乃發熱也輕者邪不留連遇所不勝時則愈重者無休止時即遇所不勝尤甚也然惡寒雖遇夏月盛熱欲著復衣所以然者五月之時陽氣在外胃中虛冷大發其汗令陽氣微故不勝寒也發熱雖遇冬月盛寒欲裸其身所以然者十一月之時陽氣在內胃中煩熱又數下之令隂氣弱故不䏻勝熱也此即論中所謂熱在骨髓寒在皮膚寒在骨髓熱在皮膚沉痼寒熱之病也集注王肯堂曰非必遇夏乃寒遇冬乃熱也此但立其例論其理耳寸口衇微而緩微者衛氣踈踈則其膚空緩則胃氣實實則榖消而水化也穀入于胃衇道乃行水入于經其血乃成榮盛則其膚必踈三焦絶經名曰血崩寸口衇微而緩微者衛氣踈踈則其表空虛也緩者胃氣實實則消化水穀也穀入于胃衇道之氣乃行水入于經衇絡之血乃成今榮愈盛而衛愈踈血愈多而氣愈少氣血失其經常之道故曰三焦絶經氣不䏻制血血不能歸經故血妄行而崩也集注成無己曰衛氣者溫分肉肥腠理衛氣既踈皮膚不得溫肥則空虛也經曰緩者胃氣有餘有餘為實故云緩者胃氣實內經曰食入于胃淫精於衇是穀入於胃衇道乃行也針經曰飲而液滲于絡合和于血是水入于經其血乃成也經常也三焦者氣之道路衛氣疏則氣不循常度故三焦絶其常度也方有執曰疏言不能固護實猶言强也榖入于胃至其血乃成乃承上文榖消而水化也隂血大下而曰崩者言其不能止靜如山壞之勢也寸口衇微而澀微者衛氣不行澀者榮氣不逮榮衛不能相將三焦無所仰身體痺不仁榮氣不足則煩疼口難言衛氣虛則惡寒數缺三焦不歸其部上焦不歸者噫而酢吞中焦不歸者不能消榖引食下焦不歸者則遺溲注凡經衇內外榮衛也藏府內外三焦也故經曰榮行衇中衛行衇外上焦心肺主之中焦脾胃主之下焦肝腎主之分而言之榮也衛也三焦也合而言之皆本乎一氣之流行隨其所在而得名也衇微而澀榮衛不足不足則榮衛不能相將而行三焦無所仰賴故身體周痺不仁榮氣不足故身煩疼口難言語衛氣不足故惡寒數缺也上焦司降降者清中之濁下焦司升升者濁中之清中焦司升降清者令其上升濁者令其下降今榮衛不相將而行三焦無所仰賴故不䏻各歸其部而失其職矣上焦不歸則濁氣不降噫氣而吞酸中焦不歸則升降相違故不能消榖引食下焦不歸則清氣不升故不䏻約束而遺溲也寸口衇微而澀微者衛氣衰澀者榮氣不足衛氣衰面色黃榮氣不足面色青榮為根衛為葉榮衛俱微則根葉枯槁而寒栗咳逆唾腥吐涎沫也注此詳申榮衛上焦之證也面色黃青榮衛不足之色也惡寒而栗咳嗽唾腥吐痰涎沫肺損之證也肺主皮毛皮毛者榮衛之所居故肺損則皮聚而毛落榮衛枯槁也集注成無己曰榮行衇中為根衛行衇外為葉根葉俱微則隂陽之氣衰也寸口衇弱而遲弱者衛氣微遲者榮中寒榮為血血寒則發熱衛為氣氣微者心內饑饑而虛滿不能食也按條末心內饑饑而虛滿不能食句此是論脾胃不關榮衛故弱者衛氣微當是陽氣微遲者榮中寒當是脾中寒上下文義始屬榮為血血寒則發熱豈有血寒發熱之理乎衛為氣氣微者當是陽氣微脾中寒者心內饑閲下條言胃氣有餘自知注此詳申榮衛中焦之證也緩以候胃遲以候脾胃主納榖脾主化榖故能食者胃也能化者脾也今陽微中寒脾胃俱病所以心內雖饑饑而虛滿不能食也集注方有執曰饑而虛滿者陽主化榖衛陽衰微不化榖故虛滿而不能食也寸口衇弱而緩弱者陽氣不足緩者胃氣有餘噫而吞酸食卒不下氣填於膈上也注此又詳申中焦之證也寸口衇弱而緩弱者陽氣不足緩者胃氣有餘不足則脾失健運有餘則胃强能食此胃强脾弱所以雖能食而不能消化也故使吞酸而噫食卒不化氣填脹悶於膈中也集注方有執曰陽氣以胃中之陽氣言不足則不能化榖胃氣以胃中之榖氣言有餘言有宿食也有宿食則鬱而生熱故噫飽而吞酸此蓋以飲食之內傷者言也趺陽衇遲而緩胃氣如經也趺陽衇浮而數浮則傷胃數則動脾此非本病醫特下之所為也榮衛內陷其數先微衇反但浮其人必大便鞕氣噫而除何以言之本以數衇動脾其數先微故知脾氣不治大便鞕氣噫而除今衇反浮其數改微邪氣獨留心中則饑邪熱不殺榖潮熱發渴數衇當遲緩衇因前後度數如法病者則饑數衇不時則生惡瘡也注此已下辨趺陽之衇少隂之衇也趺陽一名衝陽在腳背上去陷骨三寸衇動處乃是陽明胃經之動衇也少隂一名太溪在足內踝後跟骨上衇動處乃足少隂腎經之動衇也趺陽少隂乃古診法越人以十二經雖皆有動衇獨取寸口以决死生者以寸口乃衇之大要㑹也然此法不行久矣設有危急之病寸口衇不見診此以决死生可也若在平時總不如以關衇為趺陽尺衇為少隂更為愈也如趺陽胃衇遲而和緩是胃氣不病如經衇也今趺陽衇浮而數按之無力浮以候府浮而無力則為傷胃沉以候藏數而無力則為傷脾詢之病者特為醫下之所為以致榮衛之氣內陷其先數衇變微為脾弱也浮衇仍浮反甚為胃强也胃强則邪氣獨留故大便鞕潮熱發渴也脾弱則脾氣不運故邪熱不能殺榖雖饑不食氣噫而快也醫者前後施治如法而浮數之衇自當遲緩如經則饑欲食病者愈也若施治失冝數衇終始不退則生惡瘡也集注方有執曰惡瘡與屎膿雖不同其為血熱則皆然也程知曰此言趺陽衇遲緩妄下則有浮數之變也趺陽衇浮而澀少隂衇如經者其病在脾法當下利何以知之若衇浮大者氣實血虛也今趺陽衇浮而澀故知脾氣不足胃氣虛也以少隂衇弦而浮才見此為調衇故稱如經也若反滑而數者故知當屎膿也按若衇浮大者氣實血虛也二句與上文義不屬當是衍文少隂衇弦而浮豈可謂如經乎當改沉而滑字注脾腎皆病下利今趺陽胃衇浮澀少隂腎衇如常是病在脾不在腎也何以知之浮為陽以候胃澀為隂以候脾浮與澀合故知脾氣不足胃氣虛也以少隂衇見沉而滑故稱如經也若沉滑而數者是陽邪傷隂故知當屎膿血也集注程知曰水榖之下利屬于脾胃而膿血之下利屬於腎此可診趺陽太溪而辨之也趺陽衇伏而澀伏則吐逆水榖不化澀則食不得入名曰關格按水榖不化之化字當是入字若是化字是能食也何名曰格食不得入當是不得小便若有小便是水道通也何名曰關必是傳寫之誤注前論以浮沉尺寸候關格此以趺陽侯關格之診法也趺陽者胃衇也衇伏而澀伏則尺寸之隂陽停升降也澀則三焦之元氣不流通也不升降流通故上則吐逆下則不得小便病名曰關格也趺陽衇滑而緊滑者胃氣實緊者脾氣强持實擊強痛還自傷以手把創坐作瘡也注趺陽之衇以候脾胃衇當和緩今反滑而緊者以滑為胃氣實緊為脾氣强滑緊並見如持實以擊强故主急痛痛還自傷脾胃也以手把創而成瘡者猶之操刀自割而貽其害也集注方有執曰滑為食故在胃則主榖氣實緊為寒故在脾則主邪氣强持實擊强言胃實脾强兩相搏擊而為病譬如以手把刃而自傷蓋謂非由藏府而傳變也趺陽衇沉而數沉為實數消榖緊者病難治注胃衇沉而數沉主裏數主熱沉數為裏實熱則能消榖凡裏病得此衇者皆易治也若不沉數而沉緊沉緊為裏寒則為殘傷胃氣之證故曰難治也集注方有執曰沉以候裏故在脾胃為土實榖氣實也數為熱陽也緊為寒隂也言趺陽主脾胃脾胃主榖榖氣實若衇見數而陽熱勝陽能化榖雖病不足為害若衇得緊而隂寒勝隂不化榖故為難治程知曰言趺陽沉數為消榖之病也沉為實沉主裏也數消榖數為熱也緊盛為邪勝故為難治也趺陽衇大而緊者當即下利為難治注下利者不論寒熱皆中虛之病故衇宜小宜緩為病衇相宜則易治也今趺陽胃衇大而緊為病虛衇實則不相宜故為難治也集注成無己曰大為虛緊為寒胃中虛寒當即下利下利衇亦微小今反大緊邪盛也故曰難治經曰下利衇大者為未止張璐曰趺陽衇緊為寒邪傷胃故必下利下利衇大為邪盛故難治也趺陽衇微而緊緊則為寒微則為虛微緊相搏則為短氣注衇見浮微而沉緊虛寒之證也趺陽胃衇似有似無為陽虛重按似緊為中寒胃陽虛寒則氣短矣緊衇主痛而不痛者以緊兼微雖緊不徑故不痛也集注程知曰言趺陽微緊則中氣虛寒為短氣之證也趺陽衇不出脾不上下身冷膚鞕注趺陽衇伏不出則中焦陽虛脾胃不能上下輸布衛氣不行故病通身膚冷而鞕也集注程知曰身冷者衛氣不溫也膚鞕者榮血不濡也趺陽衇浮而芤浮者衛氣衰芤者榮氣傷其身體瘦肌肉甲錯浮芤相摶宗氣衰微四屬斷絶注胃衇浮芤浮者胃衇衰芤者榮氣傷衛氣衰故身體瘦也榮氣傷故肌肉甲錯也浮芤相摶日久而宗氣衰微生氣少矣四屬斷絶謂皮肉脂髓四者俱竭故一身枯瘦失滋養矣集注程應旄曰衛以榮為根榮以衛為護而榮衛之統於宗氣者又以趺陽胃為根也趺陽衇緊而浮浮為氣緊為寒浮為腹滿緊為絞痛浮緊相摶腸鳴而轉轉即氣動膈氣乃下少隂衇不出其隂腫大而虛也按隂腫大而虛之虛字當是痛字細玩可知注外感六衇浮緊寒氣在外故骨節煩痛內傷胃衇浮緊寒氣在內故腹滿絞痛寒氣相摶腸鳴而轉轉則膈中寒氣下趨洞泄也若少隂衇浮不出則下焦陽虛寒氣聚於陰器不得發泄故病疝隂腫大而痛也集注方有執曰趺陽之土敗而少隂所以無制也少隂負趺陽者為順也注此少隂負趺陽大㫖蓋少隂腎屬水趺陽胃屬土雜病惡土尅水而傷寒少隂病惟恐土不能制水水一泛溢則嘔吐下利無所不至若趺陽衇和胃土有權則水有制而少隂負則為順矣順者土不為水侮也集注方有執曰萬物資生於土而百骸藉養于胃水土平成物阜人安非天下之至順乎古今謂趺陽有衇者不死有以哉汪琥曰趺陽衇圖經原名衝陽衇在足跗中指端上行五寸去陷谷穴三寸足陽明衇之所過也為原故一名㑹原診法病重者切之以决死生傷寒以胃氣為本趺陽之衇不衰知胃氣尚在病雖危猶可治也少隂衇弱而澀弱者微煩澀者厥逆注少隂衇弱而澀弱者腎隂虛故微煩也澀者衇道滯故肢冷也集注方有執曰弱為虛損不足衇隂虛生內熱所以煩然屬虛煩故雖煩亦微也澀為少血而不滑不能上與陽相順接所以厥而逆冷也程知曰言腎衇微澀之病也少隂腎動衇也在足內踝後跟骨上陷中也少隂衇不至腎氣微少精血奔氣促迫上入胸膈宗氣反聚血結心下陽氣退下熱歸隂股與隂相動令身不仁此為尸厥當刺期門巨闕注少隂衇不至是腎氣衰微精血少也腎者隂中藏陽者也腎隂虛竭不能藏陽陽氣上奔迫促胸膈宗氣反為所阻聚而不行血結心下陽氣既奔於上極必退下退下則隂股間熱與隂相動所必然也雖令知覺冥身不仁而不死此為尸厥也當刺期門以通結血刺巨闕以行宗氣庶厥回而復蘇也音切輒陟涉切惵音垤菽音叔藹於蓋切瞥匹滅切縈於營切卵盧管切溷胡困切齗魚斤切嚏音帝湫子由切疹之忍切痂音加癩力代切御纂醫宗金鑑卷十六
