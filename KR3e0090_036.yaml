body:
  text: 編輯傷寒心法要訣目録傷寒傳經從陽化熱從隂化寒原委太陽風邪傷衛衇證太陽寒邪傷榮衇證風寒榮衛同病衇證誤服三湯致變救逆三陽受病傳經欲愈衇證陽明表病衇證陽明熱病衇證陽明府病衇證陽明慎汗慎清慎下少陽衇證少陽或病柴胡湯加減法少陽禁汗禁吐禁下少陽可吐可汗可下三陽合病併病三隂受病傳經欲愈衇證太隂隂邪衇證太隂陽邪衇證太隂陽明表裏同病少隂隂邪衇證少隂陽邪衇證少隂太陽表裏同病厥隂隂邪衇證厥隂陽邪衇證少隂厥隂外熱裏寒衇證兩感汗下失宜致變壞證表證裏證陽證隂證陽盛格隂隂盛格陽陽毒隂毒御纂醫宗金鑑卷三十六目録欽定四庫全書御纂醫宗金鑑卷三十六編輯傷寒心法要訣目録傷寒傳經從陽化熱從隂化寒原委太陽風邪傷衛衇證太陽寒邪傷榮衇證風寒榮衛同病衇證誤服三湯致變救逆三陽受病傳經欲愈衇證陽明表病衇證陽明熱病衇證陽明府病衇證陽明慎汗慎清慎下少陽衇證少陽或病柴胡湯加減法少陽禁汗禁吐禁下少陽可吐可汗可下三陽合病併病三隂受病傳經欲愈衇證太隂隂邪衇證太隂陽邪衇證太隂陽明表裏同病少隂隂邪衇證少隂陽邪衇證少隂太陽表裏同病厥隂隂邪衇證厥隂陽邪衇證少隂厥隂外熱裏寒衇證兩感汗下失宜致變壞證表證裏證陽證隂證陽盛格隂隂盛格陽陽毒隂毒御纂醫宗金鑑卷三十六目録欽定四庫全書御纂醫宗金鑑卷三十六編輯傷寒心法要訣傷寒一證仲景論中立三百九十七法一百一十三方神明變化可謂既詳且盡矣其治雜證也則有金匱要略分門别類包舉該括無非示人以規矩準繩欲其觸類旁通以應變於無窮也但其辭㫖古奧義藴幽深條目繁多未易領㑹人多苦之兹特撮其要㫖編為歌訣俾學者便於熟讀默記融㑹貫通然後再玩味全書則易讀易解有㑹心之樂而無望洋之歎矣由此登堂入室將見二千年來大法微言昭如日月不致塵封庶幾於斯道不無小補云爾傷寒傳經從陽化熱從隂化寒原委六經為病盡傷寒氣同病異豈期然推其形藏原非一因從類化故多端明諸水火相勝義化寒變熱理何難漫言變化千般狀不外隂陽表裏間注六經謂太陽陽明少陽太隂少隂厥隂也為病盡傷寒謂六經為病盡傷寒之變化也氣同為天之六氣感人為病同也病異謂人受六氣生病異也豈期然謂不能預先期其必然之寒熱也推其形藏原非一謂推原其人形之厚薄藏之虛實非一也因從類化故多端謂人感受邪氣雖一因其形藏不同或從寒化或從熱化或從虛化或從實化故多端不齊也明諸水火相勝義謂水勝則火滅火勝則水乾也化寒變熱理何難謂邪至其經或從隂化為寒或從陽變為熱即水火相勝從化之理何難明也漫言變化千般狀二句謂傷寒變化千般總不外乎隂陽表裏間也太陽風邪傷衛衇證中風傷衛衇浮緩頭項强痛惡寒風病即發熱汗自出鼻鳴乾嘔桂枝功注中風病名也傷衛謂風傷衛也衇浮緩謂中風衇也頭痛項强惡寒惡風發熱汗自出鼻鳴乾嘔謂中風證也桂枝功謂桂枝湯功能治中風虛邪也詳太陽上篇太陽寒邪傷榮衇證傷寒傷榮衇浮緊頭疼身痛惡寒風無汗而喘已未熱嘔逆麻黃湯發靈注傷寒病名也傷榮謂寒傷榮也衇浮緊謂傷寒衇也頭疼身痛惡寒惡風無汗而喘或已發熱或未發熱嘔逆謂傷寒證也麻黃湯發謂傷寒實邪當與麻黃湯發汗最靈也詳太陽中篇風寒榮衛同病衇證中風浮緊遍身痛頭疼發熱惡寒風乾嘔無汗兼煩躁傷寒身重乍時輕浮緩嘔逆無汗喘頭疼發熱惡寒風煩躁而無少隂證榮衛同病大青龍注中風謂風傷衛之病也頭疼發熱惡風惡寒乾嘔中風之證也浮緊寒傷榮之衇也身疼痛寒傷榮之證也今以中風之病而得傷寒之衇與證更兼不汗出之表實內熱之煩躁也傷寒謂寒傷榮之病也身重不痛乍有輕時風傷衛之證也浮緩風傷衛之衇也嘔逆無汗而喘頭疼發熱惡寒惡風寒傷榮之證也是以傷寒之病而得中風之衇與證更兼太陽無汗內熱之煩躁也而無少隂證謂無身重但欲寐之證也榮衛同病謂風寒中傷榮衛同病也二證皆無汗實邪故均以大青龍湯發之詳太陽下篇誤服三湯致變救逆傷寒酒病桂勿與嘔吐不已血膿鮮尺遲服麻致漏汗惡風肢急小便難微弱汗風青龍發厥惕悸眩熱仍然身瞤振振欲劈地桂加附子真武痊注傷寒謂傷寒無汗之實邪也酒病謂病酒狀似中風也桂勿與謂皆勿與桂枝湯也誤與傷寒則表氣愈固裏氣更逆嘔吐不已也誤與酒病則濕熱內釀傷榮吐血膿也此皆誤用桂枝湯之變證當隨其變證治之可也尺遲謂傷寒尺中衇遲也服麻謂服麻黃湯發汗遂致汗出不止名曰漏汗也肢急四肢拘急也小便難謂小便少而難也傷寒衇證當用麻黃湯發汗若尺中衇遲是榮氣不足不可發汗若誤發之則致漏汗惡風四肢拘急小便難等變證也當以桂枝加附子湯救逆可也微弱謂大青龍證衇微弱也汗風謂大青龍證自汗惡風也大青龍證衇不浮緊若浮緩而微弱反汗出是大青龍衇證未具也誤以大青龍發之致其人厥冷筋惕心悸頭眩熱仍不退身肉瞤動也振振欲劈地謂聳動不已不能興起欲墮於地也此皆誤與大青龍湯發汗之變證當以真武湯救逆可也詳太陽篇三陽受病傳經欲愈衇證傷寒一日太陽病欲吐煩躁數急傳陽明少陽證不見衇靜身和為不傳注傷寒一日太陽受病二日陽明受病三日少陽受病此其傳經之常也若初病頗欲吐煩躁衇數急者謂邪盛傳經而不解也二三日陽明少陽證不見衇靜身無所苦者謂邪衰不傳欲自愈矣陽明表病衇證葛根浮長表陽明緣緣面赤額頭疼發熱惡寒而無汗目痛鼻乾卧不寧注太陽未罷又傳陽明太陽表邪怫鬱陽明肌熱為陽明經表病也葛根表陽明謂葛根湯主治陽明表病也浮長謂陽明之表衇也緣緣靣赤連額頭疼發熱惡寒無汗目痛鼻乾卧不得寧皆謂陽明經之表證也用葛根湯解兩經之邪也詳陽明篇陽明熱病衇證白虎煩渴熱陽明汗出身熱衇長洪不惡寒兮反惡熱合柴兼見少陽經注太陽已罷而傳陽明不傳少陽亦未入府其熱漸深表裏俱熱為陽明經熱病也白虎熱陽明謂白虎湯主治陽明熱病也衇長洪謂陽明之熱衇也煩躁口渴引飲汗出身熱不惡寒反惡熱皆謂陽明經熱病之證也用白虎湯解陽明表裏俱熱也陽明未罷又傳少陽亦陽明熱病也合柴謂白虎合小柴胡湯治陽明經熱證兼見少陽經弦衇寒熱往來口苦耳聾目眩而嘔胸脅痛之病也詳陽明少陽篇陽明府病衇證胃實衇大府陽明大便難兮脾約同蒸蒸潮熱濈濈汗滿痛始可議三承注衇大府陽明謂熱邪入府陽明當衇大也曰胃實曰大便難曰脾約謂府病受邪之不同也脾約者太陽陽明也胃實者正陽陽明也大便難者少陽陽明也皆為可下之證不無輕重之别然必蒸蒸潮熱身肢濈濈然汗出或滿或痛始可議其微甚以三承氣湯麻仁丸下之可也詳陽明篇陽明慎汗慎清慎下陽明表證反有汗桂枝加葛中風傳熱證無汗亡津液燥渴仍從白虎痊胃實汗熱原應下惡寒浮緩表為先欲知定鞕識失氣不轉微澀下之寃舌滑尿白小便數便鞕休攻導自安小便數多知便鞕無苦數少是津還注陽明表證應無汗反有汗是從風邪傳來仍從表治宜用桂枝加葛根湯陽明熱證應有汗反無汗是或吐或汗或下亡其津液若無燥渴則從表治若有燥渴仍從熱治宜用白虎湯胃實自汗潮熱原應下之若有惡寒浮緩之表宜先解表表解已乃可攻之欲知大便鞕定未定當少與小承氣湯轉失氣者已成定鞕當與大承氣湯攻之若不轉失氣者未成定鞕攻之必溏勿更與也若衇微澀者亦不可下下之則寃死也舌滑尿白裏熱微也雖小便數大便鞕其熱逺在廣腸亦不可下用蜜煎豬膽導法自可安也凡小便數多知大便必鞕雖大便鞕而無或滿或痛之苦當審其小便日幾行日減數少是津液還於胃中慎不可攻不久必自大便出也詳陽明篇少陽衇證往來寒熱胸脅滿衇弦目眩而耳聾口苦默默不欲食心煩喜嘔少陽經或渴或咳身微熱或脅鞕痛腹中疼或悸不嘔尿不利舌胎滑白小柴宗注衇弦謂少陽病衇也往來寒熱胸脅滿目眩耳聾口苦默默不欲食心煩喜嘔少陽經主證也或渴或咳身微熱或脅鞕痛腹中疼或悸不嘔尿不利舌胎滑白者皆少陽或有之證也均宜小柴胡湯主之隨證加減治之可也詳少陽篇少陽病用柴胡湯加減法胸煩不嘔去參夏加蔞若渴半易根腹痛去芩加芍藥心悸尿祕苓易芩脅下痞鞕棗易蠣不渴微熱桂易參咳去參棗加乾味小柴臨證要當斟注少陽經主證宜小柴胡湯主治也其或有之證務要臨證斟酌加減可也若胸中煩而不嘔去半夏人參加栝蔞實若渴者以半夏易栝蔞根若腹中痛去黃芩加白芍若心下悸小便不利者加茯苓去黃芩若脅下痞鞕加牡蠣去大棗若不渴外有微熱者去人參加桂枝微汗之若咳者去人參大棗加乾薑五味子義詳少陽篇小柴胡湯下少陽禁汗禁吐禁下少陽三禁要詳明汗譫吐下悸而驚甚則吐下利不止水漿不入命難生注三禁謂少陽禁吐禁汗禁下也若誤發汗則生譫語若誤吐下則心悸而驚少陽經即有心下鞕不可下下之甚則下利不止即有胸中滿不可吐吐之甚則水漿不入變成危候命難生也詳少陽篇少陽可吐可汗可下胸滿熱煩梔子豉痞鞕衝喉瓜蒂平發熱惡寒肢煩痛微嘔支結柴桂寧鬱鬱微煩嘔不止心下痛鞕大柴攻誤下柴胡證仍在復與柴胡振汗生注上言其禁恐失宜也此言其可貴變通也胸滿煩熱太陽少陽輕邪也宜梔子豉湯涌之胸滿痞鞕氣上衝喉不得息者太陽少陽重邪也宜瓜蒂散吐之發熱惡寒四肢煩疼微嘔心下支結太陽少陽表證也宜柴胡桂枝湯微汗兩解之鬱鬱微煩嘔不止心下痛鞕少陽陽明表裏證也宜大柴胡湯緩攻兩解之誤下不致變逆柴胡證仍在者復與柴胡湯以和解之若解則必蒸蒸振汗出而解以下後虛故也詳太陽少陽篇三陽合病併病合病兩三經同病併病傳歸併一經二陽合病滿喘發自利葛根嘔半同太少利芩嘔加半明少弦負順長生滑數宿食大承氣三陽合病腹膨膨口燥身重而譫語欲眠合目汗蒸蒸遺尿面垢參白虎浮大汗下禁當應二陽併病汗不徹面赤怫鬱大青龍表罷潮熱手足汗便難譫語大承攻太少頭項痛眩冒心下痞鞕如結胸禁汗吐下惟宜刺譫驚不食利多凶注一經未罷又傳一經二經三經同病而不歸併一經者謂之合病二經三經同病而後歸併一經自病者謂之併病二陽謂太陽陽明也太陽則有頭痛發熱惡寒無汗陽明則有肌熱惡熱心煩不眠之證相合同病也滿喘謂二陽合病當下利不下利更加胸滿而喘宜麻黃湯發之自利謂二陽合病當有之證宜葛根湯也嘔半謂二陽合病不下利但加嘔者宜葛根湯加半夏也同謂二證同用葛根一方也太少謂太陽少陽合病也太陽則有頭痛發熱惡寒無汗少陽則有寒熱往來口苦耳聾目眩胸脅痛之證相合同病也利芩謂太陽少陽合病當自下利宜與黃芩湯也嘔加半謂太陽少陽合病不自利但加嘔者宜黃芩湯加半夏也若不嘔利而見太陽少陽之證非合病也宜用柴胡桂枝湯兩解之明少謂陽明少陽兩經之證同見下利合病也弦負弦為少陽木衇木勝則土負負則死也順長生長為陽明土衇土盛則木不能災為順順則生也滑數謂陽明少陽合病下利黏穢者衇必滑數是宿食也宜大承氣湯嘔酸苦者宜大柴胡湯三陽謂太陽陽明少陽合病也腹膨膨謂腹脹滿也口燥謂口中乾燥也身重謂身重難轉側也譫語謂妄亂言也欲眠謂喜睡也合目汗蒸蒸謂合目出熱汗也遺尿謂失尿不知也面垢謂面似有油垢也此皆三陽熱盛津液枯竭之證設使衇浮禁不可汗衇大亦不可下惟宜用白虎加人參益氣生津清熱可也若未經汗下津液未傷三陽合病輕證惟宜柴葛解肌湯清解三陽可也二陽謂太陽陽明併病也汗不徹謂邪在太陽發汗未徹又傳陽明也面赤謂邪猶怫鬱於太陽陽明之表未併陽明之府宜大青龍湯解兩經之熱也表罷謂太陽證罷也潮熱手足汗大便難譫語謂已歸併陽明府也宜大承氣湯攻陽明實熱也太少謂太陽少陽併病也頭項强痛目眩昏冒心下痞鞕如結胸證謂太陽少陽二經之證尚未歸併其邪未定禁不可汗下惟宜刺大椎肝腧肺腧以瀉其熱也若誤發汗則必發譫語若誤吐下則必心煩而驚水漿不入下利不止變此惡候命多凶也義詳合病併病篇三隂受病傳經欲愈衇證傷寒三日三陽盡熱微煩躁入隂傳其人能食而不嘔衇小尿清為不傳注傷寒三日三陽受邪為盡三隂當受邪其人身熱雖微而煩躁者謂邪去陽入隂不解也若其人反能食而不嘔衇靜小小便清謂邪未入於隂為不傳欲自愈也太隂隂邪衇證太陰陰邪沉遲衇吐食腹滿有時疼手足自溫利不渴理中湯主悸加苓腹滿去术加附子吐多去术加薑生雖吐下多還用术渴欲得水倍术寧欲作奔豚术易桂乾薑寒倍參腹疼注太隂隂邪謂邪從陰化之寒證也衇沉遲太隂隂邪衇也吐食腹滿時痛太隂裏寒證也手足自溫邪入隂也自利不渴藏無熱也宜理中湯主之若心下悸加茯苓腹滿去术加附子吐多去术加生薑雖吐若下利多還用白术若渴欲得飲水仍倍加术若臍下欲作奔豚去术易桂中寒倍加乾薑腹痛倍加人參詳太隂篇太隂陽邪衇證陽邪嗌乾腹滿痛誤下時痛大實疼大承桂枝加芍大衇弱芍大當審行注陽邪謂太隂邪從陽化之熱證也嗌乾謂咽乾太隂熱也腹滿痛太隂有餘證也誤下謂誤下邪陷太隂當分輕重也時痛謂腹有時痛有時不痛宜桂枝加芍藥湯和之大實痛謂腹大滿痛無時不痛宜桂枝加大黃湯下之兼陽明胃實以大承氣湯下之若衇弱即當行大黃芍藥宜斟酌減之以其人胃氣弱易動也詳太隂篇太隂陽明表裏同病腹滿時減復如故此是寒虛氣上從腹滿不減不大便轉屬陽明乃可攻注腹滿時減減復如故謂腹時滿時不滿而減復如常此為太隂寒邪寒虛之氣上逆之滿乃可溫之證也宜厚朴生薑甘草半夏人參湯腹滿不減謂常常而滿終日不減或不大便此為轉屬陽明實熱內壅之滿乃可攻之證也宜大承氣湯詳太隂篇少隂隂邪衇證少隂隂邪衇沉細背寒欲寐口中和咽痛腹痛骨節痛厥利清穀四逆瘥注少隂隂邪謂邪從隂化之寒證也衇沉細少隂隂邪之衇也背寒謂背惡寒陽氣虛也欲寐謂但欲寐隂氣盛也口中和口中不乾燥也咽痛腹痛下利清穀寒盛於中也骨節疼痛四肢厥冷寒淫於外也宜四逆湯溫中散寒也詳少隂篇少隂陽邪衇證少隂陽邪沉細數口噪咽乾大承湯少隂心煩不得卧黃連阿膠是主方注陽邪謂少隂邪從陽化之熱證也少隂病但欲寐隂邪則衇沉細無力陽邪則衇加數而有力矣始病即口燥咽乾水不上升熱之甚也宜大承氣湯急下之㵼陽救隂也少隂病但欲寐二三日已上變生心煩不得眠是陽邪乘隂隂不能靜也宜黃連阿膠湯清陽益隂也詳少隂篇少隂太陽表裏同病少隂衇沉反發熱麻黃附子細辛湯若二三日無裏證減辛加草用之良注少隂病衇沉為隂寒之證當無熱今反發熱是兼有太陽表也宜麻黃附子細辛湯急溫而散之若二三日熱仍不解亦無裏寒吐利之證去細辛易甘草緩溫而和之詳少隂篇厥隂隂邪衇證厥隂隂邪微細厥膚冷藏厥躁難安囊縮舌短胎滑黑四逆當歸四逆先少滿痛厥薑萸入蛔厥靜而復時煩得食而嘔蛔聞臭煩因蛔動烏梅丸注厥隂隂邪謂邪從隂化之寒證也微細厥隂隂邪衇也厥謂四肢厥冷也膚冷謂肌膚冷也藏厥謂寒隂藏厥也躁難安謂煩躁無有安時也囊縮謂外腎為寒收引縮入腹也婦人則乳縮隂收也舌短謂舌縮短也胎滑黑謂舌胎不乾而色黑也四逆謂四逆湯也當歸四逆謂當歸四逆湯也先者謂先服當歸四逆湯也少滿痛謂少腹滿按之痛也厥謂厥冷也薑萸入謂當歸四逆湯加入吳茱萸生薑也蛔厥謂厥而吐蛔也靜而復時煩謂煩時止時煩也得食而嘔蛔聞臭謂嘔因蛔聞食臭而始嘔也煩因蛔動謂煩因蛔動而始煩也烏梅丸蛔厥謂宜用烏梅丸也詳厥隂篇厥隂陽邪衇證陽邪熱厥厥而熱消渴熱氣撞心疼煩滿囊縮舌焦卷便鞕尚任大承攻四逆不分四逆散咳加薑味下利同悸加桂枝腹痛附下重薤白祕尿苓注陽邪謂厥隂邪從陽化之熱證也厥謂手足寒也厥而復熱熱而復厥是謂熱厥厥微熱微厥深熱深也消渴謂飲水多而小便少也熱氣上撞心疼是火挾木邪而逆也煩滿謂少腹煩滿也囊縮謂外腎為熱灼筋縮入腹也舌焦卷謂舌胎乾焦而卷也便鞕謂大便鞕尚可任攻宜大承氣湯四逆謂四肢厥冷也不分謂寒熱之厥疑似不分也宜四逆散疏逹厥隂其厥不回再審寒熱可也或咳加生薑五味子下利亦加故曰同也心下悸加桂枝腹痛加附子㵼利下重加薤白祕尿不利加茯苓詳少隂厥隂篇少隂厥隂外熱裏寒衇證少隂裏寒外熱證面赤身反不惡寒厥利清穀衇微絶通衇四逆主之先利止參加衇不出葱入面色赤炎炎腹痛加芍咽桔梗嘔加聖藥用薑鮮注少隂裏寒外熱之證面赤不惡寒格陽外熱也四肢厥冷下利清穀衇微欲絶隂極裏寒也宜通衇四逆湯主之服四逆湯下利止衇仍不出加人參面色赤者加葱腹痛加芍藥咽痛加桔梗嘔加生薑詳少隂篇兩感一日太陽少隂病頭痛口乾渴而煩二日陽明太隂病滿不欲食身熱譫三日少陽厥隂病耳聾囊縮厥逆寒水漿不入神昏冒六日氣盡命難全注兩感者藏府表裏同病也一日頭痛太陽也口乾煩渴少隂也二日身熱譫語陽明也腹滿不欲食太隂也三日耳聾少陽也囊縮而厥厥隂也傳經之邪其為病也漸兩感之邪其為病也速蓋因陽邪酷烈正不能禦所以三日後水漿不入六府之氣欲絶昏不知人五藏之神已敗而不即死者賴有胃氣未盡耳故又三日其氣乃盡而死張潔古製大羌活湯以羌獨芩連輩辛甘以散太陽之表苦寒以清少隂之熱施之於表裏不急者固為得法也若夫一日則頭痛口乾煩渴二日則身熱譫語腹滿不欲食三日則耳聾囊縮而厥水漿不入昏不知人傳變如此迅速恐用大羌活湯平緩之劑反失機宜當遵仲景治有先後之說審其表裏孰急隨證治之猶或可活故於此證初病一日表裏俱熱者依少隂病得之二三日口燥咽乾之法用大承氣湯重劑以瀉陽邪之烈表裏俱寒者依少隂病始得之反發熱衇沉之法用麻黃附子細辛湯以解隂邪之急二日表裏俱實者依陽明病譫語有潮熱腹滿時減減不足言之法用大承氣湯攻之表裏虛者依三陽合病腹滿身重靣垢譫語之法用大劑白虎加人參湯清之三日表裏熱者依厥深熱亦深之法用大承氣湯下之表裏寒者依衇微欲絶手足厥寒之法用當歸四逆加吳茱萸生薑湯溫之緩則不及事矣其間頗有得生者後之學者其留意焉汗下失宜致變壞證太陽三日已發汗若吐若下若溫針不解致逆成壞證觀其衇證犯何經難辨隂陽六經證重困垂危莫可慿惟用獨參煎冷服鼻上津津有汗生注太陽病三日已發汗不解若吐若下若溫針苟或相當即成解證如其不當不但病不解或因而致逆變成壞證當觀其衇證知犯何經之逆如汗後亡陽渴躁譫語下後寒中結胸痞鞕吐後內煩腹滿溫針後黃衄驚狂之類隨證治之可也甚或衇微欲絶神昏不能言循衣摸床叉手冒心等重困垂危難辨隂陽六經莫可慿之證此時此際惟用人參煎湯徐徐冷服以待其機倘得鼻上津津有汗則為可生之兆也表證表證宜汗太陽經無汗發熱惡寒風頭項强痛身體痛若出自汗表虛明注表證謂寒邪在表無汗發熱惡寒惡風頭項强痛身體痛也太陽經主表故曰表證有是證無汗者皆屬表實雖有是證若自汗出者皆屬表虛未可輕汗即有風邪祗宜桂枝湯解肌可也表實無汗重者麻黃湯主之輕者麻桂各半湯主之時有汗時無汗者桂枝二麻黃一湯主之表實躁熱甚者三黃石膏湯主之微者大青龍湯主之不躁有熱者桂枝二越婢一湯主之以上表證不必悉具亦不論日之多寡但見有頭痛惡寒一二證即為表未罷雖有裏證當先解表表解已乃可攻之臨證者不可不詳辨也詳太陽篇裏證裏證宜下不大便惡熱潮熱汗蒸蒸燥乾譫語滿鞕痛便溏為虛不可攻注裏證謂熱邪內結不大便惡熱潮熱自汗蒸蒸口燥舌乾譫語腹滿鞕痛也陽明府主裏故曰裏證裏實者有脾約有胃實有大便難三者均為可下之證然不無輕重之别三承氣湯脾約丸量其可者而與之庶乎無過也若便溏為裏虛即有是證不可攻也論中有急下數證不待便實而下之者是下其熱也非下其結也義詳陽明少隂篇陽證陽證身輕氣髙熱目睛了了面脣紅熱煩口燥舌乾渴指甲紅兮小便同注陽證謂陽熱之證也不論三隂三陽凡見是證者均為陽熱有餘也陽主動故身輕也陽氣盛故氣髙而喘也陽主熱故口鼻氣熱也陽主寤故目睛了了而不眠也目睛不了了亦有熱極朦朧似不了了然必目赤多眵非若隂證之不了了而神短無光也陽氣熱故身熱面脣紅指甲紅也陽熱入裏故心煩口燥舌乾而渴小便紅也表實者三黃石膏湯發之裏實者三承氣湯下之表裏不實而熱盛者白虎解毒等湯清之可也詳三陽篇隂證隂證身重息短冷目不了了色不紅無熱欲卧厥吐利小便白兮爪甲青注隂證謂隂寒之證也不論三隂三陽凡見是證者均為隂寒不足也隂主靜故身重也隂主寐故目不了了但欲卧也陽氣虛寒故息短口鼻氣冷也隂淫於外故面無紅色四肢厥冷爪甲青也隂邪入內故嘔吐下利清穀小便清白也以上皆三隂寒證臨證者以附子四逆理中吳茱萸等湯擇其宜而與之可也詳三隂篇陽盛格隂陽盛格隂身肢厥惡熱煩渴大便難沉滑爪赤小便赤汗下清宜隂自完注經曰陽氣太盛隂氣不得相營也不相營者不相入也既不相入則格隂於外故曰陽盛格隂也其外證雖身肢厥冷頗似隂寒而內則煩渴大便難小便赤惡熱不欲近衣爪甲赤衇沉滑一派陽實熱證汗下清三法得宜則陽得以消隂得以完全也表實無汗三黃石膏湯裏實不便三承氣湯熱盛無表裏證宜解毒白虎湯集注劉完素曰蓄熱內甚衇須疾數以其極熱蓄甚而衇道不利反致衇沉細欲絶俗未明造化之理反謂傳為寒極隂毒者或始得之陽熱暴甚而便有此證候者或兩感熱甚者通宜解毒加大承氣湯下之後熱稍退而未愈者黃連解毒湯調之或微熱未除者凉膈散調之或失下熱極以至身冷衇微而昏冒將死若急下之則殘隂暴絶必死蓋陽後竭而然也不下亦死宜凉膈散或黃連解毒湯養隂退陽積熱漸以消散則心胸再暖而衇漸以生也隂盛格陽隂盛格陽色淺赤發熱不渴厥而煩下利尿清爪青白浮微通衇復陽還注經曰隂氣太盛陽氣不得相營也不相營者不相入也既不相入則格陽於外故曰隂盛格陽也色淺赤謂面色見浮淺之紅赤色也其外證面赤發熱而煩頗類陽熱其內則不渴下利清穀小便清白爪甲青白四肢厥冷衇浮微欲絶一派隂寒虛證宜通衇四逆湯冷服之從其隂而復其陽也利止衇不出加倍人參下利無衇宜白通加豬膽汁人尿湯厥煩欲死宜吳茱萸湯陽毒陽毒熱極失汗下舌卷焦黑鼻煤烟昏噤發狂如見鬼咽疼唾血赤雲斑六七日前尚可治表裏俱實黑奴丸熱盛解毒裏實下表實三黃石膏煎注陽毒謂陽熱至極之證也失汗下謂應汗不汗應下不下失其汗下之時也熱毒炎炎不已故舌卷焦黑鼻內生煤烟也熱毒內攻乘心故神昏噤栗發狂如見鬼神咽疼唾血也熱毒外薄肌膚故發赤色如錦雲之斑也六七日前謂日淺毒未深入故尚可治表裏俱實謂有是證無汗不大便者宜黑奴丸兩解之無表裏實證熱盛者宜黃連解毒湯兼燥渴者合白虎湯清之裏實不便者宜解毒承氣湯下之表實無汗者宜三黃石膏湯發之隂毒隂毒寒極色青黑咽痛通身厥冷寒重强身疼如被杖腹中絞痛若石堅或嘔或利或煩躁或出冷汗溫補先無汗還陽退隂汗急灸氣海及關元注隂毒謂隂寒至極之證也血衇受隂毒邪故面色青黑也隂毒內攻於裏故咽痛腹中絞痛也隂毒外攻於表故厥冷通身重强疼痛如被杖也獨隂無陽不化故隂凝腹若石之堅硬也或嘔吐或下利或煩躁或冷汗出皆陽虛不足或有之證均以溫補為先宜四逆湯倍加人參若有是證其人無汗宜還陽散退隂散溫而汗之使寒毒散而陽伸也凡遇此證俱宜急灸氣海關元二三百壯隨服藥餌未有不生者也御纂醫宗金鑑卷三十六欽定四庫全書御纂醫宗金鑑卷三十六編輯傷寒心法要訣傷寒一證仲景論中立三百九十七法一百一十三方神明變化可謂既詳且盡矣其治雜證也則有金匱要略分門别類包舉該括無非示人以規矩準繩欲其觸類旁通以應變於無窮也但其辭㫖古奧義藴幽深條目繁多未易領㑹人多苦之兹特撮其要㫖編為歌訣俾學者便於熟讀默記融㑹貫通然後再玩味全書則易讀易解有㑹心之樂而無望洋之歎矣由此登堂入室將見二千年來大法微言昭如日月不致塵封庶幾於斯道不無小補云爾傷寒傳經從陽化熱從隂化寒原委六經為病盡傷寒氣同病異豈期然推其形藏原非一因從類化故多端明諸水火相勝義化寒變熱理何難漫言變化千般狀不外隂陽表裏間注六經謂太陽陽明少陽太隂少隂厥隂也為病盡傷寒謂六經為病盡傷寒之變化也氣同為天之六氣感人為病同也病異謂人受六氣生病異也豈期然謂不能預先期其必然之寒熱也推其形藏原非一謂推原其人形之厚薄藏之虛實非一也因從類化故多端謂人感受邪氣雖一因其形藏不同或從寒化或從熱化或從虛化或從實化故多端不齊也明諸水火相勝義謂水勝則火滅火勝則水乾也化寒變熱理何難謂邪至其經或從隂化為寒或從陽變為熱即水火相勝從化之理何難明也漫言變化千般狀二句謂傷寒變化千般總不外乎隂陽表裏間也太陽風邪傷衛衇證中風傷衛衇浮緩頭項强痛惡寒風病即發熱汗自出鼻鳴乾嘔桂枝功注中風病名也傷衛謂風傷衛也衇浮緩謂中風衇也頭痛項强惡寒惡風發熱汗自出鼻鳴乾嘔謂中風證也桂枝功謂桂枝湯功能治中風虛邪也詳太陽上篇太陽寒邪傷榮衇證傷寒傷榮衇浮緊頭疼身痛惡寒風無汗而喘已未熱嘔逆麻黃湯發靈注傷寒病名也傷榮謂寒傷榮也衇浮緊謂傷寒衇也頭疼身痛惡寒惡風無汗而喘或已發熱或未發熱嘔逆謂傷寒證也麻黃湯發謂傷寒實邪當與麻黃湯發汗最靈也詳太陽中篇風寒榮衛同病衇證中風浮緊遍身痛頭疼發熱惡寒風乾嘔無汗兼煩躁傷寒身重乍時輕浮緩嘔逆無汗喘頭疼發熱惡寒風煩躁而無少隂證榮衛同病大青龍注中風謂風傷衛之病也頭疼發熱惡風惡寒乾嘔中風之證也浮緊寒傷榮之衇也身疼痛寒傷榮之證也今以中風之病而得傷寒之衇與證更兼不汗出之表實內熱之煩躁也傷寒謂寒傷榮之病也身重不痛乍有輕時風傷衛之證也浮緩風傷衛之衇也嘔逆無汗而喘頭疼發熱惡寒惡風寒傷榮之證也是以傷寒之病而得中風之衇與證更兼太陽無汗內熱之煩躁也而無少隂證謂無身重但欲寐之證也榮衛同病謂風寒中傷榮衛同病也二證皆無汗實邪故均以大青龍湯發之詳太陽下篇誤服三湯致變救逆傷寒酒病桂勿與嘔吐不已血膿鮮尺遲服麻致漏汗惡風肢急小便難微弱汗風青龍發厥惕悸眩熱仍然身瞤振振欲劈地桂加附子真武痊注傷寒謂傷寒無汗之實邪也酒病謂病酒狀似中風也桂勿與謂皆勿與桂枝湯也誤與傷寒則表氣愈固裏氣更逆嘔吐不已也誤與酒病則濕熱內釀傷榮吐血膿也此皆誤用桂枝湯之變證當隨其變證治之可也尺遲謂傷寒尺中衇遲也服麻謂服麻黃湯發汗遂致汗出不止名曰漏汗也肢急四肢拘急也小便難謂小便少而難也傷寒衇證當用麻黃湯發汗若尺中衇遲是榮氣不足不可發汗若誤發之則致漏汗惡風四肢拘急小便難等變證也當以桂枝加附子湯救逆可也微弱謂大青龍證衇微弱也汗風謂大青龍證自汗惡風也大青龍證衇不浮緊若浮緩而微弱反汗出是大青龍衇證未具也誤以大青龍發之致其人厥冷筋惕心悸頭眩熱仍不退身肉瞤動也振振欲劈地謂聳動不已不能興起欲墮於地也此皆誤與大青龍湯發汗之變證當以真武湯救逆可也詳太陽篇三陽受病傳經欲愈衇證傷寒一日太陽病欲吐煩躁數急傳陽明少陽證不見衇靜身和為不傳注傷寒一日太陽受病二日陽明受病三日少陽受病此其傳經之常也若初病頗欲吐煩躁衇數急者謂邪盛傳經而不解也二三日陽明少陽證不見衇靜身無所苦者謂邪衰不傳欲自愈矣陽明表病衇證葛根浮長表陽明緣緣面赤額頭疼發熱惡寒而無汗目痛鼻乾卧不寧注太陽未罷又傳陽明太陽表邪怫鬱陽明肌熱為陽明經表病也葛根表陽明謂葛根湯主治陽明表病也浮長謂陽明之表衇也緣緣靣赤連額頭疼發熱惡寒無汗目痛鼻乾卧不得寧皆謂陽明經之表證也用葛根湯解兩經之邪也詳陽明篇陽明熱病衇證白虎煩渴熱陽明汗出身熱衇長洪不惡寒兮反惡熱合柴兼見少陽經注太陽已罷而傳陽明不傳少陽亦未入府其熱漸深表裏俱熱為陽明經熱病也白虎熱陽明謂白虎湯主治陽明熱病也衇長洪謂陽明之熱衇也煩躁口渴引飲汗出身熱不惡寒反惡熱皆謂陽明經熱病之證也用白虎湯解陽明表裏俱熱也陽明未罷又傳少陽亦陽明熱病也合柴謂白虎合小柴胡湯治陽明經熱證兼見少陽經弦衇寒熱往來口苦耳聾目眩而嘔胸脅痛之病也詳陽明少陽篇陽明府病衇證胃實衇大府陽明大便難兮脾約同蒸蒸潮熱濈濈汗滿痛始可議三承注衇大府陽明謂熱邪入府陽明當衇大也曰胃實曰大便難曰脾約謂府病受邪之不同也脾約者太陽陽明也胃實者正陽陽明也大便難者少陽陽明也皆為可下之證不無輕重之别然必蒸蒸潮熱身肢濈濈然汗出或滿或痛始可議其微甚以三承氣湯麻仁丸下之可也詳陽明篇陽明慎汗慎清慎下陽明表證反有汗桂枝加葛中風傳熱證無汗亡津液燥渴仍從白虎痊胃實汗熱原應下惡寒浮緩表為先欲知定鞕識失氣不轉微澀下之寃舌滑尿白小便數便鞕休攻導自安小便數多知便鞕無苦數少是津還注陽明表證應無汗反有汗是從風邪傳來仍從表治宜用桂枝加葛根湯陽明熱證應有汗反無汗是或吐或汗或下亡其津液若無燥渴則從表治若有燥渴仍從熱治宜用白虎湯胃實自汗潮熱原應下之若有惡寒浮緩之表宜先解表表解已乃可攻之欲知大便鞕定未定當少與小承氣湯轉失氣者已成定鞕當與大承氣湯攻之若不轉失氣者未成定鞕攻之必溏勿更與也若衇微澀者亦不可下下之則寃死也舌滑尿白裏熱微也雖小便數大便鞕其熱逺在廣腸亦不可下用蜜煎豬膽導法自可安也凡小便數多知大便必鞕雖大便鞕而無或滿或痛之苦當審其小便日幾行日減數少是津液還於胃中慎不可攻不久必自大便出也詳陽明篇少陽衇證往來寒熱胸脅滿衇弦目眩而耳聾口苦默默不欲食心煩喜嘔少陽經或渴或咳身微熱或脅鞕痛腹中疼或悸不嘔尿不利舌胎滑白小柴宗注衇弦謂少陽病衇也往來寒熱胸脅滿目眩耳聾口苦默默不欲食心煩喜嘔少陽經主證也或渴或咳身微熱或脅鞕痛腹中疼或悸不嘔尿不利舌胎滑白者皆少陽或有之證也均宜小柴胡湯主之隨證加減治之可也詳少陽篇少陽病用柴胡湯加減法胸煩不嘔去參夏加蔞若渴半易根腹痛去芩加芍藥心悸尿祕苓易芩脅下痞鞕棗易蠣不渴微熱桂易參咳去參棗加乾味小柴臨證要當斟注少陽經主證宜小柴胡湯主治也其或有之證務要臨證斟酌加減可也若胸中煩而不嘔去半夏人參加栝蔞實若渴者以半夏易栝蔞根若腹中痛去黃芩加白芍若心下悸小便不利者加茯苓去黃芩若脅下痞鞕加牡蠣去大棗若不渴外有微熱者去人參加桂枝微汗之若咳者去人參大棗加乾薑五味子義詳少陽篇小柴胡湯下少陽禁汗禁吐禁下少陽三禁要詳明汗譫吐下悸而驚甚則吐下利不止水漿不入命難生注三禁謂少陽禁吐禁汗禁下也若誤發汗則生譫語若誤吐下則心悸而驚少陽經即有心下鞕不可下下之甚則下利不止即有胸中滿不可吐吐之甚則水漿不入變成危候命難生也詳少陽篇少陽可吐可汗可下胸滿熱煩梔子豉痞鞕衝喉瓜蒂平發熱惡寒肢煩痛微嘔支結柴桂寧鬱鬱微煩嘔不止心下痛鞕大柴攻誤下柴胡證仍在復與柴胡振汗生注上言其禁恐失宜也此言其可貴變通也胸滿煩熱太陽少陽輕邪也宜梔子豉湯涌之胸滿痞鞕氣上衝喉不得息者太陽少陽重邪也宜瓜蒂散吐之發熱惡寒四肢煩疼微嘔心下支結太陽少陽表證也宜柴胡桂枝湯微汗兩解之鬱鬱微煩嘔不止心下痛鞕少陽陽明表裏證也宜大柴胡湯緩攻兩解之誤下不致變逆柴胡證仍在者復與柴胡湯以和解之若解則必蒸蒸振汗出而解以下後虛故也詳太陽少陽篇三陽合病併病合病兩三經同病併病傳歸併一經二陽合病滿喘發自利葛根嘔半同太少利芩嘔加半明少弦負順長生滑數宿食大承氣三陽合病腹膨膨口燥身重而譫語欲眠合目汗蒸蒸遺尿面垢參白虎浮大汗下禁當應二陽併病汗不徹面赤怫鬱大青龍表罷潮熱手足汗便難譫語大承攻太少頭項痛眩冒心下痞鞕如結胸禁汗吐下惟宜刺譫驚不食利多凶注一經未罷又傳一經二經三經同病而不歸併一經者謂之合病二經三經同病而後歸併一經自病者謂之併病二陽謂太陽陽明也太陽則有頭痛發熱惡寒無汗陽明則有肌熱惡熱心煩不眠之證相合同病也滿喘謂二陽合病當下利不下利更加胸滿而喘宜麻黃湯發之自利謂二陽合病當有之證宜葛根湯也嘔半謂二陽合病不下利但加嘔者宜葛根湯加半夏也同謂二證同用葛根一方也太少謂太陽少陽合病也太陽則有頭痛發熱惡寒無汗少陽則有寒熱往來口苦耳聾目眩胸脅痛之證相合同病也利芩謂太陽少陽合病當自下利宜與黃芩湯也嘔加半謂太陽少陽合病不自利但加嘔者宜黃芩湯加半夏也若不嘔利而見太陽少陽之證非合病也宜用柴胡桂枝湯兩解之明少謂陽明少陽兩經之證同見下利合病也弦負弦為少陽木衇木勝則土負負則死也順長生長為陽明土衇土盛則木不能災為順順則生也滑數謂陽明少陽合病下利黏穢者衇必滑數是宿食也宜大承氣湯嘔酸苦者宜大柴胡湯三陽謂太陽陽明少陽合病也腹膨膨謂腹脹滿也口燥謂口中乾燥也身重謂身重難轉側也譫語謂妄亂言也欲眠謂喜睡也合目汗蒸蒸謂合目出熱汗也遺尿謂失尿不知也面垢謂面似有油垢也此皆三陽熱盛津液枯竭之證設使衇浮禁不可汗衇大亦不可下惟宜用白虎加人參益氣生津清熱可也若未經汗下津液未傷三陽合病輕證惟宜柴葛解肌湯清解三陽可也二陽謂太陽陽明併病也汗不徹謂邪在太陽發汗未徹又傳陽明也面赤謂邪猶怫鬱於太陽陽明之表未併陽明之府宜大青龍湯解兩經之熱也表罷謂太陽證罷也潮熱手足汗大便難譫語謂已歸併陽明府也宜大承氣湯攻陽明實熱也太少謂太陽少陽併病也頭項强痛目眩昏冒心下痞鞕如結胸證謂太陽少陽二經之證尚未歸併其邪未定禁不可汗下惟宜刺大椎肝腧肺腧以瀉其熱也若誤發汗則必發譫語若誤吐下則必心煩而驚水漿不入下利不止變此惡候命多凶也義詳合病併病篇三隂受病傳經欲愈衇證傷寒三日三陽盡熱微煩躁入隂傳其人能食而不嘔衇小尿清為不傳注傷寒三日三陽受邪為盡三隂當受邪其人身熱雖微而煩躁者謂邪去陽入隂不解也若其人反能食而不嘔衇靜小小便清謂邪未入於隂為不傳欲自愈也太隂隂邪衇證太陰陰邪沉遲衇吐食腹滿有時疼手足自溫利不渴理中湯主悸加苓腹滿去术加附子吐多去术加薑生雖吐下多還用术渴欲得水倍术寧欲作奔豚术易桂乾薑寒倍參腹疼注太隂隂邪謂邪從陰化之寒證也衇沉遲太隂隂邪衇也吐食腹滿時痛太隂裏寒證也手足自溫邪入隂也自利不渴藏無熱也宜理中湯主之若心下悸加茯苓腹滿去术加附子吐多去术加生薑雖吐若下利多還用白术若渴欲得飲水仍倍加术若臍下欲作奔豚去术易桂中寒倍加乾薑腹痛倍加人參詳太隂篇太隂陽邪衇證陽邪嗌乾腹滿痛誤下時痛大實疼大承桂枝加芍大衇弱芍大當審行注陽邪謂太隂邪從陽化之熱證也嗌乾謂咽乾太隂熱也腹滿痛太隂有餘證也誤下謂誤下邪陷太隂當分輕重也時痛謂腹有時痛有時不痛宜桂枝加芍藥湯和之大實痛謂腹大滿痛無時不痛宜桂枝加大黃湯下之兼陽明胃實以大承氣湯下之若衇弱即當行大黃芍藥宜斟酌減之以其人胃氣弱易動也詳太隂篇太隂陽明表裏同病腹滿時減復如故此是寒虛氣上從腹滿不減不大便轉屬陽明乃可攻注腹滿時減減復如故謂腹時滿時不滿而減復如常此為太隂寒邪寒虛之氣上逆之滿乃可溫之證也宜厚朴生薑甘草半夏人參湯腹滿不減謂常常而滿終日不減或不大便此為轉屬陽明實熱內壅之滿乃可攻之證也宜大承氣湯詳太隂篇少隂隂邪衇證少隂隂邪衇沉細背寒欲寐口中和咽痛腹痛骨節痛厥利清穀四逆瘥注少隂隂邪謂邪從隂化之寒證也衇沉細少隂隂邪之衇也背寒謂背惡寒陽氣虛也欲寐謂但欲寐隂氣盛也口中和口中不乾燥也咽痛腹痛下利清穀寒盛於中也骨節疼痛四肢厥冷寒淫於外也宜四逆湯溫中散寒也詳少隂篇少隂陽邪衇證少隂陽邪沉細數口噪咽乾大承湯少隂心煩不得卧黃連阿膠是主方注陽邪謂少隂邪從陽化之熱證也少隂病但欲寐隂邪則衇沉細無力陽邪則衇加數而有力矣始病即口燥咽乾水不上升熱之甚也宜大承氣湯急下之㵼陽救隂也少隂病但欲寐二三日已上變生心煩不得眠是陽邪乘隂隂不能靜也宜黃連阿膠湯清陽益隂也詳少隂篇少隂太陽表裏同病少隂衇沉反發熱麻黃附子細辛湯若二三日無裏證減辛加草用之良注少隂病衇沉為隂寒之證當無熱今反發熱是兼有太陽表也宜麻黃附子細辛湯急溫而散之若二三日熱仍不解亦無裏寒吐利之證去細辛易甘草緩溫而和之詳少隂篇厥隂隂邪衇證厥隂隂邪微細厥膚冷藏厥躁難安囊縮舌短胎滑黑四逆當歸四逆先少滿痛厥薑萸入蛔厥靜而復時煩得食而嘔蛔聞臭煩因蛔動烏梅丸注厥隂隂邪謂邪從隂化之寒證也微細厥隂隂邪衇也厥謂四肢厥冷也膚冷謂肌膚冷也藏厥謂寒隂藏厥也躁難安謂煩躁無有安時也囊縮謂外腎為寒收引縮入腹也婦人則乳縮隂收也舌短謂舌縮短也胎滑黑謂舌胎不乾而色黑也四逆謂四逆湯也當歸四逆謂當歸四逆湯也先者謂先服當歸四逆湯也少滿痛謂少腹滿按之痛也厥謂厥冷也薑萸入謂當歸四逆湯加入吳茱萸生薑也蛔厥謂厥而吐蛔也靜而復時煩謂煩時止時煩也得食而嘔蛔聞臭謂嘔因蛔聞食臭而始嘔也煩因蛔動謂煩因蛔動而始煩也烏梅丸蛔厥謂宜用烏梅丸也詳厥隂篇厥隂陽邪衇證陽邪熱厥厥而熱消渴熱氣撞心疼煩滿囊縮舌焦卷便鞕尚任大承攻四逆不分四逆散咳加薑味下利同悸加桂枝腹痛附下重薤白祕尿苓注陽邪謂厥隂邪從陽化之熱證也厥謂手足寒也厥而復熱熱而復厥是謂熱厥厥微熱微厥深熱深也消渴謂飲水多而小便少也熱氣上撞心疼是火挾木邪而逆也煩滿謂少腹煩滿也囊縮謂外腎為熱灼筋縮入腹也舌焦卷謂舌胎乾焦而卷也便鞕謂大便鞕尚可任攻宜大承氣湯四逆謂四肢厥冷也不分謂寒熱之厥疑似不分也宜四逆散疏逹厥隂其厥不回再審寒熱可也或咳加生薑五味子下利亦加故曰同也心下悸加桂枝腹痛加附子㵼利下重加薤白祕尿不利加茯苓詳少隂厥隂篇少隂厥隂外熱裏寒衇證少隂裏寒外熱證面赤身反不惡寒厥利清穀衇微絶通衇四逆主之先利止參加衇不出葱入面色赤炎炎腹痛加芍咽桔梗嘔加聖藥用薑鮮注少隂裏寒外熱之證面赤不惡寒格陽外熱也四肢厥冷下利清穀衇微欲絶隂極裏寒也宜通衇四逆湯主之服四逆湯下利止衇仍不出加人參面色赤者加葱腹痛加芍藥咽痛加桔梗嘔加生薑詳少隂篇兩感一日太陽少隂病頭痛口乾渴而煩二日陽明太隂病滿不欲食身熱譫三日少陽厥隂病耳聾囊縮厥逆寒水漿不入神昏冒六日氣盡命難全注兩感者藏府表裏同病也一日頭痛太陽也口乾煩渴少隂也二日身熱譫語陽明也腹滿不欲食太隂也三日耳聾少陽也囊縮而厥厥隂也傳經之邪其為病也漸兩感之邪其為病也速蓋因陽邪酷烈正不能禦所以三日後水漿不入六府之氣欲絶昏不知人五藏之神已敗而不即死者賴有胃氣未盡耳故又三日其氣乃盡而死張潔古製大羌活湯以羌獨芩連輩辛甘以散太陽之表苦寒以清少隂之熱施之於表裏不急者固為得法也若夫一日則頭痛口乾煩渴二日則身熱譫語腹滿不欲食三日則耳聾囊縮而厥水漿不入昏不知人傳變如此迅速恐用大羌活湯平緩之劑反失機宜當遵仲景治有先後之說審其表裏孰急隨證治之猶或可活故於此證初病一日表裏俱熱者依少隂病得之二三日口燥咽乾之法用大承氣湯重劑以瀉陽邪之烈表裏俱寒者依少隂病始得之反發熱衇沉之法用麻黃附子細辛湯以解隂邪之急二日表裏俱實者依陽明病譫語有潮熱腹滿時減減不足言之法用大承氣湯攻之表裏虛者依三陽合病腹滿身重靣垢譫語之法用大劑白虎加人參湯清之三日表裏熱者依厥深熱亦深之法用大承氣湯下之表裏寒者依衇微欲絶手足厥寒之法用當歸四逆加吳茱萸生薑湯溫之緩則不及事矣其間頗有得生者後之學者其留意焉汗下失宜致變壞證太陽三日已發汗若吐若下若溫針不解致逆成壞證觀其衇證犯何經難辨隂陽六經證重困垂危莫可慿惟用獨參煎冷服鼻上津津有汗生注太陽病三日已發汗不解若吐若下若溫針苟或相當即成解證如其不當不但病不解或因而致逆變成壞證當觀其衇證知犯何經之逆如汗後亡陽渴躁譫語下後寒中結胸痞鞕吐後內煩腹滿溫針後黃衄驚狂之類隨證治之可也甚或衇微欲絶神昏不能言循衣摸床叉手冒心等重困垂危難辨隂陽六經莫可慿之證此時此際惟用人參煎湯徐徐冷服以待其機倘得鼻上津津有汗則為可生之兆也表證表證宜汗太陽經無汗發熱惡寒風頭項强痛身體痛若出自汗表虛明注表證謂寒邪在表無汗發熱惡寒惡風頭項强痛身體痛也太陽經主表故曰表證有是證無汗者皆屬表實雖有是證若自汗出者皆屬表虛未可輕汗即有風邪祗宜桂枝湯解肌可也表實無汗重者麻黃湯主之輕者麻桂各半湯主之時有汗時無汗者桂枝二麻黃一湯主之表實躁熱甚者三黃石膏湯主之微者大青龍湯主之不躁有熱者桂枝二越婢一湯主之以上表證不必悉具亦不論日之多寡但見有頭痛惡寒一二證即為表未罷雖有裏證當先解表表解已乃可攻之臨證者不可不詳辨也詳太陽篇裏證裏證宜下不大便惡熱潮熱汗蒸蒸燥乾譫語滿鞕痛便溏為虛不可攻注裏證謂熱邪內結不大便惡熱潮熱自汗蒸蒸口燥舌乾譫語腹滿鞕痛也陽明府主裏故曰裏證裏實者有脾約有胃實有大便難三者均為可下之證然不無輕重之别三承氣湯脾約丸量其可者而與之庶乎無過也若便溏為裏虛即有是證不可攻也論中有急下數證不待便實而下之者是下其熱也非下其結也義詳陽明少隂篇陽證陽證身輕氣髙熱目睛了了面脣紅熱煩口燥舌乾渴指甲紅兮小便同注陽證謂陽熱之證也不論三隂三陽凡見是證者均為陽熱有餘也陽主動故身輕也陽氣盛故氣髙而喘也陽主熱故口鼻氣熱也陽主寤故目睛了了而不眠也目睛不了了亦有熱極朦朧似不了了然必目赤多眵非若隂證之不了了而神短無光也陽氣熱故身熱面脣紅指甲紅也陽熱入裏故心煩口燥舌乾而渴小便紅也表實者三黃石膏湯發之裏實者三承氣湯下之表裏不實而熱盛者白虎解毒等湯清之可也詳三陽篇隂證隂證身重息短冷目不了了色不紅無熱欲卧厥吐利小便白兮爪甲青注隂證謂隂寒之證也不論三隂三陽凡見是證者均為隂寒不足也隂主靜故身重也隂主寐故目不了了但欲卧也陽氣虛寒故息短口鼻氣冷也隂淫於外故面無紅色四肢厥冷爪甲青也隂邪入內故嘔吐下利清穀小便清白也以上皆三隂寒證臨證者以附子四逆理中吳茱萸等湯擇其宜而與之可也詳三隂篇陽盛格隂陽盛格隂身肢厥惡熱煩渴大便難沉滑爪赤小便赤汗下清宜隂自完注經曰陽氣太盛隂氣不得相營也不相營者不相入也既不相入則格隂於外故曰陽盛格隂也其外證雖身肢厥冷頗似隂寒而內則煩渴大便難小便赤惡熱不欲近衣爪甲赤衇沉滑一派陽實熱證汗下清三法得宜則陽得以消隂得以完全也表實無汗三黃石膏湯裏實不便三承氣湯熱盛無表裏證宜解毒白虎湯集注劉完素曰蓄熱內甚衇須疾數以其極熱蓄甚而衇道不利反致衇沉細欲絶俗未明造化之理反謂傳為寒極隂毒者或始得之陽熱暴甚而便有此證候者或兩感熱甚者通宜解毒加大承氣湯下之後熱稍退而未愈者黃連解毒湯調之或微熱未除者凉膈散調之或失下熱極以至身冷衇微而昏冒將死若急下之則殘隂暴絶必死蓋陽後竭而然也不下亦死宜凉膈散或黃連解毒湯養隂退陽積熱漸以消散則心胸再暖而衇漸以生也隂盛格陽隂盛格陽色淺赤發熱不渴厥而煩下利尿清爪青白浮微通衇復陽還注經曰隂氣太盛陽氣不得相營也不相營者不相入也既不相入則格陽於外故曰隂盛格陽也色淺赤謂面色見浮淺之紅赤色也其外證面赤發熱而煩頗類陽熱其內則不渴下利清穀小便清白爪甲青白四肢厥冷衇浮微欲絶一派隂寒虛證宜通衇四逆湯冷服之從其隂而復其陽也利止衇不出加倍人參下利無衇宜白通加豬膽汁人尿湯厥煩欲死宜吳茱萸湯陽毒陽毒熱極失汗下舌卷焦黑鼻煤烟昏噤發狂如見鬼咽疼唾血赤雲斑六七日前尚可治表裏俱實黑奴丸熱盛解毒裏實下表實三黃石膏煎注陽毒謂陽熱至極之證也失汗下謂應汗不汗應下不下失其汗下之時也熱毒炎炎不已故舌卷焦黑鼻內生煤烟也熱毒內攻乘心故神昏噤栗發狂如見鬼神咽疼唾血也熱毒外薄肌膚故發赤色如錦雲之斑也六七日前謂日淺毒未深入故尚可治表裏俱實謂有是證無汗不大便者宜黑奴丸兩解之無表裏實證熱盛者宜黃連解毒湯兼燥渴者合白虎湯清之裏實不便者宜解毒承氣湯下之表實無汗者宜三黃石膏湯發之隂毒隂毒寒極色青黑咽痛通身厥冷寒重强身疼如被杖腹中絞痛若石堅或嘔或利或煩躁或出冷汗溫補先無汗還陽退隂汗急灸氣海及關元注隂毒謂隂寒至極之證也血衇受隂毒邪故面色青黑也隂毒內攻於裏故咽痛腹中絞痛也隂毒外攻於表故厥冷通身重强疼痛如被杖也獨隂無陽不化故隂凝腹若石之堅硬也或嘔吐或下利或煩躁或冷汗出皆陽虛不足或有之證均以溫補為先宜四逆湯倍加人參若有是證其人無汗宜還陽散退隂散溫而汗之使寒毒散而陽伸也凡遇此證俱宜急灸氣海關元二三百壯隨服藥餌未有不生者也御纂醫宗金鑑卷三十六
