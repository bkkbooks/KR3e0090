body:
  text: 編輯刺灸心法要訣目録手少隂心藏圖心藏經文心經循行圖心經循行經文心經循行歌心經穴圖心經穴歌心經分寸歌手太陽小腸府歌小腸經文小腸經循行圖小腸經循行經文小腸經循行歌小腸經穴圖小腸經穴歌小腸經分寸歌足太陽膀胱府圖膀胱經文膀胱經循行圖膀胱經循行經文膀胱經循行歌膀胱經穴圖膀胱經歌膀胱經分寸歌手厥隂心包絡府圖心包絡解心包絡經循行圖心包絡經循行經文心包絡經循行歌心包絡經穴圖心包絡經穴歌心包絡經分寸歌御纂醫宗金鑑卷八十二目録欽定四庫全書御纂醫宗金鑑卷八十二編輯刺灸心法要訣目録手少隂心藏圖心藏經文心經循行圖心經循行經文心經循行歌心經穴圖心經穴歌心經分寸歌手太陽小腸府歌小腸經文小腸經循行圖小腸經循行經文小腸經循行歌小腸經穴圖小腸經穴歌小腸經分寸歌足太陽膀胱府圖膀胱經文膀胱經循行圖膀胱經循行經文膀胱經循行歌膀胱經穴圖膀胱經歌膀胱經分寸歌手厥隂心包絡府圖心包絡解心包絡經循行圖心包絡經循行經文心包絡經循行歌心包絡經穴圖心包絡經穴歌心包絡經分寸歌御纂醫宗金鑑卷八十二目録欽定四庫全書御纂醫宗金鑑卷八十二編輯刺灸心法要訣心藏經文經云心者君主之官神明出焉又云心居肺管之下膈膜之上附著脊之第五椎其合脈也其榮色也開竅於耳又曰開竅於舌又云是經少血少氣難經曰心重十二兩中有七孔三毛盛精汁三合主藏神張介賔曰心象尖圎形如蓮蕊其中有竅多寡不同以導引天真之氣下無透竅上通乎舌共有四系以通四藏心外有赤黃脂裹是為心包絡心下有膈膜與脊脅周回相著遮蔽濁氣使不得上熏心肺所謂膻中也心經循行經文心手少隂之脈起於心中出屬心系下膈絡小腸其支者從心系上俠咽繫目系其直者復從心系却上肺下出腋下循臑內後廉行手太隂肺心主之後下肘內循臂內後廉抵掌後鋭骨之端入掌內後廉循小指之內出其端心經循行歌手少隂脈起心中下膈直與小腸通支者還從肺系走直上喉嚨繫目瞳直者上肺出腋下臑後肘內少海從臂內後廉抵掌中鋭骨之端注少衝注手少隂心經之脈起於心中出屬心系由心系下膈絡小腸其經之支者從心系上行俠咽繫目之系其經之直者復從心系退上通肺行手太隂肺心主之後下出行腋下極泉穴也從極泉穴循臑內後廉青靈穴也從青靈穴下肘內循臂內後廉少海穴也從少海穴抵掌後鋭骨之端靈道通里隂郤神門等穴也從神門穴入掌內後廉少府穴也從少府穴循小指之內出其端少衝穴而終以交於手太陽小腸經也心經穴歌手少隂心起極泉青靈少海靈道全通里隂郤神門下少府少衝小指邉心經分寸歌少隂心起極泉中腋下筋間動引胸青靈肘上三寸取少海肘後端五分靈道掌後一寸半通里腕後一寸同隂郤腕後內半寸神門掌後鋭骨隆少府小指本節末小指內側取少衝注極泉穴在腋下臂內筋間動脈引胸中是其穴也從極泉下行至肘在肘上三寸伸肘舉臂取之青靈穴也從青靈下行肘內廉節後大骨外上去肘端五分肘內橫紋頭屈肘向頭取之少海穴也從少海下行掌後一寸五分靈道穴也從靈道下行五分循腕側外腕後一寸陷中通里穴也從通里內行五分掌後脈中腕後五分隂郤穴也從隂郤行掌後鋭骨端陷中神門穴也從神門行手小指本節末外側骨縫陷中少府穴也從少府行小指內中行去爪甲角如韭葉少衝穴也小腸經文經云小腸者受盛之官化物出焉又云小腸後附於脊前附於臍上左回疊積十六曲大二寸半徑八分分之少半長三丈二尺受榖二斗四升水六升三合合之大半又云小腸上口在臍上二寸近脊水榖由此而入復下一寸外附於臍為水分穴當小腸下口至是而泌别清濁水液滲入膀胱滓穢流入大腸又云是經多血少氣難經曰小腸重二斤十四兩小腸經循行經文小腸手太陽之脈起於小指之端循手外側上腕出踝中直上循臂骨下廉出肘內側兩骨之間上循臑外後亷出肩解繞肩胛交肩上入缺盆絡心循咽下膈抵胃屬小腸其支者從缺盆循頭上頰至目鋭眥却入耳中其支者别頰上䪼抵鼻至目內眥斜絡於顴小腸經循行歌手太陽經小腸脈小指之端起少澤循手外側出踝中循臂骨出肘內側上循臑外出後廉直過肩解繞肩胛交肩下入缺盆內向腋絡心循咽嗌下膈抵胃屬小腸一支缺盆貫頸頰至目鋭眥却入耳復從耳前仍上頰抵鼻升至目內眥斜絡於顴别絡接注手太陽小腸之脈從小指內側少隂之脈少衝穴循小指之端少澤穴起循手外側前谷後溪穴從後溪上腕至腕骨穴從腕骨出踝中入陽谷養老穴也從養老直上循臂骨下亷支正穴也從支正出肘內側兩筋間小海穴也從小海上循臑外後亷出肩解肩貞穴繞肩胛臑俞穴上肩天宗穴也從天宗循行秉風曲垣等穴從肩中俞入缺盆穴散而內行絡心循咽下膈抵胃屬小腸之分其支者從缺盆循頸入天忩天容穴上頰顴髎穴至目鋭眥却入耳中聚於聽宫穴也其别支從頰上䪼抵鼻至目內眥以交於足太陽經小腸經穴歌手太陽經小腸穴少澤先於小指設前谷後溪腕骨間陽谷須同養老列支正小海上肩貞臑俞天宗秉風合曲垣肩外復肩中天忩循次上天容此經穴數一十九還有顴髎入聼宫小腸經分寸歌小指端外為少澤前谷本節前外側節後橫紋取後溪腕骨腕前骨陷側陽谷鋭骨下陷肘腕上一寸名養老支正外側上四寸小海肘端五分好肩貞肩端後陷中臑俞肩臑骨陷考肩臑骨陷者下胛骨上舉臂陷中取之也天宗肩骨下陷中秉風肩上小髃空肩上髃骨後舉肩有空曲垣肩中曲􅦅陷外俞上􅦅一寸從即外肩俞肩􅦅上廉去脊三寸中俞大椎二寸旁天忩曲頰動陷詳天容耳下曲頰後顴髎面頄鋭骨量面頄骨下廉鋭骨端陷中聽宫耳中珠子上耳中珠子大如赤小豆此為小腸手太陽注少澤穴在手小指外側端去爪甲角一分陷中是其穴也從少澤上行手小指外側夲節前陷中前谷穴也從前谷上行手小指本節後外側橫紋尖上陷中仰手握拳取之後溪穴也從後溪上行手掌外側腕前起骨下罅縫陷中腕骨穴也從腕骨上行手掌外側腕下鋭骨下陷中陽谷穴也從陽谷上行手下鋭骨上一空腕後一寸許陷中養老穴也從養老上行外廉四寸支正穴也從支正上行肘外大骨外去肘端五分陷中屈手向頭取之小海穴也從小海上行肩曲􅦅骨下大骨傍兩骨解間肩端後陷中肩貞穴也從肩貞上行肩端臑上肩骨下􅦅骨上廉陷中舉臂取之臑俞穴也從臑俞上行肩骨下陷中天宗穴也從天宗上行肩上小髃骨舉臂有空秉風穴也從秉風上行肩中央曲􅦅陷中按之應手痛曲垣穴也從曲垣上行肩􅦅上廉去脊傍開三寸陷中肩外俞穴也從肩外俞上行肩􅦅內廉去脊督脈之大椎穴傍開二寸陷中肩中俞穴也從肩中俞上行頸大筋前曲頰下動脈應手陷中天忩穴也從天忩上行耳下曲頰後天容穴也從天容上行面頄骨下廉鋭骨端陷中顴髎穴也從顴髎上行耳中之珠聼宫穴也膀胱經文經云膀胱者州都之官津液藏焉氣化則能出矣又云膀胱當十九椎居腎之下大腸之前有下口無上口當臍上一寸水分穴處為小腸下口乃膀胱上際水液由此别回腸隨氣泌滲而入其出入皆由氣化入氣不化則水歸大腸而為泄瀉出氣不化則閉塞下竅而為癃腫也是經多血少氣難經曰膀胱重九兩二銖縱廣九寸盛溺九升九合口廣二寸半膀胱循行經文膀胱足太陽之脈起於目內眥上額交顛其直者從顛入絡腦還出别下項循肩髆內挾脊抵腰中入循膂絡腎屬膀胱其直者從腰中下挾脊貫臀入膕中其支者從髆內左右别下貫胛挾脊內過髀樞循髀外從後亷下合膕中以下貫腨內出外踝之後循京骨至小指外側膀胱經循行歌足太陽經膀胱脈目內眥上起額尖支者顛上至耳角直者從顛腦後懸絡腦還出别下項仍循肩膊俠脊邉抵腰膂腎膀胱內一支下與後隂連貫臀斜入委中穴一支膊內左右别貫胛俠脊過髀樞臂內後廉膕中合下貫腨內外踝後京骨骨下指外側注足太陽之脈起目內眥睛明穴從睛明循行攢竹曲差五處上額交顛入承光穴從承光循行通天穴其支者從顛至耳上角交於足少陽之經其直者從通天入絡於大杼穴從大杼循行肩髆內風門穴從風門循行肺俞穴挾脊抵腰中厥隂俞穴從厥隂俞穴循行心俞鬲俞肝俞膽俞脾俞胃俞三焦俞入循膂絡腎從腎俞穴循行氣海俞從腰中下挾脊大腸俞穴從大腸俞循行關元俞膀胱俞中膂俞白環俞等穴别行上髎次髎中髎下髎等穴其支者又復上肩膊內從附分穴循行貫胛魄户穴從魄户循行挾脊內膏肓神堂譩嘻鬲關魂門陽綱意舍胃倉育門志室胞肓等穴過髀樞秩邉穴從秩邉穴循髀外從後廉承扶浮陽委陽穴下合膕中委中穴從委中循行合陽穴從合陽下貫腨內承筋穴從承筋循行承山飛陽附陽等穴從附陽穴循行出外踝之後崑崙穴從崑崙穴循行僕參申脈金門等穴循京骨即本經之京骨穴也從京骨循行束骨通谷穴至小指外側至隂穴而終以交于足之少隂經也膀胱經穴歌足太陽經六十三睛明攢竹曲差參五處承光接通天絡却玉枕天柱邉大杼風門引肺俞厥隂心膈肝膽居脾胃三焦腎俞次大腸小腸膀胱如中膂白環皆二行去脊中間二寸許上髎次髎中後下會陽須下尻旁取還有附分在三行二椎三寸半相當魄戶膏肓與神堂譩嘻膈關魂門旁陽綱意舍及胃倉育門志室連胞肓秩邉承扶殷門穴浮郤相鄰是委陽委中再下合陽去承筋承山相次長飛陽附陽達崑崙僕參申脈過金門京骨束骨近通谷小指外側尋至隂膀胱經分寸歌足太陽兮膀胱經目內眥角始睛明眉頭陷中攢竹取曲差神庭傍寸五五處直行後五分承通絡却玉枕穴後循俱是寸五行天柱項後髮際內大筋外亷之陷中自此脊中開二寸第一大杼二風門三椎肺俞厥隂四心五督六膈七論肝九膽十脾十一胃俞十二椎下尋十三三焦十四腎氣海俞在十五椎大腸十六小十八膀胱俞穴十九椎中膂內俞二十下白環俞穴草一椎小腸俞至白環內腰空上次中下髎會陽隂微尻骨旁背開二寸二行了别從脊中三寸半第二椎下為附分三椎魄戶四膏肓第五椎下神堂尊第六噫嘻膈關七第九魂門陽綱十十一意舍之穴存十二胃倉穴已分十三育門端正在十四志室不須論十九胞肓草秩邉背部三行下行循承扶臀下股上約下行六寸是殷門從殷外斜上一寸曲膝得之浮郤尋委陽承扶下六寸從郤內斜並殷門委中膝膕約紋裏此下三寸尋合陽承筋腳跟上七寸穴在腨腸之中央承山腿肚分肉間外踝七寸上飛陽附陽外踝上三寸崑崙外跟陷中央僕參亦在踝骨下申脈踝下五分張金門申脈下一寸京骨外側大骨當束骨本節後陷中通谷節前限中量至隂小指外側端去爪甲之韭葉方注睛明穴在目內眥外一分宛宛中是其穴也從睛明上行眉頭陷者中攢竹穴也從攢竹上行髮際間俠督脈之神庭穴傍開一寸五分正頭取之曲差穴也從曲差後行五分俠督脈之上星傍開一寸五分五處穴也從五處後行一寸五分承光穴也從承光後行一寸五分俠督脈之百會穴傍開一寸五分通天穴也從通天後行一寸五分絡却穴也從絡却後行一寸五分玉枕穴也從玉枕俠項後大筋外廉下行髮際陷中天柱穴也從天柱下行以項後第一椎下兩旁相去脊中各二寸陷中正坐取之大杼穴也從大杼下行二椎下兩旁各去脊中二寸正坐取之風門穴也從風門行三椎下去脊中各二寸又以手搭背左取右右取左當中指末是穴之處正坐取之肺俞穴也從肺俞行四椎下去脊中二寸正坐取之厥隂俞穴也從厥隂俞行五椎下去脊中二寸正坐取之心俞穴也從心俞行六椎下去脊中二寸正坐取之督俞穴也從督俞行七椎下去脊中二寸正坐取之膈俞穴也從膈俞行九椎下去脊中二寸正坐取之膽俞穴也從膽俞行十一椎下去脊中二寸正坐取之脾俞穴也從脾俞行十二椎下去脊中二寸正坐取之胃俞穴也從胃俞行十三椎下去脊中二寸正坐取之三焦俞穴也從三焦俞行十四椎下與臍平去脊中二寸正坐取之腎俞穴也從腎俞行十五椎下去脊中二寸正坐取之氣海俞穴也從氣海俞行十六椎下去脊中二寸伏而取之大腸俞穴也從大腸俞行十七椎下去脊中二寸伏而取之關元俞穴也從關元俞行十八椎下去脊中二寸伏而取之小腸俞穴也從小腸俞行十九椎下去脊中二寸伏而取之膀胱俞穴也從膀胱俞行二十椎下去脊中二寸俠脊胂起肉間伏而取之中膂俞穴也從中膂俞行二十椎下去脊中二寸伏而取之白環俞穴也從白環俞行腰髁骨下一寸俠脊兩旁第一空陷中上髎穴也從上髎行俠脊旁第二空陷中次髎穴也從次髎行俠脊旁第三空陷中中髎穴也從中髎行俠脊旁第四空陷中下髎穴也從下髎行隂尾尻骨兩旁五分許會陽穴也自大杼别脈其支者從肩膊內循行第二椎下附項內廉兩傍相去脊中各三寸半正坐取之附分穴也從附分下行第三椎下去脊中各三寸半正坐取之魄戶穴也從魄戶下行第四椎下五椎上此穴居中去脊中各三寸半正坐曲脊取之膏肓穴也如取其穴先令病人正坐曲脊伸兩手以臂著膝前令正直手大指與膝頭齊以物支肘勿令臂動乃從胛骨上角摸索至胛骨下頭其間當有四肋三間依胛骨之際相去骨際如容側指許按其中一間空處自覺牽引肩是其穴也從膏肓下行第五椎下去脊中各三寸半陷中正坐取之神堂穴也從神堂下行第六椎下去脊中各三寸半正坐取之譩嘻穴也以手重按病人呼譩嘻是其穴處蓋因其痛也從譩嘻下行第七椎下去脊中各三寸半陷中正坐開肩取之膈關穴也從膈關下行第九椎下相去脊中各三寸半陷中正坐取之魂門穴也從魂門下行第十椎下去脊中三寸半陷中正坐取之陽綱穴也從陽綱下行第十一椎下去脊中三寸半正坐取之意舍穴也從意舍下行第十椎下去脊中各三寸半正坐取之胃倉穴也從胃倉下行第十三椎下去脊中各三寸半正坐取之育門穴也從育門下行第十四椎下去脊中各三寸半陷中正坐取之志室穴也從志室下行第十九椎下去脊中各三寸半伏而取之胞肓穴也從胞肓下行第二十一椎下去脊中各三寸半陷中伏而取之秩邉穴也從秩邉下行在尻臀下隂股上約紋中承扶穴也從殷門外循斜上一寸屈膝得之浮郤穴也故在委陽穴上一寸也從浮郤下行仍在承扶穴下六寸屈伸取之委陽穴也而與會陽下合膕中也從委陽下行膕中央約紋動脈陷中令人仰頦至地伏臥取之委中穴也從委中下行膝膕約紋下三寸合陽穴也從合陽下行腨腸中央陷中腳跟上七寸承筋穴也從承筋下行腿肚下尖分肉間陷中承山穴也從承山斜行足外踝後上七寸陷中飛陽穴也從飛陽下行足外踝上三寸筋骨之間附陽穴也從附陽下行足外踝後五分跟骨上陷中細動脈應手崑崙穴也從崑崙下行足跟骨下陷中拱足取之僕參穴也從僕參行足外踝下五分陷中容爪甲許白肉際申脈穴也從申脈下行一寸金門穴也從金門行足外側大骨下赤白肉際陷中京骨穴也按而得之小指夲節後大骨名京骨其穴在骨下從京骨行足小指外側夲節後陷中赤白肉際束骨穴也從束骨行足小指外側夲節前陷中通谷穴也從通谷行足小指外側去爪甲角如韭葉至隂穴也心包絡解張介賓曰心包一藏難經言其無形滑壽曰心包一名手心主以藏象校之在心下橫膜之上豎膜之下其與橫膜相粘而黃脂裹者心也脂􅀈之外有細筋膜如絲與心肺相連者心包也此説為是凡言無形者非靈蘭祕典論有十二官獨少心包一官而有膻中者臣使之官喜樂出焉二句今考心包藏居膈上經始胸中正值膻中之所位居相火代君行事實臣使也此一官即此經之謂歟心包絡循行經文手厥隂心主包絡之脈起於胸中出屬心包絡下膈歷絡三焦其支者循胸中出脅下腋三寸上抵腋下循臑內行太隂少隂之間入肘中下臂行兩筋之間入掌中循中指出其端其支者别掌中循小指次指出其端心包絡經循行歌手厥隂心主起胸屬包下膈三焦宫支者循胸出脅下脅下連腋三寸同仍上抵腋循臑內太隂少隂兩經中指透中衝支者别小指次指絡相通注手厥隂心包絡之脈起於胸中出而外行天池穴屬心包絡之經也內行下膈歷絡三焦者散布於腹之上中下也其支者循胸中出腋下三寸即天池穴處也從天池循臑內至天泉從天泉穴行手太隂手少隂兩脈之間入肘內曲澤穴下臂行兩筋之間郤門間使內關大陵四穴入掌中勞宫穴從勞宫循中指出其端中衝穴也其夲支之别支别行掌中循小指次指之端以交於手少陽三焦經也心包絡經穴歌心包九穴天池近天泉曲澤郤門認間使內關踰大陵勞宫中衝中指盡心包絡經分寸歌心絡起自天池間乳後傍一腋下三天泉繞腋下二寸曲澤屈肘陷中參郤門去腕後五寸間使腕後三寸然內關去腕後二寸大陵掌後橫紋間勞宫屈拳名指取中指之末中衝端注天池穴在乳傍一二寸許直腋下行三寸脅之撅起肋骨間是其穴也從天池穴斜上繞腋循臂內廉下行二寸舉臂取之天泉穴也從天泉穴下行肘內廉大筋內側橫紋頭下陷中動脈曲澤穴也從曲澤穴下行掌後去腕五寸郤門穴也從郤門穴下行掌後去腕三寸兩筋間陷中間使穴也從間使穴下行掌後去腕二寸兩筋間內關穴也從內關穴下行掌後骨下橫紋中兩筋間陷中大陵穴也從大陵穴下行掌中央動脈屈無名指取之勞宫穴也從勞宫穴下行手中指之端去爪甲角如韭葉許陷中中衝穴也御纂醫宗金鑑卷八十二
