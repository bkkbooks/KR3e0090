body:
  text: 編輯刺灸心法要訣目録竒經八脈總歌任脈循行圖任脈循行經文任脈循行歌任脈穴圖任脈穴歌任脈分寸歌督脈循行圖督脈循行經文督脈循行歌督脈穴圖督脈穴歌督脈分寸歌附督脈解衝脈循行圖衝脈循行經文衝脈循行歌衝脈穴圖衝脈穴歌衝脈分寸歌附任督衝三脈合解帶脈循行圖帶脈循行經文帶脈循行歌帶脈穴圖帶脈穴歌帶脈分寸歌陽蹻脈循行圖陽蹻隂蹻脈循行經文陽蹻脈循行歌陽蹻脈穴圖陽蹻脈穴歌陽蹻脈分寸歌隂蹻脈循行圖隂蹻脈循行歌隂蹻脈穴圖隂蹻脈穴歌隂蹻脈分寸歌陽維脈循行圖陽維隂維脈循行經文陽維脈循行歌陽維脈穴圖陽維脈穴歌陽維脈分寸歌隂維脈循行圖隂維脈循行歌隂維脈穴圖隂維脈穴歌隂維脈分寸歌御纂醫宗金鑑卷八十四目録欽定四庫全書御纂醫宗金鑑卷八十四編輯刺灸心法要訣目録竒經八脈總歌任脈循行圖任脈循行經文任脈循行歌任脈穴圖任脈穴歌任脈分寸歌督脈循行圖督脈循行經文督脈循行歌督脈穴圖督脈穴歌督脈分寸歌附督脈解衝脈循行圖衝脈循行經文衝脈循行歌衝脈穴圖衝脈穴歌衝脈分寸歌附任督衝三脈合解帶脈循行圖帶脈循行經文帶脈循行歌帶脈穴圖帶脈穴歌帶脈分寸歌陽蹻脈循行圖陽蹻隂蹻脈循行經文陽蹻脈循行歌陽蹻脈穴圖陽蹻脈穴歌陽蹻脈分寸歌隂蹻脈循行圖隂蹻脈循行歌隂蹻脈穴圖隂蹻脈穴歌隂蹻脈分寸歌陽維脈循行圖陽維隂維脈循行經文陽維脈循行歌陽維脈穴圖陽維脈穴歌陽維脈分寸歌隂維脈循行圖隂維脈循行歌隂維脈穴圖隂維脈穴歌隂維脈分寸歌御纂醫宗金鑑卷八十四目録欽定四庫全書御纂醫宗金鑑卷八十四編輯刺灸心法要訣奇經八脈總歌正經經外是竒經八脈分司各有名任脈任前督於後衝起會隂腎同行陽蹻跟外膀胱别隂起跟前隨少隂陽維維絡諸陽脈隂維維絡在諸隂帶脈圍腰如束帶不由常度號奇經注脈有奇常十二經者常脈也奇經則不拘於常故謂之奇也蓋人之氣血常行於十二經脈經脈滿溢流入他經别道而行故名奇經奇經有八曰任督衝帶陽蹻隂蹻陽維隂維是也任脈任於前督脈督於後衝脈為諸脈之海帶脈猶身之束帶陽蹻為足太陽之别隂蹻為足少隂之别陽維則維絡諸陽隂維則維絡諸隂隂陽相維諸經乃調故此八脈譬猶圖設溝渠以備水潦斯無濫溢之患人有奇經亦若是也任脈循行經文素問骨空論曰任脈者起於中極之下以上毛際循腹裏上關元至咽喉上頤循面入目靈樞五音五味篇曰衝脈任脈皆起於胞中上循背裏為經絡之海其浮而外者循腹上行會於咽喉别而絡口唇任脈循行歌任脈起於中極下會隂腹裏上關元循內上行會衝脈浮外循腹至喉咽别絡口唇承漿已過足陽明上頤間循面入目至睛明交督隂脈海名傳注任脈者起於中極之下中極者穴名也在少腹聚毛處之上毛際也中極之下謂曲骨之下會隂穴也以上毛際循腹裏上關元者謂從會隂循內上行會於衝脈為經絡之海也其浮而外者循腹上行至於咽喉别絡口唇至承漿而終上頤循面入目至睛明者謂不直交督脈由足陽明承泣穴上頤循面入目內眥之足太陽睛明穴始交於督脈總為隂脈之海也任脈穴歌任脈中行二十四會隂潛伏兩隂間曲骨之前中極在關元石門氣海邉隂交神闕水分處下脘建里中脘前上脘巨闕連鳩尾中庭膻中玉堂聨紫宮華蓋循璇璣天突亷泉承漿端任脈分寸歌任脈會隂兩隂間曲骨毛際陷中安中極臍下四寸取關元臍下三寸連臍下二寸名石門臍下寸半氣海全臍下一寸隂交穴臍之中央即神闕臍上一寸為水分臍上二寸下脘列臍上三寸名建里臍上四寸中脘許臍上五寸上脘在巨闕臍上六寸五鳩尾蔽骨下五分中庭膻下六寸取膻中却在兩乳間膻上寸六玉堂主膻上紫宮三寸二膻上華蓋四八舉四寸八分膻上璇璣五寸八璣上一寸天突起天突喉下約四寸亷泉頷下骨尖已承漿頤前脣稜下任脈中央行腹裏注會隂穴在前隂後隂之中間任督衝三脈所起督由會隂而行背任由會隂而行腹衝由會隂而行足也從會隂上行橫骨上毛際陷中動脈應手臍下五寸曲骨穴也從曲骨上行在臍下四寸中極穴也從中極上行在臍下三寸即關元穴也從關元上行在臍下二寸石門穴也從石門上行在臍下一寸五分宛宛中氣海穴也從氣海上行在臍下一寸隂交穴也從隂交上行當臍之中神闕穴也從神闕上行臍上一寸水分穴也從水分上行臍上二寸下脘穴也從下脘上行臍上三寸建里穴也從建里上行在臍上四寸中脘穴也從中脘上行在臍上五寸上脘穴也從上脘上行在兩岐骨下二寸巨闕穴也從巨闕上行一寸鳩尾穴也從鳩尾上行一寸陷中中庭穴也從中庭上行一寸六分膻中穴也從膻中上行一寸六分陷中玉堂穴也從玉堂上行一寸六分陷中紫宮穴也從紫宮上行一寸六分陷中華蓋穴也從華蓋上行一寸陷中璇璣穴也從璇璣上行一寸天突穴也從天突上行在頷下結喉上中央舌本下仰而取之亷泉穴也從亷泉上行在頤前下脣稜下陷中承漿穴也督脈循行經文素問骨空論曰督脈者起於少腹以下骨中央女子入繫廷孔其孔溺孔之端也其絡循隂器合篡間繞篡後别繞臀至少隂與巨陽中絡者合少隂上股內後亷貫脊屬腎與太陽起於目內眥上額交顚上入絡腦還出别下項循肩髆內俠脊抵腰中入循膂絡腎其男子循莖下至篡與女子等其少腹直上者貫臍中央上貫心入喉上頤環唇上繫兩目之下中央督脈循行歌督脈少腹骨中央女子入繫溺孔疆男子之絡循隂器繞篡之後别臀方至少隂者循腹裏會任直上關元行屬腎會衝街腹氣入喉上頤環脣當上繫兩目中央下始合內眥絡太陽上額交顚入絡腦還出下項肩髆場俠脊抵腰入循膂絡腎莖篡等同鄉此是申明督脈路總為陽脈之督綱注督脈者起於少腹下骨中央謂男女少腹以下橫骨內之中央即女子入繫廷孔之端男子隂器合篡間也男子隂莖盡處精室孔溺孔合並一路合篡處也即女子胞孔溺孔合並之處廷孔之端即下文曰與女子等也其絡循隂器合篡間繞篡後行是謂本絡外合太陽中絡也别絡繞臀是謂别絡內並少隂腹裡也故經曰至少隂與巨陽中絡者合也至少隂者循行上股內後亷循腹裏與任脈上會於關元貫脊屬腎俠腎上行與衝脈會於腹氣之街故經曰自少腹直上貫臍中央上貫心入喉上頤環脣內行至督脈齦交而終外行繫兩目之下中央循行目內眥會於太陽故經曰與太陽起於目內眥上額交顚上入絡腦還出别下項循肩髆內俠脊抵腰中入循膂絡腎復會於少隂此督脈之循行也督脈穴歌督脈行脈之中行二十八穴始長強腰俞陽關入命門懸樞脊中中樞長筋縮至陽歸靈臺神道身柱陶道開大椎啞門連風府腦户強間後頂排百會前頂通囟會上星神庭素髎對水溝兑端在脣上齦交上齒縫之內督脈分寸歌尾閭骨端是長強二十一椎腰俞當十六陽關十四命三一懸樞脊中央十椎中樞筋縮九七椎之下乃至陽六靈五身三身柱陶道一椎之下鄉一椎之上大椎穴上至髮際啞門行風府一寸宛中取腦户二五枕之方再上四寸強間位五寸五分後頂強七寸百會頂中取耳尖前後髮中央前頂前行八寸半前行一尺囟會量一尺一寸上星位前髮尺二神庭當鼻端準頭素髎穴水溝鼻下人中藏兑端脣上端上取齦交脣內齒縫鄉注督脈之别起於長強者即繞篡後外合太陽循行尾閭間長強穴也俠膂上項散頭上下當肩左右别走太陽入貫膂謂督脈循外而上行也故難經曰起於下極之俞即長強尾閭間也並於脊裏即俠脊也上至風府入屬於腦即上項散頭也從長強貫脊上行二十一椎下腰俞穴也十六椎下陽關穴也十四椎下命門穴也十三椎下懸樞穴也十一椎下脊中穴也十椎下中樞穴也九椎下筋縮穴也七椎下至陽穴也六椎下靈台穴也五椎下神道穴也三椎下身柱穴也一椎下陶道穴也一椎之上大椎穴也上至上髮際啞門穴也從啞門入髮際風府穴也從風府上行一寸五分枕骨上腦户穴也從腦户上行一寸五分強間穴也從強間上行一寸五分後頂穴也從後頂上行一寸五分直兩耳尖頂陷中百會穴也從百會前行一寸五分前頂穴也從前頂前行一寸五分囟會穴也從囟會又前行一寸上星穴也從上星至前髮際神庭穴也前後髮際合骨度共一尺二寸也從前髮際下至鼻端準頭素窖穴也鼻柱下溝中央近鼻孔陷中水溝穴也脣上端兑端穴也脣內齒上齦縫中齦交穴也凡二十八穴循行背之中行者也按督脈始於長強者本自靈樞經脈篇曰督脈之别名長強俠膂上項散頭上下當肩胛左右别走太陽入貫膂難經二十八難曰督脈者起於下極之俞並於脊裡之上至風府入屬於腦乃指穴而言也前論督脈起於少腹者是指循行而言也衝脈循行經文素問骨空論曰衝脈者起於氣街並於少隂之經俠臍上行至胸中而散靈樞衛氣篇曰請言氣街胸氣有街腹氣有街頭氣有街脛氣有街故氣在頭者止之於腦氣在胸者止之膺與背俞氣在腹者止之背俞與衝脈在臍之左右之動脈者氣在脛者止之於氣街與承山踝上衝脈循行歌衝脈起於腹氣街後天宗氣氣衝來並於先天之真氣相並俠臍上胸街大氣至胸中而散會合督任充身懷分布藏府諸經絡名之曰海不為乖注衝脈者起於氣街是起於腹氣之街也名曰氣街者是謂氣所行之街也一身之大氣積於胸中者有先天之真氣是所受者即人之腎間動氣也有後天之宗氣是水穀所化者即人之胃氣也此所謂起於腹氣之街者是起胃中穀氣也並於少隂者是並於腎間動氣也其真氣與穀氣相並俠臍上行至胸中而散是謂大氣至胸中分布五藏六府諸經而充身者也靈樞順逆肥瘦篇曰衝脈者五藏六府之海也五藏六府皆稟氣焉靈樞動俞篇又曰衝脈者十二經之海與少隂之大絡起於腎下出於氣街也靈樞五音五味篇又曰衝脈任脈皆起於胞中者即此之起於腎下之謂也而謂起於腎下者即並於少隂之經腎間動氣上行也素問骨空論曰衝脈起於氣衝者即此出於氣街之謂也不曰起而曰出者謂穀氣由陽明胃經出而會於氣街也衝脈穴歌衝脈俠臍起橫骨大氣四注盲俞同商石隂通幽門穴至胸散布任流行衝脈分寸歌衝脈分寸同少隂起於橫骨至幽門上行每穴皆一寸穴開中行各五分注衝脈起於足陽明並於足少隂腹氣之街俠臍中行左右五分而上行自少腹下尖隂上橫骨穴從橫骨穴上行大赫氣穴四海中注盲俞商曲石關隂都通谷幽門等共十一穴每穴上行相去各一寸中行左右各五分按任督衝三脈素問骨空論曰任脈起於中極之下毛際以上是外指少腹之分也循腹裏是內指胞中也督脈起於少腹以下骨中央女子廷孔男子隂器合篡貫脊屬腎亦是外指少腹內指胞中也衝脈起於氣街並少隂之經亦是指於胞中也雖未明言胞中而實未嘗不起於胞中也是以知任督衝三脈皆起於胞中然三脈皆後天水穀所化胃氣出於氣街會於胞中與先天腎間動之真氣並行而充身者也由此觀之三脈同出一源無疑矣故王氷內經注甲乙經針灸圖經以任脈循背者謂之督脈自少腹上謂之任脈亦謂之督脈則是以背腹隂陽别為名目耳然衝脈亦起於胞中並足少隂而上行是任脈督脈衝脈乃一源而三岐者故人身之有腹背猶天地之有子午任督之有前後猶二陸之分隂陽也胞中者謂男女丹田之通稱也在女子謂之女子胞在男子即精室也帶脈循行經文靈樞經脈别篇曰足少隂上至膕中别走太陽而合上至腎當十四椎出屬帶脈二十八難曰帶脈者起於季脅回身一周帶脈循行歌帶脈足少隂經脈上膕别走太陽經合腎十四椎屬帶起於季脅繞身行注帶脈本由足少隂經之脈上至膕中别走太陽而合腎當十四椎出屬帶脈故起於季脅繞身一周行也帶脈穴歌帶起少陽帶脈穴繞行五樞維道間京門之下居髎上周回季脅束帶然注足少隂之正脈出於然谷循內踝後其别者入跟中上腨內至膕中别走而合太陽上至腎之氣穴穴當十四椎內與足少隂衝脈會外與足少陽帶脈合會而不與衝脈偕行出於季脅屬少陽帶脈穴也故難經曰帶脈者起於季脅也回身一周者謂起於足少陽帶脈穴循行五樞穴維道穴不行居髎穴回行如帶故曰帶脈也帶脈分寸歌帶脈部分足少陽季脅寸八是其鄉由帶三寸五樞穴過章五三維道當注帶脈部分在足少陽經季脅之下一寸八分即帶脈穴也從帶脈穴下三寸即五樞穴也從五樞下行過肝經之章門穴下五寸三分即維道穴也陽蹻隂蹻脈循行經文靈樞脈度篇曰蹻脈者少隂之别起於然谷之後上內踝之上直上循隂股入隂上循胸裏入缺盆上出人迎之前入頄屬目內眥合於太陽陽蹻而上行氣並相還則為濡目目氣不榮則目不合二十八難曰陽蹻脈者起於跟中循外踝上行入風池隂蹻脈者亦起於跟中循內踝上行至咽喉交貫衝脈陽蹻脈循行歌陽蹻脈起於跟中上合三陽外踝行從脅循肩入頸頄屬目內眥太陽經注陽蹻之脈起於足跟之中上合三陽外踝上行從脅少陽居髎之穴上循肩入頸頄陽明之肩髃承泣等穴屬目內眥而會太陽也陽蹻脈穴歌陽蹻脈起申僕陽居髎肩髃巨骨鄉臑俞地倉巨髎泣終於睛明一穴強陽蹻脈分寸歌陽蹻脈起足太陽申脈外踝五分藏僕參後繞跟骨下附陽外踝三寸鄉居髎監骨上陷取肩髃一穴肩尖當肩上上行名巨骨肩胛之上臑俞坊口吻旁四地倉位鼻旁八分巨髎疆目下七分是承泣目內眥出睛明昂注蹻者足也奇經涉於足者之名也曰陽者以其所行陽經也陽蹻者謂足太陽經之别脈也起於足太陽膀胱經足外踝下五分陷中申脈穴也從申脈繞後跟骨下僕參穴也從僕參穴又前斜足外踝上三寸附陽穴也又與足少陽會於季脅軟骨端下八寸三分居髎穴也又與手陽明會於膊骨頭肩端上肩髃穴也從肩髃穴上行肩尖上兩叉骨巨骨穴也又與手足太陽陽維會於肩後大骨下胛上亷臑俞穴也又與手足陽明會於夾口吻旁四分地倉穴也從地倉穴行於鼻孔旁八分巨髎穴也又與任脈足陽明會於目下七分承泣穴也又與手足太陽足陽明隂蹻會於目內眥外一分睛明穴也隂蹻脈循行歌隂蹻亦起於跟中少隂之别內踝行上循隂股入胸腹上至咽喉至睛明注隂蹻之脈亦起於跟中由少隂别脈然谷之穴上行內踝循隂股入胸腹上至咽喉睛明穴亦會於太陽也隂蹻脈穴歌隂蹻起於然谷穴上行照海交信列三穴原本足少隂足之太陽睛明接隂蹻脈分寸歌隂蹻脈起足少隂足內踝前然谷尋踝下一寸照海陷踝上二寸交信真目內眥外宛中取睛明一穴甚分明注隂蹻者以其所行隂經為足少隂之别脈也起於足少隂腎經足內踝前大骨下陷中然谷穴也從然谷穴循內踝之下一寸照海穴也從照海穴不循太溪穴又郤於足內踝之上二寸直行交信穴從交信穴上循隂股入隂而行上循胸裏入缺盆上出人迎之前入頄鼻旁屬目內眥外宛宛中睛明穴合於太陽陽蹻上行氣並相還則為濡目之用矣故知隂蹻脈氣若不與陽蹻脈氣並榮於目則目不能合也此隂蹻循行之經脈也陽維隂維脈循行經文二十八難曰陽維隂維者維絡於身溢畜不能環流灌溢諸經者也故陽維起於諸陽之會隂維起於諸隂交也陽維脈循行歌陽維脈起足太陽外踝之下金門疆從胻背肩項面頭維絡諸陽會督場注陽維之脈起於足太陽經外踝之下金門穴也從胻骨背外肩胛項旁面上頭後至啞門穴維絡諸陽會於督脈也陽維脈穴歌陽維脈起穴金門臑俞天髎肩井深本神陽白並臨泣正營腦空風池巡風府啞門此二穴項後入髮是其根陽維脈分寸歌陽維脈起足太陽外踝一寸金門藏踝上七寸陽交位肩後胛上臑俞當天髎穴在缺盆上肩上陷中肩井鄉本神入髮四分許眉上一寸陽白詳入髮五分臨泣穴上行一寸正營場枕骨之下腦空位風池耳後陷中藏項後入髮啞門穴入髮一寸風府疆注陽維起於諸陽之會者謂起於足太陽膀胱經之足外踝下一寸金門穴也從金門穴行於足少陽膽經之足外踝上七寸陽交穴也又與手足太陽及蹻脈會於肩後大骨下胛上亷臑俞穴也又與手足少陽會於缺盆中上毖骨際天髎穴也又會於肩上陷中肩井穴也從肩井穴上頭與足少陽會於眉上一寸陽白穴也從陽白穴上行於目上直入髮際本神臨泣穴也從臨泣穴上行二寸正營穴也從正營穴循行枕骨下腦空穴也從腦空穴下行至耳後大筋外亷風池穴也又與督脈會於項後風府啞門穴此陽維脈氣所發也隂維脈循行歌隂維脈起足少隂內踝上行穴築賔循腹至乳上結喉維絡諸隂會於任注隂維之脈起於足少隂經內踝上行築賔之穴循腹至乳上結喉至亷泉穴維絡諸隂會於任脈也隂維脈穴歌隂維之穴起築賔府舍大橫腹哀循期門天突亷舌本此是隂維脈維隂隂維脈分寸歌隂維脈起足少隂內踝之後尋築賔少腹之下稱府舍大橫平臍是穴名此穴去中三寸半行至乳下腹哀明期門直乳二肋縫天突結喉下一寸注隂維起於諸隂之交者謂起於足少隂腎經之足內踝後上腨分中名曰築賔穴也與足太隂交於少腹下去腹中行三寸半府舍穴也又平臍去中行三寸半大橫穴也又行至乳下二肋端縫之下二寸腹哀穴也又與足厥隂交於乳下二肋端縫期門穴也又與任脈交於結喉下一寸宛宛中天突穴也從天突穴上行在頷下結喉上中央舌本下亷泉穴此隂維脈氣所發也御纂醫宗金鑑卷八十四
