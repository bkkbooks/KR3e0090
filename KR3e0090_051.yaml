  text: 編輯幼科雜病心法要訣目録初生門下目爛生地黃湯真金散懸癰如聖散一字散重齦一字散清胃散鵝口清熱瀉脾散保命散吐舌瀉心導赤湯弄舌瀉黃散瀉心導赤湯重舌清熱飲涼心散木舌川消散瀉心導赤湯哯乳和中清熱飲溫中止吐湯平胃散枳桔二陳湯夜啼釣藤飲導赤散蟬花散胎黃生地黃湯犀角散胎赤清熱解毒湯蔣氏化毒丹赤遊風犀角解毒飲藍葉散砭血法神功散豬肉貼法塗法初生無皮換肌消毒散當歸飲清涼膏鵝黃散撲粉法變蒸驚風門驚風總括驚風八候通關急救法通關散急驚風清熱鎮驚湯安神鎮驚丸至寶丹牛黃丸涼膈散羌活散瀉青丸清熱化痰湯瀉心導赤湯涼驚丸急驚後調理法琥珀抱龍丸清心滌痰湯慢驚風醒脾湯緩肝理脾湯夾熱夾痰慢驚青州白丸子柴芍六君子湯慢脾風溫中補脾湯固真湯理中湯癎證門癎證總括隂癎醒脾湯固真湯定癎丹陽癎龍膽湯瀉青丸四製抱龍丸驚癎大青膏鎮驚丸痰癎一捻金硃衣滚痰丸食癎妙聖丹硃衣滚痰丸清熱和胃丸風癎化風丹羌活桂枝湯牛黃丸御纂醫宗金鑑卷五十一目録欽定四庫全書御纂醫宗金鑑卷五十一編輯幼科雜病心法要訣目録初生門下目爛生地黃湯真金散懸癰如聖散一字散重齦一字散清胃散鵝口清熱瀉脾散保命散吐舌瀉心導赤湯弄舌瀉黃散瀉心導赤湯重舌清熱飲涼心散木舌川消散瀉心導赤湯哯乳和中清熱飲溫中止吐湯平胃散枳桔二陳湯夜啼釣藤飲導赤散蟬花散胎黃生地黃湯犀角散胎赤清熱解毒湯蔣氏化毒丹赤遊風犀角解毒飲藍葉散砭血法神功散豬肉貼法塗法初生無皮換肌消毒散當歸飲清涼膏鵝黃散撲粉法變蒸驚風門驚風總括驚風八候通關急救法通關散急驚風清熱鎮驚湯安神鎮驚丸至寶丹牛黃丸涼膈散羌活散瀉青丸清熱化痰湯瀉心導赤湯涼驚丸急驚後調理法琥珀抱龍丸清心滌痰湯慢驚風醒脾湯緩肝理脾湯夾熱夾痰慢驚青州白丸子柴芍六君子湯慢脾風溫中補脾湯固真湯理中湯癎證門癎證總括隂癎醒脾湯固真湯定癎丹陽癎龍膽湯瀉青丸四製抱龍丸驚癎大青膏鎮驚丸痰癎一捻金硃衣滚痰丸食癎妙聖丹硃衣滚痰丸清熱和胃丸風癎化風丹羌活桂枝湯牛黃丸御纂醫宗金鑑卷五十一目録欽定四庫全書御纂醫宗金鑑卷五十一編輯幼科雜病心法要訣初生門下目爛兒生兩目痛難睜胞邊赤爛胎熱攻內用地黃湯清熱外點真金目即明注目爛者胞邊赤爛痛癢難睜因胎中藴熱生後毒熱上攻於目故有是證內服地黃湯以清熱外用真金散以點目其證自愈生地黃湯方見目不開真金散黃連生黃蘗生當歸赤芍藥各一錢杏仁五分皮尖炒去右銼散乳汁浸一宿晒乾為極細末用生地黃汁調一字頻頻點眼即愈懸癰腭上腫起號懸癰皆因胎毒熱上衝法當刺破鹽湯拭如聖一字摻之靈注凡喉裏上腭腫起如蘆籜盛水狀者名曰懸癰蘆籜者蘆笋也此胎毒上攻須以棉纒長針留鋒刺之瀉去青黃赤汁未消者來日再刺刺後以鹽湯拭口用如聖散或一字散摻之如聖散鉛霜一錢真牛黃一錢太隂元精石硃砂各二錢五分水飛龍腦五分右為極細末每用一字摻患處一字散硃砂水飛硼砂各五分龍腦朴消各一字右為極細末用蜜調少許鵝翎蘸搽口內重齦重齦胎熱胃中蓄牙根腫脹痛難禁刺破一字散敷上繼進清胃效如神注重齦者因小兒在胎有熱蓄於胃中故牙根腫如水泡名曰重齦治法用針刺破以鹽湯拭淨外敷一字散內服清胃散其腫自消一字散方見懸癰清胃散生地丹皮黃連當歸升麻石膏煆引用燈心水煎服方歌清胃散治胃熱熏生地黃連當歸身丹皮升麻石膏煆臨煎須要入燈心鵝口鵝口白屑滿舌口心脾藴熱本胎原清熱瀉脾搽保命少遲糜爛治難痊注鵝口者白屑生滿口舌如鵝之口也由在胎中受母飲食熱毒之氣藴於心脾二經故生後遂發於口舌之間治法以清熱瀉脾散主之外用髮蘸井水拭口搽以保命散日敷二三次白退自安倘治之稍遲必口舌糜爛吮乳不得則難痊矣清熱瀉脾散山梔炒石膏煆黃連薑炒生地黃芩赤苓引用燈心水煎服方歌清熱瀉脾治鵝口石膏生地赤苓煎芩連梔子合成劑加入燈心病即安保命散白礬燒灰硃砂各二錢五分水飛馬牙消五錢右研末以白鵝糞水攪取汁塗舌與口角上吐舌吐長收緩名吐舌皆是心經有熱成面紅煩渴溺赤澀瀉心導赤服即寧注吐舌者伸長而收緩也因心經有熱所致故面紅煩躁口渴尿赤宜瀉心導赤湯主之瀉心導赤湯木通生地黃連甘草生引用燈心水煎服方歌瀉心導赤湯最良心熱吐舌即堪嘗木通生地黃連草燈心加入服自強弄舌弄舌時時口內搖心脾熱發口脣焦煩熱舌乾大便穢瀉黃導赤並能療注兒舌口中搖動者因心脾有熱以致脣焦舌乾煩熱便穢先用瀉黃散次服瀉心導赤湯瀉黃散藿香葉山梔子炒石膏煆防風甘草生引加燈心水煎服方歌弄舌瀉黃散最神藿香葉配山梔仁甘草防風石膏煆臨時煎服入燈心瀉心導赤湯方見吐舌重舌舌下腫突似舌形心脾積熱上攻衝內服宜以清熱飲外敷涼心功最靈注重舌者因舌下近舌根處其腫形似舌故名重舌此心脾之熱宜服清熱飲外吹涼心散清熱飲黃連生生地木通甘草生連翹去心蓮子引用淡竹葉水煎時時灌入口中方歌清熱飲內用黃連生地蓮子木通甘連翹更加淡竹葉一同煎服自然安涼心散青黛硼砂黃蘗黃連人乳拌晒人中白各二錢煆過風化消一錢氷片二分右為極細末吹之甚效木舌木舌心脾積熱成腫脹木硬證多凶外用川消敷舌上內服瀉心導赤靈注木舌一證皆因心脾積熱而成蓋脾之脈絡在舌下又舌為心苖遇火上衝令兒舌腫滿木硬不能轉動故名木舌外用川消散敷舌上內服瀉心導赤湯若不急治必至難救川消散朴消五分真紫雪二分鹽一分右為細末以竹瀝調敷舌上瀉心導赤湯方見吐舌哯乳哯乳之候非一端傷乳停痰胃熱寒熱宜和中清熱飲寒用溫中止吐煎傷乳平胃散最妙停痰二陳湯可痊若是滿而自溢者常須節乳自能安注小兒哯乳證非一端有宿乳停痰胃寒胃熱之分不可一例而治如面色多赤二便微祕手足指熱此為熱哯也宜和中清熱飲主之面色青白糞青多沫手足指冷此因寒而哯也宜溫中止吐湯主之口熱脣乾夜卧不寧手足心熱此為傷乳而哯也宜平胃散主之胸膈膨滿嘔吐痰涎此因停痰而哯也宜枳桔二陳湯主之若喫乳過多滿而自溢者不須服藥惟節乳則哯自止矣和中清熱飲黃連薑炒半夏薑製陳皮茯苓藿香砂仁引用薑水煎服方歌和中清熱飲黃連半夏陳皮茯苓攢藿香砂仁合成劑水煎徐服可安全溫中止吐湯白豆蔲研茯苓半夏薑製生薑水煎沖磨沉香汁服方歌溫中止吐白豆蔲茯苓半夏共生薑臨服沉香汁加入專治哯乳自寒傷平胃散蒼术炒陳皮厚朴薑炒甘草炙麥芽炒砂仁研引用薑水煎服方歌小兒傷乳多吐哯平胃調和功可見蒼陳厚朴甘草偕加入麥砂薑一片枳桔二陳湯枳殼麩炒桔梗陳皮半夏薑製茯苓甘草炙引用薑水煎服方歌停痰哯乳不能安枳桔二陳湯最先枳桔陳半苓甘草生薑加入即時痊夜啼夜啼寒熱因胎受須將形色辨分明寒屬脾經面青白手腹俱冷曲腰疼面赤溺閉屬心熱熱用導赤寒釣藤若無寒熱表裏證古法蟬花散最精注小兒初生夜啼其因有二一曰脾寒一曰心熱皆受自胎中觀其形色便知病情矣如面色青白手腹俱冷不欲吮乳曲腰不伸者脾寒也鈎藤飲主之面赤脣紅身腹俱熱小便不利煩躁多啼者心熱也導赤散主之若無已上形證但多啼者用蟬花散最當釣藤飲川芎白當歸茯神白芍炒茯苓甘草炙木香煨釣藤鈎引用紅棗水煎服方歌夜啼之證因脾寒須服釣藤飲可痊芎歸神芍苓甘草木香釣藤紅棗煎導赤散方見小便不通蟬花散蟬蛻不拘多少下半截右研細末每服少許薄荷煎湯調下胎黃兒生遍體色如金濕熱熏蒸胎受深法當滲濕兼清熱地黃犀角二方神注胎黃者遍體面目皆黃其色如金乃孕婦濕熱太盛小兒在胎受母熱毒故生則有是證也法當滲濕清熱須分輕重治之色微黃者生地黃湯深黃者犀角散生地黃湯生地黃赤芍藥川芎當歸天花粉赤茯苓澤瀉豬苓甘草生茵蔯蒿引用燈心水煎食前服方歌胎黃須用地黃湯四物花粉赤苓良澤瀉豬苓甘草等茵蔯加入水煎嘗犀角散犀角鎊茵蔯蒿栝蔞根升麻甘草生龍膽草生地寒水石煆水煎不拘時服方歌胎黃又有犀角散甘草犀角與茵蔯升麻膽草生地共寒水石同栝蔞根胎赤胎赤胎中受毒熱生後遍體若丹塗清熱解毒湯極妙蔣氏化毒功效殊注胎赤者因孕婦過食辛熱之物以致毒熱凝結藴於胞中遂令小兒生下頭面肢體赤若丹塗故名曰胎赤當以清熱解毒湯主之熱盛便祕者蔣氏化毒丹主之清熱解毒湯生地黃連金銀花薄荷葉連翹去心赤芍木通甘草生引用燈心水煎服方歌清熱解毒湯堪誇生地黃連金銀花薄荷連翹赤芍藥木通甘草燈心加蔣氏化毒丹犀角黃連桔梗元參薄荷葉甘草生大黃各一兩生青黛五錢右為細末煉白蜜為丸重六分每服一丸燈心湯化服赤遊風赤遊胎中毒熱成皮膚赤腫遍身行頭面四肢猶可治若歸心腹命難生內服犀角藍葉散外用砭法敷神功百日之內忌砭血貼塗二法可安寧注小兒赤遊風證多由胎中毒熱而成或生後過於溫暖毒熱蒸發於外以致皮膚赤熱而腫色若丹塗遊走不定行於遍身故名曰赤遊風多發於頭面四肢之間若內歸心腹則死治法當服犀角解毒飲如不愈繼以藍葉散外用砭法刺出毒血毒甚者敷以神功散毒輕者不用敷藥在百日內者小兒忌砭血以其肌肉難任也須用豬肉貼法或以赤小豆末雞子清調塗之甚效犀角解毒飲牛蒡子炒犀角荆芥穗防風連翹去心金銀花赤芍藥生甘草川黃連生地黃引用燈心水煎服方歌犀角解毒藥最良牛蒡犀角合荆防連翹銀花赤芍藥甘草川連生地黃藍葉散藍葉五錢黃芩犀角屑川大黃銼微炒柴胡梔子各二錢生川升麻一錢石膏一錢生甘草一錢右為粗末每服一錢水一小盞煎五分去渣兑竹瀝一酒杯煎三兩沸放溫量兒大小用之氣怯弱者可去大黃砭血法口吮毒血各聚一處用細磁器擊碎取鋒芒者將筯頭劈開夾住用線縛定兩指輕撮筯梢令磁芒對聚血處再用筯一根頻擊刺出毒血砭後毒甚者以神功散敷之毒輕者砭後不可用恐皮膚既破草烏能作痛也如患在頭者不用砭法祇宜卧針倒挑患處出毒血則愈神功散黃蘗炒草烏生右各為末等分用潄口水調敷頻以潄口水潤之豬肉貼法用生豬肉切片貼於赤腫處數數更換塗法生赤小豆不拘多少研為細末用雞子清調塗患處乾則再塗初生無皮兒生無皮有二端父母梅毒遺染傳或因未足月生早無皮赤爛痛難堪梅毒換肌消毒散胎怯當歸飲能痊外敷清涼鵝黃粉毒解形完膚自堅注嬰兒生下無皮其證有二或因父母素有楊梅結毒傳染胞胎故生下或上半身赤爛或下半身赤爛甚至色帶紫黑又有因月分未足生育太早遍體浸漬紅嫩而光二證俱屬惡候遺毒者內服換肌消毒散外用清涼膏或鵝黃散敷之胎元不足者內服當歸飲外用稻米粉撲之毒解形完者謂解去毒氣其皮自漸漸生完而堅實矣換肌消毒散當歸生地黃赤芍藥川芎皂刺土茯苓金銀花連翹去心甘草生白芷苦參白蘚皮防風引用燈心水煎服方歌無皮換肌消毒治四物皂刺土茯苓銀花連翹草白芷苦參白蘚共防風當歸飲何首烏製白蘚皮白蒺藜甘草當歸生地黃白芍藥人參黃耆川芎水煎服方歌當歸飲治兒無皮面白肢冷服最宜首烏蘚皮白蒺藜甘草四物共參耆清涼膏石灰四兩水濕成塊者未經用水泡之沒指半許露一宿面上有浮起如雲片者輕輕取之微帶清水視其多寡對小磨香油亦如之以順攪成膏為度用雞翎搽之自愈鵝黃散黃蘗生石膏各等分煆共研為細末撲之濕則乾撲乾則用豬苦膽調搽撲粉法旱稻白米作粉時時撲之其皮漸生神效變蒸萬物春生夏熱長兒生同此變形神三十二日為一變六十四日曰一蒸變長百骸生藏府蒸增智慧發聰明十八五百七十六變蒸既畢形神成變蒸之狀身微熱耳尻骨冷無病情注天地生化萬物必以春溫夏熱兒之初生變生形神亦同此理自生之日至三十二日曰一變至六十四日曰一蒸變則長其百骸生其藏府蒸則增其智慧發其聰明也曰十八五百七十六者謂十變五蒸之外又有三大蒸合計五百七十六日也變蒸既畢形神具足此後則不復變蒸矣然每變蒸之時其狀惟身微熱耳冷尻骨冷而無他病情狀蓋以隂陽和變生化形神故無他病情狀也身微熱者以隂陽氤氲變蒸之氣而然也耳尻冷者耳尻屬隂以陽不傷隂而與隂和之象故不熱也按變蒸既曰生五藏六府次序又曰包絡三焦二經俱無形狀故不變不蒸夫也絡乃周身脂膜聯絡百骸藏府者三焦乃軀殼內氣充滿百骸藏府者變蒸時豈獨不及之耶其説不經細閲靈素自知附辨以俟識者驚風門驚風總括心主驚兮肝主風心熱肝風作急驚素虛藥峻因成慢吐瀉後起慢脾風急驚陽證有實象慢脾隂證有虛形慢驚半隂半陽證虛實寒熱要詳明注心藏神心病故主驚也肝屬木肝病故主風也凡小兒心熱肝盛一觸驚受風則風火相搏必作急驚之證也若素稟不足或因急驚用藥過峻暴傷元氣每致變成慢驚之證更有因吐瀉既久中氣大虛脾土衰弱肝木乘虛而內生驚風者名曰慢脾風也三者致病之因既不同故所現之證亦各異急驚屬陽必有陽熱有餘等實象也慢脾屬隂必有隂冷不足等虛象也至於慢驚初得之時隂陽尚未過損或因急驚傳變而成其中常有夾痰夾熱等證故屬半隂半陽不比慢脾純隂之病也治者須詳分虛實寒熱以治之庶不致誤矣驚風八候驚風八候搐搦掣顫反引竄視之名肘臂伸縮名為搐十指開合搦狀成勢若相撲謂之掣顫則頭肢動搖鈴反張身仰頭向後引狀兩手若開弓竄則目直常似怒視則覩物不轉睛內外左右分順逆須識急慢證皆同注八候謂搐搦掣顫反引竄視是也搐謂肘臂伸縮搦謂十指開合掣謂肩頭相撲顫謂手足動搖反者身仰向後引者手若開弓竄則目直而似怒視則睛露而不活其搐以男左手女右手男大指在外女大指在內為順反是為逆此候急驚慢驚同皆見之虛實無所異焉治者宜切記之通關急救法驚風搐搦神昏憒痰壅氣塞在心胸急用通關吹入鼻無嚏則死有嚏生注驚風搐搦必神氣昏憒皆由痰壅氣塞壅結胸中而致急用通關散吹入鼻內無嚏者不治有嚏者審其表裏虛實隨證治之通關散半夏生皂角細辛薄荷各等分共為細末用筆管吹入鼻內少許急驚風急驚觸異心驚熱或由風鬱火生風暴發痰盛或熱極壯熱煩急面脣紅痰壅氣促牙關噤二便祕澀脈數洪驚用鎮驚風至寶牛黃攻痰涼膈清平治羌活瀉青等化痰導赤共涼驚注急驚風一證有因目觸異物耳聞異聲神散氣亂而生者有因心肝火盛外為風寒鬱閉不得宣通而生者有因痰盛熱極而內動風者然證多暴發壯熱煩急面紅脣赤痰壅氣促牙關噤急二便祕澀噤急者齒緊急不能開也二便祕澀者大便祕結而小便澀難也脈洪數者主陽熱也觸異致驚者清熱鎮驚湯安神鎮驚丸主之火鬱生風者至寶丹主之痰盛生驚者牛黃丸攻下之熱極生風者涼膈散清解之病不甚者則用平治之法風熱者羌活散主之肝熱者瀉青丸主之痰兼熱者清熱化痰湯主之心經熱者導赤散涼驚丸主之惟在臨證者審而用之清熱鎮驚湯柴胡薄荷麥冬去心梔子川黃連龍膽草茯神鈎藤鈎甘草生木通引加燈心竹葉調硃砂末服方歌清熱鎮驚治外驚柴胡薄荷麥門冬梔子黃連龍膽草茯神鈎藤草木通安神鎮驚丸天竺黃茯神各五錢膽星棗仁炒麥冬去心赤芍當歸各三錢薄荷葉黃連辰砂牛黃梔子木通龍骨各三錢煆青黛一錢右為細末煉蜜丸如菉豆大赤金鉑為衣量兒大小與之淡薑湯化下至寶丹麻黃防風荆芥薄荷當歸赤芍大黃芒消川芎黃芩桔梗連翹去心白术土炒梔子石膏煆甘草生滑石全蠍去毒細辛天麻白附子羌活殭蠶炒川連獨活黃蘗各等分右共為細末煉蜜為丸每丸重五分量兒大小與之薑湯化下牛黃丸黑牽牛白牽牛各七錢半膽星枳實麩炒半夏各五錢薑製牙皂二錢弦去皮大黃一兩半右研極細末煉白蜜為丸重五分量兒大小與之薑湯化下涼膈散黃芩大黃連翹去心芒消甘草生梔子薄荷引用竹葉生蜜煎服無汗者加防風羌活方歌涼膈散治膈熱盛梔翹芩薄芒消黃便祕消黃加倍用無汗更加羌活防羌活散羌活防風川芎薄荷天麻殭蠶炒甘草生川黃連柴胡前胡枳殼麩炒桔梗引用生薑水煎服方歌羌活散風兼清熱羌防川芎薄荷葉天麻殭蠶草黃連柴胡前胡枳殼桔瀉青丸龍膽草焙梔子大黃煨羌活防風各一錢川芎錢半右研末煉蜜為丸如梧桐子大竹葉薄荷湯調下清熱化痰湯橘紅麥冬去心半夏薑製赤苓黃芩竹茹甘草生川連枳殼麩炒桔梗膽星引用生薑燈心水煎服方歌清熱化痰有橘紅麥冬半夏赤茯苓黃芩竹茹生甘草川連枳桔膽南星瀉心導赤湯方見木舌涼驚丸龍膽草防風青黛各三錢釣藤鈎二錢黃連五錢牛黃一錢右研細末麵糊為丸如粟米大量兒大小與之金器煎湯化下急驚後調理法急驚之後尚未清痰熱琥珀抱龍靈神虛氣弱痰兼熱清心滌痰大有功注急驚多用寒涼之藥亦急則治標之法但得痰火稍退即當調補氣血若過用寒涼必致轉成慢驚等證故驚邪一退餘熱尚在者當用琥珀抱龍丸主之若脾虛多痰者宜清心滌痰湯主之琥珀抱龍丸人參琥珀茯神各五錢山藥一兩炒甘草四錢炙檀香三錢天竺黃枳殼麩炒枳實各五錢麩炒辰砂三錢膽星五錢赤金鉑二十片右為細末煉蜜為丸每丸重一錢大兒一丸小兒半丸淡薑湯化下清心滌痰湯竹茹橘紅半夏薑製茯苓枳實麩炒甘草生麥冬去心棗仁炒人參菖蒲南星川黃連引用生薑水煎服方歌清心滌痰湯效靈補正除邪兩收功參苓橘半連茹草枳實菖棗星麥冬慢驚風慢驚多緣稟賦弱或因藥峻損而成緩緩搐搦時作止面白青黃身則溫昏睡眼合睛或露脈遲神慘大便青氣虛夾痰醒脾效脾虛肝旺緩肝靈注慢驚一證或緣稟賦虛弱土虛木盛者有之或由急驚過用峻利之藥以致轉成此證者有之發時緩緩搐搦時作時止面色淡黃或青白相兼身必溫和昏睡眼合或睡卧露睛脈來遲緩神氣慘慘大便青色此乃脾胃虛弱治宜培補元氣為主虛而夾痰者醒脾湯主之脾虛肝旺者緩肝理脾湯主之醒脾湯人參白术土炒茯苓天麻半夏薑製橘紅全蠍去毒殭蠶炒甘草炙木香倉米膽南星引用生薑水煎服方歌氣虛夾痰醒脾治參术天麻白茯苓橘半全蠍殭蠶草木香倉米膽南星緩肝理脾湯廣桂枝人參白茯苓白芍藥炒白术土炒陳皮山藥炒扁豆炒研甘草炙引用煨薑大棗水煎服方歌肝旺脾虛緩肝湯桂枝參苓芍术良陳皮山藥扁豆草煎服之時入棗薑夾熱夾痰慢驚慢驚夾熱或夾痰身熱心煩口溢涎宜以清心滌痰治白丸柴芍六君煎注慢驚之證本無熱可言但脾虛虛熱內生故痰涎上泛咽喉氣粗身熱心煩所謂虛夾痰熱是也痰熱相兼者清心滌痰湯主之脾虛肝旺痰盛者青州白丸子柴芍六君湯主之清心滌痰湯方見急驚後調理法青州白丸子生川烏五錢臍去皮生半夏七兩南星三兩生白附子二兩生右為末盛生絹袋內用井花水擺出粉未盡再擺以粉盡為度置磁盆內日晒夜露每早撇去舊水别用新水攪春五日夏三日秋七日冬十日去水晒乾研為細末用糯米粉煎粥清丸菉豆大每服三五丸薄荷湯送下柴芍六君子湯人參白术土炒茯苓陳皮半夏薑製甘草炙柴胡白芍炒釣藤鈎引用薑棗水煎服方歌脾虛木旺風痰盛四君人參术草苓痰盛陳半因加入肝風更用柴芍藤慢脾風肝盛脾衰金氣弱金失承制木生風每因吐瀉傷脾胃閉目搖頭面脣青額汗昏睡身肢冷舌短聲啞嘔澄清溫中補脾為主劑固真理中隨證從注慢脾風一證多緣吐瀉既久脾氣大傷以致土虛不能生金金弱不能制木肝木強盛惟脾是尅故曰脾風閉目搖頭面脣青黯額汗昏睡四肢厥冷舌短聲啞頻嘔清水此乃純隂無陽之證逐風則無風可逐治驚則無驚可治惟宜大補脾土生胃回陽為主吐瀉亡陽者溫中補脾湯主之大病後成者固真湯主之四肢厥冷者理中湯加附子主之溫中補脾湯人參黃耆蜜炙白术土炒乾薑陳皮半夏薑製附子製茯苓砂仁肉桂去粗皮研白芍炒焦甘草炙丁香引用煨薑水煎服方歌慢脾溫中補脾湯參耆白术共乾薑陳半附苓縮砂桂白芍甘草共丁香固真湯人參白术土炒肉桂去粗皮白茯苓山藥炒黃耆蜜炙甘草濕紙裹煨透附子去皮臍湯泡浸引用薑棗水煎服方歌固真湯治慢脾風人參白术桂茯苓山藥黃耆煨甘草附子浸泡最宜精理中湯方見不乳癎證門癎證總括小兒癎證類痙驚發時昏倒搐涎聲食頃即蘇如無病隂陽驚熱痰食風注癎證類乎驚風痙風者謂發時昏倒抽搐痰涎壅盛氣促作聲與驚痙二證相似也但四體柔軟一食之頃即醒依然如無病之人非若痙風一身強硬終日不醒也隂者隂癎也見藏隂證陽者陽癎也見府陽證驚癎因驚熱痰癎因痰食癎因食風癎因風其證不一治亦不同臨證宜詳辨之隂癎隂癎屬藏肢厥冷偃卧拘急面白青吐沫聲微脈沉細醒脾固真定癎靈注隂癎屬隂藏寒之病也多因慢驚之後痰入心包而得發時手足厥冷偃卧拘急面色青白口吐涎沫聲音微小脈來沉細輕者醒脾湯甚者固真湯病退調理用定癎丹主之醒脾湯方見慢驚風固真湯方見慢脾風定癎丹人參三錢當歸三錢白芍三錢炒茯神棗仁各五錢炒逺志三錢去心琥珀三錢天竺黃四錢白术五錢土炒橘紅半夏薑製天麻各三錢鈎藤鈎四錢甘草二錢炙右共為細末煉蜜丸如榛子大每服一丸淡薑湯化服陽癎陽癎屬府身熱汗仰卧面赤脈數洪噤急啼呌吐涎沫龍膽瀉青與抱龍注陽癎屬陽府熱之病也多因急驚去風下痰不淨久而致成此證發時身熱自汗仰卧面赤脈象洪數牙關噤急或啼呌不已口吐涎沫如風兼熱者用龍膽湯肝經熱者用瀉青丸痰涎壅盛者用四製抱龍丸主之龍膽湯方見噤口瀉青丸方見急驚風四製抱龍丸天竺黃五錢辰砂二錢膽星一兩雄黃二錢麝香一分半右為極細末另用麻黃欵冬花甘草各五錢煎湯去滓慢火熬成膏合藥末為丸如芡􅧙大每服一丸薄荷湯化下驚癎驚癎觸異驚神氣吐舌急呌面白紅發作如人將捕狀安神大青鎮驚靈注小兒心肝熱盛偶被驚邪所觸因而神氣潰亂遂成癎證發時吐舌急呌面色乍紅乍白悚惕不安如人將捕之狀先服大青膏次服鎮驚丸則癎自定矣大青膏天麻三錢白附子二錢青黛一錢研蠍尾一錢去毒硃砂一錢研天竺黃二錢麝香三分烏稍蛇肉一錢焙乾酒浸右同研細煉蜜和膏每服大兒五分小兒三分薄荷湯化服鎮驚丸茯神麥冬各五錢去心辰砂逺志去心石菖蒲棗仁各三錢炒牛黃一錢半川黃連三錢生珍珠二錢膽星五錢釣藤鈎五錢天竺黃五錢犀角三錢甘草二錢生右共研細末煉蜜為丸每丸重五分量兒與之用淡薑湯下痰癎痰癎平素自多痰發時痰壅在喉間氣促昏倒吐痰沫一捻金與滚痰丸注痰癎者因小兒平素痰盛或偶因驚熱遂致成癎發時痰涎壅塞喉間氣促昏倒口吐痰沫宜先服一捻金以急下其痰次服硃衣滚痰丸則氣順痰清而癎自止矣一捻金方見不乳硃衣滚痰丸礞石一兩煆沉香五錢黃芩七錢大黃一兩右為細末水泛為丸硃砂為衣多寡量兒大小白滚水化服食癎食癎食過積中脘一時痰熱使之然面黃腹滿吐利臭妙聖滚痰和胃安注食癎者其病在脾因小兒乳食過度停結中脘乘一時痰熱壅盛遂致成癎其初面黃腹滿吐利酸臭後變時時熱搐宜用妙聖丹主之痰盛者硃衣滚痰丸主之後用清熱和胃丸調理則積滯清而驚癎定矣妙聖丹雄黃蠍梢硃砂代赭石各二錢煆醋淬巴豆三個去油杏仁二錢皮尖炒去右共為細末蒸棗肉丸如桐子大每服三五丸木香煎湯化服硃衣滚痰丸方見痰癎清熱和胃丸川連五錢生梔子五錢生竹茹四錢麥冬五錢去心連翹四錢去心山查一兩神麯一兩炒麥芽一兩炒陳皮四錢枳實五錢麩炒大黃五錢甘草三錢生右共為細末煉蜜為丸每丸重一錢量兒與之用滚白水化下風癎風癎汗出風襲經二目青黯面淡紅十指屈伸如數物化風羌活牛黃寧注風癎因汗出脫衣腠理開張風邪乘隙而入發時目青面紅手如數物治法先宜踈風解表輕則化風丹主之重則羌活桂枝湯主之風兼痰者牛黃丸主之化風丹膽星二錢羌活獨活天麻防風甘草生荆芥穗人參川芎各一錢右共為細末煉蜜丸皂子大每服一丸薄荷湯化開服羌活桂枝湯羌活防風麻黃桂枝天麻大黃甘草生引用生薑水煎服方歌羌活桂枝治風癎疏風瀉熱妙難言羌防麻桂天麻草大黃煎服自然安牛黃丸膽星全蠍去毒蟬退各二錢半防風牛黃白附子生殭蠶炒天麻各一錢五分麝香五分右為細末煮棗去核皮取肉和丸如菉豆大每服三五丸生薑湯化服御纂醫宗金鑑卷五十一
