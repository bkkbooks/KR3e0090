body:
  text: 編輯幼科雜病心法要訣目録初生門下目爛生地黄湯真金散懸癰如聖散一字散重齦一字散清胃散鵞口清熱瀉脾散保命散吐舌瀉心導赤湯弄舌瀉黄散瀉心導赤湯重舌清熱飲凉心散木舌川消散瀉心導赤湯哯乳和中清熱飲温中止吐湯平胃散枳桔二陳湯夜啼釣藤飲導赤散蟬花散胎黄生地黄湯犀角散胎赤清熱解毒湯蔣氏化毒丹赤遊風犀角解毒飲藍葉散砭血法神功散豬肉貼法塗法初生無皮換肌消毒散當歸飲清凉膏鵞黄散撲粉法變蒸驚風門驚風總括驚風八候通闗急救法通闗散急驚風清熱鎮驚湯安神鎮驚丸至寶丹牛黄丸凉膈散羌活散瀉青丸清熱化痰湯瀉心導赤湯凉驚丸急驚後調理法琥珀抱龍丸清心滌痰湯慢驚風醒脾湯緩肝理脾湯夾熱夾痰慢驚青州白丸子柴芍六君子湯慢脾風温中補脾湯固真湯理中湯癎證門癎證總括隂癎醒脾湯固真湯定癎丹陽癎龍膽湯瀉青丸四製抱龍丸驚癎大青膏鎮驚丸痰癎一捻金硃衣滚痰丸食癎妙聖丹硃衣滚痰丸清熱和胃丸風癎化風丹羌活桂枝湯牛黄丸御纂醫宗金鑑卷五十一目録欽定四庫全書御纂醫宗金鑑卷五十一編輯幼科雜病心法要訣目録初生門下目爛生地黄湯真金散懸癰如聖散一字散重齦一字散清胃散鵞口清熱瀉脾散保命散吐舌瀉心導赤湯弄舌瀉黄散瀉心導赤湯重舌清熱飲凉心散木舌川消散瀉心導赤湯哯乳和中清熱飲温中止吐湯平胃散枳桔二陳湯夜啼釣藤飲導赤散蟬花散胎黄生地黄湯犀角散胎赤清熱解毒湯蔣氏化毒丹赤遊風犀角解毒飲藍葉散砭血法神功散豬肉貼法塗法初生無皮換肌消毒散當歸飲清凉膏鵞黄散撲粉法變蒸驚風門驚風總括驚風八候通闗急救法通闗散急驚風清熱鎮驚湯安神鎮驚丸至寶丹牛黄丸凉膈散羌活散瀉青丸清熱化痰湯瀉心導赤湯凉驚丸急驚後調理法琥珀抱龍丸清心滌痰湯慢驚風醒脾湯緩肝理脾湯夾熱夾痰慢驚青州白丸子柴芍六君子湯慢脾風温中補脾湯固真湯理中湯癎證門癎證總括隂癎醒脾湯固真湯定癎丹陽癎龍膽湯瀉青丸四製抱龍丸驚癎大青膏鎮驚丸痰癎一捻金硃衣滚痰丸食癎妙聖丹硃衣滚痰丸清熱和胃丸風癎化風丹羌活桂枝湯牛黄丸御纂醫宗金鑑卷五十一目録欽定四庫全書御纂醫宗金鑑卷五十一編輯幼科雜病心法要訣初生門下目爛兒生兩目痛難睜胞邊赤爛胎熱攻内用地黄湯清熱外㸃真金目即明註目爛者胞邊赤爛痛癢難睜因胎中藴熱生後毒熱上攻於目故有是證内服地黄湯以清熱外用真金散以㸃目其證自愈生地黄湯方見目不開真金散黄連生黄蘗生當歸赤芍藥各一錢杏仁五分皮尖炒去右剉散乳汁浸一宿晒乾爲極細末用生地黄汁調一字頻頻㸃眼即愈懸癰腭上腫起號懸癰皆因胎毒熱上衝法當刺破鹽湯拭如聖一字摻之靈註凡喉裏上腭腫起如蘆籜盛水狀者名曰懸癰蘆籜者蘆笋也此胎毒上攻湏以棉纒長鍼留鋒刺之瀉去青黄赤汁未消者來日再刺刺後以鹽湯拭口用如聖散或一字散摻之如聖散鉛霜一錢真牛黄一錢太隂元精石硃砂各二錢五分水飛龍腦五分右爲極細末每用一字摻患處一字散硃砂水飛硼砂各五分龍腦樸消各一字右爲極細末用蜜調少許鵞翎蘸搽口内重齦重齦胎熱胃中蓄牙根腫脹痛難禁刺破一字散敷上繼進清胃效如神註重齦者因小兒在胎有熱蓄於胃中故牙根腫如水泡名曰重齦治法用鍼刺破以鹽湯拭凈外敷一字散内服清胃散其腫自消一字散方見懸癰清胃散生地丹皮黄連當歸升麻石膏煆引用燈心水煎服方歌清胃散治胃熱熏生地黄連當歸身丹皮升麻石膏煆臨煎湏要入燈心鵞口鵞口白屑滿舌口心脾藴熱本胎原清熱瀉脾搽保命少遲糜爛治難痊註鵞口者白屑生滿口舌如鵞之口也由在胎中受母飲食熱毒之氣藴於心脾二經故生後遂𤼵於口舌之間治法以清熱瀉脾散主之外用髮蘸井水拭口搽以保命散日敷二三次白退自安倘治之稍遲必口舌糜爛吮乳不得則難痊矣清熱瀉脾散山梔炒石膏煆黄連薑炒生地黄芩赤苓引用燈心水煎服方歌清熱瀉脾治鵞口石膏生地赤苓煎芩連梔子合成劑加入燈心病即安保命散白礬燒灰硃砂各二錢五分水飛馬牙消五錢右研末以白鵞糞水攪取汁塗舌與口角上吐舌吐長收緩名吐舌皆是心經有熱成面紅煩渴溺赤濇瀉心導赤服即寧註吐舌者伸長而收緩也因心經有熱所致故面紅煩躁口渴尿赤宜瀉心導赤湯主之瀉心導赤湯木通生地黄連甘草生引用燈心水煎服方歌瀉心導赤湯最良心熱吐舌即堪嚐木通生地黄連草燈心加入服自強弄舌弄舌時時口内摇心脾熱𤼵口脣焦煩熱舌乾大便穢瀉黄導赤並能療註兒舌口中摇動者因心脾有熱以致脣焦舌乾煩熱便穢先用瀉黄散次服瀉心導赤湯瀉黄散藿香葉山梔子炒石膏煆防風甘草生引加燈心水煎服方歌弄舌瀉黄散最神藿香葉配山梔仁甘草防風石膏煆臨時煎服入燈心瀉心導赤湯方見吐舌重舌舌下腫突似舌形心脾積熱上攻衝内服宜以清熱飲外敷凉心功最靈註重舌者因舌下近舌根處其腫形似舌故名重舌此心脾之熱宜服清熱飲外吹凉心散清熱飲黄連生生地木通甘草生連翹去心蓮子引用淡竹葉水煎時時灌入口中方歌清熱飲内用黄連生地蓮子木通甘連翹更加淡竹葉一同煎服自然安凉心散青黛硼砂黄蘗黄連人乳拌晒人中白各二錢煆過風化消一錢氷片二分右爲極細末吹之甚效木舌木舌心脾積熱成腫脹木硬證多凶外用川消敷舌上内服瀉心導赤靈註木舌一證皆因心脾積熱而成蓋脾之衇絡在舌下又舌爲心苖遇火上衝令兒舌腫滿木硬不能轉動故名木舌外用川消散敷舌上内服瀉心導赤湯若不急治必至難救川消散樸消五分真紫雪二分鹽一分右爲細末以竹瀝調敷舌上瀉心導赤湯方見吐舌哯乳哯乳之候非一端傷乳停痰胃熱寒熱宜和中清熱飲寒用温中止吐煎傷乳平胃散最妙停痰二陳湯可痊若是滿而自溢者常湏節乳自能安註小兒哯乳證非一端有宿乳停痰胃寒胃熱之分不可一例而治如面色多赤二便微秘手足指熱此爲熱哯也宜和中清熱飲主之面色青白糞青多沫手足指冷此因寒而哯也宜温中止吐湯主之口熱脣乾夜卧不寧手足心熱此爲傷乳而哯也宜平胃散主之胸膈膨滿嘔吐痰涎此因停痰而哯也宜枳桔二陳湯主之若喫乳過多滿而自溢者不湏服藥惟節乳則哯自止矣和中清熱飲黄連薑炒半夏薑製陳皮茯苓藿香砂仁引用薑水煎服方歌和中清熱飲黄連半夏陳皮茯苓攅藿香砂仁合成劑水煎徐服可安全温中止吐湯白豆蔲研茯苓半夏薑製生薑水煎冲磨沉香汁服方歌温中止吐白豆蔲茯苓半夏共生薑臨服沉香汁加入專治哯乳自寒傷平胃散蒼术炒陳皮厚樸薑炒甘草炙麥芽炒砂仁研引用薑水煎服方歌小兒傷乳多吐哯平胃調和功可見蒼陳厚樸甘草偕加入麥砂薑一片枳桔二陳湯枳殻麩炒桔梗陳皮半夏薑製茯苓甘草炙引用薑水煎服方歌停痰哯乳不能安枳桔二陳湯最先枳桔陳半苓甘草生薑加入即時痊夜啼夜啼寒熱因胎受湏將形色辨分明寒屬脾經面青白手腹俱冷曲腰疼面赤溺閉屬心熱熱用導赤寒釣藤若無寒熱表裏證古法蟬花散最精註小兒初生夜啼其因有二一曰脾寒一曰心熱皆受自胎中觀其形色便知病情矣如面色青白手腹俱冷不欲吮乳曲腰不伸者脾寒也鈎藤飲主之面赤脣紅身腹俱熱小便不利煩躁多啼者心熱也導赤散主之若無已上形證但多啼者用蟬花散最當釣藤飲川芎白當歸茯神白芍炒茯苓甘草炙木香煨釣藤鈎引用紅棗水煎服方歌夜啼之證因脾寒湏服釣藤飲可痊芎歸神芍苓甘草木香釣藤紅棗煎導赤散方見小便不通蟬花散蟬蜕不拘多少下半截右研細末每服少許薄荷煎湯調下胎黄兒生徧體色如金濕熱熏蒸胎受深法當滲濕兼清熱地黄犀角二方神註胎黄者徧體面目皆黄其色如金乃孕婦濕熱太盛小兒在胎受母熱毒故生則有是證也法當滲濕清熱湏分輕重治之色微黄者生地黄湯深黄者犀角散生地黄湯生地黄赤芍藥川芎當歸天花粉赤茯苓澤瀉豬苓甘草生茵蔯蒿引用燈心水煎食前服方歌胎黄湏用地黄湯四物花粉赤苓良澤瀉豬苓甘草等茵蔯加入水煎嚐犀角散犀角鎊茵蔯蒿栝蔞根升麻甘草生龍膽草生地寒水石煆水煎不拘時服方歌胎黄又有犀角散甘草犀角與茵蔯升麻膽草生地共寒水石同栝蔞根胎赤胎赤胎中受毒熱生後徧體若丹塗清熱解毒湯極妙蔣氏化毒功效殊註胎赤者因孕婦過食辛熱之物以致毒熱凝結藴於胞中遂令小兒生下頭面肢體赤若丹塗故名曰胎赤當以清熱解毒湯主之熱盛便秘者蔣氏化毒丹主之清熱解毒湯生地黄連金銀花薄荷葉連翹去心赤芍木通甘草生引用燈心水煎服方歌清熱解毒湯堪誇生地黄連金銀花薄荷連翹赤芍藥木通甘草燈心加蔣氏化毒丹犀角黄連桔梗元參薄荷葉甘草生大黄各一兩生青黛五錢右爲細末煉白蜜爲丸重六分每服一丸燈心湯化服赤遊風赤遊胎中毒熱成皮膚赤腫徧身行頭面四肢猶可治若歸心腹命難生内服犀角藍葉散外用砭法敷神功百日之内忌砭血貼塗二法可安寧註小兒赤遊風證多由胎中毒熱而成或生後過於温暖毒熱蒸發於外以致皮膚赤熱而腫色若丹塗遊走不定行於徧身故名曰赤遊風多發於頭面四肢之間若内歸心腹則死治法當服犀角解毒飲如不愈繼以藍葉散外用砭法刺出毒血毒甚者敷以神功散毒輕者不用敷藥在百日内者小兒忌砭血以其肌肉難任也湏用豬肉貼法或以赤小豆末雞子清調塗之甚效犀角解毒飲牛蒡子炒犀角荆芥穗防風連翹去心金銀花赤芍藥生甘草川黄連生地黄引用燈心水煎服方歌犀角解毒藥最良牛蒡犀角合荆防連翹銀花赤芍藥甘草川連生地黄藍葉散藍葉五錢黄芩犀角屑川大黄剉微炒柴胡梔子各二錢生川升麻一錢石膏一錢生甘草一錢右爲粗末每服一錢水一小盞煎五分去渣兑竹瀝一酒盃煎三兩沸放温量兒大小用之氣怯弱者可去大黄砭血法口吮毒血各聚一處用細磁器擊碎取鋒芒者將筯頭劈開夾住用線縛定兩指輕撮筯梢令磁芒對聚血處再用筯一根頻擊刺出毒血砭後毒甚者以神功散敷之毒輕者砭後不可用恐皮膚既破草烏能作痛也如患在頭者不用砭法祇宜卧鍼倒挑患處出毒血則愈神功散黄蘗炒草烏生右各爲末等分用潄口水調敷頻以潄口水潤之豬肉貼法用生豬肉切片貼於赤腫處數數更換塗法生赤小豆不拘多少研爲細末用雞子清調塗患處亁則再塗初生無皮兒生無皮有二端父母梅毒遺染傳或因未足月生早無皮赤爛痛難堪梅毒換肌消毒散胎怯當歸飲能痊外敷清凉鵞黄粉毒解形完膚自堅註嬰兒生下無皮其證有二或因父母素有楊梅結毒傳染胞胎故生下或上半身赤爛或下半身赤爛甚至色帶紫黑又有因月分未足生育太早徧體浸漬紅嫩而光二證俱屬惡候遺毒者内服換肌消毒散外用清凉膏或鵞黄散敷之胎元不足者内服當歸飲外用稻米粉撲之毒觧形完者謂解去毒氣其皮自漸漸生完而堅實矣換肌消毒散當歸生地黄赤芍藥川芎皂刺土茯苓金銀花連翹去心甘草生白芷苦參白蘚皮防風引用燈心水煎服方歌無皮換肌消毒治四物皂刺土茯苓銀花連翹草白芷苦參白蘚共防風當歸飲何首烏製白蘚皮白蒺藜甘草當歸生地黄白芍藥人參黄耆川芎水煎服方歌當歸飲治兒無皮面白肢冷服最宜首烏蘚皮白蒺藜甘草四物共參耆清凉膏石灰四兩水濕成塊者未經用水泡之没指半許露一宿面上有浮起如雲片者輕輕取之微帶清水視其多寡對小磨香油亦如之以順攪成膏爲度用雞翎搽之自愈鵞黄散黄蘗生石膏各等分煆共研爲細末撲之濕則亁撲亁則用豬苦膽調搽撲粉法旱稻白米作粉時時撲之其皮漸生神效變蒸萬物春生夏熱長兒生同此變形神三十二日爲一變六十四日曰一蒸變長百骸生藏府蒸增智慧𤼵聰明十八五百七十六變蒸既畢形神成變蒸之狀身微熱耳尻骨冷無病情註天地生化萬物必以春温夏熱兒之初生變生形神亦同此理自生之日至三十二日曰一變至六十四日曰一蒸變則長其百骸生其藏府蒸則増其智慧發其聰明也曰十八五百七十六者謂十變五蒸之外又有三大蒸合計五百七十六日也變蒸既畢形神具足此後則不復變蒸矣然每變蒸之時其狀惟身微熱耳冷尻骨冷而無他病情狀蓋以隂陽和變生化形神故無他病情狀也身微熱者以隂陽氤氲變蒸之氣而然也耳尻冷者耳尻屬隂以陽不傷隂而與隂和之象故不熱也按變蒸既曰生五藏六府次序又曰包絡三焦二經俱無形狀故不變不蒸夫也絡乃周身脂膜聯絡百骸藏府者三焦乃軀殻内氣充滿百骸藏府者變蒸時豈獨不及之耶其説不經細閲靈素自知附辨以俟識者驚風門驚風總括心主驚兮肝主風心熱肝風作急驚素虚藥峻因成慢吐瀉後起慢脾風急驚陽證有實象慢脾隂證有虛形慢驚半隂半陽證虛實寒熱要詳明註心藏神心病故主驚也肝屬木肝病故主風也凡小兒心熱肝盛一觸驚受風則風火相搏必作急驚之證也若素禀不足或因急驚用藥過峻暴傷元氣每致變成慢驚之證更有因吐瀉既乆中氣大虛脾土衰弱肝木乘虛而内生驚風者名曰慢脾風也三者致病之因既不同故所現之證亦各異急驚屬陽必有陽熱有餘等實象也慢脾屬隂必有隂冷不足等虛象也至於慢驚初得之時隂陽尚未過損或因急驚傳變而成其中常有夾痰夾熱等證故屬半隂半陽不比慢脾純隂之病也治者湏詳分虛實寒熱以治之庶不致悞矣驚風八候驚風八候搐搦掣顫反引竄視之名肘臂伸縮名爲搐十指開合搦狀成勢若相撲謂之掣顫則頭肢動摇鈴反張身仰頭向後引狀兩手若開弓竄則目直常似怒視則覩物不轉睛内外左右分順逆湏識急慢證皆同註八候謂搐搦掣顫反引竄視是也搐謂肘臂伸縮搦謂十指開合掣謂肩頭相撲顫謂手足動摇反者身仰向後引者手若開弓竄則目直而似怒視則睛露而不活其搐以男左手女右手男大指在外女大指在内爲順反是爲逆此候急驚慢驚同皆見之虛實無所異焉治者宜切記之通闗急救法驚風搐搦神昏憒痰壅氣塞在心胸急用通闗吹入鼻無嚏則死有嚏生註驚風搐搦必神氣昏憒皆由痰壅氣塞壅結胸中而致急用通闗散吹入鼻内無嚏者不治有嚏者審其表裏虛實隨證治之通闗散半夏生皂角細辛薄荷各等分共爲細末用筆管吹入鼻内少許急驚風急驚觸異心驚熱或由風鬱火生風暴𤼵痰盛或熱極壯熱煩急面脣紅痰壅氣促牙闗噤二便秘濇衇數洪驚用鎮驚風至寳牛黄攻痰凉膈清平治羌活瀉青等化痰導赤共凉驚註急驚風一證有因目觸異物耳聞異聲神散氣亂而生者有因心肝火盛外爲風寒鬱閉不得宣通而生者有因痰盛熱極而内動風者然證多暴𤼵壯熱煩急面紅脣赤痰壅氣促牙闗噤急二便秘濇噤急者齒緊急不能開也二便秘濇者大便秘結而小便澁難也衇洪數者主陽熱也觸異致驚者清熱鎮驚湯安神鎮驚丸主之火鬱生風者至寳丹主之痰盛生驚者牛黄丸攻下之熱極生風者凉膈散清解之病不甚者則用平治之法風熱者羌活散主之肝熱者瀉青丸主之痰兼熱者清熱化痰湯主之心經熱者導赤散凉驚丸主之惟在臨證者審而用之清熱鎮驚湯柴胡薄荷麥冬去心梔子川黄連龍膽草茯神鈎藤鈎甘草生木通引加燈心竹葉調硃砂末服方歌清熱鎮驚治外驚柴胡薄荷麥門冬梔子黄連龍膽草茯神鈎藤草木通安神鎮驚丸天竺黄茯神各五錢膽星棗仁炒麥冬去心赤芍當歸各三錢薄荷葉黄連辰砂牛黄梔子木通龍骨各三錢煆青黛一錢右爲細末煉蜜丸如菉豆大赤金鉑爲衣量兒大小與之淡薑湯化下至寶丹麻黄防風荆芥薄荷當歸赤芍大黄芒消川芎黄芩桔梗連翹去心白术土炒梔子石膏煆甘草生滑石全蠍去毒細辛天麻白附子羌活殭蠶炒川連獨活黄蘗各等分右共爲細末煉蜜爲丸每丸重五分量兒大小與之薑湯化下牛黄丸黑牽牛白牽牛各七錢半膽星枳實麩炒半夏各五錢薑製牙皂二錢弦去皮大黄一兩半右研極細末煉白蜜爲丸重五分量兒大小與之薑湯化下凉膈散黄芩大黄連翹去心芒消甘草生梔子薄荷引用竹葉生蜜煎服無汗者加防風羌活方歌凉膈散治膈熱盛梔翹芩薄芒消黄便秘消黄加倍用無汗更加羌活防羌活散羌活防風川芎薄荷天麻殭蠶炒甘草生川黄連柴胡前胡枳殻麩炒桔梗引用生薑水煎服方歌羌活散風兼清熱羌防川芎薄荷葉天麻殭蠶草黄連柴胡前胡枳殻桔瀉青丸龍膽草焙梔子大黄煨羌活防風各一錢川芎錢半右研末煉蜜爲丸如梧桐子大竹葉薄荷湯調下清熱化痰湯橘紅麥冬去心半夏薑製赤苓黄芩竹茹甘草生川連枳殻麩炒桔梗膽星引用生薑燈心水煎服方歌清熱化痰有橘紅麥冬半夏赤茯苓黄芩竹茹生甘草川連枳桔膽南星瀉心導赤湯方見木舌凉驚丸龍膽草防風青黛各三錢釣藤鈎二錢黄連五錢牛黄一錢右研細末麫糊爲丸如粟米大量兒大小與之金器煎湯化下急驚後調理法急驚之後尚未清痰熱琥珀抱龍靈神虛氣弱痰兼熱清心滌痰大有功註急驚多用寒凉之藥亦急則治標之法但得痰火稍退即當調補氣血若過用寒凉必致轉成慢驚等證故驚邪一退餘熱尚在者當用琥珀抱龍丸主之若脾虛多痰者宜清心滌痰湯主之琥珀抱龍丸人參琥珀茯神各五錢山藥一兩炒甘草四錢炙檀香三錢天竺黄枳殻麩炒枳實各五錢麩炒辰砂三錢膽星五錢赤金鉑二十片右爲細末煉蜜爲丸每丸重一錢大兒一丸小兒半丸淡薑湯化下清心滌痰湯竹茹橘紅半夏薑製茯苓枳實麩炒甘草生麥冬去心棗仁炒人參菖蒲南星川黄連引用生薑水煎服方歌清心滌痰湯效靈補正除邪兩收功參苓橘半連茹草枳實菖棗星麥冬慢驚風慢驚多縁禀賦弱或因藥峻損而成緩緩搐搦時作止面白青黄身則温昏睡眼合睛或露衇遲神慘大便青氣虛夾痰醒脾效脾虛肝旺緩肝靈註慢驚一證或縁禀賦虛弱土虛木盛者有之或由急驚過用峻利之藥以致轉成此證者有之發時緩緩搐搦時作時止面色淡黄或青白相兼身必温和昏睡眼合或睡卧露睛衇來遲緩神氣慘慘大便青色此乃脾胃虛弱治宜培補元氣爲主虚而夾痰者醒脾湯主之脾虛肝旺者緩肝理脾湯主之醒脾湯人參白术土炒茯苓天麻半夏薑製橘紅全蠍去毒殭蠶炒甘草炙木香倉米膽南星引用生薑水煎服方歌氣虛夾痰醒脾治參术天麻白茯苓橘半全蠍殭蠶草木香倉米膽南星緩肝理脾湯廣桂枝人參白茯苓白芍藥炒白术土炒陳皮山藥炒扁豆炒研甘草炙引用煨薑大棗水煎服方歌肝旺脾虛緩肝湯桂枝參苓芍术良陳皮山藥扁豆草煎服之時入棗薑夾熱夾痰慢驚慢驚夾熱或夾痰身熱心煩口溢涎宜以清心滌痰治白丸柴芍六君煎註慢驚之證本無熱可言但脾虛虛熱内生故痰涎上泛咽喉氣粗身熱心煩所謂虛夾痰熱是也痰熱相兼者清心滌痰湯主之脾虛肝旺痰盛者青州白丸子柴芍六君湯主之清心滌痰湯方見急驚後調理法青州白丸子生川烏五錢臍去皮生半夏七兩南星三兩生白附子二兩生右爲末盛生絹袋内用井花水擺出粉未盡再擺以粉盡爲度置磁盆内日晒夜露每早撇去舊水别用新水攪春五日夏三日秋七日冬十日去水晒亁研爲細末用糯米粉煎粥清丸菉豆大每服三五丸薄荷湯送下柴芍六君子湯人參白术土炒茯苓陳皮半夏薑製甘草炙柴胡白芍炒釣藤鈎引用薑棗水煎服方歌脾虛木旺風痰盛四君人參术草苓痰盛陳半因加入肝風更用柴芍藤慢脾風肝盛脾衰金氣弱金失承制木生風每因吐瀉傷脾胃閉目摇頭面脣青額汗昏睡身肢冷舌短聲啞嘔澄清温中補脾爲主劑固真理中隨證從註慢脾風一證多縁吐瀉既乆脾氣大傷以致土虛不能生金金弱不能制木肝木强盛惟脾是尅故曰脾風閉目摇頭面脣青黯額汗昏睡四肢厥冷舌短聲啞頻嘔清水此乃純隂無陽之證逐風則無風可逐治驚則無驚可治惟宜大補脾土生胃囘陽爲主吐瀉亡陽者温中補脾湯主之大病後成者固真湯主之四肢厥冷者理中湯加附子主之温中補脾湯人參黄耆蜜炙白术土炒亁薑陳皮半夏薑製附子製茯苓砂仁肉桂去粗皮研白芍炒焦甘草炙丁香引用煨薑水煎服方歌慢脾温中補脾湯參耆白术共乾薑陳半附苓縮砂桂白芍甘草共丁香固真湯人參白术土炒肉桂去粗皮白茯苓山藥炒黄耆蜜炙甘草濕紙裹煨透附子去皮臍湯泡浸引用薑棗水煎服方歌固真湯治慢脾風人參白术桂茯苓山藥黄耆煨甘草附子浸泡最宜精理中湯方見不乳癎證門癎證總括小兒癎證類痙驚𤼵時昏倒搐涎聲食頃即甦如無病隂陽驚熱痰食風註癎證類乎驚風痙風者謂發時昏倒抽搐痰涎壅盛氣促作聲與驚痙二證相似也但四體柔軟一食之頃即醒依然如無病之人非若痙風一身强硬終日不醒也隂者隂癎也見藏隂證陽者陽癎也見府陽證驚癎因驚熱痰癎因痰食癎因食風癎因風其證不一治亦不同臨證宜詳辨之隂癎隂癎屬藏肢厥冷偃卧拘急面白青吐沫聲微衇沉細醒脾固真定癎靈註隂癎屬隂藏寒之病也多因慢驚之後痰入心包而得𤼵時手足厥冷偃卧拘急面色青白口吐涎沫聲音微小衇來沉細輕者醒脾湯甚者固真湯病退調理用定癎丹主之醒脾湯方見慢驚風固真湯方見慢脾風定癎丹人參三錢當歸三錢白芍三錢炒茯神棗仁各五錢炒逺志三錢去心琥珀三錢天竺黄四錢白术五錢土炒橘紅半夏薑製天麻各三錢鈎藤鈎四錢甘草二錢炙右共爲細末煉蜜丸如榛子大每服一丸淡薑湯化服陽癎陽癎屬府身熱汗仰卧面赤衇數洪噤急啼呌吐涎沫龍膽瀉青與抱龍註陽癎屬陽府熱之病也多因急驚去風下痰不淨乆而致成此證𤼵時身熱自汗仰卧面赤衇象洪數牙闗噤急或啼呌不已口吐涎沫如風兼熱者用龍膽湯肝經熱者用瀉青丸痰涎壅盛者用四製抱龍丸主之龍膽湯方見噤口瀉青丸方見急驚風四製抱龍丸天竺黄五錢辰砂二錢膽星一兩雄黄二錢麝香一分半右爲極細末另用麻黄欵冬花甘草各五錢煎湯去滓慢火熬成膏合藥末爲丸如芡􅧙大每服一丸薄荷湯化下驚癎驚癎觸異驚神氣吐舌急呌面白紅發作如人將捕狀安神大青鎮驚靈註小兒心肝熱盛偶被驚邪所觸因而神氣潰亂遂成癎證發時吐舌急呌面色乍紅乍白悚惕不安如人將捕之狀先服大青膏次服鎮驚丸則癎自定矣大青膏天麻三錢白附子二錢青黛一錢研蠍尾一錢去毒硃砂一錢研天竺黄二錢麝香三分烏稍蛇肉一錢焙亁酒浸右同研細煉蜜和膏每服大兒五分小兒三分薄荷湯化服鎮驚丸茯神麥冬各五錢去心辰砂逺志去心石菖蒲棗仁各三錢炒牛黄一錢半川黄連三錢生珍珠二錢膽星五錢釣藤鈎五錢天竺黄五錢犀角三錢甘草二錢生右共研細末煉蜜爲丸每丸重五分量兒與之用淡薑湯下痰癎痰癎平素自多痰𤼵時痰壅在喉間氣促昏倒吐痰沫一捻金與滚痰丸註痰癎者因小兒平素痰盛或偶因驚熱遂致成癎𤼵時痰涎壅塞喉間氣促昏倒口吐痰沫宜先服一捻金以急下其痰次服硃衣滚痰丸則氣順痰清而癎自止矣一捻金方見不乳硃衣滚痰丸礞石一兩煆沉香五錢黄芩七錢大黄一兩右爲細末水泛爲丸硃砂爲衣多寡量兒大小白滚水化服食癎食癎食過積中脘一時痰熱使之然面黄腹滿吐利臭妙聖滚痰和胃安註食癎者其病在脾因小兒乳食過度停結中脘乘一時痰熱壅盛遂致成癎其初面黄腹滿吐利酸臭後變時時熱搐宜用妙聖丹主之痰盛者硃衣滚痰丸主之後用清熱和胃丸調理則積滯清而驚癎定矣妙聖丹雄黄蠍梢硃砂代赭石各二錢煆醋淬巴豆三個去油杏仁二錢皮尖炒去右共爲細末蒸棗肉丸如桐子大每服三五丸木香煎湯化服硃衣滚痰丸方見痰癎清熱和胃丸川連五錢生梔子五錢生竹茹四錢麥冬五錢去心連翹四錢去心山查一兩神麯一兩炒麥芽一兩炒陳皮四錢枳實五錢麩炒大黄五錢甘草三錢生右共爲細末煉蜜爲丸每丸重一錢量兒與之用滚白水化下風癎風癎汗出風襲經二目青黯面淡紅十指屈伸如數物化風羌活牛黄寧註風癎因汗出脱衣腠理開張風邪乘隙而入發時目青面紅手如數物治法先宜踈風解表輕則化風丹主之重則羌活桂枝湯主之風兼痰者牛黄丸主之化風丹膽星二錢羌活獨活天麻防風甘草生荆芥穗人參川芎各一錢右共爲細末煉蜜丸皂子大每服一丸薄荷湯化開服羌活桂枝湯羌活防風麻黄桂枝天麻大黄甘草生引用生薑水煎服方歌羌活桂枝治風癎疎風瀉熱妙難言羌防麻桂天麻草大黄煎服自然安牛黄丸膽星全蠍去毒蟬退各二錢半防風牛黄白附子生殭蠶炒天麻各一錢五分麝香五分右爲細末煮棗去核皮取肉和丸如菉豆大每服三五丸生薑湯化服御纂醫宗金鑑卷五十一
