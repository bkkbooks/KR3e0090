body:
  text: 編輯外科心法要訣目録下部懸癰穿襠發跨馬癰便毒疳瘡隂虱瘡腎囊癰腎囊風婦人隂瘡臀部鸛口疽坐馬癰臀癰上馬癰下馬癰涌泉疽臟毒痔瘡坐板瘡御纂醫宗金鑑卷六十九目録欽定四庫全書御纂醫宗金鑑卷六十九編輯外科心法要訣目録下部懸癰穿襠發跨馬癰便毒疳瘡隂虱瘡腎囊癰腎囊風婦人隂瘡臀部鸛口疽坐馬癰臀癰上馬癰下馬癰涌泉疽臟毒痔瘡坐板瘡御纂醫宗金鑑卷六十九目録欽定四庫全書御纂醫宗金鑑卷六十九編輯外科心法要訣下部懸癰懸癰毒生㑹隂穴初如蓮子漸如桃三隂虧損濕熱鬱潰久成漏為瘡勞注此證一名騎馬癰生於篡間係前隂之後後隂之前屏翳穴即㑹隂穴係任衇經首穴也初生如蓮子微癢多痛日久焮腫形如桃李由三隂虧損兼憂思氣結濕熱壅滯而成其色紅作膿欲潰若破後潰深久則成漏以致瀝盡氣血變為瘡勞初起氣壯實尚未成膿小水澀滯者宜用九龍丹瀉去病根稍虛者仙方活命飲利去濕熱如法治之遇十證可消三四如十餘日後腫勢已成不能內消宜服托裏消毒散或托裏透膿湯自破如不破腫髙光亮脹痛者用卧針開之穢膿一出其腫全消者順朝服六味地黃丸午服十全大補湯溫補滋隂又有過食膏粱厚味氣實者初服龍膽瀉肝湯潰服滋隂八物湯又有房勞過度羸弱者初服八珍湯潰服十全大補湯脾虛不食六君子湯日久成漏者國老膏化湯送服琥珀蠟礬丸外治法按癰疽潰瘍門當戒房勞怒氣魚腥發物慎重調理九龍丹木香乳香沒藥兒茶血竭巴豆不去油等分為末生蜜調成一塊磁盒收貯臨用時旋丸豌豆大每服九丸空心熱酒一杯送下行四五次方食稀粥腫甚者間日再用一服自消方歌九龍丹醫懸癰毒初起氣實膿未成木香乳沒兒茶竭巴豆蜜丸酒服靈滋隂八物湯當歸生地黃白芍藥酒炒川芎丹皮花粉各一錢澤瀉五分甘草節一錢水二鍾燈心五十寸煎八分食前服大便祕者加蜜炒大黃一錢方歌滋隂八物過膏粱懸癰已潰服此方四物丹皮花粉瀉草節便祕加大黃仙方活命飲琥珀蠟礬丸托裏消毒散俱見腫瘍門托裏透膿湯見頭部侵腦疽六味地黃丸見面部雀斑十全大補湯八珍湯六君子湯即香砂六君子湯減去藿香砂仁俱見潰瘍門龍膽瀉肝湯見腰部纒腰火丹國老膏見背部丹毒發穿襠發穿襠毒發㑹隂前憂思勞傷濕鬱源焮痛紅順塌陷逆腐深漏溺收斂難注此證生於㑹隂穴之前腎囊之後由憂思勞傷濕鬱凝結而成初起如粟漸生紅亮焮痛潰出稠膿者順若起如椒子黑焦陷於皮肉之內漫腫紫暗並無焮熱痛連皋丸及腰背肛門者逆此係皮囊空處凡生毒患宜速潰根淺但遇根深遲潰腐傷尿管漏溺不能收斂者至險內治按懸癰外治按癰疽腫瘍潰瘍門跨馬癰跨馬癰生腎囊旁重墜肝腎火濕傷紅腫焮痛宜速潰初清托裏勿寒凉注此證一名騙馬墜生於腎囊之旁大腿根裏側股縫夾空中由肝腎濕火結滯而成初如豆粒漸漸腫如鵝卵隕墜壅重色紅焮痛暴起髙腫速潰稠膿者順若漫腫平塌微熱微紅潰出稀膿者險多成串皮漏證此處乃至隂之下醫治不可過用寒凉初宜服仙方活命飲消之次服托裏透膿湯既潰之後內外治法俱按癰疽潰瘍門仙方活命飲見腫瘍門托裏透膿湯見頭部侵腦疽便毒便毒生於腿縫間忍精瘀血怒傷肝堅硬木痛寒熱作初汗次下灸之痊注此證又名血疝又名便癰無論男女皆可以生發於少腹之下腿根之上摺紋縫中經屬肝腎由强力房勞忍精不泄或欲念不遂以致精搏血留聚於中途壅遏而成或為暴怒傷肝氣滯血凝而發初如杏核漸如鵝卵堅硬木痛微熱不紅令人寒熱往來宜荆防敗毒散汗之若煩躁作渴氣鬱者宜山甲內消散以消解之若過於堅硬大痛者宜紅花散瘀湯舒通之前藥用之不應者宜九龍丹攻之若無痛無熱則不可攻下宜陽燧錠日灸五七壯以或軟或消或潰為止膿勢將成不可强消宜黃耆內托散托之甚虛者托裏透膿湯既潰宜八珍湯十全大補湯補中益氣湯因證用之外用五色靈藥撒之化腐煨膿兼琥珀膏萬應膏貼之生肌斂口斯證潰後即名魚口因生於摺紋縫中其瘡口潰大身立則口必合身屈則口必張形如魚口開合之狀故有魚口之名但此毒係忍精不泄怒氣傷肝而成至於生楊梅而兼有便毒者另詳注於楊梅門紅花散瘀湯紅花當歸尾皂刺各一錢生軍三錢連翹去心蘇木穿山甲炙研石决眀殭蠶炒乳香貝母各一錢去心研黑牽牛二錢酒水各一鍾煎八分空心服行五六次方食稀粥補之方歌紅花散瘀消堅硬便毒初起腫痛添歸刺軍翹蘇木甲石决殭蠶乳貝牽黃耆內托散黃耆二錢白术一錢土炒當歸川芎各二錢金銀花皂刺天花粉各一錢澤瀉甘草各五分炙水二鍾煎八分食前服方歌黃耆內托醫便毒腫盛不消托潰良白术歸芎銀皂刺天花瀉草力同劻荆防敗毒散見項部腦疽山甲內消散見腹部中脘疽九龍丹見前懸癰陽燧錠見首卷烙法托裏透膿湯見頭部侵腦疽八珍湯十全大補湯補中益氣湯五色靈藥萬應膏俱見潰瘍門琥珀膏見頭部髮際瘡疳瘡疳瘡統名有三原欲火未遂溲淋難房術塗藥癗癢紫光亮赤腫梅毒愆注此證統名疳瘡又名妬精瘡生於前隂經云前隂者宗筋之所主督經衇絡循隂器合篡間又云腎開竅於二隂是瘡生於此屬肝督腎三經也其名異而形殊生於馬口之下者名下疳生莖之上者名蛀疳莖上生瘡外皮腫脹包裹者名袖口疳疳久而遍潰者名蠟燭疳痛引皋丸隂囊腫墜者名雞膯疳痛而多癢潰而不深形如剝皮爛杏者名瘙疳生馬口旁有孔如棕眼眼內作癢捻之有微膿出者名鏇根疳生楊梅時或誤用薰搽等藥以致腐爛如臼者名楊梅疳又有生楊梅時服輕粉水銀打成劫藥以致便溺尿管內刺痛者名楊梅內疳諸疳原由有三一由男子欲念萌動淫火猖狂未經發泄以致敗精濁血留滯中途結而為腫初起必先淋漓溲溺澀痛次流黃濁敗精陽物漸損甚則腫痛腐爛治當疏利肝腎邪火以八正散清肝導滯湯主之一由房術熱藥塗抹玉莖洗擦隂器僥幸不衰久頓不泄以致火鬱結腫初起陽物癢痛堅硬漸生疙􅜀色紫腐爛血水淋漓不時興舉治當泄火解毒以黃連解毒湯蘆薈丸主之一由娼家婦人隂器瘀精濁氣未淨輒與交媾以致淫精𫝊染梅毒初起皮腫紅亮甚如水晶破流腥水麻癢時發腫痛日增治當解毒以龍膽瀉肝湯主之次服二子消毒散外通用大豆甘草湯洗之紅腫熱痛以鯉魚膽汁敷之損破腐爛以鳯衣散旱螺散珍珠散銀粉散回春脫疳散因證敷之惟楊梅疳與楊梅內疳二證多服五寶散甚效八正散扁蓄生軍各一錢滑石二錢瞿麥甘草生車前子梔子木通各一錢水二鍾煎八分食前服方歌八正散清積火盛小水作淋結腫疼扁蓄軍滑瞿麥草車前梔子木通靈清肝導滯湯扁蓄四錢滑石二錢甘草一錢生大黃二錢者用便祕瞿麥三錢水二鍾燈心五十寸煎八分空心服方歌清肝導滯清肝熱玉莖腫疼小水澀扁蓄滑石草大黃燈心瞿麥服通徹二子消毒散土茯苓八兩豬脂二兩切碎杏仁炒去皮尖殭蠶炒蟬蛻各七個牛膝荆芥防風各一錢皂角子七個金銀花三錢肥皂子七個豬牙皂角一條水八碗煎三碗作三次服如結毒服三七日自愈袖口疳加黃蘗一錢肥皂子倍之楊梅疳加薏苡仁皂刺各一錢側柏葉緑豆糯米各三錢楊梅內疳加海金沙五加皮白丑各一錢五分方歌二子消毒梅毒疳土苓豬脂杏殭蠶蟬膝荆防皂角子銀花肥皂豬牙煎大豆甘草湯黑豆一合甘草一兩生赤皮葱三莖槐條六十寸水煎濃澄湯候溫日洗二次方歌大豆甘草湯神方諸般疳證洗之良止癢消疼能解毒赤葱槐條共熬湯鳯衣散鳯凰衣一錢卵殼雞抱輕粉四分氷片二分黃丹一錢共研細末鴨蛋清調敷或乾撒亦可方歌鳯衣散能敷潰疳輕粉氷片共黃丹化腐生肌兼止癢鴨蛋清調痛即安旱螺散白田螺殼三錢煆輕粉一錢氷片麝香各三分共研細末香油調敷方歌旱螺散用易生肌潰疳癢痛俱可醫煆螺殼與輕氷麝香油調敷去腐宜珍珠散珍珠黃連末黃蘗末定粉輕粉象牙末五倍子炒兒茶沒藥乳香各等分共研極細末先以米泔水洗患處再撒此藥甚效方歌珍珠散治下疳瘡清熱除瘀脫腐强連蘗兒茶輕定粉五倍象牙沒乳香銀粉散上好錫六錢火化開入硃砂末二錢攪炒砂枯去砂留錫再化開投水銀一兩和勻傾出聽用定粉一兩研極細鋪綿紙上捲成一條一頭㸃火煨至紙盡為度吹去紙灰用粉同前錫汞再加輕粉一兩共合一處研成極細末先以甘草湯淋洗患處拭乾隨撒此藥能生肌止痛收斂甚效方歌銀粉散醫疳腐蝕莖損梅毒爛皆施錫炒硃砂水銀入定輕二粉對研之回春脫疳散黑鉛五錢火化開投水銀二錢五分研不見星為度再加寒水石三錢五分輕粉二錢五分硼砂一錢共研細末先以葱艾花椒煎湯洗患處再撒此藥方歌回春散先化黑鉛次下水銀要細研寒水硼砂輕粉入下疳蝕爛撒之痊五寶散石鍾乳四錢如乳頭下垂敲破易碎似蜻蜓翅者方真硃砂一錢珍珠二錢豆腐內煮半炷香時取出氷片一錢琥珀二錢各研極細和一處再研數百轉磁罐密收用藥二錢加飛羅麵八錢再研和勻每用土茯苓一斤水八碗煎至五碗濾去渣作五次每次加五寶散一分和勻量病上下服日用一七如鼻子腐爛每日土茯苓內加辛夷三錢煎服引藥上行忌食海腥牛羊鵝肉火酒煎炒房事等件方歌五寶散硃鍾乳珍氷珀飛羅麵細勻楊梅疳瘡結毒證土苓湯調服最神黃連解毒湯見耳部黑疔蘆薈丸見齒部牙衄龍膽瀉肝湯見腰部纒腰火丹隂虱瘡隂虱瘡蟲毛際內肝腎濁熱不潔生瘙癢抓紅含紫㸃若還梅毒蠟皮形注此瘡一名八腳蟲生於前隂毛際內由肝腎氣濁生熱兼淫欲失洗不潔摶滯而成瘙癢難忍抓破色紅中含紫㸃內宜服蘆蘗地黃丸外用針挑破去虱隨擦銀杏無憂散易愈若毛際內如豆如餅發癢結如蠟皮者楊梅毒也即按楊梅毒治之銀杏無憂散水銀鉛製輕粉杏仁去皮尖搗膏蘆薈雄黃狼毒各一錢麝香一分除水銀杏仁膏共研篩細再入銀杏同研勻先以石菖蒲煎湯洗之用針挑破去虱隨用津唾調擦使藥氣入內愈不復發切忌牛犬鱉肉方歌銀杏無憂散止癢熱滯毛際隂虱瘡鉛製水銀輕粉杏蘆薈雄黃狼麝香蘆蘗地黃丸即六味地黃丸加蘆薈五錢蜜炒黃蘗一兩見面部雀斑腎囊癰腎囊紅腫發為癰寒熱口乾焮痛疼肝腎濕熱流注此失治潰深露皋凶注此證生於腎囊紅腫焮熱疼痛身發寒熱口乾飲冷由肝腎濕熱下注腎囊而成初起宜服荆防敗毒散汗之外用葱鹽熬湯燙之寒熱已退宜服清肝滲濕湯消解之不應者膿勢將成也急服滋隂內托散若氣怯食少者宜服托裏透膿湯外用二味拔毒散圈敷腫根膿脹痛者用卧針針之出稠膿者順出腥水者險宜服托裏排膿湯外用琥珀膏貼之俟腫消膿少痛減時用生肌散生肌玉紅膏以生肌斂口此癰本於肝腎發出以滋隂培補氣血為要生肌斂口時朝服六味地黃湯暮服人參養榮湯滋補之甚效此證若失治潰深露皋丸者險然不可棄而不治宜杉木灰托之蘇子葉包之患者仰卧靜以養之或可取效清肝滲濕湯黃芩梔子生研當歸生地白芍藥酒炒川芎柴胡花粉龍膽草各一錢酒炒甘草生澤瀉木通各五分水二鍾燈心五十寸煎八分食前服方歌清肝滲濕消囊癰小水淋漓腫痛攻芩梔四物柴花粉膽草燈甘瀉木通滋隂內托散當歸熟地白芍藥酒炒川芎各一錢五分穿山甲炙研澤瀉皂刺各五分黃耆一錢五分水二鍾煎八分食前服方歌滋隂內托將潰劑囊癰欲膿托最宜四物穿山瀉皂刺食前煎服入黃耆荆防敗毒散見項部腦疽托裏透膿湯見頭部侵腦疽二味拔毒散見腫瘍門托裏排膿湯見項部魚尾毒琥珀膏見頭部髮際瘡生肌散生肌玉紅膏人參養榮湯俱見潰瘍門六味地黃湯即六味地黃丸改作煎劑見面部雀斑腎囊風腎囊風發屬肝經證由風濕外襲成麻癢搔破流脂水甚起疙􅜀火燎疼注此證一名繡毬風係腎囊作癢由肝經濕熱風邪外襲皮裏而成初起乾燥癢極喜浴熱湯甚起疙􅜀形如赤粟麻癢搔破浸淫脂水皮熱痛如火燎者此屬裏熱俱宜龍膽瀉肝湯服之外用蛇床子湯薰洗之洗後擦狼毒膏甚效蛇床子湯威靈仙蛇床子當歸尾各五錢縮砂殼三錢土大黃苦參各五錢老葱頭七個水五碗煎數滚傾入盆內先薰候溫浸洗方歌蛇床子湯洗囊風止癢消風除濕靈威靈歸尾縮砂殼土大黃與苦參葱狼毒膏狼毒川椒硫黃檳榔文蛤蛇床子大風子枯白礬各三錢共研細末用香油一茶鍾煎滚下公豬膽汁一枚和勻調前藥擦患處方歌狼毒膏擦繡毬風濕癢浸淫火燎疼椒硫檳蛤床風子枯礬豬膽油調成龍膽瀉肝湯見腰部纒腰火丹婦人隂瘡婦人隂瘡係總名各有形證各屬經隂挺如蛇脾虛弱隂腫勞傷血分成隂蝕胃虛積鬱致隂脫憂思太過生隂㿗氣血雙虛損隨證施治諸證平注此證俱生於隂器如隂中挺出一條如蛇形者名為隂挺由脾經虛弱或産後遇怒受風所致初宜服逍遙散加荆芥防風次宜朝服補中益氣湯倍用升麻晚服龍膽瀉肝湯外以蛇床子煎湯薰洗之如隂户忽然腫而作痛者名為隂腫又名蚌疽由勞傷血分所致宜四物湯加丹皮澤瀉花粉柴胡服之或服秦艽湯外用艾葉一兩防風六錢大㦸五錢煎湯薰洗如隂器外生疙􅜀內生小蟲作癢者名為隂蝕又名䘌瘡由胃虛積鬱所致宜四物湯加石菖蒲龍膽草黃連木通服之若寒熱與虛勞相似者蟲入臟腑也宜逍遙散吞送蘆薈丸早晚各一服外以溻癢湯薰洗次以銀杏散塞入隂中殺蟲止癢如隂户開而不閉癢痛出水者名為隂脫由憂思太過所致宜逍遙散或歸脾湯俱加柴胡梔子白芍丹皮服之由産後得者補中益氣湯加五味子醋炒白芍服之外俱用荆芥枳殼訶子文蛤大劑煎湯薰洗如子宫脫出名為隂㿗俗名㿗葫蘆由氣血俱虛所致宜補中益氣湯去柴胡倍用升麻加益母草服之外以萆麻子肉搗爛貼頂心再用枳殼半斤煎湯薰洗由思欲不遂肝氣鬱結而成者必先於小便似有堵塞之意因而努力久之隨努而下令穩婆扶正葫蘆令患婦仰卧以枕墊腰吹嚏藥收之收入即緊閉隂器隨以布帛將腿縳定內仍服補中益氣湯自愈秦艽湯秦艽六錢石菖蒲當歸各三錢葱白五個水二鍾煎一鍾食前服方歌秦艽湯治蚌疽生腫痛能除效可徴石菖蒲與當歸片食前葱白水煎成溻癢湯苦參狼毒蛇床子當歸尾威靈仙各五錢鶴虱草一兩用河水十碗煎數滚濾去渣貯盆內乘熱先薰待溫投公豬膽汁二三枚和勻洗之甚效方歌溻癢殺蟲療隂蝕熬湯薰洗不宜遲苦參狼毒床歸尾豬膽威靈鶴虱施銀杏散輕粉雄黃水銀鋁製杏仁各一錢生用右各研共和一處再勻每用五分棗肉一枚和丸用絲綿包裹線扎緊將藥入隂內留線頭在外如小解時將藥取出解完復入內一日一換四五箇自愈方歌銀杏散醫熱下侵輕粉雄黃製水銀杏仁棗肉綿包裹隂癢生瘡用有神逍遙散見背部上搭手歸脾湯見乳部乳中結核補中益氣湯見潰瘍門龍膽瀉肝湯見腰部纒腰火丹四物湯見耳部耳疳蘆薈丸見齒部牙衄臀部鸛口疽鸛口疽生尻尾尖經屬督衇濕痰源腫如魚肫潰鸛嘴少壯易愈老難痊注此證一名鋭疽生於尻尾骨尖處初腫形如魚肫色赤堅痛潰破口若鸛嘴屬督衇經由濕痰流結所致朝寒暮熱夜重日輕潰出稀膿為不足或流稠膿鮮血為有餘少壯可愈老弱難斂易於成漏初起宜滋隂除濕湯以和之已成不得內消者用和氣養榮湯以托之氣血虛弱潰而斂遲者滋腎保元湯以補之若失治久而不斂者宜服先天大造丸兼服琥珀蠟礬丸久久收斂外治法按癰疽腫瘍潰瘍門滋隂除濕湯當歸熟地川芎白芍各一錢酒炒陳皮柴胡知母貝母去心研黃芩各八分澤瀉地骨皮甘草各五分生水二鍾薑三片煎八分食前服方歌滋隂除濕鸛口疽退熱消痰初起宜四物陳柴知母草澤瀉黃芩地骨皮和氣養榮湯人參白术土炒白茯苓丹皮陳皮熟地當歸黃耆各一錢沉香甘草各五分炙水二鍾煎八分食前服方歌和氣養榮托鋭疽將膿煎服潰更宜四君丹皮陳熟地當歸沉香共黃耆滋腎保元湯人參白术土炒白茯苓當歸身熟地黃耆山茰肉丹皮杜仲各一錢肉桂附子製甘草各五分炙水二鍾薑三片紅棗肉二枚建蓮子七個去心煎八分食前服方歌滋腎保元潰後虛斂遲膿清水淋漓十全大補除芎芍山茰附子牡丹皮先天大造丸人參白术土炒當歸身白茯苓莵絲子枸把黃精牛膝各二兩補骨脂炒骨碎補去毛微炒巴㦸肉逺志各一兩去心廣木香青鹽各五錢丁香三錢共研末以上熟地四兩搗膏酒煮仙茅浸去赤汁蒸熟去皮搗膏何首烏去皮黑豆同煮去豆搗膏膠棗肉各二兩搗膏肉蓯蓉去鱗并內膜酒浸搗膏紫河車一具白酒煮爛搗膏以上六膏共入前藥末內右為細末搗膏共合一處再加煉過白蜂蜜為丸如梧桐子大每服七十丸空心溫酒送下方歌先天大造補氣血専治癰疽潰後虛膿水清稀難收斂參术歸苓地首烏補骨青鹽骨碎補枸把黃精逺莵絲巴㦸仙茅丁木棗河車牛膝蓯蓉俱琥珀蠟礬丸見腫瘍門坐馬癰坐馬癰屬督衇經尻尾略上濕熱凝髙腫速潰稠膿順漫腫潰遲紫水凶注此證生於尻尾骨略上屬督衇經由濕熱凝結而成髙腫潰速膿稠者順若漫腫潰遲出紫水者險虛人患此易於成漏初宜艾壯隔蒜片灸之以宣通結滯令其易潰易斂內服之藥與鸛口疽同潰後內外俱按癰疽潰瘍門隔蒜灸法見首卷灸法臀癰臀癰證屬膀胱經堅硬悶腫濕熱凝肉厚之處遲潰斂最宜紅活髙腫疼注此證屬膀胱經濕熱凝結而成生於臀肉厚處腫潰斂俱遲慢初宜隔蒜片艾灸服仙方活命飲消之不應者即服透膿散膿熟針之潰後內外治法俱按癰疽潰瘍門隔蒜灸法見首卷灸法仙方活命飲透膿散俱見腫瘍門上馬癰下馬癰上馬癰與下馬癰上左下右摺紋生膀胱濕熱憂憤起黑陷屬重髙腫輕注此證生於臀肉之下摺紋中屬膀胱經濕熱又兼七情不和憂憤凝滯而成初起如粟黃膿小皰漸生焮痛寒熱往來髙腫紅亮為輕平陷黑硬為重初服荆防敗毒散以退寒熱次服內托羌活湯膿勢將成服托裏透膿湯其餘內外治法俱按癰疽潰瘍門內托羌活湯羌活黃蘗各二錢酒炒黃耆一錢五分當歸尾陳皮藁本連翹蒼术炒甘草炙防風各一錢肉桂三分水一鍾酒半鍾煎八分食前服方歌內托羌活宣堅硬燥濕能托臀下癰歸黃陳蘗同甘草藁本連翹蒼桂風荆防敗毒散見項部腦疽托裏透膿湯見頭部侵腦疽涌泉疽涌泉疽生尻骨前形如伏鼠腫痛堅督衇濕熱潰破險少壯易愈老弱難注此證生尻骨之前長强穴屬督衇經首穴由濕熱凝結而成初腫堅硬疼痛狀如伏鼠十日可刺得白膿者順潰遲青膿者險紫黑水者逆內治法同鸛口疽外治潰後按癰疽潰瘍門少壯者得此易愈老年氣衰弱者多成冷漏難痊臟毒臟毒毒注在肛門內外虛實各有因醇酒厚味兼辛苦外屬陽分內屬隂注此證有內外隂陽之别發於外者由醇酒厚味勤勞辛苦藴注於肛門兩旁腫突形如桃李大便祕結小水短赤甚者肛門重墜緊閉下氣不通刺痛如錐衇數有力多實多熱屬陽易治宜服一煎散通利二便菩提露搽之腫痛仍前不全退者膿將成也宜服托裏透膿湯膿脹痛針之膿出之後治同潰瘍門發於內者兼隂虛濕熱下注肛門內結壅腫刺痛如錐大便虛閉小水淋漓寒熱往來遇夜尤甚衇數微細為虛為濕屬隂難治宜服五灰散膿毒自然潰出膿生遲者服十全大補湯托之潰後按潰瘍門一煎散當歸尾穿山甲炙研甘草生桃仁泥皂角刺各二錢川黃連一錢五分枳殼麩炒檳榔天花粉烏藥赤芍生地白芷各一錢元明粉大黃各三錢紅花五分水二鍾浸一宿次早煎一滚空心服俟行三四次以稀粥補之方歌一煎散消臟毒方歸甲甘連桃枳榔天花皂刺紅烏藥芍地元明芷大黃菩提露熊膽三分氷片一分凉水十茶匙調化開搽於患處甚效方歌菩提露消積熱痛臟毒堅疼焮腫增水調熊膽加氷片搽於患處毒漸輕五灰散血管鵝毛血餘蜈蚣穿山甲生鹿角各燒存性各等分研細共合勻每服五錢空心溫黃酒調下方歌五灰散用鵝管毛血餘蜈甲鹿角燒臟毒腫痛肛門內每服五錢黃酒調托裏透膿湯見頭部侵腦疽十全大補湯見潰瘍門痔瘡痔瘡形名亦多般不外風濕燥熱源肛門內外俱可發潰久成漏最難痊注此證係肛門生瘡有生於肛門內者有生於肛門外者初起成㿔不破者為痔易治破潰而出膿血黃水浸淫淋瀝久不止者為漏難痊斯證名因形起其名雖有二十四種總不外乎醉飽入房筋衇橫解精氣脫泄熱毒乘虛下注或憂思太過藴積熱毒憤鬱之氣致生風濕燥熱四氣相合而成如結腫脹悶成塊者濕盛也結腫痛如火燎二便閉者大腸小腸熱盛也結腫多癢者風盛也肛門圍繞摺紋破裂便結者火燥也初俱服止痛如神湯消解之外俱用菩提露或田螺水㸃之若堅硬者以五倍子散唾津調塗之兼用朴消葱頭煎湯洗之頂大蒂小者用藥線勒於痔根每日緊線其痔枯落隨以月白珍珠散撒之收口亦有頂小蒂大者用枯痔散枯之內痔不出者用喚痔散填入肛門其痔即出隨以朴消葱頭煎湯洗之又有因勤苦勞役負重逺行以致氣血交錯而生痔者俱用止痛如神湯加減服之又有血箭痔生肛門或裏或外堵塞墜腫每逢大便用力則鮮血急流如箭不論糞前糞後由腸胃風熱而兼暴怒成之初服生熟三黃丸若唇白面色痿黃四肢無力屬氣血兩虛宜十全大補湯倍川芎參耆服之外用自己小便洗之童便熱洗亦可其血自止亦有腸風下血㸃滴而出糞前者宜防風秦艽湯糞後出血者為酒毒宜服苦參地黃丸效後必多服臟連丸二三料除根又有産後用力太過而生痔者宜補中益氣湯加桃仁紅花蘇木服之又有久瀉久痢而生痔者宜補中益氣湯加槐花皂莢子煆末服之如痔已通腸汚從漏孔出者用胡連追毒丸酒服之服後膿水反多者藥力到也勿以為懼如漏有管者用黃連閉管丸服之可代針刀藥線之力凡痔未破已破及成漏者俱用却毒湯燙洗或用喇叭花煎湯日洗二次喇叭花即土地黃苖兼戒房勞河豚海腥辛辣椒酒等物有久患痔而後咳嗽者取效甚難久病咳嗽而後生痔者多致不救止痛如神湯秦艽去苖桃仁去皮尖研皂角子各一錢研燒存性蒼术米泔水浸炒防風各七分黃蘗五分酒炒當歸尾酒洗澤瀉各三分檳榔一分熟大黃一錢二分右除桃仁皂角子檳榔用水二鍾將羣藥煎至一鍾再入桃仁皂角子檳榔再煎至八分空心熱服待少時以美膳壓之不犯胃也忌生冷五辛火酒硬物大料濕麵之類如腫有膿加白葵花五朵心去蕊青皮五分木香三分則膿從大便出也如大便祕甚倍大黃加麻仁枳實如腫甚倍黃蘗澤瀉加防己豬苓條芩如痛甚加羌活郁李仁如癢甚倍防風加黃耆羌活麻黃藁本甘草如血下倍黃蘗多加地榆槐花荆芥穗白芷如小便澀數不通者加赤茯苓車前子燈心扁蓄方歌止痛如神諸痔瘡風濕燥熱總能防歸蘗桃榔皂角子蒼术艽風澤大黃田螺水大田螺一枚用尖刀挑起螺厴入氷片末五釐平放磁盤內待片時螺竅內滲出漿水用雞翎蘸㸃患處勤勤㸃之其腫自然消散方歌田螺水㸃痔瘡效氷片裝入田螺竅少時化水取㸃瘡止痛消腫有竒妙五倍子散用川文蛤大者一枚敲一小孔用隂乾荔枝草揉碎塞入文蛤內令滿用紙塞孔濕紙包煨片時許取出去紙研為細末每一錢加輕粉三分氷片五釐共研極細末唾津調塗患處方歌五倍子散痔痛墜堅硬腫疼立刻揮輕粉氷片各研細荔枝草入蛤中煨藥線芫花五錢壁錢二錢用白色細衣線三錢同芫花壁錢用水一碗盛貯小磁罐內慢火煮至湯乾為度取線隂乾凡遇痔瘡癭瘤頂大蒂小之證用線一根患大者二根雙扣繫扎患處兩頭留線日漸緊之其患自然紫黑氷冷不熱為度輕者七日重者十五日後必枯落以月白珍珠散收口甚效方歌藥線芫花共壁錢再加白扣線同煎諸痔癭瘤繫根處生似菌形用此捐枯痔散天靈蓋用童子者佳又用青線水將天靈蓋浸片時撈出以火煆紅再入青線水內淬之如此七次淨用四錢砒霜一兩白礬二兩生輕粉四錢蟾酥二錢共為極細末入小新鐵鍋內上用粗磁碗密蓋鹽泥封固炭火煆至二炷香待冷揭開碗將藥研末搽痔上每日辰午申三時用溫水洗淨患處上藥三次上至七八日其痔枯黑堅硬住藥裂縫待其自落方歌枯痔天靈蓋煆淬砒礬輕粉共蟾酥入鍋碗蓋泥固煆痔瘡新久搽皆除喚痔散枯白礬五分食鹽三分炒草烏生刺蝟皮各一錢煆存性麝香五分氷片二分共研細末先用溫水洗淨肛門隨用唾津調藥三錢填入肛門片時即出方歌喚痔散把內痔呼刺蝟皮鹽麝草烏氷片枯礬同研細津調填入片時出生熟三黃湯生地熟地各一錢五分黃連黃蘗黃芩人參蒼术米泔水浸炒白术土炒厚朴薑炙當歸身陳皮各一錢地榆防風澤瀉甘草各六分生烏梅二個水二鍾煎八分食前服方歌生熟三黃連蘗參蒼芩厚术共歸陳榆風澤瀉烏梅草專醫血箭痔如神防風秦艽湯防風秦艽當歸生地白芍酒炒川芎赤茯苓連翹各一錢去心梔子生研蒼术米泔水浸炒槐角白芷地榆枳殼麩炒檳榔甘草各六分生水二鍾煎至八分食前溫服如便祕者加大黃方歌防風秦艽治腸風墜腫津血最止疼四物梔蒼槐角芷地榆枳草翹檳苓苦參地黃丸苦參切片酒浸濕蒸曬九次為度炒黃為末淨一斤生地黃四兩酒浸一宿蒸熟搗爛和入苦參末內加煉過蜂蜜為丸如梧桐子大每服三錢白滚水送下或酒下亦可日服二次方歌苦參地黃糞後紅皆因酒毒熱來攻二味酒蒸蜂蜜煉為丸水送最有功臟連丸黃連八兩末研淨公豬大腸肥者一假長一尺二寸水洗淨右二味將黃連末裝入大腸內兩頭以線扎緊放砂鍋內下煮酒二斤半慢火熬之以酒乾為度將藥腸取起共搗如泥如藥濃再曬一時許復搗為丸如梧桐子大每服七十丸空心溫酒送下久服除根方歌臟連丸用川黃連研入豬腸煮酒煎搗爛為丸溫酒服便血肛門墜腫痊胡連追毒丸胡黃連切片薑汁拌炒研末刺蝟皮各一兩炙切片再炒黃研末麝香二分研細共和一處研勻軟飯為丸如麻子大每服一錢食前溫酒送下方歌胡連追毒丸醫痔成漏通腸服最宜連麝蝟皮飯丸服排盡瘀膿換好肌黃連閉管丸胡黃連一兩淨末穿山甲香油內炸黃石决眀煆槐花各五錢微炒共研細末煉蜜為丸如麻子大每服一錢空心清米湯送下早晚服二次至重者不過四十日而愈如漏四邊有硬肉突起者加殭蠶二十條炒研末入藥內及遍身諸般漏證服此方皆可有效方歌黃連閉管丸穿山石决槐花共細研能除漏管米湯送蜜丸麻子大一般却毒湯瓦松馬齒莧甘草各五錢生川文蛤川椒蒼术防風葱白枳殼側柏葉各三錢熖消一兩水五碗煎三碗先薰後洗日用三次方歌却毒湯洗痔漏效瓦松甘草蛤川椒齒莧蒼風葱枳殼柏葉同熬加焰消菩提露見臟毒月白珍珠散十全大補湯補中益氣湯俱見潰瘍門坐板瘡坐板瘡在臀腿生形如黍豆癢焮疼暑濕熱毒凝肌肉初宜燙洗油撚烘注此證一名風疳生於臀腿之間形如黍豆色紅作癢甚則焮痛延及谷道勢如火燎由暑令坐日曬几凳或久坐隂濕之地以致暑濕熱毒凝滯肌肉而成初宜芫花川椒黃蘗熬湯燙洗即消或毒盛癢痛仍不止者宜用油缸青布三指寬一條香油調雄黃末一錢攤於布上捲之燃著吹滅焰頭向瘡烘之其癢痛即止甚效御纂醫宗金鑑卷六十九
