  text: 編輯婦科心法要訣目録崩漏門崩漏總括崩漏證治荆芩四物湯加味四物湯膠艾四物湯琥珀散八珍湯十全大補湯益氣養榮湯補中益氣湯益胃升陽湯調經升陽除濕湯失笑散地榆苦酒煎帶下門五色帶下總括帶下證治呉茱萸湯補中益氣湯六君子湯六味地黄湯歸脾湯四物湯清白散四君子湯導水丸萬安丸威喜丸固精丸加味四物湯逍遙散癥瘕積痞痃癖疝諸證門癥瘕積聚痞瘀血血蠱總括癥瘕證治大七氣湯食癥證治烏藥散血癥證治血竭散痞證治助氣丸積聚證治開鬱正元散瘀血血蠱證治桃奴散失笑散玊燭散痃癖疝證總括痃癖證治葱白散疝病證治當歸散治諸積大法嗣育門胎孕之原男女完實種子時候分男女論雙胎品胎衇見有子胎男女論辨别孕病分經養胎受孕分房静養安胎母子二法胎前用藥三禁安胎審宜調治御纂醫宗金鑑卷四十五目録欽定四庫全書御纂醫宗金鑑卷四十五編輯婦科心法要訣目録崩漏門崩漏總括崩漏證治荆芩四物湯加味四物湯膠艾四物湯琥珀散八珍湯十全大補湯益氣養榮湯補中益氣湯益胃升陽湯調經升陽除濕湯失笑散地榆苦酒煎帶下門五色帶下總括帶下證治呉茱萸湯補中益氣湯六君子湯六味地黄湯歸脾湯四物湯清白散四君子湯導水丸萬安丸威喜丸固精丸加味四物湯逍遙散癥瘕積痞痃癖疝諸證門癥瘕積聚痞瘀血血蠱總括癥瘕證治大七氣湯食癥證治烏藥散血癥證治血竭散痞證治助氣丸積聚證治開鬱正元散瘀血血蠱證治桃奴散失笑散玊燭散痃癖疝證總括痃癖證治葱白散疝病證治當歸散治諸積大法嗣育門胎孕之原男女完實種子時候分男女論雙胎品胎衇見有子胎男女論辨别孕病分經養胎受孕分房静養安胎母子二法胎前用藥三禁安胎審宜調治御纂醫宗金鑑卷四十五目録欽定四庫全書御纂醫宗金鑑卷四十五編輯婦科心法要訣崩漏門崩漏總括淋瀝不斷名為漏忽然大下謂之崩紫黒塊痛多屬熱日乆行多損任衝脾虚不攝中氣陷暴怒傷肝血妄行臨證審因須細辨虚補瘀消熱用清註婦人經行之後淋瀝不止名曰經漏經血忽然大下不止名為經崩若其色紫黑成塊腹脇脹痛者屬熱瘀若日乆不止及去血過多而無塊痛者多係損傷任衝二經所致更有憂思傷脾脾虚有不能攝血者有中氣下陷不能固血者有暴怒傷肝肝不藏血而血妄行者臨證之時湏詳審其因而細細辨之虚者補之瘀者消之熱者清之治之得法自無不愈崩漏證治荆芩四物湯崩漏血多物膠艾熱多知栢少芩荆漏濇香附桃紅破崩初脹痛琥珀攻日乆氣血衝任損八珍大補養榮寧思慮傷脾歸脾治傷肝逍遙香附青註崩血漏血去血過多者宜用膠艾四物湯補之如屬熱多者宜用知蘗四物湯清之熱少者宜用荆芩四物湯和之若漏血濇少此屬血滯宜用四物湯加香附桃仁紅花破之若崩血初起脹痛此屬瘀凝宜用琥珀散攻之崩漏日乆氣血已虧衝任傷損者宜用八珍湯十全大補湯人參養榮湯量補其損傷若因思慮傷脾者宜用歸脾湯補之恚怒傷肝者宜用逍遙散加炒香附青皮平之膠艾四物湯四物湯琥珀散八珍湯十全大補湯人參養榮湯歸脾湯逍遙散方俱見前調經彚方内補中益氣湯益胃升陽湯氣陷補中益氣舉保元升柴歸术陳益胃升陽加芩麯腹痛加芍𠻳減參註崩漏日乆脾傷食少中氣下陷不能載血者宜用補中益氣湯益胃升陽湯升舉之補中益氣湯即人參黄耆甘草保元湯加升麻柴胡當歸白术陳皮也益胃升陽湯即補中益氣湯加黄芩神麯也若腹痛者宜加白芍藥有熱者用黄芩無熱者用肉桂調之咳𠻳者肺熱也減人參調經升陽除濕湯夾水水瀉不甚弱調經升陽除濕湯耆草升柴歸蒼术羌獨藁本蔓荆防註崩漏下血夾水或日水瀉一二次形氣不甚弱者宜用調經升陽除濕湯其方即黄耆甘草升麻柴胡當歸蒼术羌活獨活藁本蔓荆子防風也以風藥先勝其濕若形氣虚弱者則當加人參陳皮合補中益氣湯補中勝濕可也失笑散地榆苦酒煎殺血心痛失笑散蒲黄五靈脂定疼崩血不已防滑脱地榆苦酒煎止崩註崩血心腹痛甚者名曰殺血心痛乃血滯不散宜用失笑散其方即蒲黄五靈脂也先定其痛痛止然後隨證治之若崩血補之仍然不止者當防其滑脫宜用地榆一兩醋煎露一宿次早温服立止止後隨證治之名地榆苦酒煎崩漏門彚方補中益氣湯黄耆人參白术甘草各一錢炙當歸陳皮各七分升麻柴胡各三分右剉薑棗水煎服益胃升陽湯黄耆二錢人參一錢去之有𠻳神麯一錢五分炒白术三錢當歸酒洗陳皮甘草各一錢炙升麻柴胡各五分生黄芩二錢不用秋涼右為麤末每服三錢或五錢如食添再加之如食減只服三錢或更減之不可多服水煎去滓熱服升陽除濕湯黄耆蒼术羌活各一錢五分防風藁本升麻柴胡甘草各一錢炙獨活五分蔓荆子七分右㕮咀水五大盞煎至一大盞去滓稍熱服空心服畢待少時以早膳壓之失笑散五靈脂蒲黄各等分右為末先用釅醋調二錢熬膏入水一盞煎至七分食前熱服良驗地榆苦酒煎地榆一兩醋煎露一宿次蚤温服立止止後隨證調治之苦酒即醋也帶下門五色帶下總括帶下勞傷衝與任邪入胞中五色分青肝黄脾白主肺衃血黑腎赤屬心隨人五臓兼濕化治從補瀉燥寒温更審瘡膿瘀血化湏别胞膀濁與淫註帶下者由於勞傷衝任風邪入於胞中血受其邪隨人藏氣濕熱濕寒所化故色青者屬肝為風濕色赤屬心為熱濕色黄屬脾為虚濕色白屬肺為清濕色黑屬腎為寒濕也其從補從瀉從燥從濇從寒從温則隨證治之更審其帶久淋瀝之物或臭或腥穢乃敗血所化是胞中病也若似瘡膿則非瘀血所化是内癰膿也若如米泔兼尿竅不利乃膀胱白濁病也若尿竅通利從精竅出或如膠黏乃胞中白淫病也帶下證治邪入胞中吳茱萸赤黏連梔青防梔白主益氣黑六味黄淡六君或歸脾註帶下因六淫之邪入於胞中者宜呉茱萸湯若色赤色黄而濁黏者熱也色黄者加黄連梔子色青者加防風梔子若色白色黑而清稀者虚寒也色白者用補中益氣湯色黑者用六味地黄湯色黄而淡者宜六君子湯或加味歸脾湯分證調治可也吳茱萸湯補中益氣湯六味地黄湯六君子湯歸脾湯方俱見首卷彚方加味四物湯胞中冷痛乃寒濕四物附子桂薑宜臭腥兼合知蘗用乆滑升柴龍牡脂註帶下而胞中熱痛乃熱濕也今胞中冷痛乃寒濕也宜四物湯加川附子炮薑官桂服之日乆滑脱者加升麻柴胡舉之龍骨牡蠣赤石脂濇之四物湯方見前調經門彚方内清白散帶下濕熱清白散四物薑炭草蘗椿赤榆荆芩濕二术滑加龍牡久合君註帶下五色帶下也皆濕熱所化宜用清白散其方即四物湯加薑炭甘草黄蘗椿皮也色赤加地榆荆芥黄芩濕加蒼术白术滑加龍骨牡蠣乆則合四君子湯也四物湯四君子湯俱見前調經門彚方内導水丸萬安丸帶下有餘皆濕化少腹脹疼汚水綿導水牽滑芩軍熱萬安牽椒茴木寒註五色帶下皆從濕化若少腹脹痛汚水綿綿屬濕熱者宜用導水丸其方即牽牛滑石黄芩生軍治熱有餘也屬濕寒者宜用萬安丸其方即牽牛胡椒小茴香木香治寒有餘者也威善丸固精丸瘀化瘡膿濁淫病虚實寒熱酌其宜威喜蠟苓固精菟韭味桑苓龍牡脂註帶下有因瘀血所化或瘡瘍膿出及白濁白淫者皆帶下類也其虚實寒熱當酌其宜藥用威喜丸即黄蠟茯苓也固精丸即菟絲子韭菜子五味子桑螵蛸茯苓龍骨牡蠣赤石脂也帶下門彚方清白散當歸黄蘗塩水泡白芍炒樗根皮酒炒生地川芎貝母各一錢炮薑甘草各五分右剉生薑三片水煎服導水丸牽牛頭末滑石水飛黄芩川大黄右末蒸餅為丸量虚實服萬安丸牽牛頭末胡椒木香小茴香各等分焙右末水泛為丸量虚實服威喜丸白茯苓四兩去皮作塊用猪苓二錢半同於磁噐内煮二十餘沸出晒乾不用猪苓黄蠟四兩右以茯苓為末煉黄蠟為丸如彈子大空心細嚼滿口生津徐徐咽服以小便清為度忌米醋只喫糠醋忌動氣固精丸牡蠣煆粉菟絲子酒蒸焙韭子炒龍骨五味子白茯苓桑螵蛸酒炙白石脂各等分右為末酒糊丸如桐子大每服七十丸空心鹽湯下癥瘕痃癖諸證門癥瘕積聚痞瘀血血蠱總括五積六聚分藏府七癥八瘕氣血凝癥積不動有定處瘕聚推移無定形痞悶不宣氣壅塞未成堅塊血瘀名蓄乆不散成血蠱産後經行風冷乘註五臓氣積名曰積故積有五證六府氣聚名曰聚故聚有六證難經有心肝脾肺腎五藏之積而無六聚蓋以積為血病而聚為氣病也故李杲有五積丸方治法巢氏病源載七癥八瘕但有八瘕名證而無七癥病形其他方書亦不概見大抵又以癥為氣病而瘕為血病也夫病皆起於氣必氣聚而後血凝不必過泥於黄青燥血脂狐蛇鱉等名但以牢固不移有定處者為癥為積推移轉動忽聚忽散者為瘕為聚可也故曰癥者徴也言有形可徴也瘕者假也言假物成形也若夫痞者痞悶不通氣道壅塞之謂也瘀血者血瘀腹中未成堅塊也蓄之既久必成血蠱矣凡此諸證皆由新産之後經行之時不知謹避以致風冷外襲邪正相搏結於腹中而成也癥瘕證治大七氣湯婦人一切癥瘕病上下攻疼七氣湯藿香益智稜莪术甘結青陳肉桂香註婦人一切癥瘕隨氣上下攻築疼痛者宜大七氣湯其方即藿香葉益智仁京三稜蓬莪术甘草桔梗青皮陳皮肉桂心木香也食癥證治烏藥散經行産後食生冷臓氣相摶結塊形牢固不移日漸長開滯消積温散行烏藥散烏桃莪术木香當歸青桂心註婦人經行産後貪食生冷之物與臟氣互相搏聚結成堅塊牢固不移日漸長大者治宜開滯消積用烏藥散即烏藥桃仁莪术木香當歸青皮桂心以温散之自愈血癥證治血竭散乘臟虚兮風冷干飲食内與血相摶因成血癥堅牢固脇腹脹痛熱而煩少食多忘頭汗出血竭歸芍蒲桂延註婦人産後經行之時臟氣虚或被風冷相干或飲食生冷以致内與血相搏結遂成血癥牢固不移脇腹脹痛内熱心煩食少善忘但頭汗出者宜用血竭散即血竭當歸赤芍蒲黄桂心延胡索也痞證治助氣丸三焦痞滿胸膈悶氣不宣通助氣清白术三稜蓬莪术枳殻㯽榔香與陳註婦人胸膈痞悶謂之痞由於氣壅不宣所致宜助氣丸即青皮白术三稜莪术枳殻㯽榔木香陳皮為丸服也積聚證治開鬱正元散積聚通用正元散苓术青陳麯麥延香砂海粉查甘桔痰飲食積血氣搏註五積六聚乃痰飲食積氣血搏結而成通用開鬱正元散其方即茯苓白术青皮陳皮神麯麥芽延胡索香附砂仁海粉山查甘草桔梗也用以健脾消食化痰滲飲理氣和血則積聚未有不愈者矣瘀血血蠱證治桃奴散腹中瘀血未成形面黄發熱腹脹疼産後經來風冷客血室之内有瘀停産後惡露失笑散經閉瘀凝玊燭攻血蠱桃奴豭鼠糞延桂砂桃附五靈註婦人産後經行之時傷於風冷則血室之内必有瘀血停留未成堅塊故不名癥瘕也其人必面色萎黄臍腹脹痛内熱晡熱若産後惡露不行者宜失笑散若經閉不通瘀血凝聚者宜玊燭散瘀血不行蓄之既乆必成血蠱宜用桃奴散即桃奴豭鼠糞延胡索桂心砂仁桃仁香附五靈脂也豭鼠糞一名兩頭尖即雄鼠屎桃奴即桃樹上未成不落之乾桃子也失笑散方見首卷崩漏玊燭散方見首卷彚方内痃癖疝證總括臍旁左右一筋疼突起如弦痃證名僻在兩肋名曰癖髙起如山疝病稱必引少腹腰脇痛三證皆由風冷成或作或止因寒發痛時方見不痛平註婦人臍之兩旁有筋突起疼痛大者如臂小者如指狀類弓弦者名曰痃癖在兩肋之間者名曰癖若小腹牽連腰脇疼痛髙起者謂之疝名雖有三其實皆因風冷客於胞中而然故其發作皆因再受風冷發則痛痛則見不痛則平復如初也痃癖證治葱白散婦人痃癖腹肋痛風冷血氣結而成葱白四物參苓枳桂朴薑香青莪稜茴香麯麥苦楝子葱鹽煎服訶黄斟註婦人痃癖腹肋疼痛者皆因風冷與氣血摶結而成宜用葱白散温散之其方即四物湯加人參茯苓枳殻肉桂厚朴乾薑木香青皮莪术三稜茴香神麯麥蘗苦楝子葱白食鹽煎服也大便結燥去鹽加大黄如大便自利加訶子四物湯方見首卷彚方内疝病證治當歸散婦人疝病氣攻冲脇腹刺痛當歸芎鱉甲呉萸桃仁芍桂榔青木大黄蓬註婦人疝病攻衝刺痛多因風冷寒濕客於胞門血室故其病皆屬厥隂肝經宜當歸散即當歸川芎鱉甲吳茱萸桃仁赤芍肉桂㯽榔青皮木香大黄蓬莪术也治諸積大法形虚病盛先扶正形證俱實去病急大積大聚衰其半湏知養正積自除註凡治諸癥積宜先審身形之壯弱病勢之緩急而治之如人虚則氣血衰弱不任攻伐病勢雖盛當先扶正氣而後治其病若形證俱實宜先攻其病也經云大積大聚衰其半而止蓋恐過於攻伐傷其氣血也羅天益曰養正積自除可謂得經㫖者矣癥瘕積痞血蠱門彚方大七氣湯三稜莪术各煨切青皮去穰陳皮去白木香藿香益智仁桔梗肉桂甘草各七錢半炙右㕮咀每服五錢水二盞煎至一盞食前温服烏藥散烏藥莪荗桂心當歸炒桃仁青皮木香各等分右為末每服二錢熱酒調下血竭散真血竭如無紫礦代當歸赤芍蒲黄延胡索右等分研細頻篩再研取盡為度每服一錢用童便合好酒半大盞煎一沸温調下方産下時一服上牀良久再服其惡血自循經下行不致衝上免生百病助氣丸京三稜蓬莪荗二味各用濕紙包灰火中煨透切片各二觔青皮去白陳皮去白白术各十五兩枳殻麩炒去穰㯽榔木香各十兩右為末糊丸桐子大每服五十丸滚水下開鬱正元散白术陳皮青皮香附山查海粉桔梗茯苓砂仁延胡索麥芽炒甘草炙神麯各等分炒右剉每服一兩生薑三片水煎服桃奴散桃奴雄鼠糞炒兩頭尖者是延胡索肉桂五靈脂香附砂仁桃仁各等分右為末每服三錢酒調下葱白散當歸熟地赤芍川芎人參茯苓枳殻肉桂厚樸乾薑木香青皮莪荗三稜茴香神麯麥芽苦楝子各等分右末加葱白三寸食鹽五分煎服三錢大便結燥去鹽加大黄便自利加訶子當歸散當歸川芎各二錢鱉甲三錢醋炙呉茱萸桃仁十五粒赤芍肉桂各一錢㯽榔青皮各八分木香莪荗川大黄各七分右為末每服一錢水一盞入乾燕脂一錢同煎六分食後服嗣育門胎孕之原天癸先天生身氣精血後天化成形男子二八天癸至屬陽應日精日盈女子二七天癸至屬隂應月血月通男女媾精乃有子乾道男成坤女成註天癸乃父母所賦先天生身之真氣也精血水糓所化後天成形之本也男子二八先天腎氣盛天癸至與後天所生之精㑹合而盈然男子屬陽陽應日故精盈而日舉也女子二七先天腎氣實天癸至與後天所生之血㑹合而盛然女子屬隂隂應月故血盛而月下也所以至期男女媾其先天真氣後天精血隂陽㑹和乃能有子也當此隂陽㑹合時陽盛自然成男是乾道成男也隂盛自然成女是坤道成女也男女完實精通必待三十聚天癸二十始適人皆欲隂陽完實後育子堅壯壽偏増註男子十六而精通必待三十而娶女子十四而天癸至必待二十而嫁者皆欲隂陽完實然後交而孕孕而育育而其子必堅壯長壽也今未筓之女天癸始至已近男色則隂氣早瀉未完而傷未實而動所以雖交而不孕孕而不育育而其子必脆弱不壽也種子時候男子聚精在寡慾交接乘時不可失湏待絪縕時候至樂育難忍是真機註聚精之道惟在寡慾交接女子必乘其時不可失之遲早蓋婦人一月經行一度之後必有一日絪緼之時氣蒸而熱如醉如痴有欲交接不可忍之狀乃天然節候是成胎生化之真機也分男女論精血先後分男女或以竒偶少多分或以子宫左右定是皆不曉箇中因欲識此中真消息乾道陽男坤女陰註分男女之說先賢有以血先至裹精則成男精先至裹血則成女精血散分並裹則為駢胎品胎之原者有以月水盡後一三五日成男二四六日成女與夫經水斷後一二日成男四五日成女者有以受氣於左子宫成男受氣於右子宫成女者皆各執一見殊為不曉此中因也蓋獨男獨女之胎可以日數論駢胎品胎或男或女亦可以日數論乎稽之史載一産三子四子有半男半女或男多女少男少女多者則一三五日為男二四六日為女之說不可慿矣抑豈有一日受男而二日復受女之理乎丹田命門也在男子曰精室在女子曰子宫形如合缽並無兩岐可分曰左右則是有兩子宫矣此說尤屬不經然則何以定之亦惟以㑹合天人陽盛乾道成男陰盛坤道成女斯足為確論耳雙胎品胎古以雙胎精氣盛不成男女或兼形陰陽變常駁氣盛事之所有理難明註古以雙胎乃精氣有餘岐而分之血因分而攝之故也若男同孕者剛日陽時也女同孕者柔日陰時也男女同孕者剛日陰時或柔日陽時也其他或有不成男女男不可為父女不可為母與男女之兼形者又皆陰陽變常駁氣所感事之所有理之所無莫可稽考者也衇見有子少隂動甚知有子隂摶陽别尺寸慿但摶不滑胎三月摶而滑石五月形註少陰督衇動甚者有子衇也但當慿其兩尺陰衇摶指有力兩寸陽衇不摶指而别於兩尺斯為有子衇無疑也其但摶不滑者主三月之胎搏而滑者主五月之胎也胎男女辨上小下大女腹箕中正圓髙男腹釜右疾為女左疾男胎氣鍾於陰陽主註上小下大如箕之形蓋以女胎面向母腹其足膝扺腹故有是形也中正圓髙如釜之形蓋以男胎面向母背則背脊抵腹故有是形也右手屬陰衇疾為女左手屬陽衇疾為男是胎氣鍾於陰則右盛主女鍾於陽則左盛主男也辨别孕病孕病不分湏診乳五月之後乳房升何以知其母子吉身雖有病衇和平註婦人經水不至不分是孕是病者五個月之後以孕婦乳房辨之若乳房升大有乳者是胎若乳房不大無乳者是病也凡孕婦有病其險可知亦何以知其母子俱吉惟診其衇象和平則雖有病知均吉無慮也分經養胎分經養胎不足慿無所專養論不經形始未分無不具陰陽之道漸分形註巢元方曰妊娠一月名肧胎足厥陰衇養之二月名始膏足少陽衇養之三月名始胎手心主衇養之當此時血不流行形象始化四月始受水精以成血衇手少陽衇養之五月始受火精以成氣足太陰衇養之六月始受金精以成筋足陽明衇養之七月始受木精以成骨手太陰衇養之八月始受土精以成膚革手陽明衇養之九月始受石精以成毛髪足少隂衇養之十月五藏六府關節人神皆備又有推巢元方養胎之說謂四時之令必始於春所以一月二月間是足厥陰少陽木也三月四月間手厥陰少陽火也五月六月間足太隂陽明土也七月八月間手太陰陽明金也九月十月間足少陰太陽水也惟手少陰太陽二經無所專養者以君主之官無為而已此說更為不經夫男女交接精血聚而成肧此孕形之始也雖未分身軀藏府而其理無不具也猶太極渾然包羅萬象而陰陽之一氣氤氲浸漸化生而成子母分形自然而然如草木成熟殻脫蒂落也受孕分房静養受孕分房宜靜養謹戒食味使脾安調其喜怒防驚恐慎厥起居避風寒註受孕之後分房靜養恐動相火致生胎毒謹戒飲食五味使其脾胃調和母之氣血易生子之形成必育内調七情外避風寒起居安順不持重用力不安逸多睡不登髙渉險則母無病子亦安矣安胎母子二法安胎之道有二法母病胎病要詳分母病動胎但治母子病致母審胎因註安胎之道有二法母病胎病當詳分而施治也凡因母病以致胎動者但療其母母安則胎自安或因胎病有所觸動以致母病者但宜安胎胎安則母自愈矣胎前用藥三禁胎前清熱養血主理脾疎氣是為兼三禁汗下利小便隨證虚實寒熱看註丹溪曰胎前當清熱養血為主恐傷陰血也理脾脾徤則氣血易生疎氣氣順則氣血調和理脾疎氣兼以清熱養血則胎自安矣三禁者汗下利小便也蓋恐過汗亡陽傷氣過下亡陰傷血利小便傷津液也然又當隨證詳審表裏虚實寒熱以施其治不可過峻也安胎審宜調治形瘦不宜過熱品體盛補氣恐動痰安胎芩术為要藥佐以他藥任抽添火盛倍芩痰倍术血虚四物氣四君杜續膠艾胎不稳氣盛蘇腹枳砂陳註形瘦之人多火過用温熱則傷陰血肥盛之人多痰過於補氣恐壅氣動痰白术消痰徤脾條芩清熱養陰二味為安胎要藥若有他證則以藥佐之或减白术加條芩或加白术減條芩任其抽添如火盛則當倍芩以清火痰盛則當倍术以消痰血虚則合四物湯以補血氣虚則合四君湯以補氣胎不安穩更佐以杜仲續斷阿膠艾葉以安之若氣盛胎髙則加紫蘇大腹皮枳殻砂仁陳皮以舒之四物湯四君子湯方俱見首卷彚方内嗣育門彚方加味地黄丸治婦人經水不調必不能受孕即使受之亦不全羙宜常服此方熟地四兩山萸肉山藥各二兩牡丹皮白茯苓各一兩五錢澤瀉香附各一兩三次童便浸右為末煉蜜丸如梧子大每服七十丸白沸湯送下滌痰湯治婦人肥盛者多不受孕以身中有脂膜閉塞子宫也以此湯送後丸藥當歸一兩茯苓四兩川芎七錢五分白芍藥白术土炒半夏製香附米陳皮甘草各一兩右作十貼每貼薑三片水煎吞後丸子滌痰丸白术二兩土炒半夏麯川芎香附米各一兩神麯炒茯苓各五錢橘紅四錢甘草二錢右為末粥丸每服八十丸如熱者加黄連枳實各一兩大補丸治婦人痩弱多由血少不能受孕宜常服此方天冬去心麥冬去心菖蒲茯苓人參益智仁枸杞子地骨皮逺志肉右為細末煉蜜丸如桐子大空心酒下三十丸蓯蓉菟絲子丸此方不寒不熱助隂生子肉蓯蓉一兩三錢覆盆子蛇床子川芎當歸菟絲子各一兩二錢白芍藥一兩牡蠣鹽泥固煆烏鰂魚骨各八錢五味子防風各六錢條芩五錢艾葉三錢右為末煉蜜丸如桐子大每服三四十丸鹽湯下早晚皆可服調經丸理氣養血調經種子香附川杜仲八兩炒薑汁大川芎白芍藥當歸去尾懐生地陳皮小茴香酒炒延胡索畧炒肉蓯蓉酒炒舊青皮麩炒台烏葯炒枯黄芩酒炒烏鰂魚骨以上各四兩酥炙右十四味稱足真正好醋和麫打糊為丸如梧桐子大每服百丸空心好酒送下一方無陳皮地黄有人參黄耆各二兩御纂醫宗金鑑卷四十五
