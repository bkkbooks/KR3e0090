  text: 編輯婦科心法要訣目録驚悸恍惚證治茯神散加味歸脾湯妄言見鬼發狂證治妙香散小調經散虛煩證治人參當歸湯當歸補血湯失笑散發渇證治參麥飲加味四物湯竹葉歸耆湯四物湯欬𠻳證治旋覆花湯麥味地黄湯加味佛手散六味地黄湯衂血證治人參澤蘭葉湯痢證總括痢疾證治槐連四物湯芍藥湯真人養藏湯四物湯十全大補湯人參敗毒散香連丸加味四物湯四物湯瘧疾加味生化湯加味二陳湯藿香正氣湯生化湯二陳湯蓐勞虛羸總括蓐勞虛羸證治三合散六君子湯八珍湯十全大補湯益氣養勞湯血崩加味十全大補湯加味逍遥散十全大補湯逍遥散佛手散失笑散大便秘結小便淋閉加味四物湯四物湯小便頻數不禁淋瀝黄耆當歸散加味地黄湯補中益氣湯六味地黄湯大便出血加味芩連四物湯芩連四物湯歸脾湯補中益氣湯敗血成癰加味生化湯生化湯産後虛實宜審御纂醫宗金鑑卷四十八目録欽定四庫全書御纂醫宗金鑑卷四十八編輯婦科心法要訣目録驚悸恍惚證治茯神散加味歸脾湯妄言見鬼發狂證治妙香散小調經散虛煩證治人參當歸湯當歸補血湯失笑散發渇證治參麥飲加味四物湯竹葉歸耆湯四物湯欬𠻳證治旋覆花湯麥味地黄湯加味佛手散六味地黄湯衂血證治人參澤蘭葉湯痢證總括痢疾證治槐連四物湯芍藥湯真人養藏湯四物湯十全大補湯人參敗毒散香連丸加味四物湯四物湯瘧疾加味生化湯加味二陳湯藿香正氣湯生化湯二陳湯蓐勞虛羸總括蓐勞虛羸證治三合散六君子湯八珍湯十全大補湯益氣養勞湯血崩加味十全大補湯加味逍遥散十全大補湯逍遥散佛手散失笑散大便秘結小便淋閉加味四物湯四物湯小便頻數不禁淋瀝黄耆當歸散加味地黄湯補中益氣湯六味地黄湯大便出血加味芩連四物湯芩連四物湯歸脾湯補中益氣湯敗血成癰加味生化湯生化湯産後虛實宜審御纂醫宗金鑑卷四十八目録欽定四庫全書御纂醫宗金鑑卷四十八編輯婦科心法要訣驚悸恍惚證治茯神散加味歸脾湯産後血虛心氣弱驚悸恍惚不安寧養心須用茯神散參耆地芍桂茯神琥珀龍齒歸牛膝憂思歸脾砂齒靈註産後血虛心氣不守神志怯弱故令驚悸恍惚不寧也宜用茯神散其方乃人參黄耆熟地白芍桂心茯神琥珀龍齒當歸牛膝也若因憂愁思慮傷心脾者宜歸脾湯加硃砂龍齒治之歸脾湯方見首卷妄言見鬼發狂證治妙香散産後譫狂見鬼神敗血冲心小調經心虛悶亂妙香散二茯參耆逺志辰甘桂木麝山藥末歸地煎調效若神註産後敗血冲心狂亂見鬼譫言妄語者宜服小調經散若因心血虛神不守舍而悶亂者則用妙香散即茯苓茯神人參黄耆逺志辰砂甘草桔梗木香麝香山藥為散以當歸熟地煎湯調服即愈其效如神虛煩證治人參當歸湯産後血虛煩短氣人參當歸湯最良參麥歸芍熟地桂瘀血衝心失笑方去血過多煩躁甚須用當歸補血湯註産後血虛心煩短氣者宜人參當歸湯即人參麥冬當歸白芍熟地肉桂也若因敗血冲心者宜服失笑散若去血過多煩而躁者乃亡血證也宜當歸補血湯當歸補血湯失笑散方俱見首卷發渇證治參麥飲加味四物湯竹葉歸耆湯氣虛津短參麥飲血虛四物粉麥煎渇甚竹葉歸耆效參术歸耆竹葉甘註産後氣虛津液不足而渇者宜參麥飲即人參麥冬五味子也血虛而渇者宜四物湯加花粉麥冬若渇甚不解者用竹葉歸耆湯其方乃人參白术當歸黄耆竹葉甘草煎服也四物湯方見首卷欬𠻳證治旋覆花湯麥味地黄湯加味佛手散産後欬嗽感風寒旋覆花湯荆穗前麻杏半苓赤芍藥五味甘草棗薑煎虛火上炎冲肺嗽麥味六黄滋化源瘀血入肺佛手散加入桃紅杏貝延註産後欬嗽若因起動太蚤感冒風寒者用旋覆花湯即荆芥穗前胡麻黄杏仁半夏茯苓赤芍藥五味子甘草旋覆棗薑也若因隂虚火炎上爍肺金而嗽者宜六味地黄加麥冬五味子名麥味地黄湯滋其化源若因瘀血上冲入肺而𠻳者宜佛手散加桃仁紅花杏仁川貝母延胡索以破其瘀其𠻳自愈六味地黄湯佛手散方俱見首卷衂血證治人參澤蘭葉湯産後口鼻黒而衂胃絶肺敗藥難醫參蘭丹膝生熟地童便多冲冀萬一註産後惡露不下虛火載血上行溢出鼻竅不循經衇變黒色見於口鼻為熱極反兼水化故曰胃絶肺敗藥難醫也或用人參澤蘭葉湯即人參澤蘭葉丹皮牛膝生地熟地煎湯多冲童便飲之間有得生者然亦希冀於萬一者耳痢證總括産後痢名産子痢飲食生冷寒暑干裏急後重有餘病日久滑脫不足看赤黄稠黏多是熱清澈鴨溏定屬寒寒熱温清調補瀉虛實新久要詳叅註産後痢者名産子痢多因飲食不調貪食生冷或起居不慎衝寒受暑所致若腹中㽲痛裏急後重者屬有餘之證若日久虛寒滑脫者屬不足之證痢色黄赤稠黏多屬於熱清稀澄澈如鴨糞者則屬於寒治之之法熱者清之寒者温之冷熱不和者調之虛者補之實者瀉之虛實新久之間宜細心詳叅也痢疾證治槐連四物湯芍藥湯真人養藏湯熱痢槐連四物效冷熱有餘芍藥湯芍藥芩連歸木草枳桂墜梹痛大黄虛寒滑脫參术桂芍藥訶蔲廣木香甘草粟殻名養藏日久十全大補良註熱者清之故熱痢宜槐連四物湯即四物湯加槐花黄連以清熱而堅腸也冷熱不和者調之故宜芍藥湯即白芍藥黄芩黄連當歸木香甘草肉桂梹榔墜者倍加梹榔痛加生大黄也若虛寒滑脫則宜溫補而固澁之宜真人養藏湯即人參白术白芍藥肉桂肉豆蔲訶子木香甘草罌粟殻同煎服也若日久不止氣血大虛宜十全大補湯補之四物湯十全大補湯方俱見首卷人參敗毒散香連丸加味四物湯有表痢用敗毒散羌獨枳梗共柴前參苓芎草薑葱引暑濕成痢用香連血滲大腸成血痢四物膠榆餘鰂添註外感風寒成痢者宜人參敗毒散即羌活獨活枳殻桔梗柴胡前胡人參茯苓川芎甘草薑葱引也若因暑濕致痢宜香連丸即黄連木香為丸也若敗血滲入大腸成血痢者宜四物加阿膠地榆血餘烏鰂魚骨服之四物湯方見首卷瘧疾加味生化湯加味二陳湯藿香正氣湯産後瘧多因瘀血榮衛不和熱又寒生化湯中加柴甲痰食二陳查朴添外感不正正氣散陳半苓术蘇朴甘腹皮桔梗藿香芷引加薑棗一同煎註産後患瘧多因瘀血停留榮衛不和故寒熱往來也宜用生化湯加柴胡鱉甲服之若因痰飲食積者宜二陳湯加山查厚朴若果外感風寒方可用藿香正氣散治之其方即陳皮半夏茯苓白术蘇葉厚朴甘草大腹皮桔梗藿香白芷也二陳湯方見三卷蓐勞虛羸總括産後失調氣血弱風寒外客内停瘀飲食過傷兼勞怒不足之中挾有餘寒熱徃來臍腹痛懶食多眠頭暈迷骨蒸盜汗痰𠻳喘面黄肌痩力難支蓐勞先須調脾胃後調榮衛補其虛註産後氣血兩虛起居不慎風寒外襲瘀血内停更或飲食厚味過傷憂勞忿怒乃不足之中挾有餘之證致生寒熱往來臍腹脹痛懶進飲食喜眠卧起則頭暈昏迷骨蒸潮熱盜汗自汗痰喘咳𠻳面色萎黄肌肉削痩氣力難支名為蓐勞醫治甚難凡欲療斯疾者必當先調理其脾胃使飲食强健能勝藥力然後調其榮衞補其虛損始能痊愈蓐勞虛羸證治三合散扶脾益胃六君子榖化精㣲氣血强能食漸覺精神爽調衛和榮三合良八珍去术小柴共隨證加減效非常病退虛羸補氣血八珍十補養榮方註産後蓐勞治法當先扶脾益胃宜六君子湯加減用之使脾胃强壮能食能消則後天水榖之氣化生精液氣血自然壯盛精神自然漸爽然後調其衛氣和其榮血宜三合散即八珍湯去白术加小柴胡湯乃人參柴胡黄芩半夏甘草也隨證加減治之如寒熱往來臍腹脹痛則去人參黄芩生地加延胡桃仁如懶食喜睡頭眩則去柴胡加黄耆縮砂陳皮如骨蒸盜汗自汗則去川芎柴胡加鱉甲地骨皮牡礪如痰喘咳𠻳則去人參柴胡加麥冬川貝母百合如面黄肌痩乏力則去柴胡川芎加黄耆倍用人參臨證消息之服後如諸證已痊惟覺虛羸者則以八珍十全養滎等方培補之六君子湯八珍湯十全大補湯益氣養榮湯方俱見首卷血崩加味十全大補湯加味逍遙散産後亡血更血崩血脫氣陷病非輕十全大補膠升續棗仁山茰薑炭尋若因暴怒傷肝氣逍遙梔地白茅根瘀停少腹多脹痛佛手失笑效如神註産後隂血已亡更患崩證則是血脫氣陷其病非輕當峻補之宜用十全大補湯加阿膠升麻續斷棗仁山萸炮薑炭以升補其脫陷可也若因暴怒傷肝血妄行者宜逍遥散加黑梔生地白茅根以清之若因内有停瘀者必多小腹脹痛當用佛手散失笑散以補而逐之十全大補湯逍遙散佛手散失笑散方俱見首卷大便秘結産後去血亡津液胃燥腸枯大便難飲食如常無所苦不須妄下損真元量其虛實通利𨗳血旺津囘聴自然註産後去血過傷其津液多致胃燥腸枯故令大便秘結若飲食如常無脹滿之苦者不宜輕下反傷元氣惟宜量其虛實用諸𨗳法待血旺津囘大便自然順利也小便淋閉加味四物湯産後淋閉腹脹痛熱邪挾血滲胞中四物蒲瞿桃仁膝滑石甘草木香通註産後熱邪挾瘀血流滲胞中多令小便淋閉宜四物湯加蒲黄瞿麥桃仁牛膝滑石甘草稍木香木通治之四物湯方見首卷小便頻數不禁淋瀝黄耆當歸散加味地黄湯産後小便數且白腎虛不固自遺尿因産傷胞多淋瀝頻數補中益氣宜胞傷黄耆當歸治參耆术芍草當歸不禁六味加桂附益智螵蛸補骨脂註産後氣虛下陷多令小便頻數而色白腎虛不固小便自遺因産時穏婆不慎傷其胞脬多致小便淋瀝氣虛頻數者宜補中益氣湯升舉之傷胞淋瀝者宜黄耆當歸散補之其方即黄耆當歸人參白术白芍甘草也引用豬草胞同煮服腎虛遺尿不禁者宜六味地黄湯加肉桂附子名桂附地黄湯更加益智仁桑螵蛸補骨脂治之補中益氣湯六味地黄湯方俱見首卷大便出血加味芩連四物湯産後便血大腸熱四物芩連酒炒黒地榆阿膠荆穗炒蜜製升麻棕櫚灰脾虛不攝歸脾效氣虛下陷補中宜註産後大便出血有因大腸經熱者宜芩連四物湯黄芩黄連俱酒炒黒用更加地榆阿膠荆芥穗㣲炒蜜製升麻棕櫚皮灰治之若因脾虛不能攝血者宜歸脾湯中氣下陷者補中益氣湯芩連四物湯歸脾湯補中益氣湯方俱見首卷敗血成癰加味生化湯榮氣不從逆肉理敗血留内發癰疽只用生化加連翹銀花甘草乳沒宜切勿敗毒施過劑致令潰腐必難醫註産後氣血兩虛榮氣不從逆于肉理或敗血留内結成癰疽者只宜用生化湯加連翹金銀花甘草節乳香沒藥治之切不可用寒凉敗毒之藥恐潰後腐爛必難醫治産後虛實宜審震亨産後惟大補從政莫作不足看二說須合形證衇攻補虛實仔細叅註朱震亨云産後氣血兩虛惟宜大補雖有他證以末治之張從政云産後慎不可作諸虛不足治之二說各有偏處當合形證衇三者細叅方不致誤産後門彚方開骨散當歸五錢龜板三錢研醋炙川芎二錢婦人髪一團水煎服奪命散沒藥血竭各等分右研為細末纔産下便用童便細酒各半盃煎一兩沸調下二錢良久再服其惡血自下行便不衝上免生百疾清魂散澤蘭葉人參各二錢川芎五錢荆芥穗一兩甘草二錢炙右為末用温酒熱湯各半盃調一錢灌之下咽眼即開氣定即醒大巖蜜湯當歸熟地白芍各二錢乾薑肉桂各一錢吳茱茰獨活逺志炙細辛甘草各八分炙右水煎服香桂散當歸肉桂川芎各等分右為末酒調服延胡索散當歸赤芍生蒲黄桂心琥珀紅花延胡索各等分右以好醋浸一宿焙乾為末每服二錢酒調趂痛散當歸官桂白术黄耆獨活牛膝生薑各五錢甘草炙薤白各三錢半桑寄生五錢右㕮咀每服五錢水煎服丁香豆蔲散公丁香白豆蔲仁伏龍肝各等分右為末生薑湯㸃服茹橘飲竹茹橘紅各三錢乾柿一枚水薑煎服參附湯人參一兩附子五錢炮右作一服薑棗水煎徐徐服去人參加黄耆名耆附湯二味參蘇飲人參一兩為末蘇木二兩右以蘇木煎湯冲人參末服枳术湯枳實二兩炒白术二兩土炒水薑煎服小調中湯茯苓當歸白芍陳皮各一錢白术一錢五分右作一劑煎湯服小調經散白芍當歸沒藥琥珀桂心各一錢細辛麝香各五分右為細末每服五分薑汁温酒各少許調服更生散當歸生地川芎人參各二錢荆芥穗三錢乾薑八分炮水煎服當歸六黄湯當歸熟地自製黄耆各二錢炙生地黄蘗炒黒黄芩炒黒黄連各一錢炒黒右水煎服黄耆湯黄耆三錢炙牡蠣粉二錢白术二錢土炒茯苓一錢麥冬二錢熟地三錢防風一錢甘草七分炙右加浮小麥一合煎服七珍散人參石菖蒲生地川芎各一兩細辛一錢防風辰砂各五錢另研右為細末每服一錢薄荷煎湯調服茯神散茯神一兩去木人參黄蓍炙赤芍牛膝琥珀龍齒各一錢五分研生地一兩五錢桂心五錢當歸二兩右為末每服三錢水煎服妙香散甘草五錢炒逺志製去心山葯薑汁炙茯苓茯神去木黄耆各一兩炙人參桔梗各五錢辰砂三錢另研麝香二錢另研木香一錢五分右為細末每服二錢當歸熟地煎湯調下參麥飲人參麥冬右水煎服人參當歸湯人參當歸熟地麥冬白芍各二錢五味子三分桂枝一錢右剉水煎服竹葉歸耆湯人參白术土炒當歸黄耆各二錢炙竹葉二十片甘草五分炙右剉水煎服旋覆花湯旋覆花赤芍葯荆芥穗半夏麯前胡甘草炙茯苓五味子杏仁去皮尖麩炒麻黄各等分右㕮咀每服四錢水一盞半生薑三片棗一枚煎至七分去滓食前温服有汗不宜用人參澤蘭葉湯人參五錢澤蘭葉丹皮牛膝各二錢生地三錢熟地五錢藕節五枚煎冲童便服槐連四物湯當歸川芎赤芍葯生地槐花黄連各一錢炒御米殻五分蜜炙去蒂右剉水煎服芍葯湯芍葯炒當歸黄連各半兩炒㯽榔木香甘草各二錢炙桂二錢五分黄芩三錢炒右每服半兩水煎如不減加大黄此證又有因中氣虛弱脾氣鬱結者治當審察真人養藏湯人參白术白芍藥各二錢肉桂肉荳蔲訶子各一錢煨木香甘草罌粟殻各八分右剉薑棗煎服人參敗毒散羌活獨活柴胡前胡各一錢五分枳殻桔梗人參茯苓各一錢川芎八分甘草五分右剉薑葱煎服香連丸黄連十二兩净吳茱茰十兩梗去枝右先將二味用熱水拌和入磁器内置熱湯炖一日同炒至黄連紫黄色去茱用連為末每末四兩入木香末一兩淡醋米飲為丸梧桐子大每服二三十丸滚湯下久痢中氣下陷者用補中益氣湯下中氣虛者用四君子下中氣虛寒者加薑桂藿香正氣散藿香一錢五分桔梗大腹皮紫蘇茯苓白术炒白芷半夏麯陳皮厚朴各一錢炙甘草五分炙右剉加薑棗水煎服三合散當歸白芍茯苓熟地各一兩柴胡人參各一兩五錢黄芩半夏製甘草各六錢川芎一兩右為粗末每服一兩水一鍾半煎服日三黄耆當歸散人參白术土炒黄耆當歸白芍各三錢甘草八分右剉薑棗水煎服桂附地黄湯熟地四錢山茰肉山葯各二錢丹皮澤㵼茯苓各一錢五分附子製肉桂各一錢右剉水煎服回生丹錦紋大黄一觔為末蘇木三兩碗打碎用河水五碗煎汁三聴用大黒豆三升用水浸取殻用絹袋盛殻同豆煮熟去豆不將殻晒乾其汁留用紅花三兩用炒黄色入好酒四碗煎三五滚去渣取汁聴米醋九觔佳陳者將大黄末一觔入净鍋下米醋三觔文火熬之以長木筯不住手攪之成膏再加醋三觔熬之又加醋三觔次第加畢然後下黒豆汁三碗再熬次下蘇木汁次下紅花汁熬成大黄膏取入瓦盆盛之大黄鍋粑亦鏟下入後藥同磨人參當歸酒洗川芎酒洗香附醋炒延胡索酒炒蒼术米泔浸炒蒲黄隔紙炒茯苓桃仁各一兩油去皮尖川牛膝五錢酒洗甘草炙地榆酒洗川羌活廣橘紅白芍各五錢酒炒木𤓰青皮各三錢去穰炒乳香沒藥各二錢益母草三兩木香四錢白术三錢浸炒米泔烏藥二兩五錢去皮良薑四錢馬鞭草五錢秋葵子三錢熟地一兩酒浸九次蒸曬如法製就三稜五錢透紙裹煨醋浸五靈脂五錢乾醋煮化焙研細山茰肉五錢蒸搗酒浸右三十味并前黒豆殻共晒為末入石臼内下大黄膏拌匀再下煉熟蜜一斤共搗千杵取起為丸每丸重二錢七八分静室隂乾須二十餘日不可日晒不可火烘乾後只重二錢有零鑠蠟䕶之即蠟丸也用時去蠟殻調服御纂醫宗金鑑卷四十八
