body:
  text: 訂正仲景全書金匱要略註上之二目録百合狐惑陰陽毒篇第三百合地黄湯百合滑石散百合洗方栝蔞牡蠣散百合知母湯滑石代赭湯百合鷄子湯甘草瀉心湯苦參湯雄黄薰方赤小豆當歸散升麻鱉甲湯瘧病篇第四鱉甲煎圓白虎加桂枝湯蜀漆散中風歴節篇第五烏頭湯桂枝芍藥知母湯血痺虛勞篇第六黄耆桂枝五物湯桂枝加龍骨牡蠣湯小建中湯黄耆建中湯酸棗湯大黄䗪蟲圓薯蕷圓肺痿肺癰欬𠻳上氣篇第七葶藶大棗瀉肺湯桔梗湯甘草乾薑湯射干麻黄湯麥門冬湯皂莢圓越婢加半夏湯小青龍加石膏湯厚朴麻黄湯澤漆湯御纂醫宗金鑑卷十九目録欽定四庫全書御纂醫宗金鑑卷十九訂正仲景全書金匱要略註上之二目録百合狐惑陰陽毒篇第三百合地黄湯百合滑石散百合洗方栝蔞牡蠣散百合知母湯滑石代赭湯百合鷄子湯甘草瀉心湯苦參湯雄黄薰方赤小豆當歸散升麻鱉甲湯瘧病篇第四鱉甲煎圓白虎加桂枝湯蜀漆散中風歴節篇第五烏頭湯桂枝芍藥知母湯血痺虛勞篇第六黄耆桂枝五物湯桂枝加龍骨牡蠣湯小建中湯黄耆建中湯酸棗湯大黄䗪蟲圓薯蕷圓肺痿肺癰欬𠻳上氣篇第七葶藶大棗瀉肺湯桔梗湯甘草乾薑湯射干麻黄湯麥門冬湯皂莢圓越婢加半夏湯小青龍加石膏湯厚朴麻黄湯澤漆湯御纂醫宗金鑑卷十九目録欽定四庫全書御纂醫宗金鑑卷十九訂正仲景全書金匱要略註上之二百合狐惑陰陽毒病衇證并治第三論曰百合病者百衇一宗悉致其病也意欲食復不能食常黙黙然欲臥不能臥欲行不能行欲飲食或有美時或有不用聞食臭時如寒無寒如熱無熱口苦小便赤諸藥不能治得藥則劇吐利如有神靈者身形如和其衇㣲數毎溺時頭痛者六十日乃愈若溺時頭不痛者淅然者四十日愈若溺快然但頭眩者二十日愈其證或未病而預見或病四五日而出或病二十日或一月㣲見者各隨證治之註百合百瓣一蒂如人百衇一宗命名取治皆此義也百合病者謂人百衇一宗悉致其病也曰百衇即一衇也猶言百體一體也是蓋以周身言之也周身之衇分而言之曰百合而言之曰一故曰百衇一宗若曰百合之病總衇病也衇者謂十二經衇三百六十五絡衇也傷寒大病之後餘熱未解百衇未和或平素多思不斷情志不遂或偶觸驚疑卒臨景遇因而形神俱病故有如是之現證也百衇周於身衇病則身病故身形如和不和欲臥不能卧欲行不能行也百衇通於心衇病則心病故常黙黙也如寒無寒如熱無熱似外感而非外感也意欲食復不能食或有美時或聞食臭有不用時似裏病而非裏病也至衇數口苦小便赤者是欝結之熱雖侵裏而其熱未甚也方其初病之時醫者不識誤為表裏之病以藥汗下之故劇吐利也雖劇吐利不變諸逆若有神靈身形如前之和而衇則比前微數故其勢即不能遽進不覺加甚而亦不能速愈也試以緩愈之期約略言之重者不過六十日輕者不過二十日輕重之間者不過四十日可愈也然愈必以每溺時頭痛不頭痛惡風不惡風快然不快然辨者以經衇之邪莫不由太陽而愈也頭痛惡風是其經之候也溺時快然是其腑之徴也其證或未病而預見者其證指百合病等證言也未病言未病傷寒病也猶言未病傷寒之前而預先見百合欲食不食等證也或病四五日而出謂已病傷寒之後而始見百合病證也預先見者是先有情志不遂偶觸驚疑而召病也或病二十日或一月纔見者是因傷寒病後而纔見也故曰各隨證治之也集註李彣曰活人書云傷寒大病後氣血未得平復變成百合病今由百衇一宗悉致其病觀之當是心肺二經之病也如行臥飲食寒熱等證皆有莫可形容之狀在内經解㑊病似之觀篇中有如神靈者豈非以心藏神肺藏魄人生神魄失守斯有恍惚錯妄之情乎又曰内經云凡傷於寒則為病熱熱氣遺留不去伏於衇中則昏昏黙黙凡行卧飲食寒熱皆有一種虛煩不耐之象矣沈明宗曰若邪淫於胸中連及上脘則意欲食復不能食走於肝腎故常黙黙流入脾胃故欲臥不能卧欲行不能行邪不在胃飲食或有美時壅抑胃氣則聞食臭流於膽則口苦流於膀胱則便赤以上諸證非一齊並見皆移易變動而見也百合病見於陰者以陽法救之見於陽者以陰法救之見陽攻陰復發其汗此為逆見陰攻陽乃復下之此亦為逆註此承上條以明其治也百合一病難分陰陽表裏故以百合等湯主之若病見於陰者以温養陽之法救之見於陽者以凉養陰之法救之即下文見陽攻陰或攻陰之後表仍不解復發其汗者此為逆見陰攻陽或攻陽之後裏仍不解乃復下之者此亦為逆也集註徐彬曰内經所謂用陰和陽用陽和陰即是此義故諸治法皆以百合為主至病見於陽加一二味以和其陰病見於陰加一二味以和其陽李彣曰百合病多端數條之法亦説不盡沈明宗曰此治百合病之總要法也微邪伏於榮衛流行而病表裏當分陰陽以施救治可也百合病不經吐下發汗病形如初者百合地黄湯主之註百合一病不經吐下發汗病形如初者是謂其病遷延日乆而不増减形證如首章之初也以百合地黄湯通其百衇凉其百衇中病勿更服恐過服生地黄大便常如漆也百合地黄湯方百合七枚擘生地黄汁一升右以水洗百合漬一宿當白沫出去其水更以泉水二升煎取一升去滓内地黄汁煎取一升五合分温再服中病勿更服大便常如漆集解程林曰百合花葉皆四向故能通逹上下四旁其根亦衆瓣合成故名百合用以醫百合病也有以夫髙世栻曰百合色白味甘手太隂之補劑也其花晝開夜合如氣之日行於陽夜行於隂司開闔以行榮衛和陰陽百合病變發熱者百合滑石散主之註百合病如寒無寒如熱無熱本不發熱今變發熱者其内熱可知也故以百合滑石散主之使其微利熱從小便而除矣百合滑石散方百合一兩炙滑石三兩右為散飲服方寸匕日三服當微利則止服熱則除集解高世栻曰滑石亦名液石又名膋石石之脂膏也主治身熱洩澼利小便百合病一月不觧變成渇者百合洗方主之註百合病本不渴今一月不解變成渴者外以百合湯浸洗其身通表瀉熱内食煮餅勿以鹽䜴不致引飲而渴自止也百合洗方百合一升右以水一斗漬之一宿以洗身洗已食煮餅勿以鹽䜴也百合病渴不瘥者用後方主之註與百合洗身而渴不瘥者内熱盛而津液竭也栝蔞根苦寒生津止渴牡蠣鹹寒引熱下行也栝蔞牡蠣散方栝蔞根牡蠣熬等分右為細末飲服方寸匕日三服百合病發汗後者百合知母湯主之註百合病不應汗而汗之不觧者則致燥以百合知母湯主之者清而潤之也百合知母湯方百合七枚擘知母三兩切右先以水洗百合漬一宿當白沫出去其水更以泉水二升煎取一升去滓别以泉水二升煎知母取一升去滓後合和煎取一升五合分温再服百合病下之後者滑石代赭湯主之註百合病不應下而下之不解者則怯中以滑石代赭湯清而鎭之也滑石代赭湯方百合七枚擘滑石三兩碎綿裹代赭石如彈丸大一枚碎綿裹右先以水洗百合漬一宿當白沫出去其水更以泉水二升煎取一升去滓别以泉水二升煎滑石代赭取一升去滓後合和重煎取一升五合分温服百合病吐之後者用後方主之註百合病不應吐而吐之不解者則虛中以百合雞子湯清而補之也百合雞子湯方百合七枚擘雞子黄一枚右先以水洗百合漬一宿當白沫出去其水更以泉水二升煎取一升去滓内雞子黄攪匀煎五分温服狐惑之為病狀如傷寒黙黙欲眠目不得閉臥起不安蝕於喉為惑蝕於隂為狐不欲飲食惡聞食臭其面目乍赤乍黒乍白蝕於上部則聲嗄甘草瀉心湯主之蝕於下部則咽乾苦參湯洗之蝕於肛者雄黄熏之註狐惑牙疳下疳等瘡之古名也近時惟以疳呼之下疳即狐也蝕爛肛隂牙疳即惑也蝕咽腐齦脫牙穿腮破唇每因傷寒病後餘毒與濕䘌之為害也或生斑疹之後或生癖疾下利之後其為患亦同也狀如傷寒謂發熱憎寒也黙黙欲眠目不得閉謂其病或在隂亦或在陽故臥起俱不安也此病有蟲蟲聞食臭而動動則令人煩心故不欲飲食惡聞食臭也面目乍赤乍黒乍白亦由蟲動交亂胃中胃主面故色無定也惑蝕於上部之喉故先聲嗄毒在喉也狐蝕於下部之隂故先咽乾毒在隂也外治之法苦參湯雄黄散解毒殺蟲尚屬有理内用甘草瀉心湯必傳寫之誤也姑存之集註程林曰靈樞經云蟲動則令悗心是以有臥起不安等項也李彣曰喉肛與前隂皆闗竅所通津液滋潤之處故虫每蝕於此甘草瀉心湯方甘草四兩黄芩人參乾薑各三兩黄連一兩大棗十二枚半夏半升右七味水一斗煑取六升去滓再煎温服一升日三服苦參湯方苦參一升水一斗煑取七升熏洗日三雄黄右一味為末筒瓦二枚合之燒向肛熏之衇經云病人或從呼吸上蝕其咽或從下焦蝕其肛隂蝕上為惑蝕下為狐狐惑病者猪苓散主之病者衇數無熱微煩黙黙但欲臥汗出初得之三四日目赤如鳩眼七八日目四眥黒若能食者膿已成也赤小豆當歸散主之註病者衇數謂病狐惑之人衇數也數主瘡主熱今外無身熱而内有瘡熱瘡之熱在於隂故黙黙但欲臥也熱在於陽故微煩汗出也然其病初得之三四日目赤如鳩眼者是熱藴於血故眥絡赤也七八日四眥皆黒者是熱瘀血腐故眥絡黒也若不能食其毒尚伏諸裏若已能食其毒已化成膿也故以赤小豆排癰腫當歸調瘍血米漿和胃氣也集註李彣曰經云衇數不止而熱不解則生惡瘡今膿成何處大率在喉與隂肛蓋積熱生虫亦積熱成膿是亦惡瘡之類也赤小豆當歸散方赤小豆三升浸令芽出曝乾當歸右二味杵為散漿水服方寸匕日三服陽毒之為病面赤斑斑如錦文咽喉痛唾膿血五日可治七日不可治升麻鼈甲湯主之隂毒之為病面目青身痛如被杖咽喉痛五日可治七日不可治升麻鼈甲湯去雄黄蜀椒主之註隂陽平正氣也隂陽偏邪氣也隂陽變異氣也正氣者即四時令平之氣也中人為病徐而淺邪氣者即四時不和之氣也中人為病速而危異氣者非常災癘之氣也中人為病暴而死所以過五日不治以五藏相傳俱受邪也此氣適中人之陽則為陽毒適中人之隂則為隂毒非後人所論隂寒極陽熱極之隂毒陽毒也觀其所主之方要不過升麻甘草當歸鼈甲蜀椒雄黄而並不用大寒大熱之藥則可知仲景所論隂毒陽毒非隂寒極陽熱極之謂也此二證即今世俗所稱痧證是也陽毒終屬陽邪故見面赤斑斑如錦文唾膿血之熱證隂毒終屬隂邪故見面目青身痛如被杖之寒證二證俱咽喉痛者以此證乃邪從口鼻而下入咽喉故痛也按由此推之凡邪所過之處無不痛也故中此氣之人不止咽喉痛身痛甚至有心腹絞痛大滿大脹通身絡衇青紫暴出手足指甲色如靛葉口噤牙緊心中忙亂死在旦夕者若謂必從皮毛而入未有為病如是之速者也是必從口鼻而下入咽喉無疑況隂毒反去雄黄蜀椒必傳寫之譌故治是證者不必問其隂陽但刺其尺澤委中手中十指衇絡暴出之處出血輕則用刮痧法隨即服紫金錠或吐或下或汗出而愈者不少若吐瀉不止厥逆冷汗衇微欲絶用炮附子炮川烏呉茱茰丁香生乾薑甘草虛者加人參救之亦多得生集註王履曰仲景雖有隂毒之名其叙證不過面目青身痛咽痛而已並不言隂寒極盛之説其升麻鼈甲湯並不用大熱藥是知仲景所論隂毒者非隂寒之病乃感天地惡毒異氣入於隂經故曰隂毒耳後人謂隂寒極盛之證稱為隂毒引仲景所叙面目青身痛如被杖咽喉痛數語郤用附子散正陽散等藥竊謂隂寒極盛之證固可名為隂毒然終非仲景所以立名之本意後人所叙隂毒與仲景所叙隂毒自是兩般豈可混論蓋後人所叙隂毒只是内傷冷物或暴寒所中或過服寒凉藥或内外俱傷於寒而成耳非天地惡毒異氣所中者也李彣曰趙獻可云此隂陽二毒是感天地疫癘非常之氣沿家傳染所謂時疫證也觀方内老小再服可見升麻鼈甲湯方升麻二兩當歸一兩蜀椒炒去汗一兩甘草二兩鼈甲手掌大一片炙雄黄半兩研右六味以水四升煑取一升頓服之老小再服取汗瘧病衇證并治第四師曰瘧衇自弦弦數者多熱弦遲者多寒弦小緊者下之差弦遲者可温之弦緊者可發汗鍼灸也弦浮大者可吐之弦數者風發也以飲食消息止之按弦小緊者之小字當是沉字則有可下之理弦緊者當是弦浮緊則有可發汗之理弦浮大者當是弦滑大則有可吐之理且不遺本文瘧衇自弦之意註瘧之為病寒熱也三隂三陽皆有之因其邪伏藏於半表半裏之間故屬少陽衇自弦也弦數者多熱弦遲者多寒謂發作之時多熱為陽盛多寒為隂盛也夫傷寒少陽病則有汗吐下三法之禁而瘧亦屬少陽何以有汗吐下三法之宜是蓋瘧屬雜病不可不知也初發衇弦兼沉緊者主乎裏也可下之兼遲者主乎寒也可温之兼浮緊者主乎表也可汗之兼滑大者主乎飲也可吐之兼數者風發也即風熱之謂也可清之若乆發不止則不可以此法治之當以飲食撙節調理消息止之蓋初病以治邪為急乆病以養正為主也其他癉瘧即内經所謂但熱不寒之癉瘧也温瘧即内經所言先傷於風後傷於寒熱多寒少之温瘧也牝瘧即内經所言先傷於寒後傷於風寒多熱少之寒瘧也惟瘧母一證經所未載然論諸瘧未有詳於内經者也其文雖略有不同必是脫簡然所出治法亦未有過於仲景者也集註徐彬曰自者謂感有風寒而衇惟自弦也於是衇既有一定之象而兼數為熱兼遲為寒此其大綱也尤怡曰瘧之舍固在半表半裏之間而人之藏則有偏多偏少之異故其病有熱多者有寒多者有裏多而可下者有表多而可汗可吐者當各隨其衇而施治也周揚俊曰人之瘧證由外邪之入每伏於半表半裏入而與隂爭則寒出而與陽爭則熱故寒熱徃來主少陽謂兼他經證則有之謂全不渉少陽則無是理也仲景曰瘧衇自弦正以衇之數遲小緊浮大皆未可定要必兼弦弦為少陽衇也夫邪犯少陽與衛氣併居衛氣晝行於陽夜行於隂故邪得陽而外出得隂而内薄内外相薄是以日作若氣之舍深内薄於隂陽氣獨發隂氣内著隂與陽爭不得出是以間日而作也然則偏隂多寒偏陽多熱其為癉為温為牝莫不自少陽而造其極補偏救弊必從少陽之界使邪去而隂陽適歸於和而後愈也病瘧以月一日發當以十五日愈設不差當月盡解如其不差當云何師曰此結為癥瘕名曰瘧母急治之宜鱉甲煎圓註病瘧者以月計之如一日發者當以十五日愈以十五日更一氣也人受氣於天天氣更則人身之氣亦更更氣旺則不受瘧邪故愈也設若不差當月盡解是又更一旺氣也倘如更二氣不差此瘧邪不衰與病者氣血痰飲結為癥瘕名曰瘧母也當急治之宜用鱉甲煎丸攻之可也集註程林曰五日為一候三候為一氣一氣十五日也夫人受氣於天氣節更移榮衛亦因之以易也鱉甲煎圓方鱉甲十二分炙烏扇三分燒黄芩三分柴胡六分䑕婦三分熬乾薑三分大黄三分芍藥五分桂枝三分葶藶一分熬石葦三分去毛厚朴三分牡丹五分去心瞿麥二分紫葳三分半夏一分人參一分􅟟蟲五分熬阿膠三分蜂窠四分炙赤消十二分蜣螂六分熬桃仁二分右二十三味為末取鍜竈下灰一斗清酒一斛五斗浸灰候酒盡一半著鱉甲於中煮令泛爛如膠漆絞取汁内諸藥煎為丸如梧子大空心服七丸日三服集解徐彬曰藥用鱉甲煎者鱉甲入肝除邪養正合煆竈灰所浸酒去瘕故以為君小柴胡湯桂枝湯大承氣湯為三陽主藥故以為臣但甘草嫌柔緩而減藥力枳實嫌破氣而直下故去之外加乾薑阿膠助人參白术温養為佐瘕必假血依痰故以四蟲桃仁合半夏消血化痰凡積必由氣結氣利而積消故以烏扇葶藶利肺氣合石葦瞿麥清邪熱而化氣散結血因邪聚則熱故以牡丹紫葳去血中伏火膈中實熱為使千金方去䑕婦赤消而加海藻大㦸以軟堅化水更妙師曰隂氣孤絶陽氣獨發則熱而少氣煩寃手足熱而欲嘔名曰癉瘧若但熱不寒者邪氣内藏於心外舍分肉之間令人消鑠肌肉按此言癉瘧其文脱簡内經已詳不復釋温瘧者其衇如平身無寒但熱骨節疼煩時嘔白虎加桂枝湯主之按此言温瘧其文脱簡内經已詳不復釋白虎加桂枝湯方知母六兩甘草二兩炙石膏一觔粳米二合桂枝三兩右剉每五錢水一盞半煎至八分去滓温服汗出愈瘧多寒者名曰牝瘧蜀漆散主之按此言牝瘧其文脱簡内經已詳不復釋蜀漆散方蜀漆洗去腥雲母燒二日夜龍骨等分右三味杵為散未發前以漿水服半錢匕温瘧加蜀漆半分臨發時服一錢匕集解李彣曰牝瘧證多隂寒治宜助陽温散為主雲母之根為陽起石下有雲母上多雲氣性温氣升乃升發陽氣之物龍骨屬陽能逐隂邪而起陽氣蜀漆乃常山之苖功能治瘧不用根而用苖者取其性多升發能透達陽氣於上之義也温瘧加蜀漆亦取其升散之功中風歴節病衇證并治第五夫風之為病當半身不遂或但臂不遂者此為痺衇㣲而數中風使然註風病内經論之詳矣但徃往與痺合論後人惑之故仲景復言之曰風之為病當半身不遂即經所謂偏枯也或但兩臂不遂者非中風也即痺病也蓋痺為隂病衇多沉澁風為陽病衇多浮緩今衇微而數中風使然其衇微者正氣虛也數者邪氣勝也故病風中之人因虚而召風者未有不見微弱之衇者也因熱而生風者未有不見數急之衇者也集註沈明宗曰此分中風與痺也風之為病非傷於衞即侵於榮故當半身不遂謂半身之氣傷而不用也若但臂不遂此為痺痺者閉也謂一節之氣閉而不仁也於是診之於衇必微而數微者陽之微也數者風之數也此中風使然謂風乘虛入而後使半身不遂也寸口衇浮而𦂳𦂳則為寒浮則為虛寒虛相搏邪在皮膚浮者血虛絡衇空虛賊邪不瀉或左或右邪氣反緩正氣即急正氣引邪喎僻不遂邪在於絡肌膚不仁邪在於經即重不勝邪入於腑即不識人邪入於藏舌則難言口吐涎按寸口衇浮而𦂳𦂳則為寒浮則為虛寒虚相搏邪在皮膚此五句與本條文義不屬當在後條之首後條寸口衇遲而緩遲則為寒緩則為虚榮緩則為亡血衞緩則為中風邪氣中經此六句亦與本條文義不屬當在此條之首文氣相屬必是錯簡其中有浮者血虚一句必是衍文浮則為虛寒虛相搏二虛字當是風字是傳寫之譌註中風虛邪之衇皆當浮緩以浮主風緩主虚也榮分見緩經絡之血亡也衞分見緩經絡之氣空也蓋邪風中人未有不由經絡血氣空虛而中也賊邪不瀉留而不去在左則病左在右則病右淺則病經絡深則病藏腑邪在於絡則為病肌膚麻木不仁也邪在於經則為病身肢偏重喎斜不遂也邪入於腑則為病九竅閉不識人也邪入於藏則為病舌瘖難言唇緩吐涎也寸口衇遲而緩遲則為寒緩則為虚榮緩則為亡血衞緩則為中風邪氣中經則身痒而癮疹心氣不足邪氣入中則胸滿而氣短按寸口衇遲而緩遲則為寒二遲字當是浮字寒字當是風字始得文義了然且遲緩二衇不能並見必是傳寫之譌註上條發明虛邪賊風之為病此條發明榮衞風寒之為病也寸口衇浮而𦂳𦂳則為寒浮則為風風寒之邪相摶於表鬱於皮膚經絡則令人身痒而發癮疹也若其人心氣不足謂心胸之氣不足而邪氣入心胸故令人胸滿而短氣也寸口衇沉而弱沉即主骨弱即主筋沉即為腎弱即為肝汗出入水中如水傷心歴節黄汗岀故曰歴節註寸口衇沉而弱肝腎之氣不足也蓋肝主筋腎主骨肝腎不足筋骨痿緩一為風寒濕邪所乘即病筋骨闗節交會之處夫人汗出時腠理開風尚易入况入水中浴焉得不致寒耶水傷心心主汗汗鬱成濕故風勝為歴節濕勝為黄汗出也集註趙良曰腎主水骨與之合故衇沉者病在骨也肝藏血筋與之合血虛則衇弱故病在筋也心主汗汗出入水其汗為水所阻水汗相搏聚以成濕乆變為熱濕熱相蒸是以歴節發出黄汗也味酸則傷筋筋傷則緩名曰泄鹹則傷骨骨傷則痿名曰枯枯泄相搏名曰斷泄榮氣不通衞不獨行榮衞俱微三焦無所御四屬斷絶身體羸瘦獨足腫大黄汗出脛冷假令發熱便為歴節也病歴節不可屈伸疼痛烏頭湯主之按名曰斷泄之泄字當是絶字始與下文相屬必是傳寫之譌註此詳申上條互發其義以明其治也歴節之病屬肝腎虛肝腎不足於内筋骨不榮於外客邪始得乘之而為是病也究其所以致虛之由不止一端也如飲食之味過傷日乆亦為是病也味過於酸則傷肝肝傷則筋傷筋傷則緩不收持名曰泄也味過於鹹則傷腎傷腎則骨傷骨傷則枯不能立名曰枯也枯泄相搏名曰斷絶斷絶者即榮氣不通衞不獨行榮衞俱虛三焦失所四維斷絶身體羸瘦也若獨足腫脛冷寒勝凝於下也黄汗自出濕勝發於中也假令發熱則屬風便為歴節也病歴節者歴節疼痛不能屈伸也故主之以烏頭湯通榮行衞並驅風寒濕之邪也以蜜製烏頭亦緩毒法耳集註沈明宗曰金匱補示飲食内傷脾胃心肺肝腎致病名曰歴節然出衇證皆因飲酒濕壅内熱而招外邪合病謂飲酒汗出當風所致即邪之所凑其氣必虛是矣或外風而合内濕外寒而合内濕内寒而招外濕内熱而招外濕此等闗頭不可不曉又當分别風寒濕氣偏多偏少而處發表温中行陽補虛散邪之法故治此當與靈素金匱合㸔則備若泛用成方則非良工所為之事也烏頭湯方麻黄芍藥黄耆各三兩甘草川烏五枚㕮咀以蜜二升煎取一升即出烏頭右五味㕮咀四味以水三升煮取一升去滓内蜜煎中更煎之服七合不知盡服之諸肢節疼痛身體尫羸脚腫如脱頭眩短氣温温欲吐桂枝芍藥知母湯主之按温温當是嗢嗢註歴節之證諸肢節疼痛也身體尫羸即上條身體羸瘦甚言其瘦之甚也脚腫如脱即上條獨足腫大甚言其腫之甚也頭眩短氣陽氣虛也嗢嗢欲吐寒邪盛也而不用烏頭湯者因無黄汗之濕勝也用桂枝芍藥知母湯者以壯陽氣散寒濕為急也故方中桂枝芍藥倍於麻黄防風大加白术附子其意專在温行陽氣次在散寒濕也多用生薑因其欲吐更佐知母甘草者以其劑過辛熱監制之也集註李彣曰此歴節病由氣血兩虛而致者也風濕相搏四肢節節皆痛即歴節病也身體尫羸邪勝正衰也脚腫如脱氣絶於下也頭眩短氣氣虛於上也嗢嗢欲吐氣逆於中也此三焦氣血兩虚故是湯主袪風濕而温氣血桂枝芍藥知母湯方桂枝四兩芍藥三兩甘草二兩麻黄二兩生薑五兩白术五兩知母四兩防風二兩附子二枚炮右九味以水七升煮取二升温服七合日三服趺陽衇浮而滑滑則榖氣實浮則汗自出註趺陽胃衇也榖氣胃氣也浮則為風外薄滑則為胃實熱風熱蒸於肌腠之間故汗自出此發明黄汗亦有因風熱之義也少隂衇浮而弱弱則血不足浮則為風風血相搏即疼痛如掣註少隂心衇也心主血心衇浮而弱弱則為血虚浮則為風邪風血相搏而交爭於經絡之間故疼痛牽引如掣也此發明歴節亦有因血虛之義也集註李彣曰風在血中則慓悍勁切無所不至為風血相搏蓋血主榮養筋骨者也若風以燥之則血愈耗而筋骨失其所養故疼痛如掣昔人曰治風先養血血生風自滅此其治也盛人衇濇小短氣自汗出歴節疼不可屈伸此皆飲酒汗出當風所致註盛人衇盛不應濇小盛人氣長不應氣短今盛人衇濇小短氣是形氣衇息不合也審其證自汗出歴節疼不可屈伸詢其由得之於飲酒汗出當風也此又發明歴節不止一端之義也集註徐彬曰盛人肥人也肥人濕多衇得澁小此痺象也於是氣為濕所搏而短因風作使而自汗氣血為邪所痺而疼痛不可屈伸然肥人固多濕何以衇驟澁小豈非酒濕困之乎何以疼痛有加而汗出不已豈非濕而挾風乎衇證不同因風則一故曰此皆飲酒汗出當風所致血痺虛勞病衇并治第六問曰血痺病從何得之師曰夫尊榮人骨弱肌膚盛重因疲勞汗出臥不時動摇加被微風遂得之但以衇自微濇在寸口闗上小緊宜鍼引陽氣令衇和緊去則愈註歴節屬傷氣也氣傷痛故疼痛也血痺屬傷血也血傷腫故麻木也前以明邪氣聚於氣分此以明邪氣凝於血分故以血痺名之也尊榮人謂膏粱之人素食甘肥故骨弱肌膚盛重是以不任疲勞疲勞則汗出汗出則腠理開亦不勝乆臥臥則不時動摇動摇即加被微風亦遂得以干之此言膏粱之人外盛内虛雖微風小邪易為病也然何以知病血痺也但以身體不仁衇自微濇則知邪凝於血故也寸口闗上小緊亦風寒微邪應得之衇也鍼能導引經絡取諸痺故宜鍼引氣血以瀉其邪令衇不濇而和緊去邪散血痺自通也集註周揚俊曰天下惟尊榮人為形樂志苦形樂故肌膚盛志苦故骨弱骨弱則不耐勞肌盛則氣不固稍有勞困即汗出也汗出而陽氣虛雖微風且得以襲之則血為之痺故一見衇微則知其陽之不足一見衇濇則知其隂之多阻此血痺之本衇也而其邪入之處則自形其小緊小為正氣拘抑之象緊為寒邪入中之徴然仲景明言微風何以反得寒衇也蓋邪隨血衇上下阻滯汁沫未有不痛者故痛為緊衇也鍼以泄之引陽外出則邪去而正自伸也血痺隂陽俱微寸口闗上微尺中小緊外證身體不仁如風痺狀黄耆桂枝五物湯主之註此承上條互詳衇證以明其治也上條言六衇微濇寸口闗上小緊此條言隂陽寸口闗上俱微尺中亦小緊合而觀之可知血痺之衇浮沉寸口闗上尺中俱微俱濇俱小緊也微者虛也濇者滯也小緊者邪也故血痺應有如是之證也血痺外證亦身體頑麻不知痛癢故曰如風痺狀但不似風痺歴闗節流走疼痛也主黄耆桂枝五物湯者調養榮衛為本袪風散邪為末也集註周揚俊曰此申上條既痺之後未能鍼引以愈遂令寸口微者今則隂陽俱微且寸闗俱微矣且尺中小緊矣夫小緊既見於尺則邪之入也愈深而愈不得出何也正虛之處便是容邪之處也衇經内外謂之隂陽上下亦謂之隂陽今尺既小緊則微屬内外也明矣若言證以不仁㮣之則疼痛麻木每與我相阻其為不仁甚矣故以風痺象之非真風痺也於是以黄耆固衞芍藥養隂桂枝調和榮衞托實表裏驅邪外出佐以生薑宣胃大棗益脾為至當不易之治也黄耆桂枝五物湯方黄耆三兩芍藥三兩桂枝三兩生薑六兩大棗十二枚右五味以水六升煮取二升温服七合日三服一方有人參夫男子平人衇大為勞極虛亦為勞註男子平人應得四時五藏平衇今六衇大而極虛非平人之衇也然大而無力勞役傷脾氣也極虚者内損腎隂精也此皆欲作虚勞之候故有如是之證也集註李彣曰平人者形如無病之人經云衇病人不病者是也勞則體疲於外氣耗於中衇大非氣盛也重按必空濡乃外有餘而内不足之象衇極虚則精氣耗矣蓋大者勞衇之外暴者也極虛者勞衇之内衰者也魏荔彤曰夫男子平人衇大為勞極虛亦為勞衇大者邪氣盛也極虛者精氣奪也以二句揭虛勞之總而未嘗言其大在何衇虛在何經是在主治者隨五勞七傷之故而締審之也人年五六十其病衇大者痺俠背行若腸鳴馬刀俠癭者皆為勞得之按若腸鳴三字與上下文不屬必是錯簡俠癭之癭字當是瘰字每經此證先勞後瘰先瘰後勞者有之從未見勞癭先後病也必是傳寫之譌註平人年二三十常得大衇者則多病勞若人年已五六十其衇亦大不即病勞者以氣血雖虛而火自微也火微故不病勞也雖不病勞然氣血榮衞虚痹不行故為馬刀䑕瘡俠瘰也此發明衇大雖同為病不同之義也勞之為病其脉浮大手足煩春夏劇秋冬瘥隂寒精自出酸削不能行按隂寒精自出之寒字當是虛字是傳寫之譌註此言浮大為勞以詳其證也手足煩即今之虚勞五心煩熱隂虚不能藏陽也隂虛精自出即今之虚勞遺精隂虚不能固守也酸削不能行即今之虚勞膝酸削瘦骨痿不能起於床也夫春夏陽也隂虛不勝其陽故劇秋冬隂也隂虛得位自起故瘥集註徐彬曰衇大既為勞矣更加浮其證則手足煩蓋隂既不足而陽必盛也於是春夏助其陽則劇秋冬助其隂則瘥隂虛而精自出者乆則痠削不能行矣程林曰寒字作虚字㸔隂虛則氣不守而精自出矣李彣曰衇浮大者裏虚而氣暴於外也四肢者諸陽之本勞則陽耗隂虛而生内熱故手足煩凡勞傷多屬隂虛當春夏木火盛炎之際氣浮於外則裏愈虛故劇秋冬金水相生之候氣歛於内則外不擾故瘥也腎藏精精自出者腎水不藏也腎主骨故痠削而不能行也男子衇虚沉弦無寒熱短氣裏急小便不利面色白時目瞑兼衂少腹滿此為勞使之然註此復申虛極為勞以詳其證之義也衇虛沉弦隂陽俱不足也無寒熱是隂陽雖不足而不相乘也短氣面白時瞑兼衂乃上焦虛而血不榮也裏急小便不利少腹滿乃下焦虛而氣不行也凡此衇證皆因勞而病也故曰此為勞使之然男子面色白者主渴及亡血卒喘悸衇浮者裏虛也按衇浮者裏虚也當是衍文註此復申虛勞面色白互詳其證之義也面色白不因衂者是血不内生也因衂者是血亡於外也今曰面色薄謂面色淺淡不華亦不足之色也故主津液不足之渴及吐衂亡血氣虛卒喘血虛卒悸也集註李彣曰此節以亡血為主内經云精明五色者氣之華也又云心之華在面其充在血衇勞則氣耗火動逼血妄行必致亡血蓋血主濡之血亡則精采奪而面色薄津液去而煩且渴矣又勞者氣血俱耗肺主氣氣虛則喘心主血血虛則悸卒者猝然見此病也男子衇浮弱而濇為無子精氣清冷註男子之衇浮大而虛者為虚勞也浮弱而濇者則為精氣清冷故為無子也夫失精家少腹弦急隂頭寒目眩髮落衇極虛芤遲為清榖亡血失精衇得諸芤動微緊男子失精女子夢交桂枝龍骨牡蠣湯主之按此條亡血失精之下等句與上文義不屬當另作一條在後註失精家謂腎陽不固精者也少腹弦急虛而寒也隂頭寒陽氣衰也目眩精氣虧也髪落血本竭也若診其衇極虛而芤遲者當知極虛為勞芤則亡血遲則為寒故有清榖亡血失精之證也集註程林曰腎主閉藏肝主踈泄失精則過於踈泄故少腹弦急也隂頭為宗筋之所聚真陽日虧故隂頭寒也目眩則精衰髮落則血竭是以衇虛芤遲也虛主失精芤主亡血遲主下利清榖也李彣曰肝主藏血腎主藏精亡血失精則肝腎俱虛矣少腹者肝腎之部今少腹弦急以肝腎兩虧則裏氣虛而張急加弦也肝主筋前隂者宗筋之所聚肝衰故隂頭寒也肝藏血開竅於目腎主骨骨之精為瞳子又腎之華在髪髪者血之餘此肝腎兩虛故目眩髪落也芤衇者浮沉有中間無似中空芤草故名芤衇此亡血之衇以衇者血之府血虛則衇亦虛也遲為在藏遲則為寒衇極虛芤遲則其證亦虛清榖者大便完榖不化也此虛勞在肝腎二經者也男子平人衇虛弱細微者善盗汗也按此節衇證不合必有脱簡故不釋衇沉小遲名脱氣其人疾行則喘喝手足逆寒腹滿甚則溏泄食不消化也註衇沉細遲則陽大虛故名脱氣脱氣者謂胸中大氣虛少不充氣息所用故疾行喘喝也陽虚則寒寒盛於外四末不温故手足逆冷也寒盛於中故腹滿溏泄食不消化也集註徐彬曰衇沉小遲其為陽衰無疑沉小遲三衇相併是陽氣全虧故名脱氣其軀為空殻疾行則氣竭而喘喝四肢無陽而寒腹中無陽而滿甚則胃虛極而溏泄脾虛極而食不化也李彣曰此脾肺腎三經俱病也肺主氣氣為陽沉小遲皆陽氣虛衰之衇故為脱氣疾行則喘喝以肺主出氣而腎主納氣為生氣之原呼吸之門若真元耗損則氣虛不能續息肺無所出腎無所納故喘喝此肺腎病也又脾主四肢四肢者諸陽之本逆寒者陽虛不温四末也腹滿者脾經入腹氣虛中滿也溏泄食不化者此脾虛不能運磨水榖多見鶩溏飱泄之證也衇弦而大弦則為減大則為芤減則為寒芤則為虛虛寒相搏此名為革婦人則半產漏下男子則亡血失精註詳見傷寒論辨衇法中不復釋衇得諸芤動微緊男子失精女子夢交桂枝龍骨牡蠣湯主之註衇得諸芤動微緊者謂㮣虛勞之諸衇而為言也非謂芤動微緊僅主男子失精女子夢交之候也通舉男女失精之病而用桂枝龍骨牡蠣湯者調隂陽和榮衛兼固澁精液也集註徐彬曰失精之家衇復不一苟得諸芤動微緊是男子以虛隂而挾火則失精女子以虛隂而挾火則夢交主以桂枝龍骨牡蠣湯者蓋隂虛之人大㮣當助腎故以桂枝芍藥通陽固隂甘草薑棗和中龍骨牡蠣固精也桂枝加龍骨牡蠣湯方桂枝芍藥生薑各三兩甘草二兩大棗十二枚龍骨牡蠣各三兩右七味以水七升煮取三升分温三服虛勞裏急悸衂腹中痛夢失精四肢痠疼手足煩熱咽乾口燥小建中湯主之註虛勞云云者㮣虛勞之證而言也非謂虛勞之證止於此也故下文有諸不足之説也均主以小建中湯者欲小小建立中虛之意合下六節皆論虛勞各有所主之方也小建中湯方桂枝三兩甘草三兩炙大棗十二枚芍藥六兩生薑二兩膠飴一升右六味以水七升煮取三升去滓内膠飴更上微火消解温服一升日三服嘔家不可用建中湯以甜故也虛勞裏急諸不足黄耆建中湯主之註所謂虛勞裏急諸不足者亦該上條諸不足證之謂也黄耆建中湯建立中外兩虛非單謂裏急一證之治也桂枝龍骨牡蠣湯即桂枝湯加龍骨牡蠣小建中湯即桂枝湯加膠飴黄耆建中湯即桂枝湯加膠飴黄耆也故嘗因是而思仲景以一桂枝湯出入加減無往不利如此何後世一見桂枝即為傷寒發汗之劑是但知仲景用桂枝湯治傷寒而不知仲景用桂枝湯治虛勞也若知桂枝湯治虛勞之義則得仲景心法矣蓋桂枝湯辛甘而温之品也若啜粥温覆取汗則發散榮衛以逐外邪即經曰辛甘發散為陽是以辛為主也若加龍骨牡蠣膠飴黄耆則補固中外以治虛勞即經曰勞者温之甘藥調之是以温以甘為主也由此推之諸藥之性味功能加減出入其妙無窮也集註魏荔彤曰氣虛甚加黄耆津枯甚加人參以治虛勞裏急此言裏急非單指裏急之謂也乃虛勞諸不足腹痛之謂也故名其方為建中正所以扶持其中氣使漸生隂陽達於榮衛布於肢體也尤怡曰裏虛衇急腹中當引痛也諸不足者隂陽諸衇俱不足而眩悸喘喝失精亡血等證相因而至也急者緩之必以甘不足者補之必以温而充虚塞空則黄耆尤有專長也黄耆建中湯方於小建中湯内加黄耆一兩半餘依上法若氣短胸滿者加生薑腹滿者去棗加茯苓一兩半及療肺虚損不足補氣加半夏三兩虛勞腰痛少腹拘急小便不利者八味腎氣丸主之註虛勞之人腰痛腎氣虛而不行也少腹拘急小便不利膀胱氣虛不化也主以八味腎氣丸温補下焦腎與膀胱表裏之氣足而腰痛少腹拘急小便不利未有不愈者也集註程林曰腰者腎之外候腎虛則腰痛腎與膀胱為表裏不得三焦之陽氣以决瀆則小便不利而少腹拘急矣與是方以益腎間之氣氣强則便溺行而少腹拘急亦愈矣尤怡曰虛勞之人損傷少隂腎氣是以腰痛少腹拘急小便不利以八味腎氣丸補隂之虚可以生氣助陽之弱可以化水乃補下治下之良劑也八味腎氣丸方見婦人雜病中虛勞虛煩不得眠酸棗湯主之註因虚勞而煩是虛煩也因虚煩而不得眠是虛煩不得眠也故主以酸棗仁湯專治虛煩煩去則得眠也集註李彣曰虚煩不得眠者血虛生内熱而隂氣不歛也内經云氣行於陽陽氣滿不得入於隂隂氣虛故目不得瞑酸棗湯養血虚而歛隂氣也酸棗湯方酸棗仁二升甘草一兩知母二兩茯苓二兩芎藭二兩右五味以水八升煮酸棗仁得六升内諸藥煮取三升分温三服五勞極虛羸瘦腹滿不能飲食食傷憂傷飲傷房室傷饑傷勞傷經絡榮衛氣傷内有乾血肌膚甲錯兩目黯黒緩中補虛大黄􅟟蟲丸主之按緩中補虛四字當在不能飲食之下必是傳寫之譌註五勞所傷乆之令人極虛羸瘦腹中虛滿不能飲食宜緩中補虛如前之建中等方也原其所傷之道不止過勞傷氣房室傷精也即飲食傷胃饑過傷脾渴過傷腎憂思傷心罷極傷肝過言傷肺皆令人經絡榮衛氣傷是以勞熱煎熬内有乾血故肌膚不潤甲錯如鱗也兩目不榮黯黒不明也似此乾血之證非緩中補虛之劑所能治故主以大黄􅟟蟲丸攻熱下血俾瘀積去而虛勞可復也集註程林曰此條單指内有乾血而言夫人或因七情或因飲食或因房勞皆令正氣内傷血衇凝積致有乾血積於中而尫羸見於外也血積則不能以濡肌膚故肌膚甲錯不能榮於目則兩目黯黒與大黄􅟟蟲丸以下乾血則邪除正王矣非大黄􅟟蟲丸能緩中補虚也尤怡曰内有乾血不去適足以留新血而滲灌不周故去之不可不早也此方潤以濡其乾蟲以動其瘀通以去其閉而以地黄芍藥甘草和養其虚攻血而仍滋夫血也大黄􅟟蟲湯方大黄十分蒸黄芩二兩甘草三兩桃仁一升杏仁一升芍藥四兩乾漆一兩蝱蟲一升水蛭百枚􅟟蟲半升蠐螬一升乾地黄十兩右十二味末之煉蜜為丸小豆大酒飲服五丸日三服虛勞諸不足風氣百疾薯蕷丸方主之註虚勞諸不足者謂五勞諸虛百損也上條以熱傷乾血為言此條以風氣百疾立論熱傷其上之血分則病肺癰熱傷其下之血分則病乾血風中其外之氣分則病肺痿風中其内之氣分則病百疾主之以薯蕷丸散諸風邪補諸不足滋諸枯槁調諸榮衛故其藥温潤共劑補散同方也集註徐彬曰虛勞不足證多有兼風者正不可著急治風氣故仲景以四君四物養其氣血麥冬阿膠乾薑大棗補其肺胃而以桔梗杏仁開提肺氣桂枝行陽防風運脾神麯開鬱黄卷宣腎柴胡升少陽之氣白蘝化入榮之風雖有風氣未嘗專治之謂正氣運而風氣自去也然以薯蕷名丸者取其不寒不熱不燥不滑脾腎兼宜故多用以為君則諸藥相助以為理耳薯蕷丸方薯蕷三十分當歸桂枝麯乾地黄豆黄卷各十分甘草二十八分人參七分芎藭芍藥白术麥門冬杏仁各六分柴胡桔梗茯苓各五分阿膠七分乾薑三分白蘝二分防風六分大棗百枚為膏右二十一味末之煉蜜和丸如彈子大空腹酒服一丸一百丸為劑肺痿肺癰欬𠻳上氣病衇證并治第七問曰熱在上焦者因欬為肺痿肺痿之病從何得之師曰或從汗出或從嘔吐或從消渴小便利數或從便難又被快藥下利重亡津液故得之曰寸口衇數其人欬口中反有濁唾涎沫者何師曰為肺痿之病若口中辟辟燥欬即胸中隱隱痛衇反滑數此為肺癰欬唾膿血註熱在上焦不欬不病肺痿也因熱病欬則為肺痿肺熱致痿之由非止一端或從汗出或從嘔吐或從消渴小便數利或從便難又被快藥下之重亡津液故令肺熱乾痿也肺熱乾痿則清肅之令不行水精四布失度脾氣雖散精液上歸於肺而肺不但不能自滋其乾亦不能内灑陳於藏腑外輸精於皮毛也其精液留貯胸中得熱煎熬變為涎沫侵肺作欬唾之不已故乾者自乾唾者自唾愈唾愈乾痿病成矣若口中辟辟乾燥不吐濁唾涎沫每欬即胸中隱隱而痛衇數而滑不數而虚則非肺痿乃為肺癰乆則癰成膿潰不唾涎沫而必欬唾膿血矣集註周揚俊曰喻昌云行動數武氣即喘鳴冲擊連聲痰始一應金匱治法貴得其精意大要緩而圖之生胃津潤肺燥下逆氣開積痰止濁唾補真氣以通肺之小管散火熱以復肺之清肅如半身痿廢及手足痿軟治之得法亦能復起而肺近在胸中呼吸所闗可不致力乎肺癰屬在有形之血血結宜驟攻肺痿屬在無形之氣氣傷宜徐理故癰為實誤以肺痿治之是為實實痿為虛誤以肺癰治之是為虚虛此辨証用藥之大畧也然兩手寸口之衇原為手太隂肺衇此云寸口衇數云滑數云數實云數虚皆指左右三部統言非如氣口獨主右闗之上也其人欬口中反有濁唾涎沫頃之遍地者為肺痿言欬而口中不乾燥也若欬而口中辟辟燥則是肺已結癰火熱之毒出現於口欬聲上下觸動其癰胸中即隠隱而痛其衇必見滑數有力正邪氣方盛之徴也數虚數實之衇以之分别肺痿肺癰是則肺痿當補肺癰當瀉也可知矣又云纔見乆欬先湏防此兩證肺癰由五藏藴崇之火與胃中停蓄之熱上乘乎肺肺受火熱薫灼血為之凝痰為之裹遂成小癰所結之形漸長則肺日脹而脇骨日昻迺至欬聲頻併痰濁如膠發熱畏寒日晡尤甚面紅鼻燥胸生甲錯始先即能辨其衇證屬表屬裏極力開提攻下無不愈者迨至血化為膿肺葉朽壞傾囊吐出始識其證十死不救嗟無及矣沈明宗曰此肺痿肺癰之辨也心居上腎水不足心火刑金為熱在上焦肺隂日消氣逆則欬故致肺痿然本經明其始病之因或從病後隂虚過汗傷液嘔吐傷津消渴血虛津竭或利小便數而傷隂或大便難反被快藥下利而重亡津液以致肺金枯燥虛熱熏蒸故寸口衇數其人欬𠻳氣弱不振津液不佈化為濁唾涎沫而成肺痿若口中辟辟燥欬即胸中隱隱痛者乃風寒侵入肺中凝滯榮血為癰故衇滑數而欬唾膿血因無形虛熱致痿故衇數虛因有形氣血凝滯成癰故衇數實此明肺癰屬實肺痿屬虚也衇數虛者為肺痿數實者為肺癰註此詳申上條肺痿肺癰之衇也肺痿得之於熱亡津液虛邪也故衇數而虛肺癰得之於熱毒蓄結實邪也故衇數而實集註李彣曰潘碩甫云痿與癰皆熱在上焦其衇皆數皆欬亡津液未有異也但痿屬肺氣虚而亡津雖有熱亦不烈故不至燥涸雖欬而口中有濁唾涎沬故衇雖數而虚也癰則氣壅血凝邪實而熱烈故津液亡而更覺乾涸口中辟辟燥欬即胸中隱痛津液既涸衇應濇滯而反滑數者蓄熱腐膿衇故數實也尤怡曰痿者萎也如草木之萎而不榮為津亡而肺焦也癰者壅也如土之壅而不通為熱聚而肺㿉也故其衇有虛實不同而其數則一也問曰病欬逆衇之何以知此為肺癰當有膿血吐之則死其衇何類師曰寸口衇微而數微則為風數則為熱微則汗出數則惡寒風中於衛呼氣不入熱過於榮吸而不出風傷皮毛熱傷血衇風舍於肺其人則欬口乾喘滿咽燥不渴時唾濁沫時時振寒熱之所過血為之凝滯畜結癰膿吐如米粥始萌可救膿成則死按肺癰之上當有肺痿二字不然本文論肺痿之義則無著落必是脱簡衇微之三微字當是三浮字微字文氣不屬必是傳寫之譌註病欬逆者何以知為肺痿肺癰也欬而不渴濁唾涎沫衇數而虛是以衇證知為肺痿也口中乾噪胸中隱痛衇數而實是以衇證知為肺癰也至於所以受病之由肺痿前已言之而肺癰則未嘗言也故又取所以致熱而病肺痿肺癰之由互為詳悉發明也寸口肺衇也肺衇當浮濇而短今浮而數是以知浮則為風數則為熱初病風熱外搏皮毛則榮衛受邪故汗出而惡寒也末傳風熱内舍於肺則榮衛分病病肺痿者屬風熱傷於衛氣氣分有津液而無血津液為之濁故其為證欬而不吐膿血唾濁涎沫也病肺癰者屬風熱傷於榮血血分有血而無津液血為之凝蓄故其為證欬而不唾涎沫吐膿血如米粥也其發熱汗出惡寒惡風欬而喘滿咽燥不渴呼氣不入吸氣不出則為痿癰互相兼有必然之證也呼氣不入吸氣不出乃言其呼吸氣促難出難入非竟不出入也始萌可救謂肺傷尚淺膿成則死謂肺已壞矣蓋示人圖治於蚤又特為肺癰而諄諄言之也肺癰喘不得臥葶藶大棗瀉肺湯主之註此承上條以明急治之義也肺癰者謂口中辟辟乾燥胸中隱隱作痛衇數實也而更加喘不得臥是邪壅肺甚急故以葶藶大棗瀉肺湯大苦大寒峻瀉肺邪恐稍遷延膿成則死矣葶藶大棗瀉肺湯方葶藶熬令黄色搗丸如彈子大大棗十二枚右先以水三升煮棗取二升去棗内葶藶煮取一升頓服集解趙良曰此治肺癰喫緊之方也肺中生癰不瀉何待恐日乆癰膿已成瀉之無益日乆肺氣已索瀉之轉傷乘其血結而膿未成當急以瀉之之法奪之况喘不得臥不亦甚乎肺癰胸滿脹一身面目浮腫鼻塞清涕出不聞香臭酸辛欬逆上氣喘鳴迫塞葶藶大棗瀉肺湯主之方見上註此承上條互詳其證以同其治也肺癰胸脹而滿欬逆上氣喘鳴迫塞一身面目浮腫鼻塞清涕出不聞香臭酸辛是邪外塞皮毛内壅肺氣比之喘不得臥殆尤甚焉亦以葶藶大棗瀉肺湯者因其膿未成故也欬而胸滿振寒衇數咽乾不渴時出濁唾腥臭乆乆吐膿如米粥者為肺癰桔梗湯主之註欬而胸滿振寒衇數咽乾不渴時出濁唾腥臭乆乆吐膿如米粥者此為肺癰證也肺癰尚未成膿實邪也故以葶藶之劑瀉之今已潰後虚邪也故以桔梗之苦甘草之甘解肺毒排癰膿也此治已成肺癰輕而不死者之法也集註髙世栻曰吐如米粥亦膿也何以上文云膿成則死若謂如米粥者非膿上文既曰畜結癰膿吐如米粥此又云吐膿如米粥既吐膿矣奚有始萌膿成之别也愚曰上文先欬逆而呼吸不利後凝滯而血衇成膿隂陽血氣皆傷故膿成則死若上節言肺癰而氣機不利此節言肺癰而經絡不和病陽氣者不傷隂病血衇者不傷陽故可治也如但以始萌可救膿成則死二語盡之是以辭害志也奚可乎桔梗湯方桔梗一兩甘草二兩右二味以水三升煮取一升分温再服則吐膿血也肺痿吐涎沫而不欬者其人不渴必遺尿小便數所以然者以上虚不能制下故也此為肺中冷必眩多涎唾甘草乾薑湯以温之若服湯已渴者屬消渴註欬而不吐涎沫者肺燥欬也欬而吐涎沫者肺熱痿也若似肺痿之吐涎沫而不欬者此為肺中有冷飲非為肺中成熱痿也肺中冷則其人必不渴遺尿小便數頭眩多涎唾所以然者以上焦陽虛不能約制下焦隂水下焦之水泛上而唾涎沫用甘草乾薑湯以温散肺之寒飲也如服湯已渴者屬消渴謂始先不渴服温藥即轉渴者不但非肺中熱亦非肺中冷乃胃中熱也則不當以屬肺中冷寒飲治之當以屬胃中熱消渴治之也甘草乾薑湯方甘草四兩炙乾薑二兩炮右㕮咀以水三升煮取一升五合去滓分温再服欬而上氣喉中水鷄聲射干麻黄湯主之註欬逆上氣謂欬則氣上衝逆也上條發明不欬而吐涎沫者非為肺痿是為肺冷也此條發明欬而不吐涎沫者亦非肺痿亦為肺冷也上條以不渴小便數多唾涎沫為肺中冷故以乾薑佐甘草是以温中為主也此條以氣上逆喉中有水鷄聲為肺經寒故以生薑佐麻黄是以散外為主也病同冷飲而有在外在内之别方同辛温而有主温主散之異也水鷄聲者謂水與氣相觸之聲在喉中連連不絶也射干麻黄湯方射干三兩麻黄四兩生薑四兩細辛紫苑欵冬花各三兩五味子半升大棗七枚半夏半升右九味以水一斗二升先煮麻黄兩沸去上沫内諸藥煮取三升分温三服集解程林曰欬而上氣如水鷄聲連連不絶者是湯主之内經曰肺苦氣上逆急食苦以瀉之射干紫苑之苦所以泄逆氣也以辛瀉之麻黄生薑細辛半夏款冬花之辛所以瀉風邪也以酸收之以酸補之五味子之酸以補不足虛則補其母大棗之甘所以補其母也大逆上氣咽喉不利止逆下氣者麥門冬湯主之按大逆上氣之大字當是火字文義病藥始屬必是傳寫之譌註欬而上氣咽喉有水鷄聲而連連者是寒飲上逆也今欬而上氣咽喉無水鷄聲而不利者是火氣上逆也不利者謂咽喉若有物相碍不爽利也主之以麥門冬湯止其火逆下其上氣也麥門冬湯方麥門冬七升半夏一升人參三兩甘草二兩粳米三合大棗十二枚右六味以水一斗二升煮取六升温服一升日三夜一服集解周揚俊曰喻昌云此胃中津液枯燥虛火上炎之證麥冬湯乃治本之良法也夫用降火之藥而火反升用寒涼之藥而熱轉熾者不惟無益而反害之凡病有胃氣則生無胃氣即死胃氣者肺之母氣也本草有知母之名者謂肺藉其清涼知清涼為肺之母也有貝母之名者謂肺藉其豁痰實豁痰為肺之母也然屢施於火逆上氣咽喉不利之證而屢不應名不稱矣孰知仲景有此妙法於麥冬人參甘草粳米大補中氣大生津液隊中増入半夏之辛温一味其利咽下氣非半夏之功實善用半夏之功擅古今未有之竒矣欬逆上氣時時唾濁但坐不得眠皂莢丸主之註欬逆上氣喉中有水鷄聲者是寒飲衝肺射干麻黄湯證也欬逆上氣咽喉不利者是火氣衝肺麥門冬湯證也今欬逆上氣惟時時唾濁痰涎多也但坐不得臥氣逆甚也此痰氣為病非寒飲亦非火氣主之以皂莢丸者宣導其痰通達其氣也佐棗膏之甘以藥性慓悍緩其勢也集註程林曰濁唾壅塞於肺則不得卧故時時唾濁也皂莢味辛醎辛能散醎能軟宣壅導滯利竅消風莫過於此故欬逆上氣時時唾濁坐不得卧者宜之然藥性慓悍佐棗膏之甘以緩其藥勢魏荔彤曰欬逆上氣時時吐濁但坐不得眠則較重於喉中水鷄聲者矣聲滯者挾外感之因唾濁則内傷之故但坐不得卧而肺癰之證將成矣是上焦有熱痰血包裹結聚成患不可不急為宣通其結聚而後可津液徐生枯乾獲潤也皂莢丸主之皂莢驅風理痺正為其有除瘀滌垢之能也欬逆上氣時時唾濁胸膈惡臭之痰血已結可不急為滌蕩使之湔洗不留乎如今用皂莢澡浴以除垢膩即此理也用丸俾徐徐潤化自上而下而上部方清若用湯直瀉無餘不能治上部之膠凝矣古人立法誠善哉此為預治肺癰將成者主治也皂莢丸方皂莢八兩刮去皮用酥炙右一味末之蜜丸梧子大以棗膏和湯服三丸日三夜一服上氣面浮腫肩息其衇浮大不治又加利尤甚註上氣謂欬逆上氣也面浮腫謂面目浮腫也肩息謂喘也其衇浮大不治又加利尤甚謂衇證兩虛已屬不治又加利則上喘下利隂陽兩脱衇證相反故曰尤甚也集註徐彬曰此言肺癰之證元氣憊者為難治也謂肺癰由風則風性上行必先上氣若兼面浮腫肩息氣升不降也又衇浮大元氣不能復斂則補既不可汗又不可况内外皆逆氣非風之比可盡汗泄乎故云不治加利則陽從上脱隂從下脱故曰尤甚尤怡曰上氣面浮腫肩息氣但升而不降矣衇復浮大則陽有上越之機衇偏盛者偏絶也又加下利是隂復從下脱矣隂陽離決故當不治肩息息搖肩也欬而上氣此為肺脹其人喘目如脱狀衇浮大者越婢加半夏湯主之註欬而上氣此為肺脹其證肩息而喘目突如脱之狀今衇浮大則可知浮則為風大則為實故以越婢加半夏湯主之外踈皮毛内降氣逆也集註趙良曰欬而上氣則其氣之有衝而不下可知矣其欬之相連而不已可知矣此皆屬肺之脹使之也邪入於肺則氣壅氣壅則欲不喘不可得惟喘極故目如脱所以狀脹與喘之至也衇浮邪也兼大則邪實而所以遺害於肺正未有已故必以辛熱發之亦兼以甘寒佐之使乆合之邪渙然氷釋豈不快乎然乆蓄之飲何由得泄故特加半夏於越婢湯中一定之法也尤怡曰外邪内飲填塞肺中為脹為喘為欬而上氣越婢湯散邪之力多而蠲飲之力少故以半夏輔其未逮不用小青龍者以衇浮且大病屬陽熱故利辛寒不利辛熱也目如脱狀者目暗脹突如欲脱落之狀壅氣然也越婢加半夏湯方麻黄六兩石膏半斤生薑三兩大棗十五枚甘草二兩半夏半斤右六味以水六升先煮麻黄去上沫内諸藥煮取三升分温三服集解李彣曰脾運水榖主為胃行津液職卑如婢也湯名越婢者取發越脾氣通行津液之義也今治肺脹則麻黄散表邪石膏清内熱甘草大棗養正緩邪半夏生薑散逆下氣也上氣喘而躁者屬肺脹欲作風水發汗則愈註上氣欬逆喘而躁急者屬肺脹也乃風鬱於外水逆於中之候也故曰欲作風水當發其汗故曰發汗則愈也集註徐彬曰有邪者尚可治也若上氣但喘而躁則喘為風之扇躁為風之煩其逆上之涎沫將挾風勢而為風水今使先泄於肌表水無風戰自然順趨而從下故曰可汗而愈肺脹欬而上氣煩躁而喘衇浮者心下有水小青龍加石膏湯主之註此承上條互詳衇證以明其治也肺脹欬而上氣煩躁而喘衇浮是外傷風寒内有水氣主以小青龍湯發汗則愈加石膏者因多一煩躁證也集註沈明宗曰此互上條肺脹治法也風寒之邪入於榮衛挾飲上逆則欬而上氣也煩躁而喘肺氣壅逆謂之肺脹即肺癰未成之初也尤怡曰此亦外邪内飲相搏之證而兼煩躁則挾有熱邪麻桂藥中必用石膏如大青龍之例也又此條見證與上條頗同而心下寒飲則非温藥不能開而去之故不用越婢加半夏而用小青龍加石膏温寒並進水熱俱捐於法尤為宻矣小青龍加石膏湯方麻黄芍藥桂枝細辛甘草乾薑各三兩五味子半夏各半升石膏二兩右九味以水一斗先煮麻黄去上沫内諸藥煮取三升强人服一升羸者減之二三服小兒服四合集解李彣曰心下有水麻黄桂枝發汗以泄水於外半夏乾薑細辛温中以散水於内芍藥五味子收逆氣以平肝甘草益脾土以制水加石膏以去煩躁兼能解肌出汗也欬而衇浮者厚朴麻黄湯主之衇沉者澤漆湯主之註欬謂欬而不上氣也衇浮者風寒病外也主之厚朴麻黄者以散外邪為主也衇沉者痰飲病裏也主之澤漆湯以逐内飲為主也集解尤怡曰此不詳見證而但以衇之浮沉為辨而異其治按厚朴麻黄湯與小青龍加石膏湯大同則散邪蠲飲之力居多而厚朴辛温亦能助表小麥甘平五味斂安正氣者也澤漆湯以澤漆為主而以白前黄芩半夏佐之則下趨之力輕猛雖生薑桂枝之辛亦祗為下氣降逆之用而已不能發表也仲景之意蓋以欬皆肺邪而衇浮者氣多居表故驅之使從外出為易衇沉者氣多居裏故驅之使從下出為易亦因勢利導之法也厚朴麻黄湯方厚朴五兩麻黄四兩石膏如雞子大杏仁半升半夏半升乾薑二兩細辛二兩小麥一升五味子半升右九味以水一斗二升先煮小麥熟去滓内諸藥煮取三升温服一升日三服澤漆湯方半夏半升紫參五兩一作紫苑澤漆三升以東流水五斗煮取一斗五升生薑五兩白前五兩甘草黄芩人參桂枝各三兩右九味㕮咀内澤漆汁中煮取五升温服五合至夜盡集解李彣曰欬者水寒射肺也衇浮者停水而又挾風以鼓之也麻黄去風散肺逆與半夏細辛乾薑五味子石膏同用即前小青龍加石膏為解表行水之劑也然土能制水而地道壅塞則水亦不行故用厚朴踈敦阜之土使脾氣健運而水自下泄矣杏仁下氣去逆小麥入心經能通火氣以火能生土助脾而共成決水之功也又云衇沉為水以澤漆為君者因其功專於消痰行水也水性隂寒桂枝行陽氣以導之然所以停水者以脾土衰不能制水肺氣逆不能通調水道故用人參紫參白前甘草補脾順肺同為制水利水之方也黄芩苦以泄之半夏生薑辛以散之也沈明宗曰詳金匱欬𠻳病本於肺則一大綱有三一者熱刑肺金氣弱不振欬而唾沫為肺痿二者風傷衛分則病欬上氣喘為肺脹三者邪傳榮血凝而不行為肺癰然肺脹之中又分風寒表裏飲多風少風多飲少之治故氣喘而躁衇浮者為心下有水欲作風水當以小青龍兩解表裏加石膏以清風熱目如脱狀乃風寒多而飲少以越婢驅風加半夏而下痰逆風寒外束火熱内鬱喉中水雞聲者射干麻黄湯宣通表裏之邪風熱壅逆津液不佈化而為涎時時唾濁但坐不得眠者皂莢丸以驅風鬱之涎若欬而衇浮邪居肺氣以厚朴麻黄湯俾從表解欬而衇沉邪入於榮將成肺癰以澤漆而破壅結火逆上氣咽喉不利是無外邪治當麥門冬湯清潤滋降若見浮腫肩息衇浮大而下利真氣上浮下脱則為不治以上皆外邪兼内飲合病微細之辯臨證又當合内經五藏六腑互相傳乘之欬而辯之則盡善矣御纂醫宗金鑑卷十九
