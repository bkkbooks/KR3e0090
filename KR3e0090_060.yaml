  text: 欽定四庫全書御纂醫宗金鑑卷六十
  hash: sha256:c8472475953e79c0a37f61dbcfa9d23df9e7f684f19ffd16a4ea8ae50554803c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0090_WYG_060-1a, image: WYG0782/WYG0782-0274a.png}
body:
  text: 編輯幼科種痘心法要旨目録種痘要旨選苖蓄苖天時擇吉調攝禁忌可種不可種水苖種法五藏傳送之理旱苖種法痘衣種法痘漿種法信苖補種自出治法御纂醫宗金鑑卷六十目録欽定四庫全書御纂醫宗金鑑卷六十編輯幼科種痘心法要旨目録種痘要旨選苖蓄苖天時擇吉調攝禁忌可種不可種水苖種法五藏傳送之理旱苖種法痘衣種法痘漿種法信苖補種自出治法御纂醫宗金鑑卷六十目録欽定四庫全書御纂醫宗金鑑卷六十編輯幼科種痘心法要旨夫痘胎毒也伏於有形之始因感而發為生人所不能免然其發也或染時氣或感風寒或因飲食或由驚恐以病引病為患多端變更莫測且其間順吉者少險逆者多有千方百計而不能冀其愈於萬一者此其所以為難也古有種痘一法起自江右達於京畿究其所源云自宋真宗時峨眉山有神人出為丞相王旦之子種痘而愈遂傳於世其説雖似渺茫然以理揆之實有參贊化育之功因時制宜之妙蓋正痘感於得病之後而種痘則施於未病之先正痘治於成病之時而種痘則調於無病之日自表傳裏由裏達表既無諸證夾雜於其中復有善方引導於其外薰蒸漸染胎毒盡出又何慮乎為患多端變更莫測以致良工束手於無可如何之地耶此誠去險履平避危就安之良法也然種痘一科多口傳心授方書未載恐後人視為虛誕之辭相沿日久無所考稽使至理良法竟置無用之地神功湮沒豈不大可惜哉今將種痘一法細加研究審度精詳纂輯成書永垂千古庶為種痘之津梁咸登赤子於夀域也種痘要旨嘗考種痘之法有謂取痘粒之漿而種之者有謂服痘兒之衣而種之者有謂以痘痂屑乾吹入鼻中種之謂之旱苗者有謂以痘痂屑濕納入鼻孔種之謂之水苖者然即四者而較之水苖為上旱苖次之痘衣多不應驗痘漿太涉殘忍故古法獨用水苖蓋取其和平穩當也近世始用旱苖法雖捷徑微覺迅烈若痘衣痘漿之説則斷不可從夫水苖之所以善者以其勢甚和平不疾不徐漸次而入既種之後小兒無受傷之處胎毒有漸發之機百發百中捷於影響盡善盡美可法可傳為種痘之最優者其次則旱苖雖烈猶與水苖之法相近兒體壯盛猶或可施至若痘痂之何以為順選苖之何以善藏天時之何以得正種期之何以為吉調攝之何以合宜禁忌之何以如法形氣之何以可種與痘衣痘漿之弊一一條分縷晰細列於後學者必細心體閲則中有灼見不致有他岐之惑庶種法既善而成功可必矣選苗苗者痘之痂也種痘者全資乎此以為胎毒之引導關係匪輕選苖時宜留神細察不可輕忽其中有可用者有不可用者惟在痘之順與不順别之痘之不順者出不尖圓色不紅潤漿不充滿所落之痂黑暗而薄此天人合病內外合邪所致即幸而得愈亦不過良工之善為調治非天然之美此等痘痂斷不可用痘之順者始終無夾雜之證出則尖圓色則紅潤漿則充滿所落之痂蒼蠟光澤肥大厚實此得天地隂陽之正氣極順之苖也收而用之效如響應但此痂甚少所遇無多或不能親其事而假手他人亦必令彼身親目覩方可否則寧置而不用切勿濫用種者審之蓄苖種痘必資於苖而苖之所竒恃者在氣之相通耳若遇熱則氣泄日久則氣薄觸汚穢則氣不清藏不潔則氣不正此蓄苗之法所以不可不慎也如遇好苖須貯新磁瓶內上以物密覆之置於潔淨之所清涼之處其所貯之苖在春天者一月之痂可種冬令嚴寒四五十日之痂尚可種蓋寒則氣收藏熱則氣易泄故時日有不同也然於未收苖時即當先與出痘之家明言其故使彼樂從無所疑忌彼方肯用心收貯不致稍有貽誤也天時種痘貴得天時得其時則種不得其時則不種夫天時之正莫過於春春為萬物發生之際天氣融和不寒不熱種之則痘自隨其氣而發生此正二三月之時所以可種也若交夏之後六陽盡出地上人之陽氣亦皆外浮暑熱爍金受病者衆斯時種痘兒何以堪此四五六月之時所以必不可種也至若秋令天氣清肅收斂之時雖遇可種之兒而無引毒之具此七八九月之時勢有不能種也至於十月名曰小春雖亦可種然斯時寒氣固結純隂用事不若俟冬至後一陽鼓動借其生生之氣種之甚吉此十月之所以可種猶不若十一十二月之尤可種也然當可種之時亦有不可種者如春應溫而反寒夏應熱而反涼秋應涼而反熱冬應寒而反溫當其時而非其氣是天地不正之氣也常人感染則成時疫小兒調理未遑况敢言種痘乎倘或遇此只宜稍避俟時氣平定再為議種方保萬全亦有未種之時天時甚正既種之後忽爾寒暄不時此又人事所遇不齊偶爾變氣出乎意外者也則宜屋中適其寒溫順會天時常燒辟穢香飲食起居更加謹慎可保無恙種痘者宜詳審而體察之擇吉下苖之日必擇成日開日栽種日及合天月二德日則吉倘三者不能兼備即成開之日亦可若值人神所在之日忌不可種種痘吉日成日開日栽種日天月二德日正五九月在丙二六十月在甲三七十一月在壬四八十二月在庚人神所在之日十一日在鼻柱十五日在遍身調攝種痘之在調攝最為緊要自始至終不可稍忽如避寒熱慎飲食是也天氣嚴寒蓋覆宜溫暖勿使受寒恐被寒氣所觸則痘不得出亦不可過於重棉疊褥使熱氣壅滯致痘不宣發天氣溫暖蓋覆宜適中恐客熱與毒相併致增煩熱亦不可輕易著單露體使寒邪外侵阻遏生發之氣此寒熱所以貴得其平也人之氣血必藉飲食生化痘之始終全賴乎此若飲食虧少氣血何所資助乎但不可過甚若過飲則飲停不化津液過食則食滯必生痰熱所以吮乳之兒不多乳不闕乳能食之兒勿餐辛熱炙煿勿啖黏硬生冷勿恣意茶水勿使飲涼漿食不過飽亦不過飢此飲食所以貴得其平也至於寒熱飲食之外凡舉止動作既不可任意驕縱亦不可過於拂逆惟在調攝之人耐其性情兢兢業業善為保護不但慎於既種之後且當慎於未種之先不但慎之見苖之初尤當慎之落痂之後種痘者宜諄諄告誡務期詳細使彼知關係匪輕心存謹慎如法調攝始保萬全倘稍有不謹以致小兒或為寒熱所侵或為飲食所傷咎將誰諉乎此不知調攝者所以斷不可與種也禁忌種痘之家房中最要潔淨切忌沖犯最喜明亮不可幽暗擇老成耐事之人經過小兒出痘者令其調護不離左右一切禁忌俱當謹遵勿詈罵呼怒勿言語驚慌勿對梳頭勿對搔癢勿嗜酒勿歌樂凡房中淫液氣婦人經候氣腋下狐臭氣行逺勞汗氣誤燒頭髮氣誤燒魚骨氣吹滅燈燭氣硫磺柴煙氣蔥蒜醉酒氣溝渠汚濁氣悉宜避之更當預囑其左右之人倘值迅雷烈風暴雨之變大宜安定勿使兒驚其幃帳宜謹蓋覆宜密切勿暴動生風常燒辟穢香以避偶爾不正之氣再令人謹伺其門不許生人往來不許僧道師巫孝服之人入室以上禁忌一一遵守則吉稍有疏忽每至敗事種痘者切宜諄諄告誡之辟穢香南蒼术半斤川大黃四兩右銼細片爐中燒之不可間斷可種小兒面部紅潤精采明亮透達印堂山根年夀眼下口角無青暗之色兩目黑白分明視瞻平正愈看愈有神氣精光囟不陷不填頭不解顱鼻孔不小氣清不濁聲音清亮天柱骨正頸不歪斜骨肉相稱又宜緊束肥不見肉瘐不露骨小便逺而長腎囊緊小微帶紫黑色如荔枝殼身無􅬌癬瘡疥項無結核腹無積聚形氣充實精神強健臟腑調順脈息和平以上皆可種不可種小兒面色青白或黧黑痿黃無喜色無精采兩目黑多白少白睛𢃄青色視瞻歪斜暗昧無神囟陷囟填解顱囟不合五軟五鞕龜胸龜背鶴膝鼻孔小氣濁聲音不亮不長肉不束骨鬆如發麵樣身體瘦無䐃肉身有􅬌癬瘡疥腹有疳積項有結核病後元氣未復素有驚癎之證失乳之後氣血不足脾胃虛弱精神倦怠脈不和平以上皆不可種凡小兒父母行事踈忽不知調攝不聽禁忌不信醫藥過於溺愛驕縱者亦斷不可與種水苗種法種痘之時要細閲小兒氣血沖和臟腑均平內無痰熱食積所傷外無六淫之氣相侵方可用上好痘痂種之一嵗者用二十餘粒三四嵗者用三十餘粒置於淨磁鍾內以栁木作杵碾為細末以淨水滴三五點入鍾內春溫用冬熱用乾則再加水幾點總以調勻為度不燥不濕用新棉些須攤極薄片裹所調痘屑在內揑成棗核樣以紅線拴定仍留寸許長則剪去將苗納入鼻孔分男左女右不可離人時時看守倘小兒用手拈弄急禁止之或被嚏出急將苗塞鼻內不可稍緩恐泄苗氣下苖後必以六個時辰為度然後取出如遇天氣嚴寒多留數刻若遇時令和暖早取數刻亦可要在臨時斟酌痘苖取出之後其苖氣漸次而入傳遍五藏至七日始發熱發熱三日而苖見見苖三日而出齊出齊三日而灌漿漿足三日而回水結痂大功成矣五藏傳送之理鼻者肺之外竅也水苖種法以苖塞鼻中其氣先傳於肺肺主皮毛肺傳於心心主血脈心傳於脾脾主肌肉脾傳於肝肝主筋肝傳於腎腎主骨痘毒藏骨髓之內感苗氣而發其毒自骨髓盡達於筋腎藏之毒解矣自筋盡達於肌肉肝藏之毒解矣自肌肉盡達於血脈脾藏之毒解矣自血脈盡達於皮毛心藏之毒解矣自皮毛盡達於顆粒肺藏之毒解矣五藏之毒層遞而解然後毒化漿成收靨落痂此種痘傳送之次序也不可不知旱苗種法旱苖種法用銀管約長五六寸曲其頸碾痘痂極細納於管端按男左女右對凖鼻孔吹入之至七日而亦發熱今時多用此法蓋取其簡便捷入不致脫落而有透泄苖氣之患也苐恐後人用之不善輕吹之則不驟入重吹之則迅烈難當且恐流涕過多苖隨涕去往往不驗今欲垂法後世當取其法之和平穩當萬全者而則效之此所以獨取於水苖也痘衣種法小兒出痘者當長漿漿足之時則彼痘氣充盛取其貼身裏衣與未出痘之兒女服之服二三日夜間亦不脫下至九日十一日始發熱此乃衣傳然恐氣薄不透多有不熱不出其法不靈故不可用痘漿種法擇小兒出痘之順者取其痘漿以棉拭之分男左女右塞入鼻中亦能發痘但取痘漿之時不令本家知覺揑破痘漿盜以作種使彼真氣宣泄毒不能解此忍心害理不仁之事也同志者切宜深惡而痛絶之又豈可尤而效之也哉信苖種痘發熱以前小兒面部上忽出顆粒似痘名曰信苗此痘之將發毒氣之標也色紅而軟聽之自消若紅紫堅硬有如魚目者急以銀針挑破上以二聖散則無虞二聖散明雄黃紫草各等分共碾為細末用油胭脂調上補種下苖後宜令親切之人左右看守恐他人用心之不慎也若視為泛常看守疏忽恐小兒惡其苖塞鼻中不時揑出使苖氣一泄種多不驗所以種而不發者亦有之也然或小兒五內壯實不受苖氣艱於傳進不發者亦有之更有胎毒深邃潛藏內蓄雖苗氣傳至不能引出不發者亦有之俱當俟踰十一日為度過此不發然後察天時和順再為補種亦可自出種痘以七日為期五藏傳遍始發熱者常也或有至九日十一日而發者此傳送遲慢之故亦無足慮若發熱於五日以前此時苖氣尚未傳至其毒何由而發必因種後適逢天行時氣小兒感染而成是乃自出之痘非關苖氣引出者種痘者不可不知要當於未種之時預為申明其説焉治法種痘乃引毒達表乘兒安寧無病之時事屬順吉又何言治然恐痘家過於溺愛起居不謹飲食不節此病所由生也故治法亦所不免當悉照治正痘之法治之可也御纂醫宗金鑑卷六十
