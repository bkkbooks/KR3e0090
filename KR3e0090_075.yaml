body:
  text: 編輯外科心法要訣目録雜證部跌撲金瘡箭頭入肉鐡針入肉鐡針誤入咽喉誤吞銅錢骨鯁咽喉杖瘡夾傷竹木刺入肉破傷風發痙湯火傷凍瘡人咬傷熊虎狼傷人馬咬傷瘋犬咬傷馬汗驢涎入瘡蛇咬傷蜈蚣咬傷蠍螫蠶咬射工傷蚯蚓傷天蛇瘡蠷螋傷百蟲入耳御纂醫宗金鑑卷七十五目録欽定四庫全書御纂醫宗金鑑卷七十五編輯外科心法要訣目録雜證部跌撲金瘡箭頭入肉鐡針入肉鐡針誤入咽喉誤吞銅錢骨鯁咽喉杖瘡夾傷竹木刺入肉破傷風發痙湯火傷凍瘡人咬傷熊虎狼傷人馬咬傷瘋犬咬傷馬汗驢涎入瘡蛇咬傷蜈蚣咬傷蠍螫蠶咬射工傷蚯蚓傷天蛇瘡蠷螋傷百蟲入耳御纂醫宗金鑑卷七十五目録欽定四庫全書御纂醫宗金鑑卷七十五編輯外科心法要訣雜證部跌撲跌撲之證屬尋常復元活血湯最良已破亡血八珍服未破血瘀大成湯注此證有已破未破之分亡血瘀血之别如尋常跌撲微傷皮肉疼痛未破者以復元活血湯散瘀活血若損傷筋骨血流過多不止者即為亡血急用花蕊石散乾撒止血內服八珍湯加酒炙骨碎補續斷紅花若從高跌墜未曽損破皮肉者必有瘀血流注臟腑人必昏沈不醒二便祕結當以大成湯通利二便其人自醒若便利不醒者灌獨參湯救之大成湯大黃三錢朴消枳殼各二錢麩炒厚朴薑炒當歸紅花木通蘇木陳皮甘草各一錢生水二鍾煎八分不拘時服服後二時不行渣再煎加蜜三匙沖服方歌大成活瘀便立通消黃枳殼厚歸紅木通蘇木陳皮草煎服不行加蜜沖復元活血湯當歸尾二錢柴胡一錢五分穿山甲炙研紅花栝蔞仁各七分甘草五分桃仁十七個大黃三錢水二鍾酒二鍾煎一鍾食逺服以利為度方歌復元活血跌撲證惡血流瘀積滯疼山甲柴紅栝蔞草桃仁歸尾大黃行花蕊石散見發無定處血痣八珍湯獨參湯俱見潰瘍門金瘡金瘡須宜驗傷痕輕傷皮肉重傷筋外撒如聖桃花散血多八珍湯獨參注此證有金刃傷箭鏃傷磁鋒傷須看傷痕深淺輕者皮肉破損血流不住以桃花散撒之重者筋斷血飛係大脈已傷用如聖金刀散撒上以絹帛扎住止而復流再撒若藥痂過厚拘痛者以生肌玉紅膏塗傷處外貼陀僧膏長筋止痛生肌治之無論輕重傷破出血初服三黃寶蠟丸傷破微出血者服黎洞丸若出血過多其人面黃眼黑不可專攻瘀血宜用八珍湯甚者獨參湯先固根本二方俱加蘇木紅花兼調瘀血此證雖係好肉暴傷然驗脈法形證亦可以定生死如傷血過多脈見虛細沈小和緩者生若脈見浮洪數大實虛促者死被傷入肺者二七死左脅下傷內者腸全斷者少腹下傷內者傷處繁多者老人左股壓碎者傷破陰子者肩內耳後傷透於內者死凡傷天窗穴與眉角腦後臂裏跳脈髀內陰股兩乳上下心下鳩尾及五臟六腑之俞者皆死腦後出髓而不能語目睛直視喉中沸聲口急唾出兩手妄舉者亦死又有腹皮損破腸出者看腸若僅傷一半者可治先以大麥煮粥取濃汁溫洗其腸以桑皮尖茸為線蘸花蕊石散縫腸傷口急於縫處塗活雞冠血隨以清油塗腸令潤將腸輕輕納入腹內外用生人長髮密縫腹傷口之裏肉留外皮撒月白珍珠散以待生肌斂口若傷口大者不能外縫以陀僧膏護貼候自潰膿即按潰瘍門治法縫後勿驚笑以米飲少少飲之漸增待二十日後再喫濃粥調理而愈三黃寶蠟丸藤黃四兩製法見黎洞丸內天竹黃無真者九轉南星代之紅芽大戟劉寄奴血竭各三兩孩兒茶雄黃各三兩朴消一兩當歸尾一兩五錢鉛粉汞即水銀乳香麝香各三錢琥珀二錢各研極細末稱凖和一處將水銀同鉛粉在鐡鍋內火上熱研成末入前藥內共研勻用煉淨黃蠟二十四兩放磁器內坐滚水中化開將藥入內攪勻病重者每丸一錢病輕者每丸五分熱黃酒調服倘受傷至重連服數次服藥後飲酒出汗更妙又治一切惡瘡以香油化開敷之甚效方歌三黃寶蠟琥天竹大戟兒茶消寄奴雄竭藤黃鉛粉汞乳歸麝碾去其粗蠟丸黃酒熱調服外治惡瘡油化敷能療金瘡傷損證續筋瘀散痛全無黎洞丸三七生大黃阿魏孩兒茶天竹黃血竭乳香沒藥各二兩雄黃一兩山羊血五錢無真者以小子羊鮮心血代之冰片麝香牛黃各二錢五分末以上各研細藤黃二兩荷葉露泡之隔湯煮十餘次去浮沈取中以秋將山羊血拌入曬乾取秋露水化藤黃拌藥搗千餘下如乾加煉蜜少許為丸重一錢黃蠟封固每用一丸黃酒化服外敷亦用黃酒磨塗此藥如在夏天修和取天落水拌之為丸方歌黎洞金瘡跌撲傷發背癰疽諸惡瘡瘰癧刑傷瘋犬咬蜂蛇蠍毒服敷良三七大黃冰麝魏兒茶天竹竭藤黃羊血牛雄黃乳沒秋露和丸酒化強桃花散見發無定處血箭如聖金刀散見足部脫疽生肌玉紅膏陀僧膏八珍湯獨參湯月白珍珠散俱見潰瘍門花蕊石散見發無定處血痣箭頭入肉附毒箭箭頭入肉鉗不出解骨丸納羊脂敷燋銅毒箭金汁解射菵中人藍汁塗注箭頭嵌入肉內鉗不出者宜解骨丸納傷口內外用羊腎脂細嚼貼之覺癢忍之極癢箭頭漸冒撼動拔出即以人尿洗之貼陀僧膏日換傷口自斂又有毒箭二種交廣蠻夷用燋銅作箭鏃甚毒人若中之才傷皮肉便悶膿沸爛而死急飲金汗外亦用金汁抹之若金汁一時不得即灌人糞汁並外敷之非此不能解毒也又一種以毒藥喂箭名為射菵人若中之甚解急用葛氏方用藍錠汁一碗灌之外亦用塗抹傷處一法用大豆豬羊血內服外敷解毒亦效又箭鏃不出者搗鼠肝塗之或鼠腦搗塗即出解骨丸蜣螂研雄黃象牙末各等分共和勻煉蜜為丸如黍米大納傷口處方歌解骨丸能拔箭鏃蜣螂雄黃功效速象牙末加蜜煉丸大如黍米納傷處陀僧膏見潰瘍門鐡針入肉鐡針入肉隨氣遊走向心胸險可愁烏鴉翎灰酒調服膏貼針出始免憂注凡鐡針誤入肉中無眼者不動有眼者隨氣遊走若走向心窩胸膛者險急用烏鴉翎數根炙焦黃色研細末酒調服一錢或二錢俱可外用神聖膏貼三五次其針自出前法用在一二日間效神聖膏用車脂輦油不拘多少研如膏調慈石末攤紙上如錢許貼之每日二換鐡針誤入咽喉誤吞鐡針入咽喉急飲蝦蟆血數頭針不即吐笤籬散或食飴糖出不留注鐡針誤入咽喉無藥可施宜用癩蝦蟆數個將頭刴去倒垂流血以碗接之得一杯許灌入喉中移時連針吐出針自軟曲一方用舊笤籬煆存性研末每服三錢黃酒調服亦能化針或用飴糖一斤食盡便出誤吞銅錢誤吞銅錢雖無疼久留腹中病必成荸薺能化堅為軟多食無傷可化銅注誤吞銅錢多食荸薺即能化堅為軟若誤吞鐡骨等物腸中不能轉送覺墜者多食青菜豬脂自然送入大腸與糞同出甚效骨鯁咽喉骨鯁咽喉最可憂吐咽刺痛礙咽喉魚骨須用鴨涎灌獸骨狗涎灌即瘳注此證由咽物急迫骨鯁於咽喉妨礙飲食吐咽刺痛宜急治之然有魚骨獸骨之分誤吞魚骨者用河中養蓄活鴨倒挂垂涎以磁碗接下令患人仰卧頻灌其骨盡化誤吞獸骨者用狗一隻倒挂接涎如前法頻灌其骨盡化俱效若失治咽喉腫痛潰膿宜用氷硼散吹之不可妄服涼藥若骨勢大者與飲食難下餓倒胃氣者俱屬難救冰硼散見口部鵝口瘡杖瘡杖瘡須宜看其形已破未破要分明清涼拈痛膏破用敷之消腫並止疼未破瘀血須當砭湯劑急宜用大成玉紅膏貼瘀腐痛搽之新肉自然生注此瘡有已破未破之分已破者隨杖後用清涼拈痛膏敷之疼腫即消未破瘀血內攻者急宜砭去瘀血內服大成湯便通自愈如傷處瘀腐作疼者生肌玉紅膏搽之自然腐化新生其效甚捷清涼拈痛膏如意金黃散一兩加樟腦末三錢和勻又用生白石灰塊三四斤許以水泡開水高石灰二三指露一宿將石灰面上浮起油水結如雲片者輕輕帶水起入碗內有水一種對香油一鍾竹筯攪百轉自成稠膏調前藥稀稠得所不用湯洗遍敷傷處紙蓋布扎夏月一日冬月二日方用蔥湯淋洗乾淨仍再敷之以腫消痛止為度方歌清涼拈痛金黃散加入樟腦末三錢杖瘡破後多疼痛石灰水油調敷痊大成湯見跌撲生肌玉紅膏見潰瘍門如意金黃散見腫瘍門夾傷夾傷禁用藥貼敷硃砂燒酒可調塗瓊液散服隨飲醉腫勢必消痛自除復受重刑潰破者代杖湯藥速宜圖氣血弱者當大補六真膏貼痛即無注夾傷即擠傷也禁用敷藥膏藥及泥塗等法恐後必作腫成膿受刑初宜服代杖丹以護心隨用銀硃或硃砂末燒酒調敷傷處再著一人以手十指尖輕啄患者腳心先覺癢次覺疼為止次著一二人以筆管於患者腳面上輕輕趕之助通血脈候傷處凹者突起四圍腫大為度即服瓊液散隨飲至醉次日揩去所敷銀硃只用洗杖傷湯日燙二三次次日再服瓊液散其腫自消痛即止矣如復受重刑以致破潰者外貼瓊液膏內服代杖湯繼宜大補氣血易於收功生肌時換貼六真膏其效甚捷代杖丹丁香蘇木蚯蚓去土無名異丹皮肉桂木鱉子乳香沒藥自然銅各一兩淬七次火煅醋右為末煉蜜和丸二錢重用一丸黃酒化下方歌代杖護心血不攻丁香蘇木蚓無名丹皮肉桂木鱉子乳香沒藥自然銅瓊液散閙羊花擇去梗蒂蕊葉洗去灰沙曬乾砂鍋微焙為末每服五分壯者七分先飲醇酒至半酣次用調藥服下再飲至大醉為度靜卧勿語語則發麻至次日其麻方解消腫止疼其功甚捷連服三五次弱者間一二日再服方歌瓊液散消瘀血滯豫酌酒至半酣時閙羊花末調服下􅀈漿復飲醉如癡洗杖湯陳皮透骨草南星天門冬地骨皮天靈蓋各五錢象皮一兩切碎水煎浸洗日三二次方歌洗杖湯陳透骨星天冬地骨共天靈象皮水煎日勤洗夾傷消腫又除疼瓊液膏當歸尾閙羊花紅花白芷蒲黃各二兩香油一斤浸藥七日煠枯去渣入白蠟黃蠟各一兩溶化盡絹濾淨稍溫再入氷片六分沒藥乳香末各六錢攪勻攤貼方歌瓊液膏貼夾傷破歸閙紅花芷蒲黃油煠又下白黃蠟再加氷片沒乳香代杖湯乳香沒藥蘇木各二錢蒲黃木通枳殼麩炒甘草生當歸尾丹皮木耳穿山甲各一錢炙研土木鱉五個焙酒水煎服方歌代杖湯醫夾傷驗乳沒蒲黃通枳甘歸尾丹皮鱉木耳酒煎蘇木炙穿山六真膏樟腦三兩孩兒茶滴乳香血竭沒香三七共為末用豬脂油十二兩碗盛水煮化將藥入油內和勻攤貼方歌六真膏貼夾杖傷樟腦兒茶滴乳香竭沒三七脂油化和敷諸瘡也相當竹木刺入肉諸刺入肉係外傷螻蛄搗塗最為良如刺已出仍作痛再塗螻蛄即無妨注諸刺入肉外傷之證也軟淺者以針撥出硬深者搗螻蛄塗之少時即出如刺已出而仍作痛者再以螻蛄塗之即愈破傷風皮肉損破外傷風初覺牙關噤不鬆甚則角弓反張狀吐涎抽搐不時寧四因動靜驚潰審陷縮神昏不語凶在表宜汗裏宜下半表半裏以和平注此證由破傷皮肉風邪襲入經絡初起先發寒熱牙關噤急甚則身如角弓反張之狀口吐涎沫四肢抽搐無有寧時不省人事傷口鏽澀然傷風有四因動受靜受驚受瘡潰後受皆可傷風動而受者怒則氣上其人跳躍皮肉觸破雖被風傷風入在表因氣血鼓旺不致深入屬輕靜受者起作和平之時氣不充鼓偶被破傷風邪易於入裏屬重驚受者驚則氣陷偶被傷破風邪隨氣直陷入陰多致不救屬逆若風邪傳入陰經者則身涼自汗傷處反覺平塌陷縮甚則神昏不語嘬口舌短其證貴乎早治當分風邪在表在裏或半表半裏以施汗下和三法如邪在表者寒熱拘急口噤咬牙宜服千里奔散或雄鼠散汗之次以蜈蚣星風散頻服追盡臭汗如邪在裏者則驚而抽搐臟腑祕澀宜江鰾丸下之如邪在半表半裏無汗者宜羌麻湯主之若頭汗多出而身無汗者不可發汗宜榆丁散和之若自汗不止二便祕赤者宜大芎黃湯主之又有發表太過臟腑雖和自汗不止者宜防風當歸散服之發表之後表熱不止者宜小芎黃湯服之攻裏之後裏熱不止宜栝石湯服之若傷時血出過多不可再汗宜當歸地黃湯主之至於生瘡潰後受風者因生瘡潰而未合失於調護風邪乘虛侵入瘡口先從瘡圍起粟作癢重則牙緊項軟下視不宜發汗誤汗令人成痙當以參歸養榮湯加殭蠶主之先固根本風邪自定若手足戰掉不已者宜硃砂指甲散主之若痰盛抽搐身涼者宜黑花蛇散主之外治之法遇初破之時一二日間當用灸法令汗出其風邪方解若日數已多即禁用灸法宜羊尾油煮微熟絹包乘熱尉破處數換拔盡風邪未盡者次日再尉兼用潄口水洗之日敷玉真散至破口不鏽生膿時換貼生肌玉紅膏緩緩收斂按劉完素只論三陽汗下和三法而不論三陰者蓋風邪傳入陰經其證已危如腹滿自利口燥咽乾舌捲囊縮等類皆無可生之證故置而不論也千里奔散用行逺路騾蹄心陰陽瓦煅存性研細每服三錢熱黃酒沖服方歌千里奔散破傷風口噤拘急寒熱攻騾蹄火煅存性研每服三錢黃酒沖雄鼠散活雄鼠一枚用鐵線縳繞陰陽瓦煅存性研為細末作一服熱黃酒調下方歌雄鼠破傷風居表活鼠一枚鐡線繞陰陽瓦煅存性研酒調盡服風邪了蜈蚣星風散蜈蚣二條江鰾三錢南星防風各二錢五分共研細末每用二錢黃酒調服一日二服方歌蜈蚣星風邪末散搜風發汗去風源南星江鰾防風末酒服經絡自通宣江鰾丸天麻雄黃各一錢蜈蚣二條江鰾殭蠶炒野鴿糞各五分炒共研細末作兩分一分飯丸如梧桐子硃砂為衣一分加巴豆霜二分五釐飯丸如梧桐子大每用硃砂藥二十丸如巴豆藥一丸二服加二丸白滚水送下至便利為度再服硃砂藥病愈即止方歌江鰾破傷風入裏驚兼抽搐下之宜天麻蜈蚣殭鴿糞雄黃巴霜丸硃衣羌麻湯羌活麻黃川芎防風枳殼麩炒白茯苓石膏煅黃芩細辛甘菊花蔓荆子前胡甘草各七分生白芷薄荷各五分生薑三片水二鍾煎八分服方歌羌麻湯芎風枳殼苓芷石膏芩薄荷細辛菊蔓前甘草發汗破傷風即瘥榆丁散防風地榆紫花地丁馬齒莧各五錢共研細末每服三錢溫米湯調下方歌榆丁破傷風為患頭汗身無不宜散此藥米湯服解和防榆地丁馬齒莧大芎黃湯黃芩羌活大黃各二錢川芎一錢水煎服以微利為度方歌大芎黃治破傷風汗多便祕小水紅水煎黃芩與羌活大黃切片共川芎防風當歸散防風當歸川芎生地各二錢五分水煎服方歌防風當歸表太過臟腑雖調汗出多只將四味水煎服川芎生地共相和小芎黃湯川芎二錢黃芩二錢甘草五分生水煎溫服方歌小芎黃湯發散後表熱猶存用此醫芎芩甘草煎溫服退熱除根神效竒栝石湯栝蔞仁九錢滑石一錢五分蒼术米泔水浸炒南星赤芍陳皮各一錢白芷黃蘗黃芩黃連甘草二分生生薑三片水三鍾煎一鍾服之方歌栝石芍芷蘗芩連蒼术南星陳草煎醫治破傷風下後熱猶不解服之痊當歸地黃湯當歸熟地川芎藁本白芍酒炒防風白芷各一錢細辛水煎服方歌當歸地黃芎藁本白芍防風芷細辛破傷之時血出甚服此滋榮風不侵參歸養榮湯人參當歸川芎白芍酒炒熟地白术土炒白茯苓陳皮各一錢甘草五分炙生薑三片紅棗肉二枚水煎服方歌參歸養榮榮衛虛潰瘡失護風邪居生薑三片一枚棗八珍湯內入陳皮硃砂指甲散人手足指甲燒存性用六錢硃砂南星獨活各二錢共研細末每用四錢熱黃酒調下方歌硃砂指甲散神效破傷風侵手足搖每用四錢熱酒服南星獨活指甲燒黑花蛇散麻黃一兩炙黑花蛇六錢蛇酒浸即烏天麻白附子乾薑川芎附子製草烏各五錢泡去皮蠍稍二錢五分共研細末每服一錢熱黃酒調下日二服方歌黑花蛇散蠍麻黃天麻白附子乾薑川芎附子草烏泡善却風痰醫破傷玉真散白芷南星白附子天麻羌活防風各一兩共研細末吐津調濃敷傷處如破傷風初起角弓反張牙關緊急每用三錢熱童便調服亦妙方歌玉真散芷共南星白附天麻羌活風破傷風襲傳經絡熱酒調服立奏功生肌玉紅膏見潰瘍門發痙潰瘍發痙類破傷有汗為柔無汗剛膿血出多成此證補正驅邪要審詳注此證勢類破傷風牙緊體強肢搐背反有汗曰柔痙無汗曰剛痙由潰瘍亡血過多所致治宜大補氣血以十全大補湯加釣藤鈎梔子天麻服之不應者服獨活湯手足逆冷加桂附誤作風痙汗之則危十全大補湯獨參湯俱見潰瘍門湯火傷湯燙火燒皮爛疼皰起挑破使毒輕煩躁作嘔防毒陷便祕神昏氣喘凶注此證係好肉暴傷湯燙火燒皮膚疼痛外起燎皰即將皰挑破放出毒水使毒輕也其證雖屬外因然形勢必分輕重輕者施治應手而愈重者防火毒熱氣攻裏令人煩躁作嘔便祕甚則神昏悶絶初傷用冷燒酒一鍾於無意中望患者胸前一潑被吃一驚其氣必一吸一呵則內之熱毒隨呵而出矣仍作煩悶者以新童便灌之外初用清涼膏塗之解毒止痛不致臭爛次以鶯粟膏塗之痛止生膿時換黃連膏貼之收斂火毒攻裏者宜四順清涼飲服之務令二便通利則毒熱必解初終禁用冷水井泥浸溻傷處恐熱毒伏於內寒滯束於外致令皮肉臭爛神昏便祕端肩氣喘多致不救外花炮火藥烘燎者治法同前鶯粟膏鶯粟花十五朵無花以殼代之香油四兩將鶯粟煠枯濾淨入白蠟三錢溶化盡傾入碗內待將凝之時下輕粉二錢攪勻炖水中令冷取出臨用時抿腳挑膏手心中捺化搽於傷處綿紙蓋之日換二次其痛自止次日用軟帛挹淨腐皮再搽之方歌鶯粟膏醫湯火燒香油鶯粟共煎熬白蠟更兼真輕粉患上搽塗痛即消清涼膏水潑開石灰末一升加水四碗攪渾澄清取清汁一碗加香油一碗以筯順攪數百轉其稠黏如糊用雞翎蘸掃傷處黃連膏見鼻部鼻瘡四順清涼飲見面部痄腮凍瘡凍瘡觸犯嚴寒傷氣血肌肉硬腫殭涼水揉溻覺熱散大忌烘火立成瘡注此證由觸犯嚴寒之氣傷及皮肉著凍以致氣血凝結肌肉硬腫殭木不知痛癢即在著痛之處墊衣揉搓令氣血活動次用涼水頻洗覺熱殭木處通活如故則已若日久凍殭疙􅜀不散用冰一塊絹包溻之以殭疙􅜀化盡為度此從治之法也若暴凍即著熱或進暖屋或用火烘湯泡必致肉死損形輕則潰爛重則骨脫筋連急剪去筋否則浸淫好肉初治宜人參養榮湯加醇酒服之潰爛者外按癰疽潰瘍治法亦有經年不愈者用獨勝膏敷之甚效獨勝膏於六月初六十六二十六日用獨頭蒜杵爛日中曬熱塗於凍發之處即於日中曬乾忌患處著水人參養榮湯見潰瘍門人咬傷人咬係受牙毒傷腫痛臭爛異尋常始終惟宜童便洗蟾酥條餅功最良注此傷由人牙齒食用炙煿之物漸漬有毒故一受其傷則腫痛臭爛異於尋常初咬時用熱童便浸傷處洗去牙黃汚血貼蟾酥餅以萬應膏蓋之出微膿即愈若失治則爛痛發腫仍用童便浸洗次用油紙撚點火於患處薰之良久插蟾酥條如傷口大作餅罨上萬應膏蓋之俟腫消時用蔥白二兩甘草五錢水煎日洗一次換生肌玉紅膏蓋貼萬應膏收口一法隨於咬後即用童便洗之大糞塗之腫潰時人中黃熬湯時洗較諸治法尤覺神效蟾酥餅蟾酥條俱見疔瘡門萬應膏生肌玉紅膏俱見潰瘍門熊虎狼傷人熊虎狼傷致成傷內外服洗葛根湯青布撚薰鐡湯洗獨窠栗子嚼塗傷注熊虎狼牙爪傷人皮肉成瘡者初宜葛根濃煎內服一二鍾外洗日十度或煮生鐡有味者洗之又用青布急捲為繩撚著納竹筒中注瘡口薰之出毒水次宜獨窠栗子生嚼塗傷口效馬咬傷馬咬傷時損肌肉栗子嚼爛敷患處若逢毒氣入裏者馬齒莧湯速宜服注此傷用栗子嚼爛敷之毒氣入裏心煩嘔悶者馬齒莧煎湯飲之即效外用馬鞭子挽手及鞭穗煅灰存性研末豬脂搗合貼之俱效瘋犬咬傷瘋犬咬傷毒最深刺吮糞灸尿洗淋頂心紅髮當拔去三年禁忌保終身注犬因五臟受毒而成瘋犬故經其咬必致傷人九死一生之證也初被咬時急就咬處刺令出毒血以口含漿水吮洗傷處或以拔法拔之或以人尿淋洗拭乾即用核桃殼半邊以人糞填滿罨在咬處上著艾灸之殼焦糞乾再易灸至百壯以玉真散唾津調敷次日再灸漸灸至三五百壯為度於初灸時即服扶危散逐惡物血片從小水中出若毒物血片堵塞莖中致小水澀滯若淋者即服琥珀碧玉散以通利之被咬之人頂心有紅髮一根速當拔去一法用豆䜴研末香油調稠丸如彈子大常揩拭所咬處搯開看豉丸內若有狗毛茸茸然此係毒氣已出易丸再揩至無茸毛方止甚效始終禁忌必當慎重終身忌食狗肉及蠶蛹赤豆百日內忌見麻物忌飲酒三年內忌食一切毒物及房事可常食杏仁以防其毒若治遲犬毒入心煩亂腹脹口吐白沫者用虎頭骨虎牙虎脛骨為末酒調二錢服之若發狂叫喚人聲似犬聲眼神露白者逆終始犯禁忌者不救扶危散螌蝥按日數用之如犬咬已竟七日用七個十日用十個去翅足加糯米同炒去米滑石一兩水飛雄黃一錢麝香二分共研細末每服一錢溫酒調下不飲酒者米湯調下方歌扶危散治瘋犬咬螌蝥糯米一同炒滑石雄黃與麝香研加酒服毒即掃琥珀碧玉散滑石六兩甘草一兩琥珀五錢青黛八分共研細末每服三錢燈心煎湯調下方歌琥珀碧玉用六一黛珀同加研極細燈心湯調服三錢滑澀能醫小水利瘋犬咬傷拔法用砂燒酒壺兩個盛多半壺燒酒先以一壺上火令滚無聲傾去酒即按在破傷瘡口拔出汚黑血水滿則自落再以次壺仍按瘡口論流提拔以盡為度其證立愈玉真散見破傷風馬汗驢涎入瘡潰瘡誤犯馬汗傷焮痛紫腫瘡四旁急砭腫處出紫血烏梅嚼爛塗敷良患者煩熱毒攻腹強弱量服馬莧湯更有騾涎入瘡者冬瓜青皮末敷瘡注此證係潰瘡未合誤入馬汗之毒以致瘡口四旁忽復焮痛紫腫宜急砭腫處令出紫血烏梅嚼爛塗於瘡上若患者煩悶發熱恐毒入腹以致不救急用醇酒濃煎馬齒莧飲之盡醉為效但馬齒莧其性寒滑凡瘡潰未合氣血未復而又受此汗毒必量人壯弱用一兩或五錢更有驢涎入瘡者形證與馬汗毒同宜用冬瓜片下青皮晒乾研末敷之熬湯洗之亦可毒甚者亦用馬齒莧酒飲之立效蛇咬傷蛇咬傷時即飲醋仍宜用繩扎患處再服五靈共雄黃腫消口合自如故注凡被蛇咬傷者即時飲好醋一二碗使氣不隨血走以繩扎傷處兩頭若昏困宜用五靈脂五錢雄黃二錢五分共為末酒調二錢灌之少時咬處出黃水水盡則腫消以雄黃末摻之口合而愈蜈蚣咬傷蜈蚣咬傷用雄雞倒控雞涎手蘸之扶搽傷處痛立止甚飲雞血最相宜注此傷取雄雞倒控少時以手蘸雞口內涎抹搽傷處其痛立止甚者生雞血乘熱飲之立效蠍螫蠶咬蠍螫急取大蝸牛搗爛塗之痛立休蠶咬須將苧根搗取汁搽塗患即瘳注凡蠍螫取大蝸牛一個搗爛塗之其痛立止一時不得蝸牛即將螫處擠去毒水急用膏藥烤熱貼之亦能止痛蠶咬者用苧根搗汁塗之即愈射工傷射工傷人必癢痛甚則骨肉爛成瘍豆豉搗敷白芷洗已爛海螵蛸末良注射工即樹間雜毛蟲也又名瓦刺蟲人觸著則能放毛射人初癢次痛勢如火燎久則外癢內痛骨肉皆爛諸藥罔效用豆豉清油搗敷痛癢之處少時則毛出可見去豆豉用白芷煎湯洗之如肉已爛用海螵蛸末摻之即愈蚯蚓傷蚯蚓咬傷受毒氣眉髯脫落全無迹法用鹽湯頻頻洗久則其毒自然去注蚯蚓咬傷即受蚯蚓之毒令人眉髯皆落狀如大麻風但夜則蚓鳴於體中為異耳宜用鹽湯頻頻洗之其毒自去天蛇瘡天蛇瘡發肌膚中似癩非癩是其形證因草內蜘蛛毒復被露水侵始生注此證生於肌膚似癩非癩是草中花蜘蛛螫傷復被露水所侵而致法宜秦艽一味煎湯徐徐飲之外敷二味拔毒散甚效二味拔毒散見腫瘍門蠷螋傷蠷螋隱壁尿射人誤著皮膚水皰淫痛如火烙如豆大鹽湯二味拔毒侵注此蟲一名多腳蟲藏於壁間以尿射人若誤中其毒令人皮膚起燎漿水皰痛如火烙初如飯糝次如豆大宜鹽湯綿溻瘡上數換即消甚則毒延遍身搔癢不休宜二味拔毒散敷之甚效二味拔毒散見腫瘍門百蟲入耳蟲偶入耳勿驚慌燒肉香氣近耳旁獨坐夜燈引蟲出麻油滴耳使蟲殃注百蟲偶然誤入耳中如蠅蚊小蟲以麻油數點滴入耳竅蟲即死取出如蚰蜒等物入者以肉炙香置於耳旁蟲聞香自出夜間暗入者切勿驚慌響叫逼蟲內攻宜端坐點燈光向耳竅其蟲見光自出若對面有人其蟲不出人皆旁避方效御纂醫宗金鑑卷七十五
