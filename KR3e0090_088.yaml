body:
  text: 編輯正骨心法要㫖目錄頭面部顚頂圗顚頂骨囱骨山角骨正面圖凌雲骨睛明骨兩顴骨鼻樑骨中血堂脣口玉堂地閣骨齒側面圖扶桑骨耳玉梁骨兩釣骨頰車骨背面圖後山骨壽台骨旋台骨御纂醫宗金鑑卷八十八目録欽定四庫全書御纂醫宗金鑑卷八十八編輯正骨心法要㫖目錄頭面部顚頂圗顚頂骨囱骨山角骨正面圖凌雲骨睛明骨兩顴骨鼻樑骨中血堂脣口玉堂地閣骨齒側面圖扶桑骨耳玉梁骨兩釣骨頰車骨背面圖後山骨壽台骨旋台骨御纂醫宗金鑑卷八十八目録欽定四庫全書御纂醫宗金鑑卷八十八編輯正骨心法要㫖頭面部顚頂骨顚者頭頂也其骨男子三义縫女子十字縫一名天靈蓋位居至髙内函腦髓如蓋以統全體者也或磞撞損傷如卒然而死身體强硬鼻口有出入聲氣目閉面如土色心口温熱跳動者此證可治切不可撅拿並扶起盤坐蓋恐驚亂之氣上冲或從傷處或從七竅走洩必傷性命也惟宜屈膝側卧先将髙醋調混元膏敷於頂上以定痛消腫活血抜毒再將草紙捲㸃着令烟氣薫其口鼻再燃煤淬入醋内使熱氣薫蒸口鼻如無煤之處燒鐵淬之亦可以引五臟血衇使之通和待其口中呻吟有聲即以童便調八釐散温服可以氣轉陽回外用手法推按心胸兩肋腋下腹上並輕托内腕攢筋頻頻揉摩即掌後髙骨寸闗尺診衇處也夫衝撞損傷則筋衇强硬頻頻揉摩則心血來復命衇流通即可囘生常服正骨紫金丹復外用散瘀和傷湯洗去前敷之混元膏再換敷混元膏服丸藥後或大便色黒乾燥此乃腸胃存有瘀血或有耳聾者俱服加減蘇子桃仁湯以逐瘀血健髀胃飬精神兼用導氣通瘀錠塞於耳中飲食宜素粥湯飲忌氣怒油膩麫食卧處宜浄室勿令人喧亂若傷重已死者用白布纒頭以木棍輕輕拍擊足心再提髪令其直正安定頸骨舒其筋絡外敷混元膏内服紫金丹若墜車馬損傷顚縫者其邪墜而下多在左而少在右因右手利便而然也其治法同磞撞諸傷如頂骨塌䧟驚動腦髓七竅出血身挺僵厥昏悶全無知覺者不治混元膏治打撲損傷骨碎筋翻瘀血凝聚消青紫腫痛等證羚羊血五錢没藥五錢漏蘆三錢紅花三錢大黄二錢麝香三錢升麻三錢白及五錢生梔子二錢甘草二錢明雄黄五錢白斂三錢共為細末用髙醋熬成膏敷於頂上八釐散治跌打損傷接骨散瘀蘇木麵一錢半兩錢一錢自然銅三錢七次醋淬乳香三錢没藥三錢血竭三錢麝香一分紅花一錢丁香五分番木鱉一錢去毛油煠共為細末黄酒温服童便調亦可正骨紫金丹治跌打撲墜閃錯損傷並一切疼痛瘀血凝聚丁香木香𤓰兒血竭兒茶熟大黄紅花各一両當歸頭蓮肉白茯苓白芍各二兩丹皮五錢甘草二錢共為細末煉蜜為丸毎服三錢童便調下黄酒亦可散瘀和傷湯治一切磞撞損傷瘀血積聚番木鱉油煠去毛紅花生半夏各五錢骨碎補甘草各三錢葱鬚一兩水五碗煎滾入醋二兩再煎十數滚薫洗患處一日十數次加減蘇子桃仁湯治瘀血内聚心經瘀熱大腸不燥者蘇子三錢蘇木一錢末紅花一錢桃仁炒麥冬橘紅各三錢赤芍竹茹當歸各二錢酒洗水三鍾煎一鍾渣二鍾煎八分温服導氣通瘀錠耑治耳聾奇方用不去油巴豆一箇螌蝥三箇麝香少許以葱涎蜂蜜和捻如麥粒形絲棉裹置耳中響聲如雷勿得驚懼待二十一日耳中有膿水流出方可去錠奇妙無比囱骨囱骨者嬰兒頂骨未合軟而跳動之處名曰囱門或跌打損傷骨縫雖綻尚未震傷腦髓筋未振轉其形頭項浮光面虚眼腫鼻大脣翻舌硬睡困昏沉肉雖腫而未皮破出血者宜扶起正坐即以葱汁合定痛散敷於傷處再以毛頭紙蘸醋貼藥上燒鐵熨斗烙紙上以傷處覺熱疼口中有聲為度去藥貼萬靈膏三日一換待疼止思食始掲去膏以和傷湯洗之則風除腫散血活氣理矣肉破出血者即用馬屁勃灰先止其血次用榆樹皮灸熨法内服人參紫金丹以健脾胃提元氣止渇生津増長精神强壯身體令筋血和通為要忌發物火酒戴抽口穿帶布帽以避風寒不可出房若肉破血流不止骨䧟筋翻必損腦髓身軟屈手筋強氣息無聲則危篤難醫若破痕觸冒寒風者不治馬屁勃俗名狗頭灰產口外者佳定痛散治一切打撲損傷定痛消腫舒筋和絡當歸川芎白芍官桂各一錢三柰三錢麝香三分紅花五錢紫丁香根五錢升麻一錢防風一錢共為細末老葱搗汁合敷患處再用熨法灸熨法此法耑以灸熨肉破血出諸傷蓋因血液津漬潮潤以樹皮隔之方灸熨也先以榆樹皮安患處再以老葱搗爛並蘄艾止痛散和勻置樹皮上連灸五次畢以軟絹包裹戴抽口布帽繫𦂳帶子謹避風冷萬靈膏治跌打損傷消瘀散毒舒筋活血止痛接骨如神兼去麻木風痰寒濕疼痛等證鸛筋草透骨草紫丁香根當歸酒洗自然銅醋淬七次𤓰兒血竭没藥各一兩川芎八錢赤芍二兩半兩錢一枚醋淬紅花一兩川牛膝五加皮石菖蒲茅山蒼术各五錢木香秦艽蛇床子肉桂川附子製半夏製石斛蓽薢鹿茸各三錢虎脛骨一對麝香二錢右除血竭没藥麝香三味各研細末另包外共二十三味先将香油十觔微火煨浸三日然後将羣藥入油内熬黒為度去滓加黄丹五觔再熬将至滴水成珠離火俟少時藥温将血竭没藥麝香下入攪勻取起出火氣人參紫金丹此丹提補元氣健壯脾胃止渇生津増長精神和通筋血被跌扑閃撞而氣虚者最宜服之人參三錢丁香一兩五加皮二兩甘草八錢茯苓二錢當歸一兩酒洗血竭一兩骨碎補一兩五味子一兩没藥二兩去油共為細末煉蜜為丸毎服三錢早晚淡黄酒化服童便化服亦可山角骨山角骨即頭頂兩旁棱骨也凡有跌打損傷未破者不拘左右宣紫腫硬瘀血凝聚疼痛或昏迷目閉身軟而不能起聲氣短少語言不出心中忙亂睡卧喘促飲食少進者宜内服正骨紫金丹外用灸熨如囱骨傷法如肉破流血不止者先用馬屁勃灰止血後以榆樹皮盖傷處以艾合定痛散灸之如傷重者先服人參紫金丹後如前法如損傷太重成破傷風不治正骨紫金丹見前顚頂傷人參紫金丹見前囱骨傷凌雲骨凌雲骨在前髪際下即正中額骨其兩眉上之骨即俗名左天賢骨右天貴骨兩額角也跌打損傷皮破二目及面浮虚腫若内損瘀血上嘔吐衂氣虚昏沉不省人事身軟面色乾黄徧身虚浮躁煩焦渴胸膈疼痛脾胃不開飲食少進先服踈血丸再以五加皮湯薫洗患處敷烏龍膏定痛消腫踈血丸此藥止血開胃百草霜三錢好阿膠蛤粉炒成珠藕節側栢葉茅根當歸各一兩酒洗共為細末煉蜜為丸如梧桐子大毎服五錢早晚老酒送下五加皮湯此湯舒筋和血定痛消瘀當歸酒洗没藥五加皮皮硝青皮川椒香附子各三錢丁香一錢麝香一分老葱三根地骨皮一錢丹皮二錢水煎滚薫洗患處烏龍膏此膏治跌打損傷筋斷骨折腫硬靑紫百草霜三錢白芨五錢白斂三錢百合五錢百部三錢乳香五錢没藥五錢麝香一分糯米一兩炒陳粉子四兩者佳炒隔年共為細末醋熬為膏睛明骨睛明骨即目窠四圍目眶骨也其上曰眉棱骨其下曰䪼骨䪼骨下接上牙床打仆損傷血流滿面者敷刀瘡藥掀痛瘀血者敷混元膏如骨損者内服八釐散忌生冷發物偶食猪頭肉者必發至一月後始愈凡眼胞傷損而瞳神不碎者可治刀瘡藥治一切金刃所傷敷之止血收口定痛䕶風上白石膏一觔煆浄板松香一觔過水提珍珠五錢煑過豆腐右三味共研細末和為一處磁罐收貯偹用混元膏八釐散俱見顚頂傷兩顴骨兩顴骨者面上兩旁之高起大骨也打仆損傷靑腫堅硬疼痛牙車𦂳急嚼物艱難鼻孔出血兩脣掀翻内服正骨紫金丹外以海桐皮湯薫洗口潄蓽茇散坐卧避冷處海桐皮湯耑洗一切跌打損傷筋翻骨錯疼痛不止海桐皮鐵線透骨草明净乳香没藥各二錢當歸一錢五分酒洗川椒三錢川芎一錢紅花一錢威靈仙白芷甘草防風各八分共為粗末裝白布袋内紥口煎湯薫洗患處蓽茇散蓽茇良薑細辛各一錢水三鍾煎一鍾潄口正骨紫金丹見兩山角傷鼻樑骨鼻孔之界骨名曰鼻樑骨下至鼻之盡處名曰凖頭凡鼻兩孔傷凹者可治血出無妨若鼻樑骨凹䧟者用當歸膏敷貼若兩孔跌磕傷開孔竅或金刃傷開孔竅用封口藥敷傷處外以消毒定痛散貼之退腫若鼻被傷落者用綴法封口藥治跌打損傷皮開肉破及金刃傷割喉斷耳缺脣傷破肚皮跌破陰囊皮等證大效明浄乳香没藥兒茶當歸杉皮炭各一錢麝香五釐片腦一分豬􅀈矃葉一錢此葉用葛葉毛藤子葉亦可如無右各另碾細末稱合和勻入麝碾細次入片腦研勻磁礶收貯聽用消毒定痛散治跌撲損傷腫硬疼痛無名異炒木耳炒川大黄各五錢共為末蜜水調塗如内有瘀血砭去敷之若腐處更用當歸膏敷之尤好神效當歸膏此膏斂口生肌㧞毒止痛並諸瘡毒氣壅盛腐化成膿當歸黄蠟各一兩麻油四兩右將當歸入油煎令焦黒去滓次入黄蠟急攪化放冷以磁器收貯用時以舊絹布攤貼一方用白蠟綴法耳傷落者同此用人髪入陽城礶以塩泥固濟煆過為末乗急以所傷耳鼻蘸藥安綴故處以軟絹縛定效昔江懷禪師被驢咬落其鼻一僧用此綴之如舊中血堂中血堂即鼻内頞下脆骨空虚處也若被打仆損傷血流不止神氣昏迷者宜塞鼻丹塞於鼻中外復以新汲冷水淋激頭頂視其人如氣虚内服人參紫金丹如血瘀服蘇子桃仁湯服後如血仍不止飲食不進氣虚目閉面黄者八日死凡跌打損傷鼻樑骨者無妨塞鼻丹此丹治跌打損傷鼻中流血不止神氣昏迷牙齒損傷虚浮腫痛者及一切衂血之證皆可用之朱砂麝香丁香烏梅肉川烏草烏當歸三柰各一錢乳香二錢皂角七分共為細末用獨頭蒜泥為丸以絲棉包裹塞於鼻中人參紫金丹見囱骨傷蘇子桃仁湯見顛頂傷脣口脣口者司言食之竅也如跌破擊打上脣而㧞缺者用絹片一小條從腦後紥向前來縛合先用桑白皮捻線縫定次以封口藥塗傅次敷截血膏蓋住封口藥不令開落仍忌言語如整下脣傷而㧞缺者以絹片從下頦兠縛治同前法截血膏治跌打斫磕諸證能化血破瘀退腫止痛天花粉三兩片子薑黄赤芍藥白芷各一兩右共為細末茶調勻敷瘡口四圍若頭面傷其血不止者急用此藥調塗頸上週圍若手傷則塗臂周圍若傷足則塗腿上若傷各處則塗瘡口周圍使截住其血不來潮作若瘡口肉硬不消者此被風襲也可加獨活用熱酒調敷如又不消則風毒已深肌肉結實加紫荆皮末和敷有必消之理封口藥見鼻柱骨傷玉堂玉堂在口内上腭一名上含其竅即頏顙也若被觸刺傷於左右者惟腫痛而已若觸傷正中之孔則上通於頞必傷鼻孔之卷肉俗名鼻鬚或再犯空竅俗名玉堂則血流不止以致鼻目皆腫滿面靑紫神倦頭暈四肢無力痛連腦髓若傷及㑹厭與上横骨輕者易愈重者即不能言若痛連心膈則昏迷沉重急用膩粉氷片敷於紙上貼肉破處以止其血内服正骨紫金丹以散瘀定痛理氣健脾寧神定志復用蠏黄血竭煎湯日潄口二三十次如氣不舒和飲食少進日以柿霜玉露霜牛奶皮奶餅奶酥油并炒􅓱子麵諸物以凉潤将息之則愈地閣骨地閣骨即兩牙車相交之骨又名頦俗名下巴骨上載齒牙打扑損傷者顋脣腫痛牙車振動虚浮飲食不進目閉神昏心熱神亂氣弱體軟用布兠裹繫縛頂上内服大神效活絡丹消瘀散止痛和血理氣健脾再噙化人參紫金丹搽固齒散口潄蓽茇散以去牙根腫痛外貼萬靈膏忌風寒冷物戒氣惱大神效活絡丹此丹宣暢氣血通利經絡並風濕諸痺口眼喎斜半身不遂行歩艱難筋骨拘攣手足疼痛等證白花蛇酒浸焙烏梢蛇酒浸焙麻黄去節防風炙草官桂草荳蔲羌活元參天麻藿香何首烏白芷川連黄黄耆熟地黄川大黄各二兩遼細辛赤芍藥朱砂水飛没藥去油乳香去油直殭蠶去黒嘴炒天竺黄敗龜板酥炙丁香虎脛骨酥炙烏藥青皮黒附子白蔲仁炒骨碎補白茯苓於白术土炒當歸酒洗沉香各一兩全蠍去毒葛根威靈仙各二兩五錢酒浸𤓰兒血竭犀角各七錢五分麝香五錢地龍五錢去土净松香五錢兩頭尖川芎各二兩京牛黄二錢五分片腦二錢五分共為細末煉蜜為丸金鉑為衣毎丸重一錢以蠟皮封裹温酒送隨病上下食前後服人參紫金丹見山角骨傷固齒散見齒傷蓽茇散見兩顴傷萬靈膏見顚頂傷齒齒者口齦所生之骨也俗名曰牙有門牙虎牙槽牙上下盡根牙之别凡被跌打砍磕落去牙齒者只用補肌散敷之並封口藥内服破血藥以止其痛其藥只用水煎不宜酒煎此法頗收功效如牙斷跌磕砍傷牙齒未動者用芙蓉膏塗之如齒動者用蒺藜根燒存性為末常揩搽之即牢用固齒散時時揩之亦佳補肌散止血除痛辟風續筋骨生肌肉地黄苗地菘青蒿蒼耳苗赤芍藥各五兩汁水煎取生艾汁三合右五月五日七月七日午時修合以前藥汁拌石灰陰乾入黄丹三兩更杵為細末凡有傷折出血用藥包封不可動約十日可瘥不腫不膿芙蓉膏治打撲傷損腫痛紫黒色乆不退者紫荆皮南星各一兩芙蓉二兩獨活白芷赤芍藥各五錢右共為末用生薑汁茶清調温貼敷傷損紫黒色乆不退者加肉桂五錢固齒散骨碎補牡鼠骨煆灰共研細末磁罐收貯聽用封口藥見鼻柱骨傷扶桑骨扶桑骨即兩額骨旁近太陽肉内凹處也若跌仆損傷或掀腫或血出或青紫堅硬頭疼耳鳴青痕滿面憎寒惡冷心中發熱大便乾燥宜内服正骨紫金丹如破損者外以炙熨法定痛外破者烏龍膏敷之正骨紫金丹灸熨法俱見顛頂骨傷烏龍膏方見凌雲骨傷耳耳者司聽之竅也耳門之名曰蔽耳輪之名曰郭凡耳被砍跌打落或上脱下粘或下脱上粘内用封口藥外用消毒定痛散敷貼及耳後看脱落所向用鵝翎横夾定却用竹夾子直上横縛定縛時要兩耳相對輕輕縛住或用綴法封口藥消毒定痛散俱見鼻柱骨傷綴法見鼻柱骨傷玉梁骨玉梁骨即耳門骨其處上即曲頰下即頰車兩骨之合鉗也耳門内上通腦髓亦闗靈明若墊傷擊傷而有碍於骨肉者腫痛流血服正骨紫金丹八仙逍遥湯洗之洗畢貼混元膏坐卧避冷處若傷重内連腦髓及傷靈明必昏沉不省人事不進飲食若再平素氣血皆虚必為不治之證八仙逍遥湯耑洗跌仆損傷腫硬疼痛及一切冷振風濕筋骨血肉肢體痠痛諸證防風荆芥川芎甘草各一錢當歸酒洗黄蘗各二錢茅山蒼术牡丹皮川椒各三錢苦參五錢共合一處装白布袋内紥口水熬滾薫洗患處兩釣骨兩釣骨名曲頰即上頰之合鉗曲如環形以納下牙車骨尾之鈎者也打扑損傷耳腫腮硬牙闗𦂳急嚼物不合宜内服正骨紫金丹外貼萬靈膏坐卧避冷處正骨紫金丹萬靈膏俱見顛頂傷頰車骨頰車骨即下牙床骨也俗名牙釣承載諸齒能咀食物有運動之象故名頰車其骨尾形如鈎上控於曲頰之環或打仆脱臼或因風濕襲入鈎環脱臼單脱者為錯雙脱者為落凡治單脱者用手法摘下不脱者以兩手捧下頦稍外拽復向内托之則雙鈎皆入上環矣再以布自地閣纒繞頭頂以固之宜内服正骨紫金丹外貼萬靈膏待能飲食後去布只用布兠其下頦繫於頂上二三日可愈若雙脱者治法同前若欠而致脱臼者乃突滑也無妨脱臼者俗名吊下巴欠者俗名打哈氣正骨紫金丹萬靈膏方俱見顚頂傷後山骨後山即頭後枕骨也其骨形狀不同或如品字或如山字或如川字或圎尖或月芽形或偃月形或雞子形皆屬枕骨凡有傷損其人頭昏目眩耳鳴有聲項强咽直飲食難進坐卧不安四肢無力内服正骨紫金丹外敷烏龍膏洗以海桐皮湯以散瘀去麻木止痛如悞從高處墜下後山骨傷太重筋翻氣促痰響如拽鋸之聲垂頭目閉有喘聲者此風熱所乗至危之證不能治也遺尿者必亡惟月芽形者更易受傷如被墜墮打傷震動蓋頂骨縫以致腦筋轉擰疼痛昏迷不省人事少時或明者其人可治急以凉水蘸髪啓開牙闗以酒調八釐散灌之服後目開痛苦有聲二目流淚愈見可治之兆服正骨紫金丹炒米粥調飬可愈正骨紫金丹見顛頂傷烏龍膏見凌雲骨傷海桐皮湯見兩顴骨傷八釐散見顛頂傷壽台骨壽台骨即完骨在耳後接於耳之玉樓骨者也若跌打損傷其耳上下俱腫起耳内之禁骨有傷則見血膿水耳外瘀聚凝結疼痛筋結不能舒通以致頭暈眼迷兩太陽扶桑骨脹痛頸項筋强虚浮紅紫精神短少四肢無力坐卧不安飲食少進以烏龍膏敷耳傷處用絲棉裹導氣通瘀錠塞耳内内服人參紫金丹通瘀散腫外再以八仙逍遥湯薫洗消散虚浮腫痛忌食熱物發物如血流不止三日不飲食必動腦髓不宜治之烏龍膏見凌雲骨傷導氣通瘀錠見顚頂骨傷人參紫金丹見山角骨傷八仙逍遥湯見玉梁骨傷旋台骨旋台骨又名玉柱骨即頭後頸骨三節也一名天柱骨此骨被傷共分四證一曰從高墜下致頸骨揷入腔内而左右尚活動者用提項法治之一曰打傷頭低不起用端法治之一曰墜傷左右歪邪用整法治之一曰仆傷面仰頭不能垂或筋長骨錯或筋聚或筋强骨隨頭低用推端續整四法治之凡治者臨證時問其或墜車馬踒傷或高處墜下折傷或打重跌倒再問其或思飲食或不思飲食或四肢無傷而精神不減或精神短少或能坐起行走或昏睡不語或疼痛不止瘀聚凝結腫硬筋脹皆宜内服正骨紫金丹外敷萬靈膏並洗海桐皮湯灸熨定痛散外按手法治之手法詳首卷正骨紫金丹萬靈膏俱見顛頂傷海桐皮湯見兩顴骨傷定痛散見兩山角骨傷御纂醫宗金鑑卷八十八
