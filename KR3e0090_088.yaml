body:
  text: 編輯正骨心法要㫖目録頭面部顚頂圗顚頂骨囱骨山角骨正面圖凌雲骨睛明骨兩顴骨鼻梁骨中血堂脣口玉堂地閣骨齒側面圖扶桑骨耳玉梁骨兩釣骨頰車骨背面圖後山骨壽台骨旋台骨御纂醫宗金鑑卷八十八目録欽定四庫全書御纂醫宗金鑑卷八十八編輯正骨心法要㫖目録頭面部顚頂圗顚頂骨囱骨山角骨正面圖凌雲骨睛明骨兩顴骨鼻梁骨中血堂脣口玉堂地閣骨齒側面圖扶桑骨耳玉梁骨兩釣骨頰車骨背面圖後山骨壽台骨旋台骨御纂醫宗金鑑卷八十八目録欽定四庫全書御纂醫宗金鑑卷八十八編輯正骨心法要㫖頭面部顚頂骨顚者頭頂也其骨男子三義縫女子十字縫一名天靈蓋位居至髙內函腦髓如蓋以統全體者也或磞撞損傷如卒然而死身體强硬鼻口有出入聲氣目閉面如土色心口溫熱跳動者此證可治切不可撅拿並扶起盤坐蓋恐驚亂之氣上冲或從傷處或從七竅走泄必傷性命也惟宜屈膝側卧先將髙醋調混元膏敷於頂上以定痛消腫活血拔毒再將草紙捲㸃著令烟氣薰其口鼻再燃煤淬入醋內使熱氣薰蒸口鼻如無煤之處燒鐵淬之亦可以引五臟血衇使之通和待其口中呻吟有聲即以童便調八釐散溫服可以氣轉陽回外用手法推按心胸兩肋腋下腹上並輕托內腕攢筋頻頻揉摩即掌後髙骨寸關尺診衇處也夫衝撞損傷則筋衇强硬頻頻揉摩則心血來復命衇流通即可回生常服正骨紫金丹復外用散瘀和傷湯洗去前敷之混元膏再換敷混元膏服丸藥後或大便色黑乾燥此乃腸胃存有瘀血或有耳聾者俱服加減蘇子桃仁湯以逐瘀血健髀胃飬精神兼用導氣通瘀錠塞於耳中飲食宜素粥湯飲忌氣怒油膩麵食卧處宜淨室勿令人喧亂若傷重已死者用白布纒頭以木棍輕輕拍擊足心再提髮令其直正安定頸骨舒其筋絡外敷混元膏內服紫金丹若墜車馬損傷顚縫者其邪墜而下多在左而少在右因右手利便而然也其治法同磞撞諸傷如頂骨塌陷驚動腦髓七竅出血身挺僵厥昏悶全無知覺者不治混元膏治打撲損傷骨碎筋翻瘀血凝聚消青紫腫痛等證羚羊血五錢沒藥五錢漏蘆三錢紅花三錢大黃二錢麝香三錢升麻三錢白及五錢生梔子二錢甘草二錢明雄黃五錢白斂三錢共為細末用髙醋熬成膏敷於頂上八釐散治跌打損傷接骨散瘀蘇木麵一錢半兩錢一錢自然銅三錢七次醋淬乳香三錢沒藥三錢血竭三錢麝香一分紅花一錢丁香五分番木鱉一錢去毛油煠共為細末黃酒溫服童便調亦可正骨紫金丹治跌打撲墜閃錯損傷並一切疼痛瘀血凝聚丁香木香瓜兒血竭兒茶熟大黃紅花各一兩當歸頭蓮肉白茯苓白芍各二兩丹皮五錢甘草二錢共為細末煉蜜為丸每服三錢童便調下黃酒亦可散瘀和傷湯治一切磞撞損傷瘀血積聚番木鱉油煠去毛紅花生半夏各五錢骨碎補甘草各三錢葱鬚一兩水五碗煎滾入醋二兩再煎十數滚薰洗患處一日十數次加減蘇子桃仁湯治瘀血內聚心經瘀熱大腸不燥者蘇子三錢蘇木一錢末紅花一錢桃仁炒麥冬橘紅各三錢赤芍竹茹當歸各二錢酒洗水三鍾煎一鍾渣二鍾煎八分溫服導氣通瘀錠專治耳聾奇方用不去油巴豆一箇螌蝥三箇麝香少許以葱涎蜂蜜和捻如麥粒形絲棉裹置耳中響聲如雷勿得驚懼待二十一日耳中有膿水流出方可去錠奇妙無比囱骨囱骨者嬰兒頂骨未合軟而跳動之處名曰囱門或跌打損傷骨縫雖綻尚未震傷腦髓筋未振轉其形頭項浮光面虛眼腫鼻大脣翻舌硬睡困昏沉肉雖腫而未皮破出血者宜扶起正坐即以葱汁合定痛散敷於傷處再以毛頭紙蘸醋貼藥上燒鐵尉斗烙紙上以傷處覺熱疼口中有聲為度去藥貼萬靈膏三日一換待疼止思食始揭去膏以和傷湯洗之則風除腫散血活氣理矣肉破出血者即用馬屁勃灰先止其血次用榆樹皮灸尉法內服人參紫金丹以健脾胃提元氣止渴生津增長精神强壯身體令筋血和通為要忌發物火酒戴抽口穿帶布帽以避風寒不可出房若肉破血流不止骨陷筋翻必損腦髓身軟屈手筋強氣息無聲則危篤難醫若破痕觸冒寒風者不治馬屁勃俗名狗頭灰産口外者佳定痛散治一切打撲損傷定痛消腫舒筋和絡當歸川芎白芍官桂各一錢三奈三錢麝香三分紅花五錢紫丁香根五錢升麻一錢防風一錢共為細末老葱搗汁合敷患處再用尉法灸尉法此法專以灸尉肉破血出諸傷蓋因血液津漬潮潤以樹皮隔之方灸尉也先以榆樹皮安患處再以老葱搗爛並蘄艾止痛散和勻置樹皮上連灸五次畢以軟絹包裹戴抽口布帽繫緊帶子謹避風冷萬靈膏治跌打損傷消瘀散毒舒筋活血止痛接骨如神兼去麻木風痰寒濕疼痛等證鸛筋草透骨草紫丁香根當歸酒洗自然銅醋淬七次瓜兒血竭沒藥各一兩川芎八錢赤芍二兩半兩錢一枚醋淬紅花一兩川牛膝五加皮石菖蒲茅山蒼术各五錢木香秦艽蛇床子肉桂川附子製半夏製石斛蓽薢鹿茸各三錢虎脛骨一對麝香二錢右除血竭沒藥麝香三味各研細末另包外共二十三味先將香油十斤微火煨浸三日然後將羣藥入油內熬黑為度去滓加黃丹五斤再熬將至滴水成珠離火俟少時藥溫將血竭沒藥麝香下入攪勻取起出火氣人參紫金丹此丹提補元氣健壯脾胃止渴生津增長精神和通筋血被跌撲閃撞而氣虛者最宜服之人參三錢丁香一兩五加皮二兩甘草八錢茯苓二錢當歸一兩酒洗血竭一兩骨碎補一兩五味子一兩沒藥二兩去油共為細末煉蜜為丸每服三錢早晚淡黃酒化服童便化服亦可山角骨山角骨即頭頂兩旁棱骨也凡有跌打損傷未破者不拘左右宣紫腫硬瘀血凝聚疼痛或昏迷目閉身軟而不能起聲氣短少語言不出心中忙亂睡卧喘促飲食少進者宜內服正骨紫金丹外用灸尉如囱骨傷法如肉破流血不止者先用馬屁勃灰止血後以榆樹皮蓋傷處以艾合定痛散灸之如傷重者先服人參紫金丹後如前法如損傷太重成破傷風不治正骨紫金丹見前顚頂傷人參紫金丹見前囱骨傷凌雲骨凌雲骨在前髮際下即正中額骨其兩眉上之骨即俗名左天賢骨右天貴骨兩額角也跌打損傷皮破二目及面浮虛腫若內損瘀血上嘔吐衄氣虛昏沉不省人事身軟面色乾黃遍身虛浮躁煩焦渴胸膈疼痛脾胃不開飲食少進先服踈血丸再以五加皮湯薰洗患處敷烏龍膏定痛消腫踈血丸此藥止血開胃百草霜三錢好阿膠蛤粉炒成珠藕節側柏葉茅根當歸各一兩酒洗共為細末煉蜜為丸如梧桐子大每服五錢早晚老酒送下五加皮湯此湯舒筋和血定痛消瘀當歸酒洗沒藥五加皮皮硝青皮川椒香附子各三錢丁香一錢麝香一分老葱三根地骨皮一錢丹皮二錢水煎滚薰洗患處烏龍膏此膏治跌打損傷筋斷骨折腫硬靑紫百草霜三錢白芨五錢白斂三錢百合五錢百部三錢乳香五錢沒藥五錢麝香一分糯米一兩炒陳粉子四兩者佳炒隔年共為細末醋熬為膏睛明骨睛明骨即目窠四圍目眶骨也其上曰眉棱骨其下曰䪼骨䪼骨下接上牙床打仆損傷血流滿面者敷刀瘡藥掀痛瘀血者敷混元膏如骨損者內服八釐散忌生冷發物偶食猪頭肉者必發至一月後始愈凡眼胞傷損而瞳神不碎者可治刀瘡藥治一切金刃所傷敷之止血收口定痛護風上白石膏一斤煆淨板松香一斤過水提珍珠五錢煮過豆腐右三味共研細末和為一處磁罐收貯偹用混元膏八釐散俱見顚頂傷兩顴骨兩顴骨者面上兩旁之高起大骨也打仆損傷靑腫堅硬疼痛牙車緊急嚼物艱難鼻孔出血兩脣掀翻內服正骨紫金丹外以海桐皮湯薰洗口潄蓽茇散坐卧避冷處海桐皮湯專洗一切跌打損傷筋翻骨錯疼痛不止海桐皮鐵線透骨草明净乳香沒藥各二錢當歸一錢五分酒洗川椒三錢川芎一錢紅花一錢威靈仙白芷甘草防風各八分共為粗末裝白布袋內扎口煎湯薰洗患處蓽茇散蓽茇良薑細辛各一錢水三鍾煎一鍾潄口正骨紫金丹見兩山角傷鼻梁骨鼻孔之界骨名曰鼻梁骨下至鼻之盡處名曰凖頭凡鼻兩孔傷凹者可治血出無妨若鼻梁骨凹陷者用當歸膏敷貼若兩孔跌磕傷開孔竅或金刃傷開孔竅用封口藥敷傷處外以消毒定痛散貼之退腫若鼻被傷落者用綴法封口藥治跌打損傷皮開肉破及金刃傷割喉斷耳缺脣傷破肚皮跌破陰囊皮等證大效明淨乳香沒藥兒茶當歸杉皮炭各一錢麝香五釐片腦一分豬􅀈矃葉一錢此葉用葛葉毛藤子葉亦可如無右各另碾細末稱合和勻入麝碾細次入片腦研勻磁罐收貯聽用消毒定痛散治跌撲損傷腫硬疼痛無名異炒木耳炒川大黃各五錢共為末蜜水調塗如內有瘀血砭去敷之若腐處更用當歸膏敷之尤好神效當歸膏此膏斂口生肌拔毒止痛並諸瘡毒氣壅盛腐化成膿當歸黃蠟各一兩麻油四兩右將當歸入油煎令焦黑去滓次入黃蠟急攪化放冷以磁器收貯用時以舊絹布攤貼一方用白蠟綴法耳傷落者同此用人髮入陽城罐以鹽泥固濟煆過為末乘急以所傷耳鼻蘸藥安綴故處以軟絹縛定效昔江懷禪師被驢咬落其鼻一僧用此綴之如舊中血堂中血堂即鼻內頞下脆骨空虛處也若被打仆損傷血流不止神氣昏迷者宜塞鼻丹塞於鼻中外復以新汲冷水淋激頭頂視其人如氣虛內服人參紫金丹如血瘀服蘇子桃仁湯服後如血仍不止飲食不進氣虛目閉面黃者八日死凡跌打損傷鼻梁骨者無妨塞鼻丹此丹治跌打損傷鼻中流血不止神氣昏迷牙齒損傷虛浮腫痛者及一切衄血之證皆可用之朱砂麝香丁香烏梅肉川烏草烏當歸三奈各一錢乳香二錢皂角七分共為細末用獨頭蒜泥為丸以絲棉包裹塞於鼻中人參紫金丹見囱骨傷蘇子桃仁湯見顛頂傷脣口脣口者司言食之竅也如跌破擊打上脣而拔缺者用絹片一小條從腦後扎向前來縛合先用桑白皮捻線縫定次以封口藥塗傅次敷截血膏蓋住封口藥不令開落仍忌言語如整下脣傷而拔缺者以絹片從下頦兜縛治同前法截血膏治跌打斫磕諸證能化血破瘀退腫止痛天花粉三兩片子薑黃赤芍藥白芷各一兩右共為細末茶調勻敷瘡口四圍若頭面傷其血不止者急用此藥調塗頸上周圍若手傷則塗臂周圍若傷足則塗腿上若傷各處則塗瘡口周圍使截住其血不來潮作若瘡口肉硬不消者此被風襲也可加獨活用熱酒調敷如又不消則風毒已深肌肉結實加紫荆皮末和敷有必消之理封口藥見鼻柱骨傷玉堂玉堂在口內上腭一名上含其竅即頏顙也若被觸刺傷於左右者惟腫痛而已若觸傷正中之孔則上通於頞必傷鼻孔之卷肉俗名鼻鬚或再犯空竅俗名玉堂則血流不止以致鼻目皆腫滿面靑紫神倦頭暈四肢無力痛連腦髓若傷及㑹厭與上橫骨輕者易愈重者即不能言若痛連心膈則昏迷沉重急用膩粉氷片敷於紙上貼肉破處以止其血內服正骨紫金丹以散瘀定痛理氣健脾寧神定志復用蟹黃血竭煎湯日潄口二三十次如氣不舒和飲食少進日以柿霜玉露霜牛奶皮奶餅奶酥油并炒􅓱子麵諸物以凉潤將息之則愈地閣骨地閣骨即兩牙車相交之骨又名頦俗名下巴骨上載齒牙打撲損傷者腮脣腫痛牙車振動虛浮飲食不進目閉神昏心熱神亂氣弱體軟用布兜裹繫縛頂上內服大神效活絡丹消瘀散止痛和血理氣健脾再噙化人參紫金丹搽固齒散口潄蓽茇散以去牙根腫痛外貼萬靈膏忌風寒冷物戒氣惱大神效活絡丹此丹宣暢氣血通利經絡並風濕諸痺口眼喎斜半身不遂行步艱難筋骨拘攣手足疼痛等證白花蛇酒浸焙烏梢蛇酒