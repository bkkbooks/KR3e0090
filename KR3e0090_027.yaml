body:
  text: 刪補名醫方論卷二目錄補中益氣湯升陽益胃湯升陽散火湯補脾胃瀉陰火升陽湯清暑益氣湯清燥湯白术附子湯葛花解酲湯平胃散枳术丸資生丸六味地黄丸桂附地黃丸附知蘗地黃丸附八味地黃丸資生腎氣丸大補陰丸封髓丹虎潛丸滋腎丸瓊玉膏龜鹿二仙膠四神丸二神丸五味子散御纂醫宗金鑑卷二十七目録欽定四庫全書御纂醫宗金鑑卷二十七刪補名醫方論卷二目錄補中益氣湯升陽益胃湯升陽散火湯補脾胃瀉陰火升陽湯清暑益氣湯清燥湯白术附子湯葛花解酲湯平胃散枳术丸資生丸六味地黄丸桂附地黃丸附知蘗地黃丸附八味地黃丸資生腎氣丸大補陰丸封髓丹虎潛丸滋腎丸瓊玉膏龜鹿二仙膠四神丸二神丸五味子散御纂醫宗金鑑卷二十七目録欽定四庫全書御纂醫宗金鑑卷二十七刪補名醫方論卷二補中益氣湯治陰虚内熱頭痛口渴表熱自汗不任風寒衇洪大心煩不安四肢困倦懶於言語無氣以動動則氣高而喘黄耆人參雲术炙甘草陳皮當歸升麻柴胡右八味加生薑三片大棗二枚水煎溫服集註柯琴曰仲景有建中理中二法風木内干中氣用甘草飴棗培土以禦木薑桂芍藥平木而驅風故名曰建中寒水内凝於中氣用參术甘草補土以制水佐乾薑而生土以禦寒故名曰理中至若勞倦形衰氣少陰虚而生内熱者表證頗同外感惟李杲知其為勞倦傷脾榖氣不勝陽氣下陷陰中而發熱製補中益氣之法謂風寒外傷其形為有餘脾胃内傷其氣為不足遵内經勞者溫之損者益之之義大忌苦寒之藥選用甘溫之品升其陽以達陽春升生之令凡脾胃一虛肺氣先絶故用黃耆護皮毛而閉腠理不令自汗元氣不足懶言氣喘人參以補之炙甘草之甘以瀉心火而除煩補脾胃而生氣此三味除煩熱之聖藥也佐白术以健脾當歸以和血氣亂於胸清濁相干用陳皮以理之且以散諸甘藥之滯胃中清氣下陷用升麻柴胡氣之輕而味之薄者引胃氣以上騰復其本位便能升浮以行生長之令矣補中之劑得發表之品而中自安益氣之劑賴清氣之品而氣益培此用藥有相須之妙是方也用以補脾使地道卑而上行亦可以補心肺損其肺者益其氣損其心者調其榮衛也亦可以補肝木鬱則達之也惟不宜於腎陰虛於下者不宜升陽虛於下者更不宜升也凡李杲治脾胃方俱是益氣去當歸白术加蒼术木香便是調中加麥冬五味輩便是清暑此正是醫不執方亦是醫必有方趙獻可曰後天脾土非得先天之氣不行此氣因勞而下陷於太陰清氣不升濁氣不降故用升柴以佐參耆是方所以補益後天中之先天也凡脾胃不足喜甘而惡苦喜補而惡攻喜溫而惡寒喜通而惡滯喜升而惡降喜燥而惡濕此方得之矣陸麗京曰此為清陽下陷者言之非為下虚而清陽不升者言之也倘人之兩尺虚微者或是腎中水竭或是命門火衰若再一升提則如大木將摇而撥其本也升陽益胃湯治脾胃虛怠惰嗜臥四肢不收時値秋燥令行濕熱方退體重節痛口乾舌燥飲食無味大便不調小便頻數食不消兼見肺病灑淅惡寒慘慘不樂面色不和𦍑活獨活防風柴胡人參白术茯苓甘草黃耆白芍半夏黃連澤瀉陳皮水煎服集註吳琨曰脾土虛弱不能制濕故體重節痛不能運化精微故口乾無味中氣既弱傳化失宜故大便不調小便頻數也灑淅惡寒肺弱表虚也面色不樂陽氣不伸也是方半夏白术能燥濕茯苓澤瀉滲之二活防風柴胡能升舉清陽之氣黃連療濕熱陳皮平胃氣參耆甘草以益胃白芍酸收用以和榮而協𦍑活柴胡辛散之性蓋古人用辛散必用酸收所以防其竣厲猶兵家之節制也按人參屬補不知君於枳朴中即為補中瀉也𦍑防輩為散不知佐於參耆中即為補中升也近世之醫一見𦍑防輩即曰發散不可輕用亦不審佐於何藥之中皆因讀書未明不知造化别有妙理耳升陽散火湯治脾陰血虛胃陽氣弱春寒不去及過食冷物抑遏少陽清氣鬱於脾土之中四肢發困熱肌熱筋骨間熱表熱如火燎於肌膚捫之烙手並宜服之升麻葛根獨活𦍑活白芍人參已上各五錢甘草三錢炙柴胡三錢防風二錢甘草二錢生右㕮咀如麻豆大每服秤五錢水二盞煎一盞去滓大溫服無時忌寒凉之物集註吳琨曰經云少火生氣天非此火不能生物人非此火不能有生揚之則光遏之則滅今為春寒不去遏鬱陽氣飲食冷物塡塞至陰以致升生之氣幾於息矣故用升麻柴胡𦍑活獨活葛根皆辛溫風藥以鼓動少陽生氣清陽既出上竅則濁陰自歸下竅而食物傳化自無抑遏之患芍藥味酸能瀉土中之木人參味甘能補中州之氣生甘草能瀉鬱火於脾從而炙之則健脾胃而和中矣李杲聖於脾胃者其治之也必主於升陽俗醫知降而不知升是撲其少火也安望其衞生耶若氣不虛本方除人參獨活加葱白名火鬱湯治同補脾胃瀉陰火升陽湯治飲食傷胃勞倦傷脾脾胃一虚陽氣下陷陰火乘之時値夏令當從此治黃耆蒼术泔浸炒甘草炙𦍑活一兩升麻八錢柴胡兩半黃連五錢酒炒黃芩炒人參七錢石膏少許長夏微用過時去之每服五錢薑棗煎服集註汪昻曰李杲云脾胃一傷陽氣日損脾胃之清氣下陷濁陰之火得以上乘是有秋冬而無春夏也惟以氣味薄之風藥升發陽氣佐以苦寒之品瀉陰中火則陰不病陽氣伸矣是方參耆术草以補脾胃也佐𦍑活升柴以助陽升佐石膏芩連以瀉陰火假令不能食而瘦乃夲病也右關衇緩弱乃夲衇也或夲衇兼見弦衇夲證兼見四肢滿閉淋溲便難轉筋一二證此肝之脾胃病也當加風藥以瀉肝木衇兼見洪大證兼見肌熱煩熱面赤一二證此心之脾胃病也當加瀉心火之藥衇兼見浮濇證兼見短氣氣上喘咳痰盛皮澁一二證此肺之脾胃病也當加瀉肺及補氣之藥衇兼見沉細證兼見善欠善恐一二證此腎之脾胃病也當加瀉腎水及瀉陰火之藥所以言此者欲人知百病皆從脾胃而生處方者當從此法加時令藥也清暑益氣湯長夏濕熱蒸炎四肢困倦精神減少身熱氣高煩心便黃渴而自汗衇虚者此方主之人參黃耆甘草白术神麯五味子青皮升麻乾葛麥冬黃蘗澤瀉廣橘皮蒼术錢半當歸薑三片棗二枚去核水煎服集註吳琨曰暑令行於夏至長夏則兼濕令矣此方兼而治之炎暑則表氣易泄兼濕則中氣不固黃耆所以實表白术神麯甘草所以調中酷暑橫流肺金受病人參五味麥冬所以補肺斂肺清肺經所謂扶其所不勝也火盛則水衰故以黃蘗澤瀉滋其化源津液亡則口渴故以當歸乾葛生其胃液清氣不升升麻可升濁氣不降二皮可理蒼术之用為兼長夏之濕也程應旄曰人知清暑我兼益氣以暑傷氣也益氣不獨金能敵火凡氣之上騰而為津為液者回下即為腎中之水水氣足火淫自却也清燥湯治痿厥之病腰以下痿軟不能動行走不正兩足欹側黃連黃蘗酒炒柴胡已上各一分麥冬當歸身生地豬苓炙甘草神麯已上各二分人參白茯苓升麻已上各三分橘皮白术澤瀉已上各五分蒼术一錢黃耆一錢五分五味子九枚右㕮咀如麻豆大水二盞半煎一盞去滓空心溫服註清暑益氣湯與此方均治濕暑之劑清暑益氣湯治暑盛於濕暑傷氣所以四肢困倦精神減少煩渴身熱自汗脈虛故以補氣為主清暑為兼少佐去濕之品從令氣也此方治濕盛於暑濕傷形所以李杲曰六七月之間濕令大行子能令母實濕助熱旺而刑燥金絶其寒水生化之源源絶則腎虧痿厥之病作矣故以清暑變為清燥佐瀉熱利濕之藥從邪氣也是方即清暑益氣湯去葛根者以無暑外侵之肌熱也加二苓者專去濕也加黄連生地專瀉熱也二苓佐二术利水燥濕之力倍連地佐黄蘗救金生水之功多中氣益則陰火熄而肺清矣濕熱除則燥金肅而水生矣肺清水生則濕熱痿厥之病未有不愈者也但此方藥味性偏滲瀉若施之於冬春水竭髓枯骨痿或非濕熱為病者反刦津液其病愈甚則為謬治矣白术附子湯治寒中腹脹滿作涎作清涕或多溺足下痛不能任身履地骨乏無力喜睡兩丸多冷時作隂陰而痛或妄見鬼狀夢亡人腰背胛眼腰脊皆痛白术附子炮去皮臍蒼术陳皮厚朴薑製半夏湯洗茯苓豬苓去皮半兩澤瀉肉桂四錢右剉如麻豆大每服半兩水三盞薑三片同煎至一盞去滓食前溫服量虚實加減多少註李杲云脾胃之證有熱中有寒中熱中者是火乘土位之病則當上舉清陽下消陰火故用補中益氣瀉陰火升陽等湯寒中者水反侮土之病則當下伐水邪中燥脾濕故用二苓术澤蒼陳朴夏更用桂附壯陽勝寒流通血衇寒中之病自可愈也按李杲製此方施之於脾胃寒濕内盛脹滿多溺涎涕外盛足軟腰脊丸痛而氣不虚者宜矣若其人中氣已虚内外寒濕又盛水來侮土者總不若理中湯加附子蒼术茯苓為愈也葛花解酲湯治酒客病蓮花青皮三分去穰木香五分橘皮去白白茯苓人參豬苓已上各錢五分神麯炒澤瀉乾薑白术已上各二錢白荳蔲仁葛花砂仁以上各五錢右為細末和均每服三錢白湯調下但得微汗酒病去矣不可恃此過飲頻服取汗損人天年註酒為水穀精液所化體濕性熱少飲則能調和氣血流暢陰陽内助中氣捍禦外邪若過飲無度輕則傷人脾胃重則損人神氣所以酒困之人昏暈煩亂乾嘔惡心飲食即吐百體痠軟身熱頭疼嘈雜吞酸胸膈痞塞口燥舌乾手足顫摇心神恍惚不思飲食小便渾濁大便溏瀉此皆濕熱傷形與氣也按李杲曰酒病者往往以大熱大寒下之者是無形元氣受病反下有形陰血乖誤甚矣大熱則傷陰大寒則傷胃元氣消亡七神無依折人壽命不然則虚損之病成矣故製此方君葛花佐以辛香之品用神麯佐以快氣之品用苓澤佐以甘温之品服後取汗是謂外解肌肉内清陽明令上下内外分消其患使胃中穢為芳變濁為清化泰然和矣平胃散治濕淫於内脾胃不能剋制有積飲痞膈中滿者蒼术五觔米泔浸七日陳皮去白厚朴各三觔薑汁炒甘草三十兩炙右為末每服二錢薑湯下日三服或水煎每服五錢集註柯琴曰内經以土運太過曰敦阜其病腹滿不及曰卑監其病留滿痞塞張仲景製三承氣湯調胃土之敦阜李杲製平胃散平胃土之卑監培其卑者而使之平非削平之謂猶溫膽湯用凉劑溫緩而使之和非用溫之謂後之註夲草者曰敦阜之土宜蒼术以平之卑監之土宜白术以培之若以濕土為敦阜將以燥土為卑監耶不審敦阜屬燥卑監屬濕之義因不知平胃之理矣二术苦甘皆燥濕健脾之用脾燥則不滯所以能健運而得其平苐二术白者柔而緩蒼者猛而悍此取其長於發汗迅於除濕故以蒼术為君耳不得以白補蒼瀉之説為二术拘也厚朴色赤苦溫能助少火以生氣故以為佐濕因於氣之不行氣行則愈故更以陳皮佐之甘先入脾脾得補而健運故以炙甘草為使名曰平胃實調脾承氣之劑與張潔古取金匱之枳术湯以為丸枳實之峻重於厚朴且無甘草以和之雖倍白术而消伐過於此方昧者以术為補而久服之不思枳實峻削而不宜多服也枳术丸治胃虛濕熱飲食壅滯心下痞悶白术二兩土蒸枳實一兩麩炒右為細末荷葉煨陳米飯為丸如椒目大白湯下集註李杲曰白术苦甘溫其苦味除胃中之濕熱其甘溫補脾家之元氣多於枳實一倍枳實味苦溫泄心下痞悶消胃中所傷此藥下胃所傷不能即去須一二時許食乃消化先補虚而後化所傷則不峻厲矣荷葉狀如仰盂於卦為震正少陽甲膽之氣飲食入胃榮氣上行即此氣也取之以生胃氣更以煨飯和藥與术恊力滋養榖氣而補脾胃其利大矣若用峻厲之藥下之傳變諸證不可勝數資生丸治婦人妊娠三月脾虚嘔吐或胎滑不固兼丈夫調中養胃饑能使飽飽能使饑神妙難述人參三兩茯苓二兩雲术三兩山藥二兩薏苡仁兩半蓮肉二兩芡實兩半甘草一兩陳皮二兩麥蘖二兩神麯二兩白荳蔲八錢桔梗一兩藿香一兩川黃連四錢砂仁兩半白扁豆兩半山查兩半右十八味為細末煉蜜丸彈子大每服二丸米飲下集註羅謙輔曰此方始於繆仲醇以治妊娠脾虚及胎滑蓋胎資始於足少陰資生於足陽明故陽明為胎生之夲一有不足則元氣不足以養胎又不足以自養故當三月正陽明養胎之候而見嘔逆又其甚者或三月或五月而墮此皆陽明氣虚不能固耳古方安胎類用芎歸不知此正不免於滑是方以參术茯草蓮芡山藥扁豆薏苡之甘平以補脾元陳皮麯蘖砂蔲藿桔之香辛以調胃氣其有濕熱以黃連清之燥之既無參苓白术散之補滯又無香砂枳术丸之燥消能補能運臻於至和於以固胎永無滑墮丈夫服之調中養胃名之資生信不虚矣六味地黃丸治腎精不足虚火炎上腰膝痿軟骨熱痠痛足跟痛小便淋秘或不禁遺精夢洩水泛為痰自汗盗汗亡血消渴頭目眩運耳聾齒摇尺衇虚大者熟地黃八兩山茱萸四兩白茯苓三兩亁山藥四兩牡丹皮三兩澤瀉三兩右為末煉蜜丸如桐子大空心淡鹽湯下集註柯琴曰腎虛不能藏精坎宫之火無所附而妄行下無以奉肝木升生之令上絶其肺金生化之源地黃禀甘寒之性製熟則味厚是精不足者補之以味也用以大滋腎陰塡精補髓壯水之主以澤瀉為使世或惡其瀉腎而去之不知一陰一陽者天地之道一開一闔者動静之機精者屬癸陰水也静而不走為腎之體溺者屬壬陽水也動而不居為腎之用是以腎主五液若陰水不守則眞水不足陽水不流則邪水汎行故君地黃以密封蟄之夲即佐澤瀉以䟽水道之滯也然腎虛不補其母不導其上源亦無以固封蟄之用山藥凉補以培癸水之上源茯苓淡滲以導壬水之上源加以茱萸之酸溫藉以收少陽之火以滋厥陰之液丹皮辛寒以清少陰之火還以奉少陽之氣也滋化源奉生氣天癸居其所矣壯水制火特其一端耳按五行皆一惟火有二君火相火也君火為心經之火君主一身之火也相火為腎中之火宣布一身之火也使君火無相火則不能宣布諸火以奉生身之夲相火無君火則不能君主諸火以制其妄行之災故李杲立内傷勞倦火乘土位之論以心火有餘用升陽氣瀉陰火硃砂安神等藥而未及心火之不足者以前人已有歸脾養心等方也震亨立陽常有餘陰常不足之論以腎火有餘用補陰補天等藥而未及腎火之不足者以前人已有腎氣桂附地黃湯丸也依夲方加附子肉桂名桂附地黃丸治兩尺衇弱相火不足虚羸少氣王冰所謂益火之原以消陰翳者是也加黃蘗知母名知蘗地黃丸治兩尺衇旺陰虚火動午熱骨痿王冰所謂壯水之主以制陽光者是也經云陰平陽秘精神乃治若陰陽偏勝則疾病叢生夫腎取象乎坎陽藏於陰之藏也不獨陰盛陽衰陽畏其陰而不敢附即陰衰陽盛陰難藏陽亦無可依雖同為火不歸原而其為病則異也故於腎藥中加桂附壯陽勝陰使陽無所畏而自歸原矣加知蘗補陰秘陽使陽有所貯而自歸藏矣世人但知以桂附引火歸原不知以知蘗平陰秘陽舉世皆蒙其悞故震亨特立補陰之論以闢以火濟火之非而未逹其㫖者從而誹之良可歎也八味地黃丸治命門火衰不能生土以致脾胃虚寒飲食少思大便不實或下元衰憊臍腹疼痛夜多漩溺等證熟地黃八爾九蒸為度搗膏亁山藥四兩山萸肉四兩白茯苓丹皮澤瀉各三兩肉桂附子各一兩右八味為末煉蜜丸如桐子大酒下十五丸日再服集註趙獻可曰君子觀象於坎而知腎中具水火之用今人入房而陽易舉者陰虚火動也陽事先痿者命門火衰也眞水竭則隆冬不寒眞火熄則盛夏不熱是方也熟地山藥澤瀉丹皮茯苓山萸皆濡潤之品所以能壯水之主肉桂附子辛潤之物能於水中補火所以能益火之原水火得其養則腎氣復矣喻昌曰金匱用八味丸治脚氣上入少腹不仁者脚氣即陰氣少腹不仁即攻心之漸故用之以驅逐陰邪也其虚勞腰痛少腹拘急小便不利則因過勞其腎陰氣逆於少腹阻遏膀胱之氣化小便不能通利故用之溫養下焦以收腎氣也其短氣有微飲者飲亦陰類阻其胸中之陽自致短氣故用之引飲下出以安胸中也消渴病飲水一斗小便亦一斗此腎氣不能攝水小便恣出源泉有立竭之勢故急用以逆折其水也夫腎水下趨之消證腎氣不上升之渴證非用是以蟄䕶封藏蒸動水氣舍此曷從治哉後人謂八味丸為治消渴之聖藥得其㫖矣柯琴曰命門之火乃水中之陽夫水體本静而川流不息者氣之動火之用也非指有形者言也然火少則生氣火壯則食氣故火不可亢亦不可衰所云火生土者即腎家之少火遊行其間以息相吹耳若命門火衰少火幾於熄矣欲煖脾胃之陽必先溫命門之火此腎氣丸納桂附於滋陰劑中十倍之一意不在補火而在微微生火即生腎氣也故不曰溫腎而名腎氣斯知腎以氣為主腎得氣而土自生也且形不足者溫之以氣則脾胃因虚寒而致病者固痊即虛火不歸其原者亦納之而歸封蟄之本矣崔氏加減八味丸以五味之酸收易附子之辛熱腎虛而不寒者宜之也千金方於八味外更加元參之鹹寒以助熟地而滋腎加芍藥之酸寒助丹皮以滋肝總之為桂附加鎻鑰耳以之壯水則有餘以之益火恐不足也濟生方加牛膝車前以治水腫倍茯苓以輔地黃山藥茱萸與澤丹車牛等列隨證加減允為得法益陰腎氣丸於六味外加當歸五味柴胡以治目暗不見化裁愈妙矣資生腎氣丸治腎虚脾弱腰重脚腫小便不利腹脹喘急痰盛已成鼓證其效如神熟地黃四兩白茯苓三兩牡丹皮一兩澤瀉一兩亁山藥一兩車前子一兩山茱萸一兩牛膝一兩肉桂一兩附子五錢右十味蜜和丸每服八十丸空心米飲下集註李中梓曰經云諸濕腫滿皆屬於脾又云其本在腎其末在肺皆聚水也又曰腎者主水胃之關也關門不利故聚水而從其類也腫脹之病諸經雖有無不由於脾肺腎者蓋脾主運行肺主氣化腎主五液凡五氣所化之液悉屬於腎五液所行之氣悉屬於肺轉輸二藏以制水生金者悉屬於脾故腫脹不外此三經也然其治法有内外上下虚實不可不辨也在外則腫越婢湯小青龍湯證也在内則脹十棗丸神祐丸證也在上則喘葶藶大棗湯防已椒目葶藶大黃丸證也在下則小便閉沉香琥珀丸䟽鑿飲子證也此皆治實之法若夫虚者實脾飲此方證也張介賓曰地黃山藥丹皮以養陰中之眞水山萸桂附以化陰中之眞氣茯苓澤瀉車前牛膝以利陰中之滯能使氣化於精即所以治肺也補火生土即所以治脾也壯水利竅即所以治腎也補而不滯利而不伐治虚水方更無有出其右者然當因此擴充隨證加減若其人因大病之後脾氣大虛而病水脹者服此雖無所碍終不見效每熟計之脾氣大傷誠非腎藥之所能治專用理中湯一兩加茯苓一兩命火衰者加附子兩足冷者加肉桂腹脹甚者加厚朴三大劑而足脛漸消十餘劑而腹脹退凡治中年之後脾腎虚寒者悉用此法蓋氣虚者不可復行氣腎虛者不可專利水溫補即所以化氣塞因塞用之妙顧在用之者何如耳古法治腫不用補劑而用去水等藥微則分利甚則推逐如五苓散五淋散五皮散導水茯苓湯之類皆所以利水也如舟車神祐丸濬川散禹功散十棗湯之類皆所以逐水也但察其果係實邪則此等治法仍不可廢也大補陰丸治陰虧火旺肺痿欬血骨蒸盜汗虚勞之證黃蘗鹽酒炒知母各四兩鹽水炒熟地酒蒸敗龜板各六兩酥炙猪脊髓和煉蜜為小丸日乾每服三錢淡鹽湯下註朱震亨云陰常不足陽常有餘宜常養其陰陰與陽齊則水能制火斯無病矣今時之人過慾者多精血既虧相火必旺眞陰愈竭孤陽妄行而勞瘵潮熱盜汗骨蒸欬𠻳咯血吐血等證悉作所以世人火旺致此病者十居八九火衰成此疾者百無二三震亨發明先聖千載未發之㫖其功偉哉是方能驟補眞隂承制相火較之六味功效尤㨗蓋因此時以六味補水水不能遽生以生衇保金金不免猶燥惟急以黃蘗之苦以堅腎則能制龍家之火繼以知母之清以凉肺則能全破傷之金若不顧其本即使病去猶恐復來故又以熟地龜板大補其陰是謂培其本清其源矣雖有是證若食少便溏則為胃虚不可輕用封髓丹治夢遺失精及與鬼交黃蘗砂仁甘草右蜜為丸每服三錢集註趙羽皇曰經云腎者主水受五藏六府之精而藏之又曰腎者主蟄封藏之本精之處也蓋腎為堅藏多虛少實因肝木為子偏喜䟽泄母氣厥陰之火一動精即隨之外溢况肝又藏魂神魂不攝宜其夜臥鬼交精泄之證作矣封髓丹為固精之要藥方用黃蘗為君以其味性苦寒又能堅腎腎職得堅則陰水不虞其泛溢寒能清肅則龍火不至於奮揚水火交攝精有不安其位者乎佐以甘草以甘能緩急瀉諸火與肝火之内擾且能使水土合為一家以妙封藏之固若縮砂者以其味辛性溫善能入腎腎之所惡在燥而潤之者惟辛縮砂通三焦逹津液能内五藏六府之精而歸於腎腎家之氣内腎中之髓自藏矣此有取於封髓之意也汪昻曰此方加天冬地黃人參名三才封髓丹用天冬補肺以生水地黃補腎以益精用人參補脾從飲食中化生水精也以藥有天地人之名而補亦在上下中之分使天地位育參贊居中故曰三才也喻昌曰加黃蘗以入腎滋陰砂仁以入脾行滯甘草以少變天冬黃蘗之苦俾合人參建立中氣以伸參兩之權殊非好為増益成方之比也虎潛丸治腎陰不足筋骨痿輭不能歩履龜板黃蘗各四兩知母熟地各二兩牛膝三兩五錢芍藥一兩五錢鎻陽一兩虎骨一兩當歸一兩陳皮七錢五分右為末煮羯羊肉捣為丸桐子大淡鹽湯下集註王又原曰腎為作強之官有精血以為之強也若腎虛精枯而血必隨之精血交敗濕熱風毒遂乘而襲焉此不能步履腰酸筋縮之證作矣且腎兼水火火勝爍陰濕熱相搏筋骨不用宜也方用黃蘗清陰中之火燥骨間之濕且苦能堅腎為治痿要藥故以為君虎骨去風毒健筋骨為臣因高源之水不下母虚而子亦虚肝藏之血不歸子病而母愈病故用知母清肺原歸芍養肝血使歸於腎龜禀天地之陰獨厚茹而不吐使之坐鎭北方更以熟地牛膝鎻陽羊肉羣隊補水之品使精血交補若陳皮者䟽血行氣兹又有氣化血行之妙其為筋骨壯盛有力如虎也必矣道經云虎向水中生以斯為潛之義焉夫是以名之曰虎潛丸葉仲堅曰痿原雖分五藏然其本在腎其標在肺内經云五藏因肺熱葉焦發為痿躄又曰陽氣内伐水不勝火則骨痿髓虚故足不任身骨痿者生於大熱也若視為虚寒而投以桂附多致不救是方以虎名者虎於獸中禀金氣之至剛風生一嘯特為肺金取象焉其潛之云者金從水養母隐子胎故生金者必麗水意在納氣歸腎也龜應北方之象禀陰最厚首常向腹善通任衇能大補眞陰深得夫潛之意者黃蘗味厚為陰中之陰專補腎膀之陰不足能使足膝中氣力涌岀故痿家必用二者為君一以固本一以治標恐竒之不去則偶之也熟地塡少陰之精用以佐龜板知母清太陰之氣用以佐黃蘗牛膝入肝舒筋歸芍佐之肝血有歸陳皮疏之氣血以流骨正筋柔矣又慮熱則生風逗留關節用虎骨所以驅之純陰無陽不能發生佐鎻陽以溫之羊肉為丸補之以味淡鹽湯下急於入腎斯皆潛之為義滋腎丸又名通關丸治熱在下焦小便癃閉而口不渴者黃蘗二兩酒炒知母二兩酒浸炒肉桂一錢右為細末熟水丸桐子大每服五十丸空心下集註李杲曰小便者足太陽膀胱所主生於肺金肺中伏熱水不能生是絶小便之源也渴而小便不通者肺氣不得降是也故用清燥金之正化氣薄淡滲之藥瀉火而清肺滋水之化源也若熱在下焦而不渴是絶其流而溺不泄也須用氣味俱厚陰中之陰藥治之素問云無陽則陰無以生無陰則陽無以化又云膀胱者州都之官津液藏焉氣化則能岀矣無液癃秘是無陰則陽無以化也須用知蘗大苦寒之劑桂一錢為引服之須臾前陰若刀刺火燒溺如湧泉而愈此證一在上焦氣分而渴一在下焦血分而不渴兩者之殊至易辨耳柯琴曰水為腎之體火為腎之用人知腎中有水始能制火不知腎中有火始能致水耳蓋天一生水一者陽氣也即火也氣為水母陽為陰根必火有所歸斯水有所主故反佐以桂之甘溫引知蘗入腎而奏其效此相須之殷亦相制之理也瓊玉膏治虚勞乾欬生地黃四觔白茯苓十三兩白蜜二觔人參六兩右以地黃汁同蜜熬沸用絹濾過將參茯為細末入前汁和匀以磁瓶用綿紙十數層加箬葉封瓶口入砂鍋内以長流水没瓶頸桑柴火煮三晝夜取出換紙紥口以蠟封固懸井中一日取起仍煮半日湯調服集註李中梓曰亁欬者有聲無痰火來乘金金極而鳴也此夲元之病非漸漬難以成功若誤用苦寒祗傷脾土金反無母故丹溪以地黃為君令水盛則火自息又損其肺者益其氣故用人參以鼓生發之元虚則補其母故用茯苓以培萬物之夲白蜜為百花之精味甘歸脾性潤悦肺且緩燥急之火四者皆溫良和厚之品誠堪寶重郭機曰起吾沉瘵珍賽瓊瑤故有瓊玉之名龜鹿二仙膠大補精髓益氣養神鹿角血者十觔龜板自敗者五觔枸杞子甘州者三十兩人參十五兩右用鉛罈如法熬膠初服酒化一錢五分漸加至三錢空心下集註李中梓曰人有三竒精氣神生生之本也精傷無以生氣氣傷無以生神精不足者補之以味鹿得天地之陽氣最全善通督衇足於精者故能多滛而壽龜得天地之陰氣最具善通任衇足於氣者故能伏息而壽二物氣血之屬味最純厚又得造化之元微異類有情竹破竹補之法也人參益氣枸杞生精佐龜鹿補陰補陽無偏勝之憂入氣入血有和平之美由是精生而氣旺氣旺而神昌庶㡬龜鹿之年矣故曰二仙四神丸治脾腎雙虚子後作瀉不思食不化食肉果二兩補骨脂四兩炒五味子二兩吳茱萸二兩炮右為末紅棗四十九枚生薑四兩切水煮棗熟去薑取棗肉搗和藥丸桐子大空心鹽湯下二神丸去茱萸五味子散去肉果補骨脂集註柯琴曰瀉利為腹疾而腹為三陰之都會一藏不調便能瀉利故三陰下利仲景各為立方以主之太陰有理中四逆厥陰有烏梅白頭翁少陰有桃花眞武豬苓豬膚四逆湯散白通通衇等劑可謂曲盡病情諸法備矣然祗為一藏立法若三藏相關久留不痊如子後作瀉一證猶未之及也夫雞鳴至平旦天之陰陰中之陽也因陽氣當至而不至虚邪得以留而不去故作瀉於黎明其由有四一為脾虚不能制水一為腎虛不能行水故二神丸君補骨脂之辛燥補腎以行水佐肉果之辛溫補脾以制水丸以薑棗又辛甘發生諸陽也一為命門火衰不能生土一為少陽氣虚無以發陳故五味子散君五味子之酸溫以收坎宫耗散之火使少火生氣以培土也佐吳茱茰之辛溫以順肝木欲散之勢為水氣開滋生之路以奉春生也此四者病因雖異而見證則同皆水亢為害二神丸是承制之劑五味子散是化生之劑也二方理不同而用則同故可互用以助效亦可合用以建功合為四神丸是制生之劑也制則生化久泄自瘳矣稱曰四神比理中八味二丸較速歟按命門無火不能為中宫腐熟水榖之用腎氣不固誰復司其閉藏之職故木氣纔萌不疏泄而亦疏泄矣雖是木邪干土亦實腎之侮脾也此際當脾腎雙補固濇平肝故以補骨脂溫腎肉果補脾五味子收濇吳茱萸瀉肝腎煖而氣蒸肝平而脾旺關門閉而水榖腐矣御纂醫宗金鑑卷二十七
