body:
  text: 訂正仲景全書傷寒論註太隂全篇目錄理中丸乾薑黄連黄芩人參湯厚朴生薑半夏甘草人參湯桂枝加芍藥湯桂枝加大黄湯御纂醫宗金鑑卷六目録欽定四庫全書御纂醫宗金鑑卷六訂正仲景全書傷寒論註太隂全篇目錄理中丸乾薑黄連黄芩人參湯厚朴生薑半夏甘草人參湯桂枝加芍藥湯桂枝加大黄湯御纂醫宗金鑑卷六目録欽定四庫全書御纂醫宗金鑑卷六訂正仲景全書傷寒論註辨太隂病衇證并治全篇六氣之邪感人雖同人受之而生病各異者何也蓋以人之形有厚薄氣有盛衰蔵有寒熱所受之邪每從其人之蔵氣而化故生病各異也是以或從虛化或從實化或從寒化或從熱化譬諸水火水盛則火滅火盛則水耗物盛從化理固然也誠知乎此又何疑乎陽邪傳隂變寒化熱而遂以為竒耶自後漢迄今千載以來皆謂三隂寒邪不傳且以傷寒傳經隂邪謂為直中抑知直中乃中寒之證非傳經之邪耶是皆未曾熟讀仲景之書故有此誤耳如論中下利腹脹滿身體疼痛者先温其裏乃攻其表温裏宜四逆湯攻表宜桂枝湯此三陽陽邪傳入太隂邪從隂化之寒證也如少隂病下利白通湯主之此太隂寒邪傳少隂之寒證也如下利清糓裏寒外熱汗出而厥者通衇四逆湯主之此少隂寒邪傳厥隂之寒證也皆歴歴可據豈得謂傷寒隂不相傳無陽從隂化之理乎夫太隂濕土純隂之蔵也故病一入太隂則邪從隂化者多從陽化者少從隂化者如論中腹滿吐食自利不渴手足自温時腹自痛宜服理中四逆輩者是也從陽化者如論中發汗後不解腹滿痛者急下之宜大承氣湯腹滿大實痛者宜桂枝加大黄湯主之者是也蓋脾與胃同處腹中故腹滿腹痛兩皆有之然腹滿為太隂主病心下滿為陽明主病其陽明亦有腹滿者以陽明腹滿與熱同化故必有潮熱自汗不大便之證而不似太隂與濕同化有發黄暴煩下利穢腐之證也誠能更於腹之時痛大實痛腹滿痛處詳審虚實斟酌温下則了無餘義矣故以此括之自知太隂之要法也太隂之為病腹滿而吐食不下自利益甚時腹自痛若下之必胸下結鞕按呉人駒曰自利益甚四字當在必胸下結鞕句之下其說甚是若在吐食不下句之下則是已吐食不下而自利益甚矣仲景復曰若下之無所謂也註太隂脾經也其衇布胃中絡於嗌寒邪傳於太隂故腹滿時腹自痛寒邪循衇犯胃故吐食不下此太隂裏虛邪從寒化之證也當以理中四逆輩温之若腹滿嗌乾不大便大實痛始為太隂裏實邪從熱化之證當以桂枝加大黄湯下之矣若以太隂虚寒之滿痛而誤認為太隂實熱之滿痛而下之則寒虚相摶必變為蔵結痞鞕及自利益甚矣此太隂病全篇之提綱後凡稱太隂病者皆指此證而言也集註程應旄曰陽邪亦有腹滿得吐則滿去而食可下者今腹滿而吐食不下則滿為寒脹吐為寒格也陽邪亦有下利腹痛得利則痛隨利減者今下利而時腹自痛則利為寒利痛為寒痛也曰胸下隂邪結於胸下之隂分異於陽邪結胸之在胸且按之而痛也曰結鞕無陽以化氣則為堅隂異於痞之濡而耎也彼皆陽從上陷而阻留此則隂從下逆而不歸寒熱大别也呉人駒曰自利有時而腹自痛非若積蓄而常痛者若以諸痛為實從而下之其滿益甚必令胸下皆為結鞕而自利益甚矣傷寒四五日腹中痛若轉氣下趨少腹者此欲自利也註傷寒四五日邪入太隂之時也腹中痛若不轉氣下趨者屬陽眀也今腹中痛轉氣下趨少腹者乃太隂欲作自利之候也此仲景示人不可以諸痛為實而妄議下之意也集註方有執曰腹中痛轉氣下趨者裏虛不能守而寒邪下迫也張璐曰腹痛亦有屬火者其痛必自下而上攻若痛自上而下趨者定屬寒痛無疑魏荔彤曰此重在預防下利而非辨寒熱也玩若字欲字可見其辨寒邪者自有别法自利不渴者屬太隂以其蔵有寒故也當温之宜服四逆輩註凡自利而渴者裏有熱屬陽也若自利不渴則為裏有寒屬隂也今自利不渴知為太隂本蔵有寒也故當温之四逆輩者指四逆理中附子等湯而言也集註程知曰言太隂自利為寒宜温者也少隂屬腎水熱入而耗其水故自利而渴太隂屬脾土寒入而從其濕則不渴而利故太隂自利當温也程應旄曰三隂同屬蔵寒少隂厥隂有渴證太隂獨無渴證者以其寒在中焦總與龍雷之火無渉少隂中有龍火底寒甚則龍升故自利而渴厥隂中有雷火故有消渴太陽一照雷雨收聲故發熱則利止見厥而復利也魏荔彤曰自利二字乃未經誤下誤汗誤吐而成者故知其蔵本有寒也理中丸方人參白术甘草炙亁薑各三兩右四味𢷬篩蜜和為丸如雞子黄許大以沸湯數合和一丸研碎温服之日三四夜二服腹中未熱益至三四丸然不及湯湯法以四物依兩數切用水八升煑取三升去滓温服一升日三服加減法若臍上築者腎氣動也去术加桂枝四兩吐多者去术加生薑三兩下多者還用术悸者加茯苓二兩渴欲得水者加术足前成四兩半腹中痛者加人參足前成四兩半寒者加亁薑足前成四兩半腹滿者去术加附子一枚服湯後如食頃飲熱粥一升許微自温勿發揭衣被集解程應旄曰陽之動始於温温氣得而糓精運糓氣升而中氣贍故名曰理中實以爕理之功予中焦之陽也蓋謂陽虚即中氣失守膻中無發宣之用六府無灑陳之功猶如釜薪失焰故下至清糓上失滋味五蔵凌奪諸證所由來也參术炙草所以守中州亁薑辛以温中必假之以燃釜薪而騰陽氣是以糓入於隂長氣於陽上輸華蓋下攝州都五蔵六府皆受氣矣此理中之㫖也若水寒互勝即當脾腎雙温加之以附子則命門益而土母温矣白术補脾得人參則壅氣故臍下動氣吐多腹滿皆去术也加桂以伐腎邪加生薑以止嘔也加附子以消隂也下多者濕勝也還用术燥濕也渴欲飲水飲渴也加术使飲化津生也心下悸停水也加茯苓導水也腹中痛倍人參虚痛也寒者加亁薑寒甚也傷寒本自寒下醫復吐下之寒格更逆吐下若食入口即吐亁薑黄連黄芩人參湯主之按經論中並無寒下之病亦無寒下之文玩本條下文寒格更逆吐下可知寒下之下字當是格字文義始相屬註家皆釋胃寒下利不但文義不屬且與芩連之藥不合註經曰格則吐逆格者吐逆之病名也朝食暮吐脾寒格也食入即吐胃熱格也本自寒格謂其人本自有朝食暮吐寒格之病也今病傷寒醫見可吐可下之證遂執成法復行吐下是寒格更逆於吐下也當以理中湯温其太隂加丁香降其寒逆可也若食入口即吐則非寒格乃熱格也當用亁薑人參安胃黄連黄芩降胃火也亁薑黄連黄芩人參湯方亁薑黄連黄芩人參各三兩右四味以水六升煑取二升去滓分温再服傷寒醫下之續得下利清糓不止身疼痛者急當救裏後身疼痛清便自調者急當救表救裏宜四逆湯救表宜桂枝湯註傷寒醫不分表裏寒熱虚實而誤下之續得下利清糓不止者寒其裏也雖有通身疼痛之表未除但下利清糓不止裏寒已盛法當急救其裏俟便利自調仍身疼痛不止再救其表可也救裏宜四逆湯温中勝寒救表宜桂枝湯調榮和衞也集註王三陽曰此證當照顧協熱利須審其利之色何如與勢之緩急不可輕投四逆桂枝也喻昌曰攻裏必須先表後裏始無倒行逆施之患惟在裏之隂寒極盛不得不急救其裏俟裏證稍定仍救其表蓋謂救裏後再行救表也下利清糓不可攻表汗出必脹滿註此詳上條不先救裏而發其表以眀太隂少隂同病之證也下利清糓太隂寒邪已傳少隂即有身痛不可攻表若誤攻其表即使汗出太陽表解而太隂寒凝必脹滿矣下利腹脹滿身體疼痛者先温其裏乃攻其表温裏宜四逆湯攻表宜桂枝湯註此承上條互發其證以眀先裏後表之治也下利腹脹滿者裏寒邪也身體疼痛者表寒邪也凡表裏寒邪之證同見總以温裏為急故當先温其裏後攻其表温裏宜四逆湯攻表宜桂枝湯集註方有執曰裏虚表實惟其虚也故必先之惟其實也故可後焉發汗後腹脹滿者厚朴生薑半夏甘草人參湯主之註發汗後表已解而腹滿者太隂裏虚之脹滿也故以厚朴生薑甘草半夏人參湯主之消脹散滿補中降逆也集註成無己曰吐後脹滿與下後脹滿皆為實者言邪氣乗虚入裏而為實也發汗後則外已解腹脹滿知非裏實由太隂不足脾氣不通故壅而為滿也與此湯和脾胃而降逆氣宜矣汪琥曰此條乃汗後氣虚腹脹滿其人雖作脹滿而内無實形所以用人參炙甘草等甘温補藥無疑也張錫駒曰此言發汗而傷其脾氣也脾主腹故腹滿為太隂主病發汗後而腹脹滿則知其人脾氣素虛今脾氣愈虛則不能轉輸濁氣不降清氣不升而脹滿作矣厚朴生薑半夏甘草人參湯方厚朴半觔炙去皮生薑半觔切半夏半升洗甘草二兩炙人參一兩右五味以水一斗煑取三升去滓温服一升日三服發汗不解腹滿痛者急下之宜大承氣湯腹滿不減減不足言當下之宜大承氣湯註此詳申上條互發其義以别其治也發汗後表已解腹滿不痛者乃腹滿時減減復如故之虚滿也當温之厚朴生薑半夏甘草人參湯證也今發汗後表不解腹滿大痛者乃腹滿不減減不足言之實滿也當下之宜大承氣湯蓋以裏急先攻裏後和表也集註喻昌曰減不足言四字形容腹滿如繪見滿至十分即減去一二分不足殺其勢也此所以縱有外邪未解而當下無疑耳程應旄曰下之而腹滿如故即減去一二分算不得減下之不妨再下必當以減盡為度也劉宏璧曰太隂無可下之法也設在經則各經已無可下之理在蔵則太隂尤無受下之處桂枝加大黄湯安能無疑乎不知脾與胃相表裏也太陽誤下太隂受邪適胃有宿食則脾因胃之實而實亦即因太陽之邪而痛矣既大滿大痛已成胃實又非此湯之所能治故宜大承氣湯也太隂病衇浮者可發汗宜桂枝湯註太隂經病衇當浮緩太隂蔵病衇當沉緩今邪至太隂衇浮不緩者知太陽表邪猶未全罷也故即有吐利不食腹滿時痛一二證其衇不沉而浮便可以桂枝發汗先解其外俟外解已再調其内可也於此又可知論中身痛腹滿下利急先救裏者衇必不浮矣集註王肯堂曰病在太陽衇浮無汗宜麻黄湯此衇浮當亦無汗而不言者謂隂不得有汗不必言也不用麻黄湯而用桂枝湯蓋以三隂兼表病者俱不當大發汗也須識無汗亦有用桂枝者程知曰此言太隂宜散者也太隂病謂有腹痛下利證也太陽衇尺寸俱浮今衇浮則邪還於表可知矣故宜用桂枝解散不用麻黄者隂病不得大發其汗也桂枝湯有和裏之意焉程應旄曰此太隂中之太陽也雖有裏病仍從太陽表治方不引邪入蔵本太陽病醫反下之因而腹滿時痛者屬太隂也桂枝加芍藥湯主之大實痛者桂枝加大黄湯主之註本太陽中風病醫不以桂枝湯發之而反下之因而邪陷入裏餘無他證惟腹滿時痛者此屬太隂裏虚痛也故宜桂枝加芍藥湯以外解太陽之表而内調太隂之裏虚也若大滿實痛則屬太隂熱化胃實痛也故宜桂枝加大黄湯以外解太陽之表而内攻太隂之裏實也集註趙嗣真曰太隂腹滿證有三有次第傳經之邪有直入中寒之邪有下後内陷之邪不可不辨喻昌曰太陽病之誤下其變皆在胸脇以上此之誤下而腹滿時痛無胸脇等證則其邪已入隂位所以屬在太隂也仍用桂枝解肌之法以升發太陽之邪倍芍藥者以調太隂之氣本方不増一藥斯為神耳大實大滿宜從急下然陽分之邪初陷太隂未可峻攻但於桂枝湯中少加大黄七表三裏以分殺其邪與大柴胡湯同其義也程應旄曰誤下太陽而成腹滿時痛太隂之證見矣然表邪内陷留滯於太隂非蔵寒病也仍用桂枝湯升發陽邪但倍芍藥以調和之倘大實而痛於證似可急下然隂實而非陽實仍從桂枝例升發陽邪但加大黄以破結滯之物使表裏兩邪各有去路則寒隨實去不温而自温矣然此二證雖屬之太隂實從太陽傳來則衇必尚浮可知桂枝加芍藥湯方於桂枝湯方内更加芍藥三兩隨前共六兩餘依桂枝湯法桂枝加大黄湯方桂枝三兩大黄二兩芍藥六兩甘草二兩炙生薑三兩切大棗十二枚擘右六味以水七升煑取三升去滓温服一升日三服集解柯琴曰腹滿為太隂陽明俱有之證然位同而職異太隂主出太隂病則腐穢氣凝不利故滿而時痛陽明主内陽明病則腐穢燥結不行故大實而痛是知大實痛是陽明病而非太隂病矣仲景因表證未解陽邪已陷入太隂故倍芍藥以益脾調中而除腹滿之時痛此用隂和陽法也若表邪未解而陽邪陷入陽明則加大黄以潤胃通結而除其大實之痛此雙解表裏法也凡妄下必傷胃之氣液胃氣虚則陽邪襲隂故轉屬太隂胃液涸則兩陽相摶故轉屬陽明屬太隂則腹滿時痛而不實隂道虚也屬陽明則腹滿大實而痛陽道實也滿而時痛是下利之兆大實而痛是燥屎之徵故倍加芍藥小變建中之劑少加大黄微示調胃之方也太隂為病衇弱其人續自便利設當行大黄芍藥者宜減之以其人胃氣弱易動故也註太隂為病必腹滿而痛治之之法當以衇消息之若其人衇弱則其中不實雖不轉氣下趨少腹然必續自便利設當行大黄芍藥者宜減之以胃氣弱難堪峻攻其便易動故也由此推之可知大便鞕者不論在隂在陽凡衇弱皆不可輕下也集註程知曰此言太隂衇弱恐續自利雖有腹痛不宜用攻與建中湯相發明也喻昌曰此叚叮嚀與陽明篇中互相發明陽明曰不轉失氣曰先鞕後溏曰未定成鞕皆是恐傷太隂脾氣此太隂證而衇弱恐續自利雖有腹痛減用大黄芍藥又是恐傷陽明胃氣也汪琥曰或問大黄能傷胃氣故宜減芍藥能調脾隂何以亦減之答曰衇弱則氣餒不充仲景以温甘之藥能生氣芍藥之味酸寒雖不若大黄之峻要非氣弱者所宜多用故亦減之傷寒衇浮而緩手足自温者繫在太隂太隂當發身黄若小便自利者不能發黄至七八日雖暴煩下利日十餘行必自止以脾家實腐穢當去故也註傷寒衇浮而緩手足熱者為繫在太陽今手足温故知繫在太隂也太隂屬濕濕與熱瘀當發身黄小便自利者則濕不畜熱不瘀故不能發黄也若至七八日大便鞕則為轉屬陽明今既不鞕雖暴煩下利日十餘行必當自止何也以衇浮緩手足温知太隂脾家素實邪不自容腐穢當去故也集註程知曰言自利之證衇浮緩手足温則為脾實也太隂衇本緩故浮緩雖類太陽中風而手足自温則不似太陽之發熱更不似少隂厥隂之厥逆所以為繋在太隂也太隂濕熱相蒸勢必發黄然小便利則濕下泄而不發黄矣此雖暴煩頻利有似少隂之證然其利當自止所以然者以衇浮緩手足温知其人脾氣實而非虚寒之比其濕熱所積之腐穢自當逐之而下也若不辨晰而以四逆法治之則誤矣程應旄曰太隂得浮緩手足温之衇證則胃陽用事自無蔵寒之痛隂鬱或有之小便不利必發黄雖發黄不為隂黄若小便自利者不能發黄隂欲鬱而陽必驅至七八日雖暴煩下利日十餘行必自止所以然者衇不沉且弱而浮緩手足不凉而自温隂得陽以周䕶則不寒不寒則不虛是為脾家實也經曰陽道實隂道虚隂行陽道豈肯容邪久住此則腐穢當去故耳汪琥曰下利煩燥者死此為先利而後煩是正氣脫而邪氣擾也兹則先煩後利是脾家之正氣實故不受邪而與之争因暴發煩熱也太隂中風四肢煩痛陽微隂濇而長者為欲愈註太隂中風者謂此太隂病是從太陽中風傳來者故有四肢煩疼之證也隂陽以浮沉言夫以浮微沉濇之太隂衇而兼見陽明之長衇則為隂病陽衇蔵邪傳府故為欲愈也集註程知曰傷寒隂邪也故自利宜用四逆傷風陽邪也故煩痛見於四肢凡太隂病衇浮者多是太隂中風喻昌曰微濇之中更察其衇之長而不短知元氣未漓其病當自愈也太隂病欲解時從亥至丑上註邪之解也必於所旺之時亥子丑乃太隂所旺之時也當此旺時故邪不能勝而自解矣音切趨七句切揭音訐腐音府穢於廢切御纂醫宗金鑑卷六欽定四庫全書御纂醫宗金鑑卷六訂正仲景全書傷寒論註辨太隂病衇證并治全篇六氣之邪感人雖同人受之而生病各異者何也蓋以人之形有厚薄氣有盛衰蔵有寒熱所受之邪每從其人之蔵氣而化故生病各異也是以或從虛化或從實化或從寒化或從熱化譬諸水火水盛則火滅火盛則水耗物盛從化理固然也誠知乎此又何疑乎陽邪傳隂變寒化熱而遂以為竒耶自後漢迄今千載以來皆謂三隂寒邪不傳且以傷寒傳經隂邪謂為直中抑知直中乃中寒之證非傳經之邪耶是皆未曾熟讀仲景之書故有此誤耳如論中下利腹脹滿身體疼痛者先温其裏乃攻其表温裏宜四逆湯攻表宜桂枝湯此三陽陽邪傳入太隂邪從隂化之寒證也如少隂病下利白通湯主之此太隂寒邪傳少隂之寒證也如下利清糓裏寒外熱汗出而厥者通衇四逆湯主之此少隂寒邪傳厥隂之寒證也皆歴歴可據豈得謂傷寒隂不相傳無陽從隂化之理乎夫太隂濕土純隂之蔵也故病一入太隂則邪從隂化者多從陽化者少從隂化者如論中腹滿吐食自利不渴手足自温時腹自痛宜服理中四逆輩者是也從陽化者如論中發汗後不解腹滿痛者急下之宜大承氣湯腹滿大實痛者宜桂枝加大黄湯主之者是也蓋脾與胃同處腹中故腹滿腹痛兩皆有之然腹滿為太隂主病心下滿為陽明主病其陽明亦有腹滿者以陽明腹滿與熱同化故必有潮熱自汗不大便之證而不似太隂與濕同化有發黄暴煩下利穢腐之證也誠能更於腹之時痛大實痛腹滿痛處詳審虚實斟酌温下則了無餘義矣故以此括之自知太隂之要法也太隂之為病腹滿而吐食不下自利益甚時腹自痛若下之必胸下結鞕按呉人駒曰自利益甚四字當在必胸下結鞕句之下其說甚是若在吐食不下句之下則是已吐食不下而自利益甚矣仲景復曰若下之無所謂也註太隂脾經也其衇布胃中絡於嗌寒邪傳於太隂故腹滿時腹自痛寒邪循衇犯胃故吐食不下此太隂裏虛邪從寒化之證也當以理中四逆輩温之若腹滿嗌乾不大便大實痛始為太隂裏實邪從熱化之證當以桂枝加大黄湯下之矣若以太隂虚寒之滿痛而誤認為太隂實熱之滿痛而下之則寒虚相摶必變為蔵結痞鞕及自利益甚矣此太隂病全篇之提綱後凡稱太隂病者皆指此證而言也集註程應旄曰陽邪亦有腹滿得吐則滿去而食可下者今腹滿而吐食不下則滿為寒脹吐為寒格也陽邪亦有下利腹痛得利則痛隨利減者今下利而時腹自痛則利為寒利痛為寒痛也曰胸下隂邪結於胸下之隂分異於陽邪結胸之在胸且按之而痛也曰結鞕無陽以化氣則為堅隂異於痞之濡而耎也彼皆陽從上陷而阻留此則隂從下逆而不歸寒熱大别也呉人駒曰自利有時而腹自痛非若積蓄而常痛者若以諸痛為實從而下之其滿益甚必令胸下皆為結鞕而自利益甚矣傷寒四五日腹中痛若轉氣下趨少腹者此欲自利也註傷寒四五日邪入太隂之時也腹中痛若不轉氣下趨者屬陽眀也今腹中痛轉氣下趨少腹者乃太隂欲作自利之候也此仲景示人不可以諸痛為實而妄議下之意也集註方有執曰腹中痛轉氣下趨者裏虛不能守而寒邪下迫也張璐曰腹痛亦有屬火者其痛必自下而上攻若痛自上而下趨者定屬寒痛無疑魏荔彤曰此重在預防下利而非辨寒熱也玩若字欲字可見其辨寒邪者自有别法自利不渴者屬太隂以其蔵有寒故也當温之宜服四逆輩註凡自利而渴者裏有熱屬陽也若自利不渴則為裏有寒屬隂也今自利不渴知為太隂本蔵有寒也故當温之四逆輩者指四逆理中附子等湯而言也集註程知曰言太隂自利為寒宜温者也少隂屬腎水熱入而耗其水故自利而渴太隂屬脾土寒入而從其濕則不渴而利故太隂自利當温也程應旄曰三隂同屬蔵寒少隂厥隂有渴證太隂獨無渴證者以其寒在中焦總與龍雷之火無渉少隂中有龍火底寒甚則龍升故自利而渴厥隂中有雷火故有消渴太陽一照雷雨收聲故發熱則利止見厥而復利也魏荔彤曰自利二字乃未經誤下誤汗誤吐而成者故知其蔵本有寒也理中丸方人參白术甘草炙亁薑各三兩右四味𢷬篩蜜和為丸如雞子黄許大以沸湯數合和一丸研碎温服之日三四夜二服腹中未熱益至三四丸然不及湯湯法以四物依兩數切用水八升煑取三升去滓温服一升日三服加減法若臍上築者腎氣動也去术加桂枝四兩吐多者去术加生薑三兩下多者還用术悸者加茯苓二兩渴欲得水者加术足前成四兩半腹中痛者加人參足前成四兩半寒者加亁薑足前成四兩半腹滿者去术加附子一枚服湯後如食頃飲熱粥一升許微自温勿發揭衣被集解程應旄曰陽之動始於温温氣得而糓精運糓氣升而中氣贍故名曰理中實以爕理之功予中焦之陽也蓋謂陽虚即中氣失守膻中無發宣之用六府無灑陳之功猶如釜薪失焰故下至清糓上失滋味五蔵凌奪諸證所由來也參术炙草所以守中州亁薑辛以温中必假之以燃釜薪而騰陽氣是以糓入於隂長氣於陽上輸華蓋下攝州都五蔵六府皆受氣矣此理中之㫖也若水寒互勝即當脾腎雙温加之以附子則命門益而土母温矣白术補脾得人參則壅氣故臍下動氣吐多腹滿皆去术也加桂以伐腎邪加生薑以止嘔也加附子以消隂也下多者濕勝也還用术燥濕也渴欲飲水飲渴也加术使飲化津生也心下悸停水也加茯苓導水也腹中痛倍人參虚痛也寒者加亁薑寒甚也傷寒本自寒下醫復吐下之寒格更逆吐下若食入口即吐亁薑黄連黄芩人參湯主之按經論中並無寒下之病亦無寒下之文玩本條下文寒格更逆吐下可知寒下之下字當是格字文義始相屬註家皆釋胃寒下利不但文義不屬且與芩連之藥不合註經曰格則吐逆格者吐逆之病名也朝食暮吐脾寒格也食入即吐胃熱格也本自寒格謂其人本自有朝食暮吐寒格之病也今病傷寒醫見可吐可下之證遂執成法復行吐下是寒格更逆於吐下也當以理中湯温其太隂加丁香降其寒逆可也若食入口即吐則非寒格乃熱格也當用亁薑人參安胃黄連黄芩降胃火也亁薑黄連黄芩人參湯方亁薑黄連黄芩人參各三兩右四味以水六升煑取二升去滓分温再服傷寒醫下之續得下利清糓不止身疼痛者急當救裏後身疼痛清便自調者急當救表救裏宜四逆湯救表宜桂枝湯註傷寒醫不分表裏寒熱虚實而誤下之續得下利清糓不止者寒其裏也雖有通身疼痛之表未除但下利清糓不止裏寒已盛法當急救其裏俟便利自調仍身疼痛不止再救其表可也救裏宜四逆湯温中勝寒救表宜桂枝湯調榮和衞也集註王三陽曰此證當照顧協熱利須審其利之色何如與勢之緩急不可輕投四逆桂枝也喻昌曰攻裏必須先表後裏始無倒行逆施之患惟在裏之隂寒極盛不得不急救其裏俟裏證稍定仍救其表蓋謂救裏後再行救表也下利清糓不可攻表汗出必脹滿註此詳上條不先救裏而發其表以眀太隂少隂同病之證也下利清糓太隂寒邪已傳少隂即有身痛不可攻表若誤攻其表即使汗出太陽表解而太隂寒凝必脹滿矣下利腹脹滿身體疼痛者先温其裏乃攻其表温裏宜四逆湯攻表宜桂枝湯註此承上條互發其證以眀先裏後表之治也下利腹脹滿者裏寒邪也身體疼痛者表寒邪也凡表裏寒邪之證同見總以温裏為急故當先温其裏後攻其表温裏宜四逆湯攻表宜桂枝湯集註方有執曰裏虚表實惟其虚也故必先之惟其實也故可後焉發汗後腹脹滿者厚朴生薑半夏甘草人參湯主之註發汗後表已解而腹滿者太隂裏虚之脹滿也故以厚朴生薑甘草半夏人參湯主之消脹散滿補中降逆也集註成無己曰吐後脹滿與下後脹滿皆為實者言邪氣乗虚入裏而為實也發汗後則外已解腹脹滿知非裏實由太隂不足脾氣不通故壅而為滿也與此湯和脾胃而降逆氣宜矣汪琥曰此條乃汗後氣虚腹脹滿其人雖作脹滿而内無實形所以用人參炙甘草等甘温補藥無疑也張錫駒曰此言發汗而傷其脾氣也脾主腹故腹滿為太隂主病發汗後而腹脹滿則知其人脾氣素虛今脾氣愈虛則不能轉輸濁氣不降清氣不升而脹滿作矣厚朴生薑半夏甘草人參湯方厚朴半觔炙去皮生薑半觔切半夏半升洗甘草二兩炙人參一兩右五味以水一斗煑取三升去滓温服一升日三服發汗不解腹滿痛者急下之宜大承氣湯腹滿不減減不足言當下之宜大承氣湯註此詳申上條互發其義以别其治也發汗後表已解腹滿不痛者乃腹滿時減減復如故之虚滿也當温之厚朴生薑半夏甘草人參湯證也今發汗後表不解腹滿大痛者乃腹滿不減減不足言之實滿也當下之宜大承氣湯蓋以裏急先攻裏後和表也集註喻昌曰減不足言四字形容腹滿如繪見滿至十分即減去一二分不足殺其勢也此所以縱有外邪未解而當下無疑耳程應旄曰下之而腹滿如故即減去一二分算不得減下之不妨再下必當以減盡為度也劉宏璧曰太隂無可下之法也設在經則各經已無可下之理在蔵則太隂尤無受下之處桂枝加大黄湯安能無疑乎不知脾與胃相表裏也太陽誤下太隂受邪適胃有宿食則脾因胃之實而實亦即因太陽之邪而痛矣既大滿大痛已成胃實又非此湯之所能治故宜大承氣湯也太隂病衇浮者可發汗宜桂枝湯註太隂經病衇當浮緩太隂蔵病衇當沉緩今邪至太隂衇浮不緩者知太陽表邪猶未全罷也故即有吐利不食腹滿時痛一二證其衇不沉而浮便可以桂枝發汗先解其外俟外解已再調其内可也於此又可知論中身痛腹滿下利急先救裏者衇必不浮矣集註王肯堂曰病在太陽衇浮無汗宜麻黄湯此衇浮當亦無汗而不言者謂隂不得有汗不必言也不用麻黄湯而用桂枝湯蓋以三隂兼表病者俱不當大發汗也須識無汗亦有用桂枝者程知曰此言太隂宜散者也太隂病謂有腹痛下利證也太陽衇尺寸俱浮今衇浮則邪還於表可知矣故宜用桂枝解散不用麻黄者隂病不得大發其汗也桂枝湯有和裏之意焉程應旄曰此太隂中之太陽也雖有裏病仍從太陽表治方不引邪入蔵本太陽病醫反下之因而腹滿時痛者屬太隂也桂枝加芍藥湯主之大實痛者桂枝加大黄湯主之註本太陽中風病醫不以桂枝湯發之而反下之因而邪陷入裏餘無他證惟腹滿時痛者此屬太隂裏虚痛也故宜桂枝加芍藥湯以外解太陽之表而内調太隂之裏虚也若大滿實痛則屬太隂熱化胃實痛也故宜桂枝加大黄湯以外解太陽之表而内攻太隂之裏實也集註趙嗣真曰太隂腹滿證有三有次第傳經之邪有直入中寒之邪有下後内陷之邪不可不辨喻昌曰太陽病之誤下其變皆在胸脇以上此之誤下而腹滿時痛無胸脇等證則其邪已入隂位所以屬在太隂也仍用桂枝解肌之法以升發太陽之邪倍芍藥者以調太隂之氣本方不増一藥斯為神耳大實大滿宜從急下然陽分之邪初陷太隂未可峻攻但於桂枝湯中少加大黄七表三裏以分殺其邪與大柴胡湯同其義也程應旄曰誤下太陽而成腹滿時痛太隂之證見矣然表邪内陷留滯於太隂非蔵寒病也仍用桂枝湯升發陽邪但倍芍藥以調和之倘大實而痛於證似可急下然隂實而非陽實仍從桂枝例升發陽邪但加大黄以破結滯之物使表裏兩邪各有去路則寒隨實去不温而自温矣然此二證雖屬之太隂實從太陽傳來則衇必尚浮可知桂枝加芍藥湯方於桂枝湯方内更加芍藥三兩隨前共六兩餘依桂枝湯法桂枝加大黄湯方桂枝三兩大黄二兩芍藥六兩甘草二兩炙生薑三兩切大棗十二枚擘右六味以水七升煑取三升去滓温服一升日三服集解柯琴曰腹滿為太隂陽明俱有之證然位同而職異太隂主出太隂病則腐穢氣凝不利故滿而時痛陽明主内陽明病則腐穢燥結不行故大實而痛是知大實痛是陽明病而非太隂病矣仲景因表證未解陽邪已陷入太隂故倍芍藥以益脾調中而除腹滿之時痛此用隂和陽法也若表邪未解而陽邪陷入陽明則加大黄以潤胃通結而除其大實之痛此雙解表裏法也凡妄下必傷胃之氣液胃氣虚則陽邪襲隂故轉屬太隂胃液涸則兩陽相摶故轉屬陽明屬太隂則腹滿時痛而不實隂道虚也屬陽明則腹滿大實而痛陽道實也滿而時痛是下利之兆大實而痛是燥屎之徵故倍加芍藥小變建中之劑少加大黄微示調胃之方也太隂為病衇弱其人續自便利設當行大黄芍藥者宜減之以其人胃氣弱易動故也註太隂為病必腹滿而痛治之之法當以衇消息之若其人衇弱則其中不實雖不轉氣下趨少腹然必續自便利設當行大黄芍藥者宜減之以胃氣弱難堪峻攻其便易動故也由此推之可知大便鞕者不論在隂在陽凡衇弱皆不可輕下也集註程知曰此言太隂衇弱恐續自利雖有腹痛不宜用攻與建中湯相發明也喻昌曰此叚叮嚀與陽明篇中互相發明陽明曰不轉失氣曰先鞕後溏曰未定成鞕皆是恐傷太隂脾氣此太隂證而衇弱恐續自利雖有腹痛減用大黄芍藥又是恐傷陽明胃氣也汪琥曰或問大黄能傷胃氣故宜減芍藥能調脾隂何以亦減之答曰衇弱則氣餒不充仲景以温甘之藥能生氣芍藥之味酸寒雖不若大黄之峻要非氣弱者所宜多用故亦減之傷寒衇浮而緩手足自温者繫在太隂太隂當發身黄若小便自利者不能發黄至七八日雖暴煩下利日十餘行必自止以脾家實腐穢當去故也註傷寒衇浮而緩手足熱者為繫在太陽今手足温故知繫在太隂也太隂屬濕濕與熱瘀當發身黄小便自利者則濕不畜熱不瘀故不能發黄也若至七八日大便鞕則為轉屬陽明今既不鞕雖暴煩下利日十餘行必當自止何也以衇浮緩手足温知太隂脾家素實邪不自容腐穢當去故也集註程知曰言自利之證衇浮緩手足温則為脾實也太隂衇本緩故浮緩雖類太陽中風而手足自温則不似太陽之發熱更不似少隂厥隂之厥逆所以為繋在太隂也太隂濕熱相蒸勢必發黄然小便利則濕下泄而不發黄矣此雖暴煩頻利有似少隂之證然其利當自止所以然者以衇浮緩手足温知其人脾氣實而非虚寒之比其濕熱所積之腐穢自當逐之而下也若不辨晰而以四逆法治之則誤矣程應旄曰太隂得浮緩手足温之衇證則胃陽用事自無蔵寒之痛隂鬱或有之小便不利必發黄雖發黄不為隂黄若小便自利者不能發黄隂欲鬱而陽必驅至七八日雖暴煩下利日十餘行必自止所以然者衇不沉且弱而浮緩手足不凉而自温隂得陽以周䕶則不寒不寒則不虛是為脾家實也經曰陽道實隂道虚隂行陽道豈肯容邪久住此則腐穢當去故耳汪琥曰下利煩燥者死此為先利而後煩是正氣脫而邪氣擾也兹則先煩後利是脾家之正氣實故不受邪而與之争因暴發煩熱也太隂中風四肢煩痛陽微隂濇而長者為欲愈註太隂中風者謂此太隂病是從太陽中風傳來者故有四肢煩疼之證也隂陽以浮沉言夫以浮微沉濇之太隂衇而兼見陽明之長衇則為隂病陽衇蔵邪傳府故為欲愈也集註程知曰傷寒隂邪也故自利宜用四逆傷風陽邪也故煩痛見於四肢凡太隂病衇浮者多是太隂中風喻昌曰微濇之中更察其衇之長而不短知元氣未漓其病當自愈也太隂病欲解時從亥至丑上註邪之解也必於所旺之時亥子丑乃太隂所旺之時也當此旺時故邪不能勝而自解矣音切趨七句切揭音訐腐音府穢於廢切御纂醫宗金鑑卷六
