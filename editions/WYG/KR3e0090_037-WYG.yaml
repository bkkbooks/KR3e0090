body:
  text: 編輯傷寒心法要訣目錄表熱裏熱隂熱陽熱惡寒背惡寒辨惡風頭痛項强身痛煩躁不眠懊憹自汗頭汗手足汗潮熱時熱讝語鄭聲渴證舌胎胸脇滿痛嘔證往來寒熱如瘧寒熱目眩耳聾腹滿痛吐證熱利寒利但欲寐隂陽咽痛氣上衝饑不欲食手足厥逆少腹滿痛神昬狂亂畜血發狂循衣摸牀太陽陽邪停飲太陽隂邪停飲少隂陽邪停飲少隂隂邪停飲喘急短氣心下悸戰振慄呃逆噦噫結胸痞鞕發黄疹斑衂血吐血大小便膿血頤毒狐惑百合熱入血室食復勞復房勞復隂陽易御纂醫宗金鑑卷三十七目録欽定四庫全書御纂醫宗金鑑卷三十七編輯傷寒心法要訣目錄表熱裏熱隂熱陽熱惡寒背惡寒辨惡風頭痛項强身痛煩躁不眠懊憹自汗頭汗手足汗潮熱時熱讝語鄭聲渴證舌胎胸脇滿痛嘔證往來寒熱如瘧寒熱目眩耳聾腹滿痛吐證熱利寒利但欲寐隂陽咽痛氣上衝饑不欲食手足厥逆少腹滿痛神昬狂亂畜血發狂循衣摸牀太陽陽邪停飲太陽隂邪停飲少隂陽邪停飲少隂隂邪停飲喘急短氣心下悸戰振慄呃逆噦噫結胸痞鞕發黄疹斑衂血吐血大小便膿血頤毒狐惑百合熱入血室食復勞復房勞復隂陽易御纂醫宗金鑑卷三十七目録欽定四庫全書御纂醫宗金鑑卷三十七編輯傷寒心法要訣表熱裏熱隂熱陽熱發熱無時熱翕翕炊籠騰越熱蒸蒸表熱尿白裏熱赤外需麻桂内凉承燥乾煩渴為陽熱厥利外熱屬隂經陽熱宜清白虎輩隂熱四逆與白通註發熱無時熱翕翕謂發熱無休止之時若合羽外覆之表熱也炊籠騰越熱蒸蒸謂發熱如炊籠蒸蒸内越之裏熱也表熱熱不在裏故尿白也裏熱故尿赤也外需麻桂謂表熱無汗宜麻黄湯有汗宜桂枝湯内凉承謂裏熱輕者宜凉膈散重者宜三承氣湯發熱兼口燥舌乾煩渴者為陽經之熱也發熱兼厥冷下利清穀者屬隂經之熱也陽熱宜清白虎解毒輩也隂熱宜溫四逆白通湯也按翕翕蒸蒸發熱俱有汗二證相類若以翕翕之表熱誤為蒸蒸之裏熱下之則逆若以蒸蒸裏熱誤為翕翕表熱汗之轉傷翕翕之汗熱雖同蒸蒸捫之自溫不似蒸蒸之汗熱捫之自有熱氣透手也其間或有疑似難辨又當審小便之白赤舌胎之潤燥自可决也惡寒背惡寒辨惡寒表裏隂陽辨發熱有汗表為虚發熱無汗表實證實以麻黄虚桂枝無熱惡寒發隂裏桂枝加附頗相宜背寒口和隂附子口燥渴陽白虎需註惡寒一證有表裏隂陽之辨發熱惡寒發於陽表也有汗宜桂枝湯無汗宜麻黄湯無熱惡寒發於隂裏也有汗宜桂枝加附子湯無汗宜麻黄附子細辛湯背惡寒口和謂口中不燥而和也隂謂屬少隂也宜附子湯背惡寒口燥渴謂口中燥而渴也陽謂屬陽明也宜白虎加人參湯按隂陽二經惡寒雖同其身有熱無熱則異也一則汗之二則溫之少隂陽明之背惡寒雖同其口中和口中不和則異也一則溫之一則清之惡寒雖屬輕微之證仲景立法可辨他可類推矣惡風風寒相因相離少三陽俱有惡寒風惡風屬陽法從表三隂惡寒無惡風註風寒二者大率多相因而少相離有寒時不皆無風有風時不皆無寒故三陽俱有惡寒惡風同見也惡風與惡寒均表病也法當從表然風屬陽寒屬隂故三隂經證有惡寒而無惡風也頭痛三陽頭痛身皆熱無熱吐沫厥隂經不便尿紅當議下尿白猶屬表未清註三陽謂太陽陽明少陽也頭痛身皆熱謂三陽頭痛身皆熱也三陽經頭痛法當從三陽治也厥隂頭痛則多厥而無熱嘔吐涎沫是厥隂挾寒邪上逆也宜吳茱萸湯溫而降之三陽頭痛若不大便小便紅赤為裏實熱法當議下宜承氣湯若小便清白即不大便為裏熱未實表尚未清法當先從表治也三隂經無頭痛惟厥隂有頭痛以其衇與督衇上㑹於巓也三隂經無發熱厥隂少隂亦有發熱謂之反發熱以其藏有相火隂盛格陽於外也項强項背几几强太陽衇浮無汗葛根湯有汗桂枝添葛入衇沉栝蔞桂枝方結胸項强如柔痙大陷胸丸下必康但見少陽休汗下柴胡去半入蔞良註項强太陽病也項背强太陽陽明病也几几拘强而甚之貌也衇浮屬二陽之表衇也若無汗是從傷寒傳來宜葛根湯有汗是從中風傳來宜桂枝加葛根湯衇沉謂邪已入胸裏也宜栝蔞桂枝湯結胸謂結胸病也項强如柔痙謂項强背反張有汗如柔痙之狀也宜大陷胸丸但見少陽謂太陽少陽併病之項强休汗下謂邪入少陽不可更汗下也宜柴胡湯去半夏加栝蔞主之良好也栝蔞桂枝湯方在金匱要畧身痛身痛未汗表實證汗後身疼屬表虚桂加生薑參芍藥尺遲血少建中耆少隂沉厥附子治厥隂汗利四逆醫風濕盡痛難轉側掣引煩疼桂附宜註身痛未汗屬表實證宜麻黄湯汗後身疼屬表虚證宜桂枝新加湯即桂枝湯倍生薑芍藥加人參也曰桂加即桂枝湯加此也尺遲血少建中耆謂身痛尺中衇遲是血少榮氣不足也雖未經汗不可發汗宜建中湯加黄耆以補榮血也少隂謂身痛見少隂沉衇四肢厥冷也附子治謂宜附子湯治也厥隂謂身痛見厥隂厥逆汗出不止下利清穀也四逆醫謂以四逆湯醫也風濕謂風濕身痛也盡痛難轉側是濕則令人一身盡痛不能轉側掣引煩疼是風則令人筋衇牽引煩疼不寧也桂附宜謂宜以桂枝附子湯也煩躁不眠懊憹躁身不靜煩心擾不躁難眠作熱觀懊憹煩甚無冷病惟躁隂陽表裏看諸煩無論三法後便軟梔竹等湯煎便鞕白虎三承氣躁同隂見便屬寒註身為熱動而不安謂之躁心為熱擾而不寧謂之煩煩則擾於内躁則動於外故有心煩而無身煩有身躁而無心躁也大抵煩屬陽躁屬隂若懊憹心中反覆顚倒煩不得眠不與躁同見者皆無冷病當作熱觀也惟躁則不然當分表裏隂陽取治故太陽有不汗出而煩躁謂之在表大青龍證也陽明有心下鞕之煩躁謂之在陽白虎湯證也三隂有吐利手足厥之煩躁謂之在隂四逆輩證也諸煩謂煩不眠懊憹也無論三法後謂不論已經未經汗吐下三法之前後也但大便不鞕者以竹葉石膏溫膽梔子豉等湯主治可也便鞕者量其熱之深淺以白虎三承氣湯主治可也躁同隂見謂躁同三隂證見便屬隂寒之躁宜四逆理中吳茱萸湯主治可也自汗頭汗自汗熱越多急下更兼熱利不休凶頭汗熱蒸不得越黄濕水火血皆成註自汗在太陽謂之風邪桂枝湯證也在陽明謂之熱越白虎湯證也若大熱蒸蒸汗出過多則宜調胃承氣湯急下其熱救其津也若更兼發熱下利不休内外兩脱故凶也頭汗出劑頸而還則為熱不得外越上蒸於首也或因黄鬱未發或因濕家誤下或因水結胸蒸或因火劫熱迫或因陽明蓄血或因熱入血室皆令成之則當分門施治可也手足汗手足濈濈然汗出便鞕尿利本當攻寒中汗冷尿不利攻之固瘕瀉澄清註胃主四肢為津液之主今熱聚於胃蒸其津液傍達於四肢故手足濈濈然汗出且小便自利胃中津液必乾大便必鞕本當攻也若中寒胃陽土虚脾不約束津液横溢四肢猶如隂盛淫雨滂沱故汗出而冷也陽虚失運中寒不化故小便不利也今雖便鞕而手足汗出非為熱越者比愼不可攻攻之必變生固瘕泄瀉澄清不止也潮熱時熱午後一發為潮熱無休發熱汗蒸蒸時熱自汗無裏證先時與藥桂枝稱註潮熱陽明府證也陽明王於申酉故潮熱發於午後如潮信之不失因名之曰潮熱可下之證也無休發熱汗蒸蒸謂發熱無休止之時熱氣透手溱溱有汗名曰蒸蒸發熱亦屬陽明内實可下之證也時熱自汗者謂發熱時輕時重而有自汗也似潮熱而次數似蒸蒸而休止潮熱蒸蒸之熱則必兼有可下之證時熱時止之熱則必不兼可下之證故曰無裏證也因其無裏證熱而有汗知風邪留連在表不已故用桂枝主治然必先其發熱汗出之時與桂枝湯也蓋桂枝不為時熱自汗者設而為時熱自汗有表無裏證者設也此處重在無裏證非謂凡有時熱自汗皆可服桂枝湯也譫語鄭聲譫語為實聲長壯亂言無次數更端鄭聲為虚音短細頻言重復更呢喃同陽經見均屬熱同隂經見總為寒陽無可攻當清解隂不能溫清補痊註言語心主之也心氣實熱而神有餘則發為譫語譫語為實故聲長而壯亂言無次數數更端也心氣虚熱而神不足則發為鄭聲鄭聲為虚故音短而細只將一言重復呢喃也蓋神有餘則能機變而亂言神不足則無機變而祗守一聲也凡譫語鄭聲與陽經同見者均屬熱證可以攻之與隂經同見者總為寒證可以溫之若雖與陽經同見而無可攻之證不可攻之當清解也與隂經同見而無可溫之證不可溫之當清補也渴證三法傷津胃燥乾陽往乘隂渴亦然渴欲飲水少少與莫使停留飲病干太陽五苓尿不利陽明白虎飲連連少陽證具心煩渴小柴去半粉加添註渴病多因或汗或吐或下三法傷其津液致令胃中乾燥故引飲也陽邪往乘三隂太隂則嗌乾少隂則口燥厥隂則消渴渴在三隂陽邪亦屬熱傷津液故曰渴亦然也三隂之渴治法詳於三隂經内凡渴欲飲水者當少少與之以滋胃乾胃和則愈若恣意與飲之不但渴不能愈致水停留為病也太陽之渴用五苓散者以水停下焦小便不利故也陽明之渴用白虎者以胃熱飲水連連不已也少陽寒熱往來等證已具心煩渴者用小柴胡湯以和解去半夏以避燥加花粉以生津液也舌胎舌心外候本澤紅紅深赤色熱為輕外紅内紫為熱重滑白寒表少陽經沉遲細緊藏寒結乾薄氣液兩虚空黄黒胎潤裏熱淺焦乾刺裂熱深明黑滑若與三隂見水來尅火百無生註舌者心之外候色應紅澤為無病也若初感内外紅深則為有熱外紅内紫則為熱甚舌胎滑白則為表寒其胎漸厚則為傳少陽經也熱者宜辛涼汗之寒者宜辛溫汗之在少陽者為胸中有寒丹田有熱也小柴胡湯兩解之胸中指表也淺也丹田指裏也深也非直指胸中丹田謂半裏之熱未成半表之寒猶在故舌白一證有寒有熱也若其胎滑厚與隂證衇同見乃藏虚寒結以理中加枳實溫而開之若其胎乾薄與陽證同見乃氣虚液竭以白虎加人參清而補之若白胎漸變黄色此為去表入裏其熱尚淺表不罷者宜三黄石膏湯已入裏者凉膈散如焦乾黒色或芒刺裂紋此為裏熱已深宜梔子金花湯兼滿痛者大承氣湯紅火色也黒水色也與三陽證見為熱極反兼勝已之化清之下之尚可治也若與三隂證見則為水來尅火百無一生治者以生薑擦之其黒色稍退急用附子理中四逆輩救之可生胸脇滿痛邪氣傳裏必先胸由胸及脇少陽經太陽衇浮惟胸滿過經不解有陽明乾嘔潮熱胸脇滿大柴加消兩解行心腹引脇鞕滿痛乾嘔尿秘十棗攻註邪氣傳裏必先自胸若衇浮惟胸滿而不及脇者仍屬太陽表分也宜麻黄湯因胸及脇而皆滿者屬少陽經也宜小柴胡湯若十餘日不解而胸脇滿兼乾嘔潮熱者是少陽兼有陽明也宜大柴胡湯加芒消兩解之若表已解心下及腹引脇滿鞕而痛乾嘔小便不利者是停飲内實也宜十棗湯攻之嘔證嘔病因何屬少陽表入裏拒故為殃太陽之嘔表不解食穀欲嘔在胃陽太隂有吐而無嘔厥隂涎沫吐蚘長少隂嘔利有水氣飲嘔相因是水鄉註嘔病諸經皆有因何屬少陽也因表邪入裏裏氣拒格上逆作嘔故為殃屬少陽也宜小柴胡湯心下鞕而煩或不大便宜大柴胡湯表不解之嘔屬太陽也宜柴桂湯食穀欲嘔屬胃陽胃陽陽明也屬中寒宜吳茱萸湯得湯更嘔屬表熱宜葛根加半夏湯嘔吐涎沫或嘔吐蚘屬厥隂也宜吳茱萸湯吐蚘者宜烏梅丸嘔而下利是有水氣屬少隂也宜眞武湯飲而嘔嘔而飲飲嘔相因不已是停水也宜五苓散往來寒熱如瘧寒熱往來寒熱少陽證寒熱相因小柴胡如瘧寒熱三五發太陽麻桂等湯除註寒而熱熱而寒寒熱相因不已故名曰往來寒熱為少陽主證宜小柴胡湯寒熱而有作止之常一日一次或隔日一次謂之瘧屬雜病也寒熱而無作止之常日三五發謂之如瘧屬太陽經未盡之表邪也宜麻桂各半湯若熱多寒少宜桂枝二越婢一湯若有汗宜桂枝二麻黄一湯若無汗亦宜麻桂各半湯此皆治太陽未盡之微邪法也目眩耳聾少陽目眩神自正諸逆昏亂不能生重暍耳聾濕溫汗不語面色變身青註目眩者目黒不明也耳聾者耳無所聞也皆少陽經主證非死候也其目之明其耳之聰神自完整若因三法失宜致諸變逆壞證目眩而神昏言亂乃神散氣脱之候故曰不能生也若因誤發濕溫家汗而不能言語耳聾無聞身青面色變者名曰重暍亦死證也腹滿痛腹滿時痛不足證腹滿大痛有餘名誤下邪陷太隂裏汗熱便鞕轉陽明註腹滿時痛為不足桂枝加芍藥湯不愈用理中湯腹滿大痛為有餘桂枝加大黄湯此皆誤下邪陷太隂之裏證也若潮熱自汗大便鞕則為太隂之邪轉屬陽明也宜大承氣湯吐證中寒吐食不能食不渴而厥吐寒虚得食吐渴火為逆飲吐相因水病居註中寒吐食謂中寒吐食不能食也凡不渴而厥吐是寒虛吐也宜理中吳茱萸輩凡渴而得食即吐是火吐也熱實宜黄連解毒湯熱虚宜乾薑黄連黄芩湯或竹葉石膏湯渴而飲飲而吐吐而復渴水逆病也宜五苓散熱利寒利熱利尿紅渴黏穢寒利澄清小便白理中不應宜固澁仍然不應利之瘥註自利不渴者屬太隂寒也下利欲飲水者以有熱故也此以渴辨寒熱也小便黄赤穢氣稠黏者皆熱利也小便清白澄徹清穀皆寒利也熱利有表證輕者升麻葛根湯重者葛根湯汗之有裏證者量以三承氣湯下之無表裏證輕者宜黄芩湯重者宜葛根黄連黄芩湯清之寒利宜理中湯溫而補之若服理中湯不應者此屬下焦滑脱宜赤石脂禹餘糧湯固澁仍然不應此為清濁不分水走大腸宜五苓散或豬苓湯利之可瘥也但欲寐行隂嗜臥無表裏呼醒復睡不須驚風溫衇浮熱汗出多眠身重息鼾鳴註行隂欲寐嗜臥少隂證也若欲寐嗜臥無表裏證身和衇小知已解也然解後之睡呼之則醒醒而又睡是隂氣來復非隂盛困陽不須驚也風溫亦欲寐多眠則有衇浮發熱汗出身重鼻息鼾鳴之别也隂陽咽痛咽痛乾腫為陽熱不乾不腫屬隂寒陽用甘桔等湯治隂用甘桔附薑攢註咽痛一證寒熱皆有咽乾腫痛為三陽熱證宜甘桔半夏苦酒豬膚等湯調治不乾不腫而痛為三隂寒證宜四逆湯加桔梗主治也氣上衝氣撞吐蚘厥隂本無蚘陽表桂枝湯少腹急引燒裩散衝喉難息𤓰蒂良註氣撞吐蚘謂厥隂本證也無蚘謂氣撞不吐蚘乃邪猶在陽表也宜桂枝湯少腹急引謂氣上衝更少腹引隂急痛乃隂陽易病也宜燒裩散衝喉難息謂氣上衝喉胸滿難以布息乃寒實在胸也宜𤓰蒂散饑不欲食饑不欲食吐蚘厥下後不食屬陽明懊憹頭汗梔子豉厥𦂳心煩邪在胸註饑不欲食吐蚘厥謂厥隂本證也下後饑不能食屬陽明也陽明病則懊憹心中煩甚頭上汗出是熱在胃中宜梔子豉湯涌之厥隂病則吐蚘厥逆衇微今不微而𦂳更心煩者非寒虛邪是寒實邪而在胸中宜𤓰蒂散吐之手足厥逆太隂手足溫無厥少隂厥冷不能溫厥隂寒厥分微甚熱厥相因辨淺深註太隂經無厥逆而有手足自溫少隂經有寒厥而無熱厥厥隂經有寒熱二厥寒厥者祗寒而不熱也熱厥者由熱而厥由厥而熱熱厥相因無休歇也當辨隂陽淺深以當歸四逆承氣等湯施治可也詳厥隂篇少腹滿痛少腹滿而按之痛厥逆尿白冷膀胱不厥血蓄小便利小便不利水為殃註少腹滿按之痛若四肢厥冷小便清白者是冷結膀胱宜當歸四逆加吳茱萸生薑湯不厥冷小便自利者是血蓄膀胱宜桃仁承氣湯小便不利者是水蓄膀胱宜五苓散若大小便不利者是水熱蓄結宜八正散神昏狂亂蓄血發狂神昏胃熱重陽狂三黄三承白解湯蓄血發狂小便利少腹鞕痛屬太陽陽明蓄血大便黒其人如狂而喜忘桃仁承氣抵當治須識作汗奄然狂註神昬胃熱謂神昬是胃經熱極乘心也重陽狂謂熱入於陽則狂亂也三黄謂三黄石膏湯治神昬狂亂表實無汗者也三承謂三承氣湯治神昬狂亂裏實不便者也白解湯謂白虎解毒湯治神昬狂亂無表裏證而熱極者也太陽蓄血發狂則少腹鞕痛小便自利若小便不利是水熱蓄也非血蓄也陽明血蓄如狂則喜忘大便黑若大便不黒是熱極也非血蓄也蓄血輕者桃仁承氣湯重者抵當湯擇而用之可也然發狂證亦有陽盛隂虚之人作汗將解之時奄然發狂濈然汗出而解者當須識之不可以藥也循衣摸床循衣摸床有二因太陽火刼熱傷隂小便利生不利死陽明熱極熱彌深皆緣三法失成壞衇實堪下弱難禁虚實隂陽難辨處獨參六味可囘春註循衣摸床危惡之證也一因太陽火刼取汗致陽盛傷隂隂若未竭則小便利多生隂若已竭則小便難多死一因陽明熱極汗吐下三法失宜致成壞證其熱彌深衇實者堪下則可治衇弱者不堪下則難治此已成危惡壞證往往隂陽虚實醫莫能辨無下手處當以大劑獨參六味乾生地黄湯時時與之每獲生也太陽陽邪停飲太陽陽邪有水逆消渴發熱汗出煩小便不利水入吐衇浮而數五苓攢註太陽陽邪有水逆消渴之病謂太陽中風有渴欲飲水水入即吐者名曰水逆飲水多而小便少者名曰消渴發熱汗出風邪也煩熱也小便不利水入則吐飲停也浮數風熱衇也均宜五苓散多服煖水令微汗出外解太陽内利停水則愈若不能飲煖水欲飲冷水者是熱盛也以五苓散加寒水石石膏滑石可也詳太陽上篇太陽隂邪停飲太陽隂邪有水氣傷寒無汗熱烘烘主證乾嘔欬微喘外發内散小青龍小便不利少腹滿下利除麻共入苓噎麻易附喘加杏渴加花粉減半平註太陽隂邪有水氣謂太陽傷寒表不解發熱無汗兼有乾嘔而欬微喘飲病之主證宜以小青龍湯外發寒邪内散寒飲則可愈也或小便不利少腹滿或下利或噎或喘或渴此飲病或有之證亦以小青龍湯主之小便不利少腹滿是水停下焦大便下利是水走大腸俱除麻黄共入茯苓專滲利也噎為内寒之甚以麻黄易附子散内寒也喘氣上逆加杏仁以降逆也渴加花粉減去半夏以避燥生津也詳太陽下篇少隂陽邪停飲少隂陽邪有停飲六七日反不得眠下利而渴欬而嘔小便不利豬苓煎註少隂陽邪有停飲謂少隂陽邪熱證兼有停飲病也少隂病當欲寐至六七日反心煩不得眠是少隂熱也下利而渴欬嘔小便不利是水飲停也以豬苓湯去其熱而利其水可也詳少隂篇少隂隂邪停飲少隂隂邪有水氣腹痛四肢重沉疼小便不利自下利或欬或嘔眞武平欬加乾薑辛味共小便若利去茯苓嘔去附子生薑倍利去芍藥入乾寧註少隂隂邪有水氣謂少隂隂寒兼有水氣病也飲病主證謂腹痛四肢沉重疼痛大便自利小便不利宜眞武湯溫中利水也飲病或有之證或欬或小便利或嘔或下利欬加生薑細辛五味子小便若利去茯苓嘔去附子倍加生薑利去芍藥入乾薑也喘急短氣喘息喝喝數張口短氣似喘不擡肩促難布息為實證短不續息作虚觀内因飲病或痰熱外因隂陽表裏看直視神昬汗潤髪衇微肢厥命難全註喘息氣急喝喝而數張口擡肩欠肚者喘也短氣則似喘非喘而不張口擡肩也二證皆胸中氣病肺主氣故屬肺也無論喘急短氣若氣促壅塞不能布息為有餘之實證若氣短空乏不能續息為不足之虚證内因謂飲冷傷肺或因痰熱也外因謂形寒傷表表主皮毛肺之合也皮毛受邪其次及膚及肌及胸及腹入胃皆令病喘當審隂陽表裏從化主治可也喘急短氣兼直視神昬汗出潤髪衇微四肢厥冷皆死候也與三隂寒證同見是為隂喘宜四逆加杏仁五味子虚者倍加人參與三陽熱證同見是為陽喘宜白虎葛根黄芩黄連湯與太陽表證同見是為表喘無汗者麻黄湯兼煩躁者大青龍湯有汗者桂枝加厚朴杏子湯與陽明裏證同見是為裏喘宜大承氣湯兼結胸者宜大陷胸丸若兼水氣表實者小青龍湯表虚者及小便不利均宜五苓散加葶藶子裏實者宜葶藶大棗湯兼腹脇鞕痛者宜十棗湯裏寒者宜眞武湯若衇微細口鼻氣短喘乏而無隂陽表裏證此氣虚喘也宜保元湯加五味子杏仁若喘而唾痰稠黏喉間漉漉有聲此痰喘也重者宜𤓰蒂散礞石滾痰丸輕者二陳加苦葶藶子蘇子之類也心下悸築築惕惕心動悸怔怔忡忡不自安飲多尿少為停水厥冷汗後是虚寒註心下築築惕惕怔怔忡忡謂悸病之狀也飲水多而小便少水停心下之悸也宜茯苓甘草湯或五苓散厥冷為寒宜眞武湯汗後為虚宜小建中湯或不因汗後是虚之甚也宜炙甘草湯戰振慄戰身聳動慄心㦗振雖聳動比戰輕故振責虚因無力慄戰相交邪正爭此證若生三法後虚其中外逆而成不逆因和而作解正勝邪却戰汗平註戰謂身抖聳動也慄謂心内發㦗也振亦聳動比之於戰則無力也所以論中曰振振者皆責其虚也慄邪氣為之也戰正氣為之也邪正相交故爭也此證若生於汗吐下之後是虚其中外而致逆也若不致逆邪因以衰正因以和而作解則為正勝邪却戰慄汗出而平也呃逆噦噫呃逆今名􅀈古名不似噦噦胃裏聲􅀈聲格格連聲作原夫臍下氣來衝頗類噯噫情自異均屬氣逆治能同虚熱橘皮竹茹治二便不利利之寧氣不歸原宜都氣寒虚丁萸附理中痞鞕下利生薑瀉痞鞕噫氣代赭功註今之名曰呃逆即古之名曰􅀈也􅀈者氣噎結有聲也世有以噦為呃逆者葢不知噦噦之聲聲從胃裏出口不似􅀈之格格連聲氣從臍下來自衝衇出口作聲也呃逆頗類噯氣噫氣噯氣者因飽食太急比時作噯轉食氣也噫氣者因過食傷食越時作噫食臭氣也故曰情自異也但均屬氣逆為病故曰治能同也呃逆之病胃氣虚竭也兼熱者以橘皮竹茹湯加柿蒂主之兼大便不利以三承氣湯主之兼小便不利以二苓散湯主之兼腎虚不能攝衝衇之氣歸原以都氣湯加牛膝主之兼寒虚太隂手足溫以丁萸理中湯主之少隂手足厥更加附子兼痞鞕下利以生薑瀉心湯主之兼痞鞕噫氣以旋覆代赭石湯主之結胸按之滿鞕不痛痞鞕而滿痛為結胸大結從心至少腹小結心下按方疼熱微頭汗為水結潄水不嚥血結名瘀衂未盡經適斷内實沉大審的攻抵當桃仁大小陷誤攻浮大命多傾不實浮滑小陷證藏結悉具躁煩凶註傷寒下之太早則成痞鞕中風下之太早則成結胸均為表邪乘虚入裏鞕滿按之而痛為結胸實邪也鞕滿按之不痛為痞鞕虚邪也大結謂大結胸從心下至少腹鞕滿而痛手不可近者宜大陷胸湯攻之小結謂小結胸微結心下按之方痛不按不痛也宜小陷胸湯開之身有微熱頭自汗出兼有是證者為水結胸也宜大陷胸丸攻之潄水不欲嚥兼有是證者為血結胸也血瘀不成衂解或衂未盡或婦人經來適斷皆能成之宜抵當丸或桃仁承氣湯攻之内實證實可攻也沉大衇實可攻也審其的當則用抵當桃仁承氣大陷胸湯丸以攻之審若不内實衇浮滑或衇浮大是未的也乃小陷胸證不可攻也誤攻之定然凶也藏結謂狀如結胸舌胎白滑衇浮而細也悉具謂結胸通腹兩脇皆鞕滿痛也此證加之煩躁凶死可知痞鞕陽證痞鞕為熱痞大黄黄連瀉心寧汗出惡寒寒熱痞附子瀉心兩收功誤下少陽發熱嘔痞滿半夏瀉心能虚熱水氣痞下利心煩乾嘔腹雷鳴虚熱水氣生薑瀉痞急氣逆甘草靈桂枝表解乃攻痞五苓煩渴利尿通註傷寒下早則成痞鞕中風下早則成結胸此其常也然論中中風下早未嘗無痞鞕傷寒下早亦有結胸大抵從虚化者多為痞鞕從實化者多結胸也陽證心下痞鞕為熱痞宜大黄黄連瀉心湯若陽證汗出惡寒為寒熱痞宜附子瀉心湯誤下少陽發熱而嘔心下痞滿為嘔逆痞宜半夏瀉心湯陽證誤下心下痞鞕下利心煩乾嘔腹中雷鳴脇下有水氣致小便不利為虚熱水氣之痞宜生薑瀉心湯若有是證脇下無水氣其痞急益甚為虚熱客氣上逆之痞宜甘草瀉心湯凡有痞者有無汗惡寒之表宜桂枝湯表解已乃可以大黄黄連瀉心湯攻痞也若有痞者與瀉心湯痞不解其人煩渴小便不利先以五苓散小便利後乃可與諸瀉心湯治痞也發黄濕熱發黄頭汗出小便不利渴陽明素有寒濕發汗後黄從隂化太隂經陽色鮮明隂色暗太陽血蓄併狂生表實麻翹赤小豆茵蔯裏實梔子清隂黄茵蔯四逆主便溏尿秘茵五苓環口黧黒柔汗死體若烟熏陽絶徵註陽明病應徧身有汗謂之熱越今頭汗出身無汗是熱不得越也渴而引飲小便不利是停水也熱與濕瘀從土而化外薄肌肉謂之濕熱發黄也或其人素有寒濕為表邪遏鬱或已成黄又經發汗傳入太隂從隂而化謂之濕寒發黄也陽明屬陽故其色明亮太隂屬隂故其色晦暗也太陽蓄血亦有發黄多與狂病併生法當從蓄血治也表實無汗發黄者宜麻黄連翹赤小豆湯汗之裏實不便者宜茵蔯蒿湯下之無表裏證熱盛者宜梔子蘗皮湯清之隂證發黄者宜茵蔯四逆湯溫之若大便溏小便秘發黄者宜茵蔯五苓散利之環口黧黒柔汗者隂黄死證也柔汗謂冷汗也身體枯燥如烟熏者陽黄死證也疹斑傷寒疹斑失汗下感而即出時氣然表邪覆鬱榮衞分外泛皮衇痧疹斑痧白疹紅如膚粟斑紅如豆片連連紅輕赤重黑多死淡紅稀暗是隂寒未透升麻消毒治熱盛三黄石膏煎已透青黛消斑飲雙解痧疹法同前註傷寒發斑疹痧皆因汗下失宜外邪覆鬱内熱泛出而成也惟時氣傳染感而即出亦由疫之為病烈而速也發於衞分則為痧衞主氣故色白如膚粟也發於榮分則為疹斑榮主血故色紅膚淺為疹深重為斑斑形如豆甚則成片連屬斑疹之色紅者輕赤者重黑者死此以熱之深淺驗死生也若其色淡紅而稀暗者皆因邪在三陽已成斑疹入裏邪從隂化或過服冷藥所致是為隂斑隂痧隂疹法當從隂寒主治也斑出未透表熱輕者宜升麻葛根湯合消毒犀角飲治之表熱重者宜三黄石膏湯發之已透用青黛消斑飲加減清之痧疹初起表裏不清用雙解散先通表裏餘法同前治之可也衂血陽明衂血熱在裏太陽衂血熱瘀經太陽頭痛目瞑兆陽明潄水不嚥徵衂後身凉知作解不解升麻犀角清未衂表實麻黄汗裏熱犀角苓連同註陽明衂血熱在裏也太陽衂血熱瘀經也太陽失汗則有頭痛目瞑之兆陽明失下則有潄水不欲嚥之徵衂血之後身凉衇靜知作解也若仍不解知衂未盡熱留於榮也無汗表熱宜升麻葛根合犀角地黄湯清解之欲作衂未衂者表實宜麻黄湯汗之裏熱宜犀角地黄湯加芩連清之若表實裏熱者則又當合二方兩解之吐血傷寒吐血多因逆下厥上竭少隂經三陽熱盛宜清解血瘀胸滿痛當攻暴吐腐臭内潰死過多血脱面無紅犀角桃仁宜揀用救脱聖愈及養榮註傷寒吐血皆因失汗失下火逆以致邪熱熾盛沸騰經血故也若血從口鼻耳目而出小便難此為強發少隂汗名曰下厥上竭為難治也三陽熱盛吐血宜升麻葛根合犀角地黄湯熱甚加芩連清解可也若血瘀則胸滿或痛當以桃仁承氣合犀角地黄湯攻之若暴吐腐臭之血名曰内潰内潰者死若吐血過多面脣無紅色名曰血脱救脱輕者以聖愈湯重者以人參養榮湯大小便膿血熱在膀胱小便血八正導赤利之佳熱瘀裏急下膿血黄連白頭與桃花註陽經之熱下注膀胱傷其榮分熱少血多瘀成血蓄熱多血少熱廹血行血不得蓄而走下竅故尿血也以八正散導赤散利而清之隂經之熱轉廹陽明傷其榮分瘀則血蓄喜忘如狂不蓄則便血熱腐則便膿便膿熱鬱裏急下重所必然也輕者宜黄連阿膠湯重者白頭翁湯清之滑脱者桃花湯濇之可也頤毒傷寒發頤耳下腫失於汗下此毒生高腫焮紅痛為順反此神昬命必傾毒伏未發衇亦隱冷汗淋漓肢若冰煩渴不便指甲紫頗似三隂了了輕註傷寒頤毒皆因汗下失宜毒熱挾少陽相火上攻而成也若其人陽氣素盛則高腫焮紅疼痛易於成膿故為順也宜連翹敗毒散散之或其人陽氣素虚或服冷藥過多遏鬱毒熱伏藏在裏内攻神昬外毒漫腫肉色不變不疼木硬則命必危也毒伏未發之前往往似三隂亡陽之證衇隱不見冷汗淋漓肢冷若冰但身輕目睛了了煩渴不大便指甲紅紫為異此毒發始臨治不可忽也狐惑古名狐惑近名疳狐蝕肛隂惑脣咽病後餘毒斑疹後癖疾利後也同然面眥赤白黑不一目不能閉喜貪眠潮熱聲啞腐穢氣能食堪藥治多全註狐惑牙疳下疳等瘡之古名也近時惟以疳呼之下疳即狐也蝕爛肛隂牙疳即惑也蝕咽腐齦脱牙穿腮破脣毒因傷寒病後餘毒與濕䘌之為害也或生斑疹之後或生癖疾下利之後其為患亦同也其證則面色目眥或赤或白或黑時時不一喜睡目不能閉潮熱聲啞腐爛之處穢氣熏人若胃壯能食堪受攻病重藥或病之勢緩治多全也百合百合百衇合一病如寒似熱藥無靈飲食起居皆忽忽如神若鬼附其形衇數溺時輒頭痛溺時不痛淅淅風溺時快然但頭眩六四二十病方寧註百合病者謂傷寒過期留連不解不分經絡百衇悉合為一病也如寒似熱諸藥無靈欲飲不能飲欲食不能食欲卧不能臥欲行不能行精神忽忽如神若鬼附其形體而莫知所適從也如衇數溺尿時輙頭痛者六十日乃愈若溺尿時頭不痛惟淅淅然惡風寒者四十日乃愈若溺時快然但頭眩者二十日乃愈故曰六四二十日病方寧也熱入血室婦人傷寒同一治胎産經來熱入室晝日明了夜譫妄小柴生地牡丹皮無汗加麻有汗桂汗後不解再加枝寒熱如瘧加麻桂中寒薑附不須疑渴熱白虎花粉葛瘀血桃仁承氣俱産後胎前雖多證不外隂陽表裏醫註婦人傷寒與男子治法同也惟産後經來邪熱乘虚而入血室另有治法熱入血室之證晝日明了夜則譫語妄見鬼狀宜小柴胡湯加生地丹皮若無汗則為表實加麻黄汗之有汗則為表虚加桂枝解之若有發熱惡寒之表已經發汗雖無汗不加麻黄再加桂枝以解之不可復用麻黄也若有如瘧之寒熱加麻黄桂枝兩解之若厥而下利則為中寒去黄芩加薑附不須疑也若發熱煩渴則為裏熱去半夏合白虎或加花粉葛根胸脇少腹或滿鞕或作痛則為瘀血宜合桃仁承氣湯攻之産後胎前雖有多證不能盡述總不外隂陽表裏之治在臨證者以意消息之耳食復勞復新愈藏府皆不足榮衞腸胃未通和多食過勞復生熱枳實梔子大黄差浮汗沉下小柴解燥嘔竹葉石膏合氣虚補中益氣主隂虧六味倍參多註新愈之後藏府氣血皆不足榮衞未通腸胃未和惟宜白粥靜養若過食胃弱難消因復煩熱名曰食復若過勞役復生熱煩名曰勞復勞復者宜枳實梔子豉湯汗之食復者宜枳實梔子豉加大黄湯下之衇浮有表者宜枳實梔子豉湯以汗解之衇沉有裏者宜枳實梔子豉加大黄湯以下解之若無表裏證者宜小柴胡湯以和解之口燥煩渴喜嘔者宜竹葉石膏湯主之若内傷氣虚勞復者宜補中益氣湯主之若犯内事隂虧者宜六味生乾地黄湯氣少者倍加人參湯主之房勞復隂陽易房勞復與隂陽易二病情異證則同病後犯色復自病病傳不病易之名男女俱主燒裩散少腹急痛引隂中身重少氣頭眩暈拘攣熱氣上衝胸註男女新愈交接因而復病名曰房勞復男女新愈交接病男傳不病之女病女傳不病之男名曰隂陽易即交易之義也犯是病者男以女之裩襠女以男之裩襠燒灰白湯或酒日三服之則愈少腹急痛牽引隂中身重少氣頭目眩暈四肢拘攣熱氣衝胸是其證也御纂醫宗金鑑卷三十七欽定四庫全書御纂醫宗金鑑卷三十七編輯傷寒心法要訣表熱裏熱隂熱陽熱發熱無時熱翕翕炊籠騰越熱蒸蒸表熱尿白裏熱赤外需麻桂内凉承燥乾煩渴為陽熱厥利外熱屬隂經陽熱宜清白虎輩隂熱四逆與白通註發熱無時熱翕翕謂發熱無休止之時若合羽外覆之表熱也炊籠騰越熱蒸蒸謂發熱如炊籠蒸蒸内越之裏熱也表熱熱不在裏故尿白也裏熱故尿赤也外需麻桂謂表熱無汗宜麻黄湯有汗宜桂枝湯内凉承謂裏熱輕者宜凉膈散重者宜三承氣湯發熱兼口燥舌乾煩渴者為陽經之熱也發熱兼厥冷下利清穀者屬隂經之熱也陽熱宜清白虎解毒輩也隂熱宜溫四逆白通湯也按翕翕蒸蒸發熱俱有汗二證相類若以翕翕之表熱誤為蒸蒸之裏熱下之則逆若以蒸蒸裏熱誤為翕翕表熱汗之轉傷翕翕之汗熱雖同蒸蒸捫之自溫不似蒸蒸之汗熱捫之自有熱氣透手也其間或有疑似難辨又當審小便之白赤舌胎之潤燥自可决也惡寒背惡寒辨惡寒表裏隂陽辨發熱有汗表為虚發熱無汗表實證實以麻黄虚桂枝無熱惡寒發隂裏桂枝加附頗相宜背寒口和隂附子口燥渴陽白虎需註惡寒一證有表裏隂陽之辨發熱惡寒發於陽表也有汗宜桂枝湯無汗宜麻黄湯無熱惡寒發於隂裏也有汗宜桂枝加附子湯無汗宜麻黄附子細辛湯背惡寒口和謂口中不燥而和也隂謂屬少隂也宜附子湯背惡寒口燥渴謂口中燥而渴也陽謂屬陽明也宜白虎加人參湯按隂陽二經惡寒雖同其身有熱無熱則異也一則汗之二則溫之少隂陽明之背惡寒雖同其口中和口中不和則異也一則溫之一則清之惡寒雖屬輕微之證仲景立法可辨他可類推矣惡風風寒相因相離少三陽俱有惡寒風惡風屬陽法從表三隂惡寒無惡風註風寒二者大率多相因而少相離有寒時不皆無風有風時不皆無寒故三陽俱有惡寒惡風同見也惡風與惡寒均表病也法當從表然風屬陽寒屬隂故三隂經證有惡寒而無惡風也頭痛三陽頭痛身皆熱無熱吐沫厥隂經不便尿紅當議下尿白猶屬表未清註三陽謂太陽陽明少陽也頭痛身皆熱謂三陽頭痛身皆熱也三陽經頭痛法當從三陽治也厥隂頭痛則多厥而無熱嘔吐涎沫是厥隂挾寒邪上逆也宜吳茱萸湯溫而降之三陽頭痛若不大便小便紅赤為裏實熱法當議下宜承氣湯若小便清白即不大便為裏熱未實表尚未清法當先從表治也三隂經無頭痛惟厥隂有頭痛以其衇與督衇上㑹於巓也三隂經無發熱厥隂少隂亦有發熱謂之反發熱以其藏有相火隂盛格陽於外也項强項背几几强太陽衇浮無汗葛根湯有汗桂枝添葛入衇沉栝蔞桂枝方結胸項强如柔痙大陷胸丸下必康但見少陽休汗下柴胡去半入蔞良註項强太陽病也項背强太陽陽明病也几几拘强而甚之貌也衇浮屬二陽之表衇也若無汗是從傷寒傳來宜葛根湯有汗是從中風傳來宜桂枝加葛根湯衇沉謂邪已入胸裏也宜栝蔞桂枝湯結胸謂結胸病也項强如柔痙謂項强背反張有汗如柔痙之狀也宜大陷胸丸但見少陽謂太陽少陽併病之項强休汗下謂邪入少陽不可更汗下也宜柴胡湯去半夏加栝蔞主之良好也栝蔞桂枝湯方在金匱要畧身痛身痛未汗表實證汗後身疼屬表虚桂加生薑參芍藥尺遲血少建中耆少隂沉厥附子治厥隂汗利四逆醫風濕盡痛難轉側掣引煩疼桂附宜註身痛未汗屬表實證宜麻黄湯汗後身疼屬表虚證宜桂枝新加湯即桂枝湯倍生薑芍藥加人參也曰桂加即桂枝湯加此也尺遲血少建中耆謂身痛尺中衇遲是血少榮氣不足也雖未經汗不可發汗宜建中湯加黄耆以補榮血也少隂謂身痛見少隂沉衇四肢厥冷也附子治謂宜附子湯治也厥隂謂身痛見厥隂厥逆汗出不止下利清穀也四逆醫謂以四逆湯醫也風濕謂風濕身痛也盡痛難轉側是濕則令人一身盡痛不能轉側掣引煩疼是風則令人筋衇牽引煩疼不寧也桂附宜謂宜以桂枝附子湯也煩躁不眠懊憹躁身不靜煩心擾不躁難眠作熱觀懊憹煩甚無冷病惟躁隂陽表裏看諸煩無論三法後便軟梔竹等湯煎便鞕白虎三承氣躁同隂見便屬寒註身為熱動而不安謂之躁心為熱擾而不寧謂之煩煩則擾於内躁則動於外故有心煩而無身煩有身躁而無心躁也大抵煩屬陽躁屬隂若懊憹心中反覆顚倒煩不得眠不與躁同見者皆無冷病當作熱觀也惟躁則不然當分表裏隂陽取治故太陽有不汗出而煩躁謂之在表大青龍證也陽明有心下鞕之煩躁謂之在陽白虎湯證也三隂有吐利手足厥之煩躁謂之在隂四逆輩證也諸煩謂煩不眠懊憹也無論三法後謂不論已經未經汗吐下三法之前後也但大便不鞕者以竹葉石膏溫膽梔子豉等湯主治可也便鞕者量其熱之深淺以白虎三承氣湯主治可也躁同隂見謂躁同三隂證見便屬隂寒之躁宜四逆理中吳茱萸湯主治可也自汗頭汗自汗熱越多急下更兼熱利不休凶頭汗熱蒸不得越黄濕水火血皆成註自汗在太陽謂之風邪桂枝湯證也在陽明謂之熱越白虎湯證也若大熱蒸蒸汗出過多則宜調胃承氣湯急下其熱救其津也若更兼發熱下利不休内外兩脱故凶也頭汗出劑頸而還則為熱不得外越上蒸於首也或因黄鬱未發或因濕家誤下或因水結胸蒸或因火劫熱迫或因陽明蓄血或因熱入血室皆令成之則當分門施治可也手足汗手足濈濈然汗出便鞕尿利本當攻寒中汗冷尿不利攻之固瘕瀉澄清註胃主四肢為津液之主今熱聚於胃蒸其津液傍達於四肢故手足濈濈然汗出且小便自利胃中津液必乾大便必鞕本當攻也若中寒胃陽土虚脾不約束津液横溢四肢猶如隂盛淫雨滂沱故汗出而冷也陽虚失運中寒不化故小便不利也今雖便鞕而手足汗出非為熱越者比愼不可攻攻之必變生固瘕泄瀉澄清不止也潮熱時熱午後一發為潮熱無休發熱汗蒸蒸時熱自汗無裏證先時與藥桂枝稱註潮熱陽明府證也陽明王於申酉故潮熱發於午後如潮信之不失因名之曰潮熱可下之證也無休發熱汗蒸蒸謂發熱無休止之時熱氣透手溱溱有汗名曰蒸蒸發熱亦屬陽明内實可下之證也時熱自汗者謂發熱時輕時重而有自汗也似潮熱而次數似蒸蒸而休止潮熱蒸蒸之熱則必兼有可下之證時熱時止之熱則必不兼可下之證故曰無裏證也因其無裏證熱而有汗知風邪留連在表不已故用桂枝主治然必先其發熱汗出之時與桂枝湯也蓋桂枝不為時熱自汗者設而為時熱自汗有表無裏證者設也此處重在無裏證非謂凡有時熱自汗皆可服桂枝湯也譫語鄭聲譫語為實聲長壯亂言無次數更端鄭聲為虚音短細頻言重復更呢喃同陽經見均屬熱同隂經見總為寒陽無可攻當清解隂不能溫清補痊註言語心主之也心氣實熱而神有餘則發為譫語譫語為實故聲長而壯亂言無次數數更端也心氣虚熱而神不足則發為鄭聲鄭聲為虚故音短而細只將一言重復呢喃也蓋神有餘則能機變而亂言神不足則無機變而祗守一聲也凡譫語鄭聲與陽經同見者均屬熱證可以攻之與隂經同見者總為寒證可以溫之若雖與陽經同見而無可攻之證不可攻之當清解也與隂經同見而無可溫之證不可溫之當清補也渴證三法傷津胃燥乾陽往乘隂渴亦然渴欲飲水少少與莫使停留飲病干太陽五苓尿不利陽明白虎飲連連少陽證具心煩渴小柴去半粉加添註渴病多因或汗或吐或下三法傷其津液致令胃中乾燥故引飲也陽邪往乘三隂太隂則嗌乾少隂則口燥厥隂則消渴渴在三隂陽邪亦屬熱傷津液故曰渴亦然也三隂之渴治法詳於三隂經内凡渴欲飲水者當少少與之以滋胃乾胃和則愈若恣意與飲之不但渴不能愈致水停留為病也太陽之渴用五苓散者以水停下焦小便不利故也陽明之渴用白虎者以胃熱飲水連連不已也少陽寒熱往來等證已具心煩渴者用小柴胡湯以和解去半夏以避燥加花粉以生津液也舌胎舌心外候本澤紅紅深赤色熱為輕外紅内紫為熱重滑白寒表少陽經沉遲細緊藏寒結乾薄氣液兩虚空黄黒胎潤裏熱淺焦乾刺裂熱深明黑滑若與三隂見水來尅火百無生註舌者心之外候色應紅澤為無病也若初感内外紅深則為有熱外紅内紫則為熱甚舌胎滑白則為表寒其胎漸厚則為傳少陽經也熱者宜辛涼汗之寒者宜辛溫汗之在少陽者為胸中有寒丹田有熱也小柴胡湯兩解之胸中指表也淺也丹田指裏也深也非直指胸中丹田謂半裏之熱未成半表之寒猶在故舌白一證有寒有熱也若其胎滑厚與隂證衇同見乃藏虚寒結以理中加枳實溫而開之若其胎乾薄與陽證同見乃氣虚液竭以白虎加人參清而補之若白胎漸變黄色此為去表入裏其熱尚淺表不罷者宜三黄石膏湯已入裏者凉膈散如焦乾黒色或芒刺裂紋此為裏熱已深宜梔子金花湯兼滿痛者大承氣湯紅火色也黒水色也與三陽證見為熱極反兼勝已之化清之下之尚可治也若與三隂證見則為水來尅火百無一生治者以生薑擦之其黒色稍退急用附子理中四逆輩救之可生胸脇滿痛邪氣傳裏必先胸由胸及脇少陽經太陽衇浮惟胸滿過經不解有陽明乾嘔潮熱胸脇滿大柴加消兩解行心腹引脇鞕滿痛乾嘔尿秘十棗攻註邪氣傳裏必先自胸若衇浮惟胸滿而不及脇者仍屬太陽表分也宜麻黄湯因胸及脇而皆滿者屬少陽經也宜小柴胡湯若十餘日不解而胸脇滿兼乾嘔潮熱者是少陽兼有陽明也宜大柴胡湯加芒消兩解之若表已解心下及腹引脇滿鞕而痛乾嘔小便不利者是停飲内實也宜十棗湯攻之嘔證嘔病因何屬少陽表入裏拒故為殃太陽之嘔表不解食穀欲嘔在胃陽太隂有吐而無嘔厥隂涎沫吐蚘長少隂嘔利有水氣飲嘔相因是水鄉註嘔病諸經皆有因何屬少陽也因表邪入裏裏氣拒格上逆作嘔故為殃屬少陽也宜小柴胡湯心下鞕而煩或不大便宜大柴胡湯表不解之嘔屬太陽也宜柴桂湯食穀欲嘔屬胃陽胃陽陽明也屬中寒宜吳茱萸湯得湯更嘔屬表熱宜葛根加半夏湯嘔吐涎沫或嘔吐蚘屬厥隂也宜吳茱萸湯吐蚘者宜烏梅丸嘔而下利是有水氣屬少隂也宜眞武湯飲而嘔嘔而飲飲嘔相因不已是停水也宜五苓散往來寒熱如瘧寒熱往來寒熱少陽證寒熱相因小柴胡如瘧寒熱三五發太陽麻桂等湯除註寒而熱熱而寒寒熱相因不已故名曰往來寒熱為少陽主證宜小柴胡湯寒熱而有作止之常一日一次或隔日一次謂之瘧屬雜病也寒熱而無作止之常日三五發謂之如瘧屬太陽經未盡之表邪也宜麻桂各半湯若熱多寒少宜桂枝二越婢一湯若有汗宜桂枝二麻黄一湯若無汗亦宜麻桂各半湯此皆治太陽未盡之微邪法也目眩耳聾少陽目眩神自正諸逆昏亂不能生重暍耳聾濕溫汗不語面色變身青註目眩者目黒不明也耳聾者耳無所聞也皆少陽經主證非死候也其目之明其耳之聰神自完整若因三法失宜致諸變逆壞證目眩而神昏言亂乃神散氣脱之候故曰不能生也若因誤發濕溫家汗而不能言語耳聾無聞身青面色變者名曰重暍亦死證也腹滿痛腹滿時痛不足證腹滿大痛有餘名誤下邪陷太隂裏汗熱便鞕轉陽明註腹滿時痛為不足桂枝加芍藥湯不愈用理中湯腹滿大痛為有餘桂枝加大黄湯此皆誤下邪陷太隂之裏證也若潮熱自汗大便鞕則為太隂之邪轉屬陽明也宜大承氣湯吐證中寒吐食不能食不渴而厥吐寒虚得食吐渴火為逆飲吐相因水病居註中寒吐食謂中寒吐食不能食也凡不渴而厥吐是寒虛吐也宜理中吳茱萸輩凡渴而得食即吐是火吐也熱實宜黄連解毒湯熱虚宜乾薑黄連黄芩湯或竹葉石膏湯渴而飲飲而吐吐而復渴水逆病也宜五苓散熱利寒利熱利尿紅渴黏穢寒利澄清小便白理中不應宜固澁仍然不應利之瘥註自利不渴者屬太隂寒也下利欲飲水者以有熱故也此以渴辨寒熱也小便黄赤穢氣稠黏者皆熱利也小便清白澄徹清穀皆寒利也熱利有表證輕者升麻葛根湯重者葛根湯汗之有裏證者量以三承氣湯下之無表裏證輕者宜黄芩湯重者宜葛根黄連黄芩湯清之寒利宜理中湯溫而補之若服理中湯不應者此屬下焦滑脱宜赤石脂禹餘糧湯固澁仍然不應此為清濁不分水走大腸宜五苓散或豬苓湯利之可瘥也但欲寐行隂嗜臥無表裏呼醒復睡不須驚風溫衇浮熱汗出多眠身重息鼾鳴註行隂欲寐嗜臥少隂證也若欲寐嗜臥無表裏證身和衇小知已解也然解後之睡呼之則醒醒而又睡是隂氣來復非隂盛困陽不須驚也風溫亦欲寐多眠則有衇浮發熱汗出身重鼻息鼾鳴之别也隂陽咽痛咽痛乾腫為陽熱不乾不腫屬隂寒陽用甘桔等湯治隂用甘桔附薑攢註咽痛一證寒熱皆有咽乾腫痛為三陽熱證宜甘桔半夏苦酒豬膚等湯調治不乾不腫而痛為三隂寒證宜四逆湯加桔梗主治也氣上衝氣撞吐蚘厥隂本無蚘陽表桂枝湯少腹急引燒裩散衝喉難息𤓰蒂良註氣撞吐蚘謂厥隂本證也無蚘謂氣撞不吐蚘乃邪猶在陽表也宜桂枝湯少腹急引謂氣上衝更少腹引隂急痛乃隂陽易病也宜燒裩散衝喉難息謂氣上衝喉胸滿難以布息乃寒實在胸也宜𤓰蒂散饑不欲食饑不欲食吐蚘厥下後不食屬陽明懊憹頭汗梔子豉厥𦂳心煩邪在胸註饑不欲食吐蚘厥謂厥隂本證也下後饑不能食屬陽明也陽明病則懊憹心中煩甚頭上汗出是熱在胃中宜梔子豉湯涌之厥隂病則吐蚘厥逆衇微今不微而𦂳更心煩者非寒虛邪是寒實邪而在胸中宜𤓰蒂散吐之手足厥逆太隂手足溫無厥少隂厥冷不能溫厥隂寒厥分微甚熱厥相因辨淺深註太隂經無厥逆而有手足自溫少隂經有寒厥而無熱厥厥隂經有寒熱二厥寒厥者祗寒而不熱也熱厥者由熱而厥由厥而熱熱厥相因無休歇也當辨隂陽淺深以當歸四逆承氣等湯施治可也詳厥隂篇少腹滿痛少腹滿而按之痛厥逆尿白冷膀胱不厥血蓄小便利小便不利水為殃註少腹滿按之痛若四肢厥冷小便清白者是冷結膀胱宜當歸四逆加吳茱萸生薑湯不厥冷小便自利者是血蓄膀胱宜桃仁承氣湯小便不利者是水蓄膀胱宜五苓散若大小便不利者是水熱蓄結宜八正散神昏狂亂蓄血發狂神昏胃熱重陽狂三黄三承白解湯蓄血發狂小便利少腹鞕痛屬太陽陽明蓄血大便黒其人如狂而喜忘桃仁承氣抵當治須識作汗奄然狂註神昬胃熱謂神昬是胃經熱極乘心也重陽狂謂熱入於陽則狂亂也三黄謂三黄石膏湯治神昬狂亂表實無汗者也三承謂三承氣湯治神昬狂亂裏實不便者也白解湯謂白虎解毒湯治神昬狂亂無表裏證而熱極者也太陽蓄血發狂則少腹鞕痛小便自利若小便不利是水熱蓄也非血蓄也陽明血蓄如狂則喜忘大便黑若大便不黒是熱極也非血蓄也蓄血輕者桃仁承氣湯重者抵當湯擇而用之可也然發狂證亦有陽盛隂虚之人作汗將解之時奄然發狂濈然汗出而解者當須識之不可以藥也循衣摸床循衣摸床有二因太陽火刼熱傷隂小便利生不利死陽明熱極熱彌深皆緣三法失成壞衇實堪下弱難禁虚實隂陽難辨處獨參六味可囘春註循衣摸床危惡之證也一因太陽火刼取汗致陽盛傷隂隂若未竭則小便利多生隂若已竭則小便難多死一因陽明熱極汗吐下三法失宜致成壞證其熱彌深衇實者堪下則可治衇弱者不堪下則難治此已成危惡壞證往往隂陽虚實醫莫能辨無下手處當以大劑獨參六味乾生地黄湯時時與之每獲生也太陽陽邪停飲太陽陽邪有水逆消渴發熱汗出煩小便不利水入吐衇浮而數五苓攢註太陽陽邪有水逆消渴之病謂太陽中風有渴欲飲水水入即吐者名曰水逆飲水多而小便少者名曰消渴發熱汗出風邪也煩熱也小便不利水入則吐飲停也浮數風熱衇也均宜五苓散多服煖水令微汗出外解太陽内利停水則愈若不能飲煖水欲飲冷水者是熱盛也以五苓散加寒水石石膏滑石可也詳太陽上篇太陽隂邪停飲太陽隂邪有水氣傷寒無汗熱烘烘主證乾嘔欬微喘外發内散小青龍小便不利少腹滿下利除麻共入苓噎麻易附喘加杏渴加花粉減半平註太陽隂邪有水氣謂太陽傷寒表不解發熱無汗兼有乾嘔而欬微喘飲病之主證宜以小青龍湯外發寒邪内散寒飲則可愈也或小便不利少腹滿或下利或噎或喘或渴此飲病或有之證亦以小青龍湯主之小便不利少腹滿是水停下焦大便下利是水走大腸俱除麻黄共入茯苓專滲利也噎為内寒之甚以麻黄易附子散内寒也喘氣上逆加杏仁以降逆也渴加花粉減去半夏以避燥生津也詳太陽下篇少隂陽邪停飲少隂陽邪有停飲六七日反不得眠下利而渴欬而嘔小便不利豬苓煎註少隂陽邪有停飲謂少隂陽邪熱證兼有停飲病也少隂病當欲寐至六七日反心煩不得眠是少隂熱也下利而渴欬嘔小便不利是水飲停也以豬苓湯去其熱而利其水可也詳少隂篇少隂隂邪停飲少隂隂邪有水氣腹痛四肢重沉疼小便不利自下利或欬或嘔眞武平欬加乾薑辛味共小便若利去茯苓嘔去附子生薑倍利去芍藥入乾寧註少隂隂邪有水氣謂少隂隂寒兼有水氣病也飲病主證謂腹痛四肢沉重疼痛大便自利小便不利宜眞武湯溫中利水也飲病或有之證或欬或小便利或嘔或下利欬加生薑細辛五味子小便若利去茯苓嘔去附子倍加生薑利去芍藥入乾薑也喘急短氣喘息喝喝數張口短氣似喘不擡肩促難布息為實證短不續息作虚觀内因飲病或痰熱外因隂陽表裏看直視神昬汗潤髪衇微肢厥命難全註喘息氣急喝喝而數張口擡肩欠肚者喘也短氣則似喘非喘而不張口擡肩也二證皆胸中氣病肺主氣故屬肺也無論喘急短氣若氣促壅塞不能布息為有餘之實證若氣短空乏不能續息為不足之虚證内因謂飲冷傷肺或因痰熱也外因謂形寒傷表表主皮毛肺之合也皮毛受邪其次及膚及肌及胸及腹入胃皆令病喘當審隂陽表裏從化主治可也喘急短氣兼直視神昬汗出潤髪衇微四肢厥冷皆死候也與三隂寒證同見是為隂喘宜四逆加杏仁五味子虚者倍加人參與三陽熱證同見是為陽喘宜白虎葛根黄芩黄連湯與太陽表證同見是為表喘無汗者麻黄湯兼煩躁者大青龍湯有汗者桂枝加厚朴杏子湯與陽明裏證同見是為裏喘宜大承氣湯兼結胸者宜大陷胸丸若兼水氣表實者小青龍湯表虚者及小便不利均宜五苓散加葶藶子裏實者宜葶藶大棗湯兼腹脇鞕痛者宜十棗湯裏寒者宜眞武湯若衇微細口鼻氣短喘乏而無隂陽表裏證此氣虚喘也宜保元湯加五味子杏仁若喘而唾痰稠黏喉間漉漉有聲此痰喘也重者宜𤓰蒂散礞石滾痰丸輕者二陳加苦葶藶子蘇子之類也心下悸築築惕惕心動悸怔怔忡忡不自安飲多尿少為停水厥冷汗後是虚寒註心下築築惕惕怔怔忡忡謂悸病之狀也飲水多而小便少水停心下之悸也宜茯苓甘草湯或五苓散厥冷為寒宜眞武湯汗後為虚宜小建中湯或不因汗後是虚之甚也宜炙甘草湯戰振慄戰身聳動慄心㦗振雖聳動比戰輕故振責虚因無力慄戰相交邪正爭此證若生三法後虚其中外逆而成不逆因和而作解正勝邪却戰汗平註戰謂身抖聳動也慄謂心内發㦗也振亦聳動比之於戰則無力也所以論中曰振振者皆責其虚也慄邪氣為之也戰正氣為之也邪正相交故爭也此證若生於汗吐下之後是虚其中外而致逆也若不致逆邪因以衰正因以和而作解則為正勝邪却戰慄汗出而平也呃逆噦噫呃逆今名􅀈古名不似噦噦胃裏聲􅀈聲格格連聲作原夫臍下氣來衝頗類噯噫情自異均屬氣逆治能同虚熱橘皮竹茹治二便不利利之寧氣不歸原宜都氣寒虚丁萸附理中痞鞕下利生薑瀉痞鞕噫氣代赭功註今之名曰呃逆即古之名曰􅀈也􅀈者氣噎結有聲也世有以噦為呃逆者葢不知噦噦之聲聲從胃裏出口不似􅀈之格格連聲氣從臍下來自衝衇出口作聲也呃逆頗類噯氣噫氣噯氣者因飽食太急比時作噯轉食氣也噫氣者因過食傷食越時作噫食臭氣也故曰情自異也但均屬氣逆為病故曰治能同也呃逆之病胃氣虚竭也兼熱者以橘皮竹茹湯加柿蒂主之兼大便不利以三承氣湯主之兼小便不利以二苓散湯主之兼腎虚不能攝衝衇之氣歸原以都氣湯加牛膝主之兼寒虚太隂手足溫以丁萸理中湯主之少隂手足厥更加附子兼痞鞕下利以生薑瀉心湯主之兼痞鞕噫氣以旋覆代赭石湯主之結胸按之滿鞕不痛痞鞕而滿痛為結胸大結從心至少腹小結心下按方疼熱微頭汗為水結潄水不嚥血結名瘀衂未盡經適斷内實沉大審的攻抵當桃仁大小陷誤攻浮大命多傾不實浮滑小陷證藏結悉具躁煩凶註傷寒下之太早則成痞鞕中風下之太早則成結胸均為表邪乘虚入裏鞕滿按之而痛為結胸實邪也鞕滿按之不痛為痞鞕虚邪也大結謂大結胸從心下至少腹鞕滿而痛手不可近者宜大陷胸湯攻之小結謂小結胸微結心下按之方痛不按不痛也宜小陷胸湯開之身有微熱頭自汗出兼有是證者為水結胸也宜大陷胸丸攻之潄水不欲嚥兼有是證者為血結胸也血瘀不成衂解或衂未盡或婦人經來適斷皆能成之宜抵當丸或桃仁承氣湯攻之内實證實可攻也沉大衇實可攻也審其的當則用抵當桃仁承氣大陷胸湯丸以攻之審若不内實衇浮滑或衇浮大是未的也乃小陷胸證不可攻也誤攻之定然凶也藏結謂狀如結胸舌胎白滑衇浮而細也悉具謂結胸通腹兩脇皆鞕滿痛也此證加之煩躁凶死可知痞鞕陽證痞鞕為熱痞大黄黄連瀉心寧汗出惡寒寒熱痞附子瀉心兩收功誤下少陽發熱嘔痞滿半夏瀉心能虚熱水氣痞下利心煩乾嘔腹雷鳴虚熱水氣生薑瀉痞急氣逆甘草靈桂枝表解乃攻痞五苓煩渴利尿通註傷寒下早則成痞鞕中風下早則成結胸此其常也然論中中風下早未嘗無痞鞕傷寒下早亦有結胸大抵從虚化者多為痞鞕從實化者多結胸也陽證心下痞鞕為熱痞宜大黄黄連瀉心湯若陽證汗出惡寒為寒熱痞宜附子瀉心湯誤下少陽發熱而嘔心下痞滿為嘔逆痞宜半夏瀉心湯陽證誤下心下痞鞕下利心煩乾嘔腹中雷鳴脇下有水氣致小便不利為虚熱水氣之痞宜生薑瀉心湯若有是證脇下無水氣其痞急益甚為虚熱客氣上逆之痞宜甘草瀉心湯凡有痞者有無汗惡寒之表宜桂枝湯表解已乃可以大黄黄連瀉心湯攻痞也若有痞者與瀉心湯痞不解其人煩渴小便不利先以五苓散小便利後乃可與諸瀉心湯治痞也發黄濕熱發黄頭汗出小便不利渴陽明素有寒濕發汗後黄從隂化太隂經陽色鮮明隂色暗太陽血蓄併狂生表實麻翹赤小豆茵蔯裏實梔子清隂黄茵蔯四逆主便溏尿秘茵五苓環口黧黒柔汗死體若烟熏陽絶徵註陽明病應徧身有汗謂之熱越今頭汗出身無汗是熱不得越也渴而引飲小便不利是停水也熱與濕瘀從土而化外薄肌肉謂之濕熱發黄也或其人素有寒濕為表邪遏鬱或已成黄又經發汗傳入太隂從隂而化謂之濕寒發黄也陽明屬陽故其色明亮太隂屬隂故其色晦暗也太陽蓄血亦有發黄多與狂病併生法當從蓄血治也表實無汗發黄者宜麻黄連翹赤小豆湯汗之裏實不便者宜茵蔯蒿湯下之無表裏證熱盛者宜梔子蘗皮湯清之隂證發黄者宜茵蔯四逆湯溫之若大便溏小便秘發黄者宜茵蔯五苓散利之環口黧黒柔汗者隂黄死證也柔汗謂冷汗也身體枯燥如烟熏者陽黄死證也疹斑傷寒疹斑失汗下感而即出時氣然表邪覆鬱榮衞分外泛皮衇痧疹斑痧白疹紅如膚粟斑紅如豆片連連紅輕赤重黑多死淡紅稀暗是隂寒未透升麻消毒治熱盛三黄石膏煎已透青黛消斑飲雙解痧疹法同前註傷寒發斑疹痧皆因汗下失宜外邪覆鬱内熱泛出而成也惟時氣傳染感而即出亦由疫之為病烈而速也發於衞分則為痧衞主氣故色白如膚粟也發於榮分則為疹斑榮主血故色紅膚淺為疹深重為斑斑形如豆甚則成片連屬斑疹之色紅者輕赤者重黑者死此以熱之深淺驗死生也若其色淡紅而稀暗者皆因邪在三陽已成斑疹入裏邪從隂化或過服冷藥所致是為隂斑隂痧隂疹法當從隂寒主治也斑出未透表熱輕者宜升麻葛根湯合消毒犀角飲治之表熱重者宜三黄石膏湯發之已透用青黛消斑飲加減清之痧疹初起表裏不清用雙解散先通表裏餘法同前治之可也衂血陽明衂血熱在裏太陽衂血熱瘀經太陽頭痛目瞑兆陽明潄水不嚥徵衂後身凉知作解不解升麻犀角清未衂表實麻黄汗裏熱犀角苓連同註陽明衂血熱在裏也太陽衂血熱瘀經也太陽失汗則有頭痛目瞑之兆陽明失下則有潄水不欲嚥之徵衂血之後身凉衇靜知作解也若仍不解知衂未盡熱留於榮也無汗表熱宜升麻葛根合犀角地黄湯清解之欲作衂未衂者表實宜麻黄湯汗之裏熱宜犀角地黄湯加芩連清之若表實裏熱者則又當合二方兩解之吐血傷寒吐血多因逆下厥上竭少隂經三陽熱盛宜清解血瘀胸滿痛當攻暴吐腐臭内潰死過多血脱面無紅犀角桃仁宜揀用救脱聖愈及養榮註傷寒吐血皆因失汗失下火逆以致邪熱熾盛沸騰經血故也若血從口鼻耳目而出小便難此為強發少隂汗名曰下厥上竭為難治也三陽熱盛吐血宜升麻葛根合犀角地黄湯熱甚加芩連清解可也若血瘀則胸滿或痛當以桃仁承氣合犀角地黄湯攻之若暴吐腐臭之血名曰内潰内潰者死若吐血過多面脣無紅色名曰血脱救脱輕者以聖愈湯重者以人參養榮湯大小便膿血熱在膀胱小便血八正導赤利之佳熱瘀裏急下膿血黄連白頭與桃花註陽經之熱下注膀胱傷其榮分熱少血多瘀成血蓄熱多血少熱廹血行血不得蓄而走下竅故尿血也以八正散導赤散利而清之隂經之熱轉廹陽明傷其榮分瘀則血蓄喜忘如狂不蓄則便血熱腐則便膿便膿熱鬱裏急下重所必然也輕者宜黄連阿膠湯重者白頭翁湯清之滑脱者桃花湯濇之可也頤毒傷寒發頤耳下腫失於汗下此毒生高腫焮紅痛為順反此神昬命必傾毒伏未發衇亦隱冷汗淋漓肢若冰煩渴不便指甲紫頗似三隂了了輕註傷寒頤毒皆因汗下失宜毒熱挾少陽相火上攻而成也若其人陽氣素盛則高腫焮紅疼痛易於成膿故為順也宜連翹敗毒散散之或其人陽氣素虚或服冷藥過多遏鬱毒熱伏藏在裏内攻神昬外毒漫腫肉色不變不疼木硬則命必危也毒伏未發之前往往似三隂亡陽之證衇隱不見冷汗淋漓肢冷若冰但身輕目睛了了煩渴不大便指甲紅紫為異此毒發始臨治不可忽也狐惑古名狐惑近名疳狐蝕肛隂惑脣咽病後餘毒斑疹後癖疾利後也同然面眥赤白黑不一目不能閉喜貪眠潮熱聲啞腐穢氣能食堪藥治多全註狐惑牙疳下疳等瘡之古名也近時惟以疳呼之下疳即狐也蝕爛肛隂牙疳即惑也蝕咽腐齦脱牙穿腮破脣毒因傷寒病後餘毒與濕䘌之為害也或生斑疹之後或生癖疾下利之後其為患亦同也其證則面色目眥或赤或白或黑時時不一喜睡目不能閉潮熱聲啞腐爛之處穢氣熏人若胃壯能食堪受攻病重藥或病之勢緩治多全也百合百合百衇合一病如寒似熱藥無靈飲食起居皆忽忽如神若鬼附其形衇數溺時輒頭痛溺時不痛淅淅風溺時快然但頭眩六四二十病方寧註百合病者謂傷寒過期留連不解不分經絡百衇悉合為一病也如寒似熱諸藥無靈欲飲不能飲欲食不能食欲卧不能臥欲行不能行精神忽忽如神若鬼附其形體而莫知所適從也如衇數溺尿時輙頭痛者六十日乃愈若溺尿時頭不痛惟淅淅然惡風寒者四十日乃愈若溺時快然但頭眩者二十日乃愈故曰六四二十日病方寧也熱入血室婦人傷寒同一治胎産經來熱入室晝日明了夜譫妄小柴生地牡丹皮無汗加麻有汗桂汗後不解再加枝寒熱如瘧加麻桂中寒薑附不須疑渴熱白虎花粉葛瘀血桃仁承氣俱産後胎前雖多證不外隂陽表裏醫註婦人傷寒與男子治法同也惟産後經來邪熱乘虚而入血室另有治法熱入血室之證晝日明了夜則譫語妄見鬼狀宜小柴胡湯加生地丹皮若無汗則為表實加麻黄汗之有汗則為表虚加桂枝解之若有發熱惡寒之表已經發汗雖無汗不加麻黄再加桂枝以解之不可復用麻黄也若有如瘧之寒熱加麻黄桂枝兩解之若厥而下利則為中寒去黄芩加薑附不須疑也若發熱煩渴則為裏熱去半夏合白虎或加花粉葛根胸脇少腹或滿鞕或作痛則為瘀血宜合桃仁承氣湯攻之産後胎前雖有多證不能盡述總不外隂陽表裏之治在臨證者以意消息之耳食復勞復新愈藏府皆不足榮衞腸胃未通和多食過勞復生熱枳實梔子大黄差浮汗沉下小柴解燥嘔竹葉石膏合氣虚補中益氣主隂虧六味倍參多註新愈之後藏府氣血皆不足榮衞未通腸胃未和惟宜白粥靜養若過食胃弱難消因復煩熱名曰食復若過勞役復生熱煩名曰勞復勞復者宜枳實梔子豉湯汗之食復者宜枳實梔子豉加大黄湯下之衇浮有表者宜枳實梔子豉湯以汗解之衇沉有裏者宜枳實梔子豉加大黄湯以下解之若無表裏證者宜小柴胡湯以和解之口燥煩渴喜嘔者宜竹葉石膏湯主之若内傷氣虚勞復者宜補中益氣湯主之若犯内事隂虧者宜六味生乾地黄湯氣少者倍加人參湯主之房勞復隂陽易房勞復與隂陽易二病情異證則同病後犯色復自病病傳不病易之名男女俱主燒裩散少腹急痛引隂中身重少氣頭眩暈拘攣熱氣上衝胸註男女新愈交接因而復病名曰房勞復男女新愈交接病男傳不病之女病女傳不病之男名曰隂陽易即交易之義也犯是病者男以女之裩襠女以男之裩襠燒灰白湯或酒日三服之則愈少腹急痛牽引隂中身重少氣頭目眩暈四肢拘攣熱氣衝胸是其證也御纂醫宗金鑑卷三十七
