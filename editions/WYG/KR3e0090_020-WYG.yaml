  text: 訂正仲景全書金匱要略註中之一目録奔豚氣篇第八桂枝加桂湯奔豚湯茯苓桂枝甘草大棗湯胸痺心痛短氣萹第九栝蔞薤白白酒湯栝蔞薤白半夏湯烏頭赤石脂圓薏苡附子散茯苓杏仁甘草湯橘皮枳實生姜湯枳實薤白桂枝湯人参湯桂枝生薑枳實湯腹滿寒疝宿食萹第十附子粳米湯大建中湯赤丸厚朴三物湯大黄附子湯厚朴七物湯大柴胡湯烏頭煎當歸生薑羊肉湯烏頭桂枝湯𤓰蒂散五臓風寒積聚萹第十一麻子仁圓甘草乾薑茯苓白术湯驚悸吐衄下血胸滿瘀血萹第十二栢葉湯瀉心湯黄土湯桂枝去芍藥加蜀漆牡蠣龍骨救逆湯半夏麻黄圓御纂醫宗金鑑卷二十目録欽定四庫全書御纂醫宗金鑑卷二十訂正仲景全書金匱要略註中之一目録奔豚氣篇第八桂枝加桂湯奔豚湯茯苓桂枝甘草大棗湯胸痺心痛短氣萹第九栝蔞薤白白酒湯栝蔞薤白半夏湯烏頭赤石脂圓薏苡附子散茯苓杏仁甘草湯橘皮枳實生姜湯枳實薤白桂枝湯人参湯桂枝生薑枳實湯腹滿寒疝宿食萹第十附子粳米湯大建中湯赤丸厚朴三物湯大黄附子湯厚朴七物湯大柴胡湯烏頭煎當歸生薑羊肉湯烏頭桂枝湯𤓰蒂散五臓風寒積聚萹第十一麻子仁圓甘草乾薑茯苓白术湯驚悸吐衄下血胸滿瘀血萹第十二栢葉湯瀉心湯黄土湯桂枝去芍藥加蜀漆牡蠣龍骨救逆湯半夏麻黄圓御纂醫宗金鑑卷二十目録欽定四庫全書御纂醫宗金鑑卷二十訂正仲景全書金匱要畧註中之一奔豚氣病衇證并治第八師曰病有奔豚有吐膿有驚怖有火邪此四部病皆従驚發得之按篇中祗有奔豚一證而吐膿驚怖火邪皆簡脫必有缺文師曰奔豚病従少腹起上衝咽喉發作欲死復還止皆従驚恐得之註奔豚者腎病也以其病従少腹上衝咽喉有如豚竄奔突之狀故名之也發作則腎氣上乗於心而欲死作已則氣衰復還於腎而止故其病雖有微甚不同然必皆従驚恐得之盖驚傷心恐傷腎兩藏交病也水能勝火腎上凌心故治法宜瀉腎而補心也集註張従政曰驚者為自不知故也恐者為自知也周揚俊曰少隂脈循喉嚨因其所繫之經而上衝殊便也發汗後燒鍼令其汗鍼處被寒核起而赤者必發奔豚氣従少腹上至心灸其核上各一壯與桂枝加桂湯主之註此條與傷寒論同傷寒論中無發汗後三字而有太陽傷寒者加溫鍼必驚也十一字當従傷寒論為是葢明所以致驚之由非一端即寒侵鍼處亦能為是病也夫太陽傷寒者加溫鍼必驚也謂病傷寒之人卒然加以溫鍼其心必驚非謂温鍼之後必生驚病也燒鍼即温鍼也燒鍼取汗亦汗法也鍼䖏宜當避寒若不知謹外被寒襲火鬱衇中血不流行所以有結核腫赤之患也夫温鍼取汗其法亦為迅烈矣既鍼而榮不奉行作觧必其人素寒隂盛也故雖有温鍼之火但發核赤又被寒侵故不但不解反召隂邪而加鍼之時心既驚虛所以腎水隂邪得上凌心陽而發奔豚也奔豚者腎水隂邪之氣従少腹上衝於心若豚之奔也先灸核上各一壯者外祛其寒邪繼與桂枝加桂湯者内伐其腎邪也集註周揚俊曰奔豚北方腎邪也燒鍼令汗縦不合法與少隂何與而作奔豚盖太陽相表裏也鍼處被寒核起而赤吾知前此之邪未散而後此之邪復入惟桂􅀎伐腎邪也所以用桂加入桂枝湯中一以外觧風邪一以内泄隂氣也先灸核上者因寒而腫惟灸消之也桂枝加桂湯方桂枝五兩芍藥三兩甘草二兩炙生薑三兩大棗十二枚右五味以水七升微火煮取三升去滓温服一升奔豚氣上衝胸腹痛往来寒熱奔豚湯主之註奔豚氣上衝咽喉發作欲死是奔豚之甚者也氣上衝胸腹痛往来寒熱是奔豚之微者也甚者以桂枝加桂湯従腎逐隂降逆也微者以奔豚湯従心調血散逆也奔豚湯方甘草芎藭當歸各二兩半夏四兩黄芩二兩生葛五兩芍藥二兩生薑四兩甘李根白皮一升右九味以水二斗煮取五升温服一升日三夜一服集解沈明宗曰用芎歸白芍甘草調養厥隂少陽血氣之正而邪自外出以生葛黄芩半夏生薑佐李根解半表半裏之寒熱而逆可散盖奔豚雖属腎病然兼厥隂少陽之邪而發者有之仲景用此方明非僅寒邪一端致然也發汗後臍下悸者欲作奔豚茯苓桂枝甘草大棗湯主之註發汗後心下悸者心陽虚本經自病也臍下悸者腎邪乗虚上干心病也奔豚者臍下氣動而上衝也欲作奔豚者有似奔豚之狀而将作未作也茯苓桂枝甘草大棗湯所以補火土而伐水邪也上條發明外感寒邪􅀎病奔豚此條更申明内有水氣亦􅀎病奔豚也集註徐彬曰仲景論證毎合數條以盡其變言奔豚由於驚又言其従少腹衝至咽喉又言其兼腹痛而往来寒熱又言其兼核起而無他病又言汗後臍下悸欲作奔豚而未成者其淺深瞭然用和觧用伐腎用桂不用桂酌治微妙奔豚一證病因證治無復剰義苟不㑹仲景立方之意則峻藥畏用平劑寡效豈古方不宜於今哉周揚俊曰汗本心之液發汗而臍下病悸者心氣虚而腎氣動也茯苓桂枝甘草大棗湯方茯苓半觔桂枝四兩甘草二兩炙大棗十五枚右四味以甘瀾水一斗先煮茯苓減二升内諸藥煮取三升去滓温服一升日三服作甘瀾水法取水三升置大盆内以杓揚之數千遍水上有珠子五六千顆相逐取用之集觧程林曰汗後臍下悸者陽氣虚而腎邪上逆也臍下為腎氣發源之地茯苓泄水以伐腎邪桂枝行陽以散逆氣甘草大棗甘温助脾土以制腎水煎用甘瀾水者揚之無力全無水性取其不助腎邪也胸痺心痛短氣病衇證并治第九師曰夫衇當取太過不及陽微隂弦即胸痺而痛所以然者責其極虚也今陽虚知在上焦所以胸痺心痛者以其隂弦故也註衇太過則病不及亦病故衇當取太過不及而候病也陽微寸口衇微也陽得隂衇為陽不及上焦陽虚也隂弦尺中衇弦也隂得隂衇為隂太過下焦隂實也凡隂實之邪皆得以上乗陽虚之胸所以病胸痺心痛胸痺之病輕者即今之胸滿重者即今之胸痛也集註李彣曰内經云胃衇平者不可見太過不及則病見矣寸衇為陽以候上焦正應胸中部分若陽衇不及而微則為陽虚主病上焦故受病胸痺尺衇太過而弦則為隂盛知在下焦故上逆而為痛也尤怡曰上焦為陽之位而微衇為虛之甚故曰責其極虚平人無寒熱短氣不足以息者實也註平人無病之人也無寒熱無表邪也平人無故而有短氣不足以息之證不可責其虚也此必邪在胸中痺而不通阻碍呼吸當責其實也集註李彣曰上節云責其極虚此又云實何也經云邪之所凑其氣必虛留而不去其病為實是也然短氣與少氣有辨少氣者氣少不足於言内􅀴云言而微終日乃復言者此奪氣是也短氣者氣短不􅀎相續似喘非喘若有氣上冲故似喘而不摇肩似呻吟而無痛是也尤怡曰平人素無疾之人也無寒熱無新邪也而乃短氣不足以息當是裏氣因邪而實或痰或食或飲碍其升降之氣而然也胸痺之病喘息欬唾胸背痛短氣寸口衇沉而遲闗上小𦂳數栝蔞薤白白酒湯主之註寸口衇沉而遲沉則為裏氣滯遲則為藏内寒主上焦藏寒氣滯也闗上小𦂳而疾小為陽虚𦂳疾寒痛是主中焦氣急寒痛也胸背者心肺之宫城也陽氣一虚諸寒隂邪得以乗之則胸背之氣痺而不通輕者病滿重者病痛理之必然也喘息欬唾短氣證之必有也主之以栝蔞薤白白酒湯者用辛以開胸痺用溫以行陽氣也集註趙良曰凡寒濁之邪滯於上焦則阻其上下徃来之氣塞其前後隂陽之位遂令為喘息為咳唾為痛為短氣也程林曰胸中者心肺之分故作喘息咳唾也諸陽受氣於胸而轉行於背氣痺不行則胸背為痛而氣為短也栝蔞薤白白酒湯方栝蔞實一枚搗薤白半觔白酒七升右三味同煮取二升分温再服胸痺不得卧心痛徹背者栝蔞薤白半夏湯主之註上條胸痺胸背痛尚􅀎卧以痛微而氣不逆也此條心痛徹背不得卧是痛甚而氣上逆也故仍用前方大加半夏以降逆也集註尤怡曰胸痺不得卧是胸中痛甚肺氣上而不下也心痛徹背是氣閉塞而前後不通故也其痺為尤甚矣所以然者有痰飲以為之援也栝蔞薤白半夏湯方栝蔞實一枚搗薤白三兩半夏半升白酒一斗右四味同煮取四升溫服一升日三服集觧魏荔彤曰用半夏之苦以開鬱行氣痛甚則結甚故減薤白之濕用半夏之燥更􅀎使膠膩之物隨湯而蕩滌也日三服亦従上治者應徐取頻服也心痛徹背背痛徹心烏頭赤石脂圓主之註上條心痛徹背尚有休止之時故以栝蔞薤白白酒加半夏湯平劑治之此條心痛徹背背痛徹心是連連痛而不休則為隂寒邪甚浸浸乎陽光欲熄非薤白白酒之所􅀎治也故以烏頭赤石脂圓主之方中烏附椒薑一𣲖大辛大熱别無他顧峻逐隂邪而已集註李彣曰心痛在内而徹背則内而達於外矣背痛在外而徹心則外而入於内矣故既有附子之温而復用烏頭之迅佐乾薑行陽大散其寒佐蜀椒下氣大開其鬱恐過於大散大開故復佐赤石脂入心以固澀而收陽氣也赤石脂圓方蜀椒一兩一法二分烏頭一分炮附子半兩炮一法一分赤石脂一兩一法二分乾薑一兩一法一分右五味末之蜜丸如桐子大先食服一丸日三服不知稍加服胸痺緩急者薏苡附子散主之註緩急者謂胸痺痛而時緩時急也當審其緩急而施治若緩而不急者以栝蔞薤白白酒湯主之今時緩時急故以薏苡附子散急通痺氣以迅掃隂邪也薏苡附子散方薏苡仁十五兩大附子十枚炮右二味杵為散服方寸匕日三服集觧李彣曰緩急者或緩而痛暫止或急而痛復作也薏苡仁入肺利氣附子温中行陽為散服則其效更速矣魏荔彤曰薏苡下氣寛胸附子温中散邪為邪盛甚而陽㣲亦甚者立法也胸痺胸中氣塞短氣茯苓杏仁甘草湯主之橘枳薑湯亦主之註胸痺胸中急痛胸痺之重者也胸中氣塞胸痺之輕者也胸為氣海一有其隙若陽邪干之則化火火性氣開不病痺也若隂邪干之則化水水性氣闔故令胸中氣塞短氣不足以息而為胸痺也水盛氣者則息促主以茯苓杏仁甘草湯以利其水水利則氣順矣氣盛水者則痞塞主以橘皮枳實生薑湯以開其氣氣開則痺通矣集註沈明宗曰邪氣阻塞胸膈肺氣不得往来流利則胸中氣塞短氣方用杏仁使肺氣下通以茯苓導引濕下行甘草和中俾邪去則痺開而氣不短矣然胸痺乃胸中氣塞土濕寒濁隂氣以挟外邪上逆所致故橘枳生薑善於散邪下濁所以亦主之魏荔彤曰此証乃邪實而正不甚虛陽㣲而隂不甚盛盖痺則氣必塞氣塞則必短氣前言之矣今開降其氣而諸證自除矣茯苓杏仁甘草湯方茯苓三兩杏仁五十個甘草一兩右三味以水一斗煮取五升温服一升日三服不差更服橘皮枳實生薑湯方橘皮一觔枳實三兩生薑半觔右三味以水五升煎取二升分溫再服胸痺心中痞氣氣結在胸胸滿脇下逆搶心枳實薤白桂枝湯主之人參湯亦主之註心中即心下也胸痺病心下痞氣悶而不通者虚也若不在心下而氣結在胸胸滿連脇下氣逆撞心者實也實者用枳實薤白桂枝湯主之倍用枳朴者是以破氣降逆為主也虚者用人参湯主之即理中湯是以温中補氣為主也由此可知痛有補法塞因塞用之義也集註魏荔彤曰胸痺自是陽微隂盛矣心中痞氣氣結在胸正胸痺之病状也再連脇下之氣俱逆而搶心則痰飲水氣俱乗隂寒之邪動而上逆胸胃之陽氣全難支拒矣故用枳實薤白桂枝湯行陽開鬱温中降氣猶必先後煮治以融和其氣味俾緩緩蕩除其結聚之邪也再或虛寒已甚無敢恣為開破者故人参湯亦主之以温補其陽使正氣旺而邪氣自消也尤怡曰心中痞氣氣痺而成痞也脇下逆搶心氣逆不降将為中之害也用此二方者一以去邪之實即以安正一以養陽之虚即以逐隂是在審其病之新久與氣之虛實而决之枳實薤白桂枝湯方枳實四枚厚朴四兩薤白半觔桂枝一兩栝蔞實一枚搗右五味以水五升先煮枳實厚朴取三升去滓内諸藥煮數沸分温三服人參湯方人参甘草乾薑白术各三兩右四味以水八升煮取三升温服一升日三服心中痞諸逆心懸痛桂枝生薑枳實湯主之註心中痞即上條心中痞氣也諸逆諸氣上逆也上條之逆不過撞心而不痛此條之逆則心懸而空痛如空中懸物動摇而痛也用桂枝生薑枳實湯通陽氣破逆氣痛止痞開矣集註程林曰諸逆如脇下逆搶心之類邪氣獨留於上則心懸痛尤怡曰諸逆該痰飲客氣而言心懸痛謂如懸物動摇而痛逆氣使然也桂枝生薑枳實湯方桂枝三兩生薑三兩枳實五枚右三味以水六升煮取三升分温三服集觧趙良曰枳實生薑原以治氣塞况於痞乎故較前條稍減輕分兩使痞者下其氣以開之懸痛屬飲者得生薑以散之既足建功矣乃去橘皮而用桂枝者以所逆非一或通陽氣或破結氣或散寒氣皆􅀎去痺也腹滿寒疝宿食病衇證并治第十趺陽衇微弦法當腹滿不滿者必便難兩胠疼痛此虛寒従下上也當以温藥服之註趺陽胃衇也當緩而和今見弦衇是肝衇也肝衇見於脾部是木盛土虛也法當腹滿今不腹滿者肝衇微弦不盛而脾不虛故脾未受病也肝自鬱則失其條達之性必夲經自病故便難兩胠痛也然非肝火實病此乃虚寒従下上也當以温藥服之腹滿時減復如故此為寒當與温藥按此篇無治虛寒腹滿之方當與温藥之下當有宜厚朴生薑甘草半夏人参湯主之十四字必是脫簡閲傷寒論太隂篇自知註此承上條互詳其證以明其治也腹滿便難脾實病也今腹滿而不便難脾虛病也且腹滿有時而減有時復如不滿乃虛寒也當與温藥主之以厚朴生薑甘草半夏人参湯消滿散寒緩中降逆補虛乃治虚滿之法也集註魏荔彤曰腹滿或服下藥或服補藥有時減退未㡬旋腹滿如故則不可作實與熱治也仲景明此為寒裏寒従無下法惟有温藥與服虚者以温中補氣實者亦以温中行氣為義是治氣寒腹滿第一善法也厚朴生薑甘草半夏人参湯方厚朴半觔生薑半觔半夏半觔人参一兩甘草三兩炙右五味以水一斗煮取三升去滓温服一升日三服腹滿不减减不足言當須下之宜大承氣湯註腹滿時减時滿虚滿也腹滿常常而滿實滿也腹滿不减减不足言謂腹滿不减雖减不過稍减不足言减也虚滿當温實滿當下故宜大承氣湯下之此治實滿之法也集註尤怡曰减不足言謂雖减而不足云减所以形其滿之至也故宜大下所謂中滿者瀉之於内也大承氣湯方見前痙病中病者腹滿按之不痛為虚痛者為實可下之舌黄未下者下之黄自去註前條腹滿以時减時不减别虚實此條腹滿以痛不痛辨有餘不足也腹滿按之不痛為虚虚者脾虚也可温之則當與厚朴生薑甘草半夏人参湯也按而痛者為實實者胃實也可下之當與大承氣湯胃實者舌胎必黄若未下者下之黄胎自去也集註趙良曰腹滿亦有属實實則非虚寒也明矣豈概以温藥治之乎故有試之之法在痛與不痛之分虚實較然矣盖胃實必熱熱蒸必舌黄下其實熱舌黄不自已乎有此一辨并虚者愈審已魏荔彤曰無形之虚氣作痞塞則按之無物何痛之有倘挟有形之實物為患如宿食在胃疝氣在少腹等是也按之有物阻碍於藏腑之側焉有不痛者乎是於按之痛否以决其虚實之法也病者痿黄躁而不渇胸中寒實而利不止者死按躁而不渇當是燥而不渴文始通順胸中寒實當是胃中寒實若是胸中寒實如何曰下利不止者死皆是傳寫之譌註病者面色痿黄若口燥而渇者熱實也今痿黄口燥不渇寒實也寒實者當不下利若下利是寒虚也今下利不止乃寒虚胃氣下脱故死也集註程林曰痿黄者脾胃病也見燥而渇者為熱不渇者為寒病人既痿黄又兼下利不禁則脾氣衰絶故死李彣曰下利若燥而渇者為熱陽氣尚存猶為可治今燥而不渇胃中寒邪盛也若利不止則隂盛陽衰氣下脱矣故死夫瘦人繞臍痛必有風冷糓氣不行而反下之其氣必衝不衝者心下則痞註此承上條寒實證誤以寒藥下之之義也瘦人形氣虚弱難禦外邪若繞臍痛必有風冷傷胃致令糓氣不行也繞臍疼痛雖属實邪但因風冷則為寒實醫者當温而行之今反以寒藥下之其風冷之邪若上虚則氣上衝中虚則痞結心下理必然也集註尤怡曰瘦人蔵虛氣弱風冷易入入則糓氣留滯不行繞臍疼痛有似裏實而實為虚冷是宜温藥以助脾之行乃反下之糓出而風冷不與俱出正乃益虚邪乃無制勢必上衝若不衝者心下則痞寸口衇弦者即脇下拘急而痛其人嗇嗇惡寒也註此詳申首條兩胠疼痛属寒之義也寸口衇弦即首條之弦也脇下拘急而痛即首條之兩胠疼痛也何以知其為寒也然必其人有陽虚嗇嗇惡寒之證始為肝寒而痛也即有腹滿亦當溫之可也集註程林曰弦肝衇隂也肝衇循脇裏寒主收引故脇下拘急而痛以寒勝於内而陽氣不行於外故外亦嗇嗇而惡寒也夫中寒家喜欠其人清涕出發熱色和者善􅅉註中寒家謂素有中寒病之人也前以時減辨腹滿之中寒又以惡寒辨脇痛之中寒此以喜欠清涕出而辨心胸之中寒也欠者呵欠也夫人欲睡喜欠者隂引陽入也睡覺喜欠者陽引隂出也今中寒喜欠者是隂盛引陽也年老之人清涕出者是陽虚也遇寒之人清涕出者是寒盛也今中寒而清涕出者是陽氣虚寒也若發熱色和者非為中寒也乃為外寒所搏雖有清涕出亦因善􅅉而出也中寒其人下利以裏虛也欲􅅉不能此人肚中寒一云痛註上條以喜欠清涕自出辨心胸之中寒此條以下利欲􅅉不􅀎􅅉而辨腹中寒也其人下利裏氣素虚也欲􅅉不能􅅉何以知此人腹中寒也葢噴􅅉者雷氣之義也其人内陽外隂陽氣奮發而為􅅉也今欲􅅉不􅀎􅅉是陽欲出而復留隂氣盛也故知腹中寒也集註沈明宗曰此脾經受寒現證也寒中太隂隂寒濕盛陽虚不固其人下利但通多不足故為裏虚盖陽和則􅅉而欲􅅉不􅀎乃隂寒凝滯於裏所以肚中病也腹中寒氣雷鳴切痛胸脇逆滿嘔吐附子粳米湯主之註腹中切痛寒也腹中雷鳴氣也腹中寒氣故雷鳴切痛而胸脇逆滿者腸胃之外寒氣為之也腹痛雷鳴嘔吐者腸胃之中寒氣為之也主之以附子粳米湯勝寒氣和内外此治腹中寒之法也附子粳米湯方附子一枚炮半夏半升甘草一兩大棗十枚粳米半升右五味以水八升煮米熟湯成去滓温服一升日三服心胸中大寒痛嘔不䏻飲食腹中寒上衝皮起出見有頭足上下痛不可觸近大建中湯主之註心胸中大寒痛謂腹中上連心胸大痛也而名大寒痛者以有厥逆衇伏等大寒證之意也嘔逆不能飲食者是寒甚拒格於中也上衝皮起出見頭足者是寒甚聚結於外也上下痛不可觸近是内而蔵腑外而經絡痛之甚亦由寒之甚也主之以大建中湯蜀椒乾薑大散寒邪人参膠飴大建中虚服後温覆令有㣲汗則寒去而痛止此治心胸中寒之法也大建中湯方蜀椒二合去汗乾薑四兩人参二兩右三味以水四升煮取二升去滓内膠飴一升㣲火煎取一升半分温再服如一爨頃可飲粥二升後更服當一日食糜温覆之寒氣厥逆赤丸主之按此條之文之方必有簡脫難以為後世法不釋赤丸方茯苓四兩半夏四兩洗一方用桂烏頭二兩炮細辛一兩右四味末之真朱為色煉丸丸如麻子大先食酒飲下三丸日再夜一服不知稍増之以知為度痛而閉者厚朴三物湯主之註腹滿而痛下利者用理中湯所以温其中也腹滿而痛便閉者用厚朴三物湯所以開其下也厚朴三物湯方厚朴八兩大黄四兩枳實五枚右三味以水一斗二升先煮二味取五升内大黄煮取三升温服一升以利為度其衇數而𦂳乃弦状如弓弦按之不移衇弦數者當下其寒衇𦂳大而遲者必心下堅衇大而𦂳者陽中有隂可下之按其衇數而𦂳乃弦狀如弓弦按之不移衇弦數者之十九字當是衍文閱傷寒論辯衇法自知當下其寒之四字當在必心下堅之下文義始屬註衇𦂳大而遅者必心下堅鞕乃寒實也當下其寒衇大而𦂳者陽中有隂也大者陽實𦂳者隂實也故可下之脇下偏痛發熱其衇𦂳弦此寒也宜温藥下之以大黄附子湯按脇下偏痛之偏字當是滿字必是傳寫之譌註腹滿而痛脾實邪也脇下滿痛肝實邪也發熱若衇數大胃熱實邪也今衇𦂳弦脾寒實邪也當以温藥下之故以大黄附子湯下其寒實方中佐細辛者以散其肝邪此下肝脾寒實之法也集註尤怡曰脇下滿痛而衇𦂳弦隂寒成聚也雖有發熱亦是陽氣被鬱所致是以非温不􅀎已其寒非下不䏻去其結故曰宜以温藥下之大黄附子湯方大黄三兩附子三枚炮細辛二兩右三味以水五升煮取二升分温三服若强人煮取二升半分温三服服後如人行四五里進一服病腹滿發熱十日衇浮而數飲食如故厚朴七物湯主之註病腹滿裏證也發熱裏熱也然十日衇浮而數表熱亦未已也飲食如故胃熱􅀎消糓也因胃熱裏實表熱發熱故用厚朴七物湯表裏均觧腹滿發熱兩除也此桂枝湯小承氣湯之複方也集註程林曰腹滿者内有實熱也十日衇尚浮而數浮為在表表熱邪未已故發熱數為在裏裏熱􅀎消糓故飲食如故與此方蕩腹滿而除表熱夫表裏俱實當先觧表乃可攻裏今表邪微而裏邪甚故用承氣桂枝二湯相合以和表裏如傷寒之用大柴胡此其義也厚朴七物湯方厚朴半觔甘草三兩大黄二兩大棗十枚枳實五枚桂枝二兩生薑五兩右七味以水一斗煮取四升温服八合日三服嘔者加半夏五合下利去大黄寒多者加生薑至半觔按之心下滿痛者此為實也當下之宜大柴胡湯按按之心下滿痛之下當有有潮熱之三字若無此三字則不當與大柴胡湯是必傳寫之遺註按之心下滿痛有潮熱者此為表裏俱實當下之宜大柴胡湯兩觧之此二治皆下實滿之法也大柴胡湯方柴胡半觔黄芩三兩芍藥三兩半夏半觔洗枳實四枚炙大黄二兩大棗十二枚生薑五兩右八味以水一斗二升煮取六升去滓再煎温服一升日三服腹痛衇弦而𦂳弦則衛氣不行即惡寒𦂳則不欲食邪正相搏即為寒疝遶臍痛苦發則白汗出手足厥冷其衇沉𦂳者大烏頭煎主之按此條衇重出下條有證無衇其衇沉𦂳者之五字當在下條裏急之下然衇弦而𦂳是勁急之甚當属寒疝之重者其白汗之白字當是自字下條其衇沉𦂳是裏痛之衇當属寒疝之輕者必是傳寫之譌註疝病犯寒即發故謂之寒疝也其病發則繞臍少腹急痛惡寒汗出手足厥冷不欲飲食衇弦而𦂳主急主痛此寒疝應有之證衇也主之烏頭煎者是專以破邪治標為急虚實在所不論故曰强人服七合弱人服五合也烏頭煎方烏頭大者五枚熬去皮不㕮咀右以水三升煮取一升去滓内蜜二升煎令水氣盡取二升强人服七合弱人服五合不差明日更服不可一日再服寒疝腹中痛及脇痛裏急者當歸生薑羊肉湯主之按脇痛裏急之下當有上條其衇沈𦂳四字註寒疝腹中痛及脇痛裏急衇見沉𦂳較之繞臍苦痛輕矣且無惡寒汗出手足厥冷故不用烏頭煎之大温大散而用當歸生薑羊肉湯養正為本散寒為次此治寒疝之和劑也服烏頭煎病勢退者亦當與之集註李彣曰疝属肝病肝蔵血其經布脇肋腹脇并痛者血氣寒而凝澁也當歸通經活血生薑温中散寒裏急者内虚也用羊肉補之内經云形不足者温之以氣精不足者補之以味是也沈明宗曰按此連衝衇為疝治當温補也肝木受邪乗脾則腹中痛本經之氣不舒故脇亦痛連及衝衇則裏急矣所以當歸補養衝任而散風寒羊肉温補榮衛之氣脾邪散而痛自止方後云痛而多嘔乃肝氣上逆臨胃故加橘术補之當歸生薑羊肉湯方當歸三兩生薑五兩羊肉一觔右三味以水八升煮取三升温服七合日三服若寒多者加生薑成一觔痛多而嘔者加橘皮二兩白术一兩加生薑者亦加水五升煮取三升二合服之寒疝腹中痛逆冷手足不仁若身疼痛灸刺諸藥不􅀎治抵當烏頭桂枝湯主之按抵當二字衍文也註寒疝腹中痛逆冷手足不仁身體疼痛此疝之寒重者也灸刺諸藥不􅀎取效則急以烏頭煎加桂枝湯五合以觧内外之盛寒也集註徐彬曰起於寒疝腹痛而至逆冷手足不仁則陽氣大痺加以身疼痛榮衛俱不和更灸刺諸藥不􅀎治是或攻其外或攻其内邪氣牽制不服也故以烏頭攻寒為主而合桂枝全湯以和榮衞所謂七分治裏三分治表也烏頭桂枝湯方烏頭一枚右一味以蜜二觔煎减半去滓以桂枝湯五合觧之令得一升初服二合不知即服三合又不知復加至五合其知者如醉状得吐者為中病方觧以桂枝湯五合觧之者溶化也令得一升謂以烏頭所煎之蜜五合加桂枝湯五合溶化令得一升也不知不效也又不知又不效也其知者已效也如醉状外寒方散得吐者内寒已伸故為中病也問曰人病有宿食何以别之師曰寸口衇浮而大按之反濇尺中亦微而濇故知有宿食大承氣湯主之按尺中亦微而濇之微字當按傷寒論作大字是註宿食病即今之傷食病也謂食隔宿不化也人病腹滿而痛何以别之為宿食也寸口衇浮而大按之反濇謂按且大且濇且有力也闗上尺中亦然大濇有力為實而不利故知有宿食也當下之宜大承氣湯衇數而滑者實也此有宿食下之愈宜大承氣湯註腹滿而痛衇數而滑者實也此有宿食故當下之集註李彣曰滑者水榖之氣勝也若滑而兼數則實熱已入胃府矣故云有宿食可下之下利不欲食者有宿食也當下之宜大承氣湯註初下利不欲食者是傷食惡食不欲食也久下利不欲食者是傷脾不䏻食也今初下利即不欲食以有宿食故也當下之宜大承氣湯無疑矣集註沈明宗曰此傷食而致下利也驟傷宿食停滯胃中壅遏升降之機不轉腸中水糓不分而下奔則利宿食在胃故不欲食必當攻去宿食利得止而欲食故宜大承氣湯宿食在上脘當吐之宜𤓰蒂散註胃有三脘宿食在上脘者隔間痛而吐可吐不可下也在中脘者心中痛而吐或痛不吐可吐可下也在下脘者臍上痛而不吐不可吐可下也今食在上脘故當以𤓰蒂散吐之也𤓰蒂散方𤓰蒂一分熬黄赤小豆一分煮右二味杵為散以香豉七合煮取汁和散一錢匕温服之不吐者少加之以快吐為度而止亡血及虚者不可與之衇𦂳如轉索無常者有宿食也註轉索無常𦂳衇之狀也若浮𦂳傷寒沉𦂳冷痛冷犯胃脘榖氣不行故曰有宿食也衇𦂳頭痛風寒腹中有宿食不化也一云寸口衇𦂳註衇𦂳頭痛是外傷風寒病也衇𦂳腹痛是内傷宿食病也集註李彣曰按此衇與證似傷寒而非傷寒者以身不疼腰脊不强故也然衇𦂳亦有辨浮而𦂳者為傷寒沉而𦂳者為傷食甲乙經曰人迎𦂳甚傷於寒氣口𦂳甚傷於食則寒與食又以左右手為辨已是以知腹中有宿食不化也五藏風寒積聚病衇證并治第十一肺中風者口燥而喘身運而重冒而腫脹按身運而重當是頭運而身重冒而腫脹當是冒風而腫脹始與文義相合此必傳寫之譌可知註肺主氣外合皮毛肺中風邪風傷氣則津結不行故口燥風傷肺則氣逆上壅故喘咳頭運而身重者氣傷而力乏也冒風而腫脹者皮傷風水也集註李彣曰肺主氣風邪中之則氣壅而津液不行故口燥氣逆而呼吸不利故氣喘也肺中寒吐濁涕註肺中寒邪胸中之陽氣不治則津液聚而不行故吐濁涎如涕也集註李彣曰五液入肺為涕肺合皮毛開竅於鼻寒邪従皮毛而入於肺則肺竅不利而鼻塞涕唾濁涎壅遏不通吐出於口也肺死藏浮之虛按之弱如蔥葉下無根者死註肺中風寒之邪衇若見浮之極虚按之弱如蔥葉之空下無根者乃肺藏之死衇也以下五藏俱言浮者是明外中之邪應得之衇也集註程林曰真肺衇至如以毛羽中人膚非浮之虚乎蔥葉中空按之弱如蔥葉下又無根則浮毛虚弱是無胃氣也此真藏已見故死肝中風者頭目瞤兩脇痛行常傴令人嗜甘註肝主風外合於筋肝中風邪風勝則動故頭目瞤動也兩脇肝之部肝受病故兩脇痛也風傷筋故行常傴僂也肝苦急欲甘緩之故令人嗜甘也集註徐彬曰高巔之上惟風可到風性動摇故頭目瞤動肝衇上貫膈今脇肋有邪故痛肝主筋風勝則筋急故傴人以脾胃為主木邪甚而土負甘益脾嗜甘所以自救也肝中寒者兩臂不舉舌本燥喜太息胸中痛不得轉側食則吐而汗出也按兩臂不舉舌本燥二句而汗出三字文義不属必是錯簡不釋註肝性條達氣行於胸側肝中寒邪故有氣抑不伸喜太息氣滯不行痛不得轉側也食則吐亦寒邪上逆也肝死藏浮之弱按之如索不来或曲如蛇行者死註肝中風寒之邪若衇見浮之極弱按之不弦是失其肝之本衇也今按之如索不来曲如蛇行而去夫索曲蛇行去而不来非皆肝藏之死衇乎集註周揚㑓曰按之如索則弦𦂳俱見衇有来去乃隂陽往復之理今曰不来但去是無胃氣也否則真氣将散出入强勉有委而不前屈且難伸之狀故曲如蛇行也肝着其人常欲蹈其胸上先未苦時但欲飲熱旋覆花湯主之按旋覆花湯主之六字與肝着之病不合當是衍文註肝着者為肝氣着而不行致胸痞塞不快也故其人常欲按摩其胸以疏通其氣也其先未曾痞塞苦時但欲飲熱者乃寒氣為病也集註李彣曰肝主踈泄着則氣鬱不伸常欲人蹈其胸上以舒其氣又以寒氣固結於中欲飲熱以勝其寒也心中風者翕翕發熱不􅀎起心中饑食即嘔吐按翕翕發熱中風之本證也不􅀎起心中饑食即嘔吐文義不屬必是錯簡不釋心中寒者其人苦病心如噉蒜状劇者心痛徹背背痛徹心譬如蠱注其衇浮者自吐乃愈註其人苦病心如噉蒜状謂辛辣刺心之狀也劇者心痛徹背背痛徹心謂心背相應而痛也譬如蠱注謂似蟲之往来不已而痛也此皆心中寒邪之證若其衇浮是心得本衇為寒邪上越之候故自吐則邪去乃愈也集註徐彬曰寒則為隂邪外束之則火内鬱故如噉蒜状其似辣而非痛也劇則邪盛故外攻背痛内攻心痛徹者相應也譬如蠱注状其綿綿不息若衇浮是邪未結故自吐而愈心傷者其人勞倦即頭面赤而下重心中痛而自煩發熱當臍跳其衇弦此為心藏傷所致也按其衇弦之弦字當是沉字沉為腎衇文義相屬必是傳寫之譌註心傷者謂心傷病之人也因其人勞倦則擾其心心之陽盛於上故頭面赤也上盛則下虚故下重而無力也心中痛自煩發熱當臍跳其衇沉腎乗心傷之所致也集註尤怡曰心傷者其人勞倦即頭面赤而下重盖心虚者其陽易浮上盛者其下必虚也心中痛而自煩發熱者心虚失養而熱動於中也當臍跳者心虚於上而腎動於下也邪哭使魂魄不安者血氣少也血氣少者屬於心心氣虚者其人則畏合目欲眠夢逺行而精神離散魂魄妄行隂氣衰者為癲陽氣衰者為狂按隂氣衰者為癲之癲字當是狂字陽氣衰者為狂之狂字當是癲字内經曰重隂者癲重陽者狂必是傳寫之譌註邪哭謂心傷之人無故而哭也邪哭則使人魂魄不安心之血氣少也血氣少而心虚則令人畏合目欲眠則夢逺行此是精神離散魂魄妄行也心之血隂也隂過衰則陽盛陽盛則為病狂也心之氣陽也陽過衰則隂盛隂盛則病癲也心死藏浮之實如丸豆按之益躁疾者死註心中風寒之邪若衇見浮之極實如丸豆之狀按之益勁躁疾亂動者乃心藏之死衇也集註李彣曰難經云心衇浮大而散若浮之實如麻豆按之益躁疾則真藏衇見胃氣全無故死内經云真心衇至堅而搏如尋薏苡子累累然即如麻豆意可與此同叅脾中風者翕翕發熱形如醉人腹中煩重皮目瞤瞤而短氣按脾缺中寒之文必是簡脫註脾中風邪翕翕發熱中風之本證也形如醉人亦風熱攘亂於中應有之證也腹中不快而煩身體懈惰而重皮目瞤瞤動而氣短皆脾經證也集註李彣曰風屬陽邪而氣踈泄形如醉人言其面赤而四肢軟也風氣内擾故腹中煩重皮目上下眼胞也脾死藏浮之大堅按之如覆杯潔潔状如摇者死註脾中風寒之邪若衇見浮之大堅失其和緩按之状如覆杯高章明潔有力如摇乃脾藏之死衇也集註李彣曰衇弱以滑是有胃氣浮之大堅則胃氣絶真藏衇見矣覆杯則内空潔潔者空而無有之象也状如摇者衇躁疾不寧氣将散也故死趺陽衇浮而濇浮則胃氣強濇則小便數浮濇相搏大便則堅其脾為約麻子仁丸主之按此條當在腹滿篇中便難之下必是錯簡在此註趺陽胃衇也若衇濇而不浮脾隂虚也則胃氣亦不强不堪下矣今衇浮而濇胃陽實也則為胃氣强脾隂亦虚也脾隂虚不􅀎為胃上輸精氣水獨下行故小便數也胃氣强約束其脾不化津液故大便難也以麻仁丸主之養液潤燥清熱通幽不敢恣行承氣者盖因衇濇終是虚邪也集註徐彬曰脾約病用丸不作湯者取其緩以開結不能驟傷元氣也要知人至脾約皆因元氣不充津液不到所致耳李彣曰趺陽胃衇也胃為水糓之海浮為陽衇故胃氣强而􅀎食小便數則津液亡故衇濇盖脾主為胃行津液此以胃强脾弱約束津液不䏻四布但輸膀胱致小便數而大便堅也麻子仁丸通幽潤燥麻子仁丸方麻子仁二升芍藥半觔枳實一觔大黄一觔厚朴一尺杏仁一升右六味末之煉蜜為丸梧子大飲服十丸日三以知為度腎着之病其人身體重腰中冷如坐水中形如水状反不渇小便自利飲食如故病屬下焦身勞汗出衣裏冷濕久久得之腰以下冷痛腹重如帯五千錢甘薑苓术湯主之按腎缺中風中寒二條必是簡脱註腎着者謂腎為寒濕所傷着而不行之為病也腎受寒濕故體重腰冷如坐水中雖形如水腫之状反不渇而小便自利非水也乃濕也飲食如故以病屬下焦腎而不屬中焦脾故也詢其所以得之之由身勞汗出衣裏冷濕久久傷之也是以腰下冷痛寒勝也腹重濕勝也如帶五千錢形容重着之甚也以甘薑苓术湯補土以制水散寒以渗濕也集註尤怡曰其病不在腎之中藏而在腎之外府故其治不在温腎以散寒而在燠土以勝水也甘草乾薑茯苓白术湯方甘草二兩白术二兩乾薑四兩茯苓四兩右四味以水五升煮取三升分温三服腰中即温腎死藏浮之堅按之亂如轉丸益下入尺中者死註腎中風寒之邪若見浮之極堅按之亂動有如轉丸及下入尺中通然亂動皆腎死真藏之衇也集註程林曰腎藏死浮之堅與内經辟辟如彈石曰腎死同意皆堅之象也按之則亂如轉丸下入尺中者此隂陽離决之状也故死以上真藏與内經互有異同縂之衇無胃氣現於三部中衇象形容不一也問曰三焦竭部上焦竭善噫何謂也師曰上焦受中焦氣未和不能消榖故􅀎噫耳下焦竭即遺溺失便其氣不和不􅀎自禁制不須治久則愈註三焦竭部者謂三焦因虚竭而不各歸其部不相為用也上焦受氣於中焦下焦生氣於中焦互相為用則為和也若中焦虚竭不能消化水榖糓氣不受則上焦不相為用而失和也失和則榖氣鬱而不宣故善噫也下焦虚竭不䏻供升生之氣於中焦則失和也失和則腎氣獨沉自不􅀎禁故前遺溺而後失便也不湏治久則愈在善噫可也若遺溺失便未有不治䏻愈者恐是錯簡集註程林曰竭虚也本經云三焦不歸其部上焦不歸者噫而酢吞中焦不歸者不􅀎消榖引食下焦不歸者則遺溲上焦胃上口也中焦脾也脾善噫脾不和則食息廹逆於胃口而為噫也經云膀胱不約為遺溺因氣不和則溲便不約故遺失而不䏻自禁制也師曰熱在上焦者因欬為肺痿熱在中焦者則為堅熱在下焦者則尿血亦令淋秘不通大腸有寒者多鶩溏有熱者便腸垢小腸有寒者其人下重便血有熱者必痔註熱在上焦者萹中所謂肺痿吐涎沫也熱在中焦者篇中所謂腹滿堅痛也熱在下焦者篇中所謂小便淋瀝也其外大腸有寒者多清澈鶩溏即下利溏瀉也有熱者便稠粘腸垢即下利膿血也小腸有寒者下重便血即結隂便血也有熱者熱流于大腸蓄于肛門必病痔也集註徐彬曰小腸為受盛之官與心為表裏丙小腸也挟火以濟隂而隂不滯挟氣以化血而血歸經有寒則氣不上通而下重血無主氣而妄行矣直腸者大腸之頭也門為肛小腸有熱則大腸傳導其熱而氣結於肛門故痔痔者滯其丙小腸之熱於此也問曰病有積有聚有䅽氣何謂也師曰積者藏病也終不移聚者腑病也發作有時展轉痛移為可治䅽氣者脇下痛按之則愈復發為䅽氣諸積大法衇来細而附骨者乃積也寸口積在胸中微出寸口積在喉中闗上積在臍傍上闗上積在心下微下闗積在少腹尺中積在氣衝衇出左積在左衇出右積在右衇兩出積在中央各以其部處之䅽作漀觧見首篇註病有積有聚有漀氣當别之也積者藏病無時不有不移其處也聚者腑病發作有時展轉痛移也為可治謂腑病易治也漀氣者飲積脇下痛也按之則止不按復痛以水氣得按暫散故痛暫止也此即其證而言之然諸積大法尤當以診候之也衇来沉伏附骨而細者乃諸積之證也若見兩寸積在胸中也微出近魚際積在喉中也兩闗積在臍傍也上闗近寸積在心下也微下近尺積在少腹也尺中積在氣衝也衇出左積在左衇出右積在右衇兩出謂左右俱見積在中央也各以其部之處而診積之所在也集註徐彬曰積者跡也病氣之屬隂者也藏屬隂兩隂相得故不移不移者有専痛之處而無遷改也聚則如市井之物偶聚而已病氣之屬陽者也府屬陽兩陽相比則非如隂之凝故寒氣感則發否則已所謂有時也既無定着則痛無常處故展轉痛移其根不深故比積為可治也李彣曰積為藏病深入在裏故衇細而附骨也寸闗尺上下左右别積病之所在皆指細而附骨之部分即内經前以候前後以候後上竟上者胸喉中事也下竟下者少腹腰股膝脛足中事也驚悸吐衄下血胸滿瘀血病衇證并治第十二寸口衇動而弱動即為驚弱則為悸註寸口通指三部也衇動而弱主驚悸病也動即為驚以驚為外觸而動也弱即為悸以悸為内生而怯也集註徐彬曰驚為外邪襲心故其寸口衇動動者衇来亂動也悸乃神不自主故其寸口衇弱弱者衇沉無力也邪之所襲因心之虚故驚悸並見李彣曰此寸口衇兼三部而言盖驚自外至者也驚則氣亂故衇動而不寧悸自内惕者也悸因中虛故衇弱而無力師曰夫衇浮目睛暈黄衄未止暈黄去目睛慧了知衄今止註浮衇主陽主表若目睛清潔主陽表病也目睛暈黄主血衇病也葢以諸衇絡於目而血熱則赤血瘀則黄今目睛黄暈知其衄未止也若黄暈去目睛慧了知其衄已止故曰衄今止也又曰従春至夏衂者太陽従秋至冬衂者陽明註衄血陽絡傷也下血隂絡傷也太陽主外春夏主外故従春至夏衄血屬太陽也陽明主内秋冬主内故従秋至冬衄血屬陽明也集註李彣曰衄血出於鼻手太陽經上䪼抵鼻目下為䪼足太陽經従巔入絡腦鼻與腦通手陽明經挟鼻孔足陽明經起鼻交額中四經皆循鼻分故皆􅀎致衄太陽行身之表經云太陽為開是春生夏長陽氣在外有開之義故春夏衄者太陽陽明行身之裏經云陽明為闔是秋斂冬藏陽氣在内有藏之義故秋冬衄者陽明尤怡曰少陽之衇不入鼻額故不主衄衄家不可汗汗出必額上陷衇𦂳急直視不能眴不得眠註衄該吐血而言也衄血吐血之家隂已亾矣若發其汗汗出液竭諸衇失養則額角上陷中之衇為熱所灼𦂳且急也目直視目瞪不轉睛也不能眴目睫不合也亦為熱灼其衇引縮使然也不得眠陽氣不􅀎行於隂也凡此之病皆陽盛隂微之危證故衄家慎不可汗也集註趙良曰足太陽經主表上巔入額貫目睛衄則在上絡衇之血已脫若更發汗是重竭津液津液竭則衇枯故額上陷中衇𦂳而急牽引其目視不􅀎合也無血隂虚故不得眠病人面無血色無寒熱衇沉弦者衄衇浮弱手按之絶者下血煩欬者必吐血按衇沉當是衇浮衇浮當是衇沉文義始屬必傳寫之譌註赤色血色也面無血色謂面白之人純白而無赤面黄之人純黄而不紅也人有恐怖則面色脫白其状驚駭人有愧心乍白乍紅其状惶怯今無故而面無血色則可知非驚愧致氣亂血散也且無寒熱病又可知非虚損不生血少血也既非血散又非血少當詢之病人必有失血之故診之於衇必有吐衄下血之因衄吐屬陽故衇見浮弦按之必芤榮血空也下血屬隂衇見沉弱按之欲絶榮氣微也且衇色如斯而證兼煩欬是病在心肺故必吐血也夫吐血欬逆上氣其衇數而有熱不得卧者死註吐血欬逆肺大傷也上氣肺無降也衇數有熱火爍肺金也不得卧者陽不入隂故曰死也集註趙良曰衇數有熱陽獨勝也不能卧隂已絶也隂既絶陽豈獨生耶故死若得卧者隂未絶未可言死程林曰吐血欬逆上氣則肺藏傷矣衇數則虚熱不去火来刑金矣隂血消亡故不得卧死可必矣夫酒客欬者必致吐血此因極飲過度所致也註酒性大熱潰衇傷經極飲過度必致欬𠻳吐血也集註徐彬曰此言吐血不必由於氣不攝血亦不必由於隂火熾盛其有酒客而致欬則肺傷已極又為欬所撃動必致吐血故曰極飲過度所致則治之者當以清酒熱為主也亡血不可發其表汗出則寒慄而振註凡失血之後血氣未復為亾血也皆不可發汗失血之初固屬陽熱亡血之後熱随血去熱雖消而氣逐血虚陽亦㣲矣若發其汗則陽氣衰微力不能支故身寒噤慄而振振聳動也發隂虚之汗汗出則亡隂即發吐衄之汗也故見不得眴不得眠亡隂之病也發陽虚之汗汗出則亡陽即發亡血之汗也故見寒慄而振亡陽之病也集註李彣曰奪血者無汗以汗與血俱屬心液血亡液竭無復餘液作汗也今又發表則隂虚且更亡陽表間衞氣虚極故寒慄而振吐血不止者栢葉湯主之註吐血之病熱傷陽絡當清其熱勞傷陽絡當理其損今以栢葉湯温散之品而治吐血不止者則必是熱伏隂分用此宣發使熱行陽分血不為熱所廹則自止矣栢葉湯方栢葉乾薑各三兩艾三把右三味以水五升取馬通汁一升合煮取一升分温再服集觧程林曰神農經云栢葉主吐血乾薑主唾血艾葉主吐血馬通者白馬尿也凡尿必達洞腸乃出故曰通亦微温止吐血四味皆辛温行陽之品使血歸經遵行隧道而血自止故吐血不止以栢葉湯主之也心氣不足吐血衄血瀉心湯主之按心氣不足二字當是有餘二字若是不足如何用此方治之必是傳寫之譌註心氣有餘熱盛也熱盛而傷陽絡廹血妄行為吐為衄故以大黄黄連黄芩大苦大寒直瀉三焦之熱熱去而吐衄自止矣瀉心湯方大黄二兩黄連黄苓各一兩右三味以水三升煮取一升頓服之病人胸滿唇痿舌青口燥但欲潄水不欲嚥無寒熱衇微大来遲腹不滿其人言我滿為有瘀血註表實無汗胸滿而喘者風寒之胸滿也裏實便濇胸滿煩熱者熱壅之胸滿也面目浮腫胸滿喘不得卧者停飲之胸滿也呼吸不快胸滿太息而稍寛者氣滯之胸滿也今病人無寒熱他病惟胸滿唇痿舌青口燥潄水不欲嚥乃瘀血之胸滿也唇舌血華之處也血病不榮故痿瘁色變也熱在血分故口燥潄水不欲嚥也衇微大来遲隂凝之證則當腹滿今腹不滿詢之其人言我滿在胸不在腹也與上如是之證推之為有瘀血也病者如熱狀煩滿口乾燥而渇其衇反無熱此為隂伏是瘀血也當下之註此承上文互詳證衇以明其治也如熱狀即所謂心煩胸滿口乾燥渇之熱證也其人當得數大之陽衇今反見沉伏之隂衇是為熱伏於隂乃瘀血也血瘀者當下之宜桃核承氣抵當湯丸之類也集註李彣曰血瘀内無實熱故外證但如熱状而其衇不數疾反無熱也煩滿者血瘀經氣不舒燥渇者血瘀津液不布血屬隂瘀則衇伏于内故為隂伏當下之以去瘀生新也下血先便後血此逺血也黄土湯主之下血先血後便此近血也赤小豆當歸散主之註先便後血此逺血也謂血在胃也即古之所謂結隂今之所謂便血也先血後便此近血也謂血在腸也即古之所謂腸澼為痔下血今之所謂蔵毒腸風下血也一用黄土湯以治結隂之血従温也一用赤小豆當歸散以治蔵毒之血従清也集註趙良曰腸胃陽明經也以下血言胃居大腸之上若聚於胃必先便後血去肛門逺故曰逺血若聚大腸去肛門近故曰近血故治逺血黄土湯主之治近血赤小豆當歸散主之黄土湯方甘草乾地黄白术附子炮阿膠黄芩各三兩竈中黄土半觔右七味以水八升煮取三升分温二服赤小豆當歸散方見狐惑寸口衇弦而大弦則為減大則為芤減則為寒芤則為虚寒虚相撃此名曰革婦人則半産漏下男子則亡血註詳見傷寒辨衇篇内不復釋火邪者桂枝去芍藥加蜀漆牡蠣龍骨救逆湯主之按此方是治火逆驚狂者與首條之衇動驚病不合必是錯簡桂枝救逆湯方桂枝三兩甘草二兩炙生薑三兩牡蠣五兩熬龍骨四兩大棗十二枚蜀膝三兩洗去腥右為末以水一斗二升先煮蜀漆減一升内諸藥煮取三升溫服一升心下悸者半夏麻黄丸主之按此方是治寒水心下悸者與首條之衇弱悸病不合必是錯簡半夏麻黄丸方半夏麻黄等分右二味末之煉蜜和丸小豆大飲服三丸日三服御纂醫宗金鑑卷二十欽定四庫全書御纂醫宗金鑑卷二十訂正仲景全書金匱要畧註中之一奔豚氣病衇證并治第八師曰病有奔豚有吐膿有驚怖有火邪此四部病皆従驚發得之按篇中祗有奔豚一證而吐膿驚怖火邪皆簡脫必有缺文師曰奔豚病従少腹起上衝咽喉發作欲死復還止皆従驚恐得之註奔豚者腎病也以其病従少腹上衝咽喉有如豚竄奔突之狀故名之也發作則腎氣上乗於心而欲死作已則氣衰復還於腎而止故其病雖有微甚不同然必皆従驚恐得之盖驚傷心恐傷腎兩藏交病也水能勝火腎上凌心故治法宜瀉腎而補心也集註張従政曰驚者為自不知故也恐者為自知也周揚俊曰少隂脈循喉嚨因其所繫之經而上衝殊便也發汗後燒鍼令其汗鍼處被寒核起而赤者必發奔豚氣従少腹上至心灸其核上各一壯與桂枝加桂湯主之註此條與傷寒論同傷寒論中無發汗後三字而有太陽傷寒者加溫鍼必驚也十一字當従傷寒論為是葢明所以致驚之由非一端即寒侵鍼處亦能為是病也夫太陽傷寒者加溫鍼必驚也謂病傷寒之人卒然加以溫鍼其心必驚非謂温鍼之後必生驚病也燒鍼即温鍼也燒鍼取汗亦汗法也鍼䖏宜當避寒若不知謹外被寒襲火鬱衇中血不流行所以有結核腫赤之患也夫温鍼取汗其法亦為迅烈矣既鍼而榮不奉行作觧必其人素寒隂盛也故雖有温鍼之火但發核赤又被寒侵故不但不解反召隂邪而加鍼之時心既驚虛所以腎水隂邪得上凌心陽而發奔豚也奔豚者腎水隂邪之氣従少腹上衝於心若豚之奔也先灸核上各一壯者外祛其寒邪繼與桂枝加桂湯者内伐其腎邪也集註周揚俊曰奔豚北方腎邪也燒鍼令汗縦不合法與少隂何與而作奔豚盖太陽相表裏也鍼處被寒核起而赤吾知前此之邪未散而後此之邪復入惟桂􅀎伐腎邪也所以用桂加入桂枝湯中一以外觧風邪一以内泄隂氣也先灸核上者因寒而腫惟灸消之也桂枝加桂湯方桂枝五兩芍藥三兩甘草二兩炙生薑三兩大棗十二枚右五味以水七升微火煮取三升去滓温服一升奔豚氣上衝胸腹痛往来寒熱奔豚湯主之註奔豚氣上衝咽喉發作欲死是奔豚之甚者也氣上衝胸腹痛往来寒熱是奔豚之微者也甚者以桂枝加桂湯従腎逐隂降逆也微者以奔豚湯従心調血散逆也奔豚湯方甘草芎藭當歸各二兩半夏四兩黄芩二兩生葛五兩芍藥二兩生薑四兩甘李根白皮一升右九味以水二斗煮取五升温服一升日三夜一服集解沈明宗曰用芎歸白芍甘草調養厥隂少陽血氣之正而邪自外出以生葛黄芩半夏生薑佐李根解半表半裏之寒熱而逆可散盖奔豚雖属腎病然兼厥隂少陽之邪而發者有之仲景用此方明非僅寒邪一端致然也發汗後臍下悸者欲作奔豚茯苓桂枝甘草大棗湯主之註發汗後心下悸者心陽虚本經自病也臍下悸者腎邪乗虚上干心病也奔豚者臍下氣動而上衝也欲作奔豚者有似奔豚之狀而将作未作也茯苓桂枝甘草大棗湯所以補火土而伐水邪也上條發明外感寒邪􅀎病奔豚此條更申明内有水氣亦􅀎病奔豚也集註徐彬曰仲景論證毎合數條以盡其變言奔豚由於驚又言其従少腹衝至咽喉又言其兼腹痛而往来寒熱又言其兼核起而無他病又言汗後臍下悸欲作奔豚而未成者其淺深瞭然用和觧用伐腎用桂不用桂酌治微妙奔豚一證病因證治無復剰義苟不㑹仲景立方之意則峻藥畏用平劑寡效豈古方不宜於今哉周揚俊曰汗本心之液發汗而臍下病悸者心氣虚而腎氣動也茯苓桂枝甘草大棗湯方茯苓半觔桂枝四兩甘草二兩炙大棗十五枚右四味以甘瀾水一斗先煮茯苓減二升内諸藥煮取三升去滓温服一升日三服作甘瀾水法取水三升置大盆内以杓揚之數千遍水上有珠子五六千顆相逐取用之集觧程林曰汗後臍下悸者陽氣虚而腎邪上逆也臍下為腎氣發源之地茯苓泄水以伐腎邪桂枝行陽以散逆氣甘草大棗甘温助脾土以制腎水煎用甘瀾水者揚之無力全無水性取其不助腎邪也胸痺心痛短氣病衇證并治第九師曰夫衇當取太過不及陽微隂弦即胸痺而痛所以然者責其極虚也今陽虚知在上焦所以胸痺心痛者以其隂弦故也註衇太過則病不及亦病故衇當取太過不及而候病也陽微寸口衇微也陽得隂衇為陽不及上焦陽虚也隂弦尺中衇弦也隂得隂衇為隂太過下焦隂實也凡隂實之邪皆得以上乗陽虚之胸所以病胸痺心痛胸痺之病輕者即今之胸滿重者即今之胸痛也集註李彣曰内經云胃衇平者不可見太過不及則病見矣寸衇為陽以候上焦正應胸中部分若陽衇不及而微則為陽虚主病上焦故受病胸痺尺衇太過而弦則為隂盛知在下焦故上逆而為痛也尤怡曰上焦為陽之位而微衇為虛之甚故曰責其極虚平人無寒熱短氣不足以息者實也註平人無病之人也無寒熱無表邪也平人無故而有短氣不足以息之證不可責其虚也此必邪在胸中痺而不通阻碍呼吸當責其實也集註李彣曰上節云責其極虚此又云實何也經云邪之所凑其氣必虛留而不去其病為實是也然短氣與少氣有辨少氣者氣少不足於言内􅀴云言而微終日乃復言者此奪氣是也短氣者氣短不􅀎相續似喘非喘若有氣上冲故似喘而不摇肩似呻吟而無痛是也尤怡曰平人素無疾之人也無寒熱無新邪也而乃短氣不足以息當是裏氣因邪而實或痰或食或飲碍其升降之氣而然也胸痺之病喘息欬唾胸背痛短氣寸口衇沉而遲闗上小𦂳數栝蔞薤白白酒湯主之註寸口衇沉而遲沉則為裏氣滯遲則為藏内寒主上焦藏寒氣滯也闗上小𦂳而疾小為陽虚𦂳疾寒痛是主中焦氣急寒痛也胸背者心肺之宫城也陽氣一虚諸寒隂邪得以乗之則胸背之氣痺而不通輕者病滿重者病痛理之必然也喘息欬唾短氣證之必有也主之以栝蔞薤白白酒湯者用辛以開胸痺用溫以行陽氣也集註趙良曰凡寒濁之邪滯於上焦則阻其上下徃来之氣塞其前後隂陽之位遂令為喘息為咳唾為痛為短氣也程林曰胸中者心肺之分故作喘息咳唾也諸陽受氣於胸而轉行於背氣痺不行則胸背為痛而氣為短也栝蔞薤白白酒湯方栝蔞實一枚搗薤白半觔白酒七升右三味同煮取二升分温再服胸痺不得卧心痛徹背者栝蔞薤白半夏湯主之註上條胸痺胸背痛尚􅀎卧以痛微而氣不逆也此條心痛徹背不得卧是痛甚而氣上逆也故仍用前方大加半夏以降逆也集註尤怡曰胸痺不得卧是胸中痛甚肺氣上而不下也心痛徹背是氣閉塞而前後不通故也其痺為尤甚矣所以然者有痰飲以為之援也栝蔞薤白半夏湯方栝蔞實一枚搗薤白三兩半夏半升白酒一斗右四味同煮取四升溫服一升日三服集觧魏荔彤曰用半夏之苦以開鬱行氣痛甚則結甚故減薤白之濕用半夏之燥更􅀎使膠膩之物隨湯而蕩滌也日三服亦従上治者應徐取頻服也心痛徹背背痛徹心烏頭赤石脂圓主之註上條心痛徹背尚有休止之時故以栝蔞薤白白酒加半夏湯平劑治之此條心痛徹背背痛徹心是連連痛而不休則為隂寒邪甚浸浸乎陽光欲熄非薤白白酒之所􅀎治也故以烏頭赤石脂圓主之方中烏附椒薑一𣲖大辛大熱别無他顧峻逐隂邪而已集註李彣曰心痛在内而徹背則内而達於外矣背痛在外而徹心則外而入於内矣故既有附子之温而復用烏頭之迅佐乾薑行陽大散其寒佐蜀椒下氣大開其鬱恐過於大散大開故復佐赤石脂入心以固澀而收陽氣也赤石脂圓方蜀椒一兩一法二分烏頭一分炮附子半兩炮一法一分赤石脂一兩一法二分乾薑一兩一法一分右五味末之蜜丸如桐子大先食服一丸日三服不知稍加服胸痺緩急者薏苡附子散主之註緩急者謂胸痺痛而時緩時急也當審其緩急而施治若緩而不急者以栝蔞薤白白酒湯主之今時緩時急故以薏苡附子散急通痺氣以迅掃隂邪也薏苡附子散方薏苡仁十五兩大附子十枚炮右二味杵為散服方寸匕日三服集觧李彣曰緩急者或緩而痛暫止或急而痛復作也薏苡仁入肺利氣附子温中行陽為散服則其效更速矣魏荔彤曰薏苡下氣寛胸附子温中散邪為邪盛甚而陽㣲亦甚者立法也胸痺胸中氣塞短氣茯苓杏仁甘草湯主之橘枳薑湯亦主之註胸痺胸中急痛胸痺之重者也胸中氣塞胸痺之輕者也胸為氣海一有其隙若陽邪干之則化火火性氣開不病痺也若隂邪干之則化水水性氣闔故令胸中氣塞短氣不足以息而為胸痺也水盛氣者則息促主以茯苓杏仁甘草湯以利其水水利則氣順矣氣盛水者則痞塞主以橘皮枳實生薑湯以開其氣氣開則痺通矣集註沈明宗曰邪氣阻塞胸膈肺氣不得往来流利則胸中氣塞短氣方用杏仁使肺氣下通以茯苓導引濕下行甘草和中俾邪去則痺開而氣不短矣然胸痺乃胸中氣塞土濕寒濁隂氣以挟外邪上逆所致故橘枳生薑善於散邪下濁所以亦主之魏荔彤曰此証乃邪實而正不甚虛陽㣲而隂不甚盛盖痺則氣必塞氣塞則必短氣前言之矣今開降其氣而諸證自除矣茯苓杏仁甘草湯方茯苓三兩杏仁五十個甘草一兩右三味以水一斗煮取五升温服一升日三服不差更服橘皮枳實生薑湯方橘皮一觔枳實三兩生薑半觔右三味以水五升煎取二升分溫再服胸痺心中痞氣氣結在胸胸滿脇下逆搶心枳實薤白桂枝湯主之人參湯亦主之註心中即心下也胸痺病心下痞氣悶而不通者虚也若不在心下而氣結在胸胸滿連脇下氣逆撞心者實也實者用枳實薤白桂枝湯主之倍用枳朴者是以破氣降逆為主也虚者用人参湯主之即理中湯是以温中補氣為主也由此可知痛有補法塞因塞用之義也集註魏荔彤曰胸痺自是陽微隂盛矣心中痞氣氣結在胸正胸痺之病状也再連脇下之氣俱逆而搶心則痰飲水氣俱乗隂寒之邪動而上逆胸胃之陽氣全難支拒矣故用枳實薤白桂枝湯行陽開鬱温中降氣猶必先後煮治以融和其氣味俾緩緩蕩除其結聚之邪也再或虛寒已甚無敢恣為開破者故人参湯亦主之以温補其陽使正氣旺而邪氣自消也尤怡曰心中痞氣氣痺而成痞也脇下逆搶心氣逆不降将為中之害也用此二方者一以去邪之實即以安正一以養陽之虚即以逐隂是在審其病之新久與氣之虛實而决之枳實薤白桂枝湯方枳實四枚厚朴四兩薤白半觔桂枝一兩栝蔞實一枚搗右五味以水五升先煮枳實厚朴取三升去滓内諸藥煮數沸分温三服人參湯方人参甘草乾薑白术各三兩右四味以水八升煮取三升温服一升日三服心中痞諸逆心懸痛桂枝生薑枳實湯主之註心中痞即上條心中痞氣也諸逆諸氣上逆也上條之逆不過撞心而不痛此條之逆則心懸而空痛如空中懸物動摇而痛也用桂枝生薑枳實湯通陽氣破逆氣痛止痞開矣集註程林曰諸逆如脇下逆搶心之類邪氣獨留於上則心懸痛尤怡曰諸逆該痰飲客氣而言心懸痛謂如懸物動摇而痛逆氣使然也桂枝生薑枳實湯方桂枝三兩生薑三兩枳實五枚右三味以水六升煮取三升分温三服集觧趙良曰枳實生薑原以治氣塞况於痞乎故較前條稍減輕分兩使痞者下其氣以開之懸痛屬飲者得生薑以散之既足建功矣乃去橘皮而用桂枝者以所逆非一或通陽氣或破結氣或散寒氣皆􅀎去痺也腹滿寒疝宿食病衇證并治第十趺陽衇微弦法當腹滿不滿者必便難兩胠疼痛此虛寒従下上也當以温藥服之註趺陽胃衇也當緩而和今見弦衇是肝衇也肝衇見於脾部是木盛土虛也法當腹滿今不腹滿者肝衇微弦不盛而脾不虛故脾未受病也肝自鬱則失其條達之性必夲經自病故便難兩胠痛也然非肝火實病此乃虚寒従下上也當以温藥服之腹滿時減復如故此為寒當與温藥按此篇無治虛寒腹滿之方當與温藥之下當有宜厚朴生薑甘草半夏人参湯主之十四字必是脫簡閲傷寒論太隂篇自知註此承上條互詳其證以明其治也腹滿便難脾實病也今腹滿而不便難脾虛病也且腹滿有時而減有時復如不滿乃虛寒也當與温藥主之以厚朴生薑甘草半夏人参湯消滿散寒緩中降逆補虛乃治虚滿之法也集註魏荔彤曰腹滿或服下藥或服補藥有時減退未㡬旋腹滿如故則不可作實與熱治也仲景明此為寒裏寒従無下法惟有温藥與服虚者以温中補氣實者亦以温中行氣為義是治氣寒腹滿第一善法也厚朴生薑甘草半夏人参湯方厚朴半觔生薑半觔半夏半觔人参一兩甘草三兩炙右五味以水一斗煮取三升去滓温服一升日三服腹滿不减减不足言當須下之宜大承氣湯註腹滿時减時滿虚滿也腹滿常常而滿實滿也腹滿不减减不足言謂腹滿不减雖减不過稍减不足言减也虚滿當温實滿當下故宜大承氣湯下之此治實滿之法也集註尤怡曰减不足言謂雖减而不足云减所以形其滿之至也故宜大下所謂中滿者瀉之於内也大承氣湯方見前痙病中病者腹滿按之不痛為虚痛者為實可下之舌黄未下者下之黄自去註前條腹滿以時减時不减别虚實此條腹滿以痛不痛辨有餘不足也腹滿按之不痛為虚虚者脾虚也可温之則當與厚朴生薑甘草半夏人参湯也按而痛者為實實者胃實也可下之當與大承氣湯胃實者舌胎必黄若未下者下之黄胎自去也集註趙良曰腹滿亦有属實實則非虚寒也明矣豈概以温藥治之乎故有試之之法在痛與不痛之分虚實較然矣盖胃實必熱熱蒸必舌黄下其實熱舌黄不自已乎有此一辨并虚者愈審已魏荔彤曰無形之虚氣作痞塞則按之無物何痛之有倘挟有形之實物為患如宿食在胃疝氣在少腹等是也按之有物阻碍於藏腑之側焉有不痛者乎是於按之痛否以决其虚實之法也病者痿黄躁而不渇胸中寒實而利不止者死按躁而不渇當是燥而不渴文始通順胸中寒實當是胃中寒實若是胸中寒實如何曰下利不止者死皆是傳寫之譌註病者面色痿黄若口燥而渇者熱實也今痿黄口燥不渇寒實也寒實者當不下利若下利是寒虚也今下利不止乃寒虚胃氣下脱故死也集註程林曰痿黄者脾胃病也見燥而渇者為熱不渇者為寒病人既痿黄又兼下利不禁則脾氣衰絶故死李彣曰下利若燥而渇者為熱陽氣尚存猶為可治今燥而不渇胃中寒邪盛也若利不止則隂盛陽衰氣下脱矣故死夫瘦人繞臍痛必有風冷糓氣不行而反下之其氣必衝不衝者心下則痞註此承上條寒實證誤以寒藥下之之義也瘦人形氣虚弱難禦外邪若繞臍痛必有風冷傷胃致令糓氣不行也繞臍疼痛雖属實邪但因風冷則為寒實醫者當温而行之今反以寒藥下之其風冷之邪若上虚則氣上衝中虚則痞結心下理必然也集註尤怡曰瘦人蔵虛氣弱風冷易入入則糓氣留滯不行繞臍疼痛有似裏實而實為虚冷是宜温藥以助脾之行乃反下之糓出而風冷不與俱出正乃益虚邪乃無制勢必上衝若不衝者心下則痞寸口衇弦者即脇下拘急而痛其人嗇嗇惡寒也註此詳申首條兩胠疼痛属寒之義也寸口衇弦即首條之弦也脇下拘急而痛即首條之兩胠疼痛也何以知其為寒也然必其人有陽虚嗇嗇惡寒之證始為肝寒而痛也即有腹滿亦當溫之可也集註程林曰弦肝衇隂也肝衇循脇裏寒主收引故脇下拘急而痛以寒勝於内而陽氣不行於外故外亦嗇嗇而惡寒也夫中寒家喜欠其人清涕出發熱色和者善􅅉註中寒家謂素有中寒病之人也前以時減辨腹滿之中寒又以惡寒辨脇痛之中寒此以喜欠清涕出而辨心胸之中寒也欠者呵欠也夫人欲睡喜欠者隂引陽入也睡覺喜欠者陽引隂出也今中寒喜欠者是隂盛引陽也年老之人清涕出者是陽虚也遇寒之人清涕出者是寒盛也今中寒而清涕出者是陽氣虚寒也若發熱色和者非為中寒也乃為外寒所搏雖有清涕出亦因善􅅉而出也中寒其人下利以裏虛也欲􅅉不能此人肚中寒一云痛註上條以喜欠清涕自出辨心胸之中寒此條以下利欲􅅉不􅀎􅅉而辨腹中寒也其人下利裏氣素虚也欲􅅉不能􅅉何以知此人腹中寒也葢噴􅅉者雷氣之義也其人内陽外隂陽氣奮發而為􅅉也今欲􅅉不􅀎􅅉是陽欲出而復留隂氣盛也故知腹中寒也集註沈明宗曰此脾經受寒現證也寒中太隂隂寒濕盛陽虚不固其人下利但通多不足故為裏虚盖陽和則􅅉而欲􅅉不􅀎乃隂寒凝滯於裏所以肚中病也腹中寒氣雷鳴切痛胸脇逆滿嘔吐附子粳米湯主之註腹中切痛寒也腹中雷鳴氣也腹中寒氣故雷鳴切痛而胸脇逆滿者腸胃之外寒氣為之也腹痛雷鳴嘔吐者腸胃之中寒氣為之也主之以附子粳米湯勝寒氣和内外此治腹中寒之法也附子粳米湯方附子一枚炮半夏半升甘草一兩大棗十枚粳米半升右五味以水八升煮米熟湯成去滓温服一升日三服心胸中大寒痛嘔不䏻飲食腹中寒上衝皮起出見有頭足上下痛不可觸近大建中湯主之註心胸中大寒痛謂腹中上連心胸大痛也而名大寒痛者以有厥逆衇伏等大寒證之意也嘔逆不能飲食者是寒甚拒格於中也上衝皮起出見頭足者是寒甚聚結於外也上下痛不可觸近是内而蔵腑外而經絡痛之甚亦由寒之甚也主之以大建中湯蜀椒乾薑大散寒邪人参膠飴大建中虚服後温覆令有㣲汗則寒去而痛止此治心胸中寒之法也大建中湯方蜀椒二合去汗乾薑四兩人参二兩右三味以水四升煮取二升去滓内膠飴一升㣲火煎取一升半分温再服如一爨頃可飲粥二升後更服當一日食糜温覆之寒氣厥逆赤丸主之按此條之文之方必有簡脫難以為後世法不釋赤丸方茯苓四兩半夏四兩洗一方用桂烏頭二兩炮細辛一兩右四味末之真朱為色煉丸丸如麻子大先食酒飲下三丸日再夜一服不知稍増之以知為度痛而閉者厚朴三物湯主之註腹滿而痛下利者用理中湯所以温其中也腹滿而痛便閉者用厚朴三物湯所以開其下也厚朴三物湯方厚朴八兩大黄四兩枳實五枚右三味以水一斗二升先煮二味取五升内大黄煮取三升温服一升以利為度其衇數而𦂳乃弦状如弓弦按之不移衇弦數者當下其寒衇𦂳大而遲者必心下堅衇大而𦂳者陽中有隂可下之按其衇數而𦂳乃弦狀如弓弦按之不移衇弦數者之十九字當是衍文閱傷寒論辯衇法自知當下其寒之四字當在必心下堅之下文義始屬註衇𦂳大而遅者必心下堅鞕乃寒實也當下其寒衇大而𦂳者陽中有隂也大者陽實𦂳者隂實也故可下之脇下偏痛發熱其衇𦂳弦此寒也宜温藥下之以大黄附子湯按脇下偏痛之偏字當是滿字必是傳寫之譌註腹滿而痛脾實邪也脇下滿痛肝實邪也發熱若衇數大胃熱實邪也今衇𦂳弦脾寒實邪也當以温藥下之故以大黄附子湯下其寒實方中佐細辛者以散其肝邪此下肝脾寒實之法也集註尤怡曰脇下滿痛而衇𦂳弦隂寒成聚也雖有發熱亦是陽氣被鬱所致是以非温不􅀎已其寒非下不䏻去其結故曰宜以温藥下之大黄附子湯方大黄三兩附子三枚炮細辛二兩右三味以水五升煮取二升分温三服若强人煮取二升半分温三服服後如人行四五里進一服病腹滿發熱十日衇浮而數飲食如故厚朴七物湯主之註病腹滿裏證也發熱裏熱也然十日衇浮而數表熱亦未已也飲食如故胃熱􅀎消糓也因胃熱裏實表熱發熱故用厚朴七物湯表裏均觧腹滿發熱兩除也此桂枝湯小承氣湯之複方也集註程林曰腹滿者内有實熱也十日衇尚浮而數浮為在表表熱邪未已故發熱數為在裏裏熱􅀎消糓故飲食如故與此方蕩腹滿而除表熱夫表裏俱實當先觧表乃可攻裏今表邪微而裏邪甚故用承氣桂枝二湯相合以和表裏如傷寒之用大柴胡此其義也厚朴七物湯方厚朴半觔甘草三兩大黄二兩大棗十枚枳實五枚桂枝二兩生薑五兩右七味以水一斗煮取四升温服八合日三服嘔者加半夏五合下利去大黄寒多者加生薑至半觔按之心下滿痛者此為實也當下之宜大柴胡湯按按之心下滿痛之下當有有潮熱之三字若無此三字則不當與大柴胡湯是必傳寫之遺註按之心下滿痛有潮熱者此為表裏俱實當下之宜大柴胡湯兩觧之此二治皆下實滿之法也大柴胡湯方柴胡半觔黄芩三兩芍藥三兩半夏半觔洗枳實四枚炙大黄二兩大棗十二枚生薑五兩右八味以水一斗二升煮取六升去滓再煎温服一升日三服腹痛衇弦而𦂳弦則衛氣不行即惡寒𦂳則不欲食邪正相搏即為寒疝遶臍痛苦發則白汗出手足厥冷其衇沉𦂳者大烏頭煎主之按此條衇重出下條有證無衇其衇沉𦂳者之五字當在下條裏急之下然衇弦而𦂳是勁急之甚當属寒疝之重者其白汗之白字當是自字下條其衇沉𦂳是裏痛之衇當属寒疝之輕者必是傳寫之譌註疝病犯寒即發故謂之寒疝也其病發則繞臍少腹急痛惡寒汗出手足厥冷不欲飲食衇弦而𦂳主急主痛此寒疝應有之證衇也主之烏頭煎者是專以破邪治標為急虚實在所不論故曰强人服七合弱人服五合也烏頭煎方烏頭大者五枚熬去皮不㕮咀右以水三升煮取一升去滓内蜜二升煎令水氣盡取二升强人服七合弱人服五合不差明日更服不可一日再服寒疝腹中痛及脇痛裏急者當歸生薑羊肉湯主之按脇痛裏急之下當有上條其衇沈𦂳四字註寒疝腹中痛及脇痛裏急衇見沉𦂳較之繞臍苦痛輕矣且無惡寒汗出手足厥冷故不用烏頭煎之大温大散而用當歸生薑羊肉湯養正為本散寒為次此治寒疝之和劑也服烏頭煎病勢退者亦當與之集註李彣曰疝属肝病肝蔵血其經布脇肋腹脇并痛者血氣寒而凝澁也當歸通經活血生薑温中散寒裏急者内虚也用羊肉補之内經云形不足者温之以氣精不足者補之以味是也沈明宗曰按此連衝衇為疝治當温補也肝木受邪乗脾則腹中痛本經之氣不舒故脇亦痛連及衝衇則裏急矣所以當歸補養衝任而散風寒羊肉温補榮衛之氣脾邪散而痛自止方後云痛而多嘔乃肝氣上逆臨胃故加橘术補之當歸生薑羊肉湯方當歸三兩生薑五兩羊肉一觔右三味以水八升煮取三升温服七合日三服若寒多者加生薑成一觔痛多而嘔者加橘皮二兩白术一兩加生薑者亦加水五升煮取三升二合服之寒疝腹中痛逆冷手足不仁若身疼痛灸刺諸藥不􅀎治抵當烏頭桂枝湯主之按抵當二字衍文也註寒疝腹中痛逆冷手足不仁身體疼痛此疝之寒重者也灸刺諸藥不􅀎取效則急以烏頭煎加桂枝湯五合以觧内外之盛寒也集註徐彬曰起於寒疝腹痛而至逆冷手足不仁則陽氣大痺加以身疼痛榮衛俱不和更灸刺諸藥不􅀎治是或攻其外或攻其内邪氣牽制不服也故以烏頭攻寒為主而合桂枝全湯以和榮衞所謂七分治裏三分治表也烏頭桂枝湯方烏頭一枚右一味以蜜二觔煎减半去滓以桂枝湯五合觧之令得一升初服二合不知即服三合又不知復加至五合其知者如醉状得吐者為中病方觧以桂枝湯五合觧之者溶化也令得一升謂以烏頭所煎之蜜五合加桂枝湯五合溶化令得一升也不知不效也又不知又不效也其知者已效也如醉状外寒方散得吐者内寒已伸故為中病也問曰人病有宿食何以别之師曰寸口衇浮而大按之反濇尺中亦微而濇故知有宿食大承氣湯主之按尺中亦微而濇之微字當按傷寒論作大字是註宿食病即今之傷食病也謂食隔宿不化也人病腹滿而痛何以别之為宿食也寸口衇浮而大按之反濇謂按且大且濇且有力也闗上尺中亦然大濇有力為實而不利故知有宿食也當下之宜大承氣湯衇數而滑者實也此有宿食下之愈宜大承氣湯註腹滿而痛衇數而滑者實也此有宿食故當下之集註李彣曰滑者水榖之氣勝也若滑而兼數則實熱已入胃府矣故云有宿食可下之下利不欲食者有宿食也當下之宜大承氣湯註初下利不欲食者是傷食惡食不欲食也久下利不欲食者是傷脾不䏻食也今初下利即不欲食以有宿食故也當下之宜大承氣湯無疑矣集註沈明宗曰此傷食而致下利也驟傷宿食停滯胃中壅遏升降之機不轉腸中水糓不分而下奔則利宿食在胃故不欲食必當攻去宿食利得止而欲食故宜大承氣湯宿食在上脘當吐之宜𤓰蒂散註胃有三脘宿食在上脘者隔間痛而吐可吐不可下也在中脘者心中痛而吐或痛不吐可吐可下也在下脘者臍上痛而不吐不可吐可下也今食在上脘故當以𤓰蒂散吐之也𤓰蒂散方𤓰蒂一分熬黄赤小豆一分煮右二味杵為散以香豉七合煮取汁和散一錢匕温服之不吐者少加之以快吐為度而止亡血及虚者不可與之衇𦂳如轉索無常者有宿食也註轉索無常𦂳衇之狀也若浮𦂳傷寒沉𦂳冷痛冷犯胃脘榖氣不行故曰有宿食也衇𦂳頭痛風寒腹中有宿食不化也一云寸口衇𦂳註衇𦂳頭痛是外傷風寒病也衇𦂳腹痛是内傷宿食病也集註李彣曰按此衇與證似傷寒而非傷寒者以身不疼腰脊不强故也然衇𦂳亦有辨浮而𦂳者為傷寒沉而𦂳者為傷食甲乙經曰人迎𦂳甚傷於寒氣口𦂳甚傷於食則寒與食又以左右手為辨已是以知腹中有宿食不化也五藏風寒積聚病衇證并治第十一肺中風者口燥而喘身運而重冒而腫脹按身運而重當是頭運而身重冒而腫脹當是冒風而腫脹始與文義相合此必傳寫之譌可知註肺主氣外合皮毛肺中風邪風傷氣則津結不行故口燥風傷肺則氣逆上壅故喘咳頭運而身重者氣傷而力乏也冒風而腫脹者皮傷風水也集註李彣曰肺主氣風邪中之則氣壅而津液不行故口燥氣逆而呼吸不利故氣喘也肺中寒吐濁涕註肺中寒邪胸中之陽氣不治則津液聚而不行故吐濁涎如涕也集註李彣曰五液入肺為涕肺合皮毛開竅於鼻寒邪従皮毛而入於肺則肺竅不利而鼻塞涕唾濁涎壅遏不通吐出於口也肺死藏浮之虛按之弱如蔥葉下無根者死註肺中風寒之邪衇若見浮之極虚按之弱如蔥葉之空下無根者乃肺藏之死衇也以下五藏俱言浮者是明外中之邪應得之衇也集註程林曰真肺衇至如以毛羽中人膚非浮之虚乎蔥葉中空按之弱如蔥葉下又無根則浮毛虚弱是無胃氣也此真藏已見故死肝中風者頭目瞤兩脇痛行常傴令人嗜甘註肝主風外合於筋肝中風邪風勝則動故頭目瞤動也兩脇肝之部肝受病故兩脇痛也風傷筋故行常傴僂也肝苦急欲甘緩之故令人嗜甘也集註徐彬曰高巔之上惟風可到風性動摇故頭目瞤動肝衇上貫膈今脇肋有邪故痛肝主筋風勝則筋急故傴人以脾胃為主木邪甚而土負甘益脾嗜甘所以自救也肝中寒者兩臂不舉舌本燥喜太息胸中痛不得轉側食則吐而汗出也按兩臂不舉舌本燥二句而汗出三字文義不属必是錯簡不釋註肝性條達氣行於胸側肝中寒邪故有氣抑不伸喜太息氣滯不行痛不得轉側也食則吐亦寒邪上逆也肝死藏浮之弱按之如索不来或曲如蛇行者死註肝中風寒之邪若衇見浮之極弱按之不弦是失其肝之本衇也今按之如索不来曲如蛇行而去夫索曲蛇行去而不来非皆肝藏之死衇乎集註周揚㑓曰按之如索則弦𦂳俱見衇有来去乃隂陽往復之理今曰不来但去是無胃氣也否則真氣将散出入强勉有委而不前屈且難伸之狀故曲如蛇行也肝着其人常欲蹈其胸上先未苦時但欲飲熱旋覆花湯主之按旋覆花湯主之六字與肝着之病不合當是衍文註肝着者為肝氣着而不行致胸痞塞不快也故其人常欲按摩其胸以疏通其氣也其先未曾痞塞苦時但欲飲熱者乃寒氣為病也集註李彣曰肝主踈泄着則氣鬱不伸常欲人蹈其胸上以舒其氣又以寒氣固結於中欲飲熱以勝其寒也心中風者翕翕發熱不􅀎起心中饑食即嘔吐按翕翕發熱中風之本證也不􅀎起心中饑食即嘔吐文義不屬必是錯簡不釋心中寒者其人苦病心如噉蒜状劇者心痛徹背背痛徹心譬如蠱注其衇浮者自吐乃愈註其人苦病心如噉蒜状謂辛辣刺心之狀也劇者心痛徹背背痛徹心謂心背相應而痛也譬如蠱注謂似蟲之往来不已而痛也此皆心中寒邪之證若其衇浮是心得本衇為寒邪上越之候故自吐則邪去乃愈也集註徐彬曰寒則為隂邪外束之則火内鬱故如噉蒜状其似辣而非痛也劇則邪盛故外攻背痛内攻心痛徹者相應也譬如蠱注状其綿綿不息若衇浮是邪未結故自吐而愈心傷者其人勞倦即頭面赤而下重心中痛而自煩發熱當臍跳其衇弦此為心藏傷所致也按其衇弦之弦字當是沉字沉為腎衇文義相屬必是傳寫之譌註心傷者謂心傷病之人也因其人勞倦則擾其心心之陽盛於上故頭面赤也上盛則下虚故下重而無力也心中痛自煩發熱當臍跳其衇沉腎乗心傷之所致也集註尤怡曰心傷者其人勞倦即頭面赤而下重盖心虚者其陽易浮上盛者其下必虚也心中痛而自煩發熱者心虚失養而熱動於中也當臍跳者心虚於上而腎動於下也邪哭使魂魄不安者血氣少也血氣少者屬於心心氣虚者其人則畏合目欲眠夢逺行而精神離散魂魄妄行隂氣衰者為癲陽氣衰者為狂按隂氣衰者為癲之癲字當是狂字陽氣衰者為狂之狂字當是癲字内經曰重隂者癲重陽者狂必是傳寫之譌註邪哭謂心傷之人無故而哭也邪哭則使人魂魄不安心之血氣少也血氣少而心虚則令人畏合目欲眠則夢逺行此是精神離散魂魄妄行也心之血隂也隂過衰則陽盛陽盛則為病狂也心之氣陽也陽過衰則隂盛隂盛則病癲也心死藏浮之實如丸豆按之益躁疾者死註心中風寒之邪若衇見浮之極實如丸豆之狀按之益勁躁疾亂動者乃心藏之死衇也集註李彣曰難經云心衇浮大而散若浮之實如麻豆按之益躁疾則真藏衇見胃氣全無故死内經云真心衇至堅而搏如尋薏苡子累累然即如麻豆意可與此同叅脾中風者翕翕發熱形如醉人腹中煩重皮目瞤瞤而短氣按脾缺中寒之文必是簡脫註脾中風邪翕翕發熱中風之本證也形如醉人亦風熱攘亂於中應有之證也腹中不快而煩身體懈惰而重皮目瞤瞤動而氣短皆脾經證也集註李彣曰風屬陽邪而氣踈泄形如醉人言其面赤而四肢軟也風氣内擾故腹中煩重皮目上下眼胞也脾死藏浮之大堅按之如覆杯潔潔状如摇者死註脾中風寒之邪若衇見浮之大堅失其和緩按之状如覆杯高章明潔有力如摇乃脾藏之死衇也集註李彣曰衇弱以滑是有胃氣浮之大堅則胃氣絶真藏衇見矣覆杯則内空潔潔者空而無有之象也状如摇者衇躁疾不寧氣将散也故死趺陽衇浮而濇浮則胃氣強濇則小便數浮濇相搏大便則堅其脾為約麻子仁丸主之按此條當在腹滿篇中便難之下必是錯簡在此註趺陽胃衇也若衇濇而不浮脾隂虚也則胃氣亦不强不堪下矣今衇浮而濇胃陽實也則為胃氣强脾隂亦虚也脾隂虚不􅀎為胃上輸精氣水獨下行故小便數也胃氣强約束其脾不化津液故大便難也以麻仁丸主之養液潤燥清熱通幽不敢恣行承氣者盖因衇濇終是虚邪也集註徐彬曰脾約病用丸不作湯者取其緩以開結不能驟傷元氣也要知人至脾約皆因元氣不充津液不到所致耳李彣曰趺陽胃衇也胃為水糓之海浮為陽衇故胃氣强而􅀎食小便數則津液亡故衇濇盖脾主為胃行津液此以胃强脾弱約束津液不䏻四布但輸膀胱致小便數而大便堅也麻子仁丸通幽潤燥麻子仁丸方麻子仁二升芍藥半觔枳實一觔大黄一觔厚朴一尺杏仁一升右六味末之煉蜜為丸梧子大飲服十丸日三以知為度腎着之病其人身體重腰中冷如坐水中形如水状反不渇小便自利飲食如故病屬下焦身勞汗出衣裏冷濕久久得之腰以下冷痛腹重如帯五千錢甘薑苓术湯主之按腎缺中風中寒二條必是簡脱註腎着者謂腎為寒濕所傷着而不行之為病也腎受寒濕故體重腰冷如坐水中雖形如水腫之状反不渇而小便自利非水也乃濕也飲食如故以病屬下焦腎而不屬中焦脾故也詢其所以得之之由身勞汗出衣裏冷濕久久傷之也是以腰下冷痛寒勝也腹重濕勝也如帶五千錢形容重着之甚也以甘薑苓术湯補土以制水散寒以渗濕也集註尤怡曰其病不在腎之中藏而在腎之外府故其治不在温腎以散寒而在燠土以勝水也甘草乾薑茯苓白术湯方甘草二兩白术二兩乾薑四兩茯苓四兩右四味以水五升煮取三升分温三服腰中即温腎死藏浮之堅按之亂如轉丸益下入尺中者死註腎中風寒之邪若見浮之極堅按之亂動有如轉丸及下入尺中通然亂動皆腎死真藏之衇也集註程林曰腎藏死浮之堅與内經辟辟如彈石曰腎死同意皆堅之象也按之則亂如轉丸下入尺中者此隂陽離决之状也故死以上真藏與内經互有異同縂之衇無胃氣現於三部中衇象形容不一也問曰三焦竭部上焦竭善噫何謂也師曰上焦受中焦氣未和不能消榖故􅀎噫耳下焦竭即遺溺失便其氣不和不􅀎自禁制不須治久則愈註三焦竭部者謂三焦因虚竭而不各歸其部不相為用也上焦受氣於中焦下焦生氣於中焦互相為用則為和也若中焦虚竭不能消化水榖糓氣不受則上焦不相為用而失和也失和則榖氣鬱而不宣故善噫也下焦虚竭不䏻供升生之氣於中焦則失和也失和則腎氣獨沉自不􅀎禁故前遺溺而後失便也不湏治久則愈在善噫可也若遺溺失便未有不治䏻愈者恐是錯簡集註程林曰竭虚也本經云三焦不歸其部上焦不歸者噫而酢吞中焦不歸者不􅀎消榖引食下焦不歸者則遺溲上焦胃上口也中焦脾也脾善噫脾不和則食息廹逆於胃口而為噫也經云膀胱不約為遺溺因氣不和則溲便不約故遺失而不䏻自禁制也師曰熱在上焦者因欬為肺痿熱在中焦者則為堅熱在下焦者則尿血亦令淋秘不通大腸有寒者多鶩溏有熱者便腸垢小腸有寒者其人下重便血有熱者必痔註熱在上焦者萹中所謂肺痿吐涎沫也熱在中焦者篇中所謂腹滿堅痛也熱在下焦者篇中所謂小便淋瀝也其外大腸有寒者多清澈鶩溏即下利溏瀉也有熱者便稠粘腸垢即下利膿血也小腸有寒者下重便血即結隂便血也有熱者熱流于大腸蓄于肛門必病痔也集註徐彬曰小腸為受盛之官與心為表裏丙小腸也挟火以濟隂而隂不滯挟氣以化血而血歸經有寒則氣不上通而下重血無主氣而妄行矣直腸者大腸之頭也門為肛小腸有熱則大腸傳導其熱而氣結於肛門故痔痔者滯其丙小腸之熱於此也問曰病有積有聚有䅽氣何謂也師曰積者藏病也終不移聚者腑病也發作有時展轉痛移為可治䅽氣者脇下痛按之則愈復發為䅽氣諸積大法衇来細而附骨者乃積也寸口積在胸中微出寸口積在喉中闗上積在臍傍上闗上積在心下微下闗積在少腹尺中積在氣衝衇出左積在左衇出右積在右衇兩出積在中央各以其部處之䅽作漀觧見首篇註病有積有聚有漀氣當别之也積者藏病無時不有不移其處也聚者腑病發作有時展轉痛移也為可治謂腑病易治也漀氣者飲積脇下痛也按之則止不按復痛以水氣得按暫散故痛暫止也此即其證而言之然諸積大法尤當以診候之也衇来沉伏附骨而細者乃諸積之證也若見兩寸積在胸中也微出近魚際積在喉中也兩闗積在臍傍也上闗近寸積在心下也微下近尺積在少腹也尺中積在氣衝也衇出左積在左衇出右積在右衇兩出謂左右俱見積在中央也各以其部之處而診積之所在也集註徐彬曰積者跡也病氣之屬隂者也藏屬隂兩隂相得故不移不移者有専痛之處而無遷改也聚則如市井之物偶聚而已病氣之屬陽者也府屬陽兩陽相比則非如隂之凝故寒氣感則發否則已所謂有時也既無定着則痛無常處故展轉痛移其根不深故比積為可治也李彣曰積為藏病深入在裏故衇細而附骨也寸闗尺上下左右别積病之所在皆指細而附骨之部分即内經前以候前後以候後上竟上者胸喉中事也下竟下者少腹腰股膝脛足中事也驚悸吐衄下血胸滿瘀血病衇證并治第十二寸口衇動而弱動即為驚弱則為悸註寸口通指三部也衇動而弱主驚悸病也動即為驚以驚為外觸而動也弱即為悸以悸為内生而怯也集註徐彬曰驚為外邪襲心故其寸口衇動動者衇来亂動也悸乃神不自主故其寸口衇弱弱者衇沉無力也邪之所襲因心之虚故驚悸並見李彣曰此寸口衇兼三部而言盖驚自外至者也驚則氣亂故衇動而不寧悸自内惕者也悸因中虛故衇弱而無力師曰夫衇浮目睛暈黄衄未止暈黄去目睛慧了知衄今止註浮衇主陽主表若目睛清潔主陽表病也目睛暈黄主血衇病也葢以諸衇絡於目而血熱則赤血瘀則黄今目睛黄暈知其衄未止也若黄暈去目睛慧了知其衄已止故曰衄今止也又曰従春至夏衂者太陽従秋至冬衂者陽明註衄血陽絡傷也下血隂絡傷也太陽主外春夏主外故従春至夏衄血屬太陽也陽明主内秋冬主内故従秋至冬衄血屬陽明也集註李彣曰衄血出於鼻手太陽經上䪼抵鼻目下為䪼足太陽經従巔入絡腦鼻與腦通手陽明經挟鼻孔足陽明經起鼻交額中四經皆循鼻分故皆􅀎致衄太陽行身之表經云太陽為開是春生夏長陽氣在外有開之義故春夏衄者太陽陽明行身之裏經云陽明為闔是秋斂冬藏陽氣在内有藏之義故秋冬衄者陽明尤怡曰少陽之衇不入鼻額故不主衄衄家不可汗汗出必額上陷衇𦂳急直視不能眴不得眠註衄該吐血而言也衄血吐血之家隂已亾矣若發其汗汗出液竭諸衇失養則額角上陷中之衇為熱所灼𦂳且急也目直視目瞪不轉睛也不能眴目睫不合也亦為熱灼其衇引縮使然也不得眠陽氣不􅀎行於隂也凡此之病皆陽盛隂微之危證故衄家慎不可汗也集註趙良曰足太陽經主表上巔入額貫目睛衄則在上絡衇之血已脫若更發汗是重竭津液津液竭則衇枯故額上陷中衇𦂳而急牽引其目視不􅀎合也無血隂虚故不得眠病人面無血色無寒熱衇沉弦者衄衇浮弱手按之絶者下血煩欬者必吐血按衇沉當是衇浮衇浮當是衇沉文義始屬必傳寫之譌註赤色血色也面無血色謂面白之人純白而無赤面黄之人純黄而不紅也人有恐怖則面色脫白其状驚駭人有愧心乍白乍紅其状惶怯今無故而面無血色則可知非驚愧致氣亂血散也且無寒熱病又可知非虚損不生血少血也既非血散又非血少當詢之病人必有失血之故診之於衇必有吐衄下血之因衄吐屬陽故衇見浮弦按之必芤榮血空也下血屬隂衇見沉弱按之欲絶榮氣微也且衇色如斯而證兼煩欬是病在心肺故必吐血也夫吐血欬逆上氣其衇數而有熱不得卧者死註吐血欬逆肺大傷也上氣肺無降也衇數有熱火爍肺金也不得卧者陽不入隂故曰死也集註趙良曰衇數有熱陽獨勝也不能卧隂已絶也隂既絶陽豈獨生耶故死若得卧者隂未絶未可言死程林曰吐血欬逆上氣則肺藏傷矣衇數則虚熱不去火来刑金矣隂血消亡故不得卧死可必矣夫酒客欬者必致吐血此因極飲過度所致也註酒性大熱潰衇傷經極飲過度必致欬𠻳吐血也集註徐彬曰此言吐血不必由於氣不攝血亦不必由於隂火熾盛其有酒客而致欬則肺傷已極又為欬所撃動必致吐血故曰極飲過度所致則治之者當以清酒熱為主也亡血不可發其表汗出則寒慄而振註凡失血之後血氣未復為亾血也皆不可發汗失血之初固屬陽熱亡血之後熱随血去熱雖消而氣逐血虚陽亦㣲矣若發其汗則陽氣衰微力不能支故身寒噤慄而振振聳動也發隂虚之汗汗出則亡隂即發吐衄之汗也故見不得眴不得眠亡隂之病也發陽虚之汗汗出則亡陽即發亡血之汗也故見寒慄而振亡陽之病也集註李彣曰奪血者無汗以汗與血俱屬心液血亡液竭無復餘液作汗也今又發表則隂虚且更亡陽表間衞氣虚極故寒慄而振吐血不止者栢葉湯主之註吐血之病熱傷陽絡當清其熱勞傷陽絡當理其損今以栢葉湯温散之品而治吐血不止者則必是熱伏隂分用此宣發使熱行陽分血不為熱所廹則自止矣栢葉湯方栢葉乾薑各三兩艾三把右三味以水五升取馬通汁一升合煮取一升分温再服集觧程林曰神農經云栢葉主吐血乾薑主唾血艾葉主吐血馬通者白馬尿也凡尿必達洞腸乃出故曰通亦微温止吐血四味皆辛温行陽之品使血歸經遵行隧道而血自止故吐血不止以栢葉湯主之也心氣不足吐血衄血瀉心湯主之按心氣不足二字當是有餘二字若是不足如何用此方治之必是傳寫之譌註心氣有餘熱盛也熱盛而傷陽絡廹血妄行為吐為衄故以大黄黄連黄芩大苦大寒直瀉三焦之熱熱去而吐衄自止矣瀉心湯方大黄二兩黄連黄苓各一兩右三味以水三升煮取一升頓服之病人胸滿唇痿舌青口燥但欲潄水不欲嚥無寒熱衇微大来遲腹不滿其人言我滿為有瘀血註表實無汗胸滿而喘者風寒之胸滿也裏實便濇胸滿煩熱者熱壅之胸滿也面目浮腫胸滿喘不得卧者停飲之胸滿也呼吸不快胸滿太息而稍寛者氣滯之胸滿也今病人無寒熱他病惟胸滿唇痿舌青口燥潄水不欲嚥乃瘀血之胸滿也唇舌血華之處也血病不榮故痿瘁色變也熱在血分故口燥潄水不欲嚥也衇微大来遲隂凝之證則當腹滿今腹不滿詢之其人言我滿在胸不在腹也與上如是之證推之為有瘀血也病者如熱狀煩滿口乾燥而渇其衇反無熱此為隂伏是瘀血也當下之註此承上文互詳證衇以明其治也如熱狀即所謂心煩胸滿口乾燥渇之熱證也其人當得數大之陽衇今反見沉伏之隂衇是為熱伏於隂乃瘀血也血瘀者當下之宜桃核承氣抵當湯丸之類也集註李彣曰血瘀内無實熱故外證但如熱状而其衇不數疾反無熱也煩滿者血瘀經氣不舒燥渇者血瘀津液不布血屬隂瘀則衇伏于内故為隂伏當下之以去瘀生新也下血先便後血此逺血也黄土湯主之下血先血後便此近血也赤小豆當歸散主之註先便後血此逺血也謂血在胃也即古之所謂結隂今之所謂便血也先血後便此近血也謂血在腸也即古之所謂腸澼為痔下血今之所謂蔵毒腸風下血也一用黄土湯以治結隂之血従温也一用赤小豆當歸散以治蔵毒之血従清也集註趙良曰腸胃陽明經也以下血言胃居大腸之上若聚於胃必先便後血去肛門逺故曰逺血若聚大腸去肛門近故曰近血故治逺血黄土湯主之治近血赤小豆當歸散主之黄土湯方甘草乾地黄白术附子炮阿膠黄芩各三兩竈中黄土半觔右七味以水八升煮取三升分温二服赤小豆當歸散方見狐惑寸口衇弦而大弦則為減大則為芤減則為寒芤則為虚寒虚相撃此名曰革婦人則半産漏下男子則亡血註詳見傷寒辨衇篇内不復釋火邪者桂枝去芍藥加蜀漆牡蠣龍骨救逆湯主之按此方是治火逆驚狂者與首條之衇動驚病不合必是錯簡桂枝救逆湯方桂枝三兩甘草二兩炙生薑三兩牡蠣五兩熬龍骨四兩大棗十二枚蜀膝三兩洗去腥右為末以水一斗二升先煮蜀漆減一升内諸藥煮取三升溫服一升心下悸者半夏麻黄丸主之按此方是治寒水心下悸者與首條之衇弱悸病不合必是錯簡半夏麻黄丸方半夏麻黄等分右二味末之煉蜜和丸小豆大飲服三丸日三服御纂醫宗金鑑卷二十
