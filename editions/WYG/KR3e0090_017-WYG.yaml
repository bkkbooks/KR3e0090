  - {type: page-break, offset: 0, content: '', id: KR3e0090_WYG_017-1a, image: WYG0780/WYG0780-0522a.png}
body:
  text: 訂正傷寒論註目錄正誤存疑陶隱居名醫别錄合藥分劑法則三隂三陽經衇圖註傷寒刺灸等穴圖御纂醫宗金鑑卷十七目録欽定四庫全書御纂醫宗金鑑卷十七訂正傷寒論註目錄正誤存疑陶隱居名醫别錄合藥分劑法則三隂三陽經衇圖註傷寒刺灸等穴圖御纂醫宗金鑑卷十七目録欽定四庫全書御纂醫宗金鑑卷十七訂正仲景全書傷寒論註正誤存疑篇仲景傷寒論篇篇可法但成於漢末傳寫多訛錯簡亦復不少如論中下利嘔逆用十棗湯峻劑攻之陽重衂血以麻黄湯發之發汗病解反惡寒病解之中多一不字心下痞按之濡濡字之上少一不字之類諸家遵經註解不得不穿鑿附㑹致令千古不可多得之書不能傳信於世良可惜也今加正誤一一列明每條凡小字傍右者原文也傍左者改正之文也居中者原文所有或移上或移下或他處移入及原文所無而補之者也字上加刪去者也尤有整節舛謬者三十五條證不與衇符藥不與病合雖有是方世無其病即有其病難用是藥承訛襲謬無濟實用然其中尚有可採之句所以各篇不動經文强加註釋復録原文附於卷末以誌闕疑云太陽上篇正誤桂枝湯方桂枝三兩去皮芍藥三兩甘草二兩炙生薑三兩切大棗十二枚擘按桂枝湯方原文有去皮二字夫桂枝氣味辛甘全在於皮若去皮是枯木矣如何有解肌發汗之功耶當刪之後倣此若衇和其人大煩目重臉瞼内際黄者此欲解也按臉字當是瞼字瞼眼弦也作臉字非當改之太陽中風下不利嘔逆表解者乃可攻之其人漐漐汗出發作熱有時頭痛心下痞鞭滿引脇下痛乾嘔短氣汗出不惡寒者此表解裏未和也十棗湯主之按下利之下字當是不字若是下字豈有上嘔下利而用十棗湯峻劑攻之之理乎惟其大便不利痞鞕滿痛始屬裏病小便不利嘔逆短氣始屬飲病乃可峻攻發作之作字當是熱字始與太陽陽邪熱飲之義相合若無熱汗出乃少隂隂邪寒飲真武湯證也且作字與上下句文義皆不相屬當改之太陽病下之其衇促浮不結胸者此爲欲解也衇浮促者必結胸也衇𦂳數細者必咽痛衇弦者必兩脇拘急衇細數𦂳者頭痛未止衇沉𦂳者必欲嘔衇沉滑者恊熱利衇浮數滑者必下血按衇促當是衇浮始與不結胸爲欲解之文義相屬衇浮當是衇促始與論中結胸胸滿同義衇𦂳當是衇細數衇細數當是衇𦂳始同論中二經本衇衇浮滑當是衇數滑浮滑是論中白虎湯證之衇數滑是論中下膿血之衇均當改之太陽病二三日不能臥但欲起心下必結衇微弱者此本有寒分也反下之若利止必作結胸未止者四日復下之利此作協熱利也按四曰復下之之之字當是利字上文利未止豈有復下之理乎當改之太陽病下之後衇促胸滿者桂枝去芍藥湯主之若汗出微惡寒去芍藥方中加附子湯主之按微惡寒之上當有汗出二字若無汗出二字乃表未解也無加附子之理當補之太陽病衇浮而動數浮則爲風數則爲熱動則爲痛數則爲虛頭痛發熱微盜汗出而反惡寒者表未解也醫反下之動數變遲膈内拒痛胃中空虛客氣動膈短氣煩躁心中懊憹陽氣内陷心下因鞕則爲結胸大陷胸湯主之若不結胸但頭汗出餘無汗躋頸而還小便不利身必發黄也按數則爲虛句衍文也當刪之寒實結胸無熱證者與三物小陷胸湯白散亦可服按與三物小陷胸湯當是三物白散小陷胸湯四字當是錯簡桔梗貝母巴豆三物其色皆白有三物白散之義温而能攻與寒實之理相合小陷胸湯乃栝蔞黄連皆性寒之品豈可以治寒實結胸之證耶亦可服三字亦衍文也俱當刪之太陽中篇正誤發汗病不解反惡寒者虛故也芍藥甘草附子湯主之按發汗病不解之不字衍文也發汗病不解則當惡寒何謂反惡寒病解惡寒始可謂虛當刪之病發熱頭痛衇反沉若不差身體疼痛下利清榖當温其裏宜四逆湯按身體疼痛之下當有下利清榖四字若無此四字則當温其裏之文竟無着落矣未有表病而温裏之理也閱後太隂篇中云傷寒醫下之續得下利清榖不止身痛者急當救裏四逆湯其義益明遵經補之傷寒若汗若吐若下後七八日不解熱結在裏表裏俱熱時時汗惡風大渴舌上乾燥而煩欲飲水數升者白虎加人參湯主之按傷寒之下當有若汗二字蓋汗較吐下傷津液爲多也時時惡風當是時汗惡風若非汗字則時時惡風是表不解白虎湯在所禁也論中謂發熱無汗表不解者不可與白虎湯渴欲飲水無表證者白虎加人參湯主之細玩經文自知當補之改之發汗已衇浮數小便不利煩渴者五苓散主之按衇浮數之下當有小便不利四字若無此四字則為陽明内熱口燥之煩渴是白虎湯證也惟其小便不利而煩渴斯為太陽水熱瘀結之煩渴始屬五苓散證若非小便不利而用五苓散則犯重竭津液之禁矣况太陽上篇類此證者數條惟水入即吐一條乃水不下行故無小便不利之文餘皆有小便不利四字今此四字必是傳寫之遺當補之服桂枝湯或下之仍頭項强痛翕翕發熱無汗心下滿微痛小便不利者桂枝湯去桂藥芍加茯苓白术湯主之按去桂當是去芍藥此方去桂將何以治仍頭項痛發熱無汗之表乎細玩其服此湯曰餘依桂枝湯法煎服其義自見服桂枝湯已温覆令一時許通身漐漐微似有汗此服桂枝湯法也若去桂則是白芍甘草茯苓白术並無辛甘走榮衞之品而曰餘依桂枝湯法無所謂也且論中衇促胸滿汗出惡寒者用桂枝去芍藥加附子湯主之去芍藥者為胸滿也今證雖稍異而滿則同其為去芍藥可知當改之傷寒醫以丸藥大下之身熱不去㣲煩者梔子乾薑豉湯主之傷寒五六日大下之後身熱不去心中結痛者未欲解也梔子豉薑乾湯主之按梔子乾薑湯當是梔子豉湯梔子豉湯當是梔子乾薑湯斷無煩熱用乾薑結痛用香豉之理當移之太陽病衇浮𦂳無汗發熱身疼痛八九日不解表證仍在此當發其汗麻黄湯主之服藥已微除其人發煩目瞑劇者必衂衂乃解所以然者陽氣重故也按張兼善曰麻黄湯主之五字不應在陽氣重之下豈有衂乃解之後而用麻黄湯之理乎服藥已之上並無所服何藥之文將此五字移於其上文義始合當移之傷寒不大便六七日頭痛有熱者與承氣湯其小便清者知不在裏仍在表也當湏發汗若苦頭痛者必衂宜桂枝湯按若頭痛之若字當是苦字苦頭痛方為必衂證若是若字則凡頭痛皆能致衂矣當改之心下痞按之不濡其衇闗上浮者大黄黄連瀉心湯主之按按之濡當是按之不濡若按之濡乃虛痞也補之不暇豈有用大黄瀉之之理乎當補之太陽下篇正誤小青龍湯方加減法内若微利者去麻黄加蕘花如雞子大熬令赤色茯苓四兩按加蕘花如雞子大此必傳寫之誤考本草蕘花是芫花類也每用之攻水其力甚峻五分可令人下行數十次豈有治停飲之微利用雞子大之蕘花者乎當改加茯苓四兩傷寒心下有水氣欬而微喘發熱不渴小青龍湯主之服湯已渴者此寒去欲解也按小青龍湯主之六字當在發熱不渴之下始與服湯已渴者之文義相屬豈有寒去欲解而更服小青龍湯之理乎當移之陽明篇正誤陽明病衇浮而𦂳必潮熱發作有時但浮者必盜自汗出按自汗是陽明證盜汗乃少陽證盜汗應是自汗當改之陽明病衇遲汗出多發熱微惡寒者表未解也可發汗宜桂枝湯按汗出多之下當有發熱二字若無此二字衇遲汗出多微惡寒乃表陽虚桂枝附子湯證也豈有用桂枝湯發汗之理乎當補之傷寒衇浮滑此以表有熱裏有寒熱白虎湯主之按裏有寒之寒字當是熱字若是寒字非白虎湯證也當改之傷寒若吐若下後不解不大便五六日上至十餘日日晡所發潮熱不惡寒獨語如見鬼狀若劇者發則不識人循衣摸床惕而不安微喘直視衇弦滑者生濇者死微者但發熱譫語者大承氣湯主之若一服利止後服按衇弦者生之弦字當是滑字弦為隂負之衇豈有必生之理惟滑衇為陽始有生理况滑者通也濇者塞也凡物之理未有不以通為生而塞為死者當改之太陽病寸緩闗浮尺弱其人發熱汗出復惡寒不嘔但心下痞者此以醫下之也如其不下者病人不惡寒而渴者此轉屬陽明也小便數者大便必鞕不更衣十日無所苦也渴欲飲水少少與之但以法救之若小便不利渴者宜五苓散按但以法救之五字當是若小便不利五字方與上文小便數及下文渴者之義相屬此條病勢不急救之之文殊覺無謂昔王三陽亦云此處五苓散難用不然經文渴者之下當有缺文當改之梔子蘗皮湯方按此方之甘草當是茵蔯蒿必傳寫之誤也太陽病當惡寒發熱今自汗出不惡寒發熱闗上衇細數者以醫吐之過也一二日吐之者腹中饑口不能食三四日吐之者不喜糜粥欲食冷食五六日吐之者朝食暮吐以醫吐之所致此為小逆按欲食冷食之下當有五六日吐之者六字若無此一句則不喜糜粥欲食冷食與朝食暮吐之文不相聮屬且以上文一二日三四日之文細玩之則可知必有五六日吐之一句由淺及深之義也當補之寸口衇浮大而醫下之此為大逆浮則無血大則為寒寒氣相摶則為腸鳴醫乃不知而反飲冷水令汗大出水得寒氣冷必相搏其人必䭇按令汗大出四字當是衍文宜刪之陽明病讝語有潮熱反不能食者胃中必有燥屎五六枚也宜大承氣湯下之若能食者但鞕耳按宜大承氣湯下之句應在必有燥屎五六枚之下始合若但便鞕即用大承氣湯下之殊失仲景慎重悞下之㫖當移之陽明中風衇弦浮大而短氣腹都滿脇下及心痛久按之氣不通鼻乾不得汗嗜臥一身及面目悉黄小便難有潮熱時時噦耳前後腫刺之小差外不解病過十日衇續浮弦者與小柴胡湯但浮無餘證者與麻黄湯若不尿腹滿加噦者不治按續浮之浮字當是弦字始與小柴胡湯法之衇相合若是浮字則上之浮既宜小柴胡湯而下之浮又用麻黄湯不自相矛盾耶當改之發汗後水藥不得入口為逆若更發汗必吐下不止按必吐下不止之下字衍文也當刪之少陽篇正誤得病六七日衇遲浮弱惡風寒手足温醫二三下之不能食而脇下滿痛面目及身黄頸項强小便難者與柴胡湯後必下重本渴而飲水嘔者柴胡湯不中與也食榖者噦按食榖者噦四字衍文也食榖嘔者有之從無食榖噦者之證當刪之傷寒五六日頭汗出微惡寒手足冷心下滿口不欲食大便鞕衇沉細者此為陽微結必有表復有裏也衇沉亦在裏也汗出為陽微假令純隂結不得復有外證悉入在裏此為半在裏半在外也衇雖沉𦂳細不得為少隂病所以然者隂不得有汗今頭汗出故知非少隂也可與小柴胡湯設不了了者得屎而解按衇細當是衇沉細觀本條下文衇沉亦在裏也之亦字自知當補之衇雖沉𦂳之𦂳字當是細字觀本條上文並無𦂳字如何說衇雖沉𦂳此雖字又何所謂耶當改之傷寒發熱汗出不解心下痞鞕嘔吐而下不利者大柴胡湯主之按下利之下字當是不字若是下字豈有上吐下利而猶以大柴胡湯下之者乎當改之太陽病過經十餘日反二三下之後四五日柴胡證仍在者先與小柴胡湯嘔不止心下急鬱鬱微煩者為未解也與大柴胡湯下之則愈按許叔微曰大柴胡湯一方無大黄一方有大黄蓋大黄蕩滌藴熱傷寒中要藥王叔和云若不用大黄恐不名大柴胡湯且仲景曰下之則愈若無大黄將何以下心下之急乎當從叔和為是宜補之太陽病過經十餘日心中温温嗢嗢欲吐而胸中痛大便反溏腹微滿鬱鬱微煩先此時自極吐下者與調胃承氣湯若不爾者不可與但欲嘔胸中痛微溏者此非柴胡證以嘔故知極吐下也按王肯堂曰温温當是嗢嗢又云以嘔下疑有闕文當改之太隂篇正誤太隂之為病腹滿而吐食不下時腹自痛若下之必胸下結鞕自利益甚按呉人駒曰自利益甚四字當在必胸下結鞕之下若在吐食不下之下則是已吐食不下而自利益甚矣仲景復曰若下之無所謂也從而移之傷寒本自寒下格醫復吐下之寒格更逆吐下若食入口即吐乾薑黄連黄芩人參湯主之按經論中並無寒下之病亦無寒下之文玩本條下文寒格更逆吐下可知寒下之下字當是格字文義始屬註家皆釋胃寒下利不但文義不屬且與芩連之藥不合當改之少隂篇正誤少隂病飲食入口即吐心中温温嗢嗢欲吐復不能吐始得之手足寒衇弦遲者此胸中實不可下也當吐之若膈上有寒飲乾嘔者不可吐也當温之宜四逆湯按温温當是嗢嗢嗢嗢者乃吐飲之狀也當改之厥隂篇正誤傷寒厥而心下悸者以飲水多宜先治水當服茯苓甘草湯却治其厥不爾水漬入胃必作利也按厥而心下悸者之下當有以飲水多四字若無此四字乃隂盛之厥悸非停水之厥悸矣何以即知是水而曰宜先治水耶當補之傷寒衇微而厥至七八日膚冷其人躁無暫安時者此為藏厥非蚘厥也蚘厥者其人當吐蚘今病者静而復時煩者此非為藏寒蚘上入其膈故煩湏臾復止得食而嘔又煩者蚘聞食臭出其人當自吐蚘蚘厥者烏梅丸主之又主久利按此為藏寒之此字當是非字若是此字即是藏厥與辨蚘厥之義不屬當改之傷寒五六日不結胸大便腹濡衇虛復厥者不可下此為亡血下之死按結胸二字當是大便二字不結胸腹濡衇虛復厥皆無可下之理今曰不可下何所謂也當改之傷寒始發熱六日厥反九日而利凡厥利者當不能食今反能食者恐為除中食以索餅不若發熱者知胃氣尚在必愈恐暴熱來出而復去也後三日衇之其熱續在者期之旦日夜半愈所以然者本發熱六日厥反九日復發熱三日並前六日亦為九日與厥相應故期之旦日夜半愈後三日衇之而衇數其熱不罷者此為熱氣有餘必發癰膿也按不發熱者之不字當是若字若是不字即是除中何以下接恐暴熱來出而復去之文耶當改之傷寒衇遲六七日厥而下利而反與黄芩湯徹其熱衇遲為寒今與黄芩湯復除其熱腹中應冷當不能食今反能食此名除中必死按傷寒衇遲六七日之下當有厥而下利四字若無此四字則非除中證也况有此四字始與下文反與黄芩湯之義相屬當補之合病併病篇正誤三陽合病衇浮大上弦闗上但欲眠睡目合則汗按浮大上之上字當是弦字始合論中三陽合病之衇若是上字則經論中從無兩寸衇主三陽病之理當改之二陽併病太陽初得病時發其汗汗先出不徹因轉屬陽明續自微汗出不惡寒若太陽證不罷者不可下下之為逆如此可小發汗設面色縁縁正赤者陽氣怫鬱在表當解之熏之以汗若發汗不徹不足言陽氣怫鬱不得越當汗不汗其人躁煩不知痛處乍在腹中乍在四肢按之不可得其人短氣但坐以汗出不徹故也更發汗則愈何以知汗出不徹以衇濇故知也按熏之二字當是以汗二字始與上下文義相屬當改之壊病篇正誤本太陽病不解轉入少陽者脇下鞕滿乾嘔不能食徃來寒熱尚未吐下衇沉𦂳弦者與小柴胡湯若已吐下發汗温鍼譫語柴胡證罷此為壞病知犯何逆以法治之按衇沉𦂳當是衇沉弦若是沉𦂳是寒實在胸當吐之證也惟衇沉弦方與上文之義相屬始可與小柴胡湯當改之傷寒吐下後發汗虛煩衇甚微八九日心下痞鞕脇下痛氣上衝咽喉眩冒經衇動惕者久而成痿按八九日心下痞鞕脇下痛氣上衝咽喉三句與上下文義不屬註家皆因有此三句不得不支離蔓衍牽强解釋每見此病總因汗出過多大傷津液而成當用補氣補血益筋壯骨之藥經年始愈此三句必是錯簡當刪之汗家重發汗必恍惚心亂小便已隂疼與禹餘糧丸按禹餘糧丸為濇痢之藥與此證不合與禹餘糧九五字衍文也當刪之形作傷寒其衇不弦𦂳而弱弱數數者必渴被火者必讝語弱數者發熱衇浮解之當汗出愈按三弱字當俱是數字若是弱字熱從何有不但文義不屬論中並無此說當改之痙濕暍病篇正誤傷寒所致太陽病痙濕暍此三種宜應别論按傷寒所致四字甚無所謂當刪之太陽病發熱無汗反惡寒者名曰剛痙按反惡寒之反字衍文也剛痙證應惡寒非反也當刪之霍亂篇正誤惡寒衇微而復利利不止亡血陽也四逆加人參湯主之按利止亡血如何用大熱補藥利止應是利不止亡血應是亡陽當改之辨可下篇正誤問曰人病有宿食者何以别之師曰寸口衇浮而大按之反濇尺中亦微大而濇故知有宿食當下之宜大承氣湯按尺中㣲字當是大字若是微字斷無可下之理當改之平衇法正誤假令衇來微去大故名反病在裏也衇來頭小本大大去小故名覆病在表也上微頭小者為隂盛則汗出下微本大小者為陽盛則為闗格不通不得尿頭無汗者可治有汗者死按衇來頭小本大當是衇來大去小上微頭小者當是上微小者為隂盛下微本大者當是下微小者為陽盛始與上下之義相屬當改之補之寸口衞氣盛名曰高榮氣盛名曰章高章相摶名曰綱衞氣弱名曰惵榮氣弱名曰卑惵卑相摶名曰損衞氣和名曰緩榮氣和名曰遲遲緩相摶名曰沉强按名曰沉之沉字應是强字玩下文可知當改之寸口衇緩而遲緩則陽氣長其色鮮其顔光其聲啇毛髪長遲則隂氣盛骨髓生血滿肌肉𦂳薄鮮鞕隂陽相抱榮衞俱行剛柔相得名曰强也按薄鮮鞕三字不成句應是衍文當刪之北方腎衇其形何似師曰腎者水也名曰少隂其衇沉滑是腎衇也腎病自得沉滑而濡者愈也按東南西方皆有其文惟缺北方倣經文補之問曰翕奄沉名曰滑何謂也師曰沉為純陰翕為正陽隂陽和合故令衇滑闗尺自平陽明衇微沉食飲自可少隂衇微滑滑者𦂳之浮名也此為隂實其人必股内汗出隂下濕也按滑者緊之浮名也此為隂實二句與上下之義不屬當是錯簡陽衇浮濡隂衇弱者則血虛血虛則筋急也其衇沉弱者榮氣微也其衇浮濡而汗出如流珠者衞氣衰也按陽衇浮其衇浮之二浮字當是濡字若是浮字則與衞氣衰汗出如流珠之義不屬其衇沉之沉字當是弱字若是沉字則與血虛榮氣微之義不屬當改之師曰病家人來請云病人發熱煩極明日師到病人向壁臥此熱已去也設令衇不自和處言已愈按不和應是自和若不和如何言愈當改之辨衇法正誤衇來緩時一止復來者名曰結衇來數時一止復來者名曰促陽盛則促隂盛則結此皆病衇衇按之來緩時一止復動者名曰結又衇來動而中止更來小數中有還者反動名曰結隂也按衇按之來緩時一止復動至名曰結隂也數語文義不順且前論促結之衇已明衍文也當刪之隂陽相摶名曰動陽動則汗出發熱隂動則發熱汗出形冷惡寒者此三焦傷也若數衇見於闗上上下無頭尾如豆大厥厥動摇者名曰動也按陽動則汗出二字當是發熱二字隂動則發熱二字當是汗出二字陽加於陽豈有汗出之理素問曰陽加於隂謂之汗遵經移之衇隂陽俱𦂳主於吐利其衇獨不解𦂳去入人安此為欲解若衇遲至六七日不欲食此為晚發水停故也為未解食自可者為欲解按緊去入安之入字當是人字人安謂不吐利也此為晚發水停故也二句與上下文義不屬應是衍文當改之刪之衇浮而數浮為風數為虛熱囗風為熱虛為寒風虛熱相摶則灑淅惡寒也按數為虛之虛字應是熱字風為熱虛為寒二句應是衍文風虛相搏之虛字亦應是熱字當改之寸口諸微亡陽諸濡亡血衞虛諸弱發熱榮虛諸緊為寒諸乘寒者則為厥鬱冒不仁以胃無榖氣脾濇不通口急不能言戰而慄也按諸濡亡血當是諸濡衞虛諸弱發熱當是諸弱榮虛濡浮而無力候陽虛也豈有亡血之理弱沉而無力候隂虛也豈止發熱而已當改之師曰病人衇微而濇者此為醫所病也大發其汗又數大下之其人亡血病當惡寒後乃發熱無休止時夏月盛熱欲著複衣冬月盛寒欲裸其身所以然者陽微則惡寒隂弱則發熱此醫發其汗使陽氣微又大下之令隂氣弱五月之時陽氣在表胃中虛冷以陽氣内微不能勝冷故欲著複衣十一月之時陽氣在裏胃中煩熱以隂氣内弱不能勝熱故欲裸其身又陰衇遲濇故知血亡也按又陰衇遲濇故知血亡也二句與上文義不屬衍文也當刪之寸口衇弱而遲弱者衞陽氣微遲者榮脾中寒榮為血血寒則發熱衞為氣氣微陽氣微脾中寒者心内饑饑而虛滿不能食也按條末心内饑饑而虛滿不能食句此是論脾胃不闗榮衞故弱者衞氣微當是陽氣微遲者榮中寒當是脾中寒上下文義始屬榮為血豈有血寒發熱之理衞為氣氣微者皆不成文今悉易之當是陽氣微脾中寒者心内饑閱下條言胃氣有餘自知當改之趺陽衇浮而濇少陰衇如經者其病在脾法當下利何以知之若衇浮大者氣實血虛也今趺陽衇浮而濇故知脾氣不足胃氣虛也以少陰衇弦沉而浮滑纔見此為調衇故稱如經也若反滑而數者故知當尿膿也按若衇浮大者氣實血虛也二句與上下文義不屬當刪之少隂衇弦而浮豈可謂如經乎當改沉滑二字趺陽衇伏而濇伏則吐逆水榖不化入濇則食不得入不得小便名曰闗格按水榖不化之化字當是入字若是化字是能食也何名曰格食不得入當是不得小便若有小便是水道通也何名曰關悉改之趺陽衇𦂳而浮浮為氣緊為寒浮為腹滿緊為絞痛浮緊相摶腸鳴而轉轉即氣動膈氣乃下少隂衇不出其隂腫大而虛痛也按隂腫大而虚之虛字應改痛字細玩自知太陽上篇存疑病在陽應以汗解之反以冷水噀之若灌之其熱被却不得去彌更益煩肉上粟起意欲飲水反不渴者服文蛤散若不差者與五苓散身熱皮粟不解欲引衣自覆者若水以噀之洗之益令熱被却不得出當汗而不汗則煩假令汗出已腹中痛與芍藥三兩如上法太陽下篇存疑太陽病二日反躁反熨其背而大汗出大熱入胃胃中水竭躁煩必發譫語十餘日振慄自下利者此為欲解也故其汗從腰以下不得汗欲小便不得反嘔欲失溲足下惡風大便鞕小便當數而反不數及多大便已頭卓然而痛其人足心必熱榖氣下流故也下之後復發汗晝日煩躁不得眠夜而安静不嘔不渴無表證衇沉微身無大熱者乾薑附子湯主之發汗若下之病仍不解煩躁者茯苓四逆湯主之傷寒腹滿譫語寸口衇浮而緊此肝乘脾也名曰縱刺期門傷寒發熱嗇嗇惡寒者大渴欲飲水其腹必滿自汗出小便利其病欲解此肝乘肺也名曰横刺期門陽明篇存疑病人無表裏證發熱七八日雖衇浮數者可下之假令已下衇數不解合熱則消榖善飢至六七日不大便者有瘀血宜抵當湯若衇數不解而下不止必協熱便膿血也衇浮而芤浮為陽芤為陰浮芤相摶胃氣生熱其陽則絶陽明病反無汗而小便利二三日嘔而欬手足厥者必苦頭痛若不欬不嘔手足不厥者頭不痛陽明病但頭眩不惡寒故能食而欬其人咽必痛若不欬者咽不痛少隂篇存疑少陰病吐利手足逆冷煩躁欲死者呉茱茰湯主之壊病篇存疑傷寒衇浮自汗出小便數心煩微惡寒脚攣急反與桂枝湯欲攻其表此誤也得之便厥咽中乾煩躁吐逆者作甘草乾薑湯與之以復其陽若厥愈足温者更作芍藥甘草湯與之其脚即伸若胃氣不和譫語者少與調胃承氣湯若重發汗復加燒鍼者四逆湯主之問曰證象陽且按法治之而増劇厥逆咽中乾兩脛拘急而譫語師言夜半手足當温兩脚當伸後如師言何以知此答曰寸口衇浮而大浮為風大為虛風則生微熱虛則兩脛攣病形象桂枝因加附子參其間增桂令汗出附子温經亡陽故也厥逆咽中乾煩躁陽明内結譫語煩亂更飲甘草乾薑湯夜半陽氣還兩足當熱脛尚微拘急重與芍藥甘草湯爾乃脛伸以承氣湯微溏則止其譫語故知病可愈傷寒六七日大下後寸衇沉而遲手足厥逆下部衇不至咽喉不利唾膿血泄利不止者為難治麻黄升麻湯主之傷寒八九日下之胸滿煩驚小便不利譫語一身盡重不可轉側者柴胡加龍骨牡蠣湯主之微數之衇愼不可灸因火為邪則為煩逆追虛逐實血散衇中火氣雖微内攻有力焦骨傷筋血難復也衇浮宜以汗解用火灸之邪無從出因火而盛病從腰以下必重而痺名火逆也傷寒衇浮醫以火逼刼之亡陽必驚狂起臥不安者桂枝去芍藥加蜀漆龍骨牡蠣救逆湯主之痙濕暍病篇存疑濕家下之額上汗出微喘小便利者死若下利不止者亦死太陽中暍者身熱疼重而衇微弱此亦夏月傷冷水水行皮中所致也辨不可汗病篇存疑衇濡而弱弱反在闗濡反在巔微反在上濇反在下微則陽氣不足濇則無血陽氣反微中風汗出而反躁煩濇則無血厥而且寒陽微發汗躁不得眠衇濡而弱弱反在闗濡反在巔弦反在上微反在下弦為陽運微為陰寒上實下虛意欲得温微弦為虛不可發汗發汗則寒慄不能自還厥衇緊不可發汗發汗則聲亂咽嘶舌萎聲不得前欬者則劇數吐涎沫咽中必乾小便不利心中飢煩晬時而發其形似瘧有寒無熱虛而寒慄欬而發汗踡而苦滿腹中復堅辨不可下病篇存疑衇濡而弱弱反在闗濡反在巔微反在上濇反在下微則陽氣不足濇則無血陽氣反微中風汗出而反躁煩濇則無血厥而且寒陽微不可下下之則心下痞鞕衇濡而弱弱反在關濡反在巓弦反在上微反在下弦為陽運微為隂寒上實下虛意欲得温微弦為虚虚者不可下也衇濡而弱弱反在關濡反在巔浮反在上數反在下浮為陽虚數為無血浮為虚數生熱浮為虚自汗出而惡寒數為痛振而寒慄微弱在闗胸下為急喘汗而不得呼吸呼吸之中痛在於脇振寒相摶形如瘧狀醫反下之故令衇數發熱狂走見鬼心下為痞小便淋漓少腹甚鞕小便則尿血也衇濡而緊濡則衛氣微緊則榮中寒陽微衞中風發熱而惡寒榮緊胃氣冷微嘔心内煩醫為有大熱解肌而發汗亡陽虚煩躁心下苦痞堅表裏俱虚竭卒起而頭眩客熱在皮膚悵怏不得眠不知胃氣冷緊寒在關元技巧無所施汲水灌其身客熱因時罷慄慄而振寒重被而覆之汗出而冒巔體惕而又振小便為微難寒氣因水發清榖不容間嘔變反腸出顛倒不得安手足為微逆身冷而内煩遲欲從後救安可復追還衇浮而大浮為氣實大為血虚血虚為無陰孤陽獨下隂部者小便當赤而難胞中當虚今反小便利而大汗出法應衞家當微今反更實津液四射榮竭血盡乾煩而不得眠血薄肉消而成暴液醫復以毒藥攻其胃此為重虚客陽去有期必下如汚泥而死傷寒衇隂陽俱緊惡寒發熱則衇欲厥厥者衇初來大漸漸小更來漸大是其候也如此者惡寒甚者翕翕汗出喉中痛若熱多者目赤衇多睛不慧醫復發之咽中則傷若復下之則兩目閉寒多便清榖熱多便膿血若熏之則身發黄若熨之則咽燥若小便利者可救之若小便難者為危殆傷寒發熱口中勃勃氣出頭痛目黄衂不可制貪水者必嘔惡水者厥若下之咽中生瘡假令手足温者必下重便膿血頭痛目黄者若下之則目閉貪水者若下之其衇必厥其聲嚶咽喉塞若發汗則戰慄隂陽俱虚惡水者若下之則裏冷不嗜食大便完榖出若發汗則口中傷舌上白胎煩躁衇數實不大便六七日後必便血若發汗則小便自利也微則為欬欬則吐涎下之則欬止而利因不休利不休則胸中如蟲齧粥入則出小便不利兩脇拘急喘息為難頸背相引臂則不仁極寒反汗出身冷若氷眼睛不慧語言不休而榖氣多入此為除中口雖欲言舌不得前衇數者久數不止止則邪結正氣不能復正氣却結於藏故邪氣浮之與皮毛相得衇數者不可下下之必煩利不止傷寒發熱頭痛微汗出發汗則不識人熏之則喘不得小便心腹滿下之則短氣小便難頭痛背强加温鍼則衂下利衇大者虚也以强下之故也設衇浮革因爾腸鳴者屬當歸四逆湯陶隠居名醫别録合藥分劑法則凡言剉如麻豆大者與㕮咀同意夫㕮咀古之制也古人無鐡刀以口咬細令如麻豆為柤藥煎之使藥水清飲於腸中則易升易散今人以刀剉如麻豆大此㕮咀之易成也古秤惟有銖兩而無分名今則以十黍為一銖每銖約今四分一釐七亳六銖為一分去聲四分成一兩十六兩為一觔李杲曰六銖為一分即今之二錢半也二十四銖為一兩古云三兩即今之一兩云二兩即今之六錢半也今方家云等分者非分兩之分謂諸藥觔兩多少皆同爾多是丸散用之丸散云刀圭者十分平聲方寸匕之一准如梧桐子大也方寸匕者作匕正方一寸抄散取不落為度五匕者即今五銖錢邊五字者抄之不落為度一撮者四刀圭也匕即匙也藥以升合分者謂藥有虛實輕重不得用觔兩則以升平之十撮為一勺十勺為一合十合為一升升方作上徑一寸下徑六分深八分内散藥物按抑之正爾微動令平爾李時珍曰古之一升即今之二合半也凡方云巴豆若干枚者粒有大小當去心皮柞之以一分准十六枚附子烏頭若干枚者去皮畢以半兩准一枚枳實若干枚者去穰畢以一分准二枚橘皮一分准三枚棗大小三枚准一兩乾薑一累者以一兩為正凡方云半夏一升者洗畢稱五兩為正蜀椒一升三兩為正呉茱萸一升五兩為正莬絲子一升九兩為正菴䕡子一升四兩為正蛇牀子一升三兩半為正地膚子一升四兩為正其子各有虛實輕重不可稱准者取平升為正凡方云用桂一尺者削去皮重半兩為正甘草一尺者二兩為正云某草一束者三兩為正云一把者二兩為正凡煎湯藥初欲微火令小沸其水數依方多少大略藥二十兩用水一斗者煮取四升以此為凖然利湯欲生少水而多取汁補湯欲熟多水而少取汁服湯宜小沸熱則易下冷則嘔涌凡云分再服三服者要令勢令相及并視人之强弱羸瘦病之輕重為之進退増減不必局於方說則活潑潑地也凡丸藥云如細麻者即胡麻也不必扁扁略相稱爾黍粟亦然云如大麻子者准三細麻也如胡豆者即今青斑豆也以二大麻准之如小豆者今赤小豆也以三大麻准之如大豆者以二小豆准之如梧桐子者以二大豆准之如彈丸及雞子黄者以四十梧子准之凡方云蜜一觔者有七合猪膏一觔者有一升二合也膀胱足太陽之衇起於目内眥上額交巔其直者從巔入絡腦還出别下項循肩髆内俠脊抵腰中入循膂絡腎屬膀胱其直者從腰中下俠脊貫臀入膕中其支者從髆内左右别下貫脾俠脊内過髀樞循髀外從後廉下合膕中以下貫腨内出外踝之後循京骨至小指外側胃足陽明之衇起於鼻之交頞中旁約太陽之衇下循鼻外入上齒中還出俠口環脣下交承漿却循頤後下廉出大迎循頰車上耳前過客主人循髪際至額顱其支者從大迎前下人迎循喉嚨入缺盆下膈屬胃絡脾其直者從缺盆下乳内廉下挾臍入氣街中其支者起於胃下口循腹裏下至氣街中而合以下髀闗抵伏免下膝臏中下循脛外㢘下足跗入中指外間其支者下㢘穴三寸而别下入中指外間其支者别跗上入大指間出其端膽足少陽之衇起於目銳眥上抵頭角下耳後循頸行手少陽之前至肩上却交出手少陽之後入缺盆其支者從耳後入耳中出走耳前至目銳眥後其支者别銳眥下大迎合手少陽抵於䪼下加頰車下頸合缺盆以下胸中貫膈絡肝屬膽循脅裏出氣街繞毛際横入髀厭中其直者從缺盆下腋循胸過季脅下合髀厭中以下循髀陽出膝外廉下外輔骨之前直下抵絶骨之端下出外踝之前循足跗上入小指次指之間其支者别跗上入大指之間循大指岐骨内出其端還貫爪甲出三毛脾足太陰之衇起於大指之端循指内側白肉際過核骨後上内踝前廉上腨内循脛骨後交出厥隂之前上膝股内前廉入腹屬脾絡胃上膈挾咽連舌本散舌下其支者復從胃别上膈注心中腎足少隂之衇起於小指之下斜趨足心之湧泉穴出於然谷之下循内踝之後别入跟中以上腨内出膕内亷上股内後亷貫脊屬腎絡膀胱其直者從腎上貫肝膈入肺中循喉嚨挾舌本其支者從肺出絡心注胸中肝足厥隂之衇起於大指聚毛之上上循足跗上亷去内踝一寸上踝入寸交出太隂之後上膕内亷循股隂入毛中過隂器抵小腹俠胃屬肝絡膽上貫膈布脇循喉嚨之後上入頏顙連目系上出額與督衇㑹於巔其支者從目系下頰裏環脣内其支者復從肝别貫膈上注肺太陽病初服桂枝湯反煩不解者先刺風池風府却與桂枝湯則愈按風池穴在顳顬後顳顬腦空穴也後者謂俠玉枕傍骨下髪際内大筋外陷中按之引耳中是也足少陽陽維之㑹宜刺三分肌肉厚者可五分留七呼禁灸風府一穴在項髪際上一寸大筋内宛宛中疾言其肉立起言休立下是其穴也督衇陽維之會宜刺三分肌肉薄者只二分候病人呼氣即出禁灸太陽之邪刺足少陽督衇者何也蓋以風府在頭部中行風池在第三行太陽在第二行則風池風府實俠太陽經而行者也况二穴皆為陽維之㑹陽維者謂諸陽之總也刺之諸陽之氣得泄何患太陽之邪不去哉太陽病頭痛至七日已上自愈者以行其經盡故也若欲作再經者鍼足陽明使經不傳則愈按仲景云鍼足陽明成註未明指其穴考之龎氏總病論云補足陽明上三里穴推其意得補則經氣實而不傳殊不知仲景之意鍼足陽明爲迎而奪之以泄其經之熱使熱邪得泄不至再傳他經故云愈也龎氏不明用鍼之理以泄為補恐誤矣又考張氏纉論云刺足陽明衝陽穴衝陽者即仲景所謂趺陽衇也有診法而不言刺張氏之言實本史氏傷寒論註不足法也三里二穴在膝眼下三寸胻骨外廉兩筋間宛宛中坐而豎膝低跗取之極重按之則跗上動衇即止是其穴也可刺五分留七呼傷寒腹滿讝語寸口衇浮而緊此肝乘脾也名曰縱刺期門傷寒發熱嗇嗇惡寒大渴欲飲水其腹必滿自汗出小便利其病欲解此肝乘肺也名曰横刺期門婦人中風發熱惡寒經水適來得之七八日熱除而衇遲身凉胸脇下滿如結胸狀讝語者此為熱入血室也當刺期門隨其實而瀉之陽明病下血讝語者此為熱入血室但頭汗出者刺期門隨其實而瀉之濈然汗出則愈太陽與少陽併病頭項强痛或眩冒時如結胸心下痞鞕者當刺大椎第一間肺俞肝兪慎不可發汗發汗則讝語衇弦五六日讝語不止當刺期門按圖經云期門二穴在不容傍一寸五分乳直下第二肋骨端近腹處是其穴也第二肋者從下數至第二肋也肋骨端者在軟肋骨末之端也刺四分肥人量之太陽與少陽併病頭項强痛或眩冒時如結胸心下痞鞕者當刺大椎第一間肺俞肝俞慎不可發汗發汗則讝語衇弦五六日讝語不止當刺期門太陽少陽併病心下鞕頸項强而眩者當刺大椎肺俞肝俞慎勿下之按圖經云督衇大椎穴在第一椎上陷中可刺五分留三呼泄五吸肺俞二穴在第三椎下兩傍相去各一寸五分可刺三分留七呼得氣即泄肥人可刺五分肝俞二穴在第九椎下兩傍相去各一寸五分可刺三分留六呼仲景太陽少陽併病乃合邪也故刺大椎肺俞肝俞亦合泄之法也少隂病得之二三日口中和其背惡寒者當灸之附子湯主之按當灸之仲景未言灸何穴常器之云當是足太陽鬲闗二穴專灸背惡寒其穴在第七椎下兩傍相去各三寸陷中正坐取之可灸五壯蓋以太陽為少隂之表故外灸鬲闗以温其表内用附子以温其裏也少隂病吐利手足不厥冷反發熱者不死衇不至灸少隂七壯按灸少隂七壯仲景未言灸何穴常噐之云當灸少隂太谿二穴經曰腎之原出於太谿其穴在内踝後跟骨動衇陷中少隂病下利便膿血者可刺按可刺仲景未言可刺何穴常器之云可刺足少隂幽門交信郭雍曰可灸考幽門二穴在鳩尾下一寸巨闕兩傍各五分陷者中治瀉利膿血刺五分灸五壯交信二穴在内踝上二寸少隂前太隂後亷筋骨間治瀉利赤白刺四分留五呼灸三壯兩說皆是少隂病下利衇微濇嘔而汗出必數更衣反少者當温其上灸之按灸之仲景未言當灸何穴常器之云灸太衝郭雍云灸太谿此穴皆不治嘔而汗出裏急下利惟幽門主治乾噦嘔吐裏急下利亦當灸幽門為是傷寒六七日衇微手足厥冷煩燥灸厥隂厥不還者死按灸厥隂仲景未言當灸何穴常器之云可灸太衝以太衝二穴為足厥隂之所注凡病診太衝衇可决人之生死其穴在足大指本節後二寸跗間陷者中動衇應手是其穴也灸三壯傷寒衇促手足厥逆者可灸之按可灸之仲景未言當灸何穴常器之云太衝穴前條手足厥逆灸太衝此條亦手足厥逆亦當灸太衝御纂醫宗金鑑卷十七欽定四庫全書御纂醫宗金鑑卷十七訂正仲景全書傷寒論註正誤存疑篇仲景傷寒論篇篇可法但成於漢末傳寫多訛錯簡亦復不少如論中下利嘔逆用十棗湯峻劑攻之陽重衂血以麻黄湯發之發汗病解反惡寒病解之中多一不字心下痞按之濡濡字之上少一不字之類諸家遵經註解不得不穿鑿附㑹致令千古不可多得之書不能傳信於世良可惜也今加正誤一一列明每條凡小字傍右者原文也傍左者改正之文也居中者原文所有或移上或移下或他處移入及原文所無而補之者也字上加刪去者也尤有整節舛謬者三十五條證不與衇符藥不與病合雖有是方世無其病即有其病難用是藥承訛襲謬無濟實用然其中尚有可採之句所以各篇不動經文强加註釋復録原文附於卷末以誌闕疑云太陽上篇正誤桂枝湯方桂枝三兩去皮芍藥三兩甘草二兩炙生薑三兩切大棗十二枚擘按桂枝湯方原文有去皮二字夫桂枝氣味辛甘全在於皮若去皮是枯木矣如何有解肌發汗之功耶當刪之後倣此若衇和其人大煩目重臉瞼内際黄者此欲解也按臉字當是瞼字瞼眼弦也作臉字非當改之太陽中風下不利嘔逆表解者乃可攻之其人漐漐汗出發作熱有時頭痛心下痞鞭滿引脇下痛乾嘔短氣汗出不惡寒者此表解裏未和也十棗湯主之按下利之下字當是不字若是下字豈有上嘔下利而用十棗湯峻劑攻之之理乎惟其大便不利痞鞕滿痛始屬裏病小便不利嘔逆短氣始屬飲病乃可峻攻發作之作字當是熱字始與太陽陽邪熱飲之義相合若無熱汗出乃少隂隂邪寒飲真武湯證也且作字與上下句文義皆不相屬當改之太陽病下之其衇促浮不結胸者此爲欲解也衇浮促者必結胸也衇𦂳數細者必咽痛衇弦者必兩脇拘急衇細數𦂳者頭痛未止衇沉𦂳者必欲嘔衇沉滑者恊熱利衇浮數滑者必下血按衇促當是衇浮始與不結胸爲欲解之文義相屬衇浮當是衇促始與論中結胸胸滿同義衇𦂳當是衇細數衇細數當是衇𦂳始同論中二經本衇衇浮滑當是衇數滑浮滑是論中白虎湯證之衇數滑是論中下膿血之衇均當改之太陽病二三日不能臥但欲起心下必結衇微弱者此本有寒分也反下之若利止必作結胸未止者四日復下之利此作協熱利也按四曰復下之之之字當是利字上文利未止豈有復下之理乎當改之太陽病下之後衇促胸滿者桂枝去芍藥湯主之若汗出微惡寒去芍藥方中加附子湯主之按微惡寒之上當有汗出二字若無汗出二字乃表未解也無加附子之理當補之太陽病衇浮而動數浮則爲風數則爲熱動則爲痛數則爲虛頭痛發熱微盜汗出而反惡寒者表未解也醫反下之動數變遲膈内拒痛胃中空虛客氣動膈短氣煩躁心中懊憹陽氣内陷心下因鞕則爲結胸大陷胸湯主之若不結胸但頭汗出餘無汗躋頸而還小便不利身必發黄也按數則爲虛句衍文也當刪之寒實結胸無熱證者與三物小陷胸湯白散亦可服按與三物小陷胸湯當是三物白散小陷胸湯四字當是錯簡桔梗貝母巴豆三物其色皆白有三物白散之義温而能攻與寒實之理相合小陷胸湯乃栝蔞黄連皆性寒之品豈可以治寒實結胸之證耶亦可服三字亦衍文也俱當刪之太陽中篇正誤發汗病不解反惡寒者虛故也芍藥甘草附子湯主之按發汗病不解之不字衍文也發汗病不解則當惡寒何謂反惡寒病解惡寒始可謂虛當刪之病發熱頭痛衇反沉若不差身體疼痛下利清榖當温其裏宜四逆湯按身體疼痛之下當有下利清榖四字若無此四字則當温其裏之文竟無着落矣未有表病而温裏之理也閱後太隂篇中云傷寒醫下之續得下利清榖不止身痛者急當救裏四逆湯其義益明遵經補之傷寒若汗若吐若下後七八日不解熱結在裏表裏俱熱時時汗惡風大渴舌上乾燥而煩欲飲水數升者白虎加人參湯主之按傷寒之下當有若汗二字蓋汗較吐下傷津液爲多也時時惡風當是時汗惡風若非汗字則時時惡風是表不解白虎湯在所禁也論中謂發熱無汗表不解者不可與白虎湯渴欲飲水無表證者白虎加人參湯主之細玩經文自知當補之改之發汗已衇浮數小便不利煩渴者五苓散主之按衇浮數之下當有小便不利四字若無此四字則為陽明内熱口燥之煩渴是白虎湯證也惟其小便不利而煩渴斯為太陽水熱瘀結之煩渴始屬五苓散證若非小便不利而用五苓散則犯重竭津液之禁矣况太陽上篇類此證者數條惟水入即吐一條乃水不下行故無小便不利之文餘皆有小便不利四字今此四字必是傳寫之遺當補之服桂枝湯或下之仍頭項强痛翕翕發熱無汗心下滿微痛小便不利者桂枝湯去桂藥芍加茯苓白术湯主之按去桂當是去芍藥此方去桂將何以治仍頭項痛發熱無汗之表乎細玩其服此湯曰餘依桂枝湯法煎服其義自見服桂枝湯已温覆令一時許通身漐漐微似有汗此服桂枝湯法也若去桂則是白芍甘草茯苓白术並無辛甘走榮衞之品而曰餘依桂枝湯法無所謂也且論中衇促胸滿汗出惡寒者用桂枝去芍藥加附子湯主之去芍藥者為胸滿也今證雖稍異而滿則同其為去芍藥可知當改之傷寒醫以丸藥大下之身熱不去㣲煩者梔子乾薑豉湯主之傷寒五六日大下之後身熱不去心中結痛者未欲解也梔子豉薑乾湯主之按梔子乾薑湯當是梔子豉湯梔子豉湯當是梔子乾薑湯斷無煩熱用乾薑結痛用香豉之理當移之太陽病衇浮𦂳無汗發熱身疼痛八九日不解表證仍在此當發其汗麻黄湯主之服藥已微除其人發煩目瞑劇者必衂衂乃解所以然者陽氣重故也按張兼善曰麻黄湯主之五字不應在陽氣重之下豈有衂乃解之後而用麻黄湯之理乎服藥已之上並無所服何藥之文將此五字移於其上文義始合當移之傷寒不大便六七日頭痛有熱者與承氣湯其小便清者知不在裏仍在表也當湏發汗若苦頭痛者必衂宜桂枝湯按若頭痛之若字當是苦字苦頭痛方為必衂證若是若字則凡頭痛皆能致衂矣當改之心下痞按之不濡其衇闗上浮者大黄黄連瀉心湯主之按按之濡當是按之不濡若按之濡乃虛痞也補之不暇豈有用大黄瀉之之理乎當補之太陽下篇正誤小青龍湯方加減法内若微利者去麻黄加蕘花如雞子大熬令赤色茯苓四兩按加蕘花如雞子大此必傳寫之誤考本草蕘花是芫花類也每用之攻水其力甚峻五分可令人下行數十次豈有治停飲之微利用雞子大之蕘花者乎當改加茯苓四兩傷寒心下有水氣欬而微喘發熱不渴小青龍湯主之服湯已渴者此寒去欲解也按小青龍湯主之六字當在發熱不渴之下始與服湯已渴者之文義相屬豈有寒去欲解而更服小青龍湯之理乎當移之陽明篇正誤陽明病衇浮而𦂳必潮熱發作有時但浮者必盜自汗出按自汗是陽明證盜汗乃少陽證盜汗應是自汗當改之陽明病衇遲汗出多發熱微惡寒者表未解也可發汗宜桂枝湯按汗出多之下當有發熱二字若無此二字衇遲汗出多微惡寒乃表陽虚桂枝附子湯證也豈有用桂枝湯發汗之理乎當補之傷寒衇浮滑此以表有熱裏有寒熱白虎湯主之按裏有寒之寒字當是熱字若是寒字非白虎湯證也當改之傷寒若吐若下後不解不大便五六日上至十餘日日晡所發潮熱不惡寒獨語如見鬼狀若劇者發則不識人循衣摸床惕而不安微喘直視衇弦滑者生濇者死微者但發熱譫語者大承氣湯主之若一服利止後服按衇弦者生之弦字當是滑字弦為隂負之衇豈有必生之理惟滑衇為陽始有生理况滑者通也濇者塞也凡物之理未有不以通為生而塞為死者當改之太陽病寸緩闗浮尺弱其人發熱汗出復惡寒不嘔但心下痞者此以醫下之也如其不下者病人不惡寒而渴者此轉屬陽明也小便數者大便必鞕不更衣十日無所苦也渴欲飲水少少與之但以法救之若小便不利渴者宜五苓散按但以法救之五字當是若小便不利五字方與上文小便數及下文渴者之義相屬此條病勢不急救之之文殊覺無謂昔王三陽亦云此處五苓散難用不然經文渴者之下當有缺文當改之梔子蘗皮湯方按此方之甘草當是茵蔯蒿必傳寫之誤也太陽病當惡寒發熱今自汗出不惡寒發熱闗上衇細數者以醫吐之過也一二日吐之者腹中饑口不能食三四日吐之者不喜糜粥欲食冷食五六日吐之者朝食暮吐以醫吐之所致此為小逆按欲食冷食之下當有五六日吐之者六字若無此一句則不喜糜粥欲食冷食與朝食暮吐之文不相聮屬且以上文一二日三四日之文細玩之則可知必有五六日吐之一句由淺及深之義也當補之寸口衇浮大而醫下之此為大逆浮則無血大則為寒寒氣相摶則為腸鳴醫乃不知而反飲冷水令汗大出水得寒氣冷必相搏其人必䭇按令汗大出四字當是衍文宜刪之陽明病讝語有潮熱反不能食者胃中必有燥屎五六枚也宜大承氣湯下之若能食者但鞕耳按宜大承氣湯下之句應在必有燥屎五六枚之下始合若但便鞕即用大承氣湯下之殊失仲景慎重悞下之㫖當移之陽明中風衇弦浮大而短氣腹都滿脇下及心痛久按之氣不通鼻乾不得汗嗜臥一身及面目悉黄小便難有潮熱時時噦耳前後腫刺之小差外不解病過十日衇續浮弦者與小柴胡湯但浮無餘證者與麻黄湯若不尿腹滿加噦者不治按續浮之浮字當是弦字始與小柴胡湯法之衇相合若是浮字則上之浮既宜小柴胡湯而下之浮又用麻黄湯不自相矛盾耶當改之發汗後水藥不得入口為逆若更發汗必吐下不止按必吐下不止之下字衍文也當刪之少陽篇正誤得病六七日衇遲浮弱惡風寒手足温醫二三下之不能食而脇下滿痛面目及身黄頸項强小便難者與柴胡湯後必下重本渴而飲水嘔者柴胡湯不中與也食榖者噦按食榖者噦四字衍文也食榖嘔者有之從無食榖噦者之證當刪之傷寒五六日頭汗出微惡寒手足冷心下滿口不欲食大便鞕衇沉細者此為陽微結必有表復有裏也衇沉亦在裏也汗出為陽微假令純隂結不得復有外證悉入在裏此為半在裏半在外也衇雖沉𦂳細不得為少隂病所以然者隂不得有汗今頭汗出故知非少隂也可與小柴胡湯設不了了者得屎而解按衇細當是衇沉細觀本條下文衇沉亦在裏也之亦字自知當補之衇雖沉𦂳之𦂳字當是細字觀本條上文並無𦂳字如何說衇雖沉𦂳此雖字又何所謂耶當改之傷寒發熱汗出不解心下痞鞕嘔吐而下不利者大柴胡湯主之按下利之下字當是不字若是下字豈有上吐下利而猶以大柴胡湯下之者乎當改之太陽病過經十餘日反二三下之後四五日柴胡證仍在者先與小柴胡湯嘔不止心下急鬱鬱微煩者為未解也與大柴胡湯下之則愈按許叔微曰大柴胡湯一方無大黄一方有大黄蓋大黄蕩滌藴熱傷寒中要藥王叔和云若不用大黄恐不名大柴胡湯且仲景曰下之則愈若無大黄將何以下心下之急乎當從叔和為是宜補之太陽病過經十餘日心中温温嗢嗢欲吐而胸中痛大便反溏腹微滿鬱鬱微煩先此時自極吐下者與調胃承氣湯若不爾者不可與但欲嘔胸中痛微溏者此非柴胡證以嘔故知極吐下也按王肯堂曰温温當是嗢嗢又云以嘔下疑有闕文當改之太隂篇正誤太隂之為病腹滿而吐食不下時腹自痛若下之必胸下結鞕自利益甚按呉人駒曰自利益甚四字當在必胸下結鞕之下若在吐食不下之下則是已吐食不下而自利益甚矣仲景復曰若下之無所謂也從而移之傷寒本自寒下格醫復吐下之寒格更逆吐下若食入口即吐乾薑黄連黄芩人參湯主之按經論中並無寒下之病亦無寒下之文玩本條下文寒格更逆吐下可知寒下之下字當是格字文義始屬註家皆釋胃寒下利不但文義不屬且與芩連之藥不合當改之少隂篇正誤少隂病飲食入口即吐心中温温嗢嗢欲吐復不能吐始得之手足寒衇弦遲者此胸中實不可下也當吐之若膈上有寒飲乾嘔者不可吐也當温之宜四逆湯按温温當是嗢嗢嗢嗢者乃吐飲之狀也當改之厥隂篇正誤傷寒厥而心下悸者以飲水多宜先治水當服茯苓甘草湯却治其厥不爾水漬入胃必作利也按厥而心下悸者之下當有以飲水多四字若無此四字乃隂盛之厥悸非停水之厥悸矣何以即知是水而曰宜先治水耶當補之傷寒衇微而厥至七八日膚冷其人躁無暫安時者此為藏厥非蚘厥也蚘厥者其人當吐蚘今病者静而復時煩者此非為藏寒蚘上入其膈故煩湏臾復止得食而嘔又煩者蚘聞食臭出其人當自吐蚘蚘厥者烏梅丸主之又主久利按此為藏寒之此字當是非字若是此字即是藏厥與辨蚘厥之義不屬當改之傷寒五六日不結胸大便腹濡衇虛復厥者不可下此為亡血下之死按結胸二字當是大便二字不結胸腹濡衇虛復厥皆無可下之理今曰不可下何所謂也當改之傷寒始發熱六日厥反九日而利凡厥利者當不能食今反能食者恐為除中食以索餅不若發熱者知胃氣尚在必愈恐暴熱來出而復去也後三日衇之其熱續在者期之旦日夜半愈所以然者本發熱六日厥反九日復發熱三日並前六日亦為九日與厥相應故期之旦日夜半愈後三日衇之而衇數其熱不罷者此為熱氣有餘必發癰膿也按不發熱者之不字當是若字若是不字即是除中何以下接恐暴熱來出而復去之文耶當改之傷寒衇遲六七日厥而下利而反與黄芩湯徹其熱衇遲為寒今與黄芩湯復除其熱腹中應冷當不能食今反能食此名除中必死按傷寒衇遲六七日之下當有厥而下利四字若無此四字則非除中證也况有此四字始與下文反與黄芩湯之義相屬當補之合病併病篇正誤三陽合病衇浮大上弦闗上但欲眠睡目合則汗按浮大上之上字當是弦字始合論中三陽合病之衇若是上字則經論中從無兩寸衇主三陽病之理當改之二陽併病太陽初得病時發其汗汗先出不徹因轉屬陽明續自微汗出不惡寒若太陽證不罷者不可下下之為逆如此可小發汗設面色縁縁正赤者陽氣怫鬱在表當解之熏之以汗若發汗不徹不足言陽氣怫鬱不得越當汗不汗其人躁煩不知痛處乍在腹中乍在四肢按之不可得其人短氣但坐以汗出不徹故也更發汗則愈何以知汗出不徹以衇濇故知也按熏之二字當是以汗二字始與上下文義相屬當改之壊病篇正誤本太陽病不解轉入少陽者脇下鞕滿乾嘔不能食徃來寒熱尚未吐下衇沉𦂳弦者與小柴胡湯若已吐下發汗温鍼譫語柴胡證罷此為壞病知犯何逆以法治之按衇沉𦂳當是衇沉弦若是沉𦂳是寒實在胸當吐之證也惟衇沉弦方與上文之義相屬始可與小柴胡湯當改之傷寒吐下後發汗虛煩衇甚微八九日心下痞鞕脇下痛氣上衝咽喉眩冒經衇動惕者久而成痿按八九日心下痞鞕脇下痛氣上衝咽喉三句與上下文義不屬註家皆因有此三句不得不支離蔓衍牽强解釋每見此病總因汗出過多大傷津液而成當用補氣補血益筋壯骨之藥經年始愈此三句必是錯簡當刪之汗家重發汗必恍惚心亂小便已隂疼與禹餘糧丸按禹餘糧丸為濇痢之藥與此證不合與禹餘糧九五字衍文也當刪之形作傷寒其衇不弦𦂳而弱弱數數者必渴被火者必讝語弱數者發熱衇浮解之當汗出愈按三弱字當俱是數字若是弱字熱從何有不但文義不屬論中並無此說當改之痙濕暍病篇正誤傷寒所致太陽病痙濕暍此三種宜應别論按傷寒所致四字甚無所謂當刪之太陽病發熱無汗反惡寒者名曰剛痙按反惡寒之反字衍文也剛痙證應惡寒非反也當刪之霍亂篇正誤惡寒衇微而復利利不止亡血陽也四逆加人參湯主之按利止亡血如何用大熱補藥利止應是利不止亡血應是亡陽當改之辨可下篇正誤問曰人病有宿食者何以别之師曰寸口衇浮而大按之反濇尺中亦微大而濇故知有宿食當下之宜大承氣湯按尺中㣲字當是大字若是微字斷無可下之理當改之平衇法正誤假令衇來微去大故名反病在裏也衇來頭小本大大去小故名覆病在表也上微頭小者為隂盛則汗出下微本大小者為陽盛則為闗格不通不得尿頭無汗者可治有汗者死按衇來頭小本大當是衇來大去小上微頭小者當是上微小者為隂盛下微本大者當是下微小者為陽盛始與上下之義相屬當改之補之寸口衞氣盛名曰高榮氣盛名曰章高章相摶名曰綱衞氣弱名曰惵榮氣弱名曰卑惵卑相摶名曰損衞氣和名曰緩榮氣和名曰遲遲緩相摶名曰沉强按名曰沉之沉字應是强字玩下文可知當改之寸口衇緩而遲緩則陽氣長其色鮮其顔光其聲啇毛髪長遲則隂氣盛骨髓生血滿肌肉𦂳薄鮮鞕隂陽相抱榮衞俱行剛柔相得名曰强也按薄鮮鞕三字不成句應是衍文當刪之北方腎衇其形何似師曰腎者水也名曰少隂其衇沉滑是腎衇也腎病自得沉滑而濡者愈也按東南西方皆有其文惟缺北方倣經文補之問曰翕奄沉名曰滑何謂也師曰沉為純陰翕為正陽隂陽和合故令衇滑闗尺自平陽明衇微沉食飲自可少隂衇微滑滑者𦂳之浮名也此為隂實其人必股内汗出隂下濕也按滑者緊之浮名也此為隂實二句與上下之義不屬當是錯簡陽衇浮濡隂衇弱者則血虛血虛則筋急也其衇沉弱者榮氣微也其衇浮濡而汗出如流珠者衞氣衰也按陽衇浮其衇浮之二浮字當是濡字若是浮字則與衞氣衰汗出如流珠之義不屬其衇沉之沉字當是弱字若是沉字則與血虛榮氣微之義不屬當改之師曰病家人來請云病人發熱煩極明日師到病人向壁臥此熱已去也設令衇不自和處言已愈按不和應是自和若不和如何言愈當改之辨衇法正誤衇來緩時一止復來者名曰結衇來數時一止復來者名曰促陽盛則促隂盛則結此皆病衇衇按之來緩時一止復動者名曰結又衇來動而中止更來小數中有還者反動名曰結隂也按衇按之來緩時一止復動至名曰結隂也數語文義不順且前論促結之衇已明衍文也當刪之隂陽相摶名曰動陽動則汗出發熱隂動則發熱汗出形冷惡寒者此三焦傷也若數衇見於闗上上下無頭尾如豆大厥厥動摇者名曰動也按陽動則汗出二字當是發熱二字隂動則發熱二字當是汗出二字陽加於陽豈有汗出之理素問曰陽加於隂謂之汗遵經移之衇隂陽俱𦂳主於吐利其衇獨不解𦂳去入人安此為欲解若衇遲至六七日不欲食此為晚發水停故也為未解食自可者為欲解按緊去入安之入字當是人字人安謂不吐利也此為晚發水停故也二句與上下文義不屬應是衍文當改之刪之衇浮而數浮為風數為虛熱囗風為熱虛為寒風虛熱相摶則灑淅惡寒也按數為虛之虛字應是熱字風為熱虛為寒二句應是衍文風虛相搏之虛字亦應是熱字當改之寸口諸微亡陽諸濡亡血衞虛諸弱發熱榮虛諸緊為寒諸乘寒者則為厥鬱冒不仁以胃無榖氣脾濇不通口急不能言戰而慄也按諸濡亡血當是諸濡衞虛諸弱發熱當是諸弱榮虛濡浮而無力候陽虛也豈有亡血之理弱沉而無力候隂虛也豈止發熱而已當改之師曰病人衇微而濇者此為醫所病也大發其汗又數大下之其人亡血病當惡寒後乃發熱無休止時夏月盛熱欲著複衣冬月盛寒欲裸其身所以然者陽微則惡寒隂弱則發熱此醫發其汗使陽氣微又大下之令隂氣弱五月之時陽氣在表胃中虛冷以陽氣内微不能勝冷故欲著複衣十一月之時陽氣在裏胃中煩熱以隂氣内弱不能勝熱故欲裸其身又陰衇遲濇故知血亡也按又陰衇遲濇故知血亡也二句與上文義不屬衍文也當刪之寸口衇弱而遲弱者衞陽氣微遲者榮脾中寒榮為血血寒則發熱衞為氣氣微陽氣微脾中寒者心内饑饑而虛滿不能食也按條末心内饑饑而虛滿不能食句此是論脾胃不闗榮衞故弱者衞氣微當是陽氣微遲者榮中寒當是脾中寒上下文義始屬榮為血豈有血寒發熱之理衞為氣氣微者皆不成文今悉易之當是陽氣微脾中寒者心内饑閱下條言胃氣有餘自知當改之趺陽衇浮而濇少陰衇如經者其病在脾法當下利何以知之若衇浮大者氣實血虛也今趺陽衇浮而濇故知脾氣不足胃氣虛也以少陰衇弦沉而浮滑纔見此為調衇故稱如經也若反滑而數者故知當尿膿也按若衇浮大者氣實血虛也二句與上下文義不屬當刪之少隂衇弦而浮豈可謂如經乎當改沉滑二字趺陽衇伏而濇伏則吐逆水榖不化入濇則食不得入不得小便名曰闗格按水榖不化之化字當是入字若是化字是能食也何名曰格食不得入當是不得小便若有小便是水道通也何名曰關悉改之趺陽衇𦂳而浮浮為氣緊為寒浮為腹滿緊為絞痛浮緊相摶腸鳴而轉轉即氣動膈氣乃下少隂衇不出其隂腫大而虛痛也按隂腫大而虚之虛字應改痛字細玩自知太陽上篇存疑病在陽應以汗解之反以冷水噀之若灌之其熱被却不得去彌更益煩肉上粟起意欲飲水反不渴者服文蛤散若不差者與五苓散身熱皮粟不解欲引衣自覆者若水以噀之洗之益令熱被却不得出當汗而不汗則煩假令汗出已腹中痛與芍藥三兩如上法太陽下篇存疑太陽病二日反躁反熨其背而大汗出大熱入胃胃中水竭躁煩必發譫語十餘日振慄自下利者此為欲解也故其汗從腰以下不得汗欲小便不得反嘔欲失溲足下惡風大便鞕小便當數而反不數及多大便已頭卓然而痛其人足心必熱榖氣下流故也下之後復發汗晝日煩躁不得眠夜而安静不嘔不渴無表證衇沉微身無大熱者乾薑附子湯主之發汗若下之病仍不解煩躁者茯苓四逆湯主之傷寒腹滿譫語寸口衇浮而緊此肝乘脾也名曰縱刺期門傷寒發熱嗇嗇惡寒者大渴欲飲水其腹必滿自汗出小便利其病欲解此肝乘肺也名曰横刺期門陽明篇存疑病人無表裏證發熱七八日雖衇浮數者可下之假令已下衇數不解合熱則消榖善飢至六七日不大便者有瘀血宜抵當湯若衇數不解而下不止必協熱便膿血也衇浮而芤浮為陽芤為陰浮芤相摶胃氣生熱其陽則絶陽明病反無汗而小便利二三日嘔而欬手足厥者必苦頭痛若不欬不嘔手足不厥者頭不痛陽明病但頭眩不惡寒故能食而欬其人咽必痛若不欬者咽不痛少隂篇存疑少陰病吐利手足逆冷煩躁欲死者呉茱茰湯主之壊病篇存疑傷寒衇浮自汗出小便數心煩微惡寒脚攣急反與桂枝湯欲攻其表此誤也得之便厥咽中乾煩躁吐逆者作甘草乾薑湯與之以復其陽若厥愈足温者更作芍藥甘草湯與之其脚即伸若胃氣不和譫語者少與調胃承氣湯若重發汗復加燒鍼者四逆湯主之問曰證象陽且按法治之而増劇厥逆咽中乾兩脛拘急而譫語師言夜半手足當温兩脚當伸後如師言何以知此答曰寸口衇浮而大浮為風大為虛風則生微熱虛則兩脛攣病形象桂枝因加附子參其間增桂令汗出附子温經亡陽故也厥逆咽中乾煩躁陽明内結譫語煩亂更飲甘草乾薑湯夜半陽氣還兩足當熱脛尚微拘急重與芍藥甘草湯爾乃脛伸以承氣湯微溏則止其譫語故知病可愈傷寒六七日大下後寸衇沉而遲手足厥逆下部衇不至咽喉不利唾膿血泄利不止者為難治麻黄升麻湯主之傷寒八九日下之胸滿煩驚小便不利譫語一身盡重不可轉側者柴胡加龍骨牡蠣湯主之微數之衇愼不可灸因火為邪則為煩逆追虛逐實血散衇中火氣雖微内攻有力焦骨傷筋血難復也衇浮宜以汗解用火灸之邪無從出因火而盛病從腰以下必重而痺名火逆也傷寒衇浮醫以火逼刼之亡陽必驚狂起臥不安者桂枝去芍藥加蜀漆龍骨牡蠣救逆湯主之痙濕暍病篇存疑濕家下之額上汗出微喘小便利者死若下利不止者亦死太陽中暍者身熱疼重而衇微弱此亦夏月傷冷水水行皮中所致也辨不可汗病篇存疑衇濡而弱弱反在闗濡反在巔微反在上濇反在下微則陽氣不足濇則無血陽氣反微中風汗出而反躁煩濇則無血厥而且寒陽微發汗躁不得眠衇濡而弱弱反在闗濡反在巔弦反在上微反在下弦為陽運微為陰寒上實下虛意欲得温微弦為虛不可發汗發汗則寒慄不能自還厥衇緊不可發汗發汗則聲亂咽嘶舌萎聲不得前欬者則劇數吐涎沫咽中必乾小便不利心中飢煩晬時而發其形似瘧有寒無熱虛而寒慄欬而發汗踡而苦滿腹中復堅辨不可下病篇存疑衇濡而弱弱反在闗濡反在巔微反在上濇反在下微則陽氣不足濇則無血陽氣反微中風汗出而反躁煩濇則無血厥而且寒陽微不可下下之則心下痞鞕衇濡而弱弱反在關濡反在巓弦反在上微反在下弦為陽運微為隂寒上實下虛意欲得温微弦為虚虚者不可下也衇濡而弱弱反在關濡反在巔浮反在上數反在下浮為陽虚數為無血浮為虚數生熱浮為虚自汗出而惡寒數為痛振而寒慄微弱在闗胸下為急喘汗而不得呼吸呼吸之中痛在於脇振寒相摶形如瘧狀醫反下之故令衇數發熱狂走見鬼心下為痞小便淋漓少腹甚鞕小便則尿血也衇濡而緊濡則衛氣微緊則榮中寒陽微衞中風發熱而惡寒榮緊胃氣冷微嘔心内煩醫為有大熱解肌而發汗亡陽虚煩躁心下苦痞堅表裏俱虚竭卒起而頭眩客熱在皮膚悵怏不得眠不知胃氣冷緊寒在關元技巧無所施汲水灌其身客熱因時罷慄慄而振寒重被而覆之汗出而冒巔體惕而又振小便為微難寒氣因水發清榖不容間嘔變反腸出顛倒不得安手足為微逆身冷而内煩遲欲從後救安可復追還衇浮而大浮為氣實大為血虚血虚為無陰孤陽獨下隂部者小便當赤而難胞中當虚今反小便利而大汗出法應衞家當微今反更實津液四射榮竭血盡乾煩而不得眠血薄肉消而成暴液醫復以毒藥攻其胃此為重虚客陽去有期必下如汚泥而死傷寒衇隂陽俱緊惡寒發熱則衇欲厥厥者衇初來大漸漸小更來漸大是其候也如此者惡寒甚者翕翕汗出喉中痛若熱多者目赤衇多睛不慧醫復發之咽中則傷若復下之則兩目閉寒多便清榖熱多便膿血若熏之則身發黄若熨之則咽燥若小便利者可救之若小便難者為危殆傷寒發熱口中勃勃氣出頭痛目黄衂不可制貪水者必嘔惡水者厥若下之咽中生瘡假令手足温者必下重便膿血頭痛目黄者若下之則目閉貪水者若下之其衇必厥其聲嚶咽喉塞若發汗則戰慄隂陽俱虚惡水者若下之則裏冷不嗜食大便完榖出若發汗則口中傷舌上白胎煩躁衇數實不大便六七日後必便血若發汗則小便自利也微則為欬欬則吐涎下之則欬止而利因不休利不休則胸中如蟲齧粥入則出小便不利兩脇拘急喘息為難頸背相引臂則不仁極寒反汗出身冷若氷眼睛不慧語言不休而榖氣多入此為除中口雖欲言舌不得前衇數者久數不止止則邪結正氣不能復正氣却結於藏故邪氣浮之與皮毛相得衇數者不可下下之必煩利不止傷寒發熱頭痛微汗出發汗則不識人熏之則喘不得小便心腹滿下之則短氣小便難頭痛背强加温鍼則衂下利衇大者虚也以强下之故也設衇浮革因爾腸鳴者屬當歸四逆湯陶隠居名醫别録合藥分劑法則凡言剉如麻豆大者與㕮咀同意夫㕮咀古之制也古人無鐡刀以口咬細令如麻豆為柤藥煎之使藥水清飲於腸中則易升易散今人以刀剉如麻豆大此㕮咀之易成也古秤惟有銖兩而無分名今則以十黍為一銖每銖約今四分一釐七亳六銖為一分去聲四分成一兩十六兩為一觔李杲曰六銖為一分即今之二錢半也二十四銖為一兩古云三兩即今之一兩云二兩即今之六錢半也今方家云等分者非分兩之分謂諸藥觔兩多少皆同爾多是丸散用之丸散云刀圭者十分平聲方寸匕之一准如梧桐子大也方寸匕者作匕正方一寸抄散取不落為度五匕者即今五銖錢邊五字者抄之不落為度一撮者四刀圭也匕即匙也藥以升合分者謂藥有虛實輕重不得用觔兩則以升平之十撮為一勺十勺為一合十合為一升升方作上徑一寸下徑六分深八分内散藥物按抑之正爾微動令平爾李時珍曰古之一升即今之二合半也凡方云巴豆若干枚者粒有大小當去心皮柞之以一分准十六枚附子烏頭若干枚者去皮畢以半兩准一枚枳實若干枚者去穰畢以一分准二枚橘皮一分准三枚棗大小三枚准一兩乾薑一累者以一兩為正凡方云半夏一升者洗畢稱五兩為正蜀椒一升三兩為正呉茱萸一升五兩為正莬絲子一升九兩為正菴䕡子一升四兩為正蛇牀子一升三兩半為正地膚子一升四兩為正其子各有虛實輕重不可稱准者取平升為正凡方云用桂一尺者削去皮重半兩為正甘草一尺者二兩為正云某草一束者三兩為正云一把者二兩為正凡煎湯藥初欲微火令小沸其水數依方多少大略藥二十兩用水一斗者煮取四升以此為凖然利湯欲生少水而多取汁補湯欲熟多水而少取汁服湯宜小沸熱則易下冷則嘔涌凡云分再服三服者要令勢令相及并視人之强弱羸瘦病之輕重為之進退増減不必局於方說則活潑潑地也凡丸藥云如細麻者即胡麻也不必扁扁略相稱爾黍粟亦然云如大麻子者准三細麻也如胡豆者即今青斑豆也以二大麻准之如小豆者今赤小豆也以三大麻准之如大豆者以二小豆准之如梧桐子者以二大豆准之如彈丸及雞子黄者以四十梧子准之凡方云蜜一觔者有七合猪膏一觔者有一升二合也膀胱足太陽之衇起於目内眥上額交巔其直者從巔入絡腦還出别下項循肩髆内俠脊抵腰中入循膂絡腎屬膀胱其直者從腰中下俠脊貫臀入膕中其支者從髆内左右别下貫脾俠脊内過髀樞循髀外從後廉下合膕中以下貫腨内出外踝之後循京骨至小指外側胃足陽明之衇起於鼻之交頞中旁約太陽之衇下循鼻外入上齒中還出俠口環脣下交承漿却循頤後下廉出大迎循頰車上耳前過客主人循髪際至額顱其支者從大迎前下人迎循喉嚨入缺盆下膈屬胃絡脾其直者從缺盆下乳内廉下挾臍入氣街中其支者起於胃下口循腹裏下至氣街中而合以下髀闗抵伏免下膝臏中下循脛外㢘下足跗入中指外間其支者下㢘穴三寸而别下入中指外間其支者别跗上入大指間出其端膽足少陽之衇起於目銳眥上抵頭角下耳後循頸行手少陽之前至肩上却交出手少陽之後入缺盆其支者從耳後入耳中出走耳前至目銳眥後其支者别銳眥下大迎合手少陽抵於䪼下加頰車下頸合缺盆以下胸中貫膈絡肝屬膽循脅裏出氣街繞毛際横入髀厭中其直者從缺盆下腋循胸過季脅下合髀厭中以下循髀陽出膝外廉下外輔骨之前直下抵絶骨之端下出外踝之前循足跗上入小指次指之間其支者别跗上入大指之間循大指岐骨内出其端還貫爪甲出三毛脾足太陰之衇起於大指之端循指内側白肉際過核骨後上内踝前廉上腨内循脛骨後交出厥隂之前上膝股内前廉入腹屬脾絡胃上膈挾咽連舌本散舌下其支者復從胃别上膈注心中腎足少隂之衇起於小指之下斜趨足心之湧泉穴出於然谷之下循内踝之後别入跟中以上腨内出膕内亷上股内後亷貫脊屬腎絡膀胱其直者從腎上貫肝膈入肺中循喉嚨挾舌本其支者從肺出絡心注胸中肝足厥隂之衇起於大指聚毛之上上循足跗上亷去内踝一寸上踝入寸交出太隂之後上膕内亷循股隂入毛中過隂器抵小腹俠胃屬肝絡膽上貫膈布脇循喉嚨之後上入頏顙連目系上出額與督衇㑹於巔其支者從目系下頰裏環脣内其支者復從肝别貫膈上注肺太陽病初服桂枝湯反煩不解者先刺風池風府却與桂枝湯則愈按風池穴在顳顬後顳顬腦空穴也後者謂俠玉枕傍骨下髪際内大筋外陷中按之引耳中是也足少陽陽維之㑹宜刺三分肌肉厚者可五分留七呼禁灸風府一穴在項髪際上一寸大筋内宛宛中疾言其肉立起言休立下是其穴也督衇陽維之會宜刺三分肌肉薄者只二分候病人呼氣即出禁灸太陽之邪刺足少陽督衇者何也蓋以風府在頭部中行風池在第三行太陽在第二行則風池風府實俠太陽經而行者也况二穴皆為陽維之㑹陽維者謂諸陽之總也刺之諸陽之氣得泄何患太陽之邪不去哉太陽病頭痛至七日已上自愈者以行其經盡故也若欲作再經者鍼足陽明使經不傳則愈按仲景云鍼足陽明成註未明指其穴考之龎氏總病論云補足陽明上三里穴推其意得補則經氣實而不傳殊不知仲景之意鍼足陽明爲迎而奪之以泄其經之熱使熱邪得泄不至再傳他經故云愈也龎氏不明用鍼之理以泄為補恐誤矣又考張氏纉論云刺足陽明衝陽穴衝陽者即仲景所謂趺陽衇也有診法而不言刺張氏之言實本史氏傷寒論註不足法也三里二穴在膝眼下三寸胻骨外廉兩筋間宛宛中坐而豎膝低跗取之極重按之則跗上動衇即止是其穴也可刺五分留七呼傷寒腹滿讝語寸口衇浮而緊此肝乘脾也名曰縱刺期門傷寒發熱嗇嗇惡寒大渴欲飲水其腹必滿自汗出小便利其病欲解此肝乘肺也名曰横刺期門婦人中風發熱惡寒經水適來得之七八日熱除而衇遲身凉胸脇下滿如結胸狀讝語者此為熱入血室也當刺期門隨其實而瀉之陽明病下血讝語者此為熱入血室但頭汗出者刺期門隨其實而瀉之濈然汗出則愈太陽與少陽併病頭項强痛或眩冒時如結胸心下痞鞕者當刺大椎第一間肺俞肝兪慎不可發汗發汗則讝語衇弦五六日讝語不止當刺期門按圖經云期門二穴在不容傍一寸五分乳直下第二肋骨端近腹處是其穴也第二肋者從下數至第二肋也肋骨端者在軟肋骨末之端也刺四分肥人量之太陽與少陽併病頭項强痛或眩冒時如結胸心下痞鞕者當刺大椎第一間肺俞肝俞慎不可發汗發汗則讝語衇弦五六日讝語不止當刺期門太陽少陽併病心下鞕頸項强而眩者當刺大椎肺俞肝俞慎勿下之按圖經云督衇大椎穴在第一椎上陷中可刺五分留三呼泄五吸肺俞二穴在第三椎下兩傍相去各一寸五分可刺三分留七呼得氣即泄肥人可刺五分肝俞二穴在第九椎下兩傍相去各一寸五分可刺三分留六呼仲景太陽少陽併病乃合邪也故刺大椎肺俞肝俞亦合泄之法也少隂病得之二三日口中和其背惡寒者當灸之附子湯主之按當灸之仲景未言灸何穴常器之云當是足太陽鬲闗二穴專灸背惡寒其穴在第七椎下兩傍相去各三寸陷中正坐取之可灸五壯蓋以太陽為少隂之表故外灸鬲闗以温其表内用附子以温其裏也少隂病吐利手足不厥冷反發熱者不死衇不至灸少隂七壯按灸少隂七壯仲景未言灸何穴常噐之云當灸少隂太谿二穴經曰腎之原出於太谿其穴在内踝後跟骨動衇陷中少隂病下利便膿血者可刺按可刺仲景未言可刺何穴常器之云可刺足少隂幽門交信郭雍曰可灸考幽門二穴在鳩尾下一寸巨闕兩傍各五分陷者中治瀉利膿血刺五分灸五壯交信二穴在内踝上二寸少隂前太隂後亷筋骨間治瀉利赤白刺四分留五呼灸三壯兩說皆是少隂病下利衇微濇嘔而汗出必數更衣反少者當温其上灸之按灸之仲景未言當灸何穴常器之云灸太衝郭雍云灸太谿此穴皆不治嘔而汗出裏急下利惟幽門主治乾噦嘔吐裏急下利亦當灸幽門為是傷寒六七日衇微手足厥冷煩燥灸厥隂厥不還者死按灸厥隂仲景未言當灸何穴常器之云可灸太衝以太衝二穴為足厥隂之所注凡病診太衝衇可决人之生死其穴在足大指本節後二寸跗間陷者中動衇應手是其穴也灸三壯傷寒衇促手足厥逆者可灸之按可灸之仲景未言當灸何穴常器之云太衝穴前條手足厥逆灸太衝此條亦手足厥逆亦當灸太衝御纂醫宗金鑑卷十七
