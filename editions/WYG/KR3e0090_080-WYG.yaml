衞之胞也目綱註目綱者即上下目胞之兩瞼邊又名曰睫司目之開闔也目内眥註目内眥者乃近鼻之内眼角以其大而圓故又名大眥也目外眥註目外眥者乃近鬢前之眼角也以其小而尖故稱目鋭眥也目珠註目珠者目睛之俗名也目系註目系者目睛入腦之系也目眶骨註目眶者目窠四圍之骨也上曰眉棱骨下即䪼骨䪼骨之外即顴骨䪼註目下之眶骨顴骨内下連上牙床者也頞註頞者鼻梁即山根也鼻註鼻者司臭之竅也兩孔之界骨名曰鼻柱下至鼻之盡處名曰凖頭頄註頄者䪼内鼻間近生門牙之骨也顴註顴者面兩旁之髙起大骨也顑註顑者俗呼為腮口旁頰前肉之空軟處也耳註耳者司聴之竅也蔽註蔽者耳門也耳郭註耳郭者耳輪也頰註頰耳前顴側面兩旁之稱也曲頰註曲頰者頰之骨也曲如環形受頰車骨尾之鈎者也頰車註頰車者下牙床骨也總載諸齒能咀食物故名頰車人中註人中者鼻柱之下脣之上穴名水溝口註口者司言食之竅也脣註脣者口端也吻註吻者口之四周也頤註頤者口角後顑之下也頦註頦者口之下脣至末之處俗名下把殻也頷註頷者頦下結喉上兩側肉之空軟處也齒註齒者口齗所生之骨也俗名曰牙有門牙虎牙槽牙上下盡根牙之别舌註舌者司味之竅也舌本註舌本者舌之根也頏顙註頏顙者口内之上二孔司分氣之竅也懸雍垂註懸雍垂者張口視喉上似乳頭之小舌俗名碓嘴㑹厭註㑹厭者覆喉管之上竅似皮似膜發聲則開嚥食則閉故為聲音之户也咽註咽者飲食之路也居喉之後喉註喉者通聲息之路也居咽之前喉嚨註喉嚨者喉也肺之系也嗌註嗌者咽也胃之系也結喉註結喉者喉之管頭也其人痩者多外見頸前肥人則隠於肉内多不見也胸膺註胸者缺盆下腹之上有骨之處也膺者胸前兩旁髙處也一名曰臆胸骨肉也俗名胸膛􅐳骭註􅐳骭者胸之衆骨名也乳註乳者膺上突起兩肉有頭婦人以乳兒者也鳩尾註鳩尾者即蔽心骨也其質係脆骨在胸骨之下岐骨之間膈註膈者胸下腹上之界内之膜也俗名羅膈腹註腹者膈之下曰腹俗名曰肚臍之下曰少腹亦名小腹臍註臍者人之初生胞蔕之處也毛際註毛際者小腹下横骨間叢毛之際也下横骨俗名葢骨簒註簒者横骨之下兩股之前相合共結之凹也前後兩隂之間名下極穴又名屏翳穴㑹隂穴即男女隂氣之所也睾丸註睾丸者男子前隂兩丸也上横骨註上横骨在喉前宛宛中天突穴之外小灣横骨旁接拄骨之骨也拄骨註拄骨者膺上缺盆之外俗名子骨也内接横骨外接肩解也肩解註肩解者肩端之骨節解處也髃骨註髃骨者肩端之骨也即肩胛骨頭臼之上棱骨也其臼接臑骨上端俗曰肩頭其外曲卷翅骨肩後之棱骨也其下棱骨在背肉内肩胛註肩胛者即髀骨之末成片骨也亦名肩髆俗名鍁板子骨臂註臂者上身兩大支之通稱也一名曰肱俗名肐膊肐膊中節上下骨交接處名曰肘肘上之骨曰臑骨肘下之骨曰臂骨臂骨有正輔二骨輔骨在上短細偏外正骨居下長大偏内俱下接腕骨也腕註腕者臂掌骨接交處以其宛屈故名也當外側之骨名曰髙骨一名鋭骨亦名踝骨掌骨註掌者手之衆指之本也掌之衆骨名壅骨合凑成掌非塊然一骨也魚註魚者在掌外側之上隴起其形如魚故謂之魚也手註手者上體所以持物也手心註手心者即掌之中也手背註手背者手之表也指骨註指者手指之骨也第一大指名巨指在外二節本節在掌第二名食指又名大指之次指三節在外本節在掌第三中指名將指三節在外本節在掌第四指名無名指又名小指之次指三節在外本節在掌第五指為小指三節在外本節在掌其節節交接處皆有碎骨筋膜聫絡爪甲註爪甲者指之甲也足趾同岐骨註岐骨者凡骨之兩叉者皆名岐骨手足同臑註臑者肩髆下内側對腋處髙起耎白肉也腋註腋者肩之下脇之上際俗名肐肢窩脇肋註脇者腋下至肋骨盡處之統名也曰肋者脇之單條骨之謂也統脇肋之總又名曰胠季脇註季脇者脇之下小肋骨俗名軟肋䏚註䏚者脇下無肋骨空軟處也腦後骨註腦後骨者俗呼腦杓枕骨註枕骨者腦後骨之下隴起者是也其骨或棱或平或長或圓不一完骨註耳後之棱骨名曰完骨在枕骨下兩旁之棱骨也頸項註頸項者頸之莖也又曰頸者莖之側也項者莖之後也俗名脖項頸骨註頸者頭之莖骨肩骨上際之骨俗名天柱骨也項骨註項骨者頭後莖骨之上三節圓骨也背註背者後身大椎以下腰以上之通稱也膂註膂者夾脊骨兩旁肉也脊骨註脊骨者脊膂骨也俗名脊樑骨腰骨註腰骨者即脊骨十四椎下十五十六椎間尻上之骨也其形中凹上寛下窄方圓二三寸許兩旁四孔下接尻骨上際也胂註胂者腰下兩旁髁骨上之肉也臀註臀者胂下尻旁大肉也凥骨註尻骨者腰骨下十七椎十八椎十九椎二十椎二十一椎五節之骨也上四節紋之旁左右各四孔骨形内凹如瓦長四五寸許上寛下窄末節更小如人參蘆形名尾閭一名骶端一名橛骨一名窮骨在肛門後其骨上外兩旁形如馬蹄附着兩髁骨上端俗名骻骨肛註肛者大腸下口也下横骨髁骨楗骨註下横骨在少腹下其形如葢故名葢骨也其骨左右二大孔上兩分出向後之骨首如張扇下寸許附著於尻骨之上形如馬蹄之處名曰髁骨下兩分出向前之骨末如楗柱在於臀内名曰楗骨與尻骨成鼎足之勢為坐之主骨也婦人俗名交骨其骨面名曰髖俠髖之臼名曰機又名髀樞外接股之髀骨也即環跳穴處此一骨五名也股註股者下身兩大支之通稱也俗名大腿小腿中節上下交接處名曰膝膝上之骨曰髀骨股之大骨也膝下之骨曰胻骨脛之大骨也髀骨註髀者膝上之大骨也上端如杵接於髀樞下端如鎚接於胻骨也胻骨註胻骨者俗名臁脛骨也其骨兩根在前者名成骨又名骭骨形粗膝外突出之骨也在後者名輔骨形細膝内側之小骨也伏註伏者髀骨前膝之上起肉似俯故曰伏膝解註膝解者膝之節解也臏骨註臏骨者膝上葢骨也連骸註連骸者膝外側二髙骨也膕註膕者膝後屈處俗名腿凹也腨註腨者下腿肚也一名腓腸俗名小腿肚踝骨註踝者胻骨之下足附之上兩旁突出之髙骨在外為外踝在内為内踝也足註足者下體所以趨走也俗名脚跗骨註跗者足背也一名足趺俗稱脚面跗骨者足趾本節之衆骨也足心註足心者即踵之中也跟骨註跟足後根之骨也趾註趾者足之指也其數五名為趾者别於手也居内之大者名大趾第二趾名大趾之次趾第三趾名中趾第四名小趾之次趾第五居外之小者名小趾足之指節與手指節同其大趾之本節後内側圓骨形突者名核骨三毛註足大趾爪甲後為三毛毛後横紋為聚毛踵註踵者足下面著於地之謂也俗名脚底板骨度尺寸頭部項髮以下至背骨長二寸半自後髮際以至大椎項骨三節處也按頭部折法以前髮際至後髮際折為一尺二寸如髮際不明則取眉心直上後至大杼骨折作一尺八寸此為直寸横寸法以眼内角至外角此為一寸頭部横直寸法並依此督衇神庭至太陽曲差穴曲差至少陽本神穴本神至陽明頭維穴各開一寸半自神庭至頭維各開四寸半胸腹部結喉以下至缺盆中長四寸此以巨骨上陷中而言即天突穴處缺盆以下􅐳骭之中長九寸胷圍四尺五寸兩乳之間廣九寸半當折八寸為當􅐳骭中下至天樞長八寸天樞足陽明穴名在臍旁此指平臍而言天樞以下至横骨長六寸半横骨横長六寸半毛際下骨曰横骨按此古數也以今用上下穴法㕘較多有未合宜從後胷腹折法為當兩髀之間廣六寸半此當兩股之中横骨兩頭之處俗名髀縫按胷腹折法直寸以中行為之自缺盆中天突穴起至岐骨際上中庭穴止折作八寸四分自􅐳骭上岐骨際下至臍心折作八寸臍心下至毛際曲骨穴折作五寸横寸以兩乳相去折作八寸胷腹横直寸法并依此背部膂骨以下至尾骶二十一節長三尺膂骨脊骨也脊骨外小而内巨人之所以能負任者以是骨之巨也脊骨二十四節今云二十一節者除項骨三節不在内尾骶骨男子者尖女人者平腰圍四尺二寸按背部折法自大椎至尾骶通折三尺上七節各長一寸四分一釐共九寸八分七釐中七節各一寸六分一釐共一尺一寸二分七釐第十四節與臍平下七節各一寸二分六釐共八寸八分二釐共二尺九寸九分六釐不足四釐者有零未盡也直寸依此横寸用中指同身寸法脊骨内濶一寸凡云第二行俠脊一寸半三行俠脊三寸者皆除脊一寸外浄以寸半三寸論故在二行當為二寸在三行當為三寸半也側部自拄背下行腋中不見者長四寸拄骨頸項根骨也腋以下至季脇長一尺二寸季脇小肋也季脇以下至髀樞長六寸大腿曰股股上曰髀楗骨之下大腿之上兩骨合縫之所曰髀樞當足少陽環跳穴處也髀樞下至膝中長一尺九寸横骨上廉下至内輔之上廉長一尺八寸骨際曰廉膝旁之骨突出者曰輔骨内曰内輔外曰外輔内輔之上廉以下至下廉長三寸半上廉下廉可摸而得内輔下廉下至内踝長一尺二寸内踝以下至地長三寸四肢部肩至肘長一尺七寸肘至腕長一尺二寸半臂之中節曰肘腕至中指本節長四寸臂掌之交曰腕本節至末長四寸半指之後節曰本節膝以下至外踝長一尺六寸膝膕以下至跗屬長一尺二寸膕腿灣也跗足面也膝在前􅀈在後跗屬者凡兩踝前後脛掌所交之處皆為跗之屬也跗屬以下至地長三寸外踝以下至地長一寸足長一尺二寸廣四寸半按骨度乃靈樞經骨度篇文所論之長短皆古數也然骨之大者太過小者不及此亦但言其則耳至於周身手足折量之法當用前中指同身寸法為是頭部頂中中行凡一穴百㑹屬督衇頭部前中行凡四穴神庭上星顖㑹前頂俱屬督衇兩旁第二行左右凡八穴曲差五處承光通天俱足太陽穴兩旁第三行左右凡六穴臨泣目窻正營俱足少陽穴正面部中行凡五穴素髎水溝兑端齗交俱督衇穴承漿任衇穴兩旁第二行左右凡十穴攅竹睛明俱足太陽穴迎香禾髎俱手陽明穴巨髎足陽明穴兩旁第三行左右凡十穴陽白足少陽穴承泣四白地倉大迎俱足陽明穴兩旁第四行左右凡八穴本神童子髎俱足少陽穴絲竹空手少陽穴頸部中行凡二穴廉泉天突俱屬任衇胸部中行凡七穴天突璇璣華葢紫宫玉堂膻中中庭俱任衇兩旁第二行左右凡十二穴去中行任衇二寸俞府彧中神藏靈墟神封步廊俱足少隂兩旁第三行左右凡十二穴自氣户夾俞府旁二寸去中行四寸氣户庫房屋翳膺窻乳中乳根俱足陽明兩旁第四行左右凡十二穴自雲門夾氣户旁二寸去中行六寸雲門中府俱手太隂周榮胸鄉天谿食竇俱足太隂腹部中行凡十五穴鳩尾巨闕上脘中脘建里下脘水分神闕隂交氣海石門闗元中極曲骨㑹隂俱任衇兩旁第二行左右凡二十二穴自幽門夾巨闕兩旁各半寸循衝衇下行至横骨幽門通谷隂都石闗商曲肓俞中柱四滿氣穴大赫横骨俱足少隂兩旁第三行左右凡二十六穴自不容夾幽門兩旁各一寸五分去中行二寸不容承滿梁門闗門太乙滑肉門天樞外陵大巨水道歸來氣衝俱足陽明急衇足厥隂穴夾氣衝旁各半寸去中行二寸半兩旁第四行左右凡十四穴自期門上直兩乳夾不容旁各一寸五分去中行三寸半期門足厥隂日月足少陽腹哀大横腹結府舍衝門俱足太隂頭部後中行凡五穴後頂强間腦户風府瘂門俱屬督衇兩旁第二行左右凡六穴絡却玉枕天柱俱足太陽穴兩旁第三行左右凡六穴承靈腦空風池俱足少陽穴兩旁第四行左右凡四穴完骨足少陽穴天牖手少陽穴背部中行凡十四穴大椎陶道身柱神道靈臺至陽筋縮中樞脊中懸樞命門陽闗腰俞長强俱督衇兩旁第二行左右凡十四穴大杼風門肺俞厥隂俞心俞膈俞肝俞膽俞脾俞胃俞三焦俞腎俞大腸俞小腸俞膀胱俞中膂俞白環俞上俱夾脊去中行二寸上髎次髎中髎下髎上俱夾脊骨兩旁十七十八十九二十椎空中㑹陽夾尻骨兩旁上俱足太陽穴兩旁第三行左右凡二十八穴去脊中行三寸五分附分􅅎户膏肓俞神堂譩譆膈闗魂門陽綱意舍胃倉肓門志室胞盲秩邊俱足太陽側頭部左右凡二十八穴頭維足陽明穴頷厭懸顱懸釐曲鬢率谷天衝浮白竅隂俱足少陽穴角孫顱息瘈衇翳風絲竹俱手少陽穴側面部左右凡十四穴客主人聴㑹俱足少陽和髎耳門俱手少陽聴宫手太陽下闗頰車俱足陽明穴側項部左右凡十四穴人迎嬰筋之前水突氣舍俱足陽明穴扶突嬰筋之後天鼎俱手陽明天窻扶突後天容俱手太陽穴肩膊部左右凡十二穴巨骨肩髃臂臑俱手陽明肩井足少陽穴肩髎臑㑹俱手少陽穴側腋脇肋部左右凡二十穴淵液輒筋俱足少陽天池手厥隂大包足太陽章門足厥隂京門帶衇五樞維道居髎俱足少陽附兩手竒俞穴左右凡六穴拳尖在中指本節前骨尖上握拳取之五虎一在手食指背閒一在無名指背閒皆在次節三節相接骨尖上各一穴握拳取之手三隂經總穴名手太隂肺經行臂内凡九穴左右同起手大指端行三隂之上少商魚際太淵經渠列缺孔最尺澤俠白天府手厥隂心包絡經行臂内凡八穴左右同起手中指端行三隂之中中衝勞宫大陵内闗間使郗門曲澤天泉手少隂心經行臂内凡九穴左右同起手小指内側端行三隂之下少衝少府神門隂郗通里靈道少海青靈極泉手三陽經總穴名手陽明大腸經行臂外凡十四穴左右同起手食指端行三陽之上商陽二閒三閒合谷陽谿偏歴温溜下廉上廉三里曲池肘髎五里臂臑手少陽三焦經行臂外凡十二穴左右同起手無名指端行三陽之中闗衝液門中渚陽池外闗支溝㑹宗三陽絡四瀆天井清泠淵消濼手太陽小腸經行臂外凡八穴左右同起手小指外側端行三陽之下少澤前谷後谿腕骨陽谷養老支正小海足三隂經總穴名足厥隂肝經行足股内凡十一穴左右同起足大指端行三隂之前大敦行閒太衝中封蠡溝中都膝闗曲泉隂包五里隂廉足太隂脾經行足股内凡十一穴左右同起足大指内側端行三隂之中隠白大都太白公孫商邱三隂交漏谷地機隂陵泉血海箕門足少隂腎經行足股内凡十穴左右同起足心行三隂之後湧泉然谷太谿大鍾照海水泉復溜交信築賔隂谷足三陽經總穴名足陽明胃經行足股外凡十五穴左右同起足三指端行三陽之前厲兑内庭陷谷衝陽解谿豐隆下巨虚條口上巨虚三里犢鼻梁邱隂市伏髀關足少陽膽經行足股外凡十五穴左右同起足四指端行三陽之中竅隂俠谿地五㑹臨泣邱墟懸鍾陽輔光明外邱陽交陽陵泉陽闗中瀆環跳風市足太陽膀胱經行足股後凡十九穴左右同起足小指外側端行三陽之後至隂通谷束骨京骨京門申衇僕參崑崙附陽飛陽承山承筋合陽委中委陽浮郗殷門承扶㑹陽御纂醫宗金鑑卷八十
