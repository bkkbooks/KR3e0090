body:
  text: 訂正仲景全書傷寒論註霍亂篇目錄四逆加人參湯御纂醫宗金鑑卷十四目録欽定四庫全書御纂醫宗金鑑卷十四訂正仲景全書傷寒論註霍亂篇目錄四逆加人參湯御纂醫宗金鑑卷十四目録欽定四庫全書御纂醫宗金鑑卷十四訂正仲景全書傷寒論註辨霍亂病衇證并治篇霍亂者因風寒暑熱飲食生冷之邪雜揉交病於中正不能堪一任邪之揮霍撩亂故令三焦混淆清濁相干亂於腸胃也表甚則有頭痛身痛發熱惡寒之證裏甚則有嘔吐瀉利腹中大痛之證寒甚則轉筋厥逆冷汗暑甚則大渴引飲不已病既不同治亦各異惟在詳審其因分而療之庶卒然之頃不致有誤矣問曰病有霍亂者何答曰嘔吐而利此名霍亂註問曰病有霍亂者其狀何似答曰卒然嘔吐㵼利者是名霍亂也集註成無己曰三焦者水穀之道路邪在上焦則吐而不利在下焦則利而不吐在中焦必旣吐且利以飲食不節寒熱不調清濁相干陰陽乖隔而成霍亂輕者袛曰吐㵼重者揮霍撩亂故曰霍亂問曰病發熱頭痛身疼惡寒吐利者此屬何病答曰此名霍亂自吐下又利止復更發熱也註此承上條以詳出其證也頭痛身疼發熱惡寒在表之風寒暑熱為病也嘔吐㵼利在裏之飲食生冷為病也具此證者名曰霍亂若自嘔吐已又㵼利止仍有頭痛身疼惡寒更復發熱是裏解而表不解也宜用藿香正氣湯或香薷飲散而和之可也若不頭痛身疼惡寒吐㵼汗出發熱渴而引飲是表解而裏未解也宜辰砂六一散或白虎加人參湯補而清之可也集註方有執曰發熱頭痛身疼惡寒外感也吐利内傷也上以病名求病證此以病證實病名反覆詳明之意程應旄曰霍亂之證僅見嘔吐而利誰不知責重中焦者若病有發熱頭痛身疼惡寒夾此吐利而來表裏之間倉卒難辨故從屬定名破去傷寒之稱名曰霍亂不欲人以表惑裏也沈明宗曰吐利已止復更發熱乃裏氣和而表邪未解當從解表之法或無表證但有腹痛吐利此為裏邪未解當以和裏為主傷寒其衇微濇者本是霍亂今是傷寒却四五日至陰經上轉入陰必利本嘔下利者不可治也欲似大便而反失氣仍不利者此屬陽明也便必鞕十三日愈所以然者經盡故也註此承上條辨發熱頭痛身疼惡寒吐利等證為類傷寒之義也若有前證而衇浮緊是傷寒也今衇微濇本是霍亂也然霍亂初病卽有吐利傷寒吐利却在四五日後邪傳入陰經之時始吐利也此本是霍亂之即嘔吐為下利故不可作傷寒治之俟之自止也若止後似欲大便而去空氣仍不大便此屬陽明也然屬陽明者大便必鞕雖大便鞕乃傷津液之鞕未可下也當俟至十三日經盡胃和津回便利自可愈矣若過十三日大便不利為之過經不解下之可也集註魏荔彤曰此申解霍亂病似乎傷寒應為辨明孰為傷寒之吐利孰為霍亂之吐利以定治法無誤也傷寒中之吐利有六經形證而霍亂中之吐利有表裏陰陽俱應一一辨明方有確見而不搖惑也下利後當便鞕鞕則能食者愈今反不能食到後經中頗能食復過一經能食過之一日當愈不愈者不屬陽明也註此申上條下利後便必鞕之義也凡下利後腸胃空虛津液匱乏當大便鞕鞕則能食者是為胃氣復至十三日津回便利自當愈也今反不能食是為胃氣未復俟到十三日後過經之日若頗能食亦當愈也如其不愈是為當愈不愈也當愈不愈者則可知不屬十三日過經便鞕之陽明當屬吐利後胃中虛寒不食之陽明或屬吐利後胃中虛燥之陽明也此則非藥不可俟之終不能自愈也理中脾約擇而用之可矣集註張璐曰若利止而不能食邪熱去而胃氣空虛也俟過一經胃氣漸復自能食矣霍亂頭痛發熱身疼痛熱多欲飲水者五苓散主之寒多不用水者理中丸主之註霍亂者水飲内發故吐㵼交作也風寒外襲故頭痛發熱身疼痛也熱多欲飲水者是飲熱也主五苓散以兩解其飲熱若不欲飲水者是中寒也主理中丸以獨温其中理中丸即理中湯和劑作丸也集註方有執曰霍亂熱多欲飲水者陽邪盛也寒多不用水者陰邪盛也五苓散者水行則熱㵼是亦兩解之謂也理治也料理之謂中裏也裏陰之謂參术之甘温裏也甘草甘平和中也乾薑辛熱散寒也沈明宗曰此言霍亂須分寒熱而治也頭痛發熱身疼痛者風寒傷於表也外風而挾内熱飲食以致吐利必欲飲水當以五苓散兩解表裏使邪從汗出裏邪卽從小便而去不欲飲水者寒多無熱胃陽氣虛當以理中丸溫中散寒為主此以表裏寒熱辨證治病也吐利止而身痛不休者當消息和解其外宜桂枝湯小和之註霍亂吐利已止而身痛不休者此裏和而表未和當消息輕重以治之故宜桂枝湯小汗以和其外也集註方有執曰吐利止裏和也身痛表退而新虛也消息猶言斟酌也桂枝湯固衞以和表也小和言少少與服不令過度之意也程應旄曰吐利俱止毫無霍亂證矣僅是身痛不休方可從桂枝例一和解其外以其中有芍藥之寒故猶當消息猶曰小和况吐利未止敢恣意於寒涼也哉張錫駒曰本經凡言小和微和者謂微邪而毋庸大攻也既吐且利小便復利而大汗出下利清穀内寒外熱衇微欲絶者四逆湯主之註霍亂之為病旣吐且利津液内亡小便當少而無汗今小便復利而大汗出下利清穀衇微欲絶者是外之陽虛不能固䕶内之陰寒獨盛於中内真寒而外假熱也故不用理中而以四逆主之也集註成無己曰吐利亡津液則小便當少小便復利而大汗出津液不禁陽氣大虛也衇微為亡陽若無外熱但内寒下利清榖為純陰證此以外熱為陽未絶猶可與四逆湯救之吳人駒曰旣吐且利而大汗出則泄路盡開而小便又復利云復利者反不欲其利而為收藏之地也下利清穀内寒外熱且衇微欲絶一綫之微陽挽回誠為不易四逆之施詎可緩乎吐利汗出發熱惡寒四肢拘急手足厥冷者四逆湯主之註霍亂吐利汗出發熱惡寒四肢拘急手足厥冷者乃中外皆寒之證也宜四逆湯助陽以勝陰也集註方有執曰吐利四肢拘急手足厥冷裏陰盛也汗出發熱惡寒表陽虛也宜四逆湯中外合救之劑也程知曰吐利而復汗出陽氣幾於走失矣發熱惡寒為陽未盡亡四肢拘急手足厥冷不得不用四逆以助陽退陰也又按少陰證云惡寒身踡而利手足厥冷者不治又云下利惡寒而踡卧手足溫者可治此之吐利汗出四肢拘急手足厥冷而用四逆治之者以有發熱一證也發熱為陽未盡亡猶是病人生機故經又曰吐利手足不逆冷反發熱者不死吐已下斷汗出而厥四肢拘急不解衇微欲絶者通衇四逆加猪膽汁湯主之註霍亂吐下已止汗出而厥四肢拘急衇微欲絶者乃中寒盛極阻格陽氣不達於四肢也宜通衇四逆湯加猪膽汁從隂以通陽也集註成無己曰吐已下斷津液内竭則不當汗出而厥今汗出而厥四肢拘急不解衇微欲絶者陽氣大虛陰氣獨盛也若純與陽藥恐陰為格拒或嘔或躁不得復入也與通衇四逆湯加猪膽汁膽苦入心而通衇膽寒補肝而和陰引陽藥使不被格拒内經曰微者逆之甚者從之此之謂也方有執曰已止也下即利也斷絶也言吐利兩皆止絶而又以其餘證之不解者更出其治也惡寒衇微而復利利止亡血也四逆加人參湯主之按利止亡血如何用大熱補藥利止當是利不止亡血當是亡陽註霍亂吐下已止若惡寒衇微而復利利不止者是陽氣虛也宜四逆加人參益其陽補其氣也集註林瀾曰霍亂要在審察寒熱而治若果夏月中暑霍亂衇虛小便赤少不可用附子乾薑須仔細辨之利止衇微而惡寒乃可用耳又曰中暑霍亂祗宜五苓散加香薷萹荳葛根薑汁炒黄連之類治之四逆加人參湯方於四逆湯方内加人參一兩餘依四逆湯法吐利發汗衇平小煩者以新虛不勝穀氣故也註霍亂吐已利斷汗出已止衇平和者内外俱解也法當食食之小煩者以吐下後新虛不勝穀氣故也節其飲食自可愈矣集註鄭重光曰吐利發汗衇平陰退陽回乃有此象猶以新虛不勝穀氣而致小煩蓋霍亂吐利晬時不可便與飲食以胃氣逆反倉廪未固不可便置米穀耳張錫駒曰霍亂一病夏秋最多是風寒暑濕之邪中人皆能病霍亂非止一寒邪也若吐利過甚損傷中焦之氣以致陰陽間隔手足厥冷衇微欲絶不多飲水者無分寒暑皆宜四逆理中治之蓋邪盛而正實者當㵼其邪邪盛而正衰者宜扶其正况夏月之時陽氣浮於外陰氣伏於内復以冷風寒其形冷水寒其胃内外皆寒風暑之邪未有不乗虛入於陰經者所以夏月祗有陰證而無傷寒今人患暑證死而手足指甲皆靑者陰證也古人以大順散治暑良有以也御纂醫宗金鑑卷十四欽定四庫全書御纂醫宗金鑑卷十四訂正仲景全書傷寒論註辨霍亂病衇證并治篇霍亂者因風寒暑熱飲食生冷之邪雜揉交病於中正不能堪一任邪之揮霍撩亂故令三焦混淆清濁相干亂於腸胃也表甚則有頭痛身痛發熱惡寒之證裏甚則有嘔吐瀉利腹中大痛之證寒甚則轉筋厥逆冷汗暑甚則大渴引飲不已病既不同治亦各異惟在詳審其因分而療之庶卒然之頃不致有誤矣問曰病有霍亂者何答曰嘔吐而利此名霍亂註問曰病有霍亂者其狀何似答曰卒然嘔吐㵼利者是名霍亂也集註成無己曰三焦者水穀之道路邪在上焦則吐而不利在下焦則利而不吐在中焦必旣吐且利以飲食不節寒熱不調清濁相干陰陽乖隔而成霍亂輕者袛曰吐㵼重者揮霍撩亂故曰霍亂問曰病發熱頭痛身疼惡寒吐利者此屬何病答曰此名霍亂自吐下又利止復更發熱也註此承上條以詳出其證也頭痛身疼發熱惡寒在表之風寒暑熱為病也嘔吐㵼利在裏之飲食生冷為病也具此證者名曰霍亂若自嘔吐已又㵼利止仍有頭痛身疼惡寒更復發熱是裏解而表不解也宜用藿香正氣湯或香薷飲散而和之可也若不頭痛身疼惡寒吐㵼汗出發熱渴而引飲是表解而裏未解也宜辰砂六一散或白虎加人參湯補而清之可也集註方有執曰發熱頭痛身疼惡寒外感也吐利内傷也上以病名求病證此以病證實病名反覆詳明之意程應旄曰霍亂之證僅見嘔吐而利誰不知責重中焦者若病有發熱頭痛身疼惡寒夾此吐利而來表裏之間倉卒難辨故從屬定名破去傷寒之稱名曰霍亂不欲人以表惑裏也沈明宗曰吐利已止復更發熱乃裏氣和而表邪未解當從解表之法或無表證但有腹痛吐利此為裏邪未解當以和裏為主傷寒其衇微濇者本是霍亂今是傷寒却四五日至陰經上轉入陰必利本嘔下利者不可治也欲似大便而反失氣仍不利者此屬陽明也便必鞕十三日愈所以然者經盡故也註此承上條辨發熱頭痛身疼惡寒吐利等證為類傷寒之義也若有前證而衇浮緊是傷寒也今衇微濇本是霍亂也然霍亂初病卽有吐利傷寒吐利却在四五日後邪傳入陰經之時始吐利也此本是霍亂之即嘔吐為下利故不可作傷寒治之俟之自止也若止後似欲大便而去空氣仍不大便此屬陽明也然屬陽明者大便必鞕雖大便鞕乃傷津液之鞕未可下也當俟至十三日經盡胃和津回便利自可愈矣若過十三日大便不利為之過經不解下之可也集註魏荔彤曰此申解霍亂病似乎傷寒應為辨明孰為傷寒之吐利孰為霍亂之吐利以定治法無誤也傷寒中之吐利有六經形證而霍亂中之吐利有表裏陰陽俱應一一辨明方有確見而不搖惑也下利後當便鞕鞕則能食者愈今反不能食到後經中頗能食復過一經能食過之一日當愈不愈者不屬陽明也註此申上條下利後便必鞕之義也凡下利後腸胃空虛津液匱乏當大便鞕鞕則能食者是為胃氣復至十三日津回便利自當愈也今反不能食是為胃氣未復俟到十三日後過經之日若頗能食亦當愈也如其不愈是為當愈不愈也當愈不愈者則可知不屬十三日過經便鞕之陽明當屬吐利後胃中虛寒不食之陽明或屬吐利後胃中虛燥之陽明也此則非藥不可俟之終不能自愈也理中脾約擇而用之可矣集註張璐曰若利止而不能食邪熱去而胃氣空虛也俟過一經胃氣漸復自能食矣霍亂頭痛發熱身疼痛熱多欲飲水者五苓散主之寒多不用水者理中丸主之註霍亂者水飲内發故吐㵼交作也風寒外襲故頭痛發熱身疼痛也熱多欲飲水者是飲熱也主五苓散以兩解其飲熱若不欲飲水者是中寒也主理中丸以獨温其中理中丸即理中湯和劑作丸也集註方有執曰霍亂熱多欲飲水者陽邪盛也寒多不用水者陰邪盛也五苓散者水行則熱㵼是亦兩解之謂也理治也料理之謂中裏也裏陰之謂參术之甘温裏也甘草甘平和中也乾薑辛熱散寒也沈明宗曰此言霍亂須分寒熱而治也頭痛發熱身疼痛者風寒傷於表也外風而挾内熱飲食以致吐利必欲飲水當以五苓散兩解表裏使邪從汗出裏邪卽從小便而去不欲飲水者寒多無熱胃陽氣虛當以理中丸溫中散寒為主此以表裏寒熱辨證治病也吐利止而身痛不休者當消息和解其外宜桂枝湯小和之註霍亂吐利已止而身痛不休者此裏和而表未和當消息輕重以治之故宜桂枝湯小汗以和其外也集註方有執曰吐利止裏和也身痛表退而新虛也消息猶言斟酌也桂枝湯固衞以和表也小和言少少與服不令過度之意也程應旄曰吐利俱止毫無霍亂證矣僅是身痛不休方可從桂枝例一和解其外以其中有芍藥之寒故猶當消息猶曰小和况吐利未止敢恣意於寒涼也哉張錫駒曰本經凡言小和微和者謂微邪而毋庸大攻也既吐且利小便復利而大汗出下利清穀内寒外熱衇微欲絶者四逆湯主之註霍亂之為病旣吐且利津液内亡小便當少而無汗今小便復利而大汗出下利清穀衇微欲絶者是外之陽虛不能固䕶内之陰寒獨盛於中内真寒而外假熱也故不用理中而以四逆主之也集註成無己曰吐利亡津液則小便當少小便復利而大汗出津液不禁陽氣大虛也衇微為亡陽若無外熱但内寒下利清榖為純陰證此以外熱為陽未絶猶可與四逆湯救之吳人駒曰旣吐且利而大汗出則泄路盡開而小便又復利云復利者反不欲其利而為收藏之地也下利清穀内寒外熱且衇微欲絶一綫之微陽挽回誠為不易四逆之施詎可緩乎吐利汗出發熱惡寒四肢拘急手足厥冷者四逆湯主之註霍亂吐利汗出發熱惡寒四肢拘急手足厥冷者乃中外皆寒之證也宜四逆湯助陽以勝陰也集註方有執曰吐利四肢拘急手足厥冷裏陰盛也汗出發熱惡寒表陽虛也宜四逆湯中外合救之劑也程知曰吐利而復汗出陽氣幾於走失矣發熱惡寒為陽未盡亡四肢拘急手足厥冷不得不用四逆以助陽退陰也又按少陰證云惡寒身踡而利手足厥冷者不治又云下利惡寒而踡卧手足溫者可治此之吐利汗出四肢拘急手足厥冷而用四逆治之者以有發熱一證也發熱為陽未盡亡猶是病人生機故經又曰吐利手足不逆冷反發熱者不死吐已下斷汗出而厥四肢拘急不解衇微欲絶者通衇四逆加猪膽汁湯主之註霍亂吐下已止汗出而厥四肢拘急衇微欲絶者乃中寒盛極阻格陽氣不達於四肢也宜通衇四逆湯加猪膽汁從隂以通陽也集註成無己曰吐已下斷津液内竭則不當汗出而厥今汗出而厥四肢拘急不解衇微欲絶者陽氣大虛陰氣獨盛也若純與陽藥恐陰為格拒或嘔或躁不得復入也與通衇四逆湯加猪膽汁膽苦入心而通衇膽寒補肝而和陰引陽藥使不被格拒内經曰微者逆之甚者從之此之謂也方有執曰已止也下即利也斷絶也言吐利兩皆止絶而又以其餘證之不解者更出其治也惡寒衇微而復利利止亡血也四逆加人參湯主之按利止亡血如何用大熱補藥利止當是利不止亡血當是亡陽註霍亂吐下已止若惡寒衇微而復利利不止者是陽氣虛也宜四逆加人參益其陽補其氣也集註林瀾曰霍亂要在審察寒熱而治若果夏月中暑霍亂衇虛小便赤少不可用附子乾薑須仔細辨之利止衇微而惡寒乃可用耳又曰中暑霍亂祗宜五苓散加香薷萹荳葛根薑汁炒黄連之類治之四逆加人參湯方於四逆湯方内加人參一兩餘依四逆湯法吐利發汗衇平小煩者以新虛不勝穀氣故也註霍亂吐已利斷汗出已止衇平和者内外俱解也法當食食之小煩者以吐下後新虛不勝穀氣故也節其飲食自可愈矣集註鄭重光曰吐利發汗衇平陰退陽回乃有此象猶以新虛不勝穀氣而致小煩蓋霍亂吐利晬時不可便與飲食以胃氣逆反倉廪未固不可便置米穀耳張錫駒曰霍亂一病夏秋最多是風寒暑濕之邪中人皆能病霍亂非止一寒邪也若吐利過甚損傷中焦之氣以致陰陽間隔手足厥冷衇微欲絶不多飲水者無分寒暑皆宜四逆理中治之蓋邪盛而正實者當㵼其邪邪盛而正衰者宜扶其正况夏月之時陽氣浮於外陰氣伏於内復以冷風寒其形冷水寒其胃内外皆寒風暑之邪未有不乗虛入於陰經者所以夏月祗有陰證而無傷寒今人患暑證死而手足指甲皆靑者陰證也古人以大順散治暑良有以也御纂醫宗金鑑卷十四
