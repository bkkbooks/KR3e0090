要訣痘中雜證上卷五十九痘疹心法要訣痘中雜證下男婦年長出痘門疹門證治卷六十種痘心法要旨種痘諸法卷六十一外科心法要訣人身經絡圖歌起至藥筒拔法歌止卷六十二外科心法要訣腫痬主治類方腫痬敷貼類方潰痬主治類方洗滌類方膏藥類方痳藥類方去腐類方生肌類方卷六十三外科心法要訣頭部面部卷六十四外科心法要訣項部背部腰部卷六十五外科心法要訣眼部鼻部耳部口部脣部齒部卷六十六外科心法要訣舌部喉部胸乳部卷六十七外科心法要訣腹部腋部肋部内癰部卷六十八外科心法要訣肩部臑部臂部手部卷六十九外科心法要訣下部臀部卷七十外科心法要訣股部膝部卷七十一外科心法要訣脛部足部卷七十二外科心法要訣發無定處上卷七十三外科心法要訣發無定處中卷七十四外科心法要訣發無定處下卷七十五外科心法要訣雜證部卷七十六外科心法要訣嬰兒部卷七十七眼科心法要訣目睛原始歌起至胎患内障歌止卷七十八眼科心法要訣外障總名歌起至附外治方止卷七十九刺灸心法要訣九鍼原始起至十二經衇氣血多少歌止卷八十刺灸心法要訣諸經起止全圖起至足三陽經總穴名止卷八十一刺灸心法要訣手太隂肺藏圖起至脾經分寸歌止卷八十二刺灸心法要訣手少隂心藏圖起至心包絡經分寸歌止卷八十三刺灸心法要訣足少隂腎藏圖起至肝經分寸歌止卷八十四刺灸心法要訣奇經八衇總歌起至隂維衇分寸歌止卷八十五刺灸心法要訣前面要穴圖起至足部主病要穴歌止卷八十六刺灸心法要訣灸難產圖起至煮鍼藥方止卷八十七正骨心法要旨外治手法卷八十八正骨心法要旨圖形併内外證治諸法卷八十九正骨心法要旨圖形併内外證治諸法卷九十正骨心法要旨雜證治法御纂醫宗金鑑首卷總目欽定四庫全書御纂醫宗金鑑首卷凡例一醫書自靈素而後惟漢張機傷寒論金匱要畧二書實一衇相承但義理淵深方法微奥領㑹不易且多譌錯舊註随文附㑹難以傳信今於其錯譌者悉為訂正逐條詳加註釋更集諸註之實足闡發微義者以備叅考一方者一定之法法者不定之方也古人之方即古人之法寓焉立一方必有一方之精意存於其中不求其精意而徒執其方是執方而昧法也舊有醫方考醫方解等書尚未能暢發前人之精意今於各書中能透發古方之精意者萃而集之不當者刪之未備者補之一天時之不齊民病所由生也素問言五運六氣特詳醫不明此則不識亢害承制淫勝鬱復之理不足以稱醫之良也但經文散見諸篇學者每有望洋之歎今搜集成編俾一覽無遺庶易於融㑹貫通一望聞問切古聖稱為聖神工巧蓋醫者之首務也經云能合色衇可以萬全又云聞其聲而知其人之疾苦問其苦欲而知其病之所在是雖聖人不能舍此以為法也而况後學乎今取崔紫虛四言衇訣上合靈素之言望聞問切者集為一編學者熟讀玩味臨證之時自有得心應手之妙一婦科諸證與方衇無異惟經帶崩漏胎産癥瘕不同兹集於此數證折衷羣書詳加探討病情方藥要歸正當其他諸證與方衇同者仍當於雜證門求之一嬰兒氣血未充形神怯弱藏府柔脆風痰驚食諸邪易乘難去故急則為驚緩則成疳即吐瀉感冒等證治之稍不如法皆足變生不測前賢稱為難醫不誠然哉非理明心細識精膽大未易擅塲兹分門别類博採羣書撮其精粹以為幼科指南一痘疹亦嬰兒之一證也而必耑其科者以其傳變迅速猶方衇之傷寒不可以時日待也雖然治痘誠難而得其要㫖則難者易矣蓋痘自禀賦天時人事以及發熱見㸃起脹灌漿結痂落痂莫不有順險逆之三候順證不藥而愈險證非藥不愈逆證雖藥無濟業是科者能於此辨之明審之確更詳察其虛實寒熱所兼所挾之證而治之則於以挽回造化也無難矣疹證雖有數種惟痳疹一證變幻莫測更宜詳究若夫種痘一法則又去逆就順化險為平欲以人定勝天者也自宋以後始有是法皆互相授受未有成書今取耑科世業屢經試驗方法載之於書一眼科自靈樞大惑篇數語已足該後世五輪八廓之義千金外臺又演其旨銀海精微列證百餘條龍木論分為五輪八廓内障外障七十二證宋金元明諸賢著述各有發明可謂既詳且盡矣然五輪之説尚本於經而八廓則憑臆立論三因病情未見精切兹特據經訂正採輯諸書精藴棄其駮雜一靈樞經為刺灸家鼻祖其文精微詳盡銅人一圖星羅棋布甲乙千金等書闡其意旨然精斯術者恒不易得何也誠以經衇流行交㑹支别過接之際與夫井滎兪經合原等穴毫釐一差千里遂謬非窮究博考口傳心授鮮能得其奥旨近世惟天星奇穴猶有得其傳者其他未之嘗聞今取靈樞各家之書精研詳究考其分寸明其行列一一繪圖立説一人身藏府根於内經絡行於外氣血流貫於其中醫固無内外之可分也苐以證之形於外故稱之曰外科經云六府不和留結為癰亦可知無外之非本於内矣是集繪圖立説外以辨其形色部位經絡内以察其藏府氣血與夫隂陽虛實六淫七情病因方藥内治外治諸法詳載於篇一正骨科向無成書各家著述惟凖䋲稍備然亦只言其證藥而於經絡部位骨度名目手法俱未嘗詳言之今考靈素骨度篇及十二經絡與所傷部位及外治内治藥餌手法器具一一繪圖立説彚集成書一證候傳變難以言盡而其要不外隂陽表裏寒熱虚實八者而已是集凡論一證必於是八者反覆詳辨故謂之心法經云知其要者一言而終不知其要流散無窮此之謂歟一醫者書不熟則理不明理不明則識不精臨證游移漫無定見藥證不合難以奏效今於古今之言病機病情治法方藥上叅靈素棄其偏駮録其精粹編為歌鈐學者易於成誦故曰要訣御纂醫宗金鑑首卷凡例
