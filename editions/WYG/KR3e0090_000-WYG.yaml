front:
  text: 欽定四庫全書子部五御定醫宗金鑑醫家類
  hash: sha256:258b51150cd849bd1cf8d7bfa20cc695fc9a447db8cad6bca798d06e81cdff27
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0090_WYG_000-1a, image: WYG0780/WYG0780-0001a.png}
body:
  text: 提要臣等謹案御定醫宗金鑑九十卷乾隆十四年奉勅撰首為訂正傷寒論注十七卷次為訂正金匱要畧注八卷盖醫書之最古者無過素問次則八十一難經然皆有論無方案素問有半夏湯等一二方然偶然及之非其通例也其有論有方者自張機始講傷寒及雜證者亦以機此二書為宗然傷寒論為諸醫所亂㡬如争大學之錯簡改本愈多而義愈晦病其説之太襍金匱要畧雖不甚聚訟然注者罕所發明又病其説之不詳是以首訂二書糾訛補漏以標證治之正軌次為刪補名醫方論八卷輯醫方者往往僅題某丸某散治某病不知病狀相似者病本多殊古人隨證消息君臣佐使有其宜攻補緩急有其序或以相輔為用或以相制為功甚或以相反相激巧投而取效必明制方之意而後能詳審病源以進退加減故方論並載也次為四脉要訣一卷取崔紫虚脉訣叅以内經闡虚實表裏之要紫虚者宋道士崔嘉彦之號也其書簡括而精宻李時珍瀕湖脉學嘗録以弁首故兹亦取以為凖次運氣要訣一卷闡素問五運六氣之理葢運氣雖不可拘泥亦不可竟廢故次于診法次為諸科心法要訣五十四卷以盡雜證之變次為正骨心法要㫖五卷則古有是術而自薛已正體類要以外無専門之書故補其遺皆有圖有説有歌訣俾學者既易考求又便誦習也自古以來惟宋代最重醫學然林億髙保衡等校刋古書而已不能有所發明其官撰醫書如聖濟總録太平恵民和劑局方等或博而寡要或偏而失中均不能實禆于治療故聖濟總録惟行節本而局方尤為朱震亨所攻此編仰體聖主仁育之心根據古義而能得其變通叅酌時冝而必求其徴騐寒熱不執成見攻補無所偏施於以拯濟生民同登夀域涵濡培飬之澤真無微之不至矣乾隆四十三年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書御纂醫宗金鑑首卷奏疏太醫院院使加光祿寺卿銜臣錢斗保等謹奏為欽奉上諭事乾隆四年十一月十七日右院判臣王炳御醫臣呉謙奉上諭爾等衙門該修醫書以正醫學欽此臣等聞命之下曷勝惶懼欣躍醫道廢弛師範不立乆矣皆因醫書駮雜人不知宗今我皇上聖慈仁心視民如子欲其同登壽域德意之厚與天無極此乃萬世夀民公事随㑹同院使臣錢斗保左院判臣陳止敬御醫臣劉裕鐸合詞恭謝天恩臣等竊聞上古之醫通天之紀察地之理調其運和其化使上下合德皆神聖為之其道大也如此周時以冡宰領其職上保聖躬下全民命其任重也如此至漢而降醫入方技然習之者猶非常人淳于意張機之屬迨後視醫甚輕習之者僅為一己衣食計並不存心濟世自好之士恥與同儔是以良醫代乏其道日衰其術失傳今惟我皇上仰體聖祖仁皇帝世宗憲皇帝聖心未就下頒修醫書之㫖臣等思維醫雖小道實天下蒼生性命所關非諸末藝之可比也考醫之書天元玉冊本草靈樞素問三經始自伏羲氏神農氏軒轅黄帝與臣岐伯等所作也殷時伊尹著湯液本草戰國時扁鵲著難經後漢時張機著傷寒論其書世逺詞奥難明且多編次傳寫錯譌自晉而下至今醫書甚夥不能枚舉雖諸大家多所發明然亦各自成家或博而不精或雜而不一間有自相牴牾反足惑人者皆當改正註釋分别諸家是非先自張機書起蓋以前之書皆有法無方傷寒論金匱要畧雜病論創立方法格式始有法有方誠醫宗之正派啟萬世之法程實醫門之聖書也故先改正錯譌註釋以利天下時用臣等請將大内所有醫書發出再命下京省除書坊現行醫書外有舊醫書無板者新醫書未刻者並家藏秘書及世傳經驗良方著地方官婉諭購買或借抄録或本人願自獻者集送太醫院命官纂修上自三皇以至我朝分門聚類刪其駮雜採其精粹發其餘藴補其未備成書二部其小而約者以便初學誦讀其大而博者以便學成參考使為師者必由是而敎為弟子者必由是而學則醫學昌明夀民於萬萬世矣其纂修照何館例書成如何頒給之處仰候欽定謹此奏聞乾隆四年十二月初二日奏奉㫖著大學士鄂爾泰酌議具奏其一應纂修事宜幷著總管考核欽此太保議政大臣大學士三等伯總管醫書館事務臣鄂爾泰謹奏為遵㫖酌議事太醫院院使錢斗保等為欽奉上諭纂修醫書等因一摺奉㫖著大學士鄂爾泰酌議具奏其一應纂修事宜幷著總管考核欽此臣查修書各館舊例所用纂修官提調官收掌官及考取謄録生監以及供事紙匠俱酌量人數足用多寡不等請㫖遵行在案今䝉皇上特命纂修醫書以正醫學臣謹詳加酌議所修醫書不必另行開館即於太醫院衙門内將現在閒房照例量加修葺儘可充用該醫院官員到館辦事亦稱近便其纂修官祇需八員總修官須用二員御醫呉謙劉裕鐸應令充總修官仍兼纂修外其餘纂修官八員應令太醫院堂官并吳謙劉裕鐸等將平日眞知灼見精通醫學兼通文理之人保舉選派如不足數再於翰林院及各部院官員内有通曉醫學者酌量查派蓋因前代醫書詞義深奥詮解不易而分門别類考訂成書既欲理明亦須辭達既貴詳晰尤須貫串此醫理文理分修總修四者缺一必不能成完書以垂諸乆逺者也再院使錢斗保左院判陳止敬右院判王炳俱有本衙門辦理事件且内庭差事所關重大難以分任修書之事請將該館一切應行事務令錢斗保等三員照看經理其收掌官酌用二員亦令該醫院堂官於所屬人員内選派再於該醫院効力人等内選取字畫尚好者以備謄録如不敷用照例行文國子監直隸學政將生監秉公考試務擇字畫端楷咨送本館以憑選取供事酌用四名紙匠二名亦照例於内閣取用其在館官員人役月支桌飯工食銀兩俱照八旗志書館例支領其應用桌凳什物紙張筆墨等項照例酌量向各該處咨取至院使錢斗保等奏摺内請將大内所有醫書發出再請勅下直省除書坊現行醫書外有舊醫書無板者新醫書未刻者並家藏秘書及世傳經驗良方著地方官婉諭購買或暫借抄録或本人願自獻者俱集送太醫院等語應照所奏咨明該部行文各省督撫轉飭地方官遵照辦理可也臣未敢擅便謹奏請㫖於乾隆四年十二月十二日奏奉㫖醫書館與修書各館不同該館纂修等官公費著照修書各館例減半支給餘依議欽此照管醫書館事務和碩和親王臣𢎞晝謹奏為遵㫖議奏事乾隆五年二月初七日奉㫖太醫院設館纂修醫書一事著臣詳細查明妥議具奏欽此欽遵臣謹查得院使錢斗保等以古今醫書甚繁雖諸大家多所發明或博而不精或雜而不一皆當改正註釋以利天下時用請將大内所有醫書發出命下京省令將新舊醫書並家藏秘書及世傳經驗良方集送太醫院纂修成書等情經大學士伯鄂爾泰遵㫖議稱纂修醫書不必另行開館即於太醫院閒房内修葺充用所需總修官二員應令呉謙劉裕鐸充當仍兼纂修外其餘纂修官祗需八員收掌官二員再於該院人員内選取字畫尚好者以備謄録仍酌用供事四名紙匠二名該館一切應行事務令錢斗保等三員照看經理至官員人役月支桌飯工食銀兩俱照八旗志書館例支領所需桌凳紙張筆墨等項向各處咨取應用所請大内醫書發出命下京省將新舊醫書併家藏秘書及世傳經驗良方集送太醫院之處應照所奏施行等因具奏奉㫖醫書館與修書各館不同該館纂修等官公費照修書各館例減半支給餘依議欽此欽遵臣復詳加確查該院遵㫖將纂修事宜工食什物等項咨查各館尚未移覆及行取各省醫書之處亦未咨部通行其需用人員且未選定是以至今未曾開館臣將未即速辦情節詢於錢斗保等據呉謙詞稱以前之書有法無方惟傷寒論金匱要畧雜病論等書創立始有法有方謙於餘暇已詳加刪訂書成八九稍加增減即可告竣等語竊思呉謙既稱刪訂已成八九兼之大内頒發醫書詳加參考誠如聖諭縱天下之書亦未必有過於此者也請將大内所有醫書及呉謙刪訂未成之書一併發與太醫院選擇吉期即行開館纂修其應行事宜俱照原議辦理今既有大内之書併呉謙未成之書足可纂修應將行文各省咨取醫書之處毋庸議等因於乾隆五年二月十六日具奏奉㫖這所奏是館内事宜亦著和親王照看欽此欽定四庫全書御纂醫宗金鑑首卷照管醫書館事務和碩和親王臣𢎞晝等奉勅纂修醫書今已告成謹奉表恭進者伏以帝德播生成易簡協隂陽之撰皇仁大胞與中和闡位育之功歛箕福以敷民統寒燠雨暘而厪念辨禹圖而正位合剛柔燥濕以咸宜體好生之心以為心五辰順布本博濟之學以為學二氣均調蕩蕩難名薄海藴恬熙之化巍巍莫並普天䝉樂利之休臣等誠惶誠恐稽首頓首上言竊惟醫書肇自靈素方藥著於漢唐倉扁以前禁方每多不傳之秘宋元而後著述皆屬補救之文乃法立理明往哲示圓機之妙而執方廢法後世鮮淹貫之儒非有明鏡以燭其源流萬物何以盡歸仁夀必比玉䇿以通其表裏羣言乃能得所㑹歸欽惟皇帝陛下道接羲軒業隆參贊沛膏雨於山陬海澨蔀屋春生扇仁風於雲牖松扉瑶階日麗既已登斯民於袵席更欲進斯世於吉康念天時之寒暑不齊人事之寢興難節將正醫門之㫖以昭愛養之方爰發宫府藏書徧集古今典籍特命臣等纂修既往以詔將來誠億萬年未遇之鴻恩千百世難逢之曠典臣等四診未諳五味粗分聞命自天悚惶無地愼選醫員細陳綱目焚膏繼晷不辭午夜丹鉛分校合叅務竭一心研悦飲蔗漿以解熱旁搜摩詰之詩進昌陽以引年逺證昌黎之説理求精當不尚竒衺詞謝浮華惟期平易證詳表裏隂陽虛實寒熱方按君臣佐使性味功能酌古以凖今芟繁而摘要書凡九十卷類分十一科恭輯書成敬呈御覽經宸衷之鑑定彌覺義理精深䝉聖主之披陳益見微文燦著欽定嘉名醫宗金鑑赤文緑字誠哉壽世鴻編雲笈瑶函允矣仁民妙術懸之九市不妨家遇越人寶之千秋正使代生岐伯實乃萬方之慶誰云一家之言伏願澤永春臺恩覃夏甸修善政於六府水火金木土榖大德常流培元化於一心知仁聖義中和神功默運將見陽回天上人歌舜日之舒長瑞溢寰中世戴堯天之廣大矣臣等無任瞻天仰聖激切屏營之至謹奉表恭進以聞乾隆七年十二月十五日欽定四庫全書御纂醫宗金鑑首卷諸臣職名武英殿監理照管醫書館事務和碩和親王臣𢎞晝太保議政大臣大學士三等伯總管醫書館事務臣鄂爾泰經理提調官太醫院院使加光祿寺卿銜食三品俸紀録三次臣錢斗保内務府坐辦堂郎中紀録三次臣吉慶内務府總管六庫郎中紀錄三次臣普福内務府郎中兼佐領雲騎尉紀録三次臣興貴太醫院左院判食五品俸紀録三次臣陳止敬内務府總領紀録三次臣福寧總修官太醫院右院判食五品俸兼經理事紀録三次臣呉謙太醫院右院判食五品俸紀録三次臣劉裕鐸纂修官太醫院御醫加二級紀録三次臣李毓清太醫院御醫加二級紀録三次臣武維籓太醫院御醫加二級紀録三次臣花三格太醫院御醫加三級紀録三次臣施世德太醫院御醫加一級紀録二次臣鄧錫璋太醫院御醫加一級臣樊君彩太醫院八品吏目加一級紀録二次臣劉紳太醫院八品吏目加一級紀録二次臣甄瀚太醫院八品吏目紀録三次臣何徵圖太醫院九品吏目紀録二次臣章垣采太醫院額外九品吏目加一級紀録二次臣金世榮太醫院額外吏目加一級臣劉植原任欽天監博士臣劉裕錫遴選廪貢生臣孫埏柱効力副纂修官太醫院御醫加二級臣俞士烜太醫院八品吏目紀録二次臣朱伯德太醫院九