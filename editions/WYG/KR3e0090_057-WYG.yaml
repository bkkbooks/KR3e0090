腎經伏毒最可憂鬆肌歸宗兩酌用燕脂貼法莫遲留註痘攢聚於耳後髙骨名曰蒙骩此係毒火𤼵自腎經其證最惡内服鬆肌通聖散外用燕脂膏貼之若更稠宻炮熱者以歸宗湯攻之鬆肌通聖散方見蒙頭證治燕脂膏升麻煎濃湯去滓用棉燕脂於湯内揉出紅汁再加雄黄細末調勻貼患處歸宗湯方見𤼵熱證治鎻眼兩眼週圍獨稠宻痘名鎻眼毒傷脾外用燕脂膏貼法内服清熱解毒宜註面部俱稀兩眼週圍獨稠宻者名曰鎻眼也乃毒熱熾盛傷於脾經外宜貼燕脂膏内服清熱觧毒湯燕脂膏方見蒙骩證治清熱解毒湯方見見㸃證治抱鼻痘如蠶種繞鼻端毒聚脾肺證難延外用燕脂塗鼻上内服黄連解毒煎註面部俱稀獨鼻梁左右宻如蠶種者名曰抱鼻此乃毒聚脾肺至危之證先以燕脂膏塗於鼻上繼用黄連解毒湯治之燕脂膏方見蒙骩證治黄連解毒湯方見結痂落痂證治鎻口鎻口梟毒伏脾經或單或䨇遶脣生外用鍼刺燕脂法内服瀉黄散即寧註一嘴角有痘一粒較諸痘獨大板硬無盤名曰單鎻口兩嘴角各有一粒名曰䨇鎻口又口之上下四旁連串環遶者亦名鎻口此毒擁于脾也初出急以銀鍼挑破外以燕脂膏貼之内服瀉黄散使痘轉紅活庶可望生燕脂膏方見蒙骩證治瀉黄散犀角黄連生地青皮木通石膏丹皮荆芥穗牛蒡子炒研大黄紅花紫花地丁引加燈心水煎服方歌鎻口瀉黄散最靈犀連生地青木通石膏丹皮荆牛蒡大黄紅花合地丁鎻脣鎻脣痘聚口脣内腫裂乾黄板硬實瀉黄散内合豬尾燕脂貼法莫少遲註痘出攢聚於脣内者名曰鎻脣輕則焦裂腫痛重則板硬乾黄此毒火𤼵于脾臟也急以瀉黄散合豬尾膏服之外用燕脂貼法若見黒色則血凝毒錮終無救矣瀉黄散方見鎻口證治豬尾膏取小雄豬尾尖血十數滴和梅花氷片少許即調於煎劑内服燕脂膏方見蒙骩證治托腮托腮腮邉痘成攢氣為毒阻起發難急用黄連解毒治板硬紫黯歸宗先註滿面俱稀獨兩腮之痘攢聚成片者名曰托腮乃正氣為毒所阻難以起發也當見㸃之初毒勢未成即以黄連觧毒湯解之如板硬紫黯以歸宗湯攻之黄連解毒湯方見結痂落痂證治歸宗湯方見發熱證治鎻項當喉攢聚名鎻項毒結咽喉命必難音啞聲嗆食難入清金攻毒是良煎註頸項者咽喉之管籥也此處痘出攢聚名曰鎻項若不急治迨毒攻咽喉必發為腫痛音啞聲嗆湯水難下多致不救急用清金攻毒飲庶或望生清金攻毒飲牛蒡子炒研甘草生苦桔梗元參枳殻麩炒殭蠶炒前胡荆芥穗大黄山查蟬退山豆根引加燈心水煎服方歌清金攻毒飲如神牛蒡甘桔合元參枳殻殭蠶前胡穗大黄山查蟬豆根披肩披肩兩肩痘成攢上下阻塞毒透難清熱解毒湯投證便秘歸宗又為先註兩肩之痘粘連成攢其色赤紫滯黯名曰披肩此毒氣不鬆上下阻塞也以清熱解毒湯主之大便秘者以歸宗湯主之清熱解毒湯方見見㸃證治歸宗湯方見發熱證治聚背背間出痘不宜多若逄攢聚命蹉跎根鬆鬆肌燕脂貼𦂳硬必勝湯可活註大凡毒𤼵於背者多闗生死至於出痘更貴稀疎若背間攢聚粘連者名曰聚背而亦當辨根脚之𦂳鬆根鬆者毒尚活動内服鬆肌通聖散外用燕脂膏貼之根𦂳硬者因毒錮血凝急用必勝湯治之然亦死中求活之一法耳鬆肌通聖散方見蒙頭證治燕脂膏方見蒙骩證治必勝湯方見見㸃證治攢胸胸前出痘貴稀輕攢聚粘連毒熱凝速用凉膈攻毒飲免使梟毒内裏攻註胸膈乃心肺二經部位出痘稀少方吉倘攢簇于此名曰攢胸乃毒熱所致也當以凉膈攻毒飲主之則梟毒不内侵矣凉膈攻毒飲梔子生黄連生石膏生荆芥紫花地丁枳殻麩炒桔梗元參生地牛蒡子炒研大黄赤芍甘草生薄荷木通引加燈心竹葉水煎服方歌凉膈攻毒治攢胸梔連石膏荆地丁枳桔元參生地蒡大黄芍草薄木通斷橋斷橋之痘形甚異腰間絶無上下宻氣血阻滯毒熱壅歸宗峻攻痘出吉註痘名斷橋者腰間絶無一㸃惟身之上下稠宻也盖梟毒壅於上下氣血阻于中宫故致上下隔斷而成最惡之證宜用歸宗湯攻之使無痘處透出方化為吉也歸宗湯方見𤼵熱證治纒腰腰為腎候痘宜疎連珠環遶奈何如治宜攻毒莫少待歸宗急服患能除註腰為腎候痘宜稀疎若連珠環遶名曰纒腰此毒伏于腎也治以攻毒為主宜用歸宗湯治之歸宗湯方見𤼵熱證治囊腹囊腹腹前痘如囊梟毒衝突勢猖狂透毒鬆肌通聖散攻毒歸宗湯甚良註腹前出痘狀如囊聚名曰囊腹是梟毒衝突勢甚猖狂也此地近於臟腑毒易内攻須先用鬆肌通聖散透發其毒再用歸宗湯以攻其毒使地界分明根脚鬆動庶無虞矣鬆肌通聖散方見蒙頭證治歸宗湯方見發熱證治鱗坐鱗坐兩臋痘若鱗急急治之莫逡廵平扁灰滯通聖效板硬紫黯歸宗神註鱗坐者兩臋之痘聚集如鱗也因毒火太甚攢聚於至隂之地若不急治變如反掌如平扁灰滯者鬆肌通聖散主之板硬紫黯者歸宗湯主之鬆肌通聖散方見蒙頭證治歸宗湯方見𤼵熱證治囊毬囊毬痘宻在腎囊毒聚於斯最難當即用散結湯調治毒宣熱解始安康註腎囊者乃腎之外候闗要處也若痘出稠宻乃毒聚於斯也宜用散結湯主之疏解通暢庶可愈矣散結湯荆芥羌活牛蒡子炒升麻川芎丹皮紫花地丁赤芍木通紫草青皮山查引加蘆笋十株水煎服方歌散結湯中藥堪誇荆芥羌蒡共升麻川芎丹皮地丁芍木通紫草青山查抱膝兩膝之痘獨稠密因地命名為抱膝須防行漿難下達速用鬆肌通聖治註抱膝者徧身痘出稀疎獨兩膝攢簇如餅此毒氣凝聚於膝至行漿時恐難下達於足脛也宜用鬆肌通聖􅄆加牛膝透之功效甚速鬆肌通聖􅄆方見蒙頭證治無根足踝以下痘無形毒熱錮蔽勢多凶速宜驅毒扶脾氣快癍越婢湯有功註足踝以下屬於脾經若週身有痘而此地獨無者名曰無根是毒滯於脾也但足為至隂之地非建立中州𤼵越脾氣不能下達故用快癍越婢湯以𤼵之快癍越婢湯黃耆蜜製桂枝防風白芍藥炒甘草生引用生薑紅棗水煎服方歌快癍越婢藥最靈黄耆桂枝及防風白芍甘草薑棗引煎服之後痘自生蛇皮蛇皮痘出似蛇皮隱隱簇簇漫無拘毒輕歸宗湯調治毒重必勝豬尾宜註痘出叢簇成片散漫無拘名曰蛇皮見㸃之初視其隱隱簇簇細宻無倫乃毒火所致以歸宗湯攻其毒甚者以必勝湯佐以豬尾膏救之歸宗湯方見發熱證治必勝湯方見見㸃證治豬尾膏方見鎻脣證治蠶種痘出形如蠶佈種梟毒勢重逆而凶速用歸宗湯救治毒鬆痘起可望生註痘出稠密如蠶佈種者名曰蠶種乃梟毒太重凶逆之甚速用歸宗湯攻之使毒鬆痘起方可望生歸宗湯方見𤼵熱證治燕窩痘形纍纍似燕窩聯絡細密不成顆外用燕脂㸃痘上内服凉血解毒和註痘出纍纍聯絡細宻不成顆粒故謂之燕窩宜外用燕脂膏貼法内服凉血解毒湯和之燕脂膏方見蒙骩證治凉血解毒湯方見結痂落痂證治鼠跡四五相連名鼠跡周身為重少見輕速用歸宗攻毒熱相併成泡始堪生註痘出四五粒或六七粒相聚粘連者名曰鼠跡見一二處者輕見周身者為重速用歸宗湯攻之令相併成泡其毒方解始可望生歸宗湯方見發熱證治疊錢痘形平伏無顆粒團團攢聚若疊錢外用燕脂調貼法内服凉血攻毒痊註痘已見㸃平伏不起顆粒不分團團攢聚狀若疊錢者此血熱毒盛也外用燕脂膏貼之内以凉血攻毒飲治之燕脂膏方見蒙骩證治凉血攻毒飲方見見㸃證治環珠痘出圍繞若環珠毒氣壅滯宜早圖清熱解毒為妙劑毒解漿生患自除註痘名環珠者以出而圍繞形若環珠也此毒氣壅滯所致宜早圖治以清熱解毒湯主之使毒解漿生其患自除矣清熱解毒湯方見見㸃證治浮萍視之有㸃按無形參差紫黯若浮萍速用凉血攻毒劑能使毒鬆色轉紅註浮萍者視之有㸃按之無形參差不齊痘色紫黯狀如浮萍也此乃血瘀毒熾非急攻不可速用凉血攻毒飲攻之能使毒鬆色轉紅活庶可望生凉血攻毒飲方見見㸃證治蟹爪痘形連貫顆碎宻上濶下細蟹爪形起脹根鬆毒始解清熱解毒服有功註蟹爪者痘形連貫顆粒碎宻上濶下細如蟹爪之狀急用清熱解毒湯治之使連貫處起脹根鬆其毒可解也清熱解毒湯方見見㸃證治䕯沙痘形歪斜復扁濶無頂無盤名䕯沙通聖歸宗酌量用頂起根鬆痘始佳註䕯沙者痘形扁濶歪斜不圓無頂無盤若䕯沙細小宜先用鬆肌通聖散主之若色紫黯者歸宗湯主之能頂起根鬆始為佳境鬆肌通聖散方見蒙頭證治歸宗湯方見發熱證治血泡痘夾血泡因肺熱或紫或赤㣲甚别内服凉血解毒湯外用鍼刺出惡血註痘當起脹時忽有小泡夾痘而出漸漸長成如白果大毒甚則紫毒㣲則赤皆謂之血泡此因毒熱在肺傳於皮膚大小不一須内服凉血解毒湯外用銀鍼刺破流出惡血方保無恙若不急治聼其自破惡汁流染痘亦因之赤爛矣治者宜詳記之凉血解毒湯方見結痂落痂證治水泡水泡濕淫尅脾經手足稠宻身面輕内服加味保元劑外塗胡荽官粉靈註水泡者形大皮薄内含一包清水盖因濕淫之氣侵尅脾經故身面俱少手足獨宻以四肢屬脾故也須服加味保元湯外用銀鍼刺破以胡荽酒調官粉􅂗患處若延遲不治變成癢塌則難救矣加味保元湯人參豬苓澤瀉白术土炒黄耆蜜炙赤茯苓甘草炙引用生薑水煎服方歌加味保元功最㨗人參豬苓共澤瀉白木黄耆赤茯苓甘草生薑同一列胡荽酒胡荽四兩切碎黄酒半觔同煎勿令洩氣候温調官粉搽敷破處肉腫瘡不腫瘡未起脹肉腫浮皮光色艷最堪愁赤艷羌活救苦治淡紅參歸大補求通身盡赤毒熱熾速以歸宗及早投註痘當起脹時自頭及身漸次同痘浮起此氣領血載其毒外𤼵也如頭身之肉先腫皮色赤艷而痘瘡不腫此為毒邪有餘不受正制宜用羌活救苦湯若皮色淡紅者乃氣血不足不能拘攝毒氣宜用參歸大補湯治之更有通身皮膚盡赤此為毒火熾盛煎灼血分宜用歸宗湯羌活救苦湯蔓荆子羌活牛蒡子炒升麻黄耆生川芎連翹去心桔梗白芷防風人中黄引用荷葉水煎服方歌羌活救苦湯最良升麻川芎合羌防牛蒡黄耆白芷翹蔓荆桔梗人中黄參歸大補湯人參當歸黄耆甘草白芷川芎防風紫草茸木香南山查厚樸薑炒桔梗引用生薑水煎服方歌參歸大補最有靈參耆當歸桔川芎防風白芷木香草厚樸山查紫草茸歸宗湯方見發熱證治乾枯毒火煎灼傷隂血痘體乾枯少潤澤當歸活血加味甞治若少緩變莫測註色者血之華也血和則滋潤光瑩血耗則乾燥枯竭痘之毒火入于血分輕則焮紅甚則焦紫治以救血為急宜當歸活血湯主之當歸活血湯當歸川芎赤芍生地紅花紫草黄芩黄連大黄水煎服方歌加味當歸活血湯痘色乾枯服最良四物紅花共紫草加入芩連生大黄鋪紅鋪紅多因元氣弱血不歸附毒漫行肌膚盡紅根赤艷氣失統攝痘多凶氣虚九味神功補毒盛凉血觧毒清註起脹時血盡歸附于痘根下有紅線𦂳束乃正形也若元氣虚弱血不歸附致毒氣散漫肌膚之上根色紫艷是氣失統攝之力多致不救若氣虚而痘色㣲赤者以九味神功散主之毒盛根艷者以凉血解毒湯主之九味神功散人參黄耆生紫草茸紅花前胡牛蒡子炒研甘草生白芍藥酒炒生地黄引用大棗水煎服方歌九味神功治鋪紅人參黄耆紫草茸紅花前胡牛蒡草白芍生地棗相從凉血解毒湯方見結痂落痂證治根窠無暈血虚痘色多散漫根窠淡白少鮮艷芎歸保元湯可投參歸鹿茸有竒驗註痘至成漿時若氣血交㑹必有一血線𦂳附根下如珍珠置於燕脂之上粒粒光彩此正形也設平日氣血虚弱當灌漿時頂雖圎滿根下全無紅暈以芎歸保元湯主之虚甚者以參歸鹿茸湯主之芎歸保元湯人參甘草炙黄耆蜜炙當歸酒洗川芎引用龍眼肉水煎服方歌芎歸保元治血虚人參甘草共黄耆酒洗當歸川芎配龍眼作引服無時參歸鹿茸湯方見灌漿證治皮薄漿嫩痘瘡皮薄根不紅待得成膿漿淡清溶溶破爛不完整氣血虚弱證多凶速服十全大補劑氣充血足始堪生註痘瘡頼氣血以成功氣血充實則痘皮蒼老肥滿堅厚若氣血虚縮痘必光亮軟皺溶溶如濕須用十全大補湯峻補氣血庶毒化漿行可保安全矣十全大補湯人參黄耆蜜炙茯苓當歸白术土炒肉桂甘草炙白芍酒炒熟地黄川芎引用煨薑水煎服方歌十全大補湯最靈人參黄耆白茯苓當歸白术肉桂草白芍熟地及川芎空殻無漿痘殻圓融漿不行有虚有實要分明根色淡白血虛弱紫𦂳由于血熱凝千金内托同四物因證施治莫遲停註痘至行漿時頭面週身外雖脹而内實無漿名曰空殻當别虚實治之如根色淡白者此血虚不能化毒成漿也宜千金内托散根𦂳而紫者此氣行血滯毒熱伏于血分而不能成漿也宜加味四物湯治之千金内托散方見見㸃證治加味四物湯生地酒洗川芎白芍酒炒當歸酒洗連翹去心紫草茸酒洗水煎服方歌加味四物湯當歸生地黄川芎白芍藥紫茸連翹良痘頂塌陷痘根雖紅頂塌陷此證多縁氣虚見面白肢冷食懶嘗虚煩便溏身怠倦急用補中益氣湯氣充頂升漿充貫註陷頂者由中氣㣲弱不能振揚故灌漿時根雖紅潤頂却㣲塌現證面白肢冷不思飲食虚煩便溏身體怠倦也治宜補氣為主用補中益氣湯則氣足漿升而頂自起矣補中益氣湯黄耆蜜炙白术土炒人參升麻柴胡炒陳皮甘草炙當歸身引用煨薑大棗水煎服方歌補中益氣效如神黄耆白术共人參升麻柴胡陳皮草煨薑大棗及歸身灰陷白陷氣血虚寒不振揚灰白陷頂少膿漿速用參歸鹿茸劑鷄冠血酒更堪嘗註痘至灌漿時其色淡白根無紅暈而頂陷者是謂白陷虚極則轉為灰陷由氣虚委而不振血虚漿不能充故一陷而不可遏也治宜大補氣血為主宜參歸鹿茸湯臨服入鷄冠血酒日進二三服但得頂起漿行方免無恙參歸鹿茸湯方見灌漿證治鷄冠血酒用大雄鷄一隻先將白酒一杯炖温次刺鷄冠血數㸃滴入杯中和勻仍炖温調煎藥内服紫陷黒陷紫陷黒陷皆毒盛平塌昏黯根不鬆此屬氣血被火欎解毒急宜用歸宗註痘出稠宻顆粒碎小根𦂳昏黯頂凹下而紫者謂之紫陷甚而轉為黒色則為黒陷皆由毒火欎閉氣不宣通故也治宜清熱解毒以歸宗湯主之歸宗湯方見𤼵熱證治板黄漿未充足痘板黄頂塌成片皮硬僵氣滯血凝難灌溉皆縁毒熱侵脾鄉速服清毒活血劑毒化痘起轉安康註板黄者謂灌膿時漿未得半忽然黄色突起乾燥堅硬盖因梟毒肆害脾鄉故氣滯血凝難以灌溉也須用清毒活血湯治之倘得痘起尚可望生若頭面頸項眼眶脣上及週身黄者則不治也清毒活血湯當歸白芍藥酒炒生地黄紫草茸酒洗黄芩黄連酒炒牛蒡子炒南山查連翹去心人參黄耆生桔梗木通引用燈心水煎服方歌清毒活血湯最靈歸芍生地紫草茸芩連牛蒡山查翹參耆桔梗合木通倒靨倒靨漿清陷不紅痘殻皮皺痂不成速用加味保元劑氣充血足痘収功註倒靨者漿色清稀不足根脚淡白無暈徧體形如豆殻瘡皮皺而似結非結至収靨時終不成痂此因氣血兩虛乏領載之力也宜加味保元湯治之加味保元湯人參黄耆蜜炙甘草炙全當歸酒洗白芍酒炒木香煨白术土炒官桂引用老米水煎服方歌加味保元治倒靨人參黄耆甘草協當歸白芍廣木香白术官桂效更㨗痘疔痘疔梟毒亂正瘡色紫黒黯形堅強先出先長妨諸痘鍼刺隨貼四聖良註痘疔之成由梟毒藴伏錮蔽于肌肉之間痘未出疔先出痘未長疔先長其色紫黒其形堅強五臟各有所見心疔色赤起于顴阜胸乳之處肝疔色紫起于左太陽左脇眼胞兩臋阜之處脾疔色先黄後黒起于腮頰中庭口角肚腹手足之處肺疔色先灰後黒起於右太陽右脇頸項喉突之處腎疔色黒起於地閣後頸耳窖背窬腰脊陽莖之處見時急用銀鍼刺破以洩毒血刺後用四聖膏貼患處若遲延不治能使痘當發不發當脹不脹當灌不灌而百變生矣四聖膏菉豆四十九粒豌豆四十九粒性俱燒灰存珍珠一分煆頭髮一分燒灰右為細末以棉燕脂水調和成膏將銀鍼撥開瘡頭然後􅂗之挑痘疔法痘疔須用鍼挑撥輕重徐急貴合宜破頂傷肌俱深忌上漿急挑莫遲疑註凡用鍼挑疔痘時以二指拿鍼平平入痘撥斷痘中筋絡衆痘即𤼵但挑時輕重疾徐之間貴乎得宜不可挑破痘頂亦不可重入傷肌須待三四五六日上漿之際痘能含鍼方可挑撥過七日則無用矣治者宜詳識之煮鍼法甘草生甘遂川烏草烏各等分用水一鍾入砂罐内以水乾為度每次可煮四五鍼煮完入鵝翎筒内黄蠟塞口収之御纂醫宗金鑑卷五十七欽定四庫全書御纂醫宗金鑑卷五十七編輯痘疹心法要訣面部吉凶論面為諸陽聚㑹之所其部位各有所屬欲識痘出之吉凶須按部位驗之則立判矣如額屬心位自印堂以上髮際以下至日月兩角若先見㸃先作漿先結靨者皆惡候也以心為君主義不受邪先見於是位者乃毒發於心故非吉兆也左頰屬肝右頰屬肺若兩頰先見紅㸃磊落分明者吉如相聚成塊地界不清肉體腫硬者凶盖肝藏魂肺藏魄梟毒侵犯則魂魄將離安望其有生意乎頦下屬腎自承漿以至兩頤先見㸃先灌先靨者吉誠以此位雖係腎部而三隂三陽之衇皆聚于此先發先灌先靨者乃隂陽和暢故可治也至若鼻屬脾藏位在中央所最忌者凖頭先出與先靨也盖脾土榮養于四藏若毒𤼵於脾是脾敗矣脾敗則四藏亦隨之而敗即纒綿時日亦不過苟延性命而已夫耳為腎竅又少陽相火之衇行耳前後故凡耳輪先見紅㸃者乃火毒燔灼難以撲滅非吉象也最可喜者口脣四圍先出先灌先靨也以陽明之衇俠口環脣胃與大腸主之多氣多血之處無物不受故主吉也此藏府部位之要須詳察於平時庶能權宜于臨證也蒙頭痘瘡貫頂號蒙頭毒參陽位最可憂形尖鬆肌通聖治紅腫如𤓰藥枉投註頭為諸陽之㑹徧身稀疎而頭獨稠宻者名曰蒙頭此毒參陽位也若痘形稍尖圓者當以鬆肌通聖散治之設頭紅腫如𤓰是為不治之證即投藥餌終屬無濟鬆肌通聖散荆芥羌活牛蒡子炒研防風紫草紅花青皮當歸赤芍紫花地丁蜂房山查木通引加蘆笋芫荽水煎服方歌鬆肌通聖藥最靈荆芥羌蒡共防風紫草紅花青歸芍地丁蜂房查木通抱鬢兩鬢出痘貴稀朗稠宻粘連火毒狂鬆肌通聖先透𤼵繼以歸宗攻毒良註兩鬢近於太陽出痘稀朗則吉若稠宻粘連名曰抱鬢乃火毒狂盛也宜先用鬆肌通聖散透發其毒繼用歸宗湯攻其毒熱庶可轉危為安鬆肌通聖散方見蒙頭證治歸宗湯方見發熱證治蒙骩痘攢耳後名蒙骩腎經伏毒最可憂鬆肌歸宗兩酌用燕脂貼法莫遲留註痘攢聚於耳後髙骨名曰蒙骩此係毒火𤼵自腎經其證最惡内服鬆肌通聖散外用燕脂膏貼之若更稠宻炮熱者以歸宗湯攻之鬆肌通聖散方見蒙頭證治燕脂膏升麻煎濃湯去滓用棉燕脂於湯内揉出紅汁再加雄黄細末調勻貼患處歸宗湯方見𤼵熱證治鎻眼兩眼週圍獨稠宻痘名鎻眼毒傷脾外用燕脂膏貼法内服清熱解毒宜註面部俱稀兩眼週圍獨稠宻者名曰鎻眼也乃毒熱熾盛傷於脾經外宜貼燕脂膏内服清熱觧毒湯燕脂膏方見蒙骩證治清熱解毒湯方見見㸃證治抱鼻痘如蠶種繞鼻端毒聚脾肺證難延外用燕脂塗鼻上内服黄連解毒煎註面部俱稀獨鼻梁左右宻如蠶種者名曰抱鼻此乃毒聚脾肺至危之證先以燕脂膏塗於鼻上繼用黄連解毒湯治之燕脂膏方見蒙骩證治黄連解毒湯方見結痂落痂證治鎻口鎻口梟毒伏脾經或單或䨇遶脣生外用鍼刺燕脂法内服瀉黄散即寧註一嘴角有痘一粒較諸痘獨大板硬無盤名曰單鎻口兩嘴角各有一粒名曰䨇鎻口又口之上下四旁連串環遶者亦名鎻口此毒擁于脾也初出急以銀鍼挑破外以燕脂膏貼之内服瀉黄散使痘轉紅活庶可望生燕脂膏方見蒙骩證治瀉黄散犀角黄連生地青皮木通石膏丹皮荆芥穗牛蒡子炒研大黄紅花紫花地丁引加燈心水煎服方歌鎻口瀉黄散最靈犀連生地青木通石膏丹皮荆牛蒡大黄紅花合地丁鎻脣鎻脣痘聚口脣内腫裂乾黄板硬實瀉黄散内合豬尾燕脂貼法莫少遲註痘出攢聚於脣内者名曰鎻脣輕則焦裂腫痛重則板硬乾黄此毒火𤼵于脾臟也急以瀉黄散合豬尾膏服之外用燕脂貼法若見黒色則血凝毒錮終無救矣瀉黄散方見鎻口證治豬尾膏取小雄豬尾尖血十數滴和梅花氷片少許即調於煎劑内服燕脂膏方見蒙骩證治托腮托腮腮邉痘成攢氣為毒阻起發難急用黄連解毒治板硬紫黯歸宗先註滿面俱稀獨兩腮之痘攢聚成片者名曰托腮乃正氣為毒所阻難以起發也當見㸃之初毒勢未成即以黄連觧毒湯解之如板硬紫黯以歸宗湯攻之黄連解毒湯方見結痂落痂證治歸宗湯方見發熱證治鎻項當喉攢聚名鎻項毒結咽喉命必難音啞聲嗆食難入清金攻毒是良煎註頸項者咽喉之管籥也此處痘出攢聚名曰鎻項若不急治迨毒攻咽喉必發為腫痛音啞聲嗆湯水難下多致不救急用清金攻毒飲庶或望生清金攻毒飲牛蒡子炒研甘草生苦桔梗元參枳殻麩炒殭蠶炒前胡荆芥穗大黄山查蟬退山豆根引加燈心水煎服方歌清金攻毒飲如神牛蒡甘桔合元參枳殻殭蠶前胡穗大黄山查蟬豆根披肩披肩兩肩痘成攢上下阻塞毒透難清熱解毒湯投證便秘歸宗又為先註兩肩之痘粘連成攢其色赤紫滯黯名曰披肩此毒氣不鬆上下阻塞也以清熱解毒湯主之大便秘者以歸宗湯主之清熱解毒湯方見見㸃證治歸宗湯方見發熱證治聚背背間出痘不宜多若逄攢聚命蹉跎根鬆鬆肌燕脂貼𦂳硬必勝湯可活註大凡毒𤼵於背者多闗生死至於出痘更貴稀疎若背間攢聚粘連者名曰聚背而亦當辨根脚之𦂳鬆根鬆者毒尚活動内服鬆肌通聖散外用燕脂膏貼之根𦂳硬者因毒錮血凝急用必勝湯治之然亦死中求活之一法耳鬆肌通聖散方見蒙頭證治燕脂膏方見蒙骩證治必勝湯方見見㸃證治攢胸胸前出痘貴稀輕攢聚粘連毒熱凝速用凉膈攻毒飲免使梟毒内裏攻註胸膈乃心肺二經部位出痘稀少方吉倘攢簇于此名曰攢胸乃毒熱所致也當以凉膈攻毒飲主之則梟毒不内侵矣凉膈攻毒飲梔子生黄連生石膏生荆芥紫花地丁枳殻麩炒桔梗元參生地牛蒡子炒研大黄赤芍甘草生薄荷木通引加燈心竹葉水煎服方歌凉膈攻毒治攢胸梔連石膏荆地丁枳桔元參生地蒡大黄芍草薄木通斷橋斷橋之痘形甚異腰間絶無上下宻氣血阻滯毒熱壅歸宗峻攻痘出吉註痘名斷橋者腰間絶無一㸃惟身之上下稠宻也盖梟毒壅於上下氣血阻于中宫故致上下隔斷而成最惡之證宜用歸宗湯攻之使無痘處透出方化為吉也歸宗湯方見𤼵熱證治纒腰腰為腎候痘宜疎連珠環遶奈何如治宜攻毒莫少待歸宗急服患能除註腰為腎候痘宜稀疎若連珠環遶名曰纒腰此毒伏于腎也治以攻毒為主宜用歸宗湯治之歸宗湯方見𤼵熱證治囊腹囊腹腹前痘如囊梟毒衝突勢猖狂透毒鬆肌通聖散攻毒歸宗湯甚良註腹前出痘狀如囊聚名曰囊腹是梟毒衝突勢甚猖狂也此地近於臟腑毒易内攻須先用鬆肌通聖散透發其毒再用歸宗湯以攻其毒使地界分明根脚鬆動庶無虞矣鬆肌通聖散方見蒙頭證治歸宗湯方見發熱證治鱗坐鱗坐兩臋痘若鱗急急治之莫逡廵平扁灰滯通聖效板硬紫黯歸宗神註鱗坐者兩臋之痘聚集如鱗也因毒火太甚攢聚於至隂之地若不急治變如反掌如平扁灰滯者鬆肌通聖散主之板硬紫黯者歸宗湯主之鬆肌通聖散方見蒙頭證治歸宗湯方見𤼵熱證治囊毬囊毬痘宻在腎囊毒聚於斯最難當即用散結湯調治毒宣熱解始安康註腎囊者乃腎之外候闗要處也若痘出稠宻乃毒聚於斯也宜用散結湯主之疏解通暢庶可愈矣散結湯荆芥羌活牛蒡子炒升麻川芎丹皮紫花地丁赤芍木通紫草青皮山查引加蘆笋十株水煎服方歌散結湯中藥堪誇荆芥羌蒡共升麻川芎丹皮地丁芍木通紫草青山查抱膝兩膝之痘獨稠密因地命名為抱膝須防行漿難下達速用鬆肌通聖治註抱膝者徧身痘出稀疎獨兩膝攢簇如餅此毒氣凝聚於膝至行漿時恐難下達於足脛也宜用鬆肌通聖􅄆加牛膝透之功效甚速鬆肌通聖􅄆方見蒙頭證治無根足踝以下痘無形毒熱錮蔽勢多凶速宜驅毒扶脾氣快癍越婢湯有功註足踝以下屬於脾經若週身有痘而此地獨無者名曰無根是毒滯於脾也但足為至隂之地非建立中州𤼵越脾氣不能下達故用快癍越婢湯以𤼵之快癍越婢湯黃耆蜜製桂枝防風白芍藥炒甘草生引用生薑紅棗水煎服方歌快癍越婢藥最靈黄耆桂枝及防風白芍甘草薑棗引煎服之後痘自生蛇皮蛇皮痘出似蛇皮隱隱簇簇漫無拘毒輕歸宗湯調治毒重必勝豬尾宜註痘出叢簇成片散漫無拘名曰蛇皮見㸃之初視其隱隱簇簇細宻無倫乃毒火所致以歸宗湯攻其毒甚者以必勝湯佐以豬尾膏救之歸宗湯方見發熱證治必勝湯方見見㸃證治豬尾膏方見鎻脣證治蠶種痘出形如蠶佈種梟毒勢重逆而凶速用歸宗湯救治毒鬆痘起可望生註痘出稠密如蠶佈種者名曰蠶種乃梟毒太重凶逆之甚速用歸宗湯攻之使毒鬆痘起方可望生歸宗湯方見𤼵熱證治燕窩痘形纍纍似燕窩聯絡細密不成顆外用燕脂㸃痘上内服凉血解毒和註痘出纍纍聯絡細宻不成顆粒故謂之燕窩宜外用燕脂膏貼法内服凉血解毒湯和之燕脂膏方見蒙骩證治凉血解毒湯方見結痂落痂證治鼠跡四五相連名鼠跡周身為重少見輕速用歸宗攻毒熱相併成泡始堪生註痘出四五粒或六七粒相聚粘連者名曰鼠跡見一二處者輕見周身者為重速用歸宗湯攻之令相併成泡其毒方解始可望生歸宗湯方見發熱證治疊錢痘形平伏無顆粒團團攢聚若疊錢外用燕脂調貼法内服凉血攻毒痊註痘已見㸃平伏不起顆粒不分團團攢聚狀若疊錢者此血熱毒盛也外用燕脂膏貼之内以凉血攻毒飲治之燕脂膏方見蒙骩證治凉血攻毒飲方見見㸃證治環珠痘出圍繞若環珠毒氣壅滯宜早圖清熱解毒為妙劑毒解漿生患自除註痘名環珠者以出而圍繞形若環珠也此毒氣壅滯所致宜早圖治以清熱解毒湯主之使毒解漿生其患自除矣清熱解毒湯方見見㸃證治浮萍視之有㸃按無形參差紫黯若浮萍速用凉血攻毒劑能使毒鬆色轉紅註浮萍者視之有㸃按之無形參差不齊痘色紫黯狀如浮萍也此乃血瘀毒熾非急攻不可速用凉血攻毒飲攻之能使毒鬆色轉紅活庶可望生凉血攻毒飲方見見㸃證治蟹爪痘形連貫顆碎宻上濶下細蟹爪形起脹根鬆毒始解清熱解毒服有功註蟹爪者痘形連貫顆粒碎宻上濶下細如蟹爪之狀急用清熱解毒湯治之使連貫處起脹根鬆其毒可解也清熱解毒湯方見見㸃證治䕯沙痘形歪斜復扁濶無頂無盤名䕯沙通聖歸宗酌量用頂起根鬆痘始佳註䕯沙者痘形扁濶歪斜不圓無頂無盤若䕯沙細小宜先用鬆肌通聖散主之若色紫黯者歸宗湯主之能頂起根鬆始為佳境鬆肌通聖散方見蒙頭證治歸宗湯方見發熱證治血泡痘夾血泡因肺熱或紫或赤㣲甚别内服凉血解毒湯外用鍼刺出惡血註痘當起脹時忽有小泡夾痘而出漸漸長成如白果大毒甚則紫毒㣲則赤皆謂之血泡此因毒熱在肺傳於皮膚大小不一須内服凉血解毒湯外用銀鍼刺破流出惡血方保無恙若不急治聼其自破惡汁流染痘亦因之赤爛矣治者宜詳記之凉血解毒湯方見結痂落痂證治水泡水泡濕淫尅脾經手足稠宻身面輕内服加味保元劑外塗胡荽官粉靈註水泡者形大皮薄内含一包清水盖因濕淫之氣侵尅脾經故身面俱少手足獨宻以四肢屬脾故也須服加味保元湯外用銀鍼刺破以胡荽酒調官粉􅂗患處若延遲不治變成癢塌則難救矣加味保元湯人參豬苓澤瀉白术土炒黄耆蜜炙赤茯苓甘草炙引用生薑水煎服方歌加味保元功最㨗人參豬苓共澤瀉白木黄耆赤茯苓甘草生薑同一列胡荽酒胡荽四兩切碎黄酒半觔同煎勿令洩氣候温調官粉搽敷破處肉腫瘡不腫瘡未起脹肉腫浮皮光色艷最堪愁赤艷羌活救苦治淡紅參歸大補求通身盡赤毒熱熾速以歸宗及早投註痘當起脹時自頭及身漸次同痘浮起此氣領血載其毒外𤼵也如頭身之肉先腫皮色赤艷而痘瘡不腫此為毒邪有餘不受正制宜用羌活救苦湯若皮色淡紅者乃氣血不足不能拘攝毒氣宜用參歸大補湯治之更有通身皮膚盡赤此為毒火熾盛煎灼血分宜用歸宗湯羌活救苦湯蔓荆子羌活牛蒡子炒升麻黄耆生川芎連翹去心桔梗白芷防風人中黄引用荷葉水煎服方歌羌活救苦湯最良升麻川芎合羌防牛蒡黄耆白芷翹蔓荆桔梗人中黄參歸大補湯人參當歸黄耆甘草白芷川芎防風紫草茸木香南山查厚樸薑炒桔梗引用生薑水煎服方歌參歸大補最有靈參耆當歸桔川芎防風白芷木香草厚樸山查紫草茸歸宗湯方見發熱證治乾枯毒火煎灼傷隂血痘體乾枯少潤澤當歸活血加味甞治若少緩變莫測註色者血之華也血和則滋潤光瑩血耗則乾燥枯竭痘之毒火入于血分輕則焮紅甚則焦紫治以救血為急宜當歸活血湯主之當歸活血湯當歸川芎赤芍生地紅花紫草黄芩黄連大黄水煎服方歌加味當歸活血湯痘色乾枯服最良四物紅花共紫草加入芩連生大黄鋪紅鋪紅多因元氣弱血不歸附毒漫行肌膚盡紅根赤艷氣失統攝痘多凶氣虚九味神功補毒盛凉血觧毒清註起脹時血盡歸附于痘根下有紅線𦂳束乃正形也若元氣虚弱血不歸附致毒氣散漫肌膚之上根色紫艷是氣失統攝之力多致不救若氣虚而痘色㣲赤者以九味神功散主之毒盛根艷者以凉血解毒湯主之九味神功散人參黄耆生紫草茸紅花前胡牛蒡子炒研甘草生白芍藥酒炒生地黄引用大棗水煎服方歌九味神功治鋪紅人參黄耆紫草茸紅花前胡牛蒡草白芍生地棗相從凉血解毒湯方見結痂落痂證治根窠無暈血虚痘色多散漫根窠淡白少鮮艷芎歸保元湯可投參歸鹿茸有竒驗註痘至成漿時若氣血交㑹必有一血線𦂳附根下如珍珠置於燕脂之上粒粒光彩此正形也設平日氣血虚弱當灌漿時頂雖圎滿根下全無紅暈以芎歸保元湯主之虚甚者以參歸鹿茸湯主之芎歸保元湯人參甘草炙黄耆蜜炙當歸酒洗川芎引用龍眼肉水煎服方歌芎歸保元治血虚人參甘草共黄耆酒洗當歸川芎配龍眼作引服無時參歸鹿茸湯方見灌漿證治皮薄漿嫩痘瘡皮薄根不紅待得成膿漿淡清溶溶破爛不完整氣血虚弱證多凶速服十全大補劑氣充血足始堪生註痘瘡頼氣血以成功氣血充實則痘皮蒼老肥滿堅厚若氣血虚縮痘必光亮軟皺溶溶如濕須用十全大補湯峻補氣血庶毒化漿行可保安全矣十全大補湯人參黄耆蜜炙茯苓當歸白术土炒肉桂甘草炙白芍酒炒熟地黄川芎引用煨薑水煎服方歌十全大補湯最靈人參黄耆白茯苓當歸白术肉桂草白芍熟地及川芎空殻無漿痘殻圓融漿不行有虚有實要分明根色淡白血虛弱紫𦂳由于血熱凝千金内托同四物因證施治莫遲停註痘至行漿時頭面週身外雖脹而内實無漿名曰空殻當别虚實治之如根色淡白者此血虚不能化毒成漿也宜千金内托散根𦂳而紫者此氣行血滯毒熱伏于血分而不能成漿也宜加味四物湯治之千金内托散方見見㸃證治加味四物湯生地酒洗川芎白芍酒炒當歸酒洗連翹去心紫草茸酒洗水煎服方歌加味四物湯當歸生地黄川芎白芍藥紫茸連翹良痘頂塌陷痘根雖紅頂塌陷此證多縁氣虚見面白肢冷食懶嘗虚煩便溏身怠倦急用補中益氣湯氣充頂升漿充貫註陷頂者由中氣㣲弱不能振揚故灌漿時根雖紅潤頂却㣲塌現證面白肢冷不思飲食虚煩便溏身體怠倦也治宜補氣為主用補中益氣湯則氣足漿升而頂自起矣補中益氣湯黄耆蜜炙白术土炒人參升麻柴胡炒陳皮甘草炙當歸身引用煨薑大棗水煎服方歌補中益氣效如神黄耆白术共人參升麻柴胡陳皮草煨薑大棗及歸身灰陷白陷氣血虚寒不振揚灰白陷頂少膿漿速用參歸鹿茸劑鷄冠血酒更堪嘗註痘至灌漿時其色淡白根無紅暈而頂陷者是謂白陷虚極則轉為灰陷由氣虚委而不振血虚漿不能充故一陷而不可遏也治宜大補氣血為主宜參歸鹿茸湯臨服入鷄冠血酒日進二三服但得頂起漿行方免無恙參歸鹿茸湯方見灌漿證治鷄冠血酒用大雄鷄一隻先將白酒一杯炖温次刺鷄冠血數㸃滴入杯中和勻仍炖温調煎藥内服紫陷黒陷紫陷黒陷皆毒盛平塌昏黯根不鬆此屬氣血被火欎解毒急宜用歸宗註痘出稠宻顆粒碎小根𦂳昏黯頂凹下而紫者謂之紫陷甚而轉為黒色則為黒陷皆由毒火欎閉氣不宣通故也治宜清熱解毒以歸宗湯主之歸宗湯方見𤼵熱證治板黄漿未充足痘板黄頂塌成片皮硬僵氣滯血凝難灌溉皆縁毒熱侵脾鄉速服清毒活血劑毒化痘起轉安康註板黄者謂灌膿時漿未得半忽然黄色突起乾燥堅硬盖因梟毒肆害脾鄉故氣滯血凝難以灌溉也須用清毒活血湯治之倘得痘起尚可望生若頭面頸項眼眶脣上及週身黄者則不治也清毒活血湯當歸白芍藥酒炒生地黄紫草茸酒洗黄芩黄連酒炒牛蒡子炒南山查連翹去心人參黄耆生桔梗木通引用燈心水煎服方歌清毒活血湯最靈歸芍生地紫草茸芩連牛蒡山查翹參耆桔梗合木通倒靨倒靨漿清陷不紅痘殻皮皺痂不成速用加味保元劑氣充血足痘収功註倒靨者漿色清稀不足根脚淡白無暈徧體形如豆殻瘡皮皺而似結非結至収靨時終不成痂此因氣血兩虛乏領載之力也宜加味保元湯治之加味保元湯人參黄耆蜜炙甘草炙全當歸酒洗白芍酒炒木香煨白术土炒官桂引用老米水煎服方歌加味保元治倒靨人參黄耆甘草協當歸白芍廣木香白术官桂效更㨗痘疔痘疔梟毒亂正瘡色紫黒黯形堅強先出先長妨諸痘鍼刺隨貼四聖良註痘疔之成由梟毒藴伏錮蔽于肌肉之間痘未出疔先出痘未長疔先長其色紫黒其形堅強五臟各有所見心疔色赤起于顴阜胸乳之處肝疔色紫起于左太陽左脇眼胞兩臋阜之處脾疔色先黄後黒起于腮頰中庭口角肚腹手足之處肺疔色先灰後黒起於右太陽右脇頸項喉突之處腎疔色黒起於地閣後頸耳窖背窬腰脊陽莖之處見時急用銀鍼刺破以洩毒血刺後用四聖膏貼患處若遲延不治能使痘當發不發當脹不脹當灌不灌而百變生矣四聖膏菉豆四十九粒豌豆四十九粒性俱燒灰存珍珠一分煆頭髮一分燒灰右為細末以棉燕脂水調和成膏將銀鍼撥開瘡頭然後􅂗之挑痘疔法痘疔須用鍼挑撥輕重徐急貴合宜破頂傷肌俱深忌上漿急挑莫遲疑註凡用鍼挑疔痘時以二指拿鍼平平入痘撥斷痘中筋絡衆痘即𤼵但挑時輕重疾徐之間貴乎得宜不可挑破痘頂亦不可重入傷肌須待三四五六日上漿之際痘能含鍼方可挑撥過七日則無用矣治者宜詳識之煮鍼法甘草生甘遂川烏草烏各等分用水一鍾入砂罐内以水乾為度每次可煮四五鍼煮完入鵝翎筒内黄蠟塞口収之御纂醫宗金鑑卷五十七
