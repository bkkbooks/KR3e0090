body:
  text: 訂正仲景全書傷寒論註壊病篇目錄陽旦湯補甘草乾薑湯芍藥甘草湯麻黃升麻湯柴胡加龍骨牡蠣湯禹餘糧丸缺桂枝加桂湯更加桂桂枝去芍藥加蜀漆龍骨牡蠣救逆湯桂枝甘草龍骨牡蠣湯御纂醫宗金鑑卷十一目録欽定四庫全書御纂醫宗金鑑卷十一訂正仲景全書傷寒論註壊病篇目錄陽旦湯補甘草乾薑湯芍藥甘草湯麻黃升麻湯柴胡加龍骨牡蠣湯禹餘糧丸缺桂枝加桂湯更加桂桂枝去芍藥加蜀漆龍骨牡蠣救逆湯桂枝甘草龍骨牡蠣湯御纂醫宗金鑑卷十一目録欽定四庫全書御纂醫宗金鑑卷十一訂正仲景全書傷寒論註辨壞病衇證幷治篇壞病者謂不當汗而汗不當吐而吐不當下而下即當汗吐下而過甚或當汗吐下而失時皆為施治失宜所以成壞病也凡三隂三陽若汗若吐若下若溫鍼火熏火熨火灸火劫等法致諸壞病者有汗後亡陽眩冒振惕魄汗不收有下後虛中結胸痞鞕下利不止有吐後煩亂腹滿有溫鍼失血驚狂甚至陽毒斑狂隂躁欲死神昬讝語循衣摸床之類是也其論散見諸篇今合為一集以便後學其中或有掛漏是在能三反者太陽病三日已發汗若吐若下若溫鍼仍不解者此為壞病桂枝不中與也觀其衇證知犯何逆隨證治之註太陽病三日邪在三陽時也若已經發汗若吐若下若溫鍼其法備施病仍不解者此為壞病由施治失宜也此時即有表證桂枝亦不中與當觀其衇證知所誤犯者何逆而隨證治之不可以成法拘也集註方有執曰既不可定以正名則亦難以出其正治故但示人以隨機應變之微㫖一以貫之斯言盡之矣程知曰病在太陽治之不當即成壞病故初治不可不愼桂枝不可與以桂枝證罷也若桂枝證仍在則不謂之壞病矣程應旄曰如汗後亡陽動經渇躁讝語下後虛煩結胸痞氣吐後内煩腹脹滿溫鍼後吐衂驚狂之類紛紜錯出者俱是爲前治所壞後人切不得執成法以救逆所以前證雖屬桂枝若壞則桂枝亦不中與也觀其衇證知犯何逆隨證治之蓋欲反逆爲順也非從望聞問切上探出前後根因無從隨證用法非頭痛醫頭之爲隨證治之也吳人駒曰不得拘三日爲表病而與桂枝當依現在之變壞者而爲救治本太陽病不解轉入少陽者脇下鞕滿乾嘔不能食往來寒熱尚未吐下衇沉緊者與小柴胡湯若已吐下發汗溫鍼讝語柴胡湯證罷此爲壞病知犯何逆以法治之按衇沉緊當是衇沉弦若是沉緊是寒實在胸當吐之證也惟衇沉弦始與上文之義相屬故可與小柴胡湯註本太陽病不解而見脇下鞕滿乾嘔不能食往來寒熱等證衇沉弦是邪轉入少陽也若未經吐下者當與小柴胡湯解其半表半裏之邪可也其已經吐下發汗溫鍼者則表裏俱虛更加讝語柴胡證罷此爲壞病即小柴胡湯亦不中與也當審其所犯何逆隨證以法治之可也集註成無己曰轉入少陽柴胡證也若已吐下發汗溫鍼不惟犯少陽三禁更加溫鍼以廹劫之損耗津液胃中乾燥必發讝語柴胡證罷者謂無脇下鞕滿乾嘔不能食往來寒熱等證也此爲壞病沈明宗曰太陽不解而傳少陽當與小柴胡和解乃爲定法反以吐下發汗溫鍼以犯少陽之戒而邪熱陷入陽明故發讝語已爲壞證要知讝語乃陽明受病即當知犯陽明之逆而治之若無讝語而見他經壞證湏慿證慿衇另以活法治之也太陽病中風以火劫發汗邪風被火熱血氣流溢失其常度兩陽相熏灼其身發黃陽盛則欲衄陰虛則小便難陰陽俱虛竭身體則枯燥但頭汗出劑頸而還腹滿微喘口乾咽爛或不大便久則讝語甚者至噦手足躁擾捻衣摸床小便利者其人可治註太陽病中風不以桂枝湯汗之而以火劫發汗故致生諸逆也風屬陽邪被火益熱故血氣流溢失其常度也以風火俱陽故曰兩陽熏灼熱蒸血瘀達於肌表故其身發黃也血爲熱廹故上逆欲衂陰虛液竭故小便難陰陽虛竭故身體枯燥陽熱熏灼陰液上越故頭汗出劑頸而還也熱傳太陰故腹滿口燥熱傳少陰故口乾咽爛熱壅於胸故肺燥微喘熱結於胃故不大便愈久則熱益深故噦逆讝語神明昬亂手足躁擾捻衣摸床之證見矣凡此諸壞證推求其源皆由邪火逆亂眞陰立亡多不可治然或小便利者則陰氣尚在故猶爲可治也可不愼之於始哉集註成無己曰内經云諸脹腹大皆屬於熱腹滿微喘者熱氣内鬱也經云火氣内發上爲口乾咽爛者火熱上熏也熱氣上而不下則大便不鞕若熱氣下入胃中消耗津液則大便鞕故云或不大便久則胃中燥熱必發讝語經云病深者其聲噦火氣太甚正氣逆亂故噦經云四肢者諸陽之本也陽盛則動故手足躁擾捻衣摸床也小便利者是陰未竭猶可治也喻昌曰此證陽邪挾火擾亂陰分而亡其陰與前二條亡陽證天淵懸絶觀陽盛欲衂身體枯燥諸句則知此證宜急驅其陽以存一線之陰不得泥陰陽俱虛竭一語而補其陽劫其陰也且頭汗為陽邪上壅不下通於陰所以劑頸以下不能得汗設見衂血則邪從衂解頭間且無汗矣設有汗則邪從汗解又不衂矣後條火邪深入必圊血亦身體枯燥而不得汗設有汗便不圊血矣讀古人書全要會意豈有得汗仍衂血圊血之理哉又曰仲景以小便利一端辨眞陰之亡與未亡最細葢水出高源小便利則津液不枯肺氣不絶可知也腎以膀胱爲府小便利則膀胱之氣化行腎水未絶可知也程應旄曰已上諸證莫非邪火逆亂眞陰立亡之象推求其原一皆血氣流溢失其常度至於如此邪風被火熱之害可勝言哉此際欲治風而火勢沸騰欲治火而風邪壅遏何從治之惟利小便一法如豬苓湯類可以導熱滋乾使小便得利則太陽之邪亦從膀胱為去路尚可治也倘利之而不利火無從出危矣太陽病醫發汗遂發熱惡寒因復下之心下痞表裏俱虛陰陽氣並竭無陽則陰獨復加燒鍼因胸煩面色青黃膚瞤者難治今色微黃手足溫者易愈註太陽表病醫過發汗已虛其表因復下之又虛其裏雖有未盡之表邪陷裏成痞但表裏俱虛陰陽並竭已成壞證矣况無陽則陰不生陰獨則陽不化而復加燒鍼火氣内攻陰陽皆病故胸滿而煩面色青黃肌膚瞤動也見證如此錯雜故為難治若面色微黄不靑手足不厥而溫則為陰陽之氣未竭故曰易治也集註方有執曰表以誤汗言裏以誤下言故曰俱虛陰指裏陽指表無陽謂陽竭也陰獨謂痞也靑黃脾受尅賊之色微黃土見回生之色手足溫陽氣回於四末也言既經反覆之誤又見尅賊之色肌膚瞤動而不寧則脾家之眞陰敗爲難治也今則土見回生之色四末得溫胃家之陽復故為易愈也傷寒衇浮自汗出小便數心煩微惡寒脚攣急反與桂枝湯欲攻其表此誤也得之便厥咽中乾煩燥吐逆者作甘草乾薑湯與之以復其陽若厥愈足溫者更作芍藥甘草湯與之其脚即伸若胃氣不和讝語者少與調胃承氣湯若重發汗復加燒鍼者四逆湯主之註傷寒衇浮自汗出中風證也小便數心煩裏無熱之虛煩也微惡寒者表陽虛不能禦也脚攣急者表寒收引拘急也是當與桂枝增桂加附子湯以溫經止汗今反與桂枝湯攻發其表此大誤也服後便厥者陽因汗亡也咽乾者陰因汗竭也煩燥者陽失藏也吐逆者陰拒格也故作甘草乾薑湯與之以緩其陰而復其陽若厥愈足溫則是陽已復宜更作芍藥甘草湯與之以調其陰而和其陽則脚即伸也若胃不和而讝語知爲邪已轉屬陽明當少少與調胃承氣湯令其微溏胃和自可愈也若重發汗者謂不止誤服桂枝湯而更誤服麻黄湯也或復加燒鍼劫取其汗以致亡陽證具則又非甘草乾薑湯所能治故又當與四逆湯以急救其陽也集註程應旄曰衇浮自汗雖似桂枝證而頭項不痛知陽神自歉於上部惡寒脚攣急知陰邪更襲於下焦陽虛隂盛而裏氣上逆故有心煩證裏陰攻及表陽差訛祗在煩字上觀結句若重發汗復加燒鍼者四逆湯主之可見陰證不必眞直中也治之一誤寒即中於治法中矣問曰證象陽旦按法治之而增劇厥逆咽中乾兩脛拘急而讝語師言夜半手足當溫兩脚當伸後如師言何以知此答曰寸口衇浮而大浮為風大為虛風則生微熱虛則兩脛攣病形象桂枝因加附子叅其間增桂令汗出附子溫經亡陽故也厥逆咽中乾煩躁陽明内結讝語煩亂更飲甘草乾薑湯夜半陽氣還兩足當熱脛尚微拘急重與芍藥甘草湯爾乃脛伸以承氣湯微溏則止其讝語故知病可愈註此設問答申明上條之義也桂枝證當用桂枝值時令溫熱或其人有熱用陽旦湯即桂枝湯加黄芩也値時令寒冷或其人有寒用陰旦湯即桂枝湯加乾薑也證象陽旦謂心煩似乎有熱也按法治之謂按法用陽旦湯也葢心煩小便數咽中乾似乎陽旦而不審脚攣急微惡寒之證是陰寒也即以陽旦湯攻其表誤也所以增劇厥逆咽中乾兩脛拘急讝語等壞證作也師言夜半手足當溫兩脚當伸如其言者何也答曰診衇浮大則為風虛非寒虛也故此知用桂枝不足以治其寒而加附子溫經即有陽明内結讝語煩亂等證渾不為意且更與甘草乾薑湯至夜半陽回足熱脛尚微拘急即與芍藥甘草湯以和其陰爾乃脛伸繼以承氣治其陽明内結故微溏而讝語止其病可愈矣是皆由於救之得法耳陽旦湯方補桂枝三錢芍藥二錢酒焙甘草二錢炙黄芩三錢酒炒生薑三片大棗二枚擘右水煎去滓溫服無時日二三服本方加乾薑名陰旦湯甘草乾薑湯方甘草四兩炙乾薑二兩炮右二味以水三升煮取一升五合去滓分溫再服芍藥甘草湯方芍藥四兩甘草四兩炙右二味以水三升煮取一升五合去滓分溫再服傷寒吐下後發汗虛煩衇甚微八九日心下痞鞕脇下痛氣上衝咽喉眩冒經衇動愓者久而成痿按八九日心下痞鞕脇下痛氣上衝咽喉三句與上下文義不屬必是錯簡註家因此三句皆蔓衍支離牽強註釋不知此證總因汗出過多大傷津液而成當用補氣補血益筋壯骨之藥經年始可愈也註傷寒吐下後復發其汗治失其宜矣故令陽氣陰液兩虛也陰液虛故虛煩陽氣虛故衇微陽氣微而不升故目眩冒陰液虛而不濡故經衇動愓也陽氣陰液虧損久則百體失所滋養故力乏筋軟而成痿矣傷寒六七日大下後寸衇沉而遲手足厥逆下部衇不至咽喉不利唾膿血泄利不止者爲難治麻黄升麻湯主之註傷寒六七日邪傳厥陰厥熱勝復之時醫不詳審陰陽而大下之致變中寒下竭之壞證中寒故寸衇沉遲手足厥逆下竭故尺衇不至泄利不止也蓋未下之前陽經尚伏表熱大下之後則其熱乘虛下陷内犯厥陰厥陰經循喉嚨貫膈注肺故咽喉不利唾膿血也此爲陰陽錯雜表裏混淆之證若溫其下恐助上熱欲淸其上愈益中寒仲景故以此湯主之正示人以陰陽錯雜爲難治當於表裏上下求治法也蓋下寒上熱固爲難溫裏寒無汗還宜解表故用麻黄升麻湯以解表和裏淸上溫下随證治之也集註程知曰言厥逆有因於誤下致變者也凡傷寒熱熾者其陰必虛六七日雖當傳裏之時設表證仍在而大下之則陰傷而陽亦陷寸衇沉遲手足厥冷下利不止傷其陽而氣内陷也下部衇不至咽喉不利吐膿血傷其陰而熱内逼也一下之誤既傷其陽復傷其陰故難治與麻黄升麻湯以升陽調下清熱滋陰蓋傳經熱邪從外入於内者仍當從内出於外也故曰汗出愈喻昌曰寸衇沉而遲明是陽去入陰之故非陽氣衰微可擬故雖手足厥冷下部衇不至泄利不止其不得為純陰無陽可知况咽喉不利唾膿血又陽邪搏陰上逆之徵驗所以仲景特於陰中提出其陽得汗出而錯雜之邪盡解矣麻黄升麻湯方麻黄二兩半去節升麻一兩一分當歸一兩一分知母十八銖黄芩十八銖萎蕤十八銖石膏六銖裹碎綿白术六銖乾薑六銖芍藥六銖天冬六銖去心桂枝六銖茯苓六銖甘草六銖炙右十四味以水一斗先煮麻黄一二沸去上沫內諸藥煮取三升去滓分溫三服相去如炊三升米頃令盡汗出愈方解下寒上熱若無表證當以黄連湯為法今有表證故復立此方以示隨證消息之治也升麻萎蕤黄芩石膏知母天冬乃升舉走上清熱之品用以避下寒且以滋上也麻黄桂枝乾薑當歸白芍白术茯苓甘草乃辛甘走外温散之品用以遠上熱且以和内也分温三服令盡汗出愈其意在緩而正不傷徹邪而盡除也衇雖寸衇沉遲尺衇不至證雖手足厥逆下利不止究之原非純陰寒邪故兼咽喉痛唾膿血之證是寒熱混淆陰陽錯雜之病皆因大下奪中所變故仲景用此湯以去邪為主邪去而正自安也傷寒八九日下之胸滿煩驚小便不利讝語一身盡重不可轉側者柴胡加龍骨牡蠣湯主之註傷寒八九日邪不解表不盡不可下也若下之其邪乘虛内陷在上者輕則胸滿重則結胸胸滿者熱入於胸氣壅塞也在中者輕則煩驚重則昬狂煩驚讝語者熱乘於心神不寧也在下者輕則小便不利重則少腹滿痛小便不利者熱客下焦水道阻也邪壅三焦則榮衞不行水無去路則外滲肌體故一身盡重不可轉側也以柴胡加龍骨牡蠣湯主之其大意在和解鎭固攻補兼施也按此條乃陽經濕熱之身重若以爲津亡血濇陽氣不能宣布陰經濕寒之身重則誤矣寒濕身重用眞武湯桂枝附子湯以不渴裏無熱也熱濕身重用白虎湯柴胡加龍骨牡蠣湯以讝煩胃有熱也其風濕風温身重亦不外乎兼寒兼熱故此湯中用苓半大黄為佐也集註方有執曰胸滿者下後裏虛外熱入裏挾飲上搏於膈所以煩也驚傷心心藏神而居膈正虛邪勝所以不寧一身盡重不可轉側者傷寒本一身疼痛亡津液而血濇不利故變為沉滯而重甚也程知曰下而心煩腹滿治以梔樸為邪入腹也下而胸滿煩驚治以龍牡為邪入心也因火劫而致煩驚治以桂枝龍牡挽心陽之外越也因下而致煩驚治以柴胡龍骨牡蠣解心陽之内塞也大小陷胸以高下緩急别之諸瀉心湯以寒熱虛實辨之半芩治痰芩連降逆梔豉湧虛煩參附回陽虛下後大法備於斯矣喻昌曰八九日過經乃下之可謂愼矣孰知外邪未盡乘虛而陷邪方在表裏其患已及於神明於此而補天浴日豈復易易張璐曰此係少陽之裏證諸家註作心經病誤也蓋少陽有三禁不可妄犯雖八九日過經下之尚且邪氣内犯胃土受傷膽木失榮痰聚膈上有如是之變故主以小柴胡和解内外逐飲通津加龍骨牡蠣以鎭肝膽之驚也柴胡加龍骨牡蠣湯方柴胡四兩半夏二合洗龍骨一兩半人參一兩半大黄二兩牡蠣一兩半茯苓一兩半鉛丹一兩半桂枝一兩半生薑一兩半大棗二枚擘右十一味以水八升煮取四升內大黄切如碁子更煮一二沸去滓溫服一升方解是證也為陰陽錯雜之邪是方也亦攻補錯雜之藥柴桂解未盡之表邪大黃攻已陷之裏熱人參薑棗補虛而和胃茯苓半夏利水而降逆龍骨牡蠣鉛丹之澁重鎭驚收心而安神明斯為以錯雜之藥而治錯雜之病也汗家重發汗必恍惚心亂小便已陰痛與禹餘糧丸按禹餘糧丸爲濇痢之藥與此證不合與禹餘糧丸五字衍文也註汗家謂平素好出汗之人也重發汗謂大發汗也心主血汗乃心之液重發其汗血液大傷心失所恃故神情恍惚心志不寧也液竭於下宗筋失飬故小便已陰莖疼也集註方有執曰心主血而藏神汗多則血虛而舍空恍惚心亂者以舍空神紛散也陰宗筋也痛者液竭而失其所榮養也程應旄曰心主血汗者心之液平素多汗之家心虛血少可知重發其汗遂至心失所養神恍惚而多忡憧之象此之謂亂小腸與心爲表裏心液虛而小腸之水亦竭故小便已而陰疼也衂家不可發汗汗出必額上陷衇𦂳急目直視不能眴不得眠註衂家者該吐血而言也謂凡衂血吐血之人陰氣暴亡若再發其汗汗出液竭諸衇失養則額角上陷中之衇為熱所灼故𦂳且急也目直視目瞪不轉睛也不能眴目睫不合也亦皆由熱灼其衇引縮使然不得眠者陽氣不能行於陰也凡此所見之病皆陽盛陰微之危證誰謂衂家可輕發其汗耶集註喻昌曰目得血而能視汗為血液衂血之人清陽之氣素傷更發其汗則額上必陷乃上焦枯竭之應也諸衇皆屬於目筋衇緊急則目上瞪而不能合目不合則不得眠也傷寒發煩目瞑者必衂宜麻黄湯發其汗此言素常失血之人戒發其汗以重虛其虛故也亡血家不可發汗發汗則寒慄而振註凡失血之後血氣未復為亡血虛家皆不可發汗也葢失血之初固屬陽熱然亡血之後熱隨血去熱固消矣而氣隨血亡陽亦危矣若再發汗則陽氣衰微力不能支故身寒噤慄振振聳動所必然也葢發陰虛之汗汗出則亡陰即發暴吐衂血之汗也故見不能眴不得眠亡陰等病也發陽虛之汗汗出則亡陽即發亡血虛家之汗也故見寒慄而振亡陽等病也集註方有執曰亡血陰已虛矣發汗復亡其陽故寒慄而振也程應旄曰亡血陰虛陽已失依若發其汗陽從外脫故寒慄而振是為陰陽兩竭凡遇當汗證便當顧慮陰經之榮血有如此者魏荔彤曰與其汗出亡陽方救陽何如汗未出先救陰以維陽不令汗出亡陽之為愈也咽喉乾燥者不可發汗註咽喉乾燥津液不足也更發其汗則津液益枯故戒人雖有可汗之證亦不可發汗也集註方有執曰咽喉乾燥津液素虧本於腎水不足葢少陰之衇循喉嚨也發汗則津液愈亡程應旄曰凡遇可汗之證必當顧慮上焦之津液又有如此者張璐曰此條與咽中閉塞似同實異此戒發汗以奪陽明之津彼戒發汗以奪少陰之血也淋家不可發汗發汗則便血註淋家者濕熱蓄於膀胱水道澁痛之病也若發其汗濕隨汗去熱必獨流水府告匱迫其本經之血從小便而出矣集註程知曰膀胱裏熱則淋更發其汗則膀胱愈燥而小便血矣瘡家雖身疼痛不可發汗發汗則痙註瘡家初起毒熱未成法當汗散已經潰後血氣被傷雖有身痛應汗表證亦不可發汗恐汗出榮衞愈虛外風乘襲即不受外風筋失液養亦必致項強反張而成痙病也集註喻昌曰身疼痛為寒傷榮之證本當發汗瘡瘍之人肌表素虛榮血暗耗更發其汗則外風襲虛内血不榮必致頸項強身反張而成痙痙亦膀胱之病也太陽傷寒者加溫鍼必驚也燒鍼令其汗鍼處被寒核起而赤者必發奔豚氣從少腹上衝心者先灸核上各一壯與桂枝加桂湯更加桂註太陽傷寒加溫鍼必驚者謂病傷寒之人卒然加以溫鍼其心畏而必驚也非溫鍼之後必生驚病也燒鍼即溫鍼也燒鍼取汗亦是汗法但鍼處宜當避寒若不謹慎外被寒襲火鬱衇中血不流行必結腫核赤起矣且溫鍼之火發為赤核又被寒侵故不但不解反召陰邪葢加鍼之時心既被驚所以腎陰乘心之虛上凌心陽而發奔豚也奔豚者腎陰邪也其狀氣從少腹上衝於心也先灸核上各一壯者外去寒邪繼與桂枝加桂湯更加桂者内伐腎邪也桂枝加桂湯方於桂枝湯方内更加桂二兩成五兩餘依桂枝湯法集解徐彬曰此乃太陽風邪因燒鍼令汗復感於寒邪從太陽之府膀胱襲入相合之腎藏而作奔豚故仍從太陽之例用桂枝全方倍加桂者以内瀉陰氣兼驅外邪也太陽病以火熏之不得汗其人必躁到經不解必圊血名為火邪註火熏古劫汗法也即今火炕溫覆取汗之法太陽病以火熏之不得汗其人必内熱躁甚陰液愈傷陽不得陰無從化汗故反致不解也其火襲入陰中傷其陰絡廹血下行故必圊血也命名火邪示人以當治火邪不必治圊血也集註方有執曰躁手足疾動也到猶言反也謂徒躁擾而反不得解也汗為血之液血得熱則行火性大熱既不得汗則血必橫溢所以必圊血也程應旄曰太陽病以火熏之取汗竟不得汗其液之素少可知葢陽不得陰則無從化汗也陰虛被火熱無從出故其人躁擾不寧也衇浮熱甚反灸之此為實實以虛治因火而動故咽燥而吐血註衇浮熱甚實熱在表也無灸之之理而反灸之此為實實謂其誤以實為虛也故熱因火動其勢炎炎致咽燥而吐血必矣葢上條火傷陰分廹血下行故令圊血此條火傷陽分廹血上行故吐血也集註程應旄曰表實有熱誤認虛寒而用灸法熱無從泄因火而動自然内攻邪束於外火攻於内肺金被傷故咽燥而吐血汪琥曰表有風熱而反灸是以實作虛治也微數之衇甚不可灸因火爲邪則為煩逆追虛逐實血散衇中火氣雖微内攻有力焦骨傷筋血難復也註微數之衇乃陰虛血少之證斷不可灸若誤灸之艾火内攻為煩為逆煩者陰為陽擾也逆者追虛逐實也陰本虛而加以火則愈虛是為追虛陽本實而加以火則愈實是為逐實然血已耗散衇中艾火之氣雖微而内攻有力矣故致焦骨傷筋血難復也集註喻昌曰衇微而數陰虛多熱之徵也此而灸之則虛者愈虛熱者愈熱不致傷殘不止矣程應旄曰若血少陰虛之人衇見微數尤不可灸以血主濡之主潤筋骨也若失其所濡則火之所至其骨必焦其筋必損内傷其陰未有不流散於經衇者也榮氣微者加燒鍼則血留不行更發熱而躁煩也註榮氣微者榮血虛微也榮血既已虛微若誤加燒鍼則榮血涸留而無所行也豈止焦骨傷筋而已哉所以更發熱而躁煩也集註程知曰言榮微忌燒鍼也陰虛則内熱若加燒鍼以助陽則兩熱相合而榮血不行必更外發熱而内煩躁也唐不巖曰其始也雖微流燒鍼以逼之也其既也留而不行燒鍼以竭之也張璐曰火為陽邪必傷隂血治此者當以救隂為主衇浮宜以汗解用火灸之邪無從出因火而盛病從腰以下必重而痺名火逆也註衇浮表邪宜以汗解誤用火灸傷其血液不能作汗反令表邪無所從出以致邪因火盛外不焦骨傷筋内不吐衂圊血而病腰以下重痺者必其人素有濕邪在下故從濕化也重者着也重着不移也然不以痺名者以非風寒濕之痺乃因火逆不相交通故名火逆也集註方有執曰痺濕病也因火逆治火邪夾陽邪而上逆陽不下通隂不用事化不行而水不得泄故濕著下體而重痺也程應旄曰衇浮在表汗解為宜矣因火灸之不能得汗則邪無出路因火而盛即不焦骨傷筋而火阻其邪陰氣漸竭下焦乃榮血所治榮氣竭而不運必重着而為痺名曰火逆示人欲治其痺宜先治其火也形作傷寒其衇不弦緊而弱弱者必渴被火者必讝語弱者發熱衇浮解之當汗出愈按三弱字當俱是數字若是弱字熱從何有不但文義不屬且論中並無此說註形作傷寒者言其病形作傷寒之狀也但其衇不弦緊而數數者熱也衇浮數熱在表太陽證也沉數熱在裏陽明證也數衇為熱熱入陽明故必口渴若被火刦其熱更甚故必讝語衇數之病雖皆發熱然其施治不無别焉若衇浮數發熱解之當以汗汗出可愈宜大青龍湯衇沉數發熱解之當以下下之可愈宜調胃承氣湯若衇數無表裏證惟發熱而渴讝語者不可汗下宜白虎湯黄連解毒湯清之可也傷寒衇浮醫以火逼刦之亡陽必驚狂起臥不安者桂枝去芍藥加蜀漆龍骨牡蠣救逆湯主之註傷寒衇浮醫不用麻桂之藥而以火刦取汗汗過亡陽故見驚狂起臥不安之證蓋由火刦之誤熱氣從心且大脫津液神明失倚也然不用附子四逆軰者以其爲火刦亡陽也宜以桂枝湯去芍藥加蜀漆龍骨牡蠣救逆湯主之去芍藥者恐其隂性遲滯兼制桂枝不能迅走其外反失救急之㫖况既加龍蠣之固脫亦不湏芍藥之酸收也蜀漆氣寒味苦寒能勝熱苦能降逆火邪錯逆在所必需也集註喻昌曰篇中誤服大青龍湯厥逆筋愓肉瞤而亡陽者乃汗多所致故用真武湯救之此以火廹刼而亡陽者乃方寸元陽之神被火廹刦而飛騰散亂故驚狂起臥不安有如此者少緩湏臾神丹莫挽矣故以此湯救之蓋陽神散亂當求之於陽桂枝湯陽藥也然必去芍藥之隂歛始得疾趨以達於陽位更加蜀漆者緣蜀漆之性最急又加龍骨牡蠣有形之骨屬為之舟楫以載神而返其宅也桂枝去芍藥加蜀漆龍骨牡蠣救逆湯方桂枝三兩甘草二兩炙生薑三兩切牡蠣五兩熬龍骨四兩大棗十二枚擘蜀漆三兩脚洗去右爲末以水一斗二升先煮蜀漆減二升内諸藥煮取三升去滓溫服火逆下之因燒鍼煩躁者桂枝甘草龍骨牡蠣湯主之註火逆者謂凡火刦取汗致逆者也此火逆因火鍼也燒鍼刦汗而復下之火逆之邪雖因下減而煩躁一證獨不除者蓋因汗下大傷津液而然也故用桂枝甘草以救表龍骨牡蠣以固中不治煩躁而煩躁自愈也集註喻昌曰此證誤而又誤雖無驚狂等變然煩躁則外邪未盡之候亦真陽欲亡之機也程應旄曰火逆下之裏氣虛矣不治其虛更加燒鍼自致亡陽但見煩躁證而不盡如前條之驚狂起臥不安者由熱勢之緩急有殊故前方之加減稍異總不容煩躁之以假亂真也桂枝甘草龍骨牡蠣湯方桂枝一兩甘草二兩炙龍骨二兩牡蠣二兩熬右四味為末以水五升煮取二升半去滓溫服八合日三服集解汪琥曰此方即桂枝去芍藥加蜀漆龍骨牡蠣救逆湯制小其劑而用之也火邪廹内則生煩躁雖煩躁似帶表邪不宜散以桂枝之辛熱而火逆既經下之則隂血受傷較之救逆湯似當増芍藥也音切灼音酌摸末各切痿烏魁切唾湯臥切炊音吹刼音訐眴與旬同御纂醫宗金鑑卷十一欽定四庫全書御纂醫宗金鑑卷十一訂正仲景全書傷寒論註辨壞病衇證幷治篇壞病者謂不當汗而汗不當吐而吐不當下而下即當汗吐下而過甚或當汗吐下而失時皆為施治失宜所以成壞病也凡三隂三陽若汗若吐若下若溫鍼火熏火熨火灸火劫等法致諸壞病者有汗後亡陽眩冒振惕魄汗不收有下後虛中結胸痞鞕下利不止有吐後煩亂腹滿有溫鍼失血驚狂甚至陽毒斑狂隂躁欲死神昬讝語循衣摸床之類是也其論散見諸篇今合為一集以便後學其中或有掛漏是在能三反者太陽病三日已發汗若吐若下若溫鍼仍不解者此為壞病桂枝不中與也觀其衇證知犯何逆隨證治之註太陽病三日邪在三陽時也若已經發汗若吐若下若溫鍼其法備施病仍不解者此為壞病由施治失宜也此時即有表證桂枝亦不中與當觀其衇證知所誤犯者何逆而隨證治之不可以成法拘也集註方有執曰既不可定以正名則亦難以出其正治故但示人以隨機應變之微㫖一以貫之斯言盡之矣程知曰病在太陽治之不當即成壞病故初治不可不愼桂枝不可與以桂枝證罷也若桂枝證仍在則不謂之壞病矣程應旄曰如汗後亡陽動經渇躁讝語下後虛煩結胸痞氣吐後内煩腹脹滿溫鍼後吐衂驚狂之類紛紜錯出者俱是爲前治所壞後人切不得執成法以救逆所以前證雖屬桂枝若壞則桂枝亦不中與也觀其衇證知犯何逆隨證治之蓋欲反逆爲順也非從望聞問切上探出前後根因無從隨證用法非頭痛醫頭之爲隨證治之也吳人駒曰不得拘三日爲表病而與桂枝當依現在之變壞者而爲救治本太陽病不解轉入少陽者脇下鞕滿乾嘔不能食往來寒熱尚未吐下衇沉緊者與小柴胡湯若已吐下發汗溫鍼讝語柴胡湯證罷此爲壞病知犯何逆以法治之按衇沉緊當是衇沉弦若是沉緊是寒實在胸當吐之證也惟衇沉弦始與上文之義相屬故可與小柴胡湯註本太陽病不解而見脇下鞕滿乾嘔不能食往來寒熱等證衇沉弦是邪轉入少陽也若未經吐下者當與小柴胡湯解其半表半裏之邪可也其已經吐下發汗溫鍼者則表裏俱虛更加讝語柴胡證罷此爲壞病即小柴胡湯亦不中與也當審其所犯何逆隨證以法治之可也集註成無己曰轉入少陽柴胡證也若已吐下發汗溫鍼不惟犯少陽三禁更加溫鍼以廹劫之損耗津液胃中乾燥必發讝語柴胡證罷者謂無脇下鞕滿乾嘔不能食往來寒熱等證也此爲壞病沈明宗曰太陽不解而傳少陽當與小柴胡和解乃爲定法反以吐下發汗溫鍼以犯少陽之戒而邪熱陷入陽明故發讝語已爲壞證要知讝語乃陽明受病即當知犯陽明之逆而治之若無讝語而見他經壞證湏慿證慿衇另以活法治之也太陽病中風以火劫發汗邪風被火熱血氣流溢失其常度兩陽相熏灼其身發黃陽盛則欲衄陰虛則小便難陰陽俱虛竭身體則枯燥但頭汗出劑頸而還腹滿微喘口乾咽爛或不大便久則讝語甚者至噦手足躁擾捻衣摸床小便利者其人可治註太陽病中風不以桂枝湯汗之而以火劫發汗故致生諸逆也風屬陽邪被火益熱故血氣流溢失其常度也以風火俱陽故曰兩陽熏灼熱蒸血瘀達於肌表故其身發黃也血爲熱廹故上逆欲衂陰虛液竭故小便難陰陽虛竭故身體枯燥陽熱熏灼陰液上越故頭汗出劑頸而還也熱傳太陰故腹滿口燥熱傳少陰故口乾咽爛熱壅於胸故肺燥微喘熱結於胃故不大便愈久則熱益深故噦逆讝語神明昬亂手足躁擾捻衣摸床之證見矣凡此諸壞證推求其源皆由邪火逆亂眞陰立亡多不可治然或小便利者則陰氣尚在故猶爲可治也可不愼之於始哉集註成無己曰内經云諸脹腹大皆屬於熱腹滿微喘者熱氣内鬱也經云火氣内發上爲口乾咽爛者火熱上熏也熱氣上而不下則大便不鞕若熱氣下入胃中消耗津液則大便鞕故云或不大便久則胃中燥熱必發讝語經云病深者其聲噦火氣太甚正氣逆亂故噦經云四肢者諸陽之本也陽盛則動故手足躁擾捻衣摸床也小便利者是陰未竭猶可治也喻昌曰此證陽邪挾火擾亂陰分而亡其陰與前二條亡陽證天淵懸絶觀陽盛欲衂身體枯燥諸句則知此證宜急驅其陽以存一線之陰不得泥陰陽俱虛竭一語而補其陽劫其陰也且頭汗為陽邪上壅不下通於陰所以劑頸以下不能得汗設見衂血則邪從衂解頭間且無汗矣設有汗則邪從汗解又不衂矣後條火邪深入必圊血亦身體枯燥而不得汗設有汗便不圊血矣讀古人書全要會意豈有得汗仍衂血圊血之理哉又曰仲景以小便利一端辨眞陰之亡與未亡最細葢水出高源小便利則津液不枯肺氣不絶可知也腎以膀胱爲府小便利則膀胱之氣化行腎水未絶可知也程應旄曰已上諸證莫非邪火逆亂眞陰立亡之象推求其原一皆血氣流溢失其常度至於如此邪風被火熱之害可勝言哉此際欲治風而火勢沸騰欲治火而風邪壅遏何從治之惟利小便一法如豬苓湯類可以導熱滋乾使小便得利則太陽之邪亦從膀胱為去路尚可治也倘利之而不利火無從出危矣太陽病醫發汗遂發熱惡寒因復下之心下痞表裏俱虛陰陽氣並竭無陽則陰獨復加燒鍼因胸煩面色青黃膚瞤者難治今色微黃手足溫者易愈註太陽表病醫過發汗已虛其表因復下之又虛其裏雖有未盡之表邪陷裏成痞但表裏俱虛陰陽並竭已成壞證矣况無陽則陰不生陰獨則陽不化而復加燒鍼火氣内攻陰陽皆病故胸滿而煩面色青黃肌膚瞤動也見證如此錯雜故為難治若面色微黄不靑手足不厥而溫則為陰陽之氣未竭故曰易治也集註方有執曰表以誤汗言裏以誤下言故曰俱虛陰指裏陽指表無陽謂陽竭也陰獨謂痞也靑黃脾受尅賊之色微黃土見回生之色手足溫陽氣回於四末也言既經反覆之誤又見尅賊之色肌膚瞤動而不寧則脾家之眞陰敗爲難治也今則土見回生之色四末得溫胃家之陽復故為易愈也傷寒衇浮自汗出小便數心煩微惡寒脚攣急反與桂枝湯欲攻其表此誤也得之便厥咽中乾煩燥吐逆者作甘草乾薑湯與之以復其陽若厥愈足溫者更作芍藥甘草湯與之其脚即伸若胃氣不和讝語者少與調胃承氣湯若重發汗復加燒鍼者四逆湯主之註傷寒衇浮自汗出中風證也小便數心煩裏無熱之虛煩也微惡寒者表陽虛不能禦也脚攣急者表寒收引拘急也是當與桂枝增桂加附子湯以溫經止汗今反與桂枝湯攻發其表此大誤也服後便厥者陽因汗亡也咽乾者陰因汗竭也煩燥者陽失藏也吐逆者陰拒格也故作甘草乾薑湯與之以緩其陰而復其陽若厥愈足溫則是陽已復宜更作芍藥甘草湯與之以調其陰而和其陽則脚即伸也若胃不和而讝語知爲邪已轉屬陽明當少少與調胃承氣湯令其微溏胃和自可愈也若重發汗者謂不止誤服桂枝湯而更誤服麻黄湯也或復加燒鍼劫取其汗以致亡陽證具則又非甘草乾薑湯所能治故又當與四逆湯以急救其陽也集註程應旄曰衇浮自汗雖似桂枝證而頭項不痛知陽神自歉於上部惡寒脚攣急知陰邪更襲於下焦陽虛隂盛而裏氣上逆故有心煩證裏陰攻及表陽差訛祗在煩字上觀結句若重發汗復加燒鍼者四逆湯主之可見陰證不必眞直中也治之一誤寒即中於治法中矣問曰證象陽旦按法治之而增劇厥逆咽中乾兩脛拘急而讝語師言夜半手足當溫兩脚當伸後如師言何以知此答曰寸口衇浮而大浮為風大為虛風則生微熱虛則兩脛攣病形象桂枝因加附子叅其間增桂令汗出附子溫經亡陽故也厥逆咽中乾煩躁陽明内結讝語煩亂更飲甘草乾薑湯夜半陽氣還兩足當熱脛尚微拘急重與芍藥甘草湯爾乃脛伸以承氣湯微溏則止其讝語故知病可愈註此設問答申明上條之義也桂枝證當用桂枝值時令溫熱或其人有熱用陽旦湯即桂枝湯加黄芩也値時令寒冷或其人有寒用陰旦湯即桂枝湯加乾薑也證象陽旦謂心煩似乎有熱也按法治之謂按法用陽旦湯也葢心煩小便數咽中乾似乎陽旦而不審脚攣急微惡寒之證是陰寒也即以陽旦湯攻其表誤也所以增劇厥逆咽中乾兩脛拘急讝語等壞證作也師言夜半手足當溫兩脚當伸如其言者何也答曰診衇浮大則為風虛非寒虛也故此知用桂枝不足以治其寒而加附子溫經即有陽明内結讝語煩亂等證渾不為意且更與甘草乾薑湯至夜半陽回足熱脛尚微拘急即與芍藥甘草湯以和其陰爾乃脛伸繼以承氣治其陽明内結故微溏而讝語止其病可愈矣是皆由於救之得法耳陽旦湯方補桂枝三錢芍藥二錢酒焙甘草二錢炙黄芩三錢酒炒生薑三片大棗二枚擘右水煎去滓溫服無時日二三服本方加乾薑名陰旦湯甘草乾薑湯方甘草四兩炙乾薑二兩炮右二味以水三升煮取一升五合去滓分溫再服芍藥甘草湯方芍藥四兩甘草四兩炙右二味以水三升煮取一升五合去滓分溫再服傷寒吐下後發汗虛煩衇甚微八九日心下痞鞕脇下痛氣上衝咽喉眩冒經衇動愓者久而成痿按八九日心下痞鞕脇下痛氣上衝咽喉三句與上下文義不屬必是錯簡註家因此三句皆蔓衍支離牽強註釋不知此證總因汗出過多大傷津液而成當用補氣補血益筋壯骨之藥經年始可愈也註傷寒吐下後復發其汗治失其宜矣故令陽氣陰液兩虛也陰液虛故虛煩陽氣虛故衇微陽氣微而不升故目眩冒陰液虛而不濡故經衇動愓也陽氣陰液虧損久則百體失所滋養故力乏筋軟而成痿矣傷寒六七日大下後寸衇沉而遲手足厥逆下部衇不至咽喉不利唾膿血泄利不止者爲難治麻黄升麻湯主之註傷寒六七日邪傳厥陰厥熱勝復之時醫不詳審陰陽而大下之致變中寒下竭之壞證中寒故寸衇沉遲手足厥逆下竭故尺衇不至泄利不止也蓋未下之前陽經尚伏表熱大下之後則其熱乘虛下陷内犯厥陰厥陰經循喉嚨貫膈注肺故咽喉不利唾膿血也此爲陰陽錯雜表裏混淆之證若溫其下恐助上熱欲淸其上愈益中寒仲景故以此湯主之正示人以陰陽錯雜爲難治當於表裏上下求治法也蓋下寒上熱固爲難溫裏寒無汗還宜解表故用麻黄升麻湯以解表和裏淸上溫下随證治之也集註程知曰言厥逆有因於誤下致變者也凡傷寒熱熾者其陰必虛六七日雖當傳裏之時設表證仍在而大下之則陰傷而陽亦陷寸衇沉遲手足厥冷下利不止傷其陽而氣内陷也下部衇不至咽喉不利吐膿血傷其陰而熱内逼也一下之誤既傷其陽復傷其陰故難治與麻黄升麻湯以升陽調下清熱滋陰蓋傳經熱邪從外入於内者仍當從内出於外也故曰汗出愈喻昌曰寸衇沉而遲明是陽去入陰之故非陽氣衰微可擬故雖手足厥冷下部衇不至泄利不止其不得為純陰無陽可知况咽喉不利唾膿血又陽邪搏陰上逆之徵驗所以仲景特於陰中提出其陽得汗出而錯雜之邪盡解矣麻黄升麻湯方麻黄二兩半去節升麻一兩一分當歸一兩一分知母十八銖黄芩十八銖萎蕤十八銖石膏六銖裹碎綿白术六銖乾薑六銖芍藥六銖天冬六銖去心桂枝六銖茯苓六銖甘草六銖炙右十四味以水一斗先煮麻黄一二沸去上沫內諸藥煮取三升去滓分溫三服相去如炊三升米頃令盡汗出愈方解下寒上熱若無表證當以黄連湯為法今有表證故復立此方以示隨證消息之治也升麻萎蕤黄芩石膏知母天冬乃升舉走上清熱之品用以避下寒且以滋上也麻黄桂枝乾薑當歸白芍白术茯苓甘草乃辛甘走外温散之品用以遠上熱且以和内也分温三服令盡汗出愈其意在緩而正不傷徹邪而盡除也衇雖寸衇沉遲尺衇不至證雖手足厥逆下利不止究之原非純陰寒邪故兼咽喉痛唾膿血之證是寒熱混淆陰陽錯雜之病皆因大下奪中所變故仲景用此湯以去邪為主邪去而正自安也傷寒八九日下之胸滿煩驚小便不利讝語一身盡重不可轉側者柴胡加龍骨牡蠣湯主之註傷寒八九日邪不解表不盡不可下也若下之其邪乘虛内陷在上者輕則胸滿重則結胸胸滿者熱入於胸氣壅塞也在中者輕則煩驚重則昬狂煩驚讝語者熱乘於心神不寧也在下者輕則小便不利重則少腹滿痛小便不利者熱客下焦水道阻也邪壅三焦則榮衞不行水無去路則外滲肌體故一身盡重不可轉側也以柴胡加龍骨牡蠣湯主之其大意在和解鎭固攻補兼施也按此條乃陽經濕熱之身重若以爲津亡血濇陽氣不能宣布陰經濕寒之身重則誤矣寒濕身重用眞武湯桂枝附子湯以不渴裏無熱也熱濕身重用白虎湯柴胡加龍骨牡蠣湯以讝煩胃有熱也其風濕風温身重亦不外乎兼寒兼熱故此湯中用苓半大黄為佐也集註方有執曰胸滿者下後裏虛外熱入裏挾飲上搏於膈所以煩也驚傷心心藏神而居膈正虛邪勝所以不寧一身盡重不可轉側者傷寒本一身疼痛亡津液而血濇不利故變為沉滯而重甚也程知曰下而心煩腹滿治以梔樸為邪入腹也下而胸滿煩驚治以龍牡為邪入心也因火劫而致煩驚治以桂枝龍牡挽心陽之外越也因下而致煩驚治以柴胡龍骨牡蠣解心陽之内塞也大小陷胸以高下緩急别之諸瀉心湯以寒熱虛實辨之半芩治痰芩連降逆梔豉湧虛煩參附回陽虛下後大法備於斯矣喻昌曰八九日過經乃下之可謂愼矣孰知外邪未盡乘虛而陷邪方在表裏其患已及於神明於此而補天浴日豈復易易張璐曰此係少陽之裏證諸家註作心經病誤也蓋少陽有三禁不可妄犯雖八九日過經下之尚且邪氣内犯胃土受傷膽木失榮痰聚膈上有如是之變故主以小柴胡和解内外逐飲通津加龍骨牡蠣以鎭肝膽之驚也柴胡加龍骨牡蠣湯方柴胡四兩半夏二合洗龍骨一兩半人參一兩半大黄二兩牡蠣一兩半茯苓一兩半鉛丹一兩半桂枝一兩半生薑一兩半大棗二枚擘右十一味以水八升煮取四升內大黄切如碁子更煮一二沸去滓溫服一升方解是證也為陰陽錯雜之邪是方也亦攻補錯雜之藥柴桂解未盡之表邪大黃攻已陷之裏熱人參薑棗補虛而和胃茯苓半夏利水而降逆龍骨牡蠣鉛丹之澁重鎭驚收心而安神明斯為以錯雜之藥而治錯雜之病也汗家重發汗必恍惚心亂小便已陰痛與禹餘糧丸按禹餘糧丸爲濇痢之藥與此證不合與禹餘糧丸五字衍文也註汗家謂平素好出汗之人也重發汗謂大發汗也心主血汗乃心之液重發其汗血液大傷心失所恃故神情恍惚心志不寧也液竭於下宗筋失飬故小便已陰莖疼也集註方有執曰心主血而藏神汗多則血虛而舍空恍惚心亂者以舍空神紛散也陰宗筋也痛者液竭而失其所榮養也程應旄曰心主血汗者心之液平素多汗之家心虛血少可知重發其汗遂至心失所養神恍惚而多忡憧之象此之謂亂小腸與心爲表裏心液虛而小腸之水亦竭故小便已而陰疼也衂家不可發汗汗出必額上陷衇𦂳急目直視不能眴不得眠註衂家者該吐血而言也謂凡衂血吐血之人陰氣暴亡若再發其汗汗出液竭諸衇失養則額角上陷中之衇為熱所灼故𦂳且急也目直視目瞪不轉睛也不能眴目睫不合也亦皆由熱灼其衇引縮使然不得眠者陽氣不能行於陰也凡此所見之病皆陽盛陰微之危證誰謂衂家可輕發其汗耶集註喻昌曰目得血而能視汗為血液衂血之人清陽之氣素傷更發其汗則額上必陷乃上焦枯竭之應也諸衇皆屬於目筋衇緊急則目上瞪而不能合目不合則不得眠也傷寒發煩目瞑者必衂宜麻黄湯發其汗此言素常失血之人戒發其汗以重虛其虛故也亡血家不可發汗發汗則寒慄而振註凡失血之後血氣未復為亡血虛家皆不可發汗也葢失血之初固屬陽熱然亡血之後熱隨血去熱固消矣而氣隨血亡陽亦危矣若再發汗則陽氣衰微力不能支故身寒噤慄振振聳動所必然也葢發陰虛之汗汗出則亡陰即發暴吐衂血之汗也故見不能眴不得眠亡陰等病也發陽虛之汗汗出則亡陽即發亡血虛家之汗也故見寒慄而振亡陽等病也集註方有執曰亡血陰已虛矣發汗復亡其陽故寒慄而振也程應旄曰亡血陰虛陽已失依若發其汗陽從外脫故寒慄而振是為陰陽兩竭凡遇當汗證便當顧慮陰經之榮血有如此者魏荔彤曰與其汗出亡陽方救陽何如汗未出先救陰以維陽不令汗出亡陽之為愈也咽喉乾燥者不可發汗註咽喉乾燥津液不足也更發其汗則津液益枯故戒人雖有可汗之證亦不可發汗也集註方有執曰咽喉乾燥津液素虧本於腎水不足葢少陰之衇循喉嚨也發汗則津液愈亡程應旄曰凡遇可汗之證必當顧慮上焦之津液又有如此者張璐曰此條與咽中閉塞似同實異此戒發汗以奪陽明之津彼戒發汗以奪少陰之血也淋家不可發汗發汗則便血註淋家者濕熱蓄於膀胱水道澁痛之病也若發其汗濕隨汗去熱必獨流水府告匱迫其本經之血從小便而出矣集註程知曰膀胱裏熱則淋更發其汗則膀胱愈燥而小便血矣瘡家雖身疼痛不可發汗發汗則痙註瘡家初起毒熱未成法當汗散已經潰後血氣被傷雖有身痛應汗表證亦不可發汗恐汗出榮衞愈虛外風乘襲即不受外風筋失液養亦必致項強反張而成痙病也集註喻昌曰身疼痛為寒傷榮之證本當發汗瘡瘍之人肌表素虛榮血暗耗更發其汗則外風襲虛内血不榮必致頸項強身反張而成痙痙亦膀胱之病也太陽傷寒者加溫鍼必驚也燒鍼令其汗鍼處被寒核起而赤者必發奔豚氣從少腹上衝心者先灸核上各一壯與桂枝加桂湯更加桂註太陽傷寒加溫鍼必驚者謂病傷寒之人卒然加以溫鍼其心畏而必驚也非溫鍼之後必生驚病也燒鍼即溫鍼也燒鍼取汗亦是汗法但鍼處宜當避寒若不謹慎外被寒襲火鬱衇中血不流行必結腫核赤起矣且溫鍼之火發為赤核又被寒侵故不但不解反召陰邪葢加鍼之時心既被驚所以腎陰乘心之虛上凌心陽而發奔豚也奔豚者腎陰邪也其狀氣從少腹上衝於心也先灸核上各一壯者外去寒邪繼與桂枝加桂湯更加桂者内伐腎邪也桂枝加桂湯方於桂枝湯方内更加桂二兩成五兩餘依桂枝湯法集解徐彬曰此乃太陽風邪因燒鍼令汗復感於寒邪從太陽之府膀胱襲入相合之腎藏而作奔豚故仍從太陽之例用桂枝全方倍加桂者以内瀉陰氣兼驅外邪也太陽病以火熏之不得汗其人必躁到經不解必圊血名為火邪註火熏古劫汗法也即今火炕溫覆取汗之法太陽病以火熏之不得汗其人必内熱躁甚陰液愈傷陽不得陰無從化汗故反致不解也其火襲入陰中傷其陰絡廹血下行故必圊血也命名火邪示人以當治火邪不必治圊血也集註方有執曰躁手足疾動也到猶言反也謂徒躁擾而反不得解也汗為血之液血得熱則行火性大熱既不得汗則血必橫溢所以必圊血也程應旄曰太陽病以火熏之取汗竟不得汗其液之素少可知葢陽不得陰則無從化汗也陰虛被火熱無從出故其人躁擾不寧也衇浮熱甚反灸之此為實實以虛治因火而動故咽燥而吐血註衇浮熱甚實熱在表也無灸之之理而反灸之此為實實謂其誤以實為虛也故熱因火動其勢炎炎致咽燥而吐血必矣葢上條火傷陰分廹血下行故令圊血此條火傷陽分廹血上行故吐血也集註程應旄曰表實有熱誤認虛寒而用灸法熱無從泄因火而動自然内攻邪束於外火攻於内肺金被傷故咽燥而吐血汪琥曰表有風熱而反灸是以實作虛治也微數之衇甚不可灸因火爲邪則為煩逆追虛逐實血散衇中火氣雖微内攻有力焦骨傷筋血難復也註微數之衇乃陰虛血少之證斷不可灸若誤灸之艾火内攻為煩為逆煩者陰為陽擾也逆者追虛逐實也陰本虛而加以火則愈虛是為追虛陽本實而加以火則愈實是為逐實然血已耗散衇中艾火之氣雖微而内攻有力矣故致焦骨傷筋血難復也集註喻昌曰衇微而數陰虛多熱之徵也此而灸之則虛者愈虛熱者愈熱不致傷殘不止矣程應旄曰若血少陰虛之人衇見微數尤不可灸以血主濡之主潤筋骨也若失其所濡則火之所至其骨必焦其筋必損内傷其陰未有不流散於經衇者也榮氣微者加燒鍼則血留不行更發熱而躁煩也註榮氣微者榮血虛微也榮血既已虛微若誤加燒鍼則榮血涸留而無所行也豈止焦骨傷筋而已哉所以更發熱而躁煩也集註程知曰言榮微忌燒鍼也陰虛則内熱若加燒鍼以助陽則兩熱相合而榮血不行必更外發熱而内煩躁也唐不巖曰其始也雖微流燒鍼以逼之也其既也留而不行燒鍼以竭之也張璐曰火為陽邪必傷隂血治此者當以救隂為主衇浮宜以汗解用火灸之邪無從出因火而盛病從腰以下必重而痺名火逆也註衇浮表邪宜以汗解誤用火灸傷其血液不能作汗反令表邪無所從出以致邪因火盛外不焦骨傷筋内不吐衂圊血而病腰以下重痺者必其人素有濕邪在下故從濕化也重者着也重着不移也然不以痺名者以非風寒濕之痺乃因火逆不相交通故名火逆也集註方有執曰痺濕病也因火逆治火邪夾陽邪而上逆陽不下通隂不用事化不行而水不得泄故濕著下體而重痺也程應旄曰衇浮在表汗解為宜矣因火灸之不能得汗則邪無出路因火而盛即不焦骨傷筋而火阻其邪陰氣漸竭下焦乃榮血所治榮氣竭而不運必重着而為痺名曰火逆示人欲治其痺宜先治其火也形作傷寒其衇不弦緊而弱弱者必渴被火者必讝語弱者發熱衇浮解之當汗出愈按三弱字當俱是數字若是弱字熱從何有不但文義不屬且論中並無此說註形作傷寒者言其病形作傷寒之狀也但其衇不弦緊而數數者熱也衇浮數熱在表太陽證也沉數熱在裏陽明證也數衇為熱熱入陽明故必口渴若被火刦其熱更甚故必讝語衇數之病雖皆發熱然其施治不無别焉若衇浮數發熱解之當以汗汗出可愈宜大青龍湯衇沉數發熱解之當以下下之可愈宜調胃承氣湯若衇數無表裏證惟發熱而渴讝語者不可汗下宜白虎湯黄連解毒湯清之可也傷寒衇浮醫以火逼刦之亡陽必驚狂起臥不安者桂枝去芍藥加蜀漆龍骨牡蠣救逆湯主之註傷寒衇浮醫不用麻桂之藥而以火刦取汗汗過亡陽故見驚狂起臥不安之證蓋由火刦之誤熱氣從心且大脫津液神明失倚也然不用附子四逆軰者以其爲火刦亡陽也宜以桂枝湯去芍藥加蜀漆龍骨牡蠣救逆湯主之去芍藥者恐其隂性遲滯兼制桂枝不能迅走其外反失救急之㫖况既加龍蠣之固脫亦不湏芍藥之酸收也蜀漆氣寒味苦寒能勝熱苦能降逆火邪錯逆在所必需也集註喻昌曰篇中誤服大青龍湯厥逆筋愓肉瞤而亡陽者乃汗多所致故用真武湯救之此以火廹刼而亡陽者乃方寸元陽之神被火廹刦而飛騰散亂故驚狂起臥不安有如此者少緩湏臾神丹莫挽矣故以此湯救之蓋陽神散亂當求之於陽桂枝湯陽藥也然必去芍藥之隂歛始得疾趨以達於陽位更加蜀漆者緣蜀漆之性最急又加龍骨牡蠣有形之骨屬為之舟楫以載神而返其宅也桂枝去芍藥加蜀漆龍骨牡蠣救逆湯方桂枝三兩甘草二兩炙生薑三兩切牡蠣五兩熬龍骨四兩大棗十二枚擘蜀漆三兩脚洗去右爲末以水一斗二升先煮蜀漆減二升内諸藥煮取三升去滓溫服火逆下之因燒鍼煩躁者桂枝甘草龍骨牡蠣湯主之註火逆者謂凡火刦取汗致逆者也此火逆因火鍼也燒鍼刦汗而復下之火逆之邪雖因下減而煩躁一證獨不除者蓋因汗下大傷津液而然也故用桂枝甘草以救表龍骨牡蠣以固中不治煩躁而煩躁自愈也集註喻昌曰此證誤而又誤雖無驚狂等變然煩躁則外邪未盡之候亦真陽欲亡之機也程應旄曰火逆下之裏氣虛矣不治其虛更加燒鍼自致亡陽但見煩躁證而不盡如前條之驚狂起臥不安者由熱勢之緩急有殊故前方之加減稍異總不容煩躁之以假亂真也桂枝甘草龍骨牡蠣湯方桂枝一兩甘草二兩炙龍骨二兩牡蠣二兩熬右四味為末以水五升煮取二升半去滓溫服八合日三服集解汪琥曰此方即桂枝去芍藥加蜀漆龍骨牡蠣救逆湯制小其劑而用之也火邪廹内則生煩躁雖煩躁似帶表邪不宜散以桂枝之辛熱而火逆既經下之則隂血受傷較之救逆湯似當増芍藥也音切灼音酌摸末各切痿烏魁切唾湯臥切炊音吹刼音訐眴與旬同御纂醫宗金鑑卷十一
