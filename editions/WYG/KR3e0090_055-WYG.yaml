於藏者溢出清熱犯陽絡上吐衂熱侵隂絡下失紅又有努勞成血病血止仍𠻳勢多凶註凡失血之證陽盛乗隂則血為熱迫不能安於衇中犯於氣分妄行不能歸入經衇也若血病傷及於腑者則血滲入腸胃之濁道上行於咽出而為吐為衂下從二便而出為便為溺也若血病傷及於藏者則溢出於胸中之清道上從喉出而兼咳𠻳下從精竅而出為溺血也夫血藏於臟内行於衇中流於軀殻之内不可得而見也非損傷不能為病而損之之因有三一曰熱傷陽絡腑病也熱傷隂絡藏病也宜以清熱為主一曰努傷宜以破逐為主一曰勞傷宜以理損為主若日久血止而咳𠻳不休者主必死之證故勢多凶也衂血衂血之候鼻乾燥身熱不渴苦頭疼失表分汗麻桂治内熱犀角瀉心清註衂血者鼻中出血也其候鼻中乾燥身熱不渴苦頭痛是熱傷陽絡也有因傷寒失汗衂血者乃熱鬱於營其身無汗宜以麻黃湯汗之身有汗者宜以桂枝湯解之設無表病因内熱而衂者宜以犀角地黃湯清之熱盛者四物三黃瀉心湯瀉之外俱用髮灰散或黒梔子末吹鼻其衂自止麻黃湯麻黃杏仁炒去皮尖桂枝甘草生引用生薑水煎服方歌傷寒失表營鬱熱身體無汗血妄行須用麻黃湯調治桂枝麻黃杏草同桂枝湯方見自汗犀角地黃湯牡丹皮白芍藥犀角生地黄水煎服便硬者加川大黃方歌犀角地黃湯治衂效非常丹皮芍犀地便秘加大黃四物三黃瀉心湯川芎當歸酒洗生地黃赤芍藥黃芩黃連川大黃酒洗水煎服方歌四物三黃瀉心湯熱盛吐衂功最良芎歸生地赤芍藥黃芩黃連川大黃髪灰散取壯實人頭髪隂陽瓦煆成灰放在地上去火性研細末吹入鼻中血衂自止吐血吐血不咳因熱逆若兼咳嗽努勞傷内熱犀角地黃治努傷承氣四物嚐勞傷有熱雞蘇散無熱須用救肺良註小兒吐血不咳嗽者多因内熱致血妄行上逆也宜以犀角地黃湯主之若因努勞吐血者則兼咳嗽先用桃仁承氣湯以破逐之次用加味四物湯和之又有勞傷吐血者亦兼咳嗽痰中𢃄血有熱者雞蘇散主之無熱者救肺散主之犀角地黃湯方見本門衂血桃仁承氣湯桃仁去皮尖研大黃芒消甘草桂枝加當歸芍藥蘇木紅花水煎服方歌努傷吐血先破逐桃仁承氣湯妙絶桃仁黃消草桂枝加入歸芍蘇紅㨗加味四物湯當歸芍藥川芎生地黃茅根蒲黃牡丹皮梔子炒黒甘草生引用藕節酒水煎服方歌努傷吐血須活血四物為主真妙訣再加茅根與蒲黃丹皮梔草引藕節雞蘇散雞蘇薄荷葉川貝母去心麥門冬去心桔梗阿膠蛤粉炒生地黃甘草生黃耆炙白茅根蒲黃炒水煎服方歌勞傷有熱嗽痰血雞蘇貝母麥門冬桔梗阿膠生地草黃耆茅根蒲黃同加味救肺散麥冬去心人參黃耆炙鬱金五味子當歸酒洗白芍藥酒炒川貝母去心研甘草炙馬兜鈴水煎服方歌勞傷無熱嗽痰血加味救肺麥門冬參耆鬱金五味子歸芍貝母草兜鈴便血熱傷隂絡病便血藏毒血黯腸風紅須辨腹痛肛腫痛熱盛濕盛要分明藏毒初起腫痛甚大黃皂刺莫消停熱盛俱宜槐花散濕盛平胃地榆靈日久衇微氣血弱升陽和血共養榮註大便下血皆因小兒恣食肥甘致生内熱傷隂絡也若血色黯而濁肛門腫痛先血後糞此為近血名曰藏毒若血鮮而清腹中不痛先糞後血此為逺血名曰腸風藏毒肛門每多腫痛初起宜用皂刺大黃湯消之大下血後熱盛微痛者以槐花散和之濕盛不痛者以平胃地榆湯和之腸風亦宜以槐花散主之便血日久衇微氣血弱者升陽和血湯和之繼以人參養榮湯補之皂刺大黃湯皂刺生川大黃各等分量小兒年歳大小虚實酌其多少水酒煎服槐花散槐花炒側栢葉枳殻麩炒川黃連荆芥穗炒水煎服臟毒加蒼术苦楝腸風加秦艽防風方歌臟毒腸風槐花散黃連枳殻槐栢荆臟毒蒼术苦楝入腸風湏加艽防風平胃地榆湯蒼术炒陳皮厚朴薑炒甘草地榆引用生薑水煎服方歌便血濕盛腹不痛須用平胃地榆湯蒼术陳皮厚朴草地榆同煎引生薑升陽和血湯黃耆炙當歸酒洗白芍炒牡丹皮陳皮肉桂秦艽生地黃熟地黃生甘草炙甘草蒼术炒升麻水煎服方歌下血日久腹中痛治宜升陽和血湯二地二草耆歸芍陳丹秦艽升桂蒼人參養榮湯人參黃耆炙白术土炒白茯苓白芍藥炒肉桂熟地黃當歸酒洗甘草炙陳皮引用薑棗水煎服方歌失血日久氣血虚人參養榮湯頗宜參耆术苓白芍桂地黃當歸草陳皮溺血溺血多緣精竅病尿血分出莖或疼牛膝四物湯調治急宜煎服效從容註溺血為精竅之病乃尿與血先後分出者也宜用牛膝四物湯治之其證自愈牛膝四物湯牛膝木通鬱金甘草梢瞿麥當歸川芎生地黃赤芍藥水煎服方歌小兒溺血精竅病宜用牛膝四物湯牛膝鬱金通瞿草歸芎赤芍生地黃雜證門二便秘結小兒熱結二便秘口渴舌乾脣面紅八正尿秘少腹滿神芎便秘腹脹疼註此證多因乳食停滯生熱結於腸胃以致二便秘結其候舌乾口渴面赤脣焦也熱積則小便秘濇少腹滿急宜八正散主之若食積大便秘腹脹痛者宜神芎丸主之八正散方見不小便神芎丸大黃滑石各一兩水飛薄荷川芎各四錢黃芩黃連各五錢生牽牛四錢共為細末滴水為丸每服五丸蜜湯化下氣虚脫肛瀉痢日久中氣陷肛鬆腸薄滑而脫靣色青黄指梢冷衇来沉細脣淡白補中益氣湯升舉真人養藏固滑脫外用澁腸散調敷氣升肛澁腸自合註脱肛一證因瀉痢日久中氣下陷腸胃薄瘦遂令肛門滑脫不收現證靣色青黃指梢冷衇沉細脣色淡白宜温補為主先以補中益氣湯升提其氣再以真人養藏湯温補固滑外以澁腸散摻之則氣升肛澁而腸自收矣補中益氣湯方見飱瀉真人養藏湯方見寒痢澁腸散訶子赤石脂龍骨各等分煆右為細末用臘茶調敷和藥摻腸頭上綿帛揉入肛腫翻肛積熱肛腫大便難努力肛出翻不還外用蟠龍散消腫内宜皂刺大黃煎註小兒積熱太盛以致肛門作腫大便艱難努力翻出肛脫不還外用蟠龍散消其腫内服皂刺大黃湯其腫一消肛自收矣皂刺大黃湯方見便血曽氏蟠龍散乾地蟠龍一兩畧去土焙風化朴消二錢右剉研為細末仍和匀朴消每以二錢至三錢肛門濕潤者乾塗乾燥者用清油調塗先用荆芥生葱煎水候温洗浴輕與拭乾然後敷藥龜胸肺積痰熱病龜胸胸骨髙聳若龜形氣急喘咳體羸瘦寛氣百合酌量行註龜胸一證多因小兒飲食不節痰熱熾盛復為風邪所傷風熱相搏以致肺經脹滿攻於胸膈高如覆杯現證咳嗽喘急身體羸瘦治宜清肺化痰為主先以寛氣飲開其氣道再以百合丹除其壅滯肺熱清而脹滿自除矣寛氣飲杏仁去皮尖炒桑白皮炒橘紅蘇子炒枳殻麩炒枇杷葉蜜炙麥門冬去心生甘草苦葶藶水煎服方歌寛氣飲治兒龜胸杏仁桑皮合橘紅蘇子枳殻枇杷葉甘草葶􅐗麥門冬百合丹百合天門冬杏仁炒去皮尖木通桑白皮炒甜葶􅐗石膏各五錢大黃三錢共為細末煉蜜丸如菉豆大量兒大小服之臨卧滚白水送下龜背龜背坐早被風吹傴僂背高狀如龜内服松蕋丹緩治外用灸法㸃龜尿註龜背者因嬰兒坐早被客風吹入脊膂遂致傴僂曲折背高如龜徃徃為終身痼疾内以松蕋丹調治之外用聖惠灸穴法灸肺俞心俞膈俞三穴三五壯或以龜尿㸃骨節上亦可得效松蕋丹松花枳殻麩炒防風獨活各一兩麻黃前胡川大黃生桂心各五錢右為細末煉蜜丸如黍米大每服十丸粥飲送下五軟五軟禀賦不足證頭項手足口肉肌地黃丸與扶元散全在後天調養宜註五軟者謂頭項軟手軟足軟口軟肌肉軟是也頭軟者項軟無力也手足軟者四肢無力也肉軟者皮寛不長肌肉也口軟者脣薄無力也此五者皆因禀受不足氣血不充故骨衇不强筋肉痿弱治宜補氣為主先以補腎地黃丸補其先天精氣再以扶元散補其後天羸弱漸次調理而五軟自强矣補腎地黃丸熟地黃一兩五錢山萸肉一兩懐山藥炒茯苓各八錢牡丹皮澤瀉各五錢牛膝八錢鹿茸五錢酥炙右為細末煉蜜丸如梧桐子大每服二錢用鹽湯下扶元散人參白术土炒茯苓熟地黃茯神黃耆蜜炙山藥炒炙甘草當歸白芍藥川芎石菖蒲引用薑棗水煎服方歌五軟扶元散堪嚐參术茯苓熟地黃茯神黃耆山藥草歸芍川芎及石菖五鞕陽氣不營成五鞕仰頭取氣難摇動手足强直冷如氷氣壅胸膈牽連痛小續命湯最為良烏藥順氣散極應若遇肝木乗脾經加味六君妙無竟註五鞕者仰頭取氣難以動摇氣壅疼痛連胸膈間手心足心氷涼而鞕皆由陽氣不營於四末最為難治重者以小續命湯疎其風輕者以烏藥順氣散調其氣若肝木乗脾食少氣弱者加味六君子湯治之内外交治而證自日瘥矣小續命湯人參麻黃川芎黃芩芍藥甘草炙防風官桂去皮附子泡去皮臍杏仁炒去皮尖漢防已引用薑棗水煎服方歌小續命湯治五鞕人參麻黃川芎共黄芩芍藥草防風官桂附子防已杏烏藥順氣散麻黃白芷川芎桔梗枳殻炒殭蠶炒烏藥炮薑甘草生橘紅引用葱白水煎服方歌烏藥順氣五鞕輕麻黃白芷合川芎桔梗枳殻殭蠶炒烏藥炮薑草橘紅加味六君子湯人參白术炮薑陳皮半夏製茯苓炙甘草升麻蜜炙柴胡醋炒肉桂水煎服方歌加味六君虚五鞕人參白术共炮薑陳半茯苓炙甘草升麻柴胡肉桂良五遲小兒稟来氣血虛筋骨軟弱歩難移牙齒不生髪疎薄身坐不穩語言遲加味地黃為主治補中益氣繼相醫邪乘心氣菖蒲好血虚髪遲苣勝宜註小兒五遲之證多因父母氣血虚弱先天有虧致兒生下筋骨軟弱行歩艱難齒不速長坐不能穩要皆腎氣不足之故先用加味地黃丸滋養其血再以補中益氣湯調養其氣又足少隂為腎之經其華在髪若少隂之血氣不足即不能上榮於髪苣勝丹主之又有驚邪乘入心氣至四五歳尚不能言者菖蒲丸主之加味六味地黃丸熟地黃一兩山萸肉一兩懐山藥炒茯苓各八錢澤瀉牡丹皮各五錢鹿茸三錢炙五加皮五錢麝香五分共為細末煉蜜丸如梧桐子大大兒每服二錢小兒一錢五分鹽湯送下補中益氣湯方見飱瀉苣勝丹當歸洗焙生地黃白芍藥各一兩炒苣勝子二兩碾胡粉三錢碾右同研勻煉蜜為丸如黍米大每服十粒煎黒豆湯下菖蒲丸人參石菖蒲麥門冬去心逺志去心川芎當歸酒洗乳香硃砂各一錢水飛右為細末煉白蜜為丸如黍米大食逺用米湯送下鶴膝風小兒禀賦不充盈肌肉削瘦少崢嶸膝骨外露如鶴膝多綠腎弱髓難生血衇不榮筋攣縮膝貯風涎時作疼大防風湯宜先服地黃繼進莫從容註小兒鶴膝風多因禀賦不足血氣不榮肌肉削瘦遂致骨節外露筋衇攣縮股漸細小而膝盖愈大要皆腎虚不能生精髓之故也須先服大防風湯繼以補腎地黃丸治之庶氣血充而證自愈矣大防風湯人參白术土炒茯苓甘草炙熟地黃當歸身白芍藥炒川芎黃耆蜜炙羌活防風附子製杜仲牛膝引用薑棗水煎服方歌大防風湯八珍耆羌防附子杜仲移榮筋更有川牛膝虚風鶴膝最相宜補腎地黃丸方見五軟解顱小兒解顱最堪憐先天有損腦髓乾面色㿠白形瘦弱二目多白若愁煩補腎地黃丸堪服補陽扶元散為先更有封䪿散極效臨時攤貼保安然註解顱者乃䪿大骨縫不合也葢腎生髓腦為髓海腎氣有虧腦髓不足亦如花木無根現證面色㿠白形體瘦弱目多白睛悲愁少笑治宜補養腎氣為主先以補腎地黃丸滋補其隂再以扶元散補養其氣外用封䪿散攤貼之則精血稍充或可轉危為安也補腎地黃丸扶元散俱見五軟封䪿散栢子仁防風天南星各四兩右為細末每用一錢以豬膽汁調匀攤在緋絹帛上看䪿大小剪貼一日一換不得令乾時時以湯潤動䪿陷小兒緣何䪿下陷瀉久脾虧虚弱見面目青黃四肢涼六衇沉緩神慘淡補中益氣湯最宜固真湯進有竒騐外用烏附膏攤貼温中理脾功無限註小兒藏府有熱渴飲水漿致成瀉痢久則脾氣虛寒不能上充腦髓故䪿陷成坑名曰䪿陷現證面目青黃四肢逆冷六衇沉緩神氣慘淡先以補中益氣湯升提其氣再以固真湯温補其脾外用烏附膏攤貼於陷處極效補中益氣湯方見飱瀉固真湯方見慢脾風烏附膏雄黃二錢川烏附子各五錢生右為細末用生葱和根葉細切杵爛入前藥末同煎作成膏每早空心貼陷處䪿塡䪿門腫起氣上衝其間虚實要分明毛髪憔悴頻頻汗胸高氣促口唇紅肝盛瀉青丸最效裏熱連翹飲堪行因表防風升麻劑鞕冷屬隂用理中註䪿塡者謂䪿門腫起也葢因乳哺無度或寒或熱乗於脾經致使藏府不調其氣上衝為之塡脹腫突現證毛髪憔悴頻頻出汗胸高氣促口脣色紅須分虚實治之肝氣盛者瀉青丸主之裏熱盛者大連翹飲主之因表者防風升麻湯主之堅鞕不熱者屬隂理中湯主之瀉青丸方見急驚風大連翹飲柴胡荆芥連翹去心木通滑石水飛梔子蟬退去足翅瞿麥當歸酒洗赤芍藥黃芩甘草生防風水煎服方歌連翹飲治熱上衝柴胡荆芥翹木通滑石梔子蟬瞿麥歸芍黃芩草防風防風升麻湯麥冬去心木通甘草節山梔升麻防風引用淡竹葉水煎服方歌防風升麻湯䪿塡效非常麥冬木通草山梔升麻防理中湯方見不乳中惡小兒神氣未充實觸惡何能自主持目閉面青驚悶亂蘇合皂角功效竒註小兒神氣未充一為邪惡所觸何能主持自然神魂離舍目閉面青悶亂不省人事内以蘇合香丸除其邪外以皂角末開通其閉􅅉出則氣通而甦矣蘇合香丸方見肛門内合御纂醫宗金鑑卷五十五
