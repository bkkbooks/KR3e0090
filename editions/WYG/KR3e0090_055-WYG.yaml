加味六君妙無竟註五鞕者仰頭取氣難以動摇氣壅疼痛連胸膈間手心足心氷涼而鞕皆由陽氣不營於四末最為難治重者以小續命湯疎其風輕者以烏藥順氣散調其氣若肝木乗脾食少氣弱者加味六君子湯治之内外交治而證自日瘥矣小續命湯人參麻黃川芎黃芩芍藥甘草炙防風官桂去皮附子泡去皮臍杏仁炒去皮尖漢防已引用薑棗水煎服方歌小續命湯治五鞕人參麻黃川芎共黄芩芍藥草防風官桂附子防已杏烏藥順氣散麻黃白芷川芎桔梗枳殻炒殭蠶炒烏藥炮薑甘草生橘紅引用葱白水煎服方歌烏藥順氣五鞕輕麻黃白芷合川芎桔梗枳殻殭蠶炒烏藥炮薑草橘紅加味六君子湯人參白术炮薑陳皮半夏製茯苓炙甘草升麻蜜炙柴胡醋炒肉桂水煎服方歌加味六君虚五鞕人參白术共炮薑陳半茯苓炙甘草升麻柴胡肉桂良五遲小兒稟来氣血虛筋骨軟弱歩難移牙齒不生髪疎薄身坐不穩語言遲加味地黃為主治補中益氣繼相醫邪乘心氣菖蒲好血虚髪遲苣勝宜註小兒五遲之證多因父母氣血虚弱先天有虧致兒生下筋骨軟弱行歩艱難齒不速長坐不能穩要皆腎氣不足之故先用加味地黃丸滋養其血再以補中益氣湯調養其氣又足少隂為腎之經其華在髪若少隂之血氣不足即不能上榮於髪苣勝丹主之又有驚邪乘入心氣至四五歳尚不能言者菖蒲丸主之加味六味地黃丸熟地黃一兩山萸肉一兩懐山藥炒茯苓各八錢澤瀉牡丹皮各五錢鹿茸三錢炙五加皮五錢麝香五分共為細末煉蜜丸如梧桐子大大兒每服二錢小兒一錢五分鹽湯送下補中益氣湯方見飱瀉苣勝丹當歸洗焙生地黃白芍藥各一兩炒苣勝子二兩碾胡粉三錢碾右同研勻煉蜜為丸如黍米大每服十粒煎黒豆湯下菖蒲丸人參石菖蒲麥門冬去心逺志去心川芎當歸酒洗乳香硃砂各一錢水飛右為細末煉白蜜為丸如黍米大食逺用米湯送下鶴膝風小兒禀賦不充盈肌肉削瘦少崢嶸膝骨外露如鶴膝多綠腎弱髓難生血衇不榮筋攣縮膝貯風涎時作疼大防風湯宜先服地黃繼進莫從容註小兒鶴膝風多因禀賦不足血氣不榮肌肉削瘦遂致骨節外露筋衇攣縮股漸細小而膝盖愈大要皆腎虚不能生精髓之故也須先服大防風湯繼以補腎地黃丸治之庶氣血充而證自愈矣大防風湯人參白术土炒茯苓甘草炙熟地黃當歸身白芍藥炒川芎黃耆蜜炙羌活防風附子製杜仲牛膝引用薑棗水煎服方歌大防風湯八珍耆羌防附子杜仲移榮筋更有川牛膝虚風鶴膝最相宜補腎地黃丸方見五軟解顱小兒解顱最堪憐先天有損腦髓乾面色㿠白形瘦弱二目多白若愁煩補腎地黃丸堪服補陽扶元散為先更有封䪿散極效臨時攤貼保安然註解顱者乃䪿大骨縫不合也葢腎生髓腦為髓海腎氣有虧腦髓不足亦如花木無根現證面色㿠白形體瘦弱目多白睛悲愁少笑治宜補養腎氣為主先以補腎地黃丸滋補其隂再以扶元散補養其氣外用封䪿散攤貼之則精血稍充或可轉危為安也補腎地黃丸扶元散俱見五軟封䪿散栢子仁防風天南星各四兩右為細末每用一錢以豬膽汁調匀攤在緋絹帛上看䪿大小剪貼一日一換不得令乾時時以湯潤動䪿陷小兒緣何䪿下陷瀉久脾虧虚弱見面目青黃四肢涼六衇沉緩神慘淡補中益氣湯最宜固真湯進有竒騐外用烏附膏攤貼温中理脾功無限註小兒藏府有熱渴飲水漿致成瀉痢久則脾氣虛寒不能上充腦髓故䪿陷成坑名曰䪿陷現證面目青黃四肢逆冷六衇沉緩神氣慘淡先以補中益氣湯升提其氣再以固真湯温補其脾外用烏附膏攤貼於陷處極效補中益氣湯方見飱瀉固真湯方見慢脾風烏附膏雄黃二錢川烏附子各五錢生右為細末用生葱和根葉細切杵爛入前藥末同煎作成膏每早空心貼陷處䪿塡䪿門腫起氣上衝其間虚實要分明毛髪憔悴頻頻汗胸高氣促口唇紅肝盛瀉青丸最效裏熱連翹飲堪行因表防風升麻劑鞕冷屬隂用理中註䪿塡者謂䪿門腫起也葢因乳哺無度或寒或熱乗於脾經致使藏府不調其氣上衝為之塡脹腫突現證毛髪憔悴頻頻出汗胸高氣促口脣色紅須分虚實治之肝氣盛者瀉青丸主之裏熱盛者大連翹飲主之因表者防風升麻湯主之堅鞕不熱者屬隂理中湯主之瀉青丸方見急驚風大連翹飲柴胡荆芥連翹去心木通滑石水飛梔子蟬退去足翅瞿麥當歸酒洗赤芍藥黃芩甘草生防風水煎服方歌連翹飲治熱上衝柴胡荆芥翹木通滑石梔子蟬瞿麥歸芍黃芩草防風防風升麻湯麥冬去心木通甘草節山梔升麻防風引用淡竹葉水煎服方歌防風升麻湯䪿塡效非常麥冬木通草山梔升麻防理中湯方見不乳中惡小兒神氣未充實觸惡何能自主持目閉面青驚悶亂蘇合皂角功效竒註小兒神氣未充一為邪惡所觸何能主持自然神魂離舍目閉面青悶亂不省人事内以蘇合香丸除其邪外以皂角末開通其閉􅅉出則氣通而甦矣蘇合香丸方見肛門内合御纂醫宗金鑑卷五十五欽定四庫全書御纂醫宗金鑑卷五十五編輯㓜科雜病心法要訣發熱門諸熱總括小兒有病多發熱表裏虚實宜分别觀形察色辨因由審證切衇有妙訣表證湏汗裏下之虚則宜補實則瀉平昔體認要精詳方得臨時無遺闕註小兒發熱有表裏虚實之異治亦有汗下補瀉之殊湏觀形察色審證切衇以别之惟在平昔講習精詳臨證庶不致悞表熱表熱之證因外感衇浮發熱惡風寒頭痛身疼而無汗十神通聖表為先注小兒外感寒邪衇浮發熱惡風惡寒頭疼身痛無汗此表熱也宜十神湯主之若兼内熱者雙解通聖湯兩解之十神湯升麻葛根麻黃香附醋炒陳皮蘇葉赤芍藥川芎香白芷甘草生引用生薑水煎服方歌十神湯治表熱證升麻乾葛共麻黃香附陳皮蘇葉