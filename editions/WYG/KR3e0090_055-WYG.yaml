  text: 編輯幼科雜病心法要訣目録發熱門諸熱總括表熱十神湯雙解通聖湯裏熱調胃承氣湯白虎湯黃連解毒湯虚熱補中益氣湯竹葉石膏湯白通湯實熱涼膈散大柴胡湯積滯門積滯總括乳滯消乳丸食滯木香大安丸小承氣湯癖疾門癖疾總括癖疾千金消癖丸木香丸紅花膏汗證門汗證總括自汗玊屏風散桂枝加附子湯白虎湯調胃承氣湯盗汗酸棗仁湯當歸六黃湯失血門失血總括衂血麻黃湯桂枝湯犀角地黃湯四物三黃瀉心湯髪灰散吐血犀角地黃湯桃仁承氣湯加味四物湯鷄蘇散加味救肺散便血皂刺大黄湯槐花散平胃地榆湯升陽和血湯人參養榮湯溺血牛膝四物湯雜證門二便秘結八正散神芎丸氣虛脫肛補中益氣湯真人養藏湯澁腸散肛腫翻肛皂刺大黃湯曽氏蟠龍散龜胸寛氣飲百合丹龜背松蕋丹五軟補腎地黃丸扶元散五鞕小續命湯烏藥順氣散加味六君子湯五遲加味六味地黃丸補中益氣湯苣勝丹菖蒲丸鶴膝風大防風湯補腎地黃丸解顱補腎地黃丸扶元散封䪿散䪿陷補中益氣湯固真湯烏附膏䪿塡瀉青丸大連翹飲防風升麻湯理中湯中惡蘇合香丸御纂醫宗金鑑卷五十五目録欽定四庫全書御纂醫宗金鑑卷五十五編輯幼科雜病心法要訣目録發熱門諸熱總括表熱十神湯雙解通聖湯裏熱調胃承氣湯白虎湯黃連解毒湯虚熱補中益氣湯竹葉石膏湯白通湯實熱涼膈散大柴胡湯積滯門積滯總括乳滯消乳丸食滯木香大安丸小承氣湯癖疾門癖疾總括癖疾千金消癖丸木香丸紅花膏汗證門汗證總括自汗玊屏風散桂枝加附子湯白虎湯調胃承氣湯盗汗酸棗仁湯當歸六黃湯失血門失血總括衂血麻黃湯桂枝湯犀角地黃湯四物三黃瀉心湯髪灰散吐血犀角地黃湯桃仁承氣湯加味四物湯鷄蘇散加味救肺散便血皂刺大黄湯槐花散平胃地榆湯升陽和血湯人參養榮湯溺血牛膝四物湯雜證門二便秘結八正散神芎丸氣虛脫肛補中益氣湯真人養藏湯澁腸散肛腫翻肛皂刺大黃湯曽氏蟠龍散龜胸寛氣飲百合丹龜背松蕋丹五軟補腎地黃丸扶元散五鞕小續命湯烏藥順氣散加味六君子湯五遲加味六味地黃丸補中益氣湯苣勝丹菖蒲丸鶴膝風大防風湯補腎地黃丸解顱補腎地黃丸扶元散封䪿散䪿陷補中益氣湯固真湯烏附膏䪿塡瀉青丸大連翹飲防風升麻湯理中湯中惡蘇合香丸御纂醫宗金鑑卷五十五目録欽定四庫全書御纂醫宗金鑑卷五十五編輯㓜科雜病心法要訣發熱門諸熱總括小兒有病多發熱表裏虚實宜分别觀形察色辨因由審證切衇有妙訣表證湏汗裏下之虚則宜補實則瀉平昔體認要精詳方得臨時無遺闕註小兒發熱有表裏虚實之異治亦有汗下補瀉之殊湏觀形察色審證切衇以别之惟在平昔講習精詳臨證庶不致悞表熱表熱之證因外感衇浮發熱惡風寒頭痛身疼而無汗十神通聖表為先注小兒外感寒邪衇浮發熱惡風惡寒頭疼身痛無汗此表熱也宜十神湯主之若兼内熱者雙解通聖湯兩解之十神湯升麻葛根麻黃香附醋炒陳皮蘇葉赤芍藥川芎香白芷甘草生引用生薑水煎服方歌十神湯治表熱證升麻乾葛共麻黃香附陳皮蘇葉芍芎芷甘草引生薑雙解通聖湯方見傷寒裏熱裏熱之證因内熱徧身蒸熱小便紅面赤唇焦舌燥渴調胃白虎解毒清註小兒肥甘過度必生内熱以致發熱蒸蒸小便赤濇靣赤唇焦舌燥而渴衇實有力者先以調胃承氣湯下之不愈用白虎湯或黃連解毒湯清之調胃承氣湯大黄芒消甘草引用生薑水煎服方歌調胃承氣治裏熱大黃甘草共芒消引用生薑水煎服大便通利熱自消白虎湯石膏煆知母生甘草生粳米水煎服方歌胃熱白虎湯知母生用良石膏合甘草粳米共煎嚐黃連解毒湯黃芩黃連梔子黃蘗水煎服方歌黃連解毒湯清熱效非常芩連梔子蘗煎服保安康虚熱虚熱病後營衞弱神倦氣乏用補中嘔渴竹葉石膏治面赤尿白厥白通註虚熱者因小兒病後氣血虚弱榮衞尚未調匀之故其證神倦氣乏宜用補中益氣湯治之若兼口渴引飲而嘔者宜用竹葉石膏湯治之又有隂盛格陽外浮發熱者其面色雖赤然小便必清白四肢必厥逆宜用白通湯收歛陽氣熱退自愈補中益氣湯方見飱泄竹葉石膏湯竹葉石膏煆人參麥冬去心甘草生半夏薑製粳米引用生薑水煎服方歌病後虚熱煩渴嘔皆因氣弱胃津亡竹葉石膏參麥草半夏粳米共生薑白通湯乾薑附子製葱水煎服方歌虚熱原於隂格陽真寒假熱白通湯散寒薑附葱白莖厥囘熱退自然康實熱實熱積熱午潮熱腹脹尿紅大便難煩渴口瘡腮頰赤涼膈大柴效通仙註小兒有餘積熱以致午後潮熱蒸蒸有汗肚腹脹滿小便赤大便難煩渴啼呌口舌生瘡腮頰紅赤衇洪數有力法宜清熱通利時時熱者涼膈散主之午後潮熱者大柴胡湯主之涼膈散方見急驚風大柴胡湯方見傷寒積滯門積滯總括小兒養生食與乳撙節失宜積滯成停乳傷食宜分晰因證調治保安寜註夫乳與食小兒資以養生者也胃主納受脾主運化乳貴有時食貴有節可免積滯之患若父母過愛乳食無度則宿滯不消而病成矣醫者當别其停乳傷食之異臨證斟酌而施治焉乳滯嬰兒乳滯睡不安多啼口熱吐驚煩肚脹腹熱便酸臭愼攻宜用消乳丸註乳滯之兒其候睡卧不寜不時啼呌口中氣熱頻吐乳片肚脹腹熱大便酸臭也但臟腑嬌嫩不可過攻惟宜調和脾胃為上以消乳丸消導之消乳丸方見傷乳吐食滯小兒食滯任意餐頭温腹熱便膿酸噯氣惡食煩作渴大安承氣審宜先註小兒恣意肥甘生冷不能運化則腸胃積滯矣其證頭温腹熱大便酸臭噯氣惡食煩不安眠口乾作渴滯輕者宜木香大安丸消導之滯重便秘者宜小承氣湯攻下之木香大安丸木香黃連陳皮白术土炒枳實麩炒山查肉各三錢連翹二錢去心神麯炒麥芽各三錢炒砂仁萊菔子各二錢焙右為細末神麯糊為丸每服一錢陳倉米湯下小承氣湯方見食痛癖疾門癖疾總括癖疾過食腸胃滿濁液外溢被寒凝潮熱飲冷肌削瘦腹滿硬塊面黃青註癖疾一證皆因飲食過節腸胃塡滿濁汁外溢復感寒氣凝結而成每生於左脇之下始如鷄卵堅硬成塊漸如覆盆之形越臍則難治矣其候身體潮熱喜飲涼水肌膚削瘦面色青黃也治者宜詳察之癖疾證治癖疾潮熱渴飲冷肚大青筋堅硬疼内服消癖木香效外貼紅花膏最靈註癖疾之始作也午後潮熱口渴飲冷肚大青筋漸至堅硬成塊不時作痛内以千金消癖丸治之外貼紅花膏内外兼治其癖自消若無熱渴者先以木香丸治之外亦以紅花膏貼之千金消癖丸蘆薈阿魏另為糊青黛木香厚朴薑炒㯽榔陳皮甘草各一錢生史君子去殻胡黃連山查肉香附醋炒三棱醋炒莪术各二錢醋炒水紅花子神麴炒麥芽各四錢炒人參白术土炒茯苓各三錢右為細末將阿魏一錢白水和麫打糊為丸菉豆大米飲下量兒大小服之木香丸木香蓬莪术縮砂仁青皮硃砂各二錢研細右為細末和匀飛白麫糊和丸麻子大每服二三丸乳傷乳飲下食傷以所傷物熬湯下紅花膏没藥五錢血竭麝香阿魏各三錢當歸赤芍各一錢水紅花料一捆煎汁去渣􅘮膏一碗右為細末入膏内攪匀以青布攤貼患處汗證門汗證總括自汗屬陽有虚實或因胃熱或表虛睡中盗汗為隂弱心虚血熱隨證醫註汗乃人之津液存於陽者為津存於隂者為液發洩於外者為汗若汗無故而出者乃因隂陽偏勝也如小兒無因而汗自出者謂之自汗自汗屬陽有虚實之别虛者汗出翕翕發熱惡寒乃表虛也汗出蒸蒸發熱不惡寒乃裏熱也表虚者法當固表裏實者法當攻熱又有睡則汗出覺則汗止謂之盗汗盗汗主隂虚然當分心虚不固心火傷隂也心虚當補心心熱當涼血治者宜詳辨之庶無差謬自汗表虚自汗玉屏風甚者桂枝加附從裏實自汗用白虎便秘調胃承氣攻註表虚濈濈自汗玊屏風散主之若惡寒冷陽氣虛也桂枝湯加附子固之陽明裏實蒸蒸自汗用白虎湯清之便秘者以調胃承氣湯攻之玊屏風散黃耆蜜炙防風白术土炒水煎服方歌表氣虚弱時自汗玉屏風治頗相宜黃耆防風炒白术水煎温服不拘時桂枝加附子湯白芍藥桂枝甘草炙附子製引用薑棗水煎服方歌表氣虚弱甚桂枝湯最良芍藥桂枝草加附病漸康白虎湯方見裏熱調胃承氣湯方見裏熱盗汗心虛盗汗睡多驚酸棗仁湯服即寜心火傷隂必煩熱當歸六黃湯奏功註盗汗有二虛實兩分心虛者隂氣不歛也睡則多驚以酸棗仁湯主之心熱者火傷於隂也身多煩熱以當歸六黃湯主之酸棗仁湯當歸白芍炒生地茯苓酸棗仁炒知母炒黄蘗炒五味子人參黃耆炙水煎服方歌酸棗仁湯治盗汗陽不能藏隂本虚歸芍生地茯苓棗知蘗五味共參耆當歸六黃湯當歸生地黃熟地黃黃芩黃蘗黃連黃耆炙引用浮麥水煎服方歌當歸六黃治盗汗陽盛傷隂液自流生熟二地芩連蘗歸耆浮麥汗能收失血門失血總括隂乗陽熱血妄行血犯氣分不歸經血病及腑滲濁道傷於藏者溢出清熱犯陽絡上吐衂熱侵隂絡下失紅又有努勞成血病血止仍𠻳勢多凶註凡失血之證陽盛乗隂則血為熱迫不能安於衇中犯於氣分妄行不能歸入經衇也若血病傷及於腑者則血滲入腸胃之濁道上行於咽出而為吐為衂下從二便而出為便為溺也若血病傷及於藏者則溢出於胸中之清道上從喉出而兼咳𠻳下從精竅而出為溺血也夫血藏於臟内行於衇中流於軀殻之内不可得而見也非損傷不能為病而損之之因有三一曰熱傷陽絡腑病也熱傷隂絡藏病也宜以清熱為主一曰努傷宜以破逐為主一曰勞傷宜以理損為主若日久血止而咳𠻳不休者主必死之證故勢多凶也衂血衂血之候鼻乾燥身熱不渴苦頭疼失表分汗麻桂治内熱犀角瀉心清註衂血者鼻中出血也其候鼻中乾燥身熱不渴苦頭痛是熱傷陽絡也有因傷寒失汗衂血者乃熱鬱於營其身無汗宜以麻黃湯汗之身有汗者宜以桂枝湯解之設無表病因内熱而衂者宜以犀角地黃湯清之熱盛者四物三黃瀉心湯瀉之外俱用髮灰散或黒梔子末吹鼻其衂自止麻黃湯麻黃杏仁炒去皮尖桂枝甘草生引用生薑水煎服方歌傷寒失表營鬱熱身體無汗血妄行須用麻黃湯調治桂枝麻黃杏草同桂枝湯方見自汗犀角地黃湯牡丹皮白芍藥犀角生地黄水煎服便硬者加川大黃方歌犀角地黃湯治衂效非常丹皮芍犀地便秘加大黃四物三黃瀉心湯川芎當歸酒洗生地黃赤芍藥黃芩黃連川大黃酒洗水煎服方歌四物三黃瀉心湯熱盛吐衂功最良芎歸生地赤芍藥黃芩黃連川大黃髪灰散取壯實人頭髪隂陽瓦煆成灰放在地上去火性研細末吹入鼻中血衂自止吐血吐血不咳因熱逆若兼咳嗽努勞傷内熱犀角地黃治努傷承氣四物嚐勞傷有熱雞蘇散無熱須用救肺良註小兒吐血不咳嗽者多因内熱致血妄行上逆也宜以犀角地黃湯主之若因努勞吐血者則兼咳嗽先用桃仁承氣湯以破逐之次用加味四物湯和之又有勞傷吐血者亦兼咳嗽痰中𢃄血有熱者雞蘇散主之無熱者救肺散主之犀角地黃湯方見本門衂血桃仁承氣湯桃仁去皮尖研大黃芒消甘草桂枝加當歸芍藥蘇木紅花水煎服方歌努傷吐血先破逐桃仁承氣湯妙絶桃仁黃消草桂枝加入歸芍蘇紅㨗加味四物湯當歸芍藥川芎生地黃茅根蒲黃牡丹皮梔子炒黒甘草生引用藕節酒水煎服方歌努傷吐血須活血四物為主真妙訣再加茅根與蒲黃丹皮梔草引藕節雞蘇散雞蘇薄荷葉川貝母去心麥門冬去心桔梗阿膠蛤粉炒生