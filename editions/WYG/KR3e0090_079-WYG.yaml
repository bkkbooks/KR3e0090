陽和而癰熱愈矣六曰員利鍼式圖註經之六曰員利鍼者取法於氂鍼微大其末反小其身長一寸六分其取法於氂者以毛之强者曰氂用其細健可稍深也員利鍼主治法歌員利鍼形尖如氂主治虛邪客於經暴痺走注歴節病刺之經絡即時通註員利鍼尖其形如氂員而且銳主治虛邪客於經絡而為暴痺與走注歴節疼痛等病以此刺之則經絡流通而虚邪自去矣七曰毫鍼式圖註經之七曰毫鍼者尖如蚊䖟喙取法於毫毛長一寸六分其必尖如蚊䖟喙者取其微細徐緩也毫鍼主治法歌毫鍼主治虛痺纒養正除邪在徐緩寒熱痛痺浮淺疾靜入徐出邪正安註毫鍼者因取法於毫毛故名之也主刺邪客經絡而為痛痺邪氣輕淺者也凡正氣不足之人用此鍼刺之靜以徐徃漸散其邪微以乆留緩養正氣則寒邪痛痺浮淺之在絡者皆可平也八曰長鍼式圖註經之八曰長鍼者取法於綦鍼長七寸為其可以取深邪逺痺也長鍼主治法歌長鍼主治虛邪傷内舍骨解節腠殃欲取深邪除逺痺刺法得宜始可康註長鍼即今環跳鍼也主虚邪深入内舍於骨解腰脊節腠之間凡欲取深逺疼痛之邪必得身長末鋒之鍼如法以刺之方能使深邪出逺痺解而得安康也九曰大鍼式圖經之九曰大鍼者取法於鋒鍼其鋒微員長四寸尖形如梃粗而且巨可以瀉通機關也大鍼主治法歌大鍼主刺周身病淫邪溢於肌體中為風為水關節痺關節一利大氣通註大鍼者即古人之燔鍼也凡周身淫邪或風或水溢於肌體留而不能過於關節壅滯為病者以此刺之使關節利大氣通則淫邪壅於經絡風虚腫毒傷於肌體者皆可去也按此九鍼皆本於靈樞經中大小長短之法無有異也但細玩經中九鍼之用凡所取者皆言有餘之實邪則鍼之不宜於治虚也從可知矣行鍼次第手法歌行鍼手法口訣多撮要編為十二歌取穴持溫進指攝退搓撚留摇拔合註十二字分次第手法歌訣始自三衢楊繼洲後之諸家口訣雖多皆不免於繁雜今撮其要仍編為十二歌訣庻簡明切當便於後學一取穴歌取穴先將爪切深須教毋外慕其心令彼榮衛無傷礙醫者方堪入妙鍼註凡下鍼用左手大指爪甲重切所鍼之穴令氣血開教病者心専於内不要外馳然後下鍼使鍼不傷榮衛方堪入竗也二持鍼歌持鍼之士要心雄手如握虎莫放鬆欲識機關三部奥須將此理再推窮註凡下鍼之士須心小力雄以右手持鍼於穴上勢若握虎不敢放鬆着力旋揷直至應止之處吸氣三口然後提鍼徐徐而用凡機關三才奥理欲識於心而行於鍼者須將此再三推窮可也三溫鍼歌溫鍼之理最為良口内溫和審穴方毋令冷熱相爭搏榮衛宣通始安祥註凡下鍼必先將所用之鍼入於口中使之溫熱審定穴所方可與刺勿令冷熱相爭庻血氣調和而得安祥也四進鍼歌進鍼理法取關機失經失穴最不宜陽經取陷陰經衇三思已定鍼之愈註凡下鍼要病人神氣定息數匀醫者亦如之關機最密切勿太忙須細審經絡穴所在何部分不可輕施其鍼失於經絡穴所也如在陽部必取筋骨間陷下之處則不傷於筋骨如在陰分郄膕之内動衇相應間則以爪重切經絡少待片時方可進鍼而不傷於榮衛又必三思已定然後下鍼病可愈矣五指循歌部分經絡要指循只為鍼頭不𦂳沉推則行之引則止調和血氣使來臨註凡下鍼若氣不至用指於所屬部分經絡之路上下左右推而行之引而止之徃來循之使氣血上下均匀鍼下自然氣至沉𦂳得氣即寫之意也六攝法歌攝法原因氣滯經大指爪甲切莫輕以指攝鍼待氣至邪氣流行鍼自輕註凡攝鍼者因鍼下邪氣滯濇不行也隨經絡上下用大指爪甲重切之使正氣流行則邪氣不能滯濇而鍼下自覺活動矣七退鍼歌退鍼手法理要知三才訣内總元機一部六數三吸氣須臾疾病自然愈註凡退鍼全在手法三才之内皆有要訣元機不可不知如欲退鍼必須緩緩而出自地部退至人部再漸退至天部俱用少陰之六數瀉之每一部六數須要少停三部共行三六一十八數令病人吸氣三口隨吸隨提徐徐退至天部其疾病自然除矣八搓鍼歌搓鍼瀉氣最為竒氣至鍼纒莫就移渾如搓線攸攸轉急則纒鍼肉不離註搓鍼者凡進退搓捻皆催其氣至以瀉邪氣也如覺鍼下氣𦂳切勿就移須用瀉法但微微動轉如搓線之狀若轉之太𦂳必至肉纒鍼頭邪氣滯濇而不能除矣九撚鍼歌撚鍼指法不相同一般在手兩般功内外轉移行上下助正伏邪疾自輕註凡撚鍼時雖一般在手而指法不同故功有兩般也如欲治上則大指向外撚外撚者令其氣向上也如欲治下則大指向内撚内撚者令其氣至下也内撚為之補外撚為之瀉如經絡向下者轉鍼頭逆之則為迎也經絡向上者移鍼頭順之則為隨也指法得宜則正氣自復而邪氣自退矣十留鍼歌留鍼取氣候沉浮出入徐徐必逗留能令榮衛縱横散巧妙元機在指頭註留鍼者凡出鍼至於天部入鍼至於地部須在皮膚肌肉間徐徐容留令榮衛宣散方可出鍼入鍼若出鍼太急則血隨鍼出反傷榮衛其巧妙元機全在指頭也十一搖鍼歌摇鍼三部皆六摇依次推排在指梢孔穴大開無窒礙邪氣退除病自消註搖鍼者如出鍼三部欲瀉之際每一部摇二三摇多者不過六摇而已以指捻鍼如扶人頭摇之之狀使孔穴開大無有窒礙庻邪氣退除而病愈矣十二拔鍼歌拔鍼之時切勿忙閉門存神要精詳不沉不𦂳求鍼尾此訣須當韞錦囊註凡鍼畢拔鍼最要精詳不可輕率忙亂也如欲出鍼須待鍼下氣緩不沉不𦂳覺輕動滑快方以右指捻住鍼尾以左手大指按其鍼穴及穴外之皮令鍼穴門户不開神氣内存然後拔鍼庻不致於出血此鍼家要訣須當韞於錦囊也男左女右中指第二節屈指兩紋尖相去爲一寸取稻稈心量或薄篾量皆易折而不伸縮為凖用䋲則伸縮不便故多不凖行鍼分寸法歌行鍼分寸中指傳屈指中節兩紋尖男左女右童稚一長短肥瘦審經權註行鍼取分寸法以同身寸法爲凖男左手女右手以中指第二節屈指兩紋尖相去爲一寸童稚亦如之雖人身有長短體有肥瘦入鍼之分數不一而身形之長者其指節亦長身形短者其指節亦短但隨其長短以取分寸則自凖矣肥人肌肉肥厚血氣充滿宜刺三分半瘦人肌肉瘦薄血氣未盛宜刺二分然雖如此猶當有經有權不可執一而論如遇不肥不瘦之人只在二三分之間酌量取之可也十二經井滎俞經合原刺淺深歌出井流滎注爲俞行經入合藏俞原春宜鍼滎夏鍼俞秋宜鍼合冬井間藏病鍼俞府病合藏府有病皆鍼原凡諸井穴肌肉淺不宜深鍼自古傳註井滎俞經合原十二經穴名也手足陽經有原穴手足陰經無原穴陰之俞穴即陰之原穴也所出爲井井者如水之出也所流爲滎滎者如水之流也所注為俞俞者如水之注也所行為經經者如水之行也所入為合合者如水之㑹也原者如水之源也夫春鍼滎者取絡衇在分肉間刺之淺者也夏鍼俞者取孫絡在肌肉皮膚之上也秋鍼合者亦取絡衇在分肉間故如春時之所刺冬鍼井者取絡衇孫絡之下比他時所刺則深而留之以冬氣入藏故也經原之原手足陰陽之經諸病皆宜刺之但所刺有深有淺不能枚舉此四時鍼刺之大㫖自古相傳者也五藏井滎俞經合歌太陰肺衇井少商魚際之穴號滎鄕太淵一穴名為俞經渠經合尺澤當太陰脾井隱白穴流於大都滎來接太白為俞經商坵陰陵泉與合為穴少陰心衇井少衝㝷至少府即名滎神門一穴為俞穴經合靈道少海眞少陰督衇井滎泉然谷為滎本天然太谿為俞經復溜陰谷為合踝前旋厥陰心包井中衝掌中勞宫即為滎大陵穴取名為俞間使經合曲澤終厥陰肝衇井大敦行間之穴便為滎太衝之處為俞穴經合中封曲泉名六府井滎俞原經合歌陽明大腸井商陽二間為滎俞三間合谷原經陽谿取曲池爲合正相當陽明胃衇井厲兌內庭為滎須要㑹陷谷名俞衝陽原經合解谿三里位太陽小腸井少澤流於前谷為滎穴後谿為俞原腕谷經合陽谷小海歇太陽膀胱井至陰通谷為滎亦穴名束骨為俞原京骨崑崙為經合委中少陽三焦井關衝尋至液門號為滎俞原中渚陽池取經合支溝天井中少陽膽衇井竅陰俠谿為滎是穴名俞原臨泣坵墟穴經歸陽輔合陽陵十二經表裏原絡總歌藏府有病均宜刺原絡表裏相隨看肺原太淵大偏歴大肺合谷列缺端脾原太白胃豐隆胃脾衝陽公孫間心原神門小支正小心腕骨通里邊腎原太谿傍飛陽膀腎京骨大鍾班三焦陽池包内關包原大陵焦外關膽原坵墟肝蠡溝肝膽太衝光明閑註凡藏府有病均可以刺之即難經云五藏六府有病皆取其原者是也蓋各經有所主之病必隨其各經表裏先主後客並刺之主者原穴也客者絡穴也如手太隂肺經病可刺本經裏之原穴即太淵穴也復刺大膓表之絡穴即偏歴穴也手陽明大腸經病可刺本經表之原穴即合谷穴也復刺肺經裏之絡穴即列缺穴也足太隂脾經病可刺本經裏之原穴即太白穴也復刺胃經表之絡穴即豐隆穴也足陽明胃經病可刺本經表之原穴即衝陽穴也復刺脾經裏之絡穴即公孫穴也手少隂心經病可刺本經裏之原穴即神門穴也復刺小腸經表之絡穴即支正穴也手太陽小腸經病可刺本經表之原穴即腕骨穴也復刺心經裏之絡穴即通里穴也足少隂腎經病可刺本經裏之原穴即太谿穴也復刺膀胱經表之絡穴即飛揚穴也足太陽膀胱經病可刺本經表之原穴即京骨穴也復刺腎經裏之絡穴即大鍾穴也手少陽三焦經病可刺本經表之原穴即陽池穴也復刺心包絡經表之絡穴即内關穴也手厥隂心包絡經病可刺本經裏之原穴即大陵穴也復刺三焦經表之絡穴即外關穴也足少陽膽經病可刺本經表之原穴即坵墟穴也復刺肝經裏之絡穴即蠡溝穴也足厥隂肝經病可刺本經裏之原穴即太衝穴也復刺膽經表之絡穴即光明穴也此十二經主病之原穴為主絡穴為客隨表隨裏之刺法也肺經表裏原絡穴主治歌肺經原絡應刺病胸脹溏瀉小便頻洒翕寒熱欬喘短木痛皮膚肩缺盆註肺經裏之原穴太淵大腸表之絡穴偏歴二穴應刺之證卽胸脹溏瀉小便頻數洒洒惡寒翕翕發熱咳嗽喘促短氣皮膚肩背缺盆麻木疼痛皆肺大腸經病也大腸經表裏原絡穴主治歌大腸原絡應刺病大大指次次指不用肩臂疼氣滿皮膚木不仁面頰顋腫耳聾鳴註大腸表之原穴合谷肺經裏之絡穴列缺二穴應刺之證卽手之大指次指不用肩臂疼痛皮膚麻木不仁面頰顋腫耳鳴耳聾皆大腸肺經病也脾經表裏原絡穴主治歌脾經原絡應刺病重倦面黃舌强疼腹滿時痛吐或瀉善饑不食脾病明註脾經裏之原穴太白胃經表之絡穴豐隆二穴應刺之證卽身重倦怠面黃舌强而疼腹滿時時作痛或吐或瀉善饑而不欲食皆脾胃經病也胃經表裏原絡穴主治歌胃經原絡應刺病項膺股胻足跗疼狂妄高歌棄衣走惡聞烟火木音驚註胃經表之原穴衝陽脾經裏之絡穴公孫二穴應刺之證卽項頸胸膺胯股脛胻足跗疼痛發狂妄言高歌棄衣而走惡烟火聞木音卽驚皆胃脾經病也心經表裏原絡穴主治歌心經原絡應刺病消渴背腹引腰疼眩仆欬吐下泄氣熱煩好笑善忘驚註心經裏之原穴神門小腸表之絡穴支正二穴應刺之證飲水卽消背腹引腰作痛眩暈仆倒上欬吐下泄氣熱而心煩好笑善忘多驚皆心與小腸經病也小腸經表裏原絡穴主治歌小腸原絡應刺病顴頷耳腫苦寒熱肩臑肘臂内外廉痛不能轉腰似折註小腸表之原穴腕骨心經裏之絡穴通里二穴應刺之證卽顴頷耳腫苦寒熱肩臑肘臂內外側痛不能轉動腰痛似折皆小腸心經病也腎經表裏原絡穴主治歌腎經原絡應刺病大小腹痛大便難臍下氣逆脊背痛唾血渴熱兩足寒註腎經裏之原穴太谿膀胱表之絡穴飛陽二穴應刺之證即大腹小腹脊背疼痛大便結燥臍下氣逆上冲口渴吐血兩足寒冷皆腎膀胱經病也膀胱經表裏原絡穴主治歌膀胱原絡應刺病目脫淚出頭項疼臍突大小腹脹痛按之尿難溲血膿註膀胱表之原穴京骨腎經裏之絡穴大鍾二穴應刺之證即目胞脫陷淚出頭項疼痛臍突大腹小腹脹痛按之其尿難出而溲血膿皆膀胱腎經病也三焦經表裏原絡穴主治歌三焦原絡應刺病小指次指如廢同目眥耳後喉腫痛自汗肩臑内外疼註三焦表之原穴陽池心包裏之絡穴內關二穴應刺之證即手之小指次指如廢而不能用目眥耳後咽喉腫痛自汗肩臑内外側疼皆三焦包絡經病也心包絡經表裏原絡穴主治歌心包原絡應刺病面紅目赤笑不休心中動熱掌中熱胸腋臂手痛中求註心包裏之原穴大陵三焦表之絡穴外關二穴應刺之證即面紅目赤好笑不休心中動悸内熱手心熱胸腋與臂手疼痛皆心包絡三焦經病也膽經表裏原絡穴主治歌膽經原絡應刺病口苦胸脇痛不寧髀膝外踝諸節痛太息馬刀俠瘤癭註膽經表之原穴邱墟肝經裏之絡穴蠡溝二穴應刺之證即口苦胸脇髀膝外踝諸節疼痛太息馬刀癭瘤皆膽肝經病也肝經表裏原絡穴主治歌肝經原絡應刺病頭痛頰腫脇疝疼婦人少腹胞中痛便難溲淋怒色青註肝經裏之原穴太衝膽經表之絡穴光明二穴應刺之證即頭痛頰腫脇疝疼痛婦人少腹胞中疼痛大便難小便淋好怒色靑皆肝膽經病也八衇交會八穴歌公孫衝衇胃心胸内關陰維下總同臨泣膽經連帶衇陽維目銳外關逄後谿督衇內眥頸申衇陽蹻絡亦通列缺任衇行肺系隂蹻照海膈喉嚨註公孫二穴是足太陰脾經穴也通於衝衇內關二穴此二穴是手厥陰心包絡穴也四穴通於陰維衇四經㑹合循行之處在胃心胸之間故主治胃與心胸之病也臨泣二穴是足少陽膽經穴也通於帶衇外關二穴此二穴是手少陽三焦經穴也四穴通於陽維衇四經會合連絡之處在於目銳眥耳後頰頸肩之間故主治目銳眥耳後頰頸肩之病也後谿二穴是手太陽小腸經穴也通於督衇申衇二穴此二穴是足太陽膀胱經穴也四穴通於陽蹻衇四經會合别絡之處在於目内眥頸項耳肩膊小腸膀胱之間故主治目内眥頸項耳肩膊小腸膀胱之病也列缺二穴是手太陰肺經穴也通於任衇照海二穴此二穴是足少隂腎經穴也四穴通於陰蹻衇四經㑹合系絡之處在於肺系咽喉胸膈之間故主治肺系咽喉胸膈之病也衝衇公孫穴主治歌九種心疼病不寧結胸翻胃食難停酒食積聚腸鳴見水食氣疾膈臍疼腹痛脇脹胸膈滿瘧疾腸風大便紅胎衣不下血迷心急刺公孫穴自靈註九種心疼者曰飲曰食曰風曰冷曰熱曰悸曰蟲曰注曰去來痛結胸者胸滿鞕痛也翻胃者朝食暮吐食難停留也傷酒傷食積滯腸胃雷鳴水食氣疾膈間臍腹疼痛兩脇作脹胸膈滿悶瘧疾腸風大便下血以及婦人胞衣不下瘀血上攻迷心皆宜刺此公孫穴則立應也陰維内關穴主治歌中滿心胸多痞脹腸鳴泄瀉及脫肛食難下膈傷於酒積塊堅鞕橫脇旁婦女脇疼並心痛裏急腹痛勢難當傷寒不解結胸病瘧疾内關可獨當註中滿心胸痞脹謂腹滿心胸痞脹不通快也腸鳴泄瀉謂暴瀉脫肛也食難下膈傷於酒者謂嘔吐食不能下或因酒傷也積塊堅鞕橫衝於脇婦女心脇疼痛裏急脹痛傷寒結胸鞕痛瘧疾裏實等病皆刺内關無不愈矣帶衇臨泣穴主治歌中風手足舉動難麻痛發熱筋拘攣頭風腫痛連顋項眼赤而疼合頭眩齒痛耳聾咽腫證遊風搔癢筋牽纒腿疼脇脹肋肢痛鍼入臨泣病可痊註中風手足舉動難謂手足不隨也若疼痛麻木拘攣兼發熱者風熱也頭風旋暈及腫痛連顋項目牙齒兩耳咽喉皆赤腫痛遊風搔癢筋衇牽引腰脇四肢與肋疼痛等證皆宜刺此臨泣穴立時有竒功也陽維外關穴主治歌肢節腫疼與膝冷四肢不遂合頭風背胯內外筋骨痛頭項眉稜病不寧手足熱麻夜盗汗破傷跟腫目睛紅傷寒自汗烘烘熱惟有外關鍼極靈註四肢骨節腫痛兩膝痺冷手足不遂偏正頭風脊背腰胯筋骨頭項眉稜疼痛手足發熱麻木夜間盗汗及破傷遊風脚跟腫痛兩眼赤紅傷寒陽明自汗蒸熱烘烘皆宜刺外關穴其病立已督衇後谿穴主治歌手足拘攣戰掉眩中風不語並癲癎頭疼眼腫漣漣淚背腰腿膝痛綿綿項强傷寒病不解牙齒顋腫喉病難手足麻木破傷風盗汗後谿穴先砭註手足拘攣者屈伸難也戰掉者手足顫搖不能握也眩者暈也中風卒然昏仆不能語言癲癎不省人事瘈瘲抽掣頭痛及暴發火眼熱淚常流行痺腿膝背腰歴節周身疼痛項强傷寒感冒汗不出不能解上下牙齒顋齦咽喉腫疼手足麻木不仁破傷受風寢汗等證先砭後谿穴開通衇道無不愈矣陽蹻申衇穴主治歌腰背脊强足踝風惡風自汗或頭疼手足麻攣臂間冷雷頭赤目眉稜痛吹乳耳聾鼻衂血癲癎肢節苦煩疼遍身腫滿汗淋漓申衇先鍼有竒功註腰背脊强不能俯仰也足内踝紅腫名遶踝風也足外踝紅腫名穿踝風也惡風自汗與雷頭風痛暴發火眼眉稜骨痛手足麻木拘攣臂冷及婦人吹乳乳房紅腫未產者名内吹已產者名外吹也耳聾鼻衄癲癎抽搐肢節煩疼徧身腫滿頭汗淋漓等證此皆風熱痰飲流注攻衝爲病並宜先鍼申衇立時有功任衇列缺穴主治歌痔瘡肛腫泄痢纒吐紅溺血嗽咳痰牙疼喉腫小便澁心胸腹疼噎嚥難産後發强不能語腰痛血疾臍腹寒死胎不下上攻膈列缺一刺病乃痊註內痔肛腫泄痢赤白咳痰唾血溺血及牙齦咽喉腫痛小便赤澁艱難心胸腹痛噎嚥不快産後敗血上干心氣身發强直不能語言或瘀滯腰痛臍腹間寒子死腹中胎衣不下上攻膈塞並刺列缺其證必痊陰蹻照海穴主治歌喉閉淋澁與胸腫膀胱氣痛並腸鳴食黄酒積臍腹痛嘔瀉胃翻及乳癰便燥難産血昏迷積塊腸風下便紅膈中不快梅核氣格主照海鍼有靈註上焦火盛咽喉閉塞不通下焦熱結膀胱氣痛小便淋澁胸中腫痛或食積酒積內蓄傷脾發黃或臍腹痛或嘔瀉胃翻吐食乳癰大便燥結及婦人生産艱難瘀血塊痛昏迷膓風下血不已或膈中之氣怏怏不快如梅核氣格塞咽喉之間咯之不出嚥之不下等疾急刺照海穴則諸證自散手足十二經所屬歌五藏六府共包絡手足所屬三陰陽太陰足脾手肺藏陽明足胃手大腸少陰足腎手心藏太陽足膀手小腸厥陰足肝手包絡少陽足膽手焦當註五藏心肝脾肺腎六府膽胃大腸小腸膀胱三焦共包絡分屬手足三陰三陽爲十二經也如肺手太陰心手少陰心包絡手厥陰手之三陰也手太陽小腸手陽明大腸手少陽三焦手之三陽也足太陽膀胱足陽明胃足少陽膽足之三陽也足太陰脾足少陰腎足厥陰肝足之三陰也天干十二經表裏歌甲膽乙肝丙小腸丁心戊胃己脾鄕庚屬大腸辛屬肺壬屬膀胱癸腎藏三焦陽府須歸丙包絡從陰丁火旁陽干為表陰干裏藏府表裏配陰陽按舊云三焦亦向壬中寄包絡同歸入癸方夫三焦爲决瀆之官猶可言壬而包絡附於心主烏可云癸况二藏表裏皆相火也故改正之註甲丙戊庚壬陽干也乙丁巳辛癸陰干也陽干爲表爲府陰干爲裏爲藏故曰藏府表裏配陰陽也地支十二經流注歌每日寅時從肺起卯時流入大腸經辰胃已脾午心火未時應注小腸經申屬膀胱酉屬腎戍走包絡亥焦宫子膽丑肝寅又肺十二經衇週環行註人有十二經晝夜有十二時每一經主一時先從寅時入肺起卯入於大腸辰入於胃巳入於脾午入於心未入於小腸申入於膀胱酉入於腎戌入於包絡亥入於三焦子入於胆丑入於肝至於寅時則又從肺起此十二經與十二時相循環而行者也十二經相傳次序歌肺大胃脾心小腸膀腎包焦膽肝續手陰藏手陽手頭足陰足腹陽頭足註人身正衇十有二經每於平旦寅時營氣始於中焦上注於手太陰肺經自胸中而出於中府至於少商以次行於手陽明大腸等十二經終於足厥陰肝經而復始於太陰肺經也凡手之三陰從藏走手手之三陽從手走頭足之三陰從足走腹足之三陽從頭走足周流不息循環無端也十二經起止歌肺起中府止少商大腸商陽止迎香胃起承泣終厲兌脾起隠白大包鄕心起極泉少冲止小腸少澤止聽宫膀胱睛明止至陰腎起湧泉俞府終包絡天池中冲止三焦關冲止竹空膽童子髎止竅陰肝起大敦止期門十二經穴周流歌中府爲初注少商少商别絡注商陽商陽復向迎香走香接頭維至庫房維下降兮趨厲兌兌傳隱白至胸鄕隱白上升達大包大包仍續極泉塲泉貫少衝心部井少澤相連卽小腸澤㑹聽宫睛明分睛明下造至陰强至陰斜出湧泉底泉穴還歸腧府藏腧府天池橫絡截池出中衝心主張中衝並與關冲合關衝宛轉絲竹傍絲竹更貫瞳窌穴瞳􅐎下入竅陰方竅陰橫亘大敦井敦上期門肝衇當期門歴遍還中府經絡周流仔細詳十二經氣血多少歌多氣多血惟陽明少氣太陽厥陰同二少太陰常少血六經氣血要分明註手陽明大腸足陽明胃此二經多氣多血之經也三焦膽腎心脾肺此六經多氣少血也心包絡膀胱小腸肝此四經乃多血少氣也御纂醫宗金鑑卷七十九欽定四庫全書御纂醫宗金鑑卷七十九編輯刺灸心法要訣九鍼原始歌九鍼因何而有名原於天地大數生始於一而終於九天地人時音律星風野九九八十一鍼應其數起黃鐘皮肉筋衇聲陰陽齒氣九竅關節通註靈樞九鍼篇帝曰九鍼焉生何因有名岐伯曰天地之大數也始於一終於九一法天二法地三法人四法時五法音六法律七法星八法風九法野九鍼者聖人起天地之數始於一而終於九九而九之九九八十一以起黃鐘之數鍼之數應之而人之身形亦應之皮應天肉應地血衇應人筋應時聲應音隂陽應律齒面目應星氣應風九竅三百六十五絡應九野此天人相通之道也故一鍼皮二鍼肉三鍼衇四鍼筋五鍼骨六鍼調陰陽七鍼益精八鍼除風九鍼通九竅除三百六十五節氣各有所主也九鍼式圖並九鍼主治法歌一曰鑱鍼式圖註經之一曰鑱鍼者取法於巾鍼去末寸半卒銳之長一寸六分鑱者銳也卒者尾也謂此鍼長一寸六分上去末寸半下只留一分之鋒欲淺刺不令深入也鑱鍼主治法歌鑱鍼即今箭頭鍼主刺皮膚邪肉侵毋令深入寫陽氣邪正相安榮衛均註鑱鍼即今箭頭鍼也主刺邪熱病在頭身皮膚之證毋令深入深則有傷陽氣故必分許淺淺刺之使邪去而正不傷榮衛得和則病除矣二曰員鍼式圖註經之二曰員鍼者取法於絮鍼筩其身而卵其鋒長一寸六分筩身卵鋒者謂身直如竹筩末鋒員如卵銳也員鍼主治法歌員鍼取法於絮鍼主治邪氣侵肉分筩身卵鋒不傷正利導分肉邪自平註員鍼即絮鍼也主治邪氣在分肉之間蓋筩身卵鋒利導分肉能使邪氣行而不傷於肌肉之正氣也三曰鍉鍼式圖註經之三曰鍉鍼者取法於黍粟之銳長三寸半黍粟之銳者員而微尖利於用補者也鍉鍼主治法歌鍉鍼之銳如黍粟恐其深入傷肌肉按衇勿陷以致氣刺之邪氣使獨出註鍉鍼之鋒如黍粟之銳主治邪在衇中不欲深入只按衇以候氣至刺衇中之邪氣使獨出也若深按陷至肌肉邪氣雖出而肌肉之正氣必傷矣四曰鋒鍼式圖註經之四曰鋒鍼者取法於絮鍼刃三隅長一寸六分其上去八分下留八分刃三隅者蓋直壯而銳可以寫熱出血也鋒鍼主治法歌鋒鍼即今三稜名主刺瘤邪時氣壅發於經絡痼不解寫熱出血榮衛通註鋒鍼即今三稜鍼主刺時氣溫熱瘤邪也凡發於經絡中壅痼不解之病用三稜鍼之鋒利以寫熱出血使經絡開通榮衛調和而壅痼之疾愈矣五曰鈹鍼式圖註經之五曰鈹鍼者取法於劍鋒廣二分半長四寸其必廣二分半長四寸末如劍鋒者取其能開通也鈹鍼主治法歌鈹鍼之鋒末如劍主刺寒熱兩相搏合而為癰膿已成大膿一寫即時和註鈹鍼之鋒末如劍者主刺寒熱相搏或邪氣鬱於榮衛凝滯不通發為癰疽其膿已成用此開之以取大膿大膿寫則陰陽和而癰熱愈矣六曰員利鍼式圖註經之六曰員利鍼者取法於氂鍼微大其末反小其身長一寸六分其取法於氂者以毛之强者曰氂用其細健可稍深也員利鍼主治法歌員利鍼形尖如氂主治虛邪客於經暴痺走注歴節病刺之經絡即時通註員利鍼尖其形如氂員而且銳主治虛邪客於經絡而為暴痺與走注歴節疼痛等病以此刺之則經絡流通而虚邪自去矣七曰毫鍼式圖註經之七曰毫鍼者尖如蚊䖟喙取法於毫毛長一寸六分其必尖如蚊䖟喙者取其微細徐緩也毫鍼主治法歌毫鍼主治虛痺纒養正除邪在徐緩寒熱痛痺浮淺疾靜入徐出邪正安註毫鍼者因取法於毫毛故名之也主刺邪客經絡而為痛痺邪氣輕淺者也凡正氣不足之人用此鍼刺之靜以徐徃漸散其邪微以乆留緩養正氣則寒邪痛痺浮淺之在絡者皆可平也八曰長鍼式圖註經之八曰長鍼者取法於綦鍼長七寸為其可以取深邪逺痺也長鍼主治法歌長鍼主治虛邪傷内舍骨解節腠殃欲取深邪除逺痺刺法得宜始可康註長鍼即今環跳鍼也主虚邪深入内舍於骨解腰脊節腠之間凡欲取深逺疼痛之邪必得身長末鋒之鍼如法以刺之方能使深邪出逺痺解而得安康也九曰大鍼式圖經之九曰大鍼者取法於鋒鍼其鋒微員長四寸尖形如梃粗而且巨可以瀉通機關也大鍼主治法歌大鍼主刺周身病淫邪溢於肌體中為風為水關節痺關節一利大氣通註大鍼者即古人之燔鍼也凡周身淫邪或風或水溢於肌體留而不能過於關節壅滯為病者以此刺之使關節利大氣通則淫邪壅於經絡風虚腫毒傷於肌體者皆可去也按此九鍼皆本於靈樞經中大小長短之法無有異也但細玩經中九鍼之用凡所取者皆言有餘之實邪則鍼之不宜於治虚也從可知矣行鍼次第手法歌行鍼手法口訣多撮要編為十二歌取穴持溫進指攝退搓撚留摇拔合註十二字分次第手法歌訣始自三衢楊繼洲後之諸家口訣雖多皆不免於繁雜今撮其要仍編為十二歌訣庻簡明切當便於後學一取穴歌取穴先將爪切深須教毋外慕其心令彼榮衛無傷礙醫者方堪入妙鍼註凡下鍼用左手大指爪甲重切所鍼之穴令氣血開教病者心専於内不要外馳然後下鍼使鍼不傷榮衛方堪入竗也二持鍼歌持鍼之士要心雄手如握虎莫放鬆欲識機關三部奥須將此理再推窮註凡下鍼之士須心小力雄以右手持鍼於穴上勢若握虎不敢放鬆着力旋揷直至應止之處吸氣三口然後提鍼徐徐而用凡機關三才奥理欲識於心而行於鍼者須將此再三推窮可也三溫鍼歌溫鍼之理最為良口内溫和審穴方毋令冷熱相爭搏榮衛宣通始安祥註凡下鍼必先將所用之鍼入於口中使之溫熱審定穴所方可與刺勿令冷熱相爭庻血氣調和而得安祥也四進鍼歌進鍼理法取關機失經失穴最不宜陽經取陷陰經衇三思已定鍼之愈註凡下鍼要病人神氣定息數匀醫者亦如之關機最密切勿太忙須細審經絡穴所在何部分不可輕施其鍼失於經絡穴所也如在陽部必取筋骨間陷下之處則不傷於筋骨如在陰分郄膕之内動衇相應間則以爪重切經絡少待片時方可進鍼而不傷於榮衛又必三思已定然後下鍼病可愈矣五指循歌部分經絡要指循只為鍼頭不𦂳沉推則行之引則止調和血氣使來臨註凡下鍼若氣不至用指於所屬部分經絡之路上下左右推而行之引而止之徃來循之使氣血上下均匀鍼下自然氣至沉𦂳得氣即寫之意也六攝法歌攝法原因氣滯經大指爪甲切莫輕以指攝鍼待氣至邪氣流行鍼自輕註凡攝鍼者因鍼下邪氣滯濇不行也隨經絡上下用大指爪甲重切之使正氣流行則邪氣不能滯濇而鍼下自覺活動矣七退鍼歌退鍼手法理要知三才訣内總元機一部六數三吸氣須臾疾病自然愈註凡退鍼全在手法三才之内皆有要訣元機不可不知如欲退鍼必須緩緩而出自地部退至人部再漸退至天部俱用少陰之六數瀉之每一部六數須要少停三部共行三六一十八數令病人吸氣三口隨吸隨提徐徐退至天部其疾病自然除矣八搓鍼歌搓鍼瀉氣最為竒氣至鍼纒莫就移渾如搓線攸攸轉急則纒鍼肉不離註搓鍼者凡進退搓捻皆催其氣至以瀉邪氣也如覺鍼下氣𦂳切勿就移須用瀉法但微微動轉如搓線之狀若轉之太𦂳必至肉纒鍼頭邪氣滯濇而不能除矣九撚鍼歌撚鍼指法不相同一般在手兩般功内外轉移行上下助正伏邪疾自輕註凡撚鍼時雖一般在手而指法不同故功有兩般也如欲治上則大指向外撚外撚者令其氣向上也如欲治下則大指向内撚内撚者令其氣至下也内撚為之補外撚為之瀉如經絡向下者轉鍼頭逆之則為迎也經絡向上者移鍼頭順之則為隨也指法得宜則正氣自復而邪氣自退矣十留鍼歌留鍼取氣候沉浮出入徐徐必逗留能令榮衛縱横散巧妙元機在指頭註留鍼者凡出鍼至於天部入鍼至於地部須在皮膚肌肉間徐徐容留令榮衛宣散方可出鍼入鍼若出鍼太急則血隨鍼出反傷榮衛其巧妙元機全在指頭也十一搖鍼歌摇鍼三部皆六摇依次推排在指梢孔穴大開無窒礙邪氣退除病自消註搖鍼者如出鍼三部欲瀉之際每一部摇二三摇多者不過六摇而已以指捻鍼如扶人頭摇之之狀使孔穴開大無有窒礙庻邪氣退除而病愈矣十二拔鍼歌拔鍼之時切勿忙閉門存神要精詳不沉不𦂳求鍼尾此訣須當韞錦囊註凡鍼畢拔鍼最要精詳不可輕率忙亂也如欲出鍼須待鍼下氣緩不沉不𦂳覺輕動滑快方以右指捻住鍼尾以左手大指按其鍼穴及穴外之皮令鍼穴門户不開神氣内存然後拔鍼庻不致於出血此鍼家要訣須當韞於錦囊也男左女右中指第二節屈指兩紋尖相去爲一寸取稻稈心量或薄篾量皆易折而不伸縮為凖用䋲則伸縮不便故多不凖行鍼分寸法歌行鍼分寸中指傳屈指中節兩紋尖男左女右童稚一長短肥瘦審經權註行鍼取分寸法以同身寸法爲凖男左手女右手以中指第二節屈指兩紋尖相去爲一寸童稚亦如之雖人身有長短體有肥瘦入鍼之分數不一而身形之長者其指節亦長身形短者其指節亦短但隨其長短以取分寸則自凖矣肥人肌肉肥厚血氣充滿宜刺三分半瘦人肌肉瘦薄血氣未盛宜刺二分然雖如此猶當有經有權不可執一而論如遇不肥不瘦之人只在二三分之間酌量取之可也十二經井滎俞經合原刺淺深歌出井流滎注爲俞行經入合藏俞原春宜鍼滎夏鍼俞秋宜鍼合冬井間藏病鍼俞府病合藏府有病皆鍼原凡諸井穴肌肉淺不宜深鍼自古傳註井滎俞經合原十二經穴名也手足陽經有原穴手足陰經無原穴陰之俞穴即陰之原穴也所出爲井井者如水之出也所流爲滎滎者如水之流也所注為俞俞者如水之注也所行為經經者如水之行也所入為合合者如水之㑹也原者如水之源也夫春鍼滎者取絡衇在分肉間刺之淺者也夏鍼俞者取孫絡在肌肉皮膚之上也秋鍼合者亦取絡衇在分肉間故如春時之所刺冬鍼井者取絡衇孫絡之下比他時所刺則深而留之以冬氣入藏故也經原之原手足陰陽之經諸病皆宜刺之但所刺有深有淺不能枚舉此四時鍼刺之大㫖自古相傳者也五藏井滎俞經合歌太陰肺衇井少商魚際之穴號滎鄕太淵一穴名為俞經渠經合尺澤當太陰脾井隱白穴流於大都滎來接太白為俞經商坵陰陵泉與合為穴少陰心衇井少衝㝷至少府即名滎神門一穴為俞穴經合靈道少海眞少陰督衇井滎泉然谷為滎本天然太谿為俞經復溜陰谷為合踝前旋厥陰心包井中衝掌中勞宫即為滎大陵穴取名為俞間使經合曲澤終厥陰肝衇井大敦行間之穴便為滎太衝之處為俞穴經合中封曲泉名六府井滎俞原經合歌陽明大腸井商陽二間為滎俞三間合谷原經陽谿取曲池爲合正相當陽明胃衇井厲兌內庭為滎須要㑹陷谷名俞衝陽原經合解谿三里位太陽小腸井少澤流於前谷為滎穴後谿為俞原腕谷經合陽谷小海歇太陽膀胱井至陰通谷為滎亦穴名束骨為俞原京骨崑崙為經合委中少陽三焦井關衝尋至液門號為滎俞原中渚陽池取經合支溝天井中少陽膽衇井竅陰俠谿為滎是穴名俞原臨泣坵墟穴經歸陽輔合陽陵十二經表裏原絡總歌藏府有病均宜刺原絡表裏相隨看肺原太淵大偏歴大肺合谷列缺端脾原太白胃豐隆胃脾衝陽公孫間心原神門小支正小心腕骨通里邊腎原太谿傍飛陽膀腎京骨大鍾班三焦陽池包内關包原大陵焦外關膽原坵墟肝蠡溝肝膽太衝光明閑註凡藏府有病均可以刺之即難經云五藏六府有病皆取其原者是也蓋各經有所主之病必隨其各經表裏先主後客並刺之主者原穴也客者絡穴也如手太隂肺經病可刺本經裏之原穴即太淵穴也復刺大膓表之絡穴即偏歴穴也手陽明大腸經病可刺本經表之原穴即合谷穴也復刺肺經裏之絡穴即列缺穴也足太隂脾經病可刺本經裏之原穴即太白穴也復刺胃經表之絡穴即豐隆穴也足陽明胃經病可刺本經表之原穴即衝陽穴也復刺脾經裏之絡穴即公孫穴也手少隂心經病可刺本經裏之原穴即神門穴也復刺小腸經表之絡穴即支正穴也手太陽小腸經病可刺本經表之原穴即腕骨穴也復刺心經裏之絡穴即通里穴也足少隂腎經病可刺本經裏之原穴即太谿穴也復刺膀胱經表之絡穴即飛揚穴也足太陽膀胱經病可刺本經表之原穴即京骨穴也復刺腎經裏之絡穴即大鍾穴也手少陽三焦經病可刺本經表之原穴即陽池穴也復刺心包絡經表之絡穴即内關穴也手厥隂心包絡經病可刺本經裏之原穴即大陵穴也復刺三焦經表之絡穴即外關穴也足少陽膽經病可刺本經表之原穴即坵墟穴也復刺肝經裏之絡穴即蠡溝穴也足厥隂肝經病可刺本經裏之原穴即太衝穴也復刺膽經表之絡穴即光明穴也此十二經主病之原穴為主絡穴為客隨表隨裏之刺法也肺經表裏原絡穴主治歌肺經原絡應刺病胸脹溏瀉小便頻洒翕寒熱欬喘短木痛皮膚肩缺盆註肺經裏之原穴太淵大腸表之絡穴偏歴二穴應刺之證卽胸脹溏瀉小便頻數洒洒惡寒翕翕發熱咳嗽喘促短氣皮膚肩背缺盆麻木疼痛皆肺大腸經病也大腸經表裏原絡穴主治歌大腸原絡應刺病大大指次次指不用肩臂疼氣滿皮膚木不仁面頰顋腫耳聾鳴註大腸表之原穴合谷肺經裏之絡穴列缺二穴應刺之證卽手之大指次指不用肩臂疼痛皮膚麻木不仁面頰顋腫耳鳴耳聾皆大腸肺經病也脾經表裏原絡穴主治歌脾經原絡應刺病重倦面黃舌强疼腹滿時痛吐或瀉善饑不食脾病明註脾經裏之原穴太白胃經表之絡穴豐隆二穴應刺之證卽身重倦怠面黃舌强而疼腹滿時時作痛或吐或瀉善饑而不欲食皆脾胃經病也胃經表裏原絡穴主治歌胃經原絡應刺病項膺股胻足跗疼狂妄高歌棄衣走惡聞烟火木音驚註胃經表之原穴衝陽脾經裏之絡穴公孫二穴應刺之證卽項頸胸膺胯股脛胻足跗疼痛發狂妄言高歌棄衣而走惡烟火聞木音卽驚皆胃脾經病也心經表裏原絡穴主治歌心經原絡應刺病消渴背腹引腰疼眩仆欬吐下泄氣熱煩好笑善忘驚註心經裏之原穴神門小腸表之絡穴支正二穴應刺之證飲水卽消背腹引腰作痛眩暈仆倒上欬吐下泄氣熱而心煩好笑善忘多驚皆心與小腸經病也小腸經表裏原絡穴主治歌小腸原絡應刺病顴頷耳腫苦寒熱肩臑肘臂内外廉痛不能轉腰似折註小腸表之原穴腕骨心經裏之絡穴通里二穴應刺之證卽顴頷耳腫苦寒熱肩臑肘臂內外側痛不能轉動腰痛似折皆小腸心經病也腎經表裏原絡穴主治歌腎經原絡應刺病大小腹痛大便難臍下氣逆脊背痛唾血渴熱兩足寒註腎經裏之原穴太谿膀胱表之絡穴飛陽二穴應刺之證即大腹小腹脊背疼痛大便結燥臍下氣逆上冲口渴吐血兩足寒冷皆腎膀胱經病也膀胱經表裏原絡穴主治歌膀胱原絡應刺病目脫淚出頭項疼臍突大小腹脹痛按之尿難溲血膿註膀胱表之原穴京骨腎經裏之絡穴大鍾二穴應刺之證即目胞脫陷淚出頭項疼痛臍突大腹小腹脹痛按之其尿難出而溲血膿皆膀胱腎經病也三焦經表裏原絡穴主治歌三焦原絡應刺病小指次指如廢同目眥耳後喉腫痛自汗肩臑内外疼註三焦表之原穴陽池心包裏之絡穴內關二穴應刺之證即手之小指次指如廢而不能用目眥耳後咽喉腫痛自汗肩臑内外側疼皆三焦包絡經病也心包絡經表裏原絡穴主治歌心包原絡應刺病面紅目赤笑不休心中動熱掌中熱胸腋臂手痛中求註心包裏之原穴大陵三焦表之絡穴外關二穴應刺之證即面紅目赤好笑不休心中動悸内熱手心熱胸腋與臂手疼痛皆心包絡三焦經病也膽經表裏原絡穴主治歌膽經原絡應刺病口苦胸脇痛不寧髀膝外踝諸節痛太息馬刀俠瘤癭註膽經表之原穴邱墟肝經裏之絡穴蠡溝二穴應刺之證即口苦胸脇髀膝外踝諸節疼痛太息馬刀癭瘤皆膽肝經病也肝經表裏原絡穴主治歌肝經原絡應刺病頭痛頰腫脇疝疼婦人少腹胞中痛便難溲淋怒色青註肝經裏之原穴太衝膽經表之絡穴光明二穴應刺之證即頭痛頰腫脇疝疼痛婦人少腹胞中疼痛大便難小便淋好怒色靑皆肝膽經病也八衇交會八穴歌公孫衝衇胃心胸内關陰維下總同臨泣膽經連帶衇陽維目銳外關逄後谿督衇內眥頸申衇陽蹻絡亦通列缺任衇行肺系隂蹻照海膈喉嚨註公孫二穴是足太陰脾經穴也通於衝衇內關二穴此二穴是手厥陰心包絡穴也四穴通於陰維衇四經㑹合循行之處在胃心胸之間故主治胃與心胸之病也臨泣二穴是足少陽膽經穴也通於帶衇外關二穴此二穴是手少陽三焦經穴也四穴通於陽維衇四經會合連絡之處在於目銳眥耳後頰頸肩之間故主治目銳眥耳後頰頸肩之病也後谿二穴是手太陽小腸經穴也通於督衇申衇二穴此二穴是足太陽膀胱經穴也四穴通於陽蹻衇四經會合别絡之處在於目内眥頸項耳肩膊小腸膀胱之間故主治目内眥頸項耳肩膊小腸膀胱之病也列缺二穴是手太陰肺經穴也通於任衇照海二穴此二穴是足少隂腎經穴也四穴通於陰蹻衇四經㑹合系絡之處在於肺系咽喉胸膈之間故主治肺系咽喉胸膈之病也衝衇公孫穴主治歌九種心疼病不寧結胸翻胃食難停酒食積聚腸鳴見水食氣疾膈臍疼腹痛脇脹胸膈滿瘧疾腸風大便紅胎衣不下血迷心急刺公孫穴自靈註九種心疼者曰飲曰食曰風曰冷曰熱曰悸曰蟲曰注曰去來痛結胸者胸滿鞕痛也翻胃者朝食暮吐食難停留也傷酒傷食積滯腸胃雷鳴水食氣疾膈間臍腹疼痛兩脇作脹胸膈滿悶瘧疾腸風大便下血以及婦人胞衣不下瘀血上攻迷心皆宜刺此公孫穴則立應也陰維内關穴主治歌中滿心胸多痞脹腸鳴泄瀉及脫肛食難下膈傷於酒積塊堅鞕橫脇旁婦女脇疼並心痛裏急腹痛勢難當傷寒不解結胸病瘧疾内關可獨當註中滿心胸痞脹謂腹滿心胸痞脹不通快也腸鳴泄瀉謂暴瀉脫肛也食難下膈傷於酒者謂嘔吐食不能下或因酒傷也積塊堅鞕橫衝於脇婦女心脇疼痛裏急脹痛傷寒結胸鞕痛瘧疾裏實等病皆刺内關無不愈矣帶衇臨泣穴主治歌中風手足舉動難麻痛發熱筋拘攣頭風腫痛連顋項眼赤而疼合頭眩齒痛耳聾咽腫證遊風搔癢筋牽纒腿疼脇脹肋肢痛鍼入臨泣病可痊註中風手足舉動難謂手足不隨也若疼痛麻木拘攣兼發熱者風熱也頭風旋暈及腫痛連顋項目牙齒兩耳咽喉皆赤腫痛遊風搔癢筋衇牽引腰脇四肢與肋疼痛等證皆宜刺此臨泣穴立時有竒功也陽維外關穴主治歌肢節腫疼與膝冷四肢不遂合頭風背胯內外筋骨痛頭項眉稜病不寧手足熱麻夜盗汗破傷跟腫目睛紅傷寒自汗烘烘熱惟有外關鍼極靈註四肢骨節腫痛兩膝痺冷手足不遂偏正頭風脊背腰胯筋骨頭項眉稜疼痛手足發熱麻木夜間盗汗及破傷遊風脚跟腫痛兩眼赤紅傷寒陽明自汗蒸熱烘烘皆宜刺外關穴其病立已督衇後谿穴主治歌手足拘攣戰掉眩中風不語並癲癎頭疼眼腫漣漣淚背腰腿膝痛綿綿項强傷寒病不解牙齒顋腫喉病難手足麻木破傷風盗汗後谿穴先砭註手足拘攣者屈伸難也戰掉者手足顫搖不能握也眩者暈也中風卒然昏仆不能語言癲癎不省人事瘈瘲抽掣頭痛及暴發火眼熱淚常流行痺腿膝背腰歴節周身疼痛項强傷寒感冒汗不出不能解上下牙齒顋齦咽喉腫疼手足麻木不仁破傷受風寢汗等證先砭後谿穴開通衇道無不愈矣陽蹻申衇穴主治歌腰背脊强足踝風惡風自汗或頭疼手足麻攣臂間冷雷頭赤目眉稜痛吹乳耳聾鼻衂血癲癎肢節苦煩疼遍身腫滿汗淋漓申衇先鍼有竒功註腰背脊强不能俯仰也足内踝紅腫名遶踝風也足外踝紅腫名穿踝風也惡風自汗與雷頭風痛暴發火眼眉稜骨痛手足麻木拘攣臂冷及婦人吹乳乳房紅腫未產者名内吹已產者名外吹也耳聾鼻衄癲癎抽搐肢節煩疼徧身腫滿頭汗淋漓等證此皆風熱痰飲流注攻衝爲病並宜先鍼申衇立時有功任衇列缺穴主治歌痔瘡肛腫泄痢纒吐紅溺血嗽咳痰牙疼喉腫小便澁心胸腹疼噎嚥難産後發强不能語腰痛血疾臍腹寒死胎不下上攻膈列缺一刺病乃痊註內痔肛腫泄痢赤白咳痰唾血溺血及牙齦咽喉腫痛小便赤澁艱難心胸腹痛噎嚥不快産後敗血上干心氣身發强直不能語言或瘀滯腰痛臍腹間寒子死腹中胎衣不下上攻膈塞並刺列缺其證必痊陰蹻照海穴主治歌喉閉淋澁與胸腫膀胱氣痛並腸鳴食黄酒積臍腹痛嘔瀉胃翻及乳癰便燥難産血昏迷積塊腸風下便紅膈中不快梅核氣格主照海鍼有靈註上焦火盛咽喉閉塞不通下焦熱結膀胱氣痛小便淋澁胸中腫痛或食積酒積內蓄傷脾發黃或臍腹痛或嘔瀉胃翻吐食乳癰大便燥結及婦人生産艱難瘀血塊痛昏迷膓風下血不已或膈中之氣怏怏不快如梅核氣格塞咽喉之間咯之不出嚥之不下等疾急刺照海穴則諸證自散手足十二經所屬歌五藏六府共包絡手足所屬三陰陽太陰足脾手肺藏陽明足胃手大腸少陰足腎手心藏太陽足膀手小腸厥陰足肝手包絡少陽足膽手焦當註五藏心肝脾肺腎六府膽胃大腸小腸膀胱三焦共包絡分屬手足三陰三陽爲十二經也如肺手太陰心手少陰心包絡手厥陰手之三陰也手太陽小腸手陽明大腸手少陽三焦手之三陽也足太陽膀胱足陽明胃足少陽膽足之三陽也足太陰脾足少陰腎足厥陰肝足之三陰也天干十二經表裏歌甲膽乙肝丙小腸丁心戊胃己脾鄕庚屬大腸辛屬肺壬屬膀胱癸腎藏三焦陽府須歸丙包絡從陰丁火旁陽干為表陰干裏藏府表裏配陰陽按舊云三焦亦向壬中寄包絡同歸入癸方夫三焦爲决瀆之官猶可言壬而包絡附於心主烏可云癸况二藏表裏皆相火也故改正之註甲丙戊庚壬陽干也乙丁巳辛癸陰干也陽干爲表爲府陰干爲裏爲藏故曰藏府表裏配陰陽也地支十二經流注歌每日寅時從肺起卯時流入大腸經辰胃已脾午心火未時應注小腸經申屬膀胱酉屬腎戍走包絡亥焦宫子膽丑肝寅又肺十二經衇週環行註人有十二經晝夜有十二時每一經主一時先從寅時入肺起卯入於大腸辰入於胃巳入於脾午入於心未入於小腸申入於膀胱酉入於腎戌入於包絡亥入於三焦子入於胆丑入於肝至於寅時則又從肺起此十二經與十二時相循環而行者也十二經相傳次序歌肺大胃脾心小腸膀腎包焦膽肝續手陰藏手陽手頭足陰足腹陽頭足註人身正衇十有二經每於平旦寅時營氣始於中焦上注於手太陰肺經自胸中而出於中府至於少商以次行於手陽明大腸等十二經終於足厥陰肝經而復始於太陰肺經也凡手之三陰從藏走手手之三陽從手走頭足之三陰從足走腹足之三陽從頭走足周流不息循環無端也十二經起止歌肺起中府止少商大腸商陽止迎香胃起承泣終厲兌脾起隠白大包鄕心起極泉少冲止小腸少澤止聽宫膀胱睛明止至陰腎起湧泉俞府終包絡天池中冲止三焦關冲止竹空膽童子髎止竅陰肝起大敦止期門十二經穴周流歌中府爲初注少商少商别絡注商陽商陽復向迎香走香接頭維至庫房維下降兮趨厲兌兌傳隱白至胸鄕隱白上升達大包大包仍續極泉塲泉貫少衝心部井少澤相連卽小腸澤㑹聽宫睛明分睛明下造至陰强至陰斜出湧泉底泉穴還歸腧府藏腧府天池橫絡截池出中衝心主張中衝並與關冲合關衝宛轉絲竹傍絲竹更貫瞳窌穴瞳􅐎下入竅陰方竅陰橫亘大敦井敦上期門肝衇當期門歴遍還中府經絡周流仔細詳十二經氣血多少歌多氣多血惟陽明少氣太陽厥陰同二少太陰常少血六經氣血要分明註手陽明大腸足陽明胃此二經多氣多血之經也三焦膽腎心脾肺此六經多氣少血也心包絡膀胱小腸肝此四經乃多血少氣也御纂醫宗金鑑卷七十九
