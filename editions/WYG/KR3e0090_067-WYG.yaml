body:
  text: 編輯外科心法要訣目録腹部幽癰中脘疽嚇癰衝疽臍癰附臍中出水少腹疽腹皮癰緩疽腋部腋癰腋疽黯疔肋部肋疽淵疽内發丹毒脇癰附疽内癰部肺癰大小腸癰胃癰脾癰肝癰心癰腎癰三焦癰内癰總論驗内癰法御纂醫宗金鑑卷六十七目録欽定四庫全書御纂醫宗金鑑卷六十七編輯外科心法要訣目録腹部幽癰中脘疽嚇癰衝疽臍癰附臍中出水少腹疽腹皮癰緩疽腋部腋癰腋疽黯疔肋部肋疽淵疽内發丹毒脇癰附疽内癰部肺癰大小腸癰胃癰脾癰肝癰心癰腎癰三焦癰内癰總論驗内癰法御纂醫宗金鑑卷六十七目録欽定四庫全書御纂醫宗金鑑卷六十七編輯外科心法要訣腹部幽癰幽癰臍上七寸生初小漸大腫硬疼憂思厚味火毒發咬牙寒戰毒陷攻註此證生臍上七寸初起如粟漸增漫腫疼痛形如鵞卵甚則堅硬痛牽胸肋由過食膏粱厚味憂思氣結腸胃不通火鬱成毒自内而外發也初起腫痛皮色未紅時若心煩嘔噦衇沉實者當疎火毒以絶其源宜内疎黃連湯服之焮腫痛甚邪氣實也宜服托裏散外用艾壯隔蒜片灸之衇見沉遲其膿未成用補中益氣湯托之衇見洪數其膿已成用托裏透膿湯膿熟脹痛不潰係氣血虚也急用十全大補湯温補之外兼用卧鍼開卧鍼者斜入斜出防傷内膜也或誤行汗下或誤敷寒凉以致腫而不潰潰而不斂者急用十全大補湯加乾薑附子以救之已潰朝寒暮熱者氣血虚也食少作瀉脾胃虚也胸痞痰涌脾肺虚也俱服六君子湯服後諸證悉退換十全大補湯調理即愈外治之法按癰疽腫瘍潰瘍門無論已潰未潰忽咬牙寒戰係氣虚不能勝毒毒陷攻裏之兆或潰後膿水忽多忽少瘡口如蟹吐沫者係内膜已透俱為逆證托裏散皂刺金銀花黃芩牡蠣煆當歸赤芍朴硝大黃花粉連翹各等分去心共研粗末每用五錢酒水各一鍾煎八分去渣服方歌托裏散醫諸瘡毒腫甚焮疼煎服消皂刺銀花芩牡蠣歸芍硝黃花粉翹内疎黃連湯見腫瘍門隔蒜灸法見首部灸法托裏透膿湯見頭部侵腦疽補中益氣湯十全大補湯六君子湯即香砂六君子湯減去藿香砂仁俱見潰瘍門中脘疽中脘疽由胃火生臍上四寸隱隱疼堅硬漫腫無紅熱不食嘔噦毒内攻註此證一名胃疽發於心胸之下臍上四寸任衇經中脘穴隱痛日久向外生疽堅硬漫腫皮色無紅無熱由過食炙煿以致胃腑火毒而成人迎衇盛是毒氣攻裏作嘔不食咳𠻳膿痰者逆初宜服仙方活命飲色紫堅硬宜服山甲内消散膿勢將成内外治法俱按癰疽腫瘍潰瘍門若起長膿遲或瘡不焮痛者急用艾壯隔獨頭蒜片置患上灸之囘陽山甲内消散穿山甲三大片炒當歸尾大黃甘草節各三錢土木鱉三個黑牽牛殭蠶各一錢炒酒水各一鍾煎八分空心服渣再煎服大便行三四次方食稀粥淡味調理方歌山甲内消火毒積色紫堅疼中脘疽歸尾大黃殭草節木鱉牽牛加酒宜仙方活命飲見腫瘍門嚇癰嚇癰七情鬱火成臍上三寸粟微紅暴腫焮痛二七潰頂陷色黑潰遲凶註此證由七情鬱火凝結而成生臍上三寸屬任衇經建里穴初如粟米癢痛相兼其腫迅速寒熱往來甚則嘔噦牽引臍痛初腫微紅頂尖根束漸透赤色時痛時止十四日潰膿者順若頂陷紫黑根脚漫腫面赤大渇衇見浮數而散大者逆内治與幽癰叅考外治法按癰疽腫瘍潰瘍門衝疽衝疽臍上二寸生心火毒熾入腎紅髙腫焮痛速潰吉若見七惡定然凶註此證生於任衇臍上二寸下脘穴一名中發疽又名壅腎瘡由心火熾盛流入腎經而成色赤髙腫應在二十一日潰破膿稠受補者順初宜瘡科流氣飲或仙方活命飲消之膿將成時内外治法俱按癰疽腫瘍潰瘍門其證若平塌紫黑膿水清稀七惡證見者逆瘡科流氣飲見背部痰注發仙方活命飲見腫瘍門臍癰附臍中出水臍癰毒發在臍中腫大如𤓰突若鈴無紅無熱宜蒜灸稠膿為吉汚水凶註此證由心經火毒流入大腸小腸所致生於臍中屬任衇經神關穴此穴禁鍼腫大如𤓰髙突若鈴無紅無熱最宜隔蒜灸之初宜服仙方活命飲加升麻消之便結實者内疎黃連湯通利之將欲成膿内外治法俱按癰疽腫瘍潰瘍門潰後得稠膿者順時出汚水臭穢者逆亦有臍中不痛不腫甚癢時津黃水此屬腸胃濕熱積久宜服黃連平胃散外用三妙散乾撒滲濕即愈當忌酒麫生冷果菜不致再發若水出不止者亦屬逆黃連平胃散黃連五錢陳皮厚朴各三錢薑炒甘草二錢生蒼术一兩炒共研細末每服三錢白滾水調服方歌黃連平胃散陳甘厚朴蒼术共細研專除濕熱兼消積能令臍水立時乾三妙散梹榔蒼术生黃蘗各等分生共研細末乾撒肚臍出水津淫成片止癢滲濕又治濕癬以蘇合油調搽甚效方歌三妙散用梹榔蒼黃蘗同研滲濕瘡蘇合油調治濕癬收乾止癢效稱强隔蒜灸法見首卷灸法仙方活命飲内疎黃連湯俱見腫瘍門少腹疽少腹疽生臍下邊證由七情火鬱纒髙腫紅疼牽背易漫硬陷腐水膿難註此證由七情火鬱而生每發於氣海丹田關元三穴氣海在臍下一寸五分丹田在臍下二寸關元在臍下三寸皆屬任衇經此三穴或一穴發腫即為少腹疽髙腫紅活疼痛牽背易潰稠膿者易治若漫腫堅硬綿潰腐爛膿稀如水者難治凡遇此證初起急用艾灸腫頂七壯至三七壯以痛癢通徹為度宜服仙方活命飲氣實之人大渇便秘者宜服内疎黃連湯通利之老弱之人宜服内補十宣散令其速潰若潰遲恐透内膜外治法同癰疽腫瘍潰瘍門仙方活命飲内疎黃連湯俱見腫瘍門内補十宣散見胸部􅗢癧癰腹皮癰腹皮癰生腹皮内皮裏膜外腫隱疼腹痛不止膿成候證由膏粱鬱火生註此證生於腹皮裏膜外無論左右隱疼日久後發癰腫於皮外右關衇見沉數而腹痛甚者是其候也由膏粱火鬱而成初起壯實者用䨇解貴金丸下之虚弱者減半用之不應再服半劑凡下之後腹痛不止膿將成也急用托裏透膿湯潰後與癰疽潰瘍門治法相同不可過用尅伐之劑若希圖消散過傷胃氣則腫不能潰潰不能斂立見危亡矣䨇解貴金丸見腫瘍門托裏透膿湯見頭部侵腦疽緩疽緩疽脾經氣積凝少腹旁生堅又疼數月不潰生寒熱食少削瘦效難成註此證由太隂脾經氣滯寒積而成生於少腹之旁堅硬如石不紅不熱痛引腰腿數月不潰若兼食少削瘦者終屬敗證不可棄而不治初宜服山甲内消散不應不可强消徒損胃氣以十全大補湯加烏藥附子胡盧巴温補之外用木香餅熨之兼用獨頭蒜搗爛鋪於患上艾壯灸之以知熱為止次日再灸以或消或潰為效若潰後即按癰疽潰瘍門治法山甲内消散見中脘疽十全大補湯見潰瘍門木香餅見乳部乳中結核腋部腋癰腋癰暴腫生腋間腫硬焮赤痛熱寒肝脾血熱兼忿怒初宜清解潰補痊註此證一名夾肢癰發於腋際即俗名肐肢窩也屬肝脾血熱兼忿怒而成初起暴腫焮硬色赤疼痛身發寒熱難消必欲作膿初宜服柴胡清肝湯外敷冲和膏疼痛日增宜服透膿散加金銀花甘草節桔梗膿脹痛者鍼之已潰内外治法俱按癰疽潰瘍門此證首尾忌用寒凉中年易愈老弱之人難痊柴胡清肝湯見頭部鬢疽冲和膏透膿散俱見腫瘍門腋疽腋疽初起若核形肝恚脾憂氣血凝漫腫堅硬宜蒜灸日久紅熱潰先疼註此證一名米疽又名疚疽發於肐肢窩正中初起之時其形如核由肝脾二經憂思恚怒氣結血滯而成漫腫堅硬皮色如常日久將潰色紅微熱疼痛也初宜艾壯隔蒜片灸法内服柴胡清肝湯加烏藥消之虚弱之人宜服香貝養榮湯外用烏龍膏敷之早治或有全消者遲則膿成宜服托裏透膿湯膿脹痛者鍼之膿出痛減隨患者虚實補之其餘内外治法俱按癰疽潰瘍門此證初終内外治法禁用寒凉中年易愈衰老難痊隔蒜灸法見首卷灸法柴胡清肝湯見頭部鬢疽香貝養榮湯見項部上石疽烏龍膏見腫瘍門托裏透膿湯見頭部侵腦疽黯疔黯疔藏於腋下生肝脾火毒癢而疼寒熱拘急色紫黑急按疔門治即寧註此證生於腋下由肝脾二經火毒而成堅硬勢若釘頭癢而且痛寒熱往來四肢拘急其色紫黑煩躁作嘔痛引半身宜服麥靈丹其次内外急按疔門治之即愈麥靈丹見腫瘍門肋部肋疽肋疽始發屬肝經火毒鬱怒結腫形紫痛梅李甚如盌急宜鍼砭免内攻註此證一名夾熒疽生於肋條骨間由肝經火毒鬱怒結聚而成初如梅李漸大如盌色紫焮痛連及肩肘患在左痛牽右肋患在右痛牽左肋二十一日之内膿潰稠黏者順届期不潰既潰出清水者逆初腫急宜磁鍼砭出紫血庶免毒氣攻裏砭後赤腫痛甚煩躁衇實作嘔為有餘之證宜服䨇觧貴金丸下之腫硬不潰宜服透膿散衇弱作嘔此胃虚也宜服香砂六君子湯補之亦有痛傷胃氣而作嘔者即同胃虚治之若感受寒邪及偶觸穢氣而作嘔者雖腫時尤宜壯胃助氣為主盖腫時作嘔因毒氣内侵者十有一二停飲内傷者十有八九惟醫人臨證詳辨之膿熟用卧鍼開之餘按癰疽潰瘍門治法䨇解貴金丸透膿散俱見腫瘍門香砂六君子湯見潰瘍門淵疽淵疽肝膽憂恚成生於肋下硬腫疼潰破有聲内膜透未潰當服䕶膜靈註此證因憂恚太過以致肝膽兩傷而成生於肋下初起堅硬腫而不紅日久方潰得稠白膿者順如豆漿水者險瘡口有聲似乎兒啼此屬内膜透也即於陽陵泉穴灸二七壯其聲即止穴在膝臏骨外臁下一寸陷中蹲坐取之即得内外治法皆同肋疽凡肋胷脅腰腹空輭之處發癰疽者當在將潰未潰之際多服䕶膜散可免透膜之患䕶膜散白蠟白及各等分共研細末輕劑一錢中劑二錢大劑三錢黄酒調服米湯亦可方歌䕶膜散内二味藥白蠟白及為細末或酒或以米湯調將膿預服不透膜内發丹毒丹毒肝脾熱極生肋上腰胯赤霞形急宜砭出紫黑血嘔噦昏脹毒内攻註此證由肝脾二經熱極生風所致生於肋骨延及腰胯色赤如霞逰走如雲痛如火燎急向赤腫週圍砭出紫黑血以瘦牛肉片貼之羊肉片亦可其毒即可減半初服䨇解貴金丸汗之次服化斑解毒湯投方應病者順若嘔噦昏憒胸腹䐜脹徧身青紫者則為毒氣内攻屬逆化斑解毒湯升麻石膏連翹去心牛蒡子炒研人中黃黃連知母黑參各一錢竹葉二十片水二鍾煎八分服方歌化斑解毒熱生風致發丹毒雲片紅升膏翹蒡中黃等黃連知母黑參同䨇解貴金丸見腫瘍門脇癰附疽脇癰焮紅髙腫疼疽堅塌漫冷不紅皆屬肝膽怒火結遲潰敗漿冷虚凶註此證生於輭肋有硬骨者為肋肋下輭肉處為季脇癰疽二證皆由肝膽怒火凝結而成多生於體虚之人初如梅李漸長如盌如盆色紅焮痛髙腫二七潰破膿稠為癰若堅硬平塌漫腫木痛不紅不熱月餘潰破稀膿為疽若失治屆期不潰攻擊成膿腫如鼓脹破出敗漿腥臭膿者逆癰疽二證初腫時俱宜急服柴胡清肝湯解鬱瀉火如已成者服托裏透膿湯膿熟脹痛俱用卧鍼開之已潰以排餘膿補氣血為要餘按癰疽潰瘍門治法投補不應者難治柴胡清肝湯見頭部鬢疽托裏透膿湯見頭部侵腦疽内癰部肺癰肺癰肺熱復傷風肺藏生癰隱痛胸狀若傷寒燥欬甚稠濁痰涎腥臭膿未潰射干麻黃汗壅不得卧葶藶攻潰後膿稠能食吉膿清兼血不食凶註此證係肺藏蓄熱復傷風邪鬱久成癰以致胸内中府穴隱隱疼痛振寒衇數狀類傷寒咽燥不渴欬而喘滿唾稠黏黃痰兼臭穢膿血也治之者於未潰時乗膿未成風鬱於表者法宜疎散用射干麻黃湯以汗之如氣壅喘滿身不得卧者急服葶藶大棗湯以瀉之如欬有微熱煩滿胸中甲錯膿欲成者宜千金葦莖湯以吐之若吐膿腥臭形如米粥者宜桔梗湯以排餘膿若吐膿腥臭欬而胸滿者宜外臺桔梗白散以開瘀塞若咯吐膿血兼午後身熱煩躁宜金鯉湯主之兼飲童便若潰後胸隔脇肋隱痛不止口燥咽乾煩悶多渇自汗盜汗眠卧不得欬吐稠痰腥臭此係癰膿不盡而兼裏虚宜寧肺桔梗湯主之若癰膿已潰喘滿腥臭濁痰俱退惟欬𠻳咽乾咯吐痰血脇肋微痛不能久卧者此屬肺癰潰處未斂宜紫苑茸湯清補之渇甚去半夏加石膏服之若癰膿潰後欬𠻳無休膿痰不盡形氣虚羸者宜清金寧肺丸主之凡治此證惟以身温衇細膿血交粘痰色鮮明飲食甘美膿血漸止便潤者為吉若手掌皮粗潰後六衇洪數氣急顴紅汚膿白血懶食及大便結燥者為凶中府穴又名肺募在乳上第三根肋骨間射干麻黃湯射干十三枚或三兩麻黃生薑各四兩細辛紫苑欵冬花各三兩大棗七枚五味子半夏各半升洗水煎温服方歌射干麻黃欬上氣肺癰喉中水雞聲射麻生薑辛苑夏五味大棗並欵冬葶藶大棗湯苦葶藶輕者五錢重者一兩大棗輕者五枚重者十枚去核以水三鍾煎至一鍾服之方歌葶藶大棗治肺壅欬不得臥有癰膿葶藶苦寒瀉實熱佐棗之甘和胃經千金葦莖湯葦莖二升薏苡仁炒𤓰瓣各半升即冬𤓰仁桃仁五十粒炒研去皮尖水煎服方歌千金葦莖肺癰欬微熱煩滿吐敗濁皮膚甲錯宜葦莖薏苡桃仁𤓰瓣合桔梗湯苦桔梗一兩甘草二兩生水煎服方歌桔梗湯用排餘膿肺癰吐膿米粥形清熱解毒須甘草開提肺氣桔梗功外臺桔梗白散苦桔梗貝母各三分巴豆一分熬研如脂去皮右三味為散强人飲服半錢七羸者減之病在膈上者吐膿在膈下者瀉出若下多不止飲冷水一盃則定方歌外臺桔梗白散方肺癰便秘服之良桔梗貝母與巴豆藥微力大功速强金鯉湯金色活鯉魚一尾約四兩重貝母二錢先將鯉魚連鱗剖去肚腸勿經水氣用貝母細末摻在魚肚内線紥之用上白童子便半大盌將魚浸童便内重湯炖煑魚眼突出為度少頃取出去鱗骨取淨肉浸入童便内炖熱肉與童便作二三次一日食盡一枚其功效甚㨗方歌金鯉湯中效罕稀法同貝母活鯉魚童便浸魚重湯炖肺癰煩熱善能醫寧肺桔梗湯苦桔梗貝母去心當歸栝蔞仁研生黃耆枳殻麩炒甘草節桑白皮炒防已百合去心薏苡各八分炒五味子地骨皮知母生杏仁炒研苦葶藶各五分水二鍾薑三片煎八分不拘時服欬甚倍加百合身熱加柴胡黃芩大便不利加蜜炙大黃一錢小水澁滯加燈心木通煩躁痰血加白茅根胸痛加人參白芷方歌寧肺桔梗肺癰耆歸蔞貝殻甘桑皮防已百合葶五味杏知苡仁地骨宜紫苑茸湯紫苑茸犀角末甘草炙人參各五分桑葉用經霜者欵冬花百合去心杏仁炒研阿膠便潤炒用便燥生用貝母去心半夏製蒲黃各七分生引薑三片水二鍾煎八分將犀角末調入食後服方歌紫苑茸湯參犀角欵冬桑葉杏百合阿膠甘夏貝蒲黃專醫肺癰不久卧清金寧肺丸陳皮白茯苓苦桔梗貝母去心人參黃芩各五錢麥冬去心地骨皮銀柴胡川芎白芍炒胡黃連各六錢五味子天冬去心生地酒浸搗膏熟地搗膏歸身白术各一兩炒甘草三錢炙右為細末煉蜜為丸如梧桐子大每服七十丸食逺白滾湯送下方歌清金寧肺丸肺癰陳苓桔貝參二冬柴芩歸芍黃連草术味生熟地骨芎大小腸癰大小腸癰因濕熱氣滯瘀血注腸中初服大黃行瘀滯膿成薏苡牡丹平註此二證俱由濕熱氣滯凝結而成或努力瘀血或産後敗瘀蓄積流注於大腸小腸之中初起發熱惡風自汗身皮甲錯闗元天樞二穴隱痛微腫按之腹内急痛大腸癰多大便墜腫小腸癰多小水澁滯衇俱遲𦂳此時癰膿未成宜大黃湯下之瘀血利盡若小水閉澁仍宜大黃湯加琥珀末木通利之自效若癰成日久不潰身皮甲錯内無積聚腹急腹痛身無熱而脈數者係腸内隂冷不能為膿宜薏苡附子散主之若衇見洪數肚臍髙突腹痛脹滿不食動轉側身則有水聲便淋刺痛者癰膿已成宜薏苡湯主之腹濡而痛少腹急脹時時下膿者毒未解也宜丹皮湯治之如膿從臍出腹脹不除飲食減少面白神勞此屬氣血俱虚宜八珍湯加牡丹皮肉桂黃耆五味子斂而補之患者轉身動作宜徐緩而勿驚愼之如躭延日久因循失治以致毒攻内藏腹痛牽隂腸胃受傷或致隂器紫黑腐爛色敗無膿每流汚水衾幃多臭煩躁不止身熱嗌乾俱屬逆證闗元穴又名小腸募在臍下三寸天樞穴又名大腸募在臍旁開二寸大黃湯大黃剉炒牡丹皮硝石研芥子桃仁炒先以湯浸去皮尖䨇仁勿用右各等分共剉碎每用五錢水二鍾煎至一鍾去渣空心温服以利下膿血為度未利再服方歌大黃湯善治腸癰少腹堅痛膿未成牡丹皮與大黃炒芥子桃仁消石靈薏苡附子散附子二分炮敗醬五分薏苡仁一錢炒右為末每服方寸匕以水二合煎頓服小水當下三因云薏苡附子同前敗醬用一兩一分每四錢水盞半煎七分去渣空心服方歌薏苡附子散甲錯腸癰腹脹痛衇數附子敗醬薏苡仁為末水煎空心服薏苡湯薏苡仁栝蔞仁各三錢牡丹皮桃仁各二錢泥水二鍾煎至一鍾不拘時服方歌薏苡湯治腹水聲腸癰便淋刺痛疼牡丹皮共栝蔞子還有桃仁薏苡仁丹皮湯丹皮栝蔞仁各一錢桃仁泥朴硝各二錢大黃五錢水二鍾煎一鍾去渣入消再煎數滾不拘時服方歌丹皮湯療腸癰證腹濡而痛時下膿硝黃丹蔞桃仁共水煎服之有竒功八珍湯見潰瘍門胃癰胃癰中脘穴腫疼不欬不𠻳吐血膿飲食之毒七情火候治腸癰大法同註此證初起中脘穴必隱痛微腫寒熱如瘧身皮甲錯並無咳𠻳咯吐膿血由飲食之毒七情之火熱聚胃口成癰衇来沉數者初服清胃射干湯下之若衇濇滯者瘀血也宜服丹皮湯下之衇洪數者膿成也赤豆薏苡仁湯排之體倦氣喘作渇小水頻數者肺氣虚也補中益氣湯加麥冬五味子補之其候證生死治法與大小腸癰同中脘穴又名胃募在臍上四寸清胃射干湯射干升麻犀角麥冬去心元參大黃黃芩各一錢芒硝梔子竹葉各五錢水煎服方歌清胃射干湯射干升麻犀角麥冬全參芩大黃芒硝等竹葉山梔胃癰痊赤豆薏苡仁湯赤小豆薏苡仁防已甘草各等分水二鍾煎八分食逺服方歌赤豆薏苡湯最神甘已赤豆薏苡仁胃癰膿成衇洪數二鍾水煎服八分丹皮湯見大小腸癰補中益氣湯見潰瘍門脾癰脾癰濕熱瘀血凝章門穴腫兼隱疼腹脹嗌乾小水短利下濕瘀補收功註此證始發章門穴必隱疼微腫由過食生冷兼濕熱或瘀血鬱滯脾經而成令人腹脹咽嗌乾燥小水短澁初宜大黃湯赤豆薏苡仁湯二方合而用之以攻滯鬱二便通利腹脹全消宜六君子湯扶脾調理順逆看法與胃癰同章門穴又名脾募在臍旁開六寸髙上二寸大黃湯見大小腸癰赤豆薏苡仁湯見胃癰六君子湯即香砂六君子湯去藿香砂仁見潰瘍門肝癰肝癰憤鬱氣逆成期門穴腫更兼疼卧驚胠滿溺不利清肝滋腎即成功註此證始發期門穴必隱痛微腫令人兩胠脹滿脇痛側卧則驚便溺艱難由憤鬱氣逆而成初服復元通氣散次服柴胡清肝湯痛脹已止宜服六味地黃丸脾虚食少則佐以八珍湯滋腎補脾治之取效禁用温補鍼灸期門穴又名肝募在乳旁一寸半再直上一寸半復元通氣散見腫瘍門柴胡清肝湯見頭部鬢疽六味地黃丸見面部雀斑八珍湯見潰瘍門心癰心癰巨闕腫隱疼酷飲嗜熱火毒成面赤口渇身作痛治法陽熱總宜清註此證始發巨闕穴必隱痛微腫令人寒熱身痛頭面色赤口渇隨飲隨乾由心火熾盛更兼酷飲嗜熱而成宜服凉血飲酒毒為病者宜服升麻葛根湯治之此證甚屬罕有但治法不可不備巨闕穴又名心募在臍上六寸五分凉血飲木通瞿麥荆芥薄荷白芷花粉甘草赤芍麥冬去心生地山梔子車前子連翹各等分去心引用燈心若潮熱加淡竹葉水煎温服方歌凉血飲善治心癰瞿荆荷芷草翹通赤芍山梔乾生地車前花粉麥門冬升麻葛根湯山梔升麻葛根白芍柴胡黃芩各一錢黃連木通甘草各五分水二鍾煎八分不拘時服方歌升麻葛根湯山梔酒毒心癰黃連宜柴芍通芩升葛草水煎温服不拘時腎癰腎癰腎經不足生京門微腫隱隱疼少腹肋下䐜脹滿房勞形寒邪外乘註此證始發京門穴必隱痛微腫令人寒熱往来面白不渇少腹及肋下䐜脹塞滿由腎虚不足之人房勞太過身形受寒邪氣自外乘之初服五積散加細辛寒盡痛止宜用桂附地黃丸調理京門穴又名腎募在身側腰中監骨下肋間五積散蒼术二錢炒陳皮桔梗川芎當歸白芍各一錢麻黃枳殻麩炒桂心乾薑厚朴各八分白芷半夏製甘草生茯苓各四分引薑一片水二鍾煎八分不拘時服頭痛惡寒者加連鬚葱頭三個蓋卧汗出甚效方歌五積散蒼殻陳苓麻黃半桔歸芍芎芷朴桂心乾薑草腎癰寒邪服成功桂附地黃湯見潰瘍門三焦癰三焦癰由濕熱凝石門穴上腫隱疼寒結治同腸癰法内癰俱係膜内生註此證始發石門穴必隱疼微腫令人寒熱往来二便秘澀由濕熱遇寒凝結而成治法與大小腸癰同凡内癰俱係膜内成患外皮不腐石門穴又名三焦募在臍下二寸内癰總論凡人胸腹有十一募募者各藏府隂會之所也靈樞云發内癰内疽者其本經募上肉必浮腫募中必時時隱痛浮腫為癰隱痛為疽此即内癰内疽之驗也茲内癰有治法内疽無治法何也蓋内癰内疽其病原無殊惟在根淺根深之别耳根淺為癰根深為疽若臨證用藥攻補得宜無不收效至募有十一而内癰僅九證者何也蓋膽府形如膜皮無出無納汁清氣潔不生内癰内疽若夫膀胱亦如膜皮中惟濁水故古今書籍並無講及内癰内疽者是以未敢詳載雖然中極穴即膀胱募也今人間有中極穴或浮腫或隱痛者所見證候竟同小腸癰治法亦當按小腸癰治之可也俟後之學者留意焉驗内癰法凡遇生内癰之人與生黃豆五粒嚼之口中無豆味者是其候也御纂醫宗金鑑卷六十七欽定四庫全書御纂醫宗金鑑卷六十七編輯外科心法要訣腹部幽癰幽癰臍上七寸生初小漸大腫硬疼憂思厚味火毒發咬牙寒戰毒陷攻註此證生臍上七寸初起如粟漸增漫腫疼痛形如鵞卵甚則堅硬痛牽胸肋由過食膏粱厚味憂思氣結腸胃不通火鬱成毒自内而外發也初起腫痛皮色未紅時若心煩嘔噦衇沉實者當疎火毒以絶其源宜内疎黃連湯服之焮腫痛甚邪氣實也宜服托裏散外用艾壯隔蒜片灸之衇見沉遲其膿未成用補中益氣湯托之衇見洪數其膿已成用托裏透膿湯膿熟脹痛不潰係氣血虚也急用十全大補湯温補之外兼用卧鍼開卧鍼者斜入斜出防傷内膜也或誤行汗下或誤敷寒凉以致腫而不潰潰而不斂者急用十全大補湯加乾薑附子以救之已潰朝寒暮熱者氣血虚也食少作瀉脾胃虚也胸痞痰涌脾肺虚也俱服六君子湯服後諸證悉退換十全大補湯調理即愈外治之法按癰疽腫瘍潰瘍門無論已潰未潰忽咬牙寒戰係氣虚不能勝毒毒陷攻裏之兆或潰後膿水忽多忽少瘡口如蟹吐沫者係内膜已透俱為逆證托裏散皂刺金銀花黃芩牡蠣煆當歸赤芍朴硝大黃花粉連翹各等分去心共研粗末每用五錢酒水各一鍾煎八分去渣服方歌托裏散醫諸瘡毒腫甚焮疼煎服消皂刺銀花芩牡蠣歸芍硝黃花粉翹内疎黃連湯見腫瘍門隔蒜灸法見首部灸法托裏透膿湯見頭部侵腦疽補中益氣湯十全大補湯六君子湯即香砂六君子湯減去藿香砂仁俱見潰瘍門中脘疽中脘疽由胃火生臍上四寸隱隱疼堅硬漫腫無紅熱不食嘔噦毒内攻註此證一名胃疽發於心胸之下臍上四寸任衇經中脘穴隱痛日久向外生疽堅硬漫腫皮色無紅無熱由過食炙煿以致胃腑火毒而成人迎衇盛是毒氣攻裏作嘔不食咳𠻳膿痰者逆初宜服仙方活命飲色紫堅硬宜服山甲内消散膿勢將成内外治法俱按癰疽腫瘍潰瘍門若起長膿遲或瘡不焮痛者急用艾壯隔獨頭蒜片置患上灸之囘陽山甲内消散穿山甲三大片炒當歸尾大黃甘草節各三錢土木鱉三個黑牽牛殭蠶各一錢炒酒水各一鍾煎八分空心服渣再煎服大便行三四次方食稀粥淡味調理方歌山甲内消火毒積色紫堅疼中脘疽歸尾大黃殭草節木鱉牽牛加酒宜仙方活命飲見腫瘍門嚇癰嚇癰七情鬱火成臍上三寸粟微紅暴腫焮痛二七潰頂陷色黑潰遲凶註此證由七情鬱火凝結而成生臍上三寸屬任衇經建里穴初如粟米癢痛相兼其腫迅速寒熱往來甚則嘔噦牽引臍痛初腫微紅頂尖根束漸透赤色時痛時止十四日潰膿者順若頂陷紫黑根脚漫腫面赤大渇衇見浮數而散大者逆内治與幽癰叅考外治法按癰疽腫瘍潰瘍門衝疽衝疽臍上二寸生心火毒熾入腎紅髙腫焮痛速潰吉若見七惡定然凶註此證生於任衇臍上二寸下脘穴一名中發疽又名壅腎瘡由心火熾盛流入腎經而成色赤髙腫應在二十一日潰破膿稠受補者順初宜瘡科流氣飲或仙方活命飲消之膿將成時内外治法俱按癰疽腫瘍潰瘍門其證若平塌紫黑膿水清稀七惡證見者逆瘡科流氣飲見背部痰注發仙方活命飲見腫瘍門臍癰附臍中出水臍癰毒發在臍中腫大如𤓰突若鈴無紅無熱宜蒜灸稠膿為吉汚水凶註此證由心經火毒流入大腸小腸所致生於臍中屬任衇經神關穴此穴禁鍼腫大如𤓰髙突若鈴無紅無熱最宜隔蒜灸之初宜服仙方活命飲加升麻消之便結實者内疎黃連湯通利之將欲成膿内外治法俱按癰疽腫瘍潰瘍門潰後得稠膿者順時出汚水臭穢者逆亦有臍中不痛不腫甚癢時津黃水此屬腸胃濕熱積久宜服黃連平胃散外用三妙散乾撒滲濕即愈當忌酒麫生冷果菜不致再發若水出不止者亦屬逆黃連平胃散黃連五錢陳皮厚朴各三錢薑炒甘草二錢生蒼术一兩炒共研細末每服三錢白滾水調服方歌黃連平胃散陳甘厚朴蒼术共細研專除濕熱兼消積能令臍水立時乾三妙散梹榔蒼术生黃蘗各等分生共研細末乾撒肚臍出水津淫成片止癢滲濕又治濕癬以蘇合油調搽甚效方歌三妙散用梹榔蒼黃蘗同研滲濕瘡蘇合油調治濕癬收乾止癢效稱强隔蒜灸法見首卷灸法仙方活命飲内疎黃連湯俱見腫瘍門少腹疽少腹疽生臍下邊證由七情火鬱纒髙腫紅疼牽背易漫硬陷腐水膿難註此證由七情火鬱而生每發於氣海丹田關元三穴氣海在臍下一寸五分丹田在臍下二寸關元在臍下三寸皆屬任衇經此三穴或一穴發腫即為少腹疽髙腫紅活疼痛牽背易潰稠膿者易治若漫腫堅硬綿潰腐爛膿稀如水者難治凡遇此證初起急用艾灸腫頂七壯至三七壯以痛癢通徹為度宜服仙方活命飲氣實之人大渇便秘者宜服内疎黃連湯通利之老弱之人宜服内補十宣散令其速潰若潰遲恐透内膜外治法同癰疽腫瘍潰瘍門仙方活命飲内疎黃連湯俱見腫瘍門内補十宣散見胸部􅗢癧癰腹皮癰腹皮癰生腹皮内皮裏膜外腫隱疼腹痛不止膿成候證由膏粱鬱火生註此證生於腹皮裏膜外無論左右隱疼日久後發癰腫於皮外右關衇見沉數而腹痛甚者是其候也由膏粱火鬱而成初起壯實者用䨇解貴金丸下之虚弱者減半用之不應再服半劑凡下之後腹痛不止膿將成也急用托裏透膿湯潰後與癰疽潰瘍門治法相同不可過用尅伐之劑若希圖消散過傷胃氣則腫不能潰潰不能斂立見危亡矣䨇解貴金丸見腫瘍門托裏透膿湯見頭部侵腦疽緩疽緩疽脾經氣積凝少腹旁生堅又疼數月不潰生寒熱食少削瘦效難成註此證由太隂脾經氣滯寒積而成生於少腹之旁堅硬如石不紅不熱痛引腰腿數月不潰若兼食少削瘦者終屬敗證不可棄而不治初宜服山甲内消散不應不可强消徒損胃氣以十全大補湯加烏藥附子胡盧巴温補之外用木香餅熨之兼用獨頭蒜搗爛鋪於患上艾壯灸之以知熱為止次日再灸以或消或潰為效若潰後即按癰疽潰瘍門治法山甲内消散見中脘疽十全大補湯見潰瘍門木香餅見乳部乳中結核腋部腋癰腋癰暴腫生腋間腫硬焮赤痛熱寒肝脾血熱兼忿怒初宜清解潰補痊註此證一名夾肢癰發於腋際即俗名肐肢窩也屬肝脾血熱兼忿怒而成初起暴腫焮硬色赤疼痛身發寒熱難消必欲作膿初宜服柴胡清肝湯外敷冲和膏疼痛日增宜服透膿散加金銀花甘草節桔梗膿脹痛者鍼之已潰内外治法俱按癰疽潰瘍門此證首尾忌用寒凉中年易愈老弱之人難痊柴胡清肝湯見頭部鬢疽冲和膏透膿散俱見腫瘍門腋疽腋疽初起若核形肝恚脾憂氣血凝漫腫堅硬宜蒜灸日久紅熱潰先疼註此證一名米疽又名疚疽發於肐肢窩正中初起之時其形如核由肝脾二經憂思恚怒氣結血滯而成漫腫堅硬皮色如常日久將潰色紅微熱疼痛也初宜艾壯隔蒜片灸法内服柴胡清肝湯加烏藥消之虚弱之人宜服香貝養榮湯外用烏龍膏敷之早治或有全消者遲則膿成宜服托裏透膿湯膿脹痛者鍼之膿出痛減隨患者虚實補之其餘内外治法俱按癰疽潰瘍門此證初終内外治法禁用寒凉中年易愈衰老難痊隔蒜灸法見首卷灸法柴胡清肝湯見頭部鬢疽香貝養榮湯見項部上石疽烏龍膏見腫瘍門托裏透膿湯見頭部侵腦疽黯疔黯疔藏於腋下生肝脾火毒癢而疼寒熱拘急色紫黑急按疔門治即寧註此證生於腋下由肝脾二經火毒而成堅硬勢若釘頭癢而且痛寒熱往來四肢拘急其色紫黑煩躁作嘔痛引半身宜服麥靈丹其次内外急按疔門治之即愈麥靈丹見腫瘍門肋部肋疽肋疽始發屬肝經火毒鬱怒結腫形紫痛梅李甚如盌急宜鍼砭免内攻註此證一名夾熒疽生於肋條骨間由肝經火毒鬱怒結聚而成初如梅李漸大如盌色紫焮痛連及肩肘患在左痛牽右肋患在右痛牽左肋二十一日之内膿潰稠黏者順届期不潰既潰出清水者逆初腫急宜磁鍼砭出紫血庶免毒氣攻裏砭後赤腫痛甚煩躁衇實作嘔為有餘之證宜服䨇觧貴金丸下之腫硬不潰宜服透膿散衇弱作嘔此胃虚也宜服香砂六君子湯補之亦有痛傷胃氣而作嘔者即同胃虚治之若感受寒邪及偶觸穢氣而作嘔者雖腫時尤宜壯胃助氣為主盖腫時作嘔因毒氣内侵者十有一二停飲内傷者十有八九惟醫人臨證詳辨之膿熟用卧鍼開之餘按癰疽潰瘍門治法䨇解貴金丸透膿散俱見腫瘍門香砂六君子湯見潰瘍門淵疽淵疽肝膽憂恚成生於肋下硬腫疼潰破有聲内膜透未潰當服䕶膜靈註此證因憂恚太過以致肝膽兩傷而成生於肋下初起堅硬腫而不紅日久方潰得稠白膿者順如豆漿水者險瘡口有聲似乎兒啼此屬内膜透也即於陽陵泉穴灸二七壯其聲即止穴在膝臏骨外臁下一寸陷中蹲坐取之即得内外治法皆同肋疽凡肋胷脅腰腹空輭之處發癰疽者當在將潰未潰之際多服䕶膜散可免透膜之患䕶膜散白蠟白及各等分共研細末輕劑一錢中劑二錢大劑三錢黄酒調服米湯亦可方歌䕶膜散内二味藥白蠟白及為細末或酒或以米湯調將膿預服不透膜内發丹毒丹毒肝脾熱極生肋上腰胯赤霞形急宜砭出紫黑血嘔噦昏脹毒内攻註此證由肝脾二經熱極生風所致生於肋骨延及腰胯色赤如霞逰走如雲痛如火燎急向赤腫週圍砭出紫黑血以瘦牛肉片貼之羊肉片亦可其毒即可減半初服䨇解貴金丸汗之次服化斑解毒湯投方應病者順若嘔噦昏憒胸腹䐜脹徧身青紫者則為毒氣内攻屬逆化斑解毒湯升麻石膏連翹去心牛蒡子炒研人中黃黃連知母黑參各一錢竹葉二十片水二鍾煎八分服方歌化斑解毒熱生風致發丹毒雲片紅升膏翹蒡中黃等黃連知母黑參同䨇解貴金丸見腫瘍門脇癰附疽脇癰焮紅髙腫疼疽堅塌漫冷不紅皆屬肝膽怒火結遲潰敗漿冷虚凶註此證生於輭肋有硬骨者為肋肋下輭肉處為季脇癰疽二證皆由肝膽怒火凝結而成多生於體虚之人初如梅李漸長如盌如盆色紅焮痛髙腫二七潰破膿稠為癰若堅硬平塌漫腫木痛不紅不熱月餘潰破稀膿為疽若失治屆期不潰攻擊成膿腫如鼓脹破出敗漿腥臭膿者逆癰疽二證初腫時俱宜急服柴胡清肝湯解鬱瀉火如已成者服托裏透膿湯膿熟脹痛俱用卧鍼開之已潰以排餘膿補氣血為要餘按癰疽潰瘍門治法投補不應者難治柴胡清肝湯見頭部鬢疽托裏透膿湯見頭部侵腦疽内癰部肺癰肺癰肺熱復傷風肺藏生癰隱痛胸狀若傷寒燥欬甚稠濁痰涎腥臭膿未潰射干麻黃汗壅不得卧葶藶攻潰後膿稠能食吉膿清兼血不食凶註此證係肺藏蓄熱復傷風邪鬱久成癰以致胸内中府穴隱隱疼痛振寒衇數狀類傷寒咽燥不渴欬而喘滿唾稠黏黃痰兼臭穢膿血也治之者於未潰時乗膿未成風鬱於表者法宜疎散用射干麻黃湯以汗之如氣壅喘滿身不得卧者急服葶藶大棗湯以瀉之如欬有微熱煩滿胸中甲錯膿欲成者宜千金葦莖湯以吐之若吐膿腥臭形如米粥者宜桔梗湯以排餘膿若吐膿腥臭欬而胸滿者宜外臺桔梗白散以開瘀塞若咯吐膿血兼午後身熱煩躁宜金鯉湯主之兼飲童便若潰後胸隔脇肋隱痛不止口燥咽乾煩悶多渇自汗盜汗眠卧不得欬吐稠痰腥臭此係癰膿不盡而兼裏虚宜寧肺桔梗湯主之若癰膿已潰喘滿腥臭濁痰俱退惟欬𠻳咽乾咯吐痰血脇肋微痛不能久卧者此屬肺癰潰處未斂宜紫苑茸湯清補之渇甚去半夏加石膏服之若癰膿潰後欬𠻳無休膿痰不盡形氣虚羸者宜清金寧肺丸主之凡治此證惟以身温衇細膿血交粘痰色鮮明飲食甘美膿血漸止便潤者為吉若手掌皮粗潰後六衇洪數氣急顴紅汚膿白血懶食及大便結燥者為凶中府穴又名肺募在乳上第三根肋骨間射干麻黃湯射干十三枚或三兩麻黃生薑各四兩細辛紫苑欵冬花各三兩大棗七枚五味子半夏各半升洗水煎温服方歌射干麻黃欬上氣肺癰喉中水雞聲射麻生薑辛苑夏五味大棗並欵冬葶藶大棗湯苦葶藶輕者五錢重者一兩大棗輕者五枚重者十枚去核以水三鍾煎至一鍾服之方歌葶藶大棗治肺壅欬不得臥有癰膿葶藶苦寒瀉實熱佐棗之甘和胃經千金葦莖湯葦莖二升薏苡仁炒𤓰瓣各半升即冬𤓰仁桃仁五十粒炒研去皮尖水煎服方歌千金葦莖肺癰欬微熱煩滿吐敗濁皮膚甲錯宜葦莖薏苡桃仁𤓰瓣合桔梗湯苦桔梗一兩甘草二兩生水煎服方歌桔梗湯用排餘膿肺癰吐膿米粥形清熱解毒須甘草開提肺氣桔梗功外臺桔梗白散苦桔梗貝母各三分巴豆一分熬研如脂去皮右三味為散强人飲服半錢七羸者減之病在膈上者吐膿在膈下者瀉出若下多不止飲冷水一盃則定方歌外臺桔梗白散方肺癰便秘服之良桔梗貝母與巴豆藥微力大功速强金鯉湯金色活鯉魚一尾約四兩重貝母二錢先將鯉魚連鱗剖去肚腸勿經水氣用貝母細末摻在魚肚内線紥之用上白童子便半大盌將魚浸童便内重湯炖煑魚眼突出為度少頃取出去鱗骨取淨肉浸入童便内炖熱肉與童便作二三次一日食盡一枚其功效甚㨗方歌金鯉湯中效罕稀法同貝母活鯉魚童便浸魚重湯炖肺癰煩熱善能醫寧肺桔梗湯苦桔梗貝母去心當歸栝蔞仁研生黃耆枳殻麩炒甘草節桑白皮炒防已百合去心薏苡各八分炒五味子地骨皮知母生杏仁炒研苦葶藶各五分水二鍾薑三片煎八分不拘時服欬甚倍加百合身熱加柴胡黃芩大便不利加蜜炙大黃一錢小水澁滯加燈心木通煩躁痰血加白茅根胸痛加人參白芷方歌寧肺桔梗肺癰耆歸蔞貝殻甘桑皮防已百合葶五味杏知苡仁地骨宜紫苑茸湯紫苑茸犀角末甘草炙人參各五分桑葉用經霜者欵冬花百合去心杏仁炒研阿膠便潤炒用便燥生用貝母去心半夏製蒲黃各七分生引薑三片水二鍾煎八分將犀角末調入食後服方歌紫苑茸湯參犀角欵冬桑葉杏百合阿膠甘夏貝蒲黃專醫肺癰不久卧清金寧肺丸陳皮白茯苓苦桔梗貝母去心人參黃芩各五錢麥冬去心地骨皮銀柴胡川芎白芍炒胡黃連各六錢五味子天冬去心生地酒浸搗膏熟地搗膏歸身白术各一兩炒甘草三錢炙右為細末煉蜜為丸如梧桐子大每服七十丸食逺白滾湯送下方歌清金寧肺丸肺癰陳苓桔貝參二冬柴芩歸芍黃連草术味生熟地骨芎大小腸癰大小腸癰因濕熱氣滯瘀血注腸中初服大黃行瘀滯膿成薏苡牡丹平註此二證俱由濕熱氣滯凝結而成或努力瘀血或産後敗瘀蓄積流注於大腸小腸之中初起發熱惡風自汗身皮甲錯闗元天樞二穴隱痛微腫按之腹内急痛大腸癰多大便墜腫小腸癰多小水澁滯衇俱遲𦂳此時癰膿未成宜大黃湯下之瘀血利盡若小水閉澁仍宜大黃湯加琥珀末木通利之自效若癰成日久不潰身皮甲錯内無積聚腹急腹痛身無熱而脈數者係腸内隂冷不能為膿宜薏苡附子散主之若衇見洪數肚臍髙突腹痛脹滿不食動轉側身則有水聲便淋刺痛者癰膿已成宜薏苡湯主之腹濡而痛少腹急脹時時下膿者毒未解也宜丹皮湯治之如膿從臍出腹脹不除飲食減少面白神勞此屬氣血俱虚宜八珍湯加牡丹皮肉桂黃耆五味子斂而補之患者轉身動作宜徐緩而勿驚愼之如躭延日久因循失治以致毒攻内藏腹痛牽隂腸胃受傷或致隂器紫黑腐爛色敗無膿每流汚水衾幃多臭煩躁不止身熱嗌乾俱屬逆證闗元穴又名小腸募在臍下三寸天樞穴又名大腸募在臍旁開二寸大黃湯大黃剉炒牡丹皮硝石研芥子桃仁炒先以湯浸去皮尖䨇仁勿用右各等分共剉碎每用五錢水二鍾煎至一鍾去渣空心温服以利下膿血為度未利再服方歌大黃湯善治腸癰少腹堅痛膿未成牡丹皮與大黃炒芥子桃仁消石靈薏苡附子散附子二分炮敗醬五分薏苡仁一錢炒右為末每服方寸匕以水二合煎頓服小水當下三因云薏苡附子同前敗醬用一兩一分每四錢水盞半煎七分去渣空心服方歌薏苡附子散甲錯腸癰腹脹痛衇數附子敗醬薏苡仁為末水煎空心服薏苡湯薏苡仁栝蔞仁各三錢牡丹皮桃仁各二錢泥水二鍾煎至一鍾不拘時服方歌薏苡湯治腹水聲腸癰便淋刺痛疼牡丹皮共栝蔞子還有桃仁薏苡仁丹皮湯丹皮栝蔞仁各一錢桃仁泥朴硝各二錢大黃五錢水二鍾煎一鍾去渣入消再煎數滾不拘時服方歌丹皮湯療腸癰證腹濡而痛時下膿硝黃丹蔞桃仁共水煎服之有竒功八珍湯見潰瘍門胃癰胃癰中脘穴腫疼不欬不𠻳吐血膿飲食之毒七情火候治腸癰大法同註此證初起中脘穴必隱痛微腫寒熱如瘧身皮甲錯並無咳𠻳咯吐膿血由飲食之毒七情之火熱聚胃口成癰衇来沉數者初服清胃射干湯下之若衇濇滯者瘀血也宜服丹皮湯下之衇洪數者膿成也赤豆薏苡仁湯排之體倦氣喘作渇小水頻數者肺氣虚也補中益氣湯加麥冬五味子補之其候證生死治法與大小腸癰同中脘穴又名胃募在臍上四寸清胃射干湯射干升麻犀角麥冬去心元參大黃黃芩各一錢芒硝梔子竹葉各五錢水煎服方歌清胃射干湯射干升麻犀角麥冬全參芩大黃芒硝等竹葉山梔胃癰痊赤豆薏苡仁湯赤小豆薏苡仁防已甘草各等分水二鍾煎八分食逺服方歌赤豆薏苡湯最神甘已赤豆薏苡仁胃癰膿成衇洪數二鍾水煎服八分丹皮湯見大小腸癰補中益氣湯見潰瘍門脾癰脾癰濕熱瘀血凝章門穴腫兼隱疼腹脹嗌乾小水短利下濕瘀補收功註此證始發章門穴必隱疼微腫由過食生冷兼濕熱或瘀血鬱滯脾經而成令人腹脹咽嗌乾燥小水短澁初宜大黃湯赤豆薏苡仁湯二方合而用之以攻滯鬱二便通利腹脹全消宜六君子湯扶脾調理順逆看法與胃癰同章門穴又名脾募在臍旁開六寸髙上二寸大黃湯見大小腸癰赤豆薏苡仁湯見胃癰六君子湯即香砂六君子湯去藿香砂仁見潰瘍門肝癰肝癰憤鬱氣逆成期門穴腫更兼疼卧驚胠滿溺不利清肝滋腎即成功註此證始發期門穴必隱痛微腫令人兩胠脹滿脇痛側卧則驚便溺艱難由憤鬱氣逆而成初服復元通氣散次服柴胡清肝湯痛脹已止宜服六味地黃丸脾虚食少則佐以八珍湯滋腎補脾治之取效禁用温補鍼灸期門穴又名肝募在乳旁一寸半再直上一寸半復元通氣散見腫瘍門柴胡清肝湯見頭部鬢疽六味地黃丸見面部雀斑八珍湯見潰瘍門心癰心癰巨闕腫隱疼酷飲嗜熱火毒成面赤口渇身作痛治法陽熱總宜清註此證始發巨闕穴必隱痛微腫令人寒熱身痛頭面色赤口渇隨飲隨乾由心火熾盛更兼酷飲嗜熱而成宜服凉血飲酒毒為病者宜服升麻葛根湯治之此證甚屬罕有但治法不可不備巨闕穴又名心募在臍上六寸五分凉血飲木通瞿麥荆芥薄荷白芷花粉甘草赤芍麥冬去心生地山梔子車前子連翹各等分去心引用燈心若潮熱加淡竹葉水煎温服方歌凉血飲善治心癰瞿荆荷芷草翹通赤芍山梔乾生地車前花粉麥門冬升麻葛根湯山梔升麻葛根白芍柴胡黃芩各一錢黃連木通甘草各五分水二鍾煎八分不拘時服方歌升麻葛根湯山梔酒毒心癰黃連宜柴芍通芩升葛草水煎温服不拘時腎癰腎癰腎經不足生京門微腫隱隱疼少腹肋下䐜脹滿房勞形寒邪外乘註此證始發京門穴必隱痛微腫令人寒熱往来面白不渇少腹及肋下䐜脹塞滿由腎虚不足之人房勞太過身形受寒邪氣自外乘之初服五積散加細辛寒盡痛止宜用桂附地黃丸調理京門穴又名腎募在身側腰中監骨下肋間五積散蒼术二錢炒陳皮桔梗川芎當歸白芍各一錢麻黃枳殻麩炒桂心乾薑厚朴各八分白芷半夏製甘草生茯苓各四分引薑一片水二鍾煎八分不拘時服頭痛惡寒者加連鬚葱頭三個蓋卧汗出甚效方歌五積散蒼殻陳苓麻黃半桔歸芍芎芷朴桂心乾薑草腎癰寒邪服成功桂附地黃湯見潰瘍門三焦癰三焦癰由濕熱凝石門穴上腫隱疼寒結治同腸癰法内癰俱係膜内生註此證始發石門穴必隱疼微腫令人寒熱往来二便秘澀由濕熱遇寒凝結而成治法與大小腸癰同凡内癰俱係膜内成患外皮不腐石門穴又名三焦募在臍下二寸内癰總論凡人胸腹有十一募募者各藏府隂會之所也靈樞云發内癰内疽者其本經募上肉必浮腫募中必時時隱痛浮腫為癰隱痛為疽此即内癰内疽之驗也茲内癰有治法内疽無治法何也蓋内癰内疽其病原無殊惟在根淺根深之别耳根淺為癰根深為疽若臨證用藥攻補得宜無不收效至募有十一而内癰僅九證者何也蓋膽府形如膜皮無出無納汁清氣潔不生内癰内疽若夫膀胱亦如膜皮中惟濁水故古今書籍並無講及内癰内疽者是以未敢詳載雖然中極穴即膀胱募也今人間有中極穴或浮腫或隱痛者所見證候竟同小腸癰治法亦當按小腸癰治之可也俟後之學者留意焉驗内癰法凡遇生内癰之人與生黃豆五粒嚼之口中無豆味者是其候也御纂醫宗金鑑卷六十七
