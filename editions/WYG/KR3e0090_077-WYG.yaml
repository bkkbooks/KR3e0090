精氣不上注於目故初病内障乆成五風烏風緑風黑風黄風青風之患其證不紅不腫瞳人色變而其光失明也外因為病歌外障皆因六氣生暑寒燥濕火與風内熱召邪乗隙入隨經循系上頭中註此明外障受病之因也外障者從外而遮也風寒暑濕燥火六氣也外障之病皆因六滛所感然必因其人内熱外蒸腠理不宻相召外邪乘虚而入入項屬太陽入靣屬陽明入頰屬少陽各隨其經之系上頭入腦中而為患於目焉其證赤痛腫澀眵淚翳膜遮睛也不内外因為病歌病由不内外因者飲食起居擊刺成邪無定體内外障細察其因無遁情註此明不内外因受病之因也既非外感六氣又非内傷七情但因飲食不節傷飽失饑起居不慎勞役過度或遭擊振或被刺損以其邪無定體故或成内障或成外障之病當細察其所因則病無遁情矣内障總名歌内障初患變五風黄緑黑烏青圓氷滑濇浮沉横散偃黄心黑水棗花形雷頭驚振及瞳缺雀目高風胎患名二十四證為内障湏當一一辨分明註内障初患尚未失明之證也乆而變成五風之證瞳變黄色者名曰黄風變緑白色者名曰緑風變黑色者名曰黑風變烏紅色者名曰烏風變青色者名曰青風圓者圓翳也氷者氷翳也滑者滑翳也濇者濇翳也浮者浮翳也沉者沉翳也又名深翳横者横翳也又名劍􅆃翳散者散翳也偃者偃月翳也黄心者白翳黄心翳也黑水者黑水凝翳亦名黑花翳枣花者棗花翳也雷頭者雷頭風變内障也驚振者因驚振而成内障也胎患者胎患内障也此内障二十四證之總名也須當一一分辨明白以施治也内障初患乆變五風歌内障初患如好眼生花視物霧烟中隠隠似翳瞳失彩乆變黄緑黑烏青黄風雀目乆金色緑風時見花白紅頭旋額鼻目牽痛黑風見黑緑風同烏風亦與緑不異但痛不旋乃烏風頭旋不痛青風證瞳黄黄風發脾經淺緑如白肺經發黑色黑風腎經名烏𢃄渾紅心經病青是青風屬肝經外因頭風痛引目腦脂熱注忽失明内因精傷不上注左右相𫝊漸漸盲或兼外因皆赤痛内因不足補其精註内障初患如同好眼但視物常見五色花飛昏而不明如在霧烟之中瞳中隠隠似翳漸無精彩射人其瞳色或變黄白緑青烏黑渾紅無定乆則成五風内障之證也黄風者初病雀目日乆瞳變黄色甚而如金難治之證也緑風者初病眼前時見白花紅花頭旋兩額俠鼻痛牽兩目日乆瞳變淺緑如白之色黑風者初病與緑風相同但時見黑花日乆瞳變昏黑之色烏風者初病亦與緑風之證不異但頭痛而不旋暈眼前常見烏花日乆瞳變烏帶渾紅之色青風者初病亦與烏風相同頭雖旋暈而不痛眼前常見青花日乆瞳變青色其五風發病之源黄風則發於脾經緑風則發於肺經黑風則發於腎經烏風則發於心經青風則發於肝經然風雖有五其致病之由則有二一曰外因必因頭風其痛引目上攻於腦腦脂與熱合邪下注於目而致兩目忽然失明也一曰内因必因内傷藏府精氣不上注於目或先病左目後及於右目或先病右目後及於左目左右相𫝊兩目俱損也外因證屬有餘多兼赤痛當以除風散熱為主内因證屬不足多不赤痛當以補精益氣為主五風初患有餘歌五風初患有餘證除風湯内主羚羊黑苓蠍尾車前子黄芩白芍共消黄除風湯方羚羊角二錢黑參二錢茯苓二錢蠍尾三分車前子二錢黄芩一錢白芍藥一錢芒消一錢大黄一錢右為粗末令勻以水二盞煎至一盞食後去滓溫服五風初患不足歌五風初患不足證通明補腎决明參生地桔車茺芍細引經竄散少加軍通明補腎丸方石决明一兩人參二兩生地黄二兩桔梗一兩車前子一兩茺蔚子二兩白芍藥一兩細辛半兩大黄三錢右為細末煉蜜為丸如桐子大空心茶清送下三錢黄風有餘歌已成黄風有餘證須用通脾㵼胃湯知母軍芩茺蔚子石膏梔子黑參防通脾瀉胃湯方知母一錢大黄一錢黄芩一錢五分茺蔚子一錢石膏二錢梔子一錢黑參一錢防風一錢右為粗末以水二盞煎至一盞食後去柤溫服黄風不足歌已成黄風不足證補益脾經山藥丸人參山藥茯苓地澤瀉防風同作圓山藥丸方人參山藥茯苓生地黄澤瀉防風各一兩右為細末煉蜜為丸如桐子大空心茶清送下三錢緑風有餘歌已成緑風有餘證羚羊角飲黑參防茯苓知母黄芩細桔梗羚羊車大黄緑風羚羊飲黑參二錢防風二錢茯苓二錢知母二錢黄芩一錢細辛一錢桔梗二錢羚羊角一錢車前子一錢大黄一錢右為粗末以水二盞煎至一盞食後去柤溫服緑風不足歌已成緑風不足證還睛丸草术參苓羌防菊地蒺蓉薯牛膝葙蒙兎賊芎緑風還睛丸方甘草白术人參茯苓羌活防風菊花生地黄蒺藜肉蓯蓉山藥牛膝青葙子蜜蒙花兎絲子木賊川芎各一兩右為細末煉蜜為丸桐子大空心茶清送三錢黑風有餘歌已成黑風有餘證羚羊角飲黑羚羌車前桔梗黄芩共柴胡茺蔚細辛防黑風羚羊飲黑參一錢羚羊角一錢羌活一錢車前子一錢半桔梗一錢黄芩一錢柴胡一錢茺蔚子一錢半細辛五分防風一錢右為粗末以水二盞煎至一盞食後去柤溫服黑風不足歌已成黑風不足證補腎丸中熟地黄澤㵼茺蔚五味子細辛山藥兎絲良補腎丸方熟地黄一兩澤㵼一兩茺蔚子一兩五味子三錢細辛三錢山藥一兩兎絲子一兩右為細末煉蜜為丸桐子大每服二錢空心鹽湯下烏風有餘歌已成烏風有餘證决明丸内决明辛桔梗防風茺蔚子車茯山藥共元參烏風决明丸方石决明二兩細辛五錢桔梗防風茺蔚子車前子茯苓山藥元參各二兩右為細末煉蜜為丸如桐子大食前茶清送下三錢烏風不足歌已成烏風不足證補肝散内用川芎熟地當歸蒺藜芍木賊夏枯草防風烏風補肝散方川芎熟地黄當歸蒺藜白芍藥木賊夏枯草防風各一錢右為粗