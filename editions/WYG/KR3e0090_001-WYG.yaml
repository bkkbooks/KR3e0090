body:
  text: 訂正仲景全書凡例一傷寒論與金匱要畧原是一書自林億校刋遂分為二殊失先賢之意後趙開美仍合為一書今復其舊使後學知傷寒與雜證原非有二也一全書經文諸家舊本或字有增減或節有分合或重出不書衍文或正誤各不相同是集則以仲景全書為凖而參之各家以昭畫一一傷寒論金匱要畧法律本自井然但係千載遺書錯誤頗多雖經歴代註家編次詮解然各執己見位置無常難以為法兹集傷寒分經仍依方有執條辨而次序先後則更為變通金匱門類悉照林億校本而綱領條目則詳為分别並不拘泥前人惟在啓發後學足禆實用一經中凡錯簡遺誤文義不屬應改補刪移者審辨精覈皆詳於本條經文之下其有全節文義不相符合絶難意解者雖勉加註釋終屬牽强然其中不無可採之句故另彚二帙一曰正誤一曰存疑附之卷末以備參考金匱要畧倣此一書中辭精義奥註釋誠難若徒尚辭華必支離蔓衍何以闡發微言是註惟期簡易明顯發揮經旨間或旁參互證亦惟援引本經不事虚文用滋眩惑一傷寒論自成無已創註以来踵之者百餘家金匱要畧自趙良衍義後繼之者十餘人各有精義羽翼經文然或渉浮泛或近隐晦醇疵並見難以適從兹汰其重複刪其冗㳫取其精確實有發明者集註於右用資考證一上古有法無方自仲景始有法有方其規矩變化之妙立法成方之旨各有精義皆當眀晰兹於每方必審究其立方主治之理君臣佐使之相輔功能性味之相合一一解於其後即方中用水之甘瀾麻沸火之宜文宜武煎之緩急漬之遲速服之頻頓莫不各有適病之宜前人或置而不論者必備録而詳解之一是集傷寒則首六經次合病併病次差後勞復食復隂陽易次壊病温病痙濕暍霍亂次可汗不可汗可吐不可吐可下不可下次平衇辨衇法此一書之次第也首綱領次具證次出方次因誤致變次因逆成壊此一篇之次第也首經文次註釋次集註次方藥次方解集解其經文有缺誤者則加辨論於經文之下以按字冒之其與本條互相發明而非専論本條者加辨論於本註之後亦以按字冒之此逐條之次第也俾後學了然心目易於融㑹貫通金匱要畧序法倣此一金匱二十五章内有與傷寒文同者十之一二雖為重出然亦間有義别之處今將傷寒論中已有専註者則不復贅釋其與本經切要者必重加發明以闡揚其旨一古人姓氏有傳記詳明者昭昭可考若僅書其字則無從知其名矣夫以其人竭慮殫精乆而冺其迹所不忍也故於無考者書其字可考者書其名以示不沒其善之意御纂醫宗金鑑卷一凡例欽定四庫全書御纂醫宗金鑑卷一訂正仲景全書凡例一傷寒論與金匱要畧原是一書自林億校刋遂分為二殊失先賢之意後趙開美仍合為一書今復其舊使後學知傷寒與雜證原非有二也一全書經文諸家舊本或字有增減或節有分合或重出不書衍文或正誤各不相同是集則以仲景全書為凖而參之各家以昭畫一一傷寒論金匱要畧法律本自井然但係千載遺書錯誤頗多雖經歴代註家編次詮解然各執己見位置無常難以為法兹集傷寒分經仍依方有執條辨而次序先後則更為變通金匱門類悉照林億校本而綱領條目則詳為分别並不拘泥前人惟在啓發後學足禆實用一經中凡錯簡遺誤文義不屬應改補刪移者審辨精覈皆詳於本條經文之下其有全節文義不相符合絶難意解者雖勉加註釋終屬牽强然其中不無可採之句故另彚二帙一曰正誤一曰存疑附之卷末以備參考金匱要畧倣此一書中辭精義奥註釋誠難若徒尚辭華必支離蔓衍何以闡發微言是註惟期簡易明顯發揮經旨間或旁參互證亦惟援引本經不事虚文用滋眩惑一傷寒論自成無已創註以来踵之者百餘家金匱要畧自趙良衍義後繼之者十餘人各有精義羽翼經文然或渉浮泛或近隐晦醇疵並見難以適從兹汰其重複刪其冗㳫取其精確實有發明者集註於右用資考證一上古有法無方自仲景始有法有方其規矩變化之妙立法成方之旨各有精義皆當眀晰兹於每方必審究其立方主治之理君臣佐使之相輔功能性味之相合一一解於其後即方中用水之甘瀾麻沸火之宜文宜武煎之緩急漬之遲速服之頻頓莫不各有適病之宜前人或置而不論者必備録而詳解之一是集傷寒則首六經次合病併病次差後勞復食復隂陽易次壊病温病痙濕暍霍亂次可汗不可汗可吐不可吐可下不可下次平衇辨衇法此一書之次第也首綱領次具證次出方次因誤致變次因逆成壊此一篇之次第也首經文次註釋次集註次方藥次方解集解其經文有缺誤者則加辨論於經文之下以按字冒之其與本條互相發明而非専論本條者加辨論於本註之後亦以按字冒之此逐條之次第也俾後學了然心目易於融㑹貫通金匱要畧序法倣此一金匱二十五章内有與傷寒文同者十之一二雖為重出然亦間有義别之處今將傷寒論中已有専註者則不復贅釋其與本經切要者必重加發明以闡揚其旨一古人姓氏有傳記詳明者昭昭可考若僅書其字則無從知其名矣夫以其人竭慮殫精乆而冺其迹所不忍也故於無考者書其字可考者書其名以示不沒其善之意御纂醫宗金鑑卷一凡例欽定四庫全書御纂醫宗金鑑卷一訂正仲景全書傷寒論註太陽上篇目録桂枝湯桂枝加附子湯五苓散麻黄杏子石膏甘草湯十棗湯桂枝加人參湯葛根黄芩黄連湯桂枝去芍藥湯桂枝去芍藥加附子湯桂枝加厚朴杏子湯𤓰蒂散大陷胸湯小陷胸湯三物白散大陷胸丸文蛤散御纂醫宗金鑑卷一目録欽定四庫全書御纂醫宗金鑑卷一訂正仲景全書傷寒論註太陽上篇目録桂枝湯桂枝加附子湯五苓散麻黄杏子石膏甘草湯十棗湯桂枝加人參湯葛根黄芩黄連湯桂枝去芍藥湯桂枝去芍藥加附子湯桂枝加厚朴杏子湯𤓰蒂散大陷胸湯小陷胸湯三物白散大陷胸丸文蛤散御纂醫宗金鑑卷一目録欽定四庫全書御纂醫宗金鑑卷一訂正仲景全書傷寒論註傷寒論後漢張機所著發眀内經奥旨者也並不引古經一語皆出心裁理無不該法無不備蓋古經皆有法無方自此始有法有方啓萬世之法程誠醫門之聖書但世逺殘闕多編次傳寫之誤今博集諸家註釋採其精粹正其錯譌刪其駁雜補其闕漏發其餘藴於以行之天下則大法微言益昭諸萬世矣辨太陽病衇證并治上篇太陽主表為一身之外藩總六經而統榮衛凡外因百病之襲人必先於表表氣壯則衛固榮守邪由何入經曰雖有大風苛毒勿之能害是也若表氣虚則榮衛之氣不能禦外故邪得而乘之經曰虚邪不能獨傷人必因身形之虚而後客之也衛陽也榮隂也風陽邪也寒隂邪也邪之害人各從其類故中風則衛受之傷寒則榮受之衛分受邪則有汗為虚邪桂枝證也榮分受邪則無汗為實邪麻黄證也榮衛俱受邪均無汗皆為實邪大青龍證也大綱三法用之得當其邪立解用違其法變病百出縁風為百病之長故以風中衛列為上篇寒傷榮與風寒兩傷列為中下二篇其條目俱詳於本篇之下俾讀者開卷了然有所遵循也太陽之為病衇浮頭項强痛而惡寒註太陽膀胱經也太陽之為病謂太陽膀胱經之所為病也太陽主表表統榮衛風邪中衛寒邪傷榮均表病也衇浮表病衇也頭項强痛惡寒表病證也太陽經衇上額交巔入絡腦還出别下項連風府故邪客其經必令頭項强痛也惡寒者因風寒所傷故惡之也首揭此條為太陽病之提綱凡上中下三篇内稱太陽病者皆指此衇證而言也按榮衛二者皆胃中後天之穀氣所生其氣之清者為榮濁者為衛衛即氣中之慓悍者也營即血中之精粹者也以其定位之體而言則曰氣血以其流行之用而言則曰營衛營行衇中故屬於隂也衛行衇外故屬於陽也然營衛之所以流行者皆本乎腎中先天之一氣故又皆以氣言曰營氣衛氣也集註滑夀曰衇在肉上行主表也方有執曰表即皮膚榮衛麗焉故衇見尺寸俱浮知病在太陽表也項頸後也惡寒者該風而言也風寒初襲而鬱於表不能再勝風寒之外忤故畏惡之程應旄曰太陽經之見證莫確於頭痛惡寒故首揭之吳人駒曰頭為三陽之通位項為太陽之専位有所障礙不得如常之柔和是為强痛太陽病發熱汗出惡風衇緩者名為中風註太陽病即首條衇浮頭項强痛而惡寒之謂也衛為表陽風屬陽邪風邪中人則衛受之從其類也風中於衛即發熱者以風衛皆陽其性本熱故變熱甚㨗不似傷寒待其閉鬱而始熱也衛病不能固表又為陽邪所蒸故腠理踈而汗出也汗出表虚為風所忤故惡風也風性柔軟故衇緩也此承上條言太陽病又兼見此衇證者名曰中風以為中風病之提綱後凡稱中風者皆指此衇證而言也集註方有執曰衇緩即下文陽浮而隂弱之謂言既有如首條所揭之太陽病加之發熱汗出惡風而衇緩者則其病乃是觸犯於風所致故名中風汪琥曰中風非東垣所云中府中藏中血衇之謂蓋中字與傷字同義仲景論中不直言傷風者恐後學不察以咳𠻳鼻塞聲重之傷風混同立論故以中字别之也衇緩當作浮緩看浮是太陽病衇緩是中風衇中篇緊衇亦當倣此太陽中風陽浮而隂弱陽浮者熱自發隂弱者汗自出嗇嗇惡寒淅淅惡風翕翕發熱鼻鳴乾嘔者桂枝湯主之註太陽中風即上二條合而言之又詳舉其證以出其治也後凡稱太陽中風者皆指此衇此證也隂陽指榮衛而言非指尺寸浮沉也陽浮即越人曰三菽之浮肺之浮也肺主皮毛取之而得者即衛分之浮也六菽之浮心之浮也心主血衇取之而得者即營分之浮也營分之浮較之衛分之浮則無力而弱故曰陽浮而隂弱也衛為風客則衛邪强而發熱矣故曰陽浮者熱自發營受邪蒸則營不固而汗出矣故曰隂弱者汗自出營衛不和則肌表踈緩故有嗇嗇之惡寒淅淅之惡風翕翕之發熱也然在皮膚之表非若傷寒之壯熱無汗惡寒雖近烈火而不减惡風雖處宻室而仍畏也皮毛内合於肺皮毛不固風邪侵肺則氣壅而鼻鳴矣胸中者陽氣之本衛陽為風邪所干不能敷布則氣上逆而為乾嘔矣故宜桂枝湯解肌固表調和營衛也集註程應旄曰嗇嗇惡寒者肌被寒侵怯而斂也淅淅惡風者肌因風灑踈難禦也翕翕發熱者肌得熱蒸合欲揚也嗇嗇淅淅翕翕字俱從皮毛上形容較之傷寒之見證自有浮沉淺深之别桂枝湯方桂枝三兩去皮芍藥三兩甘草二兩炙生薑三兩切大棗十二枚擘右五味㕮咀三味以水七升微火煑取三升去滓適寒温服一升服已須􅁷歠熱稀粥一升餘以助藥力温覆令一時許徧身漐漐微似有汗者益佳不可令如水流漓病必不除若一服汗出病差停後服不必盡劑若不汗更服依前法又不汗後服當小促其間半日許令三服盡若病重者一日一夜周時觀之服一劑盡病證猶在者更作服若汗不出者乃服至二三劑禁生冷黏滑肉麫五辛酒酪臭惡等物按桂枝湯方桂枝下有去皮二字夫桂枝氣味辛甘全在於皮若去皮是枯木矣如何有解肌發汗之功宜刪此二字後倣此方解名曰桂枝湯者君以桂枝也桂枝辛温辛能發散温通衛陽芍藥酸寒酸能收斂寒走隂營桂枝君芍藥是於發汗中寓斂汗之旨芍藥臣桂枝是於和營中有調衛之功生薑之辛佐桂枝以解表大棗之甘佐芍藥以和中甘草甘平有安内攘外之能用以調和中氣即以調和表裏且以調和諸藥以桂芍之相須薑棗之相得藉甘草之調和陽表隂裏氣衛血營並行而不悖是剛柔相濟以相和也而精義在服後須㬰啜稀粥以助藥力蓋穀氣内充不但易為釀汗更使已入之邪不能少留將来之邪不得復入也又妙在温覆令一時許漐漐微似有汗是授人以微汗之法也不可令如水流漓病必不除是禁人以不可過汗之意也此方為仲景羣方之冠乃解肌發汗調和營衛之第一方也凡中風傷寒衇浮弱汗自出而表不解者皆得而主之其他但見一二證即是不必悉具故麻葛青龍發汗諸劑咸用之也若汗不出麻黄證也衇浮緊麻黄衇也固不可與桂枝湯然初起無汗已用麻黄發汗汗解後復煩衇浮數者與下後衇仍浮氣上衝者及下後下利止而身痛不休者經中皆用此以解外誠以此時表雖未解腠理已踈邪不在皮毛而在肌肉且經汗下津液已傷故衇證雖同麻黄而主治當屬桂枝也粗工妄謂桂枝湯専治中風不治傷寒使人疑而不用又謂専走肌表不治他病不知此湯倍芍藥生薑加人參名桂枝新加湯用以治榮表虚寒肢體疼痛倍芍藥加飴糖名小建中湯用以治裏虚心悸腹中急痛再加黄耆名黄耆建中湯用以治虚損虚熱自汗盜汗因知仲景之方可通治百病也適寒温服歠熱稀粥以助藥力欲使穀氣内充易為釀汗也温覆令一時許微似有汗不令如水流漓謂不可過汗也蓋取汗在不緩不急不多不少緩則邪必留連急則邪反不盡汗多則亡其陽汗少則病必不除若一服汗出病差謂病輕者初服一升病即解也停後服不必盡劑謂不可再服第二升恐其過也若不汗更服依前法謂初服不汗出未解再服一升依前法也又不汗後服謂病仍不解後服第三升也小促其間半日許令三服盡謂服此第三升當小促其服亦不可太緩以半日三時許為度令三服盡始適中其服之宜也若病重者初服一劑三升盡病不解再服一劑病猶不解乃更服三劑以一日一夜周十二時為度務期汗出病解而後已後凡有曰依服桂枝湯法者即此之謂也太陽病發熱汗出者此為榮弱衛强故使汗出欲救邪風者宜桂枝湯註此釋上條陽浮隂弱之義也經曰邪氣盛則實精氣奪則虚衛為風入則發熱邪氣因之而實故為衛强是衛中之邪氣强也營受邪蒸則汗出精氣因之而虚故為營弱是營中之隂氣弱也所以使發熱汗出也欲救邪風者宜桂枝湯集註方有執曰上言陽浮而隂弱此言營弱衛强衛强即陽浮營弱即隂弱彼此互言而互相發明者也救者解救救䕶之謂不曰風邪而曰邪風者以本體言也病人藏無他病時發熱自汗出而不愈者此衛氣不和也先其時發汗則愈宜桂枝湯註此釋上條榮衛不和之證而又就其時發熱汗出者以明其治也藏裏也無他病謂裏無他病也有時發熱有時不熱有時汗出有時不汗出其表病流連而不愈者非榮不和是衛强不與榮和也當於未熱未汗之時預用桂枝湯解肌發汗迎而奪之以遏其勢則熱退汗斂而病自愈矣集註方有執曰時以暫言衛氣不和者表有邪風而不和也先其時者言於未發熱之先也程知曰隂虚諸病亦時發熱自汗若裏無他病而時熱自汗則為衛受風邪未得解散宜於將發之時先用桂枝湯乘其欲動而擊之程應旄曰桂枝為解肌之劑而有時云發汗者何也以其能助衛氣升騰使正氣得宣而汗出與麻黄湯逐邪氣使汗從外洩者不同汪琥曰及其發熱自汗之時用桂枝湯發汗則愈苟失其時則風邪入裏病熱必深桂枝湯非所宜矣病常自汗出者此為榮氣和榮氣和者外不諧以衛氣不共榮氣諧和故爾以榮行衇中衛行衇外復發其汗榮衛和則愈宜桂枝湯註此又釋上條榮衛所以不和之義也言病有時常自出汗者此為榮氣已和也榮氣和而熱仍不解者則是衛外之氣猶不諧而不與榮氣共和諧也所以榮氣雖和而時時自汗出病猶不解也蓋以榮行衇中衛行衇外衛不和則榮雖和而病不解故復發其汗以抑衛而和榮榮衛和而病自愈矣亦宜桂枝湯集註方有執曰此與上條同上以暫言此言常者謂無時不然也上言藏藏為隂而主裏此言榮榮亦隂而主裏以暫言故其詞畧以常言故其詞詳兩相互發義不殊也喻昌曰此明衛受邪風榮自汗出之理凡汗出榮和而發熱不解是衛强不與榮和也復發其汗俾風邪從肌竅外出斯衛不强而與營和矣正如中酒發狂酒去其人帖然也榮受寒邪不與衛和宜麻黄湯亦然吳人駒曰上條發作有時此則無時而不自汗出但熱不解者亦屬榮衛不和蓋榮衛相得之為和而榮不得獨為之和也張錫駒曰衛氣者所以肥腠理司開闔衛外而為固也今受邪風不能衛外故常自汗出而熱不解此為榮氣和而衛不和也魏荔彤曰前以桂枝解肌者和其衛而時發熱之熱止此以桂枝發汗者和其衛而常自汗之汗止蓋發其表而熱解矣故總結之曰榮衛和則愈太陽病初服桂枝湯反煩不解者先刺風池風府却與桂枝湯則愈註太陽病服桂枝湯外證不解者可更作服今初服不惟不解而反加煩是表邪太盛若遽與桂枝恐更生煩熱故宜先行刺法疏其在經邪熱然後却與桂枝發其肌腠風邪俾外内調和自然汗出而解矣集註方有執曰桂枝全在服法發汗切要如經若服不如法汗不如經病必不除所以反煩反者轉也言轉加熱悶也風池穴在耳後陷者中按之引於耳中手足少陽衇之㑹刺可入同身寸之四分風府穴在項上入髪際同身寸之一寸大筋内宛宛中督衇陽維二經之㑹刺可入同身寸之四分張志聰曰風池風府雖非太陽穴道乃屬太陽經衇所循之部故刺之以衰太陽之病勢魏茘彤曰恐誤認此為已傳之躁煩故標出以示人言不解則太陽之證俱在但添一煩知其非傳裏之煩而仍為表未解之煩也欲自解者必當先煩乃有汗而解何以知之衇浮故知汗出解也註汗之不解而煩太陽證仍在者是表邪盛也有陽明證者是裏熱盛也然亦有欲自解而未解先煩者則又為邪正相争作汗之兆也當其煩時解與不解固不可定但診其六衇俱浮則知邪欲還表當汗出而解矣集註程知曰天地鬱蒸而雨作人身煩悶而汗作當以衇浮決之設衇不浮則煩又為入裏之候矣程應旄曰如診得衇浮即是邪還於表之兆切勿妄治其煩使汗却而當解者反不解也沈眀宗曰夫自解證有從衂解有從下血而解有從下利而解有從小便暗除而解者此即太陽戰汗之一端或從衇辨或從證叅仲景妙義散見諸篇務必合叅則備病六七日手足三部衇皆至大煩而口噤不能言其人躁擾者必欲解也註病至六七日手足隂陽三部衇皆至而浮忽然大煩口噤不能言躁擾不寜者此邪正俱實争勝作汗之象故曰必欲解也集註成無己曰手足三部衇皆至為正氣盛邪氣雖甚必欲解也若衇和其人大煩目重臉内際黄者此欲解也按臉字當是瞼字瞼眼弦也作臉字非註衇和而大煩者其解未可卜也若其人目重瞼者是瞼覆下垂目欲合也為隂来濟陽之兆内際黄者為胃氣来復之徵故曰此欲解也問曰衇病欲知愈未愈者何以别之答曰寸口闗上尺中三處大小浮沉遲數同等雖有寒熱不解者此衇隂陽為和平雖劇當愈註衇偏勝則病衇和平則愈今寸口闗上尺中三部衇俱見浮沉遲數大小同等隂陽和平之象即有寒熱不解之病雖劇亦當愈也集註内經曰寸口人迎兩者相應若引繩大小齊等者名曰平人程知曰大小浮沉遲數同等謂三部九候無相失也蓋大不甚大小不甚小浮不甚浮沉不甚沉遲不甚遲數不甚數為冲和平等之象也病有發熱惡寒者發於陽也無熱惡寒者發於隂也發於陽者七日愈發於隂者六日愈以陽數七隂數六故也註病謂中風傷寒也有初病即發熱而惡寒者是謂中風之病發於衛陽者也有初病不發熱而惡寒者是謂傷寒之病發於榮隂者也發於陽者七日愈發於隂者六日愈以陽合七數隂合六數也集註方有執曰此推原中風傷寒之所以始以要其所以終之意凡在太陽皆惡寒也發起也愈瘳也程知曰此辨太陽病有發熱有不發熱之故也風陽也衛亦陽也寒隂也榮亦隂也中風傷寒均為表證而風入衛則邪發於陽而為熱寒入榮則邪發於隂而不即熱陽行速故常過經而遲愈一日隂行遲故常循經而早愈一日觀此則風寒之辨了然矣魏荔彤曰風傷衛寒傷榮既在太陽則未有不發熱者但遲速有間耳至於惡寒則同也發於陽發於隂之義不過就風為陽衛亦陽寒為隂榮亦隂而言殊未及於三隂也問曰凡病欲知何時得何時愈答曰假令夜半得病者明日日中愈日中得病者夜半愈何以言之日中得病夜半愈者以陽得隂則解也夜半得病明日日中愈者以隂得陽則解也註凡病之起不外乎隂陽以為病非陽勝隂即隂勝陽凡病之愈亦不外乎隂陽以為和非陽得隂解即隂得陽解陽得隂解者謂日中得病今日夜半愈也隂得陽解者謂夜半得病明日日中愈也集註方有執曰日中夜半以大畧言餘時可倣此意而推也太陽病頭痛至七日已上自愈者以行其經盡故也若欲作再經者鍼足陽明使經不傳則愈註太陽病頭痛至七日已上自愈者以行其經盡故也謂太陽受病其邪傳行六日三陽三隂經盡至七日已上三陽三隂之病日衰大邪皆去此不作再經故自愈也再者再傳陽明經也謂其邪已傳經盡熱盛不衰欲再轉屬陽明故也鍼足陽明以洩其熱使其邪不再傳則愈矣集註方有執曰七日已上者該六日而言也魏荔彤曰方有執謂鍼以遏其邪喻昌謂鍼以竭其邪言遏言竭皆言泄之也凡鍼刺者泄其盛氣也故前言刺風池風府亦主泄其風邪暴甚之意因刺法乃治熱之善䇿不欲人妄施汗下温三法也言足陽明自是胃之經穴必有實欲再傳之勢方可刺之閔芝慶曰太陽受病以次而終於厥隂為傳經盡諸經受病至七日已上自愈者為行其經盡故也今有自太陽再傳之說若果傳徧六經厥隂再傳太陽太陽再傳陽明則何不於厥隂未傳太陽之前預鍼太陽而必待傳陽明然後鍼陽明哉於此可知三隂從無再傳太陽之病但轉屬陽明耳風家表解而不了了者十二日愈註風家謂太陽中風也表解謂用桂枝湯病已解也不了了者不清楚也言用桂枝湯其表已解而猶不清楚者在經餘邪未盡耳十二日經盡之時餘邪盡自然愈也集註魏荔彤曰此條申眀太陽中風病愈後風邪留滯之證應聴其自愈也太陽病頭痛發熱汗出惡風者桂枝湯主之重出衍文桂枝本為解肌若其人衇浮緊發熱汗不出者不可與也常須識此勿令誤也註夫桂枝湯本為解肌中風表虛之藥也若其人衇浮緊發熱汗不出者乃傷寒表實之病不可與也常須識此為麻黄湯證勿令誤與桂枝湯也集註程應旄曰可與不可與在毫釐疑似之間誤多失之於倉卒須常將營衛之分别處兩兩互勘隂陽不悖虚實了然不以桂枝誤治衇浮緊汗不出之傷寒自不致以麻黄誤治衇浮緩汗自出之中風矣若酒客病不可與桂枝湯得之則嘔以酒客不喜甘故也註酒客謂好飲之人也酒客病謂過飲而病也其病之狀頭痛發熱汗出嘔吐乃濕熱薫蒸使然非風邪也若誤與桂枝湯服之則嘔以酒客不喜甘故也集註成無己曰酒客内熱喜辛而惡甘桂枝湯甘酒客得之則中煩而嘔凡服桂枝湯吐者其後必吐膿血也註凡酒客得桂枝湯而嘔者以辛甘之品能動熱助涌故也若其人内熱素盛服桂枝湯又不即時嘔出則益助其熱所以其後必吐膿血也然亦有不吐膿血者則是所傷者輕而熱不甚也集註劉宏璧曰桂枝氣味甚薄酒客不可與者舉一以例其餘也庸工不得其解每遇熱盛之人但去桂枝於甘辛極熱之類全無顧忌仲景豈意後人如此之愚哉即如産後不宜寒凉所以舉一白芍之味酸微寒者以示戒今祗知除去白芍於三黄寒凉等藥反恣用無忌殊不知聖人一語該括無窮味薄者尚不可與其味厚者可知微寒者既在宜禁而大寒者尤所當戒世俗不能引伸觸類徒以鹵莽滅裂為事可見上古醫書非精詳玩味烏能有得耶太陽病發汗遂漏不止其人惡風小便難四肢微急難以屈伸者桂枝加附子湯主之註太陽中風本當解肌若大發其汗如水流漓因而遂漏不止其人必腠理大開表陽不固故惡風也液傷於内膀胱津少故小便難也液傷於外復加風襲故四肢微急難以屈伸也宜桂枝加附子湯主之服依桂枝湯法者是於固陽斂液中和榮衛解風邪也集註方有執曰此太陽中風誤汗之變證小便難者以汗漏不止必亡陽亡津液亡陽則氣不足亡津液則水道枮竭且小便者膀胱所司也膀胱本太陽經而為諸陽主氣氣不足則化不行矣程知曰此陽氣與隂液兩亡復加外風襲入與真武證微細有别真武湯是救裏寒亡陽之失急於回陽者桂枝加附子湯是救表寒漏風之失急於温經者桂枝加附子湯方於桂枝湯方内加附子一枚餘依桂枝湯法集解柯琴曰是方以附子加入桂枝湯中大補表陽也表陽密則汗漏自止惡風自罷矣汗止津回則小便自利四肢自柔矣汗漏不止與大汗出同而從化變病則異服桂枝麻黄湯大汗出後而大煩渴是陽陷於裏急當救隂故用白虎加人參湯服桂枝麻黄湯發汗遂漏不止而不煩渴是亡陽於外急當救陽故用桂枝加附子湯要之發汗之劑用桂枝不當則陽陷於裏者多用麻黄不當則陽亡於外者多因桂枝湯有芍藥而無麻黄故雖汗大出而元府尚能自閉多不致亡陽於外耳服桂枝湯大汗出後大煩渴不解衇洪大者白虎加人參湯主之註大煩渴陽明證也洪大陽明衇也中風之邪服桂枝湯大汗出後不解大煩渴衇洪大者是邪已入陽明津液為大汗所傷胃中乾燥故也宜與白虎加人参湯清熱生津而煩渴自除矣集註張璐曰白虎湯實解内蒸之熱非治外經之熱也昔人以石膏辛凉能解利陽明風熱若不佐以麻葛之品何以走外此說似是而實非蓋陽明在經之邪縱使有大熱而不煩渴自有葛根湯桂枝加葛根湯等治法並無藉於石膏也白虎加人參湯見陽明篇太陽病三日發汗不解蒸蒸發熱者屬胃也調胃承氣湯主之註太陽病三日發汗後熱不解若仍陣陣發熱有汗而不解者是太陽表證未罷也則當以桂枝湯和之今蒸蒸發熱有汗而不解者乃屬陽明裏證不和也故用調胃承氣湯集註程應旄曰太陽病三日經期尚未深也何以發汗不解便屬胃也蓋以胃燥素盛故他表證雖罷而汗與熱仍不解也第徵其熱如炊籠蒸蒸而盛則知其汗必連綿濈濈而来此即大便已鞕之徵故曰屬胃也熱雖聚於胃而未見潮熱讝語等證主以調胃承氣湯者於下法内從乎中治以其為日未深故也汪琥曰言太陽病不可拘以日數但見屬胃之證即可下也病方三日曾經汗矣其熱自内騰達於外非表邪不解乃太陽之邪轉屬於胃病熱不能解也調胃承氣湯見陽明篇太陽病發汗後大汗出胃中乾煩躁不得眠欲得飲水者少少與飲之令胃氣和則愈若衇浮小便不利微熱消渴者五苓散主之註太陽病發汗後或大汗出皆令人津液内竭胃中乾煩躁不得眠欲得飲水當少少與之以滋胃燥令胃氣和則可愈也倘與之飲胃仍不和若衇浮小便不利微熱消渴者則是太陽表邪未罷膀胱裏飲已成也經曰膀胱者津液之府氣化則能出矣今邪熱薫灼燥其現有之津飲水不化絶其未生之液津液告匱求水自救所以水入即消渴而不止也用五苓散者以其能外解表熱内輸水府則氣化津生熱渴止而小便利矣集註張兼善曰白虎治表證已解邪傳裏而煩渴者今衇浮身有微熱而渴乃表邪未得全解故用五苓藉桂枝之辛散和肌表以解微熱也术澤二苓之淡渗化水生津以止燥渴也喻昌曰衇浮當用桂枝何以變用五苓耶蓋熱邪得水雖不全解勢必衰其大半所以熱微兼小便不利證成消渴則蓄飲證具故不從單解而從兩解也凡飲水多而小便少謂之消渴裏熱飲盛不可單用桂枝解肌故兼以利水惟五苓有全功耳程應旄曰微熱字對下條發熱字看彼以發熱在表則知犯本未深故邪熱蓄而拒水此曰微熱則表熱犯本已深故熱邪結而耗液所以不惟與水與五苓主治有别而前五苓後五苓主治亦俱有别也中風發熱六七日不解而煩有表裏證渴欲飲水水入則吐者名曰水逆五苓散主之註中風發熱六七日不解而煩者是有表證也渴欲飲水水入則吐者是有裏證也若渴欲飲水水入即消如前條之胃乾少少與飲令胃和則愈今渴欲飲水水入不消上逆而吐故名曰水逆原其所以吐之之由則因邪熱入裏與飲相摶三焦失其蒸化而不能通調水道下輸膀胱以致飲熱相格於上水無去路於下故水入則吐小便必不利也宜五苓散辛甘淡滲之品外解内利多服煖水令其汗出尿通則表裏兩解矣集註方有執曰中風發熱必自汗出六七日不解而煩者汗出過多亡津液而内燥也表以外證未罷言裏以煩渴屬府言欲飲水者燥甚而渴希救故也水入則吐者伏飲内作故外水不得入也蓋飲亦水也以水得水湧溢而為格拒所以謂之水逆與五苓散兩解表裏汗出而愈也喻昌曰傷風證原有汗以其有汗也延至日乆不行解肌之法汗出雖多徒傷津液表終不解轉增煩渴邪入於府飲水則吐名曰水逆乃熱邪挟積飲上逆故外水格而不入也服五苓飲熱湯得汗則表裏俱解是一舉而兩得也五苓散方豬苓十八銖去黑皮茯苓十八銖澤瀉一兩六銖白术十八銖桂半兩右五味為散更於臼中杵之白飲和方寸匕服之日三服多飲煖水汗出愈方解是方也乃太陽邪熱入府水氣不化膀胱表裏藥也一治水逆水入則吐一治消渴水入則消夫膀胱者津液之府氣化則能出矣邪熱入之與水合化為病若水盛於熱則水壅不化水蓄於上故水入則吐乃膀胱之氣化不行致小便不行也若熱盛於水則水為熱灼水耗於上故水入則消乃膀胱之津液告竭致小便無出也二證皆小便不利故均得而主之若小便自利者不可用恐重傷津液以其屬陽明之裏故不可用也由此可知五苓散非治水熱之専劑乃治水熱小便不利之主方也君澤瀉之鹹寒鹹走水府寒勝熱邪佐二苓之淡滲通調水道下輸膀胱則水熱並瀉也用白术之燥濕健脾助土為之隄防以制水也用桂之辛温宣通陽氣蒸化三焦以行水也澤瀉得二苓下降利水之功倍則小便利而水不蓄矣白术藉桂上升通陽之效㨗則氣騰津化渴自止也若發熱不解以桂易桂枝服後多服煖水令汗出愈是知此方不止治停水小便不利之裏而猶解停水發熱之表也加人參名春澤湯其意専在助氣化以生津加茵蔯名茵蔯五苓散治濕熱發黄表裏不實小便不利者無不效也集解程應旄曰太陽為標膀胱為本中風發熱標受邪也六七日不解標邪轉入膀胱矣是謂犯本五苓散與麻黄桂枝二湯雖同為太陽經之藥一則解肌而治表一則利小便而治裏表與本所主各有别矣按此條謂有表裏證者非發熱有汗口乾煩渴水入則消小便自利太陽陽明之表裏證也乃發熱無汗口潤煩渴水入則吐小便不利太陽膀胱之表裏證也此病雖未發明無汗小便不利之證若汗出小便利則渴飲之水得從外越下出必無水逆之證仲景用五苓散多服煖水令汗出愈其意在利水發汗故知必有無汗小便不利之證也太陽病小便利者以飲水多必心下悸小便少者必苦裏急也註太陽初病不欲飲水将傳陽明則欲飲水此其常也今太陽初病即飲水多必其人平素胃燥可知設胃陽不衰則所飲之水亦可以敷布於外作汗而解今飲水多而胃陽不充即使小便利亦必停中焦而為心下悸若更小便少則水停下焦必苦裏急矣集註方有執曰飲水多而心下悸者心為火藏水多則受制也小便少則水停所以裏急也汪琥曰太陽病小便利者是膀胱之府無邪熱也若其人飲水多此熱在上焦心火亢甚小便雖利而渴飲水多則水停犯火必心下悸若其人飲水多而小便少此熱在下焦為太陽邪熱隨經入府水積不行膀胱之裏必苦急也發汗後飲水多必喘以水灌之亦喘註上條未發汗飲水多胃熱津少也此條發汗後飲水多津亡胃乾也而不病心下悸苦裏急者蓋以水不停於中焦下焦而停於上焦所以攻肺必作喘也水灌者以水澆洗也飲水多者必喘是飲冷冷傷於内也以水灌之亦喘者是形寒寒傷於外也均傷肺故俱喘集註魏荔彤曰此申明本條喘急一證有因水而成者蓋渴而飲水多之喘與不渴而灌之亦喘其由雖不同而致病則一也發汗後不可更行桂枝湯汗出而喘無大熱者可與麻黄杏仁甘草石膏湯註太陽病下之後微喘者表未解也當以桂枝加厚朴杏仁湯解太陽肌表而治其喘也太陽病桂枝證醫反下之下利衇促汗出而喘表未解者當以葛根黄連黄芩湯解陽明之肌熱而治其喘也今太陽病發汗後汗出而喘身無大熱而不惡寒者知邪已不在太陽之表且汗出而不惡熱知邪亦不在陽明之裏其所以汗出而喘既無大熱又不惡寒是邪獨在太隂肺經故不可更行桂枝湯可與麻黄杏子甘草石膏湯發散肺邪而汗喘自止矣麻黄杏仁甘草石膏湯方麻黄四兩去莭杏仁五十枚去皮尖甘草二兩炙石膏半觔碎綿裏右四味以水七升先煮麻黄减二升去白沫納諸藥煮取三升去滓温服一升集註柯琴曰石膏為清火之重劑青龍白虎皆賴以建功然用之不當適足以召禍故青龍以無汗煩燥得薑桂以宣衛外之陽白虎以有汗煩渴須粳米以存胃中之液今但内熱而無外寒故不用薑桂喘不在胃而在肺故不需粳米其意重在存隂不慮其亡陽也故於麻黄湯去桂枝之監制取麻黄之専開杏仁之降甘草之和倍石膏之寒除内藴之實熱斯溱溱之汗出而内外之煩熱與喘悉除矣下後不可更行桂枝湯若汗出而喘無大熱者可與麻黄杏仁甘草石膏湯註此詳上條受病兩途同乎一治之法也又有下後身無大熱汗出而喘者知邪亦不在表而在肺故亦不可更行桂枝湯可與麻黄杏仁甘草石膏湯以治肺也彼之汗後喘此之下後喘雖其致病之因不同而其所見之證不異所以從其證不從其因均用此湯亦喘家急則治其標之法也集註方有執曰汗與下雖殊其為反誤致變之喘則一惟其喘一故同歸一治也太陽中風下利嘔逆表解者乃可攻之其人漐漐汗出發作有時頭痛心下痞鞕滿引脇下痛乾嘔短氣汗出不惡寒者此表解裏未和也十棗湯主之按下利之下字當是不字若是下字豈有上嘔下利而用十棗湯峻劑攻之之理乎惟其大便不利痞鞕滿痛始屬裏病小便不利嘔逆短氣始屬飲病乃可攻也發作之作字當是熱字若無熱汗出乃少隂隂邪寒飲真武湯證也且作字與上下句文義皆不相屬註太陽中風表邪也不利嘔逆裏飲也表邪解者乃可攻裏飲也審其人微汗漐漐不輟發熱有時頭痛若仍惡寒是表未解尚不可攻若不惡寒則為表已解矣而更見裏未和之心下痞鞕滿引脇下痛乾嘔短氣水蓄無所從出之急證故徑以十棗湯峻劑直攻水之巢穴而不疑也按傷寒表未解水停心下嘔逆者是寒束於外水氣不得宣越也宜小青龍湯汗而散之中風表未解水停心下而吐者是飲格於中水氣不得輸洩也宜五苓散散而利之此皆表未解不可攻裏之飲證也至如十棗湯與下篇之桂枝去芍藥加白术茯苓湯二方皆治飲家有表裏證者十棗湯治頭痛發熱汗出不惡寒之表已解而有痞鞕滿痛之裏未和故専主攻裏也桂枝去芍藥加白术茯苓湯治頭痛發熱無汗之表未解而兼有心下滿微痛之裏不和故不主攻裏當先解表也然其心下鞕滿痛之微甚亦有别矣集註杜任曰十棗湯惟壯實者宜之不宜輕用方有執曰乃可攻之以上喻人勿妄下早之意漐漐汗出至短氣言證雖有裏猶未可下直至汗出不惡寒方是承上起下言當下以出其治也喻昌曰此證與結胸頗同但結胸者邪結於胸其位髙此在心下及脇其位卑然必表解乃可攻之亦與攻結胸之戒不殊也藥用十棗亦與陷胸湯相倣因傷寒下法多為胃實而設胃實者邪熱内盛不得不用消黄以蕩滌之今證在胸脇而不在胃則蕩滌之藥無所用故取蠲熱逐飲於胸脇之間以為下法張志聰曰頭痛表證也然亦有在裏者如傷寒不大便五六日頭痛有熱者與承氣湯與此莭之汗出不惡寒而頭痛為表解裏有飲用十棗湯則凡遇風寒頭痛表未解之證當審别矣程應旄曰所可惑者頭痛外惟身汗一證表裏難辨汗出發熱惡寒則微有表若汗出發熱不惡寒則祗從不惡寒處認證知表已解裏氣為飲邪摶結不和雖頭痛亦屬裏邪上攻非闗表也魏荔彤曰太陽之邪既入裏宜下矣又有不下胸膈不下腸胃而下心與脇下者較下結胸部位稍卑較下胃實部位又稍髙此下中之又一法也須認明同一下也證不同而法自别蓋太陽陽明之交必辨表裏而施汗下彼之在裏應下乃邪熱挟食物為胃實此之在裏應下乃邪熱挟水飲為飲實二者俱必待表解而後下此大同也十棗湯方芫花熬甘遂大㦸大棗十枚擘右三味等分各别搗為散以水一升半先煮大棗肥者十枚取八合去滓内藥末强人服一錢七羸人服半錢温服之平旦服若下少病不除者明日更服加半錢得快下利後糜粥自養方解仲景治水之方種種不同此其最峻者也凡水氣為患或喘或欬或悸或噎或吐或利病在一處而止此則水邪留結於中心腹脇下痞滿鞕痛三焦升降之氣阻隔難通此時表邪已罷非汗散之法所宜裏飲實盛又非淡渗之品所能勝非選逐水至峻之品以直折之則中氣不支束手待斃矣甘遂芫花大㦸三味皆辛苦氣寒而禀性最毒並舉而用之氣味相濟相須故可直攻水邪之巢穴決其瀆而大下之一舉而患可平也然邪之所湊其氣必虚以毒藥攻邪必傷及脾胃使無冲和甘緩之品為主宰則邪氣盡而大命亦隨之矣然此藥最毒至峻参术所不能君甘草又與之反故選十棗之大而肥者以君之一以顧其脾胃一以緩其峻毒得快利後糜粥自養一以使穀氣内充一以使邪不復作此仲景用毒攻病之法盡美又盡善也昧者惑於甘能中滿之說而不敢用豈知承制之理乎太陽病外證未解不可下也下之為逆欲解外者宜桂枝湯註太陽病外證未解者謂桂枝湯之表證未解也凡表證未解無論已汗未汗雖有可下之證而非在急下之例者均不可下下之為逆也欲解外者仍宜桂枝湯主之集註王肯堂曰但有一毫頭痛惡寒即為表證未解不可下也程應旄曰若下後外證未解者仍當解外有是證用是藥不可以既下而遂謂桂枝湯不中與也汪琥曰下之為逆逆者為病在外而反攻其内於治法為不順也太陽病先發汗不解而復下之衇浮者不愈浮為在外而反下之故令不愈今衇浮故知在外當須解外則愈宜桂枝湯註太陽病先發汗表未解仍宜汗之而復下之治失其宜矣衇浮者不愈蓋以衇浮邪在外而反下之故令不愈也今誤下未成逆衇仍浮故知邪尚在外仍宜桂枝湯解外則愈也集註程應旄曰愈不愈辨之於衇其愈者必其衇不浮而離於表也若衇浮者知尚在表則前此之下自是誤下故令不愈從前之誤不必計較祗據目前目前之證不必計較祗據其衇衇若浮知尚在外雖日乆尚須解外則愈有是衇用是藥亦不以既下而遂以桂枝湯為不中與也本發汗而復下之此為逆也若先發汗治不為逆本先下之而反汗之為逆若先下之治不為逆註立治逆之法不外乎表裏而表裏之治不外乎汗下病有表裏證者當審其汗下何先先後得宜為順失宜為逆若表急於裏本應先汗而反下之此為逆也若先汗而後下治不為逆也若裏急於表本應先下而反汗之此為逆也若先下而後汗治不為逆也集註程知曰言汗下有先後緩急不得倒行逆施汪琥曰治傷寒之法表證急者即宜汗裏證急者即宜下不可拘拘於先汗而後下也汗下得宜治不為逆太陽病下之其衇促不結胸者此為欲解也衇浮者必結胸衇𦂳者必咽痛衇弦者必兩脇拘急衇細數者頭痛未止衇沉𦂳者必欲嘔衇沉滑者恊熱利衇浮滑者必下血按衇促當是衇浮始與不結胸為欲解之文義相屬衇浮當是衇促始與論中結胸胸滿同義衇𦂳當是衇細數衇細數當是衇𦂳始合論中二經本衇衇浮滑當是衇數滑浮滑是論中白虎湯證之衇數滑是論中下膿血之衇細玩諸篇自知註病在太陽誤下為變不同者皆因人之藏氣不一各從所入而化故不同也誤下邪陷當作結胸反不結胸其衇浮此裏和而不受邪邪仍在表為欲解也若衇促者為陽結實邪之衇故必結胸也衇細數少隂邪熱之衇咽痛少隂邪熱之證誤下邪陷少隂法當從少隂治也衇弦少陽之衇兩脇拘急少陽之證誤下邪陷少陽法當從少陽治也衇𦂳太陽衇頭痛太陽證誤下邪仍在表法當從太陽治也衇沉𦂳寒邪入裏之衇欲嘔胃陽格拒之證有表誤下邪陷在胃法當從陽明治也衇沉滑宿食衇有表誤下恊熱入裏下利法當從恊熱下利治也衇數滑積熱衇有表誤下邪陷入隂傷榮下血法當從下膿血治也按衇促固陽衇也若促而有力為實則為結胸實邪之診若促而無力為虚則為胸滿虚邪之診故論中有衇促結胸頭汗小潮熱者用陷胸湯攻之衇促胸滿汗出微惡寒者用桂枝去芍藥加附子湯温之觀此促衇虚實治法則可以類推矣按咽痛少隂寒熱俱有之證也咽乾腫痛者為熱不乾不腫而痛者為寒故少隂論中有甘桔湯通衇四逆湯二治法也集註方有執曰凡在太陽皆表證也誤下則變證雜出而不可以一途拘之程知曰不宜下而下之諸變不可勝數此之謂也今咽痛脇急欲嘔是寒邪入裏之變頭痛熱利下血是風邪入裏之變所以然者衇浮滑數為陽沉弦𦂳細為隂也程應旄曰據衇見證各著一必字見勢所必然考其源頭總在太陽病下之而来故雖有已成壊病未成壊病之分但宜以活法治之不得據衇治衇據證治證也太陽病二三日不能卧但欲起心下必結衇微弱者此本有寒分也反下之若利止必作結胸未止者四日復下之此作恊熱利也按四日復下之之字當是利字上文利未止豈有復下之理乎細玩自知是必傳寫之誤註太陽病謂頭項强痛而惡寒也二三日見不得卧但欲起之證謂已傳陽明也心下胃之分也必結謂胃分必有結也若衇實大乃胃分有熱而結也則當下之今衇微弱是胃分有寒而結也法不當下不當下而下之謂之反下二三日正當解太陽陽明之表反下之表熱乘虚入裏必自利設利自止是其人胃實而同燥化必作結胸矣今利未止四日仍復下利是其人胃虚而同濕化故必作恊熱利也集註程知曰此表證誤下有結胸熱利之變不可不慎也衇既微弱則是寒結心下法當温散醫見心下結而下之使利是治之反也汪琥曰太陽病二三日不卧欲起心下熱結似乎可下然衇微弱其人本有寒分豈可下乎太陽病外證未除而數下之遂恊熱而利利下不止心下痞鞕表裏不解者桂枝人參湯主之註此承上條衇微弱恊熱利互詳其證以明其治也外證未除謂太陽病未除而數下之是下非一次也裏因數下而虚遂恊表熱而利利下不止裏虚不固也心下痞鞕裏虚而邪結也外證既未除是表不解也故用桂枝以解表利下痞鞕裏因下虚而從寒化也其衇必如上文之微弱故用參术薑草以温裏此温補中兩解表裏法也若其衇有力者又當從甘草瀉心湯之法矣集註喻昌曰誤下而致裏虚外熱乘之變而為利不止者裏虚不守也痞鞕者正虚邪實中成滯礙痞塞而不通也以表未除故用桂枝以解之以裏適虚故用理中以和之此方即理中加桂枝而易其名乃治虚痞下利之法也李中梓曰經云桂枝證醫反下之利遂不止與葛根黄芩黄連湯此則又與桂枝人参湯何用藥有温凉之異耶蓋彼證但曰下之此則曰數下之彼證但曰利下此則曰利不止合兩論味之自有虚實之分矣程知曰表證誤下下利不止喘而汗出者治以葛根芩連心下痞鞕者治以桂枝參术一救其表邪入裏之實熱一救其表邪入裏之虚寒皆表裏兩解法也程應旄曰恊熱而利向来俱作陽邪陷於下焦果爾安得用理中耶蓋不知利有寒熱二證也桂枝人參湯方桂枝四兩甘草四兩炙白术三兩人參三兩乾薑三兩右五味以水九升先煮四味取五升内桂更煮取三升去滓温服一升日再服夜一服太陽病桂枝證醫反下之利遂不止衇促者表未解也喘而汗出者葛根黄芩黄連湯主之註此承上條又言恊熱利之衇促者以别其治也太陽病桂枝證宜以桂枝解肌而醫反下之利遂不止者是誤下遂恊表熱陷入而利不止也若表未解而衇緩無力即有下利而喘之裏證法當從桂枝人參湯以治利或從桂枝加杏仁厚朴湯以治喘矣今下利不止衇促有力汗出而喘表雖未解而不惡寒是熱已陷陽明即有桂枝之表亦當從葛根黄芩黄連湯主治也方中四倍葛根以為君芩連甘草為之佐其意専解陽明之肌表兼清胃中之裏熱此清解中兼解表裏法也若衇沉遲或衇微弱則為裏寒且虚又當用理中湯加桂枝矣於此可見上條之恊熱利利不止心下痞鞕表裏不解者衇不微弱必沉遲也按恊熱利二證以衇之隂陽分虚實主治固當矣然不可不辨其下利之黏穢鴨溏小便或白或赤衇之有力無力也集註成無已曰病有汗出而喘者謂自汗出而喘也是邪氣外甚所致若喘而汗出者謂因喘而汗出也是裏熱氣逆所致故與葛根黄芩黄連湯散表邪除裏熱也方有執曰利與上條同而上條用理中者以痞鞕衇弱屬寒也此用芩連者以喘汗衇促屬熱也喻昌曰太陽病原無下法當用桂枝解外醫反下之則邪熱之在太陽者未傳陽明之表已入陽明之裏所以其衇促急其汗外越其熱上奔則喘下奔則泄故舎桂枝而用葛根以専主陽明之表加芩連以清裏熱則不治喘而喘止不治利而利止此又太陽陽明兩解表裏之變法也汪琥曰誤下虚其腸胃為熱所乘遂利不止此非腸胃真虚證乃胃有邪熱下通於腸而作泄也衇促者衇来數時一上復来也此為陽獨盛之衇也衇促見陽知表未解此表乃陽明經病非猶太陽桂枝之表證也喘而汗出者亦陽明胃府裏熱氣逆所致非太陽風邪氣壅之喘亦非桂枝湯汗出之證也故當解陽明表邪清胃府裏熱也葛根黄芩黄連湯方葛根半觔黄芩三兩黄連三兩甘草二兩炙右四味以水八升先煮葛根减二升内諸藥煮取二升去滓分温再服集解柯琴曰外熱不除是表不解下利不止是裏未和誤下致利病因則同一則衇微弱心下痞鞕是衇不足而證有餘也一則衇促而喘反汗自出是衇有餘而證不足也表裏虚實當從衇辨况弱衇見於數下後則痞鞕為虚更可知也故用理中之辛甘温補止下利化痞鞕又加桂枝以解表先煮四味後内桂枝和中之力饒而解肌之氣銳是於兩解中寓權宜法也桂枝證本衇緩誤下後而反促陽氣内盛邪蒸於外故汗出也熱暴於内火逆上衝故為喘也暴注下廹故為利也故君清輕升發之葛根以解肌而止利佐苦寒清肅之芩連以止汗而定喘又加甘草以和中先煮葛根後内諸藥解肌之力純而清中之氣銳又與補中逐邪者殊法矣太陽病下之後衇促胸滿者桂枝去芍藥湯主之若微惡寒者去芍藥方中加附子湯主之按若微惡寒者當是汗出微惡寒方合若無汗出二字乃表未解無取乎加附子也註太陽病表未解而下之胸實邪陷則為胸滿氣上衝咽喉不得息𤓰蒂散證也胸虚邪陷則為氣上衝桂枝湯證也今下之後邪陷胸中胸滿衇促似乎胸實而無衝喉不得息之證似乎胸虚又見胸滿之證故不用𤓰蒂散以治實亦不用桂枝湯以治虚惟用桂枝之甘辛以和太陽之表去芍藥之酸収以避胸中之滿若汗出微惡寒去芍藥方中加附子主之者以防亡陽之變也按上條衇促喘而汗出不惡寒下利不止云屬實熱此條衇促胸滿汗出微惡寒不喘不下利反屬虚寒者何也上條是裏熱蒸越之汗故汗出不惡寒陽實也喘而下利皆為熱也此條乃表陽不固之汗故汗出微惡寒陽虚也即不喘利亦為寒也要知仲景立法每在極微處設辨恐人微處易忽也今以微惡寒發其義却不在汗出上辨寒熱而在汗出惡寒不惡寒上辨寒熱不在衇促上辨寒熱而在衇促之有力無力辨寒熱於此又可知不惟在胸滿上辨虚實而當在胸滿之時滿時不滿常常滿而不减上辨虚實矣集註喻昌曰此條之微惡寒合上條觀之則衇促胸滿喘而汗出之内原伏有虚陽欲脫之機故仲景於此條特以微惡寒三字發其義可見陽虚則惡寒矣又可見汗不出之惡寒即非陽虚矣程應旄曰有陽盛而見促衇亦有陽虚而見促衇者當辨之於有力無力仍須辨之於外證也沈明宗曰誤下擾亂隂陽之氣則衇促邪入胸膈幾成結胸但結滿而未痛耳故以桂枝湯單提胸膈之邪使從表解去芍藥者惡其酸収引邪内入故也若衇促胸滿而微惡寒廼虚而跼踖陽氣欲脫又非陽實之比所以加附子固䕶真陽也然傷風下後之惡寒與未下之惡寒逈然有别而汗後之惡寒與未汗之惡寒亦殊桂枝去芍藥湯方於桂枝湯内去芍藥餘依前法桂枝去芍藥加附子湯方於桂枝湯方内去芍藥加附子一枚炮去皮破八片餘依前法太陽病下之微喘者表未解故也桂枝加厚朴杏子湯主之喘家作桂枝湯加厚朴杏子佳註太陽病當汗而反下之下利衇促喘而汗出不惡寒者乃邪陷於裏熱在陽明葛根黄芩黄連湯證也今太陽病當汗而反下之不下利而微喘是邪陷於胸未入於胃表仍未解也故仍用桂枝湯以解肌表加厚朴杏子以降逆定喘也喘家謂素有喘病之人遇中風而喘者桂枝湯皆宜用之加厚朴杏子為佳也集註方有執曰喘者氣逆於上故呼吸不順而聲息不利也微者聲息緩不似大喘之氣急也以表尚在不解其表則喘不可定故用桂枝解表加厚朴利氣杏仁下氣所以為定喘之要藥喻昌曰此風邪誤下作喘治法之大要其寒邪誤下作喘當用麻黄杏仁石膏甘草即此可推又曰微喘表未解則是表邪因誤下上逆與虚證不同程應旄曰喘之一證有表有裏不可不辨下後汗出而喘其喘必盛屬裏熱壅逆火炎故也下後微喘汗必不大出屬表邪閉遏氣逆故也仍用桂枝湯解表内加朴杏以下逆氣魏荔彤曰凡病人素有喘證每感外邪勢必作喘故謂之喘家桂枝加厚朴杏仁湯方於桂枝湯方内加厚朴二兩杏仁五十個餘依桂枝湯方按戴原禮曰太陽病有喘咳無汗喘者宜麻杏石甘湯有汗喘者宜桂枝加厚朴杏仁湯無汗咳者宜小青龍湯少陽病無喘有咳咳者宜小柴胡湯加五味乾薑陽明病無咳有喘内實喘者宜大承氣湯下利者宜葛根黄芩黄連湯三隂惟少隂有喘咳喘者宜四逆湯加五味乾薑咳者隂邪下利宜真武湯加五味乾薑陽邪下利宜豬苓湯然喘皆危候也太陽病下之後其氣上衝者可與桂枝湯方用前法若不上衝者不可與之註太陽病表未解而下之裏實者邪陷則為結胸大陷胸湯證也裏虚者邪陷則為下利桂枝人參湯證也胸實者邪陷則為胸中痞鞕氣上衝咽喉不得息𤓰蒂散證也今胸虚邪陷於胸故但為氣上衝是表尚未罷然無壅滿不得息痞鞕之證故不可吐下仍當解表可與桂枝湯如法汗之使陷胸之邪不受外束胸中之氣得以四達自不致内壅而上衝矣若不上衝者不可與也集註方有執曰氣上衝者陽主氣而上升風屬陽邪下後入裏乘虚而上衝也若不上衝則非陽邪可知故不可與病如桂枝證頭不痛項不强寸衇微浮胸中痞鞕氣上衝咽喉不得息者此為胸有寒也當吐之宜𤓰蒂散註病如桂枝證乃頭項强痛發熱汗出惡風衇浮緩也今頭不痛項不强是桂枝證不悉具也寸衇微浮是邪去表未逺已離其表也胸中痞鞕氣上衝喉不得息是邪入裏未深而在胸中必胸中素有寒飲之所致也寒飲在胸不在肌腠解肌之法無可用也痞鞕在胸而不在心下攻裏之法亦無所施惟有髙者越之一法使胸中寒飲一涌而出故宜吐之以𤓰蒂散也集註程應旄曰痞鞕一證因吐下者為虚不因吐下者為實實邪痰飲填塞心胸中下二焦為之阻絶自不得不從上焦為出路所謂在上者因而越之是也汪琥曰傷寒一病吐法不可不講所以仲景以此條特出之太陽上篇者以吐不宜遲與太陽汗證之法相等當於二三日間審其證而用此法也沈眀宗曰素有痰飲内積稍渉風寒引動其痰即外如桂枝湯證但無頭痛項强知非風邪中表矣張錫駒曰氣上衝咽喉不得息者邪挟寒飲從太陽之氣而上越也𤓰蒂散方𤓰蒂一分熬黄赤小豆一分右二味各别搗篩為散已合治之取一錢匕以香豉一合用熱湯七合煮作稀糜去滓取汁和散温頓服之不吐者少少加服得快吐乃止諸亡血虚家不可與𤓰蒂散方解胸中者清陽之府諸邪入胸府阻遏陽氣不得宣達以致胸滿痞鞕熱氣上衝燥渴心煩嗢嗢欲吐衇數促者此熱鬱結也胸滿痞鞕氣上衝咽喉不得息手足寒冷欲吐不能吐衇遲𦂳者此寒鬱結也凡胸中寒熱與氣與飲鬱結為病諒非汗下之法所能治必得酸苦湧泄之品因而越之上焦得通陽氣得復痞鞕可消胸中可和也𤓰蒂極苦赤豆味酸相須相益能疏胸中實邪為吐劑中第一品也而佐香豉汁合服者藉榖氣以保胃氣也服之不吐少少加服得快吐即止者恐傷胸中元氣也此方奏功之㨗勝於汗下所謂汗吐下三大法也今人不知仲景子和之精義置之不用可勝惜哉然諸亡血虚家胸中氣液已虧不可輕與特為申禁病發於陽而反下之熱入因作結胸病發於隂而反下之因作痞所以成結胸者以下之太早故也註此總釋結胸與痞鞕之因也中風陽邪故曰病發於陽也不汗而反下之熱邪乘虚陷入因作結胸傷寒隂邪故曰病發於隂也不汗而反下之熱邪乘虚陷入因作痞鞕所以成結胸與痞鞕者以表未解而下之太早故也病發於隂不言熱入者省文耳然病發於陽而誤下者未嘗無痞鞕病發於隂而誤下之亦時成結胸良由人之氣體不同或從實化或從虚化也集註張兼善曰風邪入裏則結胸寒邪入裏則為痞然此皆太陽病之所由来非别隂證陽證也太陽病衇浮而動數浮則為風數則為熱動則為痛數則為虚頭痛發熱微盗汗出而反惡寒者表未解也醫反下之動數變遲膈内拒痛胃中空虚客氣動膈短氣躁煩心中懊憹陽氣内陷心下因鞕則為結胸大陷胸湯主之若不結胸但頭汗出餘處無汗躋頸而還小便不利身必發黄按數則為虚句疑是衍文註太陽病衇浮而動數浮則為風邪衇也數則為熱邪衇也動則為諸痛衇也頭痛發熱太陽證也熱蒸於陽陽虚則自汗出熱蒸於隂隂虚則盗汗出隂虚當惡熱今反惡寒故知此非隂虚之盗汗乃表未解之盗汗微微而出也表未解當解表醫反下之遂使動數之熱衇變為寒遲蓋動數乃表邪欲傳因下而逆於膈中故不傳而衇亦變也表客陽邪乘胃空虚陷入胸膈而拒痛短氣不能布息煩躁心中懊憹心下因鞕徑從實化而為結胸矣法當以大陷胸湯主之若不從實化不成結胸但頭汗出至頸餘處無汗則熱不得越也小便不利則濕不得瀉也熱濕合化故身必發黄也集註成無已曰動數變遲而浮衇獨不變者以邪結胸中上焦陽分衇不得而沉也朱震亨曰太陽病表未解而攻裏裏已虚矣雖見浮而動數之陽衇一經誤下則必變為遲隂之衇矣胃中空虚短氣躁煩虚之甚矣借曰陽氣内陷心中因鞕而可迅攻之乎大陷胸之力不緩於承氣下而又下寜不畏其重虚耶即陽病實邪下後若胃中空虚客氣動膈心中懊憹者亦以梔子豉湯吐胸中之邪可也况太陽誤下後明有虚證乎按朱震亨所論治以梔子豉湯吐之亦是未成結胸從胸虚有熱而化者宜也若從胸虚有寒而化者不論已成未成結胸則又當從活人書温補法矣不可混施也方有執曰太陽之衇本浮動數者亦傳也太陽本自汗而言微盜汗本惡寒而言反惡寒者稽乆而然也膈心胸之間也拒格拒也言膈氣與邪氣相格拒而為痛也客氣邪氣也短氣促氣不能布息也懊憹心為邪亂而不寜也陽氣客氣之别名也以本外邪故曰客氣以邪本風故曰陽氣以裏虚因而陷入故曰内陷自若不結胸句至末以變之輕者而言也大陷胸湯方大黄六兩去皮芒硝一升甘遂一錢另碾右三味以水六升先煮大黄取二升去滓内芒硝煮一兩沸内甘遂末温服一升得快利止後服集解方有執曰上焦有髙邪必陷下以平之故曰陷胸湯平邪蕩寇將軍之職也以大黄為君鹹能軟堅以芒硝為臣徹上徹下破結逐水以甘遂為佐惟大實者乃為合法如挟虚或衇浮不可輕試太陽病重發汗而復下之不大便五六日舌上燥而渴日晡所小有潮熱從心下至少腹鞕滿而痛不可近者大陷胸湯主之註此承上條互發其義以詳其證治也太陽病重發汗而復下之津液傷矣不大便五六日胃府燥矣舌上燥渴胃中乾也日晡潮熱胃熱盛也從心下至少腹鞕滿而痛不可近者謂胸腹之中上下俱鞕滿結實大痛手不可近故以大陷胸湯主之無疑也集註内臺方議曰日晡所作日晡所發方有執曰此明結胸有陽明内實疑似之辨晡日加申時也小有微覺有也盖不大便燥渴日晡潮熱從心下至少腹鞕滿而痛皆似陽明内熱惟小有潮熱不似陽明大熱之甚所以陽明必以胃家實為主而凡有一毫太陽證在皆不得入陽明例者亦以此也程知曰太陽結胸兼陽明内實故用大陷胸湯由胸脅以及腸胃皆可蕩滌無餘若但下腸胃結熱而遺胸上痰飲則非法矣吴人駒曰一腹之中上下邪氣皆盛證之全實者其衇常沉伏不可生疑畏惟下之而衇自漸出也小結胸病正在心下按之則痛衇浮滑者小陷胸湯主之註大結胸邪重熱深病從心下至少腹鞕滿痛不可近衇沉實故宜大陷胸湯以攻其結瀉其熱也小結胸邪淺熱輕病正在心下鞕滿按之則痛不按不痛衇浮滑故用小陷胸湯以開其結滌其熱也集註程應旄曰按陷胸條曰心下痛按之石鞕又曰心下滿而鞕痛此曰病正在心下則知結胸不拘在心下與胸上祗在痛不痛上分别故痞證亦有心下鞕者但不痛耳張錫駒曰湯有大小之别證有輕重之殊今人多以小陷胸湯治大結胸證皆致不救遂諉結胸為不可治之證不知結胸之不可治祗一二節餘皆可治者苟不體認經旨必致臨時推諉誤人性命也魏荔彤曰小結胸無實熱之邪但微熱而挟痰飲為患故雖結胸而不能髙踞胸巔但正在心下而已不能實力作痛惟按之痛而已診之不沉而深惟浮而輕淺而已不能作石鞕惟虚而結阻而已所以大陷胸湯不應用而另設小陷胸湯髙下堅軟輕重沉浮之間病機治法昭然已又云痞隂邪結胸陽邪然於陽邪中又有大小之分學者審之於凡寒熱雜合之證無大實大熱俱宜斟酌下法勿孟浪也小陷胸湯方黄連一兩半夏半觔洗栝蔞實一枚大者右三味以水六升先煮栝蔞取三升去滓内諸藥煮取二升去滓分温三服方解黄連滌熱半夏導飲栝蔞潤燥下行合之以滌胸膈痰熱開胸膈氣結攻雖不峻亦能突圍而入故名小陷胸湯分温三服乃緩以治上之法也傷寒六七日結胸熱實衇沉而𦂳心下痛按之石鞕者大陷胸湯主之註傷寒表不解誤下成痞此其常也傷寒或有因誤下而成結胸者乃其變也今傷寒六七日結胸不因誤下而成此熱實之證若衇沉𦂳裏實衇也心下痛按之石鞕裏實證也此為衇病皆實故以大陷胸湯主之也集註喻昌曰熱實二字形容結胸之状甚明見邪熱填實於胸而不散漫也浮𦂳主傷寒無汗沉𦂳主傷寒結胸此與中風之陽邪結胸逈别所以不言浮也又曰陽邪誤下成結胸隂邪誤下成痞然中風間有痞證傷寒間有結胸證又不可不知程應旄曰雖曰陽邪内陷然隂陽二字從虚實寒熱上區别非從中風傷寒上區别表熱盛實轉入胃府則為陽明證表熱盛實不轉入胃府而陷入於膈則為結胸證故不必誤下始成也不因下而成結胸者必其人胸有燥邪以失汗而表邪合之遂成裏實觀此條曰傷寒六七日又曰衇沉而𦂳則可知矣汪琥曰或問衇沉𦂳焉知非寒實結胸答曰胸中者陽氣之所聚也邪熱當胸而結直至心下石鞕且痛則衇不但沉𦂳甚至有伏而不見者烏可以衇沉𦂳為非熱耶大抵辨結胸之法但當憑證最為有凖寒實結胸無熱證者與三物小陷胸湯白散亦可服按無熱證之下與三物小陷胸湯當是三物白散小陷胸湯四字必是傳寫之誤桔梗貝母巴豆三物其色皆白有三物白散之義温而能攻與寒實之理相屬小陷胸湯乃栝蔞黄連皆性寒之品豈可以治寒實結胸之證乎亦可服三字亦衍文也註結胸證身無大熱口不燥渴則為無熱實證乃寒實也與三物白散然此證衇必當沉𦂳若衇沉遲或證見三隂則又非寒實結胸可比當以枳實理中湯治之矣集註王肯堂曰熱實結胸及寒實結胸活人書不拘寒熱但用陷胸湯不瘥者用枳實理中丸即應手而愈方有執曰寒以飲言飲本寒也又得水寒兩寒摶結而實於胸中故謂無熱證也程知曰結胸有大小之别寒熱之異不得㮣用硝黄也鄭重光曰水寒結實在胸則心陽被據自非細故用三物白散下寒而破結皆不得已之兵也三物白散方桔梗三分巴豆一分去皮心熬黒研如脂貝母三分右件二味為末内巴豆更於臼中杵之以白飲和服强人半錢匕羸者減之病在膈上必吐在膈下必利不利進熱粥一盃利過不止進冷粥一盃方解是方也治寒實水結胸證極峻之藥也君以巴豆極辛極烈攻寒逐水斬闗奪門所到之處無不破也佐以貝母開胸之結使以桔梗為之舟楫載巴豆搜逐胸邪悉盡無餘膈上者必吐膈下者必利然惟知任毒以攻邪不量强羸鮮能善其後也故羸者减之不利進熱粥利過進冷粥盖巴豆性熱得熱則行得冷則止不用水而用粥者藉穀氣以保胃也傷寒十餘日熱結在裏復徃来寒熱者與大柴胡湯但結胸無大熱者此為水結在胸脇也但頭微汗出者大陷胸湯主之註傷寒十餘日熱結在裏若胸脇滿鞕者此結胸也今不滿鞕復徃来寒熱者乃少陽表裏病非結胸也當與大柴胡湯兩解之但結胸證亦有水結者水結胸不但表無大熱裏亦無大熱也有結胸狀頭微汗出者此水停於胸為熱氣上蒸使然也故曰水結在胸脇也亦以大陷胸湯主之飲熱並攻也集註方有執曰水即飲也以不實鞕故曰水結胸脇亦裏也以熱結不髙故曰在裏程知曰此言熱結於裏兼少陽者則不宜陷胸水結於胸者雖無大熱猶宜大陷胸也程應旄曰大柴胡與大陷胸皆能破結大柴胡之破結使表分無留邪大陷胸之破結使裏分無留邪林瀾曰此言水結胸之與熱結在裏不同也十餘日邪深入府之時然熱結在裏而猶有半表半裏之邪作徃来寒熱者必以大柴胡兩解之若但胸脇結滿初無大熱收斂入内者此亦不得為大柴胡證必水結胸脇也何以知之水結胸者頭汗出今但頭微汗為水結胸明矣與大陷胸湯結胸者項亦强如柔痙狀下之則和宜大陷胸丸註結胸從心上至少腹鞕滿痛不可近則其勢甚於下者治下宜急攻之以大陷胸湯結胸從胸上滿鞕項强如柔痙狀則其熱甚於上者治上宜緩攻之以大陷胸丸直攻胸肺之邪煮服倍蜜峻治緩行下而和之以其病勢緩急之形既殊湯丸之製亦異也故知此項强乃結胸之項强下之則和非柔痙之項强也集註成無已曰項强者為邪結胸中胸膈結滿但能仰而不能俯是項强也程知曰項强如柔痙者胸中邪氣𦂳實項勢常昻有似柔痙之狀然痙病身手俱張此但項强原非痙也借此以驗胸邪十分𦂳逼耳汪琥曰下之則和者言邪實去胸中和而項自舒之意若不云如柔痙恐醫人認以為太陽經風寒之邪未解反疑其當用發汗之藥殊不知項雖强表證已解裏證甚急治法宜下也大陷胸丸方大黄半觔葶藶子半升熬芒硝半升杏仁半升去皮尖熬黑右四味𢷬篩二味内杏仁芒硝合研如脂和散取如彈丸一枚别𢷬甘遂末一錢匕白蜜二合水二升煮取一升温頓服之一宿乃下如不下更服取下為效禁如藥法結胸證其衇浮大者不可下下之則死註結胸證若衇大是為胃實知結熱已實乃可下下之則愈今其衇浮大是尚在表知熱結未實故不可下若誤下之未盡之表邪復乘虚入裏誤而又誤結而又結病熱彌深正氣愈虚則死矣集註張兼善曰結胸為可下之證若衇浮大心下雖結表邪尚多下之重虚其裏外邪復聚則死矣程知曰結胸亦有不可下者宜審其衇以施治也結胸為邪結上焦之分得寸衇浮闗衇沉或沉𦂳則為在裏可下也若衇浮大則邪猶在表下之是令其結而又結也故死結胸證悉具煩躁者亦死註結胸證悉具謂鞕滿而痛結在膈之上下也悉具者謂胸之下少腹之上左右兩脇無不鞕滿而痛也較之大結胸為尤甚此時宜急下之或有生者若復遷延必至邪勝正負形氣相離煩躁不寜下亦死不下亦死矣集註方有執曰結胸證全具已主死矣而更加以煩躁即不再下亦主死也程應旄曰結胸證妄下不可失下亦不可總在適當其宜則去邪即所以安正也魏荔彤曰此條乃承上條衇見浮大而言必結胸證具衇兼見浮大而加以煩躁方可卜其死不然煩躁亦結胸證中之一也何遽云死耶問曰病有結胸有藏結其狀何如答曰按之痛寸衇浮闗衇沉名曰結胸也何謂蔵結答曰如結胸狀飲食如故時時下利寸衇浮闗衇小細沉𦂳名曰蔵結舌上白胎滑者難治註邪結三陽名曰結胸邪結三隂名曰蔵結二者皆下後邪氣乘虚入裏所致而其衇與證之狀則不同其鞕滿而按之痛結胸證也寸衇浮闗衇沉結胸衇也寸浮主胸主表闗沉主胃主裏是知其邪由胸表陷入胃裏而結也如結胸狀飲食如故時時下利蔵結證也寸衇浮闗衇細小沉𦂳蔵結衇也細小沉𦂳主蔵結寒痛是知其邪由胸表陷入蔵裏而結也蔵結雖鞕滿而痛如結胸狀然結胸病屬裏壅塞必不能飲食蔵結病屬裏空虚故飲食如故結胸屬實熱故鞕痛不大便而衇沉石蔵結屬虚寒故鞕痛下利而衇細𦂳也舌上白胎滑者胸中無熱可知蔵結隂邪得之為順尚可以理中軰温之結胸陽邪得之為逆不堪攻下故難治也集註成無已曰氣宜通也以塞故痛邪結陽分則隂氣不得下通邪結隂分則陽氣不得上通故知二者皆按之痛鞕也方有執曰此設問答以明結胸藏結之同異藏結之時時下利者隂邪結於隂藏而寒甚也以寒甚故衇小細𦂳此其所以不同也蓋結胸以陽邪結於陽藏結以隂邪結於隂故也汪琥曰結胸證其人本胃中有飲食下之太早則食去不盡外邪反入結於胸中以故按之則痛不能飲食藏結證其人胃中本無飲食下之太過則蔵虚邪入與寒結於隂分所以狀如結胸按之不痛能飲食時下利也魏荔彤曰人知此條為辨結胸非指藏結而論不知正謂藏結與痞有相類而與結胸實有不同蓋結胸陽邪也痞與蔵結隂邪也痞則尚有陽浮於上藏結則上下俱無陽是皆誤下誤吐之過也按此條舌上白胎滑者難治句前人舊註皆單指藏結而言未見明晰誤人不少蓋舌胎白滑即結胸證具亦是假實舌胎乾黄雖藏結證具每伏真熱藏結隂邪白滑為順尚可温散結胸陽邪見此為逆不堪攻下故為難治由此可知著書立論必須躬親體驗真知灼見方有濟於用若徒就紙上陳言牽强附㑹又何異按圖索驥耶病脇下素有痞連在臍旁痛引少腹入隂筋者此名蔵結死註病藏結之人若脇下素有痞連在臍旁新舊病合痛引少腹入隂筋者其邪又進厥隂乃屬藏結之死證也集註程知曰宿結之邪與新結之邪交結而不解痞連臍旁脾藏結也痛引少腹腎藏結也自脇入隂筋肝藏結也三隂之蔵俱結矣故主死藏結無陽證不徃来寒熱其人反静舌上胎滑者不可攻也註藏結無三陽證不發熱無太陽也不徃来寒熱無少陽也其人反静無陽明也舌胎滑白胸中有寒故可温不可攻也集註方有執曰胎滑本丹田有熱胸中有寒而成然丹田隂也胸中陽也熱反在隂而寒反在陽所以為不可攻也程知曰經於蔵結白胎滑者祗言難治未嘗言不可治也祗言蔵結無熱舌胎滑者不可攻未嘗言蔵結有熱舌胎不滑者亦不可攻也意者丹田有熱胸中有寒之證必有和解其熱温散其寒之法俾内邪潜消外邪漸解者斯則良工之苦心乎病在陽應以汗解之反以冷水潠之若灌之其熱被却不得去彌更益煩肉上粟起意欲飲水反不渴者服文蛤散若不差者與五苓散身熱皮粟不解欲引衣自覆者若水以潠之洗之益令熱被却不得出當汗而不汗則煩假令汗出已腹中痛與芍藥三兩如上法註病在陽謂病發於陽而身熱也此應以汗解之而反以冷水潠之灌之則身熱雖被刼而暫却然終不得去故熱煩益甚也水寒外束膚熱乍凝故肉生膚粟熱入不深故意欲飲水反不甚渴也故以文蛤散内疏膚熱若不差與五苓散外解水寒則皮粟身熱當解矣若不解且惡寒引衣自覆是尚有表也當以桂枝湯汗解之假令服桂枝湯汗已出熱粟俱解而腹中増痛又為表已和裏未調也宜與桂枝湯倍加芍藥調裏以和其表若渴欲飲水而不腹痛則不湏調太隂裏而仍當調太陽府矣宜仍取乎五苓也文蛤散方文蛤五兩右一味為散沸湯和一錢匕服湯用五合按文蛤即五倍子也音切强羣養切惡汚去聲中音衆嗇音色淅音錫翕音吸㕮音父咀音苴去上聲滓音笫歠與啜同覆芳救切漐音蟄差與瘥同諧音鞋噤渠飲切劇音屐傳音囀為去聲識與誌同乾音干散上聲和去聲悸音季灌音貫更去聲痞音否鞕音硬頸音景羸音雷養上聲糜音迷咽音嚥數音朔懊影考切憹音農燥音掃晡布胡切痙音涇潠心艮切御纂醫宗金鑑卷一欽定四庫全書御纂醫宗金鑑卷一訂正仲景全書傷寒論註傷寒論後漢張機所著發眀内經奥旨者也並不引古經一語皆出心裁理無不該法無不備蓋古經皆有法無方自此始有法有方啓萬世之法程誠醫門之聖書但世逺殘闕多編次傳寫之誤今博集諸家註釋採其精粹正其錯譌刪其駁雜補其闕漏發其餘藴於以行之天下則大法微言益昭諸萬世矣辨太陽病衇證并治上篇太陽主表為一身之外藩總六經而統榮衛凡外因百病之襲人必先於表表氣壯則衛固榮守邪由何入經曰雖有大風苛毒勿之能害是也若表氣虚則榮衛之氣不能禦外故邪得而乘之經曰虚邪不能獨傷人必因身形之虚而後客之也衛陽也榮隂也風陽邪也寒隂邪也邪之害人各從其類故中風則衛受之傷寒則榮受之衛分受邪則有汗為虚邪桂枝證也榮分受邪則無汗為實邪麻黄證也榮衛俱受邪均無汗皆為實邪大青龍證也大綱三法用之得當其邪立解用違其法變病百出縁風為百病之長故以風中衛列為上篇寒傷榮與風寒兩傷列為中下二篇其條目俱詳於本篇之下俾讀者開卷了然有所遵循也太陽之為病衇浮頭項强痛而惡寒註太陽膀胱經也太陽之為病謂太陽膀胱經之所為病也太陽主表表統榮衛風邪中衛寒邪傷榮均表病也衇浮表病衇也頭項强痛惡寒表病證也太陽經衇上額交巔入絡腦還出别下項連風府故邪客其經必令頭項强痛也惡寒者因風寒所傷故惡之也首揭此條為太陽病之提綱凡上中下三篇内稱太陽病者皆指此衇證而言也按榮衛二者皆胃中後天之穀氣所生其氣之清者為榮濁者為衛衛即氣中之慓悍者也營即血中之精粹者也以其定位之體而言則曰氣血以其流行之用而言則曰營衛營行衇中故屬於隂也衛行衇外故屬於陽也然營衛之所以流行者皆本乎腎中先天之一氣故又皆以氣言曰營氣衛氣也集註滑夀曰衇在肉上行主表也方有執曰表即皮膚榮衛麗焉故衇見尺寸俱浮知病在太陽表也項頸後也惡寒者該風而言也風寒初襲而鬱於表不能再勝風寒之外忤故畏惡之程應旄曰太陽經之見證莫確於頭痛惡寒故首揭之吳人駒曰頭為三陽之通位項為太陽之専位有所障礙不得如常之柔和是為强痛太陽病發熱汗出惡風衇緩者名為中風註太陽病即首條衇浮頭項强痛而惡寒之謂也衛為表陽風屬陽邪風邪中人則衛受之從其類也風中於衛即發熱者以風衛皆陽其性本熱故變熱甚㨗不似傷寒待其閉鬱而始熱也衛病不能固表又為陽邪所蒸故腠理踈而汗出也汗出表虚為風所忤故惡風也風性柔軟故衇緩也此承上條言太陽病又兼見此衇證者名曰中風以為中風病之提綱後凡稱中風者皆指此衇證而言也集註方有執曰衇緩即下文陽浮而隂弱之謂言既有如首條所揭之太陽病加之發熱汗出惡風而衇緩者則其病乃是觸犯於風所致故名中風汪琥曰中風非東垣所云中府中藏中血衇之謂蓋中字與傷字同義仲景論中不直言傷風者恐後學不察以咳𠻳鼻塞聲重之傷風混同立論故以中字别之也衇緩當作浮緩看浮是太陽病衇緩是中風衇中篇緊衇亦當倣此太陽中風陽浮而隂弱陽浮者熱自發隂弱者汗自出嗇嗇惡寒淅淅惡風翕翕發熱鼻鳴乾嘔者桂枝湯主之註太陽中風即上二條合而言之又詳舉其證以出其治也後凡稱太陽中風者皆指此衇此證也隂陽指榮衛而言非指尺寸浮沉也陽浮即越人曰三菽之浮肺之浮也肺主皮毛取之而得者即衛分之浮也六菽之浮心之浮也心主血衇取之而得者即營分之浮也營分之浮較之衛分之浮則無力而弱故曰陽浮而隂弱也衛為風客則衛邪强而發熱矣故曰陽浮者熱自發營受邪蒸則營不固而汗出矣故曰隂弱者汗自出營衛不和則肌表踈緩故有嗇嗇之惡寒淅淅之惡風翕翕之發熱也然在皮膚之表非若傷寒之壯熱無汗惡寒雖近烈火而不减惡風雖處宻室而仍畏也皮毛内合於肺皮毛不固風邪侵肺則氣壅而鼻鳴矣胸中者陽氣之本衛陽為風邪所干不能敷布則氣上逆而為乾嘔矣故宜桂枝湯解肌固表調和營衛也集註程應旄曰嗇嗇惡寒者肌被寒侵怯而斂也淅淅惡風者肌因風灑踈難禦也翕翕發熱者肌得熱蒸合欲揚也嗇嗇淅淅翕翕字俱從皮毛上形容較之傷寒之見證自有浮沉淺深之别桂枝湯方桂枝三兩去皮芍藥三兩甘草二兩炙生薑三兩切大棗十二枚擘右五味㕮咀三味以水七升微火煑取三升去滓適寒温服一升服已須􅁷歠熱稀粥一升餘以助藥力温覆令一時許徧身漐漐微似有汗者益佳不可令如水流漓病必不除若一服汗出病差停後服不必盡劑若不汗更服依前法又不汗後服當小促其間半日許令三服盡若病重者一日一夜周時觀之服一劑盡病證猶在者更作服若汗不出者乃服至二三劑禁生冷黏滑肉麫五辛酒酪臭惡等物按桂枝湯方桂枝下有去皮二字夫桂枝氣味辛甘全在於皮若去皮是枯木矣如何有解肌發汗之功宜刪此二字後倣此方解名曰桂枝湯者君以桂枝也桂枝辛温辛能發散温通衛陽芍藥酸寒酸能收斂寒走隂營桂枝君芍藥是於發汗中寓斂汗之旨芍藥臣桂枝是於和營中有調衛之功生薑之辛佐桂枝以解表大棗之甘佐芍藥以和中甘草甘平有安内攘外之能用以調和中氣即以調和表裏且以調和諸藥以桂芍之相須薑棗之相得藉甘草之調和陽表隂裏氣衛血營並行而不悖是剛柔相濟以相和也而精義在服後須㬰啜稀粥以助藥力蓋穀氣内充不但易為釀汗更使已入之邪不能少留將来之邪不得復入也又妙在温覆令一時許漐漐微似有汗是授人以微汗之法也不可令如水流漓病必不除是禁人以不可過汗之意也此方為仲景羣方之冠乃解肌發汗調和營衛之第一方也凡中風傷寒衇浮弱汗自出而表不解者皆得而主之其他但見一二證即是不必悉具故麻葛青龍發汗諸劑咸用之也若汗不出麻黄證也衇浮緊麻黄衇也固不可與桂枝湯然初起無汗已用麻黄發汗汗解後復煩衇浮數者與下後衇仍浮氣上衝者及下後下利止而身痛不休者經中皆用此以解外誠以此時表雖未解腠理已踈邪不在皮毛而在肌肉且經汗下津液已傷故衇證雖同麻黄而主治當屬桂枝也粗工妄謂桂枝湯専治中風不治傷寒使人疑而不用又謂専走肌表不治他病不知此湯倍芍藥生薑加人參名桂枝新加湯用以治榮表虚寒肢體疼痛倍芍藥加飴糖名小建中湯用以治裏虚心悸腹中急痛再加黄耆名黄耆建中湯用以治虚損虚熱自汗盜汗因知仲景之方可通治百病也適寒温服歠熱稀粥以助藥力欲使穀氣内充易為釀汗也温覆令一時許微似有汗不令如水流漓謂不可過汗也蓋取汗在不緩不急不多不少緩則邪必留連急則邪反不盡汗多則亡其陽汗少則病必不除若一服汗出病差謂病輕者初服一升病即解也停後服不必盡劑謂不可再服第二升恐其過也若不汗更服依前法謂初服不汗出未解再服一升依前法也又不汗後服謂病仍不解後服第三升也小促其間半日許令三服盡謂服此第三升當小促其服亦不可太緩以半日三時許為度令三服盡始適中其服之宜也若病重者初服一劑三升盡病不解再服一劑病猶不解乃更服三劑以一日一夜周十二時為度務期汗出病解而後已後凡有曰依服桂枝湯法者即此之謂也太陽病發熱汗出者此為榮弱衛强故使汗出欲救邪風者宜桂枝湯註此釋上條陽浮隂弱之義也經曰邪氣盛則實精氣奪則虚衛為風入則發熱邪氣因之而實故為衛强是衛中之邪氣强也營受邪蒸則汗出精氣因之而虚故為營弱是營中之隂氣弱也所以使發熱汗出也欲救邪風者宜桂枝湯集註方有執曰上言陽浮而隂弱此言營弱衛强衛强即陽浮營弱即隂弱彼此互言而互相發明者也救者解救救䕶之謂不曰風邪而曰邪風者以本體言也病人藏無他病時發熱自汗出而不愈者此衛氣不和也先其時發汗則愈宜桂枝湯註此釋上條榮衛不和之證而又就其時發熱汗出者以明其治也藏裏也無他病謂裏無他病也有時發熱有時不熱有時汗出有時不汗出其表病流連而不愈者非榮不和是衛强不與榮和也當於未熱未汗之時預用桂枝湯解肌發汗迎而奪之以遏其勢則熱退汗斂而病自愈矣集註方有執曰時以暫言衛氣不和者表有邪風而不和也先其時者言於未發熱之先也程知曰隂虚諸病亦時發熱自汗若裏無他病而時熱自汗則為衛受風邪未得解散宜於將發之時先用桂枝湯乘其欲動而擊之程應旄曰桂枝為解肌之劑而有時云發汗者何也以其能助衛氣升騰使正氣得宣而汗出與麻黄湯逐邪氣使汗從外洩者不同汪琥曰及其發熱自汗之時用桂枝湯發汗則愈苟失其時則風邪入裏病熱必深桂枝湯非所宜矣病常自汗出者此為榮氣和榮氣和者外不諧以衛氣不共榮氣諧和故爾以榮行衇中衛行衇外復發其汗榮衛和則愈宜桂枝湯註此又釋上條榮衛所以不和之義也言病有時常自出汗者此為榮氣已和也榮氣和而熱仍不解者則是衛外之氣猶不諧而不與榮氣共和諧也所以榮氣雖和而時時自汗出病猶不解也蓋以榮行衇中衛行衇外衛不和則榮雖和而病不解故復發其汗以抑衛而和榮榮衛和而病自愈矣亦宜桂枝湯集註方有執曰此與上條同上以暫言此言常者謂無時不然也上言藏藏為隂而主裏此言榮榮亦隂而主裏以暫言故其詞畧以常言故其詞詳兩相互發義不殊也喻昌曰此明衛受邪風榮自汗出之理凡汗出榮和而發熱不解是衛强不與榮和也復發其汗俾風邪從肌竅外出斯衛不强而與營和矣正如中酒發狂酒去其人帖然也榮受寒邪不與衛和宜麻黄湯亦然吳人駒曰上條發作有時此則無時而不自汗出但熱不解者亦屬榮衛不和蓋榮衛相得之為和而榮不得獨為之和也張錫駒曰衛氣者所以肥腠理司開闔衛外而為固也今受邪風不能衛外故常自汗出而熱不解此為榮氣和而衛不和也魏荔彤曰前以桂枝解肌者和其衛而時發熱之熱止此以桂枝發汗者和其衛而常自汗之汗止蓋發其表而熱解矣故總結之曰榮衛和則愈太陽病初服桂枝湯反煩不解者先刺風池風府却與桂枝湯則愈註太陽病服桂枝湯外證不解者可更作服今初服不惟不解而反加煩是表邪太盛若遽與桂枝恐更生煩熱故宜先行刺法疏其在經邪熱然後却與桂枝發其肌腠風邪俾外内調和自然汗出而解矣集註方有執曰桂枝全在服法發汗切要如經若服不如法汗不如經病必不除所以反煩反者轉也言轉加熱悶也風池穴在耳後陷者中按之引於耳中手足少陽衇之㑹刺可入同身寸之四分風府穴在項上入髪際同身寸之一寸大筋内宛宛中督衇陽維二經之㑹刺可入同身寸之四分張志聰曰風池風府雖非太陽穴道乃屬太陽經衇所循之部故刺之以衰太陽之病勢魏茘彤曰恐誤認此為已傳之躁煩故標出以示人言不解則太陽之證俱在但添一煩知其非傳裏之煩而仍為表未解之煩也欲自解者必當先煩乃有汗而解何以知之衇浮故知汗出解也註汗之不解而煩太陽證仍在者是表邪盛也有陽明證者是裏熱盛也然亦有欲自解而未解先煩者則又為邪正相争作汗之兆也當其煩時解與不解固不可定但診其六衇俱浮則知邪欲還表當汗出而解矣集註程知曰天地鬱蒸而雨作人身煩悶而汗作當以衇浮決之設衇不浮則煩又為入裏之候矣程應旄曰如診得衇浮即是邪還於表之兆切勿妄治其煩使汗却而當解者反不解也沈眀宗曰夫自解證有從衂解有從下血而解有從下利而解有從小便暗除而解者此即太陽戰汗之一端或從衇辨或從證叅仲景妙義散見諸篇務必合叅則備病六七日手足三部衇皆至大煩而口噤不能言其人躁擾者必欲解也註病至六七日手足隂陽三部衇皆至而浮忽然大煩口噤不能言躁擾不寜者此邪正俱實争勝作汗之象故曰必欲解也集註成無己曰手足三部衇皆至為正氣盛邪氣雖甚必欲解也若衇和其人大煩目重臉内際黄者此欲解也按臉字當是瞼字瞼眼弦也作臉字非註衇和而大煩者其解未可卜也若其人目重瞼者是瞼覆下垂目欲合也為隂来濟陽之兆内際黄者為胃氣来復之徵故曰此欲解也問曰衇病欲知愈未愈者何以别之答曰寸口闗上尺中三處大小浮沉遲數同等雖有寒熱不解者此衇隂陽為和平雖劇當愈註衇偏勝則病衇和平則愈今寸口闗上尺中三部衇俱見浮沉遲數大小同等隂陽和平之象即有寒熱不解之病雖劇亦當愈也集註内經曰寸口人迎兩者相應若引繩大小齊等者名曰平人程知曰大小浮沉遲數同等謂三部九候無相失也蓋大不甚大小不甚小浮不甚浮沉不甚沉遲不甚遲數不甚數為冲和平等之象也病有發熱惡寒者發於陽也無熱惡寒者發於隂也發於陽者七日愈發於隂者六日愈以陽數七隂數六故也註病謂中風傷寒也有初病即發熱而惡寒者是謂中風之病發於衛陽者也有初病不發熱而惡寒者是謂傷寒之病發於榮隂者也發於陽者七日愈發於隂者六日愈以陽合七數隂合六數也集註方有執曰此推原中風傷寒之所以始以要其所以終之意凡在太陽皆惡寒也發起也愈瘳也程知曰此辨太陽病有發熱有不發熱之故也風陽也衛亦陽也寒隂也榮亦隂也中風傷寒均為表證而風入衛則邪發於陽而為熱寒入榮則邪發於隂而不即熱陽行速故常過經而遲愈一日隂行遲故常循經而早愈一日觀此則風寒之辨了然矣魏荔彤曰風傷衛寒傷榮既在太陽則未有不發熱者但遲速有間耳至於惡寒則同也發於陽發於隂之義不過就風為陽衛亦陽寒為隂榮亦隂而言殊未及於三隂也問曰凡病欲知何時得何時愈答曰假令夜半得病者明日日中愈日中得病者夜半愈何以言之日中得病夜半愈者以陽得隂則解也夜半得病明日日中愈者以隂得陽則解也註凡病之起不外乎隂陽以為病非陽勝隂即隂勝陽凡病之愈亦不外乎隂陽以為和非陽得隂解即隂得陽解陽得隂解者謂日中得病今日夜半愈也隂得陽解者謂夜半得病明日日中愈也集註方有執曰日中夜半以大畧言餘時可倣此意而推也太陽病頭痛至七日已上自愈者以行其經盡故也若欲作再經者鍼足陽明使經不傳則愈註太陽病頭痛至七日已上自愈者以行其經盡故也謂太陽受病其邪傳行六日三陽三隂經盡至七日已上三陽三隂之病日衰大邪皆去此不作再經故自愈也再者再傳陽明經也謂其邪已傳經盡熱盛不衰欲再轉屬陽明故也鍼足陽明以洩其熱使其邪不再傳則愈矣集註方有執曰七日已上者該六日而言也魏荔彤曰方有執謂鍼以遏其邪喻昌謂鍼以竭其邪言遏言竭皆言泄之也凡鍼刺者泄其盛氣也故前言刺風池風府亦主泄其風邪暴甚之意因刺法乃治熱之善䇿不欲人妄施汗下温三法也言足陽明自是胃之經穴必有實欲再傳之勢方可刺之閔芝慶曰太陽受病以次而終於厥隂為傳經盡諸經受病至七日已上自愈者為行其經盡故也今有自太陽再傳之說若果傳徧六經厥隂再傳太陽太陽再傳陽明則何不於厥隂未傳太陽之前預鍼太陽而必待傳陽明然後鍼陽明哉於此可知三隂從無再傳太陽之病但轉屬陽明耳風家表解而不了了者十二日愈註風家謂太陽中風也表解謂用桂枝湯病已解也不了了者不清楚也言用桂枝湯其表已解而猶不清楚者在經餘邪未盡耳十二日經盡之時餘邪盡自然愈也集註魏荔彤曰此條申眀太陽中風病愈後風邪留滯之證應聴其自愈也太陽病頭痛發熱汗出惡風者桂枝湯主之重出衍文桂枝本為解肌若其人衇浮緊發熱汗不出者不可與也常須識此勿令誤也註夫桂枝湯本為解肌中風表虛之藥也若其人衇浮緊發熱汗不出者乃傷寒表實之病不可與也常須識此為麻黄湯證勿令誤與桂枝湯也集註程應旄曰可與不可與在毫釐疑似之間誤多失之於倉卒須常將營衛之分别處兩兩互勘隂陽不悖虚實了然不以桂枝誤治衇浮緊汗不出之傷寒自不致以麻黄誤治衇浮緩汗自出之中風矣若酒客病不可與桂枝湯得之則嘔以酒客不喜甘故也註酒客謂好飲之人也酒客病謂過飲而病也其病之狀頭痛發熱汗出嘔吐乃濕熱薫蒸使然非風邪也若誤與桂枝湯服之則嘔以酒客不喜甘故也集註成無己曰酒客内熱喜辛而惡甘桂枝湯甘酒客得之則中煩而嘔凡服桂枝湯吐者其後必吐膿血也註凡酒客得桂枝湯而嘔者以辛甘之品能動熱助涌故也若其人内熱素盛服桂枝湯又不即時嘔出則益助其熱所以其後必吐膿血也然亦有不吐膿血者則是所傷者輕而熱不甚也集註劉宏璧曰桂枝氣味甚薄酒客不可與者舉一以例其餘也庸工不得其解每遇熱盛之人但去桂枝於甘辛極熱之類全無顧忌仲景豈意後人如此之愚哉即如産後不宜寒凉所以舉一白芍之味酸微寒者以示戒今祗知除去白芍於三黄寒凉等藥反恣用無忌殊不知聖人一語該括無窮味薄者尚不可與其味厚者可知微寒者既在宜禁而大寒者尤所當戒世俗不能引伸觸類徒以鹵莽滅裂為事可見上古醫書非精詳玩味烏能有得耶太陽病發汗遂漏不止其人惡風小便難四肢微急難以屈伸者桂枝加附子湯主之註太陽中風本當解肌若大發其汗如水流漓因而遂漏不止其人必腠理大開表陽不固故惡風也液傷於内膀胱津少故小便難也液傷於外復加風襲故四肢微急難以屈伸也宜桂枝加附子湯主之服依桂枝湯法者是於固陽斂液中和榮衛解風邪也集註方有執曰此太陽中風誤汗之變證小便難者以汗漏不止必亡陽亡津液亡陽則氣不足亡津液則水道枮竭且小便者膀胱所司也膀胱本太陽經而為諸陽主氣氣不足則化不行矣程知曰此陽氣與隂液兩亡復加外風襲入與真武證微細有别真武湯是救裏寒亡陽之失急於回陽者桂枝加附子湯是救表寒漏風之失急於温經者桂枝加附子湯方於桂枝湯方内加附子一枚餘依桂枝湯法集解柯琴曰是方以附子加入桂枝湯中大補表陽也表陽密則汗漏自止惡風自罷矣汗止津回則小便自利四肢自柔矣汗漏不止與大汗出同而從化變病則異服桂枝麻黄湯大汗出後而大煩渴是陽陷於裏急當救隂故用白虎加人參湯服桂枝麻黄湯發汗遂漏不止而不煩渴是亡陽於外急當救陽故用桂枝加附子湯要之發汗之劑用桂枝不當則陽陷於裏者多用麻黄不當則陽亡於外者多因桂枝湯有芍藥而無麻黄故雖汗大出而元府尚能自閉多不致亡陽於外耳服桂枝湯大汗出後大煩渴不解衇洪大者白虎加人參湯主之註大煩渴陽明證也洪大陽明衇也中風之邪服桂枝湯大汗出後不解大煩渴衇洪大者是邪已入陽明津液為大汗所傷胃中乾燥故也宜與白虎加人参湯清熱生津而煩渴自除矣集註張璐曰白虎湯實解内蒸之熱非治外經之熱也昔人以石膏辛凉能解利陽明風熱若不佐以麻葛之品何以走外此說似是而實非蓋陽明在經之邪縱使有大熱而不煩渴自有葛根湯桂枝加葛根湯等治法並無藉於石膏也白虎加人參湯見陽明篇太陽病三日發汗不解蒸蒸發熱者屬胃也調胃承氣湯主之註太陽病三日發汗後熱不解若仍陣陣發熱有汗而不解者是太陽表證未罷也則當以桂枝湯和之今蒸蒸發熱有汗而不解者乃屬陽明裏證不和也故用調胃承氣湯集註程應旄曰太陽病三日經期尚未深也何以發汗不解便屬胃也蓋以胃燥素盛故他表證雖罷而汗與熱仍不解也第徵其熱如炊籠蒸蒸而盛則知其汗必連綿濈濈而来此即大便已鞕之徵故曰屬胃也熱雖聚於胃而未見潮熱讝語等證主以調胃承氣湯者於下法内從乎中治以其為日未深故也汪琥曰言太陽病不可拘以日數但見屬胃之證即可下也病方三日曾經汗矣其熱自内騰達於外非表邪不解乃太陽之邪轉屬於胃病熱不能解也調胃承氣湯見陽明篇太陽病發汗後大汗出胃中乾煩躁不得眠欲得飲水者少少與飲之令胃氣和則愈若衇浮小便不利微熱消渴者五苓散主之註太陽病發汗後或大汗出皆令人津液内竭胃中乾煩躁不得眠欲得飲水當少少與之以滋胃燥令胃氣和則可愈也倘與之飲胃仍不和若衇浮小便不利微熱消渴者則是太陽表邪未罷膀胱裏飲已成也經曰膀胱者津液之府氣化則能出矣今邪熱薫灼燥其現有之津飲水不化絶其未生之液津液告匱求水自救所以水入即消渴而不止也用五苓散者以其能外解表熱内輸水府則氣化津生熱渴止而小便利矣集註張兼善曰白虎治表證已解邪傳裏而煩渴者今衇浮身有微熱而渴乃表邪未得全解故用五苓藉桂枝之辛散和肌表以解微熱也术澤二苓之淡渗化水生津以止燥渴也喻昌曰衇浮當用桂枝何以變用五苓耶蓋熱邪得水雖不全解勢必衰其大半所以熱微兼小便不利證成消渴則蓄飲證具故不從單解而從兩解也凡飲水多而小便少謂之消渴裏熱飲盛不可單用桂枝解肌故兼以利水惟五苓有全功耳程應旄曰微熱字對下條發熱字看彼以發熱在表則知犯本未深故邪熱蓄而拒水此曰微熱則表熱犯本已深故熱邪結而耗液所以不惟與水與五苓主治有别而前五苓後五苓主治亦俱有别也中風發熱六七日不解而煩有表裏證渴欲飲水水入則吐者名曰水逆五苓散主之註中風發熱六七日不解而煩者是有表證也渴欲飲水水入則吐者是有裏證也若渴欲飲水水入即消如前條之胃乾少少與飲令胃和則愈今渴欲飲水水入不消上逆而吐故名曰水逆原其所以吐之之由則因邪熱入裏與飲相摶三焦失其蒸化而不能通調水道下輸膀胱以致飲熱相格於上水無去路於下故水入則吐小便必不利也宜五苓散辛甘淡滲之品外解内利多服煖水令其汗出尿通則表裏兩解矣集註方有執曰中風發熱必自汗出六七日不解而煩者汗出過多亡津液而内燥也表以外證未罷言裏以煩渴屬府言欲飲水者燥甚而渴希救故也水入則吐者伏飲内作故外水不得入也蓋飲亦水也以水得水湧溢而為格拒所以謂之水逆與五苓散兩解表裏汗出而愈也喻昌曰傷風證原有汗以其有汗也延至日乆不行解肌之法汗出雖多徒傷津液表終不解轉增煩渴邪入於府飲水則吐名曰水逆乃熱邪挟積飲上逆故外水格而不入也服五苓飲熱湯得汗則表裏俱解是一舉而兩得也五苓散方豬苓十八銖去黑皮茯苓十八銖澤瀉一兩六銖白术十八銖桂半兩右五味為散更於臼中杵之白飲和方寸匕服之日三服多飲煖水汗出愈方解是方也乃太陽邪熱入府水氣不化膀胱表裏藥也一治水逆水入則吐一治消渴水入則消夫膀胱者津液之府氣化則能出矣邪熱入之與水合化為病若水盛於熱則水壅不化水蓄於上故水入則吐乃膀胱之氣化不行致小便不行也若熱盛於水則水為熱灼水耗於上故水入則消乃膀胱之津液告竭致小便無出也二證皆小便不利故均得而主之若小便自利者不可用恐重傷津液以其屬陽明之裏故不可用也由此可知五苓散非治水熱之専劑乃治水熱小便不利之主方也君澤瀉之鹹寒鹹走水府寒勝熱邪佐二苓之淡滲通調水道下輸膀胱則水熱並瀉也用白术之燥濕健脾助土為之隄防以制水也用桂之辛温宣通陽氣蒸化三焦以行水也澤瀉得二苓下降利水之功倍則小便利而水不蓄矣白术藉桂上升通陽之效㨗則氣騰津化渴自止也若發熱不解以桂易桂枝服後多服煖水令汗出愈是知此方不止治停水小便不利之裏而猶解停水發熱之表也加人參名春澤湯其意専在助氣化以生津加茵蔯名茵蔯五苓散治濕熱發黄表裏不實小便不利者無不效也集解程應旄曰太陽為標膀胱為本中風發熱標受邪也六七日不解標邪轉入膀胱矣是謂犯本五苓散與麻黄桂枝二湯雖同為太陽經之藥一則解肌而治表一則利小便而治裏表與本所主各有别矣按此條謂有表裏證者非發熱有汗口乾煩渴水入則消小便自利太陽陽明之表裏證也乃發熱無汗口潤煩渴水入則吐小便不利太陽膀胱之表裏證也此病雖未發明無汗小便不利之證若汗出小便利則渴飲之水得從外越下出必無水逆之證仲景用五苓散多服煖水令汗出愈其意在利水發汗故知必有無汗小便不利之證也太陽病小便利者以飲水多必心下悸小便少者必苦裏急也註太陽初病不欲飲水将傳陽明則欲飲水此其常也今太陽初病即飲水多必其人平素胃燥可知設胃陽不衰則所飲之水亦可以敷布於外作汗而解今飲水多而胃陽不充即使小便利亦必停中焦而為心下悸若更小便少則水停下焦必苦裏急矣集註方有執曰飲水多而心下悸者心為火藏水多則受制也小便少則水停所以裏急也汪琥曰太陽病小便利者是膀胱之府無邪熱也若其人飲水多此熱在上焦心火亢甚小便雖利而渴飲水多則水停犯火必心下悸若其人飲水多而小便少此熱在下焦為太陽邪熱隨經入府水積不行膀胱之裏必苦急也發汗後飲水多必喘以水灌之亦喘註上條未發汗飲水多胃熱津少也此條發汗後飲水多津亡胃乾也而不病心下悸苦裏急者蓋以水不停於中焦下焦而停於上焦所以攻肺必作喘也水灌者以水澆洗也飲水多者必喘是飲冷冷傷於内也以水灌之亦喘者是形寒寒傷於外也均傷肺故俱喘集註魏荔彤曰此申明本條喘急一證有因水而成者蓋渴而飲水多之喘與不渴而灌之亦喘其由雖不同而致病則一也發汗後不可更行桂枝湯汗出而喘無大熱者可與麻黄杏仁甘草石膏湯註太陽病下之後微喘者表未解也當以桂枝加厚朴杏仁湯解太陽肌表而治其喘也太陽病桂枝證醫反下之下利衇促汗出而喘表未解者當以葛根黄連黄芩湯解陽明之肌熱而治其喘也今太陽病發汗後汗出而喘身無大熱而不惡寒者知邪已不在太陽之表且汗出而不惡熱知邪亦不在陽明之裏其所以汗出而喘既無大熱又不惡寒是邪獨在太隂肺經故不可更行桂枝湯可與麻黄杏子甘草石膏湯發散肺邪而汗喘自止矣麻黄杏仁甘草石膏湯方麻黄四兩去莭杏仁五十枚去皮尖甘草二兩炙石膏半觔碎綿裏右四味以水七升先煮麻黄减二升去白沫納諸藥煮取三升去滓温服一升集註柯琴曰石膏為清火之重劑青龍白虎皆賴以建功然用之不當適足以召禍故青龍以無汗煩燥得薑桂以宣衛外之陽白虎以有汗煩渴須粳米以存胃中之液今但内熱而無外寒故不用薑桂喘不在胃而在肺故不需粳米其意重在存隂不慮其亡陽也故於麻黄湯去桂枝之監制取麻黄之専開杏仁之降甘草之和倍石膏之寒除内藴之實熱斯溱溱之汗出而内外之煩熱與喘悉除矣下後不可更行桂枝湯若汗出而喘無大熱者可與麻黄杏仁甘草石膏湯註此詳上條受病兩途同乎一治之法也又有下後身無大熱汗出而喘者知邪亦不在表而在肺故亦不可更行桂枝湯可與麻黄杏仁甘草石膏湯以治肺也彼之汗後喘此之下後喘雖其致病之因不同而其所見之證不異所以從其證不從其因均用此湯亦喘家急則治其標之法也集註方有執曰汗與下雖殊其為反誤致變之喘則一惟其喘一故同歸一治也太陽中風下利嘔逆表解者乃可攻之其人漐漐汗出發作有時頭痛心下痞鞕滿引脇下痛乾嘔短氣汗出不惡寒者此表解裏未和也十棗湯主之按下利之下字當是不字若是下字豈有上嘔下利而用十棗湯峻劑攻之之理乎惟其大便不利痞鞕滿痛始屬裏病小便不利嘔逆短氣始屬飲病乃可攻也發作之作字當是熱字若無熱汗出乃少隂隂邪寒飲真武湯證也且作字與上下句文義皆不相屬註太陽中風表邪也不利嘔逆裏飲也表邪解者乃可攻裏飲也審其人微汗漐漐不輟發熱有時頭痛若仍惡寒是表未解尚不可攻若不惡寒則為表已解矣而更見裏未和之心下痞鞕滿引脇下痛乾嘔短氣水蓄無所從出之急證故徑以十棗湯峻劑直攻水之巢穴而不疑也按傷寒表未解水停心下嘔逆者是寒束於外水氣不得宣越也宜小青龍湯汗而散之中風表未解水停心下而吐者是飲格於中水氣不得輸洩也宜五苓散散而利之此皆表未解不可攻裏之飲證也至如十棗湯與下篇之桂枝去芍藥加白术茯苓湯二方皆治飲家有表裏證者十棗湯治頭痛發熱汗出不惡寒之表已解而有痞鞕滿痛之裏未和故専主攻裏也桂枝去芍藥加白术茯苓湯治頭痛發熱無汗之表未解而兼有心下滿微痛之裏不和故不主攻裏當先解表也然其心下鞕滿痛之微甚亦有别矣集註杜任曰十棗湯惟壯實者宜之不宜輕用方有執曰乃可攻之以上喻人勿妄下早之意漐漐汗出至短氣言證雖有裏猶未可下直至汗出不惡寒方是承上起下言當下以出其治也喻昌曰此證與結胸頗同但結胸者邪結於胸其位髙此在心下及脇其位卑然必表解乃可攻之亦與攻結胸之戒不殊也藥用十棗亦與陷胸湯相倣因傷寒下法多為胃實而設胃實者邪熱内盛不得不用消黄以蕩滌之今證在胸脇而不在胃則蕩滌之藥無所用故取蠲熱逐飲於胸脇之間以為下法張志聰曰頭痛表證也然亦有在裏者如傷寒不大便五六日頭痛有熱者與承氣湯與此莭之汗出不惡寒而頭痛為表解裏有飲用十棗湯則凡遇風寒頭痛表未解之證當審别矣程應旄曰所可惑者頭痛外惟身汗一證表裏難辨汗出發熱惡寒則微有表若汗出發熱不惡寒則祗從不惡寒處認證知表已解裏氣為飲邪摶結不和雖頭痛亦屬裏邪上攻非闗表也魏荔彤曰太陽之邪既入裏宜下矣又有不下胸膈不下腸胃而下心與脇下者較下結胸部位稍卑較下胃實部位又稍髙此下中之又一法也須認明同一下也證不同而法自别蓋太陽陽明之交必辨表裏而施汗下彼之在裏應下乃邪熱挟食物為胃實此之在裏應下乃邪熱挟水飲為飲實二者俱必待表解而後下此大同也十棗湯方芫花熬甘遂大㦸大棗十枚擘右三味等分各别搗為散以水一升半先煮大棗肥者十枚取八合去滓内藥末强人服一錢七羸人服半錢温服之平旦服若下少病不除者明日更服加半錢得快下利後糜粥自養方解仲景治水之方種種不同此其最峻者也凡水氣為患或喘或欬或悸或噎或吐或利病在一處而止此則水邪留結於中心腹脇下痞滿鞕痛三焦升降之氣阻隔難通此時表邪已罷非汗散之法所宜裏飲實盛又非淡渗之品所能勝非選逐水至峻之品以直折之則中氣不支束手待斃矣甘遂芫花大㦸三味皆辛苦氣寒而禀性最毒並舉而用之氣味相濟相須故可直攻水邪之巢穴決其瀆而大下之一舉而患可平也然邪之所湊其氣必虚以毒藥攻邪必傷及脾胃使無冲和甘緩之品為主宰則邪氣盡而大命亦隨之矣然此藥最毒至峻参术所不能君甘草又與之反故選十棗之大而肥者以君之一以顧其脾胃一以緩其峻毒得快利後糜粥自養一以使穀氣内充一以使邪不復作此仲景用毒攻病之法盡美又盡善也昧者惑於甘能中滿之說而不敢用豈知承制之理乎太陽病外證未解不可下也下之為逆欲解外者宜桂枝湯註太陽病外證未解者謂桂枝湯之表證未解也凡表證未解無論已汗未汗雖有可下之證而非在急下之例者均不可下下之為逆也欲解外者仍宜桂枝湯主之集註王肯堂曰但有一毫頭痛惡寒即為表證未解不可下也程應旄曰若下後外證未解者仍當解外有是證用是藥不可以既下而遂謂桂枝湯不中與也汪琥曰下之為逆逆者為病在外而反攻其内於治法為不順也太陽病先發汗不解而復下之衇浮者不愈浮為在外而反下之故令不愈今衇浮故知在外當須解外則愈宜桂枝湯註太陽病先發汗表未解仍宜汗之而復下之治失其宜矣衇浮者不愈蓋以衇浮邪在外而反下之故令不愈也今誤下未成逆衇仍浮故知邪尚在外仍宜桂枝湯解外則愈也集註程應旄曰愈不愈辨之於衇其愈者必其衇不浮而離於表也若衇浮者知尚在表則前此之下自是誤下故令不愈從前之誤不必計較祗據目前目前之證不必計較祗據其衇衇若浮知尚在外雖日乆尚須解外則愈有是衇用是藥亦不以既下而遂以桂枝湯為不中與也本發汗而復下之此為逆也若先發汗治不為逆本先下之而反汗之為逆若先下之治不為逆註立治逆之法不外乎表裏而表裏之治不外乎汗下病有表裏證者當審其汗下何先先後得宜為順失宜為逆若表急於裏本應先汗而反下之此為逆也若先汗而後下治不為逆也若裏急於表本應先下而反汗之此為逆也若先下而後汗治不為逆也集註程知曰言汗下有先後緩急不得倒行逆施汪琥曰治傷寒之法表證急者即宜汗裏證急者即宜下不可拘拘於先汗而後下也汗下得宜治不為逆太陽病下之其衇促不結胸者此為欲解也衇浮者必結胸衇𦂳者必咽痛衇弦者必兩脇拘急衇細數者頭痛未止衇沉𦂳者必欲嘔衇沉滑者恊熱利衇浮滑者必下血按衇促當是衇浮始與不結胸為欲解之文義相屬衇浮當是衇促始與論中結胸胸滿同義衇𦂳當是衇細數衇細數當是衇𦂳始合論中二經本衇衇浮滑當是衇數滑浮滑是論中白虎湯證之衇數滑是論中下膿血之衇細玩諸篇自知註病在太陽誤下為變不同者皆因人之藏氣不一各從所入而化故不同也誤下邪陷當作結胸反不結胸其衇浮此裏和而不受邪邪仍在表為欲解也若衇促者為陽結實邪之衇故必結胸也衇細數少隂邪熱之衇咽痛少隂邪熱之證誤下邪陷少隂法當從少隂治也衇弦少陽之衇兩脇拘急少陽之證誤下邪陷少陽法當從少陽治也衇𦂳太陽衇頭痛太陽證誤下邪仍在表法當從太陽治也衇沉𦂳寒邪入裏之衇欲嘔胃陽格拒之證有表誤下邪陷在胃法當從陽明治也衇沉滑宿食衇有表誤下恊熱入裏下利法當從恊熱下利治也衇數滑積熱衇有表誤下邪陷入隂傷榮下血法當從下膿血治也按衇促固陽衇也若促而有力為實則為結胸實邪之診若促而無力為虚則為胸滿虚邪之診故論中有衇促結胸頭汗小潮熱者用陷胸湯攻之衇促胸滿汗出微惡寒者用桂枝去芍藥加附子湯温之觀此促衇虚實治法則可以類推矣按咽痛少隂寒熱俱有之證也咽乾腫痛者為熱不乾不腫而痛者為寒故少隂論中有甘桔湯通衇四逆湯二治法也集註方有執曰凡在太陽皆表證也誤下則變證雜出而不可以一途拘之程知曰不宜下而下之諸變不可勝數此之謂也今咽痛脇急欲嘔是寒邪入裏之變頭痛熱利下血是風邪入裏之變所以然者衇浮滑數為陽沉弦𦂳細為隂也程應旄曰據衇見證各著一必字見勢所必然考其源頭總在太陽病下之而来故雖有已成壊病未成壊病之分但宜以活法治之不得據衇治衇據證治證也太陽病二三日不能卧但欲起心下必結衇微弱者此本有寒分也反下之若利止必作結胸未止者四日復下之此作恊熱利也按四日復下之之字當是利字上文利未止豈有復下之理乎細玩自知是必傳寫之誤註太陽病謂頭項强痛而惡寒也二三日見不得卧但欲起之證謂已傳陽明也心下胃之分也必結謂胃分必有結也若衇實大乃胃分有熱而結也則當下之今衇微弱是胃分有寒而結也法不當下不當下而下之謂之反下二三日正當解太陽陽明之表反下之表熱乘虚入裏必自利設利自止是其人胃實而同燥化必作結胸矣今利未止四日仍復下利是其人胃虚而同濕化故必作恊熱利也集註程知曰此表證誤下有結胸熱利之變不可不慎也衇既微弱則是寒結心下法當温散醫見心下結而下之使利是治之反也汪琥曰太陽病二三日不卧欲起心下熱結似乎可下然衇微弱其人本有寒分豈可下乎太陽病外證未除而數下之遂恊熱而利利下不止心下痞鞕表裏不解者桂枝人參湯主之註此承上條衇微弱恊熱利互詳其證以明其治也外證未除謂太陽病未除而數下之是下非一次也裏因數下而虚遂恊表熱而利利下不止裏虚不固也心下痞鞕裏虚而邪結也外證既未除是表不解也故用桂枝以解表利下痞鞕裏因下虚而從寒化也其衇必如上文之微弱故用參术薑草以温裏此温補中兩解表裏法也若其衇有力者又當從甘草瀉心湯之法矣集註喻昌曰誤下而致裏虚外熱乘之變而為利不止者裏虚不守也痞鞕者正虚邪實中成滯礙痞塞而不通也以表未除故用桂枝以解之以裏適虚故用理中以和之此方即理中加桂枝而易其名乃治虚痞下利之法也李中梓曰經云桂枝證醫反下之利遂不止與葛根黄芩黄連湯此則又與桂枝人参湯何用藥有温凉之異耶蓋彼證但曰下之此則曰數下之彼證但曰利下此則曰利不止合兩論味之自有虚實之分矣程知曰表證誤下下利不止喘而汗出者治以葛根芩連心下痞鞕者治以桂枝參术一救其表邪入裏之實熱一救其表邪入裏之虚寒皆表裏兩解法也程應旄曰恊熱而利向来俱作陽邪陷於下焦果爾安得用理中耶蓋不知利有寒熱二證也桂枝人參湯方桂枝四兩甘草四兩炙白术三兩人參三兩乾薑三兩右五味以水九升先煮四味取五升内桂更煮取三升去滓温服一升日再服夜一服太陽病桂枝證醫反下之利遂不止衇促者表未解也喘而汗出者葛根黄芩黄連湯主之註此承上條又言恊熱利之衇促者以别其治也太陽病桂枝證宜以桂枝解肌而醫反下之利遂不止者是誤下遂恊表熱陷入而利不止也若表未解而衇緩無力即有下利而喘之裏證法當從桂枝人參湯以治利或從桂枝加杏仁厚朴湯以治喘矣今下利不止衇促有力汗出而喘表雖未解而不惡寒是熱已陷陽明即有桂枝之表亦當從葛根黄芩黄連湯主治也方中四倍葛根以為君芩連甘草為之佐其意専解陽明之肌表兼清胃中之裏熱此清解中兼解表裏法也若衇沉遲或衇微弱則為裏寒且虚又當用理中湯加桂枝矣於此可見上條之恊熱利利不止心下痞鞕表裏不解者衇不微弱必沉遲也按恊熱利二證以衇之隂陽分虚實主治固當矣然不可不辨其下利之黏穢鴨溏小便或白或赤衇之有力無力也集註成無已曰病有汗出而喘者謂自汗出而喘也是邪氣外甚所致若喘而汗出者謂因喘而汗出也是裏熱氣逆所致故與葛根黄芩黄連湯散表邪除裏熱也方有執曰利與上條同而上條用理中者以痞鞕衇弱屬寒也此用芩連者以喘汗衇促屬熱也喻昌曰太陽病原無下法當用桂枝解外醫反下之則邪熱之在太陽者未傳陽明之表已入陽明之裏所以其衇促急其汗外越其熱上奔則喘下奔則泄故舎桂枝而用葛根以専主陽明之表加芩連以清裏熱則不治喘而喘止不治利而利止此又太陽陽明兩解表裏之變法也汪琥曰誤下虚其腸胃為熱所乘遂利不止此非腸胃真虚證乃胃有邪熱下通於腸而作泄也衇促者衇来數時一上復来也此為陽獨盛之衇也衇促見陽知表未解此表乃陽明經病非猶太陽桂枝之表證也喘而汗出者亦陽明胃府裏熱氣逆所致非太陽風邪氣壅之喘亦非桂枝湯汗出之證也故當解陽明表邪清胃府裏熱也葛根黄芩黄連湯方葛根半觔黄芩三兩黄連三兩甘草二兩炙右四味以水八升先煮葛根减二升内諸藥煮取二升去滓分温再服集解柯琴曰外熱不除是表不解下利不止是裏未和誤下致利病因則同一則衇微弱心下痞鞕是衇不足而證有餘也一則衇促而喘反汗自出是衇有餘而證不足也表裏虚實當從衇辨况弱衇見於數下後則痞鞕為虚更可知也故用理中之辛甘温補止下利化痞鞕又加桂枝以解表先煮四味後内桂枝和中之力饒而解肌之氣銳是於兩解中寓權宜法也桂枝證本衇緩誤下後而反促陽氣内盛邪蒸於外故汗出也熱暴於内火逆上衝故為喘也暴注下廹故為利也故君清輕升發之葛根以解肌而止利佐苦寒清肅之芩連以止汗而定喘又加甘草以和中先煮葛根後内諸藥解肌之力純而清中之氣銳又與補中逐邪者殊法矣太陽病下之後衇促胸滿者桂枝去芍藥湯主之若微惡寒者去芍藥方中加附子湯主之按若微惡寒者當是汗出微惡寒方合若無汗出二字乃表未解無取乎加附子也註太陽病表未解而下之胸實邪陷則為胸滿氣上衝咽喉不得息𤓰蒂散證也胸虚邪陷則為氣上衝桂枝湯證也今下之後邪陷胸中胸滿衇促似乎胸實而無衝喉不得息之證似乎胸虚又見胸滿之證故不用𤓰蒂散以治實亦不用桂枝湯以治虚惟用桂枝之甘辛以和太陽之表去芍藥之酸収以避胸中之滿若汗出微惡寒去芍藥方中加附子主之者以防亡陽之變也按上條衇促喘而汗出不惡寒下利不止云屬實熱此條衇促胸滿汗出微惡寒不喘不下利反屬虚寒者何也上條是裏熱蒸越之汗故汗出不惡寒陽實也喘而下利皆為熱也此條乃表陽不固之汗故汗出微惡寒陽虚也即不喘利亦為寒也要知仲景立法每在極微處設辨恐人微處易忽也今以微惡寒發其義却不在汗出上辨寒熱而在汗出惡寒不惡寒上辨寒熱不在衇促上辨寒熱而在衇促之有力無力辨寒熱於此又可知不惟在胸滿上辨虚實而當在胸滿之時滿時不滿常常滿而不减上辨虚實矣集註喻昌曰此條之微惡寒合上條觀之則衇促胸滿喘而汗出之内原伏有虚陽欲脫之機故仲景於此條特以微惡寒三字發其義可見陽虚則惡寒矣又可見汗不出之惡寒即非陽虚矣程應旄曰有陽盛而見促衇亦有陽虚而見促衇者當辨之於有力無力仍須辨之於外證也沈明宗曰誤下擾亂隂陽之氣則衇促邪入胸膈幾成結胸但結滿而未痛耳故以桂枝湯單提胸膈之邪使從表解去芍藥者惡其酸収引邪内入故也若衇促胸滿而微惡寒廼虚而跼踖陽氣欲脫又非陽實之比所以加附子固䕶真陽也然傷風下後之惡寒與未下之惡寒逈然有别而汗後之惡寒與未汗之惡寒亦殊桂枝去芍藥湯方於桂枝湯内去芍藥餘依前法桂枝去芍藥加附子湯方於桂枝湯方内去芍藥加附子一枚炮去皮破八片餘依前法太陽病下之微喘者表未解故也桂枝加厚朴杏子湯主之喘家作桂枝湯加厚朴杏子佳註太陽病當汗而反下之下利衇促喘而汗出不惡寒者乃邪陷於裏熱在陽明葛根黄芩黄連湯證也今太陽病當汗而反下之不下利而微喘是邪陷於胸未入於胃表仍未解也故仍用桂枝湯以解肌表加厚朴杏子以降逆定喘也喘家謂素有喘病之人遇中風而喘者桂枝湯皆宜用之加厚朴杏子為佳也集註方有執曰喘者氣逆於上故呼吸不順而聲息不利也微者聲息緩不似大喘之氣急也以表尚在不解其表則喘不可定故用桂枝解表加厚朴利氣杏仁下氣所以為定喘之要藥喻昌曰此風邪誤下作喘治法之大要其寒邪誤下作喘當用麻黄杏仁石膏甘草即此可推又曰微喘表未解則是表邪因誤下上逆與虚證不同程應旄曰喘之一證有表有裏不可不辨下後汗出而喘其喘必盛屬裏熱壅逆火炎故也下後微喘汗必不大出屬表邪閉遏氣逆故也仍用桂枝湯解表内加朴杏以下逆氣魏荔彤曰凡病人素有喘證每感外邪勢必作喘故謂之喘家桂枝加厚朴杏仁湯方於桂枝湯方内加厚朴二兩杏仁五十個餘依桂枝湯方按戴原禮曰太陽病有喘咳無汗喘者宜麻杏石甘湯有汗喘者宜桂枝加厚朴杏仁湯無汗咳者宜小青龍湯少陽病無喘有咳咳者宜小柴胡湯加五味乾薑陽明病無咳有喘内實喘者宜大承氣湯下利者宜葛根黄芩黄連湯三隂惟少隂有喘咳喘者宜四逆湯加五味乾薑咳者隂邪下利宜真武湯加五味乾薑陽邪下利宜豬苓湯然喘皆危候也太陽病下之後其氣上衝者可與桂枝湯方用前法若不上衝者不可與之註太陽病表未解而下之裏實者邪陷則為結胸大陷胸湯證也裏虚者邪陷則為下利桂枝人參湯證也胸實者邪陷則為胸中痞鞕氣上衝咽喉不得息𤓰蒂散證也今胸虚邪陷於胸故但為氣上衝是表尚未罷然無壅滿不得息痞鞕之證故不可吐下仍當解表可與桂枝湯如法汗之使陷胸之邪不受外束胸中之氣得以四達自不致内壅而上衝矣若不上衝者不可與也集註方有執曰氣上衝者陽主氣而上升風屬陽邪下後入裏乘虚而上衝也若不上衝則非陽邪可知故不可與病如桂枝證頭不痛項不强寸衇微浮胸中痞鞕氣上衝咽喉不得息者此為胸有寒也當吐之宜𤓰蒂散註病如桂枝證乃頭項强痛發熱汗出惡風衇浮緩也今頭不痛項不强是桂枝證不悉具也寸衇微浮是邪去表未逺已離其表也胸中痞鞕氣上衝喉不得息是邪入裏未深而在胸中必胸中素有寒飲之所致也寒飲在胸不在肌腠解肌之法無可用也痞鞕在胸而不在心下攻裏之法亦無所施惟有髙者越之一法使胸中寒飲一涌而出故宜吐之以𤓰蒂散也集註程應旄曰痞鞕一證因吐下者為虚不因吐下者為實實邪痰飲填塞心胸中下二焦為之阻絶自不得不從上焦為出路所謂在上者因而越之是也汪琥曰傷寒一病吐法不可不講所以仲景以此條特出之太陽上篇者以吐不宜遲與太陽汗證之法相等當於二三日間審其證而用此法也沈眀宗曰素有痰飲内積稍渉風寒引動其痰即外如桂枝湯證但無頭痛項强知非風邪中表矣張錫駒曰氣上衝咽喉不得息者邪挟寒飲從太陽之氣而上越也𤓰蒂散方𤓰蒂一分熬黄赤小豆一分右二味各别搗篩為散已合治之取一錢匕以香豉一合用熱湯七合煮作稀糜去滓取汁和散温頓服之不吐者少少加服得快吐乃止諸亡血虚家不可與𤓰蒂散方解胸中者清陽之府諸邪入胸府阻遏陽氣不得宣達以致胸滿痞鞕熱氣上衝燥渴心煩嗢嗢欲吐衇數促者此熱鬱結也胸滿痞鞕氣上衝咽喉不得息手足寒冷欲吐不能吐衇遲𦂳者此寒鬱結也凡胸中寒熱與氣與飲鬱結為病諒非汗下之法所能治必得酸苦湧泄之品因而越之上焦得通陽氣得復痞鞕可消胸中可和也𤓰蒂極苦赤豆味酸相須相益能疏胸中實邪為吐劑中第一品也而佐香豉汁合服者藉榖氣以保胃氣也服之不吐少少加服得快吐即止者恐傷胸中元氣也此方奏功之㨗勝於汗下所謂汗吐下三大法也今人不知仲景子和之精義置之不用可勝惜哉然諸亡血虚家胸中氣液已虧不可輕與特為申禁病發於陽而反下之熱入因作結胸病發於隂而反下之因作痞所以成結胸者以下之太早故也註此總釋結胸與痞鞕之因也中風陽邪故曰病發於陽也不汗而反下之熱邪乘虚陷入因作結胸傷寒隂邪故曰病發於隂也不汗而反下之熱邪乘虚陷入因作痞鞕所以成結胸與痞鞕者以表未解而下之太早故也病發於隂不言熱入者省文耳然病發於陽而誤下者未嘗無痞鞕病發於隂而誤下之亦時成結胸良由人之氣體不同或從實化或從虚化也集註張兼善曰風邪入裏則結胸寒邪入裏則為痞然此皆太陽病之所由来非别隂證陽證也太陽病衇浮而動數浮則為風數則為熱動則為痛數則為虚頭痛發熱微盗汗出而反惡寒者表未解也醫反下之動數變遲膈内拒痛胃中空虚客氣動膈短氣躁煩心中懊憹陽氣内陷心下因鞕則為結胸大陷胸湯主之若不結胸但頭汗出餘處無汗躋頸而還小便不利身必發黄按數則為虚句疑是衍文註太陽病衇浮而動數浮則為風邪衇也數則為熱邪衇也動則為諸痛衇也頭痛發熱太陽證也熱蒸於陽陽虚則自汗出熱蒸於隂隂虚則盗汗出隂虚當惡熱今反惡寒故知此非隂虚之盗汗乃表未解之盗汗微微而出也表未解當解表醫反下之遂使動數之熱衇變為寒遲蓋動數乃表邪欲傳因下而逆於膈中故不傳而衇亦變也表客陽邪乘胃空虚陷入胸膈而拒痛短氣不能布息煩躁心中懊憹心下因鞕徑從實化而為結胸矣法當以大陷胸湯主之若不從實化不成結胸但頭汗出至頸餘處無汗則熱不得越也小便不利則濕不得瀉也熱濕合化故身必發黄也集註成無已曰動數變遲而浮衇獨不變者以邪結胸中上焦陽分衇不得而沉也朱震亨曰太陽病表未解而攻裏裏已虚矣雖見浮而動數之陽衇一經誤下則必變為遲隂之衇矣胃中空虚短氣躁煩虚之甚矣借曰陽氣内陷心中因鞕而可迅攻之乎大陷胸之力不緩於承氣下而又下寜不畏其重虚耶即陽病實邪下後若胃中空虚客氣動膈心中懊憹者亦以梔子豉湯吐胸中之邪可也况太陽誤下後明有虚證乎按朱震亨所論治以梔子豉湯吐之亦是未成結胸從胸虚有熱而化者宜也若從胸虚有寒而化者不論已成未成結胸則又當從活人書温補法矣不可混施也方有執曰太陽之衇本浮動數者亦傳也太陽本自汗而言微盜汗本惡寒而言反惡寒者稽乆而然也膈心胸之間也拒格拒也言膈氣與邪氣相格拒而為痛也客氣邪氣也短氣促氣不能布息也懊憹心為邪亂而不寜也陽氣客氣之别名也以本外邪故曰客氣以邪本風故曰陽氣以裏虚因而陷入故曰内陷自若不結胸句至末以變之輕者而言也大陷胸湯方大黄六兩去皮芒硝一升甘遂一錢另碾右三味以水六升先煮大黄取二升去滓内芒硝煮一兩沸内甘遂末温服一升得快利止後服集解方有執曰上焦有髙邪必陷下以平之故曰陷胸湯平邪蕩寇將軍之職也以大黄為君鹹能軟堅以芒硝為臣徹上徹下破結逐水以甘遂為佐惟大實者乃為合法如挟虚或衇浮不可輕試太陽病重發汗而復下之不大便五六日舌上燥而渴日晡所小有潮熱從心下至少腹鞕滿而痛不可近者大陷胸湯主之註此承上條互發其義以詳其證治也太陽病重發汗而復下之津液傷矣不大便五六日胃府燥矣舌上燥渴胃中乾也日晡潮熱胃熱盛也從心下至少腹鞕滿而痛不可近者謂胸腹之中上下俱鞕滿結實大痛手不可近故以大陷胸湯主之無疑也集註内臺方議曰日晡所作日晡所發方有執曰此明結胸有陽明内實疑似之辨晡日加申時也小有微覺有也盖不大便燥渴日晡潮熱從心下至少腹鞕滿而痛皆似陽明内熱惟小有潮熱不似陽明大熱之甚所以陽明必以胃家實為主而凡有一毫太陽證在皆不得入陽明例者亦以此也程知曰太陽結胸兼陽明内實故用大陷胸湯由胸脅以及腸胃皆可蕩滌無餘若但下腸胃結熱而遺胸上痰飲則非法矣吴人駒曰一腹之中上下邪氣皆盛證之全實者其衇常沉伏不可生疑畏惟下之而衇自漸出也小結胸病正在心下按之則痛衇浮滑者小陷胸湯主之註大結胸邪重熱深病從心下至少腹鞕滿痛不可近衇沉實故宜大陷胸湯以攻其結瀉其熱也小結胸邪淺熱輕病正在心下鞕滿按之則痛不按不痛衇浮滑故用小陷胸湯以開其結滌其熱也集註程應旄曰按陷胸條曰心下痛按之石鞕又曰心下滿而鞕痛此曰病正在心下則知結胸不拘在心下與胸上祗在痛不痛上分别故痞證亦有心下鞕者但不痛耳張錫駒曰湯有大小之别證有輕重之殊今人多以小陷胸湯治大結胸證皆致不救遂諉結胸為不可治之證不知結胸之不可治祗一二節餘皆可治者苟不體認經旨必致臨時推諉誤人性命也魏荔彤曰小結胸無實熱之邪但微熱而挟痰飲為患故雖結胸而不能髙踞胸巔但正在心下而已不能實力作痛惟按之痛而已診之不沉而深惟浮而輕淺而已不能作石鞕惟虚而結阻而已所以大陷胸湯不應用而另設小陷胸湯髙下堅軟輕重沉浮之間病機治法昭然已又云痞隂邪結胸陽邪然於陽邪中又有大小之分學者審之於凡寒熱雜合之證無大實大熱俱宜斟酌下法勿孟浪也小陷胸湯方黄連一兩半夏半觔洗栝蔞實一枚大者右三味以水六升先煮栝蔞取三升去滓内諸藥煮取二升去滓分温三服方解黄連滌熱半夏導飲栝蔞潤燥下行合之以滌胸膈痰熱開胸膈氣結攻雖不峻亦能突圍而入故名小陷胸湯分温三服乃緩以治上之法也傷寒六七日結胸熱實衇沉而𦂳心下痛按之石鞕者大陷胸湯主之註傷寒表不解誤下成痞此其常也傷寒或有因誤下而成結胸者乃其變也今傷寒六七日結胸不因誤下而成此熱實之證若衇沉𦂳裏實衇也心下痛按之石鞕裏實證也此為衇病皆實故以大陷胸湯主之也集註喻昌曰熱實二字形容結胸之状甚明見邪熱填實於胸而不散漫也浮𦂳主傷寒無汗沉𦂳主傷寒結胸此與中風之陽邪結胸逈别所以不言浮也又曰陽邪誤下成結胸隂邪誤下成痞然中風間有痞證傷寒間有結胸證又不可不知程應旄曰雖曰陽邪内陷然隂陽二字從虚實寒熱上區别非從中風傷寒上區别表熱盛實轉入胃府則為陽明證表熱盛實不轉入胃府而陷入於膈則為結胸證故不必誤下始成也不因下而成結胸者必其人胸有燥邪以失汗而表邪合之遂成裏實觀此條曰傷寒六七日又曰衇沉而𦂳則可知矣汪琥曰或問衇沉𦂳焉知非寒實結胸答曰胸中者陽氣之所聚也邪熱當胸而結直至心下石鞕且痛則衇不但沉𦂳甚至有伏而不見者烏可以衇沉𦂳為非熱耶大抵辨結胸之法但當憑證最為有凖寒實結胸無熱證者與三物小陷胸湯白散亦可服按無熱證之下與三物小陷胸湯當是三物白散小陷胸湯四字必是傳寫之誤桔梗貝母巴豆三物其色皆白有三物白散之義温而能攻與寒實之理相屬小陷胸湯乃栝蔞黄連皆性寒之品豈可以治寒實結胸之證乎亦可服三字亦衍文也註結胸證身無大熱口不燥渴則為無熱實證乃寒實也與三物白散然此證衇必當沉𦂳若衇沉遲或證見三隂則又非寒實結胸可比當以枳實理中湯治之矣集註王肯堂曰熱實結胸及寒實結胸活人書不拘寒熱但用陷胸湯不瘥者用枳實理中丸即應手而愈方有執曰寒以飲言飲本寒也又得水寒兩寒摶結而實於胸中故謂無熱證也程知曰結胸有大小之别寒熱之異不得㮣用硝黄也鄭重光曰水寒結實在胸則心陽被據自非細故用三物白散下寒而破結皆不得已之兵也三物白散方桔梗三分巴豆一分去皮心熬黒研如脂貝母三分右件二味為末内巴豆更於臼中杵之以白飲和服强人半錢匕羸者減之病在膈上必吐在膈下必利不利進熱粥一盃利過不止進冷粥一盃方解是方也治寒實水結胸證極峻之藥也君以巴豆極辛極烈攻寒逐水斬闗奪門所到之處無不破也佐以貝母開胸之結使以桔梗為之舟楫載巴豆搜逐胸邪悉盡無餘膈上者必吐膈下者必利然惟知任毒以攻邪不量强羸鮮能善其後也故羸者减之不利進熱粥利過進冷粥盖巴豆性熱得熱則行得冷則止不用水而用粥者藉穀氣以保胃也傷寒十餘日熱結在裏復徃来寒熱者與大柴胡湯但結胸無大熱者此為水結在胸脇也但頭微汗出者大陷胸湯主之註傷寒十餘日熱結在裏若胸脇滿鞕者此結胸也今不滿鞕復徃来寒熱者乃少陽表裏病非結胸也當與大柴胡湯兩解之但結胸證亦有水結者水結胸不但表無大熱裏亦無大熱也有結胸狀頭微汗出者此水停於胸為熱氣上蒸使然也故曰水結在胸脇也亦以大陷胸湯主之飲熱並攻也集註方有執曰水即飲也以不實鞕故曰水結胸脇亦裏也以熱結不髙故曰在裏程知曰此言熱結於裏兼少陽者則不宜陷胸水結於胸者雖無大熱猶宜大陷胸也程應旄曰大柴胡與大陷胸皆能破結大柴胡之破結使表分無留邪大陷胸之破結使裏分無留邪林瀾曰此言水結胸之與熱結在裏不同也十餘日邪深入府之時然熱結在裏而猶有半表半裏之邪作徃来寒熱者必以大柴胡兩解之若但胸脇結滿初無大熱收斂入内者此亦不得為大柴胡證必水結胸脇也何以知之水結胸者頭汗出今但頭微汗為水結胸明矣與大陷胸湯結胸者項亦强如柔痙狀下之則和宜大陷胸丸註結胸從心上至少腹鞕滿痛不可近則其勢甚於下者治下宜急攻之以大陷胸湯結胸從胸上滿鞕項强如柔痙狀則其熱甚於上者治上宜緩攻之以大陷胸丸直攻胸肺之邪煮服倍蜜峻治緩行下而和之以其病勢緩急之形既殊湯丸之製亦異也故知此項强乃結胸之項强下之則和非柔痙之項强也集註成無已曰項强者為邪結胸中胸膈結滿但能仰而不能俯是項强也程知曰項强如柔痙者胸中邪氣𦂳實項勢常昻有似柔痙之狀然痙病身手俱張此但項强原非痙也借此以驗胸邪十分𦂳逼耳汪琥曰下之則和者言邪實去胸中和而項自舒之意若不云如柔痙恐醫人認以為太陽經風寒之邪未解反疑其當用發汗之藥殊不知項雖强表證已解裏證甚急治法宜下也大陷胸丸方大黄半觔葶藶子半升熬芒硝半升杏仁半升去皮尖熬黑右四味𢷬篩二味内杏仁芒硝合研如脂和散取如彈丸一枚别𢷬甘遂末一錢匕白蜜二合水二升煮取一升温頓服之一宿乃下如不下更服取下為效禁如藥法結胸證其衇浮大者不可下下之則死註結胸證若衇大是為胃實知結熱已實乃可下下之則愈今其衇浮大是尚在表知熱結未實故不可下若誤下之未盡之表邪復乘虚入裏誤而又誤結而又結病熱彌深正氣愈虚則死矣集註張兼善曰結胸為可下之證若衇浮大心下雖結表邪尚多下之重虚其裏外邪復聚則死矣程知曰結胸亦有不可下者宜審其衇以施治也結胸為邪結上焦之分得寸衇浮闗衇沉或沉𦂳則為在裏可下也若衇浮大則邪猶在表下之是令其結而又結也故死結胸證悉具煩躁者亦死註結胸證悉具謂鞕滿而痛結在膈之上下也悉具者謂胸之下少腹之上左右兩脇無不鞕滿而痛也較之大結胸為尤甚此時宜急下之或有生者若復遷延必至邪勝正負形氣相離煩躁不寜下亦死不下亦死矣集註方有執曰結胸證全具已主死矣而更加以煩躁即不再下亦主死也程應旄曰結胸證妄下不可失下亦不可總在適當其宜則去邪即所以安正也魏荔彤曰此條乃承上條衇見浮大而言必結胸證具衇兼見浮大而加以煩躁方可卜其死不然煩躁亦結胸證中之一也何遽云死耶問曰病有結胸有藏結其狀何如答曰按之痛寸衇浮闗衇沉名曰結胸也何謂蔵結答曰如結胸狀飲食如故時時下利寸衇浮闗衇小細沉𦂳名曰蔵結舌上白胎滑者難治註邪結三陽名曰結胸邪結三隂名曰蔵結二者皆下後邪氣乘虚入裏所致而其衇與證之狀則不同其鞕滿而按之痛結胸證也寸衇浮闗衇沉結胸衇也寸浮主胸主表闗沉主胃主裏是知其邪由胸表陷入胃裏而結也如結胸狀飲食如故時時下利蔵結證也寸衇浮闗衇細小沉𦂳蔵結衇也細小沉𦂳主蔵結寒痛是知其邪由胸表陷入蔵裏而結也蔵結雖鞕滿而痛如結胸狀然結胸病屬裏壅塞必不能飲食蔵結病屬裏空虚故飲食如故結胸屬實熱故鞕痛不大便而衇沉石蔵結屬虚寒故鞕痛下利而衇細𦂳也舌上白胎滑者胸中無熱可知蔵結隂邪得之為順尚可以理中軰温之結胸陽邪得之為逆不堪攻下故難治也集註成無已曰氣宜通也以塞故痛邪結陽分則隂氣不得下通邪結隂分則陽氣不得上通故知二者皆按之痛鞕也方有執曰此設問答以明結胸藏結之同異藏結之時時下利者隂邪結於隂藏而寒甚也以寒甚故衇小細𦂳此其所以不同也蓋結胸以陽邪結於陽藏結以隂邪結於隂故也汪琥曰結胸證其人本胃中有飲食下之太早則食去不盡外邪反入結於胸中以故按之則痛不能飲食藏結證其人胃中本無飲食下之太過則蔵虚邪入與寒結於隂分所以狀如結胸按之不痛能飲食時下利也魏荔彤曰人知此條為辨結胸非指藏結而論不知正謂藏結與痞有相類而與結胸實有不同蓋結胸陽邪也痞與蔵結隂邪也痞則尚有陽浮於上藏結則上下俱無陽是皆誤下誤吐之過也按此條舌上白胎滑者難治句前人舊註皆單指藏結而言未見明晰誤人不少蓋舌胎白滑即結胸證具亦是假實舌胎乾黄雖藏結證具每伏真熱藏結隂邪白滑為順尚可温散結胸陽邪見此為逆不堪攻下故為難治由此可知著書立論必須躬親體驗真知灼見方有濟於用若徒就紙上陳言牽强附㑹又何異按圖索驥耶病脇下素有痞連在臍旁痛引少腹入隂筋者此名蔵結死註病藏結之人若脇下素有痞連在臍旁新舊病合痛引少腹入隂筋者其邪又進厥隂乃屬藏結之死證也集註程知曰宿結之邪與新結之邪交結而不解痞連臍旁脾藏結也痛引少腹腎藏結也自脇入隂筋肝藏結也三隂之蔵俱結矣故主死藏結無陽證不徃来寒熱其人反静舌上胎滑者不可攻也註藏結無三陽證不發熱無太陽也不徃来寒熱無少陽也其人反静無陽明也舌胎滑白胸中有寒故可温不可攻也集註方有執曰胎滑本丹田有熱胸中有寒而成然丹田隂也胸中陽也熱反在隂而寒反在陽所以為不可攻也程知曰經於蔵結白胎滑者祗言難治未嘗言不可治也祗言蔵結無熱舌胎滑者不可攻未嘗言蔵結有熱舌胎不滑者亦不可攻也意者丹田有熱胸中有寒之證必有和解其熱温散其寒之法俾内邪潜消外邪漸解者斯則良工之苦心乎病在陽應以汗解之反以冷水潠之若灌之其熱被却不得去彌更益煩肉上粟起意欲飲水反不渴者服文蛤散若不差者與五苓散身熱皮粟不解欲引衣自覆者若水以潠之洗之益令熱被却不得出當汗而不汗則煩假令汗出已腹中痛與芍藥三兩如上法註病在陽謂病發於陽而身熱也此應以汗解之而反以冷水潠之灌之則身熱雖被刼而暫却然終不得去故熱煩益甚也水寒外束膚熱乍凝故肉生膚粟熱入不深故意欲飲水反不甚渴也故以文蛤散内疏膚熱若不差與五苓散外解水寒則皮粟身熱當解矣若不解且惡寒引衣自覆是尚有表也當以桂枝湯汗解之假令服桂枝湯汗已出熱粟俱解而腹中増痛又為表已和裏未調也宜與桂枝湯倍加芍藥調裏以和其表若渴欲飲水而不腹痛則不湏調太隂裏而仍當調太陽府矣宜仍取乎五苓也文蛤散方文蛤五兩右一味為散沸湯和一錢匕服湯用五合按文蛤即五倍子也音切强羣養切惡汚去聲中音衆嗇音色淅音錫翕音吸㕮音父咀音苴去上聲滓音笫歠與啜同覆芳救切漐音蟄差與瘥同諧音鞋噤渠飲切劇音屐傳音囀為去聲識與誌同乾音干散上聲和去聲悸音季灌音貫更去聲痞音否鞕音硬頸音景羸音雷養上聲糜音迷咽音嚥數音朔懊影考切憹音農燥音掃晡布胡切痙音涇潠心艮切御纂醫宗金鑑卷一
