穴歌百㑹主治卒中風兼治癲癎兒病驚大腸下氣脱肛病提補諸陽氣上升註百㑹穴提補陽氣上升主治大人中風痰火癲癎小兒急慢驚風大腸下氣脱肛等證鍼二分灸五壯神庭主灸羊癎風目眩頭痛灸腦空翳風專刺耳聾病兼刺瘰癧項下生註神庭穴主治風癎羊癲灸三壯禁鍼刺腦空穴主治偏正頭疼目眩刺四分灸五壯翳風穴主治耳聾及瘰癧鍼經云先將銅錢約二十文令患者咬之尋取穴中鍼三分禁灸上星通天主鼻淵瘜肉痔塞灸能痊兼治頭風目諸疾炷如小麥灼相安註上星通天二穴主治鼻淵鼻塞瘜肉鼻痔左鼻灸右右鼻灸左左右鼻俱病者左右俱灸灸後鼻中當去一塊形如朽骨狀其病自愈兼治頭風目疾等證也上星穴宜刺三分留六呼灸五壯一云宜三棱鍼出血以㵼諸陽之熱氣通天穴宜刺三分留七呼灸三壯其壯如小麥大始相宜也瘂門風府祗宜刺中風舌緩不能言頸項强急及瘈瘲頭風百病與傷寒註瘂門風府二穴主治中風舌緩暴瘖不語傷風傷寒頭痛項急不得回顧及抽搐等病瘂門穴鍼二分不可深入禁灸風府穴鍼三分留三呼禁灸頭維主刺頭風疼目痛如脱淚不明禁灸隨皮三分刺兼刺攢竹更有功註頭維攢竹二穴主治頭風疼痛如破目痛如脱淚出不明頭維穴隨皮鍼三分禁灸攢竹穴刺一分留六呼禁灸隨皮者鍼入即眠鍼隨皮刺去也率谷酒傷吐痰眩風池主治肺中寒兼治偏正頭疼痛頰車落頰風自痊註率谷穴主治傷酒嘔吐痰眩刺三分灸三壯風池穴治肺受風寒及偏正頭風刺四分灸三壯七壯炷宜小頰車穴治落頰風落頰風者下頦脱落也刺三分灸三壯炷如小麥臨泣主治鼻不通眵䁾泠淚雲翳生驚癎反視卒暴厥日晡發瘧脇下疼註臨泣穴主治鼻塞目眩生翳眵䁾眼目諸疾及驚癎反視卒暴痰厥瘧疾晩發等病刺三分留七呼禁灸水溝中風口不開中惡癲癎口眼歪刺治風水頭面腫灸治兒風急慢災註水溝穴主治中風口噤牙關不開卒中惡邪鬼擊不省人事癲癎卒倒口眼歪邪風水面腫及小兒急慢驚風等病刺三分留六呼灸三壯至七壯炷如小麥然灸不及鍼承漿主治男七疝女子瘕聚兒𦂳脣偏風不遂刺之效消渴牙疳灸功深註承漿穴主治男子諸疝女子瘕聚小兒撮口及偏風半身不遂口眼喎邪口禁不開消渴飲水不休口齒疳蝕生瘡等證刺二分留五呼灸三壯迎香主刺鼻失臭兼刺面癢若蟲行先補後瀉三分刺此穴須知禁火攻註迎香穴主治鼻塞不聞香臭浮腫風動面癢狀如蟲行等證鍼三分禁灸口眼歪邪灸地倉頰腫脣弛牙噤强失音不語目不閉瞤動視物目􅉩􅉩註地倉穴主偏風口眼歪邪牙關不開齒痛頰腫目不能閉脣緩不收飲食難進失音不語眼目瞤動視物􅉩􅉩昏夜無見等證刺三分留五呼灸七壯或二七壯重者七七壯俱可聽㑹主治耳聾鳴兼刺迎香功最靈中風瘈瘲喎斜病牙車脱臼齒根疼註聽㑹穴主治耳聾耳鳴牙車脱臼齒痛中風瘈瘲喎邪等證鍼四分灸三壯兼瀉迎香功效如神迎香穴鍼三分禁灸聽宮主治耳聾鳴睛明攢竹目昏矇迎風流淚眥癢痛雀目攀睛白翳生註聽宮穴主治耳内蟬鳴耳聾刺三分灸三壯睛明攢竹二穴主治目痛視不明迎風淚努肉攀睛白翳眥癢雀目諸證睛明穴鍼分半留六呼禁灸攢竹穴治證同前刺三分留六呼禁灸胷腹部主病鍼灸要穴歌膻中穴主灸肺癰欬𠻳哮喘及氣癭巨闕九種心疼病痰飲吐水息賁寧註膻中穴主治哮喘肺癰欬𠻳氣癭等證灸七壯禁鍼巨闕穴主治九種心痛痰飲吐水腹痛息賁等證鍼三分留七呼灸七壯上脘奔豚與伏梁中脘主治脾胃傷兼治脾痛瘧痰暈痞滿翻胃盡安康註上脘穴主治腎積奔豚心積伏梁之證鍼八分留七呼灸五壯千金云每日灸二七壯至百壯孕婦不可灸中脘穴主治内傷脾胃心脾痛瘧疾痰暈痞滿翻胃等證鍼八分灸七壯一云二七壯至百壯孕婦不可灸水分脹滿臍突鞕水道不利灸之良神闕百病老虚瀉産脹溲難兒脱肛註水分穴主治鼓脹堅鞕肚臍突出小便不利灸五壯禁鍼孕婦不可灸神闕穴主治百病及老人虚人泄瀉又治産後腹脹小便不通小兒脱肛等證灸三壯禁鍼一法納炒乾淨鹽填滿臍上加厚薑一片蓋定上加艾炷灸百壯或以川椒代鹽亦妙氣海主治臍下氣關元諸虚瀉濁遺中極下元虚寒病一切痼冷總皆宜註氣海穴主治一切氣疾隂證痼冷及風寒暑濕水腫心腹鼓脹諸虚癥瘕等證鍼八分灸五壯關元穴主治諸虚腎積及虚老人泄瀉遺精白濁等證鍼八分留七呼灸七壯千金云婦人鍼之則無子中極穴主治下元寒冷虚損及婦人月事不調赤白帶下鍼八分留十呼灸三壯孕婦不可灸膺腫乳癰灸乳根小兒龜胸灸亦同嘔吐吞酸灸日月大赫專治病遺精註乳根穴主治胸前腫乳癰小兒龜胸等證鍼三分灸三壯日月穴主治嘔吐吞酸鍼七分灸五壯大赫穴主治遺精鍼三分灸五壯天樞主灸脾胃傷脾瀉痢疾甚相當兼灸鼓脹癥瘕病艾火多加病必康註天樞穴主治内傷脾胃赤白痢疾脾瀉及臍腹鼓脹癥瘕等證鍼五分留七呼灸五壯千金云魂魄之舍不可鍼孕婦不可灸章門主治痞塊病但灸左邊可拔根若灸腎積臍下氣兩邊齊灸自然平註章門穴主治痞塊多灸左邊腎積灸兩邊鍼六分留六呼灸三壯一云百壯期門主治奔豚病上氣欬逆胸背疼兼治傷寒脇鞕痛熱入血室刺有功註期門穴主治奔豚上氣欬逆胸滿胸背徹痛胸痛腹鞕及傷寒熱入血室鍼四分灸五壯帶衇主灸一切疝偏墜木腎盡成功兼灸婦人濁帶下丹田温煖自然停註帶衇穴主治疝氣偏墜木腎及婦人赤白帶下等證鍼六分灸五壯背部主病鍼灸要穴歌腰俞主治腰脊痛冷痺强急動作難腰下至足不仁冷婦人經病溺赤痊註腰俞穴主治腰脊重痛舉動不得俯仰艱難腰以下至足冷痺不仁及婦人經閉溺血等證刺二分留七呼灸五壯至陽耑灸黄疸病兼灸痞滿喘促聲命門老虚腰痛證更治脱肛痔腸風註至陽穴主治身面俱黄胸脇支滿喘促不寧鍼五分灸三壯命門穴主治老人腎虚腰疼及久痔脱肛腸風下血等證鍼五分灸三壯若年二十以上者不宜灸灸恐絶子膏盲一穴灸勞傷百損諸虚無不良此穴禁鍼惟宜艾千金百壯效非常註膏盲穴主治諸虚百損五勞七傷身形羸痩夢遺失精上氣欬逆痰火發狂健忘怔忡胎前産後勞瘵傳尸等證灸七七壯至百壯大杼主刺身發熱兼刺瘧疾欬𠻳痰神道惟灸背上病怯怯短氣艾火添註大杼穴主治遍身發熱瘧疾欬𠻳多痰鍼五分禁灸神道穴主治背上冷痛怯怯短氣灸七壯禁鍼風門主治易感風風寒痰𠻳吐血紅兼治一切鼻中病艾火多加嗅自通註風門穴主治腠理不密易感風寒欬𠻳吐痰咯血鼻衂及一切鼻中諸病鍼三分灸五壯肺俞内傷𠻳吐紅兼灸肺痿與肺癰小兒龜背亦堪灸肺氣舒通背自平註肺俞穴主治内傷外感欬𠻳吐血肺痿肺癰小兒龜背鍼三分留七呼灸三壯膈俞主治胸脇痛兼灸痰瘧痃癖攻更治一切失血證多加艾灼總收功註膈俞穴主治胸脇疼痛痰瘧痃癖一切血痰灸三壯禁鍼肝俞主灸積聚痛兼灸氣短語聲輕更同命門一併灸能使瞽目復重明註肝俞穴主治左脇積聚疼痛氣短不語若同命門穴一併灸之即兩目昏暗者可使復明肝俞穴灸七壯禁鍼命門穴鍼五分灸三壯膽俞主灸脇滿嘔驚悸臥睡不能安兼灸酒疽目黄色面發赤斑灸自痊註膽俞穴主治兩脇脹滿乾嘔驚悸睡臥不安及酒疽目睛發黄面發赤斑等證灸三壯禁鍼脾俞主灸傷脾胃吐瀉瘧痢疸瘕癥喘急吐血諸般證更治嬰兒慢脾風註脾俞穴主治内傷脾胃吐瀉瘧痢黄疸食積癥瘕吐血喘急及小兒慢脾風證灸五壯禁鍼三焦俞治脹滿疼積塊堅硬痛不寧更治赤白休息痢刺灸此穴自然輕註三焦俞穴主治脹滿積塊堅硬疼痛及赤白痢疾不止等證鍼二分灸五壯胃俞主治黄疽病食畢頭目即暈眩瘧疾善饑不能食艾火多加自可痊註胃俞穴主治黄疸食畢頭眩瘧疾善饑不能食等證鍼三分灸三壯腎俞主灸下元虚令人有子效多竒兼灸吐血聾腰痛女疽婦帶不能遺註腎俞穴主治下元諸虚精冷無子及耳聾吐血腰痛女勞疽婦人赤白帶下等證灸三壯禁鍼大腸俞治腰脊疼大小便難此可通兼治泄瀉痢疾病先補後瀉要分明註大腸俞穴主治腰脊疼痛大小便不通及泄瀉痢疾等證鍼三分灸三壯膀胱俞治小便難少腹脹痛不能安更治腰脊强直痛艾火多添疾自痊註膀胱俞穴主治小便不通少腹脹痛及腰脊强直疼痛等證鍼三分灸七壯譩譆主治久瘧病五藏瘧灸藏俞平意舍主治脇滿痛兼療嘔吐立時寧註譩譆俞穴主治久瘧若五藏瘧灸五藏俞五藏俞者心肝脾肺腎俞也俱鍼六分灸二七壯意舍穴主治兩脇脹滿疼痛嘔吐鍼五分灸三壯身柱主治羊癎風欬𠻳痰喘腰背疼長强惟治諸般痔百勞穴灸汗津津註身柱穴主治風癎發狂欬𠻳痰喘腰背疼痛等證鍼五分灸七七壯長强穴主治諸般痔漏疼痛鍼三分灸三十壯百勞穴主治滿身發熱虚汗盜汗津津不止鍼五分留三呼瀉五吸灸以年為壯手部主病鍼灸要穴歌尺澤主刺肺諸疾絞腸痧痛鎖喉風傷寒熱病汗不解兼刺小兒急慢風註尺澤穴主治欬唾膿血喉痺肺積息賁及絞腸痧痛傷寒汗不出小兒急慢驚風等證刺三分或三稜鍼出血禁灸列缺主治𠻳寒痰偏正頭疼治自痊男子五淋隂中痛尿血精出灸便安註列缺穴主治欬𠻳寒痰偏正頭疼及男子淋漓隂中疼痛尿血精出等證鍼二分灸七壯炷如小麥經渠主刺瘧寒熱胸背拘急脹滿堅喉痺欬逆氣數欠嘔吐心疼亦可痊註經渠穴主治痎瘧寒熱胸背拘急膨脹喉痺欬逆上氣數欠嘔吐心疼等證鍼二分禁灸太淵主刺牙齒病腕肘無力或痛疼兼刺欬𠻳風痰疾偏正頭疼效若神註太淵穴主治牙齒疼痛手腕無力疼痛及欬𠻳風痰偏正頭疼等證鍼二分灸三壯魚際主灸牙齒痛在左灸左右同然更刺傷寒汗不出兼治瘧疾方欲寒註魚際穴主治牙齒痛瘧疾初起先覺發寒傷寒汗不出等證鍼二分惟牙痛可灸餘證禁灸少衝主治心膽虚怔忡癲狂不可遺少商惟鍼䨇鵞痺血出喉開功最竒註少衝穴主治心虚膽寒怔忡癲狂鍼一分灸三壯少商穴主治䨇鵞風喉痺以三稜鍼刺微出血禁灸少海主刺腋下瘰漏臂痺痛羊癎風靈道主治心疼痛瘈瘲暴瘖不出聲註少海穴主治腋下瘰癧漏臂與風吹肘臂疼痛也及癲癎羊鳴等證鍼五分禁灸靈道穴主治心痛羊癎瘈瘲肘攣暴瘖不能言等證鍼三分灸三壯通里主治温熱病無汗懊憹心悸驚喉痺苦嘔暴瘖瘂婦人經漏過多崩註通里穴主治温病面熱無汗懊憹心悸驚恐喉痺苦嘔暴瘖聲瘂及婦人經血過多崩漏等證鍼三分灸三壯神門主治悸怔忡呆癡中惡恍惚驚兼治小兒驚癎證金鍼補瀉疾安寧註神門穴主治驚悸怔忡呆痴卒中鬼邪恍惚振驚及小兒驚癎等證鍼三分留七呼灸三壯炷如小麥少府主治久痎瘧肘腋拘急痛引胸兼治婦人挺痛癢男子遺尿偏墜疼註少府穴主治痎瘧久不愈臂痠肘腋攣急胷中痛及婦人隂挺隂癢隂痛男子遺尿偏墜等證鍼二分灸三壯曲澤主治心痛驚身熱煩渴肘掣疼兼治傷寒嘔吐逆鍼灸同施立刻寧註曲澤穴主治心痛善驚身熱煩渴臂肘揺動掣痛不能伸傷寒嘔吐氣逆等證鍼三分留七呼灸三壯間使主治脾寒證九種心疼瘧渴生兼治瘰癧生項下左右鍼灸自然平註間使穴主治脾寒證九種心痛脾疼瘧疾口渴及瘰癧久不愈患左灸右患右灸左鍼六分留七呼灸五壯内關主刺氣塊攻兼灸心胸脇痛疼勞熱瘧疾審補瀉金鍼抽動立時寧註内關穴主治氣塊上攻心胸脇肋疼痛勞熱瘧疾等證鍼五分灸五壯痰火胸疼刺勞宮小兒口瘡鍼自輕兼刺鵝掌風證候先補後瀉效分明註勞宮穴主治痰火胸痛小兒口瘡及鵝掌風等證鍼二分禁灸商陽主刺卒中風暴仆昏沉痰塞壅少商中衝關衝少少澤三稜立回生註中衝穴乾坤生意云此為十井穴凡初中風跌倒卒暴昏沉痰盛不省人事牙關𦂳閉藥水不下急以三稜鍼刺中衝少商商陽關衝少衝少澤使血氣流通實起死回生急救之妙法也三里三間並二間主治牙疼食物難兼治偏風眼目疾鍼灸三穴莫教偏註三里三間二間三穴主治牙齒疼痛食物艱難及偏風眼目諸疾三穴併鍼灸之三里穴鍼二分灸三壯二間穴鍼三分灸三壯三間穴鍼三分灸三壯合谷主治破傷風痺痛筋急鍼止疼兼治頭上諸般病水腫産難小兒驚註合谷穴主治破傷風風痺筋骨疼痛諸般頭痛水腫産難及小兒急驚風等證鍼三分留六呼灸三壯陽谿主治諸熱證癮疹痂疥亦當鍼頭痛牙痛咽喉痛狂妄驚中見鬼神註陽谿穴主治熱病煩心癮疹痂疥厥逆頭痛牙疼咽喉腫痛及狂妄驚恐見鬼等證鍼三分留七呼灸三壯曲池主治是中風手攣筋急痛痺風兼治一切瘧疾病先寒後熱自然平註曲池穴主治中風手攣筋急痺風瘧疾先寒後熱等證鍼五分灸七壯肩井一穴治仆傷肘臂不舉淺刺良肩髃主治癱瘓疾手攣肩腫效非常註肩井穴主治仆傷肘臂疼痛不舉鍼五分灸五壯孕婦禁鍼肩髃穴主治癱瘓手攣肩腫鍼六分灸五壯少澤主治衂不止兼治婦人乳腫疼大陵一穴何專主嘔血瘧疾有竒功註少澤穴主治鼻衂不止婦人乳腫鍼一分灸三壯大陵穴主治嘔血瘧疾鍼六分灸三壯前谷主治癲癎疾頸項肩臂痛難堪更能兼治産無乳小海喉齦腫痛痊註前谷穴主治癲癎頸項頰腫引耳疼痛及婦人産後無乳等證鍼一分留三呼灸三壯小海穴主治咽喉牙齦腫痛等證鍼二分灸五壯腕骨主治臂腕疼五指諸疾治可平後谿能治諸瘧疾能令癲癎漸漸輕註腕骨穴主治臂腕五指疼痛鍼二分灸三壯後谿穴主治瘧疾癲癎鍼一分灸一壯陽谷主治頭面病手膊諸疾有多般兼治痔漏隂痿疾先鍼後灸自然痊註陽谷穴主治頭面項腫手膊疼痛不舉及痔漏隂痿等證鍼二分灸三壯支正穴治七情鬱肘臂十指盡皆攣兼治消渴飲不止補瀉分明自可安註支正穴主治七情鬱結不舒肘臂十指筋攣疼痛及消渴飲水不止等證鍼三分灸三壯液門主治喉齦腫手臂紅腫出血靈又治耳聾難得睡刺入三分補自寧註液門穴主治咽喉外腫牙齦痛手臂紅腫耳暴聾不得眠等證鍼三分留二呼灸三壯中渚主治肢木麻戰振踡攣力不加肘臂連肩紅腫痛手背癰毒治不發註中渚穴主治四肢麻木戰振踡攣無力肘臂連肩紅腫疼痛手背癰毒等證鍼二分灸三壯陽池主治消渴病口乾煩悶瘧熱寒兼治折傷手腕痛持物不得舉臂難註陽池穴主治消渴口乾煩悶寒熱瘧或因折傷手腕持物不得臂不能舉等證鍼二分禁灸外關主治藏府熱肘臂脇肋五指疼瘰癧結核連胸頸吐衂不止血妄行註外關穴主治五藏六府結熱鼻衂吐血不止及肘臂脇肘手指節痛瘰癧結核遶頸連胸腫痛不消等證鍼三分留七呼灸三壯支溝中惡卒心痛大便不通脇肋疼能寫三焦相火盛兼治血脱暈迷生註支溝穴主治鬼擊卒心痛凡三焦相火熾盛及大便不通脇肋疼痛婦人産後血暈不省人事等證鍼二分留七呼灸七壯天井主寫瘰癧疹角孫惟主目翳生耳門耳聾䁎耳病絲竹空穴治頭風註天井穴主治瘰癧癮疹鍼三分灸五壯角孫穴主治目中生翳鍼三分灸三壯耳門穴主治耳聾䁎耳膿汁鍼三分留三呼禁灸絲竹空穴主治頭痛目赤目眩視物􅉩􅉩鍼三分留三呼禁灸足部主病鍼灸要穴歌隱白主治心脾痛築賔能醫氣疝疼照海穴治夜發痓兼療消渴便不通註隱白穴主治心脾疼痛鍼一分灸三壯築賔穴主治氣疝鍼三分灸五壯照海穴主治夜發痓證及消渴大便閉鍼三分灸三壯大都主治温熱病傷寒厥逆嘔悶煩胎産百日内禁灸千金主灸大便難註大都穴主治温熱病汗不出傷寒手足逆冷腹滿嘔吐悶亂及大便難等證鍼三分留七呼灸三壯凡婦人懷孕及生産後未滿百日俱不宜灸太白主治痔漏疾一切腹痛大便難痞疸寒瘧商邱主兼治嘔吐瀉痢痊註太白穴主治痔漏腹中疼痛大便不通等證鍼三分留七呼灸三壯商邱穴主治痞氣黄疸寒瘧及嘔吐㵼痢等證鍼三分留七呼灸三壯公孫主治痰壅膈腸風下血積塊疴兼治婦人氣蠱病先補後㵼自然瘥註公孫穴主治痰壅胸膈腸風下血積塊及婦人氣蠱等證鍼四分灸三壯三隂交治痞滿堅痼冷疝氣脚氣纒兼治不孕及難産遺精帶下淋瀝痊註三隂交穴主治痞滿痼冷疝氣遺精及婦人脚氣月信不調久不成孕難産赤白帶下淋瀝等證鍼三分灸三壯血海主治諸血疾兼治諸瘡病自輕隂陵泉治脇腹滿刺中下部盡皆鬆註血海穴主治女子崩中漏下月信不調帶下及男子腎藏風兩腿瘡癢濕痛等證鍼五分灸五壯隂陵泉穴主治脇腹脹滿隂痛足膝紅腫小便不通小便失禁不覺下部等證鍼五分留七呼灸三壯湧泉主刺足心熱兼刺奔豚疝氣疼血淋氣痛疼難忍金鍼㵼動自安寧註湧泉穴主治足發熱奔豚疝氣疼痛血淋氣痛等證鍼三分留三呼灸三壯然谷主治喉痺風欬血足心熱遺精疝氣温瘧多渴熱兼治初生兒臍風註然谷穴主治喉痺唾血遺精温瘧疝氣足心熱及小兒撮口臍風鍼三分留三呼灸三壯凡鍼不宜見血太谿主治消渴病兼治房勞不稱情婦人水蠱胸脇滿金鍼刺後自安寧註太谿穴主治消渴房勞不稱心意及婦人水蠱胸脇脹滿等證鍼三分留七呼灸三壯隂谷舌縱口流涎腹脹煩滿小便難疝痛隂痿及痺病婦人漏下亦能痊註隂谷穴主治舌縱涎下腹脹煩滿溺難小腹疝急引隂隂股内亷痛為痿痺及女人漏下不止鍼四分留七呼灸三壯復溜血淋宜乎灸氣滯腰疼貴在鍼傷寒無汗急㵼此六衇沉伏即可伸註復溜穴主治血淋氣滯腰痛傷寒無汗六衇沉匿者鍼三分留三呼灸五壯大敦治疝隂囊腫兼治腦衂破傷風小兒急慢驚風病炷如小麥灸之靈註大敦穴主治諸疝隂囊腫腦衂破傷風及小兒急慢驚風等證鍼二分留十呼灸三壯行間穴治兒驚風更刺婦人血蠱癥渾身腫脹單腹脹先補後瀉自然平註行間穴主治小兒急慢驚風及婦人血蠱癥瘕渾身腫單腹脹等證鍼三分留十呼灸三壯太衝主治腫脹滿行動艱辛歩履難兼治霍亂吐瀉證手足轉筋灸可痊註太衝穴主治腫滿行歩艱難及霍亂吐瀉手足轉筋等證鍼三分留十呼灸三壯中封主治遺精病隂縮五淋溲便難鼓脹癭氣隨年灸三里合灸歩履艱註中封穴主治夢泄遺精隂縮五淋不得尿鼔脹癭氣此穴合足三里併灸治行歩艱辛中封穴鍼四分留七呼灸三壯足三里穴鍼五分留七呼灸三壯曲泉㿉疝隂股痛足膝脛冷久失精兼治女子隂挺癢少腹冷痛血瘕癥註曲泉穴主治㿉疝隂股痛男子失精膝脛冷痛及女子隂挺出少腹疼痛隂癢血瘕等證鍼六分留七呼灸三壯伏兎主刺腿膝冷兼刺脚氣痛痺風若逢穴處生瘡癤説與醫人莫用功註伏兎穴主治腿膝寒冷脚氣痛痺鍼五分禁灸凡此穴處生瘡癤者危隂市主刺痿不仁腰膝寒如注水侵兼刺兩足拘攣痺寒疝少腹痛難禁註隂市穴主治痿痺不仁不得屈伸腰膝寒如注水兩足拘攣痺痛寒疝少腹疼痛等證鍼三分留七呼禁灸足三里治風濕中諸虚耳聾上牙疼噎膈鼓脹水腫喘寒濕脚氣及痺風註足三里穴治中風中濕諸虚耳聾上牙疼水腫心腹鼓脹噎膈哮喘寒濕脚氣上中下三部痺痛等證鍼五分留七呼灸三壯此穴三十外方可灸不爾反生疾解谿主治風水氣面腹足腫喘𠻳頻氣逆發噎頭風眩悲泣癲狂悖與驚註解谿穴主治風氣面浮腹脹足腫喘滿欬𠻳氣逆發噎頭痛目眩悲泣癲狂驚悸怔忡等證鍼五分留五呼灸三壯陷谷主治水氣腫善噫痛疝腹腸鳴無汗振寒痰瘧病胃衇得弦寫此平註陷谷主治面目浮腫及水病善噫疝氣少腹痛腸鳴腹痛瘧疾振寒無汗等證或胃衇得弦皆宜鍼五分留七呼灸三壯内庭主治痞滿堅左右繆灸腹響寛兼刺婦人食蠱脹行經頭暈腹疼安註内庭穴主治痞滿堅鞕鍼三分留十呼灸三壯患右灸左患左灸右但覺腹響是其效驗兼治婦人食蠱行經頭暈少腹痛等證厲兑主治尸厥證驚狂面腫喉痺風兼治足寒膝臏腫相偕隱白夢魘靈註厲兑穴主治尸厥口噤氣絶狀如中惡面腫喉痺驚狂好卧足寒膝臏腫痛等證鍼一分留一呼灸一壯此穴合隱白穴同鍼治夣魘不寧鍼一分灸三壯飛陽主治歩艱難金門能療病癲癎足腿紅腫崑崙主兼治齒痛亦能安註飛陽穴主治歩履艱難鍼三分灸三壯金門穴主治癲狂羊癎風鍼一分灸三壯崑崙穴主治足腿紅腫牙齒疼痛鍼三分灸三壯晝發痓證治若何金鍼申衇起沉疴上牙疼兮下足腫亦鍼此穴自平和註申衇穴主治晝發痓證足腫牙疼鍼三分留七呼灸三壯灸不及鍼環跳主治中風濕股膝筋攣腰痛疼委中刺血醫前證開通經絡最相應註環跳穴主治腰胯股膝中受風寒濕氣筋攣疼痛鍼一寸留十呼灸三壯委中穴治證同環跳穴但此穴禁灸鍼五分陽陵泉治痺偏風兼治霍亂轉筋疼承山主鍼諸痔漏亦治寒冷轉筋靈註陽陵泉穴主治冷痺偏風霍亂轉筋鍼六分灸三壯承山穴主治痔漏疼痛寒冷轉筋鍼七分灸五壯灸不及鍼陽輔主治膝痠痛腰間溶溶似水浸膚腫筋攣諸痿痺偏風不遂灸功深註陽輔穴主治膝胻痠疼腰間寒冷膚腫筋攣百節痠疼痿痺偏風不遂等證鍼三分留七呼灸三壯風市主治腿中風兩膝無力脚氣衝兼治渾身麻搔癢艾火燒鍼皆就功註風市穴主治腿中風濕疼痛無力脚氣渾身搔癢麻痺等證鍼五分灸五壯懸鍾主治胃熱病腹脹肋痛脚氣疼兼治脚脛濕痺癢足指疼痛鍼可停註懸鍾穴主治胃熱腹脹脇痛脚氣脚脛濕痺渾身搔癢趾疼等證鍼六分灸五壯邱墟主治胸脇痛牽引腰腿髀樞中小腹外腎脚腕痛轉筋足脛不能行註邱墟穴主治胸脇滿痛不得息牽引腰腿髀樞中疼痛少腹外腎痛脚腕轉筋痛足脛難行等證鍼五分灸三壯頸漏腹下馬刀瘡連及胸脇乳癰瘍婦人月經不利病下臨泣穴主治良註臨泣穴主治頸漏腋下馬刀連及胸脇婦人乳癰月信不調等證鍼二分灸三壯俠谿主治胸脇滿傷寒熱病汗難出兼治目赤耳聾痛頷腫口噤疾堪除註俠谿穴主治胸脇支滿傷寒熱病汗不出目赤耳聾胸痛頷腫口噤等證鍼三分灸三壯竅隂主治脇間痛欬不得息熱躁煩癱疽頭痛耳聾病喉痺舌强不能言註竅隂穴主治脇痛欬逆不得息發熱躁煩癱疽口乾頭痛喉痺舌强耳聾等證鍼一分灸三壯御纂醫宗金鑑卷八十五
