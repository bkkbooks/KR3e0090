  text: 欽定四庫全書御纂醫宗金鑑卷八十五
  hash: sha256:e8e06ad11735781bd221c056156a8fcb415cefc8bd3e3c2918477eb0645cfbd2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0090_WYG_085-1a}
body:
  text: 編輯刺灸心法要訣目錄前面要穴圖後頭要穴圖頭部主病鍼灸要穴歌胸腹部要穴圖胸腹部主病鍼灸要穴歌背部要穴圖背部主病鍼灸要穴歌仰手要穴圖覆手要穴圖手部主病鍼灸要穴歌隂足要穴圖陽足要穴圖足部主病鍼灸要穴歌御纂醫宗金鑑卷八十五目録欽定四庫全書御纂醫宗金鑑卷八十五編輯刺灸心法要訣目錄前面要穴圖後頭要穴圖頭部主病鍼灸要穴歌胸腹部要穴圖胸腹部主病鍼灸要穴歌背部要穴圖背部主病鍼灸要穴歌仰手要穴圖覆手要穴圖手部主病鍼灸要穴歌隂足要穴圖陽足要穴圖足部主病鍼灸要穴歌御纂醫宗金鑑卷八十五目録欽定四庫全書御纂醫宗金鑑卷八十五頭部主病鍼灸要穴歌百㑹主治卒中風兼治癲癎兒病驚大腸下氣脱肛病提補諸陽氣上升註百㑹穴提補陽氣上升主治大人中風痰火癲癎小兒急慢驚風大腸下氣脱肛等證鍼二分灸五壯神庭主灸羊癎風目眩頭痛灸腦空翳風專刺耳聾病兼刺瘰癧項下生註神庭穴主治風癎羊癲灸三壯禁鍼刺腦空穴主治偏正頭疼目眩刺四分灸五壯翳風穴主治耳聾及瘰癧鍼經云先將銅錢約二十文令患者咬之尋取穴中鍼三分禁灸上星通天主鼻淵瘜肉痔塞灸能痊兼治頭風目諸疾炷如小麥灼相安註上星通天二穴主治鼻淵鼻塞瘜肉鼻痔左鼻灸右右鼻灸左左右鼻俱病者左右俱灸灸後鼻中當去一塊形如朽骨狀其病自愈兼治頭風目疾等證也上星穴宜刺三分留六呼灸五壯一云宜三棱鍼出血以㵼諸陽之熱氣通天穴宜刺三分留七呼灸三壯其壯如小麥大始相宜也瘂門風府祗宜刺中風舌緩不能言頸項强急及瘈瘲頭風百病與傷寒註瘂門風府二穴主治中風舌緩暴瘖不語傷風傷寒頭痛項急不得回顧及抽搐等病瘂門穴鍼二分不可深入禁灸風府穴鍼三分留三呼禁灸頭維主刺頭風疼目痛如脱淚不明禁灸隨皮三分刺兼刺攢竹更有功註頭維攢竹二穴主治頭風疼痛如破目痛如脱淚出不明頭維穴隨皮鍼三分禁灸攢竹穴刺一分留六呼禁灸隨皮者鍼入即眠鍼隨皮刺去也率谷酒傷吐痰眩風池主治肺中寒兼治偏正頭疼痛頰車落頰風自痊註率谷穴主治傷酒嘔吐痰眩刺三分灸三壯風池穴治肺受風寒及偏正頭風刺四分灸三壯七壯炷宜小頰車穴治落頰風落頰風者下頦脱落也刺三分灸三壯炷如小麥臨泣主治鼻不通眵䁾泠淚雲翳生驚癎反視卒暴厥日晡發瘧脇下疼註臨泣穴主治鼻塞目眩生翳眵䁾眼目諸疾及驚癎反視卒暴痰厥瘧疾晩發等病刺三分留七呼禁灸水溝中風口不開中惡癲癎口眼歪刺治風水頭面腫灸治兒風急慢災註水溝穴主治中風口噤牙關不開卒中惡邪鬼擊不省人事癲癎卒倒口眼歪邪風水面腫及小兒急慢驚風等病刺三分留六呼灸三壯至七壯炷如小麥然灸不及鍼承漿主治男七疝女子瘕聚兒𦂳脣偏風不遂刺之效消渴牙疳灸功深註承漿穴主治男子諸疝女子瘕聚小兒撮口及偏風半身不遂口眼喎邪口禁不開消渴飲水不休口齒疳蝕生瘡等證刺二分留五呼灸三壯迎香主刺鼻失臭兼刺面癢若蟲行先補後瀉三分刺此穴須知禁火攻註迎香穴主治鼻塞不聞香臭浮腫風動面癢狀如蟲行等證鍼三分禁灸口眼歪邪灸地倉頰腫脣弛牙噤强失音不語目不閉瞤動視物目􅉩􅉩註地倉穴主偏風口眼歪邪牙關不開齒痛頰腫目不能閉脣緩不收飲食難進失音不語眼目瞤動視物􅉩􅉩昏夜無見等證刺三分留五呼灸七壯或二七壯重者七七壯俱可聽㑹主治耳聾鳴兼刺迎香功最靈中風瘈瘲喎斜病牙車脱臼齒根疼註聽㑹穴主治耳聾耳鳴牙車脱臼齒痛中風瘈瘲喎邪等證鍼四分灸三壯兼瀉迎香功效如神迎香穴鍼三分禁灸聽宮主治耳聾鳴睛明攢竹目昏矇迎風流淚眥癢痛雀目攀睛白翳生註聽宮穴主治耳内蟬鳴耳聾刺三分灸三壯睛明攢竹二穴主治目痛視不明迎風淚努肉攀睛白翳眥癢雀目諸證睛明穴鍼分半留六呼禁灸攢竹穴治證同前刺三分留六呼禁灸胷腹部主病鍼灸要穴歌膻中穴主灸肺癰欬𠻳哮喘及氣癭巨闕九種心疼病痰飲吐水息賁寧註膻中穴主治哮喘肺癰欬𠻳氣癭等證灸七壯禁鍼巨闕穴主治九種心痛痰飲吐水腹痛息賁等證鍼三分留七呼灸七壯上脘奔豚與伏梁中脘主治脾胃傷兼治脾痛瘧痰暈痞滿翻胃盡安康註上脘穴主治腎積奔豚心積伏梁之證鍼八分留七呼灸五壯千金云每日灸二七壯至百壯孕婦不可灸中脘穴主治内傷脾胃心脾痛瘧疾痰暈痞滿翻胃等證鍼八分灸七壯一云二七壯至百壯孕婦不可灸水分脹滿臍突鞕水道不利灸之良神闕百病老虚瀉産脹溲難兒脱肛註水分穴主治鼓脹堅鞕肚臍突出小便不利灸五壯禁鍼孕婦不可灸神闕穴主治百病及老人虚人泄瀉又治産後腹脹小便不通小兒脱肛等證灸三壯禁鍼一法納炒乾淨鹽填滿臍上加厚薑一片蓋定上加艾炷灸百壯或以川椒代鹽亦妙氣海主治臍下氣關元諸虚瀉濁遺中極下元虚寒病一切痼冷總皆宜註氣海穴主治一切氣疾隂證痼冷及風寒暑濕水腫心腹鼓脹諸虚癥瘕等證鍼八分灸五壯關元穴主治諸虚腎積及虚老人泄瀉遺精白濁等證鍼八分留七呼灸七壯千金云婦人鍼之則無子中極穴主治下元寒冷虚損及婦人月事不調赤白帶下鍼八分留十呼灸三壯孕婦不可灸膺腫乳癰灸乳根小兒龜胸灸亦同嘔吐吞酸灸日月大赫專治病遺精註乳根穴主治胸前腫乳癰小兒龜胸等證鍼三分灸三壯日月穴主治嘔吐吞酸鍼七分灸五壯大赫穴主治遺精鍼三分灸五壯天樞主灸脾胃傷脾瀉痢疾甚相當兼灸鼓脹癥瘕病艾火多加病必康註天樞穴主治内傷脾胃赤白痢疾脾瀉及臍腹鼓脹癥瘕等證鍼五分留七呼灸五壯千金云魂魄之舍不可鍼孕婦不可灸章門主治痞塊病但灸左邊可拔根若灸腎積臍下氣兩邊齊灸自然平註章門穴主治痞塊多灸左邊腎積灸兩邊鍼六分留六呼灸三壯一云百壯期門主治奔豚病上氣欬逆胸背疼兼治傷寒脇鞕痛熱入血室刺有功註期門穴主治奔豚上氣欬逆胸滿胸背徹痛胸痛腹鞕及傷寒熱入血室鍼四分灸五壯帶衇主灸一切疝偏墜木腎盡成功兼灸婦人濁帶下丹田温煖自然停註帶衇穴主治疝氣偏墜木腎及婦人赤白帶下等證鍼六分灸五壯背部主病鍼灸要穴歌腰俞主治腰脊痛冷痺强急動作難腰下至足不仁冷婦人經病溺赤痊註腰俞穴主治腰脊重痛舉動不得俯仰艱難腰以下至足冷痺不仁及婦人經閉溺血等證刺二分留七呼灸五壯至陽耑灸黄疸病兼灸痞滿喘促聲命門老虚腰痛證更治脱肛痔腸風註至陽穴主治身面俱黄胸脇支滿喘促不寧鍼五分灸三壯命門穴主治老人腎虚腰疼及久痔脱肛腸風下血等證鍼五分灸三壯若年二十以上者不宜灸灸恐絶子膏盲一穴灸勞傷百損諸虚無不良此穴禁鍼惟宜艾千金百壯效非常註膏盲穴主治諸虚百損五勞七傷身形羸痩夢遺失精上氣欬逆痰火發狂健忘怔忡胎前産後勞瘵傳尸等證灸七七壯至百壯大杼主刺身發熱兼刺瘧疾欬𠻳痰神道惟灸背上病怯怯短氣艾火添註大杼穴主治遍身發熱瘧疾欬𠻳多痰鍼五分禁灸神道穴主治背上冷痛怯怯短氣灸七壯禁鍼風門主治易感風風寒痰𠻳吐血紅兼治一切鼻中病艾火多加嗅自通註風門穴主治腠理不密易感風寒欬𠻳吐痰咯血鼻衂及一切鼻中諸病鍼三分灸五壯肺俞内傷𠻳吐紅兼灸肺痿與肺癰小兒龜背亦堪灸肺氣舒通背自平註肺俞穴主治内傷外感欬𠻳吐血肺痿肺癰小兒龜背鍼三分留七呼灸三壯膈俞主治胸脇痛兼灸痰瘧痃癖攻更治一切失血證多加艾灼總收功註膈俞穴主治胸脇疼痛痰瘧痃癖一切血痰灸三壯禁鍼肝俞主灸積聚痛兼灸氣短語聲輕更同命門一併灸能使瞽目復重明註肝俞穴主治左脇積聚疼痛氣短不語若同命門穴一併灸之即兩目昏暗者可使復明肝俞穴灸七壯禁鍼命門穴鍼五分灸三壯膽俞主灸脇滿嘔驚悸臥睡不能安兼灸酒疽目黄色面發赤斑灸自痊註膽俞穴主治兩脇脹滿乾嘔驚悸睡臥不安及酒疽目睛發黄面發赤斑等證灸三壯禁鍼脾俞主灸傷脾胃吐瀉瘧痢疸瘕癥喘急吐血諸般證更治嬰兒慢脾風註脾俞穴主治内傷脾胃吐瀉瘧痢黄疸食積癥瘕吐血喘急及小兒慢脾風證灸五壯禁鍼三焦俞治脹滿疼積塊堅硬痛不寧更治赤白休息痢刺灸此穴自然輕註三焦俞穴主治脹滿積塊堅硬疼痛及赤白痢疾不止等證鍼二分灸五壯胃俞主治黄疽病食畢頭目即暈眩瘧疾善饑不能食艾火多加自可痊註胃俞穴主治黄疸食畢頭眩瘧疾善饑不能食等證鍼三分灸三壯腎俞主灸下元虚令人有子效多竒兼灸吐血聾腰痛女疽婦帶不能遺註腎俞穴主治下元諸虚精冷無子及耳聾吐血腰痛女勞疽婦人赤白帶下等證灸三壯禁鍼大腸俞治腰脊疼大小便難此可通兼治泄瀉痢疾病先補後瀉要分明註大腸俞穴主治腰脊疼痛大小便不通及泄瀉痢疾等證鍼三分灸三壯膀胱俞治小便難少腹脹痛不能安更治腰脊强直痛艾火多添疾自痊註膀胱俞穴主治小便不通少腹脹痛及腰脊强直疼痛等證鍼三分灸七壯譩譆主治久瘧病五藏瘧灸藏俞平意舍主治脇滿痛兼療嘔吐立時寧註譩譆俞穴主治久瘧若五藏瘧灸五藏俞五藏俞者心肝脾肺腎俞也俱鍼六分灸二七壯意舍穴主治兩脇脹滿疼痛嘔吐鍼五分灸三壯身柱主治羊癎風欬𠻳痰喘腰背疼長强惟治諸般痔百勞穴灸汗津津註身柱穴主治風癎發狂欬𠻳痰喘腰背疼痛等證鍼五分灸七七壯長强穴主治諸般痔漏疼痛鍼三分灸三十壯百勞穴主治滿身發熱虚汗盜汗津津不止鍼五分留三呼瀉五吸灸以年為壯手部主病鍼灸要穴歌尺澤主刺肺諸疾絞腸痧痛鎖喉風傷寒熱病汗不解兼刺小兒急慢風註尺澤穴主治欬唾膿血喉痺肺積息賁及絞腸痧痛傷寒汗不出小兒急慢驚風等證刺三分或三稜鍼出血禁灸列缺主治𠻳寒痰偏正頭疼治自痊男子五淋隂中痛尿血精出灸便安註列缺穴主治欬𠻳寒痰偏正頭疼及男子淋漓隂中疼痛尿血精出等證鍼二分灸七壯炷如小麥經渠主刺瘧寒熱胸背拘急脹滿堅喉痺欬逆氣數欠嘔吐心疼亦可痊註經渠穴主治痎瘧寒熱胸背拘急膨脹喉痺欬逆上氣數欠嘔吐心疼等證鍼二分禁灸太淵主刺牙齒病腕肘無力或痛疼兼刺欬𠻳風痰疾偏正頭疼效若神註太淵穴主治牙齒疼痛手腕無力疼痛及欬𠻳風痰偏正頭疼等證鍼二分灸三壯魚際主灸牙齒痛在左灸左右同然更刺傷寒汗不出兼治瘧疾方欲寒註魚際穴主治牙齒痛瘧疾初起先覺發寒傷寒汗不出等證鍼二分惟牙痛可灸餘證禁灸少衝主治心膽虚怔忡癲狂不可遺少商惟鍼䨇鵞痺血出喉開功最竒註少衝穴主治心虚膽寒怔忡癲狂鍼一分灸三壯少商穴主治䨇鵞風喉痺以三稜鍼刺微出血禁灸少海主刺腋下瘰漏臂痺痛羊癎風靈道主治心疼痛瘈瘲暴瘖不出聲註少海穴主治腋下瘰癧漏臂與風吹肘臂疼痛也及癲癎羊鳴等證鍼五分禁灸靈道穴主治心痛羊癎瘈瘲肘攣暴瘖不能言等證鍼三分灸三壯通里主治温熱病無汗懊憹心悸驚喉痺苦嘔暴瘖瘂婦人經漏過多崩註通里穴主治温病面熱無汗懊憹心悸驚恐喉痺苦嘔暴瘖聲瘂及婦人經血過多崩漏等證鍼三分灸三壯神門主治悸怔忡呆癡中惡恍惚驚兼治小兒驚癎證金鍼補瀉疾安寧註神門穴主治驚悸怔忡呆痴卒中鬼邪恍惚振驚