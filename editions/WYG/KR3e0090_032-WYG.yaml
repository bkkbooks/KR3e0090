body:
  text: 刪補名醫方論卷七目録大承氣湯小承氣湯調胃承氣湯更衣丸麻仁丸桃仁承氣湯抵當湯丸梔子豉湯梔子䜴加甘草湯梔子豉加生薑湯梔子厚朴湯梔子乾薑湯瓜蒂散小陷胸湯大陷胸湯丸三物白散大黄黄連瀉心湯附子瀉心湯甘草瀉心湯生薑瀉心湯半夏瀉心湯旋覆代赭石湯麻黄連軺赤小豆湯梔子蘗皮湯茵蔯蒿湯御纂醫宗金鑑卷三十二目録欽定四庫全書御纂醫宗金鑑卷三十二刪補名醫方論卷七目録大承氣湯小承氣湯調胃承氣湯更衣丸麻仁丸桃仁承氣湯抵當湯丸梔子豉湯梔子䜴加甘草湯梔子豉加生薑湯梔子厚朴湯梔子乾薑湯瓜蒂散小陷胸湯大陷胸湯丸三物白散大黄黄連瀉心湯附子瀉心湯甘草瀉心湯生薑瀉心湯半夏瀉心湯旋覆代赭石湯麻黄連軺赤小豆湯梔子蘗皮湯茵蔯蒿湯御纂醫宗金鑑卷三十二目録欽定四庫全書御纂醫宗金鑑卷三十二刪補名醫方論卷七大承氣湯治陽明病潮熱手足濈然汗出讝語汗出多胃燥獨語如見鬼狀喘冒不能臥腹滿痛衇滑實又目中不了了睛不和又少陰病初得之口燥咽乾者自利清水色純青心下痛口燥舌乾者六七日腹脹不大便者大黄四兩酒洗厚朴半觔枳實五枚炙芒消三合右四味以水一斗先煮二物取五升内大黄煮取二升去滓内芒消再上火㣲煮一二沸分温再服得下卽停後服小承氣湯大黄四兩厚朴二兩炙去皮枳實三枚右三味以水四升煮取一升二合去滓分温三服初服湯當大便不爾再服以利為度得便卽止服集註柯琴曰諸病皆因於氣穢物之不去由於氣之不順也故攻積之劑必用氣分之藥因以承氣名湯方分大小者有二義焉厚朴倍大黄是氣藥為君名大承氣大黄倍厚朴是氣藥為臣名小承氣味多性猛制大其服欲令大泄下也因名曰大味寡性緩制小其服欲㣲和胃氣也因名曰小且煎法更有妙義大承氣用水一斗煮枳朴取五升去滓内大黄再煮取二升内芒消何哉蓋生者氣銳而先行熟者氣純而和緩仲景欲使芒消先化燥屎大黃繼通地道而後枳朴除其痞滿若小承氣以三味同煎不分次第同一大黃而煎法不同此可見仲景微和之意也喻昌曰金匱治痙為病胸滿口噤臥不着席脚攣急必齘齒可與大承氣湯乃死中求生之法也靈樞謂熱而痙者死腰折瘈瘲齒齘也兹所云臥不着席卽腰折之變文脚攣急即瘈瘲之變文且齘齒加以胸滿口禁上中下三焦熱邪充斥死不旋踵矣在傷寒證腹滿可下胸滿則不可下然投是湯者須知所謂胸滿謂其邪尚在表故不可下此證入裏之熱極深極重匪可比倫况陽熱深極陰血立至消亡卽小小下之尚不足以勝其陽救其陰故取此湯以承領其一綫之陰氣陰氣不盡為陽熱所刧因而得生者多矣可與二字甚活臨證酌而用之初非定法也旣有下之重傷其陰之大戒復有下之急救其陰之活法學者欲為深造端在此矣調胃承氣湯治表解有汗裏熱不除胃因不和而不作解者大黄四兩酒洗甘草二兩炙芒消半觔右三味以水三升先煮二味取一升去滓内芒消㣲煮令沸少少温服之註三承氣湯之立名而曰大者制大其服欲急下其邪也小者制小其服欲緩下其邪也曰調胃者則有調和承順胃氣之義非若大小專攻下也經曰熱淫於内治以鹹寒火淫於内治以苦寒君大黄之苦寒臣芒消之鹹寒二味並舉攻熱瀉火之力備矣更佐甘草之緩調停於大黄芒消之間又少少温服之使其力不峻則不能速下而和也更衣丸治津液不足腸胃乾燥大便不通硃砂五錢研如飛麵蘆薈七錢研細生用滴好酒少許和丸每服一錢二分好酒下集註柯琴曰胃為後天之本不及固病太過亦病然太過復有陽盛陰虚之别焉兩陽合明而胃家實仲景製三承氣湯以下之三陽燥結而津液亡前賢又製更衣丸以潤之古人入厠必更衣故以此命名也硃砂以汞為體性寒重墜下達蘆薈以液為質味苦膏潤下滋兼以大寒大苦之性味能潤燥結從上導下而胃關開矣合以為丸兩者相須得效最宏奏功甚捷誠匪夷所思矣麻仁丸又名脾約丸治腸胃燥熱大便秘結小便數多麻子二升芍藥半觔枳實半觔大黄一觔去皮厚朴一觔去皮杏仁一升去皮煎熬碾脂右六味為末煉蜜為丸桐子大飲服十丸日三服漸加以利為度集註成無己曰約者約結之約又約束也經曰飲入於胃游溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經幷行今胃强脾弱約束津液不得四布但輸膀胱小便數而大便鞕故曰脾約麻仁甘平而潤杏仁甘温而潤經曰脾欲緩急食甘以緩之本草曰潤可去燥是以麻仁為君杏仁為臣枳實破結厚朴瀉滿故以為佐芍藥調中大黄通下故以為使朱震亨曰旣云脾約血枯火燔津竭理宜滋隂降火津液自生何秘之有此方惟熱甚而禀實者可用熱㣲而虚者愈致燥涸之苦矣桃仁承氣湯治血結胸中手不可近或中焦畜血寒熱胸滿潄水不欲嚥善忘昬迷如狂者此方治敗血留經通月事桃仁五十個去皮尖桂枝三兩大黄四兩芒硝二兩甘草二兩右五味以水七升煮取二升半去滓内芒消更上火㣲沸下火先食温服五合日三服當㣲利抵當湯並丸治傷寒畜血倂治癥瘕追蟲攻毒甚佳水蛭三十個熬蝱蟲三十個熬去頭足大黄三兩桃仁三十個去皮尖右四味為散以水五升煮三升去滓溫服一升不下再服利為度水蛭二十個熬蝱蟲二十五個熬去翅桃仁二十個去皮尖大黄三兩右四味杵分為四丸以水一升煮一丸取七合服晬時當下血若不下更服集註柯琴曰膀胱為水府血本無所容畜者也少腹者膀胱之室也熱結鞕滿當小便不利而反利者是病不在膀胱内而在少腹内也可知其隨經之榮血因瘀熱而結於少腹之裏而非膀胱之裏也故小便雖利而鞕滿急結畜血仍瘀於少腹也熱淫於内神魂不安故發狂血瘀不行則榮不運故衇㣲而沉榮不運則氣不宣故沉而結也榮氣不周於身則身黄消穀善饑者胃火熾盛也大便反易者血之濡也色黑者畜血滲入也善㤀者血不榮智不明也此皆瘀血之徵兆非至峻之劑不足以抵其巢穴而當此重任故立抵當湯蛭蟲之善飲血者而利於水蝱蟲之善吮血者而猛於陸並取水陸之善取血者以攻之同氣相求更佐桃仁之苦甘推陳致新大黄之苦寒蕩滌邪熱故名抵當也若熱雖盛而未狂少腹滿而未鞕宜小其制為丸以緩治之若外證已解少腹急結其人如狂是轉屬陽明用調胃承氣加桃仁桂枝之行血者於其中以㣲利之胃和則愈矣此桃仁承氣為治之緩也梔子豉湯附加减諸湯治陽明病衇浮而緊咽燥口苦腹滿而喘發熱汗出不惡寒反惡熱身重煩躁心中憒憒怵惕懊憹目疼鼻乾不得臥梔子十四枚擘香豉四合綿裹右二味以水四升先煮梔子得二升半内豉煮取一升半去滓分二服温進一服得吐止後服若少氣者加甘草二兩若嘔者加生薑三兩若下後心煩腹滿起臥不安者去香豉加厚朴四兩枳實四枚若醫以丸藥下之身熱不去心中結痛去香䜴加乾薑二兩若身熱發黄者去香豉加甘草一兩黄蘗二兩集註柯琴曰太陽以心腹為裏陽明以心腹為表蓋陽明之裏是胃實不特發熱惡熱目痛鼻乾汗出身重謂之表一切虚煩虚熱咽燥口苦舌胎腹滿煩躁不得臥消渴而小便不利凡在胃之外者悉是陽明之表也仲景製汗劑是開太陽表邪之出路製吐劑是引陽明表邪之出路所以太陽之表宜汗不宜吐陽明之表當吐不當汗太陽當汗而反吐之便見自汗出不惡寒饑不能食朝食暮吐欲食冷食不欲近衣等證此太陽轉屬陽明之表法當梔子豉湯吐之陽明當吐而不吐反行汗下温鍼等法以致心中憒憒怵惕懊憹煩躁舌胎等證然仍在陽明之表仍當梔子豉湯主之梔子苦能涌泄寒能勝熱其形象心又赤色通心故主治心中上下一切證豆形象腎又黑色入腎製而為豉輕浮上行能使心腹之濁邪上出於口一吐而心腹得舒表裏之煩熱悉解矣所以然者急除胃外之熱不致胃家之實卽此梔豉湯為陽明解表之聖劑矣熱傷氣者少氣加甘草以益氣虚熱相摶者多嘔加生薑以散邪若下後而心腹滿起臥不安是熱已入胃便不當吐故去香豉屎未燥鞕不宜復下故祇用梔子以除煩佐枳朴以泄滿此兩解心腹之妙又小承氣之輕劑也若以丸藥下之身熱不去知表未解也心中結痛知寒留於中也表熱裏寒故任梔子之苦以除熱倍乾薑之辛以逐寒而表熱自解裏寒自除然非吐不能達表故用此以探吐之此又寒熱並用為和中解表之劑矣内外熱熾肌肉發黄必須苦甘之劑以調之蘗皮甘草色黄而潤助梔子以除内煩而解外熱形色之病仍假形色以通之此皆用梔豉加減以禦陽明表證之變幻也夫梔子之性能屈曲下行不是上涌之劑惟豉之腐氣上蒸心肺能令人吐耳觀瓜蒂散必用豉汁和服是吐在豉而不在梔也梔子乾薑湯去豉用薑是取其横開梔子厚朴湯以枳朴易豉是取其下泄似皆不欲上越之義雖苦亦能作涌然非探吐不能吐也病人舊㣲溏者不可與則梔子之性自明矣瓜蒂散治胸中痞鞕痰飲一切實邪及氣衝咽不得息者用此吐之瓜蒂一分熬黄赤小豆一分右二味各别搗篩為散已合治之取一錢匕以香豉一合熱湯七合煮作稀糜去滓取汁和散温頓服之不吐者少少加服得快吐乃止註胸中者清陽之府諸邪入胸皆阻陽氣不得宣達以致胸滿痞鞕熱氣上衝燥渴心煩嗢嗢欲吐衇數促者熱鬱結也胸滿痞鞕氣上衝咽喉不得息手足寒冷欲吐不能吐衇遲緊者寒鬱結也凡胸中寒熱與氣與飲鬱結為病諒非汗下之法所能治必得酸苦湧瀉之品因而越之上焦得通陽氣得復痞鞕可消胸中可和也瓜蒂極苦赤豆味酸相須相益能除胸胃中實邪為吐劑中第一品也而佐香豉粥汁合服者藉穀氣以保胃氣也服之不吐少少加服得快吐而即止者恐傷胃中元氣也此方奏功之捷勝於汗下所以三法鼎立今人不知岐伯仲景之精義置之不用可勝惜哉小陷胸湯治心下痞按之則痛衇浮滑者黄連一兩半夏半升栝蔞實一個大者右三味以水六升先煮栝蔞實取三升去滓内諸藥煮取二升分溫三服集註程知曰此熱結未深者在心下不似大結胸之髙在心上按之痛比手不可近為輕衇之浮滑又緩於沉緊但痰飲素盛挾熱邪而内結所以衇見浮滑也以半夏之辛散之黄連之苦瀉之栝蔞之苦潤滌之皆所以除熱散結於胸中也先煮栝蔞分溫三服皆以緩治上之法程應旄曰黄連滌熱半夏導飲栝蔞潤燥合之以開結氣亦名曰陷胸者攻雖不峻而一皆直瀉其胸裏之實邪亦從此奪矣大䧟胸湯丸主治傷寒發熱不發汗而反下之表熱乘虚入於胸中與不得為汗之水氣結而不散令心下至少腹鞕滿而痛不可近其人身無大熱但頭汗出或潮熱燥渴衇沉緊者如水腫腸澼初起形氣俱實者亦可用大黄六兩芒消苦葶藶子杏仁各半斤去皮甘遂一錢為末右五味以水先煮大黄杏藶去滓内芒消煮一二沸内甘遂末溫服得快利止後服如未劇者加白蜜二合作丸如彈子大水煮一丸服過宿乃下如不下更服集註柯琴曰胸中者宗氣之所出故名氣海氣為陽故屬太陽之部氣為水母氣清則水精四布氣熱則水濁而壅結矣水結於胸則津液不下無以潤腸胃故大便必燥不下輸膀胱故水道不通大黄芒消善滌腸胃之熱實此病在胸中而亦用以為君者熱淫於内當治以苦寒且以潤陽明之燥是實則瀉子之法補膀胱之寒亦制之以其所畏也任甘遂之苦辛所以直攻其水結然水結因於氣結必佐杏仁之苦温以開其水中之氣氣行而水自利矣水結又因於氣熱必佐葶藶之大寒以清其氣分之熱源清而流自潔矣若胸中水結而未及中焦者當小其制而復以白蜜之甘以緩之使留戀於胸中過宿乃下但解胸心之結滯而保腸胃之無傷是又以攻劑為和劑也是方為利水攻積之劑故治水腫痢疾之初起者甚捷然必視其人壯實可以一戰成功如平昔素虚弱與病久而不任攻伐者當念虚虚之戒矣三物白散方治傷寒寒實結胸無熱證者及胸膈寒實痰水内結等證桔梗三分貝母三分巴豆一分去皮熬黒研如泥右杵二味為末内巴豆於臼中杵之以白飲合服强人一錢羸者減之病在膈上必吐在膈下必利不利進熱粥一盃利過不止進冷粥一盃註是方治寒實痰水結胸極峻之藥也君以巴豆極辛極烈攻寒逐水斬關奪門所到之處無不破也佐以貝母開胸之結使以桔梗為之舟楫載巴豆搜逐胸邪膈上者必吐膈下者必利使其邪悉盡無餘矣然惟知任毒以攻邪不量强羸鮮能善其後也故羸者減之不利進熱粥利過進冷粥蓋巴豆性熱得熱則行得冷則止不用水而用粥者藉穀氣以保胃也大黄黄連瀉心湯治傷寒表解心下痞按之不軟其衇關上浮者大黄二兩黄連一兩右二味以麻沸湯二升漬之須臾絞去滓分溫再服註痞鞕虚邪而用大黄黄連能不起後人之疑耶仲景使人疑處正是妙處蓋因後人未嘗細玩不得其法皆煎而服之大悖其旨矣觀乎用氣薄之麻沸湯漬大黄黄連須臾去滓僅得其無形之氣不重其有形之味是取其氣味俱薄不大瀉下雖曰攻痞而攻之之妙義無窮也附子瀉心湯治傷寒表解心下痞惡寒汗出者大黄二兩黄連一兩黄芩一兩附子一枚炮去皮别煮汁右四味切三味以麻沸湯二升漬之須臾絞去滓内附子汁分溫再服註心下鞕痛結胸也鞕而不痛心下痞也惡寒而復汗出非表不解乃表陽虚也故以大黄黄連黄芩瀉痞之熱附子溫表之陽合内外而治之其妙在以麻沸湯漬三黄須臾絞去滓内别煮附子汁義在瀉痞之意輕扶陽之意重也甘草瀉心湯治傷寒中風醫反下之其人下利日數十行穀不化腹中雷鳴心下痞鞕而滿乾嘔心煩不得安醫見心下痞謂病不盡復下之其痞益甚此非結熱但以胃中虚客氣上逆故使鞕也甘草四兩黄芩三兩黄連一兩乾薑三兩半夏半升洗大棗十二枚擘右六味以水一斗煮取六升去滓再煎取三升溫服一升日三服註毋論傷寒中風表未解總不可下醫反下之因而成痞其人下利日數十行水穀不化腹中雷鳴者誤下胃中空虚也心下痞鞕而滿乾嘔心煩不得安者乘虚客邪上逆也醫見心下痞鞕謂下之不盡又復下之其痞益甚但此非結熱之痞亦非寒結之痞乃乘胃空虚客氣上逆陽陷陰凝之痞也方以甘草命名者取和緩之意用甘草大棗之甘溫補中緩急治痞之益其半夏之辛破客逆之上從芩連瀉陽䧟之痞熱乾薑散陰凝之痞寒緩急破逆瀉痞寒熱備乎其治矣生薑㵼心湯治傷寒汗出解後胃中不和心下痞鞕乾噫食臭脇下有水氣腹中雷鳴下利者甘草二兩炙人參三兩乾薑一兩半夏半升洗黄芩三兩黄連一兩生薑四兩切大棗十二枚擘右八味以水一斗煮取六升去滓再煎取三升溫服一升日三服註傷寒汗出之後餘邪轉屬陽明心下痞滿鞕痛不大便者此其人胃素燥熱因而成實攻之可也今其人平素胃虚兼脇下有水氣卽不誤下餘熱乘虚入裏結成痞鞕不痛胃虚不能消化水穀則乾噫食臭也胃中寒熱不和則腹中雷鳴下利也名生薑瀉心湯者其義重在散水氣之痞也生薑半夏散脇下之水氣人參大棗補中州之土虚乾薑甘草以溫裏寒黄芩黄連以瀉痞熱備乎虚水寒熱之治胃中不和下利之痞未有不愈者也半夏瀉心湯治傷寒五六日嘔而發熱柴胡證具而以他藥下之但滿不痛心下痞者半夏半升洗黄芩三兩乾薑三兩人參三兩黄連一兩甘草三兩炙大棗十二枚擘右七味以水一斗煮取六升去滓再煎取三升溫服一升日三服集註王又原曰傷寒五六日柴胡證具而以他藥下之成痞即用小柴胡湯以乾薑易生薑以黄連易柴胡彼以和表裏此以徹上下而必推半夏為君者痞從嘔得來半夏之辛以破結而止嘔也旋覆代赭石湯治汗吐下解之後心下痞鞕噫氣不除旋覆花三兩人參二兩代赭石一兩半夏半升洗生薑五兩切甘草三兩炙大棗十二枚擘右七味以水一斗煮取六升去滓再煎取三升溫服一升日三服集註羅謙輔曰汗吐下解後邪雖去而胃氣已虧矣胃氣旣虧三焦因之失職清無所歸而不升濁無所納而不降是以邪氣留滯伏飲為逆故心下痞鞕噫氣不除方中以人參甘草養正補虚薑棗和脾養胃所以安定中州者至矣更以代赭石之重使之斂浮鎮逆旋覆花之辛用以宣氣滌飲佐人參以歸氣於下佐半夏以蠲飲於上濁降痞鞕可消清升噫氣自除觀仲景治少陰水氣上凌用真武湯鎮之治下焦滑脫不守用赤石脂禹餘糧固之此胃虚氣失升降復用此法理之則胸中轉否為泰其為歸元固下之法各極其妙如此麻黄連軺赤小豆湯治傷寒表不解瘀熱在裏發黄者麻黄二兩赤小豆一升杏仁四十枚去皮尖生薑一兩切大棗十二枚擘甘草一兩炙生梓白皮一升連軺二兩以上八味以潦水一斗先煮麻黄再沸去上沫内諸藥煮取三升分温三服半日則盡註濕熱發黄無表裏證熱盛者清之小便不利者利之裏實者下之表實者汗之皆無非為病求去路也用麻黄湯以開其表使黄從外而散去桂枝者避其濕熱也佐薑棗者和其榮衛也加連軺梓皮以瀉其熱赤小豆以利其濕同成表實發黄之效也連軺即連翹根無梓皮以茵蔯代之成無已曰煎以潦水者取其味薄不助濕熱也梔子蘗皮湯治傷寒身黄發熱無表裏證者梔子十五枚擘甘草一兩黄蘗一兩右三味以水四升煮取一升半去滓分溫再服註傷寒身黄發熱者若有無汗之表以麻黄連軺赤小豆湯汗之若有成實之裏以茵蔯蒿湯下之今外無可汗表證内無可下裏證惟有黄熱宜以梔子蘗皮湯清之可也此方之甘草當是茵蔯傳寫之誤也茵蔯蒿湯陽明病發熱但頭汗出身無汗小便不利渴飲水漿此為瘀熱在裏身必發黄腹㣲滿者本方主之茵蔯蒿六兩梔子十四枚擘大黄二兩右三味以水二斗先煮茵蔯減六升内二味煮取三升去滓分溫三服小便當利如皂角汁狀色正赤一宿腹減黄從小便去也集註柯琴曰太陽陽明俱有發黄證但頭汗出而身無汗則熱不外越小便不利則熱不下泄故瘀熱在裏然裏有不同肌肉是太陽之裏當汗而發之故用麻黄連翹赤小豆湯為凉散法心胸是太陽陽明之裏當寒以勝之用梔子蘗皮湯乃清火法腸胃是陽明之裏當瀉之於内故立本方是逐穢法茵蔯禀北方之氣經冬不凋傲霜凌雪偏受大寒之氣故能除熱邪留結率梔子以通水源大黄以調胃實令一身内外瘀熱悉從小便而出腹滿自減腸胃無傷乃合引而竭之之法此陽明利水之聖劑也又曰仲景治陽明渴飲有四法本太陽轉屬者五苓散㣲發汗以散水氣大煩燥渴小便自利者白虎加參清火而生津衇浮發熱小便不利者豬苓湯滋陰而利水小便不利腹滿者茵蔯蒿湯以泄滿令黄從小便出病情治法胸有成竹矣每思仲景利小便必用氣化之品通大便必用承氣之品故小便不利者必加茯苓甚者兼用豬苓因二苓為氣化之品而小便由於氣化也兹小便不利不用二苓者何本論云陽明病汗出多而渴者不可與豬苓湯以汗多胃中燥豬苓湯復利小便故也斯知陽明病汗出多而渴者不可用則汗不出而渴者津液先虚更不可用明矣此以推陳致新之茵蔯佐以屈曲下行之梔子不用枳朴以承氣與芒消之峻利則大黄但可以潤胃燥而大便之不遽行可知故必一宿而腹始減黄從小便去而不由大腸去仲景立法神奇匪夷所思耳御纂醫宗金鑑巻三十二欽定四庫全書御纂醫宗金鑑卷三十二刪補名醫方論卷七大承氣湯治陽明病潮熱手足濈然汗出讝語汗出多胃燥獨語如見鬼狀喘冒不能臥腹滿痛衇滑實又目中不了了睛不和又少陰病初得之口燥咽乾者自利清水色純青心下痛口燥舌乾者六七日腹脹不大便者大黄四兩酒洗厚朴半觔枳實五枚炙芒消三合右四味以水一斗先煮二物取五升内大黄煮取二升去滓内芒消再上火㣲煮一二沸分温再服得下卽停後服小承氣湯大黄四兩厚朴二兩炙去皮枳實三枚右三味以水四升煮取一升二合去滓分温三服初服湯當大便不爾再服以利為度得便卽止服集註柯琴曰諸病皆因於氣穢物之不去由於氣之不順也故攻積之劑必用氣分之藥因以承氣名湯方分大小者有二義焉厚朴倍大黄是氣藥為君名大承氣大黄倍厚朴是氣藥為臣名小承氣味多性猛制大其服欲令大泄下也因名曰大味寡性緩制小其服欲㣲和胃氣也因名曰小且煎法更有妙義大承氣用水一斗煮枳朴取五升去滓内大黄再煮取二升内芒消何哉蓋生者氣銳而先行熟者氣純而和緩仲景欲使芒消先化燥屎大黃繼通地道而後枳朴除其痞滿若小承氣以三味同煎不分次第同一大黃而煎法不同此可見仲景微和之意也喻昌曰金匱治痙為病胸滿口噤臥不着席脚攣急必齘齒可與大承氣湯乃死中求生之法也靈樞謂熱而痙者死腰折瘈瘲齒齘也兹所云臥不着席卽腰折之變文脚攣急即瘈瘲之變文且齘齒加以胸滿口禁上中下三焦熱邪充斥死不旋踵矣在傷寒證腹滿可下胸滿則不可下然投是湯者須知所謂胸滿謂其邪尚在表故不可下此證入裏之熱極深極重匪可比倫况陽熱深極陰血立至消亡卽小小下之尚不足以勝其陽救其陰故取此湯以承領其一綫之陰氣陰氣不盡為陽熱所刧因而得生者多矣可與二字甚活臨證酌而用之初非定法也旣有下之重傷其陰之大戒復有下之急救其陰之活法學者欲為深造端在此矣調胃承氣湯治表解有汗裏熱不除胃因不和而不作解者大黄四兩酒洗甘草二兩炙芒消半觔右三味以水三升先煮二味取一升去滓内芒消㣲煮令沸少少温服之註三承氣湯之立名而曰大者制大其服欲急下其邪也小者制小其服欲緩下其邪也曰調胃者則有調和承順胃氣之義非若大小專攻下也經曰熱淫於内治以鹹寒火淫於内治以苦寒君大黄之苦寒臣芒消之鹹寒二味並舉攻熱瀉火之力備矣更佐甘草之緩調停於大黄芒消之間又少少温服之使其力不峻則不能速下而和也更衣丸治津液不足腸胃乾燥大便不通硃砂五錢研如飛麵蘆薈七錢研細生用滴好酒少許和丸每服一錢二分好酒下集註柯琴曰胃為後天之本不及固病太過亦病然太過復有陽盛陰虚之别焉兩陽合明而胃家實仲景製三承氣湯以下之三陽燥結而津液亡前賢又製更衣丸以潤之古人入厠必更衣故以此命名也硃砂以汞為體性寒重墜下達蘆薈以液為質味苦膏潤下滋兼以大寒大苦之性味能潤燥結從上導下而胃關開矣合以為丸兩者相須得效最宏奏功甚捷誠匪夷所思矣麻仁丸又名脾約丸治腸胃燥熱大便秘結小便數多麻子二升芍藥半觔枳實半觔大黄一觔去皮厚朴一觔去皮杏仁一升去皮煎熬碾脂右六味為末煉蜜為丸桐子大飲服十丸日三服漸加以利為度集註成無己曰約者約結之約又約束也經曰飲入於胃游溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經幷行今胃强脾弱約束津液不得四布但輸膀胱小便數而大便鞕故曰脾約麻仁甘平而潤杏仁甘温而潤經曰脾欲緩急食甘以緩之本草曰潤可去燥是以麻仁為君杏仁為臣枳實破結厚朴瀉滿故以為佐芍藥調中大黄通下故以為使朱震亨曰旣云脾約血枯火燔津竭理宜滋隂降火津液自生何秘之有此方惟熱甚而禀實者可用熱㣲而虚者愈致燥涸之苦矣桃仁承氣湯治血結胸中手不可近或中焦畜血寒熱胸滿潄水不欲嚥善忘昬迷如狂者此方治敗血留經通月事桃仁五十個去皮尖桂枝三兩大黄四兩芒硝二兩甘草二兩右五味以水七升煮取二升半去滓内芒消更上火㣲沸下火先食温服五合日三服當㣲利抵當湯並丸治傷寒畜血倂治癥瘕追蟲攻毒甚佳水蛭三十個熬蝱蟲三十個熬去頭足大黄三兩桃仁三十個去皮尖右四味為散以水五升煮三升去滓溫服一升不下再服利為度水蛭二十個熬蝱蟲二十五個熬去翅桃仁二十個去皮尖大黄三兩右四味杵分為四丸以水一升煮一丸取七合服晬時當下血若不下更服集註柯琴曰膀胱為水府血本無所容畜者也少腹者膀胱之室也熱結鞕滿當小便不利而反利者是病不在膀胱内而在少腹内也可知其隨經之榮血因瘀熱而結於少腹之裏而非膀胱之裏也故小便雖利而鞕滿急結畜血仍瘀於少腹也熱淫於内神魂不安故發狂血瘀不行則榮不運故衇㣲而沉榮不運則氣不宣故沉而結也榮氣不周於身則身黄消穀善饑者胃火熾盛也大便反易者血之濡也色黑者畜血滲入也善㤀者血不榮智不明也此皆瘀血之徵兆非至峻之劑不足以抵其巢穴而當此重任故立抵當湯蛭蟲之善飲血者而利於水蝱蟲之善吮血者而猛於陸並取水陸之善取血者以攻之同氣相求更佐桃仁之苦甘推陳致新大黄之苦寒蕩滌邪熱故名抵當也若熱雖盛而未狂少腹滿而未鞕宜小其制為丸以緩治之若外證已解少腹急結其人如狂是轉屬陽明用調胃承氣加桃仁桂枝之行血者於其中以㣲利之胃和則愈矣此桃仁承氣為治之緩也梔子豉湯附加减諸湯治陽明病衇浮而緊咽燥口苦腹滿而喘發熱汗出不惡寒反惡熱身重煩躁心中憒憒怵惕懊憹目疼鼻乾不得臥梔子十四枚擘香豉四合綿裹右二味以水四升先煮梔子得二升半内豉煮取一升半去滓分二服温進一服得吐止後服若少氣者加甘草二兩若嘔者加生薑三兩若下後心煩腹滿起臥不安者去香豉加厚朴四兩枳實四枚若醫以丸藥下之身熱不去心中結痛去香䜴加乾薑二兩若身熱發黄者去香豉加甘草一兩黄蘗二兩集註柯琴曰太陽以心腹為裏陽明以心腹為表蓋陽明之裏是胃實不特發熱惡熱目痛鼻乾汗出身重謂之表一切虚煩虚熱咽燥口苦舌胎腹滿煩躁不得臥消渴而小便不利凡在胃之外者悉是陽明之表也仲景製汗劑是開太陽表邪之出路製吐劑是引陽明表邪之出路所以太陽之表宜汗不宜吐陽明之表當吐不當汗太陽當汗而反吐之便見自汗出不惡寒饑不能食朝食暮吐欲食冷食不欲近衣等證此太陽轉屬陽明之表法當梔子豉湯吐之陽明當吐而不吐反行汗下温鍼等法以致心中憒憒怵惕懊憹煩躁舌胎等證然仍在陽明之表仍當梔子豉湯主之梔子苦能涌泄寒能勝熱其形象心又赤色通心故主治心中上下一切證豆形象腎又黑色入腎製而為豉輕浮上行能使心腹之濁邪上出於口一吐而心腹得舒表裏之煩熱悉解矣所以然者急除胃外之熱不致胃家之實卽此梔豉湯為陽明解表之聖劑矣熱傷氣者少氣加甘草以益氣虚熱相摶者多嘔加生薑以散邪若下後而心腹滿起臥不安是熱已入胃便不當吐故去香豉屎未燥鞕不宜復下故祇用梔子以除煩佐枳朴以泄滿此兩解心腹之妙又小承氣之輕劑也若以丸藥下之身熱不去知表未解也心中結痛知寒留於中也表熱裏寒故任梔子之苦以除熱倍乾薑之辛以逐寒而表熱自解裏寒自除然非吐不能達表故用此以探吐之此又寒熱並用為和中解表之劑矣内外熱熾肌肉發黄必須苦甘之劑以調之蘗皮甘草色黄而潤助梔子以除内煩而解外熱形色之病仍假形色以通之此皆用梔豉加減以禦陽明表證之變幻也夫梔子之性能屈曲下行不是上涌之劑惟豉之腐氣上蒸心肺能令人吐耳觀瓜蒂散必用豉汁和服是吐在豉而不在梔也梔子乾薑湯去豉用薑是取其横開梔子厚朴湯以枳朴易豉是取其下泄似皆不欲上越之義雖苦亦能作涌然非探吐不能吐也病人舊㣲溏者不可與則梔子之性自明矣瓜蒂散治胸中痞鞕痰飲一切實邪及氣衝咽不得息者用此吐之瓜蒂一分熬黄赤小豆一分右二味各别搗篩為散已合治之取一錢匕以香豉一合熱湯七合煮作稀糜去滓取汁和散温頓服之不吐者少少加服得快吐乃止註胸中者清陽之府諸邪入胸皆阻陽氣不得宣達以致胸滿痞鞕熱氣上衝燥渴心煩嗢嗢欲吐衇數促者熱鬱結也胸滿痞鞕氣上衝咽喉不得息手足寒冷欲吐不能吐衇遲緊者寒鬱結也凡胸中寒熱與氣與飲鬱結為病諒非汗下之法所能治必得酸苦湧瀉之品因而越之上焦得通陽氣得復痞鞕可消胸中可和也瓜蒂極苦赤豆味酸相須相益能除胸胃中實邪為吐劑中第一品也而佐香豉粥汁合服者藉穀氣以保胃氣也服之不吐少少加服得快吐而即止者恐傷胃中元氣也此方奏功之捷勝於汗下所以三法鼎立今人不知岐伯仲景之精義置之不用可勝惜哉小陷胸湯治心下痞按之則痛衇浮滑者黄連一兩半夏半升栝蔞實一個大者右三味以水六升先煮栝蔞實取三升去滓内諸藥煮取二升分溫三服集註程知曰此熱結未深者在心下不似大結胸之髙在心上按之痛比手不可近為輕衇之浮滑又緩於沉緊但痰飲素盛挾熱邪而内結所以衇見浮滑也以半夏之辛散之黄連之苦瀉之栝蔞之苦潤滌之皆所以除熱散結於胸中也先煮栝蔞分溫三服皆以緩治上之法程應旄曰黄連滌熱半夏導飲栝蔞潤燥合之以開結氣亦名曰陷胸者攻雖不峻而一皆直瀉其胸裏之實邪亦從此奪矣大䧟胸湯丸主治傷寒發熱不發汗而反下之表熱乘虚入於胸中與不得為汗之水氣結而不散令心下至少腹鞕滿而痛不可近其人身無大熱但頭汗出或潮熱燥渴衇沉緊者如水腫腸澼初起形氣俱實者亦可用大黄六兩芒消苦葶藶子杏仁各半斤去皮甘遂一錢為末右五味以水先煮大黄杏藶去滓内芒消煮一二沸内甘遂末溫服得快利止後服如未劇者加白蜜二合作丸如彈子大水煮一丸服過宿乃下如不下更服集註柯琴曰胸中者宗氣之所出故名氣海氣為陽故屬太陽之部氣為水母氣清則水精四布氣熱則水濁而壅結矣水結於胸則津液不下無以潤腸胃故大便必燥不下輸膀胱故水道不通大黄芒消善滌腸胃之熱實此病在胸中而亦用以為君者熱淫於内當治以苦寒且以潤陽明之燥是實則瀉子之法補膀胱之寒亦制之以其所畏也任甘遂之苦辛所以直攻其水結然水結因於氣結必佐杏仁之苦温以開其水中之氣氣行而水自利矣水結又因於氣熱必佐葶藶之大寒以清其氣分之熱源清而流自潔矣若胸中水結而未及中焦者當小其制而復以白蜜之甘以緩之使留戀於胸中過宿乃下但解胸心之結滯而保腸胃之無傷是又以攻劑為和劑也是方為利水攻積之劑故治水腫痢疾之初起者甚捷然必視其人壯實可以一戰成功如平昔素虚弱與病久而不任攻伐者當念虚虚之戒矣三物白散方治傷寒寒實結胸無熱證者及胸膈寒實痰水内結等證桔梗三分貝母三分巴豆一分去皮熬黒研如泥右杵二味為末内巴豆於臼中杵之以白飲合服强人一錢羸者減之病在膈上必吐在膈下必利不利進熱粥一盃利過不止進冷粥一盃註是方治寒實痰水結胸極峻之藥也君以巴豆極辛極烈攻寒逐水斬關奪門所到之處無不破也佐以貝母開胸之結使以桔梗為之舟楫載巴豆搜逐胸邪膈上者必吐膈下者必利使其邪悉盡無餘矣然惟知任毒以攻邪不量强羸鮮能善其後也故羸者減之不利進熱粥利過進冷粥蓋巴豆性熱得熱則行得冷則止不用水而用粥者藉穀氣以保胃也大黄黄連瀉心湯治傷寒表解心下痞按之不軟其衇關上浮者大黄二兩黄連一兩右二味以麻沸湯二升漬之須臾絞去滓分溫再服註痞鞕虚邪而用大黄黄連能不起後人之疑耶仲景使人疑處正是妙處蓋因後人未嘗細玩不得其法皆煎而服之大悖其旨矣觀乎用氣薄之麻沸湯漬大黄黄連須臾去滓僅得其無形之氣不重其有形之味是取其氣味俱薄不大瀉下雖曰攻痞而攻之之妙義無窮也附子瀉心湯治傷寒表解心下痞惡寒汗出者大黄二兩黄連一兩黄芩一兩附子一枚炮去皮别煮汁右四味切三味以麻沸湯二升漬之須臾絞去滓内附子汁分溫再服註心下鞕痛結胸也鞕而不痛心下痞也惡寒而復汗出非表不解乃表陽虚也故以大黄黄連黄芩瀉痞之熱附子溫表之陽合内外而治之其妙在以麻沸湯漬三黄須臾絞去滓内别煮附子汁義在瀉痞之意輕扶陽之意重也甘草瀉心湯治傷寒中風醫反下之其人下利日數十行穀不化腹中雷鳴心下痞鞕而滿乾嘔心煩不得安醫見心下痞謂病不盡復下之其痞益甚此非結熱但以胃中虚客氣上逆故使鞕也甘草四兩黄芩三兩黄連一兩乾薑三兩半夏半升洗大棗十二枚擘右六味以水一斗煮取六升去滓再煎取三升溫服一升日三服註毋論傷寒中風表未解總不可下醫反下之因而成痞其人下利日數十行水穀不化腹中雷鳴者誤下胃中空虚也心下痞鞕而滿乾嘔心煩不得安者乘虚客邪上逆也醫見心下痞鞕謂下之不盡又復下之其痞益甚但此非結熱之痞亦非寒結之痞乃乘胃空虚客氣上逆陽陷陰凝之痞也方以甘草命名者取和緩之意用甘草大棗之甘溫補中緩急治痞之益其半夏之辛破客逆之上從芩連瀉陽䧟之痞熱乾薑散陰凝之痞寒緩急破逆瀉痞寒熱備乎其治矣生薑㵼心湯治傷寒汗出解後胃中不和心下痞鞕乾噫食臭脇下有水氣腹中雷鳴下利者甘草二兩炙人參三兩乾薑一兩半夏半升洗黄芩三兩黄連一兩生薑四兩切大棗十二枚擘右八味以水一斗煮取六升去滓再煎取三升溫服一升日三服註傷寒汗出之後餘邪轉屬陽明心下痞滿鞕痛不大便者此其人胃素燥熱因而成實攻之可也今其人平素胃虚兼脇下有水氣卽不誤下餘熱乘虚入裏結成痞鞕不痛胃虚不能消化水穀則乾噫食臭也胃中寒熱不和則腹中雷鳴下利也名生薑瀉心湯者其義重在散水氣之痞也生薑半夏散脇下之水氣人參大棗補中州之土虚乾薑甘草以溫裏寒黄芩黄連以瀉痞熱備乎虚水寒熱之治胃中不和下利之痞未有不愈者也半夏瀉心湯治傷寒五六日嘔而發熱柴胡證具而以他藥下之但滿不痛心下痞者半夏半升洗黄芩三兩乾薑三兩人參三兩黄連一兩甘草三兩炙大棗十二枚擘右七味以水一斗煮取六升去滓再煎取三升溫服一升日三服集註王又原曰傷寒五六日柴胡證具而以他藥下之成痞即用小柴胡湯以乾薑易生薑以黄連易柴胡彼以和表裏此以徹上下而必推半夏為君者痞從嘔得來半夏之辛以破結而止嘔也旋覆代赭石湯治汗吐下解之後心下痞鞕噫氣不除旋覆花三兩人參二兩代赭石一兩半夏半升洗生薑五兩切甘草三兩炙大棗十二枚擘右七味以水一斗煮取六升去滓再煎取三升溫服一升日三服集註羅謙輔曰汗吐下解後邪雖去而胃氣已虧矣胃氣旣虧三焦因之失職清無所歸而不升濁無所納而不降是以邪氣留滯伏飲為逆故心下痞鞕噫氣不除方中以人參甘草養正補虚薑棗和脾養胃所以安定中州者至矣更以代赭石之重使之斂浮鎮逆旋覆花之辛用以宣氣滌飲佐人參以歸氣於下佐半夏以蠲飲於上濁降痞鞕可消清升噫氣自除觀仲景治少陰水氣上凌用真武湯鎮之治下焦滑脫不守用赤石脂禹餘糧固之此胃虚氣失升降復用此法理之則胸中轉否為泰其為歸元固下之法各極其妙如此麻黄連軺赤小豆湯治傷寒表不解瘀熱在裏發黄者麻黄二兩赤小豆一升杏仁四十枚去皮尖生薑一兩切大棗十二枚擘甘草一兩炙生梓白皮一升連軺二兩以上八味以潦水一斗先煮麻黄再沸去上沫内諸藥煮取三升分温三服半日則盡註濕熱發黄無表裏證熱盛者清之小便不利者利之裏實者下之表實者汗之皆無非為病求去路也用麻黄湯以開其表使黄從外而散去桂枝者避其濕熱也佐薑棗者和其榮衛也加連軺梓皮以瀉其熱赤小豆以利其濕同成表實發黄之效也連軺即連翹根無梓皮以茵蔯代之成無已曰煎以潦水者取其味薄不助濕熱也梔子蘗皮湯治傷寒身黄發熱無表裏證者梔子十五枚擘甘草一兩黄蘗一兩右三味以水四升煮取一升半去滓分溫再服註傷寒身黄發熱者若有無汗之表以麻黄連軺赤小豆湯汗之若有成實之裏以茵蔯蒿湯下之今外無可汗表證内無可下裏證惟有黄熱宜以梔子蘗皮湯清之可也此方之甘草當是茵蔯傳寫之誤也茵蔯蒿湯陽明病發熱但頭汗出身無汗小便不利渴飲水漿此為瘀熱在裏身必發黄腹㣲滿者本方主之茵蔯蒿六兩梔子十四枚擘大黄二兩右三味以水二斗先煮茵蔯減六升内二味煮取三升去滓分溫三服小便當利如皂角汁狀色正赤一宿腹減黄從小便去也集註柯琴曰太陽陽明俱有發黄證但頭汗出而身無汗則熱不外越小便不利則熱不下泄故瘀熱在裏然裏有不同肌肉是太陽之裏當汗而發之故用麻黄連翹赤小豆湯為凉散法心胸是太陽陽明之裏當寒以勝之用梔子蘗皮湯乃清火法腸胃是陽明之裏當瀉之於内故立本方是逐穢法茵蔯禀北方之氣經冬不凋傲霜凌雪偏受大寒之氣故能除熱邪留結率梔子以通水源大黄以調胃實令一身内外瘀熱悉從小便而出腹滿自減腸胃無傷乃合引而竭之之法此陽明利水之聖劑也又曰仲景治陽明渴飲有四法本太陽轉屬者五苓散㣲發汗以散水氣大煩燥渴小便自利者白虎加參清火而生津衇浮發熱小便不利者豬苓湯滋陰而利水小便不利腹滿者茵蔯蒿湯以泄滿令黄從小便出病情治法胸有成竹矣每思仲景利小便必用氣化之品通大便必用承氣之品故小便不利者必加茯苓甚者兼用豬苓因二苓為氣化之品而小便由於氣化也兹小便不利不用二苓者何本論云陽明病汗出多而渴者不可與豬苓湯以汗多胃中燥豬苓湯復利小便故也斯知陽明病汗出多而渴者不可用則汗不出而渴者津液先虚更不可用明矣此以推陳致新之茵蔯佐以屈曲下行之梔子不用枳朴以承氣與芒消之峻利則大黄但可以潤胃燥而大便之不遽行可知故必一宿而腹始減黄從小便去而不由大腸去仲景立法神奇匪夷所思耳御纂醫宗金鑑巻三十二
