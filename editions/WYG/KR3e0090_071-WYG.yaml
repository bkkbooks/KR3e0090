部臍癰腎氣遊風腎氣遊風腿肚生紅腫如雲火烘疼證由腎火藴於内膀胱氣滯外受風註此證多生於腎虛之人腿肚紅腫形如雲片遊走不定痛如火烘由腎火内藴外受風邪膀胱氣滯而成也初服紫蘇流氣飲次服㯽榔丸外用豆腐研調黄蘗末貼敷之甚效紫蘇流氣飲紫蘇黄蘗木瓜陳皮香附厚朴薑炒川芎㯽榔白芷蒼术米泔水浸炒烏藥荆芥防風甘草獨活枳殻麩炒等分薑三片棗一枚水煎服方歌紫蘇流氣蘗瓜榔香附陳芎厚芷蒼烏藥荆防甘獨枳腎氣遊風服最昌㯽榔丸㯽榔枳殻各二兩麩炒木𤓰一兩五錢木香一兩大黄四兩共研細末煉蜜為丸如梧桐子大每服三十丸空心白滚湯送下黄酒送下亦可方歌㯽榔枳殻木𤓰研木香大黄煉蜜丸腎氣遊風紅腫痛空心水送自然痊臁瘡臁瘡當分内外廉外廉易治内難痊外屬三陽濕熱結内屬三隂虛熱纒法宜捜風除濕熱外貼三香夾紙餞註此證生在兩脛内外廉骨外廉屬足三陽經濕熱結聚早治易於見效内廉屬三隂有濕兼血分虛熱而成更兼廉骨皮肉澆薄難得見效極其綿纒初發先癢後痛紅腫成片破津紫水新起宜貼三香膏色紫貼夾紙膏日久瘡色紫黑貼解毒紫金膏又年久頑臁瘡皮烏黑下陷臭穢不堪者用蜈蚣餞法去風毒化瘀腐蓋貼黄蠟膏漸效初服黄耆丸日久者服四生丸下元虛冷者宜虎潛丸常服甚效但腿脛在至隂之下生瘡者當戒勞動發物其證可愈否則難痊三香膏輕粉乳香松香各等分共為末香油調稠用夾紙一面以鍼密刺細孔將藥夾搽紙内先以葱湯洗淨患處將藥紙有鍼孔一面對瘡貼之三日一換方歌三香輕粉乳松香研末油調紙内藏葱湯洗患方貼藥初起臁瘡用此良夾紙膏黄丹炒輕粉兒茶没藥雄黄血竭五倍子炒銀朱枯礬各等分共為末量瘡大小剪油紙二張夾藥於内紙周圍用麵糊粘住紙上用鍼刺孔先將瘡口用葱椒煎湯洗净拭乾然後貼上以帛縛之三日一洗再換新藥貼之方歌夾紙膏貼臁瘡破黄丹輕粉兒茶没雄黄竭倍銀朱礬油紙夾貼腐可脱解毒紫金膏明净松香皂礬各一觔煆赤共研極細末香油調稠先用葱艾甘草煎湯洗净患處再搽此藥油紙蓋住以輭布紥𦂳三日一換此藥又治楊梅結毒腐爛作臭膿水淋漓用之甚效方歌解毒紫金臁瘡爛明净松香皂礬煆二味研末香油調葱艾草湯先洗患蜈蚣餞蜈蚣甘草獨活白芷各一錢桐油二兩將藥煎滚先以米泔水洗净臁瘡水和白麵作圏圍在瘡之四邊勿令洩氣將腿放平以茶匙挑油漸漸乘熱加滿待油溫取下已後風毒自散腐肉漸脱其功甚速方歌蜈蚣餞治久臁瘡皮黑下陷臭難當桐油煎草獨活芷白麵圏瘡油燙强黄蠟膏血竭赤石脂煆龍骨各三錢煆共為細末香油一兩入血餘栗子大一團煠枯去渣再入黄蠟一兩白膠香三錢溶化盡離火下血竭等末攪勻候冷磁罐盛之用時掜作薄片貼瘡上絹帛縛定三日後翻過貼之方歌黄蠟血餘竭白膠石脂龍骨入油調蜈蚣餞後此膏蓋肌肉能生痛自消黄耆丸黄耆川烏頭炮去皮弦赤小豆蒺藜炒去刺地龍去土炒川楝子鹽水泡去核茴香炒防風各一兩烏藥五錢右為細末酒煮麫糊為丸如梧桐子大每服十五丸空心溫酒送下鹽湯亦可婦人用醋煎滚候溫送下方歌黄耆丸治臁瘡起川烏赤豆共蒺藜地龍川楝茴香炒防風烏藥酒糊宜四生丸地龍去土炒白附子殭蠶炒草烏去皮尖炮五靈脂各等分右為細末米糊為丸如梧桐子大每服三四十丸食前茶酒任下方歌四生臁瘡久纒綿骨節多疼舉動難地龍白附殭蠶炒草烏靈脂米糊丸虎潛丸敗龜板四兩酥炙知母黄蘗二味鹽酒炒熟地各三兩牛膝酒蒸白芍酒炒陳皮各二兩鹽水潤鎖陽酒潤當歸各一兩五錢酒洗虎脛骨一兩酥炙共研末羯羊肉酒煮爛搗膏和入藥末内為丸如梧桐子大每服三錢空心淡鹽湯送下冬月加乾薑一兩方歌虎潛丸療筋骨痿下元虗冷精血虧龜板鎖陽膝虎脛知蘗芍陳熟地歸鱔漏鱔漏生在腿肚間孔如鑽眼津水綿頗類濕瘡濕熱發艾湯薰洗覺癢痊註此證由濕熱而成初起頗類濕瘡生於腿肚癢痛相兼破津黄水綿綿不已其孔深如鑽眼復受寒氣侵入瘡孔以致口寒肌冷法宜艾葉老葱熬湯每日先薰後洗瘡口發熱覺癢時即貼黄蠟膏收斂而愈黄蠟膏見臁瘡四彎風四彎風生腿脚彎每月一發最纒綿形如風癬風邪襲搔破成瘡癢難堪註此證生在兩腿彎脚彎每月一發形如風癬屬風邪襲入腠理而成其癢無度搔破津水形如濕癬法宜大麥一升熬湯先薰後洗次搽三妙散滲濕殺蟲其癢即止緩緩取效三妙散見腹部臍癰風疽風疽生脛曲凹中癢搔皮損津汁膿風邪留於血衇内煩熱昏冒肌腫痛註此證生脛骨及曲凹之處癢搔皮損津黄汁極其黏濃由風邪留於血衇相搏而成因其根深故有疽名甚則身體煩熱昏冒而肌肉透紅更增腫疼宜服防風湯外抹青竹大豆油即效防風湯防風附子製麻黄蜜炙白芷木通柴胡當歸焙桔梗甘草炙羌活各五分共為粗末水一鍾半煎八分澄去滓食後服臨睡再用一服如欲出汗俟空心頭煎落滓併一服之後食稀粥生薑食畢被覆臥取汗避風方歌防風湯療風熱搏留於血衇津汁破附子麻黄芷木通柴胡歸桔甘羌活青竹大豆油青竹筒截三尺長徑一寸半筒内裝黑豆一升以榖糠馬糞二物燒火當竹筒中炙之以磁盌兩頭接取油汁先以清米泔水和鹽熱洗患處拭乾即塗豆油不過三度極效方歌青竹筒截三尺長徑要寸半黑豆裝榖糠馬糞燒炙筒風疽搔癢油塗良足部足發背足發背屬膽胃經七情六淫下注成詳别善惡分順逆細辨疽癰定死生註此證一名足跗發凡足背雖行三陽而偏在膽胃二經居多證由七情内鬱或兼六淫外傷而成經云三背不宜生瘡惟足背多筋多骨肉少皮薄又在至隂之下發瘡疽者升發遲慢所以謂為險候也宜别五善七惡而分順逆發背者大瘡之通名也須當細辨或疽或癰順逆既分則死生定焉初宜服仙方活命飲及隔蒜灸之令瘡速潰餘與腫瘍潰瘍門治同仙方活命飲見腫瘍門隔蒜灸法見首卷灸法湧泉疽湧泉疽發在足心腎虗濕滯多屬隂速破潰淺癰可治黑陷為疽命難存註此證生在足心湧泉穴一名足心發又名穿窟天虵俗名病穿板屬足少隂由腎經虗損兼濕熱下注而成若十四日内即潰膿淺為癰猶可調治初服仙方活命飲外用神燈照法虗甚膿生遲者十全大補湯潰後兼用桂附地黄丸服之餘治按癰疽腫瘍潰瘍門若黑陷不疼二十一日之内不潰膿者為疽屬隂敗之證難救仙方活命飲見腫瘍門神燈照法見首卷十全大補湯見潰瘍門桂附地黄丸見面部頰瘍脱疽脱疽多生足指間黄皰如粟黑爛延腎竭血枯五敗證割切仍黑定歸泉註此證多生足指之間手指生者間或有之蓋手足十指乃藏府枝榦未發疽之先煩躁發熱頗類消渴日久始發此患初生如粟黄皰一㸃皮色紫暗猶如煮熟紅棗黒氣侵漫腐爛延開五指相傳甚則攻於脚面痛如湯潑火燃其臭氣雖異香難解由膏粱藥酒及房術丹石熱藥以致陽精煽惑淫火猖狂藴蓄於藏府消爍隂液而成斯時血死心敗皮死肺敗筋死肝敗肉死脾敗骨死腎敗此五敗證雖遇靈丹亦難獲效初起宜服解毒濟生湯外用大麥米煮飯拌芙蓉葉菊花葉各五錢貼之止痛治之不應者必施割法須患者情愿將死生付於度外遵古法毒在肉則割毒在骨則切然割切之法須宜早施乘其未及延散時用頭髮十餘根緊纒患指本節盡處遶紥十餘轉毋令毒氣攻延好肉隨用蟾酥餅放於初起黄皰頂上加艾灸之至肉枯瘡死為度次日病指盡黑方用利刀尋至本節縫中將患指徐順取下血流不止者用如聖金刀散止之餘腫以離宮錠塗之次日倘有黑氣未盡單用蟾酥餅研末撒之用陀僧膏蓋貼黑氣自退患上生膿兼貼生肌玉紅膏及生肌等藥肌生䕶骨斂口此為吉兆内宜滋腎水養氣血健脾安神之劑如隂陽二氣丹清神散金液戊土丹俱可服之若内外始終無變證十中可保三四若割切之後復生黑氣過節侵漫好肉疼痛尤甚者屬逆此證初起不痛者宜雌雄霹靂火灸之其餘滋補燙洗等法俱按癰疽腫瘍潰瘍門按諸書論脱疽單生於足大指而别指生者俱名敦疽此非確論然脱疽偏生於屬隂經之指者居多屢經如此後之學者宜詳審焉可也解毒濟生湯當歸逺志去心川芎花粉柴胡黄芩犀角鎊麥冬去心知母黄蘗茯神金銀花各一錢紅花牛膝甘草各五分生水二鍾煎八分入童便一杯食前服如生手指間去牛膝加升麻方歌解毒濟生歸逺芎花粉柴芩犀麥冬知蘗茯銀紅膝草脱疽初起煩熱攻如聖金刀散松香七兩生白礬枯白礬各一兩五錢共研極細末磁罐收貯臨用時撒於患處方歌如聖金刀散刃傷血流不止撒之良白礬枯礬松香等共研為末罐收藏隂陽二氣丹天門冬去心麥門冬去心元參湯泡去粗皮以上三味各搗膏五味子炒人中白生黄蘗各一兩甘草生澤瀉枯白礬青黛各三錢氷片一錢各研細末同天門冬等膏加煉蜜少許再搗千餘下輭硬得中丸如梧桐子大硃砂為衣每服六十丸童便人乳各一酒鍾空心送下安睡一時方歌隂陽二氣丹脱疽腎水枯乾燥熱欺天麥元參甘瀉味中白氷礬蘗黛宜清神散緑豆粉一兩牛黄三分甘草節五錢氷片五分硃砂三錢右共為極細末每服一錢淡竹葉燈心煎湯調服方歌清神散治脱疽發悶亂心煩調服佳豆粉牛黄甘草節研加氷片共硃砂金液戊土丹茯神胡黄連烏梅肉人中黄五味子各一兩硃砂雄黄硝石逺志去心石菖蒲各三錢牛黄氷片各一錢各研細末共和一處再研千轉於端午七夕或春秋二分冬夏二至吉辰在凈室中先將烏梅肉搗膏和入藥末内加煉蜜少許搗千餘下輭硬得中為丸每丸重一錢金鉑為衣每服一丸人乳童便各一酒鍾隨病上下化服修和之時服藥之際忌婦人僧尼孝服雞犬等見之此藥用蠟封固收藏不洩藥味愈久愈效方歌金液戊土茯牛黄硃雄消逺片石菖胡連梅肉中黄味耑治脱疽發背瘡雌雄霹靂火雌黄雄黄丁香各二錢麝香一分右為細末用蘄艾茸二錢將藥末搓入艾内作豌豆大丸安患上灸之毋論癢痛以肉焦為度如毒已經走散就紅暈盡處排炷灸之痛則至癢癢則至痛以瘡紅活為妙方歌霹靂火治隂疽方脱疽不疼灸更强雌黄丁麝雄黄末蘄艾茸搓藥末良蟾酥餅即蟾酥丸作餅見疔瘡門離宮錠見腫瘍門陀僧膏生肌玉紅膏俱見潰瘍門敦疽敦疽多生足指疼腫色紅活出血膿血燥精竭無敗色膏粱房勞脾腎經註此證多生於足指而手指亦間有生者由膏粱太過則損脾房勞太過則傷腎脾既損則血生少腎既傷則精必竭更兼濕熱壅盛而成初起黄粟小皰痛如湯潑火燃其色紅活腫無黑暈潰破有膿腐無敗色此屬血衇未死之候然此證雖無敗色亦由臟腑發出未可視為小毒也法宜急服滋隂救燥補血理脾之藥初服解毒濟生湯六味地黄湯潰服人參養榮湯桂附地黄湯外初宜蝌蚪拔毒散塗之將潰貼蟾酥餅兼貼巴膏潰腐之後換搽生肌玉紅膏生肌斂口初終禁用灸法患者宜清心寡慾調理庶免變證解毒濟生湯見脱疽六味地黄湯見面部雀斑桂附地黄湯見面部頰瘍人參養榮湯巴膏生肌玉紅膏俱見潰瘍門蝌蚪拔毒散見腫瘍門蟾酥餅即蟾酥丸作餅見疔瘡門甲疽甲疽多因剔甲傷甲長侵肉破成瘡努肉髙突痛難忍消瘀化努效非常註此證因割嵌指甲傷肉或剔甲傷肉或甲長侵肉穿窄小靴鞋以致甲旁焮腫破爛時津黄水努肉髙突疼痛難忍不能著衣原係好肉受傷宜用鹽湯燙洗外敷華陀累效散白膏藥葢貼努肉消盡即愈華陀累效散乳香硇砂各一錢輕粉五分橄㰖核三枚性燒存黄丹三分共研細末香油調敷方歌華陀累效敷嵌甲黄丹輕粉乳硇砂橄㰖核燒同碾細香油調濃患處搽白膏藥見潰瘍門足跟疽足跟疽生脚攣根狀如免咬紫紅焮陽蹻積熱潰難斂初宜隔蒜艾灸勤註此證生足跟俗名脚攣根由臟腑積熱汗出渉水逺行傷筋而成初腫紅紫疼痛潰破膿水淋瀝狀如免咬經云免齧狀如赤豆至骨急治遲則害人蓋謂毒之深惡也屬足太陽膀胱經穴名申衇即陽蹻衇發源之所又係腎經所過之路瘡口久潰不合陽蹻衇氣不能冲發腎氣由此漏洩以致患者益虗初起宜隔蒜片灸之服仙方活命飲加肉桂牛膝潰後宜補中益氣湯人參養榮湯桂附地黄丸隨證滋補治之餘按癰疽潰瘍門海藏云免齧久不收斂用鹽湯洗之白术研末撒之兩日一易謹戒一切勞碌即效隔蒜灸法見首卷灸法仙方活命飲見腫瘍門補中益氣湯人參養榮湯俱見潰瘍門桂附地黄丸見面部頰瘍厲癰四淫厲癰勢小足旁生四淫在足上下凝三隂虧損為疽重三陽濕熱發癰輕註靈樞云發於足上下名曰四淫其狀大癰急治之百日死發於足旁名曰厲癰其狀不大急治之去其黑者不消輒益不治百日死此二證俱由足三隂經虧損為疽者重若兼足三陽經濕熱下注而成癰者輕若紅腫疼痛潰破有膿腐脱無黑氣浸漫屬濕熱偏盛順證易治若微紅微腫潰出膿水屬隂氣凝結不能化膿險證難治若黑暗漫腫痛不潰膿煩熱作渴小水淋漓為隂敗惡證屬逆四淫無邊沿厲癰類敦疽初俱宜仙方活命飲外宜隔蒜灸以宣壅毒將潰宜服人參養榮湯兼六味地黄丸以滋補之若色黯不痛即用桑柴烘法以行壅滯助陽氣更宜十全大補湯兼桂附地黄丸壯脾滋水治之或可成功若妄用苦寒尅伐之藥多致不救外治法同敦疽仙方活命飲見腫瘍門隔蒜灸法見首卷灸法人參養榮湯十全大補湯俱見潰瘍門六味地黄丸見面部雀斑桑柴烘法見首卷桂附地黄丸見面部頰瘍臭田螺臭田螺瘡最纒綿脚丫搔癢起白斑搓破皮爛腥水臭治宜清熱滲濕痊註此證由胃經濕熱下注而生脚丫破爛其患甚小其癢搓之不能解必搓至皮爛津腥臭水覺疼時其癢方止次日仍癢經年不愈極其纒綿法宜甘草薏苡仁煎湯洗之嚼細茶葉塗之乾則黄連膏潤之破爛甚者宜用鵞掌皮煆存性研末香油調敷甚效黄連膏見鼻部鼻瘡牛程􅀈牛程􅀈因奔走急脚熱着水寒風襲氣滯血凝起硬埂法宜鴿糞滚湯漬註此證生於足跟及足掌皮内頑硬腫起高埂色黄疼痛不能行履由脚熱着冷水或遇寒風襲於血衇令氣滯血凝而成法宜用盆一箇内安新磚磚上安鴿糞糞上合罩篱以脚踏罩篱上次以滚水從旁冲入蒸之浸漬之冷則易之或用新磚燒紅韭菜汁潑之將病足踏於其上燙之早治或有消者久則破裂膿水津流每日米泔水洗淨搽牛角散四圍頑皮浮起剪之換搽生肌玉紅膏月白珍珠散生肌斂口自愈牛角散松香輕粉水龍骨即舊船底油石灰牛角尖燒灰共為末牛骨髓調搽方歌牛角散治牛程􅀈久破膿水流不痊松香輕粉水龍骨牛角燒灰須用尖生肌玉紅膏月白珍珠散俱見潰瘍門土栗土栗生在足跟旁腫若琉璃亮色黄行路﨑嶇傷筋骨急服仙方合五香註此證又名琉璃疽生在足跟之旁形如棗栗亮而色黄腫若琉璃由行﨑嶇之路勞傷筋骨血衇而成急服五香湯及仙方活命飲宣通壅滯膿熟鍼之膿少而多水者以陀僧膏貼之餘按癰疽潰瘍治法五香湯乳香藿香丁香沉香青木香各三錢半水二鍾煎八分服之方歌五香湯善治土栗行路勞傷血衇積乳藿丁沉青木香煎服舒壅功效極仙方活命飲見腫瘍門陀僧膏見潰瘍門冷疔冷疔濕寒足跟生疼痛徹骨紫皰形黑爛深孔流血水氣穢神燈照法靈註此證生在足跟由濕寒凝結而成形如棗栗起紫白皰疼痛徹骨漸生黑氣腐爛孔深時流血水氣穢經久不斂者宜神燈照法照之鐵粉散敷之初服内補十宣散次按潰瘍治同鐵粉散生鐵粉即鍼砂如無用黑鉛四兩鐵杓化開傾水中冷定取出再化再傾以鉛化盡為度去水取末三錢黄丹飛輕粉松香各一錢麝香一分各研細末共和一處再研匀將患處以葱湯洗去血水腐臭香油調藥搽於患上油紙蓋之紥之方歌鐵粉散醫足冷疔能蝕黑腐肌肉生黄丹輕粉松香麝香油調搽紙蓋靈神燈照法見首卷内補十宣散見胸部􅗢􅊓癰脚氣瘡脚氣瘡在足膝生濕熱相搏風氣乘壯熱腫痛津黄水心神煩躁犀角靈註此證生於足膝由濕熱内搏滯於膚腠外為風乘不得宣通故令脚膝生瘡癢痛作腫破津黄水形類黄水瘡惟身體壯熱心神煩躁經久難瘥宜服犀角散外以漏蘆湯洗之兼敷龍骨散甚效犀角散犀角屑天麻黄耆枳殻麩炒白鮮皮黄芩防風羌活白蒺藜各七錢五分檳榔一兩烏稍蛇二兩酒浸甘草五錢炙右研粗末每服八錢水一鍾半生薑五片煎一鍾去渣不拘時溫服方歌犀角散醫脚氣瘡天麻耆枳白鮮榔烏蛇芩草風羌活蒺藜粗末引加薑漏蘆湯漏蘆甘草生槐白皮五加皮白歛各一兩五錢白蒺藜四兩共為粗末每用五兩水八盌煎五盌去渣淋洗方歌漏蘆湯甘槐白皮五加白歛白蒺藜脚氣瘡疼癢津水熬湯洗患散濕急龍骨散白龍骨研輕粉各二錢五分檳榔一錢研豶豬糞新瓦上焙乾再入火中燒之存性取出研末五錢共研匀先以口含虀水或温鹽湯洗令瘡净見肉却用香油調藥隨瘡大小敷之未愈再敷方歌龍骨散能去濕腐脚氣瘡敷自然無輕榔豬糞香油入久逺惡瘡用亦除田螺皰田螺皰在足掌生裏濕外寒蒸鬱成豆粒黄皰悶脹硬破津臭水腫爛疼註此證多生足掌而手掌罕見由脾經濕熱下注外寒閉塞或因熱體渉水濕冷之氣蒸鬱而成初生形如豆粒黄皰悶脹硬疼不能着地連生數皰皮厚難於自破傳度三五成片濕爛甚則足跗俱腫寒熱往來法宜苦參菖蒲野艾熬湯熱洗次用線鍼將皰挑破放出臭水加味太乙膏貼之又將皰皮剪去宜用石膏輕粉等分研末撒之仍以加味太乙膏盖貼内服解毒瀉脾湯更有經年不愈者係下部濕寒以金匱腎氣丸常服甚效解毒瀉脾湯石膏煆牛蒡子炒硏防風黄芩蒼术炒甘草生木通山梔各一錢生研水二鍾燈心二十根煎八分服之方歌解毒瀉脾芩蒡子風膏蒼术草通梔田螺皰起宜煎服清熱疎風又去濕加味太乙膏見潰瘍門金匱腎氣丸即桂附地黄丸加車前子牛膝各一兩見面部頰瘍肉刺肉刺證由纒脚生或着窄鞋逺路行步履艱難疼痛甚玉簮根搗貼塗靈註此證生在脚指形如鷄眼故俗名鷄眼根陷肉裏頂起硬凸疼痛步履不得或因纒脚或着窄鞋逺行皆可生之法宜貼加味太乙膏滋潤之或用紫玉簮花根搗爛貼塗以油紙盖之又地骨皮紅花等分研細香油調敷俱效加味太乙膏見潰瘍門御纂醫宗金鑑卷七十一
