body:
  text: 編輯外科心法要訣目錄發無定處中大麻風楊梅瘡楊梅結毒赤白逰風紫白癜風白駁風癧瘍風丹毒粟瘡作癢枯筋箭御纂醫宗金鑑卷七十三目録欽定四庫全書御纂醫宗金鑑卷七十三編輯外科心法要訣目錄發無定處中大麻風楊梅瘡楊梅結毒赤白逰風紫白癜風白駁風癧瘍風丹毒粟瘡作癢枯筋箭御纂醫宗金鑑卷七十三目録欽定四庫全書御纂醫宗金鑑卷七十三編輯外科心法要訣大麻風麻風總屬毒癘成其因有三五損風五死證見真惡候初病能守或可生註此證古名癘風癘風者有毒之風也經云衇風成為癘又云癘者有營氣熱腐其氣不清故使其鼻柱壊而色敗皮膚瘍潰毒風客於衇而不去名曰癘風今人呼為大麻風一因風土所生中國少有此證惟烟瘴地面多有之一因傳染或遇生麻風之人或父母夫妻家人遞相傳染或在外不謹或糞坑房室床鋪衣被不潔一因自不調攝洗浴乗凉希圖快意或露卧當風睡眠濕地毒風襲入血衇其因名雖有三總屬天地癘氣感受不覺未經發泄積久而發徧身麻木次起白屑紅斑蔓延如癜形若蛇皮脱落成片始發之時自上而下者順自下而上者逆漸來可治頓發難醫風毒入裏化生為蟲蟲蝕五臟則形有五損肺受病先落眉毛肝受病靣起紫皰腎受病脚底先穿脾受病徧身如癬心受病先損其目此為險證又有五死證如麻木不仁者為皮死割切不痛者為肉死潰爛無膿者為血死手足脱落者為筋死鼻梁崩塌眼弦斷裂脣翻聲啞者為骨死若五死見一即為敗惡不治之候也此證初覺即服萬靈丹汗之次宜神應消風散追風散磨風丸次第服之牙齦出血用黄連貫衆等分煎湯漱之外搽類聚祛風散兼用地骨皮荆芥苦參細辛各二兩河水煎湯浸浴熏洗若遇損敗之證在上部則服醉仙散在下部則服通天再造散若鼻梁塌壊用換肌散服之患者稍露虛象即以補氣瀉榮湯服之兼用何首烏酒飲之若能清心寡慾戒口早治或有可生若口味不能清淡色慾不能斷絶即愈後仍不免再發終於不救神應消風散全蝎白芷人參各一兩右研細末每用二錢勿食晚飯次日空心温酒調服覺身微躁為效方歌神應消風散癘風身麻白屑起斑紅蠍芷人參各一兩空心酒服麻木平追風散錦紋大黄六兩川鬱金一兩八錢炒皂角刺一兩五錢共研細末每用五錢加大風子油一錢五分朴消一錢五更空心温酒調服直待辰時又如前調藥加熟蜜少許服之以蜜解口切不可卧良久痛瀉數次不妨以稀粥補之如第一日服消風散第二日即服此藥第三日服磨風丸周而復始又如此服之痩弱者十日内追風散只用一服老弱者勿服方歌追風散用川鬱金皂刺大黄研末匀初服消風次用此風油消酒調服神磨風丸豨薟草牛蒡子炒麻黄蒼耳草細辛川芎當歸荆芥蔓荆子防風車前子威靈仙天麻何首烏羌活獨活各一兩共為細末酒打麯糊為丸如梧桐子大每服六七十丸温酒送下日用二服方歌磨風丸薟蒡麻黄蒼細芎歸荆蔓防車威天麻何羌獨追風服後用此方類聚祛風散硫黄寒水石枯白礬貫衆各二兩蛇床子一兩朴消五錢共研細末臘月豬脂搗爛調敷方歌類聚祛風散硫黄寒水枯礬消蛇床貫衆細研豬脂搗耑搽徧體癘風瘡醉仙散牛蒡子炒胡麻枸把子蔓荆子各一兩苦參白蒺藜防風花粉各五錢共研細末每服一錢加輕粉一分二釐研匀茶清調服晨午晚各一服五七日後先於牙縫内出臭黄涎渾身疼悶如醉然後利下膿血惡物臭氣病根乃去矣方歌醉仙上部癘風重牛蒡胡麻枸蔓荆苦參蒺藜防花粉服加輕粉用茶清通天再造散大黄一兩煨皂角刺一兩五錢鬱金五錢白牽牛六錢半生半炒頭末共研細末每服二錢或三錢早晨靣東醇酒調下當日利下惡物或膿或蟲為效方歌通天再造治癘風敗證先從下部攻鬱金大黄牽牛刺晨服酒調靣向東換肌散烏稍蛇白花蛇蚯蚓各一兩去土細辛木鱉子白芷天麻連莖者赤芍蔓荆子當歸威靈仙荆芥穗甘菊花不灰木紫參苦參沙參何首烏石菖蒲木賊天門冬去心川芎白蒺藜甘草炙胡麻仁蒼术米泔水浸炒草烏各三錢五分湯泡去皮共研細末每服五錢温酒調下酒多更妙紫參不灰木雖無亦可方歌換肌散治大風瘡毒攻眉脱壊鼻梁烏稍白花蛇蚓細鱉芷天麻芍蔓當威靈荆菊不灰木紫苦沙參何首菖木賊天冬芎蒺草胡麻蒼术草烏強補氣瀉榮湯連翹去心升麻各六分桔梗五分黄芩生地各四分黄連蚯蚓酒炒去土當歸黄耆蘇木全蠍各三分人參白豆蔲各二分甘草一分生水二鍾酒一鍾煎至一鍾去渣又用胡桐淚一分水蛭炒䖟蟲各三箇炒麝香五釐桃仁三箇研泥共為細末入藥湯内煎至七分飯後服之方歌補氣瀉榮癘虚宜芩連參桔蚓歸耆蘇地升蠍翹蔲草桐淚蛭䖟麝桃泥何首烏酒何首烏四兩當歸身當歸尾穿山甲炙生地黄熟地黄蝦蟆各一兩側柏葉松鍼五加皮川烏湯泡去皮草烏各四錢皮湯泡去將藥入夏布袋内紫口用黄酒二十觔同藥袋入罈内封固重湯煮三炷香埋罯七日開罈口取酒時時飲之令醺醺然作汗避風方歌何首烏酒大風疾歸甲松鍼生熟地側蟆五加川草烏酒煮滋榮毒自息萬靈丹見腫瘍門楊梅瘡楊梅瘡生有二般精化氣化是其源精化淫慾氣傳染氣宜發汗精下痊註此證一名廣瘡因其毒出自嶺南一名時瘡以時氣乖變邪氣凑襲之故一名棉花瘡因其纒綿不已也一名翻花楊梅因窠粒破爛肉反突於外如黄蠟色一名天泡瘡因其夹濕而生白皰也有形如赤豆嵌於肉内堅硬如鐵名楊梅痘有形如風疹作癢名楊梅疹先起紅暈後發斑㸃者名楊梅斑色紅作癢其圏大小不一二三相套因食穢毒之物入大腸而發名楊梅圏其名形雖異總不出氣化精化二因但氣化傳染者輕精化慾染者重氣化者或遇生此瘡之人鼻聞其氣或悞食不潔之物或登圊受梅毒不潔之氣脾肺受毒故先從上部見之皮膚作癢筋骨微疼其形小而且乾也精化者由交媾不潔精泄時毒氣乗肝腎之虛而入於裏此為慾染先從下部見之筋骨多痛或小水澀淋瘡形大而且堅氣化者毒在表未經入裏稍有萌動宜急服透骨捜風散元氣實者楊梅一劑散汗之精化者毒在裏深伏骨髄未透肌膚宜服九龍丹通利大小二便以瀉骨中之毒甚者二服䧏下毒物以土深壓之行瀉之後體實者升麻解毒湯體虚者歸靈内托散服至筋骨不疼瘡色淡白内毒已解再用金蟾脱殻酒一料掃餘毒以絶其源如梅毒初發服表藥時恐上攻頭面宜豫服䕶面散或瘡勢已發於面愈後斑痕不退宜翠雲散㸃之以滅痕跡若梅瘡潰爛時膿穢浸淫成片而痛者以鵝黄散撒之又翻花楊梅亦以本方加雄黄末香油調敷之外有䕶從丸於發瘡時令侍從人服之可免傳染梅瘡初起頭不痛筋骨不疼小水通利瘡形碎小色鮮頭面稀少口角無瘡胸背稠宻榖道清楚者為順若先發下疳次生便毒魚口便覺筋骨疼痛而梅瘡随發色紫堅硬手足多生形如湯潑起皰者為險總之始終調治得法輕者半年重者一載始得全愈若患者不遵正法醫治欲求速效強服輕粉水銀白粉霜劫藥等類妄用熏擦哈吸等法以致餘毒含藏骨髄復為倒發結毒輕則累及妻子甚則腐爛損形不可不慎透骨捜風散透骨草白花者陰乾生脂麻羌活獨活小黑豆紫葡萄槐子白糖六安茶核桃肉各一錢五分生薑三片紅棗肉三枚水三鍾煎一鍾露一宿空心熱服被葢出汗避風方歌透骨捜風散梅毒筋骨微疼癢皮膚脂蔴羌獨豆葡萄槐子糖茶核桃肉楊梅一劑散麻黄一兩蜜炙威靈仙八錢大黄七錢羌活白芷皂刺金銀花穿山甲炙研蟬蜕各五錢防風三錢山羊肉一觔河水煮熟取清湯二盌用黄酒一盌將藥煎至一盌令患者空心將羊肉淡食令飽随後服藥葢被出汗避風方歌楊梅一劑元氣壯上部生毒氣化瘡麻黄羌芷威靈刺銀花風甲蟬大黄升麻解毒湯升麻皂刺各四錢土茯苓一觔水八盌煎四盌作四次一日服盡每次炖熱加香油三茶匙和匀量病上下食前後服之如瘡生項上加白芷咽内加桔梗胸腹加白芍肩背加羌活下部加牛膝方歌升麻解毒筋骨疼梅毒纒綿壯服靈土苓皂刺香油服按部須加藥引經歸靈内托散人參木𤓰白术土炒金銀花防巳天花粉白鮮皮薏苡仁各一錢當歸熟地白芍酒炒川芎各一錢土茯苓二兩威靈仙六分甘草五分水三鍾煎二鍾作二次随病上下服之渣再煎服下部加牛膝五分元氣虚者倍加參歸毒氣盛者倍金銀花加蒲公英外以麥冬五錢去心薏苡仁五錢土茯苓一兩煎湯常服以代茶方歌歸苓内托參木𤓰术銀四物已天花土苓鮮薏威靈草梅瘡體弱服堪誇金蟬脱殻酒醇酒五觔大蝦蟆一箇土茯苓五兩浸酒内瓶口封嚴重湯煮二炷香時取出待次日飲之以醉為度無論冬夏蓋煖出汗為效飲存之酒次日随量飲之酒盡瘡愈又治結毒筋骨疼痛諸藥不效者更妙服酒七日後禁見風為效忌口及房慾䕶面散女人頭髮煆存性明雄黄各三分共研細香油半酒鍾調匀滾黄酒冲服一日三服方歌䕶面散醫梅瘡現豫服毒不攻頭面香油調藥黄酒冲只用雄黄頭髮煅翠雲散輕粉一兩石膏一兩煅膽礬銅綠各五錢共研極細末濕瘡乾撒乾瘡以公豬膽汁調濃㸃之每日三次斑痕自退方歌翠雲散去瘡後斑輕粉石膏共膽礬銅綠共研濕乾撒豬膽汁調能潤乾鵝黄散輕粉石膏煅黄蘗各等分炒共為末乾撒患處即可生痂再爛再撒毒盡即愈方歌鵝黄散治梅瘡爛膿穢多疼浸成片輕粉石膏黄蘗研乾撒止疼解毒驗䕶從丸雄黄川椒各五錢杏仁一百粒尖炒去皮共研末燒酒打飛羅麵糊為丸如梧桐子大每服十五丸白滾水送下方歌䕶從丸避梅瘡患雄黄川椒各五錢杏仁百粒酒糊入從人服之毒不傳九龍丹見下部懸癰楊梅結毒結毒楊梅毒結生原於誤服劫藥成日久逢虚始倒發腦鼻喉目任蝕攻註此證因生楊梅方熾誤服水銀升煉悍燥劫藥希圖速效瘡痂盡落一時僥倖而愈不知遺害久逺引毒潛藏骨髄闗竅之中其毒積久因經虚外攻故名結毒倒發其始先從筋骨疼痛随處結腫皮色如常將爛時色方紫紅腐臭不堪以致腦頂塌陷腮脣鼻梁損壊穿喉蝕目手足拘攣等患終成痼疾初起結腫筋骨疼痛時宜服搜風解毒湯若徧身破爛臭穢而兼筋骨疼痛氣實毒盛者宜服化毒散氣衰者豬􅮋子湯主之若結毒腫塊經年難愈諸法罔效者宜西聖復煎丸主之若結毒攻於口鼻者宜五寳散主之年久臭爛鼻破損壊者宜服結毒紫金丹若入巔頂頭痛如破者内服天麻餅子鼻吸碧雲散若鼻塞不通宜吹通鼻散甚效毒攻咽喉腐爛臭蝕者宜服硫黄不二散兼吹結毒靈藥兑人中白若結毒筋骨疼痛朝輕夜重喜熱手按揉者係犯寒凉宜鉛回散主之結毒臭爛不斂宜貼解毒紫金膏兼撒結毒靈藥壯實者以解毒為主虚弱者以兼補為法以上之證各随次第如法調治重者一年輕者半年自然可痊永無後患慎勿妄求速效以自貽誤也捜風解毒湯土茯苓一兩白鮮皮金銀花薏苡仁防風木通木𤓰各五分皂角子四分水二鍾煎一鍾服之一日三服氣虚加人參七分血虚加當歸七分忌清茶牛羊雞鵝魚肉燒酒房慾等件方歌捜風解毒湯倒發初腫拘急骨痛加土苓白鮮銀花薏皂角防風通木𤓰化毒散生大黄一兩穿山甲炙當歸尾各五錢白殭蠶三錢炒蜈蚣一條炙黄共研末每服二錢温酒調下一日二服方歌化毒散醫結毒盛破穢氣實筋骨疼大黄山甲殭歸尾蜈蚣研末酒調成豬􅏬子湯豬􅏬子一兩切碎黄耆鹽水炒金銀花各三錢當歸白芍各一錢五分酒炒天花粉貝母去心