用羊蹄草根共硫黄蘸醋於綉鐵片上研濃汁日塗二三次效烏蛇散烏蛇三兩酒浸羌活防風黄芩苦參各二兩人參沙參丹參元參梔子仁生桂心秦艽木通犀角屑白蒺藜升麻枳殻麩炒白鮮皮川芎各一兩共研細未每服二錢食逺温酒調服忌雞豬魚蒜麵食熱物之類方歌烏蛇癧瘍風熱滛羌活防風芎五參梔桂秦艽通犀角蒺藜升枳白鮮芩丹毒丹毒名多雲片形風火濕寒肉分凝胸腹四肢分順逆清火消風砭敷靈註孫真人云丹毒一名天火肉中忽有赤色如丹塗之狀其大如掌甚者徧身有癢有痛而無定處丹名雖多其理則一也形如鷄冠名鷄冠丹若皮澀起如麻豆粒者名茱萸丹亦有水丹徧身起皰遇水濕搏之透露黄色恍如有水在皮中此雖小疾能令人死須當速治不可忽也色赤者諸書謂之赤逰丹色白者為水丹小兒多生之但有乾濕癢痛之殊有夾濕夾風夾寒之别諸丹總屬心火三焦風邪而成如色赤而乾發熱作癢形如雲片者即名赤逰丹屬血分有火而受風也毒盛者服藍葉散毒輕者宜導赤湯加薄荷葉獨活服之如初起白癍漸透黄色光亮脹墜破流黄水濕爛多痛者名水丹又名風丹多生腿膝屬脾肺有熱而夾濕也宜防己散主之亦有起白癍無熱無痛逰走不定者由火毒未發肌膚外受寒鬱名為冷瘼宜服烏藥順氣散外用薑擦凡丹形初見即用牛羊精肉片貼之甚則用砭法令出紫血色重不散者以柏葉散敷之又方芸薹葉研末靛青調敷甚效諸丹本於火邪其勢暴速自胸腹走於四肢者順從四肢攻於胸腹者逆藍葉散藍葉曬乾川芎赤芍知母生地白芷川升麻柴胡葛根杏仁炒去皮尖甘草各一錢生石膏五分煅共搗粗末每用八錢新汲水二鍾煎八分去渣服熱甚加黄芩元參方歌藍葉散却赤逰丹皆因血熱風邪纒芎芍知膏生地芷升麻柴葛杏梔甘防己散防己三兩朴消一兩犀角鎊川芎黄芩黄耆川升麻各一錢共搗粗末每用五錢加竹葉三十片新汲水二鍾煎八分服方歌防己丹毒始白癍漸黄亮痛濕熱原朴消犀角芎芩共耆與升麻竹葉煎烏藥順氣散烏藥橘紅各二錢枳殻麩炒白芷桔梗防風殭蠶炒獨活川芎各一錢甘草五分生水二鍾生薑三片煎八分服方歌烏藥順氣枳橘紅芷桔風殭獨草芎冷瘼逰行無熱痛因毒未發受寒風導赤湯見口部口縻柏葉散見腰部纒腰火丹粟瘡作癢粟瘡癢證屬火生風邪乗皮起粟形風為火化能作癢通聖苦參及消風註凡諸瘡作癢皆屬心火火邪内鬱表虚之人感受風邪襲入皮膚風遇火化作癢致起瘡瘍形如粟粒其色紅搔之愈癢乆而不瘥亦能消耗血液膚如蛇皮初服防風通聖散加枳殻蟬蜕血燥遇晚癢甚夜不寐者宜服消風散外敷二味㧞毒散若年深日乆膚如蛇皮者宜常服皂角苦參丸外用豬脂油二兩苦杏仁一兩搗泥抹之自效皂角苦參丸苦參一觔荆芥十二兩白芷大風子肉防風各六兩大皂角川芎當歸何首烏生大胡麻枸把子牛蒡子炒威靈仙全蠍白附子蒺藜炒去刺獨活川牛膝各五兩草烏湯泡去皮蒼术米泔水浸炒連翹去心天麻蔓荆子羌活青風藤甘草杜仲各三兩酥炙白花蛇切片酥油炙黄縮砂仁各二兩炒人參一兩共研細末醋打老米糊為丸如梧桐子大每服三四十丸温酒食前後任下避風忌口為要方歌皂角苦參粟瘡癢久似蛇皮膚難當芎歸何首胡麻芷大風枸把草烏蒼翹蒡威靈蠍白附蒺藜天麻獨蔓羌白蛇風藤甘杜仲人參牛膝縮荆防防風通聖散見頭部秃瘡消風散見項部鈕扣風二味拔毒散見腫瘍門枯筋箭枯筋箭由肝失榮筋氣外發赤豆形破突筋頭如花蕋或繫或灸便成功註此證一名肬子由肝失血養以致筋氣外發初起如赤豆枯則微槁日久破裂鑽出筋頭鬔鬆枯槁如花之蕋多生於手足胸乳之間根蒂細小者宜用藥線齊根繫𦂳七日後其患自落以月白珍珠散摻之其疤收斂根大頂小者用銅錢一文套肬子上以草紙穰代艾連灸三壯其患枯落肬形若大用草紙蘸濕套在肬上灸之藥線見臀部痔瘡月白珍珠散見潰瘍門御纂醫宗金鑑卷七十三欽定四庫全書御纂醫宗金鑑卷七十三編輯外科心法要訣大麻風麻風總屬毒癘成其因有三五損風五死證見真惡候初病能守或可生註此證古名癘風癘風者有毒之風也經云衇風成為癘又云癘者有營氣熱腐其氣不清故使其鼻柱壊而色敗皮膚瘍潰毒風客於衇而不去名曰癘風今人呼為大麻風一因風土所生中國少有此證惟烟瘴地面多有之一因傳染或遇生麻風之人或父母夫妻家人遞相傳染或在外不謹或糞坑房室床鋪衣被不潔一因自不調攝洗浴乗凉希圖快意或露卧當風睡眠濕地毒風襲入血衇其因名雖有三總屬天地癘氣感受不覺未經發泄積久而發徧身麻木次起白屑紅斑蔓延如癜形若蛇皮脱落成片始發之時自上而下者順自下而上者逆漸來可治頓發難醫風毒入裏化生為蟲蟲蝕五臟則形有五損肺受病先落眉毛肝受病靣起紫皰腎受病脚底先穿脾受病徧身如癬心受病先損其目此為險證又有五死證如麻木不仁者為皮死割切不痛者為肉死潰爛無膿者為血死手足脱落者為筋死鼻梁崩塌眼弦斷裂脣翻聲啞者為骨死若五死見一即為敗惡不治之候也此證初覺即服萬靈丹汗之次宜神應消風散追風散磨風丸次第服之牙齦出血用黄連貫衆等分煎湯漱之外搽類聚祛風散兼用地骨皮荆芥苦參細辛各二兩河水煎湯浸浴熏洗若遇損敗之證在上部則服醉仙散在下部則服通天再造散若鼻梁塌壊用換肌散服之患者稍露虛象即以補氣瀉榮湯服之兼用何首烏酒飲之若能清心寡慾戒口早治或有可生若口味不能清淡色慾不能斷絶即愈後仍不免再發終於不救神應消風散全蝎白芷人參各一兩右研細末每用二錢勿食晚飯次日空心温酒調服覺身微躁為效方歌神應消風散癘風身麻白屑起斑紅蠍芷人參各一兩空心酒服麻木平追風散錦紋大黄六兩川鬱金一兩八錢炒皂角刺一兩五錢共研細末每用五錢加大風子油一錢五分朴消一錢五更空心温酒調服直待辰時又如前調藥加熟蜜少許服之以蜜解口切不可卧良久痛瀉數次不妨以稀粥補之如第一日服消風散第二日即服此藥第三日服磨風丸周而復始又如此服之痩弱者十日内追風散只用一服老弱者勿服方歌追風散用川鬱金皂刺大黄研末匀初服消風次用此風油消酒調服神磨風丸豨薟草牛蒡子炒麻黄蒼耳草細辛川芎當歸荆芥蔓荆子防風車前子威靈仙天麻何首烏羌活獨活各一兩共為細末酒打麯糊為丸如梧桐子大每服六七十丸温酒送下日用二服方歌磨風丸薟蒡麻黄蒼細芎歸荆蔓防車威天麻何羌獨追風服後用此方類聚祛風散硫黄寒水石枯白礬貫衆各二兩蛇床子一兩朴消五錢共研細末臘月豬脂搗爛調敷方歌類聚祛風散硫黄寒水枯礬消蛇床貫衆細研豬脂搗耑搽徧體癘風瘡醉仙散牛蒡子炒胡麻枸把子蔓荆子各一兩苦參白蒺藜防風花粉各五錢共研細末每服一錢加輕粉一分二釐研匀茶清調服晨午晚各一服五七日後先於牙縫内出臭黄涎渾身疼悶如醉然後利下膿血惡物臭氣病根乃去矣方歌醉仙上部癘風重牛蒡胡麻枸蔓荆苦參蒺藜防花粉服加輕粉用茶清通天再造散大黄一兩煨皂角刺一兩五錢鬱金五錢白牽牛六錢半生半炒頭末共研細末每服二錢或三錢早晨靣東醇酒調下當日利下惡物或膿或蟲為效方歌通天再造治癘風敗證先從下部攻鬱金大黄牽牛刺晨服酒調靣向東換肌散烏稍蛇白花蛇蚯蚓各一兩去土細辛木鱉子白芷天麻連莖者赤芍蔓荆子當歸威靈仙荆芥穗甘菊花不灰木紫參苦參沙參何首烏石菖蒲木賊天門冬去心川芎白蒺藜甘草炙胡麻仁蒼术米泔水浸炒草烏各三錢五分湯泡去皮共研細末每服五錢温酒調下酒多更妙紫參不灰木雖無亦可方歌換肌散治大風瘡毒攻眉脱壊鼻梁烏稍白花蛇蚓細鱉芷天麻芍蔓當威靈荆菊不灰木紫苦沙參何首菖木賊天冬芎蒺草胡麻蒼术草烏強補氣瀉榮湯連翹去心升麻各六分桔梗五分黄芩生地各四分黄連蚯蚓酒炒去土當歸黄耆蘇木全蠍各三分人參白豆蔲各二分甘草一分生水二鍾酒一鍾煎至一鍾去渣又用胡桐淚一分水蛭炒䖟蟲各三箇炒麝香五釐桃仁三箇研泥共為細末入藥湯内煎至七分飯後服之方歌補氣瀉榮癘虚宜芩連參桔蚓歸耆蘇地升蠍翹蔲草桐淚蛭䖟麝桃泥何首烏酒何首烏四兩當歸身當歸尾穿山甲炙生地黄熟地黄蝦蟆各一兩側柏葉松鍼五加皮川烏湯泡去皮草烏各四錢皮湯泡去將藥入夏布袋内紫口用黄酒二十觔同藥袋入罈内封固重湯煮三炷香埋罯七日開罈口取酒時時飲之令醺醺然作汗避風方歌何首烏酒大風疾歸甲松鍼生熟地側蟆五加川草烏酒煮滋榮毒自息萬靈丹見腫瘍門楊梅瘡楊梅瘡生有二般精化氣化是其源精化淫慾氣傳染氣宜發汗精下痊註此證一名廣瘡因其毒出自嶺南一名時瘡以時氣乖變邪氣凑襲之故一名棉花瘡因其纒綿不已也一名翻花楊梅因窠粒破爛肉反突於外如黄蠟色一名天泡瘡因其夹濕而生白皰也有形如赤豆嵌於肉内堅硬如鐵名楊梅痘有形如風疹作癢名楊梅疹先起紅暈後發斑㸃者名楊梅斑色紅作癢其圏大小不一二三相套因食穢毒之物入大腸而發名楊梅圏其名形雖異總不出氣化精化二因但氣化傳染者輕精化慾染者重氣化者或遇生此瘡之人鼻聞其氣或悞食不潔之物或登圊受梅毒不潔之氣脾肺受毒故先從上部見之皮膚作癢筋骨微疼其形小而且乾也精化者由交媾不潔精泄時毒氣乗肝腎之虛而入於裏此為慾染先從下部見之筋骨多痛或小水澀淋瘡形大而且堅氣化者毒在表未經入裏稍有萌動宜急服透骨捜風散元氣實者楊梅一劑散汗之精化者毒在裏深伏骨髄未透肌膚宜服九龍丹通利大小二便以瀉骨中之毒甚者二服䧏下毒物以土深壓之行瀉之後體實者升麻解毒湯體虚者歸靈内托散服至筋骨不疼瘡色淡白内毒已解再用金蟾脱殻酒一料掃餘毒以絶其源如梅毒初發服表藥時恐上攻頭面宜豫服䕶面散或瘡勢已發於面愈後斑痕不退宜翠雲散㸃之以滅痕跡若梅瘡潰爛時膿穢浸淫成片而痛者以鵝黄散撒之又翻花楊梅亦以本方加雄黄末香油調敷之外有䕶從丸於發瘡時令侍從人服之可免傳染梅瘡初起頭不痛筋骨不疼小水通利瘡形碎小色鮮頭面稀少口角無瘡胸背稠宻榖道清楚者為順若先發下疳次生便毒魚口便覺筋骨疼痛而梅瘡随發色紫堅硬手足多生形如湯潑起皰者為險總之始終調治得法輕者半年重者一載始得全愈若患者不遵正法醫治欲求速效強服輕粉水銀白粉霜劫藥等類妄用熏擦哈吸等法以致餘毒含藏骨髄復為倒發結毒輕則累及妻子甚則腐爛損形不可不慎透骨捜風散透骨草白花者陰乾生脂麻羌活獨活小黑豆紫葡萄槐子白糖六安茶核桃肉各一錢五分生薑三片紅棗肉三枚水三鍾煎一鍾露一宿空心熱服被葢出汗避風方歌透骨捜風散梅毒筋骨微疼癢皮膚脂蔴羌獨豆葡萄槐子糖茶核桃肉楊梅一劑散麻黄一兩蜜炙威靈仙八錢大黄七錢羌活白芷皂刺金銀花穿山甲炙研蟬蜕各五錢防風三錢山羊肉一觔河水煮熟取清湯二盌用黄酒一盌將藥煎至一盌令患者空心將羊肉淡食令飽随後服藥葢被出汗避風方歌楊梅一劑元氣壯上部生毒氣化瘡麻黄羌芷威靈刺銀花風甲蟬大黄升麻解毒湯升麻皂刺各四錢土茯苓一觔水八盌煎四盌作四次一日服盡每次炖熱加香油三茶匙和匀量病上下食前後服之如瘡生項上加白芷咽内加桔梗胸腹加白芍肩背加羌活下部加牛膝方歌升麻解毒筋骨疼梅毒纒綿壯服靈土苓皂刺香油服按部須加藥引經歸靈内托散人參木𤓰白术土炒金銀花防巳天花粉白鮮皮薏苡仁各一錢當歸熟地白芍酒炒川芎各一錢土茯苓二兩威靈仙六分甘草五分水三鍾煎二鍾作二次随病上下服之渣再煎服下部加牛膝五分元氣虚者倍加參歸毒氣盛者倍金銀花加蒲公英外以麥冬五錢去心薏苡仁五錢土茯苓一兩煎湯常服以代茶方歌歸苓内托參木𤓰术銀四物已天花土苓鮮薏威靈草梅瘡體弱服堪誇金蟬脱殻酒醇酒五觔大蝦蟆一箇土茯苓五兩浸酒内瓶口封嚴重湯煮二炷香時取出待次日飲之以醉為度無論冬夏蓋煖出汗為效飲存之酒次日随量飲之酒盡瘡愈又治結毒筋骨疼痛諸藥不效者更妙服酒七日後禁見風為效忌口及房慾䕶面散女人頭髮煆存性明雄黄各三分共研細香油半酒鍾調匀滾黄酒冲服一日三服方歌䕶面散醫梅瘡現豫服毒不攻頭面香油調藥黄酒冲只用雄黄頭髮煅翠雲散輕粉一兩石膏一兩煅膽礬銅綠各五錢共研極細末濕瘡乾撒乾瘡以公豬膽汁調濃㸃之每日三次斑痕自退方歌翠雲散去瘡後斑輕粉石膏共膽礬銅綠共研濕乾撒豬膽汁調能潤乾鵝黄散輕粉石膏煅黄蘗各等分炒共為末乾撒患處即可生痂再爛再撒毒盡即愈方歌鵝黄散治梅瘡爛膿穢多疼浸成片輕粉石膏黄蘗研乾撒止疼解毒驗䕶從丸雄黄川椒各五錢杏仁一百粒尖炒去皮共研末燒酒打飛羅麵糊為丸如梧桐子大每服十五丸白滾水送下方歌䕶從丸避梅瘡患雄黄川椒各五錢杏仁百粒酒糊入從人服之毒不傳九龍丹見下部懸癰楊梅結毒結毒楊梅毒結生原於誤服劫藥成日久逢虚始倒發腦鼻喉目任蝕攻註此證因生楊梅方熾誤服水銀升煉悍燥劫藥希圖速效瘡痂盡落一時僥倖而愈不知遺害久逺引毒潛藏骨髄闗竅之中其毒積久因經虚外攻故名結毒倒發其始先從筋骨疼痛随處結腫皮色如常將爛時色方紫紅腐臭不堪以致腦頂塌陷腮脣鼻梁損壊穿喉蝕目手足拘攣等患終成痼疾初起結腫筋骨疼痛時宜服搜風解毒湯若徧身破爛臭穢而兼筋骨疼痛氣實毒盛者宜服化毒散氣衰者豬􅮋子湯主之若結毒腫塊經年難愈諸法罔效者宜西聖復煎丸主之若結毒攻於口鼻者宜五寳散主之年久臭爛鼻破損壊者宜服結毒紫金丹若入巔頂頭痛如破者内服天麻餅子鼻吸碧雲散若鼻塞不通宜吹通鼻散甚效毒攻咽喉腐爛臭蝕者宜服硫黄不二散兼吹結毒靈藥兑人中白若結毒筋骨疼痛朝輕夜重喜熱手按揉者係犯寒凉宜鉛回散主之結毒臭爛不斂宜貼解毒紫金膏兼撒結毒靈藥壯實者以解毒為主虚弱者以兼補為法以上之證各随次第如法調治重者一年輕者半年自然可痊永無後患慎勿妄求速效以自貽誤也捜風解毒湯土茯苓一兩白鮮皮金銀花薏苡仁防風木通木𤓰各五分皂角子四分水二鍾煎一鍾服之一日三服氣虚加人參七分血虚加當歸七分忌清茶牛羊雞鵝魚肉燒酒房慾等件方歌捜風解毒湯倒發初腫拘急骨痛加土苓白鮮銀花薏皂角防風通木𤓰化毒散生大黄一兩穿山甲炙當歸尾各五錢白殭蠶三錢炒蜈蚣一條炙黄共研末每服二錢温酒調下一日二服方歌化毒散醫結毒盛破穢氣實筋骨疼大黄山甲殭歸尾蜈蚣研末酒調成豬􅏬子湯豬􅏬子一兩切碎黄耆鹽水炒金銀花各三錢當歸白芍各一錢五分酒炒天花粉貝母去心研穿山甲炙研白鮮皮青風藤白芷木𤓰皂刺甘草節各一錢黄栝蔞一箇研爛連仁防己七分鼈虱胡麻二錢炒研白色土茯苓四兩河水四大盌煎湯三盌去滓將羣藥入湯内煎一大盌通口服胃弱者分為二服日三服方歌豬􅏬湯治結毒虚歸芍天花蔞貝耆胡麻銀甲鮮藤芷木𤓰已刺草苓宜西聖復煎丸乳香没藥孩兒茶丁香各一兩血竭阿魏白花蛇各四錢飛羅麵一觔黃色炒焦共研細煉蜜六兩煎滾香油四兩大棗肉二十枚搗膏共和為丸如彈子大每服一丸土茯苓二兩水二鍾煎至一鍾將藥丸入内再煎至半鍾澄去渣温服方歌西聖復煎丸結毒腫塊經年服自無乳没兒茶丁血竭阿魏白蛇麵炒胡結毒紫金丹龜板放炭火上炙焦用白酒漿塗之再炙以焦黄為度研末二兩硃砂六錢石决明六錢童用九孔大者煅紅便淬一次各研極細末共和匀爛米飯為丸麻子大每服一錢量病上下食前後服之筋骨疼痛酒下腐爛者土茯苓湯下方歌結毒紫金丹龜板石决硃砂米飯丸年久毒攻鼻損破土苓湯服臭爛痊天麻餅子天麻薄荷甘松白附子去皮白芷蒼术米泔水浸炒川芎川烏湯泡去皮草烏湯泡去皮防風細辛甘草各一錢生雄黄全蠍各三錢右為細末寒食麵打糊為丸如豌豆大捻作餅子每服二三十餅蔥白煎湯送下方歌天麻餅子薄甘松雄黄白附芷蒼芎川草烏蠍防細草結毒攻巔頭痛平通鼻散壺盧殻燒灰石鍾乳膽礬冰片各等分共為末吹入鼻内出黄水日吹二三次三二日即通方歌通鼻散吹結毒證毒塞鼻中息不通石鍾乳與胡盧殻膽礬冰片等分同硫黄不二散硫黄一錢靛花一分共研細用凉水一酒鍾調服方歌硫黄不二毒攻喉腐臭爛蝕痛不休凉水調服疼立止靛花少兑不須憂結毒靈藥水銀一兩硃砂硫黄雄黄各三錢共研細入陽城礶内泥固鐵盞梁兜固𦂳封口其火候俱按紅升丹之煉法火畢次日取出盞底靈藥約有一兩五六錢治尋常腐爛之證靈藥五錢輕粉五錢同研細小礶盛收以紗封之臨用時甘草湯洗淨患處將礶倒懸紗眼内篩藥患上油紙蓋之男婦咽喉爛者靈藥一錢加人中白二分研細吹之日用三次方歌結毒靈藥化腐方水銀硃砂硫雄黄共研入罐用泥固兜𦂳火昇三炷香鉛回散黑鉛半觔銅杓化開傾入水中取起再化再傾以鉛化盡為度澄去水將鉛灰傾在三重紙上下用灰收乾水氣鉛灰日中曬乾硫黄各等分共研細每服一錢温酒調服至重者不過三次即效方歌鉛回散療筋骨痛寒觸結毒夜間重鉛化成灰兑硫黄每服五錢酒調送五寳散方見下部疳瘡碧雲散方見頭部頭風傷目結毒紫金膏方見脛部臁瘡赤白遊風赤白遊風如粟形浮腫焮熱癢兼疼表虚風襲怫鬱久血赤氣白熱化成註此證發於肌膚遊走無定起如雲片浮腫焮熱痛癢相兼高纍如粟由脾肺燥熱而兼表虛腠理不密風邪襲入怫鬱日久與熱相搏則化熱益盛而成滯於血分者則發赤色滯在氣分者則發白色故名赤白逰風也初俱宜荆防敗毒散疎解之赤者次服四物消風飲白者次服補中益氣湯加防風蟬蜕殭蠶生何首烏治之初俱用牛肉片貼之豬羊俱可逰走太速者砭之定停者以真君妙貼散鷄子清調敷其看順逆之法與丹毒門叅考忌魚腥鷄鵝動風燥血之物犯則難愈四物消風飲生地三錢當歸二錢荆芥防風各一錢五分赤芍川芎白鮮皮蟬蜕薄荷各一錢獨活柴胡各七分紅棗肉二枚水二鍾煎八分去渣服方歌四物消風飲調榮血滋風减赤色平荆防鮮蟬兼獨活柴薄紅棗水煎濃荆防敗毒散見項部腦疽補中益氣湯見潰瘍門真君妙貼散見腫瘍門紫白癜風紫白癜風無癢痛白因氣滯紫血凝熱體風侵濕相搏毛竅閉塞發斑形註此證俗名汗斑有紫白二種紫因血滯白因氣滯總由熱體風邪濕氣侵入毛孔與氣血凝滯毛竅閉塞而成多生靣項癍㸃逰走延蔓成片初無痛癢久之微癢初起宜萬靈丹汗之次以胡麻丸常服外用蜜陀僧散擦患處令汗出風濕自解古今治法雖多取效甚少得此證者當忌魚腥煎炒火酒動風發物胡麻丸大胡麻四兩苦參防風石菖蒲威靈仙各二兩白附子獨活各一兩甘草五錢生右為細末白酒漿和丸如菉豆大每服二錢形痩者一錢五分食後臨臥白滾水送下方歌胡麻丸治紫白癜除去風濕不致延苦參白附防風草菖蒲獨活威靈仙蜜陀僧散雄黄硫黄蛇床子各二錢􅁡陀僧石黄各一錢輕粉五分共研末醋調搽患上方歌蜜陀僧散風濕患入腠成癜紫白斑雄硫輕粉蛇床子石黄共末醋搽痊萬靈丹見腫瘍門白駁風白駁風生面頸間風邪相搏白㸃癍甚延徧身無痛癢治宜消風塗脂痊註此證自靣及頸項肉色忽然變白狀類癍㸃並不癢痛由風邪相搏於皮膚致令氣血失和施治宜早若因循日久甚者延及徧身初服浮萍丸次服蒼耳膏外以穿山甲片先刮患處至燥痛取鰻鱺魚脂日三塗之一方取樹孔中水温洗之洗後搗桂心牡蠣等分為末面油調塗日三夜一俱效浮萍丸紫背浮萍取大者洗淨曬乾研細末煉蜜為丸如彈子大每服一丸豆淋酒送下豆淋酒法黑豆半升炒烟起冲入醇酒三觔浸一日夜去豆用酒送藥方歌浮萍丸治白駁應曬乾紫背大浮萍蜜丸彈狀豆酒服專能發表散邪風蒼耳膏蒼耳鮮者連根帶葉取五七十觔洗淨切碎入大鍋内煮爛取汁絹濾過再熬成膏磁罐盛之用時以桑木匙挑一匙噙口内用黄酒送下服後有風處必出小瘡如豆粒大此風毒出也刺破出汁盡即愈忌豬肉方歌蒼耳風邪侵皮膚氣血失和白駁生連根帶葉鮮蒼耳洗淨熬膏酒服靈癧瘍風癧瘍風從皮膚生頸項胸腋無癢疼紫白㸃㸃不開大皮膚風邪熱結成註此證發於皮膚多生頸項胸腋其色紫白㸃㸃相連亦無癢疼較白駁形圓不延蔓開大由風邪鬱熱皮膚居久不散而成斯疾宜服烏蛇散外用羊蹄草根共硫黄蘸醋於綉鐵片上研濃汁日塗二三次效烏蛇散烏蛇三兩酒浸羌活防風黄芩苦參各二兩人參沙參丹參元參梔子仁生桂心秦艽木通犀角屑白蒺藜升麻枳殻麩炒白鮮皮川芎各一兩共研細未每服二錢食逺温酒調服忌雞豬魚蒜麵食熱物之類方歌烏蛇癧瘍風熱滛羌活防風芎五參梔桂秦艽通犀角蒺藜升枳白鮮芩丹毒丹毒名多雲片形風火濕寒肉分凝胸腹四肢分順逆清火消風砭敷靈註孫真人云丹毒一名天火肉中忽有赤色如丹塗之狀其大如掌甚者徧身有癢有痛而無定處丹名雖多其理則一也形如鷄冠名鷄冠丹若皮澀起如麻豆粒者名茱萸丹亦有水丹徧身起皰遇水濕搏之透露黄色恍如有水在皮中此雖小疾能令人死須當速治不可忽也色赤者諸書謂之赤逰丹色白者為水丹小兒多生之但有乾濕癢痛之殊有夾濕夾風夾寒之别諸丹總屬心火三焦風邪而成如色赤而乾發熱作癢形如雲片者即名赤逰丹屬血分有火而受風也毒盛者服藍葉散毒輕者宜導赤湯加薄荷葉獨活服之如初起白癍漸透黄色光亮脹墜破流黄水濕爛多痛者名水丹又名風丹多生腿膝屬脾肺有熱而夾濕也宜防己散主之亦有起白癍無熱無痛逰走不定者由火毒未發肌膚外受寒鬱名為冷瘼宜服烏藥順氣散外用薑擦凡丹形初見即用牛羊精肉片貼之甚則用砭法令出紫血色重不散者以柏葉散敷之又方芸薹葉研末靛青調敷甚效諸丹本於火邪其勢暴速自胸腹走於四肢者順從四肢攻於胸腹者逆藍葉散藍葉曬乾川芎赤芍知母生地白芷川升麻柴胡葛根杏仁炒去皮尖甘草各一錢生石膏五分煅共搗粗末每用八錢新汲水二鍾煎八分去渣服熱甚加黄芩元參方歌藍葉散却赤逰丹皆因血熱風邪纒芎芍知膏生地芷升麻柴葛杏梔甘防己散防己三兩朴消一兩犀角鎊川芎黄芩黄耆川升麻各一錢共搗粗末每用五錢加竹葉三十片新汲水二鍾煎八分服方歌防己丹毒始白癍漸黄亮痛濕熱原朴消犀角芎芩共耆與升麻竹葉煎烏藥順氣散烏藥橘紅各二錢枳殻麩炒白芷桔梗防風殭蠶炒獨活川芎各一錢甘草五分生水二鍾生薑三片煎八分服方歌烏藥順氣枳橘紅芷桔風殭獨草芎冷瘼逰行無熱痛因毒未發受寒風導赤湯見口部口縻柏葉散見腰部纒腰火丹粟瘡作癢粟瘡癢證屬火生風邪乗皮起粟形風為火化能作癢通聖苦參及消風註凡諸瘡作癢皆屬心火火邪内鬱表虚之人感受風邪襲入皮膚風遇火化作癢致起瘡瘍形如粟粒其色紅搔之愈癢乆而不瘥亦能消耗血液膚如蛇皮初服防風通聖散加枳殻蟬蜕血燥遇晚癢甚夜不寐者宜服消風散外敷二味㧞毒散若年深日乆膚如蛇皮者宜常服皂角苦參丸外用豬脂油二兩苦杏仁一兩搗泥抹之自效皂角苦參丸苦參一觔荆芥十二兩白芷大風子肉防風各六兩大皂角川芎當歸何首烏生大胡麻枸把子牛蒡子炒威靈仙全蠍白附子蒺藜炒去刺獨活川牛膝各五兩草烏湯泡去皮蒼术米泔水浸炒連翹去心天麻蔓荆子羌活青風藤甘草杜仲各三兩酥炙白花蛇切片酥油炙黄縮砂仁各二兩炒人參一兩共研細末醋打老米糊為丸如梧桐子大每服三四十丸温酒食前後任下避風忌口為要方歌皂角苦參粟瘡癢久似蛇皮膚難當芎歸何首胡麻芷大風枸把草烏蒼翹蒡威靈蠍白附蒺藜天麻獨蔓羌白蛇風藤甘杜仲人參牛膝縮荆防防風通聖散見頭部秃瘡消風散見項部鈕扣風二味拔毒散見腫瘍門枯筋箭枯筋箭由肝失榮筋氣外發赤豆形破突筋頭如花蕋或繫或灸便成功註此證一名肬子由肝失血養以致筋氣外發初起如赤豆枯則微槁日久破裂鑽出筋頭鬔鬆枯槁如花之蕋多生於手足胸乳之間根蒂細小者宜用藥線齊根繫𦂳七日後其患自落以月白珍珠散摻之其疤收斂根大頂小者用銅錢一文套肬子上以草紙穰代艾連灸三壯其患枯落肬形若大用草紙蘸濕套在肬上灸之藥線見臀部痔瘡月白珍珠散見潰瘍門御纂醫宗金鑑卷七十三
