三寸禾髎水溝旁五分迎香禾髎上一寸大腸經穴自分明註商陽穴在手食指内側端後去爪甲角如韭葉許是其穴也從商陽穴循食指上廉本節前内側陷中二間穴也從二間穴循食指本節後内側陷中三間穴也從三間穴循行手大指次指岐骨間陷中合谷穴也從合谷穴循行手腕中上側兩筋間陷中張大指次指取之陽谿穴也從陽谿穴上行手腕後上側三寸偏歴穴也從偏歴穴上行三寸温溜穴也從温溜穴上行二寸五分輔鋭肉分下廉穴也從下廉穴上行一寸上廉穴也從上廉穴上行一寸鋭肉之端按之肉起手三里穴也從手三里穴上二寸以手拱胸屈肘横紋頭陷中取之曲池穴也從曲池穴上行大骨外廉陷中肘髎穴也從肘髎穴循行肘上三寸向裏大衇中央五里穴也從五里穴上行四寸兩筋兩骨罅宛宛陷中伸臂平手取之臂臑穴也從臂臑穴上行髆骨頭肩端上兩骨罅陷處宛宛中舉臂取之有空肩髃穴也從肩髃穴上行臂端兩叉骨間陷中巨骨穴也從巨骨穴循頸缺盆上直行扶突下一寸天鼎穴也從天鼎穴上直行曲頰下一寸人迎後一寸五分仰而取之扶突穴也從扶突穴貫頰直鼻孔下水溝旁五分禾髎穴也從禾髎穴上一寸鼻孔旁五分迎香穴也胃府經文經云脾胃者倉廩之官五味出焉又云胃者水穀氣血之海也又云胃大一尺五寸徑五寸長二尺六寸横屈受水穀三斗五升其中之穀常留二斗水一斗五升而滿又云是經多氣少血難經曰胃重二觔一兩張介賔曰胃之上口名曰賁門飲食之精氣從此上輸於脾肺宣布於諸衇胃之下口即小腸上口名曰幽門胃經循行經文胃足陽明之衇起於鼻之交頞中旁約太陽之衇下循鼻外入上齒中還出俠口環脣下交承漿却循頥後下廉出大迎循頰車上耳前過客主人循髮際至額顱其支者從大迎前下人迎循喉嚨入缺盆下膈屬胃絡脾其直者從缺盆下乳内廉下挾臍入氣街中其支者起於胃下口循腹裏下至氣街中而合以下髀闗抵伏下膝臏中下循脛外廉下足跗入中指外間其支者下廉穴三寸而别入中指外間其支者别跗上入大指間出其端胃經循行歌胃足陽明交鼻起下循鼻外入上齒還出俠口繞承漿頤後大迎頰車裏耳前髮際至額顱支下人迎缺盆底下膈入胃絡脾宫直者缺盆下乳内一支幽門循腹中下行直合氣街逢遂由髀闗抵膝臏胻跗足指内間同一支下膝注三里前出中指外間通一支别走足跗指大指之端經盡已註足陽明胃經之衇起於鼻者是謂由迎香穴上交頰中兩旁約過足太陽衇之睛明穴分下循鼻外始交於足陽眀之承泣四白巨髎穴也從巨髎入上齒中還出俠口之地倉穴還繞脣下交㑹任衇之承漿穴却循頤後下廉復交本經之大迎穴由大迎出循頰車穴上行耳前過客主人穴合少陽經循髮際至額顱兩旁之懸顱穴頷厭穴復交足陽明之頭維穴下闗穴其支者行大迎穴從大迎前循入迎水突穴氣舍穴循喉嚨入缺盆穴下膈屬胃絡脾散布藏府其直者從缺盆穴直行氣户庫房屋翳膺窻乳中乳根等穴下乳内廉不容穴也從不容循承滿梁門闗門太乙滑肉門等穴下俠臍天樞穴也從天樞外陵大巨水道歸來等穴入氣街中氣衝穴也其支者起於胃口是謂前之屬胃絡脾之支下循腹裏下至氣街中而合氣街穴㑹衝衇上行者也其下行本經者髀闗穴也抵伏至伏穴下從伏行隂市穴梁邱穴下膝臏中犢鼻穴循足三里上巨虚條口下巨虚等穴下循脛外廉豐隆穴也從豐隆循解谿穴下足跗衝陽穴也從衝陽行陷谷穴内庭穴入次指外間也其本支别支一自下巨虚穴下入次指外間一别循跗上入大指次指間厲兑穴出其端交於足太隂脾經也按足陽明是足大指之次指不是中指必傳冩之誤胃經穴歌四十五穴足陽明承泣四白巨髎經地倉大迎登頰車下闗頭維對人迎水突氣舍連缺盆氣户庫房屋翳尋膺窻乳中下乳根不容承滿出梁門闗門太乙滑肉起天樞外陵大巨裏水道歸來逹氣街髀闗伏走隂市梁邱犢鼻足三里上巨虚連條口底下巨虚下有豐隆解谿衝陽陷谷同内庭厲兑陽明穴大指次指之端終胃經分寸歌胃之經兮足陽明承泣目下七分尋再下三分名四白巨髎鼻孔旁八分地倉俠吻四分近大迎頷下寸三中頰車耳下八分陷下闗耳前動衇行頭維神庭旁四五人迎喉旁寸五真水突筋前人迎下氣舍喉下一寸乘缺盆舍下橫骨陷氣户下行一寸明庫房下行一寸六屋翳膺窻乳中根不容巨闕旁二寸一寸承滿與梁門闗門太乙滑肉門天樞臍旁二寸尋樞下一寸外陵穴陵下一寸大巨陳巨下三寸水道穴水下二寸歸來存氣街歸來下一寸共去中行二寸匀髀闗膝上尺二許伏髀下六寸是隂市伏下三寸梁邱市下一寸記犢鼻膝臏陷中取膝眼三寸下三里里下三寸上廉穴廉下二寸條口舉再下二寸下廉穴復上外踝上八寸却是豐隆穴當記解谿則從豐隆下内循足腕上陷中衝陽解下髙骨動陷谷衝下二寸名内庭次指外岐骨厲兑大次指端中註承泣穴在目下七分目下胞陷中上直瞳子正視取之是其穴也從承泣直下三分顴空骨内亦直瞳子取之四白穴也從四白下行俠鼻孔旁八分亦直瞳子取之巨髎穴也從巨髎下行俠口吻旁四分外許近下微有動衇地倉穴也從地倉行顋頷下前一寸三分骨陷中動衇大迎穴也從大迎行耳下曲頰端近前八分陷中側臥開口取之頰車穴也從頰車上行耳前動衇側臥合口有空取之下闗穴也從下闗上行額角入髮際以督衇中行神庭穴旁開四寸半頭維穴也從頭維下行頸下俠結喉旁一寸五兮大動衇應手伸頭取之人迎穴也從人迎下直行頸大筋前内貼氣喉水突穴也從水突下直行頸大筋前結喉下一寸許陷中貼骨尖上有缺處氣舍穴也從氣舍下行肩上横骨陷中缺盆穴也從缺盆下行巨骨下一寸旁開中行四寸陷中仰而取之氣户穴也從氣户下行一寸六分亦旁開中行四寸陷中仰而取之庫房穴也從庫房下行一寸六分亦旁開中行四寸陷中仰而取之屋翳穴也從屋翳下行一寸六分亦旁開中行四寸陷中仰而取之膺窻穴也從膺窻下行當乳頭之中乳中穴也從乳中下行一寸六分亦旁開中行四寸陷中仰而取之乳根穴也從乳根行在第四肋端旁開中行二寸不容穴也從不容穴下一寸亦旁開中行二寸承滿穴也從承滿下一寸亦旁開中行二寸梁門穴也從梁門下一寸亦旁開中行二寸闗門穴也從闗門下一寸亦旁開中行二寸太乙穴也從太乙下一寸亦旁開中行二寸滑肉門穴也從滑肉門下一寸俠臍旁二寸許陷中天樞穴也從天樞下一寸亦旁開中行二寸外陵穴也從外陵下一寸亦旁開中行二寸大巨穴也從大巨下三寸亦旁開中行二寸即水道穴也從水道下二寸亦旁開中行二寸即歸來穴也從歸來下行在腿班中有肉核名曰鼠谿直上一寸動衇應手亦旁開中行二寸氣街穴也從氣街下行膝上一尺二寸許中行左右各三指按捺上有肉起如伏之狀故名伏在此肉起後交紋中髀闗穴也從髀闗下行膝上六寸起肉間正跪坐而取之伏穴也從伏下行三寸在伏兔之下陷中拜揖而取之隂市穴也從隂市下行一寸兩筋間梁邱穴也從梁邱下行過膝葢骨下胻骨上陷中俗名膝眼此處陷中兩旁有空狀如牛鼻在外側者犢鼻穴也從犢鼻下行䯒骨外側大筋内宛宛中足三里穴也犢鼻即膝眼處也從足三里下行三寸兩筋骨陷中舉足取之上巨虚穴也從上巨虚下行二寸舉足取之條口穴也從條口下行一寸兩筋骨陷中蹲地舉足取之下巨虚穴也從下巨虚復斜向後上行在足外踝上八寸䯒骨外廉陷中豐隆穴也從豐隆内循下足腕上中行陷中解谿穴也從解谿下行足跗上即脚面也髙骨間動衇衝陽穴也從衝陽下行二寸至足大指之次指本節後陷中陷谷穴也從陷谷下至足大指之次指本節前岐骨外間陷中内庭穴也從内庭下行足大指之次指之端去爪角如韭葉許厲兑穴也脾藏經文經云脾胃者倉廪之官五味出焉又云諫議之官知周出焉又云形如刀鐮與胃同膜而附其上之左俞當十一椎下聞聲則動動則磨胃而主運化其合肉也其榮脣也開竅於口又云是經常多氣少血難經曰脾重二觔三兩廣扁三寸長五寸有散膏半觔主裹血温五藏主藏意與智中藏經曰脾主消磨五穀養於四旁脾經循行經文脾足太隂之衇起於大指之端循指内側白肉際過核骨後上内踝前廉上腨内循脛骨後交出厥隂之前上膝股内前廉入腹屬脾絡胃上膈挾咽連舌本散舌下其支者復從胃别上膈注心中脾經循行歌太隂脾起足大指上循内側白肉際核骨之後内踝前上腨循胻經膝裏股内前廉入腹中屬脾絡胃與膈通俠喉連舌散舌下支絡從胃注心中註足太隂脾經之衇起於足大指之端隠白穴也從隠白循指内側白肉際大都穴也從大都過核骨後太白穴也從太白循公孫穴商邱穴上内踝前廉三隂交穴也從三隂交上腨内循脛骨後漏谷穴也從漏谷交出厥隂之前地機穴隂陵泉穴也從隂陵泉上膝股内前廉血海穴箕門穴沖門穴也從沖門入腹屬脾絡胃循行府舎腹結大横腹哀食竇天谿胸鄉周榮大包等穴而上行咽喉俠咽連舌本散舌下也其支者從胃之絡别行上膈注心中以交於手少隂心經也脾經穴歌足太隂脾由足拇隠白先從内側起大都太白繼公孫商邱直上三隂塢漏谷地機隂陵泉血海箕門衝門前府舍腹結大横上腹哀食竇天谿連胸鄉周榮大包盡二十一穴太隂全脾經分寸歌大指端内側隠白節後陷中求大都大白内側核骨下節後一寸公孫呼商邱内踝微前陷踝上三寸三隂交再上三寸漏谷是踝上五寸地機朝膝下内側隂陵泉血海膝臏上内廉箕門穴在魚腹上動衇應手越筋間衝門横骨兩端動府舎上行七分看腹結上行三寸入大横上行一寸三腹哀上行三寸半食竇上行三寸間天谿上行一寸六胸鄉周榮亦同然外斜腋下六寸許大包九肋季脇端註隠白穴在足大指内側端後去爪甲角如韭葉許是其穴也從隠白行足大指内側次節末骨縫赤白肉際陷中大都穴也從大都行足大指後内側内踝前核骨下赤白肉際陷中太白穴也從太白上行足大指本節後一寸内踝前陷中公孫穴也從公孫上行内踝下微前陷中商邱穴也從商邱上行内踝踝尖上三寸夾骨陷中三隂交穴也從三隂交上行三寸夾骨陷中漏谷穴也從漏谷上行五寸在膝下五寸内側夾骨陷中伸足取之地機穴也從地機上行膝下内側曲膝横紋頭陷中隂陵泉穴也從隂陵泉上行在膝臏上一寸内廉白肉際陷中血海穴也從血海上行在魚腹上越兩筋間隂股内廉動衇應手不禁重按箕門穴也從箕門上行横骨兩端約紋中動衇去腹中行旁開三寸半衝門穴也從衝門上行七分去腹中行亦旁開三寸半府舎穴也從府舎上行三寸去腹中行亦旁開三寸半腹結穴也從腹結上行一寸三分去腹中行亦旁開三寸半大横穴也從大横上行三寸半去腹中行亦旁開三寸半腹哀穴也從腹哀上行三寸或從乳上三肋間動衇應手處往下六寸四分去胸中行旁開六寸舉臂取之食竇穴也從食竇上行一寸六分去胸中行旁開六寸仰而取之天谿穴也從天谿上行一寸六分去胸中行亦旁開六寸仰而取之胸鄉穴也從胸鄉上行一寸六分去胸中行亦旁開六寸仰而取之周榮穴也從周榮外斜下行過少陽膽經淵液穴下三寸至液下六寸許九肋間季脇端大包穴也御纂醫宗金鑑卷八十一
