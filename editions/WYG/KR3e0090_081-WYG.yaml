body:
  text: 編輯刺灸心法要訣目録手太隂肺藏圖肺藏經文肺經循行圖肺經循行經文肺經循行歌肺經穴圖肺經穴歌肺經分寸歌手陽明大腸府圖大腸經文大腸經循行圖大腸經循行經文大腸經循行歌大腸經穴圖大腸經穴歌大腸經分寸歌足陽明胃府圖胃府經文胃經循行圖胃經循行經文胃經循行歌胃經穴圖胃經穴歌胃經分寸歌足太隂脾藏圖脾藏經文脾經循行圖脾經循行經文脾經循行歌脾經穴圖脾經穴歌脾經分寸歌御纂醫宗金鑑卷八十一目録欽定四庫全書御纂醫宗金鑑卷八十一編輯刺灸心法要訣目録手太隂肺藏圖肺藏經文肺經循行圖肺經循行經文肺經循行歌肺經穴圖肺經穴歌肺經分寸歌手陽明大腸府圖大腸經文大腸經循行圖大腸經循行經文大腸經循行歌大腸經穴圖大腸經穴歌大腸經分寸歌足陽明胃府圖胃府經文胃經循行圖胃經循行經文胃經循行歌胃經穴圖胃經穴歌胃經分寸歌足太隂脾藏圖脾藏經文脾經循行圖脾經循行經文脾經循行歌脾經穴圖脾經穴歌脾經分寸歌御纂醫宗金鑑卷八十一目録欽定四庫全書御纂醫宗金鑑卷八十一編輯刺灸心法要訣肺臟經文經曰肺者相傳之官治節出焉其形四垂附著於脊之第三椎中有二十四空行列分布以行諸藏之氣為藏之長為心之葢又云是經常多氣少血難經曰肺重三觔三兩六葉兩耳凡八葉主藏魄中藏經曰肺者生氣之原乃五藏之華葢張介賔曰肺葉白瑩謂為華葢以覆諸藏虚如蜂窠下無透竅吸之則滿呼之則虚一呼一吸消息自然司清濁之運化為人身之槖籥肺經循行經文肺手太隂之衇起於中焦下絡大腸還循胃口上膈屬肺從肺系横出腋下下循臑内行少隂心主之前下肘中循臂内上骨下廉入寸口上魚循魚際出大指之端其支者從腕後直出次指内廉出其端肺經循行歌手太隂肺中焦生絡腸循胃散流行上膈屬肺從肺系横出腋下臑肘中循臂寸口上魚際大指内側爪端通支絡還從腕後出接次指屬陽明經註手太隂肺經之衇起於中焦者言起於任衇中腕穴也下絡大腸還循胃口者謂本經之絡散布流行下則絡於大腸還上而循胃口非上膈屬肺直行之經也夫經絡流行循還無端故手太隂之衇必自足厥隂經之支者期門穴循行中脘穴上膈屬肺以交於手太隂肺經也從肺系横出腋下至於中府雲門穴下循於臑内天府俠白穴從俠白行少隂心主經衇之前下行肘中尺澤穴從尺澤循臂内上骨下廉孔最穴從孔最入寸口列缺經渠太淵穴從大淵上魚句入魚際穴從魚際出大指之端少商穴而終焉其支者從腕後直出循行次指内廉出其端以交於手陽明大腸經也肺經穴歌手太隂肺十一穴中府雲門天府列次則俠白下尺澤又次孔最與列缺經渠太淵下魚際抵指少商如韭葉肺經分寸歌太隂中府三肋間上行雲門寸六許雲在任璣旁六寸大腸巨骨下二骨天府腋三動衇求俠白肘上五寸主尺澤肘中約紋是孔最腕上七寸擬列缺腕上一寸半經渠寸口陷中取大淵掌後横紋頭魚際節後散衇裏少商大指端内側鼻衂刺之立時止註中府在任衇中行華葢穴旁直開去六寸乳上三肋間陷中動衇應手仰而取之是其穴也上直行一寸六分在手陽明大腸經巨骨之下陷中動衇應手舉臂取之雲門穴也從雲門穴下循臑内腋下三寸動衇陷中以鼻尖㸃墨取之天府穴也從天府穴下行肘中約紋上去五寸動衇中俠白穴也從俠白穴下行肘中約紋上屈肘横紋筋骨罅中動衇應手尺澤穴也從尺澤穴下行腕前約紋上七寸上骨下骨閒陷中孔最穴也從孔最穴循外側行腕後側上一寸五分以兩手交叉當食指末筋骨罅中列缺穴也從列缺穴循行寸口陷中經渠穴也從經渠穴内循手掌後陷中太淵穴也從太淵穴上魚手大指本節後内側陷中散衇中白肉際魚際穴也從魚際穴循行手大指内側之端去爪甲角如韭葉許白肉際少商穴也大腸經文經云大腸者𫝊道之官變化出焉又云迴腸當臍左迴十六曲大四寸徑一寸寸之少半長二丈一尺受穀一斗水七升半又云廣腸附脊以受迴腸乃出滓穢之路大八寸徑二寸寸之大半長二尺八寸受穀九升三合八分合之一是經多氣少血難經曰大腸重二觔十二兩肛門重十二兩張介賔曰按迴腸者以其迴叠也廣腸者即迴腸之更大者直腸者又廣腸之末節下連肛門也大腸經循行經文大腸手陽明之衇起於大指次指之端循指上廉出合谷兩骨之間上入兩筋之中循臂上廉入肘外廉上臑外前廉上肩出髃骨之前廉上出於拄骨之上㑹下入缺盆絡肺下膈屬大腸其支者從缺盆上頸貫頰入下齒中還出挾口交人中左之右右之左上挾鼻孔大腸經循行歌陽明之衇手大腸次指内側起商陽循指上廉出合谷岐骨兩筋循臂肪入肘外廉循臑外肩端前廉拄骨旁從肩下入缺盆内絡肺下膈屬大腸支從缺盆直上頸斜貫頰前下齒當環出人中交左右上俠鼻孔注迎香註手陽明大腸經之衇起於大指次指内廉之端出於大指者謂出於大指少商穴也本經之絡其支者直出於次指之端以交於手陽明大腸經之商陽穴故曰起於大指次指之端也從商陽穴循食指上廉二間三間穴也從三間穴循出兩骨之間合谷穴也從合谷上兩筋之間陽谿穴也從陽谿穴循臂上廉至偏歴温溜下廉上廉三里穴也從三里穴入肘外廉曲池穴也從曲池穴上臑外前廉肘髎五里臂臑穴也從臂臑穴上肩肩髃穴也從肩髃穴出髃骨之前廉巨骨穴也從巨骨穴上出於拄骨之㑹上言㑹於督衇之大椎穴也自督衇大椎穴入交足陽明胃經之缺盆穴絡肺下膈屬大腸者謂其支從缺盆上頸復循本經之天鼎穴貫頰至扶突穴也從扶突穴入下齒中禾髎穴從禾髎穴還出挾口交人中左之右右之左上挾鼻孔迎香穴而終以交於足陽明胃經也大腸經穴歌手陽明穴起商陽二閒三間合谷藏陽谿偏歴歴温溜下廉上廉三里長曲池肘髎迎五里臂臑肩髎巨骨起天鼎扶突接禾髎終以迎香二十止大腸經分寸歌商陽食指内側邊二間來尋本節前三間節後陷中取合谷虎口岐骨間陽谿上側腕中是偏歴腕後三寸安温溜腕後去五寸池前五寸下廉看池前三寸上廉中池前二寸三里逢曲池曲肘紋頭盡肘髎上臑外廉近大筋中央尋五里肘上三寸行向裏臂臑肘上七寸量肩髃肩端舉臂取巨骨肩尖端上行天鼎喉旁四寸真扶空天突旁三寸禾髎水溝旁五分迎香禾髎上一寸大腸經穴自分明註商陽穴在手食指内側端後去爪甲角如韭葉許是其穴也從商陽穴循食指上廉本節前内側陷中二間穴也從二間穴循食指本節後内側陷中三間穴也從三間穴循行手大指次指岐骨間陷中合谷穴也從合谷穴循行手腕中上側兩筋間陷中張大指次指取之陽谿穴也從陽谿穴上行手腕後上側三寸偏歴穴也從偏歴穴上行三寸温溜穴也從温溜穴上行二寸五分輔鋭肉分下廉穴也從下廉穴上行一寸上廉穴也從上廉穴上行一寸鋭肉之端按之肉起手三里穴也從手三里穴上二寸以手拱胸屈肘横紋頭陷中取之曲池穴也從曲池穴上行大骨外廉陷中肘髎穴也從肘髎穴循行肘上三寸向裏大衇中央五里穴也從五里穴上行四寸兩筋兩骨罅宛宛陷中伸臂平手取之臂臑穴也從臂臑穴上行髆骨頭肩端上兩骨罅陷處宛宛中舉臂取之有空肩髃穴也從肩髃穴上行臂端兩叉骨間陷中巨骨穴也從巨骨穴循頸缺盆上直行扶突下一寸天鼎穴也從天鼎穴上直行曲頰下一寸人迎後一寸五分仰而取之扶突穴也從扶突穴貫頰直鼻孔下水溝旁五分禾髎穴也從禾髎穴上一寸鼻孔旁五分迎香穴也胃府經文經云脾胃者倉廩之官五味出焉又云胃者水穀氣血之海也又云胃大一尺五寸徑五寸長二尺六寸横屈受水穀三斗五升其中之穀常留二斗水一斗五升而滿又云是經多氣少血難經曰胃重二觔一兩張介賔曰胃之上口名曰賁門飲食之精氣從此上輸於脾肺宣布於諸衇胃之下口即小腸上口名曰幽門胃經循行經文胃足陽明之衇起於鼻之交頞中旁約太陽之衇下循鼻外入上齒中還出俠口環脣下交承漿却循頥後下廉出大迎循頰車上耳前過客主人循髮際至額顱其支者從大迎前下人迎循喉嚨入缺盆下膈屬胃絡脾其直者從缺盆下乳内廉下挾臍入氣街中其支者起於胃下口循腹裏下至氣街中而合以下髀闗抵伏下膝臏中下循脛外廉下足跗入中指外間其支者下廉穴三寸而别入中指外間其支者别跗上入大指間出其端胃經循行歌胃足陽明交鼻起下循鼻外入上齒還出俠口繞承漿頤後大迎頰車裏耳前髮際至額顱支下人迎缺盆底下膈入胃絡脾宫直者缺盆下乳内一支幽門循腹中下行直合氣街逢遂由髀闗抵膝臏胻跗足指内間同一支下膝注三里前出中指外間通一支别走足跗指大指之端經盡已註足陽明胃經之衇起於鼻者是謂由迎香穴上交頰中兩旁約過足太陽衇之睛明穴分下循鼻外始交於足陽眀之承泣四白巨髎穴也從巨髎入上齒中還出俠口之地倉穴還繞脣下交㑹任衇之承漿穴却循頤後下廉復交本經之大迎穴由大迎出循頰車穴上行耳前過客主人穴合少陽經循髮際至額顱兩旁之懸顱穴頷厭穴復交足陽明之頭維穴下闗穴其支者行大迎穴從大迎前循入迎水突穴氣舍穴循喉嚨入缺盆穴下膈屬胃絡脾散布藏府其直者從缺盆穴直行氣户庫房屋翳膺窻乳中乳根等穴下乳内廉不容穴也從不容循承滿梁門闗門太乙滑肉門等穴下俠臍天樞穴也從天樞外陵大巨水道歸來等穴入氣街中氣衝穴也其支者起於胃口是謂前之屬胃絡脾之支下循腹裏下至氣街中而合氣街穴㑹衝衇上行者也其下行本經者髀闗穴也抵伏至伏穴下從伏行隂市穴梁邱穴下膝臏中犢鼻穴循足三里上巨虚條口下巨虚等穴下循脛外廉豐隆穴也從豐隆循解谿穴下足跗衝陽穴也從衝陽行陷谷穴内庭穴入次指外間也其本支别支一自下巨虚穴下入次指外間一别循跗上入大指次指間厲兑穴出其端交於足太隂脾經也按足陽明是足大指之次指不是中指必傳冩之誤胃經穴歌四十五穴足陽明承泣四白巨髎經地倉大迎登頰車下闗頭維對人迎水突氣舍連缺盆氣户庫房屋翳尋膺窻乳中下乳根不容承滿出梁門闗門太乙滑肉起天樞外陵大巨裏水道歸來逹氣街髀闗伏走隂市梁邱犢鼻足三里上巨虚連條口底下巨虚下有豐隆解谿衝陽陷谷同内庭厲兑陽明穴大指次指之端終胃經分寸歌胃之經兮足陽明承泣目下七分尋再下三分名四白巨髎鼻孔旁八分地倉俠吻四分近大迎頷下寸三中頰車耳下八分陷下闗耳前動衇行頭維神庭旁四五人迎喉旁寸五真水突筋前人迎下氣舍喉下一寸乘缺盆舍下橫骨陷氣户下行一寸明庫房下行一寸六屋翳膺窻乳中根不容巨闕旁二寸一寸承滿與梁門闗門太乙滑肉門天樞臍旁二寸尋樞下一寸外陵穴陵下一寸大巨陳巨下三寸水道穴水下二寸歸來存氣街歸來下一寸共去中行二寸匀髀闗膝上尺二許伏髀下六寸是隂市伏下三寸梁邱市下一寸記犢鼻膝臏陷中取膝眼三寸下三里里下三寸上廉穴廉下二寸條口舉再下二寸下廉穴復上外踝上八寸却是豐隆穴當記解谿則從豐隆下内循足腕上陷中衝陽解下髙骨動陷谷衝下二寸名内庭次指外岐骨厲兑大次指端中註承泣穴在目下七分目下胞陷中上直瞳子正視取之是其穴也從承泣直下三分顴空骨内亦直瞳子取之四白穴也從四白下行俠