body:
  text: 訂正仲景全書傷寒論註陽明全篇目錄白虎加人參湯白虎湯小承氣湯麻仁丸調胃承氣湯大承氣湯蜜煎導方豬膽汁導方土瓜根導方豬苓湯麻黄連軺赤小豆湯茵蔯蒿湯梔子蘗皮湯御纂醫宗金鑑卷四目録欽定四庫全書御纂醫宗金鑑卷四訂正仲景全書傷寒論註陽明全篇目錄白虎加人參湯白虎湯小承氣湯麻仁丸調胃承氣湯大承氣湯蜜煎導方豬膽汁導方土瓜根導方豬苓湯麻黄連軺赤小豆湯茵蔯蒿湯梔子蘗皮湯御纂醫宗金鑑卷四目録欽定四庫全書御纂醫宗金鑑卷四訂正仲景全書傷寒論註辨陽明病衇證并治全篇陽明主裏内候胃中外候肌肉故有病經病府之分如論中身熱煩渴目痛鼻乾不得眠不惡寒反惡熱者此陽明經病也潮熱譫語手足腋下濈然汗出腹滿痛大便鞕者此陽明府病也而其候各有三經病則有邪已傳陽明而太陽之表未罷兼見頭痛惡寒無汗之太陽證者有太陽之邪已罷悉傳陽明但見壯熱有汗心煩不眠口渴引飲之陽明證者有陽明之邪未已復轉少陽兼見胸脇痛寒熱往來口苦而嘔目眩耳聾之少陽證者府病則有太陽陽明謂太陽病或發汗或吐或下或利小便亡其津液胃中乾燥太陽之邪乘胃燥而轉屬陽明致小便反數大便鞕者所為脾約是也有正陽陽明謂陽氣素盛或有宿食太陽之邪一傳陽明遂入胃府致大便不通者所為胃家實是也有少陽陽明謂病已到少陽法當和觧而反發汗利小便亡其津液胃中燥熱復轉屬陽明致大便結燥者所為大便難者是也其治陽明經病則以葛根湯或桂枝加葛根湯發之或以白虎湯清之或以柴胡白虎湯和之随其證而施之可也其治陽明府病雖均為可下然不無輕重之分故或以三承氣湯下之或麻仁丸通之或蜜煎膽汁導之量其病而治之可也此陽明病之大略也兹以在經在府二者詳疏於篇俾讀者易為分别則臨證施治自不紊矣陽明之為病胃家實是也註陽明經内以候胃外以候肌言陽明之為病由太陽之邪傳於其經則為陽明病外證由太陽之邪傳入胃府則為胃家實也集註方有執曰陽明經也胃府也實者大便結為鞕滿而不得出也雖則遲早不同而非日數所可拘也傷寒三日陽明衇大註傷寒一日太陽二日陽明三日少陽乃内經言傳經之次第非必以日數拘也此云三日陽明衇大者謂不兼太陽陽明之浮大亦不兼少陽陽明之弦大而正見正陽陽明之大衇也盖由去表傳裏邪熱入胃而成内實之診故其衇象有如此者集註方有執曰傷寒三日該中風而大約言也衇大者陽明氣血俱多也沈明宗曰此正陽明之正衇也仲景謂三日陽明衇大因陽明乃多氣多血之府風寒傳入邪盛於中故衇顯大是為陽明邪實之正衇但病陽明務具此衇方可下奪或兼太陽之浮緊少陽之弦細或遲疾滑濇虛弱乃屬氣血隂陽之虛雖見大實大滿亦當詳審顧慮或以小承氣湯試之或用蜜煎導法不得直施攻下也夲太陽初得病時發其汗汗先出不徹因轉屬陽明也註陽明之病夲自太陽初得病時發其汗汗先出而不透徹乃為汗不如法故未盡之邪因而轉屬陽明也邪在經則為外證邪入府則為胃家實矣集註方有執曰此言由發太陽汗不如法致病入胃之大意陽明病若能食名中風不能食名中寒註太陽之邪傳陽明病有自中風傳來者有自傷寒傳來者當於食之能否辨之若能食名中風是自中風傳來者以風乃陽邪陽能化榖故能食也不能食名中寒是自傷寒傳來者以寒乃隂邪不能化榖故不能食也集註方有執曰此以食之能否驗風寒之辨盖陽明主水榖風能食陽能化榖也寒不能食隂不殺榖也名猶言為也中寒即傷寒之互詞大意推原風寒自太陽傳來其辨驗有如此者非謂陽明自中而然也汪琥曰仲景云中寒與傷寒同義非真寒證也若係真中寒是胃家虛冷藥宜理中湯之類今不能食是胃氣實但邪未入府不作鬱熱耳因名中寒實與傷寒無異問曰陽明病外證云何答曰身熱汗自出不惡寒反惡熱也註陽明病有外證有内證潮熱自汗不大便内證也身熱汗自出不惡寒反惡熱外證也今汗自出是従中風傳來故與中風之外證同而身熱不惡寒反惡熱則知為陽明外證故不與中風外證同也然陽明之熱發於肌肉必蒸蒸而熱又不似太陽之陣陣發熱可知矣集註方有執曰此以太陽中風傳入陽明之外證言魏荔彤曰病有太陽中風不觧傳入陽明者何以辨之故設問曰陽明未知其裏之何時傳來必先驗其外之何所見證答曰太陽病有身熱汗自出而惡風者此太陽中風之夲證也若身熱汗自出竟不惡風寒而反惡熱則病已去太陽而入陽明矣此陽明病由太陽中風而傳入者也問曰病有得之一日不發熱而惡寒者何也答曰雖得之一日惡寒将自罷即自汗出而惡熱也註太陽病當惡寒陽明病當惡熱今陽明病有初得之一日不發熱而惡寒者是太陽去表之邪未盡故仍惡寒也然去表未盡之邪欲傳陽明不能久持故惡寒必將自罷即日當自汗出而惡熱矣集註方有執曰此以太陽傷寒傳入陽明之外證言程應旄曰陽明惡寒終是帯表至於府病則惡熱矣表之罷否湏於此驗之鄭重光曰此辨陽明傷寒之外證不發熱而惡寒起自傷寒也惡寒将自罷邪過表也即自汗出邪熱鬱於肌肉腠理開汗外洩也魏荔彤曰太陽傷寒亦有傳入陽明者又何以辨之故設問曰病有得之一日起初之時不見發熱而但見惡寒者何病也答曰得之一日惡寒雖為太陽傷寒之證而惡寒亦将自罷即自汗出而惡熱此是陽明病由太陽傷寒而傳入者也可知太陽中風則發熱惡風汗自出為正病太陽傷寒則惡寒無汗為正病若傳入陽明則必以汗出惡熱為正病也問曰惡寒何故自罷答曰陽明居中主土也萬物所歸無所復傳始雖惡寒二日即止此為陽明病也註此釋上條陽明惡寒自罷之義陽明屬胃居中土也土為萬物所歸故邪熱歸胃則無所復傳亦萬物歸土之義陽明初病一日雖仍惡寒是太陽之表未罷也至二日惡寒自止則是太陽之邪已悉歸併陽明此為陽明病也集註方有執曰惡寒二日自止者熱入裏而将惡熱此以正陽陽明言也程應旄曰六經雖分隂陽而宰之者胃五藏六府皆朝宗而稟令焉一有燥熱無論三陽傳來之邪從而化熱即三隂傳來之邪亦轉屬而變熱隂陽之邪皆歸胃土故曰萬物所歸無所復傳也問曰何縁得陽明病答曰太陽病若發汗若下若利小便此亡津液胃中乾燥因轉屬陽明不更衣内實大便難者此名陽明也註問曰何緣得陽明胃實之病答曰由邪在太陽時發汗若下若利小便皆為去邪而設治之誠當則邪觧而愈矣如其不當徒亡津液致令胃中乾燥則未盡之表邪乘其燥熱因而轉屬陽明為胃實之病者有三曰不更衣即太陽陽明脾約是也曰内實即正陽陽明胃家實是也曰大便難即少陽陽明大便難是也三者雖均為可下之證然不無輕重之别脾約自輕於大便難大便難自輕於胃家實盖病脾約大便難者毎因其人津液素虧或因汗下利小便施治失宜所致若胃實者則其人陽氣素盛胃有宿食即未經汗下而亦入胃成實也故已經汗下者為奪血致燥之陽明以滋燥為主未經汗下者為熱盛致燥之陽明以攻熱為急此三承氣湯脾約丸及蜜煎土𤓰根猪膽汁導法之所由分也集註方有執曰古人大便必更衣不更衣言不大便也程應旄曰轉屬層次不止有表罷不罷之分而表罷入裏復有燥實燥不實之辨所以有不更衣之陽明病有内實之陽明病有大便難之陽明病也其中有屬表屬裏所以下法有禁有宜受氣有裏實裏燥所以下法有應大應小汪琥曰或問太陽病若下矣則胃中之物已去縦亡津液胃中乾燥未必復成内實答云方其太陽初病時下之不當徒亡津液胃中之物去之不盡邪傳陽明而成燥糞故有内實之證問曰病有太陽陽明有正陽陽明有少陽陽明何謂也答曰太陽陽明者脾約是也正陽陽明者胃家實是也少陽陽明者發汗利小便已胃中燥煩實大便難是也註陽明可下之證不止於胃家實也其綱有三故又設問答以明之也太陽之邪乘胃燥熱傳入陽明謂之太陽陽明不更衣無所苦名脾約者是也太陽之邪乘胃宿食與燥熱結謂之正陽陽明不大便内實滿痛名胃家實者是也太陽之邪已到少陽法當和觧而反發汗利小便傷其津液少陽之邪復乘胃燥轉屬陽明謂之少陽陽明大便澁而難出名大便難者是也集註程知曰言三陽皆有入胃府之證也陽明為水榖之海中土為萬物所歸故三陽經皆能入其府邪自太陽傳入胃府者謂之太陽陽明即經所謂太陽病若吐若下若發汗後㣲煩小便數大便因鞕者是也由脾之斂約故用小承氣㣲下以和之邪自陽明經傳入胃府者謂之正陽陽明即經所謂發熱汗出胃中燥鞕讝語者是也乃胃中邪實故用大承氣以攻下之邪自少陽轉屬胃府者謂之少陽陽明即經所謂少陽不可發汗發汗則讝語此屬胃者是也係津液内竭故用麻仁丸潤下以和其津液也若三陽外證未除則陽明正治之法又不可用矣陽明病衇浮而緊者必潮熱發作有時但浮者必盜汗出按自汗是陽明證盜汗是少陽證盜汗當是自汗文義始屬註陽明病在經衇當浮長入府衇當實大今衇浮而緊潮熱有時者是陽明病而見太陽傷寒衇也則知是從傷寒傳來太陽傷寒之邪未罷必無汗故雖見陽明潮熱發作有時之證仍當從太陽陽明傷寒治之宜麻黄加葛根湯汗之若見潮熱發作有時之證而衇但浮不緊是陽明病而見太陽中風衇也則知是從中風傳來太陽中風之邪未罷必自汗出當從太陽陽明中風治之宜桂枝加葛根湯觧之集註沈明宗曰此陽明證而見太陽衇也衇浮而緊太陽表寒未罷之衇潮熱發作有時則陽明裏證已具但浮者太陽風傷衛衇故必汗出也陽明病衇遲汗出多㣲惡寒者表未觧也可發汗宜桂枝湯按汗出多之下當有發熱二字若無此二字衇遲汗出多㣲惡寒乃是表陽虛桂枝附子湯證也豈有用桂枝湯發汗之理乎必是傳寫之遺註陽明病衇當數大今衇遲汗出多設不發熱惡寒是太陽表邪已觧矣今發熱㣲惡寒是表猶未盡觧也故宜桂枝湯觧肌以發其汗使初入陽明之表邪仍還表而出也集註程知曰此言中風傳陽明表邪未觧仍宜用桂枝湯以觧肌也汪琥曰此太陽病初傳陽明經中有風邪也衇遲者太陽中風緩衇之所變傳至陽明邪将入裏故衇變遲汗出多者陽明熱而肌腠疎也㣲惡寒者在表風邪未盡也故仍從太陽中風例治之又曰雖從太陽例治但既云陽明病仲景法還宜用桂枝加葛根湯為是陽明病衇浮無汗而喘者發汗則愈宜麻黄湯註陽明病衇應浮大證應汗出今衇但浮表病衇也無汗而喘表實證也是太陽之邪未悉入陽明猶在表也當仍從太陽傷寒治之發汗則愈宜麻黄湯集註張璐曰陽明榮衛難辨辨之全藉於衇證風邪之衇傳至陽明自汗已多則緩去而遲在寒邪之衇傳至陽明發熱已甚則𦂳去而浮在此皆邪氣在經之徴若入府則遲者必數浮者必實矣設不數不實非胃實也必不勝攻下矣汪琥曰無汗而喘但浮不緊何以定其為陽明病必其人目痛鼻乾身熱不得眠故云陽明病也魏荔彤曰此太陽陽明之證入陽明未深故令其邪仍自表出不至歸於胃而無所復傳也陽衇㣲而汗出少者為自和也汗出多者為太過陽衇實因發其汗出多者亦為太過太過者為陽絶於裏亡津液大便因鞕也註此承上條互詳其衇以出其證也衇陽㣲謂衇浮無力而㣲也陽衇實謂衇浮有力而盛也凡中風傷寒衇陽㣲則熱㣲㣲熱蒸表作汗若汗出少者為自和欲觧汗出多者為太過不觧也陽衇實則熱盛因熱盛而發其汗出多者亦為太過汗出太過則陽極於裏亡津液大便囙鞕而成内實之證矣勢不得不用下法故欲發其汗者不可不早慮及此也集註喻昌曰陽㣲者中風之衇陽㣲緩也陽實者傷寒之衇陽𦂳實也陽絶即亡津液之互辭仲景每於亡津液者悉名無陽玩夲文陽絶於裏亡津液大便因鞕甚明傷寒發太陽膀胱經之汗即當顧慮陽氣以膀胱主氣化故也發陽明胃經之汗即當顧慮隂津以胃中藏津液故也所以陽明多有熱越之證謂胃中津液随熱而盡越於外汗出不止耳然則陽明病不論中風傷寒衇㣲衇實汗出少而邪将自觧汗出多則隂津易致竭絶也陽明病法多汗反無汗其身如蟲行皮中状者此以久虛故也註陽明病法當汗多反無汗其身如蟲行皮中状者以其人胃氣久虛邪􅊊於太陽之表陽明肌腠不能宣發作汗故也宜葛根湯小劑㣲汗和其肌表自可愈也集註汪琥曰按此條論仲景無治法常器之云可用桂枝加黄耆湯郭雍云宜用桂枝麻黄各半湯不知上二湯皆太陽經藥今係陽明無汗證仍宜用葛根湯主之魏荔彤曰陽明病法應多汗今反無汗但見身如蟲行皮中状者此邪熱欲出表作汗而正氣衰弱不能逹之也陽明病初欲食小便反不利大便自調其人骨節疼翕翕如有熱状奄然發狂濈然汗出而觧者此水不勝糓氣與汗共併衇緊則愈註陽明病初欲食知其從中風熱邪傳來也陽明受邪當小便數大便鞕今小便反不利大便自調知津未傷而胃自和不成裏實也既不成實則在經之邪夲輕可自愈也若其人骨節疼翕翕如有熱状是太陽之表未除也奄忽也忽然發狂濈然汗出而觧者盖以太陽傳來之邪夲輕陽明所受之邪自淺津未傷而胃自和仍當還表作觧也然必待發狂而觧者此胃中水氣不勝初欲食之糓氣糓氣長陽化熱水不勝熱釀汗共併而出所以發狂作觧也凡将汗觧衇必先浮今言衇𦂳則愈者亦邪還於表欲觧應見之衇也傷寒發熱無汗嘔不能食而反汗出濈濈然者是轉屬陽明也註傷寒發熱無汗嘔不能食為太陽之邪欲傳也若無汗為太陽陽明之表尚在汗之可也今反汗出濈濈然者是邪已轉屬陽明之府可下不可汗也集註成無已曰傷寒發熱無汗嘔不能食者太陽受病也若反汗出濈濈然者是太陽之邪轉屬陽明也故經曰陽明病法多汗方有執曰嘔不能食熱入胃也反汗出者肌肉著熱膚腠反開也程應旄曰太陽夲證現在而反汗出濈濈然者雖表證未罷已是轉屬陽明也濈濈連綿之意即俗云汗一身不了又一身是也傷寒衇浮發熱無汗其表不觧不可與白虎湯渴欲飲水無表證者白虎加人參湯主之註傷寒之邪傳入陽明衇浮發熱無汗其表不觧者雖有燥渴乃大青龍湯證不可與白虎湯即有陽明渴欲飲水熱證應與白虎者亦必審其無太陽表證始可與也加人參者以其衇浮不滑非有餘也且欲於大觧熱中速生其津液也集註鄭重光曰此申明用白虎湯之法以白虎但能觧熱而不觧表若稍帶外感有無汗惡寒身痛頭疼之表證慎不可用也白虎加人參湯方於白虎湯方内加人參三两餘依白虎湯方傷寒衇浮滑此以表有熱裏有寒白虎湯主之按王三陽云經文寒字當邪字觧亦熱也其說甚是若是寒字非白虎湯證矣註此言傷寒太陽證罷邪傳陽明表裏俱熱而未成胃實之病也衇浮滑者浮為表有熱之衇陽明表有熱當發熱汗出滑為裏有熱之衇陽明裏有熱當煩渴引飲故曰表有熱裏有熱也此為陽明表裏俱熱之證白虎乃觧陽明表裏俱熱之藥故主之也不加人參者以其未經汗吐下不虛故也集註程知曰滑則裏熱云浮滑則表裏俱熱矣大熱之氣得辛凉而觧猶之暑暍之令得金風而爽故清凉之劑以白虎名之又曰厥隂條中有傷寒衇滑而厥者裏有熱也白虎湯主之可證此條之非裏有寒矣魏荔彤曰此裏尚為經絡之裏非藏府之裏亦如衛為表榮為裏非指藏府而言也白虎湯方知母六兩石膏一觔碎甘草二兩炙粳米六合右四味以水一斗煮米熟湯成去滓温服一升日三服集觧柯琴曰陽明邪從熱化故不惡寒而惡熱熱蒸外越故熱汗出熱爍胃中故渴欲飲水邪盛而實故衇滑然猶在經故兼浮也葢陽明屬胃外主肌肉雖内外大熱而未實終非苦寒之味所宜也石膏辛寒辛能觧肌熱寒能勝胃火寒能沉内辛能走外此味兩擅内外之能故以為君知母苦潤苦以瀉火潤以滋燥故用為臣甘草粳米調和於中宫且能土中瀉火稼穡作甘寒劑得之緩其寒苦劑得之平其苦使二味為佐庶大寒大苦之品無傷損脾胃之慮也煮湯入胃輸脾歸肺水精四布大煩大渴可除矣白虎為西方金神取以名湯秋金得令而炎暑自觧方中有更加人參者亦補中益氣而生津也用以協和甘草粳米之補承制石膏知母之寒㵼火而土不傷乃操萬全之術者也病人煩熱汗出則觧又如瘧状日晡所發熱者屬陽明也衇實者宜下之衇浮虛者宜發汗下之與大承氣湯發汗宜桂枝湯註病人謂病太陽經中風傷寒之人也太陽病煩熱汗出則應觧矣今又寒熱如瘧状每至日晡所即發潮熱日晡者乃申酉陽明王時故曰屬陽明也證雖如此當審其果盡歸陽明耶抑或尚兼太陽也故又當以衇辨之若衇實者邪已入裏則汗出潮熱為陽明下證宜與大承氣湯下之若衇浮虛者邪尚在表則寒熱如瘧仍屬太陽當汗之證也宜與桂枝湯汗之集註程知曰病人得汗後煩熱觧太陽之邪将盡未盡其人復如瘧状日晡時發熱則邪入陽明審矣然雖已入陽明尚恐未離太陽故必重辨其衇衇實者可下若衇浮虛者仍是陽明兼太陽便宜汗而不宜下也太陽病若吐若下若發汗後㣲煩小便數大便因鞕者與小承氣湯和之愈註太陽病若吐若下若發汗後不觧入裏㣲煩者乃梔子豉湯證也今小便數大便因鞕是津液下奪也當與小承氣湯和之以其結熱未甚入裏未深也集註喻昌曰㣲煩小便數大便因鞕皆是邪漸入裏之機故用小承氣湯和之程應旄曰吐下汗後而見煩證徴之於大便鞕因非虛煩者比然煩既㣲而小便數當由胃家失潤燥氣客之使然胃雖實非大實也以小承氣湯取其和也非大攻也小承氣湯方大黄四两厚朴二两去皮炙枳實三枚大者炙已上三味以水四升煮取一升二合去滓分温二服初服湯當更衣不爾者盡飲之若更衣者勿服之趺陽衇浮而濇浮則胃氣强濇則小便數浮濇相搏大便則鞕其脾為約麻仁丸主之註趺陽胃經衇也趺陽衇浮而濇陽浮則胃氣强隂濇則小便數隂陽相搏則熱盛而液竭矣故大便則鞕也其名為約者謂脾為邪所約束不能為胃行其津液故名脾約也以麻仁丸主之養液潤燥清熱通幽其不敢恣行承氣者以衇濇故也集註程知曰言胃衇浮濇不可大攻宜用麻仁丸潤法也趺陽胃衇也在足跗上動衇應手浮則陽熱盛而胃强濇則隂津少而小便數脾主為胃行其津液者也胃陽强則脾隂弱不能為胃行其津液故約其食物如一二弹丸也此不當下而當潤之程應旄曰麻仁丸潤燥通幽傷寒不可恣行大承氣可知矣所以然者以其為太陽陽明非正陽陽明胃家實者比也推之少陽陽明其不可以正陽陽明胃家實之法治之更可知矣汪琥曰以胃强脾弱為脾約作觧盖以胃中之邪熱盛為陽强故衇浮脾家之津液少為隂弱故衇濇用麻仁丸者以瀉胃中之陽而扶脾之隂也麻仁丸方麻仁二升芍藥半觔枳實半觔大黄一觔去皮厚朴一觔去皮杏仁一升去皮尖熬别作脂右六味蜜合丸如桐子大飲服十丸日三服漸加以和為度集註方有執曰麻子杏仁能潤乾燥之堅枳實厚朴能導固結之滯芍藥歛液以輔潤大黄推陳以致新脾雖為約此能疏之傷寒吐後腹脹滿者與調胃承氣湯註傷寒吐後胸不脹滿而腹脹滿者是表邪已盡胃中壅熱故也宜與調胃承氣湯下其熱而和之以無鞕痛故不用大小承氣也集註程知曰言吐後腹脹滿宜調胃也熱在上焦則吐吐後腹脹滿則邪不在胸其為裏實可知然脹滿而不鞕痛自不宜用急下之法但與調胃承氣和其胃熱可耳内經云諸脹腹大皆屬於熱也程應旄曰吐傷津液燥氣不能下達遂成土欎是以腹脹滿用調胃承氣一奪其欎可耳調胃承氣湯方大黄四两去皮酒浸甘草二两炙芒消半升右三味以水三升煮取一升去滓内芒消更煮两沸少少温服之方解方名調胃承氣者有調和承順胃氣之義非若大小承氣専攻下也經曰熱􅁋於内治以鹹寒火􅁋於内治以苦寒君大黄之苦寒臣芒消之鹹寒二味並舉攻熱瀉火之力備矣恐其速下故佐甘草之緩又恐其過下故少少温服之其意在不峻而和也陽明病不吐不下心煩者可與調胃承氣湯註陽明病謂已傳陽明不吐不下心煩者謂未經吐下而心煩也其為熱盛實煩可知故與調胃承氣湯瀉熱而煩自除也集註成無已曰吐後心煩謂之内煩下後心煩謂之虛煩今陽明病不吐不下心煩則是胃有􅊊熱也與調胃承氣湯以下其欎熱喻昌曰胃氣及津液既不由吐下而傷則心煩明係胃中熱熾故可與調胃承氣湯陽明發熱汗多者急下之宜大承氣湯註陽明病不大便發熱汗多不止者雖無内實亦當急下之盖因陽氣大蒸於内恐致隂液暴亡於外故以全津液為急務也宜大承氣湯下之集註喻昌曰汗多則津液外滲加以發熱則津液盡随熱勢蒸蒸騰達於外更無他法以止其汗惟有急下一法引熱勢從大腸而出庶津液不致盡越於外耳程應旄曰此等之下皆為救隂而設不在奪實奪實之下可緩救隂之下不可緩沈明宗曰陽明裏實以潮熱㣲汗為正兹見發熱汗多乃裏熱熾盛之極蒸騰胃中津液盡越於外非亟奪其邪以救津液不可故宜大承氣湯急下也大承氣湯方大黄四两酒洗厚朴半觔炙去皮枳實五枚炙芒消三合右四味以水一斗先煮二物取五升去滓内大黄更煮取二升去滓内芒消更上㣲火一两沸分温再服得下餘勿服方解諸積熱結於裏而成滿痞燥實者均以大承氣湯下之也滿者腹脇滿急䐜脹故用厚朴以消氣壅痞者心下痞塞硬堅故用枳實以破氣結燥者腸中燥屎乾結故用芒消潤燥軟堅實者腹痛大便不通故用大黄攻積瀉熱然必審四證之輕重四藥之多少適其宜始可與也若邪重劑輕則邪氣不服邪輕劑重則正氣轉傷不可不慎也集解柯琴曰諸病皆因於氣穢物之不去由於氣之不順也故攻積之劑必用氣分之藥因以承氣名湯方分大小有二義焉厚朴倍大黄是氣藥為君名大承氣大黄倍厚朴是氣藥為臣名小承氣味多性猛制大其服欲令大瀉下也因名曰大味寡性緩制小其服欲㣲和胃氣也因名曰小且煎法更有妙義大承氣用水一斗煮朴枳取五升去滓内大黄再煮取二升内芒消何哉盖生者氣鋭而先行熟者氣純而和緩仲景欲使芒消先化燥屎大黄繼通地道而後枳朴除其痞滿若小承氣以三味同煎不分次第同一大黄而煎法不同此可見仲景㣲和之意也程知曰調胃承氣大黄用酒浸大承氣大黄用酒洗皆為芒消之鹹寒而以酒制之若小承氣不用芒消則亦不事酒浸洗矣陽明病下之心中懊憹而煩胃中有燥屎者可攻腹㣲滿初頭鞕後必溏不可攻之若有燥屎者宜大承氣湯註陽明病下之後心中懊憹而煩者若腹大滿不大便小便數知胃中未盡之燥屎復鞕也乃可攻之若腹㣲滿不可攻也誤攻必變脹滿不能食飲水則噦等逆矣若果有燥屎宜下者以大承氣湯下之集註方有執曰可攻以上以轉失氣言懊憹悔憹痛恨之意盖藥力不足以勝病燥鞕欲行而不能故曰可攻言當更服湯以促之也腹㣲滿以下以不轉失氣言頭鞕後溏裏熱輕也故曰不可攻之言當止湯勿服也程知曰言有燥屎即可大攻下也下後心中懊憹而煩者虛煩也當與梔子豉湯若胃有燥屎則非虛煩故可攻腹不甚滿則無必攻之法有燥屎則非先鞕後溏者也故可攻又曰便鞕與燥屎不同便鞕者大便實滿而鞕燥屎者胃中宿食因胃熱而結為燥丸之屎也故便鞕猶有用小承氣者若燥屎則無不用芒消之鹹寒也程應旄曰末句乃申可攻句以決治法得病二三日衇弱無太陽柴胡證煩躁心下鞕至四五日雖能食以小承氣湯少少與㣲和之令小安至六日與承氣湯一升若不大便六七日小便少者雖不能食但初頭鞕後必溏未定成鞕攻之必溏湏小便利屎定鞕乃可攻之宜大承氣湯註得病二三日無太陽少陽證煩躁心下鞕至四五日不大便若衇大屬正陽陽明胃實之證也下之無疑今衇弱雖胃和能食不可輕下祗可與小承氣湯少少與而㣲和之令其小安次日仍不大便繼與小承氣湯促之若六七日竟不大便而小便少者即不能食亦屬胃中尚未乾燥屎未定鞕如大攻之初見鞕復必溏也湏待小便利知屎定鞕乃可攻之宜大承氣湯集註方有熱曰太陽不言藥以有桂枝麻黄之不同也少陽言藥以専主柴胡也凡以此為文者皆互發也以無太少二經證故知此屬陽明以衇弱故宜㣲和至六日以下乃歴叙可攻不可攻之節度也程應旄曰能食以結在腸間而胃火自盛也先以小承氣湯少少與之和胃中之火令少安後以前藥増至一升去腸中之結既用小承氣矣而又減去分數接續投之以衇弱之胃其禀素虛而為日又未乆也張璐曰此段之能食不能食全與辨風寒强弱無渉言能食者不可以為胃强而輕下不能食者不可以為胃中有燥屎而輕下也陽明病衇遲雖汗出不惡寒者其身必重短氣腹滿而喘有潮熱者此外欲觧可攻裏也手足濈然汗出者此大便已鞕也大承氣湯主之若汗多㣲發熱惡寒者外未觧也其熱不潮未可與承氣湯若腹大滿不通者可與小承氣湯㣲和胃氣勿令大泄下註陽明病衇遲雖汗出不惡寒外證欲觧而衇不實尚未可攻也若其人身重熱困於體也短氣而喘熱壅於上也腹滿潮熱熱聚於中也手足濈然汗出大便已鞕熱結於下也斯為外邪已觧内實已成始可攻之主以大承氣湯可也若汗出㣲發熱惡寒者則外猶未觧也其熱不潮者裏猶未實也不可與承氣湯即有裏急腹大滿不通等證亦祗宜與小承氣湯㣲和胃氣勿令大泄下盖以衇遲故也集註方有執曰潮熱陽明王於申酉戌故熱作於此時如潮之有信也手足濈然而汗出者脾主四肢而胃為之合胃中燥實而蒸蒸騰達於四肢故曰大便已鞕也林瀾曰此節辨衇遲内結之或宜大承氣攻之或但可以小承氣㣲和之也陽明病衇遲證兼汗出不惡寒身重短氣腹滿而喘似屬可攻然必有潮熱者為外證已觧裏證已具手足濈然汗出者為大便已鞕主以大承氣湯攻之奚疑若汗出雖多猶見發熱惡寒則表尚在也其熱不潮汗亦非手足濈然之汗安可與承氣以攻之乎即腹大滿不通亦祗可與小承氣㣲和勿令大泄下此何以故衇遲便非必下之衇雖内結亦豈大承氣所宜哉陽明病潮熱大便㣲鞕者可與大承氣湯不鞕者不可與之若不大便六七日恐有燥屎欲知之法少與小承氣湯湯入腹中轉失氣者此有燥屎也乃可攻之若不轉失氣者此但初頭鞕後必溏不可攻之攻之必脹滿不能食也欲飲水者與水則噦其後發熱者必大便復鞕而少也以小承氣湯和之不轉失氣者慎不可攻也註陽明病潮熱大便㣲鞕者可與大承氣湯不鞕者不可與之也若不大便六七日恐有燥屎欲知之法少與小承氣湯湯入腹中轉失穢氣則為有燥屎乃可攻之若不轉失穢氣此但初頭鞕後必溏是尚未成鞕也不可攻之攻之必寒氣乘虛上逆脹滿不能食也欲飲水者得水則噦亦由虛寒之氣上逆不能化水而下輸也若其後所發潮熱不退必是大便再鞕但已經下後所鞕者無多祗以小承氣湯和之可也故凡服承氣湯不轉失氣者慎不可攻也此盖仲景戒人不可輕下之意集註方有執曰此以潮熱轉失氣次第而詳言之以决當下之候也轉失氣反屁出也脹滿藥寒之過也噦亦寒傷胃也復鞕而少者重下故也末句重致叮嚀之意喻昌曰若腹中氣仍不轉則不但用大承氣大差即小承氣亦差矣程知曰上條曰外欲觧可攻裏曰外未觧未可與承氣曰可與小承氣㣲和胃氣勿令大泄下此條曰可與曰不可與曰乃可攻之不可攻之曰少與小承氣曰以小承氣和之慎不可攻多少商量慎重之意故惟手足濈然汗出大便燥鞕者始主之以大承氣若小承氣猶是㣲和胃氣之法也汪琥曰轉失氣則知其人大便已鞕腸胃中燥熱之甚故其氣不外宣時轉而下不轉失氣則腸胃中雖有熱而滲孔未至於燥此但初頭鞕後必溏也陽明病讝語發潮熱衇滑而疾者小承氣湯主之因與承氣湯一升腹中轉失氣者更服一升若不轉失氣者勿更與之明日又不大便衇反㣲濇者裏虛也為難治不可更與承氣湯也註陽明病讝語潮熱衇滑而疾者是可攻之證衇也然無濈濈然之汗出與小便數大便鞕燥實等證則不可驟然攻之宜先與小承氣湯一升試之若腹中轉失穢氣則知腸中燥屎已鞕以藥少未能遽下所轉下者但屎之氣耳可更服一升促之自可下也若不轉失氣則勿更與服俟明日仍不大便診其衇仍滑疾則更服之今衇反見㣲濇則是裏虛無氣不能承送故為難治所以不可更與承氣湯也集註方有執曰滑以候食故為大便鞕之診疾者屬裏熱也㣲者陽氣不充無以運行濇者隂血不足無以潤送故曰陽㣲不可下無血不可下此之謂也張璐曰此條衇滑而疾有讝語潮熱而無鞕滿實證祗宜以小承氣湯下之下之而衇反㣲濇證變裏虛故為難治傷寒若吐若下後不觧不大便五六日上至十餘日日晡所發潮熱不惡寒獨語如見鬼状若劇者發則不識人循衣摸牀惕而不安㣲喘直視衇弦者生濇者死㣲者但發熱讝語者大承氣湯主之若一服利則止後服按趙嗣真曰活人書云弦者陽也濇者隂也陽病見陽衇者生在仲景衇法中弦濇屬隂不屬陽得無疑乎今觀夲文内衇弦者生之弦字當是滑字若是弦字弦為隂負之衇豈有必生之理惟滑衇為陽始有生理滑者通濇者塞凡物理皆以通為生塞為死玩上條衇滑而疾者小承氣主之衇㣲濇者裏虛為難治益見其誤註傷寒若吐若下後津液已亡而表不觧邪因入裏不大便五六日上至十餘日仍不大便日晡所發潮熱不惡寒者此乃表邪悉罷裏熱漸深也仍宜大承氣湯蕩盡餘邪以存隂液自可愈也若因循失下以致獨語如見鬼状病勢劇者則不識人循衣摸牀驚惕不安㣲喘直視見一切陽亢隂㣲孤陽無依神明擾亂之象當此之際惟診其衇滑者為實堪下則生濇者為虛難下則死若病勢㣲者但見潮熱譫語不大便之證而無前神昏等劇者宜以大承氣湯下之若一服利即止後服盖恐其過也按循衣摸牀危惡之候也一以隂氣未竭為可治如太陽中風火劫變逆捻衣摸牀小便利者生不利者死是也一以陽熱之極為可攻如陽明裏熱成實循衣摸牀衇滑者生濇者死是也大抵此證多生於汗吐下後陽氣大虛精神失守經曰四肢者諸陽之本也陽虛故四肢擾亂失所倚也以獨參湯救之汗多者以參耆湯厥冷者以參附湯治之愈者不少不可概謂陽極隂竭也集註喻昌曰此條舉譫語之勢重者為言而勢重之中復分二等劇者主死㣲者主生故以大承氣湯下之程知曰婁全善治循衣摸牀每以補益得愈亦因其衇證之不足也劉守真每以承氣治熱病法雖祖於仲景而辨證其未能如此詳悉故開後人鹵莽之端又曰喘則氣欲上脫㣲喘者邪實於内而又不能大喘也不識人循衣摸牀心欲絶也動惕不安肝欲絶也㣲喘肺欲絶也直視腎欲絶也内經所謂三隂三陽五藏六府皆受病榮衛不行藏府不通故衇濇者死也汪琥曰日晡所發潮熱者府實燥甚故當其經氣王時發潮熱也獨語者即譫語也病人自言為譫獨語如見鬼状乃陽明府實而妄見妄聞劇者甚也成註云熱甚昬冒正氣故不識人循衣摸牀者陽熱偏勝而躁動於手也惕而不安者胃熱冲膈心神為之不寧也又胃熱甚而氣上逆則喘直視則邪干臟矣故其生死之機湏於衇候决之陽明病夲自汗出醫更重發汗病已差尚㣲煩不了了者此大便必鞕故也以亡津液胃中乾燥故令大便鞕當問其小便日幾行若夲小便日三四行今日再行故知大便不久出今為小便數少以津液當還入胃中故知不久必大便也註陽明病本應自汗出醫誤以為風邪更重發汗病已差尚㣲煩不了了者此大便必鞕故也然無或滿或痛之苦者以重汗亡津胃中乾燥故大便鞕本無宿食也則當問其小便日㡬行若本一日三四行今日祗再行可知大便不久則出盖小便數少則津液當還胃中故知不久必大便自出不湏藥也集註方有執曰水榖入胃其精者為津液粗者成樝滓水精滲出腸胃之外清者為津液濁者外而為汗下而為小便故汗與小便過多者皆能奪乎津液所以樝滓之為大便者乾燥結鞕而難出也然二便者水榖分行之道路此通則彼塞此塞則彼通小便出少則津液還停胃中必大便潤而自出也陽明病自汗出若發汗小便自利者此為津液内竭雖鞕不可攻之當湏自欲大便宜蜜煎導而通之若土𤓰根及大豬胆汁皆可為導註此承上條詳其義以明其治也陽明病自汗出或發汗小便自利者此為津液内竭雖大便鞕而無滿痛之苦不可攻之當待津液還胃自欲大便燥屎已至直腸難出肛門之時則用蜜煎潤竅滋燥導而利之或土𤓰根宣氣通燥或豬膽汁清熱潤燥皆可為引導法擇而用之可也集註成無已曰津液内竭腸胃乾燥大便因鞕此非結熱故不可攻宜以潤藥外治而導引之張璐曰凡係多汗傷津及屢經汗下不觧或尺中衇遲弱元氣素虛之人當攻而不可攻者並宜導法程應旄曰小便自利者津液未還入胃中津液内竭而鞕故自欲大便但苦不能出耳湏有此光景時方可従外導法漬潤其腸腸潤則水流就濕津液自歸還於胃故不但大便通而小便亦從内轉矣蜜煎導方蜜七合一味内銅器中㣲火煎之稍凝似飴状攪之勿令焦著欲可丸併手捻作挺子令頭鋭大如指長二寸許當熱時急作冷則硬以内榖道中以手急抱欲大便時乃去之内臺方用蜜五合煎凝時加皂角末五錢蘸捻作挺以豬膽汁或油潤榖道内之豬膽汁方大豬膽一枚瀉汁和法醋少許以灌榖道内如一食頃當大便出宿食惡物甚效内臺方不用醋以小竹管插入膽口留一頭用油潤内入榖道中以手将膽捻之其汁自入内此方用之甚便土𤓰根方缺按土𤓰即俗名赤雹也肘後方治大便不通採根搗汁用筒吹入肛門内此與上豬膽汁方同義内臺方用土𤓰根削如挺内入榖道中誤矣盖蜜挺入榖道能烊化而潤大便土𤓰根不能烊化如削挺用之恐失仲景製方之義傷寒六七日目中不了了睛不和無表裏證大便難身㣲熱者此為實也急下之宜大承氣湯註少隂病得之二三日口燥咽乾急下之宜大承氣湯者乃因熱勢甚速消灼腎水津液不能到咽故不必待其有可下之證而急下之是下其熱以救将絶之水緩則腎水乾竭陽必無依躁冒自焚而死也目中不了了而睛和者隂證也睛不和者陽證也今傷寒六七日目中不了了睛不和者是腎水為胃陽所竭水既不能制火則火上熏於目而眸子朦朧為之不了了也此熱結神昏之漸危惡之候也雖外無陽證惟身㣲熱内無滿痛祗大便難亦為熱實故曰此為實也急以大承氣湯下之瀉陽救隂以全未竭之水可也睛不和者謂睛不活動也集註方有執曰了了猶瞭瞭也素問曰陽明主肉其衇俠鼻絡於目靈樞曰足陽明之正上循咽出於口還繫目系合於陽明也又曰足陽明之筋其支者上頸上俠口合於頄下結於鼻上合於太陽太陽為目上綱陽明為目下綱所以目中不了了睛不和知胃實也急下者任衇循面入目督衇上繫两目中央諸衇皆屬於目而人之精神注焉是以宜急下也喻昌曰少隂有急下三法以救腎水一夲經水竭一木邪涌水一土邪凌水陽明亦有急下三法以救津液一汗多津越於外一腹滿津結於内一目睛不慧津枯於中合两經下法以觀病情生理如身在冰壺腹飲上池矣張錫駒曰陽火亢極隂水欲枯故使目中不了了而睛不和急下之所以抑亢極之陽火而救垂絶之隂水也魏荔彤曰陽明燥屎應下胃實應下俱詳考其衇證矣乃有表裏無他證獨於陽明胃衇所發見端倪䖏體認其證如傷寒六七日太陽已罷陽明已成其目昏暗朦昧若隔雲霧而不了了明白者此證名為睛不和也陽明熱盛循經絡而發其昏朦之象以致睛失其光此内熱盛而為實其機已兆兼以大便鞕而難身有㣲熱者則胃實已真故曰此為實也急下之宜大承氣湯病人小便不利大便乍難乍易時有㣲熱喘冒不能卧者有燥屎也宜大承氣湯註陽明病之人小便自利大便當鞕小便不利大便不鞕是知鞕不鞕不在熱不熱而在液之竭與不竭也今小便不利而大便乍難乍易者盖熱将欲作結而液未竭也有時㣲熱者熱入裏也喘者熱乘肺也冒者熱乘心也不能卧者熱併陽也此皆一派熱結便鞕之徴神昏譫狂之漸雖無滿痛亦必有燥屎宜大承氣湯下之自愈也集註王三陽曰此證不宜妄動必以手按之臍腹有鞕塊喘冒不能卧方可攻之何也乍難乍易故也林瀾曰既㣲熱時作喘冒不能卧則有燥屎已的自宜下逐裏實為急安可復以小便利屎定鞕始可攻之常法拘哉汪琥曰此條病未經下而有燥屎乃醫人不易識之證成無已云小便利則大便鞕此有燥屎乃理之常今病人小便不利大便乍難乍易何以知其有燥屎耶盖大實大滿之證則前後便皆不通大便為燥屎壅塞其未堅結者或有時而併出故乍易其極堅結者終著於大腸之中故乍難燥屎結積於下濁氣攻衝於上以故時有㣲熱㣲熱者熱伏於内不得發洩也後條辨云濁氣乘於心肺故既冒且喘也不得卧者胃有燥屎所擾即胃不和則卧不安也凡此者皆是有燥屎之徴故云宜大承氣湯病人不大便五六日繞臍痛煩躁發作有時者此有燥屎故使不大便也註病人不大便五六日繞臍痛者是腸胃中燥屎結無去路故繞臍痛也煩躁發作有時者是燥屎穢熱上攻則煩躁不攻則不煩躁故發作有時也不湏以小承氣湯試之直以大承氣湯下其燥屎大便利自可愈也集註方有執曰病人謂凡有病之人而證犯如此者則皆當如此治之此示人辨凡百胃實之大㫖也程應旄曰攻法必待有燥屎方不為誤攻所以驗燥屎之法不可不備無恃轉失氣之一端也病人雖不大便五六日屎之燥與不燥未可知也但繞臍痛則知腸胃乾屎無去路滯濇在一䖏而作痛煩躁發作有時者因屎氣攻動則煩躁發作又有時伏而不動亦不煩躁而有繞臍痛者斷其不大便當無差矣何大承氣湯之不可攻耶大下後六七日不大便煩不觧腹滿痛者此有燥屎也所以然者本有宿食故也宜大承氣湯註此承上條以明其治也下之未盡仍當下之乃大下之後六七日後不大便煩亦不觧腹仍滿痛者此有燥屎下之未盡也所以然者本有宿食故也宜大承氣湯復下之自愈也集註程知曰大下之後宜乎病觧矣乃復六七日不大便煩不觧而腹滿痛此必有燥屎未盡而然盖宿食因熱復為之結鞕也陽明病下之其外有熱手足温不結胸心中懊憹饑不能食但頭汗出者梔子豉湯主之註陽明經病下之身熱未除手足温不結胸者是所陷之邪淺也心中懊憹饑不能食但頭汗出者是陽邪蒸􅊊於胸膈間也故宜梔子豉湯涌其熱也集註程知曰其外有熱者經邪未觧也手足温者熱入未深也程應旄曰懊憹擾胃故饑不能食熱􅊊氣蒸故但頭汗出魏荔彤曰表邪未全入裏乃即以為胃實而遽下之則其外仍有熱究不能随下藥而蕩滌也於是雖熱而不潮手足雖温而無濈然之汗出則是在表者仍在表而下之徒傷其裏耳即不至於全在太陽者悞下成結胸而心下懊憹饑不能食但頭汗出其陽明蒸蒸之熱為隂寒之藥所􅊊俱凝塞於胸膈之上其證已昭然矣但病仍帯表既不可再下且已入裏又不可復發汗惟有主以梔子豉湯仍從太陽治也傷寒嘔多雖有陽明證不可攻之註傷寒三陽多有嘔證以其風寒之表未除胸中陽氣為寒所􅊊故皆不可攻下也其乾嘔而惡寒發熱者屬太陽也喜嘔而寒熱往來者屬少陽也今雖祗有惡熱不惡寒大便鞕之陽明證而嘔多亦不可攻之其氣逆在上而未歛為實也集註沈明宗曰惡寒發熱之嘔屬太陽寒熱往來之嘔屬少陽但惡熱不惡寒之嘔屬陽明然嘔多則氣已上逆邪氣偏侵上脘或帶少陽故雖有陽明證慎不可攻也陽明中風口苦咽乾腹滿㣲喘發熱惡寒衇浮而緊若下之則腹滿小便難也註陽明謂陽明裏證中風謂太陽表證也口苦咽乾少陽熱證也腹滿陽明熱證也㣲喘發熱惡寒太陽傷寒證也衇浮而𦂳傷寒衇也此為風寒兼傷表裏同病之證當審表裏施治太陽陽明病多則以桂枝加大黄湯两觧之少陽陽明病多則以大柴胡湯和而下之若惟從裏治而遽以腹滿一證為熱入陽明而下之則表邪乘虛復陷故腹更滿也裏熱愈竭其液故小便難也集註程知曰此言陽明兼有太陽少陽表邪即不可攻也陽明中風熱邪也腹滿而喘熱入裏矣然喘而㣲則未全入裏也發熱惡寒衇浮而緊皆太陽未除之證口苦咽乾為有少陽之半表半裏若誤下之則表邪乘虛内陷而腹益滿矣兼以重亡津液故小便難也程應旄曰此條與太陽大青龍證同太陽以風寒持其榮衛故有煩躁證而無腹滿證此以風寒持住陽明故有腹滿證而無煩躁證然口苦咽乾實與煩躁同其機兆也陽明病衇浮而緊咽燥口苦腹滿而喘發熱汗出不惡寒反惡熱身重若發汗則躁心憒憒反讝語若加温鍼必怵惕煩躁不得眠若下之則胃中空虛客氣動膈心中懊憹舌上胎者梔子豉湯主之若渴欲飲水口乾舌燥者白虎加人參湯主之若衇浮發熱渴欲飲水小便不利者猪苓湯主之陽明病汗出多而渴者不可與猪苓湯以汗多胃中燥猪苓湯復利其小便故也註此承前條互發其義以明其治也前條表證居多戒不可誤下此條表裏混淆衇證錯雜不但不可誤下亦不可誤汗也若以衇浮而𦂳誤發其汗則奪液傷隂或加燒鍼必益助陽邪故讝語煩躁怵惕憒亂不眠也或以證之腹滿惡熱而誤下之則胃中空虛客氣邪熱擾動胸膈心中懊憹舌上生胎是皆誤下之過宜以梔子䜴湯一涌而可安也若衇浮不𦂳證無懊憹惟發熱渴欲飲水口乾舌燥者為太陽表邪已衰陽明燥熱正甚宜白虎加人參湯滋液以生津若發熱渴欲飲水小便不利者是陽明飲熱並盛宜豬苓湯利水以滋乾然陽明病法當多汗因汗出多致小便少而渴者不可與豬苓湯盖以汗多胃燥無水不能下行乃水涸之小便少非水蓄之小便不利也恐豬苓湯更利其小便則益竭津液而助燥矣按太陽病煩熱無汗而渴小便利者大青龍湯證也小便不利者小青龍湯去半夏加花粉茯苓證也太陽病煩熱有汗而渴小便利者桂枝合白虎湯證也小便不利者五苓散證陽明病煩熱無汗而渴小便利者宜葛根湯加石膏主之小便不利者以五苓散加石膏寒水石滑石主之陽明病煩熱有汗而渴小便利者宜白虎湯小便不利者以豬苓湯少陽病寒熱無汗而渴小便利者當以小柴胡湯去半夏加花粉小便不利者當以小柴胡湯加茯苓太隂無渴少隂陽邪煩嘔小便赤而渴者以豬苓湯少隂隂邪下利小便白而渴者以真武湯厥隂陽邪消渴者白虎加人參湯厥隂隂邪轉屬陽明渴欲飲水者少少與之則愈證既不同法亦各異當詳審而明辨之集註喻昌曰發熱以上與前條同而汗出不惡寒反惡熱身重四者皆陽明之見證所以汗下燒鍼俱不可用舌上胎則膈熱甚故湧以梔子豉而徹去其膈熱斯治太陽而無碍陽明矣若前證更加口乾舌燥則宜用白虎湯以觧熱生津更加小便不利則宜以豬苓湯以導熱滋乾也其汗多而渴不可與豬苓湯者以熱邪傳入陽明必先耗其津液加以汗多復奪之於外又利小便更奪之於下則津液有立亡之患故示戒也程應旄曰熱在上焦故用梔子豉湯熱在中焦故用白虎加人參湯熱在下焦故用豬苓湯豬苓湯方豬苓去皮茯苓阿膠澤瀉滑石各一兩碎右五味以水四升先煮四味取二升去滓内阿膠烊消温服七合日三服集觧趙羽皇曰仲景製豬苓一湯以行陽明少隂二經水熱然其㫖全在益隂不専利水盖傷寒表虛最忌亡陽而裏虛又患亡隂亡隂者亡腎中之隂與胃家之津液也故隂虛之人不但大便不可輕動即小水亦忌下通倘隂虛過於滲利則津液反致耗竭方中阿膠質膏養隂而滋燥滑石性滑去熱而利水佐以二苓之滲瀉既疏濁熱而不留其壅瘀亦潤真隂而不苦其枯燥是利水而不傷隂之善劑也故利水之法於太陽用五苓者以太陽職司寒水故加桂以温之是煖腎以行水也於陽明少隂用豬苓者以二經兩闗津液特用阿膠滑石以潤之是滋養無形以行有形也利水雖同寒温逈别惟明者知之衇浮而大心下反鞕有熱屬藏者攻之不令發汗屬府者不令溲數溲數則大便鞕汗多則熱愈汗少則便難衇遲尚未可攻註屬藏謂屬裏也屬府謂屬表也溲謂小便也衇浮而大太陽陽明衇也浮屬表大屬裏今太陽衇浮之表未觧而心下反鞕陽明之裏又急權乎汗下可也設裏有熱實攻之無疑不湏先汗以觧外也如無熱實而有衇浮之表不但不令攻之即小便不利亦不令利小便仍當觧外也盖恐溲數汗多亡其津液致大便鞕則熱愈實也若汗少衇遲即有便鞕裏尚未實亦未可攻也集註王肯堂曰論言衇浮大反發汗反下之為逆此以心下鞕有熱知傳邪入裏故舍衇而從證也大便則許攻之小便則不許利何也曰攻大便則内熱除利小便則津液傷也林瀾曰心下鞕與腹鞕滿不同腹鞕邪已結聚成實此但在心下自與非下不可者異矣腑與臟對舉而言見一為入裏一猶屬表之義也陽明病衇遲食難用飽飽則㣲煩頭眩必小便難此欲作榖疸雖下之腹滿如故所以然者衇遲故也註陽明病不更衣已食如饑食輒腹滿衇數者則為胃熱可下證也今衇遲遲為中寒中寒不能化榖所以雖饑欲食食難用飽飽則煩悶是健運失度也清者阻於上升故頭眩濁者阻於下降故小便難食􅊊濕瘀此欲作榖疸之徴非陽明熱濕腹滿發黄者比雖下之腹滿暫減頃復如故所以然者衇遲中寒故也集註方有執曰遲為寒不化榖故食難用飽濕􅊊而蒸氣逆而不下行故㣲煩頭眩小便難也疸黄病也榖疸水榖之濕蒸發而身黄也張璐曰下之腹滿如故盖腹滿已是邪陷衇遲則胃不實徒下其糟粕病既不除而反害之耳夫陽明證本當下陽明而至腹痛尤當急下獨此一證下之腹滿必如故者緣衇遲則胃氣空虛津液不充其滿不過虛熱内壅非結熱當下之比也可見衇遲胃虛不但下之無益即發汗利小便之法亦不可用惟當用和法如甘草乾薑湯先温其中然後少與調胃㣲和胃氣可也程應旄曰熱畜成黄之腹滿下之可去此則榖氣不得宣洩屬胃氣虛寒使然下之益虛其虛矣故腹滿如故陽明病若中寒者不能食小便不利手足濈然汗出此欲作固瘕必大便初鞕後溏所以然者以胃中冷水榖不别故也註陽明病内熱則不大便能食小便利手足濈然汗出是可下之證也今中寒不能食小便不利雖手足濈然汗出不可下也此為中寒欲作固瘕何以知之以大便必初鞕而後溏也所以然者胃中虛冷水榖不分故小便不利而大便必溏也按不能食與上條食難用飽同一不能腐熟水榖也小便不利與上條小便難同一不能下輸膀胱也惟手足濈然汗出與上條飽則㣲煩頭眩不同彼欲作榖疸此欲作固瘕皆胃中寒冷一以㣲煩頭眩陽在中上故不病瀉而病疸一以手足汗出陽在四肢故不病疸而病瀉也再上條中寒食難用飽無汗小便難欲作榖疸以其尚能少食㣲煩猶有陽氣故也此條中寒不能食手足冷汗小便不利欲作固瘕則是寒濕不化純隂故也固瘕者大瘕瀉也俗謂之溏瀉固者久而不止之謂也按人之汗以天地之雨名之隂陽和而後有雨陽亢則熱而雨少隂盛則寒而雨多人之汗亦若是也四肢手足屬土土主脾胃若衇大其汗蒸蒸而熱則為陽盛可下之證也若衇遲其汗漐漐而寒則為隂盛可温之證也集註程應旄曰水榖不别屬濕熱偏渗者多此㸃出胃中冷欲人知病夲於寒宜從寒治不在小便也太陽病寸緩闗浮尺弱其人發熱汗出復惡寒不嘔但心下痞者此以醫下之也如其不下者病人不惡寒而渴者此轉屬陽明也小便數者大便必鞕不更衣十日無所苦也渴欲飲水少少與之但以法救之渴者宜五苓散按但以法救之五字當是若小便不利方與上文小便數下文渴者之義相合此條病勢不急救之之文殊覺無謂必有遺誤王三陽亦云此䖏五苓散難用不然經文渴者之下當有闕文也註太陽病衇浮緩而弱中風衇也發熱汗出惡寒中風證也不嘔則裏氣和緣何而有心下痞證此必以醫下之故也如其不經醫下邪熱自傳於裏病人不惡寒而渴者此邪去太陽已轉屬陽明也若小便數者大便必鞕然使不更衣十餘日而無或滿或痛之苦是仍屬虛燥不實之鞕不可議下俟之可也如或渴欲飲水必是胃中乾燥當少少與之以滋其胃可耳其或小便不利而渴者是又為水停不化宜五苓散以導其所停之水矣盖病在膀胱故仍治太陽而不治陽明也集註張兼善曰十日不更衣而不用攻伐何也曰此非結熱雖不大便而無潮熱讝語可下之證當湏審慎勿以日數久而輒為攻下也喻昌曰寸緩闗浮尺弱發熱汗出惡寒純是太陽中風未罷之證設非誤下何得心下痞結耶如不誤下而太陽證必漸傳經乃至不惡寒而渴邪入陽明審矣然陽明津液既偏渗於小便則大腸失其潤而大便鞕與腸中熱結自是不同所以旬日不更衣無所苦也汪琥曰小便數大便鞕仲景論中何以無治法耶葢此正是仲景不湏用藥處俟其隂陽自和則小便漸少大便必自出也陽明病心下鞕滿者不可攻之攻之利遂不止者死利止者愈註此申上條痞鞕不更衣十日無所苦誤攻之變也陽明病非胃家實而心下鞕滿者不可攻之若攻之其人利不止者則正脫而死其人利自止者邪退則猶可愈也集註汪琥曰或問結胸證同是心下鞕滿又屬可下何也葢結胸證心下鞕滿而痛者為胃中實故可下此證不痛當是虛鞕虛滿與半夏瀉心湯之心下痞鞕畧同故云不可攻也諸虛者不可下下之則大渴求水者易愈惡水者劇註虛者下之是為重虚隂津消亡自然大渴其求水者陽氣猶存故易愈若惡水者陽氣已絶則難愈矣集註程應旄曰諸虛者陽津隂液必有所亡故下之則大渴求水者亡隂惡水者亡陽故有愈劇之分觀此知仲景慮誤下之助隂甚於慮誤下之亡隂矣大下之後復發汗小便不利者亡津液故也勿治之得小便利必自愈註大下之後復發其汗重亡津液小便當少以水液内竭故也勿治之言勿利其小便也湏俟津液回而小便利必自愈矣集註程知曰言下後復發汗有俟津液自回之法若强責其小便則膀胱之氣化不行有増鞕滿喘脹者矣故宜以不治治之陽明病下血讝語者此為熱入血室但頭汗出者刺期門隨其實而瀉之濈然汗出則愈註婦人病傷寒經血適至則有熱入血室之證宜刺期門男子病傷寒有下血讝語者亦為熱入血室也若熱隨血去必通身汗出而解矣若血已止其熱不去蓄於陽明不得外越而上蒸但頭汗出而不解者亦當刺期門隨其實而瀉之則亦必通身濈然汗出而愈也集註方有執曰血室頭汗期門註皆見太陽篇中陽明之衇其直者從缺盆下乳内㢘下俠臍入氣街中血室之衇起於氣街上行至胸中而散所以婦人經來熱入血室則似結胸而讝語從陽明裏也男子下血熱入血室但頭汗出亦讝語從陽明外也故竝宜刺期門程應旄曰下血則經衇空虛熱得乘虚而入血室讝語以血室雖衝衇所屬而心經實血室之主室被熱擾故心神不清也但頭汗出者血下奪則無汗熱上擾則汗蒸也刺期門者熱入隂分實在隂隨其實而瀉之則榮氣和而心氣下通故濈然汗出而解陽明病口燥但欲潄水不欲嚥者此必衂註陽明屬胃開竅於口陽明有熱故口燥也但欲潄水不欲嚥者雖燥而不渴知熱在經而不在府在血而不在氣也熱在經血廹血妄行必致衂也集註喻昌曰口中乾燥與渴異潄水不欲嚥知不渴也陽明病口燥但潄水不欲嚥知邪入血分陽明之衇起於鼻故知血得熱而妄行必由鼻而出也沈明宗曰陽明病口燥潄水而不欲嚥乃邪欝於經未入於府也衇浮發熱口乾鼻燥能食者則衂註此承上條詳出衇證以互發其義也陽明病衇浮發熱口鼻乾燥熱在經也若其人能食則為胃和胃和則邪當還表作解也然還表作解不觧於衛則解於榮汗出而觧者從衛觧也衂血而觧者從榮觧也今既能食衂血則知欲從榮觧也集註張錫駒曰此論陽明經衇燥熱也夫熱在經衇故衇浮發熱熱循陽明經衇而上故口乾鼻燥不傷胃氣故能食能食者則衂言病不在胃府非因能食而致衂也陽明證其人喜忘者必有畜血所以然者本有乆瘀血故令喜忘屎雖鞕大便反易其色必黑者宜抵當湯下之註經曰血併於下亂而喜忘喜忘者好忘前言往事也今陽明病其人喜忘者本有乆瘀之血與熱上併於心故令喜忘也畜血之屎雖鞕然大便反易其色必黑葢以血與糟粕共併故反易而色黑也不用桃仁承氣湯而用抵當湯大下之者以其人本有乆瘀之血故也集註張志聰曰太陽畜血在膀胱故驗其小便之利與不利陽明畜血在腸胃故驗其大便之黑與不黑張璐曰大便色黑雖曰瘀血而燥結亦黒但瘀血則黏如漆燥結則晦如煤此為明辨也鄭重光曰太陽熱結膀胱證輕者如狂重者發狂如狂者血自下故用桃仁承氣湯因勢而利導之發狂者血不下湏用抵當湯此條喜忘差減於狂乃用發狂之重劑何也葢太陽經少血陽明經多血所以宜用抵當湯峻攻太陽云主之乃確然不易之法此云宜用則證有輕重在於臨時酌量耳病人無表裏證發熱七八日雖衇浮數者可下之假令已下衇數不觧合熱則消糓善饑至六七日不大便者有瘀血宜抵當湯若衇數不觧而下不止必協熱便膿血也註此承上條言畜血喜忘熱結而無表裏證者當下之義也病人無表裏證是無太陽表陽明裏證也但發熱而無惡寒七八日雖衇浮數不可汗也若屎鞕可下之假令已下衇不浮而數不解是表熱去裏熱未去也至六七日又不大便若不能消榖善饑是胃實熱也以大承氣湯下之今既能消穀善饑是胃和合熱非胃邪合熱故屎雖鞕色必黑乃有瘀血熱結之不大便也宜用抵當湯下之若衇數不觧不大便鞕而下利不止必有乆瘀協熱腐化而便膿血也則不宜用抵當湯下之矣集註張璐曰病雖七八日尚發熱衇浮數仍屬太陽表證因誤下引邪内入所以衇數不觧内外合邪而見消糓善饑穀入既多反至六七日不大便且不煩渇是知其證非熱結在胃乃熱結在血以其表證誤下尚兼太陽隨經之熱未盡故以抵當為至當也若衇數不觧而下利不止又當随其下血與不下血而異治之倘血分之熱邪不除必協熱而便膿血也傷寒發汗己身目為黄所以然者以寒濕在裏不觧故也以為不可下也於寒濕中求之註傷寒發汗己身目為黄所以然者以表有寒裏有濕未觧也夫表寒裏濕欝而發黄自非熱濕内瘀欝而成黄者比故不可下唯當於表寒裏濕中求其治法宜發其表寒利其裏濕可也集註喻昌曰傷寒發汗己熱邪觧矣何由反蒸身目為黄所以然者寒濕摶聚適在軀殻之裏故爾發黄也裏者在内之通稱非謂寒濕深入在裏葢身目正屬軀殻與藏府無關也於寒濕中求之求其寒濕中之治法也程應旄曰其人素有濕邪在裏表寒雖經發汗而其為裏濕所持者終在裏而無從觧散也發汗後之寒與濕欝蒸為熱非實熱也故不可下仍當於寒濕中責其或淺或深而治之可也傷寒瘀熱在裏身必發黄麻黄連軺赤小豆湯主之註傷寒表邪未觧適遇其人陽明素有濕邪熱入裏而與濕合濕熱蒸瘀外薄肌表身必發黄也若其人頭有汗小便不利大便鞕則或清或下或利小便自可愈也今乃無汗小便利是裏之瘀熱未深表之欝遏猶甚故用麻黄連軺赤小豆湯外發其表内逐其濕也集註喻昌曰傷寒之邪得濕而不行所以熱瘀身中而發黄設泥裏字豈有邪在裏而反治其表之理哉程應旄曰凡傷寒瘀熱在裏者由濕蒸而來故身必發黄此之瘀熱未深祗從表一邉開其欝滯而散除濕熱麻黄連軺赤小豆湯是其主也林瀾曰麻黄連軺一證雖曰在裏必因邪氣在表之時有失觧散今雖發黄猶宜兼汗觧以治之也汪琥曰夫寒邪自外而來若挾内濕瘀於經絡之中則欝而變熱故令其人身目發黄也此條乃是太陽經傳來者太陽傷寒理宜用麻黄湯祗因邪傳陽明熱瘀於裏裏非胃府以陽明經居太陽之裏即尚論篇所云軀殻之裏是也惟其裏有熱所以方中用麻黄湯而去桂枝之辛熱更加赤小豆薑棗之甘辛以祛散在表之寒濕復加連軺生梓白皮之苦寒以清觧肌裏之瘀熱也麻黄連軺赤小豆湯方麻黄二两去節赤小豆一升杏仁四十枚去皮尖生薑二兩切大棗十二枚擘甘草二兩炙生梓白皮一升切連軺二兩已上八味以潦水一斗先煮麻黄再沸去上沫内諸藥煮取三升分溫三服半日則盡方觧濕熱發黄無表裏證熱盛者清之小便不利者利之裏實者下之表實者汗之皆無非為病求去路也用麻黄湯以開其表使黄從外而散去桂枝者避其熱也佐薑棗者和其榮衛也加連軺梓皮以瀉其熱赤小豆以利其濕共成治表實發黄之效也連軺即連翹根無梓皮以茵蔯代之集觧周揚俊曰此亦两觧表裏法也故用外汗之藥必兼渗濕之味傷寒發黄者必其人太隂素有濕熱更兼寒邪未散兩邪相合因而蒸欝為黄也傷寒七八日身黄如橘子色小便不利腹㣲滿者茵蔯蒿湯主之註身黄濕熱之為病也濕盛於熱則黄色晦熱盛於濕則黄色明如橘子色者謂黄色明也傷寒七八日身黄色明小便不利其腹㣲滿此裏熱深也故以茵蔯蒿治疸病者為君佐以大黄使以梔子令濕熱從大小二便瀉出則身黄腹自可除矣集註唐不巖曰熏黄隂黄也橘子黄陽黄也程知曰此驅濕除熱法也傷寒七八日可下之時小便不利腹㣲滿可下之證兼以黄色鮮明則為三陽入裏之邪無疑故以茵蔯除濕梔子清熱用大黄以助其驅除此證之可下者猶必以除濕為主而不專取乎攻下有如此者茵蔯蒿湯方茵蔯蒿六兩梔子十四枚擘大黄二兩去皮右三味以水一斗二升先煮茵蔯減六升内二味煮取三升去滓分三服小便當利尿如皂莢汁狀色正赤一宿腹減黄從小便出也傷寒身黄發熱梔子蘖皮湯主之註傷寒身黄發熱者設有無汗之表宜用麻黄連軺赤小豆汗之可也若有成實之裏宜用茵蔯蒿湯下之亦可也今外無可汗之表證内無可下之裏證故惟宜以梔子蘖皮湯清之也集註林瀾曰傷寒身黄胃有瘀熱湏當下之此以發熱而熱未實故宜梔子蘖皮湯觧之汪琥曰身黄兼發熱者乃黄證中之發熱而非麻黄桂枝證之發熱也熱既欝而發黄雖表而非純乎表證但當清其欝以退其黄則發熱自愈魏荔彤曰此三條雖皆外寒挾濕之邪瘀而成熱之證然在表在裏濕勝熱勝尤當加意也豈可㮣以為裏證而混下耶梔子蘖皮湯方梔子十五枚擘甘草一兩炙黄蘖二兩右三味以水四升煮取一升半去滓分溫再服按此方之甘草當是茵蔯蒿必傳寫之誤也陽明病被火額上㣲汗出而小便不利者必發黄註陽明病無汗不以葛根湯發其汗而以火劫取汗致熱盛津乾引飲水停為熱上蒸故額上㣲汗出而周身反不得汗也若小便利則從燥化必煩渴宜白虎湯小便不利則從濕化必發黄宜茵蔯蒿湯集註喻昌曰陽明病濕停熱欝而煩渴有加勢必發黄然汗出熱從外越則黄可免小便多熱從下洩則黄可免若誤攻之其熱邪愈陷清液愈傷而汗與小便愈不可得矣誤火之則熱邪愈熾津液上奔額雖㣲汗而周身之汗與小便愈不可得矣發黄之變安能免乎程知曰太陽發黄由寒欝濕濕不得觧陽明發黄由濕瘀熱熱不得越故宜分經論治陽明病無汗小便不利心中懊憹者身必發黄註陽明病無汗以熱無從外越也小便不利濕不能下泄也心中懊憹濕瘀熱欝於裏也故身必發黄宜麻黄連軺赤小豆湯外發内利可也若經汗吐下後或小便利而心中懊憹者乃熱欝也非濕瘀也便鞕者宜調胃承氣湯下之便軟者宜梔子豉湯涌之可也集註方有執曰無汗小便不利則濕停懊憹濕停熱欝所以知必發黄也張璐曰外不得汗下不得溺而濕熱欝於胸中不得泄勢必蒸身為黄也陽明病面合色赤不可攻之必發熱色黄小便不利也註陽明經病面合當色赤是熱邪猶怫欝在經尚未入裏而成實也故雖不大便不可攻之若攻之則怫欝在經之邪不觧必令發熱色黄若其人裏燥小便利則同燥化當不發黄而必大便鞕矣集註方有執曰合應也赤熱色也胃熱上行面應赤色攻則亡津液故發熱色黄因小便不利也程知曰言熱在陽明之經不可攻也熱在於經陽氣怫欝在表也攻之則經中之熱未得表散必發熱色黄因小便不利也程應旄曰熱阻於肌膚之間故發熱而小便為之不利欝而成黄也陽明病發熱汗出此為熱越不能發黄也但頭汗出身無汗齊頸而還小便不利渴飲水漿者此為瘀熱在裏身必發黄茵蔯蒿湯主之註陽明病發熱汗出者此為熱越小便若利大便因鞕不能發黄也但頭汗出身無汗是陽明之熱不得外越而上蒸也小便不利濕蓄膀胱也渴飲水漿熱灼胃府也此為濕熱瘀蓄在裏外薄肌膚故身必發黄也茵蔯蒿湯主之者通利大小二便使濕熱從下竅而出也集註方有執曰越散也頭汗瘀熱發黄註皆見太陽篇中茵蔯逐濕瘀之黄梔子除胃家之熱大黄推壅塞之瘀三物者苦以泄熱泄熱則黄散矣程應旄曰頭汗出身無汗齊頸而還足徴陽熱之氣欝結於内而不得越故但上蒸於頭頭為諸陽之首故也氣不下達故小便不利府氣過燥故渴飲水漿瘀熱在裏指無汗言無汗而小便利者屬寒無汗而小便不利者屬濕熱兩邪交欝不能宣泄故盫而發黄觧熱除濕無如茵蔯梔子清上大黄滌下通身之熱得泄又何黄之不散耶傷寒衇浮而緩手足自溫者是為繫在太隂太隂者身當發黄若小便自利者不能發黄至七八日大便鞕者為陽明病也註此太隂轉屬陽明證也傷寒衇浮緩手足熱者太陽也今手足自溫非太陽證是為繫在太隂也然太隂衇當沉緩今衇浮緩乃太陽衇也證太隂而衇太陽是邪由太陽傳太隂也故曰繫在太隂也若小便自利者則不從太隂濕化而發黄至七八日大便鞕者則是從燥化此為陽明也集註程應旄曰陽明為病本於胃家實胃家之實不特三陽受邪能致其轉屬陽明即三隂受邪亦能致其轉屬陽明聊舉太隂一經例之衇浮而緩是為表衇然無發熱頭痛惡寒等外證而手足祗溫是邪不在表而在裏但入裏有隂陽之分湏以小便别之小便不利濕蒸熱瘀而發黄以其人胃中原無燥氣也小便自利者胃乾便鞕而成實以其胃中本有燥氣也病雖成於七八日而其始證却衇浮而緩手足自溫實是太隂轉屬而來也即太隂陽明推之少隂三大承氣證厥隂一小承氣證何非轉屬陽明之病哉魏荔彤曰病在太陽熱為濕欝團聚於裏必有歸著既不能發黄小便自利則邪何歸乎不得不歸之於萬物所歸之胃至於七八日小便自多大便自鞕而為陽明病矣傷寒轉繫陽明者其人濈然㣲汗出也註凡傷寒無論三隂三陽若轉繫陽明其人必有濈濈然㣲汗出之證始為轉屬陽明也太陽病吐之但太陽病當惡寒今反不惡寒不欲近衣此為吐之内煩也註太陽病吐之表觧者當不惡寒裏觧者亦不惡熱今反不惡寒不欲近衣者是惡熱也此由吐之後表觧裏不觧内生煩熱也葢無汗煩熱熱在表大青龍證也有汗煩熱熱在裏白虎湯證也吐下後心中懊憹無汗煩熱大便雖鞕熱猶在内梔子豉湯證也有汗煩熱大便已鞕熱悉入府調胃承氣湯證也今因吐後内生煩熱是為氣液已傷之虛煩非未經汗下之實煩也已上之法皆不可施惟宜用竹葉石膏湯於益氣生津中清熱寕煩可也集註張璐曰此以吐而傷胃中之液故内煩不欲近衣雖顯虚煩之證較關上衇細數而成虚熱脾胃兩傷者稍輕雖不致逆亦誤吐之過也太陽病當惡寒發熱今自汗出反不惡寒發熱關上衇細數者以醫吐之過也一二日吐之者腹中饑口不能食三四日吐之者不喜糜粥欲食冷食朝食暮吐以醫吐之所致也此為小逆按欲食冷食之下當有五六日吐之者六字若無此一句則不喜糜粥欲食冷食與朝食暮吐之文不相聫屬且以上文一二日三四日之文細玩之則可知必有五六日吐之一句由淺及深之謂也註太陽病不觧當惡寒發熱今自汗出不惡寒發熱是表已觧也關上衇細數胃不和也細者胃氣虚數者胃氣熱證衇不和詢其故知以醫吐之過也一二日病在太陽正氣未衰吐之者傷胃未深故腹中知饑口不能食也三四日病在陽明胃中已熱吐之者復傷津液故不喜糜粥欲食冷食也五六日病將轉入隂經正氣已衰吐之者胃中虛冷故朝食暮吐也此皆醫吐之所致尚在可治故曰此為小逆也集註程知曰本太陽病醫吐之則表邪乘虚傳入陽明傷動胃氣而關衇細數矣程應旄曰陽明之氣下行為順上行為逆以醫吐之所致則非脾胃夲來之病此為小逆更勿誤治使小逆變成大逆也食榖欲嘔屬陽明也呉茱萸湯主之得湯反劇者屬上焦也註食榖欲嘔屬陽明者以胃主受納也今胃中寒不能納榖故欲嘔也以呉茱萸湯温中降逆而止其嘔可也若得湯反劇者此必非中焦陽明之裏寒乃上焦太陽之表熱也呉茱萸氣味俱熱藥病不合故反劇也法當從太陽陽明合病不下利但嘔之例治之宜葛根加半夏湯集註方有執曰食榖欲嘔胃寒也故曰屬陽明言與惡寒嘔逆不同也上焦以膈言也病人衇數數為熱當消榖引食而反吐者此以發汗令陽氣㣲膈氣虚衇乃數也數為客熱不能消榖以胃中虚冷故吐也註病人衇數數為有熱則當消榖引食今食而反吐者盖以身熱衇數誤為表熱而發其汗因使其人陽氣㣲膈氣虚也不知此衇之數乃外邪客熱之數非胃中實熱之數也其不能消榖食而反吐者乃胃中本虛冷故耳集註程知曰此言汗後衇數吐食當責胃之陽虚也陽受氣於胸中發汗過多令陽氣㣲膈氣虚客熱外越故衇數也客熱不能消榖而吐者當責其胃之虚冷若因其數而投以清胃之藥則左矣程應旄曰見數衇而反吐者數為熱衇無力則為虚衇膈虚陽客於上不能下温故令胃中虚冷熱為客熱寒為真寒究其根由祗由發汗令陽氣㣲然則陽氣之珍重何如而可誤汗乎陽明病不能食攻其熱必噦所以然者胃中虚冷故也以其人本虚攻其熱必噦註陽明病不能食者為中寒即有衇數客熱上條既戒以不可汗此又言亦不可攻若攻其熱則寒其胃陽亦必作噦矣所以然者客熱雖除胃亦虚冷故也以其人本來胃虚故攻其熱必噦噦即乾嘔也集註方有執曰攻熱皆寒藥故知必噦胃中虚以不能食言此亦戒謹之意林瀾曰陽明譫語潮熱不能食者可攻由燥屎在内也乃亦有胃中虚冷不能食者湏詳别之未可便以不能食為實證也若誤攻之熱去噦作矣然則安得以陽明㮣為宜下哉若胃中虛冷不能食者飲水則噦註此承上條不攻亦噦之義也若其人胃中虚冷不能食者雖不攻其熱飲水則噦盖以胃既虚冷復得水寒故噦也宜理中湯加丁香呉茱萸温而降之可也集註喻昌曰表熱裏寒法當先救其裏太陽經中亦用四逆湯其在陽明更可知矣此條比前條虚寒更甚故不但攻其熱必噦即飲水亦噦也汪琥曰若胃中虛冷不能食飲水則水寒相搏氣逆而亦為噦矣法當大温趺陽衇浮浮則為虛浮虛相搏故令氣䭇言胃氣虛竭也衇滑則為噦此為醫咎責虛取實守空迫血衇浮鼻中燥者必衂血也註誤攻飲冷皆可致䭇固矣今趺陽胃衇浮而不大無力而虛則是胃虛與邪相搏即不誤下飲冷亦令䭇也若趺陽胃衇滑則為噦者乃熱氣壅􅊊之䭇非胃氣虛竭之䭇醫何可取實責虛以自取其咎耶若趺陽胃衇浮而鼻中燥者此熱據榮分榮熱迫血妄行必作衂也世有以噦為呃逆者不知噦即乾嘔也以其有噦噦之聲故又名噦也觀今病呃逆之人與飲冷水則氣自臍下衝上出口而作格兒格兒之聲聲長時止者為實可治聲短不已者為虛難治集註方有執曰此又出趺陽衇而以噦與衂言皆逼汗而不得汗之所致也咎過愆也責虚言求病於虚取實言反以虚為實而攻取之也血屬隂而為内守故曰守空迫血言劫汗也寸口衇浮大而醫反下之此為大逆浮則無血大則為寒寒氣相搏則為腸鳴醫乃不知而反飲冷水令汗大出水得寒氣冷必相搏其人必䭇按令汗大出四字當是衍文註寸口衇浮大指六衇皆浮大也六衇皆浮大則非陽明按之大衇乃太陽不按之大衇也醫反下之此為大逆則從前浮衇變而為無血之虛大衇變而為胃冷之遲虛寒相搏則為腸鳴醫乃不知而反與飲冷水其人得水寒之氣冷與虚相搏於胃中故必䭇也䭇者氣饐結有聲即今之呃逆也集註程知曰言邪氣在表妄下之變也寸口浮大而無鞕滿藏熱之證法應發汗若反下之此為大逆既經妄下則所謂浮者至於内空而無血所謂大者變為裏虛而有寒虛寒相搏則為腸鳴醫見衇大以為有熱飲以冷水欲以水寒勝熱而作汗裏先虛寒又得冷水與之相搏則冷結上焦必至咽噎塞而氣逆矣傷寒噦而腹滿視其前後知何部不利利之則愈註傷寒噦而不腹滿者為正氣虚呉茱萸湯證也噦而腹滿者為邪氣實視其二便何部不利利之則愈也集註成無己曰噦而腹滿氣上而不下也視其前後有不利者即利之以降其氣前部小便也後部大便也程知曰前部不利後人治以五苓後部不利後人治以承氣是也沈明宗曰邪傳於胃胃氣壅遏兩氣相搏氣逆上衝則為噦矣張錫駒曰傷寒至噦非胃氣敗即胃中寒然亦有裏實不通氣不得下洩反上逆而為噦者當詳辨之夫實則譫語虚則鄭聲鄭聲者重語也註譫語一證有虚有實實則譫語陽明熱甚上乘於心亂言無次其聲髙朗邪氣實也虛則鄭聲精神衰乏不能自主語言重複其聲㣲短正氣虚也集註戴元禮曰譫語屬陽鄭聲屬隂經曰實則譫語虛則鄭聲譫語者顛倒錯亂言出無倫常對空獨語如見鬼状鄭聲者鄭重頻煩語雖謬而諄諄不已老年人遇事則誶語不休以陽氣虛不精明也此譫語鄭聲虛實之所以不同也二者本不難辨但陽盛裏實與隂盛格陽皆能錯語湏以他證别之随證施治可也婁全善曰余用参耆歸术等劑治譫語得愈者甚多豈可不分虛實一㮣用黄連觧毒大小承氣等湯以治之乎按其所云亦鄭聲也張錫駒曰實則譫語者陽明燥熱甚而神昏氣亂故不避親疎妄言罵詈也虚則鄭聲者神氣虚而不能自主故聲音不正而語言重複也傷寒四五日衇沉而喘滿沉為在裏而反發其汗津液越出大便為難表虛裏實久則讝語註傷寒四五日入裏之時也衇沉而喘滿乃為在裏之喘滿而反發其汗津液越出則表虛也汗出胃乾大便為難則裏實也久則胃熱熾盛必發讝語也集註方有執曰越出謂枉道而出也張璐曰傷寒四五日正邪熱傳裏之時况見衇沉在裏之喘滿而反汗之必致燥結讝語矣盖燥結讝語頗似大承氣證此以過汗傷津而不致大實大滿腹痛祗宜小承氣為允當耳陽明病其人多汗以津液外出胃中燥大便必鞕鞕則讝語小承氣湯主之若一服讝語止者更莫復服註此詳上條以明其治也陽明病其人多汗以津液外出胃中乾燥大便必鞕久則讝語宜以小承氣湯主之若一服利讝語止慎不可更服也集註張璐曰多汗讝語下證急矣以其人汗出既多津液外耗故不宜大下但當略與小承氣湯和其胃氣讝語自止若過服反傷津液也沈明宗曰此汗多胃燥非同實治也汗出讝語者以有燥屎在胃中此為風也湏下者過經乃可下之下之若早語言必亂以表虛裏實故也下之愈宜大承氣湯註病自汗出而讝語者以素有燥屎在胃中此為太陽風邪之所傳也湏當下之然必湏太陽之邪已過陽明之經而入陽明之府乃可下之若下之早則裏熱未結不但熱去不盡且虛其中熱乘虛而上干於心語言必亂此表虛汗出裏實讝語所以必待過經入府而後下之則愈宜大承氣湯集註方有執曰過經謂寕遲遲非謂必待十三日後也程知曰此言讝語不當下早也既出汗矣而讝語則必有燥屎在胃此當屬風風為陽邪陽邪入裏故讝語然湏六七日乃可下之下之早則風邪未觧於表盡入於裏裏邪燥實語言更亂也陽明病譫語有潮熱反不能食者胃中必有燥屎五六枚也若能食者但鞕爾宜大承氣湯下之按宜大承氣湯下之句應在必有燥屎五六枚之下始合當用大承氣湯下之之義若但便鞕而用大承氣湯下之殊失仲景顧慮悞下慎下之㫖註陽明病譫語有潮熱反不能食者知胃中必有燥屎已結實也宜大承氣湯下之若能食者知胃将和但大便鞕耳當導之不可下也集註張璐曰此以能食不能食辨燥結之㣲甚也潮熱譫語皆胃中熱甚所致胃熱則能消榖今反不能食此必熱傷胃中津液氣化不能下行燥屎逆攻於胃之故宜大承氣湯急祛亢極之陽以救垂絶之隂若能食者胃中氣化自行熱邪不盛津液不致大傷大便雖鞕不久自行不必用藥反傷其氣也下利譫語者有燥屎也宜小承氣湯註下利裏虛譫語裏實若衇滑大證兼裏急知其中必有宿食也其下利之物又必稠粘臭穢知熱與宿食合而為之也此可決其有燥屎也宜以小承氣湯下之於此推之可知燥屎不在大便鞕與不鞕而在裏之急與不急便之臭與不臭也集註汪琥曰下利者腸胃之疾也若譫語則胃家實與厥隂無與乃腸中有燥屎不得下也治宜小承氣湯者此半利半結祗湏緩以攻之也又曰或問既下利矣則熱氣得以下泄何由而致譫語有燥屎也答曰此係陽明府實大熱之證胃中糟粕為邪所壅留著於内其未成鞕者或時得下其已成鞕者終不得出則燥屎為下利之根燥屎不得出則邪熱上乘於心所以譫語要之此證湏以手按臍腹當必堅痛方為有燥屎之徴直視譫語喘滿者死下利者亦死註上條下利譫語為可治此條下利譫語者死要知譫語不死於下利而死於直視也直視者精不注乎目也譫語者神不守乎心也已屬惡候加之喘滿陽上脱也故曰死下利隂下脱也故曰亦死也集註方有執曰直視精不榮於目也譫語神不主乎心也喘則陽争於上利則隂争於下胃中土也隂陽争奪於上下而中氣不守故無法可治而皆主死也發汗多若重發汗者亡其陽讝語衇短者死衇自和者不死註太陽病發汗過多不觧又復重發其汗以致氣液兩亡熱邪乘燥傳入陽明而生讝語讝語者胃熱陽也衇短者氣衰隂也陽病見隂衇為隂勝於陽故死也若衇不短為隂陽自和故不死也集註喻昌曰方註以此為太陽經脱簡不知太陽經無讝語之例必日久而兼陽明少陽方有讝語故此言太陽經得病時發汗過多及傳陽明時重發其汗因有亡陽而讝語之一證也亡陽之人所存者隂氣耳故神魂不定而妄見妄聞與熱邪乘心之候不同衇短則隂陽不附衇和則隂陽未離其生死但從衇定耳汪琥曰讝語者衇當大實或洪滑為自和自和者言衇與病不相背也病雖甚不死若讝語衇短為邪熱盛正氣衰乃陽證見隂衇也無法可施發汗多亡陽讝語者不可下與柴胡桂枝湯和其榮衛以通津液後自愈註此又承上條以出其治也譫語者屬陽明熱實可下之證也若發汗過多大亡氣液而發譫語者乃津枮致燥之譫語非熱甚内實之譫語不可下也裏有熱宜白虎加人参湯表不觧與柴胡桂枝湯和其榮衛以通津液後自愈也按發汗過多亡陽讝語以無大便鞕滿痛故不可下以無身寒汗出惡寒故不可温於此可知發太陽汗出過多致譫語者必無發熱汗出惡寒也發陽明汗出過多致譫語者必有潮熱惡熱不大便也此則發少陽汗多致譫語者即論中少陽不可發汗發汗則譫語是也然舍小柴胡湯别無治法若祗用柴胡又恐升散非亡陽所宜故合桂枝和其榮衛通其津液自可愈也陽明中風衇弦浮大而短氣腹都滿脇下及心痛久按之氣不通鼻乾不得汗嗜卧一身及面目悉黄小便難有潮熱時時噦耳前後腫刺之小差外不觧病過十日衇續浮者與小柴胡湯衇但浮無餘證者與麻黄湯若不尿腹滿加噦者不治按續浮之浮字當是弦字始與文義相屬則可與小柴胡湯若俱是浮字則上之浮既宜用小柴胡湯下之浮又如何用麻黄湯耶註中風傳陽明病太陽未罷衇當浮緩今衇弦浮大弦少陽衇也浮太陽衇也大陽明衇也衇既兼見證亦如之腹滿太陽陽明證也脇下及心痛久按之氣不通快少陽證也鼻乾陽明證也不得汗太陽證也嗜卧少隂證也面目悉黄太隂證也小便難太陽府證也潮熱陽明裏證也噦逆胃敗證也耳前後腫少陽證也短氣氣衰證也凡仲景立法無方之條皆是此等隂陽錯雜表裏混淆之證但教人俟其病勢所向乘機而施治也故用刺法待其小差若外病不觧已成危候如過十日衇續弦不浮者則邪機已向少陽可與小柴胡湯和之使陽明之邪從少陽而觧若衇但浮不大而無餘證者則邪機已向太陽當與麻黄湯汗之使陽明之邪從太陽而觧若已過十餘日病勢不減又不歸於胃而成實更加不尿腹滿噦甚等逆即有一二可下之證胃氣已敗不可治也集註程知曰此條全是表證未觧而無汗出燥渴之證故不可用白虎雖有潮熱而無鞕滿譫語濈濈汗出之證故不可用承氣不如俟氣之自回猶可漸引其邪從外出也程應旄曰此條證以不得汗三字為主故酌量於柴胡麻黄二湯間以通其久閉總是要得汗耳衇浮而芤浮為陽芤為隂浮芤相搏胃氣生熱其陽則絶註衇浮而芤浮為陽盛芤為隂虛陽盛則發熱隂虛則汗出二者相搏則胃氣生熱愈盛胃中津液立亡其陽則絶者言陽亡津液絶也集註方有執曰浮為氣上行故曰陽芤為血内損故曰隂胃中生熱者隂不足以和陽津液乾而成枯燥也張璐曰此言脾約當下不下則浮濇轉為浮芤津液竭而難下矣其陽則絶即陽絶於裏亡津液之互辭也趙良曰胃中陽熱亢甚脾無隂氣以和之孤陽無偶不至燔灼竭絶不止耳沈明宗曰此辨陽明津竭之衇也浮為邪氣强芤為隂血虚陽邪盛而隂血虚為浮芤相搏胃氣生熱故曰其陽則絶即亡津液之互詞也若見此衇當養津液不可便攻也陽明病反無汗而小便利二三日嘔而欬手足厥者必苦頭痛若不欬不嘔手足不厥者頭不痛註陽明病法多汗反無汗而小便利是寒氣内攻也至二三日嘔而欬寒邪上逆也手足厥者寒氣見於四支也氣上逆則欬而苦頭痛矣若不欬不嘔不厥則頭不痛此證之頭痛者標也欬逆手足厥者夲也集註程知曰無汗小便利嘔欬肢厥頭痛曷不謂太陽病盖初起無頭痛諸表證也此頭痛是二三日後嘔欬而厥所致非因頭痛致嘔欬而厥也嘔欬二證太陽少陽俱有之其表證未觧則屬太陽病其寒熱往來者則謂之少陽病也厥則厥隂有之但無嘔與欬也張璐曰陽明無汗嘔欬手足厥者得之榮衛俱傷而邪入深也然小便利則邪不在内而在外不在下而在上故知必苦頭痛仍宜小青龍主之若不嘔不欬不厥而小便利者邪必順水道而出豈有逆攻顛頂之理哉林瀾曰湏識陽明亦有手足厥證胃主四肢中虚氣寒所致也然頭苦痛而欬自與隂寒但厥者異矣此類數條最為難觧呉人駒曰嘔欬手足厥頭痛皆由反無汗之故也陽明病但頭眩不惡寒故能食而欬其人咽必痛若不欬者咽不痛註陽明病當惡熱不惡寒若從傷寒傳來則不能食今從中風傳來故能食也傷寒挾寒邪則有頭痛證今中風挾風邪則有頭眩證理固然也寒邪屬隂若兼飲則欬而嘔今不嘔而咽痛則以風屬陽邪風病則兼火故欬而咽痛以類相從也集註方有執曰眩風旋而目運也風故不惡寒能食欬逆氣也咽門胃之系也胃熱而氣逆攻咽則欬而咽傷也程知曰隂邪下行故無汗而小便利陽邪上行故不惡寒而頭眩寒則嘔不能食風則能食寒則頭痛風則咽痛是風寒入胃之辨也程應旄曰陽明以下行為順逆則上行故中寒則有頭痛證中風則有頭眩證以不惡寒而能食知其􅊊熱在裏也寒上攻能令欬其欬兼嘔故不能食而手足厥熱上攻亦令欬其欬不嘔故能食而咽痛以胃氣上通於肺而咽為胃府之門也夫咽痛惟少隂有之今以欬傷致痛若不欬則咽不痛况更有頭眩不惡寒之證益可辨其為陽明之􅊊熱也病人有寒復發汗胃中冷必吐蚘註病人有寒謂胃中寒也復發汗謂汗而復汗也胃寒復汗陽氣愈㣲胃中冷甚蚘不能安故必吐蚘也宜理中湯送烏梅丸可也集註程應旄曰汗生於榖精胃中陽氣所釀也有寒復發汗知胃陽不復存於内矣蚘何能安發汗後水藥不得入口為逆若更發汗必吐下不止按必吐下不止之下字當是衍文註此承上條誤而又誤必變而成逆也胃中虛冷夲因誤汗水藥不得入口入口即吐而為逆也若更發其汗則胃逆益甚不能司納不特水藥入口方吐且必無時而不吐逆也集註成無己曰汗後水藥不得入口為之吐逆發汗亡陽胃中虚冷也若更發汗則愈損陽氣胃氣大虚故吐不止程應旄曰發汗後見此者由未汗之先其人已是中虛而寒故一誤不堪再誤也衇浮而遲表熱裏寒下利清榖者四逆湯主之註陽明病衇浮而遲浮主表熱遲主裏寒今其證下利清榖則為裏寒太甚法當温之宜四逆湯主之集註汪琥曰陽明經病衇當從長今衇但浮此在表之熱凝也腑病衇當從數今衇過遲此在裏之寒甚也故見下利清榖其所利之榖食色不變氣不臭即完榖不化也此裏寒已極故與四逆湯也陽明病欲觧時從申至戌上註凡陽明病無論在經在府必乘其旺時而觧申酉戌陽明旺時也經氣旺則邪氣自退故觧也集註張志聰曰經云日西而陽氣衰陽明之所主也從申至戌上乃陽明主氣之時表裏之邪欲出必随旺時而觧音切奄音厭趺音夫摶音團屎音豕摸音莫捻音聶蘸荘陷切挺庭上聲繞音擾憒古對切怵勅律切疸音旦瘕匣牙切潄音瘦軺時饒切蘖音伯潦郎到切沸音芾尿同溺轉株戀切䭇音噎蚘音回御纂醫宗金鑑卷四欽定四庫全書御纂醫宗金鑑卷四訂正仲景全書傷寒論註辨陽明病衇證并治全篇陽明主裏内候胃中外候肌肉故有病經病府之分如論中身熱煩渴目痛鼻乾不得眠不惡寒反惡熱者此陽明經病也潮熱譫語手足腋下濈然汗出腹滿痛大便鞕者此陽明府病也而其候各有三經病則有邪已傳陽明而太陽之表未罷兼見頭痛惡寒無汗之太陽證者有太陽之邪已罷悉傳陽明但見壯熱有汗心煩不眠口渴引飲之陽明證者有陽明之邪未已復轉少陽兼見胸脇痛寒熱往來口苦而嘔目眩耳聾之少陽證者府病則有太陽陽明謂太陽病或發汗或吐或下或利小便亡其津液胃中乾燥太陽之邪乘胃燥而轉屬陽明致小便反數大便鞕者所為脾約是也有正陽陽明謂陽氣素盛或有宿食太陽之邪一傳陽明遂入胃府致大便不通者所為胃家實是也有少陽陽明謂病已到少陽法當和觧而反發汗利小便亡其津液胃中燥熱復轉屬陽明致大便結燥者所為大便難者是也其治陽明經病則以葛根湯或桂枝加葛根湯發之或以白虎湯清之或以柴胡白虎湯和之随其證而施之可也其治陽明府病雖均為可下然不無輕重之分故或以三承氣湯下之或麻仁丸通之或蜜煎膽汁導之量其病而治之可也此陽明病之大略也兹以在經在府二者詳疏於篇俾讀者易為分别則臨證施治自不紊矣陽明之為病胃家實是也註陽明經内以候胃外以候肌言陽明之為病由太陽之邪傳於其經則為陽明病外證由太陽之邪傳入胃府則為胃家實也集註方有執曰陽明經也胃府也實者大便結為鞕滿而不得出也雖則遲早不同而非日數所可拘也傷寒三日陽明衇大註傷寒一日太陽二日陽明三日少陽乃内經言傳經之次第非必以日數拘也此云三日陽明衇大者謂不兼太陽陽明之浮大亦不兼少陽陽明之弦大而正見正陽陽明之大衇也盖由去表傳裏邪熱入胃而成内實之診故其衇象有如此者集註方有執曰傷寒三日該中風而大約言也衇大者陽明氣血俱多也沈明宗曰此正陽明之正衇也仲景謂三日陽明衇大因陽明乃多氣多血之府風寒傳入邪盛於中故衇顯大是為陽明邪實之正衇但病陽明務具此衇方可下奪或兼太陽之浮緊少陽之弦細或遲疾滑濇虛弱乃屬氣血隂陽之虛雖見大實大滿亦當詳審顧慮或以小承氣湯試之或用蜜煎導法不得直施攻下也夲太陽初得病時發其汗汗先出不徹因轉屬陽明也註陽明之病夲自太陽初得病時發其汗汗先出而不透徹乃為汗不如法故未盡之邪因而轉屬陽明也邪在經則為外證邪入府則為胃家實矣集註方有執曰此言由發太陽汗不如法致病入胃之大意陽明病若能食名中風不能食名中寒註太陽之邪傳陽明病有自中風傳來者有自傷寒傳來者當於食之能否辨之若能食名中風是自中風傳來者以風乃陽邪陽能化榖故能食也不能食名中寒是自傷寒傳來者以寒乃隂邪不能化榖故不能食也集註方有執曰此以食之能否驗風寒之辨盖陽明主水榖風能食陽能化榖也寒不能食隂不殺榖也名猶言為也中寒即傷寒之互詞大意推原風寒自太陽傳來其辨驗有如此者非謂陽明自中而然也汪琥曰仲景云中寒與傷寒同義非真寒證也若係真中寒是胃家虛冷藥宜理中湯之類今不能食是胃氣實但邪未入府不作鬱熱耳因名中寒實與傷寒無異問曰陽明病外證云何答曰身熱汗自出不惡寒反惡熱也註陽明病有外證有内證潮熱自汗不大便内證也身熱汗自出不惡寒反惡熱外證也今汗自出是従中風傳來故與中風之外證同而身熱不惡寒反惡熱則知為陽明外證故不與中風外證同也然陽明之熱發於肌肉必蒸蒸而熱又不似太陽之陣陣發熱可知矣集註方有執曰此以太陽中風傳入陽明之外證言魏荔彤曰病有太陽中風不觧傳入陽明者何以辨之故設問曰陽明未知其裏之何時傳來必先驗其外之何所見證答曰太陽病有身熱汗自出而惡風者此太陽中風之夲證也若身熱汗自出竟不惡風寒而反惡熱則病已去太陽而入陽明矣此陽明病由太陽中風而傳入者也問曰病有得之一日不發熱而惡寒者何也答曰雖得之一日惡寒将自罷即自汗出而惡熱也註太陽病當惡寒陽明病當惡熱今陽明病有初得之一日不發熱而惡寒者是太陽去表之邪未盡故仍惡寒也然去表未盡之邪欲傳陽明不能久持故惡寒必將自罷即日當自汗出而惡熱矣集註方有執曰此以太陽傷寒傳入陽明之外證言程應旄曰陽明惡寒終是帯表至於府病則惡熱矣表之罷否湏於此驗之鄭重光曰此辨陽明傷寒之外證不發熱而惡寒起自傷寒也惡寒将自罷邪過表也即自汗出邪熱鬱於肌肉腠理開汗外洩也魏荔彤曰太陽傷寒亦有傳入陽明者又何以辨之故設問曰病有得之一日起初之時不見發熱而但見惡寒者何病也答曰得之一日惡寒雖為太陽傷寒之證而惡寒亦将自罷即自汗出而惡熱此是陽明病由太陽傷寒而傳入者也可知太陽中風則發熱惡風汗自出為正病太陽傷寒則惡寒無汗為正病若傳入陽明則必以汗出惡熱為正病也問曰惡寒何故自罷答曰陽明居中主土也萬物所歸無所復傳始雖惡寒二日即止此為陽明病也註此釋上條陽明惡寒自罷之義陽明屬胃居中土也土為萬物所歸故邪熱歸胃則無所復傳亦萬物歸土之義陽明初病一日雖仍惡寒是太陽之表未罷也至二日惡寒自止則是太陽之邪已悉歸併陽明此為陽明病也集註方有執曰惡寒二日自止者熱入裏而将惡熱此以正陽陽明言也程應旄曰六經雖分隂陽而宰之者胃五藏六府皆朝宗而稟令焉一有燥熱無論三陽傳來之邪從而化熱即三隂傳來之邪亦轉屬而變熱隂陽之邪皆歸胃土故曰萬物所歸無所復傳也問曰何縁得陽明病答曰太陽病若發汗若下若利小便此亡津液胃中乾燥因轉屬陽明不更衣内實大便難者此名陽明也註問曰何緣得陽明胃實之病答曰由邪在太陽時發汗若下若利小便皆為去邪而設治之誠當則邪觧而愈矣如其不當徒亡津液致令胃中乾燥則未盡之表邪乘其燥熱因而轉屬陽明為胃實之病者有三曰不更衣即太陽陽明脾約是也曰内實即正陽陽明胃家實是也曰大便難即少陽陽明大便難是也三者雖均為可下之證然不無輕重之别脾約自輕於大便難大便難自輕於胃家實盖病脾約大便難者毎因其人津液素虧或因汗下利小便施治失宜所致若胃實者則其人陽氣素盛胃有宿食即未經汗下而亦入胃成實也故已經汗下者為奪血致燥之陽明以滋燥為主未經汗下者為熱盛致燥之陽明以攻熱為急此三承氣湯脾約丸及蜜煎土𤓰根猪膽汁導法之所由分也集註方有執曰古人大便必更衣不更衣言不大便也程應旄曰轉屬層次不止有表罷不罷之分而表罷入裏復有燥實燥不實之辨所以有不更衣之陽明病有内實之陽明病有大便難之陽明病也其中有屬表屬裏所以下法有禁有宜受氣有裏實裏燥所以下法有應大應小汪琥曰或問太陽病若下矣則胃中之物已去縦亡津液胃中乾燥未必復成内實答云方其太陽初病時下之不當徒亡津液胃中之物去之不盡邪傳陽明而成燥糞故有内實之證問曰病有太陽陽明有正陽陽明有少陽陽明何謂也答曰太陽陽明者脾約是也正陽陽明者胃家實是也少陽陽明者發汗利小便已胃中燥煩實大便難是也註陽明可下之證不止於胃家實也其綱有三故又設問答以明之也太陽之邪乘胃燥熱傳入陽明謂之太陽陽明不更衣無所苦名脾約者是也太陽之邪乘胃宿食與燥熱結謂之正陽陽明不大便内實滿痛名胃家實者是也太陽之邪已到少陽法當和觧而反發汗利小便傷其津液少陽之邪復乘胃燥轉屬陽明謂之少陽陽明大便澁而難出名大便難者是也集註程知曰言三陽皆有入胃府之證也陽明為水榖之海中土為萬物所歸故三陽經皆能入其府邪自太陽傳入胃府者謂之太陽陽明即經所謂太陽病若吐若下若發汗後㣲煩小便數大便因鞕者是也由脾之斂約故用小承氣㣲下以和之邪自陽明經傳入胃府者謂之正陽陽明即經所謂發熱汗出胃中燥鞕讝語者是也乃胃中邪實故用大承氣以攻下之邪自少陽轉屬胃府者謂之少陽陽明即經所謂少陽不可發汗發汗則讝語此屬胃者是也係津液内竭故用麻仁丸潤下以和其津液也若三陽外證未除則陽明正治之法又不可用矣陽明病衇浮而緊者必潮熱發作有時但浮者必盜汗出按自汗是陽明證盜汗是少陽證盜汗當是自汗文義始屬註陽明病在經衇當浮長入府衇當實大今衇浮而緊潮熱有時者是陽明病而見太陽傷寒衇也則知是從傷寒傳來太陽傷寒之邪未罷必無汗故雖見陽明潮熱發作有時之證仍當從太陽陽明傷寒治之宜麻黄加葛根湯汗之若見潮熱發作有時之證而衇但浮不緊是陽明病而見太陽中風衇也則知是從中風傳來太陽中風之邪未罷必自汗出當從太陽陽明中風治之宜桂枝加葛根湯觧之集註沈明宗曰此陽明證而見太陽衇也衇浮而緊太陽表寒未罷之衇潮熱發作有時則陽明裏證已具但浮者太陽風傷衛衇故必汗出也陽明病衇遲汗出多㣲惡寒者表未觧也可發汗宜桂枝湯按汗出多之下當有發熱二字若無此二字衇遲汗出多㣲惡寒乃是表陽虛桂枝附子湯證也豈有用桂枝湯發汗之理乎必是傳寫之遺註陽明病衇當數大今衇遲汗出多設不發熱惡寒是太陽表邪已觧矣今發熱㣲惡寒是表猶未盡觧也故宜桂枝湯觧肌以發其汗使初入陽明之表邪仍還表而出也集註程知曰此言中風傳陽明表邪未觧仍宜用桂枝湯以觧肌也汪琥曰此太陽病初傳陽明經中有風邪也衇遲者太陽中風緩衇之所變傳至陽明邪将入裏故衇變遲汗出多者陽明熱而肌腠疎也㣲惡寒者在表風邪未盡也故仍從太陽中風例治之又曰雖從太陽例治但既云陽明病仲景法還宜用桂枝加葛根湯為是陽明病衇浮無汗而喘者發汗則愈宜麻黄湯註陽明病衇應浮大證應汗出今衇但浮表病衇也無汗而喘表實證也是太陽之邪未悉入陽明猶在表也當仍從太陽傷寒治之發汗則愈宜麻黄湯集註張璐曰陽明榮衛難辨辨之全藉於衇證風邪之衇傳至陽明自汗已多則緩去而遲在寒邪之衇傳至陽明發熱已甚則𦂳去而浮在此皆邪氣在經之徴若入府則遲者必數浮者必實矣設不數不實非胃實也必不勝攻下矣汪琥曰無汗而喘但浮不緊何以定其為陽明病必其人目痛鼻乾身熱不得眠故云陽明病也魏荔彤曰此太陽陽明之證入陽明未深故令其邪仍自表出不至歸於胃而無所復傳也陽衇㣲而汗出少者為自和也汗出多者為太過陽衇實因發其汗出多者亦為太過太過者為陽絶於裏亡津液大便因鞕也註此承上條互詳其衇以出其證也衇陽㣲謂衇浮無力而㣲也陽衇實謂衇浮有力而盛也凡中風傷寒衇陽㣲則熱㣲㣲熱蒸表作汗若汗出少者為自和欲觧汗出多者為太過不觧也陽衇實則熱盛因熱盛而發其汗出多者亦為太過汗出太過則陽極於裏亡津液大便囙鞕而成内實之證矣勢不得不用下法故欲發其汗者不可不早慮及此也集註喻昌曰陽㣲者中風之衇陽㣲緩也陽實者傷寒之衇陽𦂳實也陽絶即亡津液之互辭仲景每於亡津液者悉名無陽玩夲文陽絶於裏亡津液大便因鞕甚明傷寒發太陽膀胱經之汗即當顧慮陽氣以膀胱主氣化故也發陽明胃經之汗即當顧慮隂津以胃中藏津液故也所以陽明多有熱越之證謂胃中津液随熱而盡越於外汗出不止耳然則陽明病不論中風傷寒衇㣲衇實汗出少而邪将自觧汗出多則隂津易致竭絶也陽明病法多汗反無汗其身如蟲行皮中状者此以久虛故也註陽明病法當汗多反無汗其身如蟲行皮中状者以其人胃氣久虛邪􅊊於太陽之表陽明肌腠不能宣發作汗故也宜葛根湯小劑㣲汗和其肌表自可愈也集註汪琥曰按此條論仲景無治法常器之云可用桂枝加黄耆湯郭雍云宜用桂枝麻黄各半湯不知上二湯皆太陽經藥今係陽明無汗證仍宜用葛根湯主之魏荔彤曰陽明病法應多汗今反無汗但見身如蟲行皮中状者此邪熱欲出表作汗而正氣衰弱不能逹之也陽明病初欲食小便反不利大便自調其人骨節疼翕翕如有熱状奄然發狂濈然汗出而觧者此水不勝糓氣與汗共併衇緊則愈註陽明病初欲食知其從中風熱邪傳來也陽明受邪當小便數大便鞕今小便反不利大便自調知津未傷而胃自和不成裏實也既不成實則在經之邪夲輕可自愈也若其人骨節疼翕翕如有熱状是太陽之表未除也奄忽也忽然發狂濈然汗出而觧者盖以太陽傳來之邪夲輕陽明所受之邪自淺津未傷而胃自和仍當還表作觧也然必待發狂而觧者此胃中水氣不勝初欲食之糓氣糓氣長陽化熱水不勝熱釀汗共併而出所以發狂作觧也凡将汗觧衇必先浮今言衇𦂳則愈者亦邪還於表欲觧應見之衇也傷寒發熱無汗嘔不能食而反汗出濈濈然者是轉屬陽明也註傷寒發熱無汗嘔不能食為太陽之邪欲傳也若無汗為太陽陽明之表尚在汗之可也今反汗出濈濈然者是邪已轉屬陽明之府可下不可汗也集註成無已曰傷寒發熱無汗嘔不能食者太陽受病也若反汗出濈濈然者是太陽之邪轉屬陽明也故經曰陽明病法多汗方有執曰嘔不能食熱入胃也反汗出者肌肉著熱膚腠反開也程應旄曰太陽夲證現在而反汗出濈濈然者雖表證未罷已是轉屬陽明也濈濈連綿之意即俗云汗一身不了又一身是也傷寒衇浮發熱無汗其表不觧不可與白虎湯渴欲飲水無表證者白虎加人參湯主之註傷寒之邪傳入陽明衇浮發熱無汗其表不觧者雖有燥渴乃大青龍湯證不可與白虎湯即有陽明渴欲飲水熱證應與白虎者亦必審其無太陽表證始可與也加人參者以其衇浮不滑非有餘也且欲於大觧熱中速生其津液也集註鄭重光曰此申明用白虎湯之法以白虎但能觧熱而不觧表若稍帶外感有無汗惡寒身痛頭疼之表證慎不可用也白虎加人參湯方於白虎湯方内加人參三两餘依白虎湯方傷寒衇浮滑此以表有熱裏有寒白虎湯主之按王三陽云經文寒字當邪字觧亦熱也其說甚是若是寒字非白虎湯證矣註此言傷寒太陽證罷邪傳陽明表裏俱熱而未成胃實之病也衇浮滑者浮為表有熱之衇陽明表有熱當發熱汗出滑為裏有熱之衇陽明裏有熱當煩渴引飲故曰表有熱裏有熱也此為陽明表裏俱熱之證白虎乃觧陽明表裏俱熱之藥故主之也不加人參者以其未經汗吐下不虛故也集註程知曰滑則裏熱云浮滑則表裏俱熱矣大熱之氣得辛凉而觧猶之暑暍之令得金風而爽故清凉之劑以白虎名之又曰厥隂條中有傷寒衇滑而厥者裏有熱也白虎湯主之可證此條之非裏有寒矣魏荔彤曰此裏尚為經絡之裏非藏府之裏亦如衛為表榮為裏非指藏府而言也白虎湯方知母六兩石膏一觔碎甘草二兩炙粳米六合右四味以水一斗煮米熟湯成去滓温服一升日三服集觧柯琴曰陽明邪從熱化故不惡寒而惡熱熱蒸外越故熱汗出熱爍胃中故渴欲飲水邪盛而實故衇滑然猶在經故兼浮也葢陽明屬胃外主肌肉雖内外大熱而未實終非苦寒之味所宜也石膏辛寒辛能觧肌熱寒能勝胃火寒能沉内辛能走外此味兩擅内外之能故以為君知母苦潤苦以瀉火潤以滋燥故用為臣甘草粳米調和於中宫且能土中瀉火稼穡作甘寒劑得之緩其寒苦劑得之平其苦使二味為佐庶大寒大苦之品無傷損脾胃之慮也煮湯入胃輸脾歸肺水精四布大煩大渴可除矣白虎為西方金神取以名湯秋金得令而炎暑自觧方中有更加人參者亦補中益氣而生津也用以協和甘草粳米之補承制石膏知母之寒㵼火而土不傷乃操萬全之術者也病人煩熱汗出則觧又如瘧状日晡所發熱者屬陽明也衇實者宜下之衇浮虛者宜發汗下之與大承氣湯發汗宜桂枝湯註病人謂病太陽經中風傷寒之人也太陽病煩熱汗出則應觧矣今又寒熱如瘧状每至日晡所即發潮熱日晡者乃申酉陽明王時故曰屬陽明也證雖如此當審其果盡歸陽明耶抑或尚兼太陽也故又當以衇辨之若衇實者邪已入裏則汗出潮熱為陽明下證宜與大承氣湯下之若衇浮虛者邪尚在表則寒熱如瘧仍屬太陽當汗之證也宜與桂枝湯汗之集註程知曰病人得汗後煩熱觧太陽之邪将盡未盡其人復如瘧状日晡時發熱則邪入陽明審矣然雖已入陽明尚恐未離太陽故必重辨其衇衇實者可下若衇浮虛者仍是陽明兼太陽便宜汗而不宜下也太陽病若吐若下若發汗後㣲煩小便數大便因鞕者與小承氣湯和之愈註太陽病若吐若下若發汗後不觧入裏㣲煩者乃梔子豉湯證也今小便數大便因鞕是津液下奪也當與小承氣湯和之以其結熱未甚入裏未深也集註喻昌曰㣲煩小便數大便因鞕皆是邪漸入裏之機故用小承氣湯和之程應旄曰吐下汗後而見煩證徴之於大便鞕因非虛煩者比然煩既㣲而小便數當由胃家失潤燥氣客之使然胃雖實非大實也以小承氣湯取其和也非大攻也小承氣湯方大黄四两厚朴二两去皮炙枳實三枚大者炙已上三味以水四升煮取一升二合去滓分温二服初服湯當更衣不爾者盡飲之若更衣者勿服之趺陽衇浮而濇浮則胃氣强濇則小便數浮濇相搏大便則鞕其脾為約麻仁丸主之註趺陽胃經衇也趺陽衇浮而濇陽浮則胃氣强隂濇則小便數隂陽相搏則熱盛而液竭矣故大便則鞕也其名為約者謂脾為邪所約束不能為胃行其津液故名脾約也以麻仁丸主之養液潤燥清熱通幽其不敢恣行承氣者以衇濇故也集註程知曰言胃衇浮濇不可大攻宜用麻仁丸潤法也趺陽胃衇也在足跗上動衇應手浮則陽熱盛而胃强濇則隂津少而小便數脾主為胃行其津液者也胃陽强則脾隂弱不能為胃行其津液故約其食物如一二弹丸也此不當下而當潤之程應旄曰麻仁丸潤燥通幽傷寒不可恣行大承氣可知矣所以然者以其為太陽陽明非正陽陽明胃家實者比也推之少陽陽明其不可以正陽陽明胃家實之法治之更可知矣汪琥曰以胃强脾弱為脾約作觧盖以胃中之邪熱盛為陽强故衇浮脾家之津液少為隂弱故衇濇用麻仁丸者以瀉胃中之陽而扶脾之隂也麻仁丸方麻仁二升芍藥半觔枳實半觔大黄一觔去皮厚朴一觔去皮杏仁一升去皮尖熬别作脂右六味蜜合丸如桐子大飲服十丸日三服漸加以和為度集註方有執曰麻子杏仁能潤乾燥之堅枳實厚朴能導固結之滯芍藥歛液以輔潤大黄推陳以致新脾雖為約此能疏之傷寒吐後腹脹滿者與調胃承氣湯註傷寒吐後胸不脹滿而腹脹滿者是表邪已盡胃中壅熱故也宜與調胃承氣湯下其熱而和之以無鞕痛故不用大小承氣也集註程知曰言吐後腹脹滿宜調胃也熱在上焦則吐吐後腹脹滿則邪不在胸其為裏實可知然脹滿而不鞕痛自不宜用急下之法但與調胃承氣和其胃熱可耳内經云諸脹腹大皆屬於熱也程應旄曰吐傷津液燥氣不能下達遂成土欎是以腹脹滿用調胃承氣一奪其欎可耳調胃承氣湯方大黄四两去皮酒浸甘草二两炙芒消半升右三味以水三升煮取一升去滓内芒消更煮两沸少少温服之方解方名調胃承氣者有調和承順胃氣之義非若大小承氣専攻下也經曰熱􅁋於内治以鹹寒火􅁋於内治以苦寒君大黄之苦寒臣芒消之鹹寒二味並舉攻熱瀉火之力備矣恐其速下故佐甘草之緩又恐其過下故少少温服之其意在不峻而和也陽明病不吐不下心煩者可與調胃承氣湯註陽明病謂已傳陽明不吐不下心煩者謂未經吐下而心煩也其為熱盛實煩可知故與調胃承氣湯瀉熱而煩自除也集註成無已曰吐後心煩謂之内煩下後心煩謂之虛煩今陽明病不吐不下心煩則是胃有􅊊熱也與調胃承氣湯以下其欎熱喻昌曰胃氣及津液既不由吐下而傷則心煩明係胃中熱熾故可與調胃承氣湯陽明發熱汗多者急下之宜大承氣湯註陽明病不大便發熱汗多不止者雖無内實亦當急下之盖因陽氣大蒸於内恐致隂液暴亡於外故以全津液為急務也宜大承氣湯下之集註喻昌曰汗多則津液外滲加以發熱則津液盡随熱勢蒸蒸騰達於外更無他法以止其汗惟有急下一法引熱勢從大腸而出庶津液不致盡越於外耳程應旄曰此等之下皆為救隂而設不在奪實奪實之下可緩救隂之下不可緩沈明宗曰陽明裏實以潮熱㣲汗為正兹見發熱汗多乃裏熱熾盛之極蒸騰胃中津液盡越於外非亟奪其邪以救津液不可故宜大承氣湯急下也大承氣湯方大黄四两酒洗厚朴半觔炙去皮枳實五枚炙芒消三合右四味以水一斗先煮二物取五升去滓内大黄更煮取二升去滓内芒消更上㣲火一两沸分温再服得下餘勿服方解諸積熱結於裏而成滿痞燥實者均以大承氣湯下之也滿者腹脇滿急䐜脹故用厚朴以消氣壅痞者心下痞塞硬堅故用枳實以破氣結燥者腸中燥屎乾結故用芒消潤燥軟堅實者腹痛大便不通故用大黄攻積瀉熱然必審四證之輕重四藥之多少適其宜始可與也若邪重劑輕則邪氣不服邪輕劑重則正氣轉傷不可不慎也集解柯琴曰諸病皆因於氣穢物之不去由於氣之不順也故攻積之劑必用氣分之藥因以承氣名湯方分大小有二義焉厚朴倍大黄是氣藥為君名大承氣大黄倍厚朴是氣藥為臣名小承氣味多性猛制大其服欲令大瀉下也因名曰大味寡性緩制小其服欲㣲和胃氣也因名曰小且煎法更有妙義大承氣用水一斗煮朴枳取五升去滓内大黄再煮取二升内芒消何哉盖生者氣鋭而先行熟者氣純而和緩仲景欲使芒消先化燥屎大黄繼通地道而後枳朴除其痞滿若小承氣以三味同煎不分次第同一大黄而煎法不同此可見仲景㣲和之意也程知曰調胃承氣大黄用酒浸大承氣大黄用酒洗皆為芒消之鹹寒而以酒制之若小承氣不用芒消則亦不事酒浸洗矣陽明病下之心中懊憹而煩胃中有燥屎者可攻腹㣲滿初頭鞕後必溏不可攻之若有燥屎者宜大承氣湯註陽明病下之後心中懊憹而煩者若腹大滿不大便小便數知胃中未盡之燥屎復鞕也乃可攻之若腹㣲滿不可攻也誤攻必變脹滿不能食飲水則噦等逆矣若果有燥屎宜下者以大承氣湯下之集註方有執曰可攻以上以轉失氣言懊憹悔憹痛恨之意盖藥力不足以勝病燥鞕欲行而不能故曰可攻言當更服湯以促之也腹㣲滿以下以不轉失氣言頭鞕後溏裏熱輕也故曰不可攻之言當止湯勿服也程知曰言有燥屎即可大攻下也下後心中懊憹而煩者虛煩也當與梔子豉湯若胃有燥屎則非虛煩故可攻腹不甚滿則無必攻之法有燥屎則非先鞕後溏者也故可攻又曰便鞕與燥屎不同便鞕者大便實滿而鞕燥屎者胃中宿食因胃熱而結為燥丸之屎也故便鞕猶有用小承氣者若燥屎則無不用芒消之鹹寒也程應旄曰末句乃申可攻句以決治法得病二三日衇弱無太陽柴胡證煩躁心下鞕至四五日雖能食以小承氣湯少少與㣲和之令小安至六日與承氣湯一升若不大便六七日小便少者雖不能食但初頭鞕後必溏未定成鞕攻之必溏湏小便利屎定鞕乃可攻之宜大承氣湯註得病二三日無太陽少陽證煩躁心下鞕至四五日不大便若衇大屬正陽陽明胃實之證也下之無疑今衇弱雖胃和能食不可輕下祗可與小承氣湯少少與而㣲和之令其小安次日仍不大便繼與小承氣湯促之若六七日竟不大便而小便少者即不能食亦屬胃中尚未乾燥屎未定鞕如大攻之初見鞕復必溏也湏待小便利知屎定鞕乃可攻之宜大承氣湯集註方有熱曰太陽不言藥以有桂枝麻黄之不同也少陽言藥以専主柴胡也凡以此為文者皆互發也以無太少二經證故知此屬陽明以衇弱故宜㣲和至六日以下乃歴叙可攻不可攻之節度也程應旄曰能食以結在腸間而胃火自盛也先以小承氣湯少少與之和胃中之火令少安後以前藥増至一升去腸中之結既用小承氣矣而又減去分數接續投之以衇弱之胃其禀素虛而為日又未乆也張璐曰此段之能食不能食全與辨風寒强弱無渉言能食者不可以為胃强而輕下不能食者不可以為胃中有燥屎而輕下也陽明病衇遲雖汗出不惡寒者其身必重短氣腹滿而喘有潮熱者此外欲觧可攻裏也手足濈然汗出者此大便已鞕也大承氣湯主之若汗多㣲發熱惡寒者外未觧也其熱不潮未可與承氣湯若腹大滿不通者可與小承氣湯㣲和胃氣勿令大泄下註陽明病衇遲雖汗出不惡寒外證欲觧而衇不實尚未可攻也若其人身重熱困於體也短氣而喘熱壅於上也腹滿潮熱熱聚於中也手足濈然汗出大便已鞕熱結於下也斯為外邪已觧内實已成始可攻之主以大承氣湯可也若汗出㣲發熱惡寒者則外猶未觧也其熱不潮者裏猶未實也不可與承氣湯即有裏急腹大滿不通等證亦祗宜與小承氣湯㣲和胃氣勿令大泄下盖以衇遲故也集註方有執曰潮熱陽明王於申酉戌故熱作於此時如潮之有信也手足濈然而汗出者脾主四肢而胃為之合胃中燥實而蒸蒸騰達於四肢故曰大便已鞕也林瀾曰此節辨衇遲内結之或宜大承氣攻之或但可以小承氣㣲和之也陽明病衇遲證兼汗出不惡寒身重短氣腹滿而喘似屬可攻然必有潮熱者為外證已觧裏證已具手足濈然汗出者為大便已鞕主以大承氣湯攻之奚疑若汗出雖多猶見發熱惡寒則表尚在也其熱不潮汗亦非手足濈然之汗安可與承氣以攻之乎即腹大滿不通亦祗可與小承氣㣲和勿令大泄下此何以故衇遲便非必下之衇雖内結亦豈大承氣所宜哉陽明病潮熱大便㣲鞕者可與大承氣湯不鞕者不可與之若不大便六七日恐有燥屎欲知之法少與小承氣湯湯入腹中轉失氣者此有燥屎也乃可攻之若不轉失氣者此但初頭鞕後必溏不可攻之攻之必脹滿不能食也欲飲水者與水則噦其後發熱者必大便復鞕而少也以小承氣湯和之不轉失氣者慎不可攻也註陽明病潮熱大便㣲鞕者可與大承氣湯不鞕者不可與之也若不大便六七日恐有燥屎欲知之法少與小承氣湯湯入腹中轉失穢氣則為有燥屎乃可攻之若不轉失穢氣此但初頭鞕後必溏是尚未成鞕也不可攻之攻之必寒氣乘虛上逆脹滿不能食也欲飲水者得水則噦亦由虛寒之氣上逆不能化水而下輸也若其後所發潮熱不退必是大便再鞕但已經下後所鞕者無多祗以小承氣湯和之可也故凡服承氣湯不轉失氣者慎不可攻也此盖仲景戒人不可輕下之意集註方有執曰此以潮熱轉失氣次第而詳言之以决當下之候也轉失氣反屁出也脹滿藥寒之過也噦亦寒傷胃也復鞕而少者重下故也末句重致叮嚀之意喻昌曰若腹中氣仍不轉則不但用大承氣大差即小承氣亦差矣程知曰上條曰外欲觧可攻裏曰外未觧未可與承氣曰可與小承氣㣲和胃氣勿令大泄下此條曰可與曰不可與曰乃可攻之不可攻之曰少與小承氣曰以小承氣和之慎不可攻多少商量慎重之意故惟手足濈然汗出大便燥鞕者始主之以大承氣若小承氣猶是㣲和胃氣之法也汪琥曰轉失氣則知其人大便已鞕腸胃中燥熱之甚故其氣不外宣時轉而下不轉失氣則腸胃中雖有熱而滲孔未至於燥此但初頭鞕後必溏也陽明病讝語發潮熱衇滑而疾者小承氣湯主之因與承氣湯一升腹中轉失氣者更服一升若不轉失氣者勿更與之明日又不大便衇反㣲濇者裏虛也為難治不可更與承氣湯也註陽明病讝語潮熱衇滑而疾者是可攻之證衇也然無濈濈然之汗出與小便數大便鞕燥實等證則不可驟然攻之宜先與小承氣湯一升試之若腹中轉失穢氣則知腸中燥屎已鞕以藥少未能遽下所轉下者但屎之氣耳可更服一升促之自可下也若不轉失氣則勿更與服俟明日仍不大便診其衇仍滑疾則更服之今衇反見㣲濇則是裏虛無氣不能承送故為難治所以不可更與承氣湯也集註方有執曰滑以候食故為大便鞕之診疾者屬裏熱也㣲者陽氣不充無以運行濇者隂血不足無以潤送故曰陽㣲不可下無血不可下此之謂也張璐曰此條衇滑而疾有讝語潮熱而無鞕滿實證祗宜以小承氣湯下之下之而衇反㣲濇證變裏虛故為難治傷寒若吐若下後不觧不大便五六日上至十餘日日晡所發潮熱不惡寒獨語如見鬼状若劇者發則不識人循衣摸牀惕而不安㣲喘直視衇弦者生濇者死㣲者但發熱讝語者大承氣湯主之若一服利則止後服按趙嗣真曰活人書云弦者陽也濇者隂也陽病見陽衇者生在仲景衇法中弦濇屬隂不屬陽得無疑乎今觀夲文内衇弦者生之弦字當是滑字若是弦字弦為隂負之衇豈有必生之理惟滑衇為陽始有生理滑者通濇者塞凡物理皆以通為生塞為死玩上條衇滑而疾者小承氣主之衇㣲濇者裏虛為難治益見其誤註傷寒若吐若下後津液已亡而表不觧邪因入裏不大便五六日上至十餘日仍不大便日晡所發潮熱不惡寒者此乃表邪悉罷裏熱漸深也仍宜大承氣湯蕩盡餘邪以存隂液自可愈也若因循失下以致獨語如見鬼状病勢劇者則不識人循衣摸牀驚惕不安㣲喘直視見一切陽亢隂㣲孤陽無依神明擾亂之象當此之際惟診其衇滑者為實堪下則生濇者為虛難下則死若病勢㣲者但見潮熱譫語不大便之證而無前神昏等劇者宜以大承氣湯下之若一服利即止後服盖恐其過也按循衣摸牀危惡之候也一以隂氣未竭為可治如太陽中風火劫變逆捻衣摸牀小便利者生不利者死是也一以陽熱之極為可攻如陽明裏熱成實循衣摸牀衇滑者生濇者死是也大抵此證多生於汗吐下後陽氣大虛精神失守經曰四肢者諸陽之本也陽虛故四肢擾亂失所倚也以獨參湯救之汗多者以參耆湯厥冷者以參附湯治之愈者不少不可概謂陽極隂竭也集註喻昌曰此條舉譫語之勢重者為言而勢重之中復分二等劇者主死㣲者主生故以大承氣湯下之程知曰婁全善治循衣摸牀每以補益得愈亦因其衇證之不足也劉守真每以承氣治熱病法雖祖於仲景而辨證其未能如此詳悉故開後人鹵莽之端又曰喘則氣欲上脫㣲喘者邪實於内而又不能大喘也不識人循衣摸牀心欲絶也動惕不安肝欲絶也㣲喘肺欲絶也直視腎欲絶也内經所謂三隂三陽五藏六府皆受病榮衛不行藏府不通故衇濇者死也汪琥曰日晡所發潮熱者府實燥甚故當其經氣王時發潮熱也獨語者即譫語也病人自言為譫獨語如見鬼状乃陽明府實而妄見妄聞劇者甚也成註云熱甚昬冒正氣故不識人循衣摸牀者陽熱偏勝而躁動於手也惕而不安者胃熱冲膈心神為之不寧也又胃熱甚而氣上逆則喘直視則邪干臟矣故其生死之機湏於衇候决之陽明病夲自汗出醫更重發汗病已差尚㣲煩不了了者此大便必鞕故也以亡津液胃中乾燥故令大便鞕當問其小便日幾行若夲小便日三四行今日再行故知大便不久出今為小便數少以津液當還入胃中故知不久必大便也註陽明病本應自汗出醫誤以為風邪更重發汗病已差尚㣲煩不了了者此大便必鞕故也然無或滿或痛之苦者以重汗亡津胃中乾燥故大便鞕本無宿食也則當問其小便日㡬行若本一日三四行今日祗再行可知大便不久則出盖小便數少則津液當還胃中故知不久必大便自出不湏藥也集註方有執曰水榖入胃其精者為津液粗者成樝滓水精滲出腸胃之外清者為津液濁者外而為汗下而為小便故汗與小便過多者皆能奪乎津液所以樝滓之為大便者乾燥結鞕而難出也然二便者水榖分行之道路此通則彼塞此塞則彼通小便出少則津液還停胃中必大便潤而自出也陽明病自汗出若發汗小便自利者此為津液内竭雖鞕不可攻之當湏自欲大便宜蜜煎導而通之若土𤓰根及大豬胆汁皆可為導註此承上條詳其義以明其治也陽明病自汗出或發汗小便自利者此為津液内竭雖大便鞕而無滿痛之苦不可攻之當待津液還胃自欲大便燥屎已至直腸難出肛門之時則用蜜煎潤竅滋燥導而利之或土𤓰根宣氣通燥或豬膽汁清熱潤燥皆可為引導法擇而用之可也集註成無已曰津液内竭腸胃乾燥大便因鞕此非結熱故不可攻宜以潤藥外治而導引之張璐曰凡係多汗傷津及屢經汗下不觧或尺中衇遲弱元氣素虛之人當攻而不可攻者並宜導法程應旄曰小便自利者津液未還入胃中津液内竭而鞕故自欲大便但苦不能出耳湏有此光景時方可従外導法漬潤其腸腸潤則水流就濕津液自歸還於胃故不但大便通而小便亦從内轉矣蜜煎導方蜜七合一味内銅器中㣲火煎之稍凝似飴状攪之勿令焦著欲可丸併手捻作挺子令頭鋭大如指長二寸許當熱時急作冷則硬以内榖道中以手急抱欲大便時乃去之内臺方用蜜五合煎凝時加皂角末五錢蘸捻作挺以豬膽汁或油潤榖道内之豬膽汁方大豬膽一枚瀉汁和法醋少許以灌榖道内如一食頃當大便出宿食惡物甚效内臺方不用醋以小竹管插入膽口留一頭用油潤内入榖道中以手将膽捻之其汁自入内此方用之甚便土𤓰根方缺按土𤓰即俗名赤雹也肘後方治大便不通採根搗汁用筒吹入肛門内此與上豬膽汁方同義内臺方用土𤓰根削如挺内入榖道中誤矣盖蜜挺入榖道能烊化而潤大便土𤓰根不能烊化如削挺用之恐失仲景製方之義傷寒六七日目中不了了睛不和無表裏證大便難身㣲熱者此為實也急下之宜大承氣湯註少隂病得之二三日口燥咽乾急下之宜大承氣湯者乃因熱勢甚速消灼腎水津液不能到咽故不必待其有可下之證而急下之是下其熱以救将絶之水緩則腎水乾竭陽必無依躁冒自焚而死也目中不了了而睛和者隂證也睛不和者陽證也今傷寒六七日目中不了了睛不和者是腎水為胃陽所竭水既不能制火則火上熏於目而眸子朦朧為之不了了也此熱結神昏之漸危惡之候也雖外無陽證惟身㣲熱内無滿痛祗大便難亦為熱實故曰此為實也急以大承氣湯下之瀉陽救隂以全未竭之水可也睛不和者謂睛不活動也集註方有執曰了了猶瞭瞭也素問曰陽明主肉其衇俠鼻絡於目靈樞曰足陽明之正上循咽出於口還繫目系合於陽明也又曰足陽明之筋其支者上頸上俠口合於頄下結於鼻上合於太陽太陽為目上綱陽明為目下綱所以目中不了了睛不和知胃實也急下者任衇循面入目督衇上繫两目中央諸衇皆屬於目而人之精神注焉是以宜急下也喻昌曰少隂有急下三法以救腎水一夲經水竭一木邪涌水一土邪凌水陽明亦有急下三法以救津液一汗多津越於外一腹滿津結於内一目睛不慧津枯於中合两經下法以觀病情生理如身在冰壺腹飲上池矣張錫駒曰陽火亢極隂水欲枯故使目中不了了而睛不和急下之所以抑亢極之陽火而救垂絶之隂水也魏荔彤曰陽明燥屎應下胃實應下俱詳考其衇證矣乃有表裏無他證獨於陽明胃衇所發見端倪䖏體認其證如傷寒六七日太陽已罷陽明已成其目昏暗朦昧若隔雲霧而不了了明白者此證名為睛不和也陽明熱盛循經絡而發其昏朦之象以致睛失其光此内熱盛而為實其機已兆兼以大便鞕而難身有㣲熱者則胃實已真故曰此為實也急下之宜大承氣湯病人小便不利大便乍難乍易時有㣲熱喘冒不能卧者有燥屎也宜大承氣湯註陽明病之人小便自利大便當鞕小便不利大便不鞕是知鞕不鞕不在熱不熱而在液之竭與不竭也今小便不利而大便乍難乍易者盖熱将欲作結而液未竭也有時㣲熱者熱入裏也喘者熱乘肺也冒者熱乘心也不能卧者熱併陽也此皆一派熱結便鞕之徴神昏譫狂之漸雖無滿痛亦必有燥屎宜大承氣湯下之自愈也集註王三陽曰此證不宜妄動必以手按之臍腹有鞕塊喘冒不能卧方可攻之何也乍難乍易故也林瀾曰既㣲熱時作喘冒不能卧則有燥屎已的自宜下逐裏實為急安可復以小便利屎定鞕始可攻之常法拘哉汪琥曰此條病未經下而有燥屎乃醫人不易識之證成無已云小便利則大便鞕此有燥屎乃理之常今病人小便不利大便乍難乍易何以知其有燥屎耶盖大實大滿之證則前後便皆不通大便為燥屎壅塞其未堅結者或有時而併出故乍易其極堅結者終著於大腸之中故乍難燥屎結積於下濁氣攻衝於上以故時有㣲熱㣲熱者熱伏於内不得發洩也後條辨云濁氣乘於心肺故既冒且喘也不得卧者胃有燥屎所擾即胃不和則卧不安也凡此者皆是有燥屎之徴故云宜大承氣湯病人不大便五六日繞臍痛煩躁發作有時者此有燥屎故使不大便也註病人不大便五六日繞臍痛者是腸胃中燥屎結無去路故繞臍痛也煩躁發作有時者是燥屎穢熱上攻則煩躁不攻則不煩躁故發作有時也不湏以小承氣湯試之直以大承氣湯下其燥屎大便利自可愈也集註方有執曰病人謂凡有病之人而證犯如此者則皆當如此治之此示人辨凡百胃實之大㫖也程應旄曰攻法必待有燥屎方不為誤攻所以驗燥屎之法不可不備無恃轉失氣之一端也病人雖不大便五六日屎之燥與不燥未可知也但繞臍痛則知腸胃乾屎無去路滯濇在一䖏而作痛煩躁發作有時者因屎氣攻動則煩躁發作又有時伏而不動亦不煩躁而有繞臍痛者斷其不大便當無差矣何大承氣湯之不可攻耶大下後六七日不大便煩不觧腹滿痛者此有燥屎也所以然者本有宿食故也宜大承氣湯註此承上條以明其治也下之未盡仍當下之乃大下之後六七日後不大便煩亦不觧腹仍滿痛者此有燥屎下之未盡也所以然者本有宿食故也宜大承氣湯復下之自愈也集註程知曰大下之後宜乎病觧矣乃復六七日不大便煩不觧而腹滿痛此必有燥屎未盡而然盖宿食因熱復為之結鞕也陽明病下之其外有熱手足温不結胸心中懊憹饑不能食但頭汗出者梔子豉湯主之註陽明經病下之身熱未除手足温不結胸者是所陷之邪淺也心中懊憹饑不能食但頭汗出者是陽邪蒸􅊊於胸膈間也故宜梔子豉湯涌其熱也集註程知曰其外有熱者經邪未觧也手足温者熱入未深也程應旄曰懊憹擾胃故饑不能食熱􅊊氣蒸故但頭汗出魏荔彤曰表邪未全入裏乃即以為胃實而遽下之則其外仍有熱究不能随下藥而蕩滌也於是雖熱而不潮手足雖温而無濈然之汗出則是在表者仍在表而下之徒傷其裏耳即不至於全在太陽者悞下成結胸而心下懊憹饑不能食但頭汗出其陽明蒸蒸之熱為隂寒之藥所􅊊俱凝塞於胸膈之上其證已昭然矣但病仍帯表既不可再下且已入裏又不可復發汗惟有主以梔子豉湯仍從太陽治也傷寒嘔多雖有陽明證不可攻之註傷寒三陽多有嘔證以其風寒之表未除胸中陽氣為寒所􅊊故皆不可攻下也其乾嘔而惡寒發熱者屬太陽也喜嘔而寒熱往來者屬少陽也今雖祗有惡熱不惡寒大便鞕之陽明證而嘔多亦不可攻之其氣逆在上而未歛為實也集註沈明宗曰惡寒發熱之嘔屬太陽寒熱往來之嘔屬少陽但惡熱不惡寒之嘔屬陽明然嘔多則氣已上逆邪氣偏侵上脘或帶少陽故雖有陽明證慎不可攻也陽明中風口苦咽乾腹滿㣲喘發熱惡寒衇浮而緊若下之則腹滿小便難也註陽明謂陽明裏證中風謂太陽表證也口苦咽乾少陽熱證也腹滿陽明熱證也㣲喘發熱惡寒太陽傷寒證也衇浮而𦂳傷寒衇也此為風寒兼傷表裏同病之證當審表裏施治太陽陽明病多則以桂枝加大黄湯两觧之少陽陽明病多則以大柴胡湯和而下之若惟從裏治而遽以腹滿一證為熱入陽明而下之則表邪乘虛復陷故腹更滿也裏熱愈竭其液故小便難也集註程知曰此言陽明兼有太陽少陽表邪即不可攻也陽明中風熱邪也腹滿而喘熱入裏矣然喘而㣲則未全入裏也發熱惡寒衇浮而緊皆太陽未除之證口苦咽乾為有少陽之半表半裏若誤下之則表邪乘虛内陷而腹益滿矣兼以重亡津液故小便難也程應旄曰此條與太陽大青龍證同太陽以風寒持其榮衛故有煩躁證而無腹滿證此以風寒持住陽明故有腹滿證而無煩躁證然口苦咽乾實與煩躁同其機兆也陽明病衇浮而緊咽燥口苦腹滿而喘發熱汗出不惡寒反惡熱身重若發汗則躁心憒憒反讝語若加温鍼必怵惕煩躁不得眠若下之則胃中空虛客氣動膈心中懊憹舌上胎者梔子豉湯主之若渴欲飲水口乾舌燥者白虎加人參湯主之若衇浮發熱渴欲飲水小便不利者猪苓湯主之陽明病汗出多而渴者不可與猪苓湯以汗多胃中燥猪苓湯復利其小便故也註此承前條互發其義以明其治也前條表證居多戒不可誤下此條表裏混淆衇證錯雜不但不可誤下亦不可誤汗也若以衇浮而𦂳誤發其汗則奪液傷隂或加燒鍼必益助陽邪故讝語煩躁怵惕憒亂不眠也或以證之腹滿惡熱而誤下之則胃中空虛客氣邪熱擾動胸膈心中懊憹舌上生胎是皆誤下之過宜以梔子䜴湯一涌而可安也若衇浮不𦂳證無懊憹惟發熱渴欲飲水口乾舌燥者為太陽表邪已衰陽明燥熱正甚宜白虎加人參湯滋液以生津若發熱渴欲飲水小便不利者是陽明飲熱並盛宜豬苓湯利水以滋乾然陽明病法當多汗因汗出多致小便少而渴者不可與豬苓湯盖以汗多胃燥無水不能下行乃水涸之小便少非水蓄之小便不利也恐豬苓湯更利其小便則益竭津液而助燥矣按太陽病煩熱無汗而渴小便利者大青龍湯證也小便不利者小青龍湯去半夏加花粉茯苓證也太陽病煩熱有汗而渴小便利者桂枝合白虎湯證也小便不利者五苓散證陽明病煩熱無汗而渴小便利者宜葛根湯加石膏主之小便不利者以五苓散加石膏寒水石滑石主之陽明病煩熱有汗而渴小便利者宜白虎湯小便不利者以豬苓湯少陽病寒熱無汗而渴小便利者當以小柴胡湯去半夏加花粉小便不利者當以小柴胡湯加茯苓太隂無渴少隂陽邪煩嘔小便赤而渴者以豬苓湯少隂隂邪下利小便白而渴者以真武湯厥隂陽邪消渴者白虎加人參湯厥隂隂邪轉屬陽明渴欲飲水者少少與之則愈證既不同法亦各異當詳審而明辨之集註喻昌曰發熱以上與前條同而汗出不惡寒反惡熱身重四者皆陽明之見證所以汗下燒鍼俱不可用舌上胎則膈熱甚故湧以梔子豉而徹去其膈熱斯治太陽而無碍陽明矣若前證更加口乾舌燥則宜用白虎湯以觧熱生津更加小便不利則宜以豬苓湯以導熱滋乾也其汗多而渴不可與豬苓湯者以熱邪傳入陽明必先耗其津液加以汗多復奪之於外又利小便更奪之於下則津液有立亡之患故示戒也程應旄曰熱在上焦故用梔子豉湯熱在中焦故用白虎加人參湯熱在下焦故用豬苓湯豬苓湯方豬苓去皮茯苓阿膠澤瀉滑石各一兩碎右五味以水四升先煮四味取二升去滓内阿膠烊消温服七合日三服集觧趙羽皇曰仲景製豬苓一湯以行陽明少隂二經水熱然其㫖全在益隂不専利水盖傷寒表虛最忌亡陽而裏虛又患亡隂亡隂者亡腎中之隂與胃家之津液也故隂虛之人不但大便不可輕動即小水亦忌下通倘隂虛過於滲利則津液反致耗竭方中阿膠質膏養隂而滋燥滑石性滑去熱而利水佐以二苓之滲瀉既疏濁熱而不留其壅瘀亦潤真隂而不苦其枯燥是利水而不傷隂之善劑也故利水之法於太陽用五苓者以太陽職司寒水故加桂以温之是煖腎以行水也於陽明少隂用豬苓者以二經兩闗津液特用阿膠滑石以潤之是滋養無形以行有形也利水雖同寒温逈别惟明者知之衇浮而大心下反鞕有熱屬藏者攻之不令發汗屬府者不令溲數溲數則大便鞕汗多則熱愈汗少則便難衇遲尚未可攻註屬藏謂屬裏也屬府謂屬表也溲謂小便也衇浮而大太陽陽明衇也浮屬表大屬裏今太陽衇浮之表未觧而心下反鞕陽明之裏又急權乎汗下可也設裏有熱實攻之無疑不湏先汗以觧外也如無熱實而有衇浮之表不但不令攻之即小便不利亦不令利小便仍當觧外也盖恐溲數汗多亡其津液致大便鞕則熱愈實也若汗少衇遲即有便鞕裏尚未實亦未可攻也集註王肯堂曰論言衇浮大反發汗反下之為逆此以心下鞕有熱知傳邪入裏故舍衇而從證也大便則許攻之小便則不許利何也曰攻大便則内熱除利小便則津液傷也林瀾曰心下鞕與腹鞕滿不同腹鞕邪已結聚成實此但在心下自與非下不可者異矣腑與臟對舉而言見一為入裏一猶屬表之義也陽明病衇遲食難用飽飽則㣲煩頭眩必小便難此欲作榖疸雖下之腹滿如故所以然者衇遲故也註陽明病不更衣已食如饑食輒腹滿衇數者則為胃熱可下證也今衇遲遲為中寒中寒不能化榖所以雖饑欲食食難用飽飽則煩悶是健運失度也清者阻於上升故頭眩濁者阻於下降故小便難食􅊊濕瘀此欲作榖疸之徴非陽明熱濕腹滿發黄者比雖下之腹滿暫減頃復如故所以然者衇遲中寒故也集註方有執曰遲為寒不化榖故食難用飽濕􅊊而蒸氣逆而不下行故㣲煩頭眩小便難也疸黄病也榖疸水榖之濕蒸發而身黄也張璐曰下之腹滿如故盖腹滿已是邪陷衇遲則胃不實徒下其糟粕病既不除而反害之耳夫陽明證本當下陽明而至腹痛尤當急下獨此一證下之腹滿必如故者緣衇遲則胃氣空虛津液不充其滿不過虛熱内壅非結熱當下之比也可見衇遲胃虛不但下之無益即發汗利小便之法亦不可用惟當用和法如甘草乾薑湯先温其中然後少與調胃㣲和胃氣可也程應旄曰熱畜成黄之腹滿下之可去此則榖氣不得宣洩屬胃氣虛寒使然下之益虛其虛矣故腹滿如故陽明病若中寒者不能食小便不利手足濈然汗出此欲作固瘕必大便初鞕後溏所以然者以胃中冷水榖不别故也註陽明病内熱則不大便能食小便利手足濈然汗出是可下之證也今中寒不能食小便不利雖手足濈然汗出不可下也此為中寒欲作固瘕何以知之以大便必初鞕而後溏也所以然者胃中虛冷水榖不分故小便不利而大便必溏也按不能食與上條食難用飽同一不能腐熟水榖也小便不利與上條小便難同一不能下輸膀胱也惟手足濈然汗出與上條飽則㣲煩頭眩不同彼欲作榖疸此欲作固瘕皆胃中寒冷一以㣲煩頭眩陽在中上故不病瀉而病疸一以手足汗出陽在四肢故不病疸而病瀉也再上條中寒食難用飽無汗小便難欲作榖疸以其尚能少食㣲煩猶有陽氣故也此條中寒不能食手足冷汗小便不利欲作固瘕則是寒濕不化純隂故也固瘕者大瘕瀉也俗謂之溏瀉固者久而不止之謂也按人之汗以天地之雨名之隂陽和而後有雨陽亢則熱而雨少隂盛則寒而雨多人之汗亦若是也四肢手足屬土土主脾胃若衇大其汗蒸蒸而熱則為陽盛可下之證也若衇遲其汗漐漐而寒則為隂盛可温之證也集註程應旄曰水榖不别屬濕熱偏渗者多此㸃出胃中冷欲人知病夲於寒宜從寒治不在小便也太陽病寸緩闗浮尺弱其人發熱汗出復惡寒不嘔但心下痞者此以醫下之也如其不下者病人不惡寒而渴者此轉屬陽明也小便數者大便必鞕不更衣十日無所苦也渴欲飲水少少與之但以法救之渴者宜五苓散按但以法救之五字當是若小便不利方與上文小便數下文渴者之義相合此條病勢不急救之之文殊覺無謂必有遺誤王三陽亦云此䖏五苓散難用不然經文渴者之下當有闕文也註太陽病衇浮緩而弱中風衇也發熱汗出惡寒中風證也不嘔則裏氣和緣何而有心下痞證此必以醫下之故也如其不經醫下邪熱自傳於裏病人不惡寒而渴者此邪去太陽已轉屬陽明也若小便數者大便必鞕然使不更衣十餘日而無或滿或痛之苦是仍屬虛燥不實之鞕不可議下俟之可也如或渴欲飲水必是胃中乾燥當少少與之以滋其胃可耳其或小便不利而渴者是又為水停不化宜五苓散以導其所停之水矣盖病在膀胱故仍治太陽而不治陽明也集註張兼善曰十日不更衣而不用攻伐何也曰此非結熱雖不大便而無潮熱讝語可下之證當湏審慎勿以日數久而輒為攻下也喻昌曰寸緩闗浮尺弱發熱汗出惡寒純是太陽中風未罷之證設非誤下何得心下痞結耶如不誤下而太陽證必漸傳經乃至不惡寒而渴邪入陽明審矣然陽明津液既偏渗於小便則大腸失其潤而大便鞕與腸中熱結自是不同所以旬日不更衣無所苦也汪琥曰小便數大便鞕仲景論中何以無治法耶葢此正是仲景不湏用藥處俟其隂陽自和則小便漸少大便必自出也陽明病心下鞕滿者不可攻之攻之利遂不止者死利止者愈註此申上條痞鞕不更衣十日無所苦誤攻之變也陽明病非胃家實而心下鞕滿者不可攻之若攻之其人利不止者則正脫而死其人利自止者邪退則猶可愈也集註汪琥曰或問結胸證同是心下鞕滿又屬可下何也葢結胸證心下鞕滿而痛者為胃中實故可下此證不痛當是虛鞕虛滿與半夏瀉心湯之心下痞鞕畧同故云不可攻也諸虛者不可下下之則大渴求水者易愈惡水者劇註虛者下之是為重虚隂津消亡自然大渴其求水者陽氣猶存故易愈若惡水者陽氣已絶則難愈矣集註程應旄曰諸虛者陽津隂液必有所亡故下之則大渴求水者亡隂惡水者亡陽故有愈劇之分觀此知仲景慮誤下之助隂甚於慮誤下之亡隂矣大下之後復發汗小便不利者亡津液故也勿治之得小便利必自愈註大下之後復發其汗重亡津液小便當少以水液内竭故也勿治之言勿利其小便也湏俟津液回而小便利必自愈矣集註程知曰言下後復發汗有俟津液自回之法若强責其小便則膀胱之氣化不行有増鞕滿喘脹者矣故宜以不治治之陽明病下血讝語者此為熱入血室但頭汗出者刺期門隨其實而瀉之濈然汗出則愈註婦人病傷寒經血適至則有熱入血室之證宜刺期門男子病傷寒有下血讝語者亦為熱入血室也若熱隨血去必通身汗出而解矣若血已止其熱不去蓄於陽明不得外越而上蒸但頭汗出而不解者亦當刺期門隨其實而瀉之則亦必通身濈然汗出而愈也集註方有執曰血室頭汗期門註皆見太陽篇中陽明之衇其直者從缺盆下乳内㢘下俠臍入氣街中血室之衇起於氣街上行至胸中而散所以婦人經來熱入血室則似結胸而讝語從陽明裏也男子下血熱入血室但頭汗出亦讝語從陽明外也故竝宜刺期門程應旄曰下血則經衇空虛熱得乘虚而入血室讝語以血室雖衝衇所屬而心經實血室之主室被熱擾故心神不清也但頭汗出者血下奪則無汗熱上擾則汗蒸也刺期門者熱入隂分實在隂隨其實而瀉之則榮氣和而心氣下通故濈然汗出而解陽明病口燥但欲潄水不欲嚥者此必衂註陽明屬胃開竅於口陽明有熱故口燥也但欲潄水不欲嚥者雖燥而不渴知熱在經而不在府在血而不在氣也熱在經血廹血妄行必致衂也集註喻昌曰口中乾燥與渴異潄水不欲嚥知不渴也陽明病口燥但潄水不欲嚥知邪入血分陽明之衇起於鼻故知血得熱而妄行必由鼻而出也沈明宗曰陽明病口燥潄水而不欲嚥乃邪欝於經未入於府也衇浮發熱口乾鼻燥能食者則衂註此承上條詳出衇證以互發其義也陽明病衇浮發熱口鼻乾燥熱在經也若其人能食則為胃和胃和則邪當還表作解也然還表作解不觧於衛則解於榮汗出而觧者從衛觧也衂血而觧者從榮觧也今既能食衂血則知欲從榮觧也集註張錫駒曰此論陽明經衇燥熱也夫熱在經衇故衇浮發熱熱循陽明經衇而上故口乾鼻燥不傷胃氣故能食能食者則衂言病不在胃府非因能食而致衂也陽明證其人喜忘者必有畜血所以然者本有乆瘀血故令喜忘屎雖鞕大便反易其色必黑者宜抵當湯下之註經曰血併於下亂而喜忘喜忘者好忘前言往事也今陽明病其人喜忘者本有乆瘀之血與熱上併於心故令喜忘也畜血之屎雖鞕然大便反易其色必黑葢以血與糟粕共併故反易而色黑也不用桃仁承氣湯而用抵當湯大下之者以其人本有乆瘀之血故也集註張志聰曰太陽畜血在膀胱故驗其小便之利與不利陽明畜血在腸胃故驗其大便之黑與不黑張璐曰大便色黑雖曰瘀血而燥結亦黒但瘀血則黏如漆燥結則晦如煤此為明辨也鄭重光曰太陽熱結膀胱證輕者如狂重者發狂如狂者血自下故用桃仁承氣湯因勢而利導之發狂者血不下湏用抵當湯此條喜忘差減於狂乃用發狂之重劑何也葢太陽經少血陽明經多血所以宜用抵當湯峻攻太陽云主之乃確然不易之法此云宜用則證有輕重在於臨時酌量耳病人無表裏證發熱七八日雖衇浮數者可下之假令已下衇數不觧合熱則消糓善饑至六七日不大便者有瘀血宜抵當湯若衇數不觧而下不止必協熱便膿血也註此承上條言畜血喜忘熱結而無表裏證者當下之義也病人無表裏證是無太陽表陽明裏證也但發熱而無惡寒七八日雖衇浮數不可汗也若屎鞕可下之假令已下衇不浮而數不解是表熱去裏熱未去也至六七日又不大便若不能消榖善饑是胃實熱也以大承氣湯下之今既能消穀善饑是胃和合熱非胃邪合熱故屎雖鞕色必黑乃有瘀血熱結之不大便也宜用抵當湯下之若衇數不觧不大便鞕而下利不止必有乆瘀協熱腐化而便膿血也則不宜用抵當湯下之矣集註張璐曰病雖七八日尚發熱衇浮數仍屬太陽表證因誤下引邪内入所以衇數不觧内外合邪而見消糓善饑穀入既多反至六七日不大便且不煩渇是知其證非熱結在胃乃熱結在血以其表證誤下尚兼太陽隨經之熱未盡故以抵當為至當也若衇數不觧而下利不止又當随其下血與不下血而異治之倘血分之熱邪不除必協熱而便膿血也傷寒發汗己身目為黄所以然者以寒濕在裏不觧故也以為不可下也於寒濕中求之註傷寒發汗己身目為黄所以然者以表有寒裏有濕未觧也夫表寒裏濕欝而發黄自非熱濕内瘀欝而成黄者比故不可下唯當於表寒裏濕中求其治法宜發其表寒利其裏濕可也集註喻昌曰傷寒發汗己熱邪觧矣何由反蒸身目為黄所以然者寒濕摶聚適在軀殻之裏故爾發黄也裏者在内之通稱非謂寒濕深入在裏葢身目正屬軀殻與藏府無關也於寒濕中求之求其寒濕中之治法也程應旄曰其人素有濕邪在裏表寒雖經發汗而其為裏濕所持者終在裏而無從觧散也發汗後之寒與濕欝蒸為熱非實熱也故不可下仍當於寒濕中責其或淺或深而治之可也傷寒瘀熱在裏身必發黄麻黄連軺赤小豆湯主之註傷寒表邪未觧適遇其人陽明素有濕邪熱入裏而與濕合濕熱蒸瘀外薄肌表身必發黄也若其人頭有汗小便不利大便鞕則或清或下或利小便自可愈也今乃無汗小便利是裏之瘀熱未深表之欝遏猶甚故用麻黄連軺赤小豆湯外發其表内逐其濕也集註喻昌曰傷寒之邪得濕而不行所以熱瘀身中而發黄設泥裏字豈有邪在裏而反治其表之理哉程應旄曰凡傷寒瘀熱在裏者由濕蒸而來故身必發黄此之瘀熱未深祗從表一邉開其欝滯而散除濕熱麻黄連軺赤小豆湯是其主也林瀾曰麻黄連軺一證雖曰在裏必因邪氣在表之時有失觧散今雖發黄猶宜兼汗觧以治之也汪琥曰夫寒邪自外而來若挾内濕瘀於經絡之中則欝而變熱故令其人身目發黄也此條乃是太陽經傳來者太陽傷寒理宜用麻黄湯祗因邪傳陽明熱瘀於裏裏非胃府以陽明經居太陽之裏即尚論篇所云軀殻之裏是也惟其裏有熱所以方中用麻黄湯而去桂枝之辛熱更加赤小豆薑棗之甘辛以祛散在表之寒濕復加連軺生梓白皮之苦寒以清觧肌裏之瘀熱也麻黄連軺赤小豆湯方麻黄二两去節赤小豆一升杏仁四十枚去皮尖生薑二兩切大棗十二枚擘甘草二兩炙生梓白皮一升切連軺二兩已上八味以潦水一斗先煮麻黄再沸去上沫内諸藥煮取三升分溫三服半日則盡方觧濕熱發黄無表裏證熱盛者清之小便不利者利之裏實者下之表實者汗之皆無非為病求去路也用麻黄湯以開其表使黄從外而散去桂枝者避其熱也佐薑棗者和其榮衛也加連軺梓皮以瀉其熱赤小豆以利其濕共成治表實發黄之效也連軺即連翹根無梓皮以茵蔯代之集觧周揚俊曰此亦两觧表裏法也故用外汗之藥必兼渗濕之味傷寒發黄者必其人太隂素有濕熱更兼寒邪未散兩邪相合因而蒸欝為黄也傷寒七八日身黄如橘子色小便不利腹㣲滿者茵蔯蒿湯主之註身黄濕熱之為病也濕盛於熱則黄色晦熱盛於濕則黄色明如橘子色者謂黄色明也傷寒七八日身黄色明小便不利其腹㣲滿此裏熱深也故以茵蔯蒿治疸病者為君佐以大黄使以梔子令濕熱從大小二便瀉出則身黄腹自可除矣集註唐不巖曰熏黄隂黄也橘子黄陽黄也程知曰此驅濕除熱法也傷寒七八日可下之時小便不利腹㣲滿可下之證兼以黄色鮮明則為三陽入裏之邪無疑故以茵蔯除濕梔子清熱用大黄以助其驅除此證之可下者猶必以除濕為主而不專取乎攻下有如此者茵蔯蒿湯方茵蔯蒿六兩梔子十四枚擘大黄二兩去皮右三味以水一斗二升先煮茵蔯減六升内二味煮取三升去滓分三服小便當利尿如皂莢汁狀色正赤一宿腹減黄從小便出也傷寒身黄發熱梔子蘖皮湯主之註傷寒身黄發熱者設有無汗之表宜用麻黄連軺赤小豆汗之可也若有成實之裏宜用茵蔯蒿湯下之亦可也今外無可汗之表證内無可下之裏證故惟宜以梔子蘖皮湯清之也集註林瀾曰傷寒身黄胃有瘀熱湏當下之此以發熱而熱未實故宜梔子蘖皮湯觧之汪琥曰身黄兼發熱者乃黄證中之發熱而非麻黄桂枝證之發熱也熱既欝而發黄雖表而非純乎表證但當清其欝以退其黄則發熱自愈魏荔彤曰此三條雖皆外寒挾濕之邪瘀而成熱之證然在表在裏濕勝熱勝尤當加意也豈可㮣以為裏證而混下耶梔子蘖皮湯方梔子十五枚擘甘草一兩炙黄蘖二兩右三味以水四升煮取一升半去滓分溫再服按此方之甘草當是茵蔯蒿必傳寫之誤也陽明病被火額上㣲汗出而小便不利者必發黄註陽明病無汗不以葛根湯發其汗而以火劫取汗致熱盛津乾引飲水停為熱上蒸故額上㣲汗出而周身反不得汗也若小便利則從燥化必煩渴宜白虎湯小便不利則從濕化必發黄宜茵蔯蒿湯集註喻昌曰陽明病濕停熱欝而煩渴有加勢必發黄然汗出熱從外越則黄可免小便多熱從下洩則黄可免若誤攻之其熱邪愈陷清液愈傷而汗與小便愈不可得矣誤火之則熱邪愈熾津液上奔額雖㣲汗而周身之汗與小便愈不可得矣發黄之變安能免乎程知曰太陽發黄由寒欝濕濕不得觧陽明發黄由濕瘀熱熱不得越故宜分經論治陽明病無汗小便不利心中懊憹者身必發黄註陽明病無汗以熱無從外越也小便不利濕不能下泄也心中懊憹濕瘀熱欝於裏也故身必發黄宜麻黄連軺赤小豆湯外發内利可也若經汗吐下後或小便利而心中懊憹者乃熱欝也非濕瘀也便鞕者宜調胃承氣湯下之便軟者宜梔子豉湯涌之可也集註方有執曰無汗小便不利則濕停懊憹濕停熱欝所以知必發黄也張璐曰外不得汗下不得溺而濕熱欝於胸中不得泄勢必蒸身為黄也陽明病面合色赤不可攻之必發熱色黄小便不利也註陽明經病面合當色赤是熱邪猶怫欝在經尚未入裏而成實也故雖不大便不可攻之若攻之則怫欝在經之邪不觧必令發熱色黄若其人裏燥小便利則同燥化當不發黄而必大便鞕矣集註方有執曰合應也赤熱色也胃熱上行面應赤色攻則亡津液故發熱色黄因小便不利也程知曰言熱在陽明之經不可攻也熱在於經陽氣怫欝在表也攻之則經中之熱未得表散必發熱色黄因小便不利也程應旄曰熱阻於肌膚之間故發熱而小便為之不利欝而成黄也陽明病發熱汗出此為熱越不能發黄也但頭汗出身無汗齊頸而還小便不利渴飲水漿者此為瘀熱在裏身必發黄茵蔯蒿湯主之註陽明病發熱汗出者此為熱越小便若利大便因鞕不能發黄也但頭汗出身無汗是陽明之熱不得外越而上蒸也小便不利濕蓄膀胱也渴飲水漿熱灼胃府也此為濕熱瘀蓄在裏外薄肌膚故身必發黄也茵蔯蒿湯主之者通利大小二便使濕熱從下竅而出也集註方有執曰越散也頭汗瘀熱發黄註皆見太陽篇中茵蔯逐濕瘀之黄梔子除胃家之熱大黄推壅塞之瘀三物者苦以泄熱泄熱則黄散矣程應旄曰頭汗出身無汗齊頸而還足徴陽熱之氣欝結於内而不得越故但上蒸於頭頭為諸陽之首故也氣不下達故小便不利府氣過燥故渴飲水漿瘀熱在裏指無汗言無汗而小便利者屬寒無汗而小便不利者屬濕熱兩邪交欝不能宣泄故盫而發黄觧熱除濕無如茵蔯梔子清上大黄滌下通身之熱得泄又何黄之不散耶傷寒衇浮而緩手足自溫者是為繫在太隂太隂者身當發黄若小便自利者不能發黄至七八日大便鞕者為陽明病也註此太隂轉屬陽明證也傷寒衇浮緩手足熱者太陽也今手足自溫非太陽證是為繫在太隂也然太隂衇當沉緩今衇浮緩乃太陽衇也證太隂而衇太陽是邪由太陽傳太隂也故曰繫在太隂也若小便自利者則不從太隂濕化而發黄至七八日大便鞕者則是從燥化此為陽明也集註程應旄曰陽明為病本於胃家實胃家之實不特三陽受邪能致其轉屬陽明即三隂受邪亦能致其轉屬陽明聊舉太隂一經例之衇浮而緩是為表衇然無發熱頭痛惡寒等外證而手足祗溫是邪不在表而在裏但入裏有隂陽之分湏以小便别之小便不利濕蒸熱瘀而發黄以其人胃中原無燥氣也小便自利者胃乾便鞕而成實以其胃中本有燥氣也病雖成於七八日而其始證却衇浮而緩手足自溫實是太隂轉屬而來也即太隂陽明推之少隂三大承氣證厥隂一小承氣證何非轉屬陽明之病哉魏荔彤曰病在太陽熱為濕欝團聚於裏必有歸著既不能發黄小便自利則邪何歸乎不得不歸之於萬物所歸之胃至於七八日小便自多大便自鞕而為陽明病矣傷寒轉繫陽明者其人濈然㣲汗出也註凡傷寒無論三隂三陽若轉繫陽明其人必有濈濈然㣲汗出之證始為轉屬陽明也太陽病吐之但太陽病當惡寒今反不惡寒不欲近衣此為吐之内煩也註太陽病吐之表觧者當不惡寒裏觧者亦不惡熱今反不惡寒不欲近衣者是惡熱也此由吐之後表觧裏不觧内生煩熱也葢無汗煩熱熱在表大青龍證也有汗煩熱熱在裏白虎湯證也吐下後心中懊憹無汗煩熱大便雖鞕熱猶在内梔子豉湯證也有汗煩熱大便已鞕熱悉入府調胃承氣湯證也今因吐後内生煩熱是為氣液已傷之虛煩非未經汗下之實煩也已上之法皆不可施惟宜用竹葉石膏湯於益氣生津中清熱寕煩可也集註張璐曰此以吐而傷胃中之液故内煩不欲近衣雖顯虚煩之證較關上衇細數而成虚熱脾胃兩傷者稍輕雖不致逆亦誤吐之過也太陽病當惡寒發熱今自汗出反不惡寒發熱關上衇細數者以醫吐之過也一二日吐之者腹中饑口不能食三四日吐之者不喜糜粥欲食冷食朝食暮吐以醫吐之所致也此為小逆按欲食冷食之下當有五六日吐之者六字若無此一句則不喜糜粥欲食冷食與朝食暮吐之文不相聫屬且以上文一二日三四日之文細玩之則可知必有五六日吐之一句由淺及深之謂也註太陽病不觧當惡寒發熱今自汗出不惡寒發熱是表已觧也關上衇細數胃不和也細者胃氣虚數者胃氣熱證衇不和詢其故知以醫吐之過也一二日病在太陽正氣未衰吐之者傷胃未深故腹中知饑口不能食也三四日病在陽明胃中已熱吐之者復傷津液故不喜糜粥欲食冷食也五六日病將轉入隂經正氣已衰吐之者胃中虛冷故朝食暮吐也此皆醫吐之所致尚在可治故曰此為小逆也集註程知曰本太陽病醫吐之則表邪乘虚傳入陽明傷動胃氣而關衇細數矣程應旄曰陽明之氣下行為順上行為逆以醫吐之所致則非脾胃夲來之病此為小逆更勿誤治使小逆變成大逆也食榖欲嘔屬陽明也呉茱萸湯主之得湯反劇者屬上焦也註食榖欲嘔屬陽明者以胃主受納也今胃中寒不能納榖故欲嘔也以呉茱萸湯温中降逆而止其嘔可也若得湯反劇者此必非中焦陽明之裏寒乃上焦太陽之表熱也呉茱萸氣味俱熱藥病不合故反劇也法當從太陽陽明合病不下利但嘔之例治之宜葛根加半夏湯集註方有執曰食榖欲嘔胃寒也故曰屬陽明言與惡寒嘔逆不同也上焦以膈言也病人衇數數為熱當消榖引食而反吐者此以發汗令陽氣㣲膈氣虚衇乃數也數為客熱不能消榖以胃中虚冷故吐也註病人衇數數為有熱則當消榖引食今食而反吐者盖以身熱衇數誤為表熱而發其汗因使其人陽氣㣲膈氣虚也不知此衇之數乃外邪客熱之數非胃中實熱之數也其不能消榖食而反吐者乃胃中本虛冷故耳集註程知曰此言汗後衇數吐食當責胃之陽虚也陽受氣於胸中發汗過多令陽氣㣲膈氣虚客熱外越故衇數也客熱不能消榖而吐者當責其胃之虚冷若因其數而投以清胃之藥則左矣程應旄曰見數衇而反吐者數為熱衇無力則為虚衇膈虚陽客於上不能下温故令胃中虚冷熱為客熱寒為真寒究其根由祗由發汗令陽氣㣲然則陽氣之珍重何如而可誤汗乎陽明病不能食攻其熱必噦所以然者胃中虚冷故也以其人本虚攻其熱必噦註陽明病不能食者為中寒即有衇數客熱上條既戒以不可汗此又言亦不可攻若攻其熱則寒其胃陽亦必作噦矣所以然者客熱雖除胃亦虚冷故也以其人本來胃虚故攻其熱必噦噦即乾嘔也集註方有執曰攻熱皆寒藥故知必噦胃中虚以不能食言此亦戒謹之意林瀾曰陽明譫語潮熱不能食者可攻由燥屎在内也乃亦有胃中虚冷不能食者湏詳别之未可便以不能食為實證也若誤攻之熱去噦作矣然則安得以陽明㮣為宜下哉若胃中虛冷不能食者飲水則噦註此承上條不攻亦噦之義也若其人胃中虚冷不能食者雖不攻其熱飲水則噦盖以胃既虚冷復得水寒故噦也宜理中湯加丁香呉茱萸温而降之可也集註喻昌曰表熱裏寒法當先救其裏太陽經中亦用四逆湯其在陽明更可知矣此條比前條虚寒更甚故不但攻其熱必噦即飲水亦噦也汪琥曰若胃中虛冷不能食飲水則水寒相搏氣逆而亦為噦矣法當大温趺陽衇浮浮則為虛浮虛相搏故令氣䭇言胃氣虛竭也衇滑則為噦此為醫咎責虛取實守空迫血衇浮鼻中燥者必衂血也註誤攻飲冷皆可致䭇固矣今趺陽胃衇浮而不大無力而虛則是胃虛與邪相搏即不誤下飲冷亦令䭇也若趺陽胃衇滑則為噦者乃熱氣壅􅊊之䭇非胃氣虛竭之䭇醫何可取實責虛以自取其咎耶若趺陽胃衇浮而鼻中燥者此熱據榮分榮熱迫血妄行必作衂也世有以噦為呃逆者不知噦即乾嘔也以其有噦噦之聲故又名噦也觀今病呃逆之人與飲冷水則氣自臍下衝上出口而作格兒格兒之聲聲長時止者為實可治聲短不已者為虛難治集註方有執曰此又出趺陽衇而以噦與衂言皆逼汗而不得汗之所致也咎過愆也責虚言求病於虚取實言反以虚為實而攻取之也血屬隂而為内守故曰守空迫血言劫汗也寸口衇浮大而醫反下之此為大逆浮則無血大則為寒寒氣相搏則為腸鳴醫乃不知而反飲冷水令汗大出水得寒氣冷必相搏其人必䭇按令汗大出四字當是衍文註寸口衇浮大指六衇皆浮大也六衇皆浮大則非陽明按之大衇乃太陽不按之大衇也醫反下之此為大逆則從前浮衇變而為無血之虛大衇變而為胃冷之遲虛寒相搏則為腸鳴醫乃不知而反與飲冷水其人得水寒之氣冷與虚相搏於胃中故必䭇也䭇者氣饐結有聲即今之呃逆也集註程知曰言邪氣在表妄下之變也寸口浮大而無鞕滿藏熱之證法應發汗若反下之此為大逆既經妄下則所謂浮者至於内空而無血所謂大者變為裏虛而有寒虛寒相搏則為腸鳴醫見衇大以為有熱飲以冷水欲以水寒勝熱而作汗裏先虛寒又得冷水與之相搏則冷結上焦必至咽噎塞而氣逆矣傷寒噦而腹滿視其前後知何部不利利之則愈註傷寒噦而不腹滿者為正氣虚呉茱萸湯證也噦而腹滿者為邪氣實視其二便何部不利利之則愈也集註成無己曰噦而腹滿氣上而不下也視其前後有不利者即利之以降其氣前部小便也後部大便也程知曰前部不利後人治以五苓後部不利後人治以承氣是也沈明宗曰邪傳於胃胃氣壅遏兩氣相搏氣逆上衝則為噦矣張錫駒曰傷寒至噦非胃氣敗即胃中寒然亦有裏實不通氣不得下洩反上逆而為噦者當詳辨之夫實則譫語虚則鄭聲鄭聲者重語也註譫語一證有虚有實實則譫語陽明熱甚上乘於心亂言無次其聲髙朗邪氣實也虛則鄭聲精神衰乏不能自主語言重複其聲㣲短正氣虚也集註戴元禮曰譫語屬陽鄭聲屬隂經曰實則譫語虛則鄭聲譫語者顛倒錯亂言出無倫常對空獨語如見鬼状鄭聲者鄭重頻煩語雖謬而諄諄不已老年人遇事則誶語不休以陽氣虛不精明也此譫語鄭聲虛實之所以不同也二者本不難辨但陽盛裏實與隂盛格陽皆能錯語湏以他證别之随證施治可也婁全善曰余用参耆歸术等劑治譫語得愈者甚多豈可不分虛實一㮣用黄連觧毒大小承氣等湯以治之乎按其所云亦鄭聲也張錫駒曰實則譫語者陽明燥熱甚而神昏氣亂故不避親疎妄言罵詈也虚則鄭聲者神氣虚而不能自主故聲音不正而語言重複也傷寒四五日衇沉而喘滿沉為在裏而反發其汗津液越出大便為難表虛裏實久則讝語註傷寒四五日入裏之時也衇沉而喘滿乃為在裏之喘滿而反發其汗津液越出則表虛也汗出胃乾大便為難則裏實也久則胃熱熾盛必發讝語也集註方有執曰越出謂枉道而出也張璐曰傷寒四五日正邪熱傳裏之時况見衇沉在裏之喘滿而反汗之必致燥結讝語矣盖燥結讝語頗似大承氣證此以過汗傷津而不致大實大滿腹痛祗宜小承氣為允當耳陽明病其人多汗以津液外出胃中燥大便必鞕鞕則讝語小承氣湯主之若一服讝語止者更莫復服註此詳上條以明其治也陽明病其人多汗以津液外出胃中乾燥大便必鞕久則讝語宜以小承氣湯主之若一服利讝語止慎不可更服也集註張璐曰多汗讝語下證急矣以其人汗出既多津液外耗故不宜大下但當略與小承氣湯和其胃氣讝語自止若過服反傷津液也沈明宗曰此汗多胃燥非同實治也汗出讝語者以有燥屎在胃中此為風也湏下者過經乃可下之下之若早語言必亂以表虛裏實故也下之愈宜大承氣湯註病自汗出而讝語者以素有燥屎在胃中此為太陽風邪之所傳也湏當下之然必湏太陽之邪已過陽明之經而入陽明之府乃可下之若下之早則裏熱未結不但熱去不盡且虛其中熱乘虛而上干於心語言必亂此表虛汗出裏實讝語所以必待過經入府而後下之則愈宜大承氣湯集註方有執曰過經謂寕遲遲非謂必待十三日後也程知曰此言讝語不當下早也既出汗矣而讝語則必有燥屎在胃此當屬風風為陽邪陽邪入裏故讝語然湏六七日乃可下之下之早則風邪未觧於表盡入於裏裏邪燥實語言更亂也陽明病譫語有潮熱反不能食者胃中必有燥屎五六枚也若能食者但鞕爾宜大承氣湯下之按宜大承氣湯下之句應在必有燥屎五六枚之下始合當用大承氣湯下之之義若但便鞕而用大承氣湯下之殊失仲景顧慮悞下慎下之㫖註陽明病譫語有潮熱反不能食者知胃中必有燥屎已結實也宜大承氣湯下之若能食者知胃将和但大便鞕耳當導之不可下也集註張璐曰此以能食不能食辨燥結之㣲甚也潮熱譫語皆胃中熱甚所致胃熱則能消榖今反不能食此必熱傷胃中津液氣化不能下行燥屎逆攻於胃之故宜大承氣湯急祛亢極之陽以救垂絶之隂若能食者胃中氣化自行熱邪不盛津液不致大傷大便雖鞕不久自行不必用藥反傷其氣也下利譫語者有燥屎也宜小承氣湯註下利裏虛譫語裏實若衇滑大證兼裏急知其中必有宿食也其下利之物又必稠粘臭穢知熱與宿食合而為之也此可決其有燥屎也宜以小承氣湯下之於此推之可知燥屎不在大便鞕與不鞕而在裏之急與不急便之臭與不臭也集註汪琥曰下利者腸胃之疾也若譫語則胃家實與厥隂無與乃腸中有燥屎不得下也治宜小承氣湯者此半利半結祗湏緩以攻之也又曰或問既下利矣則熱氣得以下泄何由而致譫語有燥屎也答曰此係陽明府實大熱之證胃中糟粕為邪所壅留著於内其未成鞕者或時得下其已成鞕者終不得出則燥屎為下利之根燥屎不得出則邪熱上乘於心所以譫語要之此證湏以手按臍腹當必堅痛方為有燥屎之徴直視譫語喘滿者死下利者亦死註上條下利譫語為可治此條下利譫語者死要知譫語不死於下利而死於直視也直視者精不注乎目也譫語者神不守乎心也已屬惡候加之喘滿陽上脱也故曰死下利隂下脱也故曰亦死也集註方有執曰直視精不榮於目也譫語神不主乎心也喘則陽争於上利則隂争於下胃中土也隂陽争奪於上下而中氣不守故無法可治而皆主死也發汗多若重發汗者亡其陽讝語衇短者死衇自和者不死註太陽病發汗過多不觧又復重發其汗以致氣液兩亡熱邪乘燥傳入陽明而生讝語讝語者胃熱陽也衇短者氣衰隂也陽病見隂衇為隂勝於陽故死也若衇不短為隂陽自和故不死也集註喻昌曰方註以此為太陽經脱簡不知太陽經無讝語之例必日久而兼陽明少陽方有讝語故此言太陽經得病時發汗過多及傳陽明時重發其汗因有亡陽而讝語之一證也亡陽之人所存者隂氣耳故神魂不定而妄見妄聞與熱邪乘心之候不同衇短則隂陽不附衇和則隂陽未離其生死但從衇定耳汪琥曰讝語者衇當大實或洪滑為自和自和者言衇與病不相背也病雖甚不死若讝語衇短為邪熱盛正氣衰乃陽證見隂衇也無法可施發汗多亡陽讝語者不可下與柴胡桂枝湯和其榮衛以通津液後自愈註此又承上條以出其治也譫語者屬陽明熱實可下之證也若發汗過多大亡氣液而發譫語者乃津枮致燥之譫語非熱甚内實之譫語不可下也裏有熱宜白虎加人参湯表不觧與柴胡桂枝湯和其榮衛以通津液後自愈也按發汗過多亡陽讝語以無大便鞕滿痛故不可下以無身寒汗出惡寒故不可温於此可知發太陽汗出過多致譫語者必無發熱汗出惡寒也發陽明汗出過多致譫語者必有潮熱惡熱不大便也此則發少陽汗多致譫語者即論中少陽不可發汗發汗則譫語是也然舍小柴胡湯别無治法若祗用柴胡又恐升散非亡陽所宜故合桂枝和其榮衛通其津液自可愈也陽明中風衇弦浮大而短氣腹都滿脇下及心痛久按之氣不通鼻乾不得汗嗜卧一身及面目悉黄小便難有潮熱時時噦耳前後腫刺之小差外不觧病過十日衇續浮者與小柴胡湯衇但浮無餘證者與麻黄湯若不尿腹滿加噦者不治按續浮之浮字當是弦字始與文義相屬則可與小柴胡湯若俱是浮字則上之浮既宜用小柴胡湯下之浮又如何用麻黄湯耶註中風傳陽明病太陽未罷衇當浮緩今衇弦浮大弦少陽衇也浮太陽衇也大陽明衇也衇既兼見證亦如之腹滿太陽陽明證也脇下及心痛久按之氣不通快少陽證也鼻乾陽明證也不得汗太陽證也嗜卧少隂證也面目悉黄太隂證也小便難太陽府證也潮熱陽明裏證也噦逆胃敗證也耳前後腫少陽證也短氣氣衰證也凡仲景立法無方之條皆是此等隂陽錯雜表裏混淆之證但教人俟其病勢所向乘機而施治也故用刺法待其小差若外病不觧已成危候如過十日衇續弦不浮者則邪機已向少陽可與小柴胡湯和之使陽明之邪從少陽而觧若衇但浮不大而無餘證者則邪機已向太陽當與麻黄湯汗之使陽明之邪從太陽而觧若已過十餘日病勢不減又不歸於胃而成實更加不尿腹滿噦甚等逆即有一二可下之證胃氣已敗不可治也集註程知曰此條全是表證未觧而無汗出燥渴之證故不可用白虎雖有潮熱而無鞕滿譫語濈濈汗出之證故不可用承氣不如俟氣之自回猶可漸引其邪從外出也程應旄曰此條證以不得汗三字為主故酌量於柴胡麻黄二湯間以通其久閉總是要得汗耳衇浮而芤浮為陽芤為隂浮芤相搏胃氣生熱其陽則絶註衇浮而芤浮為陽盛芤為隂虛陽盛則發熱隂虛則汗出二者相搏則胃氣生熱愈盛胃中津液立亡其陽則絶者言陽亡津液絶也集註方有執曰浮為氣上行故曰陽芤為血内損故曰隂胃中生熱者隂不足以和陽津液乾而成枯燥也張璐曰此言脾約當下不下則浮濇轉為浮芤津液竭而難下矣其陽則絶即陽絶於裏亡津液之互辭也趙良曰胃中陽熱亢甚脾無隂氣以和之孤陽無偶不至燔灼竭絶不止耳沈明宗曰此辨陽明津竭之衇也浮為邪氣强芤為隂血虚陽邪盛而隂血虚為浮芤相搏胃氣生熱故曰其陽則絶即亡津液之互詞也若見此衇當養津液不可便攻也陽明病反無汗而小便利二三日嘔而欬手足厥者必苦頭痛若不欬不嘔手足不厥者頭不痛註陽明病法多汗反無汗而小便利是寒氣内攻也至二三日嘔而欬寒邪上逆也手足厥者寒氣見於四支也氣上逆則欬而苦頭痛矣若不欬不嘔不厥則頭不痛此證之頭痛者標也欬逆手足厥者夲也集註程知曰無汗小便利嘔欬肢厥頭痛曷不謂太陽病盖初起無頭痛諸表證也此頭痛是二三日後嘔欬而厥所致非因頭痛致嘔欬而厥也嘔欬二證太陽少陽俱有之其表證未觧則屬太陽病其寒熱往來者則謂之少陽病也厥則厥隂有之但無嘔與欬也張璐曰陽明無汗嘔欬手足厥者得之榮衛俱傷而邪入深也然小便利則邪不在内而在外不在下而在上故知必苦頭痛仍宜小青龍主之若不嘔不欬不厥而小便利者邪必順水道而出豈有逆攻顛頂之理哉林瀾曰湏識陽明亦有手足厥證胃主四肢中虚氣寒所致也然頭苦痛而欬自與隂寒但厥者異矣此類數條最為難觧呉人駒曰嘔欬手足厥頭痛皆由反無汗之故也陽明病但頭眩不惡寒故能食而欬其人咽必痛若不欬者咽不痛註陽明病當惡熱不惡寒若從傷寒傳來則不能食今從中風傳來故能食也傷寒挾寒邪則有頭痛證今中風挾風邪則有頭眩證理固然也寒邪屬隂若兼飲則欬而嘔今不嘔而咽痛則以風屬陽邪風病則兼火故欬而咽痛以類相從也集註方有執曰眩風旋而目運也風故不惡寒能食欬逆氣也咽門胃之系也胃熱而氣逆攻咽則欬而咽傷也程知曰隂邪下行故無汗而小便利陽邪上行故不惡寒而頭眩寒則嘔不能食風則能食寒則頭痛風則咽痛是風寒入胃之辨也程應旄曰陽明以下行為順逆則上行故中寒則有頭痛證中風則有頭眩證以不惡寒而能食知其􅊊熱在裏也寒上攻能令欬其欬兼嘔故不能食而手足厥熱上攻亦令欬其欬不嘔故能食而咽痛以胃氣上通於肺而咽為胃府之門也夫咽痛惟少隂有之今以欬傷致痛若不欬則咽不痛况更有頭眩不惡寒之證益可辨其為陽明之􅊊熱也病人有寒復發汗胃中冷必吐蚘註病人有寒謂胃中寒也復發汗謂汗而復汗也胃寒復汗陽氣愈㣲胃中冷甚蚘不能安故必吐蚘也宜理中湯送烏梅丸可也集註程應旄曰汗生於榖精胃中陽氣所釀也有寒復發汗知胃陽不復存於内矣蚘何能安發汗後水藥不得入口為逆若更發汗必吐下不止按必吐下不止之下字當是衍文註此承上條誤而又誤必變而成逆也胃中虛冷夲因誤汗水藥不得入口入口即吐而為逆也若更發其汗則胃逆益甚不能司納不特水藥入口方吐且必無時而不吐逆也集註成無己曰汗後水藥不得入口為之吐逆發汗亡陽胃中虚冷也若更發汗則愈損陽氣胃氣大虚故吐不止程應旄曰發汗後見此者由未汗之先其人已是中虛而寒故一誤不堪再誤也衇浮而遲表熱裏寒下利清榖者四逆湯主之註陽明病衇浮而遲浮主表熱遲主裏寒今其證下利清榖則為裏寒太甚法當温之宜四逆湯主之集註汪琥曰陽明經病衇當從長今衇但浮此在表之熱凝也腑病衇當從數今衇過遲此在裏之寒甚也故見下利清榖其所利之榖食色不變氣不臭即完榖不化也此裏寒已極故與四逆湯也陽明病欲觧時從申至戌上註凡陽明病無論在經在府必乘其旺時而觧申酉戌陽明旺時也經氣旺則邪氣自退故觧也集註張志聰曰經云日西而陽氣衰陽明之所主也從申至戌上乃陽明主氣之時表裏之邪欲出必随旺時而觧音切奄音厭趺音夫摶音團屎音豕摸音莫捻音聶蘸荘陷切挺庭上聲繞音擾憒古對切怵勅律切疸音旦瘕匣牙切潄音瘦軺時饒切蘖音伯潦郎到切沸音芾尿同溺轉株戀切䭇音噎蚘音回御纂醫宗金鑑卷四
