body:
  text: 編輯婦科心法要訣目録生育門臨産産室擇收生婆驚生試胎弄胎坐草臨盆交骨不開開骨散盤腸生補中益氣湯十全大補湯萆蔴貼法酥油潤法難産産後門胞衣不下證治奪命散産門不閉證治十全大補湯血暈證治清魂散佛手散醋漆薫法惡露不下證治失笑散聖愈湯惡露不絶證治加味十全大補湯佛手散頭疼證治芎歸湯八珍湯心胃痛證治大巖蜜湯玊燭散腹痛證治失笑散香桂散異功散少腹痛證治延胡索散吳茱萸湯五苓散脇痛證治延胡索散四君子湯八珍湯腰痛證治佛手散加味六味地黄湯徧身疼痛證治趂痛散加味四物湯腹中塊痛證治延胡索散吳茱萸湯筋攣證治加味四物湯八珍湯傷食嘔吐證治六君子湯二陳湯呃逆證治丁香荳䓻散茹橘飲氣喘證治参附煎二味参蘇飲浮腫證治枳术湯小調中湯小調經散茯苓𨗳水湯發熱證治加味四物湯加味異功散六君子湯生化湯四物湯十全大補湯八珍湯當歸補血湯参附湯寒熱證治柴胡四物湯生化湯更生散自汗頭汗證治當歸六黄湯黄耆湯参附湯中風證治十全大補湯痙病證治加味八珍湯瘈瘲抽搐證治加味八珍湯不語證治加味八珍湯星連二陳湯七珍散八珍湯二陳湯欽定四庫全書御纂醫宗金鑑卷四十七編輯婦科心法要訣目録生育門臨産産室擇收生婆驚生試胎弄胎坐草臨盆交骨不開開骨散盤腸生補中益氣湯十全大補湯萆蔴貼法酥油潤法難産産後門胞衣不下證治奪命散産門不閉證治十全大補湯血暈證治清魂散佛手散醋漆薫法惡露不下證治失笑散聖愈湯惡露不絶證治加味十全大補湯佛手散頭疼證治芎歸湯八珍湯心胃痛證治大巖蜜湯玊燭散腹痛證治失笑散香桂散異功散少腹痛證治延胡索散吳茱萸湯五苓散脇痛證治延胡索散四君子湯八珍湯腰痛證治佛手散加味六味地黄湯徧身疼痛證治趂痛散加味四物湯腹中塊痛證治延胡索散吳茱萸湯筋攣證治加味四物湯八珍湯傷食嘔吐證治六君子湯二陳湯呃逆證治丁香荳䓻散茹橘飲氣喘證治参附煎二味参蘇飲浮腫證治枳术湯小調中湯小調經散茯苓𨗳水湯發熱證治加味四物湯加味異功散六君子湯生化湯四物湯十全大補湯八珍湯當歸補血湯参附湯寒熱證治柴胡四物湯生化湯更生散自汗頭汗證治當歸六黄湯黄耆湯参附湯中風證治十全大補湯痙病證治加味八珍湯瘈瘲抽搐證治加味八珍湯不語證治加味八珍湯星連二陳湯七珍散八珍湯二陳湯欽定四庫全書御纂醫宗金鑑卷四十七編輯婦科心法要訣生育門臨産妊娠臨産要安詳腹内雖疼切莫慌舒身仰卧容胎轉静待生時不用忙註妊娠月足臨産腹内如覺動轉疼痛湏要安詳莫自慌亂舒體仰卧時時緩歩使兒身轉正静以待之至其生育之時自然順生不用忙也産室産室寒温要適時嚴寒酷熱總非宜夏要清凉冬要煖病者醫人俱要知註産室之内四時俱要寒温適中若太熱太寒均不相宜夏月必湏清凉勿令炎熱致産母中暑暈迷倘有其事不妨少與凉水以觧之冬月必湏温煖勿令寒冷以致血凝難産當多備火爐使産母腰背下身就火烘之此臨産之家及醫人皆當知之者也擇收生婆臨産稳婆湏預擇老成歴練又精明無故莫教使手法寛心寧耐待時生註臨産之家必用收生婆湏預先擇老成歴練明白經事之人無故切勿令其先使手法如試水探漿等事但囑令寛心寧耐以待生時可也驚生人語喧譁産母驚心虚氣怯號驚生急湏止静休嘈雜産母心安胎自寧註産房之内不可多人人多則語聲喧譁産母之心必驚驚則心氣虚怯至産時多致困乏號曰驚生有如此者湏急急摒出只畱服役一二人使寂静而無嘈雜之聲則母心始安安則其胎亦寧静矣試胎弄胎月數未足腹中痛痛定如常名試胎臨月腹痛腰不痛或作或止名弄胎二者均非正産候但湏寧静莫疑猜註妊娠八九個月時或腹中痛痛定仍然如常者此名試胎宜養血以安其胎若月數已足腹痛或作或止腰不痛者此名弄胎不宜輕動二者均非正産之時切勿躁擾疑惑惟宜寧静以待其時坐草坐草湏知要及時兒身未順且遲遲若教産母用力早逼胎不正悔難追註凡産婦坐草最要及時不可太早若兒身未順寧可遲遲寛心以待倘坐草太早非正産之時妄使産母用力往往逼胎不正遂至横倒者有之雖悔無及矣臨盆兒身轉順頂當門胞漿已破腹腰疼中指跳動榖道挺臨盆用力送兒生註凢兒之生自有其時時至則兒身轉順頭頂正當産門胞漿大来腰重腹痛榖道挺迸産母中指中莭或本莭跳動此方為正産之時方可臨盆用力送兒自順生矣交骨不開交骨不開湏細審或因不足或初胎總宜開骨通隂氣佛手龜板婦髪灰若因不足加参妙一服能令骨立開註産婦交骨不開有因氣血不足者有因初次胎産者二者均宜用開骨􅄆通其隂氣其方即佛手􅄆加敗龜板與生過子女婦人頭髪也氣血不足者加人参服之可使其骨立開盤腸生盤腸未産腸先出已産嬰兒腸不收頂貼萆麻服升補腸乾潤以奶酥油註妊娠婦人有盤腸生者臨産之時其腸先拖出及兒已産下其腸有仍不收者湏以萆麻仁搗爛貼扵頂心内服升補之劑如補中益氣湯或八珍十全大補等湯加升麻以升補之其腸自收矣補中益氣湯十全大補湯方俱見首卷難産難産之由不一端胎前安逸過貪眠驚恐氣怯用力早胞破血壅血漿乾註妊娠難産之由非只一端或胎前喜安逸不耐勞碌或過貪眠睡皆令氣滯難産或臨産驚恐氣怯或用力太早則産母困乏難産或胞傷血出血壅産路或胞漿破早漿血乾枯皆足以致難産臨證之工不可不審也産後門胞衣不下證治胞衣不下因初産用力勞乏風冷凝下血過多産路澁血入胞衣腹脹疼急服奪命沒竭􅄆勿使冲心喘滿生諭令穏婆隨胎取休驚産母莫教聞註産婦胞衣不下者或因初産用力困乏風冷相干致血瘀凝或因下血過多血枯産路乾澁或血入胞衣脹滿疼痛皆能使胞衣不下均當急用奪命􅄆即沒藥血竭二味為􅄆也免致上攻心胸脹滿喘急為害不小且宜諭令穏婆隨胎取下莫使産母聞之恐被驚則愈難下也産門不閉證治産門不閉由不足初産因傷必腫疼不足十全大補治甘草湯洗腫傷平註凢産後玊門不閉者多由氣血不足所致亦有因初産傷重者必腫而疼也氣血不足者用十全大補湯治之因傷腫痛者濃煎甘草湯洗之其腫傷自平十全大補湯方見首卷血暈證治清魂􅄆産後血暈惡露少面脣色赤是停瘀惡露去多脣面白乃属血脫不湏疑虚用清魂荆芥穂人参芎草澤蘭隨腹痛停瘀佛手􅄆醋漆薰法總相宜註産後血暈有因惡露去少内有停瘀上攻迷暈者面脣必赤色有因去血過多血脱而暈者面脣必色白血弱者宜用清魂􅄆即荆芥穂人参川芎甘草澤蘭葉也若停瘀腹痛者用佛手􅄆二者俱宜頻燒乾漆及用火燒鐡釘淬醋不時薰之佛手􅄆方見首卷惡露不下證治惡露不下是何因風冷氣滯血瘀凝若還不下因無血面色黄白不脹疼風冷血凝失笑􅄆去多聖愈補而行註産後惡露不下有因風冷相干氣滯血凝而不行者必腹中脹痛有因産時去血太多無血不行者面色必黄白腹必不疼以此辨之血凝者用失笑􅄆逐而行之無血者用聖愈湯補而行之失笑􅄆聖愈湯方俱見首卷惡露不絶證治惡露不絶傷任衝不固時時淋漓行或因虚損血不攝或因瘀血腹中停審色汚淡臭腥穢虚補實攻要辨明虚用十全加膠續瘀宜佛手補而行註産後惡露乃裹兒汚血産時當隨胎而下若日乆不斷時時淋漓者或因衝任虚損血不收攝或因瘀行不盡停畱腹内隨化隨行者當審其血之色或汚濁不明或淺淡不鮮或臭或腥或穢辨其為實為虚而攻補之虚宜十全大補湯加阿膠續斷以補而固之瘀宜佛手􅄆以補而行之十全大補湯佛手􅄆方俱見首卷頭疼證治産後頭疼面黄白無表無裏血虚疼惡露不行兼腹痛必因瘀血上攻冲逐瘀芎歸湯最效虚用八珍加蔓荆註産後頭疼若面色黄白無寒熱身痛之表證又無便秘之裏證則是因産後去血過多血虚頭痛也若惡露不行兼腹痛者乃属瘀血上攻之痛也去瘀以芎歸湯補虚以八珍湯加蔓荆子八珍湯方見首卷心胃痛證治大巖蜜湯心痛厥逆爪青白寒凝大巖蜜温行四物去芎加獨活薑桂茱萸草逺辛因食惡食多嘔吐麯麥香砂入二陳大便燥結小便赤兼熱飲冷玊燭攻註産後心胃痛若四肢厥逆爪甲青白乃風冷寒凝氣血滯澁宜用大巖蜜湯温以行之即生地當歸赤芍獨活乾薑桂心吳茱萸甘草逺志細辛也若因飲食停滯中脘作痛必惡食嘔吐宜二陳湯加神麯麥芽木香砂仁若大便結硬小便赤澁渴欲飲冷者乃内有實熱也宜玊燭􅄆攻之玊燭􅄆方見首卷腹痛證治香桂􅄆去血過多血虚痛去少壅瘀有餘疼傷食惡食多脹悶寒入胞中見冷形血虚當歸建中治瘀壅失笑有竒功傷食異功加查麯胞寒香桂桂歸芎註産後腹痛若因去血過多而痛者為血虚痛若因惡露去少及瘀血壅滯而痛者為有餘疼若因傷食而痛者必惡食脹悶若因風寒乘虚入扵胞中作痛者必見冷痛形狀血虚宜當歸建中湯血瘀宜失笑􅄆傷食宜異功􅄆加山查神麯胞寒宜香桂􅄆即佛手􅄆加桂心也當歸建中湯失笑散異功散方俱見首卷少腹痛證治延胡索散少腹痛㣲名兒枕硬痛尿利血瘀疼尿澁淋痛蓄水證紅腫湏防㿉疝癃兒枕瘀血延胡􅄆歸芍蒲桂琥珀紅蓄水湏用五苓􅄆㿉疝吴萸温􅄆行註産後少腹痛其痛若㣲乃産時血塊未净名兒枕痛若少腹堅硬小便利者為瘀血痛少腹硬而小便不利淋澁脹痛者乃蓄水作痛若堅硬紅腫而痛者湏防成㿉疝癃之證因兒枕瘀血者宜延胡索散即當歸赤芍蒲黄肉桂琥珀紅花也因水蓄者宜五苓􅄆若將成㿉疝癃者當以吴茱萸湯温散之吴茱萸湯方見首卷五苓􅄆方見三卷脇痛證治脇痛瘀滯犯肝經左血右氣要分明血用延胡􅄆可治氣宜四君加柴青去血過多属虚痛八珍加桂補其榮註産後脇痛因氣血瘀滯干犯肝經在左多属血在右多属氣血宜延胡索􅄆氣宜四君子湯加柴胡青皮若因去血過多而痛者為虚痛宜八珍湯加肉桂以補其榮血自愈四君子湯八珍湯方俱見首卷腰痛證治腰疼下注兩股痛風冷停瘀滯在經佛手􅄆加獨活桂續斷牛膝桑寄生血多三隂傷氣血地黄桂附續杜尋註産後腰疼下注兩股皆痛者乃産時風冷乘之瘀血滯扵肝經宜用佛手􅄆加獨活肉桂續斷牛膝防風桑寄生以温􅄆而行之若因去血過多三隂經氣血虧損者則當用六味地黄湯加肉桂附子續斷杜仲以温補之佛手􅄆六味地黄湯方俱見首卷徧身疼痛證治趂痛􅄆産後身疼榮不足若因客感表先形趂痛􅄆用歸耆术牛膝甘獨薤桂心血瘀面唇多紫脹四物秦艽桃沒紅註産後徧身疼痛多因去血過多榮血不足或因風寒外客必有表證二者俱宜用趂痛􅄆即當歸黄耆白术牛膝甘草獨活薤白桂心也若面唇紫色身脹痛者必是停瘀所致宜用四物湯加秦艽桃仁沒藥紅花以行之四物湯方見首卷腹中塊痛證治産後積血塊冲疼多因新産冷風乘急服延胡􅄆可逐日乆不􅄆血瘕成更有寒疝亦作痛吳萸温􅄆不湏攻註産後腹中有塊堅硬攻痛多因新産之後風冷乘虚而入以致瘀血凝結宜服延胡索􅄆以逐之若遲乆不􅄆必結成血瘕矣又有寒疝之證亦在少腹中攻築而痛此属寒氣滯澁宜用吳茱萸湯温􅄆其寒自愈不必攻也吴茱萸湯方見首卷筋攣證治産後筋攣雞爪風血虧液損復乘風無汗養榮兼􅄆邪四物柴瓜桂鈎藤有汗八珍加桂枝黄耆阿膠大補榮註産後筋衇拘攣疼痛不能舒展俗名雞爪風皆由産後血液虧損不能榮筋又被風乘故令拘攣疼痛也無汗者宜扵養榮之中兼祛外邪用四物湯加柴胡木𤓰桂枝鈎藤若有汗者宜八珍湯加桂枝黄耆阿膠以大補其榮血可也四物湯八珍湯方俱見首卷傷食嘔吐證治産後傷食心下悶惡食嘈雜吞吐酸六君查麯香砂共嘔逆痰涎二陳煎註産後過食肉麵傷扵飲食者必心胸飽悶惡聞食氣懊憹嘈雜吞酸吐酸宜用六君湯加山查神麯香附縮砂以補而消之若更嘔逆痰涎必是兼痰兼飲宜二陳湯加減調治六君子湯見首卷二陳湯見三卷呃逆證治丁香豆䓻散茹橘飲産後呃逆胃虚寒丁香白䓻伏龍肝桃仁吴萸湯冲服不應急將参附添熱渴面紅小便赤竹茹乾柿橘紅煎註産後呃逆皆因氣血兩傷脾胃虛寒中焦之氣厥而不順所致宜服丁香豆􅅳􅄆即丁香白豆􅅳伏龍肝為末也用桃仁吴茱萸煎湯冲服如不效當以参附湯峻補之若發熱面紅小便赤色属熱實者宜用竹茹乾柿橘紅煎服之名茹橘飲氣喘證治二味参蘓飲産後氣喘為危候血脫氣散参附煎敗血上攻面紫黒二味参蘓奪命痊註産後氣喘極危證也因下血過多榮血暴竭衛氣無倚孤陽上越宜驟補其氣用参附煎湯不時飲之若因惡露不行敗血上攻扵肺而喘者必面色紫黒宜奪命􅄆下瘀瘀去喘自定虚者参蘓飲即人参一兩為末蘓木二兩煎湯冲服也浮腫證治枳术湯小調中湯産後腫分氣水血輕浮脹滿氣之形水腫喘嗽小便澁皮如熟李血之情氣腫枳术湯最效水腫茯苓𨗳水靈血腫調中歸芍木茯陳煎冲小調經歸芍珀麝辛桂沒理氣調榮瘀血行註産後浮腫由扵敗血乘虚流入經絡血化為水故令浮腫然有氣腫水腫之别不可不辨也若輕虚浮腫心胸脹滿者因素有水飲所作名曰氣分也宜用枳术湯即枳實白术煎湯服之若喘嗽小便不利者則為水腫宜茯苓𨗳水湯利之若皮如熟李或徧身青腫者則為血分宜小調中湯治之其方即當歸白芍藥白术茯苓陳皮煎湯冲小調經􅄆服之即當歸赤芍琥珀麝香細辛肉桂心沒藥也茯苓𨗳水湯方見三卷發熱緫括産後發熱不一端内傷飲食外風寒瘀血血虚與勞力三朝蒸乳亦當然隂虚血脫陽外􅄆攻補温凉細細叅註産後發熱之故非止一端如食飲太過胸滿嘔吐惡食者則為傷食發熱若早起勞動感受風寒則為外感發熱若惡露不去瘀血停留則為瘀血發熱若去血過多隂血不足則為血虛發熱亦有因産時傷力勞乏發熱者三日蒸乳發熱者當詳其有餘不足或攻或補或用凉藥正治或用温熱反治要在臨證細細恭考也發熱證治加味四物湯加味異功􅄆生化湯産後發熱多血傷大法四物加炮薑頭疼惡寒外感熱四物柴胡䓤白良嘔吐脹悶傷食氣異功查麯厚朴薑脾不化食六君子瘀血腹痛生化湯當歸川芎丹参共桃仁紅花炮乾薑註産後發熱多因隂血暴傷陽無所附大法宜四物湯加炮薑從隂引陽為正治若頭疼惡寒而發熱者属外感不當作傷寒治惟宜用四物加柴胡葱白服之若嘔吐脹悶属傷食若倦怠氣乏者属傷氣宜用異功􅄆加山查神麯厚朴生薑治之若因脾虛不能化食而停食發熱者宜六君子湯若因瘀血發熱者必兼腹痛宜用生化湯即當歸川芎丹参桃仁紅花薑炭也六君子湯異功􅄆四物湯方俱見首卷勞力發熱用十全氣血兩虛八珍痊血脫躁熱補血效虛陽外越参附煎註産後發熱因産時用力勞乏者宜十全大補湯氣血兩虚者八珍湯去血過多血脫煩躁乾渴面赤而熱者宜當歸補血湯若隂血暴脫孤陽無附而外越發熱者急進参附湯遲則必大汗大喘是陽欲亡雖藥必無救矣十全大補湯八珍湯當歸補血湯方俱見首卷寒熱緫括寒熱徃来逓更换乍寒乍熱時熱寒寒熱似瘧按時發壮熱憎寒熱畏寒註産後寒熱名既不同其證亦異當先明辨之如曰寒熱徃来者謂寒去熱来熱去寒来逓相更换也曰乍寒乍熱者謂有時寒有時熱寒熱無定時也曰寒熱似瘧者謂或先寒後熱或先熱後寒一定不移至其時而始作也曰壮熱憎寒者謂其身既壮熱而復時時畏寒也徃来寒熱隂陽格時熱時寒榮衛乖寒熱似􅒻瘀兼食壮熱憎寒𢃄表推註産後血氣虚損隂陽不和則寒熱往来隂陽相乘榮衛不調則時寒時熱敗血不􅄆飲食停滯則寒熱似􅒻汗出遇風則壮熱憎寒有諸内自形諸外辨之既明然後治無不愈矣寒熱證治徃来寒熱隂陽格柴胡四物各半湯榮衛不和乍寒熱歸芍芎参甘草薑寒熱似瘧瘀兼食生化柴胡查麯良憎寒壮熱更生􅄆歸地芎参荆穂薑註産後隂陽不和徃来寒熱者宜柴胡四物湯若榮衛不調乍寒乍熱者用增損四物湯其方即當歸白芍川芎人参甘草乾薑也若停瘀兼食寒熱似􅒻者用生化湯加柴胡山查神麯若感受風寒憎寒壮熱者宜更生􅄆即當歸熟地川芎人参荆芥穂乾薑也柴胡四物湯方見首卷自汗頭汗緫括産後隂虚陽氣盛㣲㣲自汗却無妨頭汗隂虚陽上越周身大汗是亡陽註産後血去過多則隂虚隂虚則陽盛若㣲㣲自汗是榮衛調和故雖汗無妨若周身無汗獨頭汗出者乃隂虚陽氣上越之象也若頭身俱大汗不止則恐有亡陽之慮矣自汗頭汗證治當歸六黄湯黄耆湯虚熱上蒸頭汗出治用當歸六黄湯黄芩連蘗炒黒用歸耆生熟二地黄自汗黄耆湯牡蠣耆术苓甘麥地防大汗不止陽外脱大劑参附可囬陽註産後亡血隂虚陽熱上蒸頭上汗出至頸而還者宜當歸六黄湯即黄連黄芩黄蘗當歸黄耆生地熟地也内芩連蘗三味俱炒黒用若自汗太甚宜黄耆湯即牡蠣粉黄耆白术茯苓甘草麥冬熟地防風也若隂血大脱孤陽外越大汗不止非大劑参附不能囬陽也中風證治産後中風惟大補火氣風痰末治之十全大補為主劑臨證詳参佐使宜註産後氣血大虛雖患中風惟宜大補即有火熱風痰氣閉亦當末治緫以十全大補湯主之臨證詳恭其火氣風痰而佐使之十全大補湯方見首卷痙病證治加味八珍湯新産血虚多汗出易中風邪痙病成口噤項強身反折八珍耆附桂防風摇頭氣促寒不止兩手撮空莫望生註産後血氣不足蔵府皆虚多汗出腠理不宻風邪乘虚襲入遂成痙證手三陽之筋結扵頷頬風入頷頬則口噤隂陽經絡周環扵身風中經絡則頭項肩背强直如角弓反張之状産後患此皆属虚象惟宜用八珍湯加黄耆附子肉桂大補其隂陽少佐防風以治之若見頭摇喘促汗出不止兩手撮空者則為真氣去邪氣獨畱必死之候故曰莫望生也八珍湯方見首卷瘈瘲抽搐證治加味八珍湯隂血去多陽氣熾筋無所養致抽搐發熱惡寒煩又渇八珍丹地鈎藤鈎抽搐無力戴眼折大汗不止命將休註産後血去太多陽氣熾盛筋無所養必致瘈瘲抽搐發熱惡寒心煩口渇不宜作風治惟當氣血兼補用八珍湯加丹皮生地鈎藤鈎治之若無力抽搐戴眼反折大汗不止者則為不治之證故曰命将休也八珍湯方見首卷不語證治加味八珍湯星連二陳湯七珍散產後不語分虚實痰熱乘心敗血衝氣血兩虚神鬰冒寔少虚多要辨明虚用八珍籐菖志痰熱星連入二陳敗血衝心七珍散芎地辛防硃蒲參註產後不語須分虚實治之有痰熱乘心者有敗血衝心者有氣血兩虛而鬰冒神昏者大抵產後属虚者多而實者少也虚宜八珍湯加鈎藤菖蒲逺志痰熱宜二陳湯加膽星黄連敗血冲心宜七珍散即川芎生地細辛防風硃砂菖蒲人參也八珍湯方見首卷二陳湯方見三卷御纂醫宗金鑑卷四十七欽定四庫全書御纂醫宗金鑑卷四十七編輯婦科心法要訣生育門臨産妊娠臨産要安詳腹内雖疼切莫慌舒身仰卧容胎轉静待生時不用忙註妊娠月足臨産腹内如覺動轉疼痛湏要安詳莫自慌亂舒體仰卧時時緩歩使兒身轉正静以待之至其生育之時自然順生不用忙也産室産室寒温要適時嚴寒酷熱總非宜夏要清凉冬要煖病者醫人俱要知註産室之内四時俱要寒温適中若太熱太寒均不相宜夏月必湏清凉勿令炎熱致産母中暑暈迷倘有其事不妨少與凉水以觧之冬月必湏温煖勿令寒冷以致血凝難産當多備火爐使産母腰背下身就火烘之此臨産之家及醫人皆當知之者也擇收生婆臨産稳婆湏預擇老成歴練又精明無故莫教使手法寛心寧耐待時生註臨産之家必用收生婆湏預先擇老成歴練明白經事之人無故切勿令其先使手法如試水探漿等事但囑令寛心寧耐以待生時可也驚生人語喧譁産母驚心虚氣怯號驚生急湏止静休嘈雜産母心安胎自寧註産房之内不可多人人多則語聲喧譁産母之心必驚驚則心氣虚怯至産時多致困乏號曰驚生有如此者湏急急摒出只畱服役一二人使寂静而無嘈雜之聲則母心始安安則其胎亦寧静矣試胎弄胎月數未足腹中痛痛定如常名試胎臨月腹痛腰不痛或作或止名弄胎二者均非正産候但湏寧静莫疑猜註妊娠八九個月時或腹中痛痛定仍然如常者此名試胎宜養血以安其胎若月數已足腹痛或作或止腰不痛者此名弄胎不宜輕動二者均非正産之時切勿躁擾疑惑惟宜寧静以待其時坐草坐草湏知要及時兒身未順且遲遲若教産母用力早逼胎不正悔難追註凡産婦坐草最要及時不可太早若兒身未順寧可遲遲寛心以待倘坐草太早非正産之時妄使産母用力往往逼胎不正遂至横倒者有之雖悔無及矣臨盆兒身轉順頂當門胞漿已破腹腰疼中指跳動榖道挺臨盆用力送兒生註凢兒之生自有其時時至則兒身轉順頭頂正當産門胞漿大来腰重腹痛榖道挺迸産母中指中莭或本莭跳動此方為正産之時方可臨盆用力送兒自順生矣交骨不開交骨不開湏細審或因不足或初胎總宜開骨通隂氣佛手龜板婦髪灰若因不足加参妙一服能令骨立開註産婦交骨不開有因氣血不足者有因初次胎産者二者均宜用開骨􅄆通其隂氣其方即佛手􅄆加敗龜板與生過子女婦人頭髪也氣血不足者加人参服之可使其骨立開盤腸生盤腸未産腸先出已産嬰兒腸不收頂貼萆麻服升補腸乾潤以奶酥油註妊娠婦人有盤腸生者臨産之時其腸先拖出及兒已産下其腸有仍不收者湏以萆麻仁搗爛貼扵頂心内服升補之劑如補中益氣湯或八珍十全大補等湯加升麻以升補之其腸自收矣補中益氣湯十全大補湯方俱見首卷難産難産之由不一端胎前安逸過貪眠驚恐氣怯用力早胞破血壅血漿乾註妊娠難産之由非只一端或胎前喜安逸不耐勞碌或過貪眠睡皆令氣滯難産或臨産驚恐氣怯或用力太早則産母困乏難産或胞傷血出血壅産路或胞漿破早漿血乾枯皆足以致難産臨證之工不可不審也産後門胞衣不下證治胞衣不下因初産用力勞乏風冷凝下血過多産路澁血入胞衣腹脹疼急服奪命沒竭􅄆勿使冲心喘滿生諭令穏婆隨胎取休驚産母莫教聞註産婦胞衣不下者或因初産用力困乏風冷相干致血瘀凝或因下血過多血枯産路乾澁或血入胞衣脹滿疼痛皆能使胞衣不下均當急用奪命􅄆即沒藥血竭二味為􅄆也免致上攻心胸脹滿喘急為害不小且宜諭令穏婆隨胎取下莫使産母聞之恐被驚則愈難下也産門不閉證治産門不閉由不足初産因傷必腫疼不足十全大補治甘草湯洗腫傷平註凢産後玊門不閉者多由氣血不足所致亦有因初産傷重者必腫而疼也氣血不足者用十全大補湯治之因傷腫痛者濃煎甘草湯洗之其腫傷自平十全大補湯方見首卷血暈證治清魂􅄆産後血暈惡露少面脣色赤是停瘀惡露去多脣面白乃属血脫不湏疑虚用清魂荆芥穂人参芎草澤蘭隨腹痛停瘀佛手􅄆醋漆薰法總相宜註産後血暈有因惡露去少内有停瘀上攻迷暈者面脣必赤色有因去血過多血脱而暈者面脣必色白血弱者宜用清魂􅄆即荆芥穂人参川芎甘草澤蘭葉也若停瘀腹痛者用佛手􅄆二者俱宜頻燒乾漆及用火燒鐡釘淬醋不時薰之佛手􅄆方見首卷惡露不下證治惡露不下是何因風冷氣滯血瘀凝若還不下因無血面色黄白不脹疼風冷血凝失笑􅄆去多聖愈補而行註産後惡露不下有因風冷相干氣滯血凝而不行者必腹中脹痛有因産時去血太多無血不行者面色必黄白腹必不疼以此辨之血凝者用失笑􅄆逐而行之無血者用聖愈湯補而行之失笑􅄆聖愈湯方俱見首卷惡露不絶證治惡露不絶傷任衝不固時時淋漓行或因虚損血不攝或因瘀血腹中停審色汚淡臭腥穢虚補實攻要辨明虚用十全加膠續瘀宜佛手補而行註産後惡露乃裹兒汚血産時當隨胎而下若日乆不斷時時淋漓者或因衝任虚損血不收攝或因瘀行不盡停畱腹内隨化隨行者當審其血之色或汚濁不明或淺淡不鮮或臭或腥或穢辨其為實為虚而攻補之虚宜十全大補湯加阿膠續斷以補而固之瘀宜佛手􅄆以補而行之十全大補湯佛手􅄆方俱見首卷頭疼證治産後頭疼面黄白無表無裏血虚疼惡露不行兼腹痛必因瘀血上攻冲逐瘀芎歸湯最效虚用八珍加蔓荆註産後頭疼若面色黄白無寒熱身痛之表證又無便秘之裏證則是因産後去血過多血虚頭痛也若惡露不行兼腹痛者乃属瘀血上攻之痛也去瘀以芎歸湯補虚以八珍湯加蔓荆子八珍湯方見首卷心胃痛證治大巖蜜湯心痛厥逆爪青白寒凝大巖蜜温行四物去芎加獨活薑桂茱萸草逺辛因食惡食多嘔吐麯麥香砂入二陳大便燥結小便赤兼熱飲冷玊燭攻註産後心胃痛若四肢厥逆爪甲青白乃風冷寒凝氣血滯澁宜用大巖蜜湯温以行之即生地當歸赤芍獨活乾薑桂心吳茱萸甘草逺志細辛也若因飲食停滯中脘作痛必惡食嘔吐宜二陳湯加神麯麥芽木香砂仁若大便結硬小便赤澁渴欲飲冷者乃内有實熱也宜玊燭􅄆攻之玊燭􅄆方見首卷腹痛證治香桂􅄆去血過多血虚痛去少壅瘀有餘疼傷食惡食多脹悶寒入胞中見冷形血虚當歸建中治瘀壅失笑有竒功傷食異功加查麯胞寒香桂桂歸芎註産後腹痛若因去血過多而痛者為血虚痛若因惡露去少及瘀血壅滯而痛者為有餘疼若因傷食而痛者必惡食脹悶若因風寒乘虚入扵胞中作痛者必見冷痛形狀血虚宜當歸建中湯血瘀宜失笑􅄆傷食宜異功􅄆加山查神麯胞寒宜香桂􅄆即佛手􅄆加桂心也當歸建中湯失笑散異功散方俱見首卷少腹痛證治延胡索散少腹痛㣲名兒枕硬痛尿利血瘀疼尿澁淋痛蓄水證紅腫湏防㿉疝癃兒枕瘀血延胡􅄆歸芍蒲桂琥珀紅蓄水湏用五苓􅄆㿉疝吴萸温􅄆行註産後少腹痛其痛若㣲乃産時血塊未净名兒枕痛若少腹堅硬小便利者為瘀血痛少腹硬而小便不利淋澁脹痛者乃蓄水作痛若堅硬紅腫而痛者湏防成㿉疝癃之證因兒枕瘀血者宜延胡索散即當歸赤芍蒲黄肉桂琥珀紅花也因水蓄者宜五苓􅄆若將成㿉疝癃者當以吴茱萸湯温散之吴茱萸湯方見首卷五苓􅄆方見三卷脇痛證治脇痛瘀滯犯肝經左血右氣要分明血用延胡􅄆可治氣宜四君加柴青去血過多属虚痛八珍加桂補其榮註産後脇痛因氣血瘀滯干犯肝經在左多属血在右多属氣血宜延胡索􅄆氣宜四君子湯加柴胡青皮若因去血過多而痛者為虚痛宜八珍湯加肉桂以補其榮血自愈四君子湯八珍湯方俱見首卷腰痛證治腰疼下注兩股痛風冷停瘀滯在經佛手􅄆加獨活桂續斷牛膝桑寄生血多三隂傷氣血地黄桂附續杜尋註産後腰疼下注兩股皆痛者乃産時風冷乘之瘀血滯扵肝經宜用佛手􅄆加獨活肉桂續斷牛膝防風桑寄生以温􅄆而行之若因去血過多三隂經氣血虧損者則當用六味地黄湯加肉桂附子續斷杜仲以温補之佛手􅄆六味地黄湯方俱見首卷徧身疼痛證治趂痛􅄆産後身疼榮不足若因客感表先形趂痛􅄆用歸耆术牛膝甘獨薤桂心血瘀面唇多紫脹四物秦艽桃沒紅註産後徧身疼痛多因去血過多榮血不足或因風寒外客必有表證二者俱宜用趂痛􅄆即當歸黄耆白术牛膝甘草獨活薤白桂心也若面唇紫色身脹痛者必是停瘀所致宜用四物湯加秦艽桃仁沒藥紅花以行之四物湯方見首卷腹中塊痛證治産後積血塊冲疼多因新産冷風乘急服延胡􅄆可逐日乆不􅄆血瘕成更有寒疝亦作痛吳萸温􅄆不湏攻註産後腹中有塊堅硬攻痛多因新産之後風冷乘虚而入以致瘀血凝結宜服延胡索􅄆以逐之若遲乆不􅄆必結成血瘕矣又有寒疝之證亦在少腹中攻築而痛此属寒氣滯澁宜用吳茱萸湯温􅄆其寒自愈不必攻也吴茱萸湯方見首卷筋攣證治産後筋攣雞爪風血虧液損復乘風無汗養榮兼􅄆邪四物柴瓜桂鈎藤有汗八珍加桂枝黄耆阿膠大補榮註産後筋衇拘攣疼痛不能舒展俗名雞爪風皆由産後血液虧損不能榮筋又被風乘故令拘攣疼痛也無汗者宜扵養榮之中兼祛外邪用四物湯加柴胡木𤓰桂枝鈎藤若有汗者宜八珍湯加桂枝黄耆阿膠以大補其榮血可也四物湯八珍湯方俱見首卷傷食嘔吐證治産後傷食心下悶惡食嘈雜吞吐酸六君查麯香砂共嘔逆痰涎二陳煎註産後過食肉麵傷扵飲食者必心胸飽悶惡聞食氣懊憹嘈雜吞酸吐酸宜用六君湯加山查神麯香附縮砂以補而消之若更嘔逆痰涎必是兼痰兼飲宜二陳湯加減調治六君子湯見首卷二陳湯見三卷呃逆證治丁香豆䓻散茹橘飲産後呃逆胃虚寒丁香白䓻伏龍肝桃仁吴萸湯冲服不應急將参附添熱渴面紅小便赤竹茹乾柿橘紅煎註産後呃逆皆因氣血兩傷脾胃虛寒中焦之氣厥而不順所致宜服丁香豆􅅳􅄆即丁香白豆􅅳伏龍肝為末也用桃仁吴茱萸煎湯冲服如不效當以参附湯峻補之若發熱面紅小便赤色属熱實者宜用竹茹乾柿橘紅煎服之名茹橘飲氣喘證治二味参蘓飲産後氣喘為危候血脫氣散参附煎敗血上攻面紫黒二味参蘓奪命痊註産後氣喘極危證也因下血過多榮血暴竭衛氣無倚孤陽上越宜驟補其氣用参附煎湯不時飲之若因惡露不行敗血上攻扵肺而喘者必面色紫黒宜奪命􅄆下瘀瘀去喘自定虚者参蘓飲即人参一兩為末蘓木二兩煎湯冲服也浮腫證治枳术湯小調中湯産後腫分氣水血輕浮脹滿氣之形水腫喘嗽小便澁皮如熟李血之情氣腫枳术湯最效水腫茯苓𨗳水靈血腫調中歸芍木茯陳煎冲小調經歸芍珀麝辛桂沒理氣調榮瘀血行註産後浮腫由扵敗血乘虚流入經絡血化為水故令浮腫然有氣腫水腫之别不可不辨也若輕虚浮腫心胸脹滿者因素有水飲所作名曰氣分也宜用枳术湯即枳實白术煎湯服之若喘嗽小便不利者則為水腫宜茯苓𨗳水湯利之若皮如熟李或徧身青腫者則為血分宜小調中湯治之其方即當歸白芍藥白术茯苓陳皮煎湯冲小調經􅄆服之即當歸赤芍琥珀麝香細辛肉桂心沒藥也茯苓𨗳水湯方見三卷發熱緫括産後發熱不一端内傷飲食外風寒瘀血血虚與勞力三朝蒸乳亦當然隂虚血脫陽外􅄆攻補温凉細細叅註産後發熱之故非止一端如食飲太過胸滿嘔吐惡食者則為傷食發熱若早起勞動感受風寒則為外感發熱若惡露不去瘀血停留則為瘀血發熱若去血過多隂血不足則為血虛發熱亦有因産時傷力勞乏發熱者三日蒸乳發熱者當詳其有餘不足或攻或補或用凉藥正治或用温熱反治要在臨證細細恭考也發熱證治加味四物湯加味異功􅄆生化湯産後發熱多血傷大法四物加炮薑頭疼惡寒外感熱四物柴胡䓤白良嘔吐脹悶傷食氣異功查麯厚朴薑脾不化食六君子瘀血腹痛生化湯當歸川芎丹参共桃仁紅花炮乾薑註産後發熱多因隂血暴傷陽無所附大法宜四物湯加炮薑從隂引陽為正治若頭疼惡寒而發熱者属外感不當作傷寒治惟宜用四物加柴胡葱白服之若嘔吐脹悶属傷食若倦怠氣乏者属傷氣宜用異功􅄆加山查神麯厚朴生薑治之若因脾虛不能化食而停食發熱者宜六君子湯若因瘀血發熱者必兼腹痛宜用生化湯即當歸川芎丹参桃仁紅花薑炭也六君子湯異功􅄆四物湯方俱見首卷勞力發熱用十全氣血兩虛八珍痊血脫躁熱補血效虛陽外越参附煎註産後發熱因産時用力勞乏者宜十全大補湯氣血兩虚者八珍湯去血過多血脫煩躁乾渴面赤而熱者宜當歸補血湯若隂血暴脫孤陽無附而外越發熱者急進参附湯遲則必大汗大喘是陽欲亡雖藥必無救矣十全大補湯八珍湯當歸補血湯方俱見首卷寒熱緫括寒熱徃来逓更换乍寒乍熱時熱寒寒熱似瘧按時發壮熱憎寒熱畏寒註産後寒熱名既不同其證亦異當先明辨之如曰寒熱徃来者謂寒去熱来熱去寒来逓相更换也曰乍寒乍熱者謂有時寒有時熱寒熱無定時也曰寒熱似瘧者謂或先寒後熱或先熱後寒一定不移至其時而始作也曰壮熱憎寒者謂其身既壮熱而復時時畏寒也徃来寒熱隂陽格時熱時寒榮衛乖寒熱似􅒻瘀兼食壮熱憎寒𢃄表推註産後血氣虚損隂陽不和則寒熱往来隂陽相乘榮衛不調則時寒時熱敗血不􅄆飲食停滯則寒熱似􅒻汗出遇風則壮熱憎寒有諸内自形諸外辨之既明然後治無不愈矣寒熱證治徃来寒熱隂陽格柴胡四物各半湯榮衛不和乍寒熱歸芍芎参甘草薑寒熱似瘧瘀兼食生化柴胡查麯良憎寒壮熱更生􅄆歸地芎参荆穂薑註産後隂陽不和徃来寒熱者宜柴胡四物湯若榮衛不調乍寒乍熱者用增損四物湯其方即當歸白芍川芎人参甘草乾薑也若停瘀兼食寒熱似􅒻者用生化湯加柴胡山查神麯若感受風寒憎寒壮熱者宜更生􅄆即當歸熟地川芎人参荆芥穂乾薑也柴胡四物湯方見首卷自汗頭汗緫括産後隂虚陽氣盛㣲㣲自汗却無妨頭汗隂虚陽上越周身大汗是亡陽註産後血去過多則隂虚隂虚則陽盛若㣲㣲自汗是榮衛調和故雖汗無妨若周身無汗獨頭汗出者乃隂虚陽氣上越之象也若頭身俱大汗不止則恐有亡陽之慮矣自汗頭汗證治當歸六黄湯黄耆湯虚熱上蒸頭汗出治用當歸六黄湯黄芩連蘗炒黒用歸耆生熟二地黄自汗黄耆湯牡蠣耆术苓甘麥地防大汗不止陽外脱大劑参附可囬陽註産後亡血隂虚陽熱上蒸頭上汗出至頸而還者宜當歸六黄湯即黄連黄芩黄蘗當歸黄耆生地熟地也内芩連蘗三味俱炒黒用若自汗太甚宜黄耆湯即牡蠣粉黄耆白术茯苓甘草麥冬熟地防風也若隂血大脱孤陽外越大汗不止非大劑参附不能囬陽也中風證治産後中風惟大補火氣風痰末治之十全大補為主劑臨證詳参佐使宜註産後氣血大虛雖患中風惟宜大補即有火熱風痰氣閉亦當末治緫以十全大補湯主之臨證詳恭其火氣風痰而佐使之十全大補湯方見首卷痙病證治加味八珍湯新産血虚多汗出易中風邪痙病成口噤項強身反折八珍耆附桂防風摇頭氣促寒不止兩手撮空莫望生註産後血氣不足蔵府皆虚多汗出腠理不宻風邪乘虚襲入遂成痙證手三陽之筋結扵頷頬風入頷頬則口噤隂陽經絡周環扵身風中經絡則頭項肩背强直如角弓反張之状産後患此皆属虚象惟宜用八珍湯加黄耆附子肉桂大補其隂陽少佐防風以治之若見頭摇喘促汗出不止兩手撮空者則為真氣去邪氣獨畱必死之候故曰莫望生也八珍湯方見首卷瘈瘲抽搐證治加味八珍湯隂血去多陽氣熾筋無所養致抽搐發熱惡寒煩又渇八珍丹地鈎藤鈎抽搐無力戴眼折大汗不止命將休註産後血去太多陽氣熾盛筋無所養必致瘈瘲抽搐發熱惡寒心煩口渇不宜作風治惟當氣血兼補用八珍湯加丹皮生地鈎藤鈎治之若無力抽搐戴眼反折大汗不止者則為不治之證故曰命将休也八珍湯方見首卷不語證治加味八珍湯星連二陳湯七珍散產後不語分虚實痰熱乘心敗血衝氣血兩虚神鬰冒寔少虚多要辨明虚用八珍籐菖志痰熱星連入二陳敗血衝心七珍散芎地辛防硃蒲參註產後不語須分虚實治之有痰熱乘心者有敗血衝心者有氣血兩虛而鬰冒神昏者大抵產後属虚者多而實者少也虚宜八珍湯加鈎藤菖蒲逺志痰熱宜二陳湯加膽星黄連敗血冲心宜七珍散即川芎生地細辛防風硃砂菖蒲人參也八珍湯方見首卷二陳湯方見三卷御纂醫宗金鑑卷四十七
