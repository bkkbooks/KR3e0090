  text: 編輯刺灸心法要訣目錄灸難産穴圖灸難產穴歌鍼子戸穴圖鍼子戸穴歌灸遺精穴圖灸遺精穴歌灸癆蟲穴圖灸癆蟲穴歌灸痞根穴圖灸痞根穴歌灸肘尖穴圖灸肘尖穴歌灸鬼哭穴圖灸鬼哭穴歌灸中惡穴圖灸中惡穴歌灸疝氣穴圖灸疝氣穴歌灸翻胃穴圖灸翻胃穴歌灸腸風穴圖灸腸風穴歌灸暴絕穴圖灸暴絶穴歌灸鬼眼穴圖灸鬼眼穴歌灸贅疣穴圖灸贅疣穴歌灸瘰癧穴圖灸瘰癧穴歌灸腋氣圖灸腋氣歌灸瘋犬咬傷歌無圖灸蛇蠍蜈蚣蜘蛛咬傷歌無圖足三里穴圖足三里穴歌内庭穴圖内庭穴歌曲池穴圖曲池穴歌合谷穴圖合谷穴歌委中穴圖委中穴歌承山穴圖承山穴歌太衝穴圖太衝穴歌崑崙穴圖崑崙穴歌環跳穴圖環跳穴歌陽陵泉穴圖陽陵泉穴歌通里穴圖通里穴歌列缺穴圖列缺穴歌四季鍼灸坐向歌灸法㸃穴用火歌灸法蚤晩次序歌灸法大小多少歌灸法調養歌灸瘡調治歌灸瘡膏藥歌行鍼避忌歌四季人神所在禁忌鍼灸歌逐日人神所在禁忌鍼灸歌十二時人神所在禁忌鍼灸歌禁鍼穴歌禁灸穴歌製鍼法歌煑鍼藥方御纂醫宗金鑑卷八十六目録欽定四庫全書御纂醫宗金鑑卷八十六編輯刺灸心法要訣目錄灸難産穴圖灸難產穴歌鍼子戸穴圖鍼子戸穴歌灸遺精穴圖灸遺精穴歌灸癆蟲穴圖灸癆蟲穴歌灸痞根穴圖灸痞根穴歌灸肘尖穴圖灸肘尖穴歌灸鬼哭穴圖灸鬼哭穴歌灸中惡穴圖灸中惡穴歌灸疝氣穴圖灸疝氣穴歌灸翻胃穴圖灸翻胃穴歌灸腸風穴圖灸腸風穴歌灸暴絕穴圖灸暴絶穴歌灸鬼眼穴圖灸鬼眼穴歌灸贅疣穴圖灸贅疣穴歌灸瘰癧穴圖灸瘰癧穴歌灸腋氣圖灸腋氣歌灸瘋犬咬傷歌無圖灸蛇蠍蜈蚣蜘蛛咬傷歌無圖足三里穴圖足三里穴歌内庭穴圖内庭穴歌曲池穴圖曲池穴歌合谷穴圖合谷穴歌委中穴圖委中穴歌承山穴圖承山穴歌太衝穴圖太衝穴歌崑崙穴圖崑崙穴歌環跳穴圖環跳穴歌陽陵泉穴圖陽陵泉穴歌通里穴圖通里穴歌列缺穴圖列缺穴歌四季鍼灸坐向歌灸法㸃穴用火歌灸法蚤晩次序歌灸法大小多少歌灸法調養歌灸瘡調治歌灸瘡膏藥歌行鍼避忌歌四季人神所在禁忌鍼灸歌逐日人神所在禁忌鍼灸歌十二時人神所在禁忌鍼灸歌禁鍼穴歌禁灸穴歌製鍼法歌煑鍼藥方御纂醫宗金鑑卷八十六目録欽定四庫全書御纂醫宗金鑑卷八十六編輯刺灸心法要訣灸難產穴歌横逆難產灸奇穴婦人右脚小指尖炷如小麥灸三壯下火立產效通仙註婦人横產子手先出諸符藥不效者灸此其穴在右脚小指爪甲外側尖上即至陰穴也灸三壯艾炷如小麥下火立產鍼子戸穴歌子戸能刺衣不下更治子死在腹中穴在闗元右二寸下鍼一寸立時生註胞衣不出子死腹中宜刺子戸穴鍼入一寸其穴在任衇經之闗元穴傍右二寸灸遺精穴歌精宫十四椎之下各開三寸是其鄉左右二穴灸七壯夜夢遺精效非常註遺精灸精宫穴其穴在脊之十四椎下左右傍開各三寸灸七壯灸癆蟲穴歌鬼眼一穴灸癆蟲墨㸃病人腰眼中擇用癸亥亥時灸勿令人知法最靈註勞瘵日乆不愈互相傳染因内有勞蟲宜灸鬼眼穴穴在腰間兩旁正身直立有微陷處用墨㸃記合面而卧以小艾炷灸七壯或九壯十一壯多寡量人蟲即吐瀉而出急取燒燬逺棄可免復傳擇癸亥日夜半六神皆聚亥時灸之勿使病人預知恐尸神有覺也灸痞根穴歌十二椎下痞根穴各開三寸零五分二穴左右灸七壯難消痞塊可除根註痞塊灸痞根穴其穴在脊之十二椎下旁開三寸半痞塊多在左則灸左在右則灸右如左右俱有左右俱灸之灸肘尖穴歌肘尖端處是奇穴男女瘰癧堪灸也左患灸右右灸左並灸風池效更㨗註肘尖奇穴灸瘰癧左患灸右右患灸左如初起時男先灸左女先灸右兼灸風池穴尤效風池穴在腦後顳顬穴後髪際䧟中灸鬼哭穴歌中惡振噤鬼魅病急灸鬼哭神可定兩手大指相並縛穴在四處之騎縫註鬼哭穴灸鬼魅狐惑恍惚振噤等證取穴将兩手大指相並縛定用艾炷於兩甲角反甲後肉四處騎縫着火灸之則患者哀告我自去為效中惡穴歌尸疰客忤中惡病乳後三寸量凖行男左女右艾火灸邪祟驅除神自寧註灸尸疰客忤中惡等證其穴在乳後三寸男左女右灸之灸疝氣穴歌疝氣偏墜灸為先量口兩角折三尖一尖向上對臍中兩尖下垂是穴邉註灸疝痛偏墜奇穴法用稈心一條量患人口兩角為則折為三叚如字樣以一角安臍中心兩角安臍下兩傍尖畫處是穴左患灸右右患灸左左右俱患左右俱灸艾炷如粟米大灸四壯灸翻胃穴歌翻胃上下灸奇穴上在乳下一寸也下在内踝之下取三指稍斜向前者註灸翻胃奇穴上穴在兩乳下一寸下穴在内踝下用手三指稍斜向前排之即是穴也灸腸風穴歌腸風諸痔灸最良十四椎下奇穴鄉各開一寸宜多灸年深乆痔效非常註灸腸風諸痔奇穴其穴在脊之十四椎下傍各開一寸年深者灸之最效灸暴絶穴歌鬼魘暴絕最傷人急灸鬼眼可回春穴在兩足大指内去甲韭葉鬼難存註凡一切鬼魘暴絕當灸奇穴在足兩大指内去爪甲如韭葉許名鬼眼穴灸之則鬼邪自去而病可愈也灸鬼眼穴歌腫滿上下灸奇穴上即鬼哭不用縛下取兩足第二指指尖向後寸半符註灸腫滿奇穴上穴即兩手大指縫鬼哭穴也下穴在兩足第二指指尖向後一寸五分即是也灸贅疣穴歌贅疣諸痣灸奇穴更灸紫白二癜風手之左右中指節屈節尖上宛宛中註灸癜風及贅疣諸痣奇穴其穴在左右手中指節宛宛中俗名拳尖是也灸瘰癧穴歌瘰癧隔蒜灸法宜先從後發核灸起灸至初發母核止多着艾火效無匹註瘰癧隔蒜灸法用獨蒜片先從後發核上灸起至初發母核而止多灸自效灸腋氣歌腋氣除根剃腋毛再将定粉水調膏塗搽患處七日後視有黒孔用艾燒註凡腋氣先用快刀剃去腋毛浄乃用好定粉水調搽患處六七日後看腋下有一㸃黒者必有孔如鍼大或如簪尖即氣竅也用艾炷如米大者灸之三四壯愈永不再發灸瘋犬咬傷歌瘋犬咬傷先須吮吮盡惡血不生風次於咬處灸百壯常食炙韭不須驚註瘋犬咬傷之處急急用大嘴砂酒壺一箇内盛乾燒酒燙極熱去酒以酒壺嘴向咬處如拔火礶樣吸盡惡血為度擊破自落上用艾炷灸之永不再發炙韭炒韭菜也灸蛇蠍蜈蚣蜘蛛咬傷歌蛇蠍蜈蚣蜘蛛傷即時疼痛最難當急以傷處隔蒜灸五六十壯效非常註凡蛇蠍蜈蚣蜘蛛咬傷痛急勢危者急用艾火於傷處灸之拔散毒氣即安或用獨蒜片隔蒜灸之二三壯換一片毒甚者灸五六十壯足三里穴歌三里膝眼下三寸兩筋間能除胸脇痛腹脹胃中寒腸鳴并泄瀉眼腫膝脛痠傷寒羸痩損氣蠱證諸般年過三旬後鍼灸眼光全註三里足三里穴也其穴在膝眼下三寸胻骨外廉大筋内宛宛中鍼五分留七呼灸三壯主治胸脇疼痛腹脹胃寒腸中雷鳴脾寒泄瀉眼目紅腫膝脛痠痛傷寒熱不已痩弱虛損小腸氣痛與水氣蠱毒鬼擊諸證悉宜鍼灸但小兒忌灸恐眼目不明惟三十以外方可灸之令眼目光明也内庭穴歌内庭次指外本屬足陽明能治四肢厥喜静惡聞聲癮疹咽喉痛數欠及牙疼瘧疾不思食耳鳴鍼便清註内庭穴在足之大指次指外間陷中屬足陽明胃經穴也主治四肢厥逆喜静惡聞人聲癮疹不快咽喉腫痛數欠牙齦疼瘧疾不思飲食耳内蟬鳴等證鍼三分留十呼灸三壯曲池穴歌曲池拱手取屈肘骨邉求善治肘中痛偏風手不收挽弓開不得臂瘓怯梳頭喉痺促欲死發熱更無休遍身風癬癩鍼着即時瘳註曲池穴其穴在肘輔骨屈肘屈骨之中以手拱胸取之主治肘中疼痛偏風半身不遂臂痛拉弓不開兩臂癱瘓不能舉手向髪喉痺喘促欲死傷寒振寒餘熱不盡皮膚乾燥痂疥等證刺七分留七呼灸三壯合谷穴歌合谷在虎口兩指岐骨間頭疼并面腫瘧病熱還寒體熱身汗出目暗視茫然齒齲鼻衂血口噤不能言鍼入深三分能令人病安註合谷穴其穴在手大指次指岐骨間䧟中主治偏正頭疼面目浮腫瘧疾寒熱身體發熱汗不收目翳視物不明齒蠧朽痛鼻中流血不止口噤不開等證鍼三分留六呼灸三壯委中穴歌委中曲䐐裏横紋衇中央腰痛不能舉痠沉引脊梁風癎及轉筋疼痛難移向風痺痛無比熱病乆在床足膝難伸屈鍼入即安康註委中穴其穴在膕中央約紋動衇䧟中主治腰俠脊沉墜疼痛瘈瘲癲疾及兩腿肚轉筋疼痛難動風痺疼痛流注不定熱病難愈兩足膝疼痛難伸屈等證鍼五分留七呼禁灸承山穴歌承山名魚腹腨腸分肉間善治腰疼痛痔疾大便難脚氣并膝腫兩足盡寒痠展轉成時疫戰慄瘧熱寒霍亂及轉筋刺之立便安註承山穴其穴在腿肚下尖分肉間主治腰背疼痛痔腫大便難脚氣膝腫脛痠跟痛傷寒時疫寒熱瘧疾戰慄不能行立霍亂轉筋等證鍼五分灸五壯太衝穴歌太衝足大指節後二寸中動衇知生死能醫驚癎風咽喉并心腋兩足不能動七疝偏墜腫眼目似雲朦亦能療腰痛鍼下有神功註太衝穴其穴在足大指本節後二寸䧟中動衇隱手病者有此衇生無此衇者死主治急慢驚風羊癎風證及咽喉疼痛心腋脹滿寒濕脚氣痛行歩難小腹疝氣偏墜疼痛兩目昏暗腰背疼痛等證鍼三分留十呼灸三壯崑崙穴歌崑崙足外踝跟骨上邉尋轉筋腰尻痛膊重更連陰頭疼脊背急暴喘滿衝心舉歩行不得動足即伸吟若欲求安樂須將此穴鍼註崑崙穴在足外踝後五分跟骨上䧟中主治腰尻疼痛膊重不能舉及前陰腫痛偏正頭痛脊背拘急暴咳喘促足腨腫不得履地等證鍼三分留七呼灸三壯環跳穴歌環跳在髀樞側卧屈足取能鍼偏廢軀折腰返顧難冷風并濕痺身體似繩牽腿胯連腨痛屈轉重吁歎若人能鍼灸頃刻病消痊註環跳穴其穴在髀樞中側卧伸下足屈上足取之主治半身不遂閃挫腰痛不能囬顧冷風濕痺周身拘急腿跨腿肚疼痛不能動轉等證鍼一寸留十呼灸三壯陽陵泉穴歌陽陵居膝下外廉一寸中膝腫并麻木冷痺及偏風起坐腰背重面腫滿胸中舉足不能起坐卧似衰翁鍼入六分止神功妙不同註陽陵泉穴其穴在膝下一寸外廉䧟中尖骨前筋骨間主治兩膝腫痛及冷痺不仁半身不遂腰背重痛起坐艱難面目浮腫胸中脹滿兩足疼痛難移起坐不能支持等證鍼六分留十呼灸七壯通里穴歌通里腕側後去腕一寸中欲言聲不出懊憹及怔忡實則四肢重頭腮面頰紅聲平仍數欠喉痺氣難通虚則不能食暴瘖面無容毫鍼微微刺方信有神功註通里穴其穴在腕側後一寸䧟中主治聲瘂心煩極甚怔忡不寧四肢重痛頭腮面頰紅腫倦言數欠喉咽疼痛氣息不通虚損不思食暴瘖面無潤澤鍼三分灸三壯列缺穴歌列缺腕側上次指手交义善療偏頭患遍身風痺麻痰涎頻上壅口噤不開牙若能明補瀉應手即能瘥註列缺穴其穴在腕後側上一寸五分兩手交义當食指末筋骨罅中主治偏風頭痛遍身風痺麻木痰壅氣堵口噤不開等證鍼二分留三呼灸三壯四季鍼灸坐向歌四季鍼灸坐向理宜從四季順自然東南西北四維向以迎生氣本乎天註鍼灸坐向避忌之理醫學入門春坐東向西夏坐南向北秋坐西向東冬坐北向南皆背四季生氣之向不可為法宜從春向東夏向南秋向西冬向北四土旺月向四維以迎生氣本乎天理順其自然為是也灸法㸃穴用火歌㸃穴坐卧立直正炷用蘄艾火珠良灸病古忌八木火今時通行一炷香註凡灸法坐㸃穴則坐灸卧㸃穴則卧灸立㸃穴則立灸須四體平直毋令傾側若傾側穴即不正其炷所用之艾必用蘄艾艾令乾燥入臼搗去浄塵屑作炷堅實置穴上用葱涎粘固上古用火珠映日取火㸃之忌松柏枳橘榆棗桑竹八木之火今時惟用香火灼艾亦通行簡便之法也灸法蚤晚次序歌灸法温煖宜於午上下陽陰先後分衇數新愈不宜灸欲灸三里過三旬註凡灸百病原為温煖經絡宜在午時陽盛之時火氣易行必分上下先後上下經皆灸者先灸上後灸下陰陽經皆灸者先灸陽後灸陰若衇數有熱新愈氣虛俱不宜灸恐傷氣血但人有病欲灸足三里者須年三十以上方許灸之恐年少火盛傷目故凡灸頭必灸足三里者以足三里能下火氣也灸法大小多少歌頭骨手足皮薄痩巨闕鳩尾小少宜背腹臍下皮肉厚大多方能起痼疾註凡灸諸病必火足氣到始能求愈然頭與四肢皮肉淺薄若併灸之恐肌骨氣血難堪必分日灸之或隔日灸之其炷宜小壯數宜少有病必當灸巨闕鳩尾二穴者必不可過三壯艾炷如小麥恐火氣傷心也背腹下皮肉深厚艾炷宜大壯數宜多使火氣到始能去痼冷之疾也灸法調養歌灸後風寒須謹避七情過極愼起居生冷醇酒諸厚味惟茹蔬淡適其宜註凡灸後須謹避風寒愼其起居養其氣血其喜怒憂思悲恐驚不可過極和其情志及禁食一切生冷醇酒厚味等物即食蔬淡亦當適宜不可過度以調養脾胃也灸瘡調治歌灸瘡不發氣血竭七日發膿病必除發後膏貼防外襲薄連葱荽淨瘡汚註凡灸諸病灸瘡應發不發是其氣血大虧不必復灸即灸亦多不能愈過七天之後艾疤發時膿水稠多其病易愈以其氣血充暢經絡流通也發後貼膏藥者防其六滛外襲也如灸瘡黒痛膿汁汚穢乃艾火毒盛必用薄荷黄連葱皮芫荽煎湯洗之自愈也灸瘡膏藥歌芩連白芷金星草乳香淡竹當歸好薄荷川芎與葱白香油煎藥粉成膏以上藥味各等分用香油煎藥去楂再下鉛粉熬成膏専貼灸瘡行鍼避忌歌行鍼避忌雨大風饑飽醉怒渴勞驚男内女外猶堅守更看人神不可逢行鍼避忌雖如此還推病之緩急行緩病欲鍼擇吉日急病行鍼莫稍停註按行鍼避忌於未刺之先如風雨晦㝠人之氣血即凝滯而不調大饑者氣虚新飽者氣盛大醉者氣亂大怒者氣逆大渇者液少大勞者氣乏大驚者氣散凡此者衇亂氣散行鍼須當避忌俟其必清必静聚精㑹神方保無誤也既刺之後尤當戒愼男子忌内女子忌外忌外者堅拒勿出忌内者謹守勿内則邪氣必去正氣必復是謂得氣理固然矣猶有逹變之法存焉緩病須擇神吉急病豈可待時哉四季人神所在禁忌鍼灸歌四季人神所在處禁忌鍼灸莫妄施春在左脇秋在右冬在於腰夏在臍註四季人神所在之處謂人之神氣初動之處同乎天之流行也禁鍼灸者恐傷生氣也人神常在心春在左脇者肝主升也秋在右脇者肺主降也冬在腰者神主藏也夏在臍者脾主化也逐日人神所在禁忌鍼灸歌一日足大二外踝三日股内四在腰五口六手七内踝八腕九尻十背腰十一鼻柱二髪際三牙四胃五徧身六胸七氣八股内九足二十内踝尋廿一手小二外踝三日肝足四手明五足六胸七在膝八陰九脛晦趺停註足大足之大指也氣氣衝也手小手之小指也手明手陽明也足足陽明也陰男女前陰中也晦月盡也趺足十指岐骨也十二時人神所在禁忌鍼灸歌子踝丑頭寅耳邉卯面辰項巳乳肩午脇未腹申心主酉膝戌腰亥股端註子踝左右内踝外踝也寅耳邉左右兩耳也辰項頸項也巳乳肩兩乳兩肩也午脇左右脇也未腹大腹少腹也申心主胸膈也酉膝左右兩膝也戌腰腰背也亥股兩股内外也禁鍼穴歌禁鍼穴道要先明腦戸􅇟㑹及神庭絡却玉枕角孫穴顱息承泣隨承靈神道靈臺膻中忌水分神闗并㑹陰横骨氣衝手五里箕門承筋及青靈乳中上臂三陽絡二十三穴不可鍼孕婦不宜鍼合谷三陰交内亦通論石門鍼灸應須忌女子終身無妊娠外有雲門并鳩尾缺盆客主人莫深肩井深時人悶倒三里急補人還平刺中五藏膽皆死衝陽血出投幽㝠海泉顴窌乳頭上脊間中髓傴僂形手魚腹䧟陰股内膝臏筋㑹及腎經腋股之下各三寸目眶闗節皆通評焚灸穴歌焚灸之穴四十七承光瘂門風府逆睛明攢竹下迎香天柱素髎上臨泣腦戸耳門瘈衇通禾髎顴髎絲竹空頭維下闗人迎等肩貞天牖心俞同乳中脊中白環俞鳩尾淵液如周榮腹哀少商并魚際經渠天府及中衝陽池陽闗地五㑹漏谷陰陵條口逢殷門申衇承扶忌伏兎髀闗連委中陰市下行尋犢鼻諸穴休将艾火攻製鍼法歌製鍼須用馬啣鐵惟有金鍼更可嘉煆煉塗酥插臘肉煮鍼之藥有多法註製鍼用馬嚼環鐵者以馬屬午午為火火尅金取尅制之義也若以眞金製鍼用之更佳其煆煉之法將鐵絲於火中煆紅截為二寸或三寸或五寸長短不拘次以蟾酥塗鍼上入火中微煆取起復照前塗酥煆三次乗熱插入臘肉皮之裏肉之外将後藥用水三碗煎沸次入鍼肉在内煮至水乾傾於水中待冷将鍼取出於黄土中插百餘下以去火毒其鍼要光圎不可用尖鋒次以桐絲纒其柄煮鍼藥方麝香五分膽礬一錢石斛一錢穿山甲三錢硃砂三錢没藥三錢鬰金三錢川芎三錢細辛三錢甘草節五錢沉香五錢磁石一兩已上諸藥氣味能引入鍼内御纂醫宗金鑑卷八十六欽定四庫全書御纂醫宗金鑑卷八十六編輯刺灸心法要訣灸難產穴歌横逆難產灸奇穴婦人右脚小指尖炷如小麥灸三壯下火立產效通仙註婦人横產子手先出諸符藥不效者灸此其穴在右脚小指爪甲外側尖上即至陰穴也灸三壯艾炷如小麥下火立產鍼子戸穴歌子戸能刺衣不下更治子死在腹中穴在闗元右二寸下鍼一寸立時生註胞衣不出子死腹中宜刺子戸穴鍼入一寸其穴在任衇經之闗元穴傍右二寸灸遺精穴歌精宫十四椎之下各開三寸是其鄉左右二穴灸七壯夜夢遺精效非常註遺精灸精宫穴其穴在脊之十四椎下左右傍開各三寸灸七壯灸癆蟲穴歌鬼眼一穴灸癆蟲墨㸃病人腰眼中擇用癸亥亥時灸勿令人知法最靈註勞瘵日乆不愈互相傳染因内有勞蟲宜灸鬼眼穴穴在腰間兩旁正身直立有微陷處用墨㸃記合面而卧以小艾炷灸七壯或九壯十一壯多寡量人蟲即吐瀉而出急取燒燬逺棄可免復傳擇癸亥日夜半六神皆聚亥時灸之勿使病人預知恐尸神有覺也灸痞根穴歌十二椎下痞根穴各開三寸零五分二穴左右灸七壯難消痞塊可除根註痞塊灸痞根穴其穴在脊之十二椎下旁開三寸半痞塊多在左則灸左在右則灸右如左右俱有左右俱灸之灸肘尖穴歌肘尖端處是奇穴男女瘰癧堪灸也左患灸右右灸左並灸風池效更㨗註肘尖奇穴灸瘰癧左患灸右右患灸左如初起時男先灸左女先灸右兼灸風池穴尤效風池穴在腦後顳顬穴後髪際䧟中灸鬼哭穴歌中惡振噤鬼魅病急灸鬼哭神可定兩手大指相並縛穴在四處之騎縫註鬼哭穴灸鬼魅狐惑恍惚振噤等證取穴将兩手大指相並縛定用艾炷於兩甲角反甲後肉四處騎縫着火灸之則患者哀告我自去為效中惡穴歌尸疰客忤中惡病乳後三寸量凖行男左女右艾火灸邪祟驅除神自寧註灸尸疰客忤中惡等證其穴在乳後三寸男左女右灸之灸疝氣穴歌疝氣偏墜灸為先量口兩角折三尖一尖向上對臍中兩尖下垂是穴邉註灸疝痛偏墜奇穴法用稈心一條量患人口兩角為則折為三叚如字樣以一角安臍中心兩角安臍下兩傍尖畫處是穴左患灸右右患灸左左右俱患左右俱灸艾炷如粟米大灸四壯灸翻胃穴歌翻胃上下灸奇穴上在乳下一寸也下在内踝之下取三指稍斜向前者註灸翻胃奇穴上穴在兩乳下一寸下穴在内踝下用手三指稍斜向前排之即是穴也灸腸風穴歌腸風諸痔灸最良十四椎下奇穴鄉各開一寸宜多灸年深乆痔效非常註灸腸風諸痔奇穴其穴在脊之十四椎下傍各開一寸年深者灸之最效灸暴絶穴歌鬼魘暴絕最傷人急灸鬼眼可回春穴在兩足大指内去甲韭葉鬼難存註凡一切鬼魘暴絕當灸奇穴在足兩大指内去爪甲如韭葉許名鬼眼穴灸之則鬼邪自去而病可愈也灸鬼眼穴歌腫滿上下灸奇穴上即鬼哭不用縛下取兩足第二指指尖向後寸半符註灸腫滿奇穴上穴即兩手大指縫鬼哭穴也下穴在兩足第二指指尖向後一寸五分即是也灸贅疣穴歌贅疣諸痣灸奇穴更灸紫白二癜風手之左右中指節屈節尖上宛宛中註灸癜風及贅疣諸痣奇穴其穴在左右手中指節宛宛中俗名拳尖是也灸瘰癧穴歌瘰癧隔蒜灸法宜先從後發核灸起灸至初發母核止多着艾火效無匹註瘰癧隔蒜灸法用獨蒜片先從後發核上灸起至初發母核而止多灸自效灸腋氣歌腋氣除根剃腋毛再将定粉水調膏塗搽患處七日後視有黒孔用艾燒註凡腋氣先用快刀剃去腋毛浄乃用好定粉水調搽患處六七日後看腋下有一㸃黒者必有孔如鍼大或如簪尖即氣竅也用艾炷如米大者灸之三四壯愈永不再發灸瘋犬咬傷歌瘋犬咬傷先須吮吮盡惡血不生風次於咬處灸百壯常食炙韭不須驚註瘋犬咬傷之處急急用大嘴砂酒壺一箇内盛乾燒酒燙極熱去酒以酒壺嘴向咬處如拔火礶樣吸盡惡血為度擊破自落上用艾炷灸之永不再發炙韭炒韭菜也灸蛇蠍蜈蚣蜘蛛咬傷歌蛇蠍蜈蚣蜘蛛傷即時疼痛最難當急以傷處隔蒜灸五六十壯效非常註凡蛇蠍蜈蚣蜘蛛咬傷痛急勢危者急用艾火於傷處灸之拔散毒氣即安或用獨蒜片隔蒜灸之二三壯換一片毒甚者灸五六十壯足三里穴歌三里膝眼下三寸兩筋間能除胸脇痛腹脹胃中寒腸鳴并泄瀉眼腫膝脛痠傷寒羸痩損氣蠱證諸般年過三旬後鍼灸眼光全註三里足三里穴也其穴在膝眼下三寸胻骨外廉大筋内宛宛中鍼五分留七呼灸三壯主治胸脇疼痛腹脹胃寒腸中雷鳴脾寒泄瀉眼目紅腫膝脛痠痛傷寒熱不已痩弱虛損小腸氣痛與水氣蠱毒鬼擊諸證悉宜鍼灸但小兒忌灸恐眼目不明惟三十以外方可灸之令眼目光明也内庭穴歌内庭次指外本屬足陽明能治四肢厥喜静惡聞聲癮疹咽喉痛數欠及牙疼瘧疾不思食耳鳴鍼便清註内庭穴在足之大指次指外間陷中屬足陽明胃經穴也主治四肢厥逆喜静惡聞人聲癮疹不快咽喉腫痛數欠牙齦疼瘧疾不思飲食耳内蟬鳴等證鍼三分留十呼灸三壯曲池穴歌曲池拱手取屈肘骨邉求善治肘中痛偏風手不收挽弓開不得臂瘓怯梳頭喉痺促欲死發熱更無休遍身風癬癩鍼着即時瘳註曲池穴其穴在肘輔骨屈肘屈骨之中以手拱胸取之主治肘中疼痛偏風半身不遂臂痛拉弓不開兩臂癱瘓不能舉手向髪喉痺喘促欲死傷寒振寒餘熱不盡皮膚乾燥痂疥等證刺七分留七呼灸三壯合谷穴歌合谷在虎口兩指岐骨間頭疼并面腫瘧病熱還寒體熱身汗出目暗視茫然齒齲鼻衂血口噤不能言鍼入深三分能令人病安註合谷穴其穴在手大指次指岐骨間䧟中主治偏正頭疼面目浮腫瘧疾寒熱身體發熱汗不收目翳視物不明齒蠧朽痛鼻中流血不止口噤不開等證鍼三分留六呼灸三壯委中穴歌委中曲䐐裏横紋衇中央腰痛不能舉痠沉引脊梁風癎及轉筋疼痛難移向風痺痛無比熱病乆在床足膝難伸屈鍼入即安康註委中穴其穴在膕中央約紋動衇䧟中主治腰俠脊沉墜疼痛瘈瘲癲疾及兩腿肚轉筋疼痛難動風痺疼痛流注不定熱病難愈兩足膝疼痛難伸屈等證鍼五分留七呼禁灸承山穴歌承山名魚腹腨腸分肉間善治腰疼痛痔疾大便難脚氣并膝腫兩足盡寒痠展轉成時疫戰慄瘧熱寒霍亂及轉筋刺之立便安註承山穴其穴在腿肚下尖分肉間主治腰背疼痛痔腫大便難脚氣膝腫脛痠跟痛傷寒時疫寒熱瘧疾戰慄不能行立霍亂轉筋等證鍼五分灸五壯太衝穴歌太衝足大指節後二寸中動衇知生死能醫驚癎風咽喉并心腋兩足不能動七疝偏墜腫眼目似雲朦亦能療腰痛鍼下有神功註太衝穴其穴在足大指本節後二寸䧟中動衇隱手病者有此衇生無此衇者死主治急慢驚風羊癎風證及咽喉疼痛心腋脹滿寒濕脚氣痛行歩難小腹疝氣偏墜疼痛兩目昏暗腰背疼痛等證鍼三分留十呼灸三壯崑崙穴歌崑崙足外踝跟骨上邉尋轉筋腰尻痛膊重更連陰頭疼脊背急暴喘滿衝心舉歩行不得動足即伸吟若欲求安樂須將此穴鍼註崑崙穴在足外踝後五分跟骨上䧟中主治腰尻疼痛膊重不能舉及前陰腫痛偏正頭痛脊背拘急暴咳喘促足腨腫不得履地等證鍼三分留七呼灸三壯環跳穴歌環跳在髀樞側卧屈足取能鍼偏廢軀折腰返顧難冷風并濕痺身體似繩牽腿胯連腨痛屈轉重吁歎若人能鍼灸頃刻病消痊註環跳穴其穴在髀樞中側卧伸下足屈上足取之主治半身不遂閃挫腰痛不能囬顧冷風濕痺周身拘急腿跨腿肚疼痛不能動轉等證鍼一寸留十呼灸三壯陽陵泉穴歌陽陵居膝下外廉一寸中膝腫并麻木冷痺及偏風起坐腰背重面腫滿胸中舉足不能起坐卧似衰翁鍼入六分止神功妙不同註陽陵泉穴其穴在膝下一寸外廉䧟中尖骨前筋骨間主治兩膝腫痛及冷痺不仁半身不遂腰背重痛起坐艱難面目浮腫胸中脹滿兩足疼痛難移起坐不能支持等證鍼六分留十呼灸七壯通里穴歌通里腕側後去腕一寸中欲言聲不出懊憹及怔忡實則四肢重頭腮面頰紅聲平仍數欠喉痺氣難通虚則不能食暴瘖面無容毫鍼微微刺方信有神功註通里穴其穴在腕側後一寸䧟中主治聲瘂心煩極甚怔忡不寧四肢重痛頭腮面頰紅腫倦言數欠喉咽疼痛氣息不通虚損不思食暴瘖面無潤澤鍼三分灸三壯列缺穴歌列缺腕側上次指手交义善療偏頭患遍身風痺麻痰涎頻上壅口噤不開牙若能明補瀉應手即能瘥註列缺穴其穴在腕後側上一寸五分兩手交义當食指末筋骨罅中主治偏風頭痛遍身風痺麻木痰壅氣堵口噤不開等證鍼二分留三呼灸三壯四季鍼灸坐向歌四季鍼灸坐向理宜從四季順自然東南西北四維向以迎生氣本乎天註鍼灸坐向避忌之理醫學入門春坐東向西夏坐南向北秋坐西向東冬坐北向南皆背四季生氣之向不可為法宜從春向東夏向南秋向西冬向北四土旺月向四維以迎生氣本乎天理順其自然為是也灸法㸃穴用火歌㸃穴坐卧立直正炷用蘄艾火珠良灸病古忌八木火今時通行一炷香註凡灸法坐㸃穴則坐灸卧㸃穴則卧灸立㸃穴則立灸須四體平直毋令傾側若傾側穴即不正其炷所用之艾必用蘄艾艾令乾燥入臼搗去浄塵屑作炷堅實置穴上用葱涎粘固上古用火珠映日取火㸃之忌松柏枳橘榆棗桑竹八木之火今時惟用香火灼艾亦通行簡便之法也灸法蚤晚次序歌灸法温煖宜於午上下陽陰先後分衇數新愈不宜灸欲灸三里過三旬註凡灸百病原為温煖經絡宜在午時陽盛之時火氣易行必分上下先後上下經皆灸者先灸上後灸下陰陽經皆灸者先灸陽後灸陰若衇數有熱新愈氣虛俱不宜灸恐傷氣血但人有病欲灸足三里者須年三十以上方許灸之恐年少火盛傷目故凡灸頭必灸足三里者以足三里能下火氣也灸法大小多少歌頭骨手足皮薄痩巨闕鳩尾小少宜背腹臍下皮肉厚大多方能起痼疾註凡灸諸病必火足氣到始能求愈然頭與四肢皮肉淺薄若併灸之恐肌骨氣血難堪必分日灸之或隔日灸之其炷宜小壯數宜少有病必當灸巨闕鳩尾二穴者必不可過三壯艾炷如小麥恐火氣傷心也背腹下皮肉深厚艾炷宜大壯數宜多使火氣到始能去痼冷之疾也灸法調養歌灸後風寒須謹避七情過極愼起居生冷醇酒諸厚味惟茹蔬淡適其宜註凡灸後須謹避風寒愼其起居養其氣血其喜怒憂思悲恐驚不可過極和其情志及禁食一切生冷醇酒厚味等物即食蔬淡亦當適宜不可過度以調養脾胃也灸瘡調治歌灸瘡不發氣血竭七日發膿病必除發後膏貼防外襲薄連葱荽淨瘡汚註凡灸諸病灸瘡應發不發是其氣血大虧不必復灸即灸亦多不能愈過七天之後艾疤發時膿水稠多其病易愈以其氣血充暢經絡流通也發後貼膏藥者防其六滛外襲也如灸瘡黒痛膿汁汚穢乃艾火毒盛必用薄荷黄連葱皮芫荽煎湯洗之自愈也灸瘡膏藥歌芩連白芷金星草乳香淡竹當歸好薄荷川芎與葱白香油煎藥粉成膏以上藥味各等分用香油煎藥去楂再下鉛粉熬成膏専貼灸瘡行鍼避忌歌行鍼避忌雨大風饑飽醉怒渴勞驚男内女外猶堅守更看人神不可逢行鍼避忌雖如此還推病之緩急行緩病欲鍼擇吉日急病行鍼莫稍停註按行鍼避忌於未刺之先如風雨晦㝠人之氣血即凝滯而不調大饑者氣虚新飽者氣盛大醉者氣亂大怒者氣逆大渇者液少大勞者氣乏大驚者氣散凡此者衇亂氣散行鍼須當避忌俟其必清必静聚精㑹神方保無誤也既刺之後尤當戒愼男子忌内女子忌外忌外者堅拒勿出忌内者謹守勿内則邪氣必去正氣必復是謂得氣理固然矣猶有逹變之法存焉緩病須擇神吉急病豈可待時哉四季人神所在禁忌鍼灸歌四季人神所在處禁忌鍼灸莫妄施春在左脇秋在右冬在於腰夏在臍註四季人神所在之處謂人之神氣初動之處同乎天之流行也禁鍼灸者恐傷生氣也人神常在心春在左脇者肝主升也秋在右脇者肺主降也冬在腰者神主藏也夏在臍者脾主化也逐日人神所在禁忌鍼灸歌一日足大二外踝三日股内四在腰五口六手七内踝八腕九尻十背腰十一鼻柱二髪際三牙四胃五徧身六胸七氣八股内九足二十内踝尋廿一手小二外踝三日肝足四手明五足六胸七在膝八陰九脛晦趺停註足大足之大指也氣氣衝也手小手之小指也手明手陽明也足足陽明也陰男女前陰中也晦月盡也趺足十指岐骨也十二時人神所在禁忌鍼灸歌子踝丑頭寅耳邉卯面辰項巳乳肩午脇未腹申心主酉膝戌腰亥股端註子踝左右内踝外踝也寅耳邉左右兩耳也辰項頸項也巳乳肩兩乳兩肩也午脇左右脇也未腹大腹少腹也申心主胸膈也酉膝左右兩膝也戌腰腰背也亥股兩股内外也禁鍼穴歌禁鍼穴道要先明腦戸􅇟㑹及神庭絡却玉枕角孫穴顱息承泣隨承靈神道靈臺膻中忌水分神闗并㑹陰横骨氣衝手五里箕門承筋及青靈乳中上臂三陽絡二十三穴不可鍼孕婦不宜鍼合谷三陰交内亦通論石門鍼灸應須忌女子終身無妊娠外有雲門并鳩尾缺盆客主人莫深肩井深時人悶倒三里急補人還平刺中五藏膽皆死衝陽血出投幽㝠海泉顴窌乳頭上脊間中髓傴僂形手魚腹䧟陰股内膝臏筋㑹及腎經腋股之下各三寸目眶闗節皆通評焚灸穴歌焚灸之穴四十七承光瘂門風府逆睛明攢竹下迎香天柱素髎上臨泣腦戸耳門瘈衇通禾髎顴髎絲竹空頭維下闗人迎等肩貞天牖心俞同乳中脊中白環俞鳩尾淵液如周榮腹哀少商并魚際經渠天府及中衝陽池陽闗地五㑹漏谷陰陵條口逢殷門申衇承扶忌伏兎髀闗連委中陰市下行尋犢鼻諸穴休将艾火攻製鍼法歌製鍼須用馬啣鐵惟有金鍼更可嘉煆煉塗酥插臘肉煮鍼之藥有多法註製鍼用馬嚼環鐵者以馬屬午午為火火尅金取尅制之義也若以眞金製鍼用之更佳其煆煉之法將鐵絲於火中煆紅截為二寸或三寸或五寸長短不拘次以蟾酥塗鍼上入火中微煆取起復照前塗酥煆三次乗熱插入臘肉皮之裏肉之外将後藥用水三碗煎沸次入鍼肉在内煮至水乾傾於水中待冷将鍼取出於黄土中插百餘下以去火毒其鍼要光圎不可用尖鋒次以桐絲纒其柄煮鍼藥方麝香五分膽礬一錢石斛一錢穿山甲三錢硃砂三錢没藥三錢鬰金三錢川芎三錢細辛三錢甘草節五錢沉香五錢磁石一兩已上諸藥氣味能引入鍼内御纂醫宗金鑑卷八十六
