body:
  text: 編輯外科心法要訣目録舌部紫舌脹痰包舌衄重舌痰核重腭舌疔舌疳附瘰癧風喉部𦂳喉風附纒喉風慢喉風喉閉附酒毒喉閉啞瘴喉風弄舌喉風喉疳喉癬上腭癰鎻喉毒乳蛾喉瘤胸乳部甘疽膻中疽脾發疽井疽蜂窩疽蠧疽􅗢癧疽内外吹乳乳疽乳癰乳發乳漏乳中結核乳勞乳岩御纂醫宗金鑑卷六十六目録欽定四庫全書御纂醫宗金鑑卷六十六編輯外科心法要訣目録舌部紫舌脹痰包舌衄重舌痰核重腭舌疔舌疳附瘰癧風喉部𦂳喉風附纒喉風慢喉風喉閉附酒毒喉閉啞瘴喉風弄舌喉風喉疳喉癬上腭癰鎻喉毒乳蛾喉瘤胸乳部甘疽膻中疽脾發疽井疽蜂窩疽蠧疽􅗢癧疽内外吹乳乳疽乳癰乳發乳漏乳中結核乳勞乳岩御纂醫宗金鑑卷六十六目録欽定四庫全書御纂醫宗金鑑卷六十六編輯外科心法要訣舌部紫舌脹紫舌脹屬心經火熱盛血壅腫硬疼舌腫滿口宜鍼刺血色紫重色紅輕註此證由心經火盛血壅以致舌腫滿口堅硬疼痛宜用衣鍼紥筯頭上露鋒分許當舌刺數十刺令血出紅色者輕紫色者重隨以温水潄口搽氷硼散内用凉膈散去朴硝大黃加牛蒡子荆芥倍用梔子服之甚效氷硼散見口部鵞口瘡凉膈散見面部痰包痰包每在舌下生結腫綿輭似匏形痛脹舌下妨食語火稽痰涎流注成註此證生於舌下結腫如匏光輭如綿塞脹舌下有妨飲食言語色黃木痛由火稽痰涎流注而成宜用立剪當包上剪破出痰涎如雞子清稠黏不斷拭凈搽氷硼散服加味二陳湯忌煎炒火酒等物加味二陳湯陳皮半夏製白茯苓黃芩各八分黃連薄荷甘草各五分生水二鍾薑三片煎八分食前服方歌加味二陳療痰包結腫舌下形如匏二陳湯加芩連薄薑煎服下自然消氷硼散見口部鵞口瘡舌衄舌衄心火血分炎舌上生孔似鐵尖或如筯頭其色紫甚黑腐爛血出泉註此證係舌上忽生孔小者如鍼尖大者如筯頭其孔色紫屬熱甚色黑防腐爛血出如泉湧由心火上炎以致血熱妄行而成宜服升麻湯兼搽必勝散甚效升麻湯升麻小薊根茜根各一兩五錢艾葉七錢五分寒水石三兩共研每三錢水一鍾煎七分澄去渣入生地黄汁一羮匙再煎二滾温服或加炒側栢葉五錢亦可方歌升麻舌衄心火炎小薊茜根各兩半艾葉七錢五分加寒水三兩同研爛必勝散螺青另研蒲黄各一錢炒共合一處研細搽於患處後用温鹽湯潄口方歌必勝心熱血妄行舌生小孔湧血紅螺青研末蒲黄炒同勻搽之自歸經重舌痰核重腭舌疔舌證發於心脾經其證皆由積熱成重舌舌下血衇脹痰核舌上一核生重腭生於口上腭時覺心煩梅子形舌疔舌上生紫皰其形如豆寒熱增註此證無論大人小兒俱可以生重舌者由心脾藴熱循經上冲舌本遂令舌下血衇脹起如小舌狀故名重舌宜用氷硼散搽之痰核者心脾痰涎鬱熱舌上生核强硬作痛宜用衣鍼㸃破搽氷硼散内服加味二陳湯重腭者心脾有熱以致上腭生瘡形如梅子外無寒熱内時作煩此屬熱極禁用鍼刺宜服黃連觧毒湯加桔梗不時用紫雪散噙化舌疔者心脾火毒舌生紫皰其形如豆堅硬寒熱疼痛應心初起宜用蟾酥丸含於舌下隨化隨嚥或再服三粒以解内毒甚者刺之服黃連解毒湯兼搽紫雪散及徐徐嚥之即愈紫雪散犀角鎊羚羊角鎊石膏寒水石升麻各一兩元參二兩甘草八錢生沉香剉木香各五錢剉水五盌煎藥剩湯一盌將渣用絹濾去將湯再煎滚投提凈朴硝三兩六錢文火慢煎水氣將盡欲凝結之時傾入盌内下硃砂氷片各三錢金鉑一百張各預研細和匀將藥盌安入凉水盆中候冷凝如雪為度大人每用一錢小兒二分十嵗者五分徐徐嚥之即效或用淡竹葉燈心煎湯化服亦可咽喉腫痛等證吹之亦效方歌紫雪散醫積熱效沉木犀羚元參草寒水升膏朴硝加硃鉑氷研入内攪氷硼散見口部鵞口瘡加味二陳湯見痰包黃連解毒湯見耳部黑疔蟾酥丸見疔瘡門舌疳附瘰癧風舌疳心脾毒火成如豆如菌痛爛紅漸若泛蓮難飲食綿潰久變瘰癧風註此證由心脾毒火所致其證最惡初如豆次如菌頭大蔕小又名舌菌疼痛紅爛無皮朝輕暮重急用北庭丹㸃之自然消縮而愈若失於調治以致焮腫突如泛蓮或有狀如鷄冠舌本短縮不能伸舒妨礙飲食言語時津臭涎再因怒氣上冲忽然崩裂血出不止久久延及項頷腫如結核堅硬臖痛皮色如常頂輭一㸃色暗木紅破後時津臭水腐如爛棉其證雖破堅硬腫痛仍前不退此為綿潰甚至透舌穿腮湯水漏出是以又名瘰癧風也盖舌本屬心舌邉屬脾因心緒煩擾則生火思慮傷脾則氣鬱鬱甚而成斯疾其證外勢頗類喉風但喉風咽喉常腫湯水不能下嚥此證咽喉不腫可以下嚥湯水胃中亦思飲食因舌不能轉動迭送硬食故每食不能充足致令胃中空虚而怯證悉添日漸衰敗初起宜服導赤湯加黃連虚者服歸脾湯熱甚者服清凉甘露飲合歸脾湯便溏者服歸芍異功湯頷下腫核初起宜用錦地羅蘸醋磨濃敷之潰後宜水澄膏貼之自古治法雖多然此證百無一生縱施藥餌不過苟延歳月而已清溪秘傳北庭丹番硇砂人中白各五分瓦上青苔瓦松溏鷄矢各一錢用傾銀罐子二箇將藥裝在罐内將口對嚴外用鹽泥封固以炭火煆紅待三炷香為度候冷開罐將藥取出入麝香氷片各一分共研細末用磁鍼刺破舌菌用丹少許㸃上再以蒲黃蓋之方歌北庭丹㸃舌菌生瓦松溏鷄矢人中瓦上青苔番硇末罐封火煆入麝氷歸芍異功湯人參白术土炒廣陳皮白芍酒炒當歸各一錢身白茯苓二錢甘草五分炙燈心五十寸水煎空心服方歌歸芍異功扶脾氣健胃又能止瀉利四君歸芍廣陳皮引加燈心是良劑水澄膏硃砂二錢水飛白及白歛五倍子鬱金各一兩雄黃乳香各五錢右為細末米醋調濃以厚紙攤貼之方歌水澄膏貼潰核驗水飛硃砂末二錢及歛鬱金雄黃乳五倍同研用醋攤導赤湯見口部口糜歸脾湯見乳部乳中結核清凉甘露飲見脣部繭脣喉部𦂳喉風附纒喉風𦂳喉膏粱風火成咽喉腫痛難出聲聲如拽鋸痰壅塞穴刺少商吐下功註此證由膏粱厚味太過致肺胃積熱復受邪風風熱相搏上壅咽喉腫痛聲音難出湯水不下痰涎壅塞之聲頗似拽鋸初發暴速急刺手大指内側少商穴出紫黑血以瀉其熱痰盛者以桐油餞導吐之吐痰後隨用甘草湯潄之以解桐油之氣内服雄黃解毒丸吐下之喉中吹白降雪散俟關開之後内宜服清咽利膈湯按法調治隨手應效者順若面青唇黑鼻流冷涕者逆若兼項外遶腫即名纒喉風其治法雖與此證相同然終屬險惡難治桐油餞温水半盌加桐油四匙攪勻用硬鷄翎蘸油探入喉内撚之連探四五次其痰壅出再探再吐以人醒聲髙為度方歌桐油餞法導痰壅一切喉風用最靈半盌溫水桐油入鷄翎蘸探吐喉通雄黃解毒丸雄黃一兩鬱金一錢巴豆十四粒去皮油共研末醋糊為丸如黍粒大每服五分津液送下方歌雄黄觧毒𦂳喉風開關通閉火能平巴豆去油鬱金末醋糊為丸黍粒形白降雪散石膏一錢五分煆硼砂一錢焰硝膽礬各五分元明粉三分氷片二分共研極細末以筆管吹入喉内方歌白降雪散喉風證腫痛聲難風火凝煆石膏與膽礬末焰硝硼片共元明清咽利膈湯牛蒡子炒研連翹去心荆芥防風梔子生研桔梗元參黃連金銀花黃芩薄荷甘草各一錢生大黃朴硝各一錢水二鍾淡竹葉二錢煎八分食遠服方歌清咽利膈喉痛消疎風清熱蒡連翹荆防梔桔參連草銀花芩薄大黄硝慢喉風慢喉發緩體虚生微腫咽乾色淡紅或由暴怒五辛火或因憂思過度成註此證有因平素體虚更兼暴怒或過食五辛而生者亦有憂思太過而成者俱屬體虚病實其發緩其色淡其腫微其咽乾舌見滑白胎大便自利六衇微細脣如礬色若午前痛者服補中益氣湯加以清凉如麥冬黑參桔梗牛蒡子服之若午後作痛作渇身熱足冷者隂陽兩虚也忌用苦寒宜少隂甘桔湯以宣達之若面赤咽乾不渇者其衇必虚大以甘露飲服之必效俱兼用氷硼散一錢加燈草煆灰存性三分吹之立驗甘露飲天冬去心麥冬去心黃芩生地熟地枇杷葉蜜炙石斛枳殻麩炒茵蔯蒿甘草各等分水二鍾煎八分食後服方歌甘露飲清内熱侵面赤咽乾生液津天麥冬芩生熟地枇杷斛草枳茵蔯補中益氣湯見潰瘍門少隂甘桔湯見口部口糜氷硼散見口部鵞口瘡喉閉附酒毒喉閉喉閉肝肺火盛由風寒相搏腫咽喉甚則腫痛連項外又有酒毒當細求註此證由肝肺火盛復受風寒相搏而成咽喉腫痛面赤腮腫甚則項外漫腫喉中有塊如拳湯水難嚥語言不出暴起身發寒熱急刺少商穴或鍼合谷穴以開咽喉初宜疎散服荆防敗毒散寒熱已退即用清咽利膈湯兼吹紫雪散隨以薑汁漱口以宣其熱或用醋潄以消積血痰壅塞者桐油餞探吐痰涎若腫發於項外膿脹痛者防透咽喉不可輕鍼急用皂角末吹鼻取􅅉其腫即破或兼用皂角末醋調厚敷項腫須臾即破初腫時用生羊肉片貼之喉閉聲鼾者肺氣將絶急宜獨參湯救之若卒然如啞吞吐不利係寒氣客於會厭也宜蜜炙附子片含之勿嚥初終忌用苦寒之藥恐難消難潰又有酒毒喉閉由酒毒蒸於心脾二經熱壅咽喉喉腫色黄其人面赤目睛上視以桐油餞導吐痰涎宜服鼠黏子解毒湯亦用紫雪散吹之鼠粘子解毒湯鼠黏子炒研桔梗青皮升麻黄芩花粉甘草生元參梔子生研黄連連翹去心葛根白术土炒防風生地各等分水煎食後服方歌鼠黏解毒酒毒閉桔梗青皮能降氣升芩花粉草元參梔連翹葛术防地荆防敗毒散見項部腦疽清咽利膈湯桐油餞俱見𦂳喉風紫雪散見舌部重舌獨參湯見潰瘍門啞瘴喉風啞瘴喉風腫痛咽牙關𦂳急不能言風痰湧塞咽膈上火盛生痰風搏源註此證頗類𦂳喉由肺胃藴熱積久生痰外復受風邪與痰熱相搏湧塞咽膈之上而成斯疾初起咽喉腫塞疼痛湯水難嚥語言不出牙闗𦂳急此屬險侯急用雄黃解毒丸水化用細竹管將藥水吹入鼻孔直達咽喉藥入作嘔即令患者吐之其牙關頓鬆咽喉即稍開通先與米飲飲之次服清咽利膈湯兼吹氷硼散用藥不應者險若唇黑鼻流冷涕者逆雄黃解毒丸清咽利膈湯俱見𦂳喉風氷硼散見口部鵞口瘡弄舌喉風弄舌喉風心脾經實火外寒凝滯成舌出攪動因脹悶咽喉作腫更兼疼註此證由心脾實火與外寒鬱遏凝滯而成咽喉腫痛痰涎堵塞音啞言澀舌出不縮時時攪動覺舌脹悶常欲以手捫之故名弄舌急刺少商穴穴在兩手大指裏側去指甲角旁韭葉寛即是用三稜鍼刺之有血者生無血者死噙蟾酥丸徐嚥藥汁若痰涎上湧不能嚥藥者急用桐油餞探吐痰涎隨服清咽利膈湯吹金鎻匙若喉内如松子及魚鱗狀不堵塞者此屬虚陽上浮急用蜜炙附子片噙嚥其汁即效金鎻匙氷片二分五厘白殭蠶一錢雄黃二錢焰硝一兩五錢硼砂五錢各研末共和勻以細筆管吹入喉内腫痛處方歌金鎻匙吹弄舌風心脾火鬱外寒乘消痰遂熱除疼痛氷片殭蠶雄焰硼蟾酥丸見疔瘡門桐油餞清咽利膈湯俱見𦂳喉風喉疳喉疳初覺隂虚成嗌乾刺痛色淡紅腎火炎上金受剋破爛失音臭腐疼註此證一名隂虚喉疳初覺咽嗌乾燥如毛草常刺喉中又如硬物隘於咽下嘔吐酸水噦出甜涎淡紅微腫微痛日久其色紫暗不鮮頗似凍榴子色由腎液久虧相火炎上消爍肺金薰燎咽喉腫痛日增破爛腐衣叠若蝦皮聲音雌瘂喘急多痰臭腐蝕延其疼倍增妨礙飲食胃氣由此漸衰而虛火益盛煩躁者宜服知蘗地黄湯若吐酸噦涎者宜服甘露飲加川黃連便燥者兼服萬氏潤燥膏面脣俱白不寐懶食者宜歸脾湯加酒炒川黃連腫吹紫雪散腐吹八寳珍珠散其證投方應病或者十全一二否則難救萬氏潤燥膏豬脂一觔切碎煉油去渣加煉過白蜂蜜一觔攪勻候凝挑服二匙日用三五次方歌萬氏潤燥膏神驗降火清金滋便乾豬脂煉油加白蜜挑服失音也能痊八寳珍珠散兒茶川連末川貝母去心研青黛各一錢五分紅褐燒灰存性官粉黄蘗末魚腦石微煆琥珀末各一錢人中白二錢煆硼砂八分氷片六分京牛黄珍珠各五分豆腐内煮半炷香時取出研末麝香三分各研極細末共兌一處再研勻以細筆管吹入喉内爛肉處方歌八寳珍珠喉疳腐氷麝兒茶連貝母紅褐官粉黛牛黄腦石中白蘗硼琥知蘗地黄湯即六味地黄丸加知母黄蘗見面部雀斑甘露飲見慢喉風歸脾湯見乳部乳中結核喉癬喉癬咽乾生苔蘚初癢時增燥裂疼過飲藥酒五辛火黴爛延開蟻蛀形註此證一名天白蟻咽嗌乾燥初覺時癢次生苔蘚色暗木紅燥裂疼痛時吐臭涎妨礙飲食由過食炙煿藥酒五辛等物以致熱積於胃胃火薰肺而成斯疾宜服廣筆鼠黏湯未潰吹礬精散已潰吹清凉散患者清心寡慾戒厚味發物或者十全一二若失治兼調理不謹致生黴爛延漫開大叠起腐衣旁生小孔若蟻蛀蝕之狀多致不救廣筆鼠黏湯生地黄浙貝母各三錢去心研元參甘草各二錢五分生鼠黏子酒炒研花粉射干連翹各二錢去心白殭蠶一錢炒研苦竹葉二十片水二鍾煎八分飢時服方歌廣筆鼠黏喉癬乾初癢生苔裂痛添生地元參花粉貝連翹射草白殭蠶清溪秘傳礬精散白礬不拘多少研末用方磚一塊以火燒紅洒水於磚上將礬末布於磚上以磁盤覆蓋四面灰擁一日夜礬飛盤上掃下用二錢白霜梅二個去核真明雄黄穿山甲各一錢炙共研細末以細筆管吹入喉内方歌礬精散用火燒磚水濕布礬上覆盤掃霜再兌雄梅甲研末吹喉癬自痊清凉散硼砂三錢人中白二錢煆黄連末一錢南薄荷六分氷片五分青黛四分共研極細末吹入喉癬腐處方歌清凉散吹天白蟻胃火薰金成此疾薄黛氷硼中白連腐裂疼痛皆可去上腭癰上腭癰若葡萄形少隂三焦積熱成舌難伸縮鼻紅涕口難開合寒熱增註此證又名懸癰生於口中上腭由心腎經與三焦經積熱而成形若紫葡萄舌難伸縮口難開合鼻中時出紅涕令人寒熱大作宜黄連消毒飲加桔梗元參服之兼吹氷硼散或日久腫硬下垂不潰者以燒鹽散日㸃三五次兼服射干丸過時失治飲食不入煩躁神昏者逆燒鹽散食鹽火燒枯白礬各等分二味研細以筯頭蘸㸃患上方歌燒鹽散治上腭癰懸似葡萄色紫形枯礬燒鹽等分末筯頭蘸㸃消熱壅射干丸射干川升麻杏仁去皮尖麩炒甘草各五錢炙木鼈子川大黄各二錢炒右研細末煉蜜和丸如小彈子大毎用一丸口中含化徐嚥方歌射干丸療懸癰患熱聚成形口開難大黄升草木鼈杏蜜丸彈狀口中含黄連消毒飲見頭部百會疽氷硼散見口部鵞口瘡鎻喉毒鎻喉毒生因積熱外感風寒耳前結外似瘰癧漸攻喉心與小腸聽會穴註此證由心與小腸積熱外感風寒凝結而成初生於耳前聽會穴形如瘰癧漸攻咽喉腫塞疼痛妨礙飲食證須速治宜服牛黄清心丸開關解熱兼服清咽利膈湯吹氷硼散投方應效方能成功牛黄清心丸九轉膽星一兩雄黄黄連末各二錢茯神元參天竺黄五倍子末荆芥防風桔梗犀角末當歸各一錢氷片麝香珍珠各五分豆腐煮京牛黄輕粉各三分各研極細共和一處再研勻甘草熬膏和丸如龍眼大硃砂為衣日中曬乾收入磁瓶内將瓶口堵嚴勿令出氣臨服時一丸薄荷湯磨服方歌牛黄清心鎻喉毒茯輕氷麝參雄竺珍倍荆防桔膽星犀角歸連熱退速清咽利膈湯見𦂳喉風氷硼散見口部鵞口瘡乳蛾乳蛾肺經風火成䨇輕單重喉旁生狀若蠶蛾紅腫痛關前易治關後凶註此證由肺經積熱受風凝結而成生咽喉之旁狀如蠶蛾亦有形若棗栗者紅腫疼痛有單有雙雙者輕單者重生於關前者形色易見吹藥易到手法易施故易治生於關後者難見形色藥吹不到手法難施故難治俱宜服清咽利膈湯吹氷硼散易見者膿熟鍼之難見者用雞翎探吐膿血若兼痰壅氣急聲小探吐不出者險急用三稜鍼刺少商穴出紫黑血仍吹服前藥緩緩取效清咽利膈湯見𦂳喉風氷硼散見口部鵞口瘡喉瘤喉瘤鬱熱屬肺經多語損氣相兼成形如元眼紅絲褁或單或雙喉旁生註此證由肺經鬱熱更兼多語損氣而成形如元眼紅絲相褁或單或雙生於喉旁亦有頂大蔕小者不犯不痛或醇酒炙煿或因怒氣喊呌犯之則痛忌用鍼刀宜服益氣清金湯以消瘤碧玉散㸃之即效益氣清金湯苦桔梗三錢黄芩二錢浙貝母去心研麥冬去心牛蒡子各一錢五分炒研人參白茯苓陳皮生梔子研薄荷甘草各一錢生紫蘇五分竹葉三十片水三鍾煎一鍾食逺服渣再煎服方歌益氣清金肺熱攻注喉成瘤元眼形陳蒡芩蘇苦桔貝麥冬梔薄草參苓消瘤碧玉散硼砂三錢冰片膽礬各三分共研細末用時以筯頭蘸藥㸃患處方歌消瘤碧玉㸃喉瘤開結通喉熱可搜君以硼砂冰片兌膽礬末入患皆瘳胸乳部甘疽甘疽憂思氣結成膺生糓粒紫蔞形寒熱硬痛宜速潰潰遲須防毒陷攻註此證由憂思氣結而成生於膺上即胸膛兩旁肉髙處屬肺經中府穴之下無論左右皆能為患初如糓粒色青漸若栝蔞色紫堅硬疼痛憎寒壯熱速潰稠膿者順若過十日寒熱不退信膿不生衇見浮數防毒内陷攻裏致生惡證屬逆初宜服荆防敗毒散以疎解寒熱次服内托黄耆散應期不潰者急服十全大補湯托之其餘内外治法按癰疽腫瘍潰瘍門荆防敗毒散見項部腦疽内托黄耆散見背部中搭手十全大補湯見潰瘍門膻中疽膻中疽起粟粒形色紫堅硬漸焮疼七情火毒發任衇急隨證治緩成凶註此證生於心窩之上兩乳中央屬任衇經膻中穴由臟腑不和七情不平火毒凝結而成初起如粟色紫堅硬漸生焮熱腫痛憎寒壯熱宜急服仙方活命飲加蘇葉薄荷葉汗之或煩燥作嘔脣焦大渴宜奪命丹清之俟表證已退急服托裏透膿湯若瘡勢不起屬虚宜十全大補湯托之但膻中為氣海氣之所居焉施治貴早若遲則毒陷攻裏傷膜透氣者逆其餘内外治法俱按癰疽腫瘍潰瘍門仙方活命飲見腫瘍門奪命丹見背部隂陽二氣疽托裏透膿湯見頭部侵腦疽十全大補湯見潰瘍門脾發疽脾發疽生心下旁炙煿毒酒火為殃初如粟粒時寒熱漸増腫痛潰膿昌註此證生於心窩下兩旁屬脾經食竇穴無論左右俱生之皆由過食炙煿厚味藥酒以致脾經積火成毒而發初起形如粟粒寒熱往来漸增腫痛若頂尖根束紅活鮮潤應期即潰稠膿者順若頂平根散色紫堅硬屆期不潰既潰膿如蟹沫者逆初服荆防敗毒散汗之脣焦大渇煩躁者宜服太乙紫金錠次服内疎黃連湯清之其餘内外治法俱按癰疽腫瘍潰瘍門太乙紫金錠一名紫金丹一名玉樞丹雄黄三錢鮮紅大塊者研末硃砂三錢有神氣者研末麝香三錢揀淨皮毛研末川五倍子二兩一名文蛤搥破研末紅芽大㦸杭州紫大㦸為上江南土大㦸次之北方綿大㦸色白者性烈峻利弱人服之反致吐血慎之勿用取上品者去蘆根洗淨焙乾為末一兩五錢山慈菇二兩洗去毛皮焙乾研末千金子一兩續隨子仁白者去油一名以上之藥各擇精品於淨室中製畢候端午七夕重陽或天月徳天醫黃道上吉之辰凡入室合藥之人三日前俱宜齋沭更換新潔衣帽臨日方入室中淨手薰香預設藥王牌位主人率衆焚香拜禱事畢各將前藥七味稱準入於大乳鉢内再研數百轉方入細石臼中漸加糯米濃汁調和軟硬得中方用杵搗千餘下極至光潤為度每錠一錢每服一錠病勢重者連服二綻以取通利後用温粥補之修合時除合藥潔淨之人餘皆忌見此藥惟在精誠潔淨方效方歌太乙紫金諸瘡毒疔腫癰疽皆可除雄硃倍麝千金子紅芽大㦸山慈菇一一切飲食藥毒蠱毒瘴氣惡菌河豚中毒自死牛馬豬羊六畜等類之肉人悞食之必昏亂卒倒或生異形之證並用水磨灌服或吐或瀉其人必甦一南方山嵐瘴氣烟霧癘疫最能傷人感之纔覺意思不快惡寒惡熱欲嘔不嘔即磨一錠服之得吐利便愈一癰疽發背對口疔瘡天蛇無名腫毒蛀節紅絲等疔及楊梅瘡諸風癮疹新久痔瘡並用無灰淡酒磨服外用水磨塗搽瘡上日夜數次覺癢而消一隂陽二毒傷寒心悶狂言亂語胸膈塞滯邪毒未出瘟疫煩亂發狂喉閉喉風俱用薄荷湯待冷磨服一赤白痢疾肚腹泄瀉急痛霍亂絞腸痧及諸痰喘並用薑湯磨服一男子婦人急中顛邪喝呌奔走鬼交鬼胎鬼氣鬼魘失心狂亂羊兒豬顛等風俱用石菖蒲煎湯磨服一中風中氣口眼歪邪牙關𦂳急言語塞澀筋衇攣縮骨節風腫遍身疼痛行步艱辛諸風諸癎並用酒磨炖熱服一自縊溺死驚死壓死鬼魅迷死但心頭微温未冷者俱用生薑續斷酒煎磨服一切惡蛇風犬毒蠍溪澗諸惡等蠱傷人隨即發腫攻注徧身甚者毒氣入裏昏悶响呌命在須臾俱用酒磨灌下再吃葱湯一盌被蓋出汗立甦一新久瘧疾臨發時東流水煎桃柳枝湯磨服一小兒急慢驚風五疳五痢脾病黃腫癮疹瘡瘤牙關𦂳急並用薄荷浸水磨濃加蜜服之仍搽腫上年嵗幼者每錠分作數服一牙痛酒磨塗痛上仍含少許良久嚥下一小兒父母遺毒生下百日内皮塌爛斑􅂖道眼眶損爛者俱用清水磨塗一打撲傷損用松節無灰酒研服一年深月近頭脹頭痛太陽痛極偏頭風及時瘡愈後毒氣攻注腦門作脹者俱用葱酒研服一錠仍磨塗太陽穴上一婦人經水不通紅花湯下一凡遇天行疫證延街闔巷相傳徧染者用桃根湯磨濃滴入鼻孔次服少許任入病家再不傳染一又治傳尸勞瘵諸藥不能取效一方士指教服此每早磨服一錠至三次後逐下惡物尸蟲異形怪類後得脫利以此相傳活人不計其數一一女子久患勞瘵為尸蟲所噬磨服一錠片時吐下小蟲十餘條後服蘇合香丸其病頓失調理月餘而愈眞濟世衛生之寳藥也荆防敗毒散見項部腦疽内疎黃連湯見腫瘍門井疽井疽心火發中庭初如豆粒漸腫疼心躁肌熱脣焦渇紅活易治黑陷凶註此證生於心窩屬任衇中庭穴由心經火毒而成初如豆粒腫痛漸增心躁如焚肌熱如火自汗脣焦大渴飲冷急服内疎黄連湯或麥靈丹若煩悶作嘔發熱無汗者奪命丹汗之如紅活髙腫者順黑陷平塌者逆其餘内外治法俱按癰疽腫瘍潰瘍門若潰後經年不愈者必成穿心冷瘻難治内疎黃連湯麥靈丹俱見腫瘍門奪命丹見背部隂陽二氣疽蜂窩疽蜂窩疽形似蜂窩胸側乳上瘡孔多漫腫紫痛心火毒黑陷者逆順紅活註此證生於胸側乳上亦有徧身而發者由心火毒盛而成色紫漫腫疼痛身發寒熱初起六七孔漸漸延開有三五寸亦有六七寸者形似蜂房即有數十竅每竅出黃白膿宣腫瘡面全腐腐脫有新肉色紅鮮潤者順若出黑水氣穢平塌者逆始終内外治法俱按癰疽腫瘍潰瘍門遇氣寒之人至八九日不潰以神燈照每日照之應期即潰神燈照法見首卷蠧疽蠧疽生於缺盆中初豆漸李堅紫疼寒熱尿澁宜蒜灸證由膽胃積熱生註此證一名缺盆疽又名􅴌骨疽生在胸上項下􅴌子骨内輭陷中缺盆穴屬膽胃二經積熱而成初發寒熱往来筋骨拘急飲食不思胸腹膨脹小水短澁初發如豆漸大如李色紫堅硬疼痛初宜艾壯隔獨頭蒜片灸之内服奪命丹汗之次服六一散通利小水膿勢將成宜服内托黃耆散氣血虚甚者宜服十全大補湯托補之其餘内外治法俱按癰疽腫瘍潰瘍門此證宜急托治若失治腐爛内陷瘡口難斂必成敗證六一散滑石六兩甘草一兩生共為末每服三錢燈心煎湯調服方歌六一散醫小水癃能除燥濕熱有功滑石甘草研成末燈心湯調服立通奪命丹見背部隂陽二氣疽内托黃耆散見背部中搭手十全大補湯見潰瘍門􅗢癧癰􅗢癧癰在乳旁生結核紅腫硬焮疼包絡痰凝脾氣鬱治宜温舒化堅凝註此證生於乳旁初腫堅硬形類結核發長緩慢漸增焮腫色紅疼痛由包絡寒痰脾氣鬱結而成係寒證非熱證也治宜温和舒鬱化堅以内補十宣散服之外敷回陽玉龍膏消之如不消膿勢將成也内外治法即按癰疽腫瘍潰瘍門内補十宣散人參黃耆當歸各二兩桔梗厚朴薑製川芎白芷肉桂防風甘草各一兩炙共研末每服三錢熱黃酒調服不飲酒者木香煎湯調下方歌内補十宣諸腫毒已成令潰未成消參耆桔朴芎歸草芷桂防風熱酒調囘陽玉龍膏見腫瘍門内外吹乳吹乳乳毒乳腫疼内吹胎熱痛焮紅外吹子鼻凉氣襲寒熱煩渴結腫疼註乳房屬胃乳頭屬肝而有内吹外吹之分内吹者懐胎六七月胸滿氣上乳房結腫疼痛若色紅者因多熱也不紅者既因氣鬱且兼胎旺也多熱者宜服柴胡清肝湯氣鬱者宜服逍遥散外俱敷冲和膏必消或初腫失於調治或本人復傷氣怒以致大腫大痛其勢必欲成膿宜用逍遥散加黃耆白芷連翹以養血排膿治之膿潰之後宜調養血氣待生產後按潰瘍治法方得收口妊娠用藥禁忌另有歌訣詳載首卷外吹者由乳母肝胃氣濁更兼子吮乳睡熟鼻孔凉氣襲入乳房與熱乳凝結腫痛令人寒熱往来煩躁口渴初宜服荆防牛蒡湯外用隔蒜灸法俟寒熱退仍腫者服橘葉栝蔞散外敷冲和膏消之其腫消之不應者將欲作膿即用透膿散其餘内服外敷之法俱按癰疽腫瘍潰瘍門又有至於内未懐胎外未行乳而生毒者係皮肉為患未傷乳房此肝胃濕熱凝結而成乳毒也法當按瘡􅟻治之無有不效者荆防牛蒡湯荆芥防風牛蒡子炒研金銀花陳皮花粉黄芩蒲公英連翹去心皂刺各一錢柴胡香附子甘草各五分生水二鍾煎八分食逺服方歌荆防牛蒡乳外吹寒熱腫疼俱可推銀花陳草柴香附花粉芩蒲翹刺隨橘葉栝蔞散橘葉二十個栝蔞量證用半個或一個川芎黃芩梔子生研連翹去心石膏煆柴胡陳皮青皮各一錢甘草五分生水二鍾煎八分食逺服渣再煎服紫腫焮痛用石膏紅腫者去之方歌橘葉栝蔞吹乳證凉襲熱乳凝結成芎芩梔草連翹等石膏柴與陳皮青柴胡清肝湯見頭部鬢疽逍遥散見背部上搭手冲和膏透膿散俱見腫瘍門隔蒜灸法見首卷灸法内乳疽乳癰乳疽乳癰乳房生肝氣鬱結胃火成癰形紅腫焮熱痛疽形木硬覺微疼癰發膿成十四日疽發月餘膿始成未潰托裏排膿治已潰大補養榮靈註此證總由肝氣鬱結胃熱壅滯而成男子生者稀少女子生者頗多俱生於乳房紅腫熱痛者為癰十四日膿成若堅硬木痛者為疽月餘成膿初起寒熱往来宜服栝蔞牛蒡湯寒熱悉退腫硬不消宜用復元通氣散消之若不應復時時跳動者勢將潰膿宜用托裏透膿湯膿脹痛者鍼之宜服托裏排膿湯虚者補之如人參養榮十全大補等湯俱可選用外敷貼之藥俱按癰疽腫瘍潰瘍門栝蔞牛蒡湯栝蔞仁牛蒡子炒研花粉黃芩生梔子研連翹去心皂刺金銀花甘草生陳皮各一錢青皮柴胡各五分水二鍾煎八分入煮酒一杯和勻食逺服方歌栝蔞牛蒡胃火鬱憎寒壯熱乳癰疽青柴花粉芩翹刺銀花梔子草陳皮復元通氣散見腫瘍門托裏透膿湯見頭部侵腦疽托裏排膿湯見項部魚尾毒人參養榮湯十全大補湯俱見潰瘍門乳發乳漏乳發如癰胃火成男女皆生赤腫疼潰久不斂方成漏只為膿清肌不生註此證發於乳房焮赤腫痛其勢更大如癰皮肉盡腐由胃腑濕火相凝而成治法急按乳癰未成形者消之已成形者托之腐脫遲者黃靈藥撒之以免徧潰乳房致傷囊槅難以收斂若久不收口外寒侵襲失於調養時流清水者即成乳漏外用紅升丹作撚以去腐生肌再兼用豆豉餅灸法緩緩灸之以怯寒内當大補氣血節勞煩慎起居忌發物漸可生肌斂口而愈黄靈藥紅升丹俱見潰瘍門豆豉餅見首卷灸法内乳中結核乳中結核梅李形按之不移色不紅時時隱痛勞岩漸證由肝脾鬱結成註此證乳房結核堅硬小者如梅大者如李按之不移推之不動時時隱痛皮色如常由肝脾二經氣鬱結滯而成形勢雖小不可輕忽若躭延日久不消輕成乳勞重成乳岩慎之慎之初起氣實者宜服清肝解鬱湯氣虚宜服香貝養榮湯若鬱結傷脾食少不寐者服歸脾湯外俱用木香餅熨法消之甚效清肝解鬱湯當歸生地白芍酒炒川芎陳皮半夏各八分製貝母去心研茯神青皮逺志去心桔梗蘇葉各六分梔子生研木通甘草各四分生香附一錢醋炒水二鍾薑一片煎八分食逺服方歌清肝解鬱貝茯神四物青皮逺夏陳梔桔通蘇香附草能消乳核氣鬱伸歸脾湯人參白术土炒棗仁炒研龍眼肉茯神各二錢黃耆一錢五分當歸一錢酒洗逺志去心木香末甘草各五分炙生薑三片紅棗肉二枚水煎服方歌歸脾湯治脾胃怯食少怔忡夜不安棗逺龍眼參歸草茯神耆术木香煎木香餅生地黄一兩搗爛木香五錢研末共和勻量結核大小作餅貼腫上以熱熨斗間日熨之堅硬木痛者每日熨之方歌木香餅消乳核方舒通結滯功倍强生地研爛木香末和餅貼患熨之良香貝養榮湯見項部上石疽乳勞乳勞初核漸腫堅根形散漫大如盤未潰先腐黴斑㸃敗膿津久勞證添註此證即由乳中結核而成或消之不應或失於調治躭延數月漸大如盤如盌堅硬疼痛根形散漫串延胸肋腋下其色或紫或黑未潰先腐外皮黴㸃爛斑數處漸漸通破輕津白汁重流臭水即敗漿膿也日久潰深傷膜内病漸添午後煩熱乾𠻳顴紅形痩食少隂虚等證俱見變成瘡勞初結腫時氣實者宜服蔞貝散及神效栝蔞散氣虚者逍遥散及歸脾湯合而用之隂虚之證已見宜服六味地黃湯以培其本外治法按癰疽潰瘍門然此瘡成勞至易獲效甚難蔞貝散栝蔞貝母去心研南星甘草生連翹各一錢去心水二鍾煎八分澄渣加酒二分食逺服一加青皮升麻方歌蔞貝散治乳結核漸大失調變乳勞初腫氣實須服此南星甘草共連翹神效栝蔞散大栝蔞一個為去皮焙末當歸甘草各五錢生没藥乳香各二錢共研粗末每用五錢醇酒三鍾慢火熬至一鍾去渣食後服之方歌神效栝蔞没乳香甘草當歸研末良乳勞初腫酒煎服消堅和血是神方逍遥散見背部上搭手歸脾湯見乳中結核六味地黃湯即六味地黄丸改作煎劑見面部雀斑乳岩乳岩初結核隱疼肝脾兩損氣鬱凝核無紅熱身寒熱速灸養血免患攻躭延續發如堆栗堅硬岩形引腋胸頂透紫光先腐爛時流汚水日增疼潰後翻花怒出血即成敗證藥不靈註此證由肝脾兩傷氣鬱凝結而成自乳中結核起初如棗栗漸如棋子無紅無熱有時隱痛速宜外用灸法内服養血之劑以免内攻若年深日久即潮熱惡寒始覺大痛牽引胸腋腫如覆盌堅硬形如堆栗髙凸如岩頂透紫色光亮肉含血絲先腐後潰汚水時津有時湧冒臭血腐爛深如岩壑翻花突如泛蓮疼痛連心若復因急怒暴流鮮血根腫愈堅期時五臟俱衰即成敗證百無一救若患者果能清心滌慮静養調理庶可施治初宜服神效栝蔞散次宜清肝解鬱湯外貼季芝鯽魚膏其核或可望消若反復不應者瘡勢已成不可過用尅伐峻劑致損胃氣即用香貝養榮湯或心煩不寐者宜服歸脾湯潮熱惡寒者宜服逍遥散稍可苟延嵗月如得此證者於腫核初起即加醫治宜用豆粒大艾壯當頂灸七壯次日起皰挑破用三稜鍼刺入五六分揷入冰螺散撚子外用紙封糊至十餘日其核自落外貼絳珠膏生肌玉紅膏内服舒肝養血理脾之劑生肌斂口自愈季芝鯽魚膏活鯽魚肉鮮山藥各等分去皮右共搗如泥加麝香少許塗核上覺癢極勿搔動隔衣輕輕揉之七日一換旋塗即消方歌鯽魚膏貼乳岩疾腫如覆盌似堆栗山藥同研加麝香塗於患處七日易冰螺撚硇砂二分大田螺五枚去殻線穿曬乾冰片一分白砒即人言一錢二分麫褁煨熟去麫用砒將螺肉切片同白砒研末再加硇片同碾細以稠米糊搓成撚子磁礶密收用時將撚揷入鍼孔外用紙糊封貼核上勿動十日後四邉裂縫其核自落方歌冰螺撚消諸核癧硇砂螺肉煨白砒再加冰片米糊撚乳岩堅硬用之宜神效栝蔞散見乳勞香貝養榮湯見項部上石疽清肝解鬱湯歸脾湯俱見乳中結核逍遥散見背部上搭手絳珠膏生肌玉紅膏俱見潰瘍門御纂醫宗金鑑卷六十六欽定四庫全書御纂醫宗金鑑卷六十六編輯外科心法要訣舌部紫舌脹紫舌脹屬心經火熱盛血壅腫硬疼舌腫滿口宜鍼刺血色紫重色紅輕註此證由心經火盛血壅以致舌腫滿口堅硬疼痛宜用衣鍼紥筯頭上露鋒分許當舌刺數十刺令血出紅色者輕紫色者重隨以温水潄口搽氷硼散内用凉膈散去朴硝大黃加牛蒡子荆芥倍用梔子服之甚效氷硼散見口部鵞口瘡凉膈散見面部痰包痰包每在舌下生結腫綿輭似匏形痛脹舌下妨食語火稽痰涎流注成註此證生於舌下結腫如匏光輭如綿塞脹舌下有妨飲食言語色黃木痛由火稽痰涎流注而成宜用立剪當包上剪破出痰涎如雞子清稠黏不斷拭凈搽氷硼散服加味二陳湯忌煎炒火酒等物加味二陳湯陳皮半夏製白茯苓黃芩各八分黃連薄荷甘草各五分生水二鍾薑三片煎八分食前服方歌加味二陳療痰包結腫舌下形如匏二陳湯加芩連薄薑煎服下自然消氷硼散見口部鵞口瘡舌衄舌衄心火血分炎舌上生孔似鐵尖或如筯頭其色紫甚黑腐爛血出泉註此證係舌上忽生孔小者如鍼尖大者如筯頭其孔色紫屬熱甚色黑防腐爛血出如泉湧由心火上炎以致血熱妄行而成宜服升麻湯兼搽必勝散甚效升麻湯升麻小薊根茜根各一兩五錢艾葉七錢五分寒水石三兩共研每三錢水一鍾煎七分澄去渣入生地黄汁一羮匙再煎二滾温服或加炒側栢葉五錢亦可方歌升麻舌衄心火炎小薊茜根各兩半艾葉七錢五分加寒水三兩同研爛必勝散螺青另研蒲黄各一錢炒共合一處研細搽於患處後用温鹽湯潄口方歌必勝心熱血妄行舌生小孔湧血紅螺青研末蒲黄炒同勻搽之自歸經重舌痰核重腭舌疔舌證發於心脾經其證皆由積熱成重舌舌下血衇脹痰核舌上一核生重腭生於口上腭時覺心煩梅子形舌疔舌上生紫皰其形如豆寒熱增註此證無論大人小兒俱可以生重舌者由心脾藴熱循經上冲舌本遂令舌下血衇脹起如小舌狀故名重舌宜用氷硼散搽之痰核者心脾痰涎鬱熱舌上生核强硬作痛宜用衣鍼㸃破搽氷硼散内服加味二陳湯重腭者心脾有熱以致上腭生瘡形如梅子外無寒熱内時作煩此屬熱極禁用鍼刺宜服黃連觧毒湯加桔梗不時用紫雪散噙化舌疔者心脾火毒舌生紫皰其形如豆堅硬寒熱疼痛應心初起宜用蟾酥丸含於舌下隨化隨嚥或再服三粒以解内毒甚者刺之服黃連解毒湯兼搽紫雪散及徐徐嚥之即愈紫雪散犀角鎊羚羊角鎊石膏寒水石升麻各一兩元參二兩甘草八錢生沉香剉木香各五錢剉水五盌煎藥剩湯一盌將渣用絹濾去將湯再煎滚投提凈朴硝三兩六錢文火慢煎水氣將盡欲凝結之時傾入盌内下硃砂氷片各三錢金鉑一百張各預研細和匀將藥盌安入凉水盆中候冷凝如雪為度大人每用一錢小兒二分十嵗者五分徐徐嚥之即效或用淡竹葉燈心煎湯化服亦可咽喉腫痛等證吹之亦效方歌紫雪散醫積熱效沉木犀羚元參草寒水升膏朴硝加硃鉑氷研入内攪氷硼散見口部鵞口瘡加味二陳湯見痰包黃連解毒湯見耳部黑疔蟾酥丸見疔瘡門舌疳附瘰癧風舌疳心脾毒火成如豆如菌痛爛紅漸若泛蓮難飲食綿潰久變瘰癧風註此證由心脾毒火所致其證最惡初如豆次如菌頭大蔕小又名舌菌疼痛紅爛無皮朝輕暮重急用北庭丹㸃之自然消縮而愈若失於調治以致焮腫突如泛蓮或有狀如鷄冠舌本短縮不能伸舒妨礙飲食言語時津臭涎再因怒氣上冲忽然崩裂血出不止久久延及項頷腫如結核堅硬臖痛皮色如常頂輭一㸃色暗木紅破後時津臭水腐如爛棉其證雖破堅硬腫痛仍前不退此為綿潰甚至透舌穿腮湯水漏出是以又名瘰癧風也盖舌本屬心舌邉屬脾因心緒煩擾則生火思慮傷脾則氣鬱鬱甚而成斯疾其證外勢頗類喉風但喉風咽喉常腫湯水不能下嚥此證咽喉不腫可以下嚥湯水胃中亦思飲食因舌不能轉動迭送硬食故每食不能充足致令胃中空虚而怯證悉添日漸衰敗初起宜服導赤湯加黃連虚者服歸脾湯熱甚者服清凉甘露飲合歸脾湯便溏者服歸芍異功湯頷下腫核初起宜用錦地羅蘸醋磨濃敷之潰後宜水澄膏貼之自古治法雖多然此證百無一生縱施藥餌不過苟延歳月而已清溪秘傳北庭丹番硇砂人中白各五分瓦上青苔瓦松溏鷄矢各一錢用傾銀罐子二箇將藥裝在罐内將口對嚴外用鹽泥封固以炭火煆紅待三炷香為度候冷開罐將藥取出入麝香氷片各一分共研細末用磁鍼刺破舌菌用丹少許㸃上再以蒲黃蓋之方歌北庭丹㸃舌菌生瓦松溏鷄矢人中瓦上青苔番硇末罐封火煆入麝氷歸芍異功湯人參白术土炒廣陳皮白芍酒炒當歸各一錢身白茯苓二錢甘草五分炙燈心五十寸水煎空心服方歌歸芍異功扶脾氣健胃又能止瀉利四君歸芍廣陳皮引加燈心是良劑水澄膏硃砂二錢水飛白及白歛五倍子鬱金各一兩雄黃乳香各五錢右為細末米醋調濃以厚紙攤貼之方歌水澄膏貼潰核驗水飛硃砂末二錢及歛鬱金雄黃乳五倍同研用醋攤導赤湯見口部口糜歸脾湯見乳部乳中結核清凉甘露飲見脣部繭脣喉部𦂳喉風附纒喉風𦂳喉膏粱風火成咽喉腫痛難出聲聲如拽鋸痰壅塞穴刺少商吐下功註此證由膏粱厚味太過致肺胃積熱復受邪風風熱相搏上壅咽喉腫痛聲音難出湯水不下痰涎壅塞之聲頗似拽鋸初發暴速急刺手大指内側少商穴出紫黑血以瀉其熱痰盛者以桐油餞導吐之吐痰後隨用甘草湯潄之以解桐油之氣内服雄黃解毒丸吐下之喉中吹白降雪散俟關開之後内宜服清咽利膈湯按法調治隨手應效者順若面青唇黑鼻流冷涕者逆若兼項外遶腫即名纒喉風其治法雖與此證相同然終屬險惡難治桐油餞温水半盌加桐油四匙攪勻用硬鷄翎蘸油探入喉内撚之連探四五次其痰壅出再探再吐以人醒聲髙為度方歌桐油餞法導痰壅一切喉風用最靈半盌溫水桐油入鷄翎蘸探吐喉通雄黃解毒丸雄黃一兩鬱金一錢巴豆十四粒去皮油共研末醋糊為丸如黍粒大每服五分津液送下方歌雄黄觧毒𦂳喉風開關通閉火能平巴豆去油鬱金末醋糊為丸黍粒形白降雪散石膏一錢五分煆硼砂一錢焰硝膽礬各五分元明粉三分氷片二分共研極細末以筆管吹入喉内方歌白降雪散喉風證腫痛聲難風火凝煆石膏與膽礬末焰硝硼片共元明清咽利膈湯牛蒡子炒研連翹去心荆芥防風梔子生研桔梗元參黃連金銀花黃芩薄荷甘草各一錢生大黃朴硝各一錢水二鍾淡竹葉二錢煎八分食遠服方歌清咽利膈喉痛消疎風清熱蒡連翹荆防梔桔參連草銀花芩薄大黄硝慢喉風慢喉發緩體虚生微腫咽乾色淡紅或由暴怒五辛火或因憂思過度成註此證有因平素體虚更兼暴怒或過食五辛而生者亦有憂思太過而成者俱屬體虚病實其發緩其色淡其腫微其咽乾舌見滑白胎大便自利六衇微細脣如礬色若午前痛者服補中益氣湯加以清凉如麥冬黑參桔梗牛蒡子服之若午後作痛作渇身熱足冷者隂陽兩虚也忌用苦寒宜少隂甘桔湯以宣達之若面赤咽乾不渇者其衇必虚大以甘露飲服之必效俱兼用氷硼散一錢加燈草煆灰存性三分吹之立驗甘露飲天冬去心麥冬去心黃芩生地熟地枇杷葉蜜炙石斛枳殻麩炒茵蔯蒿甘草各等分水二鍾煎八分食後服方歌甘露飲清内熱侵面赤咽乾生液津天麥冬芩生熟地枇杷斛草枳茵蔯補中益氣湯見潰瘍門少隂甘桔湯見口部口糜氷硼散見口部鵞口瘡喉閉附酒毒喉閉喉閉肝肺火盛由風寒相搏腫咽喉甚則腫痛連項外又有酒毒當細求註此證由肝肺火盛復受風寒相搏而成咽喉腫痛面赤腮腫甚則項外漫腫喉中有塊如拳湯水難嚥語言不出暴起身發寒熱急刺少商穴或鍼合谷穴以開咽喉初宜疎散服荆防敗毒散寒熱已退即用清咽利膈湯兼吹紫雪散隨以薑汁漱口以宣其熱或用醋潄以消積血痰壅塞者桐油餞探吐痰涎若腫發於項外膿脹痛者防透咽喉不可輕鍼急用皂角末吹鼻取􅅉其腫即破或兼用皂角末醋調厚敷項腫須臾即破初腫時用生羊肉片貼之喉閉聲鼾者肺氣將絶急宜獨參湯救之若卒然如啞吞吐不利係寒氣客於會厭也宜蜜炙附子片含之勿嚥初終忌用苦寒之藥恐難消難潰又有酒毒喉閉由酒毒蒸於心脾二經熱壅咽喉喉腫色黄其人面赤目睛上視以桐油餞導吐痰涎宜服鼠黏子解毒湯亦用紫雪散吹之鼠粘子解毒湯鼠黏子炒研桔梗青皮升麻黄芩花粉甘草生元參梔子生研黄連連翹去心葛根白术土炒防風生地各等分水煎食後服方歌鼠黏解毒酒毒閉桔梗青皮能降氣升芩花粉草元參梔連翹葛术防地荆防敗毒散見項部腦疽清咽利膈湯桐油餞俱見𦂳喉風紫雪散見舌部重舌獨參湯見潰瘍門啞瘴喉風啞瘴喉風腫痛咽牙關𦂳急不能言風痰湧塞咽膈上火盛生痰風搏源註此證頗類𦂳喉由肺胃藴熱積久生痰外復受風邪與痰熱相搏湧塞咽膈之上而成斯疾初起咽喉腫塞疼痛湯水難嚥語言不出牙闗𦂳急此屬險侯急用雄黃解毒丸水化用細竹管將藥水吹入鼻孔直達咽喉藥入作嘔即令患者吐之其牙關頓鬆咽喉即稍開通先與米飲飲之次服清咽利膈湯兼吹氷硼散用藥不應者險若唇黑鼻流冷涕者逆雄黃解毒丸清咽利膈湯俱見𦂳喉風氷硼散見口部鵞口瘡弄舌喉風弄舌喉風心脾經實火外寒凝滯成舌出攪動因脹悶咽喉作腫更兼疼註此證由心脾實火與外寒鬱遏凝滯而成咽喉腫痛痰涎堵塞音啞言澀舌出不縮時時攪動覺舌脹悶常欲以手捫之故名弄舌急刺少商穴穴在兩手大指裏側去指甲角旁韭葉寛即是用三稜鍼刺之有血者生無血者死噙蟾酥丸徐嚥藥汁若痰涎上湧不能嚥藥者急用桐油餞探吐痰涎隨服清咽利膈湯吹金鎻匙若喉内如松子及魚鱗狀不堵塞者此屬虚陽上浮急用蜜炙附子片噙嚥其汁即效金鎻匙氷片二分五厘白殭蠶一錢雄黃二錢焰硝一兩五錢硼砂五錢各研末共和勻以細筆管吹入喉内腫痛處方歌金鎻匙吹弄舌風心脾火鬱外寒乘消痰遂熱除疼痛氷片殭蠶雄焰硼蟾酥丸見疔瘡門桐油餞清咽利膈湯俱見𦂳喉風喉疳喉疳初覺隂虚成嗌乾刺痛色淡紅腎火炎上金受剋破爛失音臭腐疼註此證一名隂虚喉疳初覺咽嗌乾燥如毛草常刺喉中又如硬物隘於咽下嘔吐酸水噦出甜涎淡紅微腫微痛日久其色紫暗不鮮頗似凍榴子色由腎液久虧相火炎上消爍肺金薰燎咽喉腫痛日增破爛腐衣叠若蝦皮聲音雌瘂喘急多痰臭腐蝕延其疼倍增妨礙飲食胃氣由此漸衰而虛火益盛煩躁者宜服知蘗地黄湯若吐酸噦涎者宜服甘露飲加川黃連便燥者兼服萬氏潤燥膏面脣俱白不寐懶食者宜歸脾湯加酒炒川黃連腫吹紫雪散腐吹八寳珍珠散其證投方應病或者十全一二否則難救萬氏潤燥膏豬脂一觔切碎煉油去渣加煉過白蜂蜜一觔攪勻候凝挑服二匙日用三五次方歌萬氏潤燥膏神驗降火清金滋便乾豬脂煉油加白蜜挑服失音也能痊八寳珍珠散兒茶川連末川貝母去心研青黛各一錢五分紅褐燒灰存性官粉黄蘗末魚腦石微煆琥珀末各一錢人中白二錢煆硼砂八分氷片六分京牛黄珍珠各五分豆腐内煮半炷香時取出研末麝香三分各研極細末共兌一處再研勻以細筆管吹入喉内爛肉處方歌八寳珍珠喉疳腐氷麝兒茶連貝母紅褐官粉黛牛黄腦石中白蘗硼琥知蘗地黄湯即六味地黄丸加知母黄蘗見面部雀斑甘露飲見慢喉風歸脾湯見乳部乳中結核喉癬喉癬咽乾生苔蘚初癢時增燥裂疼過飲藥酒五辛火黴爛延開蟻蛀形註此證一名天白蟻咽嗌乾燥初覺時癢次生苔蘚色暗木紅燥裂疼痛時吐臭涎妨礙飲食由過食炙煿藥酒五辛等物以致熱積於胃胃火薰肺而成斯疾宜服廣筆鼠黏湯未潰吹礬精散已潰吹清凉散患者清心寡慾戒厚味發物或者十全一二若失治兼調理不謹致生黴爛延漫開大叠起腐衣旁生小孔若蟻蛀蝕之狀多致不救廣筆鼠黏湯生地黄浙貝母各三錢去心研元參甘草各二錢五分生鼠黏子酒炒研花粉射干連翹各二錢去心白殭蠶一錢炒研苦竹葉二十片水二鍾煎八分飢時服方歌廣筆鼠黏喉癬乾初癢生苔裂痛添生地元參花粉貝連翹射草白殭蠶清溪秘傳礬精散白礬不拘多少研末用方磚一塊以火燒紅洒水於磚上將礬末布於磚上以磁盤覆蓋四面灰擁一日夜礬飛盤上掃下用二錢白霜梅二個去核真明雄黄穿山甲各一錢炙共研細末以細筆管吹入喉内方歌礬精散用火燒磚水濕布礬上覆盤掃霜再兌雄梅甲研末吹喉癬自痊清凉散硼砂三錢人中白二錢煆黄連末一錢南薄荷六分氷片五分青黛四分共研極細末吹入喉癬腐處方歌清凉散吹天白蟻胃火薰金成此疾薄黛氷硼中白連腐裂疼痛皆可去上腭癰上腭癰若葡萄形少隂三焦積熱成舌難伸縮鼻紅涕口難開合寒熱增註此證又名懸癰生於口中上腭由心腎經與三焦經積熱而成形若紫葡萄舌難伸縮口難開合鼻中時出紅涕令人寒熱大作宜黄連消毒飲加桔梗元參服之兼吹氷硼散或日久腫硬下垂不潰者以燒鹽散日㸃三五次兼服射干丸過時失治飲食不入煩躁神昏者逆燒鹽散食鹽火燒枯白礬各等分二味研細以筯頭蘸㸃患上方歌燒鹽散治上腭癰懸似葡萄色紫形枯礬燒鹽等分末筯頭蘸㸃消熱壅射干丸射干川升麻杏仁去皮尖麩炒甘草各五錢炙木鼈子川大黄各二錢炒右研細末煉蜜和丸如小彈子大毎用一丸口中含化徐嚥方歌射干丸療懸癰患熱聚成形口開難大黄升草木鼈杏蜜丸彈狀口中含黄連消毒飲見頭部百會疽氷硼散見口部鵞口瘡鎻喉毒鎻喉毒生因積熱外感風寒耳前結外似瘰癧漸攻喉心與小腸聽會穴註此證由心與小腸積熱外感風寒凝結而成初生於耳前聽會穴形如瘰癧漸攻咽喉腫塞疼痛妨礙飲食證須速治宜服牛黄清心丸開關解熱兼服清咽利膈湯吹氷硼散投方應效方能成功牛黄清心丸九轉膽星一兩雄黄黄連末各二錢茯神元參天竺黄五倍子末荆芥防風桔梗犀角末當歸各一錢氷片麝香珍珠各五分豆腐煮京牛黄輕粉各三分各研極細共和一處再研勻甘草熬膏和丸如龍眼大硃砂為衣日中曬乾收入磁瓶内將瓶口堵嚴勿令出氣臨服時一丸薄荷湯磨服方歌牛黄清心鎻喉毒茯輕氷麝參雄竺珍倍荆防桔膽星犀角歸連熱退速清咽利膈湯見𦂳喉風氷硼散見口部鵞口瘡乳蛾乳蛾肺經風火成䨇輕單重喉旁生狀若蠶蛾紅腫痛關前易治關後凶註此證由肺經積熱受風凝結而成生咽喉之旁狀如蠶蛾亦有形若棗栗者紅腫疼痛有單有雙雙者輕單者重生於關前者形色易見吹藥易到手法易施故易治生於關後者難見形色藥吹不到手法難施故難治俱宜服清咽利膈湯吹氷硼散易見者膿熟鍼之難見者用雞翎探吐膿血若兼痰壅氣急聲小探吐不出者險急用三稜鍼刺少商穴出紫黑血仍吹服前藥緩緩取效清咽利膈湯見𦂳喉風氷硼散見口部鵞口瘡喉瘤喉瘤鬱熱屬肺經多語損氣相兼成形如元眼紅絲褁或單或雙喉旁生註此證由肺經鬱熱更兼多語損氣而成形如元眼紅絲相褁或單或雙生於喉旁亦有頂大蔕小者不犯不痛或醇酒炙煿或因怒氣喊呌犯之則痛忌用鍼刀宜服益氣清金湯以消瘤碧玉散㸃之即效益氣清金湯苦桔梗三錢黄芩二錢浙貝母去心研麥冬去心牛蒡子各一錢五分炒研人參白茯苓陳皮生梔子研薄荷甘草各一錢生紫蘇五分竹葉三十片水三鍾煎一鍾食逺服渣再煎服方歌益氣清金肺熱攻注喉成瘤元眼形陳蒡芩蘇苦桔貝麥冬梔薄草參苓消瘤碧玉散硼砂三錢冰片膽礬各三分共研細末用時以筯頭蘸藥㸃患處方歌消瘤碧玉㸃喉瘤開結通喉熱可搜君以硼砂冰片兌膽礬末入患皆瘳胸乳部甘疽甘疽憂思氣結成膺生糓粒紫蔞形寒熱硬痛宜速潰潰遲須防毒陷攻註此證由憂思氣結而成生於膺上即胸膛兩旁肉髙處屬肺經中府穴之下無論左右皆能為患初如糓粒色青漸若栝蔞色紫堅硬疼痛憎寒壯熱速潰稠膿者順若過十日寒熱不退信膿不生衇見浮數防毒内陷攻裏致生惡證屬逆初宜服荆防敗毒散以疎解寒熱次服内托黄耆散應期不潰者急服十全大補湯托之其餘内外治法按癰疽腫瘍潰瘍門荆防敗毒散見項部腦疽内托黄耆散見背部中搭手十全大補湯見潰瘍門膻中疽膻中疽起粟粒形色紫堅硬漸焮疼七情火毒發任衇急隨證治緩成凶註此證生於心窩之上兩乳中央屬任衇經膻中穴由臟腑不和七情不平火毒凝結而成初起如粟色紫堅硬漸生焮熱腫痛憎寒壯熱宜急服仙方活命飲加蘇葉薄荷葉汗之或煩燥作嘔脣焦大渴宜奪命丹清之俟表證已退急服托裏透膿湯若瘡勢不起屬虚宜十全大補湯托之但膻中為氣海氣之所居焉施治貴早若遲則毒陷攻裏傷膜透氣者逆其餘内外治法俱按癰疽腫瘍潰瘍門仙方活命飲見腫瘍門奪命丹見背部隂陽二氣疽托裏透膿湯見頭部侵腦疽十全大補湯見潰瘍門脾發疽脾發疽生心下旁炙煿毒酒火為殃初如粟粒時寒熱漸増腫痛潰膿昌註此證生於心窩下兩旁屬脾經食竇穴無論左右俱生之皆由過食炙煿厚味藥酒以致脾經積火成毒而發初起形如粟粒寒熱往来漸增腫痛若頂尖根束紅活鮮潤應期即潰稠膿者順若頂平根散色紫堅硬屆期不潰既潰膿如蟹沫者逆初服荆防敗毒散汗之脣焦大渇煩躁者宜服太乙紫金錠次服内疎黃連湯清之其餘内外治法俱按癰疽腫瘍潰瘍門太乙紫金錠一名紫金丹一名玉樞丹雄黄三錢鮮紅大塊者研末硃砂三錢有神氣者研末麝香三錢揀淨皮毛研末川五倍子二兩一名文蛤搥破研末紅芽大㦸杭州紫大㦸為上江南土大㦸次之北方綿大㦸色白者性烈峻利弱人服之反致吐血慎之勿用取上品者去蘆根洗淨焙乾為末一兩五錢山慈菇二兩洗去毛皮焙乾研末千金子一兩續隨子仁白者去油一名以上之藥各擇精品於淨室中製畢候端午七夕重陽或天月徳天醫黃道上吉之辰凡入室合藥之人三日前俱宜齋沭更換新潔衣帽臨日方入室中淨手薰香預設藥王牌位主人率衆焚香拜禱事畢各將前藥七味稱準入於大乳鉢内再研數百轉方入細石臼中漸加糯米濃汁調和軟硬得中方用杵搗千餘下極至光潤為度每錠一錢每服一錠病勢重者連服二綻以取通利後用温粥補之修合時除合藥潔淨之人餘皆忌見此藥惟在精誠潔淨方效方歌太乙紫金諸瘡毒疔腫癰疽皆可除雄硃倍麝千金子紅芽大㦸山慈菇一一切飲食藥毒蠱毒瘴氣惡菌河豚中毒自死牛馬豬羊六畜等類之肉人悞食之必昏亂卒倒或生異形之證並用水磨灌服或吐或瀉其人必甦一南方山嵐瘴氣烟霧癘疫最能傷人感之纔覺意思不快惡寒惡熱欲嘔不嘔即磨一錠服之得吐利便愈一癰疽發背對口疔瘡天蛇無名腫毒蛀節紅絲等疔及楊梅瘡諸風癮疹新久痔瘡並用無灰淡酒磨服外用水磨塗搽瘡上日夜數次覺癢而消一隂陽二毒傷寒心悶狂言亂語胸膈塞滯邪毒未出瘟疫煩亂發狂喉閉喉風俱用薄荷湯待冷磨服一赤白痢疾肚腹泄瀉急痛霍亂絞腸痧及諸痰喘並用薑湯磨服一男子婦人急中顛邪喝呌奔走鬼交鬼胎鬼氣鬼魘失心狂亂羊兒豬顛等風俱用石菖蒲煎湯磨服一中風中氣口眼歪邪牙關𦂳急言語塞澀筋衇攣縮骨節風腫遍身疼痛行步艱辛諸風諸癎並用酒磨炖熱服一自縊溺死驚死壓死鬼魅迷死但心頭微温未冷者俱用生薑續斷酒煎磨服一切惡蛇風犬毒蠍溪澗諸惡等蠱傷人隨即發腫攻注徧身甚者毒氣入裏昏悶响呌命在須臾俱用酒磨灌下再吃葱湯一盌被蓋出汗立甦一新久瘧疾臨發時東流水煎桃柳枝湯磨服一小兒急慢驚風五疳五痢脾病黃腫癮疹瘡瘤牙關𦂳急並用薄荷浸水磨濃加蜜服之仍搽腫上年嵗幼者每錠分作數服一牙痛酒磨塗痛上仍含少許良久嚥下一小兒父母遺毒生下百日内皮塌爛斑􅂖道眼眶損爛者俱用清水磨塗一打撲傷損用松節無灰酒研服一年深月近頭脹頭痛太陽痛極偏頭風及時瘡愈後毒氣攻注腦門作脹者俱用葱酒研服一錠仍磨塗太陽穴上一婦人經水不通紅花湯下一凡遇天行疫證延街闔巷相傳徧染者用桃根湯磨濃滴入鼻孔次服少許任入病家再不傳染一又治傳尸勞瘵諸藥不能取效一方士指教服此每早磨服一錠至三次後逐下惡物尸蟲異形怪類後得脫利以此相傳活人不計其數一一女子久患勞瘵為尸蟲所噬磨服一錠片時吐下小蟲十餘條後服蘇合香丸其病頓失調理月餘而愈眞濟世衛生之寳藥也荆防敗毒散見項部腦疽内疎黃連湯見腫瘍門井疽井疽心火發中庭初如豆粒漸腫疼心躁肌熱脣焦渇紅活易治黑陷凶註此證生於心窩屬任衇中庭穴由心經火毒而成初如豆粒腫痛漸增心躁如焚肌熱如火自汗脣焦大渴飲冷急服内疎黄連湯或麥靈丹若煩悶作嘔發熱無汗者奪命丹汗之如紅活髙腫者順黑陷平塌者逆其餘内外治法俱按癰疽腫瘍潰瘍門若潰後經年不愈者必成穿心冷瘻難治内疎黃連湯麥靈丹俱見腫瘍門奪命丹見背部隂陽二氣疽蜂窩疽蜂窩疽形似蜂窩胸側乳上瘡孔多漫腫紫痛心火毒黑陷者逆順紅活註此證生於胸側乳上亦有徧身而發者由心火毒盛而成色紫漫腫疼痛身發寒熱初起六七孔漸漸延開有三五寸亦有六七寸者形似蜂房即有數十竅每竅出黃白膿宣腫瘡面全腐腐脫有新肉色紅鮮潤者順若出黑水氣穢平塌者逆始終内外治法俱按癰疽腫瘍潰瘍門遇氣寒之人至八九日不潰以神燈照每日照之應期即潰神燈照法見首卷蠧疽蠧疽生於缺盆中初豆漸李堅紫疼寒熱尿澁宜蒜灸證由膽胃積熱生註此證一名缺盆疽又名􅴌骨疽生在胸上項下􅴌子骨内輭陷中缺盆穴屬膽胃二經積熱而成初發寒熱往来筋骨拘急飲食不思胸腹膨脹小水短澁初發如豆漸大如李色紫堅硬疼痛初宜艾壯隔獨頭蒜片灸之内服奪命丹汗之次服六一散通利小水膿勢將成宜服内托黃耆散氣血虚甚者宜服十全大補湯托補之其餘内外治法俱按癰疽腫瘍潰瘍門此證宜急托治若失治腐爛内陷瘡口難斂必成敗證六一散滑石六兩甘草一兩生共為末每服三錢燈心煎湯調服方歌六一散醫小水癃能除燥濕熱有功滑石甘草研成末燈心湯調服立通奪命丹見背部隂陽二氣疽内托黃耆散見背部中搭手十全大補湯見潰瘍門􅗢癧癰􅗢癧癰在乳旁生結核紅腫硬焮疼包絡痰凝脾氣鬱治宜温舒化堅凝註此證生於乳旁初腫堅硬形類結核發長緩慢漸增焮腫色紅疼痛由包絡寒痰脾氣鬱結而成係寒證非熱證也治宜温和舒鬱化堅以内補十宣散服之外敷回陽玉龍膏消之如不消膿勢將成也内外治法即按癰疽腫瘍潰瘍門内補十宣散人參黃耆當歸各二兩桔梗厚朴薑製川芎白芷肉桂防風甘草各一兩炙共研末每服三錢熱黃酒調服不飲酒者木香煎湯調下方歌内補十宣諸腫毒已成令潰未成消參耆桔朴芎歸草芷桂防風熱酒調囘陽玉龍膏見腫瘍門内外吹乳吹乳乳毒乳腫疼内吹胎熱痛焮紅外吹子鼻凉氣襲寒熱煩渴結腫疼註乳房屬胃乳頭屬肝而有内吹外吹之分内吹者懐胎六七月胸滿氣上乳房結腫疼痛若色紅者因多熱也不紅者既因氣鬱且兼胎旺也多熱者宜服柴胡清肝湯氣鬱者宜服逍遥散外俱敷冲和膏必消或初腫失於調治或本人復傷氣怒以致大腫大痛其勢必欲成膿宜用逍遥散加黃耆白芷連翹以養血排膿治之膿潰之後宜調養血氣待生產後按潰瘍治法方得收口妊娠用藥禁忌另有歌訣詳載首卷外吹者由乳母肝胃氣濁更兼子吮乳睡熟鼻孔凉氣襲入乳房與熱乳凝結腫痛令人寒熱往来煩躁口渴初宜服荆防牛蒡湯外用隔蒜灸法俟寒熱退仍腫者服橘葉栝蔞散外敷冲和膏消之其腫消之不應者將欲作膿即用透膿散其餘内服外敷之法俱按癰疽腫瘍潰瘍門又有至於内未懐胎外未行乳而生毒者係皮肉為患未傷乳房此肝胃濕熱凝結而成乳毒也法當按瘡􅟻治之無有不效者荆防牛蒡湯荆芥防風牛蒡子炒研金銀花陳皮花粉黄芩蒲公英連翹去心皂刺各一錢柴胡香附子甘草各五分生水二鍾煎八分食逺服方歌荆防牛蒡乳外吹寒熱腫疼俱可推銀花陳草柴香附花粉芩蒲翹刺隨橘葉栝蔞散橘葉二十個栝蔞量證用半個或一個川芎黃芩梔子生研連翹去心石膏煆柴胡陳皮青皮各一錢甘草五分生水二鍾煎八分食逺服渣再煎服紫腫焮痛用石膏紅腫者去之方歌橘葉栝蔞吹乳證凉襲熱乳凝結成芎芩梔草連翹等石膏柴與陳皮青柴胡清肝湯見頭部鬢疽逍遥散見背部上搭手冲和膏透膿散俱見腫瘍門隔蒜灸法見首卷灸法内乳疽乳癰乳疽乳癰乳房生肝氣鬱結胃火成癰形紅腫焮熱痛疽形木硬覺微疼癰發膿成十四日疽發月餘膿始成未潰托裏排膿治已潰大補養榮靈註此證總由肝氣鬱結胃熱壅滯而成男子生者稀少女子生者頗多俱生於乳房紅腫熱痛者為癰十四日膿成若堅硬木痛者為疽月餘成膿初起寒熱往来宜服栝蔞牛蒡湯寒熱悉退腫硬不消宜用復元通氣散消之若不應復時時跳動者勢將潰膿宜用托裏透膿湯膿脹痛者鍼之宜服托裏排膿湯虚者補之如人參養榮十全大補等湯俱可選用外敷貼之藥俱按癰疽腫瘍潰瘍門栝蔞牛蒡湯栝蔞仁牛蒡子炒研花粉黃芩生梔子研連翹去心皂刺金銀花甘草生陳皮各一錢青皮柴胡各五分水二鍾煎八分入煮酒一杯和勻食逺服方歌栝蔞牛蒡胃火鬱憎寒壯熱乳癰疽青柴花粉芩翹刺銀花梔子草陳皮復元通氣散見腫瘍門托裏透膿湯見頭部侵腦疽托裏排膿湯見項部魚尾毒人參養榮湯十全大補湯俱見潰瘍門乳發乳漏乳發如癰胃火成男女皆生赤腫疼潰久不斂方成漏只為膿清肌不生註此證發於乳房焮赤腫痛其勢更大如癰皮肉盡腐由胃腑濕火相凝而成治法急按乳癰未成形者消之已成形者托之腐脫遲者黃靈藥撒之以免徧潰乳房致傷囊槅難以收斂若久不收口外寒侵襲失於調養時流清水者即成乳漏外用紅升丹作撚以去腐生肌再兼用豆豉餅灸法緩緩灸之以怯寒内當大補氣血節勞煩慎起居忌發物漸可生肌斂口而愈黄靈藥紅升丹俱見潰瘍門豆豉餅見首卷灸法内乳中結核乳中結核梅李形按之不移色不紅時時隱痛勞岩漸證由肝脾鬱結成註此證乳房結核堅硬小者如梅大者如李按之不移推之不動時時隱痛皮色如常由肝脾二經氣鬱結滯而成形勢雖小不可輕忽若躭延日久不消輕成乳勞重成乳岩慎之慎之初起氣實者宜服清肝解鬱湯氣虚宜服香貝養榮湯若鬱結傷脾食少不寐者服歸脾湯外俱用木香餅熨法消之甚效清肝解鬱湯當歸生地白芍酒炒川芎陳皮半夏各八分製貝母去心研茯神青皮逺志去心桔梗蘇葉各六分梔子生研木通甘草各四分生香附一錢醋炒水二鍾薑一片煎八分食逺服方歌清肝解鬱貝茯神四物青皮逺夏陳梔桔通蘇香附草能消乳核氣鬱伸歸脾湯人參白术土炒棗仁炒研龍眼肉茯神各二錢黃耆一錢五分當歸一錢酒洗逺志去心木香末甘草各五分炙生薑三片紅棗肉二枚水煎服方歌歸脾湯治脾胃怯食少怔忡夜不安棗逺龍眼參歸草茯神耆术木香煎木香餅生地黄一兩搗爛木香五錢研末共和勻量結核大小作餅貼腫上以熱熨斗間日熨之堅硬木痛者每日熨之方歌木香餅消乳核方舒通結滯功倍强生地研爛木香末和餅貼患熨之良香貝養榮湯見項部上石疽乳勞乳勞初核漸腫堅根形散漫大如盤未潰先腐黴斑㸃敗膿津久勞證添註此證即由乳中結核而成或消之不應或失於調治躭延數月漸大如盤如盌堅硬疼痛根形散漫串延胸肋腋下其色或紫或黑未潰先腐外皮黴㸃爛斑數處漸漸通破輕津白汁重流臭水即敗漿膿也日久潰深傷膜内病漸添午後煩熱乾𠻳顴紅形痩食少隂虚等證俱見變成瘡勞初結腫時氣實者宜服蔞貝散及神效栝蔞散氣虚者逍遥散及歸脾湯合而用之隂虚之證已見宜服六味地黃湯以培其本外治法按癰疽潰瘍門然此瘡成勞至易獲效甚難蔞貝散栝蔞貝母去心研南星甘草生連翹各一錢去心水二鍾煎八分澄渣加酒二分食逺服一加青皮升麻方歌蔞貝散治乳結核漸大失調變乳勞初腫氣實須服此南星甘草共連翹神效栝蔞散大栝蔞一個為去皮焙末當歸甘草各五錢生没藥乳香各二錢共研粗末每用五錢醇酒三鍾慢火熬至一鍾去渣食後服之方歌神效栝蔞没乳香甘草當歸研末良乳勞初腫酒煎服消堅和血是神方逍遥散見背部上搭手歸脾湯見乳中結核六味地黃湯即六味地黄丸改作煎劑見面部雀斑乳岩乳岩初結核隱疼肝脾兩損氣鬱凝核無紅熱身寒熱速灸養血免患攻躭延續發如堆栗堅硬岩形引腋胸頂透紫光先腐爛時流汚水日增疼潰後翻花怒出血即成敗證藥不靈註此證由肝脾兩傷氣鬱凝結而成自乳中結核起初如棗栗漸如棋子無紅無熱有時隱痛速宜外用灸法内服養血之劑以免内攻若年深日久即潮熱惡寒始覺大痛牽引胸腋腫如覆盌堅硬形如堆栗髙凸如岩頂透紫色光亮肉含血絲先腐後潰汚水時津有時湧冒臭血腐爛深如岩壑翻花突如泛蓮疼痛連心若復因急怒暴流鮮血根腫愈堅期時五臟俱衰即成敗證百無一救若患者果能清心滌慮静養調理庶可施治初宜服神效栝蔞散次宜清肝解鬱湯外貼季芝鯽魚膏其核或可望消若反復不應者瘡勢已成不可過用尅伐峻劑致損胃氣即用香貝養榮湯或心煩不寐者宜服歸脾湯潮熱惡寒者宜服逍遥散稍可苟延嵗月如得此證者於腫核初起即加醫治宜用豆粒大艾壯當頂灸七壯次日起皰挑破用三稜鍼刺入五六分揷入冰螺散撚子外用紙封糊至十餘日其核自落外貼絳珠膏生肌玉紅膏内服舒肝養血理脾之劑生肌斂口自愈季芝鯽魚膏活鯽魚肉鮮山藥各等分去皮右共搗如泥加麝香少許塗核上覺癢極勿搔動隔衣輕輕揉之七日一換旋塗即消方歌鯽魚膏貼乳岩疾腫如覆盌似堆栗山藥同研加麝香塗於患處七日易冰螺撚硇砂二分大田螺五枚去殻線穿曬乾冰片一分白砒即人言一錢二分麫褁煨熟去麫用砒將螺肉切片同白砒研末再加硇片同碾細以稠米糊搓成撚子磁礶密收用時將撚揷入鍼孔外用紙糊封貼核上勿動十日後四邉裂縫其核自落方歌冰螺撚消諸核癧硇砂螺肉煨白砒再加冰片米糊撚乳岩堅硬用之宜神效栝蔞散見乳勞香貝養榮湯見項部上石疽清肝解鬱湯歸脾湯俱見乳中結核逍遥散見背部上搭手絳珠膏生肌玉紅膏俱見潰瘍門御纂醫宗金鑑卷六十六
