body:
  text: 訂正仲景全書傷寒論註痙濕暍病篇目錄桂枝加葛根湯桂枝附子去桂枝加白术湯甘草附子湯御纂醫宗金鑑卷十三目録欽定四庫全書御纂醫宗金鑑卷十三訂正仲景全書傷寒論註痙濕暍病篇目錄桂枝加葛根湯桂枝附子去桂枝加白术湯甘草附子湯御纂醫宗金鑑卷十三目録欽定四庫全書御纂醫宗金鑑卷十三訂正仲景全書傷寒論註辨痙濕暍病衇證并治篇經云諸痙項强皆屬於濕又云諸暴强直皆屬於風論曰太陽病發汗太多因成痙夫六氣皆足以致痙不專在濕也六經皆有痙證亦不專在太陽一經也蓋身以後屬太陽凡頭項强急項背􅕇􅕇脊强反張腰似折髀不可以曲膕如結皆太陽痙也身以前屬陽明頭面動搖口噤齒齘缺盆紐痛脚攣急皆陽明痙也身之側屬少陽口眼喎邪手足牽引兩脇拘急半身不遂皆少陽痙也至若腹内拘急因吐利後而四肢攣急者未嘗非太陰痙也惡寒踡臥尻以代踵脊以代頭俯而不能仰者未嘗非少陰痙也睪丸上升宗筋下注少腹裏急陰中拘攣膝脛拘急者未嘗非厥陰痙也大抵痙以狀名而痙因筋急故凡六經筋病皆得以痙稱之其因於風寒者必發熱惡寒而無汗其衇浮𦂳其狀身強直而口噤即經所云諸病强直皆屬於風者也其勢勁急故名曰剛痙其因於風濕者發熱汗出不惡寒其衇浮緩其狀項强􅕇􅕇而身不强直即經所云諸痙項强皆屬於濕者也其勢濡弱故名曰柔痙若夫因誤汗亡陽津竭無以飬筋而致痙者即本論所云太陽病發汗太多而成痙又非因濕因風而却因燥者也蓋痙之始本非正病多雜於他病之中如婦人之脫血跌撲之破傷俱能致痙今見患此者悉指為風殊非確論學者當於證中審察風寒濕燥内外虛實之因分别施治庶不致悞慎勿㮣指為風也傷寒所致太陽病痙濕暍此三種宜應别論以為與傷寒相似故此見之按傷寒所致四字甚無所謂衍文也註傷寒太陽經中之一病非謂太陽經惟病傷寒也蓋以六氣外感之邪人中傷之者未有不由太陽之表而入者也痙風邪也濕濕邪也暍暑邪也夫風寒暑濕之病固皆統屬太陽然痙濕暍三種雖與傷寒形證相似但其為病傳變不同故曰宜應别論也集註方有執曰痙濕暍三者皆風寒之變證既成變證則當别為立論然自風寒變來本屬太陽猶有風寒渉似之疑須當併為辨論病身熱足寒頸項强急惡寒時頭熱面赤目衇赤獨頭面搖卒口噤背反張者痙病也註病人身熱惡寒太陽證也頸項强急面赤目赤陽明證也頭熱陽鬱於上也足寒陰凝於下也太陽之衇循背上頭陽明之筋上挾於口風寒客於二經則有頭搖口噤反張拘强之證故名痙病也集註方有執曰此以痙之具證言身熱頭熱面赤目衇赤陽邪發於陽也足寒陰邪逆於陰也獨頭面搖風行陽而動於上也卒忽然也噤寒而口閉也言忽然唇口脗合噤急而飲食不通也背反張者太陽之衇挾背寒則筋急而拘攣熱則筋緩而縱弛也然剛柔二痙則各見證之一偏惟風寒俱有而致證者則具見也鄭重光曰此總論痙之經俞皆病氣血併傷而為强急反張之證也風濕俱有故為痙之具證也太陽病發熱衇沉而細者名曰痙註太陽病發熱衇當浮大衇若沉細兼少陰也今發熱衇沉細而名曰痙者何也以其已病痙證而得沉細衇不可名太陽少陰傷寒之衇當名太陽風濕痙病之衇也因風邪鬱於陽故病發熱也濕邪凝於陰故衇沉細也此承上條痙病得沉細衇之義非謂太陽病發熱衇沉細即名之曰痙病也集註方有執曰發熱太陽未除也沉寒也細濕也程知曰衇沉細法宜救裏而痙又為燥熱之病故金匱謂難治謂未可輕同於太陽發熱衇反沉之例也張璐曰發熱衇當浮數而反沉細知邪風為濕氣所著所以身雖發熱而衇不能浮數是陽證見陰衇故金匱指為難治也程應旄曰痙病有同有獨固以其獨者名之矣然衇在太陽更有獨而無同以頭面搖口噤背反張之證合沉細之衇雖有太陽發熱等證不致為傷寒所溷乃可定其名曰痙也太陽病發熱無汗反惡寒者名曰剛痙太陽病發熱汗出而不惡寒名曰柔痙按反惡寒之反字衍文也剛痙證應惡寒非反也註痙病既屬太陽當以太陽虛實例之故曰太陽病發熱無汗惡寒為實邪名曰剛痙發熱汗出不惡寒為虛邪名曰柔痙此詳申上二條痙病虛實非謂太陽病發熱無汗惡寒汗出不惡寒即名之曰剛柔痙病之證也集註程知曰太陽病發熱無汗惡寒為傷寒發熱汗出惡風為傷風發熱汗出不惡寒為溫熱以證有頸項强急甚則反張故不謂之風寒溫熱病而謂之痙也張璐曰金匱云太陽病無汗而小便反少氣上衝胸口噤不能言欲作剛痙葛根湯主之即是申明此條之義而補其治法也無汗而小便少者以太陽陽明二經之熱聚於胸中延傷肺金清肅之氣内外不能宣通故也又云太陽病其證備身體強􅕇􅕇然衇反沉遲此為痙栝蔞桂枝湯主之即是申明此條之義而補其治法也其證備則發熱汗出等證金匱已詳不必贅矣太陽病項背强􅕇􅕇無汗惡風葛根湯主之註此畧其證衇單舉痙之頸項强急者以明其治也太陽衇下項循肩挾脊陽明衇循喉嚨入缺盆貫膈下乳内廉太陽主後前合陽明陽明主前後合太陽今邪壅於二經之中故有􅕇􅕇拘强之貌也太陽之强不過頸項强此痙之强則不能俯仰項連胸背而俱强故曰項背強􅕇􅕇也無汗惡風實邪也宜葛根湯發之即桂枝湯加麻黄葛根兩解太陽陽明之邪也集註方有執曰􅕇􅕇鳥之短羽者動則引頸􅕇􅕇然形容病人之頸項俱病者俛仰不能自如之貌太陽病項背强􅕇􅕇反汗出惡風者桂枝加葛根湯主之註太陽病項背强􅕇􅕇無汗惡風者實邪也今反汗出惡風者虛邪也宜桂枝加葛根湯解太陽之風發陽明之汗也集註汪琥曰太陽病項背强矣復􅕇􅕇然頸不得舒頸之經屬陽明項背與頸􅕇􅕇然其狀當無汗今反汗出惡風仲景法太陽病汗出惡風者桂枝湯主之今因其􅕇􅕇然故加葛根於桂枝湯中以兼袪陽明經之風也桂枝加葛根湯方於桂枝湯内加葛根三兩餘依桂枝湯法太陽病發汗太多因致痙註已上論痙皆外感風寒濕而為病也若太陽病發汗太多津液大亡表氣不固邪風乘虛而入因成痙者乃内虛之所致也不可以柔痙剛痙例之宜以桂枝加附子湯以固表袪風為主治由此推之凡病出汗過多新產亡血過多而變生此證者皆類此也集註程應旄曰即此一端推之則知此病得之亡津亡血而因虛致寒因虛致燥者不少蓋陽氣者柔則養筋發汗太多則亡其陽而損其經衇之血液故也濕家之為病一身盡疼發熱身色如似熏黄註濕家謂病濕之人濕之為病或因外受濕氣則一身盡痛或因内生濕病則發熱身黄若内外同病則一身盡痛發熱身色如熏黄也熏黄者濕盛之發黄屬脾之瘀濕故其色暗如煙熏也不似傷寒熱盛之發黄屬陽明之鬱熱故其色明如橘子色也集註張璐曰濕證發黄須分陰陽表裏陽濕在裏茵蔯蒿湯在表麻黄連軺赤小豆湯陰濕在裏白术附子湯在表麻黄白术湯此陰濕在表而發黄也金匱有云濕家身煩痛可與麻黄加术湯蓋寒與濕合不宜大汗故加白术以麻黄得术則汗不致於驟發白术得麻黄則濕滯得以宣通也濕家病身上疼痛發熱面黄而喘頭痛鼻塞而煩其衇大自能飲食腹中和無病病在頭中寒濕故鼻塞內藥鼻中則愈註此申上條詳其證出其衇以别其治也濕家病身上疼痛發熱面黄而喘此内生外受之濕病也外宜羌活勝濕湯内宜茵蔯五苓散喘甚大陷胸丸若更頭痛鼻塞而煩其衇大證類傷寒但其人裏和能食知非傷寒不可發汗乃濕邪之病在頭故頭痛鼻塞惟宜納藥鼻中取黄水從涕出自可愈也所納之藥卽瓜蒂散類也集註鄭重光曰身上疼痛發熱面黄而喘頭痛鼻塞則寒濕之邪客於上焦經曰因於濕首如裹是也用瓜蒂散吹鼻此在上者因而越之之法也太陽病關節疼痛而煩衇沉而細者此名濕痺濕痺之候其人小便不利大便反快但當利其小便註濕家衇浮細濕在外也當汗之今太陽病關節疼痛而煩小便不利大便反快衇不浮細而沉細是濕邪内盛而為濕痺不通之候也故但當利其小便使濕從小便而去乃濕􅁋於内之正治也集註成無己曰濕盛則濡泄小便不利大便反快者濕氣内流也但當利其小便以宣泄腹中濕氣古云治濕不利小便非其治也方有執曰此以濕之入裏者言也關節疼痛者寒濕之氣走注内滲所以衇沉而細也痺以疼痛言小便不利大便反快者濕卽水水不外滲則横流不遵故道利其小便者導其遵故道而行也張志聰曰關節者腰背肘膝之大關大筋之所統屬不同於骨節也濕流關節大筋不和故疼痛痺閉也濕傷太陽筋衇澁滯故名濕痺利其小便則水道行而决凟無愆濕邪去而筋衇調和矣濕家其人但頭汗出背强欲得被覆向火若下之早則噦胸滿小便不利舌上如胎者以丹田有熱胸中有寒渴欲得水而不能飲口燥煩也註濕家但頭汗出乃濕氣上滛之汗非陽明之熱不得越也濕家背强乃濕氣澁滯之重强非痙病之拘强也欲得覆被向火非外惡寒乃濕盛生内寒也若誤以濕􅁋之頭汗為陽明瘀熱之頭汗而下之寒濕之氣乘虛入胸則胸滿入胃則噦矣寒濕不化故小便不利胸中有寒故舌上滑白如胎丹田有熱故口燥渴欲得水而不能飲由胸中有寒濕故也集註成無己曰傷寒則無汗濕家雖有汗而不能周身故但頭汗出也程應旄曰雖渴欲得水似熱而不能飲可辨則祗是口燥煩而實非胸中燥煩可知證同病别也濕家下之額上汗出㣲喘小便利者死若下利不止者亦死註此承上條濕家誤下之逆也濕家誤下胸滿而噦小便不利舌上如胎口燥渴不能飲已屬逆矣尚在可治此誤下後額汗不已微喘不止是陽脫於上也小便反利下利不止是陰脫於下也陰陽相離故死也集註方有執曰治濕當利其小便而以小便利主死何也誤治而陰陽散亡也程知曰濕之中人陰先受之故本經濕證多從助陽溫散為治若妄下則陽虛陰盛而不可救矣額上汗出微喘虛陽欲上脫也二便不禁盛陰欲下脫也陰陽離决死矣病者一身盡疼發熱日晡所劇者此名風濕此病傷於汗出當風或久傷取冷所致也註病者謂一身盡痛之病人也濕家一身盡痛風濕亦一身盡痛然濕家之痛則重著不能轉側風濕之痛則輕掣不可屈伸此痛之有别者也至於發熱濕家之熱早暮不分微甚風濕之熱則日晡必劇此得之於汗出當風或久傷濕復受風冷所致也集註張志聰曰汗出當風則為風濕久傷取冷則為寒濕張錫駒曰發熱日晡所劇者日晡而陽氣衰陰氣盛濕為陰邪故主旺時而甚也問曰風濕相摶一身盡疼痛法當汗出而解値天陰雨不止醫云此可發汗汗之病不愈者何也答曰發其汗汗大出者但風氣去濕氣在是故不愈也若治風濕者發其汗但微微似欲汗出者風濕俱去也註此詳風濕相摶一身盡痛不惟不可下即發汗亦不可失其宜也風陽邪濕陰邪風濕相摶陰陽受邪故一身盡痛也法當汗出而解值天陰雨不止則濕氣盛雖發其汗汗大出而病不愈者但以風氣去濕氣在是故不愈也以其値濕盛之時發其汗大汗出此汗之不如法所以不解也若治風濕者必俟天氣晴明發其汗但令其汗微微似欲出狀則風與濕俱去而病自解矣集註方有執曰陰雨不止則濕不除所以益當發汗也然風濕本由汗出當風而得則汗之大出者必反濕轉加甚微微似欲汗出而不見出則濕消而風散矣此發汗之微機後之人動輒以大汗為言者去道遠矣張璐曰風濕相摶法當汗出而解合用桂枝加术使微微蒸發表裏氣和風濕皆去正如濕家身煩痛可與麻黄湯加术同義程應旄曰濕家不惟不可誤下即汗亦不可誤汗風濕相摶一證一身盡疼痛雖是微挾表邪然其衇不浮終是汗難大汗治風兼治濕但使微微似欲汗出者是其法也傷寒八九日風濕相摶身體疼煩不能自轉側不嘔不渴衇浮虛而濇者桂枝附子湯主之若其人大便鞕小便自利者去桂枝加白术湯主之註此承上條詳申衇證以明其治也傷寒八九日不嘔不渴是無傷寒裏病之證也衇浮虛濇是無傷寒表病之衇也衇浮虛主在表虛風也濇者主在經寒濕也身體疼煩屬風也不能轉側屬濕也乃風濕相摶之證非傷寒也與桂枝附子湯溫散其風濕使從表而解也若衇浮實者則又當以麻黄加术湯大發其風濕也如其人有是證雖大便鞕小便自利而不議下者以其非邪熱入裏之鞕乃風燥濕去之鞕故仍以桂枝附子湯去桂枝以大便鞕小便自利不欲其發汗再奪津液也加白术以身重著濕在肉分用以佐附子逐濕氣於肌也集註成無己曰煩者風也身疼不能自轉側者濕也經曰風則浮虛衇經曰衇來濇者為病寒濕也桂枝附子去桂枝加白术湯方附子三枚炮去皮破白术四兩生薑三兩切大棗十二枚擘甘草二兩炙右五味以水六升煮取二升去滓分温三服初一服其人身如痺半日許復服之三服都盡其人如冒狀勿怪此以附子术併走皮内逐水氣未得除故使之耳法當加桂四兩此本一方二法以大便鞕小便自利去桂也以大便不鞕小便不利當加桂附子三枚恐多也虛弱家及產婦宜減服之風濕相摶骨節疼煩掣痛不得屈伸近之則痛劇汗出短氣小便不利惡風不欲去衣或身微腫者甘草附子湯主之註風濕相摶骨節疼煩重著不能轉側濕勝風也掣痛不可屈伸風勝濕也今掣痛不可屈伸近之則痛劇汗出短氣惡風不欲去衣皆風邪壅盛傷肌表也小便不利濕内蓄也身微腫者濕外薄也以甘草附子湯微汗之袪風為主除濕次之也已上二條皆詳風濕之義以明風濕之治也集註方有執曰摶掜聚也言風與濕掜合摶聚共為一家之病也煩風也痛濕也風􅁋則掣濕􅁋則痛風濕之邪注經絡流關節滲骨髓身體所以煩痛掣痛而不利也近之則痛劇者外邪客於内迕之則逆也短氣者汗多亡陽而氣傷也惡風不欲去衣者以重傷故惡甚也甘草益氣和中附子温經散濕术能勝濕燥脾桂枝袪風固衞此四物者所以為風濕相摶之的藥也吳人駒曰必衇之沉而細者若浮大而盛則風多而濕少附子須在審之甘草附子湯方甘草二兩炙附子二枚炮去皮破桂枝四兩白术二兩右四味以水六升煮取三升去滓温服一升日三服初服得微汗則解能食汗止復煩者服五合恐一升多者宜服六七合為妙方解風濕之治用甘草附子湯卽桂枝附子湯去薑棗加白术也去薑棗者畏助汗也加白术者燥中濕也日三服初服一升不得汗解則仍服一升若微得汗則解解則能食是解已徹也可止再服若汗出而復煩者是解未徹也仍當服之但不可更服一升恐已經汗多服而過汗也服五合可也如不解再服六七合為妙似此服法總是示人不可盡劑之意學者於理有未解處卽於本文中求之自得矣太陽中熱者暍是也其人汗出惡寒身熱而渴也註中暑熱病亦由太陽表入故曰太陽中熱者暍是也其人汗出惡寒身熱而渴頗似太陽溫熱之病但溫熱無惡寒以熱從内發故雖汗出而不惡寒中暍惡寒者以暑由外入故汗出而惡寒也究之於衇溫熱之浮必浮而實中暍之浮必浮而虛以暑熱傷氣也究之於渴温熱之渴初病不過欲飲水中暍之渴一病即大渴引飮也溫熱則傳經變病不一中暍則不傳不愈卽死也雖同為太陽經中之病而虛實施治不同宜以人參白虎湯主治之集註方有執曰蒸熱謂之暑傷暑謂之暍汗出惡寒者太陽表不固也身熱者暑邪傷陽也渴者亡津液而内燥也程知曰此辨暑熱衇證也太陽中熱者謂是太陽表證而屬中熱也均是太陽表病汗出惡寒身熱而不渴者為中風汗出身熱而渴不惡寒者為溫病今汗出惡寒身熱而渴則是中暍暍者暑熱之氣也不言暍而言熱以其胃熱為獨重也裏有熱故身熱而渴暑傷氣故汗出惡寒吳人駒曰不可因惡寒而用辛溫又不可因汗出而固表惟宜甘寒以解其暑熱可也太陽中暍者發熱惡寒身重而疼痛其衇弦細芤遲小便已灑灑然毛聳手足逆冷小有勞身即熱口開前板齒燥若發汗則惡寒甚加溫鍼則發熱甚數下之則淋甚註此申上條詳出證衇戒人不可妄行汗下溫鍼也太陽中暍無汗身重疼痛者似傷寒也但衇弦細芤遲非傷寒衇也且有小便已而灑灑然惡寒毛聳之證乃太陽膀胱表氣為暑所傷而然也手足逆冷者乃暑傷氣氣傷不能達四肢則寒也小有勞身即發熱口開前板齒燥者乃勞則動熱暑熱益烈傷陰液也此皆中暍危證若以發熱無汗惡寒身痛誤為傷寒之表妄行發汗則表氣愈虛惡寒更甚也若以手足逆冷誤為陽虛妄加溫鍼則暑邪愈盛發熱更熾也若以壯熱齒乾誤為胃火而數下之則水源竭澁尿淋窘甚也凡此之證皆中暍妄行汗下溫鍼致變惟宜以白虎加人參湯主之或人參湯調辰砂六一散亦可也集註成無己曰經云因於暑汗煩則喘喝口開謂喘喝也喘喝不止故前板齒燥程知曰人身之陽以汗而外泄人身之陰以熱而内竭故暍證禁用汗下溫鍼謂汗則傷陽下則傷陰温鍼則引火内入也張錫駒曰灑灑者惡寒之象也毛聳者毫毛􅆆起也太陽中暍者身熱疼重而衇微弱此亦夏月傷冷水水行皮中所致也註太陽中暍之證身熱疼重者暑傷形也衇微弱者暑傷氣也以此證衇揆之亦其人夏月盛暑喜貪風涼過飲冷水水氣輸行於皮中表為邪束不得汗泄所致也此時即以香薷飲大順散汗之可立愈也若因循不治則水氣既不得外泄於表而作腫勢必内攻於裏而喘脹矣是又當以葶藶大棗湯或𤓰蒂一物散下之也上條戒人不可汗下此條示人宜當汗下仲景之法多是如此蓋恐人固執失宜也集註方有執曰身熱疼重而曰夏月傷冷水水行皮中所致者土主肌肉而惡濕水滲土而蒸發也衇微弱者熱則血乾而氣耗也然夏月飲水人之常事而曰傷何哉良由暑廹飲之過多或得之冷水澡洗暑反内入也張璐曰按論暍三條首言動而得之之病謂中暍屬外因次言靜而得之之病雖曰中暍實暑病也屬内因末言因熱傷冷之病乃中暍之變證屬不内外因不得以三者混稱也程應旄曰可見中暍之病大都陽氣在表而胃中虛冷所以身熱疼重而衇微弱夏月飲冷水裏陰鬱住表陽水氣不得宣洩而行於皮中多有此證此則開鬱宣陽又為暍證中增一義也音切􅕇音殊摶音團掣音徹暍音謁灑所下切御纂醫宗金鑑卷十三欽定四庫全書御纂醫宗金鑑卷十三訂正仲景全書傷寒論註辨痙濕暍病衇證并治篇經云諸痙項强皆屬於濕又云諸暴强直皆屬於風論曰太陽病發汗太多因成痙夫六氣皆足以致痙不專在濕也六經皆有痙證亦不專在太陽一經也蓋身以後屬太陽凡頭項强急項背􅕇􅕇脊强反張腰似折髀不可以曲膕如結皆太陽痙也身以前屬陽明頭面動搖口噤齒齘缺盆紐痛脚攣急皆陽明痙也身之側屬少陽口眼喎邪手足牽引兩脇拘急半身不遂皆少陽痙也至若腹内拘急因吐利後而四肢攣急者未嘗非太陰痙也惡寒踡臥尻以代踵脊以代頭俯而不能仰者未嘗非少陰痙也睪丸上升宗筋下注少腹裏急陰中拘攣膝脛拘急者未嘗非厥陰痙也大抵痙以狀名而痙因筋急故凡六經筋病皆得以痙稱之其因於風寒者必發熱惡寒而無汗其衇浮𦂳其狀身強直而口噤即經所云諸病强直皆屬於風者也其勢勁急故名曰剛痙其因於風濕者發熱汗出不惡寒其衇浮緩其狀項强􅕇􅕇而身不强直即經所云諸痙項强皆屬於濕者也其勢濡弱故名曰柔痙若夫因誤汗亡陽津竭無以飬筋而致痙者即本論所云太陽病發汗太多而成痙又非因濕因風而却因燥者也蓋痙之始本非正病多雜於他病之中如婦人之脫血跌撲之破傷俱能致痙今見患此者悉指為風殊非確論學者當於證中審察風寒濕燥内外虛實之因分别施治庶不致悞慎勿㮣指為風也傷寒所致太陽病痙濕暍此三種宜應别論以為與傷寒相似故此見之按傷寒所致四字甚無所謂衍文也註傷寒太陽經中之一病非謂太陽經惟病傷寒也蓋以六氣外感之邪人中傷之者未有不由太陽之表而入者也痙風邪也濕濕邪也暍暑邪也夫風寒暑濕之病固皆統屬太陽然痙濕暍三種雖與傷寒形證相似但其為病傳變不同故曰宜應别論也集註方有執曰痙濕暍三者皆風寒之變證既成變證則當别為立論然自風寒變來本屬太陽猶有風寒渉似之疑須當併為辨論病身熱足寒頸項强急惡寒時頭熱面赤目衇赤獨頭面搖卒口噤背反張者痙病也註病人身熱惡寒太陽證也頸項强急面赤目赤陽明證也頭熱陽鬱於上也足寒陰凝於下也太陽之衇循背上頭陽明之筋上挾於口風寒客於二經則有頭搖口噤反張拘强之證故名痙病也集註方有執曰此以痙之具證言身熱頭熱面赤目衇赤陽邪發於陽也足寒陰邪逆於陰也獨頭面搖風行陽而動於上也卒忽然也噤寒而口閉也言忽然唇口脗合噤急而飲食不通也背反張者太陽之衇挾背寒則筋急而拘攣熱則筋緩而縱弛也然剛柔二痙則各見證之一偏惟風寒俱有而致證者則具見也鄭重光曰此總論痙之經俞皆病氣血併傷而為强急反張之證也風濕俱有故為痙之具證也太陽病發熱衇沉而細者名曰痙註太陽病發熱衇當浮大衇若沉細兼少陰也今發熱衇沉細而名曰痙者何也以其已病痙證而得沉細衇不可名太陽少陰傷寒之衇當名太陽風濕痙病之衇也因風邪鬱於陽故病發熱也濕邪凝於陰故衇沉細也此承上條痙病得沉細衇之義非謂太陽病發熱衇沉細即名之曰痙病也集註方有執曰發熱太陽未除也沉寒也細濕也程知曰衇沉細法宜救裏而痙又為燥熱之病故金匱謂難治謂未可輕同於太陽發熱衇反沉之例也張璐曰發熱衇當浮數而反沉細知邪風為濕氣所著所以身雖發熱而衇不能浮數是陽證見陰衇故金匱指為難治也程應旄曰痙病有同有獨固以其獨者名之矣然衇在太陽更有獨而無同以頭面搖口噤背反張之證合沉細之衇雖有太陽發熱等證不致為傷寒所溷乃可定其名曰痙也太陽病發熱無汗反惡寒者名曰剛痙太陽病發熱汗出而不惡寒名曰柔痙按反惡寒之反字衍文也剛痙證應惡寒非反也註痙病既屬太陽當以太陽虛實例之故曰太陽病發熱無汗惡寒為實邪名曰剛痙發熱汗出不惡寒為虛邪名曰柔痙此詳申上二條痙病虛實非謂太陽病發熱無汗惡寒汗出不惡寒即名之曰剛柔痙病之證也集註程知曰太陽病發熱無汗惡寒為傷寒發熱汗出惡風為傷風發熱汗出不惡寒為溫熱以證有頸項强急甚則反張故不謂之風寒溫熱病而謂之痙也張璐曰金匱云太陽病無汗而小便反少氣上衝胸口噤不能言欲作剛痙葛根湯主之即是申明此條之義而補其治法也無汗而小便少者以太陽陽明二經之熱聚於胸中延傷肺金清肅之氣内外不能宣通故也又云太陽病其證備身體強􅕇􅕇然衇反沉遲此為痙栝蔞桂枝湯主之即是申明此條之義而補其治法也其證備則發熱汗出等證金匱已詳不必贅矣太陽病項背强􅕇􅕇無汗惡風葛根湯主之註此畧其證衇單舉痙之頸項强急者以明其治也太陽衇下項循肩挾脊陽明衇循喉嚨入缺盆貫膈下乳内廉太陽主後前合陽明陽明主前後合太陽今邪壅於二經之中故有􅕇􅕇拘强之貌也太陽之强不過頸項强此痙之强則不能俯仰項連胸背而俱强故曰項背強􅕇􅕇也無汗惡風實邪也宜葛根湯發之即桂枝湯加麻黄葛根兩解太陽陽明之邪也集註方有執曰􅕇􅕇鳥之短羽者動則引頸􅕇􅕇然形容病人之頸項俱病者俛仰不能自如之貌太陽病項背强􅕇􅕇反汗出惡風者桂枝加葛根湯主之註太陽病項背强􅕇􅕇無汗惡風者實邪也今反汗出惡風者虛邪也宜桂枝加葛根湯解太陽之風發陽明之汗也集註汪琥曰太陽病項背强矣復􅕇􅕇然頸不得舒頸之經屬陽明項背與頸􅕇􅕇然其狀當無汗今反汗出惡風仲景法太陽病汗出惡風者桂枝湯主之今因其􅕇􅕇然故加葛根於桂枝湯中以兼袪陽明經之風也桂枝加葛根湯方於桂枝湯内加葛根三兩餘依桂枝湯法太陽病發汗太多因致痙註已上論痙皆外感風寒濕而為病也若太陽病發汗太多津液大亡表氣不固邪風乘虛而入因成痙者乃内虛之所致也不可以柔痙剛痙例之宜以桂枝加附子湯以固表袪風為主治由此推之凡病出汗過多新產亡血過多而變生此證者皆類此也集註程應旄曰即此一端推之則知此病得之亡津亡血而因虛致寒因虛致燥者不少蓋陽氣者柔則養筋發汗太多則亡其陽而損其經衇之血液故也濕家之為病一身盡疼發熱身色如似熏黄註濕家謂病濕之人濕之為病或因外受濕氣則一身盡痛或因内生濕病則發熱身黄若内外同病則一身盡痛發熱身色如熏黄也熏黄者濕盛之發黄屬脾之瘀濕故其色暗如煙熏也不似傷寒熱盛之發黄屬陽明之鬱熱故其色明如橘子色也集註張璐曰濕證發黄須分陰陽表裏陽濕在裏茵蔯蒿湯在表麻黄連軺赤小豆湯陰濕在裏白术附子湯在表麻黄白术湯此陰濕在表而發黄也金匱有云濕家身煩痛可與麻黄加术湯蓋寒與濕合不宜大汗故加白术以麻黄得术則汗不致於驟發白术得麻黄則濕滯得以宣通也濕家病身上疼痛發熱面黄而喘頭痛鼻塞而煩其衇大自能飲食腹中和無病病在頭中寒濕故鼻塞內藥鼻中則愈註此申上條詳其證出其衇以别其治也濕家病身上疼痛發熱面黄而喘此内生外受之濕病也外宜羌活勝濕湯内宜茵蔯五苓散喘甚大陷胸丸若更頭痛鼻塞而煩其衇大證類傷寒但其人裏和能食知非傷寒不可發汗乃濕邪之病在頭故頭痛鼻塞惟宜納藥鼻中取黄水從涕出自可愈也所納之藥卽瓜蒂散類也集註鄭重光曰身上疼痛發熱面黄而喘頭痛鼻塞則寒濕之邪客於上焦經曰因於濕首如裹是也用瓜蒂散吹鼻此在上者因而越之之法也太陽病關節疼痛而煩衇沉而細者此名濕痺濕痺之候其人小便不利大便反快但當利其小便註濕家衇浮細濕在外也當汗之今太陽病關節疼痛而煩小便不利大便反快衇不浮細而沉細是濕邪内盛而為濕痺不通之候也故但當利其小便使濕從小便而去乃濕􅁋於内之正治也集註成無己曰濕盛則濡泄小便不利大便反快者濕氣内流也但當利其小便以宣泄腹中濕氣古云治濕不利小便非其治也方有執曰此以濕之入裏者言也關節疼痛者寒濕之氣走注内滲所以衇沉而細也痺以疼痛言小便不利大便反快者濕卽水水不外滲則横流不遵故道利其小便者導其遵故道而行也張志聰曰關節者腰背肘膝之大關大筋之所統屬不同於骨節也濕流關節大筋不和故疼痛痺閉也濕傷太陽筋衇澁滯故名濕痺利其小便則水道行而决凟無愆濕邪去而筋衇調和矣濕家其人但頭汗出背强欲得被覆向火若下之早則噦胸滿小便不利舌上如胎者以丹田有熱胸中有寒渴欲得水而不能飲口燥煩也註濕家但頭汗出乃濕氣上滛之汗非陽明之熱不得越也濕家背强乃濕氣澁滯之重强非痙病之拘强也欲得覆被向火非外惡寒乃濕盛生内寒也若誤以濕􅁋之頭汗為陽明瘀熱之頭汗而下之寒濕之氣乘虛入胸則胸滿入胃則噦矣寒濕不化故小便不利胸中有寒故舌上滑白如胎丹田有熱故口燥渴欲得水而不能飲由胸中有寒濕故也集註成無己曰傷寒則無汗濕家雖有汗而不能周身故但頭汗出也程應旄曰雖渴欲得水似熱而不能飲可辨則祗是口燥煩而實非胸中燥煩可知證同病别也濕家下之額上汗出㣲喘小便利者死若下利不止者亦死註此承上條濕家誤下之逆也濕家誤下胸滿而噦小便不利舌上如胎口燥渴不能飲已屬逆矣尚在可治此誤下後額汗不已微喘不止是陽脫於上也小便反利下利不止是陰脫於下也陰陽相離故死也集註方有執曰治濕當利其小便而以小便利主死何也誤治而陰陽散亡也程知曰濕之中人陰先受之故本經濕證多從助陽溫散為治若妄下則陽虛陰盛而不可救矣額上汗出微喘虛陽欲上脫也二便不禁盛陰欲下脫也陰陽離决死矣病者一身盡疼發熱日晡所劇者此名風濕此病傷於汗出當風或久傷取冷所致也註病者謂一身盡痛之病人也濕家一身盡痛風濕亦一身盡痛然濕家之痛則重著不能轉側風濕之痛則輕掣不可屈伸此痛之有别者也至於發熱濕家之熱早暮不分微甚風濕之熱則日晡必劇此得之於汗出當風或久傷濕復受風冷所致也集註張志聰曰汗出當風則為風濕久傷取冷則為寒濕張錫駒曰發熱日晡所劇者日晡而陽氣衰陰氣盛濕為陰邪故主旺時而甚也問曰風濕相摶一身盡疼痛法當汗出而解値天陰雨不止醫云此可發汗汗之病不愈者何也答曰發其汗汗大出者但風氣去濕氣在是故不愈也若治風濕者發其汗但微微似欲汗出者風濕俱去也註此詳風濕相摶一身盡痛不惟不可下即發汗亦不可失其宜也風陽邪濕陰邪風濕相摶陰陽受邪故一身盡痛也法當汗出而解值天陰雨不止則濕氣盛雖發其汗汗大出而病不愈者但以風氣去濕氣在是故不愈也以其値濕盛之時發其汗大汗出此汗之不如法所以不解也若治風濕者必俟天氣晴明發其汗但令其汗微微似欲出狀則風與濕俱去而病自解矣集註方有執曰陰雨不止則濕不除所以益當發汗也然風濕本由汗出當風而得則汗之大出者必反濕轉加甚微微似欲汗出而不見出則濕消而風散矣此發汗之微機後之人動輒以大汗為言者去道遠矣張璐曰風濕相摶法當汗出而解合用桂枝加术使微微蒸發表裏氣和風濕皆去正如濕家身煩痛可與麻黄湯加术同義程應旄曰濕家不惟不可誤下即汗亦不可誤汗風濕相摶一證一身盡疼痛雖是微挾表邪然其衇不浮終是汗難大汗治風兼治濕但使微微似欲汗出者是其法也傷寒八九日風濕相摶身體疼煩不能自轉側不嘔不渴衇浮虛而濇者桂枝附子湯主之若其人大便鞕小便自利者去桂枝加白术湯主之註此承上條詳申衇證以明其治也傷寒八九日不嘔不渴是無傷寒裏病之證也衇浮虛濇是無傷寒表病之衇也衇浮虛主在表虛風也濇者主在經寒濕也身體疼煩屬風也不能轉側屬濕也乃風濕相摶之證非傷寒也與桂枝附子湯溫散其風濕使從表而解也若衇浮實者則又當以麻黄加术湯大發其風濕也如其人有是證雖大便鞕小便自利而不議下者以其非邪熱入裏之鞕乃風燥濕去之鞕故仍以桂枝附子湯去桂枝以大便鞕小便自利不欲其發汗再奪津液也加白术以身重著濕在肉分用以佐附子逐濕氣於肌也集註成無己曰煩者風也身疼不能自轉側者濕也經曰風則浮虛衇經曰衇來濇者為病寒濕也桂枝附子去桂枝加白术湯方附子三枚炮去皮破白术四兩生薑三兩切大棗十二枚擘甘草二兩炙右五味以水六升煮取二升去滓分温三服初一服其人身如痺半日許復服之三服都盡其人如冒狀勿怪此以附子术併走皮内逐水氣未得除故使之耳法當加桂四兩此本一方二法以大便鞕小便自利去桂也以大便不鞕小便不利當加桂附子三枚恐多也虛弱家及產婦宜減服之風濕相摶骨節疼煩掣痛不得屈伸近之則痛劇汗出短氣小便不利惡風不欲去衣或身微腫者甘草附子湯主之註風濕相摶骨節疼煩重著不能轉側濕勝風也掣痛不可屈伸風勝濕也今掣痛不可屈伸近之則痛劇汗出短氣惡風不欲去衣皆風邪壅盛傷肌表也小便不利濕内蓄也身微腫者濕外薄也以甘草附子湯微汗之袪風為主除濕次之也已上二條皆詳風濕之義以明風濕之治也集註方有執曰摶掜聚也言風與濕掜合摶聚共為一家之病也煩風也痛濕也風􅁋則掣濕􅁋則痛風濕之邪注經絡流關節滲骨髓身體所以煩痛掣痛而不利也近之則痛劇者外邪客於内迕之則逆也短氣者汗多亡陽而氣傷也惡風不欲去衣者以重傷故惡甚也甘草益氣和中附子温經散濕术能勝濕燥脾桂枝袪風固衞此四物者所以為風濕相摶之的藥也吳人駒曰必衇之沉而細者若浮大而盛則風多而濕少附子須在審之甘草附子湯方甘草二兩炙附子二枚炮去皮破桂枝四兩白术二兩右四味以水六升煮取三升去滓温服一升日三服初服得微汗則解能食汗止復煩者服五合恐一升多者宜服六七合為妙方解風濕之治用甘草附子湯卽桂枝附子湯去薑棗加白术也去薑棗者畏助汗也加白术者燥中濕也日三服初服一升不得汗解則仍服一升若微得汗則解解則能食是解已徹也可止再服若汗出而復煩者是解未徹也仍當服之但不可更服一升恐已經汗多服而過汗也服五合可也如不解再服六七合為妙似此服法總是示人不可盡劑之意學者於理有未解處卽於本文中求之自得矣太陽中熱者暍是也其人汗出惡寒身熱而渴也註中暑熱病亦由太陽表入故曰太陽中熱者暍是也其人汗出惡寒身熱而渴頗似太陽溫熱之病但溫熱無惡寒以熱從内發故雖汗出而不惡寒中暍惡寒者以暑由外入故汗出而惡寒也究之於衇溫熱之浮必浮而實中暍之浮必浮而虛以暑熱傷氣也究之於渴温熱之渴初病不過欲飲水中暍之渴一病即大渴引飮也溫熱則傳經變病不一中暍則不傳不愈卽死也雖同為太陽經中之病而虛實施治不同宜以人參白虎湯主治之集註方有執曰蒸熱謂之暑傷暑謂之暍汗出惡寒者太陽表不固也身熱者暑邪傷陽也渴者亡津液而内燥也程知曰此辨暑熱衇證也太陽中熱者謂是太陽表證而屬中熱也均是太陽表病汗出惡寒身熱而不渴者為中風汗出身熱而渴不惡寒者為溫病今汗出惡寒身熱而渴則是中暍暍者暑熱之氣也不言暍而言熱以其胃熱為獨重也裏有熱故身熱而渴暑傷氣故汗出惡寒吳人駒曰不可因惡寒而用辛溫又不可因汗出而固表惟宜甘寒以解其暑熱可也太陽中暍者發熱惡寒身重而疼痛其衇弦細芤遲小便已灑灑然毛聳手足逆冷小有勞身即熱口開前板齒燥若發汗則惡寒甚加溫鍼則發熱甚數下之則淋甚註此申上條詳出證衇戒人不可妄行汗下溫鍼也太陽中暍無汗身重疼痛者似傷寒也但衇弦細芤遲非傷寒衇也且有小便已而灑灑然惡寒毛聳之證乃太陽膀胱表氣為暑所傷而然也手足逆冷者乃暑傷氣氣傷不能達四肢則寒也小有勞身即發熱口開前板齒燥者乃勞則動熱暑熱益烈傷陰液也此皆中暍危證若以發熱無汗惡寒身痛誤為傷寒之表妄行發汗則表氣愈虛惡寒更甚也若以手足逆冷誤為陽虛妄加溫鍼則暑邪愈盛發熱更熾也若以壯熱齒乾誤為胃火而數下之則水源竭澁尿淋窘甚也凡此之證皆中暍妄行汗下溫鍼致變惟宜以白虎加人參湯主之或人參湯調辰砂六一散亦可也集註成無己曰經云因於暑汗煩則喘喝口開謂喘喝也喘喝不止故前板齒燥程知曰人身之陽以汗而外泄人身之陰以熱而内竭故暍證禁用汗下溫鍼謂汗則傷陽下則傷陰温鍼則引火内入也張錫駒曰灑灑者惡寒之象也毛聳者毫毛􅆆起也太陽中暍者身熱疼重而衇微弱此亦夏月傷冷水水行皮中所致也註太陽中暍之證身熱疼重者暑傷形也衇微弱者暑傷氣也以此證衇揆之亦其人夏月盛暑喜貪風涼過飲冷水水氣輸行於皮中表為邪束不得汗泄所致也此時即以香薷飲大順散汗之可立愈也若因循不治則水氣既不得外泄於表而作腫勢必内攻於裏而喘脹矣是又當以葶藶大棗湯或𤓰蒂一物散下之也上條戒人不可汗下此條示人宜當汗下仲景之法多是如此蓋恐人固執失宜也集註方有執曰身熱疼重而曰夏月傷冷水水行皮中所致者土主肌肉而惡濕水滲土而蒸發也衇微弱者熱則血乾而氣耗也然夏月飲水人之常事而曰傷何哉良由暑廹飲之過多或得之冷水澡洗暑反内入也張璐曰按論暍三條首言動而得之之病謂中暍屬外因次言靜而得之之病雖曰中暍實暑病也屬内因末言因熱傷冷之病乃中暍之變證屬不内外因不得以三者混稱也程應旄曰可見中暍之病大都陽氣在表而胃中虛冷所以身熱疼重而衇微弱夏月飲冷水裏陰鬱住表陽水氣不得宣洩而行於皮中多有此證此則開鬱宣陽又為暍證中增一義也音切􅕇音殊摶音團掣音徹暍音謁灑所下切御纂醫宗金鑑卷十三
