云是經少血多氣中藏經云三焦者人之三元之氣也號曰中清之府縂領五藏六府榮衛經絡内外左右上下之氣也三焦通則内外左右上下皆通也其於周身灌體和内調外榮左飬右導上宣下莫大於此也三焦經循行經文三焦手少陽之衇起於小指次指之端上出次指之間循手表腕出臂外兩骨之間上貫肘循臑外上肩而交出足少陽之後入缺盆布膻中散絡心包下膈循属三焦其支者從膻中上出缺盆上項侠耳後直上出耳上角以屈下頬至䪼其支者從耳後入耳中出走耳前過客主人前交頬至目鋭眥三焦經循行歌手經少陽三焦衇起自小指次指端兩指岐骨手腕表上出臂外兩骨間肘後臑外循肩上少陽之後交别傳下入缺盆膻中分散絡心包膈裏穿支者膻中缺盆上上項耳後耳角旋屈下至䪼仍注頬一支出耳入耳前却從上關交曲頬至目鋭眥乃盡焉註手少陽三焦之衇起於手小指次指外側之端關衝穴從關衝上出兩指之間液門中渚穴循手腕表陽池穴也従陽池出臂外兩骨之間外關支溝㑹宗三陽絡四瀆天井等穴上貫肘清冷淵穴也従清冷淵穴循臂臑外上肩循消濼臑㑹肩髎天髎穴従天髎穴而交出足少陽經之後入缺盆布膻中散絡心包下膈内而循行之分皆属三焦經也其支者從膻中上外出缺盆上項天牖穴從天牖穴循繫耳後翳風瘈衇顱息穴從顱息直上出耳上角角孫穴絲竹空穴也由角孫絲竹空穴繞耳以屈下至䪼和髎耳門穴也其本支之别支者從耳後出走耳前過足少陽經客主人穴之前交頬至目鋭之外眥以交於足少陽膽經也三焦經穴歌手少三焦所從經二十二穴起關衝液門中渚陽池歴外關支溝㑹宗逢三陽絡入四瀆内注於天井清冷中消濼臑㑹肩髎穴天髎天牖經翳風瘈衇顱息角耳門和髎上行絲竹空三焦經分寸歌無名外側端關衝液門小次指陷中中渚液門上一寸陽池腕前表陷中外關腕後二寸陷關上一寸支溝名外關一寸㑹宗平斜上一寸三陽絡肘前五寸四瀆稱天井肘外大骨後肘上一寸骨罅中井上一寸清冷淵消濼臂肘分肉端臑㑹肩端前二寸肩髎臑上陷中㸔天髎肩井後一寸天牖耳下一寸間翳風耳後尖角陷瘈衇耳後青衇㸔顱息青絡衇之上角孫耳上髪下間耳門耳前缺處陷和髎横動衇耳前欲覔絲竹空何在眉後陷中仔細觀註關衝穴在手四指外側端去爪甲角如韭葉許是其穴也從關衝上行手小指次指岐骨間陷中握拳取之液門穴也従液門上行一寸陷中中渚穴也從中渚由四指本節直上行手表腕上陷中陽池穴也從陽池上行手腕後二寸兩骨間陷中外關穴也従外關上行一寸兩骨間陷中支溝穴也從支溝外開一寸㑹宗穴也以支溝㑹宗二穴相並平直空中相離一寸也從㑹宗内斜上行一寸臂上大交衇三陽絡穴也從三陽絡上行肘前五寸外廉陷中四瀆穴也從四瀆斜外上行肘外大骨尖後肘上一寸兩筋叉骨罅中屈肘拱胸取之天井穴也從天井上行一寸伸肘舉臂取之清冷淵穴也從清冷淵上行肩下臂外肘上分肉間消濼穴也從消濼上行臑外去肩端三寸宛宛中臑㑹穴也從臑㑹上行肩端臑上陷中斜舉臂取之肩髎穴也從肩髎上行肩缺盆中直是少陽經之肩井穴後一寸天髎穴也從天髎上行頸大筋外缺盆上手太陽經天容穴後足太陽經天柱穴前足少陽膽經完骨穴下髪際中上斜侠耳後一寸天牖穴也從天牖上行耳後尖角陷中按之引耳中痛翳風穴也從翳風上行耳後中間雞足青絡衇中瘈衇穴也從瘈衇行耳後上間青絡衇中顱息穴也従顱息上行耳上上間髪際下開口有空角孫穴也従角孫繞行耳前起肉當耳缺處陷中耳門穴也從耳門行耳前兑髮下横動衇中和髎穴也兑髮下即鬢角也從和髎上行眉後陷中絲竹空穴也膽府經文經云膽者中正之官決㫁出焉又云是經多血少氣又曰凢十一藏皆取決於膽也難經曰膽在肝之短葉間重三兩三銖長三寸盛精汁三合中藏經曰膽者清浄之府號曰將軍主藏而不瀉膽經循行經文膽足少陽之衇起於目鋭眥上抵頭角下耳後循頸行手少陽之前至肩上却交出手少陽之後入缺盆其支者從耳後入耳中出走耳前至目鋭眥後其支者别鋭眥下大迎合手少陽抵於䪼下加頬車下頸合缺盆以下胸中貫膈絡肝属膽循脅裏出氣街繞毛際横入髀厭中其直者從缺盆下腋循胸過季脅下合髀厭中以下循髀陽出膝外廉下外輔骨之前直下抵絶骨之端下出外踝之前循足跗上入小指次指之間其支者别跗上入大指之間循大指岐骨内出其端還貫爪甲出三毛膽經循行歌足衇少陽膽之經始從兩目鋭眥生抵頭循角下耳後腦空風池次第行手少陽前至肩上交少陽右上缺盆支者耳後貫耳内出走耳前鋭眥循一支鋭眥大迎下合手少陽抵項根下加頬車缺盆合入胸貫膈絡肝經屬膽仍從脅裏過下入氣街毛際縈横入髀厭環跳内直者缺盆下腋膺過季脅下髀厭内出膝外廉是陽陵外輔絶骨踝前過足跗小指次指分一支别從大指去三毛之際接肝經註足少陽膽經之衇起於目之鋭眥瞳子髎穴循聼㑹客主人穴上抵頭角頷厭穴也漎頷厭循懸顱懸釐曲髩率谷折而下行於耳後之天衝浮白竅隂完骨等穴折外上行至眉頭之本神陽白臨泣目忩正營承靈腦空等穴循頸至風池穴過手少陽經天牖穴之前至肩上本經之肩井穴從肩井穴却交出於手少陽之後入缺盆處也其支者從耳後入耳中出走耳前至目鋭眥後此一小支之衇行於頭之無穴處也又其支者别鋭眥下手陽明之大迎穴合手少陽抵於䪼下加頬車下頸合缺盆穴以下入胸中貫膈絡肝属膽循脅裏出氣街散布藏府外繞毛際横入髀厭中環跳穴也其支者從缺盆下腋淵液穴従淵液穴循胸輙筋穴也從輙筋日月穴過季脅至京門穴従京門循行帶衇五樞維道居髎下合髀厭中環跳穴也從環跳穴以下循髀陽風市穴從風市循行中瀆陽関出膝外廉陽陵泉穴也従陽陵泉穴循行陽交外邱光眀等穴下外輔骨之前陽輔穴也從陽輔穴直下抵絶骨之端懸鍾穴從懸鍾下出外踝之前邱墟穴漎邱墟穴循足跗上臨泣穴也從臨泣入小指次指之間侠谿竅隂穴也其支者别跗上入大指之間循大指岐骨内出其端還貫爪甲出三毛以交於足厥隂肝經也膽經穴歌足少陽經童子髎四十三穴行迢迢聼㑹客主頷厭集懸顱懸釐曲髩翹率谷天衝浮白次竅隂完骨本神至陽白臨泣開目忩正營承靈腦空是風池肩井淵液長輙筋日月京門鄉帶衇五樞維道續居髎環跳市中瀆陽關陽陵復陽交外邱光眀陽輔髙懸鍾邱墟足臨泣地五侠谿竅隂畢膽經分寸歌足少陽兮四十三頭上廿穴分三折起自童子至風池積數陳之依次第外眥五分童子髎耳前䧟中尋聼㑹上行一寸客主人内斜曲角上頷厭後行顱中釐下穴曲髩耳前上髮際率谷入髪寸半安天衝耳後斜二寸浮白下行一寸間竅隂穴在枕骨下完骨耳後入髪際量得四分湏用記夲神神庭旁三寸入髪四分耳上係陽白眉上一寸許上行五分是臨泣臨後寸半目忩穴正營承靈及腦空後行相去一寸五風池耳後髮䧟中肩井肩上陷中取大骨之前寸半明淵液腋下行三寸輙筋復前一寸行日月乳下二肋縫下行五分是穴名臍上五分傍九五季肋俠脊是京門季下寸八尋帯衇帯下三寸穴五樞維道章下五三定維下三寸居髎名環跳髀樞宛中陷風市垂手中指終膝上五寸中凟穴膝上二寸陽闗尋陽陵膝下一寸住陽交外踝上七寸外邱外踝七寸同此係斜屬三陽分踝上五寸定光明踝上四寸陽輔穴踝上三寸是懸鍾邱虗踝前陷中取邱下三寸臨泣存臨下五分地五㑹㑹下一寸俠谿輪欲覔竅隂穴何在小指次指外側尋註童子髎在目鋭眥去眥五分是其穴也從童子髎下外斜行耳前起骨上面下一寸耳珠下動衇宛宛中開口有空側臥張口取之聼㑹穴也從聼㑹上直行一寸開口有空側卧張口取之客主人穴也從客主人上内斜行两太陽曲角上廉頷厭穴也從頷厭後行耳前曲角上两太陽之中懸顱穴也從懸顱後行耳前曲角上两太陽下廉懸釐穴也從懸釐後行耳前入髮際曲隅陷中鼓頷有空曲髩穴也從曲髩後行耳上入髮際寸半陷者宛宛中嚼牙取之率谷穴也從率谷後行耳後三分許入髪際二寸天衝穴也從天衝下行耳後入髮際一寸浮白穴也從浮白下行耳後髙上枕骨下搖動有空竅隂穴也從竅隂行耳後入髮際四分完骨穴也從完骨折上行神庭旁三寸直耳上入髮際四分夲神穴也從夲神行眉上一寸直瞳子陽白穴也從陽白上直行入髮際五分陷中正睛取之臨泣穴也從臨泣後行一寸目忩穴也從目忩後行一寸正營穴也從正營後行一寸五分承靈穴也從承靈後行一寸五分腦空穴也從腦空下行耳後下髮際陷中大筋外廉按之引於耳中風池穴也從風池下行肩上㑹其支者合缺盆上大骨前一寸半以三指按取當中指下陷中肩井穴也從肩井下行腋下三寸宛宛中舉臂取之淵液穴也從淵液下行復前一寸三肋端横直蔽骨旁七寸五分半直兩乳側臥屈上足取之輙筋穴也從輙筋行乳下二肋端縫下五分日月穴也從日月行監骨腰中季肋本俠脊臍上五分旁開九寸半側卧屈上足伸下足舉臂取之京門穴也從京門下行季脅下一寸八分陷中臍上二分旁開八寸半帯衇穴也從帶衇下三寸五樞穴也從五樞下行過肝經之章門穴下五寸三分維道穴也從維道下行三寸監骨上陷中居髎穴也從居髎下行髀樞中側卧伸下足屈上足取之環跳穴也從環跳下行膝上外廉兩筋中以手着腿中指盡處風市穴也從風市下髀骨外膝上外廉五寸分肉間陷中中瀆穴也從中瀆下行膝上二寸犢鼻外陷中陽闗穴也從陽闗下行膝下一寸外廉陷中尖骨前筋骨間蹲坐取之陽陵泉穴也從陽陵泉下行足外踝上七寸内斜三陽分肉間陽交穴也從陽交行外踝上七寸外斜外邱穴也從外邱下行外踝上五寸光明穴也從光明下行一寸輔骨前絶骨端内斜三分陽輔穴也從陽輔下行三寸外踝骨尖内動衇中尋按取之懸鍾穴也從懸鍾行外踝下斜前陷中邱墟穴也從邱墟下行三寸在足小指四指夲節後足跗間陷中臨泣穴也從臨泣下行五分足小指四指夲節後間陷中地五㑹穴也從地五㑹下行一寸足小指四指夲節前岐骨間陷中侠谿穴也從侠谿下行足小指四指外側端去爪甲角如韭葉竅隂穴也肝藏經文經云肝者将軍之官謀慮出焉又云肝居膈下上着脊之九椎下是經常多血少氣其合筋也其榮爪也主藏魂開竅於目其系上絡心肺下亦無竅難經曰肝重二觔四兩左三葉右四葉凡七葉肝之為藏其治在左其藏在右脅右腎之前並胃着脊之第九椎肝經循行經文肝足厥隂之衇起於大指聚毛之上上循足跗上廉去内踝一寸上踝八寸交出太隂之後上膕内㢘循股隂入毛中過隂器抵小腹俠胃屬肝絡膽上貫膈布脅循喉嚨之後上入頏顙連目系上出額與督衇㑹於顛其支者從目系下頰裏環唇内其支者復從肝别貫膈上注肺肝經循行歌厥隂足衇肝所終大指之端毛際叢足跗上亷太衝分踝前一寸入中封上踝交出太隂後循膕内㢘隂股衝環繞隂器抵小腹俠胃屬肝絡膽逢上貫膈裏布脅肋俠喉頏顙目繫同衇上顛㑹督衇出支者還生目系中下絡頰裏環唇内支者便從膈肺通註足厥隂肝經之衇起於足大指聚毛之際大敦行間穴從行間上循足跗上㢘太衝穴從太衝穴去内踝一寸至於中封穴也從中封穴循行内踝五寸入於蠡溝穴也從蠡溝上踝七寸中都穴上内踝八寸交出於足太隂隂經之後上踝内㢘膝闗曲泉穴也從曲泉循股隂隂包五里穴入於毛中之隂㢘穴過隂器入抵小腹上行於章門穴從章門循行期門穴從期門内行俠胃屬肝絡膽上貫膈布脅肋散布於藏府循喉嚨之後上入頏顙連目系上額與督衇㑹於顛也其有一支者不上㑹於顛但從目下頰裏環唇内又一支復從肝别貫膈上注於肺以交於手太隂肺經也肝經穴歌足厥隂經一十四大敦行間太衝是中封蠡溝伴中都膝闗曲泉隂包次五里隂亷上急衇章門纔過期門至肝經分寸歌大敦足大端外側行間兩指縫中間太衝夲節後二寸中封内踝前一寸蠡溝踝上五寸是中都上行二寸中膝闗犢鼻下二寸曲泉曲膝盡横紋隂包膝上行四寸氣衝三寸下五里隂亷氣衝下二寸急衇毛際旁二五厥隂大絡系睾丸章門臍上二旁六期門從章斜行乳直乳二肋端縫已註大敦穴在足大指端去爪甲後如韭葉許外側聚毛中是其穴也從大敦上行足大指次指岐骨縫間動衇應手陷中行間穴也從行間上行二寸許足跗間動衇應手陷中太衝穴也從太衝上行足内踝前一寸筋裏宛宛中中封穴也從中封上行内踝上五寸蠡溝穴也從蠡溝上行二寸當胻骨中中都穴也從中都上行犢鼻下二寸旁陷者中膝闗穴也従膝闗上行膝内輔骨下大筋上小筋下陷中屈膝横紋頭取之曲泉穴也從曲泉上行膝上四寸股内㢘两筋間踡足取之㸔膝内側有槽中隂包穴也從隂包上行在足陽明胃經之氣衝穴下三寸隂股中動衇應手五里穴也從五里上行羊矢下斜裏三分直上氣衝下二寸動衇陷中隂亷穴也從隂亷上行隂上中行两旁相去二寸半按之隐指而堅甚按則痛引上下此厥隂之大絡為睾之系急衇穴也從急衇上行足太隂脾經之大横穴外季肋直臍軟骨端臍上二寸两旁開六寸側卧取肘尖盡䖏章門穴也從章門上行足陽明胃經之不容穴旁一寸五分上直乳第二肋端期門穴也御纂醫宗金鑑卷八十三
