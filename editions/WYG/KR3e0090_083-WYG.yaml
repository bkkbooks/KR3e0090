body:
  text: 編輯刺灸心法要訣目録足少隂腎藏圖腎藏經文腎經循行圖腎經循行經文腎經循行歌腎經穴圖腎經穴歌腎經分寸歌手少陽三焦府圖三焦經文三焦經循行圖三焦經循行經文三焦經循行歌三焦經穴圖三焦經穴歌三焦經分寸歌足少陽膽府圖膽府經文膽經循行圖膽經循行經文膽經循行歌膽經穴圖膽經穴歌膽經分寸歌足厥隂肝藏圖肝藏經文肝經循行圖肝經循行經文肝經循行歌肝經穴圖肝經穴歌肝經分寸歌御纂醫宗金鑑卷八十三目録欽定四庫全書御纂醫宗金鑑卷八十三編輯刺灸心法要訣目録足少隂腎藏圖腎藏經文腎經循行圖腎經循行經文腎經循行歌腎經穴圖腎經穴歌腎經分寸歌手少陽三焦府圖三焦經文三焦經循行圖三焦經循行經文三焦經循行歌三焦經穴圖三焦經穴歌三焦經分寸歌足少陽膽府圖膽府經文膽經循行圖膽經循行經文膽經循行歌膽經穴圖膽經穴歌膽經分寸歌足厥隂肝藏圖肝藏經文肝經循行圖肝經循行經文肝經循行歌肝經穴圖肝經穴歌肝經分寸歌御纂醫宗金鑑卷八十三目録欽定四庫全書御纂醫宗金鑑卷八十三編輯刺灸心法要訣腎藏經文經云腎者作强之官伎巧出焉又云腎附於脊之十四椎下是經常少血多氣其合骨也其榮髪也開竅於二隂難經曰腎有兩枚重一觔二兩主藏精與志中藏經曰腎者精神之舎性命之根張介賔云腎有兩枚形如豇豆相並而曲附於脊之兩旁相去各一寸五分外有黄脂包褁各有帯二條上條繋於心下條趨脊下大骨在脊骨之端如半手許中有兩穴是腎帯經過處上行脊髓至腦中連於髓海腎經循行經文腎足少隂之衇起於小指之下斜趨足心之湧泉穴出於然谷之下循内踝之後别入跟中以上腨内出膕内亷上股内後廉貫脊属腎絡膀胱其直者從腎上貫肝膈入肺中循喉嚨侠舌本其支者従肺出絡心注胸中腎經循行歌足腎經衇屬少隂小指斜趨湧泉心然骨之下内踝後别入跟中腨内侵出膕内廉上股内貫脊属腎膀胱臨直者属腎貫肝膈入肺循喉舌本尋支者従肺絡心内仍至胸中部分深註足少隂腎經之衇起至足太陽小指之下至隂穴斜趨足心湧泉穴出然谷穴之下循内踝後太谿穴従太谿别入跟中大鍾穴從大鍾循行水泉照海復􅘇交信穴上腓内築賔穴也從築賔出膕内廉隂谷穴從隂谷上股内後廉横骨穴従横骨内貫行脊属腎絡膀胱也其直者従腎外行大赫氣穴四滿中注肓俞商曲石関隂都通谷等穴入内貫肝與膈外循幽門歩廊神封靈墟神藏彧中俞府等穴入肺中循喉嚨侠舌本而終其支者従肺出絡心注胸中以交於手厥隂經也腎經穴歌足少隂腎二十七湧泉然谷照海出太谿水泉連大鍾復􅘇交信築賔立隂谷横骨趨大赫氣穴四滿中注得肓俞商曲石關蹲隂都通谷幽門值歩廊神封出靈墟神藏彧中俞府畢腎經分寸歌足掌心中是湧泉然谷内踝一寸前太谿踝後跟骨上大鍾跟後踵中邉水泉谿下一寸覔照海踝下四分真復􅘇踝後上二寸交信後上二寸聨二穴只隔筋前後大隂之後少隂前前傍骨是復􅘇後傍骨是交信二穴只隔一條筋築賔内踝上腨分隂谷膝下曲膝間横骨大赫並氣穴四滿中注亦相連五穴上行皆一寸中行旁開五分邉肓俞上行亦一寸但在臍旁半寸間商曲石關隂都穴通谷幽門五穴聨五穴上下一寸取各開中行五分前歩廊神封靈墟穴神藏彧中俞府安上行寸六旁二寸俞府璇璣二寸觀註湧泉穴在足心䧟中伸腿屈足卷指宛宛中是其穴也從湧泉上行足内踝前起大骨下䧟中然谷穴也従然谷行足内踝後五分跟骨上動衇䧟中太谿穴也從太谿行足跟後跟中大骨上兩筋間大鍾穴也從大鍾行太谿下一寸内踝下水泉穴也從水泉行足内踝下四分前後有筋上有踝骨下有輭骨之中䧟中照海穴也從照海行足内踝後除踝上二寸許前傍骨䧟中復􅘇穴也從復溜斜外上行復􅘇穴之後二寸許後傍筋交信穴也従交信斜外上行過三隂交穴上腨分中築賔穴也腨者俗名腿肚也從築賔上行膝下内輔骨後大筋下小筋上按之應手屈膝得之隂谷穴也從隂谷上行入腹隂上横骨中宛曲如仰月中央去任衇之中行旁開五分横骨穴也從横骨上行一寸大赫穴也亦去中行旁開五分從大赫上行一寸氣穴穴也亦去中行旁開五分從氣穴穴上行一寸四滿穴也亦去中行旁開五分從四滿上行一寸中注穴也亦去中行旁開五分從中注上行一寸肓俞穴也直臍旁去臍中五分從肓俞上行二寸商曲穴也亦去中行旁開五分從商曲上行一寸石関穴也亦去中行旁開五分從石関上行一寸隂都穴也亦去中行旁開五分從隂都上行一寸陷中通谷穴也亦去中行旁開五分從通谷上行一寸陷中幽門穴也亦去中行旁開五分從幽門上行一寸六分陷中去中行旁開二寸仰而取之歩廊穴也從歩廊上行一寸六分亦去中行旁開二寸仰而取之神封穴也從神封上行一寸六分亦去中行旁開二寸陷中仰而取之靈墟穴也從靈墟上行一寸六分亦去中行旁開二寸阝中仰而取之神藏穴也從神藏上行一寸六分亦去中行旁開二寸䧟中仰而取之彧中穴也從彧中上行巨骨下侠任衇之璇璣中行旁開二寸䧟中仰而取之是其穴也三焦經文經云上焦如霧中焦如漚下焦如瀆又云三焦者決瀆之官水道出焉又云是經少血多氣中藏經云三焦者人之三元之氣也號曰中清之府縂領五藏六府榮衛經絡内外左右上下之氣也三焦通則内外左右上下皆通也其於周身灌體和内調外榮左飬右導上宣下莫大於此也三焦經循行經文三焦手少陽之衇起於小指次指之端上出次指之間循手表腕出臂外兩骨之間上貫肘循臑外上肩而交出足少陽之後入缺盆布膻中散絡心包下膈循属三焦其支者從膻中上出缺盆上項侠耳後直上出耳上角以屈下頬至䪼其支者從耳後入耳中出走耳前過客主人前交頬至目鋭眥三焦經循行歌手經少陽三焦衇起自小指次指端兩指岐骨手腕表上出臂外兩骨間肘後臑外循肩上少陽之後交别傳下入缺盆膻中分散絡心包膈裏穿支者膻中缺盆上上項耳後耳角旋屈下至䪼仍注頬一支出耳入耳前却從上關交曲頬至目鋭眥乃盡焉註手少陽三焦之衇起於手小指次指外側之端關衝穴從關衝上出兩指之間液門中渚穴循手腕表陽池穴也従陽池出臂外兩骨之間外關支溝㑹宗三陽絡四瀆天井等穴上貫肘清冷淵穴也従清冷淵穴循臂臑外上肩循消濼臑㑹肩髎天髎穴従天髎穴而交出足少陽經之後入缺盆布膻中散絡心包下膈内而循行之分皆属三焦經也其支者從膻中上外出缺盆上項天牖穴從天牖穴循繫耳後翳風瘈衇顱息穴從顱息直上出耳上角角孫穴絲竹空穴也由角孫絲竹空穴繞耳以屈下至䪼和髎耳門穴也其本支之别支者從耳後出走耳前過足少陽經客主人穴之前交頬至目鋭之外眥以交於足少陽膽經也三焦經穴歌手少三焦所從經二十二穴起關衝液門中渚陽池歴外關支溝㑹宗逢三陽絡入四瀆内注於天井清冷中消濼臑㑹肩髎穴天髎天牖經翳風瘈衇顱息角耳門和髎上行絲竹空三焦經分寸歌無名外側端關衝液門小次指陷中中渚液門上一寸陽池腕前表陷中外關腕後二寸陷關上一寸支溝名外關一寸㑹宗平斜上一寸三陽絡肘前五寸四瀆稱天井肘外大骨後肘上一寸骨罅中井上一寸清冷淵消濼臂肘分肉端臑㑹肩端前二寸肩髎臑上陷中㸔天髎肩井後一寸天牖耳下一寸間翳風耳後尖角陷瘈衇耳後青衇㸔顱息青絡衇之上角孫耳上髪下間耳門耳前缺處陷和髎横動衇耳前欲覔絲竹空何在眉後陷中仔細觀註關衝穴在手四指外側端去爪甲角如韭葉許是其穴也從關衝上行手小指次指岐骨間陷中握拳取之液門穴也従液門上行一寸陷中中渚穴也從中渚由四指本節直上行手表腕上陷中陽池穴也從陽池上行手腕後二寸兩骨間陷中外關穴也従外關上行一寸兩骨間陷中支溝穴也從支溝外開一寸㑹宗穴也以支溝㑹宗二穴相並平直空中相離一寸也從㑹宗内斜上行一寸臂上大交衇三陽絡穴也從三陽絡上行肘前五寸外廉陷中四瀆穴也從四瀆斜外上行肘外大骨尖後肘上一寸兩筋叉骨罅中屈肘拱胸取之天井穴也從天井上行一寸伸肘舉臂取之清冷淵穴也從清冷淵上行肩下臂外肘上分肉間消濼穴也從消濼上行臑外去肩端三寸宛宛中臑㑹穴也從臑㑹上行肩端臑上陷中斜舉臂取之肩髎穴也從肩髎上行肩缺盆中直是少陽經之肩井穴後一寸天髎穴也從天髎上行頸大筋外缺盆上手太陽經天容穴後足太陽經天柱穴前足少陽膽經完骨穴下髪際中上斜侠耳後一寸天牖穴也從天牖上行耳後尖角陷中按之引耳中痛翳風穴也從翳風上行耳後中間雞足青絡衇中瘈衇穴也從瘈衇行耳後上間青絡衇中顱息穴也従顱息上行耳上上間髪際下開口有空角孫穴也従角孫繞行耳前起肉當耳缺處陷中耳門穴也從耳門行耳前兑髮下横動衇中和髎穴也兑髮下即鬢角也從和髎上行眉後陷中絲竹空穴也膽府經文經云膽者中正之官決㫁出焉又云是經多血少氣又曰凢十一藏皆取決於膽也難經曰膽在肝之短葉間重三兩三銖長三寸盛精汁三合中藏經曰膽者清浄之府號曰將軍主藏而不瀉膽經循行經文膽足少陽之衇起於目鋭眥上抵頭角下耳後循頸行手少陽之前至肩上却交出手少陽之後入缺盆其支者從耳後入耳中出走耳前至目鋭眥後其支者别鋭眥下大迎合手少陽抵於䪼下加頬車下頸合缺盆以下胸中貫膈絡肝属膽循脅裏出氣街繞毛際横入髀厭中其直者從缺盆下腋循胸過季脅下合髀厭中以下循髀陽出膝外廉下外輔骨之前直下抵絶骨之端下出外踝之前循足跗上入小指次指之間其支者别跗上入大指之間循大指岐骨内出其端還貫爪甲出三毛膽經循行歌足衇少陽膽之經始從兩目鋭眥生抵頭循角下耳後腦空風池次第行手少陽前至肩上交少陽右上缺盆支者耳後貫耳内出走耳前鋭眥循一支鋭眥大迎下合手少陽抵項根下加頬車缺盆合入胸貫膈絡肝經屬膽仍從脅裏過下入氣街毛際縈横入髀厭環跳内直者缺盆下腋膺過季脅下髀厭内出膝外廉是陽陵外輔絶骨踝前過足跗小指次指分一支别從大指去三毛之際接肝經註足少陽膽經之衇起於目之鋭眥瞳子髎穴循聼㑹客主人穴上抵頭角頷厭穴也漎頷厭循懸顱懸釐曲髩率谷折而下行於耳後之天衝浮白竅隂完骨等穴折外上行至眉頭之本神陽白臨泣目忩正營承靈腦空等穴循頸至風池穴過手少陽經天牖穴之前至肩上本經之肩井穴從肩井穴却交出於手少陽之後入缺盆處也其支者從耳後入耳中出走耳前至目鋭眥後此一小支之衇行於頭之無穴處也又其支者别鋭眥下手陽明之大迎穴合手少陽抵於䪼下加頬車下頸合缺盆穴以下入胸中貫膈絡肝属膽循脅裏出氣街散布藏府外繞毛際横入髀厭中環跳穴也其支者從缺盆下腋淵液穴従淵液穴循胸輙筋穴也從輙筋日月穴過季脅至京門穴従京門循行帶衇五樞維道居髎下合髀厭中環跳穴也從環跳穴以下循髀陽風市穴從風市循行中瀆陽関出膝外廉陽陵泉穴也従陽陵泉穴循行陽交外邱光眀等穴下外輔骨之前陽輔穴也從陽輔穴直下抵絶骨之端懸鍾穴從懸鍾下出外踝之前邱墟穴漎邱墟穴循足跗上臨泣穴也從臨泣入小指次指之間侠谿竅隂穴也其支者别跗上