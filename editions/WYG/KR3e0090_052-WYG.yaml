  text: 編輯幼科雜病心法要訣目錄疳證門疳證總括脾疳消疳理脾湯肥兒丸參苓白术散疳瀉清熱和中湯參苓白术散疳腫脹御苑匀氣㪚疳痢香連導滯湯肝疳柴胡清肝㪚蘆薈肥兒丸加味逍遥㪚抑肝扶脾湯心疳瀉心導赤湯珍珠㪚茯神湯疳渴清熱甘露飲肺疳生地清肺飲甘露飲補肺散腎疳金蟾丸九味地黄丸調元散疳熱鼈甲青蒿飲鼈甲散腦疳龍膽丸龍腦丸吹鼻龍腦散眼疳瀉肝散清熱退翳湯逍遥散羊肝散鼻疳清金㪚􅃽氏化毒丹化蟲丸鼻疳散吹鼻蟬殻散牙疳消疳蕪荑湯蘆薈肥兒丸牙疳㪚脊疳蘆薈丸金蟾㪚蛔疳史君子㪚下蟲丸肥兒丸無辜疳柴胡飲蘆薈肥兒丸丁奚疳五疳消積丸人參啓脾丸哺露疳集聖丸肥兒丸人參丸吐證門吐證總括辨嘔吐噦證傷乳吐消乳丸保和丸傷食吐三棱丸和胃湯夾驚吐全蝎觀音散定吐丸痰飲吐二陳湯香砂六君子湯蟲吐化蟲丸加減理中湯虚吐丁沉四君子湯實吐三一承氣湯寒吐薑橘散理中湯熱吐加味温膽湯瀉證門瀉證總括傷乳食瀉保安丸平胃散中寒瀉理中湯訶子散火瀉玉露散四苓散驚瀉益脾鎮驚散養脾丸臍寒瀉和氣飲調中湯脾虚瀉參苓白术散飱瀉補中益氣湯四神丸水瀉胃苓湯升陽除濕湯御纂醫宗金鑑卷五十二目録欽定四庫全書御纂醫宗金鑑卷五十二編輯幼科雜病心法要訣目錄疳證門疳證總括脾疳消疳理脾湯肥兒丸參苓白术散疳瀉清熱和中湯參苓白术散疳腫脹御苑匀氣㪚疳痢香連導滯湯肝疳柴胡清肝㪚蘆薈肥兒丸加味逍遥㪚抑肝扶脾湯心疳瀉心導赤湯珍珠㪚茯神湯疳渴清熱甘露飲肺疳生地清肺飲甘露飲補肺散腎疳金蟾丸九味地黄丸調元散疳熱鼈甲青蒿飲鼈甲散腦疳龍膽丸龍腦丸吹鼻龍腦散眼疳瀉肝散清熱退翳湯逍遥散羊肝散鼻疳清金㪚􅃽氏化毒丹化蟲丸鼻疳散吹鼻蟬殻散牙疳消疳蕪荑湯蘆薈肥兒丸牙疳㪚脊疳蘆薈丸金蟾㪚蛔疳史君子㪚下蟲丸肥兒丸無辜疳柴胡飲蘆薈肥兒丸丁奚疳五疳消積丸人參啓脾丸哺露疳集聖丸肥兒丸人參丸吐證門吐證總括辨嘔吐噦證傷乳吐消乳丸保和丸傷食吐三棱丸和胃湯夾驚吐全蝎觀音散定吐丸痰飲吐二陳湯香砂六君子湯蟲吐化蟲丸加減理中湯虚吐丁沉四君子湯實吐三一承氣湯寒吐薑橘散理中湯熱吐加味温膽湯瀉證門瀉證總括傷乳食瀉保安丸平胃散中寒瀉理中湯訶子散火瀉玉露散四苓散驚瀉益脾鎮驚散養脾丸臍寒瀉和氣飲調中湯脾虚瀉參苓白术散飱瀉補中益氣湯四神丸水瀉胃苓湯升陽除濕湯御纂醫宗金鑑卷五十二目録欽定四庫全書御纂醫宗金鑑卷五十二編輯㓜科雜病心法要訣疳證門疳證總括大人爲勞小兒疳乳食傷脾是病原甘肥失節生積熱氣血津液被熬煎初患尿泔午潮熱日乆青筋肚大堅面色青黄肌肉瘦皮毛憔悴眼睛䀽註大人者十五歲以上也病則為勞若十五歲以下者皆名爲疳緣所禀之氣血虚弱藏府嬌嫩易於受傷或因乳食過飽或因肥甘無節停滯中脘傳化遲滯腸胃漸傷則生積熱熱盛成疳則消耗氣血煎灼津液凡疳病初起尿如米泔午後潮熱日乆失治致令青筋暴露肚大堅硬面色青黄肌肉消瘦皮毛憔悴眼睛𤼵䀽而疳證成矣然當分其所屬而治之庶不致有悞也脾疳脾疳面黄肌消瘦身熱困倦喜睡眠心下痞硬滿腫脹卧冷食泥腹痛堅頭大頸細食懶進吐瀉煩渴便腥黏攻積消疳肥兒治補脾參苓白术先註脾屬土色黄主肌肉故脾疳則見面黄肌肉消瘦身體𤼵熱困倦喜睡心下痞硬乳食懶進睡卧喜冷好食泥土肚腹堅硬疼痛頭大頸細有時吐瀉口乾煩渴大便腥黏之證也宜先攻其積用消疳理脾湯肥兒丸主之積退然後調理其脾以參苓白术散主之消疳理脾湯蕪荑三棱莪术青皮炒陳皮蘆薈檳榔史君子肉甘草生川黄連胡黄連麥芽炒神麯炒引用燈心水煎服方歌消疳理脾用蕪荑三棱莪术青陳皮蘆薈㯽榔史君草川連胡連麥芽麯肥兒丸人參三錢半白术五錢土炒茯苓三錢黄連二錢胡黄連五錢史君子四錢肉神麯炒麥芽炒山查肉各三錢半甘草錢半炙蘆薈二錢半煨右爲末黄米糊丸如黍米大每服二三十丸米湯化下參苓白术散人參二錢茯苓白术土炒扁豆炒薏米炒山藥各五錢炒陳皮三錢縮砂桔梗各二錢甘草一錢炙建蓮子五錢去心右共爲細末每服一錢老米湯調服疳瀉疳疾傷脾因作瀉先清後補爲妙訣初宜清熱和中湯乆瀉參苓白术㨗註疳瀉之證多緣積熱傷脾以致水穀不分頻頻作瀉法當清熱滲濕以清熱和中湯主之若瀉乆不愈當漸爲調理參苓白术散主之清熱和中湯白术土炒陳皮厚樸薑炒赤苓黄連神麯炒穀芽炒史君子生甘草澤瀉引用燈心水煎服方歌疳乆泄瀉名疳瀉清熱和中功甚㨗白术陳厚赤苓連神穀史君草澤瀉參苓白术散方見脾疳疳腫脹疳疾腫脹面浮光傳化失宜脾肺傷氣逆喘咳胸膈滿御苑匀氣服最良註疳疾腫脹之證多因傳化失宜以致脾肺兩傷現證氣逆喘咳胸膈痞悶肚腹腫脹面色浮光宜用御苑匀氣㪚治之其腫脹自消矣御苑匀氣散桑皮蜜炒桔梗赤苓甘草生藿香陳皮木通引用薑皮燈心水煎服方歌疳乆脾虚腫脹生御苑匀氣有竒功桑皮桔梗赤苓草藿香陳皮合木通疳痢疳疾日乆頻下痢多緣腸胃熱凝滯或赤或白腹窘急香連導滯爲妙劑註疳痢之由皆因熱結腸胃所致故痢時或赤或白腹中窘痛急用香連導滯湯治之其痢自愈香連導滯湯青皮炒陳皮厚樸薑炒川黄連薑炒生甘草山查神麯炒木香煨㯽榔大黄引用燈心水煎服方歌疳乆下痢名疳痢香連導滯功最良青陳厚樸川連草查麯木香㯽大黄肝疳肝疳面目爪甲青眼生眵淚澁難睜摇頭揉目合面卧耳流膿水濕瘡生腹大青筋身羸瘦燥渇煩急糞帶青清熱柴胡同蘆薈調養逍遥抑肝靈註肝屬木色青主筋故肝疳則見面目爪甲皆青眼生眵淚隱澁難睜摇頭揉目合面睡卧耳瘡流膿腹大青筋身體羸瘦燥渇煩急糞青如苔之證也治宜先清其熱用柴胡清肝㪚蘆薈肥兒丸主之若病勢稍退當以逍遥散抑肝扶脾湯調理柴胡清肝散銀柴胡梔子微炒連翹去心胡黄連生地黄赤芍龍膽草青皮炒甘草生引用燈心竹葉水煎服方歌柴胡清肝治肝疳銀柴梔子翹胡連生地赤芍龍膽草青皮甘草一同煎蘆薈肥兒丸五穀蟲二兩炒蘆薈生胡黄連炒川黄連各一兩薑炒銀柴胡一兩二錢炒扁豆炒山藥各二兩炒南山查二兩半蝦蟇四個煆肉豆䓻七錢煨㯽榔五錢史君子二兩半炒神麯二兩炒麥芽一兩六錢炒鶴虱八錢炒蕪荑一兩炒硃砂二錢飛麝香二錢共研細末醋糊爲丸如黍米大每服一錢米飲下加味逍遥散茯苓白术炒當歸白芍炒柴胡薄荷炙甘草丹皮梔子炒引用薑棗水煎服方歌加味逍遥㪚如神茯苓白术當歸身白芍柴胡薄荷草再加丹皮梔子仁抑肝扶脾湯人參白术土炒黄連薑炒柴胡酒炒茯苓青皮醋炒陳皮白芥子龍膽草山查神麯炒炙甘草引用薑棗水煎服方歌調理抑肝扶脾湯參术黄連柴苓良青陳白芥龍膽草山查神麯甘草嚐心疳心疳面赤衇絡赤壯熱有汗時煩驚咬牙弄舌口燥渇口舌生瘡小便紅胸膈滿悶喜伏卧懶食乾瘦吐利頻瀉心導赤珍珠治茯神調理可收功註心屬火色赤主血衇故心疳則見面紅目衇絡赤壯熱有汗時時驚煩咬牙弄舌口舌乾燥渇飲生瘡小便紅赤胸膈滿悶睡喜伏卧懶食乾瘦或吐或利也熱盛者㵼心導赤湯主之熱盛兼驚者珍珠㪚主之病乆心虚者茯神湯調理之瀉心導赤湯方見木舌珍珠散珍珠三錢麥冬五錢去心天竺黄三錢金鉑二十五片牛黄一錢胡黄連三錢生甘草二錢羚羊角大黄當歸各三錢硃砂二錢雄黄一錢茯神五錢犀角三錢右爲細末每服五分茵蔯湯調服茯神湯茯神當歸炙甘草人參引用龍眼肉水煎服煩熱者加麥冬方歌茯神湯内用茯神當歸甘草共人參若是煩熱麥冬入清補兼施功最純疳渇肥甘積熱傷津液大渇引飲心煩熱速用清熱甘露宜熱減津生渇自歇註疳渇者多因肥甘積熱煎耗脾胃以致津液虧損故不時大渇引飲心神煩熱速用清熱甘露飲其渇自愈清熱甘露飲生地黄麥冬去心石斛知母生枇杷葉蜜炙石膏煆甘草生茵蔯蒿黄芩引用燈心水煎服方歌耗液傷津成疳渇清熱甘露飲如神生地麥冬斛知母枇杷石膏草茵芩肺疳面白氣逆時咳嗽毛髪焦枯皮粟乾𤼵熱憎寒流清涕鼻頰生瘡號肺疳疎散生地清肺效清熱甘露飲爲先肺虚補肺㪚最妙隨證加減莫遲延註肺屬金色白主皮毛故肺疳則見面白氣逆咳嗽毛髮枯焦皮上生粟肌膚乾燥憎寒𤼵熱常流清涕鼻頰生瘡也先用生地清肺飲以疎觧之繼用甘露飲清之日乆肺虚者當以補肺㪚主之生地清肺飲桑皮炒生地黄天冬前胡桔梗蘓葉防風黄芩生甘草當歸連翹去心赤苓引用生薑紅棗水煎服方歌生地清肺用桑皮生地天冬前桔齊蘓葉防風黄芩草當歸連翹赤苓宜甘露飲生地黄熟地黄天冬麥冬去心枳殻麩炒桔梗黄芩枇杷葉蜜炙茵蔯蒿石斛引用紅棗肉水煎服方歌甘露飲治肺火壅生熟地黄二門冬枳桔黄芩枇杷葉茵蔯石斛共煎成補肺散白茯苓阿膠蛤粉炒糯米馬兜鈴炙甘草杏仁炒去皮尖水煎服方歌肺虚補肺散通仙茯苓阿膠糯米攢馬兜鈴配炙甘草杏仁微炒去皮尖腎疳觧顱鶴膝齒行遲骨瘦如柴面黑黧齒齦出血口臭氣足冷腹痛瀉哭啼腎疳先用金蟾治九味地黄繼進宜若逢禀賦氣虚弱調元散進莫遲疑註腎屬水色黑主骨患此疳者初必有解顱鶴膝齒遲行遲腎氣不足等證更因甘肥失節乆則漸成腎疳故見面色黧黑齒齦出血口中氣臭足冷如冰腹痛泄瀉啼哭不已之證先用金蟾丸治其疳繼以九味地黄丸調補之若禀賦不足者調元㪚主之金蟾丸乾蝦蟇五個煆胡黄連黄連各三錢鶴蝨二錢肉豆䓻煨苦楝根白皮雷丸蘆薈生蕪荑各三錢右爲末麫糊爲丸菉豆大雄黄爲衣每服十五丸米湯化下九味地黄丸熟地茱萸肉各五錢赤茯苓澤瀉牡丹皮山藥炒當歸川楝子史君子各三錢肉右爲細末煉白蜜爲丸如芡實大用滚白水研化食前服調元㪚人參茯苓白术土炒山藥炒川芎當歸熟地黄茯神黄耆炙甘草炙白芍炒引用薑棗水煎服方歌調元㪚治禀賦弱參苓白术乾山藥芎歸熟地共茯神黄耆甘草同白芍疳熱小兒疳疾身𤼵熱輕重虚實當分别初用青蒿飲爲宜日乆鼈甲㪚最㨗註疳疾之證身多𤼵熱治者宜分别輕重虚實治之病初起多實者鼈甲青蒿飲主之日乆多虚者鼈甲㪚主之鼈甲青蒿飲銀柴胡鼈甲炙青蒿生甘草生地黄赤芍胡黄連知母炒地骨皮引用燈心水煎服方歌疳疾血虚身𤼵熱鼈甲青蒿藥有靈銀柴鼈蒿草地芍胡連知母地骨同鼈甲㪚人參黄耆炙鼈甲炙生地熟地當歸白芍炒地骨皮水煎服方歌疳疾日乆骨熱蒸鼈甲㪚治效從容參耆鼈甲生熟地當歸白芍地骨同腦疳腦疳多緣受風熱又兼乳哺失調節頭皮光急生餅瘡頭熱髮焦如穗結鼻乾心煩腮䪿腫困倦睛暗身汗熱龍膽龍腦丸甚良吹鼻龍腦效甚㨗註腦疳者因兒素受風熱又兼乳哺失調以致變生此證頭皮光急腦生餅瘡頭熱毛焦髮結如穗鼻乾心煩腮䪿腫硬困倦睛暗自汗身熱也腦熱生瘡者龍膽丸主之煩熱羸瘦者龍腦丸主之外用吹鼻龍腦㪚吹之其證自愈龍膽丸龍膽草升麻苦楝根皮焙赤茯苓防風蘆薈油髮灰各二錢青黛黄連各二錢右爲細末豬膽汁浸糕糊丸如麻子大薄荷湯下量兒大小與之龍腦丸龍腦麝香各五分雄黄二錢胡黄連三錢牛黄一錢硃砂一錢五分蘆薈三錢生乾蝦蟇四錢灰右爲細末熊膽合丸如麻子大每服三丸薄荷湯下吹鼻龍腦㪚龍腦麝香少許細末各研蝸牛殻炒黄蝦蟇灰𤓰蒂黄連細辛桔梗各等分右爲細末入磁盒内貯之每取少許吹入鼻中日吹二次眼疳疳熱上攻眼疳成癢澁赤爛胞腫疼白睛生翳漸遮滿流淚羞明目不睜疎觧瀉肝㪚最妙雲翳清熱退翳靈目乆不瘥當補養逍遥瀉肝二方從註眼疳者疳熱上攻於眼故發時癢澁赤爛眼胞腫疼白睛生翳漸漸遮滿不時流淚羞明閉目也先用瀉肝㪚疎觧之再用清熱退翳湯消其翳若目乆不瘥法當調補逍遥㪚或羊肝㪚主之瀉肝散生地黄當歸赤芍川芎連翹去心梔子生龍膽草大黄羌活甘草生防風引用燈心水煎服方歌瀉肝㪚治肝熱壅生地當歸赤芍芎連翹梔子龍膽草大黄羌活草防風清熱退翳湯梔子微炒胡黄連木賊草赤芍生地羚羊角龍膽草銀柴胡蟬蛻甘草生菊花蒺藜引用燈心水煎服方歌清熱退翳消雲翳梔連木賊芍生地羚羊龍膽銀柴胡蟬蛻甘草菊蒺藜逍遥散方見肝疳羊肝散青羊肝一具膜切韭葉厚片去筋人參羌活白术土炒蛤粉各等分右爲細末令匀聽用将藥置荷葉上如錢厚一層鋪肝一層包固外以新足青布包裹蒸熟任兒食之如不食者及夏月恐腐壞則晒乾爲末早晚白湯調服服完再合以好爲度若熱者減人參鼻疳疳熱攻肺成鼻疳鼻塞赤癢痛難堪浸淫潰爛連脣際咳嗽氣促髮毛乾熱盛清金化毒效疳蟲蝕鼻化蟲丸調敷湏用鼻疳散吹鼻蟬殻效通仙註鼻疳者因疳熱攻肺而成盖鼻爲肺竅故𤼵時鼻塞赤癢疼痛浸淫潰爛下連脣際成瘡咳嗽氣促毛髮焦枯也熱盛者宜清金散􅃽氏化毒丹主之蟲蝕者用化蟲丸主之外用鼻疳㪚敷之或以吹鼻蟬殻㪚吹入鼻内清金散生梔子黄芩枇杷葉蜜炙生地黄花粉連翹去心麥冬去心薄荷元參生甘草桔梗引用燈心水煎服方歌清金㪚治肺壅熱梔子黄芩枇杷葉生地花粉翹麥冬薄荷元參甘草桔蔣氏化毒丹方見胎赤化蟲丸蕪荑蘆薈生青黛川芎白芷梢胡黄連川黄連蝦蟇各等分灰右爲細末豬膽汁浸糕爲丸如麻子大每服二十丸食後杏仁煎湯下鼻疳散青黛一錢麝香少許熊膽五分右爲細末乾者用豬骨髓調貼濕者乾上吹鼻蟬殻散蟬殻微炒青黛研蛇蛻皮灰滑石麝香各等分細研右爲細末每用菉豆大吹入鼻中日三用之疳蟲盡出牙疳疳成毒熱内攻胃上發齦肉赤爛疼口鼻血出牙枯落穿腮蝕脣命多傾攻毒消疳蕪荑效繼以蘆薈肥兒靈外用牙疳散時上能食堪藥始能生註牙疳者因毒熱攻胃而成故熱毒上發齦肉赤爛疼痛口臭血出牙枯脱落穿腮蝕脣病勢危急急用消疳蕪荑湯瀉其毒熱繼以蘆薈肥兒丸清其餘熱外用牙疳散時時敷之自愈總之此證必胃强能食堪勝峻藥始有生機否則難治也消疳蕪荑湯大黄芒消蕪荑蘆薈生川連胡黄連黄芩雄黄水煎服服後便軟及不食者去大黄芒消加石膏羚羊角方歌蕪荑消疳大黄消蘆薈蕪荑二連標黄芩雄黄一同入能清積熱牙疳消蘆薈肥兒丸方見肝疳牙疳㪚人中白煆存性綠礬燒紅五倍子各等分炒黑氷片少許右爲極細末先用水拭淨牙齒再以此㪚敷之有蟲者加㯽榔脊疳積熱生蟲蝕脊膂手擊其背若鼔鳴羸瘦脊骨鋸齒狀身熱下利煩渇増十指皆瘡齧爪甲此名脊疳病熱凶蘆薈丸同金蟾散急急調治莫從容註脊疳者因積熱生蟲上蝕脊膂也以手擊其背必空若鼔鳴脊骨羸瘦狀若鋸齒始爲脊疳外證亦身體發熱下利煩渇十指皆瘡頻齧爪甲其證最爲可畏湏先以蘆薈丸殺其蟲繼用金蟾散消其疳隨時調治或可愈也蘆薈丸生蘆薈青黛硃砂熊膽胡黄連貫衆地龍微炒川黄連蟬蛻去足雷丸各五錢麝香一錢蝦蟇一個炙焦酥塗右爲細末用蝸角肉研和丸如麻子大每服五丸粥飲下量兒大小與之金蟾散蟾一枚炙焦酥塗夜明沙炒桃白皮樗根白皮地榆黄蘗訶黎勒皮煨百合人參大黄白蕪荑炒胡粉各三錢㯽榔一錢丁香三十七粒右爲細末每服五分粥飲調下蛔疳過食膩冷並肥甘濕熱生蛔腹内纒時煩多啼時腹痛口脣色變溢清涎腹脹青筋肛濕癢史君散治莫遲延不愈下蟲丸極效蛔退補脾肥兒丸註蛔疳者因過食生冷油膩肥甘之物以致濕熱生蛔腹中擾動故有時煩躁多啼有時肚腹攪痛口脣或紅或白口溢清涎腹脹青筋肛門濕癢也先用史君子散治之不愈下蟲丸主之若蛔退又當調補其脾肥兒丸主之史君子散史君子十個爲瓦上炒末苦楝子五個核泡去白蕪荑甘草各一錢一宿膽汁浸右爲末每服一錢水調服下蟲丸苦楝根皮新白者佳酒浸焙木香桃仁浸去皮尖綠苞貫衆蕪荑焙雞心㯽榔各二錢輕粉五分鶴蝨一錢炒乾蝦蟇三錢炒黑史君子三錢煨取肉右爲末麫糊成丸如麻子大每服二十丸滚白水下肥兒丸方見脾疳無辜疳無辜疳傳有二因鳥羽汚衣着兒身或緣乳母病傳染頸項瘡核便利膿蟲蝕臟腑身羸瘦面黄𤼵熱致疳生清熱宜用柴胡飲消疳肥兒效如神註無辜疳者其病原有二或因浣衣夜露被無辜鳥落羽所汚兒着衣後致成此證或因乳母有病傳染小兒以有此疾其證頸項生瘡或項内有核如彈按之轉動軟而不疼其中有蟲如米粉不速破之使蟲蝕臟腑便利膿血身體羸瘦面黄𤼵熱也治宜先清其熱柴胡飲主之再消其疳以蘆薈肥兒丸主之柴胡飲赤芍藥柴胡黄連半夏薑製桔梗夏枯草龍膽草浙貝母黄芩甘草生引用燈心水煎服方歌柴胡飲治無辜疳赤芍柴胡川黄連半夏桔梗夏枯草龍膽浙貝芩草煎蘆薈肥兒丸方見肝疳丁奚疳徧身骨露號丁奚肌肉乾澁晝夜啼手足枯細面黧黑項細腹大突出臍尻削身軟精神倦骨蒸潮熱渇煩急化滯五疳消積治補養人參啓脾宜註丁奚者徧身骨露其狀似丁故名曰丁奚也其證肌肉乾澁啼哭不已手足枯細面色黧黒項細腹大肚臍突出尻削身軟精神倦怠骨蒸潮熱燥渇煩急也先用五疳消積丸化其滯繼用人參啓脾丸理其脾病可漸愈矣五疳消積丸史君子肉五錢炒麥芽炒陳皮神麯炒山查各一兩白蕪荑黄連膽草各三錢右爲末陳米飯爲丸每服一錢米飲下人參啓脾丸人參五錢白术五錢土炒白茯苓五錢陳皮四錢扁豆五錢炒山藥五錢炒木香二錢煨穀芽三錢炒神麯三錢炒炙甘草二錢右研細末煉蜜爲丸重一錢用建蓮湯化下哺露疳乳食不節傷脾胃羸瘦如柴哺露成吐食吐蟲多煩渇頭骨開張晡熱蒸先用集聖消積滯繼用肥兒甚有靈若還腹大青筋現人參丸服莫從容註哺露者因乳食不節大傷脾胃也其證羸瘦如柴吐食吐蟲心煩口渇頭骨開張日晡蒸熱先用集聖丸消其積滯再用肥兒丸調理其脾若哺露日乆肚大青筋者又宜攻補兼施以人參丸主之集聖丸蘆薈微炒五靈脂炒夜明沙淘洗焙乾縮砂木香陳皮莪术史君子肉黄連川芎酒洗炒乾蟾各二錢炙當歸一錢五分青皮二錢製右爲細末用雄豬膽二個取汁和麫糊爲丸每服一錢米飲送下肥兒丸方見脾疳人參丸人參麥冬去心半夏薑製大黄微炒黄耆炙茯苓柴胡黄芩炙甘草川芎訶黎勒煨鼈甲炙右爲細末煉蜜爲丸如麻子大以粥飲下量兒大小用之吐證門吐證總括諸逆上衝成嘔吐乳食傷胃或夾驚或因痰飲或蟲擾虚實寒熱要分明註嘔吐一證皆諸逆上衝所致也夫諸逆之因或以乳食過多停滯中脘致傷胃氣不能徤運而上逆也或於食時觸驚停積不化而上逆也或痰飲壅盛阻隔氣道或蚘蟲擾亂懊憹不安而上逆也總之上逆之因雖不同而皆能成嘔吐也但病有虚有實有寒有熱治者當於臨證時參合兼見之證審愼以别之庶不誤矣辨嘔吐噦證有物有聲謂之嘔有物無聲吐證名無物有聲爲噦證分别醫治中病情註吐證有三曰嘔曰吐曰噦古人謂嘔屬陽明有聲有物氣血俱病也吐屬太陽有物無聲血病也噦屬少陽有聲無物氣病也獨李杲謂嘔吐噦俱屬脾胃虚弱潔古老人又從三焦以分氣積寒之三因然皆不外諸逆上衝也治者能分虚實别寒熱以治之自無不曲中病情矣傷乳吐乳食過飽蓄胃中乳片不化吐頻頻身熱面黄腹膨脹消乳保和有神功註傷乳吐者因乳食過飽停蓄胃中以致運化不及吐多乳片猶如物盛滿而上溢也其證身熱面黄肚腹膨脹治宜消乳丸保和丸化其宿乳安胃和中節其乳食自然止也消乳丸香附二兩製神麯炒麥芽各一兩炒陳皮八錢縮砂仁炒甘草各五錢炙右爲細末滴水爲丸如粟米大量兒大小服之薑湯化下保和丸南山查二兩神麯一兩炒茯苓半夏各一兩薑製連翹去心陳皮萊菔子各五錢炒右爲細末麵糊爲丸麥芽湯化服傷食吐過食傷胃腹脹熱惡食口臭吐酸黏眼胞虚浮身潮熱湏服三棱和胃煎註傷食吐者因小兒飲食無節過食油膩麵食等物以致壅塞中脘而成也其證肚腹脹熱惡食口臭頻吐酸黏眼胞虚浮身體潮熱治宜清胃和中爲主先用三棱丸止其吐再用和胃湯化其滯而病漸愈矣三棱丸三棱煨陳皮半夏薑製神麯各一兩炒黄連薑炒枳實麩炒丁香各五錢右研細末麵和爲丸如黄米大每服二十丸食後薑湯下和胃湯陳皮半夏薑製縮砂仁研蒼术炒厚樸薑炒藿香葉香附炒甘草炙山查神麯炒引用生薑水煎服方歌和胃湯治嘔吐頻陳皮半夏縮砂仁蒼术厚樸藿香葉香附甘草山查神夾驚吐食時觸異吐青涎身熱心煩睡不安截風觀音散極妙止吐定吐丸可痊註夾驚吐者多因飲食之時忽被驚邪所觸而致吐也其證頻吐青涎身體𤼵熱心神煩躁睡卧不寧先用全蠍觀音散截其風次用定吐丸止其嘔而病可痊矣全蠍觀音散人參三錢黄耆蜜炙扁豆炒茯苓各五錢蓮肉三錢去心木香一錢五分煨白芷二錢羌活防風天麻全蠍各三錢去毒炙甘草一錢五分右爲細末薑棗煎湯調服量兒大小與之定吐丸丁香二十一粒蠍梢四十九條去毒半夏三個薑製右爲細末令匀煮棗肉爲丸如黍米大每服七丸金器煎湯化服痰飲吐痰飲壅盛在胸中痰因氣逆嘔吐成眩暈面青吐涎飲香砂二陳六君寧註痰飲吐者由小兒飲水過多以致停留胸膈變而爲痰痰因氣逆遂成嘔吐之證其候頭目眩暈面青嘔吐涎水痰沫也宜用香砂二陳湯虚者香砂六君子湯治之二陳湯方見哯乳香砂仁本方加藿香砂六君子湯藿香縮砂仁白术土炒人參茯苓半夏薑製陳皮甘草炙引用生薑水煎服方歌香砂六君虚痰吐藿香縮砂共白术人參茯苓及陳皮半夏甘草同煎服蟲吐蟲吐胃熱或胃寒色變時疼嘔清涎寒熱當以隂陽辨化蟲加減理中痊註蟲吐之證有二有以胃經熱蒸者有以胃經寒迫者皆能令蟲不安擾亂胃中而作吐也其證脣色或紅或白胃口時痛時止頻嘔清涎屬寒屬熱當從隂陽之證辨之熱者化蟲丸主之寒者加減理中湯主之化蟲丸蕪荑五錢鶴蝨苦楝根皮胡粉史君子肉㯽榔各一兩枯礬二錢五分右爲細末麵糊爲丸量兒大小用之加減理中湯人參乾薑白术土炒川椒引用烏梅一箇水煎服方歌加減理中寒吐蟲人參乾薑白术從川椒烏梅伏蟲動煎成服下即安寧虚吐虚吐多因胃弱成神倦䪿動睡露睛自利不渇頻嘔吐丁沉四君藥最靈註虚吐之證多因胃氣虛弱不能消納乳食致成此證也其精神倦怠䪿門煽動睡卧露睛自利不渇頻頻嘔吐者以丁沉四君子湯治之丁沉四君子湯人參白术土炒茯苓炙甘草丁香沉香引用煨薑水煎服方歌胃虚嘔吐不思食丁沉四君治最宜參术苓草補其胃丁香沉香温其脾實吐小兒實吐腹脹滿二便不利痞硬疼𤼵渇思凉吐酸臭三一承氣可收功註實吐者小兒平素壯實偶而停滯胸腹脹滿二便秘澁痞硬疼痛口渇思飲寒凉吐多酸臭也宜用三一承氣湯下之二便利而吐止矣三一承氣湯芒消生大黄枳實麩炒甘草生厚樸薑炒引用生薑水煎服方歌三一承氣治實吐滌滯通塞功最著芒消相配生大黄枳實甘草同厚樸寒吐朝食暮吐爲冷吐乳食不化不臭酸四肢厥冷面脣白薑橘丁茰理中煎註寒吐者皆因小兒過食生冷或乳母當風取凉使寒氣入乳小兒飲之則成冷吐之證其候朝食暮吐乳食不化吐出之物不臭不酸四肢逆冷面脣色白治當温中定吐胃微寒者薑橘散主之寒甚者丁茰理中湯主之薑橘散白薑二錢陳皮一兩炙甘草一錢右爲細末每服一錢温棗湯調服理中湯方見不乳香呉茱茰本方加丁熱吐食入即吐因胃熱口渇飲冷吐酸涎身熱脣紅小便赤加味温膽湯可痊註熱吐之證或因小兒過食煎􅘤之物或因乳母過食厚味以致熱積胃中遂令食入即吐口渇飲冷嘔吐酸涎身熱脣紅小便赤色治宜清熱爲主加味温膽湯主之加味温膽湯陳皮半夏薑製茯苓麥冬去心枳實麩炒生甘草竹茹黄連薑炒引用燈心水煎服方歌熱吐須用温膽湯陳皮半夏茯苓良麥冬枳實生甘草竹茹黄連水煎嚐瀉證門瀉證總括小兒泄瀉認須清傷乳停食冷熱驚藏寒脾虚飱水瀉分消温補治宜精註瀉之一證多因脾被濕侵土不勝水而成然致病之原各異或乳食停滯不化或感受寒暑之氣或驚邪外觸或藏受寒冷或脾虚作瀉更有飱瀉水瀉之證致疾之因不同而調治之法亦異醫者詳細辨之或分消或温補因證施治庶不誤矣傷乳食瀉乳食過傷瀉酸膿噫臭腹熱脹滿疼口渇惡食溺赤澁保安平胃奏神功註傷乳食瀉者因乳食過飽損傷脾胃乳食不化故頻瀉酸膿也噫臭腹熱脹滿疼痛口渇惡食小便赤澁須用保安丸消其滯次用平胃散和其脾庶積消而瀉止矣保安丸香附醋炒縮砂仁各一兩白薑炮青皮醋炒陳皮三棱莪术炙甘草各五錢右爲細末麵糊爲丸量兒大小與之白湯化下平胃散方見哯乳中寒瀉過食生冷中寒瀉腸鳴脹痛泄澄清面白肢冷懶飲食理中訶子散堪行註中寒瀉者因過食生冷以致寒邪凝結腸鳴腹脹時復疼痛所瀉皆澄澈清冷面色淡白四肢逆冷飲食懶進也温中理中湯主之止瀉訶子散主之理中湯方見不乳訶子散訶子麵煨肉豆䓻麵煨白术土炒人參茯苓木香各一兩煨陳皮炙甘草各五錢右爲細末每服一錢薑湯調服火瀉火瀉内熱或傷暑暴注下迫腹痛疼煩渇瀉黄小便赤玉露四苓可收功註火瀉者皆因藏府積熱或外傷暑氣故瀉時暴注下廹肚腹疼痛心煩口渇瀉多黄水小便赤色也先用玊露散清其熱再用四苓湯利其水庶得其要矣玊露散寒水石石膏各一兩甘草三錢右爲細末量兒大小温湯無時調服四苓湯茯苓白术土炒豬苓澤瀉引用燈心水煎服方歌火瀉小便不利通利水除濕用四苓茯苓白术豬苓澤燈心爲引共煎成驚瀉驚瀉因驚成泄瀉夜卧不安晝􅅥驚糞稠若膠帶青色鎮驚養脾服通靈註驚瀉者因氣弱受驚致成此證其候夜卧不寧晝則驚愓糞稠若膠色青如苔治宜鎭心抑肝先以益脾鎭驚散定其驚次以養脾丸理其脾庶可愈矣益脾鎮驚散人參錢半白术土炒茯苓各三錢硃砂八分釣藤二錢甘草五分炙右爲細末每服一錢燈心湯調服養脾丸人參白术土炒當歸川芎各三錢青皮醋炒木香煨黄連薑炙陳皮各二錢神麯炒山查縮砂仁麥芽各一錢炒右研細末神麯糊爲丸如麻子大每服二十丸陳倉米飲下臍寒瀉剪臍失䕶受寒冷糞色青白腹痛鳴散寒和氣飲極效温補調中湯最靈註臍寒瀉者多因斷臍失䕶風冷乘入傳於大腸遂成寒瀉之證其候糞色青白腹痛腸鳴先用和氣飲温散之再以調中湯温補之庶治得其要矣和氣飲蒼术紫蘇防風赤苓豆豉藿香陳皮厚樸薑炒炙甘草引用生薑燈心水煎服方歌和氣飲具温散功蒼术紫蘇共防風赤苓豆豉藿香葉陳皮厚樸甘草同調中湯人參茯苓藿香白术土炒炙甘草木香煨香附製縮砂仁引用煨薑水煎服方歌臍寒瀉用調中湯人參白术煨木香藿香茯苓同香附縮砂炙草引煨薑脾虚瀉脾虚食後即作瀉腹滿不渇少精神面黄懶食肌消瘦參苓白术奏竒勲註脾虚瀉者多因脾不健運故每逄食後作瀉腹滿不渇精神短少面黄懶食肌肉消痩也宜用參苓白术散以補脾其瀉自止參苓白术散方見脾疳飱瀉清氣下陷失健運完穀不化飱瀉名補中益氣湯升補乆瀉腸滑用四神註飱瀉者或因春傷風邪清氣下䧟脾失健運以致完穀不化也治者須補養脾土用補中益氣湯升其中氣若泄瀉日乆腸滑不禁者用四神丸治之補中益氣湯人參黄耆蜜炙當歸土炒白术土炒炙甘草陳皮升麻土炒柴胡醋炒引用薑棗水煎服方歌飱瀉多因清陽陷補中益氣湯最騐參耆歸术草陳皮升麻柴胡功無限四神丸補骨脂四兩五味子肉豆䓻各二兩麵裹煨吳茱茰一兩炒水浸右爲細末生薑棗肉爲丸每服一錢米飲下水瀉脾胃濕盛成水瀉懶食溏瀉色多黄清濁不分溺短濇胃苓升陽除濕湯註水瀉者皆因脾胃濕盛以致清濁不分變成水瀉之證其候小便短濇懶食溏瀉色黄宜用胃苓湯以除濕若瀉乆不止則用升陽除濕湯治之其證自愈胃苓湯蒼术炒陳皮厚樸薑炒白术土炒茯苓炙甘草肉桂澤瀉豬苓引用生薑紅棗水煎服方歌濕瀉胃苓湯堪行蒼术陳皮厚樸同白术茯苓炙甘草肉桂澤瀉共豬苓升陽除濕湯蒼术炒陳皮防風神麯炒麥芽炒澤瀉炙甘草升麻羌活柴胡豬苓引用生薑水煎服方歌升陽除濕瀉不停蒼术陳皮共防風神麯麥芽澤甘草升麻羌活柴豬苓御纂醫宗金鑑卷五十二欽定四庫全書御纂醫宗金鑑卷五十二編輯㓜科雜病心法要訣疳證門疳證總括大人爲勞小兒疳乳食傷脾是病原甘肥失節生積熱氣血津液被熬煎初患尿泔午潮熱日乆青筋肚大堅面色青黄肌肉瘦皮毛憔悴眼睛䀽註大人者十五歲以上也病則為勞若十五歲以下者皆名爲疳緣所禀之氣血虚弱藏府嬌嫩易於受傷或因乳食過飽或因肥甘無節停滯中脘傳化遲滯腸胃漸傷則生積熱熱盛成疳則消耗氣血煎灼津液凡疳病初起尿如米泔午後潮熱日乆失治致令青筋暴露肚大堅硬面色青黄肌肉消瘦皮毛憔悴眼睛𤼵䀽而疳證成矣然當分其所屬而治之庶不致有悞也脾疳脾疳面黄肌消瘦身熱困倦喜睡眠心下痞硬滿腫脹卧冷食泥腹痛堅頭大頸細食懶進吐瀉煩渴便腥黏攻積消疳肥兒治補脾參苓白术先註脾屬土色黄主肌肉故脾疳則見面黄肌肉消瘦身體𤼵熱困倦喜睡心下痞硬乳食懶進睡卧喜冷好食泥土肚腹堅硬疼痛頭大頸細有時吐瀉口乾煩渴大便腥黏之證也宜先攻其積用消疳理脾湯肥兒丸主之積退然後調理其脾以參苓白术散主之消疳理脾湯蕪荑三棱莪术青皮炒陳皮蘆薈檳榔史君子肉甘草生川黄連胡黄連麥芽炒神麯炒引用燈心水煎服方歌消疳理脾用蕪荑三棱莪术青陳皮蘆薈㯽榔史君草川連胡連麥芽麯肥兒丸人參三錢半白术五錢土炒茯苓三錢黄連二錢胡黄連五錢史君子四錢肉神麯炒麥芽炒山查肉各三錢半甘草錢半炙蘆薈二錢半煨右爲末黄米糊丸如黍米大每服二三十丸米湯化下參苓白术散人參二錢茯苓白术土炒扁豆炒薏米炒山藥各五錢炒陳皮三錢縮砂桔梗各二錢甘草一錢炙建蓮子五錢去心右共爲細末每服一錢老米湯調服疳瀉疳疾傷脾因作瀉先清後補爲妙訣初宜清熱和中湯乆瀉參苓白术㨗註疳瀉之證多緣積熱傷脾以致水穀不分頻頻作瀉法當清熱滲濕以清熱和中湯主之若瀉乆不愈當漸爲調理參苓白术散主之清熱和中湯白术土炒陳皮厚樸薑炒赤苓黄連神麯炒穀芽炒史君子生甘草澤瀉引用燈心水煎服方歌疳乆泄瀉名疳瀉清熱和中功甚㨗白术陳厚赤苓連神穀史君草澤瀉參苓白术散方見脾疳疳腫脹疳疾腫脹面浮光傳化失宜脾肺傷氣逆喘咳胸膈滿御苑匀氣服最良註疳疾腫脹之證多因傳化失宜以致脾肺兩傷現證氣逆喘咳胸膈痞悶肚腹腫脹面色浮光宜用御苑匀氣㪚治之其腫脹自消矣御苑匀氣散桑皮蜜炒桔梗赤苓甘草生藿香陳皮木通引用薑皮燈心水煎服方歌疳乆脾虚腫脹生御苑匀氣有竒功桑皮桔梗赤苓草藿香陳皮合木通疳痢疳疾日乆頻下痢多緣腸胃熱凝滯或赤或白腹窘急香連導滯爲妙劑註疳痢之由皆因熱結腸胃所致故痢時或赤或白腹中窘痛急用香連導滯湯治之其痢自愈香連導滯湯青皮炒陳皮厚樸薑炒川黄連薑炒生甘草山查神麯炒木香煨㯽榔大黄引用燈心水煎服方歌疳乆下痢名疳痢香連導滯功最良青陳厚樸川連草查麯木香㯽大黄肝疳肝疳面目爪甲青眼生眵淚澁難睜摇頭揉目合面卧耳流膿水濕瘡生腹大青筋身羸瘦燥渇煩急糞帶青清熱柴胡同蘆薈調養逍遥抑肝靈註肝屬木色青主筋故肝疳則見面目爪甲皆青眼生眵淚隱澁難睜摇頭揉目合面睡卧耳瘡流膿腹大青筋身體羸瘦燥渇煩急糞青如苔之證也治宜先清其熱用柴胡清肝㪚蘆薈肥兒丸主之若病勢稍退當以逍遥散抑肝扶脾湯調理柴胡清肝散銀柴胡梔子微炒連翹去心胡黄連生地黄赤芍龍膽草青皮炒甘草生引用燈心竹葉水煎服方歌柴胡清肝治肝疳銀柴梔子翹胡連生地赤芍龍膽草青皮甘草一同煎蘆薈肥兒丸五穀蟲二兩炒蘆薈生胡黄連炒川黄連各一兩薑炒銀柴胡一兩二錢炒扁豆炒山藥各二兩炒南山查二兩半蝦蟇四個煆肉豆䓻七錢煨㯽榔五錢史君子二兩半炒神麯二兩炒麥芽一兩六錢炒鶴虱八錢炒蕪荑一兩炒硃砂二錢飛麝香二錢共研細末醋糊爲丸如黍米大每服一錢米飲下加味逍遥散茯苓白术炒當歸白芍炒柴胡薄荷炙甘草丹皮梔子炒引用薑棗水煎服方歌加味逍遥㪚如神茯苓白术當歸身白芍柴胡薄荷草再加丹皮梔子仁抑肝扶脾湯人參白术土炒黄連薑炒柴胡酒炒茯苓青皮醋炒陳皮白芥子龍膽草山查神麯炒炙甘草引用薑棗水煎服方歌調理抑肝扶脾湯參术黄連柴苓良青陳白芥龍膽草山查神麯甘草嚐心疳心疳面赤衇絡赤壯熱有汗時煩驚咬牙弄舌口燥渇口舌生瘡小便紅胸膈滿悶喜伏卧懶食乾瘦吐利頻瀉心導赤珍珠治茯神調理可收功註心屬火色赤主血衇故心疳則見面紅目衇絡赤壯熱有汗時時驚煩咬牙弄舌口舌乾燥渇飲生瘡小便紅赤胸膈滿悶睡喜伏卧懶食乾瘦或吐或利也熱盛者㵼心導赤湯主之熱盛兼驚者珍珠㪚主之病乆心虚者茯神湯調理之瀉心導赤湯方見木舌珍珠散珍珠三錢麥冬五錢去心天竺黄三錢金鉑二十五片牛黄一錢胡黄連三錢生甘草二錢羚羊角大黄當歸各三錢硃砂二錢雄黄一錢茯神五錢犀角三錢右爲細末每服五分茵蔯湯調服茯神湯茯神當歸炙甘草人參引用龍眼肉水煎服煩熱者加麥冬方歌茯神湯内用茯神當歸甘草共人參若是煩熱麥冬入清補兼施功最純疳渇肥甘積熱傷津液大渇引飲心煩熱速用清熱甘露宜熱減津生渇自歇註疳渇者多因肥甘積熱煎耗脾胃以致津液虧損故不時大渇引飲心神煩熱速用清熱甘露飲其渇自愈清熱甘露飲生地黄麥冬去心石斛知母生枇杷葉蜜炙石膏煆甘草生茵蔯蒿黄芩引用燈心水煎服方歌耗液傷津成疳渇清熱甘露飲如神生地麥冬斛知母枇杷石膏草茵芩肺疳面白氣逆時咳嗽毛髪焦枯皮粟乾𤼵熱憎寒流清涕鼻頰生瘡號肺疳疎散生地清肺效清熱甘露飲爲先肺虚補肺㪚最妙隨證加減莫遲延註肺屬金色白主皮毛故肺疳則見面白氣逆咳嗽毛髮枯焦皮上生粟肌膚乾燥憎寒𤼵熱常流清涕鼻頰生瘡也先用生地清肺飲以疎觧之繼用甘露飲清之日乆肺虚者當以補肺㪚主之生地清肺飲桑皮炒生地黄天冬前胡桔梗蘓葉防風黄芩生甘草當歸連翹去心赤苓引用生薑紅棗水煎服方歌生地清肺用桑皮生地天冬前桔齊蘓葉防風黄芩草當歸連翹赤苓宜甘露飲生地黄熟地黄天冬麥冬去心枳殻麩炒桔梗黄芩枇杷葉蜜炙茵蔯蒿石斛引用紅棗肉水煎服方歌甘露飲治肺火壅生熟地黄二門冬枳桔黄芩枇杷葉茵蔯石斛共煎成補肺散白茯苓阿膠蛤粉炒糯米馬兜鈴炙甘草杏仁炒去皮尖水煎服方歌肺虚補肺散通仙茯苓阿膠糯米攢馬兜鈴配炙甘草杏仁微炒去皮尖腎疳觧顱鶴膝齒行遲骨瘦如柴面黑黧齒齦出血口臭氣足冷腹痛瀉哭啼腎疳先用金蟾治九味地黄繼進宜若逢禀賦氣虚弱調元散進莫遲疑註腎屬水色黑主骨患此疳者初必有解顱鶴膝齒遲行遲腎氣不足等證更因甘肥失節乆則漸成腎疳故見面色黧黑齒齦出血口中氣臭足冷如冰腹痛泄瀉啼哭不已之證先用金蟾丸治其疳繼以九味地黄丸調補之若禀賦不足者調元㪚主之金蟾丸乾蝦蟇五個煆胡黄連黄連各三錢鶴蝨二錢肉豆䓻煨苦楝根白皮雷丸蘆薈生蕪荑各三錢右爲末麫糊爲丸菉豆大雄黄爲衣每服十五丸米湯化下九味地黄丸熟地茱萸肉各五錢赤茯苓澤瀉牡丹皮山藥炒當歸川楝子史君子各三錢肉右爲細末煉白蜜爲丸如芡實大用滚白水研化食前服調元㪚人參茯苓白术土炒山藥炒川芎當歸熟地黄茯神黄耆炙甘草炙白芍炒引用薑棗水煎服方歌調元㪚治禀賦弱參苓白术乾山藥芎歸熟地共茯神黄耆甘草同白芍疳熱小兒疳疾身𤼵熱輕重虚實當分别初用青蒿飲爲宜日乆鼈甲㪚最㨗註疳疾之證身多𤼵熱治者宜分别輕重虚實治之病初起多實者鼈甲青蒿飲主之日乆多虚者鼈甲㪚主之鼈甲青蒿飲銀柴胡鼈甲炙青蒿生甘草生地黄赤芍胡黄連知母炒地骨皮引用燈心水煎服方歌疳疾血虚身𤼵熱鼈甲青蒿藥有靈銀柴鼈蒿草地芍胡連知母地骨同鼈甲㪚人參黄耆炙鼈甲炙生地熟地當歸白芍炒地骨皮水煎服方歌疳疾日乆骨熱蒸鼈甲㪚治效從容參耆鼈甲生熟地當歸白芍地骨同腦疳腦疳多緣受風熱又兼乳哺失調節頭皮光急生餅瘡頭熱髮焦如穗結鼻乾心煩腮䪿腫困倦睛暗身汗熱龍膽龍腦丸甚良吹鼻龍腦效甚㨗註腦疳者因兒素受風熱又兼乳哺失調以致變生此證頭皮光急腦生餅瘡頭熱毛焦髮結如穗鼻乾心煩腮䪿腫硬困倦睛暗自汗身熱也腦熱生瘡者龍膽丸主之煩熱羸瘦者龍腦丸主之外用吹鼻龍腦㪚吹之其證自愈龍膽丸龍膽草升麻苦楝根皮焙赤茯苓防風蘆薈油髮灰各二錢青黛黄連各二錢右爲細末豬膽汁浸糕糊丸如麻子大薄荷湯下量兒大小與之龍腦丸龍腦麝香各五分雄黄二錢胡黄連三錢牛黄一錢硃砂一錢五分蘆薈三錢生乾蝦蟇四錢灰右爲細末熊膽合丸如麻子大每服三丸薄荷湯下吹鼻龍腦㪚龍腦麝香少許細末各研蝸牛殻炒黄蝦蟇灰𤓰蒂黄連細辛桔梗各等分右爲細末入磁盒内貯之每取少許吹入鼻中日吹二次眼疳疳熱上攻眼疳成癢澁赤爛胞腫疼白睛生翳漸遮滿流淚羞明目不睜疎觧瀉肝㪚最妙雲翳清熱退翳靈目乆不瘥當補養逍遥瀉肝二方從註眼疳者疳熱上攻於眼故發時癢澁赤爛眼胞腫疼白睛生翳漸漸遮滿不時流淚羞明閉目也先用瀉肝㪚疎觧之再用清熱退翳湯消其翳若目乆不瘥法當調補逍遥㪚或羊肝㪚主之瀉肝散生地黄當歸赤芍川芎連翹去心梔子生龍膽草大黄羌活甘草生防風引用燈心水煎服方歌瀉肝㪚治肝熱壅生地當歸赤芍芎連翹梔子龍膽草大黄羌活草防風清熱退翳湯梔子微炒胡黄連木賊草赤芍生地羚羊角龍膽草銀柴胡蟬蛻甘草生菊花蒺藜引用燈心水煎服方歌清熱退翳消雲翳梔連木賊芍生地羚羊龍膽銀柴胡蟬蛻甘草菊蒺藜逍遥散方見肝疳羊肝散青羊肝一具膜切韭葉厚片去筋人參羌活白术土炒蛤粉各等分右爲細末令匀聽用将藥置荷葉上如錢厚一層鋪肝一層包固外以新足青布包裹蒸熟任兒食之如不食者及夏月恐腐壞則晒乾爲末早晚白湯調服服完再合以好爲度若熱者減人參鼻疳疳熱攻肺成鼻疳鼻塞赤癢痛難堪浸淫潰爛連脣際咳嗽氣促髮毛乾熱盛清金化毒效疳蟲蝕鼻化蟲丸調敷湏用鼻疳散吹鼻蟬殻效通仙註鼻疳者因疳熱攻肺而成盖鼻爲肺竅故𤼵時鼻塞赤癢疼痛浸淫潰爛下連脣際成瘡咳嗽氣促毛髮焦枯也熱盛者宜清金散􅃽氏化毒丹主之蟲蝕者用化蟲丸主之外用鼻疳㪚敷之或以吹鼻蟬殻㪚吹入鼻内清金散生梔子黄芩枇杷葉蜜炙生地黄花粉連翹去心麥冬去心薄荷元參生甘草桔梗引用燈心水煎服方歌清金㪚治肺壅熱梔子黄芩枇杷葉生地花粉翹麥冬薄荷元參甘草桔蔣氏化毒丹方見胎赤化蟲丸蕪荑蘆薈生青黛川芎白芷梢胡黄連川黄連蝦蟇各等分灰右爲細末豬膽汁浸糕爲丸如麻子大每服二十丸食後杏仁煎湯下鼻疳散青黛一錢麝香少許熊膽五分右爲細末乾者用豬骨髓調貼濕者乾上吹鼻蟬殻散蟬殻微炒青黛研蛇蛻皮灰滑石麝香各等分細研右爲細末每用菉豆大吹入鼻中日三用之疳蟲盡出牙疳疳成毒熱内攻胃上發齦肉赤爛疼口鼻血出牙枯落穿腮蝕脣命多傾攻毒消疳蕪荑效繼以蘆薈肥兒靈外用牙疳散時上能食堪藥始能生註牙疳者因毒熱攻胃而成故熱毒上發齦肉赤爛疼痛口臭血出牙枯脱落穿腮蝕脣病勢危急急用消疳蕪荑湯瀉其毒熱繼以蘆薈肥兒丸清其餘熱外用牙疳散時時敷之自愈總之此證必胃强能食堪勝峻藥始有生機否則難治也消疳蕪荑湯大黄芒消蕪荑蘆薈生川連胡黄連黄芩雄黄水煎服服後便軟及不食者去大黄芒消加石膏羚羊角方歌蕪荑消疳大黄消蘆薈蕪荑二連標黄芩雄黄一同入能清積熱牙疳消蘆薈肥兒丸方見肝疳牙疳㪚人中白煆存性綠礬燒紅五倍子各等分炒黑氷片少許右爲極細末先用水拭淨牙齒再以此㪚敷之有蟲者加㯽榔脊疳積熱生蟲蝕脊膂手擊其背若鼔鳴羸瘦脊骨鋸齒狀身熱下利煩渇増十指皆瘡齧爪甲此名脊疳病熱凶蘆薈丸同金蟾散急急調治莫從容註脊疳者因積熱生蟲上蝕脊膂也以手擊其背必空若鼔鳴脊骨羸瘦狀若鋸齒始爲脊疳外證亦身體發熱下利煩渇十指皆瘡頻齧爪甲其證最爲可畏湏先以蘆薈丸殺其蟲繼用金蟾散消其疳隨時調治或可愈也蘆薈丸生蘆薈青黛硃砂熊膽胡黄連貫衆地龍微炒川黄連蟬蛻去足雷丸各五錢麝香一錢蝦蟇一個炙焦酥塗右爲細末用蝸角肉研和丸如麻子大每服五丸粥飲下量兒大小與之金蟾散蟾一枚炙焦酥塗夜明沙炒桃白皮樗根白皮地榆黄蘗訶黎勒皮煨百合人參大黄白蕪荑炒胡粉各三錢㯽榔一錢丁香三十七粒右爲細末每服五分粥飲調下蛔疳過食膩冷並肥甘濕熱生蛔腹内纒時煩多啼時腹痛口脣色變溢清涎腹脹青筋肛濕癢史君散治莫遲延不愈下蟲丸極效蛔退補脾肥兒丸註蛔疳者因過食生冷油膩肥甘之物以致濕熱生蛔腹中擾動故有時煩躁多啼有時肚腹攪痛口脣或紅或白口溢清涎腹脹青筋肛門濕癢也先用史君子散治之不愈下蟲丸主之若蛔退又當調補其脾肥兒丸主之史君子散史君子十個爲瓦上炒末苦楝子五個核泡去白蕪荑甘草各一錢一宿膽汁浸右爲末每服一錢水調服下蟲丸苦楝根皮新白者佳酒浸焙木香桃仁浸去皮尖綠苞貫衆蕪荑焙雞心㯽榔各二錢輕粉五分鶴蝨一錢炒乾蝦蟇三錢炒黑史君子三錢煨取肉右爲末麫糊成丸如麻子大每服二十丸滚白水下肥兒丸方見脾疳無辜疳無辜疳傳有二因鳥羽汚衣着兒身或緣乳母病傳染頸項瘡核便利膿蟲蝕臟腑身羸瘦面黄𤼵熱致疳生清熱宜用柴胡飲消疳肥兒效如神註無辜疳者其病原有二或因浣衣夜露被無辜鳥落羽所汚兒着衣後致成此證或因乳母有病傳染小兒以有此疾其證頸項生瘡或項内有核如彈按之轉動軟而不疼其中有蟲如米粉不速破之使蟲蝕臟腑便利膿血身體羸瘦面黄𤼵熱也治宜先清其熱柴胡飲主之再消其疳以蘆薈肥兒丸主之柴胡飲赤芍藥柴胡黄連半夏薑製桔梗夏枯草龍膽草浙貝母黄芩甘草生引用燈心水煎服方歌柴胡飲治無辜疳赤芍柴胡川黄連半夏桔梗夏枯草龍膽浙貝芩草煎蘆薈肥兒丸方見肝疳丁奚疳徧身骨露號丁奚肌肉乾澁晝夜啼手足枯細面黧黑項細腹大突出臍尻削身軟精神倦骨蒸潮熱渇煩急化滯五疳消積治補養人參啓脾宜註丁奚者徧身骨露其狀似丁故名曰丁奚也其證肌肉乾澁啼哭不已手足枯細面色黧黒項細腹大肚臍突出尻削身軟精神倦怠骨蒸潮熱燥渇煩急也先用五疳消積丸化其滯繼用人參啓脾丸理其脾病可漸愈矣五疳消積丸史君子肉五錢炒麥芽炒陳皮神麯炒山查各一兩白蕪荑黄連膽草各三錢右爲末陳米飯爲丸每服一錢米飲下人參啓脾丸人參五錢白术五錢土炒白茯苓五錢陳皮四錢扁豆五錢炒山藥五錢炒木香二錢煨穀芽三錢炒神麯三錢炒炙甘草二錢右研細末煉蜜爲丸重一錢用建蓮湯化下哺露疳乳食不節傷脾胃羸瘦如柴哺露成吐食吐蟲多煩渇頭骨開張晡熱蒸先用集聖消積滯繼用肥兒甚有靈若還腹大青筋現人參丸服莫從容註哺露者因乳食不節大傷脾胃也其證羸瘦如柴吐食吐蟲心煩口渇頭骨開張日晡蒸熱先用集聖丸消其積滯再用肥兒丸調理其脾若哺露日乆肚大青筋者又宜攻補兼施以人參丸主之集聖丸蘆薈微炒五靈脂炒夜明沙淘洗焙乾縮砂木香陳皮莪术史君子肉黄連川芎酒洗炒乾蟾各二錢炙當歸一錢五分青皮二錢製右爲細末用雄豬膽二個取汁和麫糊爲丸每服一錢米飲送下肥兒丸方見脾疳人參丸人參麥冬去心半夏薑製大黄微炒黄耆炙茯苓柴胡黄芩炙甘草川芎訶黎勒煨鼈甲炙右爲細末煉蜜爲丸如麻子大以粥飲下量兒大小用之吐證門吐證總括諸逆上衝成嘔吐乳食傷胃或夾驚或因痰飲或蟲擾虚實寒熱要分明註嘔吐一證皆諸逆上衝所致也夫諸逆之因或以乳食過多停滯中脘致傷胃氣不能徤運而上逆也或於食時觸驚停積不化而上逆也或痰飲壅盛阻隔氣道或蚘蟲擾亂懊憹不安而上逆也總之上逆之因雖不同而皆能成嘔吐也但病有虚有實有寒有熱治者當於臨證時參合兼見之證審愼以别之庶不誤矣辨嘔吐噦證有物有聲謂之嘔有物無聲吐證名無物有聲爲噦證分别醫治中病情註吐證有三曰嘔曰吐曰噦古人謂嘔屬陽明有聲有物氣血俱病也吐屬太陽有物無聲血病也噦屬少陽有聲無物氣病也獨李杲謂嘔吐噦俱屬脾胃虚弱潔古老人又從三焦以分氣積寒之三因然皆不外諸逆上衝也治者能分虚實别寒熱以治之自無不曲中病情矣傷乳吐乳食過飽蓄胃中乳片不化吐頻頻身熱面黄腹膨脹消乳保和有神功註傷乳吐者因乳食過飽停蓄胃中以致運化不及吐多乳片猶如物盛滿而上溢也其證身熱面黄肚腹膨脹治宜消乳丸保和丸化其宿乳安胃和中節其乳食自然止也消乳丸香附二兩製神麯炒麥芽各一兩炒陳皮八錢縮砂仁炒甘草各五錢炙右爲細末滴水爲丸如粟米大量兒大小服之薑湯化下保和丸南山查二兩神麯一兩炒茯苓半夏各一兩薑製連翹去心陳皮萊菔子各五錢炒右爲細末麵糊爲丸麥芽湯化服傷食吐過食傷胃腹脹熱惡食口臭吐酸黏眼胞虚浮身潮熱湏服三棱和胃煎註傷食吐者因小兒飲食無節過食油膩麵食等物以致壅塞中脘而成也其證肚腹脹熱惡食口臭頻吐酸黏眼胞虚浮身體潮熱治宜清胃和中爲主先用三棱丸止其吐再用和胃湯化其滯而病漸愈矣三棱丸三棱煨陳皮半夏薑製神麯各一兩炒黄連薑炒枳實麩炒丁香各五錢右研細末麵和爲丸如黄米大每服二十丸食後薑湯下和胃湯陳皮半夏薑製縮砂仁研蒼术炒厚樸薑炒藿香葉香附炒甘草炙山查神麯炒引用生薑水煎服方歌和胃湯治嘔吐頻陳皮半夏縮砂仁蒼术厚樸藿香葉香附甘草山查神夾驚吐食時觸異吐青涎身熱心煩睡不安截風觀音散極妙止吐定吐丸可痊註夾驚吐者多因飲食之時忽被驚邪所觸而致吐也其證頻吐青涎身體𤼵熱心神煩躁睡卧不寧先用全蠍觀音散截其風次用定吐丸止其嘔而病可痊矣全蠍觀音散人參三錢黄耆蜜炙扁豆炒茯苓各五錢蓮肉三錢去心木香一錢五分煨白芷二錢羌活防風天麻全蠍各三錢去毒炙甘草一錢五分右爲細末薑棗煎湯調服量兒大小與之定吐丸丁香二十一粒蠍梢四十九條去毒半夏三個薑製右爲細末令匀煮棗肉爲丸如黍米大每服七丸金器煎湯化服痰飲吐痰飲壅盛在胸中痰因氣逆嘔吐成眩暈面青吐涎飲香砂二陳六君寧註痰飲吐者由小兒飲水過多以致停留胸膈變而爲痰痰因氣逆遂成嘔吐之證其候頭目眩暈面青嘔吐涎水痰沫也宜用香砂二陳湯虚者香砂六君子湯治之二陳湯方見哯乳香砂仁本方加藿香砂六君子湯藿香縮砂仁白术土炒人參茯苓半夏薑製陳皮甘草炙引用生薑水煎服方歌香砂六君虚痰吐藿香縮砂共白术人參茯苓及陳皮半夏甘草同煎服蟲吐蟲吐胃熱或胃寒色變時疼嘔清涎寒熱當以隂陽辨化蟲加減理中痊註蟲吐之證有二有以胃經熱蒸者有以胃經寒迫者皆能令蟲不安擾亂胃中而作吐也其證脣色或紅或白胃口時痛時止頻嘔清涎屬寒屬熱當從隂陽之證辨之熱者化蟲丸主之寒者加減理中湯主之化蟲丸蕪荑五錢鶴蝨苦楝根皮胡粉史君子肉㯽榔各一兩枯礬二錢五分右爲細末麵糊爲丸量兒大小用之加減理中湯人參乾薑白术土炒川椒引用烏梅一箇水煎服方歌加減理中寒吐蟲人參乾薑白术從川椒烏梅伏蟲動煎成服下即安寧虚吐虚吐多因胃弱成神倦䪿動睡露睛自利不渇頻嘔吐丁沉四君藥最靈註虚吐之證多因胃氣虛弱不能消納乳食致成此證也其精神倦怠䪿門煽動睡卧露睛自利不渇頻頻嘔吐者以丁沉四君子湯治之丁沉四君子湯人參白术土炒茯苓炙甘草丁香沉香引用煨薑水煎服方歌胃虚嘔吐不思食丁沉四君治最宜參术苓草補其胃丁香沉香温其脾實吐小兒實吐腹脹滿二便不利痞硬疼𤼵渇思凉吐酸臭三一承氣可收功註實吐者小兒平素壯實偶而停滯胸腹脹滿二便秘澁痞硬疼痛口渇思飲寒凉吐多酸臭也宜用三一承氣湯下之二便利而吐止矣三一承氣湯芒消生大黄枳實麩炒甘草生厚樸薑炒引用生薑水煎服方歌三一承氣治實吐滌滯通塞功最著芒消相配生大黄枳實甘草同厚樸寒吐朝食暮吐爲冷吐乳食不化不臭酸四肢厥冷面脣白薑橘丁茰理中煎註寒吐者皆因小兒過食生冷或乳母當風取凉使寒氣入乳小兒飲之則成冷吐之證其候朝食暮吐乳食不化吐出之物不臭不酸四肢逆冷面脣色白治當温中定吐胃微寒者薑橘散主之寒甚者丁茰理中湯主之薑橘散白薑二錢陳皮一兩炙甘草一錢右爲細末每服一錢温棗湯調服理中湯方見不乳香呉茱茰本方加丁熱吐食入即吐因胃熱口渇飲冷吐酸涎身熱脣紅小便赤加味温膽湯可痊註熱吐之證或因小兒過食煎􅘤之物或因乳母過食厚味以致熱積胃中遂令食入即吐口渇飲冷嘔吐酸涎身熱脣紅小便赤色治宜清熱爲主加味温膽湯主之加味温膽湯陳皮半夏薑製茯苓麥冬去心枳實麩炒生甘草竹茹黄連薑炒引用燈心水煎服方歌熱吐須用温膽湯陳皮半夏茯苓良麥冬枳實生甘草竹茹黄連水煎嚐瀉證門瀉證總括小兒泄瀉認須清傷乳停食冷熱驚藏寒脾虚飱水瀉分消温補治宜精註瀉之一證多因脾被濕侵土不勝水而成然致病之原各異或乳食停滯不化或感受寒暑之氣或驚邪外觸或藏受寒冷或脾虚作瀉更有飱瀉水瀉之證致疾之因不同而調治之法亦異醫者詳細辨之或分消或温補因證施治庶不誤矣傷乳食瀉乳食過傷瀉酸膿噫臭腹熱脹滿疼口渇惡食溺赤澁保安平胃奏神功註傷乳食瀉者因乳食過飽損傷脾胃乳食不化故頻瀉酸膿也噫臭腹熱脹滿疼痛口渇惡食小便赤澁須用保安丸消其滯次用平胃散和其脾庶積消而瀉止矣保安丸香附醋炒縮砂仁各一兩白薑炮青皮醋炒陳皮三棱莪术炙甘草各五錢右爲細末麵糊爲丸量兒大小與之白湯化下平胃散方見哯乳中寒瀉過食生冷中寒瀉腸鳴脹痛泄澄清面白肢冷懶飲食理中訶子散堪行註中寒瀉者因過食生冷以致寒邪凝結腸鳴腹脹時復疼痛所瀉皆澄澈清冷面色淡白四肢逆冷飲食懶進也温中理中湯主之止瀉訶子散主之理中湯方見不乳訶子散訶子麵煨肉豆䓻麵煨白术土炒人參茯苓木香各一兩煨陳皮炙甘草各五錢右爲細末每服一錢薑湯調服火瀉火瀉内熱或傷暑暴注下迫腹痛疼煩渇瀉黄小便赤玉露四苓可收功註火瀉者皆因藏府積熱或外傷暑氣故瀉時暴注下廹肚腹疼痛心煩口渇瀉多黄水小便赤色也先用玊露散清其熱再用四苓湯利其水庶得其要矣玊露散寒水石石膏各一兩甘草三錢右爲細末量兒大小温湯無時調服四苓湯茯苓白术土炒豬苓澤瀉引用燈心水煎服方歌火瀉小便不利通利水除濕用四苓茯苓白术豬苓澤燈心爲引共煎成驚瀉驚瀉因驚成泄瀉夜卧不安晝􅅥驚糞稠若膠帶青色鎮驚養脾服通靈註驚瀉者因氣弱受驚致成此證其候夜卧不寧晝則驚愓糞稠若膠色青如苔治宜鎭心抑肝先以益脾鎭驚散定其驚次以養脾丸理其脾庶可愈矣益脾鎮驚散人參錢半白术土炒茯苓各三錢硃砂八分釣藤二錢甘草五分炙右爲細末每服一錢燈心湯調服養脾丸人參白术土炒當歸川芎各三錢青皮醋炒木香煨黄連薑炙陳皮各二錢神麯炒山查縮砂仁麥芽各一錢炒右研細末神麯糊爲丸如麻子大每服二十丸陳倉米飲下臍寒瀉剪臍失䕶受寒冷糞色青白腹痛鳴散寒和氣飲極效温補調中湯最靈註臍寒瀉者多因斷臍失䕶風冷乘入傳於大腸遂成寒瀉之證其候糞色青白腹痛腸鳴先用和氣飲温散之再以調中湯温補之庶治得其要矣和氣飲蒼术紫蘇防風赤苓豆豉藿香陳皮厚樸薑炒炙甘草引用生薑燈心水煎服方歌和氣飲具温散功蒼术紫蘇共防風赤苓豆豉藿香葉陳皮厚樸甘草同調中湯人參茯苓藿香白术土炒炙甘草木香煨香附製縮砂仁引用煨薑水煎服方歌臍寒瀉用調中湯人參白术煨木香藿香茯苓同香附縮砂炙草引煨薑脾虚瀉脾虚食後即作瀉腹滿不渇少精神面黄懶食肌消瘦參苓白术奏竒勲註脾虚瀉者多因脾不健運故每逄食後作瀉腹滿不渇精神短少面黄懶食肌肉消痩也宜用參苓白术散以補脾其瀉自止參苓白术散方見脾疳飱瀉清氣下陷失健運完穀不化飱瀉名補中益氣湯升補乆瀉腸滑用四神註飱瀉者或因春傷風邪清氣下䧟脾失健運以致完穀不化也治者須補養脾土用補中益氣湯升其中氣若泄瀉日乆腸滑不禁者用四神丸治之補中益氣湯人參黄耆蜜炙當歸土炒白术土炒炙甘草陳皮升麻土炒柴胡醋炒引用薑棗水煎服方歌飱瀉多因清陽陷補中益氣湯最騐參耆歸术草陳皮升麻柴胡功無限四神丸補骨脂四兩五味子肉豆䓻各二兩麵裹煨吳茱茰一兩炒水浸右爲細末生薑棗肉爲丸每服一錢米飲下水瀉脾胃濕盛成水瀉懶食溏瀉色多黄清濁不分溺短濇胃苓升陽除濕湯註水瀉者皆因脾胃濕盛以致清濁不分變成水瀉之證其候小便短濇懶食溏瀉色黄宜用胃苓湯以除濕若瀉乆不止則用升陽除濕湯治之其證自愈胃苓湯蒼术炒陳皮厚樸薑炒白术土炒茯苓炙甘草肉桂澤瀉豬苓引用生薑紅棗水煎服方歌濕瀉胃苓湯堪行蒼术陳皮厚樸同白术茯苓炙甘草肉桂澤瀉共豬苓升陽除濕湯蒼术炒陳皮防風神麯炒麥芽炒澤瀉炙甘草升麻羌活柴胡豬苓引用生薑水煎服方歌升陽除濕瀉不停蒼术陳皮共防風神麯麥芽澤甘草升麻羌活柴豬苓御纂醫宗金鑑卷五十二
