  text: 編輯幼科雜病心法要訣目録痰證門痰證總括燥痰清氣化痰丸蘇葶滚痰丸濕痰枳桔二陳湯桂苓甘术湯疝證門疝證總括寒疝烏頭桂枝湯金茱丸濕熱感寒疝烏頭梔子湯胎疝十味蒼蘗散金鈴散川楝丸隂腫疎風五苓散加味五苓散導赤散加味守效丸小腸氣加味香蘇散加味失笑散胡盧巴丸淋證門淋證總括寒淋五苓散熱淋十味導赤湯八正散石淋葵子散八正散血淋小薊飲子五淋散頭痛門頭痛總括風寒頭痛清空膏内熱頭痛加味茶調散腹痛門腹痛總括食痛小承氣湯香砂平胃散寒痛理中湯蟲痛錢氏安蟲散加減理中湯内食外寒腹痛藿香和中湯黄疸門黄疸總括陽黄茵蔯麻黄湯茵蔯蒿湯茵蔯五苓散陰黃茵蔯理中湯茵蔯四逆湯水腫門水腫總括風水腫越婢湯濕水腫貼臍法沉香琥珀丸風濕腫疏鑿飲茯苓導水湯蘇葶丸舟車神祐丸陽水大聖濬川散舟車神祐丸陰水實脾散金匱腎氣丸腹脹門腹脹總括虚脹香朴四君子湯實脹加味平胃散小承氣湯御纂醫宗金鑑卷五十四目録欽定四庫全書御纂醫宗金鑑卷五十四編輯幼科雜病心法要訣目録痰證門痰證總括燥痰清氣化痰丸蘇葶滚痰丸濕痰枳桔二陳湯桂苓甘术湯疝證門疝證總括寒疝烏頭桂枝湯金茱丸濕熱感寒疝烏頭梔子湯胎疝十味蒼蘗散金鈴散川楝丸隂腫疎風五苓散加味五苓散導赤散加味守效丸小腸氣加味香蘇散加味失笑散胡盧巴丸淋證門淋證總括寒淋五苓散熱淋十味導赤湯八正散石淋葵子散八正散血淋小薊飲子五淋散頭痛門頭痛總括風寒頭痛清空膏内熱頭痛加味茶調散腹痛門腹痛總括食痛小承氣湯香砂平胃散寒痛理中湯蟲痛錢氏安蟲散加減理中湯内食外寒腹痛藿香和中湯黄疸門黄疸總括陽黄茵蔯麻黄湯茵蔯蒿湯茵蔯五苓散陰黃茵蔯理中湯茵蔯四逆湯水腫門水腫總括風水腫越婢湯濕水腫貼臍法沉香琥珀丸風濕腫疏鑿飲茯苓導水湯蘇葶丸舟車神祐丸陽水大聖濬川散舟車神祐丸陰水實脾散金匱腎氣丸腹脹門腹脹總括虚脹香朴四君子湯實脹加味平胃散小承氣湯御纂醫宗金鑑卷五十四目録欽定四庫全書御纂醫宗金鑑卷五十四編輯幼科雜病心法要訣痰證門痰證總括痰因津液不四布陰盛為飲陽盛痰稠黏黄色為燥熱清稀色白乃濕寒註痰者水穀所化之津液不能四布留於胸中而成者也多因飲食無節或乳食過食厚味脾胃不能運化而生若陰氣素盛則化而為飲陽氣素盛則化而為痰稠黏黄色澁滯難出謂之燥痰清稀色白滑而易出謂之濕痰二者或宜清潤或宜通利治各不同也燥痰燥痰肺燥澁難出氣逆喘欬卧不舒面紅口亁小便赤清氣化痰滚痰孚註燥痰者痰因火動也火盛則痰多燥黏氣逆喘咳夜卧不寧面赤口乾小便黄赤輕者用清氣化痰丸清之重者用蘇葶滚痰丸下之清氣化痰丸膽南星九轉半夏各一兩五錢薑製橘紅枳實麩炒杏仁炒去皮尖栝蔞仁去油黄芩酒炒白茯苓各一兩右為細末薑汁為丸淡薑湯化服蘇葶滚痰丸方見食積欬𠻳濕痰濕痰脾濕􅂴飲食倦怠嗜卧面色黄痰多枳桔二陳劑飲多桂苓甘术湯註濕痰者因小兒過食生冷油膩之物有傷脾胃遂致脾土虚濕不能運化而成濕痰滑而易出脾虚不運故懶食脾主四肢故倦怠嗜卧脾屬土故面色多黄痰多者宜用枳桔二陳湯加蒼术白术除濕化痰飲盛者須用桂苓甘术湯扶陽散飲調治合宜而痰自化矣枳桔二陳湯方見哯乳桂苓甘术湯茯苓桂枝甘草生白术土炒引用生薑水煎服方歌桂苓甘术濕痰飲除濕利飲更扶陽茯苓桂枝生甘草白术土炒引生薑疝證門疝證總括諸疝厥隂任衇病外因風寒邪聚凝内因濕熱為寒鬱證皆牽睾引腹疼胎疝多因禀賦病總審熱縱寒痛疼血左不移氣右動濕則墜重虚墜輕註厥隂環隂器入少腹任衇起於中極之下以上毛際循腹裏上闗元故諸病疝莫不屬之也小兒病此多因先天不足本藏虚弱復因外感風邪内食生冷寒邪凝結而成者有之或因濕熱鬱於中復被寒邪束於外邪氣乘虚并於血隊流入厥隂厥隂屬肝其性急速故牽引睾丸少腹絞痛也又有胎疝一證多因孕婦啼泣過傷動於隂氣結聚不散令兒生下即成此證者大抵熱則多縱寒則多痛在血分者不移在氣分者多動濕腫墜則重虚腫墜則輕因證施治自切中病情矣寒疝寒濕内蓄日已深復被風冷水氣侵囊冷硬痛成寒疝烏頭桂枝金茱神註寒疝者因兒平日過食生冷或卧濕地以致隂結於内氣滯不行為日既久復為風冷所束水濕所傷故發時囊冷結硬牽引少腹作痛初得之兼表者以烏頭桂枝湯主之寒甚者以金茱丸治之烏頭桂枝湯桂枝赤芍藥甘草炙烏頭引用生薑水煎服方歌烏頭桂枝治寒疝解表溫中法最良廣桂枝同赤芍藥烏頭甘草引生薑金茱丸金鈴子肉一兩吳茱茰五錢右為細末酒煮麫糊為丸如麻子大每服數丸鹽湯下濕熱感寒疝厚味過度生濕熱復觸風寒疝氣成囊縱紅腫常刺痛烏頭梔子服即寧註小兒平素過食厚味致生濕熱濕熱之氣下行流入囊中復為風寒所束而疝證成矣發時囊縱紅腫常常刺痛當以烏頭梔子湯調治之庶疝可愈矣烏頭梔子湯烏頭梔子炒引用順流水入薑汁煎服方歌濕熱感寒疝氣疼烏頭梔子湯最靈梔子烏頭薑汁共順流水煎病即寧胎疝胎疝多因母過啼兒生胞硬痛無時輕用十味蒼蘗治重用金鈴川楝宜註胎疝者因孕婦啼泣過傷氣結不散蘊於胞中令兒生下胞硬疼痛輕者十味蒼蘗散主之重者以金鈴散或川楝丸主之十味蒼蘗散青皮醋炒川附子炮黄蘗南山查肉酒炒蒼术米泔水浸香附製益智仁元胡索醋炒桃仁甘草炙引用小茴香水煎服方歌十味蒼蘗治胎疝青皮川附蘗查蒼香附益智元胡索桃仁甘草引茴香金鈴散三棱莪术各三錢陳皮赤茯苓各五錢茴香三錢甘草二錢生㯽榔枳殻各三錢麩炒鈎藤鈎青皮各四錢炒南木香三錢金鈴子肉一兩右除㯽榔木香不過火餘焙共為細末每服半錢至一錢無灰酒調服川楝丸木香㯽榔三棱莪术各三錢青皮醋炒陳皮各四錢川楝肉八錢芫花五分醋炒辣桂二錢牽牛二錢仁生取巴豆三粒去油右為極細末麫糊為丸如麻子大每服三四丸薑湯送下陰腫陰囊腫大邪氣凝風癢濕墜熱多疼疏風五苓導赤散偏墜守效丸最靈註陰器者乃諸筋之總㑹也因邪客於少隂厥陰之經濕熱之氣與風冷之氣相搏氣不得通故結聚而隂囊腫大總之風盛多癢濕盛多墜熱盛多疼如外腎膚囊腫大癢痛墜下此風濕襲於下也宜疏風五苓散主之如外腎膚囊腫痛光亮此因心火移熱於小腸故也宜加味五苓散或導赤散主之更有偏墜一證或左或右睾丸作腫者此因食積不消濕氣下行故也宜加味守效丸主之疏風五苓散防風蒼术米泔水浸肉桂羌活豬苓澤瀉赤茯苓白术土炒引用生薑水煎服方歌隂腫疏風五苓散防風蒼术肉桂羌豬苓澤瀉赤苓术煎服之時入生薑加味五苓散金鈴子白术土炒澤瀉木通茴香炒赤茯苓橘核仁肉桂㯽榔豬苓引用生薑燈心水煎服方歌五苓散内用金鈴白术澤瀉與木通茴香赤苓橘核配肉桂㯽榔合豬苓導赤散方見不小便加味守效丸南星山查肉酒炒蒼术各二兩炒白芷半夏薑製橘核仁神麯各一兩炒海藻昆布各五錢吳茱萸青皮醋炒元胡索醋炒荔枝核各一兩炒右共為末神麯糊為丸如梧桐子大每服三十丸空心酒下小腸氣痛引腰脊小腸氣加味香蘇溫散宜上衝心痛失笑散有形胡盧巴丸醫註小腸氣一證其受病與疝氣等亦因濕氣在内而寒氣又束於外也發時少腹脹控睾丸引腰脊上衝心痛而不腫是也治宜分别形狀如引腰而痛者加味香蘇散溫散之痛而衝心氣者加味失笑散主之如少腹中有形如卵上下徃來痛不可􅃘者宜胡盧巴丸主之加味香蘇散蒼术米泔水浸陳皮川楝肉甘草蘇葉香附醋炒引用連鬚葱白水酒兑煎服方歌加味香蘇散蒼术廣陳皮與川楝肉甘草蘇葉香附同連鬚葱白共煎服加味失笑散五靈脂蒲黄隔紙炒元胡索各等分醋炒右為細末每服一二錢水酒調下胡盧巴丸胡盧巴炒川楝子各四錢核焙蒸去皮川烏去皮臍巴㦸肉各一錢五分茴香三錢吳茱萸二錢五分浸一宿焙半酒半醋牽牛二錢炒右共為細末酒麫糊為丸如梧桐子大每服數丸空心溫酒下淋證門淋證總括諸淋皆緣寒熱濕下移膀胱溲無時水道澁滯常作痛寒熱石血隨證醫註小兒淋證或因風寒襲入或因濕熱下移乘入膀胱以致水道澁滯欲出不出淋漓不斷甚至窒塞其間令兒作痛然必辨其為寒為熱為石為血分别治之則水道宣通淋自愈矣寒淋冷氣入胞成寒淋小便閉塞脹難禁淋漓不斷腹隱痛五苓倍桂小茴神註寒淋者皆因風寒乘入膀胱致下焦受冷遂成寒淋其候小便閉塞脹痛難禁不時淋漓少腹隱痛須以五苓散倍加肉桂小茴香治之其淋自愈五苓散白术土炒澤瀉豬苓肉桂小茴香赤茯苓水煎服方歌五苓治寒淋白术澤豬苓肉桂加倍用茴香赤茯苓熱淋膀胱蓄熱淋證成十味導赤有竒功小腹脹滿大便結急服八正莫少停註熱淋者膀胱蓄熱而成也小便不通淋漓澁痛以十味導赤湯主之若少腹脹滿引臍作痛大便秘結者以八正散主之十味導赤湯生地山梔子木通瞿麥滑石淡竹葉茵蔯蒿黄芩甘草生豬苓水煎服方歌十味導赤藥最靈生地山梔合木通瞿麥滑石淡竹葉茵蔯黄芩草豬苓八正散方見不小便石淋濕熱蓄久石淋成溲如沙石莖中疼輕者須用葵子散重則八正可相從註石淋者逢溺則莖中作痛常帶沙石之狀因膀胱蓄熱日久所致正如湯瓶久經火煉底結白磏也輕則葵子散主之重則八正散主之葵子散桑皮炒瞿麥梔子赤茯苓木通車前子甘草生葵子水煎服方歌葵子散治石淋證桑皮瞿麥山梔仁赤苓木通車前子甘草葵子共和匀八正散方見不小便血淋血淋心熱傷血分尿血同出莖中疼清利須用小薊飲莖中痛甚五淋從註血淋者葢因心熱傷於血分熱氣傳入於胞日久則尿血同出遂成血淋莖中不時作痛須以小薊飲子治之若莖中痛甚者五淋散主之小薊飲子通草滑石淡竹葉當歸小薊梔子炒甘草生生地蒲黄藕莭水煎空心服方歌小薊飲子治淋血通草滑石淡竹葉當歸小薊山梔甘生地蒲黄合藕節五淋散當歸赤芍苦葶藶黃芩炒木通梔子車前子淡竹葉滑石葵子甘草生赤茯苓引用葱白水煎服方歌五淋血淋莖中疼歸芍葶藶芩木通梔子車前淡竹葉滑石葵子草赤苓頭痛門頭痛總括小兒頭痛分表裏裏屬内熱表寒風風寒外閉須疎散内熱薫蒸以清攻註小兒頭痛之證不一有在表在裏之分在表者外感風寒也法宜疎散之在裏者内熱薫蒸也法宜清解之苟能調治得宜則頭痛自除矣風寒頭痛風寒頭痛屬太陽上及巔頂額角傍惡寒無汗身發熱加味清空自堪嚐註風寒頭痛者乃太陽經受邪也其候惡寒發熱上及巔頂下連額角不時作痛法宜取汗悉以清空膏主之如痛甚者於本方中加細辛熱盛便秘者於本方中加川大黄清空膏羌活防風柴胡川芎黄芩黄連甘草生引用生薑水煎服痛甚加細辛便秘加川大黄方歌風熱上攻頭疼痛加味清空膏最良羌防柴芎芩連草痛甚加辛便秘黄内熱頭痛内熱頭痛屬陽明鼻乾目痛齒頰疼清熱加味茶調治便秘加入大黄攻註胃熱頭痛病在陽明因小兒肥甘無節胃火上炎故發時鼻乾目痛上至頭下至齒頰痛無定時宜加味茶調散清之加味茶調散荆芥穗薄荷黄芩青茶葉石膏生白芷川芎引用生薑水煎服便秘者加川大黄方歌加味茶調治頭疼胃經積熱上攻冲荆穗薄荷芩茶葉石膏生用芷川芎腹痛門腹痛總括小兒腹痛有四因食寒蟲動痛相侵停食感寒相兼痛臨證醫治要詳分註小兒腹痛其證有四如寒痛食痛蟲痛停食感寒痛也須隨證施治寒則溫中食則消導蟲則安蟲停食感寒則消散調治合宜其痛自除矣食痛食痛傷食心胃痛食入即痛喜飲涼惡食腹滿吐便秘承氣平胃酌量嚐註食痛者皆因飲食不節積滯不化所致故食入即痛也其候喜飲涼水惡食腹滿吐酸便秘宜先以小承氣湯下之若下後仍痛者以香砂平胃散消導可也小承氣湯大黄枳實麩炒厚朴薑炒引用生薑水煎服方歌小承氣湯治腹痛腹硬煩渴便不通枳實厚朴大黄共煎服便利立時鬆香砂平胃散蒼术米泔水浸炒陳皮厚樸薑炒甘草炙縮砂研香附醋炒南山查神麯炒麥芽炒枳殻麩炒白芍炒引用生薑水煎服方歌香砂平胃傷食痛下後仍痛用此和蒼陳朴草縮香附山查麯麥枳殻芍寒痛寒痛中虚脾受寒尿爪俱白面青看喜熱腹滿或下利理中肢厥加附煎註寒痛者多因小兒中氣虚弱復為風冷所乘則脾經受寒故不時腹痛現證尿白爪甲白面多青喜飲熱或腹滿下利宜理中湯溫之若四肢厥冷兼屬少隂則加附子理中湯方見不乳蟲痛蟲痛不安腹因痛面色乍青乍赤白時痛時止吐清涎安蟲理中治最合註蟲痛者因腹中蟲動不安故腹中作痛其候面色乍赤乍青乍白其痛時作時止時吐清水切不可妄用攻下當以安蟲為主其痛即除新痛者錢氏安蟲散治之痛久不愈者加減理中湯治之錢氏安蟲散胡粉炒黃鶴蝨炒黃白礬枯川楝子各二錢五分去皮核右為細末每服一匙大者五分米飲調下痛時服加減理中湯方見蟲吐内食外寒腹痛内傷乳食外感寒發熱惡寒腹痛兼惡食嘔吐多啼呌藿香和中可急煎註小兒内傷乳食外感寒邪遂致食寒凝結腹中作痛其候發熱惡寒而更兼腹痛惡食嘔吐啼呌不已者以藿香和中湯治之藿香和中湯藿香砂仁研羌活蒼术米泔水浸陳皮厚朴薑炒甘草生山查香附炙白芷蘇葉川芎引用生薑水煎服方歌藿香和中治腹疼内傷食滯外寒風藿砂羌蒼陳朴草山查香附芷蘇芎黄疸門黄疸總括黄疸濕熱鬱蒸成徧身皆黄及目睛陽黄色亮身多熱陰黄色暗冷如氷註黄疸一證乃濕熱鬱久外發肌膚而然也其候徧身面目皆黄甚則深黃面如烟薰之狀其中又有陰陽之别如面紅口渴尿赤色亮身熱者乃脾家濕熱此陽黄也口不渴而色暗黄身冷如氷者乃脾腎寒濕此陰黄也治者宜分别施治陽黄陽黄無汗宜踈散茵蔯麻黃能發汗腹滿便秘茵蔯攻表裏無證茵苓善註陽黄一證原因濕熱而成治者當詳審之如表實無汗宜外發其汗茵蔯麻黃湯主之使黃從表解也裏實二便秘濇腹滿者宜茵蔯蒿湯下之使黄從裏解也若表有汗裏不便秘腹滿是表裏無證不可汗下惟利小便宜用茵蔯五苓散使黃從水道利之則愈茵蔯麻黃湯茵蔯蒿麻黄水煎加黃酒少許服之方歌兒發陽黄身無汗茵蔯麻黄湯極便麻黃茵蔯各等分量兒煎服有奇驗茵蔯蒿湯茵蔯蒿川大黄梔子引用燈心水煎服方歌裏實須用茵蔯湯梔子茵蔯生大黄燈心為引水煎服便利黃消體泰康茵蔯五苓散茵蔯蒿赤苓豬苓澤㵼白术土炒肉桂引用燈心水煎服方歌茵蔯五苓治黄病利水除濕有竒功术苓澤瀉豬苓桂茵蔯加入便自清陰黄隂黃多緣轉屬成脾濕腎寒兩虧生温脾茵蔯理中治溫腎茵蔯四逆靈註隂黄者乃脾濕腎寒兩虚而成此最為危候溫脾去黃以理中湯加茵蔯主之溫腎去黃以茵蔯四逆湯主之茵蔯理中湯方見不乳茵蔯四逆湯附子製乾薑茵蔯蒿甘草炙水煎服方歌茵蔯四逆湯附子共乾薑茵蔯炙甘草黄消病漸康水腫門水腫總括水腫俱屬脾肺經肺喘脾脹要分明上腫屬風宜汗散下腫屬濕利水靈通身腫者兼汗利喘則逐飲脹則攻再辨陽水與陰水攻瀉溫補貴變通註小兒水腫皆因水停於脾肺二經水停胸中則喘水停膈下則脹其間所腫部位不可不察如腫在腰以上者屬風法宜發汗腫在腰以下者屬濕法宜利水有通身上下皆腫者係風濕兩傷法宜汗利兼施腫而喘不得卧宜逐肺飲腫而脹滿便秘宜攻脾水腫從腹起至四肢者可治腫從四肢起至腹者不可治然又有陽水隂水之分宜詳别焉陽水屬實法宜攻泄陰水屬虚法宜溫補應證而施自無不效也風水腫腫在上者因風起急宜發汗莫從容越婢湯中加蒼术汗後全消病卽寧註上身腫者頭面肩臂至腰間皆腫也病因外感風邪法宜發汗則愈經所謂開鬼門是也以越婢加蒼术湯治之越婢湯麻黄石膏煆甘草生蒼术米泔水浸水煎服方歌越婢湯治風水腫麻黄甘草共石膏再加蒼术水煎服能使兒童腫即消濕水腫腫在下者因濕起急宜利水可安然外法貼臍如神妙内服沉香琥珀丸註下身腫者腰臍至兩足皆腫也病因脾經濕熱所成急用利水之法經所謂潔浄府是也外用貼臍法内服沉香琥珀丸貼臍法巴豆四錢去油水硍粉二錢硫黄一錢右研匀成餅先用新棉一片包藥布臍上外用帛縳時許自然瀉下惡水待下三五次去藥以粥補住沉香琥珀丸苦葶藶子一兩五錢郁李仁一兩五錢去皮防已七錢五分沉香一兩五錢陳皮七錢五分去白琥珀五錢杏仁五錢尖炒去皮蘇子五錢赤苓五錢澤瀉五錢共為細末煉蜜為丸如梧桐子大以麝香為衣每服一錢量兒大小與之用滚白水下風濕腫通身皆腫屬風濕外散内利最相宜峻攻則用疏鑿飲和劑茯苓導水醫水上攻肺喘不卧蘇葶定喘最相宜水停中州脹急滿舟車神祐量攻之註通身腫者頭面手足皆腫也得病之由内停濕飲外感風邪風濕相搏水道不利外攻肌表因而作腫也重者用疏鑿飲峻攻之輕者用茯苓導水湯和解之若水停上攻於肺喘急不得卧者以蘇葶丸瀉之水停中州脹滿者以舟車神祐丸攻之疏鑿飲商陸秦艽羌活椒目木通赤小豆茯苓皮大腹皮澤瀉㯽榔引用薑皮水煎服方歌疏鑿飲子風濕腫外發内利陸秦羌椒目木通赤小豆苓皮大腹澤㯽榔茯苓導水湯紫蘇陳皮白术土炒木香桑白皮炒麥冬去心赤茯苓澤瀉木𤓰大腹皮縮砂仁㯽榔引用燈心水煎服方歌和解茯苓導水湯紫蘇陳皮术木香桑皮麥冬赤苓澤木𤓰大腹縮㯽榔蘇葶丸方見痰飲喘急舟車神祐丸甘遂芫花大㦸各一兩俱醋炒大黄二兩黒牽牛四兩頭末青皮炒陳皮木香㯽榔各五錢輕粉一錢右為細末水丸如椒目大小兒二丸三丸大兒五丸七丸量服之滚白水送下陽水陽水身熱衇沉數小便赤濇大便難熱盛煩渴濬川散濕盛脹滿神祐丸量兒大小斟酌用應變而施勿一偏註陽水者小兒濕熱内鬱水道阻塞外攻肌表以致外腫内脹發熱口渴心煩小便短赤大便秘結法當泄水不可少緩熱盛煩渴者以大聖濬川散攻之濕盛脹滿者舟車神祐丸攻之須量兒大小視病輕重合宜而用勿執一偏過於峻攻徒傷正氣也大聖濬川散川大黄煨牽牛取頭末郁李仁各一兩木香三錢芒消三錢甘遂五分右為細末薑湯調下量兒大小用之舟車神祐丸方見風濕腫陰水陰水便利不煩熱須服實脾腎氣丸若服溫補俱無驗攻補兼施病始痊註陰水者因脾腎虚弱也脾虚不能制水腎虛不能主水以致外泛作腫内停作脹若二便不實身不熱心不煩者宜用實脾散金匱腎氣丸若服溫補之藥而無效驗者則是虛中有實也欲投攻下之劑恐小兒難堪若不攻之又豈可坐以待斃須攻補兼施或一補一攻或三補一攻或九補一攻審其進退俟有可攻之機以意消息藥與元氣相當始能逐邪而不傷正也必須忌鹽醬百日方可收功實脾散草果仁研大腹皮木𤓰木香研厚朴薑炒乾薑附子製白术土炒茯苓甘草炙引用棗二枚水煎服方歌實脾散治陰水腫草果大腹木𤓰香厚朴薑附术苓草虛者仍兼腎氣方金匱腎氣丸熱地黄一兩山藥八錢炒山茱萸八錢牡丹皮五錢茯苓一兩澤瀉五錢肉桂五錢淡附子五錢車前子五錢牛膝八錢右為細末煉蜜為丸如梧桐子大每服錢半白滚水送下腹脹門腹脹總括腹脹脾虚因久病胃實多由食滯停補虛健脾兼理氣攻食消導自然寧註腹脹之病脾胃二經主之有虛有實宜分晰焉虛者因久病内傷其脾實者因飲食停滯於胃虛則補脾實則消導調治合宜其脹自漸除矣虚脹久病脾虛失運健或因吐瀉暴傷脾食少卽脹精神倦面黃肌瘦四君宜註凡小兒久病脾虚或吐瀉暴傷脾氣健運失常所以飲食不化食少腹卽脹滿現證精神倦怠靣黄肌瘦此虚脹也宜用香朴四君子湯治之香朴四君子湯人參白术土炒白茯苓甘草炙香附製厚樸薑炒引用生薑水煎服方歌香朴四君治虚脹參术甘草共茯苓香附厚朴宜加入引薑煎服脹卽寧實脹飲食過度内傷胃停滯腹脹便不通潮熱煩渴形氣壯平胃承氣施治靈註小兒飲食過度則胃中停滯以致腹脹大便不利身體潮熱心煩口渴形氣壯實此實脹也輕者平胃散主之重者小承氣湯主之加味平胃散南蒼术炒厚樸薑炒大腹皮製甘草生陳皮萊菔子焙山查麥芽炒神麴炒引用生薑水煎服方歌加味平胃治實脹蒼术厚朴大腹皮甘草陳皮萊菔子山查麥芽炒神麴小承氣湯方見食痛御纂醫宗金鑑卷五十四欽定四庫全書御纂醫宗金鑑卷五十四編輯幼科雜病心法要訣痰證門痰證總括痰因津液不四布陰盛為飲陽盛痰稠黏黄色為燥熱清稀色白乃濕寒註痰者水穀所化之津液不能四布留於胸中而成者也多因飲食無節或乳食過食厚味脾胃不能運化而生若陰氣素盛則化而為飲陽氣素盛則化而為痰稠黏黄色澁滯難出謂之燥痰清稀色白滑而易出謂之濕痰二者或宜清潤或宜通利治各不同也燥痰燥痰肺燥澁難出氣逆喘欬卧不舒面紅口亁小便赤清氣化痰滚痰孚註燥痰者痰因火動也火盛則痰多燥黏氣逆喘咳夜卧不寧面赤口乾小便黄赤輕者用清氣化痰丸清之重者用蘇葶滚痰丸下之清氣化痰丸膽南星九轉半夏各一兩五錢薑製橘紅枳實麩炒杏仁炒去皮尖栝蔞仁去油黄芩酒炒白茯苓各一兩右為細末薑汁為丸淡薑湯化服蘇葶滚痰丸方見食積欬𠻳濕痰濕痰脾濕􅂴飲食倦怠嗜卧面色黄痰多枳桔二陳劑飲多桂苓甘术湯註濕痰者因小兒過食生冷油膩之物有傷脾胃遂致脾土虚濕不能運化而成濕痰滑而易出脾虚不運故懶食脾主四肢故倦怠嗜卧脾屬土故面色多黄痰多者宜用枳桔二陳湯加蒼术白术除濕化痰飲盛者須用桂苓甘术湯扶陽散飲調治合宜而痰自化矣枳桔二陳湯方見哯乳桂苓甘术湯茯苓桂枝甘草生白术土炒引用生薑水煎服方歌桂苓甘术濕痰飲除濕利飲更扶陽茯苓桂枝生甘草白术土炒引生薑疝證門疝證總括諸疝厥隂任衇病外因風寒邪聚凝内因濕熱為寒鬱證皆牽睾引腹疼胎疝多因禀賦病總審熱縱寒痛疼血左不移氣右動濕則墜重虚墜輕註厥隂環隂器入少腹任衇起於中極之下以上毛際循腹裏上闗元故諸病疝莫不屬之也小兒病此多因先天不足本藏虚弱復因外感風邪内食生冷寒邪凝結而成者有之或因濕熱鬱於中復被寒邪束於外邪氣乘虚并於血隊流入厥隂厥隂屬肝其性急速故牽引睾丸少腹絞痛也又有胎疝一證多因孕婦啼泣過傷動於隂氣結聚不散令兒生下即成此證者大抵熱則多縱寒則多痛在血分者不移在氣分者多動濕腫墜則重虚腫墜則輕因證施治自切中病情矣寒疝寒濕内蓄日已深復被風冷水氣侵囊冷硬痛成寒疝烏頭桂枝金茱神註寒疝者因兒平日過食生冷或卧濕地以致隂結於内氣滯不行為日既久復為風冷所束水濕所傷故發時囊冷結硬牽引少腹作痛初得之兼表者以烏頭桂枝湯主之寒甚者以金茱丸治之烏頭桂枝湯桂枝赤芍藥甘草炙烏頭引用生薑水煎服方歌烏頭桂枝治寒疝解表溫中法最良廣桂枝同赤芍藥烏頭甘草引生薑金茱丸金鈴子肉一兩吳茱茰五錢右為細末酒煮麫糊為丸如麻子大每服數丸鹽湯下濕熱感寒疝厚味過度生濕熱復觸風寒疝氣成囊縱紅腫常刺痛烏頭梔子服即寧註小兒平素過食厚味致生濕熱濕熱之氣下行流入囊中復為風寒所束而疝證成矣發時囊縱紅腫常常刺痛當以烏頭梔子湯調治之庶疝可愈矣烏頭梔子湯烏頭梔子炒引用順流水入薑汁煎服方歌濕熱感寒疝氣疼烏頭梔子湯最靈梔子烏頭薑汁共順流水煎病即寧胎疝胎疝多因母過啼兒生胞硬痛無時輕用十味蒼蘗治重用金鈴川楝宜註胎疝者因孕婦啼泣過傷氣結不散蘊於胞中令兒生下胞硬疼痛輕者十味蒼蘗散主之重者以金鈴散或川楝丸主之十味蒼蘗散青皮醋炒川附子炮黄蘗南山查肉酒炒蒼术米泔水浸香附製益智仁元胡索醋炒桃仁甘草炙引用小茴香水煎服方歌十味蒼蘗治胎疝青皮川附蘗查蒼香附益智元胡索桃仁甘草引茴香金鈴散三棱莪术各三錢陳皮赤茯苓各五錢茴香三錢甘草二錢生㯽榔枳殻各三錢麩炒鈎藤鈎青皮各四錢炒南木香三錢金鈴子肉一兩右除㯽榔木香不過火餘焙共為細末每服半錢至一錢無灰酒調服川楝丸木香㯽榔三棱莪术各三錢青皮醋炒陳皮各四錢川楝肉八錢芫花五分醋炒辣桂二錢牽牛二錢仁生取巴豆三粒去油右為極細末麫糊為丸如麻子大每服三四丸薑湯送下陰腫陰囊腫大邪氣凝風癢濕墜熱多疼疏風五苓導赤散偏墜守效丸最靈註陰器者乃諸筋之總㑹也因邪客於少隂厥陰之經濕熱之氣與風冷之氣相搏氣不得通故結聚而隂囊腫大總之風盛多癢濕盛多墜熱盛多疼如外腎膚囊腫大癢痛墜下此風濕襲於下也宜疏風五苓散主之如外腎膚囊腫痛光亮此因心火移熱於小腸故也宜加味五苓散或導赤散主之更有偏墜一證或左或右睾丸作腫者此因食積不消濕氣下行故也宜加味守效丸主之疏風五苓散防風蒼术米泔水浸肉桂羌活豬苓澤瀉赤茯苓白术土炒引用生薑水煎服方歌隂腫疏風五苓散防風蒼术肉桂羌豬苓澤瀉赤苓术煎服之時入生薑加味五苓散金鈴子白术土炒澤瀉木通茴香炒赤茯苓橘核仁肉桂㯽榔豬苓引用生薑燈心水煎服方歌五苓散内用金鈴白术澤瀉與木通茴香赤苓橘核配肉桂㯽榔合豬苓導赤散方見不小便加味守效丸南星山查肉酒炒蒼术各二兩炒白芷半夏薑製橘核仁神麯各一兩炒海藻昆布各五錢吳茱萸青皮醋炒元胡索醋炒荔枝核各一兩炒右共為末神麯糊為丸如梧桐子大每服三十丸空心酒下小腸氣痛引腰脊小腸氣加味香蘇溫散宜上衝心痛失笑散有形胡盧巴丸醫註小腸氣一證其受病與疝氣等亦因濕氣在内而寒氣又束於外也發時少腹脹控睾丸引腰脊上衝心痛而不腫是也治宜分别形狀如引腰而痛者加味香蘇散溫散之痛而衝心氣者加味失笑散主之如少腹中有形如卵上下徃來痛不可􅃘者宜胡盧巴丸主之加味香蘇散蒼术米泔水浸陳皮川楝肉甘草蘇葉香附醋炒引用連鬚葱白水酒兑煎服方歌加味香蘇散蒼术廣陳皮與川楝肉甘草蘇葉香附同連鬚葱白共煎服加味失笑散五靈脂蒲黄隔紙炒元胡索各等分醋炒右為細末每服一二錢水酒調下胡盧巴丸胡盧巴炒川楝子各四錢核焙蒸去皮川烏去皮臍巴㦸肉各一錢五分茴香三錢吳茱萸二錢五分浸一宿焙半酒半醋牽牛二錢炒右共為細末酒麫糊為丸如梧桐子大每服數丸空心溫酒下淋證門淋證總括諸淋皆緣寒熱濕下移膀胱溲無時水道澁滯常作痛寒熱石血隨證醫註小兒淋證或因風寒襲入或因濕熱下移乘入膀胱以致水道澁滯欲出不出淋漓不斷甚至窒塞其間令兒作痛然必辨其為寒為熱為石為血分别治之則水道宣通淋自愈矣寒淋冷氣入胞成寒淋小便閉塞脹難禁淋漓不斷腹隱痛五苓倍桂小茴神註寒淋者皆因風寒乘入膀胱致下焦受冷遂成寒淋其候小便閉塞脹痛難禁不時淋漓少腹隱痛須以五苓散倍加肉桂小茴香治之其淋自愈五苓散白术土炒澤瀉豬苓肉桂小茴香赤茯苓水煎服方歌五苓治寒淋白术澤豬苓肉桂加倍用茴香赤茯苓熱淋膀胱蓄熱淋證成十味導赤有竒功小腹脹滿大便結急服八正莫少停註熱淋者膀胱蓄熱而成也小便不通淋漓澁痛以十味導赤湯主之若少腹脹滿引臍作痛大便秘結者以八正散主之十味導赤湯生地山梔子木通瞿麥滑石淡竹葉茵蔯蒿黄芩甘草生豬苓水煎服方歌十味導赤藥最靈生地山梔合木通瞿麥滑石淡竹葉茵蔯黄芩草豬苓八正散方見不小便石淋濕熱蓄久石淋成溲如沙石莖中疼輕者須用葵子散重則八正可相從註石淋者逢溺則莖中作痛常帶沙石之狀因膀胱蓄熱日久所致正如湯瓶久經火煉底結白磏也輕則葵子散主之重則八正散主之葵子散桑皮炒瞿麥梔子赤茯苓木通車前子甘草生葵子水煎服方歌葵子散治石淋證桑皮瞿麥山梔仁赤苓木通車前子甘草葵子共和匀八正散方見不小便血淋血淋心熱傷血分尿血同出莖中疼清利須用小薊飲莖中痛甚五淋從註血淋者葢因心熱傷於血分熱氣傳入於胞日久則尿血同出遂成血淋莖中不時作痛須以小薊飲子治之若莖中痛甚者五淋散主之小薊飲子通草滑石淡竹葉當歸小薊梔子炒甘草生生地蒲黄藕莭水煎空心服方歌小薊飲子治淋血通草滑石淡竹葉當歸小薊山梔甘生地蒲黄合藕節五淋散當歸赤芍苦葶藶黃芩炒木通梔子車前子淡竹葉滑石葵子甘草生赤茯苓引用葱白水煎服方歌五淋血淋莖中疼歸芍葶藶芩木通梔子車前淡竹葉滑石葵子草赤苓頭痛門頭痛總括小兒頭痛分表裏裏屬内熱表寒風風寒外閉須疎散内熱薫蒸以清攻註小兒頭痛之證不一有在表在裏之分在表者外感風寒也法宜疎散之在裏者内熱薫蒸也法宜清解之苟能調治得宜則頭痛自除矣風寒頭痛風寒頭痛屬太陽上及巔頂額角傍惡寒無汗身發熱加味清空自堪嚐註風寒頭痛者乃太陽經受邪也其候惡寒發熱上及巔頂下連額角不時作痛法宜取汗悉以清空膏主之如痛甚者於本方中加細辛熱盛便秘者於本方中加川大黄清空膏羌活防風柴胡川芎黄芩黄連甘草生引用生薑水煎服痛甚加細辛便秘加川大黄方歌風熱上攻頭疼痛加味清空膏最良羌防柴芎芩連草痛甚加辛便秘黄内熱頭痛内熱頭痛屬陽明鼻乾目痛齒頰疼清熱加味茶調治便秘加入大黄攻註胃熱頭痛病在陽明因小兒肥甘無節胃火上炎故發時鼻乾目痛上至頭下至齒頰痛無定時宜加味茶調散清之加味茶調散荆芥穗薄荷黄芩青茶葉石膏生白芷川芎引用生薑水煎服便秘者加川大黄方歌加味茶調治頭疼胃經積熱上攻冲荆穗薄荷芩茶葉石膏生用芷川芎腹痛門腹痛總括小兒腹痛有四因食寒蟲動痛相侵停食感寒相兼痛臨證醫治要詳分註小兒腹痛其證有四如寒痛食痛蟲痛停食感寒痛也須隨證施治寒則溫中食則消導蟲則安蟲停食感寒則消散調治合宜其痛自除矣食痛食痛傷食心胃痛食入即痛喜飲涼惡食腹滿吐便秘承氣平胃酌量嚐註食痛者皆因飲食不節積滯不化所致故食入即痛也其候喜飲涼水惡食腹滿吐酸便秘宜先以小承氣湯下之若下後仍痛者以香砂平胃散消導可也小承氣湯大黄枳實麩炒厚朴薑炒引用生薑水煎服方歌小承氣湯治腹痛腹硬煩渴便不通枳實厚朴大黄共煎服便利立時鬆香砂平胃散蒼术米泔水浸炒陳皮厚樸薑炒甘草炙縮砂研香附醋炒南山查神麯炒麥芽炒枳殻麩炒白芍炒引用生薑水煎服方歌香砂平胃傷食痛下後仍痛用此和蒼陳朴草縮香附山查麯麥枳殻芍寒痛寒痛中虚脾受寒尿爪俱白面青看喜熱腹滿或下利理中肢厥加附煎註寒痛者多因小兒中氣虚弱復為風冷所乘則脾經受寒故不時腹痛現證尿白爪甲白面多青喜飲熱或腹滿下利宜理中湯溫之若四肢厥冷兼屬少隂則加附子理中湯方見不乳蟲痛蟲痛不安腹因痛面色乍青乍赤白時痛時止吐清涎安蟲理中治最合註蟲痛者因腹中蟲動不安故腹中作痛其候面色乍赤乍青乍白其痛時作時止時吐清水切不可妄用攻下當以安蟲為主其痛即除新痛者錢氏安蟲散治之痛久不愈者加減理中湯治之錢氏安蟲散胡粉炒黃鶴蝨炒黃白礬枯川楝子各二錢五分去皮核右為細末每服一匙大者五分米飲調下痛時服加減理中湯方見蟲吐内食外寒腹痛内傷乳食外感寒發熱惡寒腹痛兼惡食嘔吐多啼呌藿香和中可急煎註小兒内傷乳食外感寒邪遂致食寒凝結腹中作痛其候發熱惡寒而更兼腹痛惡食嘔吐啼呌不已者以藿香和中湯治之藿香和中湯藿香砂仁研羌活蒼术米泔水浸陳皮厚朴薑炒甘草生山查香附炙白芷蘇葉川芎引用生薑水煎服方歌藿香和中治腹疼内傷食滯外寒風藿砂羌蒼陳朴草山查香附芷蘇芎黄疸門黄疸總括黄疸濕熱鬱蒸成徧身皆黄及目睛陽黄色亮身多熱陰黄色暗冷如氷註黄疸一證乃濕熱鬱久外發肌膚而然也其候徧身面目皆黄甚則深黃面如烟薰之狀其中又有陰陽之别如面紅口渴尿赤色亮身熱者乃脾家濕熱此陽黄也口不渴而色暗黄身冷如氷者乃脾腎寒濕此陰黄也治者宜分别施治陽黄陽黄無汗宜踈散茵蔯麻黃能發汗腹滿便秘茵蔯攻表裏無證茵苓善註陽黄一證原因濕熱而成治者當詳審之如表實無汗宜外發其汗茵蔯麻黃湯主之使黃從表解也裏實二便秘濇腹滿者宜茵蔯蒿湯下之使黄從裏解也若表有汗裏不便秘腹滿是表裏無證不可汗下惟利小便宜用茵蔯五苓散使黃從水道利之則愈茵蔯麻黃湯茵蔯蒿麻黄水煎加黃酒少許服之方歌兒發陽黄身無汗茵蔯麻黄湯極便麻黃茵蔯各等分量兒煎服有奇驗茵蔯蒿湯茵蔯蒿川大黄梔子引用燈心水煎服方歌裏實須用茵蔯湯梔子茵蔯生大黄燈心為引水煎服便利黃消體泰康茵蔯五苓散茵蔯蒿赤苓豬苓澤㵼白术土炒肉桂引用燈心水煎服方歌茵蔯五苓治黄病利水除濕有竒功术苓澤瀉豬苓桂茵蔯加入便自清陰黄隂黃多緣轉屬成脾濕腎寒兩虧生温脾茵蔯理中治溫腎茵蔯四逆靈註隂黄者乃脾濕腎寒兩虚而成此最為危候溫脾去黃以理中湯加茵蔯主之溫腎去黃以茵蔯四逆湯主之茵蔯理中湯方見不乳茵蔯四逆湯附子製乾薑茵蔯蒿甘草炙水煎服方歌茵蔯四逆湯附子共乾薑茵蔯炙甘草黄消病漸康水腫門水腫總括水腫俱屬脾肺經肺喘脾脹要分明上腫屬風宜汗散下腫屬濕利水靈通身腫者兼汗利喘則逐飲脹則攻再辨陽水與陰水攻瀉溫補貴變通註小兒水腫皆因水停於脾肺二經水停胸中則喘水停膈下則脹其間所腫部位不可不察如腫在腰以上者屬風法宜發汗腫在腰以下者屬濕法宜利水有通身上下皆腫者係風濕兩傷法宜汗利兼施腫而喘不得卧宜逐肺飲腫而脹滿便秘宜攻脾水腫從腹起至四肢者可治腫從四肢起至腹者不可治然又有陽水隂水之分宜詳别焉陽水屬實法宜攻泄陰水屬虚法宜溫補應證而施自無不效也風水腫腫在上者因風起急宜發汗莫從容越婢湯中加蒼术汗後全消病卽寧註上身腫者頭面肩臂至腰間皆腫也病因外感風邪法宜發汗則愈經所謂開鬼門是也以越婢加蒼术湯治之越婢湯麻黄石膏煆甘草生蒼术米泔水浸水煎服方歌越婢湯治風水腫麻黄甘草共石膏再加蒼术水煎服能使兒童腫即消濕水腫腫在下者因濕起急宜利水可安然外法貼臍如神妙内服沉香琥珀丸註下身腫者腰臍至兩足皆腫也病因脾經濕熱所成急用利水之法經所謂潔浄府是也外用貼臍法内服沉香琥珀丸貼臍法巴豆四錢去油水硍粉二錢硫黄一錢右研匀成餅先用新棉一片包藥布臍上外用帛縳時許自然瀉下惡水待下三五次去藥以粥補住沉香琥珀丸苦葶藶子一兩五錢郁李仁一兩五錢去皮防已七錢五分沉香一兩五錢陳皮七錢五分去白琥珀五錢杏仁五錢尖炒去皮蘇子五錢赤苓五錢澤瀉五錢共為細末煉蜜為丸如梧桐子大以麝香為衣每服一錢量兒大小與之用滚白水下風濕腫通身皆腫屬風濕外散内利最相宜峻攻則用疏鑿飲和劑茯苓導水醫水上攻肺喘不卧蘇葶定喘最相宜水停中州脹急滿舟車神祐量攻之註通身腫者頭面手足皆腫也得病之由内停濕飲外感風邪風濕相搏水道不利外攻肌表因而作腫也重者用疏鑿飲峻攻之輕者用茯苓導水湯和解之若水停上攻於肺喘急不得卧者以蘇葶丸瀉之水停中州脹滿者以舟車神祐丸攻之疏鑿飲商陸秦艽羌活椒目木通赤小豆茯苓皮大腹皮澤瀉㯽榔引用薑皮水煎服方歌疏鑿飲子風濕腫外發内利陸秦羌椒目木通赤小豆苓皮大腹澤㯽榔茯苓導水湯紫蘇陳皮白术土炒木香桑白皮炒麥冬去心赤茯苓澤瀉木𤓰大腹皮縮砂仁㯽榔引用燈心水煎服方歌和解茯苓導水湯紫蘇陳皮术木香桑皮麥冬赤苓澤木𤓰大腹縮㯽榔蘇葶丸方見痰飲喘急舟車神祐丸甘遂芫花大㦸各一兩俱醋炒大黄二兩黒牽牛四兩頭末青皮炒陳皮木香㯽榔各五錢輕粉一錢右為細末水丸如椒目大小兒二丸三丸大兒五丸七丸量服之滚白水送下陽水陽水身熱衇沉數小便赤濇大便難熱盛煩渴濬川散濕盛脹滿神祐丸量兒大小斟酌用應變而施勿一偏註陽水者小兒濕熱内鬱水道阻塞外攻肌表以致外腫内脹發熱口渴心煩小便短赤大便秘結法當泄水不可少緩熱盛煩渴者以大聖濬川散攻之濕盛脹滿者舟車神祐丸攻之須量兒大小視病輕重合宜而用勿執一偏過於峻攻徒傷正氣也大聖濬川散川大黄煨牽牛取頭末郁李仁各一兩木香三錢芒消三錢甘遂五分右為細末薑湯調下量兒大小用之舟車神祐丸方見風濕腫陰水陰水便利不煩熱須服實脾腎氣丸若服溫補俱無驗攻補兼施病始痊註陰水者因脾腎虚弱也脾虚不能制水腎虛不能主水以致外泛作腫内停作脹若二便不實身不熱心不煩者宜用實脾散金匱腎氣丸若服溫補之藥而無效驗者則是虛中有實也欲投攻下之劑恐小兒難堪若不攻之又豈可坐以待斃須攻補兼施或一補一攻或三補一攻或九補一攻審其進退俟有可攻之機以意消息藥與元氣相當始能逐邪而不傷正也必須忌鹽醬百日方可收功實脾散草果仁研大腹皮木𤓰木香研厚朴薑炒乾薑附子製白术土炒茯苓甘草炙引用棗二枚水煎服方歌實脾散治陰水腫草果大腹木𤓰香厚朴薑附术苓草虛者仍兼腎氣方金匱腎氣丸熱地黄一兩山藥八錢炒山茱萸八錢牡丹皮五錢茯苓一兩澤瀉五錢肉桂五錢淡附子五錢車前子五錢牛膝八錢右為細末煉蜜為丸如梧桐子大每服錢半白滚水送下腹脹門腹脹總括腹脹脾虚因久病胃實多由食滯停補虛健脾兼理氣攻食消導自然寧註腹脹之病脾胃二經主之有虛有實宜分晰焉虛者因久病内傷其脾實者因飲食停滯於胃虛則補脾實則消導調治合宜其脹自漸除矣虚脹久病脾虛失運健或因吐瀉暴傷脾食少卽脹精神倦面黃肌瘦四君宜註凡小兒久病脾虚或吐瀉暴傷脾氣健運失常所以飲食不化食少腹卽脹滿現證精神倦怠靣黄肌瘦此虚脹也宜用香朴四君子湯治之香朴四君子湯人參白术土炒白茯苓甘草炙香附製厚樸薑炒引用生薑水煎服方歌香朴四君治虚脹參术甘草共茯苓香附厚朴宜加入引薑煎服脹卽寧實脹飲食過度内傷胃停滯腹脹便不通潮熱煩渴形氣壯平胃承氣施治靈註小兒飲食過度則胃中停滯以致腹脹大便不利身體潮熱心煩口渴形氣壯實此實脹也輕者平胃散主之重者小承氣湯主之加味平胃散南蒼术炒厚樸薑炒大腹皮製甘草生陳皮萊菔子焙山查麥芽炒神麴炒引用生薑水煎服方歌加味平胃治實脹蒼术厚朴大腹皮甘草陳皮萊菔子山查麥芽炒神麴小承氣湯方見食痛御纂醫宗金鑑卷五十四
