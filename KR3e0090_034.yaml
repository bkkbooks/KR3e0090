body:
  text: 編輯四診心法要訣目録望色聞聲問證切衇診法御纂醫宗金鑑卷三十四目録欽定四庫全書御纂醫宗金鑑卷三十四編輯四診心法要訣目録望色聞聲問證切衇診法御纂醫宗金鑑卷三十四目録欽定四庫全書御纂醫宗金鑑卷三十四編輯四診心法要訣上醫家造精微通幽顯未有不先望而得之者近世惟事切巧不事望神大失古聖先腎之㫖今採醫經論色診之文確然可法者編為四言合崔嘉彦四言衇訣名曰四診要訣實該望聞問切之道使後之為醫師者由是而教為弟子者由是而學熟讀習玩揣摩日久自能洞悉其妙則造精微通幽顯也無難矣望以目察聞以耳占問以言審切以指參明斯診道識病根源能合色衇可以萬全註此明望聞問切為識病之要道也經曰望而知之謂之神是以目察五色也聞而知之謂之聖是以耳識五音也問而知之謂之工是以言審五病也切而知之謂之巧是以指别五衇也神聖工巧四者乃診病要道醫者明斯更能互相參合則可識萬病根源以之療治自萬舉而萬當矣五行五色青赤黄白黒復生青如環常德註此明天以五行人以五藏化生五色相生如環之常德也木主化生青色火主化生赤色土主化生黄色金主化生白色水主化生黒色肝主化生青色心主化生赤色脾主化生黄色肺主化生白色腎主化生黒色變色大要生尅順逆青赤兼化赤黄合一黄白淡黄黒青深碧白黒淡黒白青淺碧赤白化紅青黄變緑黒赤紫成黒黄黧立註此明五色生尅順逆相兼合化之變色也五色相兼合化不可勝數而其大要則相生之順色有五相尅之逆色亦有五青屬木化赤屬火化黄屬土化白屬金化黒屬水化此五行所化之常色也木火同化火土同化土金同化金水同化水木同化金木兼化木土兼化土水兼化水火兼化火金兼化此五行所化之變色也如青赤合化紅而兼青之色如赤黄合化紅而兼黄之色如黄白合化黄而兼白淡黄之色如白黒合化黒而兼白淡黒之色如黒青合化黒而兼青深碧之色皆相生變色不病之順也如白青兼化青而兼白淺碧之色如赤白兼化白而兼赤之紅色如青黄兼化青而兼黄之緑色如黒赤兼化黒而兼赤之紫色如黄黒兼化黄而兼黒之黧色皆相尅變色為病之逆也醫能識此則可推五藏主病兼病吉凶變化之情矣天有五氣食人入鼻藏於五藏上華面頤肝青心赤脾藏色黄肺白腎黒五藏之常註此明色之本原出於天徵乎人五藏不病常色之診法也天以風暑濕燥寒之五氣食人從鼻而入風氣入肝暑氣入心濕氣入脾燥氣入肺寒氣入腎藏於人之五藏藴其精氣上華於面肝之精華化為色青心之精華化為色赤脾之精華化為色黄肺之精華化為色白腎之精華化為色黒也藏色為主時色為客春青夏赤秋白冬黒長夏四季色黄常則客勝主善主勝客惡註此明四時不病常色之診法也五藏之色隨五形之人而見百歲不變故為主色也四時之色隨四時加臨推遷不常故為客色也春氣通肝其色當青夏氣通心其色當赤秋氣通肺其色當白冬氣通腎其色當黒長夏四季之氣通脾其色當黄此為四時常則之色也主色者人之藏氣之所生也客色者歲氣加臨之所化也夫歲氣勝人氣為順故曰客勝主為善人氣勝歲氣為逆故曰主勝客為惡凡所謂勝者當青反白當赤反黒當白反赤當黒反黄當黄反青之謂也色衇相合青弦赤洪黄緩白浮黒沉乃平已見其色不得其衇得尅則死得生則生註此明色衇相合相反生死之診法也凡病人面青衇弦面赤衇洪面黄衇緩面白衇浮面黒衇沉此為色衇相合不病平人之候也假如病人已見青色不得弦衇此為色衇相反主為病之色衇也若得浮衇是得尅色之衇則主死也得沉衇是得生色之衇則主生也其餘他色皆倣此新病衇奪其色不奪久病色奪其衇不奪新病易已色衇不奪久病難治色衇俱奪註此以色衇相合診病新久難易之法也衇奪者衇微小也色奪者色不澤也新病正受邪制故衇奪也邪受未久故色不奪也久病受邪已久故色奪也久病不進故衇不奪也若新病而色衇俱不奪則正不衰而邪不盛也故曰易已久病色衇俱奪則正已衰而邪方盛也故曰難治色見皮外氣含皮中内光外澤氣色相融有色無氣不病命傾有氣無色雖困不凶註此以五色合五氣之診法也青黄赤白黒顯然彰於皮之外者五色也隱然含於皮之中者五氣也内光灼灼若動從紋路中映出外澤如玉不浮光油亮者則為氣色並至相生無病之容狀也若外見五色内無含映則為有色無氣經曰色至氣不至者死凡四時五藏五部五官百病見之皆死故雖不病命必傾也若外色淺淡不澤而内含光氣映出則為有氣無色經曰氣至色不至者生凡四時五藏五部五官百病見之皆生故雖病困而不凶也縞裹雄黄脾狀並臻縞裹紅肺縞裹朱心縞裹黒赤紫艷腎緣縞裹藍赤石青屬肝註此明氣色並至容狀之診法也縞白羅也如白羅裹雄黄映出黄中透紅之色是脾之氣色並至之容狀也如白羅裹淺紅映出淺紅罩白之色是肺之氣色並至之容狀也如白羅裹朱砂映出深紅正赤之色是心之氣色並至之容狀也如白羅裹黒赤映出黒中透赤紫艷之色是腎之氣色並至之容狀也如白羅裹藍赤映出藍中揚紅石青之色是肝之氣色並至之容狀也青如蒼璧不欲如藍赤白裹朱衃赭死原黒重漆炲白羽枯鹽雄黄羅裹黄土終難註此明四時百病五藏五部五官五色生死之診法也蒼璧碧玉也藍藍靛葉也經曰青欲如蒼璧之色即石青色生青色也不欲如藍即靛葉色死青色也衃血死血也赭代赭石也經曰赤欲如白裹朱即正赤色生紅色也不欲如衃赭即死血赭石之色死紅色也重漆光潤紫色也炲地上蒼枯黒土也經曰黒欲如重漆即光潤紫色生黒色也不欲如炲即枯黒土色死黒色也白羽白鵞羽也枯枯骨也鹽食鹽也經曰白欲如鵞羽即白而光澤如鵞羽之色生白色也不欲如枯鹽即枯骨食鹽之色死白色也經曰黄欲如羅裹雄黄即黄中透紅之色生黄色也不欲如黄土即枯黄土之色死黄色也舌赤卷短心官病常肺鼻白喘胸滿喘張肝目眥青脾病脣黄耳黒腎病深淺分彰註此以五色合五官主病虚實之診法也舌者心之官也舌赤心之病也色深赤焦卷者邪實也色淺紅滋短者正虚也鼻者肺之官也鼻白肺之病也色淺白喘而不滿者正虚也色淺白喘而胸滿者邪實也目者肝之官也目眥青肝之病也色深青者邪實也色淺青者正虚也口脣者脾之官也脣黄脾之病也色深黄者邪實也色淺黄者正虚也耳者腎之官也耳黒腎之病也色深黒者邪實也色淺黒者正虚也所謂深淺分彰者即下之所謂淺淡為虛深濃為實分明彰顯也左頰部肝右頰部肺額心頦腎鼻脾部位部見本色深淺病累若見他色按法推類註此以五色合五部主虚實賊微正五邪之診法也左頰肝之部也右頰肺之部也額上心之部也頦下腎之部也鼻者脾之部也本部見本色淺淡不及深濃太過者皆病色也假如鼻者脾之部位見黄本色則為本經自病正邪也若見白色則為子盜母氣虚邪也若見赤色則為母助子氣實邪也若見青色則為彼能尅我賊邪也若見黒色則為我能尅彼微邪也所謂按法推類者謂餘藏準按此法而推其類也天庭面首闕上喉咽闕中印堂候肺之原山根候心年壽候肝兩傍候膽脾胃鼻端頰腎腰臍顴下大腸顴内小府面王子膀當顴候肩顴外候臂顴外之下乃候手位根傍乳膺繩上候背牙車下股膝脛足位註此以上部候頭下部候足中部候藏府合五色主病之診法也闕中者兩眉之間謂之印堂中部之最髙者故應候肺之疾也印堂之上名曰闕上闕上至髪際名曰天庭天庭為上部之上故應候頭面之疾也闕上為上部之下故應候咽喉之疾也山根者兩目之間即下極也在肺下之部故應候心之疾也年壽者下極之下即鼻柱也在心下之部故應候肝之疾也面傍者年壽之左右膽附於肝故應候膽之疾也鼻端者年壽之下謂之面王即凖頭鼻孔也在肝下之部故應候脾之疾也鼻孔者即方上也脾胃相連故應候胃之疾也耳前之下謂之兩頰四藏居腹而皆一惟腎居脊而有兩故兩頰應候腎之疾也與腰臍對故又應候腰臍之疾也頰内髙骨謂之兩顴之下在腎下之部故應候大腸之疾也顴内者即兩顴之内也小府者謂小腸之府也小腸在大腸之上故應候之也準頭上至於庭皆謂之明堂準頭下至於頦皆謂之面王面王者即人中承漿之部也膀胱者腎之府也子處者即精室血海也皆居腎之下故面王應候子處膀胱之疾也此藏府上下内外之部位也五部以頦候腎者以水居極下且子處中通兩腎也以天庭候心者以火居極上故也以左頰候肝者以木位居左故也以右頰候肺者以金位居右故也以鼻候脾者以土位居中故也當顴者當兩顴骨之部也顴為骨之本而居外部之上故應候肩之疾也肩接乎臂故顴骨之外應候臂之疾也臂接乎手故顴外之下應候手部之疾也根傍者山根兩傍兩目内眥之部也而居内部之上故應候膺乳胸前之疾也兩頰候腰腎頰外從頰骨上引曰繩骨故應候背之疾也頰外從頰骨下引曰牙車骨故應候股下膝脛足部之疾也此肢體上下内外之部位也庭闕鼻端髙起直平顴頰蕃蔽大廣豐隆骨骼明顯壽享遐齡骨骼陷弱易受邪攻註此明五官五部强弱壽夭之診法也天庭闕中至鼻之端皆髙起直平面顴兩頰蕃蔽耳門皆大廣豐隆去之十歩皆見於外則為骨骼明顯也其人不但不病且享遐齡之壽也若天庭顴頰耳門諸處骨卑肉薄則為骨骼陷弱也其人不但不免於病且不壽也黄赤風熱青白主寒青黒為痛甚則痺攣恍白脫血微黒水寒痿黄諸虚顴赤勞纒註此以五色隨其所在五官五部内部外部上部下部主病之診法也黄赤為陽色故為病亦陽所以主風也熱也青白黒為陰色故為病亦陰所以主寒也痛也若黒甚在衇則麻痺在筋則拘攣恍白者淺淡白色也主大吐衄下血脱血也若無衄吐下血則為心不生血不榮於色也微黒者淺淡黒色也主腎病水寒也痿黄者淺淡黄色也主諸虚病也兩顴深紅赤色者主陰火上乗虛損勞疾也視色之鋭所向部官内走外易外走内難官部色衇五病交參上逆下順左古反阽註此以五色傳乗官部之診法也色之尖處為鋭凡病相傳相乗當視其色之鋭處所向何官何部則知起自何官何部傳乗何部何官生尅順逆自然明矣鋭處向外是内部走外部則為藏傳府府傳表易治之病也鋭處向内是外部走内部則為表傳府府傳藏難治之病也内走外走固有難易然更當以五部五官五色五衇五病交相推叅則又有微甚生死之别焉凡病色從下衝明堂而上額則為水尅火之賊邪故逆也從上壓明堂而下頦則為火侮水之微邪故順也反相反也阽危也男子以左為主女子以右為主男子之色自左衝右為從自右衝左為逆女子之色自右衝左為從自左衝右為逆逆者相反也相反故危也前以内外部位分順逆後以上下左右分順逆不可不知沉濁晦暗内久而重浮澤明顯外新而輕其病不甚半澤半明雲散易治摶聚難攻註此以五色晦明聚散别久重新輕之病易治難治之診法也色深為沉主病在内若更濁滯晦暗主久病與重病也色淺為浮主病在外若得光澤明顯主新病與輕病也若其色雖不枯晦亦不明澤主不甚之病也凡諸病之色如雲撤散主病將愈易治也摶聚凝滯主病漸進難治也上以内外上下左右分順逆此以淺深晦明聚散分順逆也黑庭赤顴出如拇指病雖小愈亦必卒死脣面黒青五官黑起擦殘汗粉白色皆死註此明非常之色診人暴死之法也出如拇指謂成塊成條摶聚不散也黒色出如拇指於天庭赤色出如拇指於兩顴此皆水火相射之候故病者雖或小愈亦必卒然而死也病者脣面青黒及五官忽起黒色白色如擦殘汗粉之狀雖不病亦皆主卒死也善色不病於義誠當惡色不病必主凶殃五官陷弱庭闕不張蕃蔽卑小不病神强註此明見其色不見其病之診法也善色者氣色并至之好色也其人於理當不病也惡色者沉深滯晦之色也其人即不病亦必主凶殃也凶殃者即相家所謂紅主焦勞口舌白主刑罰孝服黒主非災凶死青主憂訟暴亡之類也五官陷弱者謂五官骨陷肉薄也庭闕不張者謂天庭闕中不豐隆張顯也蕃蔽卑小者謂頰側耳門卑低不廣也此皆無病而有不壽之形若加惡色豈能堪哉其有不病者必其人神氣强旺素稱其形也肝病善怒面色當青左有動氣轉筋脇疼諸風掉眩疝病耳聾目視昏昏如將捕驚註此下五條皆明色病相合本藏自病虚實之診法也怒者肝之志故病則好怒也青者肝之色故病則面色當青也肝之部位在左故病則左脇有動氣而脇疼也肝主筋故病則轉筋也掉者動摇抽搐也眩者昬黑不明也肝主風故病則掉眩也疝主肝故病疝也肝與膽為表裏故病耳聾也此皆肝實之病若肝虚則目視昏昏無所見以肝開竅於目也肝虚則膽薄故不時而有如人將捕之驚也心赤善喜舌紅口乾臍上動氣心胸痛煩健忘驚悸怔忡不安實狂昬冒虚悲凄然註喜者心之志故病則好喜也赤者心之色故病則面色赤也心開竅於舌故病則舌赤紅也心主熱故病則口乾心煩也心之部位在上故病則臍上有動氣也胸者心肺之宮城也故病則心胸痛也健忘驚悸怔忡皆心神不安之病也熱乘心實則發狂昬冒也神怯心虚則凄然好悲也脾黃善憂當臍動氣善思食少倦怠乏力腹滿腸鳴痛而下利實則身重脹滿便閉註黃者脾之色故病則面色黃也憂思者脾之志故病則好憂思也脾之部位在中故病則當臍有動氣也脾主味故病則食少也脾主四肢故病則倦怠乏力也脾主腹故病則腹滿腸鳴痛而下利也此皆脾虚之病也脾主肉故實則病身重腹脹滿便閉也肺白善悲臍右動氣灑淅寒熱咳唾噴嚏喘呼氣促膚痛胸痺虚則氣短不能續息註白者肺之色故病則面色白也悲者肺之志故病則好悲也肺之部位在右故病則右脇有動氣也肺主皮毛故病則灑淅寒熱膚痛也咳𠻳唾痰噴嚏流涕喘呼氣促皆肺本病也胸者肺之府也故病則胸痺而痛也肺虚則胸中氣少故喘咳皆氣短不能續息也腎黑善恐臍下動氣腹脹腫喘溲便不利腰背少腹骨痛欠氣心懸如饑足寒厥逆註黑者腎之色故病則面色黑也恐者腎之志故病則好恐也腎之部位在下故病則臍下有動氣也腎主水故病則水蓄腹脹腫滿喘不得卧也腎開竅於二陰故病則溲便不利也腎主骨腎與膀胱為表裏故病則少腹滿背與骨俱痛也腎主欠故病則呵欠也腎邪上乘於心故病則心空如饑也諸厥屬下故病則足寒厥逆也正病正色為病多順病色交錯為病多逆母乘子順子乘母逆相尅逆凶相生順吉註此以五色合五病順逆生死之診法也假如肝病色青是正病正色若反見他色是病色交錯也若見黑色為母乘子相生之順也若見赤色為子乘母相生之逆也若見黄色為病尅色其病不加凶中順也若見白色為色尅病其病則甚凶中逆也曰相尅逆凶者謂相尅為凶凶中順尚可也凶中逆必凶也曰相生順吉者謂相生為吉如子乘母為吉中小逆也如母乘子為吉中大順也其餘四藏皆倣此色生於藏各命其部神藏於心外候在目光晦神短了了神足單失久病雙失即故註此以色合二目之神診病生死之法也五色生於五藏各命其部而見於面神藏於心雖不可得而識然外候在目視其目光晦暗此為神短病死之候也若目睛清瑩瞭瞭分明此為神足不病之候也單失者謂或色或神主久病也雙失者神色俱失故主即死也面目之色各有相當交互錯見皆主身亡面黃有救眥紅疹瘍眥黃病愈睛黃發黃註此以色合二目之色診病之法也面目之色各有相當之色如面之色肝青心赤脾黃肺白腎黑目之色如睛瞳黑烏珠青白珠白兩眥紅也若目青目赤目白目黑與面色但有不同皆為交互錯見病者皆主身亡也惟面色黄者為土未敗五行有救皆不死也若傷寒兩目眥紅則為發疹瘍之兆兩目皆黄則為病將愈之徵若兩睛通黄則為主發黄疸之候也閉目陰病開目病陽朦朧熱盛時瞑衄常陽絶戴眼陰脫目盲氣脫眶陷睛定神亡註此診目陰陽生死之法也凡病者閉目則為病在陰也開目則為病在陽也朦朧昬不了了非開目也則為熱盛傷神也視而時瞑非開目也則為衄血之常候也目上直視謂之戴眼則為陽絶之候也視不見物謂之目肓則為陰脫之候也目眶忽陷則為氣脫之候也睛定不轉則為神亡之候也五色既審五音當明聲為音本音以聲生聲之餘韻音遂以名角徵宮商並羽五聲註此明五音乃天地之正氣人之中聲也有聲而後有音故聲為音本音以聲生也聲之餘韻則謂之音非聲之外復有音也五色命乎五藏診人之病既已審矣而五音通乎五藏診人之病亦當明也角屬木通乎肝徵屬火通乎心宮屬土通乎脾商屬金通乎肺羽屬水通乎腎也中空有竅故肺主聲喉為聲路會厭門户舌為聲機脣齒扇助寛隘銳鈍厚薄之故註此明聲音各有所主之診法也凡萬物中空有竅者皆能鳴焉故肺象之而主聲也凡發聲必由喉出故為聲音之路也必因會厭開闔故為聲音門戸也必藉舌為宛轉故為聲音之機也必資之於牙齒脣口故為聲音之扇助也五者相須故能出五音而宣達逺近也若夫喉有寛隘寛者聲大隘者聲小舌有銳鈍銳者聲辨鈍者不真會厭有厚薄厚者聲濁薄者聲清脣亦有厚薄厚者聲遲薄者聲疾牙齒有疎宻疎者聲散宻者聲聚五者皆無病之聲音乃形質之禀賦不同也以此推之在喉在會厭在舌在齒在脣之故當有别也舌居中發喉音正宮極長下濁沉厚雄洪開口張㗁口音商成次長下濁鏗鏘肅清撮口脣音極短髙清柔細透徹尖利羽聲舌㸃齒音次短髙清抑揚咏越徵聲始通角縮舌音條暢正中長短髙下清濁和平註此明五藏聲音不病之常之診法也經曰天食人以五氣五氣入鼻藏於心肺上使五色修明聲音能彰故五藏各有正聲以合於五音也如舌居中發音自喉出者此宮之正音也其聲極長極下極濁有沉洪雄厚之韻屬土入通於脾開口張㗁音自口出者此商之正音也其聲次長次下次濁有鏗鏘清肅之韻屬金入通於肺撮口而發音自脣出者此羽之正音也其聲極短極髙極清有柔細尖利之韻屬水入通於腎以舌㸃齒成音者乃徵之正音也其聲次短次髙次清有抑揚咏越之韻屬火入通於心内縮其舌而成音者乃角之正音也其聲長短髙下清濁相和有條暢中正之韻屬木入通於肝此五藏不病之常聲也㗁者齒本肉也喜心所感忻散之聲怒心所感忿厲之聲哀心所感悲嘶之聲樂心所感舒緩之聲敬心所感正肅之聲愛心所感溫和之聲註前以咽喉會厭舌齒口脣稟賦不同以别非病之音此又復以人之情感物成聲以明非病之聲也如為喜感於心者則其發聲必忻悅以散也怒感於心者則其發聲必忿急而厲也哀感於心者則其發聲必悲悽以嘶也樂感於心者則其發聲必舒暢不迫也敬感於心者則其發聲必正直肅歛也愛感於心者則其發聲必溫柔以和也醫者於此比類而推不病之音自可識有病之音也五聲之變變則病生肝呼而急心笑而雄脾歌以漫肺哭促聲腎呻低微色剋則凶註此以五聲變而生病之診法也五聲失正則謂之變變則病生也肝呼而聲急肝聲失正故知病生肝也心笑而聲雄心聲失正故知病生心也脾歌而聲漫脾聲失正故知病生脾也肺哭而聲促肺聲失正故知病生肺也腎呻而低微腎聲失正故知病生腎也所謂色剋則凶者假如肝病呼急得相剋之白色主凶也餘藏倣此好言者熱懶言者寒言壯為實言輕為虚言微難復奪氣可知讝妄無倫神明已失註此以聲音診病寒熱虚實生死之法也中藏經曰陽候多語熱也陰候無聲寒也發言壯厲實也發言輕微虚也若言聲微小不能出喉欲言不能復言者此奪氣也譫言妄語不别親疎神明失也皆主死候失音聲重内火外寒瘡痛而久勞啞使然啞風不語雖治命難謳歌失音不治亦痊註此明失音為病不同之診也失音聲粗重乃内火為外寒所遏鬱於肺也若不粗重且瘡爛而痛日久流連者是因勞啞使然也小兒抽風不語大人中風不語皆謂之啞風雖竭力治之而命則終難挽回以金不能制木也謳歌失音者是因歌傷喉不治亦可痊也聲色既詳問亦當知視其五入以知起止心主五臭自入為焦脾香腎腐肺腥肝臊脾主五味自入為甘肝酸心苦肺辛腎鹹腎主五液心汗肝泣自入為唾脾涎肺涕註此明五入問病之診法也肺主五聲肝主五色前已詳明而問之之道亦所當知也經曰治之極於一一者問其因而得其情也其要在視其五入即可以知病情之起止也假如心主五臭凡病者喜臭惡臭皆主於心此統而言之也若分而言之則自入喜焦病生心也入脾喜香病生脾也入腎喜腐病生腎也入肺喜腥病生肺也入肝喜臊病生肝也脾主五味凡病者喜味惡味皆主於脾此統而言之也若分而言之則自入喜甘病生脾也入肝喜酸病生肝也入心喜苦病生心也入肺喜辛病生肺也入腎喜鹹病生腎也腎主五液凡病者多液少液皆主於腎此統而言之也若分而言之則自入出而為唾病生腎也入心出而為汗病生心也入肝出而為淚病生肝也入脾出而為涎病生脾也入肺出而為涕病生肺也其聲之微壯色之順逆法同推也百病之常晝安朝慧夕加夜甚正邪進退潮作之時精神為貴不衰者實困弱虚累註此以問知精神盛衰虚實之診法也凡病朝慧者以朝則人氣始生衛氣始行故慧也晝安者以日中則人氣長長則勝邪故安也夕加者以夕則人氣始衰邪氣始生故加也夜甚者以夜半則人氣入藏邪氣獨居於身故甚也此百病消長邪正進退之常也凡病來潮發作之時精神為貴者以病至精神不衰則為邪氣不能勝正正氣實也病至精神困弱則為正氣不能勝邪正氣虚也晝劇而熱陽旺於陽夜劇而寒陰旺於陰晝劇而寒陰上乗陽夜劇而熱陽下陷陰晝夜寒厥重陰無陽晝夜煩熱重陽無陰晝寒夜熱陰陽交錯飲食不入死終難却註此以問知晝夜起居診病陰陽氣血生死之法也晝陽也熱陽也凡病晝則増劇煩熱而夜安靜者是陽自旺於陽分氣病而血不病也夜陰也寒陰也凡病夜則增劇寒厥而晝安靜者是陰自旺於陰分血病而氣不病也凡病晝則增劇寒厥而夜安靜者是陰上乘於陽分之病也凡病夜則增劇煩熱而晝安靜者是陽下陷於陰分之病也凡病晝夜俱寒厥者是重陰無陽之病也凡病晝夜俱煩熱者是重陽無陰之病也凡病晝則寒厥夜則煩熱者名曰陰陽交錯若飲食不入其人之死終難却也食多氣少火化新痊食少氣多胃肺兩愆喜冷有熱喜熱有寒寒熱虚實多少之間註此以問知飲食之診法也食多氣盛此其常也若食多氣少非胃病火化即新愈之後貪食而穀氣未足也食少氣少此其常也若食少氣多則必是胃病不食肺病氣逆兩經之愆也喜冷者中必有熱喜熱者中必有寒虚熱則飲冷少實熱則飲冷多虚寒則飲熱少實寒則飲熱多故曰寒熱虚實辨在多少之間也大便通閉關乎虚實無熱陰結無寒陽利小便紅白主乎熱寒陰虚紅淺濕熱白泔註此以問知大小二便之診法也大便之利不利關乎裏之虚實也閉者為實若内外並無熱證則為陰結便閉也通者為虚若内外並無寒證則為陽實熱利也小便之紅與白主乎裏之寒熱也紅者為熱若平素淺紅淡黄則為陰虚也白者為寒若平素白渾如米泔則為濕熱所化也望以觀色問以測情召醫至榻不盼不驚或告之痛並無苦容色衇皆和詐病欺蒙註此以色合問診病真偽之法也望色祗可以知病之處非問不足以測病之情也凡病者聞醫至榻未有不盼視而驚起者也若不驚起而盼視者非無病必驕恣之輩也若病者或告之痛醫視其面並無痛苦容狀診其色衇皆利此乃詐病欺蒙醫士也衇之呻吟病者常情摇頭而言䕶處必疼三言三止言蹇為風嚥唾呵欠皆非病徵註此以聲合情診病真偽之法也醫家診衇病者呻吟以其為病所苦無奈之常情也凡欲言而先摇頭者是痛極艱於發聲摇頭以意示緩故也若以手䕶腹則為裏痛䕶頭則為頭痛但有所䕶之處必有所痛也持衇之時病人三言三止者謂欲言不言不言欲言如此者三也言蹇不能言者風病也若非言蹇風病而三言三止者是故為詐病之態也或衇之而嚥唾或衇之而呵欠皆非有病之徵以嚥唾者裏氣和呵欠者陰陽和故也舉此二事以診别其情之真偽則其他可推廣矣葢意在使病者不能售其欺醫者不致為其所欺而妄治也黑色無痛女疸腎傷非疸血畜衄下後黄面微黄黑紋繞口角饑瘦之容詢必噎膈註此以色合問診病之法也黑色當主痛詢之無痛病或為腎傷女勞疸也察之又非女疸其為血畜於中顔變於外可知然血畜之黑則必或吐衄或下血而後即轉黄色以瘀去故也面微黑黄者即淺淡之黧色也視其壽帶紋短若纒繞口角亦非畜血即相家所謂螣蛇入口主人餓死更視其人有饑餓削瘦之容可知病不能食詢問必是噎膈也白不脫血衇如亂絲問因恐怖氣下神失乍白乍赤衇浮氣怯羞愧神蕩有此氣色註此以色合情之診法也白者脫血虚色也察之并無脫血之證問之始知因恐怖也恐則血隨氣下故色白也怖則神隨氣失故衇如亂絲也乍白乍赤氣血不定之色也衇浮氣怯神氣不安之象也問之始知中心羞愧有此氣色也羞則氣收故氣怯也愧則神蕩故衇浮也舉此情色二端一以診病一以診情他可類推總在臨病者神而明之也眉起五色其病在皮榮變蠕動血衇可知眥目筋病脣口主肌耳主骨病焦枯垢泥註此以色合皮衇肉筋骨診病之法也凡眉間起五色主病在皮者以肺主皮毛也榮變五色蠕蠕然動主病在衇者以榮行血衇也眥目起五色主病在筋者以肝主筋也脣口起五色主病在肌者以脾主肉也耳起五色主病在骨者以腎主骨也焦枯垢泥者乃枯骨不澤不能外榮也此下皆診病之雜法也髪上屬火鬚下屬水皮毛屬金眉横屬木屬土之毫腋陰臍腹髪直如麻毛焦死故註此明毛髪診病之法也髪屬心而上長故屬火也鬚屬腎而下長故屬水也通身之毛屬肺而生皮故屬金也眉屬肝而横長故屬木也腋下陰下臍中腹中之毫屬脾以應四維故屬土也凡毛髪雖屬五藏然皆血液所生故喜光澤若髪直如麻鬚毛焦枯皆死候也陰絡從經而有常色陽絡無常隨時變色寒多則凝凝則黑青熱多則淖淖則黄紅註此以色合絡衇之診法也絡有陰陽隨陰經之絡為陰絡隨陽經之絡為陽絡也陰絡深而在内陽絡浮而在外在内者不可得而見也惟從經常之色而治之故曰有常色也在外者可得而見則隨四時推遷變色而治之故曰陽絡無常也然陽絡之變色亦不外乎診色之寒熱也寒多則衇凝凝則色青黑也熱多則衇淖淖則色黄紅也胃之大絡名曰虚里動左乳下有過不及其動應衣宗氣外泄促結積聚不至則死註此明宗氣診病法也胃之大絡名曰虚里貫膈絡肺出於左乳之下動不應衣以候宗氣若動之微而不見則為不及主宗氣内虚也若動之應衣而甚則為太過主宗氣外泄若三四至一止或五六至一止則主有積聚也若絶不至者則主死矣衇尺相應尺寒虚瀉尺熱病溫陰虚寒熱風病尺滑痺病尺濇尺大豐盛尺小虧竭註此明診尺之法也尺者謂從關至尺澤之皮膚也經曰衇急尺之皮膚亦急衇緩尺之皮膚亦緩衇小尺之皮膚亦減而少氣衇大尺之皮膚亦賁而起衇滑尺之皮膚亦滑衇濇尺之皮膚亦濇故曰衇尺相應也若診尺之皮膚寒則主虚瀉也診尺之皮膚熱則主病溫也非病溫則主陰虚寒熱勞疾也凡風病則尺之膚滑也痺病則尺之膚濇也氣血盛則尺之肉豐盛氣血虚則尺之肉虧竭也肘候腰腹手股足端尺外肩背尺肉膺前掌中腹中魚青胃寒寒熱所在病生熱寒註此明肘臂之診法也肘上曰髆肘下曰臂髆臂之節曰肘臂内曰尺尺外曰臂肘上候腰腹手主候股足臂主候肩背尺主候胸膺掌中主候腹中手大指本節後名曰魚或有青色或現青衇主候胃中寒也診其寒熱所在何處主病生寒熱也診臍上下上胃下腸腹皮寒熱腸胃相當胃喜冷飲腸喜熱湯熱無灼灼寒無滄滄註此明診臍之法也臍之上主候胃也臍之下主候腸也捫其上下之腹皮寒熱則知胃腸有寒熱相當之病也胃中有病每喜冷飲腸間有病多喜熱湯是其徵也然與之飲熱不可過於灼灼之熱與寒不可過於滄滄之寒葢恐其恣意有失惟當適其寒溫之宜也胃熱口糜懸心善饑腸熱利熱出黄如糜胃寒清厥腹脹而疼腸寒尿白飱瀉腸鳴註此明胃腸寒熱為病之診法也胃中有熱則上發口糜心空善饑腸中有熱則瀉出之物亦熱色黄如粥胃中有寒面清冷厥則腹脹而疼腸中有寒則小便尿白飱瀉腸鳴也木形之人其色必蒼身直五小五瘦五長多才勞心多憂勞事軟弱曲短一有非良註此下五條皆以色合形之診法也木形之人其色合青貴乎如碧蒼之潤也身直者象木之幹直也五小者謂頭小手足小象木之巔枝也五瘦五長者謂身肢象木之條細而長也多才者象木之用隨斵成材也多才之人必勞於心也多憂者象木之性不能自靜也多憂之人必勞於事也若一有形質軟弱曲短皆非良材也火形赤明小面五銳反露偏陋神清主貴重氣輕財少信多慮好動心急最忌不配註火形之人其色合赤貴乎明也五銳者謂頭額鼻面口象火上之尖銳也五反五露者謂五官反外露外也象火之性張顯外露也五偏五陋者謂五官不正醜陋也象火寄體隨物難定也凡此反露偏陋皆火敗形若神清而明是為得火之神則反主貴也重氣者象火屬陽多氣也輕財者象火之性多散也少信者象火之性易變也多慮者象火之明燭物也好動者象火之用不靜也心急者象火之性急速也最忌神痴氣濁色悖則為不配皆敗形也土形之狀黄亮五圓五實五厚五短貴全面圓頭大厚腹股肩容人有信行緩心安註土形之人其色合黄貴乎亮也五圓者象土之形圓也五實五厚者象土之質實厚也五短者象土之形敦短也圓實厚短五者俱全各成一形皆為土之正形則主貴也面圓頭大厚腹美肩美股皆土厚實之狀也容人有信行緩心安皆土德性之厚也金形潔白五正五方五朝五潤偏削敗亡居處靜悍行亷性剛為吏威肅兼小無傷註金形之人其色合白貴乎潔也五正五方者象金之形方正也五朝者金主骨骨骼貴内朝明堂也五潤者象金之藏於水也偏則不方正削則骨露陷敗亡之形也居處靜悍者象金靜而悍也行亷性剛者象金性潔而剛也為吏威肅者象金之性肅殺也兼小無傷者謂方正朝潤雖小無傷金之正形也水形紫潤面肥不平五肥五嫩五秀五清流動摇身常不敬畏内欺外恭粗濁主廢註水形之人其色合紫貴乎潤色面肥不平者象水之面廣而有波也五肥者象水之形廣大也五嫩者象水之性滋潤也五秀五清者象水之質清澈也肥嫩之質發行常流動摇身象水之流動不居也常不敬畏者象水之性趨下不上也内欺外恭者象水之質内虚無實也若神氣粗濁皆主廢形也貴乎相得最忌相勝形勝色微色勝形重至勝時年加感則病年忌七九猶宜慎恐註此明得其形不得其色之診法也假如木形之人法當色青是為形色相得不病而貴之形也若見黄色或見白色是為相勝主病而最忌者也見黄色者則為形勝色主病微見白色者則為色勝形主病重也然其生病必至於勝木之時之年加感外邪則病也年忌者謂五形之人形色相勝者凡至七歲是為年忌積九遞加至十六歲二十五歲三十四歲四十三歲五十二歲六十一歲皆年忌之年也當此之年加感為病則甚故曰尤宜戒慎恐懼也形有强弱肉有脆堅强者難犯弱者易干肥食少痰最怕如綿瘦食多火著骨難全註此明形肉生死之診法也五形之人得其純者皆謂之强得其駁者皆謂之弱强者加感之邪難犯弱者加感之邪易干也能食形肥者强也若食少而肥者非强也乃痰也肥人最怕按之如綿絮謂之無氣則主死矣食少而瘦者弱也若食多而瘦者非弱也乃火也瘦人最怕肉乾著骨謂之消瘦亦主死矣形氣已脱衇調猶死形氣不足衇調可醫形盛衇小少氣休治形衰衇大多氣死期註此以形合衇診生死之法也經曰形氣已脫九候雖調猶死者謂形脫無以貯氣也形氣俱虚寸口衇調可醫者謂形氣未相失也形盛而肥衇小少氣者謂氣不能勝形也形衰而瘦衇大多氣者謂形不能勝氣也故皆主死也頸痛喘疾目裹腫水面腫風水足腫石水手腫至腕足腫至踝面腫至項陽虚可嗟註此明形腫生死之診法也視其病者人迎頸衇大動主喘不得卧之疾也目裹上下腫者主有水氣之病也從面腫起者名曰風水陽水也從足脛腫起者名曰石水陰水也若手腫至腕足腫至踝面腫至項非水也乃陽氣虚結不還之死證也頭傾視深背曲肩隨坐則腰痿轉摇遲回行則僂俯立則振掉形神將奪筋骨虺頽註此明形憊死候之診法也經曰夫五藏者身之强也頭者精明之府頭傾視深精神將奪矣背者胸中之府背曲肩隨府將壞矣腰者腎之府轉摇艱難腎將憊矣膝者筋之府屈伸不能行則僂俯筋將憊矣骨者髓之府不能久立行則振掉骨將憊矣凡此形神將奪筋骨虺頽之形狀故皆主死候也太陰情狀貪而不仁好入惡出下意貌親不隨時務後動於人長大似僂其色黮黮註此明陰陽之人之情狀以别陰陽盛衰法也太陰陰盛而過柔故貪而不仁也好入惡出陰性藏也下意貌親陰性卑柔也不隨時務陰喜靜也後動於人陰性遲也長大者陰盛之形也似僂者好曲身傴僂下意之態也其色黑黮黮陰盛之色也此太陰人之情狀也少陰情狀小貪賊心喜失慍得傷害無恩立則險躁寡和無親行如伏鼠易懼易欣註少陰陰微而殘忍故貪小而賊心也喜失慍得陰性嫉妬也傷害無恩陰性殘忍也立則險躁陰性危險也寡和無親陰性冷落也行如伏鼠陰性隱伏也易懼易欣謂如鼠之得失忻然而進懼然而退也此少陰人之情狀也太陽情狀自大軒昻仰胸挺腹足髙氣揚志大虚說作事好强雖敗無悔自用如常註太陽陽盛而過剛故自大軒昻仰胸挺腹足髙氣揚也好志大者陽性好剛强也好虚說者陽性好誇張也作事好强雖事敗而不悔者以其常好自用自是亦陽過剛果於斷也此太陽人之情狀也少陽情狀諟諦自貴志小易盈好外不内立則好仰行則好摇兩臂兩肘常出於背註少陽陽微而明小故諟諦小察自貴小官志小易盈滿也好外交而不内附者陽之性外也立則好仰陽之性上也行則好摇陽之性動也兩臂兩肘常出於背者亦陽之性喜露而不善藏也此少陽人之情狀也得陰陽正平和之人無為懼懼無為忻忻婉然從物肅然自新謙謙君子藹藹吉人註此明陰陽和平人之情狀也無為懼懼者中心有所主而威武不能屈也無為忻忻者外物不能惑而富貴不能淫也婉然從物者謂豁然而大公物來而順應也肅然自親者謂尊嚴以方外恭敬以直内也夫如是之人天必祐之人必愛之福禄綏之焉得不謂之謙謙君子藹藹吉人也哉明此五者其人之陰陽盛衰自可見矣編輯四診心法要訣下四言衇訣始自漢張仲景平衇法宋崔嘉彦衍之明李時珍刪補及李中梓又補其缺畧刪其差謬復加註釋固已文簡義該矣然猶有與經義不合者今皆刪去其未備者補之衇為血府百體貫通寸口動衇大會朝宗註經曰衇者血之府也周身血衇運行莫不由此貫通故曰百體貫通也難經曰十二經中皆有動衇獨取寸口以决死生寸口者左右寸闗尺手太陰肺經動衇也為衇之大要會也故曰寸口動衇大會朝宗也診人之衇髙骨上取因何名闗界乎寸尺註凡診人之衇令仰其手視掌後有髙骨隆起即是關部衇也醫者覆手取之先將中指取定關部方下前後二指於寸尺之上病人長則下指宜疎病人短則下指宜密因其界乎寸尺二部之間故命名曰關至魚一寸至澤一尺因此命名陽寸陰尺註從髙骨上至魚際長一寸因此命名曰寸從髙骨下至尺澤長一尺因此命名曰尺寸部候上故為陽也尺部候下故為陰也右寸肺胸左寸心膻右關脾胃左肝膈膽三部三焦兩尺兩腎左小膀胱右大腸認註右寸浮候胸中沉以候肺左寸浮候膻中沉以候心右關浮以候胃沉以候脾左關浮候膈膽沉以候肝兩尺沉俱候腎左尺浮候小腸膀胱右尺浮候大腸膻膻中即包絡也五藏皆一惟腎有二故曰兩尺候兩腎也然内經言府不及膽者以寄於肝也不及大小腸膀胱者以統於腹中也不及三焦者以寸候胸中主上焦也關候膈中主中焦也尺候腹中主下焦也此遵内經分配三部診衇法也至偽訣以大小腸配於寸上以三焦配於左尺以命門配於右尺其手厥陰包絡竟置而不言悉屬不經滑壽以左尺候小腸膀胱前陰之病右尺候大腸後陰之病可稱千古隻眼也浮外候府沉内候藏之說詳於卷末命門屬腎生氣之原人無兩尺必死不痊註兩腎之中名曰命門命門居兩腎之中故兩尺屬之命門之少火即腎間動氣是為生氣之原也人若無兩尺衇則生氣絶矣病者必死不能痊也關衇一分右食左風右為氣口左為人迎註陰得尺中一寸陽得寸内九分一寸九分寸關尺衇三分分之今曰關衇一分乃關上之一分也左關一分名人迎肝膽衇也肝膽主風故人迎緊盛主乎傷風右關一分名氣口脾胃衇也脾胃主食故氣口緊盛主乎傷食此創自叔和試之於診每多不應然為後世所宗不得不姑存其說觀内經以足陽明胃經頸上之動衇為人迎手太陰肺經髙骨之動衇為氣口足知其謬矣衇有七診曰浮中沉上竟下竟左右推尋註浮者輕下指於皮衇間所得之衇也沉者重下指於筋骨間所得之衇也中者不輕不重下指於肌肉間所得之衇也上者兩寸也竟者即内經上竟上者胸喉中事也下者兩尺也竟者即内經下竟下者少腹腰股脛足中事也左右者左右手衇也此七診者乃推尋取衇之法也非謂内經獨大獨小獨寒獨熱獨遲獨疾獨陷下七診之衇也男左大順女右大宜男尺恒虚女尺恒實註天道陽盛於左地道陰盛於右故男左女右衇大為順宜也天之陽在南陰在北地之陽在北陰在南陽道常饒陰道常虧故男寸恒實尺恒虚女寸恒虚尺恒實也又有三部曰天地人部各有三九候名焉額頰耳前寸口岐銳下足三陰肝腎脾胃註此遵内經三部九候十二經中皆有動衇之診法也三部謂上中下也曰天地人謂上中下三部有天地人之名也部各有三九候名焉謂三部各有天地人三而三之合為九候之名也額頰耳前謂兩額兩頰耳前也上部天兩額之動衇當頷厭之分足少陽衇氣所行以候頭角者也上部地兩頰之動衇即地倉人迎之分足陽明衇氣所行以候口齒者也上部人耳前之動衇即和髎之分手少陽衇氣所行以候耳目者也寸口岐銳謂寸口岐骨銳骨也中部天乃掌後經渠之次寸口之動衇手太陰衇氣所行以候肺者也中部地乃手大指次指岐骨間合谷之動衇手陽明衇氣所行以候胸中者也中部人乃掌後銳骨下神門之動衇手少陰衇氣所行以候心者也下足三陰謂五里太谿箕門肝腎脾胃也下部天乃氣衝下三寸五里之動衇足厥陰衇氣所行以候肝者也下部地乃内踝後跟骨傍太谿之動衇足少陰衇氣所行以候腎者也下部人乃魚腹上越筋間箕門之動衇足太陰衇氣所行以候脾胃者也寸口大會五十合經不滿其動無氣必凶更加疎數止還不能短死歲内期定難生註寸口動衇五十一止合於經常不病之衇也若四十動一止一藏無氣主四歲死三十動一止二藏無氣主三歲死二十動一止三藏無氣主二歲死十動一止四藏無氣主一歲死不滿十動一止五藏無氣若更乍數乍疎止而不能即還則可期短死一歲之内必難生也五藏本衇各有所管心浮大散肺浮濇短肝沉弦長腎沉滑軟從容而和脾中遲緩註此言五藏各有所管之本衇必皆不大不小從容而和始為五藏不病之衇也四時平衇緩而和匀春弦夏洪秋毛冬沉註此言四時各有應見之平衇必皆不疾不徐緩而和匀始為四時不病之衇也太過實强病生於外不及虚微病生於内註外因六氣風寒暑濕燥火之邪衇必洪大緊數弦長滑實而太過矣内因七情喜怒憂思悲恐驚之傷衇必虚微細弱短濇濡芤而不及矣飲食勞倦診在右關有力為實無力虚看註凡病外不因六氣内不因七情為不内外因内傷飲食勞倦也飲食傷胃勞倦傷脾故診在右關飲食傷形為有餘故右關衇有力勞倦傷氣為不足故右闗衇無力也三因百病之衇不論陰陽浮沉遲數滑濇大小凡有力皆為實無力皆為虚經曰諸陽衇按之不鼓諸陰衇按之鼓甚此之謂與凡診病衇平旦為準虚靜寧神調息細審註經曰常以平旦陰氣未動陽氣未散飲食未進經衇未盛絡衇調勻氣血未亂乃可診有過之衇又曰診衇有道虚靜為寶言無思無慮以虚靜其心惟神凝於指下也調息細審者言醫家調勻自己氣息精細審察也一呼一吸合為一息衇來四至平和之則五至無疴閏以太息三至為遲遲則為冷六至為數數則熱證轉遲轉冷轉數轉熱註醫者調勻氣息一呼衇再至一息衇再至呼吸定息衇來四至乃和平之準則也然何以五至無疴乎人之氣息時長時短凡鼓三息必有一息之長鼓五息又有一息之長名為太息如三歲一閏五歲再閏也言衇必以四至為平五至便為太過惟正當太息之時始曰無疴此息之長非衇之急也若非太息正合四至也至於性急之人五至為平衇不拘太息之例葢性急衇亦急也若一息而衇三至即為遲慢而不及矣遲主冷病若一息而衇遂六至即為急數而太過矣數主熱病若一息僅得二至甚而一至則轉遲而轉冷矣若一息七至甚而八至九至則轉數而轉熱矣一至二至八至九至皆死衇也遲數既明浮沉須别浮沉遲數辨内外因外因於天内因於人天有陰陽風雨晦明人喜憂怒思悲恐驚註浮衇法天候表之疾即外因也沉衇法地候裏之病即内因也外因者天之六氣風風淫末疾寒寒淫陰疾暑暑淫心疾濕濕淫腹疾燥燥淫涸疾火火淫陽疾是也内因者人之七情喜傷心怒傷肝憂思傷脾悲傷肺恐傷腎驚傷心也浮沉已辨滑濇當明濇為血滯滑為氣壅註此上六衇為諸衇之提綱以浮沉綂諸浮上沉下之部位也以遲數綂諸三至六至之至數也以滑濇綂諸滑流濇滯之形狀也衇象雖多然不屬部位則屬至數不屬至數則屬形狀總不外此六衇故為諸衇之提綱也浮衇皮衇沉衇筋骨肌肉候中部位綂屬註皮衇取之而得者謂之浮衇筋骨取之而得者謂之沉衇此以上下部位而得名也凡衇因部位而得名者皆綂乎浮沉故曰部位綂屬也心肺俱浮以皮毛取之而得者肺之浮也以血衇取之而得者心之浮也故曰浮衇皮衇肝腎俱沉以筋平取之而得者肝之沉也以至骨取之而得者腎之沉也故曰沉衇筋骨肌肉在浮沉之間故曰候中也浮無力濡沉無力弱沉極力牢浮極力革註浮而無力謂之濡衇沉而無力謂之弱衇浮而極有力謂之革衇沉而極有力謂之牢衇三部有力其名曰實三部無力其名曰虚註浮中沉三部俱有力謂之實衇浮中沉三部俱無力謂之虚衇三部無力按之且小似有似無微衇可考註浮中沉三部極無力按之且小似有似無謂之微衇三部無力按之且大渙漫不収散衇可察註浮中沉三部極無力按之且大渙漫不収謂之散衇惟中無力其名曰芤推筋着骨伏衇可求註浮沉有力中取無力謂之芤衇推筋着骨按之始得謂之伏衇已上十衇皆以部位而得名者故皆綂於浮沉也三至為遲六至為數註一呼一吸謂之一息一息三至謂之遲衇一息六至謂之數衇此以衇之至數而得名也凡衇因至數而得名者皆綂乎遲數也四至為緩七至疾衇註一息四至謂之緩衇一息七至謂之疾衇緩止曰結數止曰促凡此之證皆綂至數動而中止不能自還至數不乖代則難痊註四至緩衇時而一止謂之結衇六至數衇時而一止謂之促衇結促之衇動而中止即能自還若動而中止不能自還須臾復動或十至或二三十至一止其至數不乖謂之代衇難痊謂不滿五十動而止合經難痊之死衇也已上五衇皆以至數而得名者故皆綂於遲數也形狀如珠滑溜不定往來濇滯濇衇可證註形狀如珠滑溜不定謂之滑衇進退維艱往來滯濇謂之濇衇此以衇之形狀而得名也凡衇以形狀而得名者皆綂乎滑濇也弦細端直且勁曰弦緊比弦粗勁左右彈註狀類弓弦細而端直按之且勁謂之弦衇較弦則粗按之且勁左右彈指謂之緊衇來盛去衰洪衇名顯大則寛濶小則細減註上來應指而盛下去減力而衰謂之洪衇衇形粗大濶然謂之大衇衇形細減如絲謂之小衇即細衇也如豆亂動不移約約長則迢迢短則縮縮註其形如豆亂動約約動摇不移謂之動衇來去迢迢而長謂之長衇來去縮縮而短謂之短衇已上八衇皆以形狀而得名者故皆綂於滑濇也浮陽主表風淫六氣有力表實無力表虚浮遲表冷浮緩風濕浮濡傷暑浮散虚極浮洪陽盛浮大陽實浮細氣少浮濇血虚浮數風熱浮緊風寒浮弦風飲浮滑風痰註浮陽衇主表風邪六氣外因之病皆從表入故屬之也浮而有力表實風病也浮而無力表虚風病也遲寒衇也故曰表冷緩濕衇也故曰風濕濡氣虚衇也氣虚則傷暑故曰浮濡傷暑也散氣散衇也氣散則虚極故曰浮散虚極也浮洪陽盛衇故曰陽盛也浮大陽實衇故曰陽實也細氣少衇氣少不充故曰氣少也濇血少衇血少枯滯故曰血虚也數熱衇也故曰風熱緊寒衇也故曰風寒弦飲衇也故曰風飲滑痰衇也故曰風痰沉陰主裏七情氣食沉大裏實沉小裏虚沉遲裏冷沉緩裏濕沉緊冷痛沉數熱極沉濇痺氣沉滑痰食沉伏閉鬱沉弦飲疾註沉陰衇主裏七情氣食内因之病皆由裏生故屬之也大有餘衇也故曰裏實小不足衇也故曰裏虚遲寒衇也故曰裏冷緩濕衇也故曰裏濕緊寒衇也故曰冷痛數熱衇也故曰熱極濇血滯衇故曰痺氣滑痰食衇故曰痰食伏痛甚不得吐瀉衇也故曰閉鬱弦飲衇也故曰飲疾濡陽虚病弱陰虚疾微主諸虚散為虚劇註濡為陽分無力衇故主諸陽虚之病弱為陰分無力衇故主諸陰虚之病微為陰陽血氣不足衇故主諸虚散為元氣散之衇故曰虚劇也革傷精血半產帶崩牢疝癥瘕心腹寒疼註革内空之衇故主男子亡血傷精之病婦人半產崩帶之疾牢内堅之衇故主諸疝癥瘕心腹寒冷疼痛之病也虚主諸虚實主諸實芤主失血隨見可知註虚為三部無力衇故主諸虚實為三部有力衇故主諸實芤為榮空之衇故主失血然此三衇皆隨所見之部位可知其上下内外之病也遲寒主藏陰冷相干有力寒痛無力虚寒註遲陰衇也藏屬陰故主之凡陰冷之病皆屬之也有力為寒實作痛無力為寒虚痛也數熱主府數細陰傷有力實熱無力虚瘡註數陽衇也府屬陽故主之凡陽屬之病皆屬之也數為陽盛細為不足故曰傷陰有力為實熱無力為虚熱數亦生瘡故曰虚瘡緩濕脾胃堅大濕壅促為陽鬱結則陰凝註緩脾胃衇又主濕邪故緩主濕邪脾胃之病若搏指堅大則為濕邪壅脹之病促為陽盛而鬱之衇結為陰盛而凝之衇也代則氣乏跌打悶絶奪氣痛瘡女胎三月註代者真氣乏而求代之衇也若不因跌打氣悶暴病奪氣痛瘡傷氣女胎氣阻者而無故見之則必死也滑司痰病關主食風寸候吐逆尺便血膿註滑陽衇陽盛為痰故司痰病右關候胃故主痰食左關候肝故主風痰寸候上焦故主吐逆尺候下焦故主便血膿也濇虚濕痺尺精血傷寸汗津竭關膈液亡註濇血少滯濇衇也六衇見之則主榮虚受濕痺之病若兩尺見之則主傷精傷血之病兩寸見之則主汗多津傷之病兩關見之則主噎膈反胃液亡結腸之病也弦關主飲木侮脾經寸弦頭痛尺弦腹疼註弦陰衇陰盛為飲弦木衇木旺侮土土虚不能制濕故飲病生焉寸弦陰乘陽也故主頭痛尺弦陰乘陰也故主腹疼緊主寒痛洪是火傷動主痛熱崩汗驚狂註緊寒實衇故主寒痛洪熱實衇故主火傷動為陰陽相搏之陽衇故主諸痛陽動主發熱主驚狂陰動主汗出血崩也長則氣治短則氣病細則氣衰大則病進註長者氣之暢也故曰氣治短者氣之縮也故曰氣病小者正氣衰也大者邪病進也衇之主病有宜不宜陰陽順逆吉凶可推註病有陰陽衇亦有陰陽順應則吉逆見則凶此以下至其死可測句凡二十七節詳分某病見某衇吉某病見某衇凶也中風之衇却喜浮遲堅大急疾其凶可知註中風虚見虚衇以浮遲為順若反見堅大急疾為逆决無生理傷寒熱病衇喜浮洪沉微濇小證反必凶汗後衇静身凉則安汗後衇躁熱甚必難陽證見陰命必危殆陰證見陽雖困無害註此節皆言傷寒之順逆也傷寒熱病傳裏屬熱衇以浮洪陽衇為吉若見沉微濇小陰衇是證與衇反故凶汗後邪解便當衇靜身凉若躁而熱所謂汗後不為汗衰名曰陰陽交必難治矣陽證而見沉濇細微弱遲之陰衇則衇與證反命必危殆陰證而見浮大數動洪滑之陽衇雖衇與證反在他證忌之獨傷寒為陰邪還陽將解之證病雖危困無害於命也勞倦傷脾衇當虚弱自汗衇躁死不可却註勞倦傷脾衇當虚弱為順也若自汗出而衇反躁疾則逆矣安得不死瘧衇自弦弦遲多寒弦數多熱代散則難註瘧為寒熱之病弦為少陽之衇少陽主病寒熱往來凡寒熱之病多屬少陽半表半裏之界故瘧衇自應得弦象也遲多寒數多熱理自然也若得代散二衇邪尚未解正氣已衰命則難生矣洩瀉下利沉小滑弱實大浮數發熱則惡註瀉痢裏虛宜見沉小滑弱之衇為順若反見實大浮數之衇則身必發熱而成惡候也嘔吐反胃浮滑者昌沉數細濇結腸者亡註嘔吐反胃脾虚有痰也浮為虚滑為痰是為順衇故曰昌也若沉數細濇則為氣少液枯遂致結腸糞如羊屎死不可救矣霍亂之候衇代勿訝舌卷囊縮厥伏可嗟註霍亂之證陽衇為佳若見代衇因一時清濁混亂故衇不接續非死候也如衇伏不見四肢厥逆舌卷囊縮為陰寒甚則有可嗟之變也𠻳衇多浮浮濡易治沉伏而緊死期將至註𠻳乃肺疾衇浮為宜兼見濡者病將退也若沉伏與緊則相反而病深矣不死何待喘息擡肩浮滑是順沉濇肢寒切為逆證註陽喘多實風與痰耳故衇以浮滑為順陰喘多虚寒與虚也故衇沉濇四肢寒者均為不治逆證火熱之證洪數為宜微弱無神根本脫離註熱證而得洪數乃正應也若見微弱證衇相反根本脱離藥餌不可施矣骨蒸發熱衇數而虚熱而濇小必殞其軀註骨蒸者腎水不足壯火僭上虚數二衇是正象也若濇小之衇所謂發熱衇靜不可救耳勞極諸虚浮軟微弱土敗雙弦火炎細數註虚證宜見虚衇若兩關衇弦謂之雙弦弦乃肝衇右關見之是肝木乘脾故曰土敗勞證之衇若見細數乃陰虚火盛上刑肺金便不可治失血諸證衇必見芤緩小可喜數大堪憂註芤有中空之象失血者宜爾也緩小亦為虚衇順而可喜若數且大謂之邪勝故可憂也畜血在中牢大却宜沉濇而微速愈者稀註畜血者有形之實證見牢大之衇衇證相宜倘沉濇而微是挾虚矣既不能自行其血又難施峻猛之劑安望速愈也三消之衇數大者生細微短濇應手堪驚註渴而多飲為上消消糓善饑為中消渴而便數為下消三消者皆燥熱太過惟見數大之衇為吉耳細微短濇死不可救也小便淋閉鼻色必黄實大可療濇小知亡註鼻頭色黄必患小便難六衇實大者但用攻病之劑必愈若逢濇小為精氣不化死亡將及矣癲乃重陰狂乃重陽浮洪吉象沉急凶殃註癲狂二證皆以浮洪為吉取其病尚淺也若沉而急病已入骨雖有扁倉莫之能救矣癎宜浮緩沉小急實但弦無胃必死不失註癎本風痰衇見浮緩自應然也若沉小急實是病深也或但弦無胃則肝之真藏衇見矣安望其更生耶心腹之痛其類有九細遲速愈浮大延久註九種心腹之痛皆宜遲細易於施療如浮而大是為中虚邪盛不能収㨗功也疝屬肝病衇必弦急牢急者生弱急者死註肝主筋疝則筋急故屬肝也肝衇弦急是其常也疝係陰寒之咎牢主裏寒之衇亦其常也如且弱且急必有性命之憂矣黄疸濕熱洪數便宜不妨浮大微濇難醫註濕蒸熱淤黄疸生焉洪數浮大皆所宜也一見微濇虚衰已甚必食少瀉多無藥可療矣腫脹之衇浮大洪實細而沉微岐黄無術註水腫脹滿有餘之證宜見有餘之衇浮大洪實是矣沉細而微謂之證實衇虚難言生矣五藏為積六府為聚實强可生沉細難愈註積聚皆實證也實衇强盛是所當然沉細為虚真氣敗絶不可為矣中惡腹脹緊細乃生浮大為何邪氣已深註中惡者不正之氣也緊細則吉浮大則凶也鬼祟之衇左右不齊乍大乍小乍數乍遲註鬼祟犯人左右二手衇象不一忽大忽小忽數忽遲無一定之衇形也癰疽未潰洪大衇宜及其已潰洪大最忌註未潰屬實洪大為正衇也潰後則虚若仍見洪大則為邪衇最所忌也肺癰已成寸數而實肺痿之證數而無力癰痿色白衇宜短濇數大相逢氣損血失腸癰實熱滑數相宜沉細無根其死可期註肺癰而寸口數實知膿已成矣肺葉焦痿為火傷也是以數而無力肺癰肺痿得白色者肺之本色得短濇者肺之本衇均相宜也若逢數大是火來剋金賊邪之證故氣損血失也腸癰實也滑數相宜沉細虚也證實衇虚死期將至矣婦人有子陰搏陽别少陰動甚其胎已結滑疾而散胎必三月按之不散五月可别左男右女孕乳是主女腹如箕男腹如釜註此一節明女科胎前之衇也陰搏陽别者寸為陽尺為陰言尺陰之衇搏指而動寸陽之衇則不搏指逈然分别此有子之證也或手少陰心衇獨動而甚者葢心主血血主胎故胎結而動甚也動者謂往來流利之動而滑非厥厥摇動為病之動也疾即數也滑而且數按之而散三月之胎也按之不散五月之胎也左為陽故左疾為男胎右為陰故右疾為女胎五六月後孕婦之乳房有核吮之有乳者則主有子也女胎腹形狀如箕之圓也男胎腹形狀如釜之上小而下大也欲産離經新産小緩實弦牢大其凶不免註此一節明産中之衇也欲産衇離經者謂見離乎經常之衇也葢胎動於中衇亂於外勢所必然也産後氣血兩虚見小緩之虚衇為吉若見實大弦牢其凶不免矣經衇病衇業已昭詳將絶之形更當度量註經常之衇主病之衇皆明於前矣而死絶之衇亦不可不察也分列於後心絶之衇如撡帶鈎轉豆躁疾一日可憂註經曰衇來前曲後居如操帶鈎曰心絶前曲者謂輕取則堅强而不柔後居者謂重取則牢實而不動如持革帶之鈎全失冲和之氣但鈎無胃故曰心死鈎即洪衇也轉豆者即經所謂如循薏苡子纍纍然狀其短實堅强真藏衇也又曰心絶一日死肝絶之衇循刃責責新張弓弦死在八日註經曰真肝衇至中外急如循刃又曰衇來急溢勁如新張弓弦曰肝死又曰肝絶八日死脾絶雀啄又同屋漏覆杯水流四日無救註舊訣曰雀啄連來四五啄屋漏少刻一㸃落若杯覆若水流皆脾絶也經曰脾絶四日死肺絶維何如風吹毛毛羽中膚三日而號註經曰如風吹毛曰肺死又曰真肺衇至如以毛羽中人膚皆狀其但浮而無胃氣也又曰肺絶三日死腎絶伊何發如奪索辟辟彈石四日而作註經曰衇來如奪索辟辟如彈石曰腎死又曰腎絶四日死舊訣云彈石硬來尋即散搭指散亂如解索正此謂也石即沉衇也命衇將絶魚翔鰕遊至如湧泉莫可挽留註舊訣云魚翔似有又似無鰕遊靜中忽一躍經曰渾渾革至如湧泉綿綿其去如弦絶皆死衇也衇有反關動在臂後别由列缺不干證候註反關衇者衇不行於寸口出列缺絡入臂後手陽明大腸之經也以其不順行於關上故曰反關有一手反關者有兩手反關者此得於有生之初非病衇也令病人側立其手診之方可見也岐黄衇法候病死生太素衇法陰陽貴清清如潤玉至數分明濁衇如石糢糊不清小大貧富濇滑窮通長短壽天詳推錯綜註衇法倡自岐黄所以候病死生至楊上善為風鑑者流托名太素衇法以神其說每多不騐然其中有近理可採者如論六陽六陰之衇以清主貴以濁主賤清衇之狀似玉潤淨至數分明濁衇之狀如石粗濇至數糢糊小衇主貧大衇主富濇衇主窮滑衇主通長衇主壽短衇主夭如質清衇濁貴中賤也質濁衇清賤中貴也清衇兼大貴而富也兼滑貴而通也兼長貴而壽也濁衇兼小賤而貧也兼濇賤而窮也兼短賤而夭也清衇兼小貴而貧也兼濇貴而窮也兼短貴而夭也濁衇兼大賤而富也兼滑賤而通也兼長賤而壽也詳推錯綜者即詳推此質清衇清質濁衇濁質清衇濁質濁衇清錯綜等説之理耳附訂正素問衇要精微論一則備考尺内兩傍則季脇也尺外以候腎尺裏以候腹中中附上左外以候肝内以候膈右外以候胃内以候脾上附上右外以候肺内以候胸中左外以候心内以候膻中前以候前後以候後上竟上者胸喉中事也下竟下者少腹腰股膝脛足中事也註内外二字前人有以尺部一衇前半部衇後半部衇為訓者有以内側曰内外側曰外為訓者皆非也葢衇之形渾然純一並不兩條亦不兩截若以前半部後半部為是則視衇為兩截矣若以尺内側尺外側為是則視衇為兩條矣故知二說皆非也熟玩通章經文自知其為傳寫之訛豈有獨於脾胃則曰右外以候胃内以候脾者耶葢外以候府内以候藏内經衇書確然可考故當以外以候胃内以候脾之句為正其尺外之外字當是裏字尺裏之裏字當是外字中附上左右之内外字上附上左右之内外字皆當改之故不循舊圖所列以符外候府内候藏之義也前以候前謂關之前寸也後以候後謂闗之後尺也上竟上者謂上盡魚際也下竟下者謂下盡尺澤也御纂醫宗金鑑卷三十四
