body:
  text: 編輯外科心法要訣目録眼部眼胞菌毒眼丹針眼眼胞痰核椒瘡粟瘡皮翻證漏睛瘡目中努肉鼻部鼻疽鼻疔鼻淵鼻䘌瘡鼻瘡鼻痔肺風粉刺酒皶鼻耳部黑疔耳疳耳衄耳痔耳菌耳挺旋耳瘡口部大人口破鵝口瘡口糜脣部反脣疔鎖口疔脣疽繭脣脣風齒部牙衄牙宣鑽牙疳牙疔牙癰走馬牙疳齒䘌齒齲御纂醫宗金鑑卷六十五目録欽定四庫全書御纂醫宗金鑑卷六十五編輯外科心法要訣目録眼部眼胞菌毒眼丹針眼眼胞痰核椒瘡粟瘡皮翻證漏睛瘡目中努肉鼻部鼻疽鼻疔鼻淵鼻䘌瘡鼻瘡鼻痔肺風粉刺酒皶鼻耳部黑疔耳疳耳衄耳痔耳菌耳挺旋耳瘡口部大人口破鵝口瘡口糜脣部反脣疔鎖口疔脣疽繭脣脣風齒部牙衄牙宣鑽牙疳牙疔牙癰走馬牙疳齒䘌齒齲御纂醫宗金鑑卷六十五目録欽定四庫全書御纂醫宗金鑑卷六十五編輯外科心法要訣眼部眼胞菌毒菌毒生於眼睫邊如菌黃亮水皰圓頭大蒂小漸垂出脾濕鬱熱結凝堅注此證生於上下眼胞睫邊初如菌形頭大蒂小黃亮水皰或有頭小蒂大者漸長垂出堅凝不痛有纒綿經年不愈者以致目病蓋眼胞屬脾其經素有濕熱思鬱氣結而生也初起宜用清涼圓洗即消有經年皮厚消之不應者法當用軟綿紙蘸水潤眼皮菌毒處少頃用左手大指甲墊於患根右手持鈹針尖頭齊根切下血出不妨即用翠雲錠磨濃塗之其血即止內服涼膈清脾飲忌海腥煎炒清凉圓當歸尾石菖蒲赤芍藥各二錢川黃連生地膚子杏仁各一錢生羌活五分膽礬二分共研粗末以大紅紬包之如櫻桃大甜滚水浸泡乘熱蘸洗勿見塵土方歌清凉圎內用川連歸尾菖蒲芍膽礬羌活杏仁地膚子菌毒初起洗之痊翠雲錠子杭粉五兩銅緑黃連各一兩輕粉一錢共為細末用糯米百粒水一碗煎半碗去米冉煎至三分和藥作錠隂乾用時水磨令濃以雞翎蘸塗患處方歌翠雲錠子能止血銅緑輕杭黃連强共為細末和成錠菌毒切後塗之良凉膈清脾飲生地黃連翹去心梔子生研薄荷荆芥防風石膏煆黃芩赤芍各一錢甘草五分生水二鍾燈心二十根煎八分食逺服方歌涼膈清脾生地黃連翹梔子薄荆防石膏芩芍兼甘草醫治菌毒服即康眼丹眼丹眼胞上下生紅熱腫痛軟偏風焮熱紫硬偏於熱荆防敗毒服有功注此證由脾胃濕熱受風而成紅腫疼痛若腫軟下垂不能視物者偏於風盛也浮腫易消若焮紅色紫堅硬者偏於熱盛也腫硬難消初起俱宜荆防敗毒散散其風口渴便燥者宜內疏黃連湯㵼其熱有日久消之不應者冝服透膿散膿熟針之腫用如意金黃散洗之潰用琥珀膏或白膏藥貼之此證宜速潰遲則潰深穿透眼胞成漏難斂荆防敗毒散見項部腦疽內疏黃連湯如意金黃散透膿散俱見腫瘍門琥珀膏見頭部髮際瘡白膏藥見潰瘍門針眼針眼眼睫豆粒形輕者洗消膿不成甚則赤痛膿針愈破後風侵浮腫生注此證生於眼皮毛睫間由脾經風熱而成形如豆粒有尖初起輕者宜用如意金黃散鹽湯冲洗膿不成即消矣風熱甚者色赤多痛洗之不消膿已成也侯熟針之貼黃連膏亦有破後邪風侵入瘡口令人頭面浮腫目赤澀痛者外仍洗之內服芎皮散即愈芎皮散川芎二兩青皮一兩共為末每服二錢菊花湯調服外以枯礬末雞子清調敷腫處又用南星末同生地黃搗膏貼太陽穴自消芎皮散內用川芎青皮減半用最靈為末菊花湯調服醫治針眼自成功如意金黃散見腫瘍門黃連膏見鼻部鼻瘡內眼胞痰核眼胞痰核濕氣鬱核結如棗如豆形皮裏肉外推之動皮色如常硬不疼注此證結於上下眼胞皮裏肉外其形大者如棗小者如豆推之移動皮色如常硬腫不疼由濕痰氣鬱而成宜服化堅二陳丸外用生南星蘸醋磨濃頻塗眼皮日數淺者即消日數深者雖不能即消常塗令皮薄微微撥損以手指甲擠出如白粉汁即消貼貝葉膏收口從眼皮裏潰破者難斂化堅二陳丸陳皮半夏各一兩製白茯苓一兩五錢甘草三錢生白殭蠶二兩炒川黃連三錢共研細末荷葉熬湯合丸如梧桐子大每服二錢白滚水送下方歌化堅二陳丸消痰周身結核服更痊陳皮半夏茯苓草殭蠶荷葉川黃連貝葉膏見潰瘍門椒瘡粟瘡椒瘡粟瘡生胞裏脾胃血熱是根苗粟瘡黃軟濕易散椒瘡赤硬熱難消注此二證生於眼胞之裏雖皆由脾胃血熱所致然粟瘡偏於濕盛故色黃形軟其證易愈椒瘡偏於熱盛故色赤形硬其瘡難消俱宜服清脾涼血湯外以清涼圎洗之若眼皮裏有紅絲堆纍者乃血熱有瘀也法以燈草刮瘡處令血出即愈清脾涼血湯荆芥防風赤芍黑參陳皮蟬蛻蒼术炒白蘚皮各一錢連翹去心生大黃各一錢五分酒洗厚朴薑炒甘草各五分生竹葉三十片水煎食逺服方歌清脾凉血椒粟瘡厚朴陳皮翹芍蒼蟬蛻黑參荆防草白鮮皮與生大黃清涼圓見菌毒皮翻證皮翻證係眼胞翻狀如舌䑛脣一般翻因胞腫睫緊故血壅氣滯胃經原注此證由胃經血壅氣滯而成小兒多有之眼皮外翻如以舌䑛脣之狀又如痘風眼爛胞腫弦緊者則眼皮亦翻治宜㵼脾胃之積熱以瀉黃散服之即愈亦有內翻者即目科拳毛倒睫弦弛不內外翻者即目科胞垂難視之證也瀉黃散石膏五錢煆梔子仁一兩生甘草三兩生防風二兩微炒香酒拌豨蘞草四兩曬乾酒蒸共研細末壯人二錢弱人一錢小兒六七分白滚水調下方歌瀉黃散治皮翻證石膏梔子草防風豨蘞草同研細末滚水調下有竒功漏晴瘡漏晴瘡在大眥生肝熱風濕病晴明紅腫痛潰膿稠易青黑膿稀難長平注此證生於目大眥由肝熱風濕病發於太陽膀胱經睛明穴其穴之處係藏淚之所初起如豆如棗紅腫疼痛瘡勢雖小根源甚深潰破出黏白膿者順出青黑膿或如膏者險初宜服疏風清肝湯潰後用黃靈藥撚入瘡口兼貼萬應膏其口漸漸收斂有膿從大眥內出者成漏難斂亦有瘡口過出淚液以致目內乾澀者收斂更遲若潰斷眼邊弦者不治疏風清肝湯當歸尾赤芍荆芥穗防風川芎菊花生梔薄荷各一錢柴胡連翹各一錢五分去心金銀花二錢甘草五分生燈心五十寸水煎食逺服方歌疏風清肝漏睛瘡又除肝熱散風强歸芍銀花芎菊草柴翹梔子薄荆防黃靈藥萬應膏俱見潰瘍門目中努肉目中努肉心火成實火大眥色深紅小眥紅絲淡虛火努肉時覺或脹疼注此證生於目兩眥瘀肉努出時覺疼痛總屬心火所成然火有虛實如大眥紅肉色深紅者心經實火也宜黑參湯服之小眥紅絲色淡紅者心經虛火也宜决明散主之外俱用清凉圓泡洗久久自愈黑參湯黑參苦參梔子研菊花黃連枳殼麩炒草决明車前子防風大黃炒升麻各二錢水煎食後服黑參湯治大眥疼內生努肉實火成苦參梔菊黃連殼草决車防大黃升决明散玉竹黃連枳殼麩炒川芎甘草生羚羊角各一兩鎊車前子青葙子草决明各五錢共研細末每服三錢食後服卧時再用一服方歌决明努肉虛火攻玉竹黃連枳殼芎車前青葙羚羊草研末水調最有功清凉圎見菌毒鼻部鼻疽鼻疽生於鼻柱間肺經鬱火發督原堅硬色紫常木痛千金仙方托裏痊注此證生於鼻柱屬督衇經鼻為肺竅故又屬肺由肺經鬱火凝結而成堅硬色紫時覺木痛初宜服千金漏蘆湯宣解鬱毒次用仙方活命飲加梔子木通薄荷桔梗消之若腫痛不減勢欲作膿則宜托裏透膿湯主之外治法按癰疽潰瘍門千金漏蘆湯漏蘆一兩枳殼一兩麩炒朴消一兩大黃一兩五錢甘草一兩生麻黃一兩黃芩一兩白斂一兩連翹一兩去心升麻一兩共研末每用二錢水一鍾薑三片薄荷葉一錢煎五分溫服以取便利為度方歌千金漏蘆鼻疽發色紫堅疼效更嘉漏蘆枳殼消黃草麻芩白斂翹升麻仙方活命飲見腫瘍門托裏透膿湯見頭部侵腦疽鼻疔鼻疔生在鼻孔中鼻竅腫引腦門疼甚則脣腮俱浮腫肺經火毒蟾離宫注此證生於鼻孔內鼻竅腫塞脹痛引腦門甚則脣腮俱作浮腫由肺經火毒凝結而成宜蟾酥丸汗之再用蟾酥丸研細末吹入鼻竅若腫硬外發用離宫錠塗之此證初起之時須當速治遲則毒氣內攻以致神昏嘔噦鼻腫如瓶者逆蟾酥丸見疔瘡門離宫錠見腫瘍門鼻淵鼻淵濁涕流鼻中久淋血水穢而腥膽熱移腦風寒火控腦砂因蝕腦蟲注此證內因膽經之熱移於腦髓外因風寒凝鬱火邪而成鼻竅中時流黃色濁涕宜竒授藿香丸服之若久而不愈鼻中淋瀝腥穢血水頭眩虛暈而痛者必係蟲蝕腦也即名控腦砂宜天羅散服之但此證久則必虛當以補中益氣湯兼服之即效竒授藿香丸藿香連枝葉八兩研細末雄豬膽汁和丸如梧桐子大每服五錢食後蒼耳子湯下或黃酒送下方歌竒授藿香鼻淵流濁涕淋漓久不休豬膽汁合藿香末蒼耳湯下患可瘳天羅散絲瓜藤近根處者燒存性為末每用三錢食後黃酒送下天羅蟲蝕腦髓中頭痛鼻流血水腥絲瓜根燒研細末黃酒調腹慣殺蟲補中益氣湯見潰瘍門鼻䘌瘡鼻䘌瘡多小兒生鼻下兩旁斑爛形總由風熱客於肺膿汁浸淫癢不疼注此證多生小兒鼻下兩旁色紫斑爛由風熱客於肺經膿汁浸淫癢而不痛宜服澤㵼散外搽青蛤散即愈澤㵼散澤㵼鬱金山梔生甘草各一錢生共研末每服一錢甘草煎湯調下方歌澤瀉散治鼻䘌患膿汁浸淫肺火毒澤瀉鬱金梔草末甘草煎湯調送服青蛤散蛤粉一兩煆青黛三錢石膏一兩煆輕粉黃蘗各五錢生末共研細末先用香油調成塊次加涼水調稀薄塗瘡處方歌青蛤散塗鼻䘌消蛤粉青黛煆石膏輕粉黃蘗研極細香油拌塊涼水調鼻瘡鼻瘡肺熱生鼻中燥乾如火微腫疼內服黃芩外定痛燥乾黃連膏潤靈注此證生於鼻竅內初覺乾燥疼痛狀如粟粒甚則鼻外色紅微腫痛似火炙由肺經壅熱上攻鼻竅聚而不散致成此瘡內宜黃芩湯清之外用油紙撚粘辰砂定痛散送入鼻孔內若乾燥者黃連膏抹之立效黃芩湯黃芩二錢酒炒甘草五分生麥冬一錢去心桑白皮一錢生梔子一錢五分連皮酒炒連翹去心赤芍桔梗薄荷荆芥穗各一錢水煎食後服方歌黃芩湯醫肺火盛鼻內生瘡赤腫疼芩草麥冬桑梔翹赤芍桔梗薄荷荆辰砂定痛散辰砂五分末氷片二分胡黃連二兩末石膏一兩煆共研細末方歌辰砂定痛鼻瘡乾氷片胡連膏煆研油紙撚藥入鼻孔消疼散熱效通仙黃連膏黃連三錢當歸尾五錢生地一兩黃蘗三錢薑黃三錢香油十二兩將藥煠枯撈去渣下黃蠟四兩溶化盡用夏布將油濾淨傾入磁碗內以栁枝不時攪之候凝為度方歌黃連膏潤諸燥瘡歸尾生地蘗薑黃油煠去渣加黃蠟布濾攪凝塗抹强鼻痔鼻痔初起榴子形久垂紫硬礙氣通肺經風濕熱鬱滯內服辛夷外㸃平注此證生於鼻內形如石榴子漸大下垂色紫微硬撑塞鼻孔礙人氣息難通由肺經風濕熱鬱凝滯而成內服辛夷清肺飲以清肺熱外以硇砂散逐日㸃之漸化為水而愈宜戒厚味暴怒庶不冉發辛夷清肺飲辛夷六分甘草五分生石膏煆知母梔子生研黃芩各一錢枇杷葉三片蜜炙去毛升麻三分百合麥冬各一錢去心水二鍾煎八分食逺服或加羌活防風連翹薄荷方歌鼻痔辛夷清肺飲辛草膏知梔子芩枇杷升麻百合麥或加羌活翹薄斟硇砂散見耳部耳痔內肺風粉刺肺風粉刺肺經熱面鼻疙􅜀赤腫疼破出粉汁或結屑枇杷顛倒自收功注此證由肺經血熱而成每發於面鼻起碎疙􅜀形如黍屑色赤腫痛破出白粉汁日久皆成白屑形如黍米白屑宜內服枇杷清肺飲外敷顛倒散緩緩自收功也枇杷清肺飲人參三分枇杷葉二錢毛蜜炙刷去甘草三分生黃連一錢桑白皮二錢佳鮮者黃蘗一錢水一鍾半煎七分食逺服方歌枇杷清肺枇杷葉參草黃連桑白皮黃蘗同