久露根惡熱惡凉當細别胃經客熱風寒侵注此證牙齦宣腫齦肉日漸腐頽久則削縮以致齒牙宣露總由胃經客熱積久外受邪風寒凉相搏而成有喜凉飲而惡熱者係客熱遇寒凉凝滯於齦肉之間有喜熱飲而惡凉者係客熱受邪風稽留於齦肉之內客熱遇寒者牙齦出血惡熱口臭宜服清胃湯客熱受風者牙齦惡凉遇風痛甚冝服獨活散外有牙齦腐臭齒根動搖者屬胃中虛火而兼腎虛齒乃腎之餘宜服三因安腎丸又有牙齦腐臭時津白膿者屬胃中濕熱宜服犀角升麻湯外俱用胡桐淚散擦之以食鹽冲湯潄口惟牙齦動搖或兼疼痛者曰以李杲牢牙散擦之夜用固齒白玉膏貼之緩緩取效若齦肉腐爛露牙床骨者逆獨活散獨活羌活防風川芎各一錢六分薄荷生地荆芥各一錢細辛七分右為粗末每用二錢水煎澄渣食後服日用三服方歌獨活風毒注牙根齦腫嫌涼痛莫禁羌活防風共生地薄荷荆芥合芎辛三因安腎丸補骨脂炒葫蘆巴炒茴香炒川楝子炒續斷各三兩炒山藥杏仁炒白茯苓桃仁各二兩炒共研細末煉蜜為丸如梧桐子大每服二錢空心淡鹽湯送下方歌三因安腎虛火爍牙齦腐臭齒根搖山藥杏茴苓骨脂葫蘆巴續川楝桃胡桐淚散胡桐淚細辛川芎白芷各一錢五分寒水石二錢煆生地一錢青鹽二分共研細末乾搽牙齦患處待頓飯時以溫水潄去少時冉上方歌胡桐淚散牙齦腫津血宣露或出膿細辛寒水石生地青鹽白芷共川芎李杲牢牙散龍膽草一兩五錢酒浸羌活地骨皮各一兩升麻四分共研末先以溫水潄口用少許搽之李杲牢牙擦齒病牙齦搖動或兼疼膽草升麻羌地骨研末潄口擦有功固齒白玉膏官粉一兩研珍珠三錢末陽起石一兩用殭蠶四十九條防風當歸川芎牙皂青鹽升麻白芷地骨皮各五錢細辛藁夲各三錢共研粗末長流水五碗同藥入砂鍋內以桑柴火熬藥至三碗去渣冉入砂鍋內煎至一碗將龍骨陽起石火煆通紅入藥汁內淬之如此七次去藥汁將龍骨陽起石焙乾研末麝香二錢末龍骨二兩象牙五錢末用黃蠟三兩溶化濾淨冉化離火候溫方入前藥和勻乘熱攤紙上如膏冷將尉斗燒熱仰放紙鋪尉斗底上攤之用時先以溫水潄口將膏剪一小條貼於患處閉口勿語方歌固齒白玉貼牙效一切牙疼及動搖官粉珍珠陽起麝龍骨象牙黃蠟熬清胃湯見牙衄犀角升麻湯見面部頰瘍鑽牙疳鑽牙疳在牙根生突出硬骨鋭而鋒痛如針刺殊難忍證由肝胃積熱成注此證由肝胃二經積熱所致乃牙根肉內鑽出骨尖如刺疼痛異常小兒多有之法用鈹針就患處刺開好肉連牙齊根取出若血出不止者以濕紙換貼二次即止內服蘆薈消疳飲外以氷硼散搽之戒厚味其牙復生如舊蘆薈消疳飲蘆薈生胡黃連石膏煆羚羊角鎊梔子生研牛蒡子炒研銀柴胡桔梗大黃生元參各五分薄荷葉四分甘草三分水二鍾淡竹葉一錢煎六分食逺服方歌蘆薈消疳清胃肝羚膏梔子蒡胡連銀胡桔梗大黃薄甘草元參竹葉煎氷硼散見口部鵝口瘡牙疔牙疔牙縫胃火成大腸濕熱亦可生腫如粟米連腮痛若兼麻癢即黑疔注此證由胃經火毒或大腸經濕熱皆可致之每生於兩旁牙縫腫起一粒形如粟米痛連腮項若兼麻癢破流血水疼痛異常者即黑疔也屬腎火毒俱用銀簪尖挑破以見血為度搽拔疔散冉以蟾酥丸噙化徐徐咽之若煩躁口渴者宜服黃連解毒湯即愈若失治毒反攻心令人煩躁昏憒者逆拔疔散硇砂白礬硃砂食鹽用鐵鏽刀燒紅將白礬食鹽放於刀上煆之各等分擇丁日午時研為細末收之方歌拔疔散治諸疔毒硇砂白礬食鹽硃等分研末搽患處化硬搜根功效殊蟾酥丸見疔瘡門黃連解毒湯見耳部黑疔牙癰牙癰胃熱腫牙床寒熱堅硬痛難當破流膿水未收口誤犯寒凉多骨妨注此證由陽明胃經熱毒所致生於牙床堅腫疼痛身發寒熱腮頰浮腫初宜服荆防敗毒散若大渴煩嘔者蟾酥丸汗之便祕者雙解貴金丸下之腫處宣軟刺破搽氷硼散若初時堅腫破流血水久不收口過食寒涼者必生多骨俟骨尖刺出搖則內動始可取出其口方能收斂而愈荆防敗毒散見項部腦疽蟾酥丸見疔瘡門雙解貴金丸見腫瘍門氷硼散見口部鵝口瘡走馬牙疳走馬牙疳證不輕癖積疹痘毒火攻牙根腐臭隨變黑頑肉難脫不食凶注此證多由癖疾積火疹痘餘毒上攻最為迅速總因積火熱毒而成牙根作爛隨變黑腐臭穢難聞若癖積毒火攻牙者初宜服蘆薈消疳飲脾胃虛者兼服人參茯苓粥若疹痘餘毒所中者宜服清疳解毒湯外勢輕者俱用溺白散擦之若堅硬青紫漸腐穿腮齒搖者宜蘆薈散擦之如牙縫黑腐不盡及腐爛深坑藥不能到宜用勒馬聽徽絲塞之冉用手法去其黑腐內見紅肉流鮮血者吉若取時頑肉難脫堅硬腐爛漸開以致穿腮破脣宜貼青蓮膏身熱不食者逆但此證惟癖積攻牙成疳者好後易犯由積火時時上攻也惟在調理飲食得宜如山藥栗子鵝蟹甜辣等物俱當禁忌若稍有疏忽必致復發慎之慎之人參茯苓粥人參一錢白茯苓六錢共研末同粳米一茶鍾熬成粥先以鹽湯將口潄淨後再食粥方歌人參茯苓善扶脾飲食短少服之宜二味研末加粳米熬粥食之理胃虛清疳解毒湯人中黃川黃連生柴胡各五分知母生連翹去心牛蒡子炒研犀角鎊黑參荆芥防風各一錢石膏一錢五分煆淡竹葉一錢燈心五十寸水二鍾煎八分食逺服嘔加蘆葦根五錢方歌清疳解毒牙疳證疹痘餘毒化熱成中黃知連柴翹蒡犀角參膏荆芥風溺白散溺垢即婦人尿桶中白鹻火煆五錢白霜梅燒存性枯白礬各二錢右研細末先用韭根松蘿茶煎成濃汁乘熱以雞翎蘸洗患處去淨腐肉見津鮮血冉敷此藥日敷三次若爛至咽喉以蘆筒吹之方歌溺白散搽赱馬疳溺垢白霜梅白礬韭根茶葉煎湯滌蘸洗腐肉敷藥痊蘆薈散蘆薈一錢黃蘗五錢末人言五分用紅棗五枚去核每棗納人言一分火燒存性共研細末先用米泔水潄淨疳毒後敷此藥於堅硬及腐處方歌蘆薈散搽牙疳爛色紫牙搖腮硬穿棗裹人言燒存性再加黃蘗末同研勒馬聽徽絲白砒一分末麝香三分末青綿撕碎青黛各一兩飛末用香油拌勻用時先以清米泔水潄口次用鑷尖將絲挑少許塞於牙根縫內日三易之方歌勒馬聼徽疳漸蝕牙縫腐黑急速施油調砒麝青綿黛泔水潄口後塞之青蓮膏青黛二錢乳香輕粉各一錢麝香五分白砒一分言即人右為細末用香油調稠薄攤紙上用鎚槌實隂乾收之每於卧時以泔水潄淨口拭乾隨疳證大小剪膏藥貼之至曉揭去冉以泔水將口潄淨吐之至晚再貼青蓮膏貼腐疳宜化腐消堅效更竒乳麝白砒輕粉黛研末油調紙攤之蘆薈消疳飲見鑽牙疳齒䘌齒䘌齒內生小蟲胃經瘀濕風火凝口臭只緣胃火盛齒根腐爛出血膿注此證係齒內生蟲由胃經瘀濕風火凝聚而成齒根脹痛腐爛時出膿血若口臭甚者胃火盛極上攻所致也宜服玉池散外用雀麥連梃一把苦瓠三十片洗淨將麥剪長二寸以瓠葉裹作五包廣一寸厚五分三年陳醋漬之至日中時以兩包火中炮炙令熱納口中尉齒外泠更易之取包置水中解視之即有蟲長三分老者黃色新者白色其效如神玉池散當歸白芷升麻防風甘草地骨皮川芎細辛藁夲槐花各一錢生薑三片黑豆三十粒水煎去渣候溫􅍭潄冷則吐之若用此方煎服更效方歌玉池疏風療蟲牙津膿根爛潄服佳歸芷升防甘地骨芎辛薑藁豆槐花齒齲齒齲風熱客陽明牙齦腫痛出臭膿遇風痛甚久宣露白馬懸蹄塞入靈注此證由風熱客於手足陽明二經而成初起牙齦宣腫覺痛遇風痛甚常作歪口吸氣之狀牙齦腐孔時出臭膿久則齦齒宣露初宜服清胃湯加羌活外用白馬懸蹄少許以綿裹之塞入膿孔甚效清胃湯見牙衄御纂醫宗金鑑卷六十五
