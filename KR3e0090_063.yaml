body:
  text: 編輯外科心法要訣目録頭部百會疽透腦疽侵腦疽佛頂疽額疽勇疽鬢疽夭疽鋭毒耳後疽耳發耳根毒玉枕疽腦後發腦鑠油風白屑風秃瘡螻蛄癤髮際瘡面部顴瘍顴疽顴疔面發毒面遊風痄腮頰瘍骨槽風發頤時毒鳯眉疽眉心疽龍泉疽虎髭毒燕窩瘡雀斑黑痣黧黑皯􅍍御纂醫宗金鑑卷六十三目録欽定四庫全書御纂醫宗金鑑卷六十三編輯外科心法要訣目録頭部百會疽透腦疽侵腦疽佛頂疽額疽勇疽鬢疽夭疽鋭毒耳後疽耳發耳根毒玉枕疽腦後發腦鑠油風白屑風秃瘡螻蛄癤髮際瘡面部顴瘍顴疽顴疔面發毒面遊風痄腮頰瘍骨槽風發頤時毒鳯眉疽眉心疽龍泉疽虎髭毒燕窩瘡雀斑黑痣黧黑皯􅍍御纂醫宗金鑑卷六十三目録欽定四庫全書御纂醫宗金鑑卷六十三編輯外科心法要訣頭部百會疽百會疽在巔頂結經屬督脈百會穴初如粟米漸如錢甚似葡萄堅似鐵髙腫熱實淸毒火平塌陽虛溫補怯腫連耳項動痰聲七日不潰命必絶注此百會疽又名玉頂發生在巔頂正中屬督脈經百會穴由膏粱太過火毒凝結而成初起形如粟米漸腫根大如錢甚則形似葡萄堅硬如鐵髙尖紅腫焮熱疼痛瘡根收束憎寒壯熱大渴隨飲隨乾口苦脣焦便祕煩躁脈見洪數者此屬氣實宜服黃連消毒飲以清毒火外敷沖和膏若漫腫平塌紫暗堅硬臖痛根散惡寒便㵼脈見細數者此屬陽虛宜服十全大補湯以溫補之外敷回陽玉龍膏若靣赤過煩口乾不渴脣潤者此屬陽虛浮泛宜服桂附地黃丸引火歸源更用生附子餅置兩足心涌泉穴各灸五壯以泄其毒初起貼琥珀膏已潰糝黃靈藥太乙膏蓋貼腐盡再易生肌之藥治之若腫連耳項痰如拽鋸七日無膿不潰神昏者命必絶矣黃連消毒飲蘇木二分甘草三分陳皮二分桔梗五分黃芩五分黃蘗五分人參三分藁本五分防己五分防風四分知母四分羌活一分獨活四分連翹四分黃連一錢生地黃四分黃耆二錢澤瀉二分當歸尾四分水煎食逺溫服方歌黃連消毒淸毒火諸般火證服最良蘇木甘草陳皮桔芩蘗人參藁二防知母羌活獨活等連翹黃連生地黃黃耆澤瀉當歸尾服後最忌飲寒涼沖和膏回陽玉龍膏俱見腫瘍門生肌散十全大補湯黃靈藥太乙膏俱見潰瘍門桂附地黃丸附子餅見前灸法琥珀膏見後髮際瘡透腦疽透腦疽生百會前形如雞子痛而堅軟漫膿稀虛塌陷紅硬膿稠實腫尖注此證生於百會穴之前囟門之際亦由督脈經火毒而成初如粟米漸如雞子堅硬疼痛瘡頂塌陷根腳漫腫色暗者屬虛若色紅腫硬頂尖膿稠者屬實速潰者順遲潰透腦髓者逆其腫潰內外治法俱按百會疽侵腦疽侵腦疽生透腦旁濕火攻發屬太陽穴名五處知其位紅順紫逆要審詳注此疽生於透腦疽側下由太陽膀胱經濕火而成穴名五處紅腫髙起焮熱疼痛膿色如蒼蠟者屬氣血俱實順而易治若紫陷無膿根腳散大者屬氣血兩虛逆而難治初起宜服荆防敗毒散汗之次服內疏黃連湯下之將潰服托裏透膿湯已潰服托裏排膿湯外貼琥珀膏圍敷沖和膏其餘內外治法俱按癰疽潰瘍門托裏透膿湯人參白术土炒穿山甲炒研白芷各一錢升麻甘草節各五分當歸二錢生黃耆三錢皂角刺一錢五分靑皮五分炒水三鍾煎一鍾病在上部先飲煮酒一鍾後熱服此藥病在下部先服藥後飲酒瘡在中部藥內兌酒半鍾熱服方歌托裏透膿治癰疽已成未潰服之宜參术甲芷升麻草當歸黃耆刺靑皮荆防敗毒散見項部腦疽內疏黃連湯沖和膏俱見腫瘍門托裏排膿湯見項部魚尾毒琥珀膏見髮際瘡內佛頂疽佛頂疽屬督上星陰陽不調毒熱成不論虛實皆險證潰爛黑陷必然凶注此證一名頂門疽生於頭頂囟門之前屬督脈經上星穴由藏府陰陽不調熱毒上壅而成色紫堅硬腫痛脈洪大而數者為實脈微細而數者為虛皆屬險證若潰爛黑陷六脈散大神昏譫語二便閉結者為逆首尾內外治法俱按百會疽額疽額疽生額火毒成左右膀胱正督經頂陷焦紫無膿重髙聳根收紅腫輕注此證生前額正中者屬督脈經或生左右額角者屬膀胱經總由火毒而成初起瘡頂塌陷乾焦色紫不生大膿者其勢重而屬險也若紅腫髙聳瘡根收束者其勢輕而屬順也初服荆防敗毒散汗之次服仙方活命飲消之將潰氣虛者宜服托裏透膿湯氣實者宜服透膿散外敷沖和膏已潰宜服托裏排膿湯外貼琥珀膏其餘內外治法俱按癰疽潰瘍門荆防敗毒散見項部腦疽仙方活命飲見腫瘍門托裏透膿湯見前侵腦疽透膿散沖和膏俱見腫瘍門托裏排膿湯見項部魚尾毒琥珀膏見髮際瘡內勇疽勇疽眥後太陽穴膽經怒火伏鼠形七日不潰毒攻眼黃膿為吉黑血凶注此證一名勇疽又名腦發疽屬足少陽膽經怒火而成生於目小眥之後五分生在太陽穴者無論左右皆可以生初起如粟漸腫疼痛形如伏鼠靣目浮腫七日信膿不潰火毒攻睛腐爛損目若十一日針出黃膿毒從膿解為順易治若出紫黑血者係氣虛不能化毒為逆難治初服仙方活命飲淸解之毒甚宜服內疏黃連湯外敷二味拔毒散其將潰已潰內外治法俱按癰疽腫瘍潰瘍門潰後避風忌水仙方活命飲內疏黃連湯二味拔毒散俱見腫瘍門鬢疽鬢疽三焦膽二經證由欲怒火凝成此經氣多而血少潰腐惟宜少見膿注此證發於鬢角屬手少陽三焦足少陽膽二經由於相火妄動外受風熱更因性情急怒欲念火生凝結而成此二經俱屬氣多血少最難腐潰更兼鬢角肌肉澆薄不宜針灸候其自潰潰後不宜多見膿膿多者過耗血液難斂初起宜服柴胡淸肝湯解之膿成者宜托裏消毒散托之外敷二味拔毒散已潰內外治法俱按癰疽潰瘍門柴胡淸肝湯柴胡生地各一錢五分當歸二錢赤芍一錢五分川芎一錢連翹二錢去心生蒡子一錢五分炒研黃芩一錢生梔子研天花粉甘草節防風各一錢水二鍾煎八分食逺服方歌柴胡淸肝治怒證宣血通解毒良四物生用柴翹蒡黃芩梔粉草節防托襄消毒散二味拔毒散俱見腫瘍門夭疽鋭毒夭疽居左鋭毒右經屬膽腑生耳後謀慮太過鬱火成此處肉薄當急救注此二證左為夭疽右為鋭毒俱生耳後一寸三分髙骨之後天者不盡天年謂之夭鋭者如鋒刃之鋭利言毒甚也得此二證愈者甚少初起俱如黍粒漸腫如瓜堅硬平塌紫暗不澤較諸瘡疼痛倍增名雖各異而左右耳後俱屬足少陽膽經由謀慮不決鬱火凝結而成此處皮肉澆薄氣多血少終屬險證急當治之遲則熱氣下入淵液前傷任脈內薰肝肺惡證悉添必致不救若紅腫速潰者順堅硬黑陷者逆如果投方應證亦只十全四五也初宜服柴胡淸肝湯消解之膿將成宜服托裏消毒散虛者十全大補湯托補之外俱敷烏龍膏其餘內外治法俱按癰疽腫潰瘍門淵液膽經穴名柴胡淸肝湯見前鬢疽托裏消毒散烏龍膏俱見腫瘍門十全大補湯見潰瘍門耳後疽耳後疽生耳摺間三焦風毒膽火炎紅腫有頭焮為順黑陷臖痛冷潰難注此證生於耳摺之間無論左右屬三焦經風毒兼膽經怒火上炎而成初起如粟漸增腫痛小者如杏大者如桃若紅腫有頭焮熱易潰稠膿者為順若黑陷堅硬臖痛引腦甚則頂頰肩肘俱痛不熱遲潰紫血者為逆初治法同夭疽已潰內外治法俱按癰疽潰瘍門又有初起失於托裏或誤食寒涼則毒不能外發遂攻耳竅膿從耳竅出者名為內潰屬虛多服十全大補湯大抵少年得此證者其愈最緩老年得此證者易於成漏十全大補湯見潰瘍門耳發耳發三焦風熱成初椒漸若蜂房形赤腫疼痛生輪後黃膿屬吉紫血凶注此證生於耳後屬三焦經風熱相薄而成初如椒粒漸腫若蜂房將腐亦多眼孔焮赤疼痛腫連耳輪蓋發者乃癰證之毒甚者也不可聽其自潰恐潰遲膿通耳竅當在十一日後剪破瘡頂出黃白膿者屬吉為順出紫鮮血者屬凶為逆初起俱宜服仙方活命飲消之外敷二味拔毒散其餘內外治法俱按癰疽潰瘍門仙方活命飲見腫瘍門二味拔毒散見腫瘍門耳根毒耳根毒初痰核形腫如伏鼠焮赤疼三焦風火膽怒氣暴腫潰速非疽癰注此證生於耳後初起形如痰核漸增腫勢狀如伏鼠焮赤疼痛由三焦風火膽經怒氣上沖凝結而成但此證暴腫潰速根淺易愈非若癰疽之勢大毒甚也初起寒熱往來宜服荆防敗毒散汗之發熱痛甚者仙方活命飲消之膿成者服透膿散虛者服托裏透膿湯潰後外撒紅靈藥貼太乙膏膿盡換搽生肌玉紅膏生肌斂口若遇虛者膿水淸稀或瘡口斂遲即服香貝養榮湯補之自斂仙方活命飲見腫瘍門荆防敗毒散見項部腦疽透膿散見腫瘍門托裏透膿湯見前侵腦疽紅靈藥生肌玉紅膏太乙膏俱見潰瘍門香貝養榮湯見項部石疽玉枕疽玉枕疽屬督脈經證由積熱風邪乘枕骨微上腦户穴髙腫為順紫陷凶注此證由督脈經積熱外受風邪凝結而成生在玉枕骨尖微上腦户穴初起如粟麻癢相兼寒熱往來口渴便祕漸增堅硬大者如茄小如鵝卵紅活髙腫潰出稠膿者屬吉而順也若紫暗塌陷潰出血水者屬凶險也初則俱服神授衛生湯消解之虛者宜服托裏消毒散外敷沖和膏其餘內外治法俱按癰疽腫潰瘍門神授衛生湯托裏消毒散沖和膏俱見腫瘍門腦後發腦後發生在督經熱結風府粟腫疼紅活易潰稠膿順紫暗難潰血水凶注此證屬督脈經枕骨之下風府穴由積熱外受風邪凝結而成初如粟米焮腫作疼痛引頭頂肩項氣粗鼻塞漸大如盤如碗紅活速潰出稠膿者順紫暗難潰時津血水者逆初起內外治法按玉枕疽其餘內外治法俱按癰疽腫潰瘍門腦鑠腦鑠項後如橫木精涸毒火上乘生黑如竈煙牛脣硬木痛未腐水流淸急施桑艾法至痛火燎刺痛屬陽經速服仙方活命飲若見七惡定然凶注此證生於督脈經風府穴由陰精枯涸毒火乘之而生初起形如椒粒堅硬紫暗漸腫如橫木甚則上至顛頂下至大椎色如竈煙硬若牛脣未膿皮先腐爛時流淸水肌肉氷冷輕者木痛重者毒氣將陷全不知疼宜急施桑柴烘法或艾壯灸法以痛為度速服仙方活命飲以舒解其毒七日之後不發長不生大膿者宜服十全大補湯救之投補藥不應者難治若初起熱如火燎刺痛屬陽證速服黃連消毒飲外敷回陽玉龍膏此證若首尾純見五善之證者屬順見七惡之證者屬逆也其餘內外治法俱按癰疽腫潰瘍門桑柴烘法艾壯灸法俱見首卷仙方活命飲見腫瘍門十全大補湯見潰瘍門黃連消毒飲見前百會疽回陽玉龍膏見腫瘍門油風油風毛髮乾焦脫皮紅光亮癢難堪毛孔風襲致傷血養真海艾砭血痊注此證毛髮乾焦成片脫落皮紅光亮癢如蟲行俗名鬼剃頭由毛孔開張邪風乘虛襲入以致風盛燥血不能榮養毛髮宜服神應養真丹以治其本外以海艾湯洗之以治其標若耽延年久宜針砭其光亮之處出紫血毛髮庶可復生神應養真丹羌活木瓜天麻白芍當歸菟絲子熟地酒蒸搗膏川芎等分為末入地黃膏加蜜丸桐子大每服百丸溫煮酒或鹽湯任下方歌神應養真治油風養血消風髮復生羌歸木瓜天麻芍菟絲熟地與川芎海艾湯海艾菊花藁本蔓荆子防風薄荷荆穗藿香甘松各二錢水五六碗同藥煎數滾連湯共入厰口鉢內先將熱氣薰靣候湯少溫用布蘸洗日洗二三次洗後避風忌魚腥發物方歌海艾湯治油風癢先薰後洗善消風菊藁蔓荆風薄穗藿香海艾與甘松白屑風白屑風生頭與靣燥癢日久白屑見肌熱風侵成燥化換肌潤肌醫此患注此證初生髮內延及靣目耳項燥癢日久飛起白屑脫去又生由肌熱當風風邪侵入毛孔鬱久燥血肌膚失養化成燥證也宜多服祛風換肌丸若肌膚燥裂者用潤肌膏擦之甚效祛風換肌丸大胡麻蒼术炒牛膝酒洗石菖蒲苦參何首烏生花粉葳靈仙各二兩當歸身川芎甘草各一兩生右為細末陳煮酒跌丸菉豆大每服二錢白滚水送下忌魚腥發物火酒方歌換肌丸治白屑風燥癢日增若蟲行風燥血分失潤養疊起白屑落復生歸芎胡麻蒼术膝菖蒲花粉草葳靈苦參何首烏為末煮酒跌丸菉豆形潤肌膏香油四兩奶酥油二兩當歸五錢紫草一錢將當歸紫草入二油內浸二日文火煠焦去渣加黃蠟五錢溶化盡用布濾傾碗內不時用柳枝攪冷成膏每用少許日擦二次方歌潤肌膏擦白屑風肌膚燥癢用更靈酥香二油歸紫草煠焦加蠟濾攪凝秃瘡秃瘡風熱化生蟲騷癢難堪却不疼白痂如錢生髮內宜服通聖擦膏靈注此證頭生白痂小者如豆大者如錢俗名錢癬又名肥瘡多生小兒頭上騷癢難堪却不疼痛日久延漫成片髮焦脫落即成秃瘡又名癩頭瘡由胃經積熱生風而成宜用防風通聖散料醇酒浸焙為細末每服一錢或二錢量其壯弱用之食後白滚湯調下服至頭上多汗為驗初起肥瘡宜擦肥油膏用久則效己成秃瘡者先宜艾葉鴿糞煎湯洗淨瘡痂再用豬肉湯洗之隨擦躑躅花油以殺蟲散風蟲死則癢止風散則髮生血潮則肌膚潤久擦甚效防風通聖散防風當歸白芍酒炒芒硝大黃連翹桔梗川芎石膏煆黃芩薄荷麻黃滑石各一兩荆芥白术土炒山梔子各二錢五分甘草二兩生共為末方歌防風通聖治秃瘡胃經積熱致風傷連翹梔子麻黃桔白术歸芎滑石防黃芩甘草石膏芍薄荷荆芥並硝黃共末酒拌晒乾碾白湯調服發汗良肥油膏番木鱉六錢當歸藜蘆各五錢黃蘗苦參杏仁狼毒白附子各三錢鯉魚膽二個用香油十兩將前藥入油內熬至黑黃色去渣加黃蠟一兩二錢溶化盡用布濾過罐收每用少許用藍布裹於手指蘸油擦瘡方歌肥油膏能治肥瘡散風殺蟲長髮強黃蘗苦參白附子番鱉狼毒杏仁良藜蘆當歸鯉魚膽煠焦入蠟實竒方躑躅花油方躑躅花根四兩搗爛用菜油一碗煠枯去渣加黃蠟少許布濾候冷青布蘸擦日用三次氊帽戴之勿令見風方歌躑躅花油療秃瘡驅蟲止癢擦之良躑躅花根研極爛菜油煠枯入蠟強螻蛄癤螻蛄癤即蟺拱頭勢小勢大各有由胎毒堅小多衣膜暑熱形大功易收注此證多生小兒頭上俗名貉㺁未破如曲蟺拱頭破後形似螻蛄串穴有因胎中受毒者其瘡腫勢雖小而根則堅硬潰破雖出膿水而堅硬不退瘡口收斂越時復發本毒未罷他處又生甚屬纒綿難斂宜用三品一條鎗插於孔內化盡堅硬衣膜換撒生肌散貼玉紅膏以收斂之不致再發也亦有暑熱成毒者大如梅李相聯三五枚潰破膿出其口不斂日久頭皮串空亦如螻蛄串穴之狀宜貼紺珠膏拔盡膿毒將所串之空皮剪通使無藏膿之處用米泔水日洗一次乾撒生肌散貼萬應膏甚效有因瘡口開張日久風邪襲入以致瘡口周圍作癢抓破津水相延成片形類黃水瘡者宜用敗銅散搽之忌魚腥發物三品一條鎗白砒一兩五錢明礬三兩砒礬二味共為細末入小罐內加炭火煆紅青煙已盡疊起白煙片時約上下紅徹住火取罐安地上一宿取出約有砒礬淨末一兩加雄黃二錢四分乳香一錢二分共研極細厚糊搓成線條陰乾瘡有孔者插入孔內無孔者先用針通孔竅早晚插藥二條插至三日後孔大者每插十餘條插至七日孔內藥條滿足方住患處四邊自然裂開大縫共至十四日前後其堅硬衣膜及疔核瘰癧痔漏諸管自然落下隨用湯洗搽玉紅膏虛者兼服健脾補劑自然收斂方歌神竒三品一條鎗能醫堅硬衣膜瘡雄乳白砒礬生用研末煆煉搓條良敗銅散化銅舊罐子一個研為細末用香油調敷自能滲濕祛癢瘡口易斂方歌敗銅散治潰風傷騷癢破津脂水瘡化銅舊罐研細末香油調敷滲濕良紺珠膏萬應膏生肌散玉紅膏俱見潰瘍門髮際瘡髮際瘡生髮際邊形如黍豆癢疼堅頂白肉赤初易治胖人肌厚最纒綿注此證生項後髮際形如黍豆頂白肉赤堅硬痛如錐刺癢如火燎破津膿水亦有浸淫髮內者此由內鬱濕熱外兼受風相搏而成也初宜紺珠丹汗之次用酒製防風通聖散清解之外搽黃連膏效惟胖人項後髮際肉厚而多摺紋其髮反刺瘡內因循日久不瘥又兼受風寒凝結形如卧瓜破爛津水時破時斂俗名謂之肉龜經年不愈亦無傷害常用琥珀膏貼之可稍輕也琥珀膏定粉一兩血餘八錢輕粉四錢銀硃七錢花椒十四粒黃蠟四兩琥珀五分末麻油十二兩將血餘花椒麻油煠焦撈去渣下黃蠟溶化盡用夏布濾淨傾入磁碗內預將定粉銀硃輕粉琥珀四味各研極細共合一處徐徐下入油內用柳枝不時攪之以冷為度綿燕脂攤貼紅綿紙攤貼亦可方歌琥珀膏能治諸瘡活瘀解毒化腐良定血輕椒蠟珀麻油熬膏亦療瘍紺珠丹即萬靈丹見腫瘍門防風通聖散見前秃瘡黃連膏見鼻部鼻瘡頭風傷目頭風引目眉稜痛風火寒痰有四因或由楊梅毒攻頂或因産後被風侵注此證畏寒惡風其痛走注不定得暖少減者風痛也寒熱口苦大渴二便祕不眠者火痛也手足厥冷靣青脣白氣逆不渴小水白者寒痛也身重肢痠胸煩作嘔口吐痰沫者痰痛也以上四證舊有古方羌活沖和湯倍川芎加菊花隨經形證加引治之倘若因循失治風攻眉稜痠痛眼皮跳動漸攻睛珠起藍雲遮睛多致損目若只眉稜痠痛以碧雲散常吸之甚效羌活沖和湯防風白芷各一錢細辛甘草各五分生生地蒼术黃芩各一錢羌活一錢五分川芎二錢引加蔥頭三根生薑一片紅棗肉二枚水煎食逺服痛由頂後起屬膀胱經倍羌活加藁本痛由耳後起屬膽經加柴胡痛由太陽牽引頭額兩目屬胃經倍白芷加葛根煆石膏頭痛兼有腹痛身重屬脾經倍蒼术頭痛兼有足冷氣逆屬腎經倍細辛甚者加麻黃生附子減黃芩頭痛兼有嘔涎沫者手足厥冷屬肝經加吳茱萸頭痛有火熱渴倍酒洗黃芩加生石膏便祕者加生大黃頭痛吐痰涎四肢不冷者加半夏方歌沖和頭風風傷目風火寒痰四因生日久眉稜痠痛跳遮睛損目此能淸防風白芷細辛草生地蒼芩羌活芎詳在隨加引經藥蔥薑紅棗水煎成碧雲散川芎鵝不食草各一兩細辛辛荑各二錢青黛一錢共為細末患者口噙涼水令人以蘆筒吹入左右鼻孔內取嚏為效每用少許鼻常吸之其效緩方歌碧雲散去頭風證眉稜痠痛更堪醫鵝不食草辛荑黛芎細同研用最宜貼兩太陽穴法治頭痛如破雀腦川芎白附子各等分研末蔥汁調稠紙攤貼左右太陽穴效産後風寒侵腦頭痛不可發汗宜用四物湯倍川芎加荆芥穗服之其效緩楊梅毒入腦髓以致頭痛者治在本門四物湯見潰瘍門靣部顴瘍顴疽顴瘍顴疽漸榴形風熱積熱小腸經瘍起焮紅浮腫痛疽紫漫硬木麻疼注此二證發於顴骨尖處屬小腸經不論左右初小漸大如榴發陽分者由風熱而生初起焮紅浮腫疼痛七日即潰名為顴瘍毒輕根淺易愈發陰分者由積熱而生色紫漫腫堅硬麻木疼痛三七方潰名為顴疽毒甚根深難愈瘍證初宜仙方活命飲疽證初宜內疏黃連湯或麥靈丹其餘內外治法俱按癰疽腫瘍潰瘍門仙方活命飲內疏黃連湯麥靈丹俱見腫瘍門顴疔顴疔初起粟米形證由陽明火毒生堅硬頂凹根深固寒熱交作麻癢疼注此證生在顴骨之間屬陽明胃經不論左右初如粟米黃色小皰次如赤豆頂凹堅硬按似疔頭麻癢疼痛多因過食炙煿藥酒以致胃經積火成毒而生初宜蟾酥丸或麥靈丹汗之次服黃連消毒飲淸之外治法同疔門凡疔皆屬迅速之證初覺即當急治遲則毒火攻心令人昏憒譫語惡證悉添多致不救蟾酥丸見疔瘡門麥靈丹見腫瘍門黃連消毒飲見頭部百會疽靣發毒靣發毒在頰車生初少漸多赤豆形腫硬焮疼津黃水證屬風熱客陽明注此證生靣上頰車骨間初生一個漸發數枚形如赤豆色紅焮痛堅硬似疔時津黃水由風熱客於陽明上攻而成初宜服荆防敗毒散汗之若胃火盛則唇焦口渴便燥者即服涼膈散下之外以淸涼消毒散敷之即愈涼膈散黃芩薄荷梔子生研連翹去心石膏生甘草生芒硝大黃各等分水二鍾苦竹葉二十片煎八分加蜂蜜三匙和服方歌涼膈散醫肺胃熱口渴脣焦便燥結芩薄梔翹石膏草芒硝大黃苦竹葉淸涼消毒散白芨乳香雄黃天花粉麝香烏藥山慈菰黃蘗各等分共研細末雞子淸和蜜水調敷方歌淸涼消毒去風熱芨乳雄黃花粉麝烏藥慈菰黃蘗研雞淸蜜調毒即滅荆防敗毒散見項部腦疽靣遊風靣遊風燥熱濕成靣目浮腫癢蟲行膚起白屑而癢極破津黃水津血疼注此證生於靣上初發靣目浮腫癢若蟲行肌膚乾燥時起白屑次後極癢抓破熱濕盛者津黃水風燥盛者津血痛楚難堪由平素血燥過食辛辣厚味以致陽明胃經濕熱受風而成癢甚者宜服消風散痛甚者宜服黃連消毒飲外抹摩風膏緩緩取效摩風膏麻黃五錢羌活一兩白檀香一錢升麻二錢白芨一錢防風二錢當歸身一錢用香油五兩將藥浸五日文火煠黃即撈去渣加黃蠟五錢溶化盡用絹濾過攪冷塗抹瘡上方歌摩風膏抹遊風證麻黃羌活白檀升芨防歸身香油泡煠黃去渣加蠟凝消風散見項部鈕扣風黃連消毒飲見頭部百會疽痄腮痄腮胃熱是其端初起焮痛熱復寒髙腫焮紅風與熱平腫色淡熱濕原注此證一名髭發一名含腮瘡生於兩腮肌肉不著骨之處無論左右總發端於陽明胃熱也初起焮痛寒熱往來若髙腫色紅焮熱者係胃經風熱所發若平腫色淡不鮮者由胃經濕熱所生始則俱以柴胡葛根湯表之若口渴便祕宜四順淸涼飲解之表裏證俱解腫痛仍作者勢必成膿宜托裏消毒散托之膿熟者針之體虛者宜平補之其餘治法按癰疽潰瘍門此證初起若過服涼藥令毒攻喉者險柴胡葛根湯柴胡葛根石膏煆花粉黃芩各一錢甘草五分生牛蒡子炒研連翹去心桔梗各一錢升麻三分水二鍾煎八分不拘時服方歌柴胡葛根發表證痄腮腫痛或平形石膏花粉黃芩草牛蒡連翹桔梗升四順淸涼飲防風梔子生研連翹去心甘草生當歸赤芍羌活各一錢大黃二錢水二鍾燈心五十寸煎八分食逺服方歌四順淸涼攻裏強口乾便祕痄腮瘡防風梔子連翹草歸芍燈心羌大黃托裏消毒散見腫瘍門頰瘍頰瘍胃經積熱生初如紅粟漸榴形膿出腫消易斂愈膿稀難斂漏因成注此證生於耳下頰車骨間由陽明胃經積熱而生始發如粟色紅漸大如榴初起宜犀角升麻湯淸解之若失治或過敷寒藥以致肌冷凝結堅硬難消難潰者宜升陽散火湯宣發之將潰宜托裏消毒散膿熟針之膿出腫退瘡口易斂者則愈或牙關緊急不開或旁腫不消膿水淸稀因而成漏復被寒侵瘡孔致生多骨經年纒綿難愈者服桂附地黃丸外用豆豉餅墊灸艾壯初用九壯以知熱癢為止每日灸之以朽骨脫出膿漸少而肌漸平為度兼用紅升丹撚入瘡口內萬應膏蓋貼每日一易患者當愼起居戒腥發等物漸漸收功犀角升麻湯犀角二錢五分升麻一錢七分黃芩八分白附子八分煨熟麵裹生甘草五分白芷八分川芎八分羌活一錢二分防風八分水三鍾煎一鍾食逺熱服方歌犀角升麻醫頰瘍色紅初起服之良黃芩白附生甘草白芷川芎羌活防升陽散火湯撫芎六分蔓荆子白芍酒炒防風羌活獨活甘草半生半灸人參各一錢柴胡香附各一錢五分葛根一錢升麻一錢殭蠶一錢五分炒生薑一片紅棗肉一枚水三鍾煎一鍾食逺溫服方歌升陽散火過敷寒牙義拘急木痛堅撫蔓芍防羌獨草參柴香附葛升蠶托裏消毒散見腫瘍門豆豉餅見灸法內紅升丹萬應膏俱見潰瘍門骨槽風骨槽風火三焦胃耳前腮頰隱隱疼腐潰筋骨仍硬痛牙關拘急夾邪風注此證一名牙義發一名穿腮發乃手少陽三焦足陽明胃二經風火也起於耳前連及腮頰筋骨隱痛日久腐潰腮之裏外筋骨仍然漫腫硬痛牙關拘急皆由邪風深襲筋骨故也此證屬在筋骨陰分故初起腫硬難消潰後瘡口難合多致不救初起熱不盛者內宜服淸陽散火湯外以淸胃散擦牙真君妙貼散敷腮如初起發表之後人壯火盛者用皂刺大黃甘草節白芷殭蠶下之後減大黃加生石膏以淸之然亦不可過用寒涼之藥恐其凝結也有硬腫日久失治不能盡消者膿勢將成宜用中和湯托之已潰按癰疽潰瘍門治法亦有過服寒涼以致肌肉堅凝腐臭非理中湯佐以附子不能回陽非殭蠶不能搜風如法治之諸證俱減惟牙關拘急不開宜用生薑片墊灸頰車穴二七壯其穴在耳垂下五分陷中處每日灸之兼用針刺口內牙盡處出血其牙關即開若寒熱不退形焦體削痰盛不食或口內腐爛甚則穿腮落齒者俱為逆證當腐爛之初治法即同牙疳亦不過稍盡人事耳淸胃散薑黃白芷細辛川芎各等分共研細末先以鹽湯潄口擦牙痛處方歌淸胃散擦牙腫疼薑黃白芷細辛芎同研先以鹽湯潄後擦此藥有竒功中和湯白芷桔梗人參黃耆各一錢藿香五分肉桂五分甘草白术土炒川芎當歸白芍各一錢酒炒麥門冬五分去心水二鍾薑三片棗二枚煎八分加酒一杯食逺服方歌中和湯治骨槽風日久不消欲潰膿芷桔參耆藿桂草术芎歸芍麥門冬理中湯見潰瘍門真君妙貼散見腫瘍門升陽散火湯方見頰瘍發頤發頤腫痛結核般經屬陽明身熱寒傷寒疹毒汗失表腫至咽喉調治難注此證又名汗毒發於頤頷之間屬足陽明胃經初起身發寒熱腫如結核微熱微痛漸腫如桃如李疼痛倍增由傷寒發汗未盡或疹形未透壅積而成初起宜荆防敗毒散汗之外以二味拔毒散敷之即消如消之不應者腫痛日增勢必潰膿宜服托裏透膿湯潰後按癰疽潰瘍門治法若此證失於調治或誤投寒涼尅伐之藥毒必內陷腫至咽喉痰湧氣堵湯水難咽者逆荆防敗毒散見項部腦疽二味拔毒散見腫瘍門托裏透膿湯見頭部侵腦疽時毒時毒初發類傷寒漫腫無頭在項間因感四時不正氣治分壯弱疏解痊注此證初起狀類傷寒憎寒發熱令人恍惚不寧肢體痠疼或兼咽痛一二日間發於項腮頷頤作腫無頭漸漸焮赤疼痛或似結核有根漫腫色赤俱由感冒四時不正邪氣客於經絡釀結而成非發於病後之頤毒也惟在醫者精察瘡色辨别虛實治法須宜疏解不可驟用寒涼致毒不外發而內攻咽喉者險矣初服荆防敗毒散汗之其腫不消者宜服連翹消毒飲腫仍不消膿勢將成壯者宜服透膿散弱者宜服托裏透膿湯外敷二味拔毒散膿熟針之潰按癰疽潰瘍門治法荆防敗毒散見項部腦疽連翹消毒飲見背部酒毒發透膿散見腫瘍門托裏透膿湯見頭部侵腦疽二味拔毒散見腫瘍門鳯眉疽鳯眉疽生兩眉稜形如長瓜漫腫紅膀胱小腸肝膽熱煩悶嘔逆不食凶注此疽亦名眉發生於眉稜無論左右俱屬足太陽膀胱手太陽小腸足厥隂肝足少陽膽四經積熱所致形長如瓜疼痛引腦二目合腫堅硬色赤按之有根六日內刺之得膿則吉無膿則險甚則十四日不潰煩悶嘔逆不食者凶初宜服仙方活命飲次服托裏透膿湯速潰為妙遲則恐攻眼損睛矣其餘內外治法按癰疽潰瘍門仙方活命飲見腫瘍門托裏透膿湯見頭部侵腦疽眉心疽眉心疽生在印堂硬腫為疽浮腫瘍督經風熱氣凝滯根堅木痛當疔防注此證生於兩眉中間疽名曰印堂疽毒初起色暗根平腫硬疼痛至二十一日腐潰出稠膿者順無膿黑陷者逆瘍名曰靣風毒瘍毒初起色赤浮腫焮痛易治七日潰膿若色黑木痛麻癢太過根硬如鐵釘之狀寒熱並作即眉心疔也俱由督脈經風熱壅結氣滯所成疽瘍二證俱按百會疽眉心疔治法同疔龍泉疽龍泉疽起在人中麻癢堅疼赤豆形上焦風熱攻督脈憎寒壯熱治同疔注此證生於水溝穴即人中是也屬督脈經形如赤豆勢小根深堅硬木痛色紫頂焦寒熱交作不時麻癢由上焦風熱攻於督脈而成宜按疔門急速治之遲則毒氣內攻令人煩悶惡心乾嘔神亂昏憒腮項俱腫多致不救虎髭毒虎髭毒在頦下生胃腎積熱久任經癰焮腫痛速潰易疽堅硬痛麻癢疔注此毒一名頦癰腫痛焮赤速潰易治一名承漿疽堅硬痛腫遲潰難治若根深形小似豆麻癢痛甚惡寒發熱心煩作嘔者疔也當從疔治皆由過食炙煿以致胃腎二經積熱上攻任脈而成癰疽二證初起宜服仙方活命飲加升麻桔梗消之若便祕脣焦大渴者宜內疏黃連湯淸之其餘內外治法俱按癰疽腫瘍潰瘍門初起麻癢如疔治法按疔門仙方活命飲內疏黃連湯俱見腫瘍門燕窩瘡燕窩瘡在下頦生如攢粟豆癢熱疼形類黃水瘡破爛此證原來濕熱成注此證生於下頦俗名羊鬍子瘡初生小者如粟大者如豆色紅熱癢微痛破津黃水形類黃水瘡浸淫成片但疙􅜀如攢由脾胃濕熱而成宜服芩連平胃湯外搽碧玉散即效芩連平胃湯黃芩一錢五分黃連一錢厚朴一錢薑炒蒼术二錢炒甘草五分生陳皮一錢水二鍾薑一片煎八分食後服方歌芩連平胃燕窩瘡除濕淸熱服更良薑炒厚朴蒼术草陳皮同煎引生薑碧玉散黃蘗末紅棗肉各五錢性燒炭存共研極細末香油調搽患處方歌碧玉散搽燕窩瘡色紅疙􅜀津水黃棗炭蘗末香油拌消疼止癢滲濕方雀斑雀斑淡黃碎點形火鬱孫絡血風成犀角升麻丸常服正容散洗漸無蹤注此證生於靣上其色淡黃碎點無數由火鬱於孫絡之血分風邪外搏發為雀斑宜常服犀角升麻丸並治一切粉刺酒刺皯􅍍靨子等證外用時珍正容散早晚洗之以澤其肌久久自愈亦有水虧火滯而生雀斑者宜服六味地黃丸犀角升麻丸犀角一兩五錢升麻一兩羌活一兩防風一兩白附子五錢白芷五錢生地黃一兩川芎五錢紅花五錢黃芩五錢甘草二錢五分生各為細末合均蒸餅為小丸每服二錢食逺臨卧用茶淸送下方歌犀角升麻治雀斑皯􅍍靨子亦能痊犀升羌防白附芷生地芎紅芩草丸時珍正容散豬牙皂角紫背浮萍白梅肉甜櫻桃枝各一兩焙乾兌鷹糞白三錢共研為末每早晚用少許在手心內水調濃搓靣上良久以溫水洗靣用至七八日後其斑皆沒神效方歌正容散洗雀斑容豬牙皂角紫浮萍白梅櫻桃枝鷹糞研末早晚水洗靈六味地黃丸懷熟地八兩山萸肉懷山藥各四兩炒白茯苓丹皮澤瀉各三兩共為細末煉蜜為丸如梧桐子大每服二錢空心淡鹽湯送下方歌六味地黃善補隂能滋腎水並生津萸苓山藥丹皮瀉研末蜜丸服最神黑痣黑痣生面黴點斑小如黍粒豆形圓孫絡之血陽束結挑破水晶膏點痊注此證生於面部形如黴點小者如黍大者如豆比皮膚髙起一線有自幼生者亦有中年生者由孫絡之血滯於衛分陽氣束結而成宜用線針挑破以水晶膏點之三四日結痂其痣自落用貝葉膏貼之兼戒醬醋愈後無痕水晶膏礦子石灰水化開取末五錢又用濃鹻水多半茶鍾浸於石灰末內以鹻水髙石灰二指為度再以糯米五十粒撒於灰上如鹻水滲下陸續添之泡一日一夜冬天兩日一夜將米取出搗爛成膏挑少許點於痣上不可太過恐傷好肉方歌水晶膏能點黑痣鹻水浸灰入糯米一日一夜米泡紅取出搗膏效無比貝葉膏見潰瘍門黧黑皯􅍍皯􅍍如塵久炲暗原於憂思抑鬱成大如蓮子小赤豆玉容久洗自然平注此證一名黧黑斑初起色如塵垢日久黑似煤形枯暗不澤大小不一小者如粟粒赤豆大者似蓮子芡實或長或斜或圓與皮膚相平由憂思抑鬱血弱不華火燥結滯而生於靣上婦女多有之宜以玉容散早晚洗之常用美玉磨之久久漸退而愈戒憂思勞傷忌動火之物玉容散白牽牛團粉白斂白細辛甘松白鴿糞白芨白蓮蕊白芷白术白殭蠶白茯苓各一兩荆芥獨活羌活各五錢白附子鷹條白白扁豆各一兩防風五錢白丁香一兩共研末每用少許放手心內以水調濃搽搓靣上良久再以水洗靣早晚日用二次方歌玉容散退黧皯􅍍牽牛團粉斂細辛甘松鴿糞及蓮蕊芷术殭蠶白茯苓荆芥獨羌白附子鷹條白扁豆防風白丁香共研為末早晚洗靣去斑容御纂醫宗金鑑卷六十三
