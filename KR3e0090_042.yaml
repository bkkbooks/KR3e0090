body:
  text: 編輯雜病心法要訣目録瘧疾霍亂嘔吐噦翻胃噎膈泄㵼痢疾黃疸積聚疝御纂醫宗金鑑卷四十二目録欽定四庫全書御纂醫宗金鑑卷四十二編輯雜病心法要訣目録瘧疾霍亂嘔吐噦翻胃噎膈泄㵼痢疾黃疸積聚疝御纂醫宗金鑑卷四十二目録欽定四庫全書御纂醫宗金鑑卷四十二編輯雜病心法要訣瘧疾總括夏傷於暑舍榮內秋感寒風并衛居比時或為外邪束暑汗無出病瘧疾注經曰痎瘧皆生於風謂四時病瘧未有不因風寒外束暑邪內伏者也又曰瘧者風寒之氣不常也此言比時病瘧者也又曰夏傷於暑秋為痎瘧又曰夏暑汗不出者秋成風瘧謂夏傷於暑其邪甚者即病暑其邪微者則舍於榮復感秋氣寒風與衛并居則暑與風寒合邪始成瘧病也其不即病傷寒者亦以有暑邪預伏於榮中也蓋有風無暑惟病風有暑無風惟病暑必風暑合邪始病瘧也日作間作瘧隨經絡循伏膂深入脊內注伏衝橫連膜原薄藏府會衛之時正邪爭得隂內薄生寒栗得陽外出熱蒸蒸邪淺日作日會衛邪深間作衛遲逢注瘧氣之邪伏藏於榮隨其經絡循脊膂之表而下此初病邪淺傳舍之次也其邪深者則入脊膂之內伏注於衝脈橫連諸經脂膜之原內及藏府此邪漸深傳舍之次也衛氣者一日一夜周於身每至明旦則出足太陽睛明大會於風府腠理乃開開則所客榮衛之邪入邪入得隂內薄則生寒得陽外出則生熱內外相薄邪正交爭而病乃作也病初邪淺者衛行未失常度其邪日與衛會故日作也病久邪深者衛行遲失常度其邪不能日與衛會故間日乃作也時有間二日間三日或至數日作者亦衛氣行愈遲會愈遲故作愈遲也瘧晝夜作衛不循經行脈外陽會晝發隂夜發邪退自然歸陽分病進每必入隂家注榮氣循經而行脈中衛氣不循經而行脈外惟日行於三陽夜行於三隂故邪在三陽之淺者則晝發邪在三隂之深者則夜發病邪將退者夜發退為晝發此為去隂就陽則病欲已也病邪漸進者晝發退為夜發此為去陽入隂則病益甚也瘧蚤晏作衛氣平旦會風府邪傳日下一節間從頭循下故益晏下極復上蚤之緣注衛氣流行每日平旦會於風府而邪氣中人從頭項歷風府下循背腰日下傳脊之一節邪與衛會日晚故作日益晏也邪傳下極骶衝其氣復上行邪與衛會日蚤故作日益蚤也瘧疾治法瘧初氣實汗吐下表裏俱清用解方清解不愈方可截久瘧形虛補自當注瘧初氣實均宜汗吐下有表裏證汗下之胸滿嘔逆有飲者吐之表裏俱清宜用和解清解不愈表裏無證可用截藥止之久瘧形羸氣虛宜用補劑自當然也桂麻各半湯瘧初寒熱兩平者桂麻各半汗方療汗少寒多麻倍入汗多倍桂熱加膏注瘧病初起寒熱不多不少兩平者宜桂麻各半湯汗之汗少寒多熱少者倍麻黃湯汗之汗多寒少熱平者倍桂枝湯汗之熱多者更加石膏麻黃羌活湯桂枝羌活湯麻黃羌活加半夏湯白虎湯白虎桂枝湯柴胡白虎湯柴胡桂枝湯寒多寒瘧而無汗麻黃羌活草防尋熱多有汗為風瘧減麻添桂嘔半均先熱後寒名溫瘧白虎汗多合桂君疸瘧但熱柴白虎牝瘧惟寒柴桂親注此皆諸瘧初起之汗法也先傷於寒後傷於風先寒後熱寒多熱少無汗謂之寒瘧宜用麻黃羌活湯即麻黃羌活防風甘草也先傷於寒後傷於風先寒後熱熱多寒少有汗謂之風瘧宜用桂枝羌活湯即桂枝羌活防風甘草也二證嘔者均加半夏先傷於風後傷於寒先熱後寒謂之溫瘧宜用白虎湯汗多合桂枝湯陽氣盛陽獨發則但熱而不寒謂之疸瘧宜用柴胡白虎湯即小柴胡合白虎湯也隂氣盛隂獨發則但寒而不熱謂之牝瘧宜用柴胡桂枝湯即小柴胡合桂枝湯也草果柴平湯大柴胡湯食瘧痞悶噫惡食草果小柴平胃宜瘧裏便鞕大柴下消檳果朴量加之注因食而病瘧者則痞悶噫氣惡食宜小柴胡合平胃散加草果清之凡瘧有裏不清便鞕者宜大柴胡湯加芒消厚朴草果檳榔下之清脾飲瘧疾已經汗吐下清解未盡寒熱方清脾白术青朴果小柴參去入苓薑氣虛加參痰橘半飲多宜逐倍薑榔渴熱知膏天花粉食滯麥麯濕澤蒼注瘧疾已經或汗或吐或下表裏無證法當清解宜用清脾飲和之即白术青皮厚朴草果柴胡黃芩半夏甘草茯苓生薑也氣虛者加人參痰多者加橘紅倍半夏飲多者倍生薑加檳榔渴熱者加知母石膏天花粉食滯者加麥芽神麯濕盛者加澤瀉蒼术久瘧虛瘧勞瘧久瘧氣虛脾胃弱四獸益氣等湯斟勞瘧鱉甲十全補熱除耆桂入柴芩注久患瘧疾形氣俱虛脾胃弱不思食宜用四獸飲補中益氣等湯斟酌治之久病勞損氣血兩虛而病瘧疾者名曰勞瘧宜用十全大補湯倍加鱉甲熱盛者除去黃耆肉桂加柴胡黃芩也柴胡截瘧飲蜜他僧散諸瘧發過三五次表裏皆清截法先未清截蚤發不已已清不截正衰難截虛柴胡截瘧飲小柴梅桃檳常山截實不二他僧散燒酒冷調服面南注凡瘧按法治之發過三五次表裏無證當先以截瘧藥截之若表裏未清截蚤則瘧疾必復發之不已表裏已清不截則正衰邪盛而難治也截不足人之瘧宜用小柴胡湯加常山檳榔烏梅桃仁薑棗煎併滓露一宿次日發前一二時小溫服惡心以糖拌烏梅肉壓之截有餘人之瘧宜用不二飲全方或蜜他僧細末大人七分小兒量之冷燒酒調面南如前法服之一服不愈再服必止戒雞魚豆腐麵食羮湯熱粥熱物痎瘧瘧母痎瘧經年久不愈瘧母成塊結癖癥形實控涎或化滯攻後餘法與前同注痎瘧經年不愈之老瘧也瘧母久瘧腹中成塊癖也形實宜用控涎丹以攻痰飲或用化滯丸以攻積滯攻後之餘法與前所治瘧法同也桂枝麻黃柴胡四物去杏仁加桃仁湯瘧在夜發三隂瘧桂麻柴物杏易桃鬼瘧尸注多惡夢恐怖蘇合效功髙注瘧在夜發名曰三隂瘧疾初熱宜用桂枝湯麻黃湯小柴胡湯四物湯方合劑以杏仁易桃仁增損汗之汗解之後餘同前法鬼瘧亦多在夜發由尸氣注之比三隂瘧疾則夜多惡夢時生恐怖宜用蘇合香丸治之霍亂總括揮霍變亂生倉卒心腹大痛吐利兼吐㵼不出乾霍亂舌卷筋縮入腹難注欲吐不吐欲㵼不㵼心腹大痛名曰乾霍亂又名攪腸􅂒若舌卷筋縮則卵隂入腹難治也藿香正氣散二香湯甘露飲霍亂風寒暑食水雜邪為病正氣方藿蘇陳半茯苓草芷桔腹皮厚朴當轉筋木瓜吳萸入暑合香薷濕入蒼暑熱六一甘露飲寒極烏附理中湯注霍亂之病得之於風寒暑食水邪雜揉為病亂於腸胃清濁相干故心腹大痛吐㵼也藿香正氣湯即藿香蘇葉陳皮半夏茯苓甘草白芷桔梗大腹皮厚朴也暑則吐多合香薷飲名二香湯濕則㵼多加蒼术暑熱甚者用辰砂六一散或五苓散加石膏滑石寒水石名甘露飲寒極肢厥脈伏者用炮川烏炮川附合理中湯噎膈翻胃總括三陽熱結傷津液乾枯賁幽魄不通賁門不納為噎膈幽門不放翻胃成二證留連傳導隘魄門應自澀於行胸痛便鞕如羊糞吐沫嘔血命難生注三陽熱結謂胃小腸大腸三府熱結不散灼傷津液也胃之上口為賁門小腸之上口為幽門大腸之下口為魄門三府津液既傷三門自然乾枯而水穀出入之道不得流通矣賁門乾枯則納入水穀之道路狹隘故食不能下為噎塞也幽門乾枯則放出腐化之道路狹隘故食入反出為翻胃也二證留連日久則大腸傳道之路狹隘故魄門自應燥澀難行也胸痛如刺胃腕傷也便如羊糞津液枯也吐沫嘔血血液不行皆死證也人參利膈丸汞硫散五汁大黃清燥熱丁沉君子理虛寒便祕壅遏應利膈吐逆不止汞硫先利膈小承參草木歸藿檳桃麻蜜丸汞一硫二研如墨老酒薑汁服即安注五汁謂五汁飲以清燥乾也大黃謂大黃湯即大黃一味用薑汁炙大黃片變黑黃色量人強弱每服二三錢加陳倉米一撮蔥白二莖煎去滓服以治熱結也丁香沉香加入四君子六君子理中湯內治虛寒也利膈謂利膈丸即枳殼厚朴大黃人參甘草木香當歸藿香檳榔桃仁火麻仁蜜為丸也汞硫謂汞硫散也四君子湯四物湯二陳湯二十四味流氣飲氣少血枯四君物痰多氣滯二陳流餘者亦同嘔吐法竭思區畫待天休注氣少者宜四君子湯血枯者宜四物湯痰多宜二陳湯氣滯者宜二十四味流氣飲其餘之治法同嘔吐此病雖竭心思區畫亦不過盡人事以待天命也嘔吐噦總括有物有聲謂之嘔有物無聲吐之徵無物有聲噦乾嘔面青指黑痛厥凶注面色青指甲黑也中痛不止肢厥不回其凶可知也小半夏湯橘皮半夏湯大半夏湯黃連半夏湯丁萸六均湯嘔吐半薑為聖藥氣盛加橘虛蜜參熱盛薑連便閉下寒盛丁萸薑六君注便閉謂大小二便閉而不行宜攻下也初吐切不可下恐逆病勢也五汁飲硫汞散化滯丸潤燥止吐五汁飲蘆薺甘蔗竹瀝薑嘔吐不下硫汞墜積痛作吐化滯良注五汁飲即蘆錐葧薺甘蔗竹瀝薑汁也嘔吐諸藥湯水到咽即吐者宜用重墜之藥以石硫黃二錢水銀一錢同研如煤色極細用老酒薑汁調服稍點白滚湯亦可頓服之其藥即不能吐出次日大便出黑色穢物諸湯水藥服之則不吐也如不大便黑色再服以大便利為度吐而痛者乃積也宜化滯丸諸泄總括食瀉胃瀉飲瀉痰瀉火瀉暑瀉滑瀉大瘕瀉濕勝濡瀉即水瀉多水腸鳴腹不疼寒濕洞瀉即寒瀉鴨溏清徹痛雷鳴完穀不化名飱瀉土衰木盛不升清脾虛腹滿食後瀉腎瀉寒虛晨數行注濡者水也洞者直傾下也鴨溏如鴨屎之溏澄徹清冷也痛腹痛也雷鳴腸鳴甚也不升清謂清氣在下不上升也脾瀉脾虛也食瀉飲食後即瀉也晨數行每至蚤晨行瀉數次也食瀉濡瀉水瀉洞瀉飱瀉寒瀉脾瀉腎瀉傷食作瀉即胃瀉噫氣腹痛穢而黏渴飲瀉復渴飲瀉時瀉時止却屬痰火瀉陳陳痛飲冷暑瀉面垢汗渴煩滑瀉日久不能禁大瘕今時作痢看注過食作瀉名曰食瀉即胃瀉也穢而黏所瀉之物臭而黏也渴而飲飲而瀉瀉而復渴渴而復飲飲而復瀉飲瀉也時或瀉時或不瀉屬痰瀉也陳陳謂瀉一陳痛一陳也大瘕瀉即今時之痢疾病也泄瀉死證泄瀉形衰脈實大五虛噦逆手足寒大孔直出無禁止下瀉土嗽命多難注五虛謂脈細皮寒氣少水漿不入大便不禁也大孔謂肛門大孔不禁也參苓白术散濕㵼胃苓分清濁寒瀉理中附子添飱瀉升陽益胃治倍加芍藥減黃連脾瀉參苓白术散扁豆四君蓮肉攢薏苡山藥縮砂桔腎㵼二神四神丸注參苓白术散即扁豆人參白米茯苓炙草蓮肉薏苡仁山藥縮砂桔梗也二神丸即補骨脂肉豆蔲本方加吳茱萸五味子名四神丸青六散芍藥芩連葛根湯入柱散食瀉實下虛消導飲瀉實者神祐斟虛者春澤甘露飲痰瀉實攻虛六君火瀉草芍芩連葛暑瀉紅麯六一勻滑瀉八柱理中附粟殼烏梅訶蔲尋注食瀉形氣實者宜大承化滯等藥下之形氣虛者宜枳术平胃等消導之神祐斟謂雖當用神祐丸逐飲然亦斟酌不可過也春澤謂春澤湯也甘露飲謂五苓甘露飲也芍藥芩連葛根湯即甘草芍藥黃芩黃連葛根也青六散即六一散加紅麯也八柱散附子理中湯加罌粟殼烏梅訶子肉蔲也瀉心導赤散茯苓車前子飲苓桂理中湯口糜泄㵼雖云熱上下相移亦必虛心脾開竅於舌口小腸胃病化職失糜發生地通連草瀉下參苓白术宜尿少茯苓車前飲火虛苓桂理中醫注口瘡糜爛泄瀉一證古經未載以理推之雖云屬熱然其上發口糜下瀉即止泄瀉方止口糜即生觀其上下相移之情狀亦必純實熱之所為也心之竅開於舌脾之竅開於口心脾之熱故上發口舌瘡赤糜爛胃主消化水穀小腸主盛受消化心脾之熱下移小腸胃府則運化之職失矣故下注泄瀉也口糜發時晚用瀉心導赤散滚湯淬服之即生地木通黃連甘草梢也下泄㵼時蚤晚用參苓白术散糯米湯服之若小便甚少下利不止則為水走大腸宜用茯苓車前子二味各等分煎湯時時代飲利水導熱若服寒涼藥口瘡不效則為虛火上泛宜用理中湯加肉桂大倍茯苓降陽利水降陽而口糜自消水利泄瀉自止可並愈也痢疾總括大瘕小腸大腸瀉腸癖滯下古痢名外因風暑濕蒸氣內因不謹飲食生白痢傷氣赤傷血寒虛微痛熱窘疼實墜糞前虛墜後濕熱寒虛初久稱注大瘕瀉者裏急後重數至圊而不能便莖中痛也小腸㵼者溲澀而便膿血少腹痛也大腸瀉者食已窘迫大便色白腸鳴切痛也腸癖者飲食不節起居不時隂受之則入五藏䐜脹閉塞下為飱瀉久為腸癖腹痛下血也滯下者積汁垢膩與濕熱滯於腸中因而下也此皆古痢之名也然痢之為病裏急後重下利膿血小便赤澀裏急者腹痛積滯也後重者下墜氣滯也小便赤澀者濕熱鬱滯也皆因外受風暑濕蒸之氣內傷生冷飲食過度而生也白痢自大腸來大腸與肺為表裏肺主氣故屬傷氣也赤痢自小腸來小腸與心為表裏心主血故屬傷血也寒閉痛甚寒開痛微痢開病減故痛微也虛者少氣氣無壅滯故亦痛微也熱者多實性急不得舒通故窘痛甚也後墜下迫肛門糞出墜止為糞前墜乃滯也故曰實墜糞出更墜為糞後墜非滯也故曰虛墜初痢多屬濕熱久痢多屬寒虛也噤口痢水穀痢風痢休息痢熱痢寒痢濕痢五色痢噤口飲食俱不納水穀糟粕雜血膿風痢墜重圊清血休息時作復時停熱痢魚腦稠黏穢寒痢稀澥白清腥濕痢黑豆汁渾濁五色相雜藏氣凶注噤口痢者下利不食或嘔不能食也水榖痢者糟粕膿血雜下也風痢者似腸風下清血而有墜痛也休息痢者時發作時停止也五色痢者五色膿血相雜而下也若有藏腐尸臭之氣則凶痢疾死證水漿不入利不止氣少脈細皮膚寒純血噤口嘔藏氣身熱脈大命難全注下利不止水漿不入氣少脈細皮膚寒死於陽絶也下利純血噤口嘔逆藏氣身熱脈大死於隂絶也倉廪湯大黃黃連湯初痢表熱宜倉廪裏熱衝心大黃連寒痢理中訶䓻縮附白桂赤不須言注初痢有表證發熱者不宜攻之法當先解其外用倉廪湯汗之裏熱盛上衝心作嘔噤口者法當先攻其裏用大黃黃連好酒煎服攻之寒痢宜用理中湯加訶子肉䓻縮砂白多者加附子赤多者加肉桂也芍藥湯初痢內外無大熱芩連枳木芍歸榔桂草尿澀滑石倍利數窘痛入大黃注初痢外無表熱內熱不盛宜用芍藥湯即黃芩黃連枳實木香芍藥當歸檳榔甘草肉桂少許也小便澀赤加滑石下利次數無度下墜痛甚入大黃也香連和胃湯參連開噤湯貼臍法痢疾下後調氣血宜用香連和胃湯黃芩芍藥香連草陳皮白术縮砂當赤虛更加椿榆炒白虛參苓共炒薑噤口參連石蓮子貼臍王瓜藤散良注痢疾攻後病勢大減宜調氣血用香連和胃湯即黃芩芍藥木香黃連甘草陳皮白术縮砂當歸也赤痢下血多虛者當澀之加炒椿根白皮炒地榆白痢日久氣虛者加人參茯苓炒乾薑以補之實而噤口堪下者以大黃黃連湯下之不堪下者內以人參黃連石蓮子煎湯徐徐服之下咽即好外以貼臍王瓜藤散即王瓜藤莖葉經霜者燒灰香油調納臍中即有效也真人養藏湯久痢寒熱烏梅治寒虛滑痢養藏湯參术肉蔲歸訶桂芍藥罌粟草木香注久痢藏有寒熱不分者宜用烏梅丸調和之寒虛滑脫者宜用養藏湯溫補之即人參白术肉蔲當歸訶子肉桂芍藥罌粟殼甘草木香也香連平胃散胃風湯水榖調中益氣治濕痢香連平胃方虛濕風痢胃風治桂粟八珍減地黃注水榖痢者乃脾胃虛腐化不及宜調中益氣湯濕痢宜木香黃連合平胃散方濕而虛者宜用胃風湯即肉桂粟米八珍湯減地黃也五色痢休息痢治法五色休息皆傷藏澀蚤滯熱藴於中補之不應脈有力日久仍攻餘法同注五色休息二利皆因用止澀藥蚤或因滯熱下之未盡藴於腸胃傷藏氣也用一切補養之藥不應則可知初病非止澀太蚤即下之未盡也診其脈若有力雖日久仍當攻也其餘治法與諸痢同疸證總括面目身黃欲安卧小便渾黃疸病成已食如飢飽煩眩胃疸榖疸酒疸名女勞額黑少腹急小便自利審瘀生黃汗微腫皆濕熱隂黃重痛厥如氷注面目身黃但欲安卧小便黃渾此黃疸病已成也如已食如飢食難用飽飽則心煩頭眩此欲作胃疸胃疸者即榖疸也若已見黃色疸已成矣得之於胃有濕熱大飢過食也酒疸者得之於飲酒無度而發是病也女勞疸者疸而額黑少腹急小便自利得之於大勞大熱與女交接也瘀血發黃亦少腹急小便自利但不額黑耳詳在傷寒門黃汗者汗出黃色染衣面目微腫得之於素有濕熱汗出入水浴之也此皆濕熱而成惟隂黃則屬濕寒隂黃者身重而痛厥冷如氷詳在傷寒門疸病死證疸過十日而反劇色若煙薰目暗青喘滿渴煩如啖蒜面黧汗冷及天行注仲景曰黃疸之病當以十八日為期治之十日以上宜差反劇為難治也色若煙熏目神暗青陽黃死證也喘滿渴煩不已心胸如啖蒜刺痛黃毒入腹死證也靣色黧黑冷汗漐漐隂黃死證也天行疫癘發黃名曰瘟黃死人最暴也麻黃茵陳醇酒湯茵陳蒿湯梔子蘗皮湯茵陳五苓散表實麻黃茵陳酒裏實茵陳梔大黃無證茵陳梔子蘗尿少茵陳五苓湯注諸疸表實無汗者以麻黃茵陳無灰好酒煎服汗之裏實不便以茵陳梔子大黃下之無表裏證以茵陳梔子蘗皮清之小便短少以茵陳五苓散利之胃疸湯穀疸熱實宜乎下不實宜用胃疸湯茵陳胃苓減草朴連梔防己葛秦方注胃疸湯即茵陳蒼术陳皮白术茯苓豬苓澤㵼黃連梔子防己葛根秦艽也茵陳解酲湯梔子大黃湯蔓菁散加味玉屏風散酒疸虛茵解酲湯實用梔豉枳大黃黃汗一味蔓菁散石膏茵陳耆术防注酒疸虛者用茵陳解酲湯即葛花解酲湯加茵陳也實者用梔子大黃湯即梔子淡豆豉枳實大黃也黃汗宜用蔓菁子一味為細末每服二錢日三井華水調服小便白則愈或用加味玉屏風散即石膏茵陳黃耆白术防風也石膏散腎疸湯女勞實者膏滑麥女勞虛者腎疸醫升陽散火減去芍加芩蘗麯四苓俱注石膏散即煆石膏飛滑石各等分每服二錢大麥湯調服腎疸湯即升陽散火湯減去芍藥乃升麻蒼术防風獨活柴胡羌活葛根人參甘草加入黃芩黃蘗神麯白术茯苓豬苓澤㵼也積聚總括五積六聚本難經七癥八瘕載千金腸覃石瘕辨月事痃癖之名别淺深藏積發時有常處府聚忽散無本根癥類積痃瘕聚癖腸滿汁溢外寒因注五積六聚之名本乎難經五積者肥氣伏梁痞氣息賁奔豚也六聚者積之著於經絡緩筋募原膂筋腸後輸脈也七癥八瘕之名載千金方七癥者蛟蛇鱉肉髮虱米也八瘕者青黃燥血脂狐蛇鱉也腸覃者積在腸外狀如懷子月事以時而下石瘕者積在胞中狀如懷子月事不以時下故曰辨月事也痃者外結募原肌肉之間癖者內結隱僻膂脊腸胃之後故曰别淺深也然積者屬藏隂也故發有常處不離其部聚者屬府陽也故發無根本忽聚忽散癥不移而可見故類積類痃也瘕能移有時隱故類聚類癖也積聚癥瘕腸覃石瘕痃癖之疾皆得之於喜怒不節則傷藏飲食過飽則傷府腸胃填滿汁液外溢為外寒所襲與內氣血食物凝結相成也積聚難證積聚牢堅不軟動胃弱溏瀉不堪攻奔豚發作狀欲死氣上衝喉神怖驚注積聚牢固不動堅硬不軟則病深矣胃弱食少大便溏瀉不堪攻矣五積之中奔豚最為難治若更發作正氣虛不能支其狀欲死從少腹起氣上衝喉神色驚怖皆惡候也積聚治法積聚胃強攻可用攻虛兼補正邪安氣食積癖宜化滯溫白桃仁控涎丹注積聚宜攻然胃強能食始可用攻若攻虛人須兼補藥或一攻三補或五補一攻攻邪而不傷正養正而不助邪則邪正相安也凡攻氣食積癖宜用祕方化滯丸方在內傷門攻積聚癥瘕宜用溫白丸即萬病紫菀丸方倍川烏攻血積血瘕宜用桃仁煎即桃仁大黃各一兩虻蟲炒五錢朴消一兩共為末先以醇醋一斤用砂器慢火煎至多半鍾下末藥攪良久為小丸前一日不喫晚飯五更初溫酒送下一錢取下惡物如豆汁雞肝未下次日再服見鮮血止藥如無虻蟲以􅟟蟲代之然不如虻蟲為愈也攻痰積宜用控涎丹方在痰飲門疝證總括經云任脈結七疝子和七疝主於肝肝經過腹環隂器任脈循腹裏之原疝證少腹引隂痛衝上衝心二便難厥吐瘕癥狐出入潰膿癃祕木㿗頑注經曰任脈為病男子內結七疝女子帶下瘕聚瘕聚者即女子之疝也七疝主任者原以任脈起中極循腹裏也七疝主肝者蓋以肝經過腹裏環隂器也是以諸疝病無不由是二經故主之也疝病之證少腹痛引隂丸氣上衝心不得二便者為衝疝也少腹痛引隂丸肝之逆氣衝胃作吐者為厥疝也少腹之氣不伸左右癥塊作痛者為瘕疝也卧則入腹立則出腹入囊似狐之晝則出穴而溺夜則入穴而不溺者為狐疝也少腹痛引隂丸橫骨兩端約文中狀如黃瓜內有膿血者為㿉疝也少腹痛引隂丸小便不通者為癃疝也少腹不痛隂囊腫大頑硬者為㿗疝也疝證同名異辨血疝便毒潰魚口㿉㿗氣墜筋即疳水疝胞痺皆癃疝衝似小腸腰痛連注有謂血疝者其證即便毒魚口也㿉疝者其證即㿗疝也氣疝者即偏墜也筋疝者即下疳也水疝小便不通胞痺即膀胱氣皆癃疝也衝疝證似小腸氣而更連腰痛也諸疝治法治疝左右分氣血尤别虛濕熱與寒寒收引痛熱多縱濕腫重墜虛輕然注疝病凡在左邉隂丸屬血分凡在右邊隂丸屬氣分凡寒則收引而痛甚熱則縱而痛微凡濕則腫而重墜而虛亦腫墜但輕輕然而不重也當歸溫疝湯烏桂湯中寒冷疝歸芍附桂索􅚬楝澤萸苓外寒入腹川烏蜜肉桂芍草棗薑同注當歸溫疝湯即當歸白芍附子肉桂延胡索小􅚬香川楝子澤㵼吳茱萸白茯苓也烏桂湯即川烏蜂蜜肉桂白芍藥炙甘草生薑大棗也烏頭梔子湯外寒內熱烏梔炒水酒加鹽疝痛安㿗疝不問新與久三層􅚬香自可痊注此􅚬香丸方在醫宗必讀十味蒼蘗散醇酒厚味濕熱疝不謹房勞受外寒蒼蘗香附青益草􅚬索查桃附子煎注此散即蒼术黃蘗香附青皮益智甘草小􅚬香南山查元胡索桃仁附子也􅚬楝五苓散大黃皂刺湯膀胱水疝尿不利五苓􅚬楝與蔥鹽瘕鞕血疝宜乎下大黃皂刺酒來煎注大黃皂刺湯即大黃皂刺各三錢酒煎服也羊肉湯血分寒疝女産後臍腹連隂脹痛疼羊肉一斤薑五兩當歸三兩水八升奪命湯衝疝厥疝痛上攻臍悸奔豚氣上行吳茱一味為君主肉桂澤瀉白茯苓青木香丸氣疝諸疝走注痛青木香附吳萸良巴豆拌炒川楝肉烏藥蓽澄小􅚬香注青木香丸即青木香五錢酒醋浸炒吳茱萸一兩香附醋炒一兩蓽澄茄五錢烏藥五錢小􅚬香五錢巴豆仁二十一粒研碎拌炒川楝肉五錢為末合均蔥涎為小丸每服三錢酒鹽任下立愈及能醫一切疝痛神效􅚬香楝實丸楝實狐疝一切疝楝肉􅚬香馬藺芫三萸二皮各一兩仍宜急灸大敦安注􅚬香楝實丸治狐疝及一切諸疝即川楝肉小􅚬香馬藺花芫花醋炒變焦色山茱萸吳茱萸食茱萸青皮陳皮各一兩為末醋糊為小丸酒送二錢按大敦肝經穴在足大指甲後有毛處諸疝均宜灸之即安御纂醫宗金鑑卷四十二
