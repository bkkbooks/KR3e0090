body:
  text: 編輯婦科心法要訣目録生育門臨産産室擇收生婆驚生試胎弄胎坐草臨盆交骨不開開骨散盤腸生補中益氣湯十全大補湯萆麻貼法酥油潤法難産産後門胞衣不下證治奪命散産門不閉證治十全大補湯血暈證治清魂散佛手散醋漆薰法惡露不下證治失笑散聖愈湯惡露不絶證治加味十全大補湯佛手散頭疼證治芎歸湯八珍湯心胃痛證治大巖蜜湯玊燭散腹痛證治失笑散香桂散異功散少腹痛證治延胡索散吳茱萸湯五苓散脅痛證治延胡索散四君子湯八珍湯腰痛證治佛手散加味六味地黃湯遍身疼痛證治趂痛散加味四物湯腹中塊痛證治延胡索散吳茱萸湯筋攣證治加味四物湯八珍湯傷食嘔吐證治六君子湯二陳湯厄逆證治丁香豆䓻散茹橘飲氣喘證治參附煎二味參蘇飲浮腫證治枳术湯小調中湯小調經散茯苓𨗳水湯發熱證治加味四物湯加味異功散六君子湯生化湯四物湯十全大補湯八珍湯當歸補血湯參附湯寒熱證治柴胡四物湯生化湯更生散自汗頭汗證治當歸六黃湯黃耆湯參附湯中風證治十全大補湯痙病證治加味八珍湯瘈瘲抽搐證治加味八珍湯不語證治加味八珍湯星連二陳湯七珍散八珍湯二陳湯欽定四庫全書御纂醫宗金鑑卷四十七編輯婦科心法要訣目録生育門臨産産室擇收生婆驚生試胎弄胎坐草臨盆交骨不開開骨散盤腸生補中益氣湯十全大補湯萆麻貼法酥油潤法難産産後門胞衣不下證治奪命散産門不閉證治十全大補湯血暈證治清魂散佛手散醋漆薰法惡露不下證治失笑散聖愈湯惡露不絶證治加味十全大補湯佛手散頭疼證治芎歸湯八珍湯心胃痛證治大巖蜜湯玊燭散腹痛證治失笑散香桂散異功散少腹痛證治延胡索散吳茱萸湯五苓散脅痛證治延胡索散四君子湯八珍湯腰痛證治佛手散加味六味地黃湯遍身疼痛證治趂痛散加味四物湯腹中塊痛證治延胡索散吳茱萸湯筋攣證治加味四物湯八珍湯傷食嘔吐證治六君子湯二陳湯厄逆證治丁香豆䓻散茹橘飲氣喘證治參附煎二味參蘇飲浮腫證治枳术湯小調中湯小調經散茯苓𨗳水湯發熱證治加味四物湯加味異功散六君子湯生化湯四物湯十全大補湯八珍湯當歸補血湯參附湯寒熱證治柴胡四物湯生化湯更生散自汗頭汗證治當歸六黃湯黃耆湯參附湯中風證治十全大補湯痙病證治加味八珍湯瘈瘲抽搐證治加味八珍湯不語證治加味八珍湯星連二陳湯七珍散八珍湯二陳湯欽定四庫全書御纂醫宗金鑑卷四十七編輯婦科心法要訣生育門臨産妊娠臨産要安詳腹內雖疼切莫慌舒身仰卧容胎轉靜待生時不用忙注妊娠月足臨産腹內如覺動轉疼痛須要安詳莫自慌亂舒體仰卧時時緩步使兒身轉正靜以待之至其生育之時自然順生不用忙也産室産室寒溫要適時嚴寒酷熱總非宜夏要清凉冬要暖病者醫人俱要知注産室之內四時俱要寒溫適中若太熱太寒均不相宜夏月必須清凉勿令炎熱致産母中暑暈迷倘有其事不妨少與凉水以解之冬月必須溫暖勿令寒冷以致血凝難産當多備火爐使産母腰背下身就火烘之此臨産之家及醫人皆當知之者也擇收生婆臨産穩婆須預擇老成歷練又精明無故莫教使手法寬心寧耐待時生注臨産之家必用收生婆須預先擇老成歷練明白經事之人無故切勿令其先使手法如試水探漿等事但囑令寬心寧耐以待生時可也驚生人語喧譁産母驚心虛氣怯號驚生急須止靜休嘈雜産母心安胎自寧注産房之內不可多人人多則語聲喧譁産母之心必驚驚則心氣虛怯至産時多致困乏號曰驚生有如此者須急急拼出只留服役一二人使寂靜而無嘈雜之聲則母心始安安則其胎亦寧靜矣試胎弄胎月數未足腹中痛痛定如常名試胎臨月腹痛腰不痛或作或止名弄胎二者均非正産候但須寧靜莫疑猜注妊娠八九個月時或腹中痛痛定仍然如常者此名試胎宜養血以安其胎若月數已足腹痛或作或止腰不痛者此名弄胎不宜輕動二者均非正産之時切勿躁擾疑惑惟宜寧靜以待其時坐草坐草須知要及時兒身未順且遲遲若教産母用力早逼胎不正悔難追注凡産婦坐草最要及時不可太早若兒身未順寧可遲遲寬心以待倘坐草太早非正産之時妄使産母用力往往逼胎不正遂至橫倒者有之雖悔無及矣臨盆兒身轉順頂當門胞漿已破腹腰疼中指跳動榖道挺臨盆用力送兒生注凡兒之生自有其時時至則兒身轉順頭頂正當産門胞漿大來腰重腹痛榖道挺迸産母中指中莭或本莭跳動此方為正産之時方可臨盆用力送兒自順生矣交骨不開交骨不開須細審或因不足或初胎總宜開骨通隂氣佛手龜板婦髮灰若因不足加參妙一服能令骨立開注産婦交骨不開有因氣血不足者有因初次胎産者二者均宜用開骨𣪚通其隂氣其方即佛手𣪚加敗龜板與生過子女婦人頭髮也氣血不足者加人參服之可使其骨立開盤腸生盤腸未産腸先出已産嬰兒腸不收頂貼萆麻服升補腸乾潤以奶酥油注妊娠婦人有盤腸生者臨産之時其腸先拖出及兒已産下其腸有仍不收者須以萆麻仁搗爛貼于頂心內服升補之劑如補中益氣湯或八珍十全大補等湯加升麻以升補之其腸自收矣補中益氣湯十全大補湯方俱見首卷難産難産之由不一端胎前安逸過貪眠驚恐氣怯用力早胞破血壅血漿乾注妊娠難産之由非只一端或胎前喜安逸不耐勞碌或過貪眠睡皆令氣滯難産或臨産驚恐氣怯或用力太早則産母困乏難産或胞傷血出血壅産路或胞漿破早漿血乾枯皆足以致難産臨證之工不可不審也産後門胞衣不下證治胞衣不下因初産用力勞乏風冷凝下血過多産路澀血入胞衣腹脹疼急服奪命沒竭𣪚勿使冲心喘滿生諭令穩婆隨胎取休驚産母莫教聞注産婦胞衣不下者或因初産用力困乏風冷相干致血瘀凝或因下血過多血枯産路乾澀或血入胞衣脹滿疼痛皆能使胞衣不下均當急用奪命𣪚即沒藥血竭二味為𣪚也免致上攻心胸脹滿喘急為害不小且宜諭令穩婆隨胎取下莫使産母聞之恐被驚則愈難下也産門不閉證治産門不閉由不足初産因傷必腫疼不足十全大補治甘草湯洗腫傷平注凡産後玊門不閉者多由氣血不足所致亦有因初産傷重者必腫而疼也氣血不足者用十全大補湯治之因傷腫痛者濃煎甘草湯洗之其腫傷自平十全大補湯方見首卷血暈證治清魂𣪚産後血暈惡露少面脣色赤是停瘀惡露去多脣面白乃屬血脫不須疑虛用清魂荆芥穗人參芎草澤蘭隨腹痛停瘀佛手𣪚醋漆薰法總相宜注産後血暈有因惡露去少內有停瘀上攻迷暈者面脣必赤色有因去血過多血脫而暈者面脣必色白血弱者宜用清魂𣪚即荆芥穗人參川芎甘草澤蘭葉也若停瘀腹痛者用佛手𣪚二者俱宜頻燒乾漆及用火燒鐡釘淬醋不時薰之佛手𣪚方見首卷惡露不下證治惡露不下是何因風冷氣滯血瘀凝若還不下因無血面色黃白不脹疼風冷血凝失笑𣪚去多聖愈補而行注産後惡露不下有因風冷相干氣滯血凝而不行者必腹中脹痛有因産時去血太多無血不行者面色必黃白腹必不疼以此辨之血凝者用失笑𣪚逐而行之無血者用聖愈湯補而行之失笑𣪚聖愈湯方俱見首卷惡露不絶證治惡露不絶傷任衝不固時時淋漓行或因虛損血不攝或因瘀血腹中停審色汚淡臭腥穢虛補實攻要辨明虛用十全加膠續瘀宜佛手補而行注産後惡露乃裹兒汚血産時當隨胎而下若日久不斷時時淋漓者或因衝任虛損血不收攝或因瘀行不盡停留腹內隨化隨行者當審其血之色或汚濁不明或淺淡不鮮或臭或腥或穢辨其為實為虛而攻補之虛宜十全大補湯加阿膠續斷以補而固之瘀宜佛手𣪚以補而行之十全大補湯佛手𣪚方俱見首卷頭疼證治産後頭疼面黃白無表無裏血虛疼惡露不行兼腹痛必因瘀血上攻冲逐瘀芎歸湯最效虛用八珍加蔓荆注産後頭疼若面色黃白無寒熱身痛之表證又無便祕之裏證則是因産後去血過多血虛頭痛也若惡露不行兼腹痛者乃屬瘀血上攻之痛也去瘀以芎歸湯補虛以八珍湯加蔓荆子八珍湯方見首卷心胃痛證治大巖蜜湯心痛厥逆爪青白寒凝大巖蜜溫行四物去芎加獨活薑桂茱萸草逺辛因食惡食多嘔吐麯麥香砂入二陳大便燥結小便赤兼熱飲冷玊燭攻注産後心胃痛若四肢厥逆爪甲青白乃風冷寒凝氣血滯澀宜用大巖蜜湯溫以行之即生地當歸赤芍獨活乾薑桂心吳茱萸甘草逺志細辛也若因飲食停滯中脘作痛必惡食嘔吐宜二陳湯加神麯麥芽木香砂仁若大便結硬小便赤澀渴欲飲冷者乃內有實熱也宜玊燭𣪚攻之玊燭𣪚方見首卷腹痛證治香桂𣪚去血過多血虛痛去少壅瘀有餘疼傷食惡食多脹悶寒入胞中見冷形血虛當歸建中治瘀壅失笑有竒功傷食異功加查麯胞寒香桂桂歸芎注産後腹痛若因去血過多而痛者為血虛痛若因惡露去少及瘀血壅滯而痛者為有餘疼若因傷食而痛者必惡食脹悶若因風寒乘虛入于胞中作痛者必見冷痛形狀血虛宜當歸建中湯血瘀宜失笑𣪚傷食宜異功𣪚加山查神麯胞寒宜香桂𣪚即佛手𣪚加桂心也當歸建中湯失笑散異功散方俱見首卷少腹痛證治延胡索散少腹痛微名兒枕硬痛尿利血瘀疼尿澀淋痛蓄水證紅腫須防㿉疝癃兒枕瘀血延胡𣪚歸芍蒲桂琥珀紅蓄水須用五苓𣪚㿉疝吳萸溫𣪚行注産後少腹痛其痛若微乃産時血塊未净名兒枕痛若少腹堅硬小便利者為瘀血痛少腹硬而小便不利淋澀脹痛者乃蓄水作痛若堅硬紅腫而痛者須防成㿉疝癃之證因兒枕瘀血者宜延胡索散即當歸赤芍蒲黃肉桂琥珀紅花也因水蓄者宜五苓𣪚若將成㿉疝癃者當以吳茱萸湯溫散之吳茱萸湯方見首卷五苓𣪚方見三卷脅痛證治脅痛瘀滯犯肝經左血右氣要分明血用延胡𣪚可治氣宜四君加柴青去血過多屬虛痛八珍加桂補其榮注産後脅痛因氣血瘀滯干犯肝經在左多屬血在右多屬氣血宜延胡索𣪚氣宜四君子湯加柴胡青皮若因去血過多而痛者為虛痛宜八珍湯加肉桂以補其榮血自愈四君子湯八珍湯方俱見首卷腰痛證治腰疼下注兩股痛風冷停瘀滯在經佛手𣪚加獨活桂續斷牛膝桑寄生血多三隂傷氣血地黃桂附續杜尋注産後腰疼下注兩股皆痛者乃産時風冷乘之瘀血滯于肝經宜用佛手𣪚加獨活肉桂續斷牛膝防風桑寄生以溫𣪚而行之若因去血過多三隂經氣血虧損者則當用六味地黃湯加肉桂附子續斷杜仲以溫補之佛手𣪚六味地黃湯方俱見首卷遍身疼痛證治趂痛𣪚産後身疼榮不足若因客感表先形趂痛𣪚用歸耆术牛膝甘獨薤桂心血瘀面唇多紫脹四物秦艽桃沒紅注産後遍身疼痛多因去血過多榮血不足或因風寒外客必有表證二者俱宜用趂痛𣪚即當歸黃耆白术牛膝甘草獨活薤白桂心也若面唇紫色身脹痛者必是停瘀所致宜用四物湯加秦艽桃仁沒藥紅花以行之四物湯方見首卷腹中塊痛證治産後積血塊冲疼多因新産冷風乘急服延胡𣪚可逐日久不𣪚血瘕成更有寒疝亦作痛吳萸溫𣪚不須攻注産後腹中有塊堅硬攻痛多因新産之後風冷乘虛而入以致瘀血凝結宜服延胡索𣪚以逐之若遲久不𣪚必結成血瘕矣又有寒疝之證亦在少腹中攻築而痛此屬寒氣滯澀宜用吳茱萸湯溫𣪚其寒自愈不必攻也吳茱萸湯方見首卷筋攣證治産後筋攣雞爪風血虧液損復乘風無汗養榮兼𣪚邪四物柴瓜桂鈎藤有汗八珍加桂枝黃耆阿膠大補榮注産後筋衇拘攣疼痛不能舒展俗名雞爪風皆由産後血液虧損不能榮筋又被風乘故令拘攣疼痛也無汗者宜于養榮之中兼祛外邪用四物湯加柴胡木瓜桂枝鈎藤若有汗者宜八珍湯加桂枝黃耆阿膠以大補其榮血可也四物湯八珍湯方俱見首卷傷食嘔吐證治産後傷食心下悶惡食嘈雜吞吐酸六君查麯香砂共嘔逆痰涎二陳煎注産後過食肉麵傷于飲食者必心胸飽悶惡聞食氣懊憹嘈雜吞酸吐酸宜用六君湯加山查神麯香附縮砂以補而消之若更嘔逆痰涎必是兼痰兼飲宜二陳湯加減調治六君子湯見首卷二陳湯見三卷厄逆證治丁香豆䓻散茹橘飲産後厄逆胃虛寒丁香白䓻伏龍肝桃仁吳萸湯冲服不應急將參附添熱渴面紅小便赤竹茹乾柿橘紅煎注産後厄逆皆因氣血兩傷脾胃虛寒中焦之氣厥而不順所致宜服丁香豆蔲𣪚即丁香白豆蔲伏龍肝為末也用桃仁吳茱萸煎湯冲服如不效當以參附湯峻補之若發熱面紅小便赤色屬熱實者宜用竹茹乾柿橘紅煎服之名茹橘飲氣喘證治二味參蘇飲産後氣喘為危候血脫氣散參附煎敗血上攻面紫黑二味參蘇奪命痊注産後氣喘極危證也因下血過多榮血暴竭衛氣無倚孤陽上越宜驟補其氣用參附煎湯不時飲之若因惡露不行敗血上攻于肺而喘者必面色紫黑宜奪命𣪚下瘀瘀去喘自定虛者參蘇飲即人參一兩為末蘇木二兩煎湯冲服也浮腫證治枳术湯小調中湯産後腫分氣水血輕浮脹滿氣之形水腫喘嗽小便澀皮如熟李血之情氣腫枳术湯最效水腫茯苓𨗳水靈血腫調中歸芍木茯陳煎冲小調經歸芍珀麝辛桂沒理氣調榮瘀血行注産後浮腫由于敗血乘虛流入經絡血化為水故令浮腫然有氣腫水腫之别不可不辨也若輕虛浮腫心胸脹滿者因素有水飲所作名曰氣分也宜用枳术湯即枳實白术煎湯服之若喘嗽小便不利者則為水腫宜茯苓𨗳水湯利之若皮如熟李或遍身青腫者則為血分宜小調中湯治之其方即當歸白芍藥白术茯苓陳皮煎湯冲小調經𣪚服之即當歸赤芍琥珀麝香細辛肉桂心沒藥也茯苓𨗳水湯方見三卷發熱總括産後發熱不一端內傷飲食外風寒瘀血血虛與勞力三朝蒸乳亦當然隂虛血脫陽外𣪚攻補溫凉細細參注産後發熱之故非止一端如食飲太過胸滿嘔吐惡食者則為傷食發熱若早起勞動感受風寒則為外感發熱若惡露不去瘀血停留則為瘀血發熱若去血過多隂血不足則為血虛發熱亦有因産時傷力勞乏發熱者三日蒸乳發熱者當詳其有餘不足或攻或補或用凉藥正治或用溫熱反治要在臨證細細恭考也發熱證治加味四物湯加味異功𣪚生化湯産後發熱多血傷大法四物加炮薑頭疼惡寒外感熱四物柴胡䓤白良嘔吐脹悶傷食氣異功查麯厚朴薑脾不化食六君子瘀血腹痛生化湯當歸川芎丹參共桃仁紅花炮乾薑注産後發熱多因隂血暴傷陽無所附大法宜四物湯加炮薑從隂引陽為正治若頭疼惡寒而發熱者屬外感不當作傷寒治惟宜用四物加柴胡葱白服之若嘔吐脹悶屬傷食若倦怠氣乏者屬傷氣宜用異功𣪚加山查神麯厚朴生薑治之若因脾虛不能化食而停食發熱者宜六君子湯若因瘀血發熱者必兼腹痛宜用生化湯即當歸川芎丹參桃仁紅花薑炭也六君子湯異功𣪚四物湯方俱見首卷勞力發熱用十全氣血兩虛八珍痊血脫躁熱補血效虛陽外越參附煎注産後發熱因産時用力勞乏者宜十全大補湯氣血兩虛者八珍湯去血過多血脫煩躁乾渴面赤而熱者宜當歸補血湯若隂血暴脫孤陽無附而外越發熱者急進參附湯遲則必大汗大喘是陽欲亡雖藥必無救矣十全大補湯八珍湯當歸補血湯方俱見首卷寒熱總括寒熱往來遞更换乍寒乍熱時熱寒寒熱似瘧按時發壯熱憎寒熱畏寒注産後寒熱名既不同其證亦異當先明辨之如曰寒熱往來者謂寒去熱來熱去寒來遞相更换也曰乍寒乍熱者謂有時寒有時熱寒熱無定時也曰寒熱似瘧者謂或先寒後熱或先熱後寒一定不移至其時而始作也曰壯熱憎寒者謂其身既壯熱而復時時畏寒也往來寒熱隂陽格時熱時寒榮衛乖寒熱似􅒻瘀兼食壯熱憎寒𢃄表推注産後血氣虛損隂陽不和則寒熱往來隂陽相乘榮衛不調則時寒時熱敗血不𣪚飲食停滯則寒熱似􅒻汗出遇風則壯熱憎寒有諸內自形諸外辨之既明然後治無不愈矣寒熱證治往來寒熱隂陽格柴胡四物各半湯榮衛不和乍寒熱歸芍芎參甘草薑寒熱似瘧瘀兼食生化柴胡查麯良憎寒壯熱更生𣪚歸地芎參荆穗薑注産後隂陽不和往來寒熱者宜柴胡四物湯若榮衛不調乍寒乍熱者用增損四物湯其方即當歸白芍川芎人參甘草乾薑也若停瘀兼食寒熱似􅒻者用生化湯加柴胡山查神麯若感受風寒憎寒壯熱者宜更生𣪚即當歸熟地川芎人參荆芥穗乾薑也柴胡四物湯方見首卷自汗頭汗總括産後隂虛陽氣盛微微自汗却無妨頭汗隂虛陽上越周身大汗是亡陽注産後血去過多則隂虛隂虛則陽盛若微微自汗是榮衛調和故雖汗無妨若周身無汗獨頭汗出者乃隂虛陽氣上越之象也若頭身俱大汗不止則恐有亡陽之慮矣自汗頭汗證治當歸六黃湯黃耆湯虛熱上蒸頭汗出治用當歸六黃湯黃芩連蘗炒黑用歸耆生熟二地黃自汗黃耆湯牡蠣耆术苓甘麥地防大汗不止陽外脫大劑參附可回陽注産後亡血隂虛陽熱上蒸頭上汗出至頸而還者宜當歸六黃湯即黃連黃芩黃蘗當歸黃耆生地熟地也內芩連蘗三味俱炒黑用若自汗太甚宜黃耆湯即牡蠣粉黃耆白术茯苓甘草麥冬熟地防風也若隂血大脫孤陽外越大汗不止非大劑參附不能回陽也中風證治産後中風惟大補火氣風痰末治之十全大補為主劑臨證詳參佐使宜注産後氣血大虛雖患中風惟宜大補即有火熱風痰氣閉亦當末治總以十全大補湯主之臨證詳恭其火氣風痰而佐使之十全大補湯方見首卷痙病證治加味八珍湯新産血虛多汗出易中風邪痙病成口噤項強身反折八珍耆附桂防風搖頭氣促寒不止兩手撮空莫望生注産後血氣不足藏府皆虛多汗出腠理不密風邪乘虛襲入遂成痙證手三陽之筋結于頷頰風入頷頰則口噤隂陽經絡周環于身風中經絡則頭項肩背强直如角弓反張之狀産後患此皆屬虛象惟宜用八珍湯加黃耆附子肉桂大補其隂陽少佐防風以治之若見頭搖喘促汗出不止兩手撮空者則為真氣去邪氣獨留必死之候故曰莫望生也八珍湯方見首卷瘈瘲抽搐證治加味八珍湯隂血去多陽氣熾筋無所養致抽搐發熱惡寒煩又渴八珍丹地鈎藤鈎抽搐無力戴眼折大汗不止命將休注産後血去太多陽氣熾盛筋無所養必致瘈瘲抽搐發熱惡寒心煩口渴不宜作風治惟當氣血兼補用八珍湯加丹皮生地鈎藤鈎治之若無力抽搐戴眼反折大汗不止者則為不治之證故曰命將休也八珍湯方見首卷不語證治加味八珍湯星連二陳湯七珍散産後不語分虛實痰熱乘心敗血衝氣血兩虛神鬱冒實少虛多要辨明虛用八珍藤菖志痰熱星連入二陳敗血衝心七珍散芎地辛防硃蒲參注産後不語須分虛實治之有痰熱乘心者有敗血衝心者有氣血兩虛而鬱冒神昏者大抵産後屬虛者多而實者少也虛宜八珍湯加鈎藤菖蒲逺志痰熱宜二陳湯加膽星黃連敗血冲心宜七珍散即川芎生地細辛防風硃砂菖蒲人參也八珍湯方見首卷二陳湯方見三卷御纂醫宗金鑑卷四十七欽定四庫全書御纂醫宗金鑑卷四十七編輯婦科心法要訣生育門臨産妊娠臨産要安詳腹內雖疼切莫慌舒身仰卧容胎轉靜待生時不用忙注妊娠月足臨産腹內如覺動轉疼痛須要安詳莫自慌亂舒體仰卧時時緩步使兒身轉正靜以待之至其生育之時自然順生不用忙也産室産室寒溫要適時嚴寒酷熱總非宜夏要清凉冬要暖病者醫人俱要知注産室之內四時俱要寒溫適中若太熱太寒均不相宜夏月必須清凉勿令炎熱致産母中暑暈迷倘有其事不妨少與凉水以解之冬月必須溫暖勿令寒冷以致血凝難産當多備火爐使産母腰背下身就火烘之此臨産之家及醫人皆當知之者也擇收生婆臨産穩婆須預擇老成歷練又精明無故莫教使手法寬心寧耐待時生注臨産之家必用收生婆須預先擇老成歷練明白經事之人無故切勿令其先使手法如試水探漿等事但囑令寬心寧耐以待生時可也驚生人語喧譁産母驚心虛氣怯號驚生急須止靜休嘈雜産母心安胎自寧注産房之內不可多人人多則語聲喧譁産母之心必驚驚則心氣虛怯至産時多致困乏號曰驚生有如此者須急急拼出只留服役一二人使寂靜而無嘈雜之聲則母心始安安則其胎亦寧靜矣試胎弄胎月數未足腹中痛痛定如常名試胎臨月腹痛腰不痛或作或止名弄胎二者均非正産候但須寧靜莫疑猜注妊娠八九個月時或腹中痛痛定仍然如常者此名試胎宜養血以安其胎若月數已足腹痛或作或止腰不痛者此名弄胎不宜輕動二者均非正産之時切勿躁擾疑惑惟宜寧靜以待其時坐草坐草須知要及時兒身未順且遲遲若教産母用力早逼胎不正悔難追注凡産婦坐草最要及時不可太早若兒身未順寧可遲遲寬心以待倘坐草太早非正産之時妄使産母用力往往逼胎不正遂至橫倒者有之雖悔無及矣臨盆兒身轉順頂當門胞漿已破腹腰疼中指跳動榖道挺臨盆用力送兒生注凡兒之生自有其時時至則兒身轉順頭頂正當産門胞漿大來腰重腹痛榖道挺迸産母中指中莭或本莭跳動此方為正産之時方可臨盆用力送兒自順生矣交骨不開交骨不開須細審或因不足或初胎總宜開骨通隂氣佛手龜板婦髮灰若因不足加參妙一服能令骨立開注産婦交骨不開有因氣血不足者有因初次胎産者二者均宜用開骨𣪚通其隂氣其方即佛手𣪚加敗龜板與生過子女婦人頭髮也氣血不足者加人參服之可使其骨立開盤腸生盤腸未産腸先出已産嬰兒腸不收頂貼萆麻服升補腸乾潤以奶酥油注妊娠婦人有盤腸生者臨産之時其腸先拖出及兒已産下其腸有仍不收者須以萆麻仁搗爛貼于頂心內服升補之劑如補中益氣湯或八珍十全大補等湯加升麻以升補之其腸自收矣補中益氣湯十全大補湯方俱見首卷難産難産之由不一端胎前安逸過貪眠驚恐氣怯用力早胞破血壅血漿乾注妊娠難産之由非只一端或胎前喜安逸不耐勞碌或過貪眠睡皆令氣滯難産或臨産驚恐氣怯或用力太早則産母困乏難産或胞傷血出血壅産路或胞漿破早漿血乾枯皆足以致難産臨證之工不可不審也産後門胞衣不下證治胞衣不下因初産用力勞乏風冷凝下血過多産路澀血入胞衣腹脹疼急服奪命沒竭𣪚勿使冲心喘滿生諭令穩婆隨胎取休驚産母莫教聞注産婦胞衣不下者或因初産用力困乏風冷相干致血瘀凝或因下血過多血枯産路乾澀或血入胞衣脹滿疼痛皆能使胞衣不下均當急用奪命𣪚即沒藥血竭二味為𣪚也免致上攻心胸脹滿喘急為害不小且宜諭令穩婆隨胎取下莫使産母聞之恐被驚則愈難下也産門不閉證治産門不閉由不足初産因傷必腫疼不足十全大補治甘草湯洗腫傷平注凡産後玊門不閉者多由氣血不足所致亦有因初産傷重者必腫而疼也氣血不足者用十全大補湯治之因傷腫痛者濃煎甘草湯洗之其腫傷自平十全大補湯方見首卷血暈證治清魂𣪚産後血暈惡露少面脣色赤是停瘀惡露去多脣面白乃屬血脫不須疑虛用清魂荆芥穗人參芎草澤蘭隨腹痛停瘀佛手𣪚醋漆薰法總相宜注産後血暈有因惡露去少內有停瘀上攻迷暈者面脣必赤色有因去血過多血脫而暈者面脣必色白血弱者宜用清魂𣪚即荆芥穗人參川芎甘草澤蘭葉也若停瘀腹痛者用佛手𣪚二者俱宜頻燒乾漆及用火燒鐡釘淬醋不時薰之佛手𣪚方見首卷惡露不下證治惡露不下是何因風冷氣滯血瘀凝若還不下因無血面色黃白不脹疼風冷血凝失笑𣪚去多聖愈補而行注産後惡露不下有因風冷相干氣滯血凝而不行者必腹中脹痛有因産時去血太多無血不行者面色必黃白腹必不疼以此辨之血凝者用失笑𣪚逐而行之無血者用聖愈湯補而行之失笑𣪚聖愈湯方俱見首卷惡露不絶證治惡露不絶傷任衝不固時時淋漓行或因虛損血不攝或因瘀血腹中停審色汚淡臭腥穢虛補實攻要辨明虛用十全加膠續瘀宜佛手補而行注産後惡露乃裹兒汚血産時當隨胎而下若日久不斷時時淋漓者或因衝任虛損血不收攝或因瘀行不盡停留腹內隨化隨行者當審其血之色或汚濁不明或淺淡不鮮或臭或腥或穢辨其為實為虛而攻補之虛宜十全大補湯加阿膠續斷以補而固之瘀宜佛手𣪚以補而行之十全大補湯佛手𣪚方俱見首卷頭疼證治産後頭疼面黃白無表無裏血虛疼惡露不行兼腹痛必因瘀血上攻冲逐瘀芎歸湯最效虛用八珍加蔓荆注産後頭疼若面色黃白無寒熱身痛之表證又無便祕之裏證則是因産後去血過多血虛頭痛也若惡露不行兼腹痛者乃屬瘀血上攻之痛也去瘀以芎歸湯補虛以八珍湯加蔓荆子八珍湯方見首卷心胃痛證治大巖蜜湯心痛厥逆爪青白寒凝大巖蜜溫行四物去芎加獨活薑桂茱萸草逺辛因食惡食多嘔吐麯麥香砂入二陳大便燥結小便赤兼熱飲冷玊燭攻注産後心胃痛若四肢厥逆爪甲青白乃風冷寒凝氣血滯澀宜用大巖蜜湯溫以行之即生地當歸赤芍獨活乾薑桂心吳茱萸甘草逺志細辛也若因飲食停滯中脘作痛必惡食嘔吐宜二陳湯加神麯麥芽木香砂仁若大便結硬小便赤澀渴欲飲冷者乃內有實熱也宜玊燭𣪚攻之玊燭𣪚方見首卷腹痛證治香桂𣪚去血過多血虛痛去少壅瘀有餘疼傷食惡食多脹悶寒入胞中見冷形血虛當歸建中治瘀壅失笑有竒功傷食異功加查麯胞寒香桂桂歸芎注産後腹痛若因去血過多而痛者為血虛痛若因惡露去少及瘀血壅滯而痛者為有餘疼若因傷食而痛者必惡食脹悶若因風寒乘虛入于胞中作痛者必見冷痛形狀血虛宜當歸建中湯血瘀宜失笑𣪚傷食宜異功𣪚加山查神麯胞寒宜香桂𣪚即佛手𣪚加桂心也當歸建中湯失笑散異功散方俱見首卷少腹痛證治延胡索散少腹痛微名兒枕硬痛尿利血瘀疼尿澀淋痛蓄水證紅腫須防㿉疝癃兒枕瘀血延胡𣪚歸芍蒲桂琥珀紅蓄水須用五苓𣪚㿉疝吳萸溫𣪚行注産後少腹痛其痛若微乃産時血塊未净名兒枕痛若少腹堅硬小便利者為瘀血痛少腹硬而小便不利淋澀脹痛者乃蓄水作痛若堅硬紅腫而痛者須防成㿉疝癃之證因兒枕瘀血者宜延胡索散即當歸赤芍蒲黃肉桂琥珀紅花也因水蓄者宜五苓𣪚若將成㿉疝癃者當以吳茱萸湯溫散之吳茱萸湯方見首卷五苓𣪚方見三卷脅痛證治脅痛瘀滯犯肝經左血右氣要分明血用延胡𣪚可治氣宜四君加柴青去血過多屬虛痛八珍加桂補其榮注産後脅痛因氣血瘀滯干犯肝經在左多屬血在右多屬氣血宜延胡索𣪚氣宜四君子湯加柴胡青皮若因去血過多而痛者為虛痛宜八珍湯加肉桂以補其榮血自愈四君子湯八珍湯方俱見首卷腰痛證治腰疼下注兩股痛風冷停瘀滯在經佛手𣪚加獨活桂續斷牛膝桑寄生血多三隂傷氣血地黃桂附續杜尋注産後腰疼下注兩股皆痛者乃産時風冷乘之瘀血滯于肝經宜用佛手𣪚加獨活肉桂續斷牛膝防風桑寄生以溫𣪚而行之若因去血過多三隂經氣血虧損者則當用六味地黃湯加肉桂附子續斷杜仲以溫補之佛手𣪚六味地黃湯方俱見首卷遍身疼痛證治趂痛𣪚産後身疼榮不足若因客感表先形趂痛𣪚用歸耆术牛膝甘獨薤桂心血瘀面唇多紫脹四物秦艽桃沒紅注産後遍身疼痛多因去血過多榮血不足或因風寒外客必有表證二者俱宜用趂痛𣪚即當歸黃耆白术牛膝甘草獨活薤白桂心也若面唇紫色身脹痛者必是停瘀所致宜用四物湯加秦艽桃仁沒藥紅花以行之四物湯方見首卷腹中塊痛證治産後積血塊冲疼多因新産冷風乘急服延胡𣪚可逐日久不𣪚血瘕成更有寒疝亦作痛吳萸溫𣪚不須攻注産後腹中有塊堅硬攻痛多因新産之後風冷乘虛而入以致瘀血凝結宜服延胡索𣪚以逐之若遲久不𣪚必結成血瘕矣又有寒疝之證亦在少腹中攻築而痛此屬寒氣滯澀宜用吳茱萸湯溫𣪚其寒自愈不必攻也吳茱萸湯方見首卷筋攣證治産後筋攣雞爪風血虧液損復乘風無汗養榮兼𣪚邪四物柴瓜桂鈎藤有汗八珍加桂枝黃耆阿膠大補榮注産後筋衇拘攣疼痛不能舒展俗名雞爪風皆由産後血液虧損不能榮筋又被風乘故令拘攣疼痛也無汗者宜于養榮之中兼祛外邪用四物湯加柴胡木瓜桂枝鈎藤若有汗者宜八珍湯加桂枝黃耆阿膠以大補其榮血可也四物湯八珍湯方俱見首卷傷食嘔吐證治産後傷食心下悶惡食嘈雜吞吐酸六君查麯香砂共嘔逆痰涎二陳煎注産後過食肉麵傷于飲食者必心胸飽悶惡聞食氣懊憹嘈雜吞酸吐酸宜用六君湯加山查神麯香附縮砂以補而消之若更嘔逆痰涎必是兼痰兼飲宜二陳湯加減調治六君子湯見首卷二陳湯見三卷厄逆證治丁香豆䓻散茹橘飲産後厄逆胃虛寒丁香白䓻伏龍肝桃仁吳萸湯冲服不應急將參附添熱渴面紅小便赤竹茹乾柿橘紅煎注産後厄逆皆因氣血兩傷脾胃虛寒中焦之氣厥而不順所致宜服丁香豆蔲𣪚即丁香白豆蔲伏龍肝為末也用桃仁吳茱萸煎湯冲服如不效當以參附湯峻補之若發熱面紅小便赤色屬熱實者宜用竹茹乾柿橘紅煎服之名茹橘飲氣喘證治二味參蘇飲産後氣喘為危候血脫氣散參附煎敗血上攻面紫黑二味參蘇奪命痊注産後氣喘極危證也因下血過多榮血暴竭衛氣無倚孤陽上越宜驟補其氣用參附煎湯不時飲之若因惡露不行敗血上攻于肺而喘者必面色紫黑宜奪命𣪚下瘀瘀去喘自定虛者參蘇飲即人參一兩為末蘇木二兩煎湯冲服也浮腫證治枳术湯小調中湯産後腫分氣水血輕浮脹滿氣之形水腫喘嗽小便澀皮如熟李血之情氣腫枳术湯最效水腫茯苓𨗳水靈血腫調中歸芍木茯陳煎冲小調經歸芍珀麝辛桂沒理氣調榮瘀血行注産後浮腫由于敗血乘虛流入經絡血化為水故令浮腫然有氣腫水腫之别不可不辨也若輕虛浮腫心胸脹滿者因素有水飲所作名曰氣分也宜用枳术湯即枳實白术煎湯服之若喘嗽小便不利者則為水腫宜茯苓𨗳水湯利之若皮如熟李或遍身青腫者則為血分宜小調中湯治之其方即當歸白芍藥白术茯苓陳皮煎湯冲小調經𣪚服之即當歸赤芍琥珀麝香細辛肉桂心沒藥也茯苓𨗳水湯方見三卷發熱總括産後發熱不一端內傷飲食外風寒瘀血血虛與勞力三朝蒸乳亦當然隂虛血脫陽外𣪚攻補溫凉細細參注産後發熱之故非止一端如食飲太過胸滿嘔吐惡食者則為傷食發熱若早起勞動感受風寒則為外感發熱若惡露不去瘀血停留則為瘀血發熱若去血過多隂血不足則為血虛發熱亦有因産時傷力勞乏發熱者三日蒸乳發熱者當詳其有餘不足或攻或補或用凉藥正治或用溫熱反治要在臨證細細恭考也發熱證治加味四物湯加味異功𣪚生化湯産後發熱多血傷大法四物加炮薑頭疼惡寒外感熱四物柴胡䓤白良嘔吐脹悶傷食氣異功查麯厚朴薑脾不化食六君子瘀血腹痛生化湯當歸川芎丹參共桃仁紅花炮乾薑注産後發熱多因隂血暴傷陽無所附大法宜四物湯加炮薑從隂引陽為正治若頭疼惡寒而發熱者屬外感不當作傷寒治惟宜用四物加柴胡葱白服之若嘔吐脹悶屬傷食若倦怠氣乏者屬傷氣宜用異功𣪚加山查神麯厚朴生薑治之若因脾虛不能化食而停食發熱者宜六君子湯若因瘀血發熱者必兼腹痛宜用生化湯即當歸川芎丹參桃仁紅花薑炭也六君子湯異功𣪚四物湯方俱見首卷勞力發熱用十全氣血兩虛八珍痊血脫躁熱補血效虛陽外越參附煎注産後發熱因産時用力勞乏者宜十全大補湯氣血兩虛者八珍湯去血過多血脫煩躁乾渴面赤而熱者宜當歸補血湯若隂血暴脫孤陽無附而外越發熱者急進參附湯遲則必大汗大喘是陽欲亡雖藥必無救矣十全大補湯八珍湯當歸補血湯方俱見首卷寒熱總括寒熱往來遞更换乍寒乍熱時熱寒寒熱似瘧按時發壯熱憎寒熱畏寒注産後寒熱名既不同其證亦異當先明辨之如曰寒熱往來者謂寒去熱來熱去寒來遞相更换也曰乍寒乍熱者謂有時寒有時熱寒熱無定時也曰寒熱似瘧者謂或先寒後熱或先熱後寒一定不移至其時而始作也曰壯熱憎寒者謂其身既壯熱而復時時畏寒也往來寒熱隂陽格時熱時寒榮衛乖寒熱似􅒻瘀兼食壯熱憎寒𢃄表推注産後血氣虛損隂陽不和則寒熱往來隂陽相乘榮衛不調則時寒時熱敗血不𣪚飲食停滯則寒熱似􅒻汗出遇風則壯熱憎寒有諸內自形諸外辨之既明然後治無不愈矣寒熱證治往來寒熱隂陽格柴胡四物各半湯榮衛不和乍寒熱歸芍芎參甘草薑寒熱似瘧瘀兼食生化柴胡查麯良憎寒壯熱更生𣪚歸地芎參荆穗薑注産後隂陽不和往來寒熱者宜柴胡四物湯若榮衛不調乍寒乍熱者用增損四物湯其方即當歸白芍川芎人參甘草乾薑也若停瘀兼食寒熱似􅒻者用生化湯加柴胡山查神麯若感受風寒憎寒壯熱者宜更生𣪚即當歸熟地川芎人參荆芥穗乾薑也柴胡四物湯方見首卷自汗頭汗總括産後隂虛陽氣盛微微自汗却無妨頭汗隂虛陽上越周身大汗是亡陽注産後血去過多則隂虛隂虛則陽盛若微微自汗是榮衛調和故雖汗無妨若周身無汗獨頭汗出者乃隂虛陽氣上越之象也若頭身俱大汗不止則恐有亡陽之慮矣自汗頭汗證治當歸六黃湯黃耆湯虛熱上蒸頭汗出治用當歸六黃湯黃芩連蘗炒黑用歸耆生熟二地黃自汗黃耆湯牡蠣耆术苓甘麥地防大汗不止陽外脫大劑參附可回陽注産後亡血隂虛陽熱上蒸頭上汗出至頸而還者宜當歸六黃湯即黃連黃芩黃蘗當歸黃耆生地熟地也內芩連蘗三味俱炒黑用若自汗太甚宜黃耆湯即牡蠣粉黃耆白术茯苓甘草麥冬熟地防風也若隂血大脫孤陽外越大汗不止非大劑參附不能回陽也中風證治産後中風惟大補火氣風痰末治之十全大補為主劑臨證詳參佐使宜注産後氣血大虛雖患中風惟宜大補即有火熱風痰氣閉亦當末治總以十全大補湯主之臨證詳恭其火氣風痰而佐使之十全大補湯方見首卷痙病證治加味八珍湯新産血虛多汗出易中風邪痙病成口噤項強身反折八珍耆附桂防風搖頭氣促寒不止兩手撮空莫望生注産後血氣不足藏府皆虛多汗出腠理不密風邪乘虛襲入遂成痙證手三陽之筋結于頷頰風入頷頰則口噤隂陽經絡周環于身風中經絡則頭項肩背强直如角弓反張之狀産後患此皆屬虛象惟宜用八珍湯加黃耆附子肉桂大補其隂陽少佐防風以治之若見頭搖喘促汗出不止兩手撮空者則為真氣去邪氣獨留必死之候故曰莫望生也八珍湯方見首卷瘈瘲抽搐證治加味八珍湯隂血去多陽氣熾筋無所養致抽搐發熱惡寒煩又渴八珍丹地鈎藤鈎抽搐無力戴眼折大汗不止命將休注産後血去太多陽氣熾盛筋無所養必致瘈瘲抽搐發熱惡寒心煩口渴不宜作風治惟當氣血兼補用八珍湯加丹皮生地鈎藤鈎治之若無力抽搐戴眼反折大汗不止者則為不治之證故曰命將休也八珍湯方見首卷不語證治加味八珍湯星連二陳湯七珍散産後不語分虛實痰熱乘心敗血衝氣血兩虛神鬱冒實少虛多要辨明虛用八珍藤菖志痰熱星連入二陳敗血衝心七珍散芎地辛防硃蒲參注産後不語須分虛實治之有痰熱乘心者有敗血衝心者有氣血兩虛而鬱冒神昏者大抵産後屬虛者多而實者少也虛宜八珍湯加鈎藤菖蒲逺志痰熱宜二陳湯加膽星黃連敗血冲心宜七珍散即川芎生地細辛防風硃砂菖蒲人參也八珍湯方見首卷二陳湯方見三卷御纂醫宗金鑑卷四十七
