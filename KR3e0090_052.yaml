  text: 編輯幼科雜病心法要訣目録疳證門疳證總括脾疳消疳理脾湯肥兒丸參苓白术散疳瀉清熱和中湯參苓白术散疳腫脹御苑勻氣散疳痢香連導滯湯肝疳柴胡清肝散蘆薈肥兒丸加味逍遙散抑肝扶脾湯心疳瀉心導赤湯珍珠散茯神湯疳渴清熱甘露飲肺疳生地清肺飲甘露飲補肺散腎疳金蟾丸九味地黃丸調元散疳熱鱉甲青蒿飲鱉甲散腦疳龍膽丸龍腦丸吹鼻龍腦散眼疳瀉肝散清熱退翳湯逍遙散羊肝散鼻疳清金散蔣氏化毒丹化蟲丸鼻疳散吹鼻蟬殼散牙疳消疳蕪荑湯蘆薈肥兒丸牙疳散脊疳蘆薈丸金蟾散蛔疳史君子散下蟲丸肥兒丸無辜疳柴胡飲蘆薈肥兒丸丁奚疳五疳消積丸人參啓脾丸哺露疳集聖丸肥兒丸人參丸吐證門吐證總括辨嘔吐噦證傷乳吐消乳丸保和丸傷食吐三稜丸和胃湯夾驚吐全蝎觀音散定吐丸痰飲吐二陳湯香砂六君子湯蟲吐化蟲丸加減理中湯虛吐丁沉四君子湯實吐三一承氣湯寒吐薑橘散理中湯熱吐加味溫膽湯瀉證門瀉證總括傷乳食瀉保安丸平胃散中寒瀉理中湯訶子散火瀉玉露散四苓散驚瀉益脾鎮驚散養脾丸臍寒瀉和氣飲調中湯脾虛瀉參苓白术散飱瀉補中益氣湯四神丸水瀉胃苓湯升陽除濕湯御纂醫宗金鑑卷五十二目録欽定四庫全書御纂醫宗金鑑卷五十二編輯幼科雜病心法要訣目録疳證門疳證總括脾疳消疳理脾湯肥兒丸參苓白术散疳瀉清熱和中湯參苓白术散疳腫脹御苑勻氣散疳痢香連導滯湯肝疳柴胡清肝散蘆薈肥兒丸加味逍遙散抑肝扶脾湯心疳瀉心導赤湯珍珠散茯神湯疳渴清熱甘露飲肺疳生地清肺飲甘露飲補肺散腎疳金蟾丸九味地黃丸調元散疳熱鱉甲青蒿飲鱉甲散腦疳龍膽丸龍腦丸吹鼻龍腦散眼疳瀉肝散清熱退翳湯逍遙散羊肝散鼻疳清金散蔣氏化毒丹化蟲丸鼻疳散吹鼻蟬殼散牙疳消疳蕪荑湯蘆薈肥兒丸牙疳散脊疳蘆薈丸金蟾散蛔疳史君子散下蟲丸肥兒丸無辜疳柴胡飲蘆薈肥兒丸丁奚疳五疳消積丸人參啓脾丸哺露疳集聖丸肥兒丸人參丸吐證門吐證總括辨嘔吐噦證傷乳吐消乳丸保和丸傷食吐三稜丸和胃湯夾驚吐全蝎觀音散定吐丸痰飲吐二陳湯香砂六君子湯蟲吐化蟲丸加減理中湯虛吐丁沉四君子湯實吐三一承氣湯寒吐薑橘散理中湯熱吐加味溫膽湯瀉證門瀉證總括傷乳食瀉保安丸平胃散中寒瀉理中湯訶子散火瀉玉露散四苓散驚瀉益脾鎮驚散養脾丸臍寒瀉和氣飲調中湯脾虛瀉參苓白术散飱瀉補中益氣湯四神丸水瀉胃苓湯升陽除濕湯御纂醫宗金鑑卷五十二目録欽定四庫全書御纂醫宗金鑑卷五十二編輯幼科雜病心法要訣疳證門疳證總括大人為勞小兒疳乳食傷脾是病原甘肥失節生積熱氣血津液被熬煎初患尿泔午潮熱日久青筋肚大堅面色青黃肌肉瘦皮毛憔悴眼睛䀽注大人者十五歲以上也病則為勞若十五歲以下者皆名為疳緣所稟之氣血虛弱藏府嬌嫩易於受傷或因乳食過飽或因肥甘無節停滯中脘傳化遲滯腸胃漸傷則生積熱熱盛成疳則消耗氣血煎灼津液凡疳病初起尿如米泔午後潮熱日久失治致令青筋暴露肚大堅硬面色青黃肌肉消瘦皮毛憔悴眼睛發䀽而疳證成矣然當分其所屬而治之庶不致有誤也脾疳脾疳面黃肌消瘦身熱困倦喜睡眠心下痞硬滿腫脹卧冷食泥腹痛堅頭大頸細食懶進吐瀉煩渴便腥黏攻積消疳肥兒治補脾參苓白术先注脾屬土色黃主肌肉故脾疳則見面黃肌肉消瘦身體發熱困倦喜睡心下痞硬乳食懶進睡卧喜冷好食泥土肚腹堅硬疼痛頭大頸細有時吐瀉口乾煩渴大便腥黏之證也宜先攻其積用消疳理脾湯肥兒丸主之積退然後調理其脾以參苓白术散主之消疳理脾湯蕪荑三稜莪术青皮炒陳皮蘆薈檳榔史君子肉甘草生川黃連胡黃連麥芽炒神麯炒引用燈心水煎服方歌消疳理脾用蕪荑三稜莪术青陳皮蘆薈檳榔史君草川連胡連麥芽麯肥兒丸人參三錢半白术五錢土炒茯苓三錢黃連二錢胡黃連五錢史君子四錢肉神麯炒麥芽炒山查肉各三錢半甘草錢半炙蘆薈二錢半煨右為末黃米糊丸如黍米大每服二三十丸米湯化下參苓白术散人參二錢茯苓白术土炒扁豆炒薏米炒山藥各五錢炒陳皮三錢縮砂桔梗各二錢甘草一錢炙建蓮子五錢去心右共為細末每服一錢老米湯調服疳瀉疳疾傷脾因作瀉先清後補為妙訣初宜清熱和中湯久瀉參苓白术捷注疳瀉之證多緣積熱傷脾以致水穀不分頻頻作瀉法當清熱滲濕以清熱和中湯主之若瀉久不愈當漸為調理參苓白术散主之清熱和中湯白术土炒陳皮厚朴薑炒赤苓黃連神麯炒穀芽炒史君子生甘草澤瀉引用燈心水煎服方歌疳久泄瀉名疳瀉清熱和中功甚捷白术陳厚赤苓連神穀史君草澤瀉參苓白术散方見脾疳疳腫脹疳疾腫脹面浮光傳化失宜脾肺傷氣逆喘咳胸膈滿御苑勻氣服最良注疳疾腫脹之證多因傳化失宜以致脾肺兩傷現證氣逆喘咳胸膈痞悶肚腹腫脹面色浮光宜用御苑勻氣散治之其腫脹自消矣御苑勻氣散桑皮蜜炒桔梗赤苓甘草生藿香陳皮木通引用薑皮燈心水煎服方歌疳久脾虛腫脹生御苑勻氣有竒功桑皮桔梗赤苓草藿香陳皮合木通疳痢疳疾日久頻下痢多緣腸胃熱凝滯或赤或白腹窘急香連導滯為妙劑注疳痢之由皆因熱結腸胃所致故痢時或赤或白腹中窘痛急用香連導滯湯治之其痢自愈香連導滯湯青皮炒陳皮厚朴薑炒川黃連薑炒生甘草山查神麯炒木香煨檳榔大黃引用燈心水煎服方歌疳久下痢名疳痢香連導滯功最良青陳厚朴川連草查麯木香檳大黃肝疳肝疳面目爪甲青眼生眵淚澀難睜搖頭揉目合面卧耳流膿水濕瘡生腹大青筋身羸瘦燥渴煩急糞帶青清熱柴胡同蘆薈調養逍遙抑肝靈注肝屬木色青主筋故肝疳則見面目爪甲皆青眼生眵淚隱澀難睜搖頭揉目合面睡卧耳瘡流膿腹大青筋身體羸瘦燥渴煩急糞青如苔之證也治宜先清其熱用柴胡清肝散蘆薈肥兒丸主之若病勢稍退當以逍遙散抑肝扶脾湯調理柴胡清肝散銀柴胡梔子微炒連翹去心胡黃連生地黃赤芍龍膽草青皮炒甘草生引用燈心竹葉水煎服方歌柴胡清肝治肝疳銀柴梔子翹胡連生地赤芍龍膽草青皮甘草一同煎蘆薈肥兒丸五穀蟲二兩炒蘆薈生胡黃連炒川黃連各一兩薑炒銀柴胡一兩二錢炒扁豆炒山藥各二兩炒南山查二兩半蝦蟇四個煆肉豆䓻七錢煨檳榔五錢史君子二兩半炒神麯二兩炒麥芽一兩六錢炒鶴虱八錢炒蕪荑一兩炒硃砂二錢飛麝香二錢共研細末醋糊為丸如黍米大每服一錢米飲下加味逍遙散茯苓白术炒當歸白芍炒柴胡薄荷炙甘草丹皮梔子炒引用薑棗水煎服方歌加味逍遙散如神茯苓白术當歸身白芍柴胡薄荷草再加丹皮梔子仁抑肝扶脾湯人參白术土炒黃連薑炒柴胡酒炒茯苓青皮醋炒陳皮白芥子龍膽草山查神麯炒炙甘草引用薑棗水煎服方歌調理抑肝扶脾湯參术黃連柴苓良青陳白芥龍膽草山查神麯甘草嘗心疳心疳面赤脈絡赤壯熱有汗時煩驚咬牙弄舌口燥渴口舌生瘡小便紅胸膈滿悶喜伏卧懶食乾瘦吐利頻瀉心導赤珍珠治茯神調理可收功注心屬火色赤主血脈故心疳則見面紅目脈絡赤壯熱有汗時時驚煩咬牙弄舌口舌乾燥渴飲生瘡小便紅赤胸膈滿悶睡喜伏卧懶食乾瘦或吐或利也熱盛者㵼心導赤湯主之熱盛兼驚者珍珠散主之病久心虛者茯神湯調理之瀉心導赤湯方見木舌珍珠散珍珠三錢麥冬五錢去心天竺黃三錢金鉑二十五片牛黃一錢胡黃連三錢生甘草二錢羚羊角大黃當歸各三錢硃砂二錢雄黃一錢茯神五錢犀角三錢右為細末每服五分茵蔯湯調服茯神湯茯神當歸炙甘草人參引用龍眼肉水煎服煩熱者加麥冬方歌茯神湯內用茯神當歸甘草共人參若是煩熱麥冬入清補兼施功最純疳渴肥甘積熱傷津液大渴引飲心煩熱速用清熱甘露宜熱減津生渴自歇注疳渴者多因肥甘積熱煎耗脾胃以致津液虧損故不時大渴引飲心神煩熱速用清熱甘露飲其渴自愈清熱甘露飲生地黃麥冬去心石斛知母生枇杷葉蜜炙石膏煆甘草生茵蔯蒿黃芩引用燈心水煎服方歌耗液傷津成疳渴清熱甘露飲如神生地麥冬斛知母枇杷石膏草茵芩肺疳面白氣逆時咳嗽毛髮焦枯皮粟乾發熱憎寒流清涕鼻頰生瘡號肺疳疏散生地清肺效清熱甘露飲為先肺虛補肺散最妙隨證加減莫遲延注肺屬金色白主皮毛故肺疳則見面白氣逆咳嗽毛髮枯焦皮上生粟肌膚乾燥憎寒發熱常流清涕鼻頰生瘡也先用生地清肺飲以疏解之繼用甘露飲清之日久肺虛者當以補肺散主之生地清肺飲桑皮炒生地黃天冬前胡桔梗蘇葉防風黃芩生甘草當歸連翹去心赤苓引用生薑紅棗水煎服方歌生地清肺用桑皮生地天冬前桔齊蘇葉防風黃芩草當歸連翹赤苓宜甘露飲生地黃熟地黃天冬麥冬去心枳殼麩炒桔梗黃芩枇杷葉蜜炙茵蔯蒿石斛引用紅棗肉水煎服方歌甘露飲治肺火壅生熟地黃二門冬枳桔黃芩枇杷葉茵蔯石斛共煎成補肺散白茯苓阿膠蛤粉炒糯米馬兜鈴炙甘草杏仁炒去皮尖水煎服方歌肺虛補肺散通仙茯苓阿膠糯米攢馬兜鈴配炙甘草杏仁微炒去皮尖腎疳解顱鶴膝齒行遲骨瘦如柴面黑黧齒齦出血口臭氣足冷腹痛瀉哭啼腎疳先用金蟾治九味地黃繼進宜若逢稟賦氣虛弱調元散進莫遲疑注腎屬水色黑主骨患此疳者初必有解顱鶴膝齒遲行遲腎氣不足等證更因甘肥失節久則漸成腎疳故見面色黧黑齒齦出血口中氣臭足冷如冰腹痛泄瀉啼哭不已之證先用金蟾丸治其疳繼以九味地黃丸調補之若稟賦不足者調元散主之金蟾丸乾蝦蟇五個煆胡黃連黃連各三錢鶴蝨二錢肉豆䓻煨苦楝根白皮雷丸蘆薈生蕪荑各三錢右為末麵糊為丸菉豆大雄黃為衣每服十五丸米湯化下九味地黃丸熟地茱萸肉各五錢赤茯苓澤瀉牡丹皮山藥炒當歸川楝子史君子各三錢肉右為細末煉白蜜為丸如芡實大用滚白水研化食前服調元散人參茯苓白术土炒山藥炒川芎當歸熟地黃茯神黃耆炙甘草炙白芍炒引用薑棗水煎服方歌調元散治稟賦弱參苓白术乾山藥芎歸熟地共茯神黃耆甘草同白芍疳熱小兒疳疾身發熱輕重虛實當分别初用青蒿飲為宜日久鱉甲散最捷注疳疾之證身多發熱治者宜分别輕重虛實治之病初起多實者鱉甲青蒿飲主之日久多虛者鱉甲散主之鱉甲青蒿飲銀柴胡鱉甲炙青蒿生甘草生地黃赤芍胡黃連知母炒地骨皮引用燈心水煎服方歌疳疾血虛身發熱鱉甲青蒿藥有靈銀柴鱉蒿草地芍胡連知母地骨同鱉甲散人參黃耆炙鱉甲炙生地熟地當歸白芍炒地骨皮水煎服方歌疳疾日久骨熱蒸鱉甲散治效從容參耆鱉甲生熟地當歸白芍地骨同腦疳腦疳多緣受風熱又兼乳哺失調節頭皮光急生餅瘡頭熱髮焦如穗結鼻乾心煩腮囟腫困倦睛暗身汗熱龍膽龍腦丸甚良吹鼻龍腦效甚捷注腦疳者因兒素受風熱又兼乳哺失調以致變生此證頭皮光急腦生餅瘡頭熱毛焦髮結如穗鼻乾心煩腮囟腫硬困倦睛暗自汗身熱也腦熱生瘡者龍膽丸主之煩熱羸瘦者龍腦丸主之外用吹鼻龍腦散吹之其證自愈龍膽丸龍膽草升麻苦楝根皮焙赤茯苓防風蘆薈油髮灰各二錢青黛黃連各二錢右為細末豬膽汁浸糕糊丸如麻子大薄荷湯下量兒大小與之龍腦丸龍腦麝香各五分雄黃二錢胡黃連三錢牛黃一錢硃砂一錢五分蘆薈三錢生乾蝦蟇四錢灰右為細末熊膽合丸如麻子大每服三丸薄荷湯下吹鼻龍腦散龍腦麝香少許細末各研蝸牛殼炒黃蝦蟇灰瓜蒂黃連細辛桔梗各等分右為細末入磁盒內貯之每取少許吹入鼻中日吹二次眼疳疳熱上攻眼疳成癢澀赤爛胞腫疼白睛生翳漸遮滿流淚羞明目不睜疏解瀉肝散最妙雲翳清熱退翳靈目久不瘥當補養逍遙瀉肝二方從注眼疳者疳熱上攻於眼故發時癢澀赤爛眼胞腫疼白睛生翳漸漸遮滿不時流淚羞明閉目也先用瀉肝散疏解之再用清熱退翳湯消其翳若目久不瘥法當調補逍遙散或羊肝散主之瀉肝散生地黃當歸赤芍川芎連翹去心梔子生龍膽草大黃羌活甘草生防風引用燈心水煎服方歌瀉肝散治肝熱壅生地當歸赤芍芎連翹梔子龍膽草大黃羌活草防風清熱退翳湯梔子微炒胡黃連木賊草赤芍生地羚羊角龍膽草銀柴胡蟬蛻甘草生菊花蒺藜引用燈心水煎服方歌清熱退翳消雲翳梔連木賊芍生地羚羊龍膽銀柴胡蟬蛻甘草菊蒺藜逍遙散方見肝疳羊肝散青羊肝一具膜切韭葉厚片去筋人參羌活白术土炒蛤粉各等分右為細末令勻聽用將藥置荷葉上如錢厚一層鋪肝一層包固外以新足青布包裹蒸熟任兒食之如不食者及夏月恐腐壞則晒乾為末早晚白湯調服服完再合以好為度若熱者減人參鼻疳疳熱攻肺成鼻疳鼻塞赤癢痛難堪浸淫潰爛連脣際咳嗽氣促髮毛乾熱盛清金化毒效疳蟲蝕鼻化蟲丸調敷須用鼻疳散吹鼻蟬殼效通仙注鼻疳者因疳熱攻肺而成蓋鼻為肺竅故發時鼻塞赤癢疼痛浸淫潰爛下連脣際成瘡咳嗽氣促毛髮焦枯也熱盛者宜清金散蔣氏化毒丹主之蟲蝕者用化蟲丸主之外用鼻疳散敷之或以吹鼻蟬殼散吹入鼻內清金散生梔子黃芩枇杷葉蜜炙生地黃花粉連翹去心麥冬去心薄荷元參生甘草桔梗引用燈心水煎服方歌清金散治肺壅熱梔子黃芩枇杷葉生地花粉翹麥冬薄荷元參甘草桔蔣氏化毒丹方見胎赤化蟲丸蕪荑蘆薈生青黛川芎白芷梢胡黃連川黃連蝦蟇各等分灰右為細末豬膽汁浸糕為丸如麻子大每服二十丸食後杏仁煎湯下鼻疳散青黛一錢麝香少許熊膽五分右為細末乾者用豬骨髓調貼濕者乾上吹鼻蟬殼散蟬殼微炒青黛研蛇蛻皮灰滑石麝香各等分細研右為細末每用菉豆大吹入鼻中日三用之疳蟲盡出牙疳疳成毒熱內攻胃上發齦肉赤爛疼口鼻血出牙枯落穿腮蝕脣命多傾攻毒消疳蕪荑效繼以蘆薈肥兒靈外用牙疳散時上能食堪藥始能生注牙疳者因毒熱攻胃而成故熱毒上發齦肉赤爛疼痛口臭血出牙枯脫落穿腮蝕脣病勢危急急用消疳蕪荑湯瀉其毒熱繼以蘆薈肥兒丸清其餘熱外用牙疳散時時敷之自愈總之此證必胃強能食堪勝峻藥始有生機否則難治也消疳蕪荑湯大黃芒消蕪荑蘆薈生川連胡黃連黃芩雄黃水煎服服後便軟及不食者去大黃芒消加石膏羚羊角方歌蕪荑消疳大黃消蘆薈蕪荑二連標黃芩雄黃一同入能清積熱牙疳消蘆薈肥兒丸方見肝疳牙疳散人中白煆存性緑礬燒紅五倍子各等分炒黑氷片少許右為極細末先用水拭淨牙齒再以此散敷之有蟲者加檳榔脊疳積熱生蟲蝕脊膂手擊其背若鼓鳴羸瘦脊骨鋸齒狀身熱下利煩渴增十指皆瘡齧爪甲此名脊疳病熱凶蘆薈丸同金蟾散急急調治莫從容注脊疳者因積熱生蟲上蝕脊膂也以手擊其背必空若鼓鳴脊骨羸瘦狀若鋸齒始為脊疳外證亦身體發熱下利煩渴十指皆瘡頻齧爪甲其證最為可畏須先以蘆薈丸殺其蟲繼用金蟾散消其疳隨時調治或可愈也蘆薈丸生蘆薈青黛硃砂熊膽胡黃連貫衆地龍微炒川黃連蟬蛻去足雷丸各五錢麝香一錢蝦蟇一個炙焦酥塗右為細末用蝸角肉研和丸如麻子大每服五丸粥飲下量兒大小與之金蟾散蟾一枚炙焦酥塗夜明沙炒桃白皮樗根白皮地榆黃蘗訶黎勒皮煨百合人參大黃白蕪荑炒胡粉各三錢檳榔一錢丁香三十七粒右為細末每服五分粥飲調下蛔疳過食膩冷並肥甘濕熱生蛔腹內纒時煩多啼時腹痛口脣色變溢清涎腹脹青筋肛濕癢史君散治莫遲延不愈下蟲丸極效蛔退補脾肥兒丸注蛔疳者因過食生冷油膩肥甘之物以致濕熱生蛔腹中擾動故有時煩躁多啼有時肚腹攪痛口脣或紅或白口溢清涎腹脹青筋肛門濕癢也先用史君子散治之不愈下蟲丸主之若蛔退又當調補其脾肥兒丸主之史君子散史君子十個為瓦上炒末苦楝子五個核泡去白蕪荑甘草各一錢一宿膽汁浸右為末每服一錢水調服下蟲丸苦楝根皮新白者佳酒浸焙木香桃仁浸去皮尖緑苞貫衆蕪荑焙雞心檳榔各二錢輕粉五分鶴蝨一錢炒乾蝦蟇三錢炒黑史君子三錢煨取肉右為末麵糊成丸如麻子大每服二十丸滚白水下肥兒丸方見脾疳無辜疳無辜疳傳有二因鳥羽汚衣著兒身或緣乳母病傳染頸項瘡核便利膿蟲蝕臟腑身羸瘦面黃發熱致疳生清熱宜用柴胡飲消疳肥兒效如神注無辜疳者其病原有二或因浣衣夜露被無辜鳥落羽所汚兒著衣後致成此證或因乳母有病傳染小兒以有此疾其證頸項生瘡或項內有核如彈按之轉動軟而不疼其中有蟲如米粉不速破之使蟲蝕臟腑便利膿血身體羸瘦面黃發熱也治宜先清其熱柴胡飲主之再消其疳以蘆薈肥兒丸主之柴胡飲赤芍藥柴胡黃連半夏薑製桔梗夏枯草龍膽草浙貝母黃芩甘草生引用燈心水煎服方歌柴胡飲治無辜疳赤芍柴胡川黃連半夏桔梗夏枯草龍膽浙貝芩草煎蘆薈肥兒丸方見肝疳丁奚疳遍身骨露號丁奚肌肉乾澀晝夜啼手足枯細面黧黑項細腹大突出臍尻削身軟精神倦骨蒸潮熱渴煩急化滯五疳消積治補養人參啓脾宜注丁奚者遍身骨露其狀似丁故名曰丁奚也其證肌肉乾澀啼哭不已手足枯細面色黧黑項細腹大肚臍突出尻削身軟精神倦怠骨蒸潮熱燥渴煩急也先用五疳消積丸化其滯繼用人參啓脾丸理其脾病可漸愈矣五疳消積丸史君子肉五錢炒麥芽炒陳皮神麯炒山查各一兩白蕪荑黃連膽草各三錢右為末陳米飯為丸每服一錢米飲下人參啓脾丸人參五錢白术五錢土炒白茯苓五錢陳皮四錢扁豆五錢炒山藥五錢炒木香二錢煨穀芽三錢炒神麯三錢炒炙甘草二錢右研細末煉蜜為丸重一錢用建蓮湯化下哺露疳乳食不節傷脾胃羸瘦如柴哺露成吐食吐蟲多煩渴頭骨開張晡熱蒸先用集聖消積滯繼用肥兒甚有靈若還腹大青筋現人參丸服莫從容注哺露者因乳食不節大傷脾胃也其證羸瘦如柴吐食吐蟲心煩口渴頭骨開張日晡蒸熱先用集聖丸消其積滯再用肥兒丸調理其脾若哺露日久肚大青筋者又宜攻補兼施以人參丸主之集聖丸蘆薈微炒五靈脂炒夜明沙淘洗焙乾縮砂木香陳皮莪术史君子肉黃連川芎酒洗炒乾蟾各二錢炙當歸一錢五分青皮二錢製右為細末用雄豬膽二個取汁和麵糊為丸每服一錢米飲送下肥兒丸方見脾疳人參丸人參麥冬去心半夏薑製大黃微炒黃耆炙茯苓柴胡黃芩炙甘草川芎訶黎勒煨鱉甲炙右為細末煉蜜為丸如麻子大以粥飲下量兒大小用之吐證門吐證總括諸逆上衝成嘔吐乳食傷胃或夾驚或因痰飲或蟲擾虛實寒熱要分明注嘔吐一證皆諸逆上衝所致也夫諸逆之因或以乳食過多停滯中脘致傷胃氣不能健運而上逆也或於食時觸驚停積不化而上逆也或痰飲壅盛阻隔氣道或蛔蟲擾亂懊憹不安而上逆也總之上逆之因雖不同而皆能成嘔吐也但病有虛有實有寒有熱治者當於臨證時參合兼見之證審愼以别之庶不誤矣辨嘔吐噦證有物有聲謂之嘔有物無聲吐證名無物有聲為噦證分别醫治中病情注吐證有三曰嘔曰吐曰噦古人謂嘔屬陽明有聲有物氣血俱病也吐屬太陽有物無聲血病也噦屬少陽有聲無物氣病也獨李杲謂嘔吐噦俱屬脾胃虛弱潔古老人又從三焦以分氣積寒之三因然皆不外諸逆上衝也治者能分虛實别寒熱以治之自無不曲中病情矣傷乳吐乳食過飽蓄胃中乳片不化吐頻頻身熱面黃腹膨脹消乳保和有神功注傷乳吐者因乳食過飽停蓄胃中以致運化不及吐多乳片猶如物盛滿而上溢也其證身熱面黃肚腹膨脹治宜消乳丸保和丸化其宿乳安胃和中節其乳食自然止也消乳丸香附二兩製神麯炒麥芽各一兩炒陳皮八錢縮砂仁炒甘草各五錢炙右為細末滴水為丸如粟米大量兒大小服之薑湯化下保和丸南山查二兩神麯一兩炒茯苓半夏各一兩薑製連翹去心陳皮萊蔔子各五錢炒右為細末麵糊為丸麥芽湯化服傷食吐過食傷胃腹脹熱惡食口臭吐酸黏眼胞虛浮身潮熱須服三稜和胃煎注傷食吐者因小兒飲食無節過食油膩麵食等物以致壅塞中脘而成也其證肚腹脹熱惡食口臭頻吐酸黏眼胞虛浮身體潮熱治宜清胃和中為主先用三稜丸止其吐再用和胃湯化其滯而病漸愈矣三稜丸三稜煨陳皮半夏薑製神麯各一兩炒黃連薑炒枳實麩炒丁香各五錢右研細末麵和為丸如黃米大每服二十丸食後薑湯下和胃湯陳皮半夏薑製縮砂仁研蒼术炒厚朴薑炒藿香葉香附炒甘草炙山查神麯炒引用生薑水煎服方歌和胃湯治嘔吐頻陳皮半夏縮砂仁蒼术厚朴藿香葉香附甘草山查神夾驚吐食時觸異吐青涎身熱心煩睡不安截風觀音散極妙止吐定吐丸可痊注夾驚吐者多因飲食之時忽被驚邪所觸而致吐也其證頻吐青涎身體發熱心神煩躁睡卧不寧先用全蠍觀音散截其風次用定吐丸止其嘔而病可痊矣全蠍觀音散人參三錢黃耆蜜炙扁豆炒茯苓各五錢蓮肉三錢去心木香一錢五分煨白芷二錢羌活防風天麻全蠍各三錢去毒炙甘草一錢五分右為細末薑棗煎湯調服量兒大小與之定吐丸丁香二十一粒蠍梢四十九條去毒半夏三個薑製右為細末令勻煮棗肉為丸如黍米大每服七丸金器煎湯化服痰飲吐痰飲壅盛在胸中痰因氣逆嘔吐成眩暈面青吐涎飲香砂二陳六君寧注痰飲吐者由小兒飲水過多以致停留胸膈變而為痰痰因氣逆遂成嘔吐之證其候頭目眩暈面青嘔吐涎水痰沫也宜用香砂二陳湯虛者香砂六君子湯治之二陳湯方見哯乳香砂仁本方加藿香砂六君子湯藿香縮砂仁白术土炒人參茯苓半夏薑製陳皮甘草炙引用生薑水煎服方歌香砂六君虛痰吐藿香縮砂共白术人參茯苓及陳皮半夏甘草同煎服蟲吐蟲吐胃熱或胃寒色變時疼嘔清涎寒熱當以隂陽辨化蟲加減理中痊注蟲吐之證有二有以胃經熱蒸者有以胃經寒迫者皆能令蟲不安擾亂胃中而作吐也其證脣色或紅或白胃口時痛時止頻嘔清涎屬寒屬熱當從隂陽之證辨之熱者化蟲丸主之寒者加減理中湯主之化蟲丸蕪荑五錢鶴蝨苦楝根皮胡粉史君子肉檳榔各一兩枯礬二錢五分右為細末麵糊為丸量兒大小用之加減理中湯人參乾薑白术土炒川椒引用烏梅一箇水煎服方歌加減理中寒吐蟲人參乾薑白术從川椒烏梅伏蟲動煎成服下即安寧虛吐虛吐多因胃弱成神倦囟動睡露睛自利不渴頻嘔吐丁沉四君藥最靈注虛吐之證多因胃氣虛弱不能消納乳食致成此證也其精神倦怠囟門煽動睡卧露睛自利不渴頻頻嘔吐者以丁沉四君子湯治之丁沉四君子湯人參白术土炒茯苓炙甘草丁香沉香引用煨薑水煎服方歌胃虛嘔吐不思食丁沉四君治最宜參术苓草補其胃丁香沉香溫其脾實吐小兒實吐腹脹滿二便不利痞硬疼發渴思涼吐酸臭三一承氣可收功注實吐者小兒平素壯實偶而停滯胸腹脹滿二便祕澀痞硬疼痛口渴思飲寒涼吐多酸臭也宜用三一承氣湯下之二便利而吐止矣三一承氣湯芒消生大黃枳實麩炒甘草生厚朴薑炒引用生薑水煎服方歌三一承氣治實吐滌滯通塞功最著芒消相配生大黃枳實甘草同厚朴寒吐朝食暮吐為冷吐乳食不化不臭酸四肢厥冷面脣白薑橘丁茰理中煎注寒吐者皆因小兒過食生冷或乳母當風取涼使寒氣入乳小兒飲之則成冷吐之證其候朝食暮吐乳食不化吐出之物不臭不酸四肢逆冷面脣色白治當溫中定吐胃微寒者薑橘散主之寒甚者丁茰理中湯主之薑橘散白薑二錢陳皮一兩炙甘草一錢右為細末每服一錢溫棗湯調服理中湯方見不乳香吳茱茰本方加丁熱吐食入即吐因胃熱口渴飲冷吐酸涎身熱脣紅小便赤加味溫膽湯可痊注熱吐之證或因小兒過食煎􅘤之物或因乳母過食厚味以致熱積胃中遂令食入即吐口渴飲冷嘔吐酸涎身熱脣紅小便赤色治宜清熱為主加味溫膽湯主之加味溫膽湯陳皮半夏薑製茯苓麥冬去心枳實麩炒生甘草竹茹黃連薑炒引用燈心水煎服方歌熱吐須用溫膽湯陳皮半夏茯苓良麥冬枳實生甘草竹茹黃連水煎嘗瀉證門瀉證總括小兒泄瀉認須清傷乳停食冷熱驚藏寒脾虛飱水瀉分消溫補治宜精注瀉之一證多因脾被濕侵土不勝水而成然致病之原各異或乳食停滯不化或感受寒暑之氣或驚邪外觸或藏受寒冷或脾虛作瀉更有飱瀉水瀉之證致疾之因不同而調治之法亦異醫者詳細辨之或分消或溫補因證施治庶不誤矣傷乳食瀉乳食過傷瀉酸膿噫臭腹熱脹滿疼口渴惡食溺赤澀保安平胃奏神功注傷乳食瀉者因乳食過飽損傷脾胃乳食不化故頻瀉酸膿也噫臭腹熱脹滿疼痛口渴惡食小便赤澀須用保安丸消其滯次用平胃散和其脾庶積消而瀉止矣保安丸香附醋炒縮砂仁各一兩白薑炮青皮醋炒陳皮三稜莪术炙甘草各五錢右為細末麵糊為丸量兒大小與之白湯化下平胃散方見哯乳中寒瀉過食生冷中寒瀉腸鳴脹痛泄澄清面白肢冷懶飲食理中訶子散堪行注中寒瀉者因過食生冷以致寒邪凝結腸鳴腹脹時復疼痛所瀉皆澄徹清冷面色淡白四肢逆冷飲食懶進也溫中理中湯主之止瀉訶子散主之理中湯方見不乳訶子散訶子麵煨肉豆䓻麵煨白术土炒人參茯苓木香各一兩煨陳皮炙甘草各五錢右為細末每服一錢薑湯調服火瀉火瀉內熱或傷暑暴注下迫腹痛疼煩渴瀉黃小便赤玉露四苓可收功注火瀉者皆因藏府積熱或外傷暑氣故瀉時暴注下迫肚腹疼痛心煩口渴瀉多黃水小便赤色也先用玊露散清其熱再用四苓湯利其水庶得其要矣玊露散寒水石石膏各一兩甘草三錢右為細末量兒大小溫湯無時調服四苓湯茯苓白术土炒豬苓澤瀉引用燈心水煎服方歌火瀉小便不利通利水除濕用四苓茯苓白术豬苓澤燈心為引共煎成驚瀉驚瀉因驚成泄瀉夜卧不安晝惕驚糞稠若膠帶青色鎮驚養脾服通靈注驚瀉者因氣弱受驚致成此證其候夜卧不寧晝則驚愓糞稠若膠色青如苔治宜鎮心抑肝先以益脾鎮驚散定其驚次以養脾丸理其脾庶可愈矣益脾鎮驚散人參錢半白术土炒茯苓各三錢硃砂八分釣藤二錢甘草五分炙右為細末每服一錢燈心湯調服養脾丸人參白术土炒當歸川芎各三錢青皮醋炒木香煨黃連薑炙陳皮各二錢神麯炒山查縮砂仁麥芽各一錢炒右研細末神麯糊為丸如麻子大每服二十丸陳倉米飲下臍寒瀉剪臍失護受寒冷糞色青白腹痛鳴散寒和氣飲極效溫補調中湯最靈注臍寒瀉者多因斷臍失護風冷乘入傳於大腸遂成寒瀉之證其候糞色青白腹痛腸鳴先用和氣飲溫散之再以調中湯溫補之庶治得其要矣和氣飲蒼术紫蘇防風赤苓豆豉藿香陳皮厚朴薑炒炙甘草引用生薑燈心水煎服方歌和氣飲具溫散功蒼术紫蘇共防風赤苓豆豉藿香葉陳皮厚朴甘草同調中湯人參茯苓藿香白术土炒炙甘草木香煨香附製縮砂仁引用煨薑水煎服方歌臍寒瀉用調中湯人參白术煨木香藿香茯苓同香附縮砂炙草引煨薑脾虛瀉脾虛食後即作瀉腹滿不渴少精神面黃懶食肌消瘦參苓白术奏竒勳注脾虛瀉者多因脾不健運故每逄食後作瀉腹滿不渴精神短少面黃懶食肌肉消瘦也宜用參苓白术散以補脾其瀉自止參苓白术散方見脾疳飱瀉清氣下陷失健運完穀不化飱瀉名補中益氣湯升補久瀉腸滑用四神注飱瀉者或因春傷風邪清氣下陷脾失健運以致完穀不化也治者須補養脾土用補中益氣湯升其中氣若泄瀉日久腸滑不禁者用四神丸治之補中益氣湯人參黃耆蜜炙當歸土炒白术土炒炙甘草陳皮升麻土炒柴胡醋炒引用薑棗水煎服方歌飱瀉多因清陽陷補中益氣湯最驗參耆歸术草陳皮升麻柴胡功無限四神丸補骨脂四兩五味子肉豆䓻各二兩麵裹煨吳茱茰一兩炒水浸右為細末生薑棗肉為丸每服一錢米飲下水瀉脾胃濕盛成水瀉懶食溏瀉色多黃清濁不分溺短澀胃苓升陽除濕湯注水瀉者皆因脾胃濕盛以致清濁不分變成水瀉之證其候小便短澀懶食溏瀉色黃宜用胃苓湯以除濕若瀉久不止則用升陽除濕湯治之其證自愈胃苓湯蒼术炒陳皮厚朴薑炒白术土炒茯苓炙甘草肉桂澤瀉豬苓引用生薑紅棗水煎服方歌濕瀉胃苓湯堪行蒼术陳皮厚朴同白术茯苓炙甘草肉桂澤瀉共豬苓升陽除濕湯蒼术炒陳皮防風神麯炒麥芽炒澤瀉炙甘草升麻羌活柴胡豬苓引用生薑水煎服方歌升陽除濕瀉不停蒼术陳皮共防風神麯麥芽澤甘草升麻羌活柴豬苓御纂醫宗金鑑卷五十二
