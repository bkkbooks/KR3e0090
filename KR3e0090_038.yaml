解者皆因汗之不徹或已傳經治之不及也若表已解而裏有微熱煩渴者用桂苓甘露飲以和太陽之裏若内熱太甚大熱大煩大渴者用白虎湯合黄連解毒湯以淸陽明之裏若表未解又傳陽明身熱而煩用柴葛解肌湯以解兩陽之邪若表實無汗大熱而煩用三黄石膏湯以清表裏之熱若裏有熱尿赤而澁者用凉膈散合天水散以淸利之若胃實潮熱不大便有微表者用大柴胡湯下之無表者三承氣湯下之桂苓甘露飲白虎湯大柴胡湯三承氣湯已詳傷寒要訣六一散凉膈散詳在雜病要訣防風通聖散防風通聖治風熱鬱在三焦表裏中氣血不宣經絡壅梔翹芩薄草歸芎消黄芍术膏滑石麻黄桔梗共防荆利減消黄嘔薑半自汗麻去桂枝增註此方治一切風火之邪鬱於三焦表裏經絡氣血不得宣通初感發熱頭痛膚疹傳經斑黄抽搐煩渴不眠便秘尿澁皆可服之功效甚竒用之自知其妙也柴葛解肌湯四時合病在三陽柴葛解肌柴葛羗白芷桔芩膏芍草利減石膏嘔半薑註此方陶華所製以代葛根湯凡四時太陽陽明少陽合病輕證均宜以此湯增減治之增減者謂如無太陽證者減羗活無少陽證者減柴胡也即柴胡葛根羗活白芷桔梗赤芍石膏黄芩甘草也下利減石膏以避裏虛也嘔加半夏生薑以降裏逆也黄連解毒湯梔子金花湯三黄石膏湯陽毒熱極疹斑嘔煩渴呻吟譫語狂下後便軟熱不已連芩梔蘗解毒湯裏實便鞕當攻下梔子金花加大黄表實膏麻葱豆豉下利除膏入葛良註陽毒熱極等證或下後便軟壯熱不已宜黄連解毒湯即黄連黄芩黄蘗梔子也若裏實便鞕當攻下者宜加大黄名梔子金花湯若表實無汗當發汗者宜加石膏麻黄淡豆豉葱白名三黄石膏湯下利者減石膏加葛根避裏不實也消毒犀角飲消毒犀角表疹斑毒壅咽喉腫痛難犀角牛蒡荆防草熱盛加薄翹芩連註消毒犀角飲即消毒飲之防風荆芥牛蒡子甘草加犀角也熱盛加連翹薄荷黄芩黄連也消斑靑黛飲消斑靑黛消斑毒參虎柴犀梔地元黄連熱實減參去苦酒加入大黄煎註消斑靑黛飲即靑黛參虎謂人參白虎湯即人參石膏知母甘草柴胡犀角山梔生地元參黄連用苦酒與水煎也熱甚便實者減去人參加大黄可也普濟消毒飲普濟大頭天行病無裏邪熱客髙巔芩連薄翹柴升桔蠶草陳葧蒡藍元註普濟消毒飲治天行傳染大頭瘟疫無裏可下者是其邪熱客於髙巓即黄芩黄連薄荷連翹柴胡升麻桔梗殭蠶甘草陳皮馬葧牛蒡子板藍根元參也連翹敗毒散連翹敗毒散發頤髙腫焮紅痛可除花粉連翹柴胡蒡荆防升草桔羗獨紅花蘇木芎歸尾腫面還加芷漏蘆腫堅皂刺穿山甲便燥應添大黄疏註連翹敗毒散治時毒發頤髙腫焮紅疼痛之陽證也即連翹天花粉柴胡牛蒡子荆芥防風升麻甘草桔梗羗活獨活紅花蘇木川芎歸尾兩頤連面皆腫加白芷漏蘆腫堅不消加皂刺穿山甲大便燥結加酒炒大黄都氣湯橘皮竹茹湯呃逆腎虛都氣湯六味肉桂五味方橘皮竹茹虛熱主橘竹參草棗生薑註都氣湯即六味地黄湯加肉桂五味子也橘皮竹茹湯即橘紅竹茹人參甘草大棗生薑也葳㽔湯風溫浮盛葳㽔湯羗麻葛芷青木香芎草石膏葳㽔杏裏實熱甚入消黄註風溫初起六衇浮盛表實壯熱汗少者宜葳㽔湯以發表風邪也即羗活麻黄葛根白芷青木香川芎甘草石膏葳㽔杏仁也裏實熱甚多汗者加芒消大黄以攻裏熱也桂枝白虎湯風溫虛熱汗出多難任葳㽔可奈何須是鼾睡而燥渴方宜桂枝虎參合註風温初起衇浮有力汗少壯熱宜與葳㽔湯若衇虛身熱汗多難用葳㽔湯者合與桂枝白虎加人參湯如不鼾睡口中和而不燥不渴身熱汗多衇浮盛者乃亡陽之證非風溫也即桂枝白虎加人參湯亦不可用也瀉心導赤各半湯越經無證如醉熱衇和導赤各半湯芩連梔子神參麥知滑犀草棗燈薑註越經病名也無證謂無表裏證也無表裏證衇和而身熱不解形如醉人者是越經證也宜瀉心導赤各半湯治之即黄連黄芩梔子茯神人參麥冬知母滑石犀角甘草燈心生薑大棗也大羗活湯兩感傷寒病二經大羗活湯草川芎二防二术二活細生地芩連知母同註兩感傷寒病名也二經謂一曰太陽少隂二曰陽明太隂三曰少陽厥隂同病也張潔古製大羗活湯治之即甘草川芎防風防己蒼术白术羗活獨活細辛生地黄芩黄連知母也詳在傷寒要訣還陽散退隂散黑奴丸隂毒還陽硫黄末退隂炮烏乾薑均陽毒黑奴小麥疸芩麻消黄釡竈塵註還陽散即石硫黄末每服二錢新汲水調下良乆寒熱汗不出再服之汗出愈退隂散即炮變色川烏微炒乾薑等分為末每服一錢鹽湯滚數沸服四肢不溫連服三次即溫熱服若吐冷服亦可黑奴丸即小麥成黑疸者名曰小麥奴黄芩麻黄芒消大黄釡底煤竈突烟梁上塵也為末蜜丸重四錢新汲水下服後若渴欲飲冷水者令恣意飲之須臾自當寒振汗出腹響微利而解也若不渴者恐是隂極似陽服之反為害耳九味羗活湯九味羗活即冲和四時不正氣為疴潔古製此代麻桂羗防蒼細芷芎合生地草芩喘加杏無汗加麻有桂多胸滿去地加枳桔煩渴知膏熱自瘥註此湯即冲和湯張潔古製此以代麻黄桂枝二湯即羗活防風蒼术細辛白芷川芎生地甘草黄芩也喘加杏仁無汗加麻黄有汗加桂枝胸膈滿悶去生地加枳殻桔梗快膈氣也煩渴引飲加知母石膏熱自瘥也十神湯十神外感寒氣病功在溫經利氣殊升葛芎麻甘草芍薑葱香附芷陳蘇註此湯即升麻葛根川芎麻黄甘草芍藥香附白芷陳皮蘇葉生薑葱白也能外發寒邪内舒鬱氣故曰寒氣病較之他劑有溫經利氣之功殊也人參敗毒散荆防敗毒散倉廩散人參敗毒虛感冒發散時毒疹痢良參苓枳桔芎草共柴前薄荷與獨羗時毒減參加翹蒡血風時疹入荆防表熱噤痢加倉米溫熱芩連實消黄註人參敗毒散治氣虛感冒時氣之病即枳殻桔梗川芎茯苓人參甘草柴胡前胡薄荷獨活羗活也時毒謂受四時不正之氣或腫兩腮兩頤或咽喉腫痛依本方減人參加牛蒡連翹治之時疹謂初病即有之疹血風謂遍身騷癢之疹俱依本方減人參加荆芥防風治之名荆防敗毒散表熱無汗噤口痢疾依本方加倉米治之名倉廩散溫病熱病熱甚俱加黄連黄芩胃實便鞕俱加芒消大黄也五積散内傷生冷外感寒五積平胃半苓攢麻桂枳桔歸芎芍薑芷加附逐隂寒腹痛嘔逆吳萸入有汗除麻桂枝添虛加參术除枳桔婦人經痛艾醋煎註五積散即蒼术陳皮厚朴甘草半夏茯苓麻黄官桂枳殻桔梗當歸川芎白芍乾薑白芷也表重用桂枝裏重用官桂隂寒肢冷加附子腹痛嘔逆加吳茱萸有汗除去麻黄加桂枝氣虛加人參白术除去枳桔婦人經痛加艾葉醋煎服之升麻葛根湯升葛芍草表陽明下利斑疹兩收功麻黄太陽無汗入柴芩同病少陽經註升麻葛根白芍甘草即升麻葛根湯也陽明表邪不解或數下利及斑疹不透者均宜主之若兼太陽無汗之表證入麻黄若兼少陽口苦耳聾寒熱往來半表裏之證加柴胡黄芩也二聖救苦丹初起時疫溫熱病救苦汗吐下俱全熱實百發而百中大黄皂角水為丸註此丹即大黄四兩皂角二兩為末水為丸也每服三錢無根水下弱者老者幼者量減服之此藥施治於初起時疫傳染傷寒溫病熱病熱盛形氣俱實者百發百中服後或汗或吐或下三法俱全其病立解溫膽湯傷寒病後液津乾虛煩嘔渴不成眠乃是竹葉石膏證膽經飲熱此方先口苦嘔涎煩驚悸半苓橘草枳竹煎氣虛加參渴去半再加麥粉熱苓連註傷寒病後燥渴虛煩乃竹葉石膏湯證非溫膽湯證詳在傷寒要訣若少陽膽經飲熱則口苦嘔煩驚悸是溫膽湯證也即半夏茯苓橘皮甘草枳實竹茹也形氣俱虛或因汗吐下後及氣虛者均加人參渴去半夏加麥冬花粉以生津也有熱加黄芩黄連以淸熱也御纂醫宗金鑑卷三十八
