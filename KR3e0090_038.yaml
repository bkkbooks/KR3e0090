body:
  text: 編輯傷寒心法要訣目錄類傷寒五證停飲傷食脚氣虛煩内癰同傷寒十二證冬溫寒疫瘟疫溫病熱病風溫溫瘧濕溫中暍溫毒風濕痙病易愈生證難治死證彚方附河間兩解利法等御纂醫宗金鑑卷三十八目録欽定四庫全書御纂醫宗金鑑卷三十八編輯傷寒心法要訣目錄類傷寒五證停飲傷食脚氣虛煩内癰同傷寒十二證冬溫寒疫瘟疫溫病熱病風溫溫瘧濕溫中暍溫毒風濕痙病易愈生證難治死證彚方附河間兩解利法等御纂醫宗金鑑卷三十八目録欽定四庫全書御纂醫宗金鑑卷三十八編輯傷寒心法要訣類傷寒五證停痰傷食脚氣虚煩内癰相類傷寒有五證頭疼發熱惡風寒停痰頭項不强痛胸滿難息氣衝咽傷食惡食身無痛痞悶失氣噫作酸脚氣脚膝脛腫痛或為乾枯大便難虛煩微熱無表裏内癰能食審疼縁肺癰喘欬胸引痛唾黏腥臭吐膿涎胃癰當胃痛難近腸癰腫痛少腹堅身皮甲錯腹中急便數似淋證中看註類傷寒五證初病之時皆與太陽表證相類一曰停痰但胸滿不得息氣上衝咽頭項不强痛與傷寒異耳一曰傷食但身無痛心下痞悶失氣噫氣作酸吞酸與傷寒異耳一曰脚氣但病起自脚脚膝兩脛腫痛或乾枯腫痛名曰乾脚氣大便鞕難與傷寒異耳一曰虛煩惟發熱而煩無表裏證與傷寒異耳一曰内癰其狀頗類傷寒但飲食如故有癰痛之處與傷寒異耳胸中隱痛或喘或欬吐唾腥黏是肺癰也當胃作痛手不可近是胃癰也少腹重痛便數似淋身皮甲錯是腸癰也同傷寒十二證冬溫寒疫瘟疫春溫夏熱秋清凉冬氣冷冽令之常傷之四時皆正病非時有氣疫為殃應冷反溫冬溫病應溫反冷寒疫傷瘟疫長㓜相傳染須識歲氣汗攻良註冬病傷寒春病傷風夏病暑病秋病瘧疾皆四時正令之常病也若春應暖而反寒夏應熱而反凉秋應凉而反熱冬應寒而反溫此非其時而有其氣疫為殃也冬應冷反溫而病傷寒者名曰冬溫春應溫反寒而病傷寒者名曰寒疫若一時之氣不正長㓜皆病互相傳染名曰瘟疫凡治此病須識歲氣太過不及六滛勝復人之强弱藏之寒熱量其輕重或汗或攻輕以劉完素之䨇解散重以李杲之二聖救苦丸隨證施治可也溫病熱病冬傷於寒春病溫夏日熱病早虧隂衇浮頭疼發熱渴不惡寒兮是所因無汗河間兩解法有汗清下早當尋失治昬狂諸熱至無證隨經以意神註經曰冬傷於寒春必病溫至夏為熱病熱病者皆傷寒之類也冬傷於寒謂冬傷正令微寒未即病也早虧隂謂冬不藏精之人或辛苦之人汗出内外失其固密在冬則早已損傷腎藏隂氣陽熱獨治所以至春一感微邪即引内熱炎炎之勢不能已矣故病而即渴不惡寒也初病無汗有表證者從劉完素兩解湯治法可也有汗内熱盛者或清或攻急瀉其陽而救其隂若因循失治昬狂諸熱證至則緩不及事也無證謂表裏無證當隨六經以意消息治之自可通神也風溫風溫原自感春風誤汗灼熱汗津生隂陽俱浮難出語身重多眠息鼾鳴誤下直視失溲少被火發黄瘈瘲驚葳㽔桂枝參白虎一逆引日再命終註冬傷於寒不即病者復感春寒名曰溫病復感春風名曰風溫風溫有汗不可汗也若誤汗之益助火邪則身熱如火自汗津津不止言語難出身重多眠鼻息鼾鳴也風溫隂陽衇俱浮不可下也若誤下之熱䧟膀胱竭其津液則直視失溲小便少也風濕熱盛若誤以火熏蒸强汗火旺津亡則發黄色瘈瘲驚癎也風溫之證不可汗下主以葳蕤湯若衇虛汗多主以桂枝合人參白虎湯一逆引日再命終謂一逆尚可引日若汗而又下下而又火則為再逆是促命期也溫瘧溫瘧得之冬中風寒氣藏於骨髓中至春邪氣不能發遇暑爍髓消肌形或因用力腠發泄邪汗同出故熱生衰則氣復寒後作證同溫熱治相同註經曰溫瘧得之冬中於風寒氣藏於骨髓之中至春陽氣尚微邪氣不能自出因値大暑爍腦髓消肌肉腠理發泄或有所用力邪氣與汗同出出則隂虛而陽盛故熱生也衰則氣復入入則陽虛而隂盛故後作寒也其證同溫熱治亦相同也濕温溫復傷濕濕溫病身重胸滿及頭疼妄言多汗兩脛冷白虎湯加蒼术苓註溫病復傷於濕名曰濕温其證則身重胸滿頭疼妄言多汗兩脛逆冷宜白虎湯加蒼术茯苓溫濕兩治法也中暍溫毒風濕溫病中暍溫毒病證同溫熱熱尤炎傷濕汗出當風立風濕發熱重疼牽註中暍即中暑也溫熱之病復中於暑名曰溫毒證治同乎溫熱但熱尤盛也傷濕之病復感於風名曰風濕其證發熱身重疼痛牽掣也治法已詳於身痛矣中暍詳在暑門痙證痙證反張搖頭噤項强拘急轉側難身熱足寒面目赤須審剛柔治法全註風濕寒之邪合而為痙其證則背反張搖頭口噤項强拘急轉側艱難身熱足寒面目赤色也須審剛柔治之可痊也風濕盛者則有汗為柔痙風寒盛者則無汗為剛痙均以小續命湯主之剛痙去附子柔痙去麻黄表實者去參附加𦍑活獨活裏實者去參附加芒消大黄甚者則以葛根湯桂枝加葛根湯發之此治痙之大畧也詳在痙門易愈生證神淸色澤亮音聲身輕膚潤衇和洪忽然口噤難言躁衇即停伏戰汗寜飲多消散知釀汗能食衇浮表還平子得午解陽來濟午得子解是隂從註易愈之病取於神則神淸取於色則色澤取於聲則音長取於體則身輕取於皮則膚潤取於衇則和洪皆一𣲖不死之證故曰生證也若有如是之生證忽然口噤不語煩躁而甚六衇停伏宜謹察之非變凶也乃邪正交爭生戰汗之候為將愈之兆也凡傷寒渴者多陽證易愈若忽然飲多尋常消散無停知釀汗而作解也傷寒多不能食若忽然能食且衇浮知胃和邪還於表而作解也若不即解者隂陽未得其時也子時得之午時必解陽濟隂生而解也午時得之子時必解隂從陽化而解也難治死證傷寒死證陽見隂大熱不止衇失神隂毒陽毒六七日色枯聲敗死多聞心絶烟熏陽獨留神昬直視及搖頭環口黧黑腹滿利柔汗隂黄脾敗由肺絶衇浮而無胃汗出如油喘不休脣脗反靑肢冷汗舌卷囊縮是肝憂面黑齒長且枯垢溲便遺失腎可愁水漿不入衇代散呃逆不已命難留大發風溫而成痙濕溫重暍促命終强發少隂動經血口鼻目出厥竭名汗後狂言不食熱衇躁隂陽交死形厥冷不及七八日膚冷而躁暫難寧此病名之曰藏厥厥而無衇暴出凶厥而下利當不食反能食者名除中註病有生死治有難易生病不藥可愈死病雖藥莫救何則以隂陽邪正有盛衰也正盛邪衰則生隂盛陽衰則死傷寒陽證見浮大數動滑之陽衇則易愈而生見沉微濇弱弦之隂衇則難治而死故隂病見陽衇者生陽病見隂衇者死也大熱不止邪盛衇失神正虛正虛邪盛故死也隂毒陽毒亢極不生化也色枯聲敗内外兩奪也故均主死形若烟熏神昬直視搖頭者此陽邪獨留攻心而絶也環口黧黑腹滿下利不止柔汗陽黄者此為脾絶也衇但浮無胃汗出如油喘息不休者此為肺絶也脣脗反青四肢冷汗舌卷囊縮此為肝絶也面黑齒長枯垢溲便遺失者此為腎絕也水漿不入生無所頼也衇代散眞氣衰散也呃逆無休元氣不藏也誤發風溫之汗因而成痙誤發濕溫之汗名曰重暍皆促人命也强發少隂汗動其經血從口鼻目出名曰下厥上竭以上皆死之候也汗後狂言不食仍復發熱不為汗衰衇躁疾者名曰隂陽交死之形也厥逆不囘至七八日即通身膚冷而躁無暫寧時者名為藏厥為隂邪盛極眞陽飛越也凡厥逆而甚者多無衇服四逆白通等湯衇微續者眞陽漸復也衇暴出者囘光反照也凡厥逆多下利當不能食今反能食名曰除中中者胃也除者去也謂胃氣已去即反能食亦無補於胃也故仲景曰除中者死凡諸病乆不能食忽然大能食而即死者亦此類也彚方桂枝湯小建中湯當歸建中湯黄耆建中湯桂枝加葛根湯桂枝新加湯當歸四逆湯當歸四逆加呉茱萸生薑湯桂枝加附子湯芍藥甘草湯桂枝甘草湯桂枝芍藥草薑棗加飴歸耆曰建中加葛根湯加乾葛新加倍芍加參稱當歸四逆歸通細更加吳萸薑用生加附子湯加附子去桂去芍兩名興註桂枝湯桂枝芍藥甘草生薑大棗也依夲方倍芍藥加飴糖名小建中湯更加當歸名當歸建中湯更加黄耆名黄耆建中湯依夲方加葛根名桂枝加葛根湯依夲方倍芍藥加人參名桂枝新加湯依本方加當歸通草細辛名當歸四逆湯更加吳茱萸生薑名當歸四逆加吳茱萸生薑湯依本方加附子名桂枝加附子湯依本方去桂枝名芍藥甘草湯依本方去芍藥名桂枝甘草湯桂枝去芍藥加茯苓白术湯苓桂术甘湯茯苓甘草湯茯苓桂枝甘草大棗湯桂枝去芍加苓术苓桂术甘去棗薑茯苓甘草生薑桂加棗除薑大棗湯註桂枝去芍藥加茯苓白术湯即桂枝甘草生薑大棗茯苓白术也依夲方減去大棗生薑即苓桂术甘湯也茯苓甘草湯即茯苓甘草桂枝生薑也依夲方加大棗減生薑即茯苓桂枝甘草大棗湯也葛根湯桂枝麻黄各半湯桂枝二麻黄一湯桂枝二越婢一湯葛根桂枝加麻葛合麻桂麻各半湯桂二麻一麻減半桂二越一桂倍方註葛根湯即桂枝湯加麻黄葛根也桂枝麻黄各半湯即桂枝湯麻黄湯二方合劑也桂枝二麻黄一湯即桂枝湯合減一半麻黄湯也桂枝二越婢一湯即越婢湯合加一倍桂枝湯也麻黄湯大靑龍湯越婢湯越婢加附子湯越婢加半夏湯麻黄麻桂甘草杏加膏薑棗大青龍越婢大青減桂杏加附加半風水清註麻黄湯麻黄桂枝甘草杏仁也依夲方加石膏生薑大棗名大青龍湯依大青龍湯減桂枝杏仁名越婢湯治風水病之肌熱者若陽虛惡寒加附子名越婢加附子湯喘欬上氣加半夏名越婢加半夏湯當清别而施治也麻黄加术湯三抝湯麻杏石甘湯麻黄加术風濕痛三抝去桂喘寒風加膏麻杏石甘劑外寒内熱喘收功註麻黄加术湯即麻黄湯加白术也治風濕在表身痛麻黄湯去桂枝名三抝湯治風寒表實而喘三抝湯加石膏名麻杏石甘湯治内熱表寒無汗而喘麻黄附子細辛湯麻黄附子甘草湯麻黄附子細辛湯減辛加草甘草方兩感太陽少隂證能發表水裏寒凉註麻黄附子細辛湯即此三味也去細辛加甘草名麻黄附子甘草湯不但能發兩感太陽少隂表熱裏寒之證且能發太陽少隂表水裏寒之腫也小青龍湯附子湯眞武湯桂芍乾薑辛半味麻黄甘草小青龍附子术附參苓芍眞武無參有薑生註小青龍湯桂枝白芍乾薑細辛半夏五味子麻黄甘草也附子湯白术附子人參茯苓白芍也眞武湯即附子湯除去人参加生薑也乾薑附子湯白通湯白通加人尿豬膽汁湯四逆湯通衇四逆湯茯苓四逆湯理中湯桂枝人參湯附子理中湯治中湯薑附加葱白通劑更加尿膽治格陽加草四逆䓤通衇加參茯苓四逆方理中參术乾薑草加桂桂枝人參湯加附名曰附子理加入青陳治中湯註乾薑附子名曰乾薑附子湯依本方加葱名曰白通湯更加人尿豬膽汁名白通加人尿豬膽汁湯依夲方加甘草名四逆湯更加葱白名通衇四逆湯依四逆湯方加人參茯苓名茯苓四逆湯溫中利水人參白术乾薑甘草名理中湯依理中湯方加桂枝名桂枝人參湯依理中湯方加附子名附子理中湯依理中湯方加青皮陳皮名治中湯溫中理氣五苓散春澤湯五苓甘露飲蒼附五苓散茵蔯五苓散胃苓湯五苓停水尿不利内蓄膀胱外太陽二苓澤术桂分用虛渴加參春澤湯甘露寒水膏滑入蒼附内寒附子蒼茵蔯發黄小便澁食瀉合胃胃苓方註五苓散即茯苓豬苓澤瀉白术桂枝也治水停小便不利少腹滿則為内蓄膀胱若不兼太陽頭痛惡寒發熱自汗之表則不用桂枝而用肉桂故曰桂分用也治諸虛飲渴加人參名