body:
  text: 編輯外科心法要訣目録發無定處下疥瘡癬黄水瘡暑令瘍毒小癤瘴疽產後癰疽翻花瘡無圖血風瘡㾦癗浸滛瘡火赤瘡貓眼瘡魚脊瘡骨痿瘡風疳無圗血疳白疕漆瘡血箭血痣朘痛無圖瘡口誤入毒水無圖諸瘡生蠅蛆無圗御纂醫宗金鑑卷七十四目録欽定四庫全書御纂醫宗金鑑卷七十四編輯外科心法要訣目録發無定處下疥瘡癬黄水瘡暑令瘍毒小癤瘴疽產後癰疽翻花瘡無圖血風瘡㾦癗浸滛瘡火赤瘡貓眼瘡魚脊瘡骨痿瘡風疳無圗血疳白疕漆瘡血箭血痣朘痛無圖瘡口誤入毒水無圖諸瘡生蠅蛆無圗御纂醫宗金鑑卷七十四目録欽定四庫全書御纂醫宗金鑑卷七十四編輯外科心法要訣疥瘡疥瘡乾濕蟲砂膿各經蘊毒風化成治論上下分肥痩清風利濕兼殺蟲註此證有乾濕蟲砂膿之分其形雖有五種總由各經蘊毒日乆生火兼受風濕化生斯疾或傳染而生凡疥先從手了生起遶徧週身瘙癢無度如肺經燥盛則生乾疥瘙癢皮枯而起白屑如脾經濕盛則生濕疥臖腫作痛破津黄水甚流黑汁如肝經風盛則生蟲疥瘙癢徹骨撓不知疼如心血凝滯則生砂疥形如細砂焮赤癢痛􅎲之有水如腎經濕熱則生膿窠疥形如豆粒便利作癢膿清淡白或脾經濕盛亦生膿窠疥但頂含稠膿癢疼相兼為異疥雖有餘之證而體虛之人亦生以便秘為實便利為虚亦有虚而便燥者如風秘則便燥血分枯燥則便澁又在瘡形色重色淡及衇息之有力無力辨之初起有餘之人俱宜防風通聖散服之虚者服荆防敗毒散透發之及形勢已定則無論虚實乾疥服消風散濕疥服蒼术膏蟲疥服蘆薈丸砂疥服犀角飲子膿窠疥服秦艽丸經乆不愈血燥者服當歸飲子外治乾疥者擦繡毬丸濕者擦臭靈丹潤燥殺蟲俱效疥生上體多者偏風熱盛下體多者偏風濕盛肥人多風濕痩人多血熱詳辨治之蒼术膏南蒼术十觔切片入砂鍋内水煑減半取汁再加水煑如前以术無味為度併汁一處用小砂鍋再煎如乾一寸加汁一寸煎成膏加蜂蜜四兩和匀毎服二羮匙空心白滚水調服方歌蒼术膏醫濕疥瘡切片入鍋煑取湯熬膏加蜜空心服濕除熱散勝羣方犀角飲子犀角鎊赤芍甘菊花元參木通赤小豆炒石菖蒲各一錢五分甘草一錢生生薑三片水二鍾煎八分服方歌犀角飲子砂疥生癢疼赤色出心經芍菊元參通赤豆菖蒲薑草水煎成秦艽丸秦艽苦参大黄酒蒸黄耆各二兩防風漏蘆黄連各一兩五錢烏蛇肉五錢焙乾酒浸共為細末煉蜜為丸如梧桐子大每服三十丸食後溫酒送下方歌秦芄丸服膿疥愈清熱癢除瘡自去苦參大黄風漏蘆烏蛇黄連耆蜜聚當歸飲子當歸生地白芍酒炒川芎何首烏荆芥防風白蒺藜各一錢黄耆甘草各五分生水二鍾煎八分食逺服方歌當歸飲子膿疥久癢添血燥不能除四物黄耆何首草荆防蒺入風自疎繡毬丸川椒輕粉樟腦雄黄枯白礬水銀各二錢大風子肉一百枚另研共研細末同大風子肉再碾匀加桕油一兩化開和藥攪匀作丸以二掌合搓如圓眼大先以鼻聞次擦患處方歌繡毬丸用椒輕粉樟腦雄黄礬水銀大風子研桕油兌乾疥搓擦效如神臭靈丹硫黄末油核桃生豬脂油各一兩水銀一錢搗膏用擦患處方歌臭靈丹擦膿濕疥硫黄末共油核桃生豬脂油各一兩水銀一錢同搗膏防風通聖散見頭部秃瘡荆防敗毒散見項部腦疽消風散見項部鈕扣風蘆薈丸見牙齒部牙衂癬癬證情形有六般風熱濕蟲是根原乾濕風牛松刀癬春生桃花面上旋註此證總由風熱濕邪侵襲皮膚鬰乆風盛則化為蟲是以搔癢之無休也其名有六一曰乾癬搔癢則起白屑索然彫枯二曰濕癬搔癢則出黏汁浸滛如蟲行三曰風癬即年乆不愈之頑癬也搔則痺頑不知痛癢四曰牛皮癬狀如牛領之皮厚而且堅五曰松皮癬狀如蒼松之皮紅白斑㸃相連時時作癢六曰刀癬輪郭全無縱横不定總以殺蟲滲濕消毒之藥敷之輕者羊蹄根散乆頑者必效散搽之亦有脾肺風濕過盛而腫痛者宜服散風苦參丸解散風濕其腫痛即消又有面上風癬初如㾦癗或漸成細瘡時作痛癢發於春月又名吹花癬即俗所謂桃花癬也婦女多有之此由肺胃風熱隨陽氣上升而成宜服疎風清熱飲外用汨風玉容散毎日洗之自效羊蹄根散羊蹄根八錢末枯白礬二錢共研匀米醋調擦癬處方歌羊蹄根散敷諸癬羊蹄根共枯白礬二味研末加米醋搽患滲濕癢可痊必效散川槿皮四両海桐皮大黄各二兩百藥煎一兩四錢巴豆一錢五分去油螌蝥一箇全用雄黄輕粉各四錢共研極細末用隂陽水調藥將癬􅎲損薄敷藥乾必待自落方歌必效大黄百藥煎川槿海桐巴豆螌雄黄輕粉隂陽水調擦諸癬乆年頑散風苦參丸苦參四兩大黄炒香獨活防風枳殻麩炒元參黄連各二兩黄芩梔子生菊花各一兩共研細末煉蜜為丸如梧桐子大毎服三十丸食後白滚水送下日用三服茶酒任下方歌散風苦參風濕盛癬瘡多癢腫痛兼大黄芩獨防風枳元參梔子菊黄連疎風清熱飲苦參二錢酒浸蒸曬九次炒黄全蠍土炒皂刺豬牙皂角防風荆芥穗金銀花蟬蛻各一錢炒酒水各一鍾加葱白三寸煎一鍾去渣熱服忌發物方歌疎風清熱風癬患時作痛癢極纒綿苦參蠍刺豬牙皂防風荆芥銀花蟬消風玉容散綠豆麫三兩白菊花白附子白芷各一兩熬白食鹽五錢共研細末加氷片五分再研匀收貯每日洗面以代肥皂方歌消風玉容緑豆麫菊花白附芷食鹽研加氷片代肥皂風除癬去最為先黄水瘡黄水瘡如粟米形起時作癢破時疼外因風邪内濕熱黄水浸滛更復生註此證初如粟米而癢兼痛破流黄水浸滛成片隨處可生由脾胃濕熱外受風邪相搏而成宜服升麻消毒飲熱甚外用青蛤散敷之濕甚碧玉散敷之即效痂厚用香油潤之忌見水洗升麻消毒飲當歸尾赤芍金銀花連翹去心牛蒡子炒梔子生𦍑活白芷紅花防風甘草生升麻桔梗毎味用二錢為大劑一錢五分為中劑一錢為小劑水二鍾煎八分食逺熱服如瘡生頭面減去歸尾紅花方歌升麻消毒却風濕歸芍銀花翹蒡梔羌芷紅花防草桔黄水浸滛服漸失青蛤散見鼻部鼻䘌瘡碧玉散見面部燕窩瘡暑令瘍毒小癤暑令瘍癤焮腫疼頭暈口苦背肌紅較之癰疽發熱異不分日夜似火攻註此證係暑令所生瘍毒小癤初發背心肌膚紅暈次生腫痛發熱無時日夜不止兼頭目暈眩口苦舌乾心煩背熱肢體倦怠初宜荆防敗毒散加霍香黄連石膏服之外治按癰疽腫瘍潰瘍門荆防敗毒散見項部腦疽瘴疽瘴疽因受山瘴毒伏藏乆痛附筋骨初黒次青如拳打急砭惡血後膿熟註此證因受山嵐瘴氣伏藏筋骨之間年月乆逺令人痛附筋骨始發黑色頑痺如木石其毒附着於筋骨重按方知㣲痛五七日後毒勢湧出浮腫次變青色如拳打之狀寒戰似瘧頭顫口偏手足厥逆黑睛𦂳小始見黑色時急用砭法令出惡血隨服不換金正氣散加羚羊角以洩邪毒次按癰疽腫瘍潰瘍治法膿熟潰黄白膿為順出黑汁者險不換金正氣散蒼术米泔水浸炒厚朴薑製陳皮藿香半夏麴各二錢炒甘草一錢炙水二鍾生薑五片紅棗肉二枚煎一鍾去渣稍熱服忌生冷油膩方歌正氣散因山瘴感伏乆生疽身戰寒平胃散加半夏麴藿香薑棗服平安產後癰疽產後癰疽最屬險七情之傷六滛感瘀血稽留成癰疽勢潰托裏不宜緩註此證因產後氣血經絡俱虚或因七情所傷或因六滛所感與瘀血相稽而成最屬險候法宜大補扶助根本兼活瘀生新為要其客病以末治之初服生化湯隨證加減以消毒有表邪服清魂散有裏熱服回生丹勢欲潰膿時急宜托裏遲則恐毒内陷藥味宜和平純善最忌汗下峻劑其餘腫潰治法俱按癰疽腫瘍潰瘍門生化湯當歸八錢川芎四錢薑炭甘草各四分炙桃仁十粒尖研泥去皮水一鍾半煎六分加無灰酒一小杯和服方歌生化湯宜產後疽通滯和榮又補虚歸芎薑炭炙甘草桃仁酒服善消瘀清魂散荆芥一錢川芎五分人參甘草炙澤蘭葉各三分為末黄酒調服方歌清魂產後風邪侵荆芥川芎與人參炙甘澤蘭同作劑能疎表證效通神回生丹黑豆三升取汁三盌去豆煮熟紅花三兩炒黄色入醇酒大壺同煑三五滚去紅花用汁生大黄一觔研末蘇木二兩剉用河水五盌煎汁三盌去渣先將大黄末以好米醋三四盌攪匀文武火熬成膏如此二遍次下紅花酒蘇木湯黑豆汁共熬成膏離火再入後藥當歸熟地川芎白茯苓延胡索烏藥香附蒲黄牛膝桃仁另研蒼术各二兩浸炒米泔水白芍酒炒甘草炙羌活山茰肉酒浸三棱陳皮地榆木香五靈脂各五錢人參白术土炒青皮木𤓰各三錢良薑四錢乳香沒藥各一錢共研細末用大黄膏為丸如彈子大每服一丸黄酒炖化通口服方歌回生產後存惡露致發癰疽服可逐除熱活瘀榮衛和紅花大黄豆蘇木八珍羌茰稜延胡烏藥青陳榆香附乳没蒲黄良膝𤓰木香靈脂桃蒼术翻花瘡無圖翻花瘡因潰後生頭大蔕小努菌形雖無痛癢觸流血血燥肝虚怒氣成註此證因生瘡潰後努肉自瘡口突出其狀如菌頭大蔕小愈努愈翻雖不大痛大癢誤有觸損流血不住乆則虧虚總由肝虛怒氣血燥而成宜服逍遥散外用烏梅煆灰輕粉各等分研末撒之或馬齒莧煆灰豬脂調敷俱效逍遥散見背部上搭手血風瘡血風瘡證生徧身粟形搔癢脂水滛肝肺脾經風濕熱乆鬱燥癢抓血津註此證由肝脾二經濕熱外受風邪襲於皮膚鬱於肺經致徧身生瘡形如粟米搔癢無度􅎲破時津脂水浸滛成片令人煩躁口渴搔癢日輕夜甚宜服消風散外敷雄黄解毒散若日久風邪鬱在肌膚則耗血生火搔癢倍増夜不得寐撓破津血心煩大便燥秘咽乾不渴此屬火燥血短宜服地黄飲外擦黄連膏潤肌膏合而用之悉效兼忌椒酒鷄鵝動風等物雄黄解毒散雄黄寒水石各一兩煆白礬四兩生共研細末滚水調敷方歌雄黄解毒寒水石白礬四兩共研之血風瘡生粟米癢滚水調敷滲毒濕地黄飲生地熟地何首烏各三錢生當歸二錢丹皮黑參白蒺藜炒去刺殭蠶各一錢五分炒紅花甘草各五分生水煎早晚服方歌地黄飲治血風瘡癢盛不眠血燥傷首烏丹皮生熟地黑參歸蒺草紅殭消風散見項部鈕扣風黄連膏見鼻部鼻瘡潤肌膏見頭部白屑風㾦癗㾦癗汗出中邪風狀類豆瓣扁癗形日癢秦艽湯宜服夜重當歸飲服寧註此證俗名鬼飯疙瘩由汗出受風或露臥乗涼風邪多中表虛之人初起皮膚作癢次發扁疙􅜀形如豆瓣堆纍成片日癢甚者宜服秦艽牛蒡湯夜癢重者宜當歸飲子服之外用燒酒浸百部以藍布蘸酒擦之謹避風涼自效秦艽牛蒡湯秦艽一錢五分牛蒡子炒研枳殻麩炒麻黄蜜炙犀角鎊黄芩防風甘草生黑參升麻各一錢水二鍾煎八分服方歌秦艽牛蒡風留膚㾦癗生如麻豆形枳殻麻黄犀角鎊黄芩風草黑參升當歸飲子見疥瘡浸滛瘡浸滛瘡發火濕風黄水浸滛似疥形蔓延成片癢不止治宜清熱並消風註此證初生如疥搔癢無時蔓延不止􅎲津黄水浸滛成片由心火脾濕受風而成經云歲火太過甚則身熱肌膚浸滛仲景云從口流向四肢者順四肢流入口者逆初服升麻消毒飲加蒼术黄連抓破津血者宜服消風散外搽青蛤散即愈若衇遲不食黄水不止此屬脾敗不治之證也升麻消毒飲見黄水瘡消風散見項部鈕扣風青蛤散見鼻部鼻䘌瘡火赤瘡火赤瘡由時氣生燎漿水皰徧身成治分上下風濕熱瀉心清脾自可寧註此證由心火妄動或感酷暑時臨火邪入肺伏結而成初起小如芡􅧙大如棋子燎漿水皰色赤者為火赤瘡若頂白根赤名天皰瘡俱延及徧身焮熱疼痛未破不堅皰破毒水津爛不臭上體多生者屬風熱盛宜服解毒瀉心湯下體多生者屬濕熱盛宜服清脾除濕飲未破者俱宜蝌蚪㧞毒散敷之已破者俱宜石珍散撒之清其濕熱破爛自乾甚效解毒瀉心湯黄芩黄連牛蒡子炒研知母石膏煆梔子生防風元參荆芥滑石各一錢木通甘草各五分生水二鍾燈心二十根煎八分食逺服方歌解毒瀉心湯火赤芩連牛蒡木通知石膏梔子防風草元參荆芥與滑石清脾除濕飲赤茯苓白术土炒蒼术米泔浸炒黄芩生地黄麥冬去心梔子生研澤瀉甘草生連翹去心茵蔯蒿枳殻麩炒元明粉各一錢水二鍾竹葉二十片燈心二十根煎八分食前服方歌清脾除濕天皰疾赤苓二术芩生地麥冬梔瀉草連翹茵蔯元明同作劑石珍散輕粉石膏各一兩煆黄蘗末青黛各三錢共研匀先以甘草湯洗浄瘡處再用此藥撒之方歌石珍散去火邪害天皰破撒自康泰一兩輕粉煆石膏三錢黄蘗加青黛蝌蚪㧞毒散見腫瘍門貓眼瘡貓眼瘡名取象形痛癢不常無血膿光芒閃爍如貓眼脾經濕熱外寒凝註此證一名寒瘡每生於面及徧身由脾經久鬱濕熱復被外寒凝結而成初起形如貓眼光彩閃爍無膿無血但痛癢不常乆則近脛宜服清肌滲濕湯外敷真君妙貼散兼多食雞魚蒜韭忌食鮎魚蠏鰕而愈清肌滲濕湯蒼术米泔水浸炒厚朴薑汁炒陳皮甘草生柴胡木通澤瀉白芷升麻白术土炒梔子生黄連各一錢水二鍾生薑三片燈心二十根煎至八分溫服方歌清肌滲濕瘡貓眼脾濕熱鬱外寒纒平胃柴胡通瀉芷升麻白术梔黄連眞君妙貼散見腫瘍門魚脊瘡魚脊瘡由虗人成感受濕熱皮間凝虚寒發緩皰津水灸變稠膿陽氣生註此證形如魚脊由陽氣虚寒之人復感濕熱結滯而成多生筋骨之間以陽氣虚寒故發長緩慢只在皮膚堅凝臖痛初起白皰漸長狀如魚脊破津黄水正膿生遲初治無論已破未破宜蒜片艾灸以通陽氣外用真君妙貼散香油調敷宜服内補十宣散得稠膿色鮮者為順若灸之不應色暗腐爛出臭水者逆其次内外治法俱按癰疽潰瘍門眞君妙貼散見腫瘍門内補十宜散見胸部􅗢􅊓癰骨痿瘡骨痿瘡形粟豆紅漸如梅李火毒成膿血不出痛不止治同疔法即成功註此證初生形如粟豆色紅漸大如梅如李由火毒而成血不出膿不生痛亦不止乆則延及徧身内外治法與疔門參考風疳無圖風疳證如風癬形破流黄水癢微疼由於風濕客谷道如聖膏搽功即成註此證由風濕客於谷道而成形如風癬作癢破流黄水浸滛徧體微疼宜用如聖膏搽之即愈如聖膏當歸五錢巴豆三錢去殻香油八兩將二藥煠枯去渣入黄蠟三兩化盡離火絹濾浄将凝入輕粉二錢攪匀搽之方歌如聖膏用歸巴豆二味一同入香油煠枯加蠟添輕粉凝搽風疳功即收血疳血疳形如紫疥瘡痛癢時作血多傷證因風熱閉腠理消風散服功最强註此證由風熱閉塞腠理而成形如紫疥痛癢時作血燥多熱宜服消風散消風散見項部鈕扣風白疕白疕之形如疹疥色白而癢多不怏固由風邪客皮膚亦由血燥難榮外註此證俗名蛇虱生皮膚形如疹疥色白而癢搔起白皮由風邪客於皮膚血燥不能榮養所致初服防風通聖散次服捜風順氣丸以豬脂苦杏仁等分共搗絹包擦之俱效捜風順氣丸大黄五兩蒸曬九次酒浸車前子酒炒山茰肉山藥炒牛膝酒浸莬絲子酒煮獨活火蔴仁微火焙去殻㯽榔枳殻麩炒郁李仁各二兩去皮滚水浸羌活一兩右為末煉蜜和丸如梧桐子每服三十丸茶酒任下早晚各一服方歌捜風順氣車前子茰藥大黄膝莬絲羌獨火麻榔枳郁服去風邪血燥滋防風通聖散見頭部秃瘡漆瘡漆瘡感受漆毒生腠理不宻腫焮紅初發覺癢後如疹皮破流水更兼疼註此證由人之腠理不宻感漆辛熱之毒而生初發面癢而腫抓之漸似癮疹色紅徧傳肢體焮痛皮破爛斑流水甚者寒熱交作宜韮菜汁調三白散塗之内服化斑解毒湯忌浴熱水戒油膩厚味發物或用神麯研為末生蠏黄調塗患處尤效三白散鉛粉一兩輕粉五錢石膏三錢煆共研匀韭菜汁調敷紙蓋如無韭菜汁凉水調亦可方歌三白散敷漆瘡消輕粉鉛粉煆石膏去熱解毒功效速研匀須用韭汁調化斑解毒湯見肋部内發丹毒血箭血箭毛孔射出血心火熾廹血亂行桃花散用涼水敷再塗金墨即能停註此證一名肌衂由心肺火盛逼血從毛孔中射出如箭宜服涼血地黄湯外用桃花散以涼水調敷或用金墨研末醋調涼塗其血即止涼血地黄湯生地三錢黄連當歸各一錢五分甘草梔子生研元參各一錢黄芩二錢水二鍾煎八分量病上下服之方歌涼血地黄心火盛毛孔血溢不歸經黄連歸草芩梔子元參煎服效通靈桃花散白石灰半升用水潑成末與大黄片一兩五錢同炒以灰變紅色為度去大黄將石灰篩細用涼水調敷方歌桃花止血最為良一兩五錢生大黄半升石灰相併炒去軍研篩水調强血痣血痣初起似痣形漸大如豆其色紅揩破外皮流鮮血肝經怒火鬱血成註此證由肝經怒火鬱血而成初起如痣色紅漸大如豆觸破時流鮮血用花蕋石散撒之血已止宜氷螄散枯去本痣以月白珍珠散搽太乙膏蓋貼生皮即愈血出甚者服涼血地黄湯兼戒厚味發物花蕋石散花蕋石五錢火煆入童便淬之七次草烏南星白芷厚朴紫蘇羌活没藥輕粉龍骨煆細辛檀香蘇木乳香蛇含石火煆童便淬三次當歸降真香各二錢麝香三分共為細末罐收臨用時撒於患處方歌花蕋石散止血强草烏星芷厚蘇羌没輕龍骨細檀麝蘇木乳歸含降香氷螄散即氷螺撚研末見乳部乳岩月白珍珠散見潰瘍門凉血地黄湯見血箭太乙膏見潰瘍門朘痛無圖脧痛本於寒氣侵鬱在肌膚痛連心衣觸手捺無皮狀法宜椒酒綿溻溫註此證係暴寒侵襲肌膚之中寒鬱不行偶犯衣觸或以手捺疼痛連心似乎如無皮之狀法宜胡椒四錢燒酒四兩共入磁盌内重湯炖煮以輭綿蘸酒溫溻熨痛處即效瘡口誤入毒水無圖瘡潰誤入汚水毒或傷諸刺痛至骨金蟬散煆敷瘡内毒水流盡刺亦出註瘡潰誤入皂角驢馬尿糞一切汚穢毒水入瘡或木刺傷着於瘡内焮腫疼痛至骨者先以溫水洗瘡拭乾再用金蟬散煆煉妥協撒於瘡内外以加味太乙膏蓋之良乆毒水流盡有刺亦自出矣金蟬散大乾蝦蟆一箇胡椒十五粒皂角子七粒右用乾鍋入藥在内瓦蓋鍋口慢火煆至烟盡取出存性研為細末取用方歌金蟬潰瘡受毒水腫痛或因木刺傷蝦蟆胡椒皂角子火煆烟盡研撒良加味太乙膏見潰瘍門諸瘡生蠅蛆無圖夏月諸瘡臭腐爛繩衆生蛆治勿慢蟬花散服可除之蛆化為水繩畏散註夏月諸瘡潰爛腐臭或孤單及懶惰之人失於洗浴積膿汚穢蒼蠅聞穢叢聚以致生蛆宜急服蟬花散蛆盡化水而出蠅亦不敢近瘡嬰兒痘爛生蛆者亦服前藥外用寒水石細末摻之又治瘡膿忽臭有冬月潰瘡生蛆者係隂濕之所化也宜海參為末撒之或皂礬飛過為末撒之其蛆亦化為水蟬花散蛇蛻一兩存性研末火燒蟬蜕青黛各五錢細辛二錢五分右為細末每服用三錢黄酒調服日用二服方歌蟬花散療諸瘡穢夏月生蛆蠅近圍蛇蜕細辛蟬蜕黛酒調蛆化蠅畏飛御纂醫宗金鑑卷七十四
