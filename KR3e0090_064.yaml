body:
  text: 編輯外科心法要訣目錄項部腦疽偏腦疽天柱疽魚尾毒百衇疽結喉癰夾喉癰少陽經瘰癧太陽經濕瘰癧馬刀瘰癧陽明經瘰癧重臺瘰癧上石疽失榮證鈕扣風背部上中下發背上搭手中搭手下搭手蓮子發蜂窩發隂陽二氣疽串疽酒毒發連珠發丹毒發禽疽痰注發黄瓜癰腰部腎俞發中石疽纒腰火丹御纂醫宗金鑑卷六十四目録欽定四庫全書御纂醫宗金鑑卷六十四編輯外科心法要訣目錄項部腦疽偏腦疽天柱疽魚尾毒百衇疽結喉癰夾喉癰少陽經瘰癧太陽經濕瘰癧馬刀瘰癧陽明經瘰癧重臺瘰癧上石疽失榮證鈕扣風背部上中下發背上搭手中搭手下搭手蓮子發蜂窩發隂陽二氣疽串疽酒毒發連珠發丹毒發禽疽痰注發黄瓜癰腰部腎俞發中石疽纒腰火丹御纂醫宗金鑑卷六十四目録欽定四庫全書御纂醫宗金鑑卷六十四編輯外科心法要訣項部腦疽腦疽項正屬督衇左右偏腦太陽經陽正陰偏分難易治與癰疽大法同註此疽有正有偏正屬督衇經入髮際名為腦疽俗名對口偏屬太陽膀胱經名為偏腦疽俗名偏對口正腦疽係陽亢熱極而生其證多焮赤腫痛色鮮紅活根束頂尖時痛時止督衇純陽起於尾閭上貫顚頂挾毒上升故易膿易腐易斂多屬順證若偏腦疽係寒熱錯雜所生其證漫腫色暗平塌堅硬然足太陽經外陽内陰從頭走足陽降陰凝難膿難腐難斂多屬逆證更有兼風濕者其瘡根又易於散大旁流故順逆二證治法當辨别是癰是疽腦癰者皮薄易破腦疽者皮厚難破初起有表證令人寒熱徃來宜服荆防敗毒散有裏證令人口唇焦紫大渴大便結燥宜服内疎黄連湯若瘡勢已成按癰疽腫瘍潰瘍門大法治之荆防敗毒散荆芥防風羌活獨活前胡柴胡桔梗川芎枳殻麩炒茯苓各一錢人參甘草各五分薑三片水二鍾煎八分食逺服寒甚加葱三枝方歌荆防敗毒治初瘡憎寒壯熱汗出良羌獨前柴荆防桔芎枳參苓甘草强内疎黄連湯見腫瘍門天柱疽天柱疽生天柱骨上焦鬱熱蓄督經灸之有皰方為順色黑形陷逆而凶註此疽生於項後髙骨名天柱骨即大椎骨也疽之初起形如卧蠶由上焦鬱熱蓄於督衇以致肩背拘急極痒入骨宜於患處以艾灸之若灸之有皰者順無皰者逆甚至色黑形陷血出不止潰爛神昏嘔噦惡心等證是為大凶其内外治法同腦疽魚尾毒魚尾毒生後髮角在左在右淺而輕膀胱濕熱七日潰膿出腫消痛自寧註此毒生於項後髮際兩旁角處由足太陽膀胱經濕熱凝結而發其毒或在左或在右皆屬輕淺初起宜荆防敗毒散膿將成宜服托裏排膿湯其外治之法同癰疽腫瘍潰瘍諸證托裏排膿湯當歸白芍酒炒人參白术土炒茯苓連翹去心金銀花浙貝母各一錢去心生黄耆二錢陳皮八分肉桂六分桔梗胸之上加一錢牛膝下部加八分白芷頂之上加五分甘草四分薑一片水三鍾煎一鍾食逺温服方歌托裏排膿治潰瘡排膿消腫實稱强歸芍四君翹桂芷銀耆貝桔膝陳良荆防敗毒散見腦疽百衇疽百衇疽生腫色形引耳繞頸色紫紅痛熱不食氣逆嗽刺出膿吉血出凶註此疽初發漫腫大小數塊環繞頸項其色紫紅痛熱不食氣逆咳嗽其發引耳十五日可刺遲則毒攻咽喉刺見膿者順見血者逆餘治法按癰疽腫瘍潰瘍門結喉癰結喉癰發項前中肝肺積熱塞喉凶膿成若不急速刺潰穿咽喉何以生註此癰發於項前結喉之上又名猛疽以其毒勢猛烈也蓋項前之中經屬任衇兼肝肺二經積熱憂憤所致腫甚則堵塞咽喉湯水不下其凶可畏若膿成不鍼向内潰穿咽喉者則難生矣初宜服黄連消毒飲外敷二味㧞毒散將潰調治之法按癰疽腫瘍潰瘍門黄連消毒飲見頭部百會疽二味㧞毒散見腫瘍門夾喉癰夾喉癰生喉兩旁肝胃毒熱發其瘡瘡與結喉癰同治尤嫌痰壅不時嗆註此壅一名夾疽生於結喉之兩旁屬足厥陰肝經足陽明胃經火毒上攻而致其治法與結喉癰同治瘰癧小瘰大癧三陽經項前頸後側旁生痰濕氣筋名雖異總由恚忿鬱熱成更審纒綿諸證治成勞日久不收功註此證小者為瘰大者為癧當分經絡如生於項前屬陽明經名為痰瘰項後屬太陽經名為濕瘰項之左右兩側屬少陽經形輭遇怒即腫名為氣癧堅硬筋縮者名為筋癧若連綿如貫珠者即為瘰癧或形長如蛤蜊色赤而堅痛如火烙腫勢甚猛名為馬刀瘰癧又有子母癧大小不一有重臺瘰癧上堆纍三五枚盤叠成攢有繞項而生者名蛇盤癧如黄豆結簍者又名鎻項癧生左耳根名蜂窩癧生右耳根名惠袋癧形小多痒者名風癧頷紅腫痛者名為燕窩癧延及胸腋者名瓜藤癧生乳旁兩胯輭肉等處者名􅗢瘍癧生於徧身漫腫而輭囊内含硬核者名流注癧獨生一個在顖門者名單窠癧一包生十數個者名蓮子癧堅硬如磚者名門閂癧形如荔枝者名石癧如鼠形者名鼠癧又名鼠瘡以上諸癧推之移動為無根屬陽外治宜因證用鍼灸敷貼蝕腐等法推之不移動者為有根且深屬隂皆不治之證也切忌鍼砭及追蝕等藥如妄用之則難收斂瘰癧形名各異受病雖不外痰濕風熱氣毒結聚而成然未有不兼恚怒忿鬱幽滯謀慮不遂而成者也有外受風邪内停痰濕摶於經絡其患身體先寒後熱瘡勢宣腫微熱皮色如常易消易潰易斂此為風毒也如防風羌活湯海菜丸揀擇用之有天時亢熱暑濕偶中三陽經兼過食膏粱厚味釀結而成其患色紅微熱結核堅硬緩腫難消潰遲斂遲此為熱毒也如升陽調經湯柴胡連翹湯鷄鳴散隨證輕重揀擇用之有感冒四時殺厲之氣而成其患耳項胸腋驟成腫塊宣發暴腫色紅皮熱令人寒熱頭眩項強作痛此為氣毒也如李杲連翹散堅湯散腫潰堅湯俱可因證治之有肝傷恚忿血虛不能榮筋其患核堅筋縮推之不移者此筋瘰也初服舒肝潰堅湯次服香貝養榮湯治之有誤食汗液蟲蟻鼠殘陳水宿茶不淨之物其患初小後大累累如貫珠連接三五枚不作寒熱初不覺疼久方知痛此為誤食毒物也如楊氏家藏治瘰癧方法製靈鷄蛋隨證虛實揀擇用之自愈其項後兩旁濕瘰癧經屬膀胱寒水外感風邪與濕凝結漫腫疼痛皮色如常有日久將潰皮色透紅微熱痛甚其内外治法用藥總不宜寒涼初腫宜用附子敗毒湯外敷神功散將潰已潰俱按癰疽潰瘍内外治法用藥首尾得温煖即效誤犯寒涼令人項背拘强瘡勢塌陷毒氣攻裏便瀉者逆但凡生瘰癧者男子不宜太陽青筋暴露潮熱咳嗽自汗盜汗女人不宜眼内紅絲經閉骨蒸五心煩熱男婦有此後必變瘡勞俱為逆證難收功也防風羌活湯治風毒瘰癧初發寒熱者防風羌活各一錢連翹二錢去心升麻七分夏枯草二錢牛蒡子一錢炒研川芎一錢黄芩一錢酒浸甘草五分昆布一錢酒洗海藻一錢酒洗殭蠶二錢酒炒薄荷一錢水煎服方歌防風羌活驅瘰方風毒發熱最為良芎芩昆布翹蒡草夏枯海藻薄升殭海菜丸治風痰瘰癧遶項而生無寒熱者宜常服消盡為止海藻菜蕎麥同炒過去麥不用白殭蠶微炒去絲右等分為細末用白梅肉泡湯為丸如梧桐子大飯後或臨卧時每服六七十丸米湯送下兼忌魚腥厚味方歌海菜丸治風痰癧海藻菜與白殭蠶梅湯為丸如桐子米湯送下病可痊升陽調經湯丸治熱毒瘰癧遶於項下或至頰車此證由陽明胃經中來也若其瘡深逺隱曲肉低俱作塊子堅硬大小不等並皆治之或作丸服亦可升麻八錢連翹去心龍膽草酒炒桔梗黄連去鬚酒炒京三棱酒炒葛根甘草各五錢炙知母酒洗廣茂各一兩酒炒條黄芩六錢酒洗黄蘗七錢皮酒炒去粗右撮一劑稱一半為細末煉蜜為丸如梧桐子大每服一百丸或一百五十丸一半研粗末每用五錢若胃强能食大便乾燥者可旋加至七八錢用水二鍾先將粗末浸半日煎至一鍾去渣熱服服時仰臥伸脚置髙處去枕頭噙藥一口作十次嚥之一鍾將喫完可留一口將丸藥送下服藥畢臥如常此治法也方歌升陽調經醫毒熱項頰瘰癧堅如鐡升葛甘芩知蘗棱黄連膽草翹茂桔柴胡連翹湯治男婦熱毒馬刀瘰癧兼氣寒血滯經閉等證柴胡連翹去心知母酒炒黄芩各五錢炒黄蘗酒炒生地甘草各三錢炙瞿麥穗六錢牛蒡子二錢炒研當歸尾一錢五分肉桂三分右共研粗末每服三錢或五錢水二大鍾煎至一鍾去渣食後熱温服方歌柴胡連翹醫瘰癧馬刀血滯與經閉黄芩牛蒡歸蘗知瞿麥肉桂甘生地雞鳴散治瘰癧疼痛及熱毒結核或多煩悶熱而不寒者黑牽牛一兩胡粉一錢粉即定生大黄二錢朴硝煉成粉者三錢右共為細末每服三錢鷄鳴時井花水調服以二便利為度如未利再服方歌鷄鳴散治瘰癧疼結核煩悶熱相乘粉牽消黄為細末井水調服便利通李杲連翹散堅湯治氣毒瘰癧耳下或至缺盆或至肩上生瘡堅硬如石推之無根者名馬刀瘡從手足少陽經中來也或生兩脇或已流膿或未破並皆治之當歸酒洗連翹去心莪术酒炒京三棱各五錢酒炒土瓜根酒炒龍膽草各一兩酒洗柴胡一兩二錢黄芩一兩二錢一半酒炒一半生用炙甘草六錢黄連酒炒蒼术各三錢炒赤芍藥一錢右以一半為細末煉蜜為丸如梧桐子大每服一百丸或一百五十丸一半研粗末每用五錢水一鍾八分先浸半日煎一鍾去渣熱服臨臥頭低脚髙去枕而臥每口作十次嚥之留一口送下丸子服畢如常安臥方歌李杲連翹散堅湯氣毒瘰癧馬刀瘡歸芍柴芩棱莪草土瓜龍膽黄連蒼舒肝潰堅湯夏枯草殭蠶各二錢炒香附子酒炒石决明各一錢五分煆當歸白芍醋炒陳皮柴胡撫芎穿山甲各一錢炒紅花片子薑黄甘草各五分生引燈心五十寸水三鍾煎一鍾食逺熱服便燥者加乳香一錢便溏者加煆牡蠣一錢方歌舒肝潰堅湯開鬱筋癧石疽柴决當夏枯陳蠶香附撫紅花芍草甲薑黄散腫潰堅湯治氣毒瘰癧一切馬刀結硬如石推之有根者如證從耳下串至缺盆或至肩上或至脇下者皆屬手足少陽二經所發也若瘰癧徧生下頦或至頰車堅而不潰者屬足陽明經所發也或二證已破及流膿水者並皆治之服藥多少臨證斟酌量病人飲食多少大便輭硬以意消息之柴胡梢四錢龍膽草酒炒黄蘗去粗皮酒炒知母炒花粉昆布去土酒洗桔梗各五錢甘草根炙京三棱酒炒廣茂酒炒連翹去心當歸各三錢白芍酒炒葛根黄連各二錢升麻六錢黄芩梢八錢酒炒一半生用一半海藻五錢右共研末每用六錢或七錢水二鍾先浸半日煎至一鍾去渣熱服服時於臥處伸脚在髙處頭微低每噙一口作十次嚥之至服畢依常安臥取藥在胸中多停留之意也另攢半料作細末煉蜜為丸如梧桐子大每服一百丸此湯藥豫留一口以送丸藥方歌散腫潰堅氣毒滯馬刀瘰癧耳肩交徧頦或至頰車骨結硬如石用之消知藻三棱歸芍草升芩花粉柴胡梢葛根黄連廣茂桔昆布龍膽蘗連翹楊氏家藏治瘰癧方治誤食毒物致成瘰癧其功甚速荆芥白殭蠶炒去絲黑牽牛各二錢螌蝥二十八個大米炒去頭翅足右為末臥時先將滑石末一錢用米飲調服半夜時再一服五更初即用温酒調藥一錢或二三錢量人之强弱用之服後如小水並無惡物行下次日早再用一服仍不行第三日五更初先喫白糯米粥再服前藥一服更以燈心湯調琥珀末一錢服之以小水内利去惡物為愈如尿孔痛用青黛一錢以甘草湯調下其痛即止方歌楊氏家藏治瘰方誤食毒物成癧瘡牽牛螌蝥殭荆芥為末酒服量弱强法製靈鷄蛋治誤食毒物致腋下生馬刀瘰癧者其功稍緩螌蝥七個足翅去頭右將鷄子一個頂上敲開小孔入螌蝥在内紙封固了於飯上蒸熟取出去殻切開去螌蝥五更空心和米飯嚼服候小水通如米泔水或如脂即其騐也如大便小水不通即服琥珀散三二貼催之然後常服妙靈散内消連翹丸尤佳方歌製靈鷄蛋治馬刀鷄子一個入螌蝥紙封蒸熟去殻藥同飯嚼服癧可消琥珀散琥珀黄芩白茯苓烏藥車前子瞿麥茵蔯蒿石韋紫草茅根連翹各等分去心右為極細末每服三錢用燈心湯調下不拘時服方歌琥珀散能利二便瀉毒清熱最稱竒芩苓烏藥車瞿麥茵韋紫草茅翹宜妙靈散服靈鷄蛋後却將此藥與内消連翹丸相兼常服瘡愈方止海藻二兩川牛膝何首烏生當歸酒洗海螵蛸桑寄生各一兩海帶青葙子酒洗昆布酒洗甘草節各五錢木香三錢沉香二錢右為細末每服二錢食逺温酒調下内消連翹丸連翹二兩去心核桃仁白及射干夏枯草土𤓰根澤蘭葉沙參漏蘆各一兩五錢右為細末入核桃仁研匀酒糊為丸如梧桐子大每服三五十丸空心食前或酒下或鹽湯送下方歌内消連翹解瘰毒妙靈與此兩兼服核桃及射夏枯草土𤓰澤蘭沙漏蘆附子敗毒湯治濕毒瘰癧羌活一錢川附子一錢製白殭蠶三錢炒前胡一錢連翹一錢五分去心生黄耆一錢五分蔓荆子一錢五分陳皮一錢防風一錢白茯苓一錢五分金銀花二錢甘草五分節引用生薑一片水三鍾煎一鍾食逺温服方歌附子敗毒太陽經濕毒瘰癧漫腫疼陳苓前草耆羌活銀花殭蔓翹防風消核散治頸項痰凝瘰癧不論男婦小兒用之無不神效海藻三兩牡蠣元參各四兩糯米八兩甘草一兩生紅娘子二十八個胡黄色去紅娘子用米同糯米炒共研細酒調服一錢或錢半量人壯弱方歌消核散治諸瘰癧男婦小兒用之愈紅娘糯米炒胡黄甘草元參藻牡蠣犀角丸治諸般瘰癧心火上攻兩目赤澁服之有效犀角青皮黒牽牛半生半炒陳皮各一兩連翹五錢去心薄荷二觔皂角二枚前五味共研細末用皂角去子皮弦泡搥以布絞取汁一盌又用新薄荷搗取汁同􅘮成膏和入藥末内為丸如梧桐子大每服三十丸食後滚湯送下方歌犀角丸能除心火諸般瘰癧兼目紅牽牛半生半炒用陳薄皂角連翹青夏枯草膏治男婦小兒憂思氣鬱瘰癧堅硬肝旺血燥驟用迅烈之劑恐傷脾氣以此膏常服消之京夏枯草一觔半當歸白芍酒炒黑參烏藥浙貝母去心殭蠶各五錢炒昆布桔梗陳皮撫芎甘草各三錢香附一兩酒炒紅花二錢前藥共入砂鍋内水煎濃湯布濾去渣將湯復入砂鍋内漫火熬濃加紅蜜八兩再熬成膏磁罐收貯每用一二匙滚水冲服兼戒氣怒魚腥亦可用薄紙攤貼瘰癧自消方歌夏枯草膏醫諸癧化硬消堅理肝虛血燥憂思肝木旺烈藥傷脾服此宜歸芍貝殭香附桔昆紅參草撫陳皮烏藥同熬加紅蜜滚水冲服戒怒急瘰癧未潰敷貼方金倍散治瘰癧堅硬難消難潰敷之神效整文蛤一枚攢孔金頭蜈蚣一條末研粗將蜈蚣末裝入文蛤内紙糊封口外再用西紙糊七層曬乾麫麩拌炒以紙黑焦為度去紙研極細末加麝香一分再研匀陳醋調稠温敷堅硬核處外用薄紙蓋之每日一換方歌金倍散敷堅瘰癧蜈蚣末入文蛤中紙糊曬乾同麩炒加麝研之醋調靈神功散治濕毒瘰癧敷之神效製川烏頭嫩黄蘗各等分共研細末米醋調稠溫敷腫處每日一換方歌神功散敷濕瘰癧嫩黄蘗與川烏頭等分為末加米醋調塗腫處即能瘳李杲龍泉散治諸般瘰癧未成者消已成者潰瓦粉即定粉龍泉粉即磨刀石上粉也莪术酒浸炒乾京三棱酒浸炒乾昆布各五錢洗去土酒右共研極細滚水調塗患處用此消堅尤速方歌李杲龍泉敷諸癧瓦粉龍泉莪术棱昆布共研為細末滚水調塗速又靈朱震亨貼瘰癧餅治項間瘰癧不辨肉色不問大小及日月深逺或有赤硬腫痛並皆貼之效生山藥萞麻子肉右等分搗匀攤貼之方歌震亨貼瘰癧可移萞麻山藥共研泥不問日久並腫硬作餅貼之效更竒神效瘰癧方治瘰癧初起消腫止痛白膠香海螵蛸降眞香心無土氣者右等分研末溫水調稠薄紙攤貼方歌神效瘰癧實良方踈滯消腫止痛强未破已前用之效白膠海螵降眞香龍珠膏龍牙草五兩即馬鞭草棘棗根五錢海藻二錢五分蘇木五錢右細切水二十盌煎至十二三盌去渣又用桑柴灰蒼耳草灰石灰各二盌半紙兩層先鋪籮底次置三種灰於籮内用滚水熱淋取灰汁十盌澄清同前湯入鍋内􅘮成膏用巴豆霜白丁香石膏麝香輕粉各少許研細入膏内攪匀磁罐收貯取敷核上再敷時去舊藥其核即潰根小者但塗於根上其核自潰方歌龍珠膏敷癧毒瘡潰遲未潰敷之良海藻蘇木龍牙草再加棗根共煎湯桑石蒼耳灰淋水同煎成膏添麝香石膏白丁輕巴豆研入膏内塗瘰强瘰癧潰後方蟾酥撚子蟾酥黄豆大一塊白丁香十五粒寒水石黄豆大一塊巴豆十粒去殻寒食麫黄豆大一塊右各研細共合一處再研匀煉蜜搓成撚子每用一根用鍼將瘰癧當頂鍼一孔揷撚子入孔内用綠雲膏蓋貼連揷三日後單換膏藥俟數日後頑根自脱以濃凈硬退為效如硬未盡再用以盡為度方歌蟾酥撚子化堅方瘰癧將潰納入瘡寒水石共巴豆肉寒食麫與白丁香五雲膏專貼鼠瘡馬刀瘰癧已潰銀黝子四兩搥碎黄丹八兩飛過香油二十兩用砂鍋一口盛香油火溫候油熱將黝子投入油内用桃栁桑槐棗五樣樹枝攪之候起珍珠花時撈去渣用布濾凈復將油下入鍋内慢慢將黄丹篩入油内用五枝不住手攪之以滴水成珠為度取出收貯用時勿令見火以重湯炖化紅縀攤貼方歌五雲膏貼鼠瘡證瘰癧潰後共馬刀銀黝油熬渣濾凈黄丹五枝攪成膏綠雲膏黄連大黄黄芩元參黄蘗木鱉子各一錢去殻右藥共切片用香油一兩煠焦色去渣入淨松香五兩再􅘮成膏傾入水中扯㧞令金黄色入銚内再􅘮數滚候溫將豬膽汁三枚銅綠三錢預用醋一兩浸一宿絹濾去渣同入膏内用栁枝攪之候冷為度用時以重湯炖化薄紙攤貼甚效方歌綠雲癧破貼最神軍蘗連鱉元參芩油煠濾渣加松脂膽汁銅綠入攪匀蛇蜕膏蜜蜂二十一個蛇蛻七分半蜈蚣二條端午前收者佳右用香油四兩將前三藥入油用文武火煠枯撈去渣入定粉二兩用如筯粗桑枝七條急攪候泠出火氣七日夜方用紙攤貼患處方歌蛇蜕膏貼潰後癧專消餘毒功效極蜈蚣蜜蜂煠去渣定粉油􅘮出火氣凡治瘰癧馬刀潰破之後應用方藥氣血兩虛宜八珍湯堅硬未消者宜香貝養榮湯食少便瀉者宜香砂六君子湯血虛肝熱或瘡口出血或紅膿者宜逍遙散加丹皮炒梔子瘡口斂遲宜用十全大補湯加白歛虛煩不寐者宜歸脾湯調理但藥劑大小量人歲數虛實斟酌用之八珍湯見潰瘍門香貝養榮湯見石疽門香砂六君子湯見潰瘍門逍遙散見背部上搭手十全大補湯見潰瘍門歸脾湯見浮部乳中結核内益元散即六乙散加硃砂少許見胸部蠧疽上石疽石疽生於頸項旁堅硬如石色照常肝鬱凝結於經絡潰後法依瘰癧瘡註此疽生於頸項兩旁形如桃李皮色如常堅硬如石臖痛不熱由肝經鬱結以致氣血凝滯經絡而成此證初小漸大難消難潰既潰難斂疲頑之證也初起氣實者宜服舒肝潰堅湯氣虚者宜服香貝養榮湯外用葱白蜂蜜搗泥敷貼日久不消者以陽燧錠每日灸之以或消或輭或將潰為度既潰法同瘰癧香貝養榮湯白术二錢土炒人參茯苓陳皮熟地黄川芎當歸貝母去心香附酒炒白芍各一錢酒炒桔梗甘草各五分薑三片棗二枚水二鍾煎八分食逺服胸膈痞悶加枳殻木香飲食不甘加厚朴蒼术寒熱徃來加柴胡地骨皮膿潰作渴倍人參當歸白术加黄耆膿多或清倍當歸川芎脇下痛或痞加青皮木香肌肉生遲加白蘝肉桂痰多加半夏橘紅口乾加麥冬五味子發熱加柴胡黄芩渴不止加知母赤小豆潰後反痛加熟附子沉香膿不止倍人參當歸加黄耆虚煩不眠倍人參熟地加逺志棗仁方歌香貝養榮用四君四物貝桔香附陳氣血兩虚宜多服筋瘰石疽效如神陽燧錠見首卷烙法舒肝潰堅湯見瘰癧門失榮證失榮耳旁及項肩起如痰核不動堅皮色如常日漸大憂思怒鬱火凝然日久氣衰形削瘦愈潰愈硬現紫斑腐爛浸滛流血水瘡口翻花治總難註失榮證生於耳之前後及肩項其證初起狀如痰核推之不動堅硬如石皮色如常日漸長大由憂思恚怒氣鬱血逆與火凝結而成日久難愈形氣漸衰肌肉削瘦愈潰愈硬色現紫斑腐爛浸淫滲流血水瘡口開大努肉髙突形似翻花瘤證古今雖有治法終屬敗證但不可棄而不治初宜服和榮散堅丸外貼阿魏化堅膏然亦不過苟延歳月而已和榮散堅丸治失榮調和榮血散堅開鬱川芎白芍酒炒當歸茯苓熟地陳皮桔梗香附白术各一錢土炒人參甘草炙海粉昆布貝母各五錢去心升麻紅花各三錢夏枯草一觔再加紅蜜四兩再􅘮成膏􅘮湯共研細末夏枯草膏合丸如梧桐子大每服三錢食逺白滚水送下身熱加黄芩柴胡自汗盜汗去升麻倍人參加黄耆飲食無味加藿香砂仁飲食不化加山查麥芽胸膈痞悶加澤瀉木香咳𠻳痰氣不清加杏仁麥冬口乾作渴加知母五味子睡眠不寧加黄蘗逺志棗仁驚悸健忘加茯神石菖蒲有汗惡寒加薄荷半夏無汗惡寒加蒼术藿香婦人經事不調加延胡索丹皮腹脹不寛加厚朴大腹皮方歌和榮散堅丸消鬱開結益虚理肝脾八珍貝桔陳香附昆海升紅枯草宜阿魏化堅膏用蟾酥丸藥末一料金頭蜈蚣五條炙黄去頭足共研匀將太乙膏二十四兩重湯炖化離火入前藥末攪冷為度每用時以重湯炖化用紅絹攤貼半月一換輕者漸消重者亦可少解常貼可保不致翻花方歌阿魏化堅消結聚蟾酥丸料研末細蜈蚣炙黄太乙膏炖化攪匀功速極太乙膏見潰瘍門蟾酥丸見疔瘡門鈕扣風鈕扣風生胸頸間風濕結聚搔癢難延及成片浸汁水因地而名當癬看註此證生於頸下天突穴之間因汗出之後邪風襲於皮裏起如粟米搔癢無度􅎲破津水誤用水洗浸淫成片輕者外敷獨勝散氷硫散甚者宜服消風散即愈獨勝散芥菜花一味研細醋調患上方歌獨勝散治鈕扣風已破未破用俱靈内只芥菜花一味止癢消腫有竒功氷硫散硫黄一兩潮腦川椒生白礬各二錢共為細末先用白蘿蔔一個掏空將藥塡滿用蘿蔔皮蓋之紙包三四層灰火内煨半時許待泠將藥取出同熟豬脂油調稠搽患上自愈方歌氷硫散内首硫黄潮腦椒礬用最良蘿蔔掏空藥塡滿油調專搽鈕扣瘡消風散治鈕扣風騷癢無度􅎲破津水亦有津血者荆芥防風當歸生地苦參蒼术炒蟬蛻胡麻仁牛蒡子炒研知母生石膏各一錢煆甘草生木通各五分水二鍾煎八分食逺服方歌消風止癢散風濕木通蒼术苦參知荆防歸蒡蟬膏草胡麻生地水煎之背部上中下發背三發火毒發督經中發屬肝對心生上發屬肺天柱下下發屬腎臍後凝註上中下三發背俱屬督衇經皆由火毒而成上發背火毒傷肺生天柱骨下一名脾肚發其形横廣如肚中發背火毒傷肝生於背心一名對心發其形中濶兩頭有尖如𤓰下發背火毒傷腎生於腰中一名對臍發其形平漫如龜其初起皆形如粟米焮痛麻癢周身拘急寒熱徃來因循數日突然大腫氣實者多焮痛氣虛者多麻癢初起治法不論虛實卽宜隔蒜艾灸灸之不應則就患頂當肉灸之至知痛為效以大化小移深居淺灸後用鍼當瘡頂㸃破一孔隨用㧞法務使毒氣内外疎通庶不致内攻如有表證發熱惡寒無汗者宜荆防敗毒散汗之如有裏證發熱惡熱大便燥者宜内疎黄連湯下之表裏證兼有者宜神授衞生湯雙解之以減瘡勢膿將成必行托裏如潰破腐肉不去外貼巴膏以化之其餘治法俱按癰疽腫瘍潰瘍門蓋此三證無論老少總以髙腫紅活焮痛者為順若漫腫塌陷焦枯紫黒者為逆荆防敗毒散見項部腦疽門内疎黄連湯神授衞生湯俱見腫瘍門巴膏見潰瘍門膏藥類方上搭手上搭手生肺俞穴左右名同經有别右屬肺兮左屬肝總由氣鬱痰熱結註此證生於足太陽膀胱經肺俞穴在兩肩骨之動處無論左搭手右搭手其名雖同而偏在左者屬肝偏在右者屬肺故曰經有别也總由氣鬱痰熱凝結而成初宜神授衛生湯䨇解之次以逍遙散清之兼以六鬱湯調之其餘内外治法俱按癰疽腫瘍潰瘍門逍遙散當歸酒洗白芍酒洗白茯苓白术土炒香附各一錢酒炒柴胡八分黄芩五分陳皮一錢薄荷五分甘草六分生水二鍾煎八分食逺服方歌逍遙散能和氣血開鬱行滯又消結歸芍苓术香柴芩陳薄甘草清毒熱六鬱湯香附酒炒茯苓陳皮半夏製川芎山梔各一錢蒼术炒縮砂仁甘草各五分生薑三片水二鍾煎八分服方歌六鬱湯能開六鬱取其消痰又行氣芎縮二陳蒼山梔香附生薑兼化滯神授衛生湯見腫瘍門中搭手中搭手生近膏肓經屬膀胱脊骨旁七情不和憤怒火虛實寒熱細叅詳註此證生在脊骨兩旁屬足太陽膀胱經膏盲穴一名龍疽由七情不和憤怒火凝而生遇氣寒而實便燥不渴者宜一粒金丹温下之若氣熱而實便燥大渴者宜内疎黄連湯寒下之若氣血虛瘡不能發長者宜内托黄耆散托補之其餘内外治法俱按癰疽腫瘍潰瘍門一粒金丹木香乳香各五分巴豆霜一錢五分沉香五分各為細末和匀用肥膠棗個半去皮核搗爛和藥末為丸如芡實大每服一丸細嚼用白滚水一口將藥送下少頃再飲白滚水一口即瀉一次若飲滚水二口卽瀉二次遇胃氣壯實兼毒滯盛者服藥後連飲滚水三四口卽瀉三四次不可太過毒滯瀉盡卽以米飲補之方歌一粒金丹療惡瘡寒實不渴便燥良木乳沉香巴豆肉棗肉為丸服卽康内托黄耆散當歸白芍炒川芎白术土炒陳皮穿山甲炒研皂刺黄耆各一錢檳榔三分紫肉桂五分水二鍾煎八分食前服方歌内托黃耆治瘍虚托裏諸瘡用最宜歸芍芎术陳皮桂山甲檳榔皂刺耆内疎黄連湯見腫瘍門下搭手下搭手生經膀胱穴在肓門腰窩旁房勞過度生毒火紫陷腐爛透膜腸註此證發於腰窩旁開三寸屬足太陽膀胱經肓門穴由房勞過度有傷腎水水竭不能制火火旺以致榮衞不和逆於肉裏而生也初發紅活焮腫令人寒熱往來口渴煩躁百節疼痛宜服仙方活命飲宣解毒火次服内托黄耆散托毒發長將潰内外治法俱按癰疽腫瘍潰瘍門若初腫腰痛如折不能俯仰者險若色紫塌陷腐爛孔深透膜透腸者逆仙方活命飲見腫瘍門内托黄耆散見前中搭手蓮子發蓮子發名取象形膽與膀胱毒化成形斜平塌侵督重形長髙腫半背輕註此證一名太隂疽生於脊背及兩脇屬膽與膀胱經火毒合化凝結而成若形斜平塌頭侵督衇尾站肋骨者屬毒重若形長髙腫偏於半背中不過督衇旁不過肋骨屬毒輕遇氣實之人初宜蟾酥丸或麥靈丹汗之次宜一粒金丹下之遇氣虛之人初宜仙方活命飲宣解之次宜内托黄耆散托補之其餘内外治法俱宜按癰疽腫瘍潰瘍門蟾酥丸見疔瘡門仙方活命飲見腫瘍門一粒金丹内托黄耆散俱見前中搭手麥靈丹見腫瘍門蜂窩發蜂窩發似蜂房形每在肩後脊旁生此證最忌頭向上急清心火免内攻註此證多生肩後及脊旁形似蜂房由脾經積熱更兼心火凝結成毒初起髙腫如龜形胖脹半背者輕瘡勢横斜漫大者重宜服内疎黄連湯若頭尖向上屬心火熱極防毒火内攻藏府亦有瘡形長若尺許根横滿背名為竟體疽屬毒甚險初覺宜急服黄連消毒飲清心解毒庶免内攻其餘内外治法俱按癰疽腫瘍潰瘍門内疎黃連湯見腫瘍門黃連消毒飲見頭部百會疽隂陽二氣疽隂陽二氣疽脊旁腫消輭硬變不常七情内乖逆榮衛如期膿潰自無妨註此證生於脊背之旁乍腫乍消時輭時硬由七情内乖榮衛不和而生也初發令人寒熱往來若大渴神清髙腫衇洪二七膿成潰破者順若不渴神昏漫腫衇細應期無膿飲食不思者逆初服奪命丹以退寒熱次服仙方活命飲其餘内外治法俱按癰疽腫瘍潰瘍門奪命丹輕粉麝香白砒各五分煆麵裹火白礬煆辰砂為衣血竭各一錢雄黄二錢蟾酥二錢酒化入藥乾者乳香没藥寒水石煆銅綠各二錢蝸牛二十一個連殻右為細末先將蝸牛研爛如泥匀合前藥丸如不成加好黄酒少許打三五百下為丸如菉豆大每服二三丸先用葱白一寸令病者嚼爛自吐於手心内男用左手女用右手將藥丸裹入葱泥内用無灰酒一大鍾温熱送下被蓋汗出為度重者不過三服不可多用方歌奪命丹中粉麝香砒礬砂竭共雄黄蟾酥乳没兼寒水銅綠蝸牛用最良仙方活命飲見腫瘍門串疽串疽生於背脇間連發相串色依然漫腫漸紅多臖痛積憤鬱火是其原註此證生於背脇之間初發一處其後挨次發出二三處形雖不同而色仍同也潰後多相串通故又名老鼠鑽又名遊走血脾癰初發漫腫無頭皮色如常漸腫漸透紅色多疼牽引旁處臖痛因積憤鬱火而成也初服仙方活命飲宣解鬱毒其次内外治法俱按癰疽腫瘍潰瘍門仙方活命飲見腫瘍門酒毒發酒毒發生滿背間皮色不變如彈拳堅硬麻木痛徹内藥酒厚味使之然註此證生於脊背皮色不變纍纍如彈如拳堅硬如石時麻時木痛徹五内二便澀滯週身拘急數日後頭面手足虛腫泄瀉似痢總由過飲藥酒更兼厚味積毒所致初起宜服連翹消毒飲次服内疎黄連湯其證或消或潰須宜速治為順若遷延日久不消不潰必腐爛筋骨即成逆證其餘内外治法俱按癰疽腫瘍潰瘍門連翹消毒飲連翹去心梔子桔梗赤芍當歸元參射干黄芩紅花葛根陳皮各一錢甘草五分生大黄初起便燥者加一錢花粉一錢水二鍾煎八分食逺服有痰者加竹茹一錢方歌連翹消毒療諸瘡能解酒毒葛大黄紅花梔桔元參草芍芩花粉射陳當内疎黄連湯見腫瘍門連珠發連珠毒發貫珠形在背㣲疼色淡紅發時尿閉少腹滿隂囊作腫百節疼註此證生於背不論左右連腫三五塊形若貫珠由榮血火毒或酒色過度而成其瘡微痛皮色淡紅發時少腹脹滿小水閉澁隂囊作腫百節疼痛初起宜服神授衞生湯加木通車前其餘内外治法俱按癰疽腫瘍潰瘍門神授衛生湯見腫瘍門丹毒發丹毒發如湯火傷細癗赤暈渴非常丹石剛劑致此證紅活者生紫黯亡註此證生於背形如湯火所傷細癗無數赤暈延開發時其渴非常由素服丹石剛劑所致初服黄連消毒飲兼國老膏服之外用牛肉薄片貼之其色紅活鮮潤神清者生若紫黯神昏更兼衇躁膨脹嘔噦者亡國老膏甘草二觔大者搥碎河水浸一宿揉令漿汁濃去盡筋渣再用絹濾過銀器内慢火熬成膏用磁罐收貯每服三錢無灰温酒調下或白滚水亦可方歌國老膏解丹石毒諸瘡用此腫即消甘草二觔河水泡取汁熬膏温酒調黄連消毒飲見頭部百會疽禽疽禽疽毒由時氣成數塊似疹色紫紅背生形如拳打狀拘急麻木不作疼註此疽之毒由時氣風熱而成始發數塊如疹其色紫紅在背而生形如拳打之狀脊背麻木拘急並不作痛神清衇和服藥得汗者順若神昏衇躁或微或代發寒齒噤者逆初宜急服仙方活命飲加𦍑活獨活汗之外敷二味㧞毒散或蝌蚪㧞毒散消之若漫腫不潰即服托裏透膿湯其餘内外治法俱按癰疽腫瘍潰瘍門仙方活命飲二味㧞毒散蝌蚪㧞毒散俱見腫瘍門托裏透膿湯見頭部侵腦疽痰注發痰注發如布袋形按之木硬覺微疼其發不紅亦不熱濕痰七情鬱滯成註此證發於脊背長形如布袋短形如冬𤓰按之木硬微覺疼痛不熱不紅皮色如常由濕痰七情鬱滯凝結於肌肉之分日積深久而成初起宜服瘡科流氣飲外貼金鳳化痰膏消之如此證久逺疲頑治之不消者届期要潰治法俱按癰疽潰瘍門瘡科流氣飲人參厚朴薑製桔梗防風紫蘇黃耆鹽水炒枳殻麩炒當歸白芍酒炒肉桂烏藥甘草各七分川芎南木香白芷檳榔各五分引加生薑一片水二鍾煎八分温服方歌流氣飲舒痰涎壅人參朴桔芷防風蘇耆殻桂木香草烏藥檳榔歸芍芎金鳳化痰膏鳳仙花一捧研去青蒂末大葱自然汁一茶鍾好米醋一茶鍾廣膠三錢米粒大入葱汁内泡之切如人中白八錢煆存性研末火微先將葱汁米醋廣膠投入鍋内熬化次下鳳仙花末熬成膏再入人中白末將鍋離火不時攪匀用時以重湯炖化量痰包之大小薄紙攤貼候膏自落再換新膏方歌金鳳化痰消硬堅濕痰串注貼更痊鳳仙中白廣膠醋葱汁同熬用紙攤黄𤓰癰黄𤓰癰在背旁生脾火色紅黄𤓰形腫髙寸餘長尺許四肢麻木引心疼註此證生於背旁一名肉龜由脾火積毒而成皮肉色紅狀若黄𤓰腫髙寸餘長可尺許四肢麻木疼痛引心紅活速潰者順紫陷衇微自汗譫語堅硬潰遲者逆初起宜服仙方活命飲加羌活柴胡或奪命丹治之其餘内外治法俱按癰疽腫瘍潰瘍門仙方活命飲見腫瘍門奪命丹見隂陽二氣疽腰部腎俞發腎俞發生腎俞穴單者酒色兼濕熱房勞怒火則雙生紅活黒陷順逆别註此證生腎俞穴在腰骨兩旁陷肉處有單有雙單者由酒色濕熱而成雙者由房勞怒火而發若瘡形紅活髙腫十四日生膿屬順若瘡形紫黒乾枯堅硬應期無膿屬逆或膿稀傷膜者係眞陽血氣大虧初宜服人參養榮湯或加减八味丸以救其源其順逆内外治法俱按癰疽腫瘍潰瘍門人參養榮湯加减八味丸俱見潰瘍門中石疽石疽寒凝瘀血聚生於腰胯最纒綿堅硬如石皮不變時覺木痛消潰難註此證由寒氣瘀血凝結生於腰胯之間纒綿難以收功其疽時覺木痛難消難潰堅硬如石皮色不變初宜内服没藥丸外用鮮商陸搗爛貼於患處治之隨用艾壯當頂灸之以輭為度潰後按癰疽潰瘍治法没藥丸桃仁一兩炒乳香没藥川芎川椒去目及合口者當歸赤芍各五錢自然銅二錢五分七次火燒醋淬共研細末用黄蠟二兩火化開入藥末不住手攪匀丸如彈子大每用一丸以好酒一鍾將藥化開煎至五分乘熱服下方歌没藥丸治中石疽乳没桃芎歸芍宜川椒自然銅黄蠟用酒服之行血瘀纒腰火丹纒腰火丹蛇串名乾濕紅黄似珠形肝心脾肺風熱濕纒腰已徧不能生註此證俗名蛇串瘡有乾濕不同紅黃之異皆如纍纍珠形乾者色紅赤形如雲片上起風粟作癢發熱此屬肝心二經風火治宜龍膽㵼肝湯濕者色黃白水皰大小不等作爛流水較乾者多疼此屬脾肺二經濕熱治宜除濕胃苓湯若腰肋生之係肝火妄動宜用柴胡清肝湯治之其間小皰用線鍼穿破外用栢葉散敷之若不速治纒腰已徧毒氣入臍令人膨脹悶嘔者逆龍膽瀉肝湯龍膽草連翹去心生地澤瀉各一錢車前子木通黄芩黄連當歸梔子生研甘草各五分生生軍二錢加之便秘水二鍾煎八分食前服方歌龍膽瀉肝火丹生形如雲片粟多紅芩連梔膽車歸尾生地軍翹瀉木通除濕胃苓湯蒼术炒厚朴薑炒陳皮豬苓澤瀉赤茯苓白术土炒滑石防風山梔子生研木通各一錢肉桂甘草各三分生水二鍾燈心五十寸煎八分食前服方歌除濕胃苓火丹瘡脾肺濕熱皰白黃胃苓湯用通梔子滑石防風共作湯栢葉散側栢葉炒黃為末蚯蚓糞韮菜地内者佳黃蘗大黃各五錢雄黃赤小豆輕粉各三錢右為細末新汲水調搽香油調搽更效方歌栢葉散搽火丹方大黃赤豆蘗雄黃栢葉輕粉蚯蚓糞研末香油調更良柴胡清肝湯見頭部鬢疽御纂醫宗金鑑卷六十四
