body:
  text: 編輯外科心法要訣目録肩部肩中疽乾疽過肩疽髎疽肩風毒樂疽臑部臑癰附藕包毒魚肚發石榴疽肘癰臂部臂癰附疽腕癰兌疽穿骨疽骨螻疽螻蛄串手部手發背掌心毒虎口疽附合谷疔病蝦手丫發調疽蛇頭疔天蛇毒蛇眼疔蛇背疔蛀節疔蛇腹疔泥鰍疽代指蜣螂蛀瘑瘡狐尿刺鵝掌風御纂醫宗金鑑卷六十八目録欽定四庫全書御纂醫宗金鑑卷六十八編輯外科心法要訣目録肩部肩中疽乾疽過肩疽髎疽肩風毒樂疽臑部臑癰附藕包毒魚肚發石榴疽肘癰臂部臂癰附疽腕癰兌疽穿骨疽骨螻疽螻蛄串手部手發背掌心毒虎口疽附合谷疔病蝦手丫發調疽蛇頭疔天蛇毒蛇眼疔蛇背疔蛀節疔蛇腹疔泥鰍疽代指蜣螂蛀瘑瘡狐尿刺鵝掌風御纂醫宗金鑑卷六十八目録欽定四庫全書御纂醫宗金鑑卷六十八編輯外科心法要訣肩部肩中疽乾疽過肩疽肩疽癰發正肩中疽硬黑陷癰腫紅乾疽肩前過肩後風濕積熱血瘀凝注此疽生於肩中廉屬三焦膽二經紅活髙腫一名疪癰堅硬平塌為肩中疽肩之前廉屬大腸經名乾疽一名疔疽肩之後廉屬小腸經名過肩疽瘡勢無論大小惟在發源之處命名總由濕熱風邪鬱成亦有負重瘀血凝結而成髙腫紅活焮熱速潰者順若平塌堅硬無紅無熱潰遲者險甚則腫痛連及臂胛口噤寒戰大痛不食或兼綿潰便瀉者逆治法初起有表證者俱宜荆防敗毒散汗之有裏證者內疏黃連湯下之汗下之後腫痛不退膿勢將成宜用托裏透膿湯膿熟開之至於引經之藥惟在臨證時因經加之潰後內外治法俱按癰疽潰瘍門荆防敗毒散見項部腦疽內疏黃連湯見腫瘍門托裏透膿湯見頭部侵腦疽髎疽肩風毒髎疽肩後腋外生小腸肩貞風火凝肩風毒生臑端上大腸肩髃風濕成注髎疽生於肩之後下腋之後外微上岐骨縫之間經屬小腸肩貞穴由風火凝結而成初起如粟堅硬腫痛肩臑拘急不能舉揚初服荆防敗毒散便燥實者服雙解貴金丸雙解之肩風毒生於肩梢臑上骨尖處經屬大腸肩髃穴由邪風深襲骨縫與濕稽留化熱而成初起宣腫色赤大者如桃小者如杏痛連肩臑更兼拘急初服蠲痛無憂散汗之即消若腫痛日深不能盡消者膿勢將成也宜服托裏透膿湯二證潰後內外治法俱按癰疽潰瘍門蠲痛無憂散番木鱉香油煠浮當歸酒洗甘草各二兩生麻黃三兩穿山甲陳土炒川烏黑豆酒煮去皮尖草烏薑汁煮蒼术米泔水浸炒半夏各二兩製威靈仙一兩各製為末共和勻每服五七分至一錢無灰酒調服再飲酒以醉為度蓋卧出汗避風此方加閙羊花四兩亦治頭風痛方歌蠲痛無憂肩風毒風襲骨縫與濕凝番鱉歸草麻黃甲川芎烏蒼半威靈荆防敗毒散見項部腦疽雙解貴金丸見腫瘍門托裏透膿湯見頭部侵腦疽樂疽樂疽肩前腋上生骨縫開合凹陷中堅如鵝卵痛入骨包絡血熱氣鬱成注此證生於肩前腋之上骨縫開合空凹陷中初起如椒子漸腫堅硬大如鵝卵按之疼痛入骨屬包絡經血熱氣鬱而成其證屆期潰破出稠膿腫消者順月餘不潰既潰出清水腫硬不退者逆初宜服神授衛生湯若惡風太過倍加蔥白汗之次服托裏透膿湯潰遲者十全大補湯潰後內外治法俱按癰疽潰瘍門神授衛生湯見腫瘍門托裏透膿湯見頭部侵腦疽十全大補湯見潰痬門臑部自肩至肘曰臑臑癰附藕包毒臑癰肩肘周匝腫色赤焮疼粟㿔殭藕包毒狀鴨鵝卵臑內三隂外三陽注此證由風瘟或風火凝結而成生於肩下肘上周匝漫腫色赤焮痛初起狀如粟米一攢亦有起一粒殭疙􅜀者漸次焮腫紅熱臖膿痛甚紅腫之外無暈者順有二暈者險三四暈者逆腫發臑內或臑外結腫一枚如桃如鴨鵝卵者名藕包毒毒者癰之輕證也臑癰藕包內外治法俱按癰疽腫瘍潰瘍門此癰毒發苖之處若在臑內者屬手三隂經在臑外者屬手三陽經隨證用引經之藥必然獲效魚肚發魚肚發如魚肚形青靈穴生心火凝暴腫紅活焮熱痛癰疽治法即成功注此證生於臑之後垂肉處屬心經青靈穴由火毒凝結而成暴腫色赤焮熱疼痛形如魚肚腫潰治法俱按癰疽腫瘍潰瘍門其引經之藥惟在臨證加之石榴疽石榴疽起肘尖上粟皰根開堅腫疼破翻如榴寒熱甚三焦相火與濕凝注此證生於肘尖上寸餘屬三焦經天井穴初起黃粟小皰根腳便覺開大色紅焮腫堅硬疼痛腫如覆碗破翻如榴寒熱如瘧由三焦相火與外濕相摶而成初起宜蟾酥丸汗之外以艾灸九壯貼蟾酥餅用萬應膏蓋之焮腫處敷沖和膏服菊花清燥湯煩躁熱甚者服護心散九日後作稠膿痛減喜食表裏證俱退者順反此者逆破後用菊花蕊煎湯洗之次以菊花燒灰存性加輕粉少許兌勻敷之神效至透膿脫腐生肌時內外治法俱按癰疽潰瘍門菊花清燥湯甘菊花二錢當歸生地白芍酒炒川芎知母貝母去心研地骨皮麥冬各一錢去心柴胡黃芩升麻犀角鎊甘草各五分生竹葉二十片燈心二十寸水二鍾煎八分食後溫服方歌菊花清燥石榴疽腫硬焮紅痛可醫四物柴芩知貝草升麻地骨麥冬犀蟾酥丸蟾酥餅即蟾酥丸料揑成餅見疔瘡門萬應膏見潰瘍門沖和膏護心散俱見腫瘍門肘癰肘癰發於肘圍繞髙腫焮熱赤紅疼心肺稽留風邪火勢小為癤勢大癰注此證生於肘之圍繞暴發髙腫焮熱色紅疼痛由心肺風火之邪稽留凝滯而成形勢小者為癤毒形勢大者為癰初服荆防敗毒散汗之次服白芷升麻湯清托之外敷二味拔毒散將潰治法俱按癰疽腫瘍潰瘍門白芷升麻湯黃芩二錢半酒炒半生連翹二錢去心黃耆三錢白芷八分升麻桔梗各五分紅花酒洗甘草各三分炙酒水各一鍾煎八分食逺熱服方歌白芷升麻醫腫痛解熱除煩托肘癰芩翹桔梗紅花草黃耆酒水各一鍾荆防敗毒散見項部腦疽二味拔毒散見腫瘍門臂部自肘至腕曰臂臂癰附疽臂癰臂疽繞臂生平紫硬疽紅腫癰榮衛風邪逆肉理甚則拳縮徹骨疼注此證生臂外側屬三陽經臂裏側屬三隂經髙腫紅活焮痛潰速者為癰平陷紫暗堅硬木痛潰遲者為疽俱由榮衛不周感受風邪逆於肉理而成初起形如粟粒憎寒壯熱宜服荆防敗毒散汗之焮痛煩熱宜服白芷升麻湯消之膿勢將成宜服托裏透膿湯膿熟針之若疽證木痛無紅無熱此屬氣血兩虛無論已潰未潰宜服十全大補湯托之潰後內外治法俱按癰疽腫瘍潰瘍門若拳縮筋不能舒疼痛徹骨者係潰深傷脈也屬逆荆防敗毒散見項部腦疽白芷升麻湯見臑部肘癰托裏透膿湯見頭部侵腦疽十全大補湯見潰瘍門腕癰腕癰三陽風火凝手腕背面結癰形髙腫速潰順易治腐爛露骨逆難功注此證生於手腕背面屬手三陽經由風火凝結而成髙腫紅活在十四日潰破膿出痛減者順而易治手腕乃皮肉澆薄之處若遷延日久不潰或漫腫平塌既潰腐爛露骨者逆難於收功初服荆防敗毒散汗之外用太乙紫金錠敷之膿成將潰即按癰疽腫瘍潰瘍治法荆防敗毒散見項部腦疽太乙紫金錠見胸部脾發疽兑疽兌疽生腕動脈間堅硬漫腫兌骨邊痛徹手膊為險證本屬肺經穴太淵注此證生於手腕裏面橫紋前稍動脈之間兑骨裏側屬肺經太淵穴由憂思氣滯風火結成堅硬漫腫疼痛徹骨手膊不能轉動此動脈處乃肺經門户若發此疽或潰深大泄肺氣最為險候內外治法俱按癰疽腫瘍潰瘍門穿骨疽穿骨疽生間使穴掌後三寸包絡經堅硬漫腫因藴熱毒盛潰深穿骨疼注此證生於間使穴處在掌後橫紋上三寸兩筋陷中屬包絡經藴熱凝結而成初起如粟漸增堅硬漫腫微紅臖熱疼痛應期速潰者順若潰破遲緩膿毒潰穿骨縫從臂外側出膿者險內外治法俱按癰疽腫瘍潰瘍門骨螻疽骨螻疽生臂外廉經屬陽明憂怒纒瘡疼根束多善順紫暈腐串七惡難注此證生於臂外側前廉大骨之後屬手陽明大腸由憂鬱暴怒凝結而成初如粟豆旬日大如桃李腫硬疼痛瘡根收束多見五善之證者順若紫暈開大腐爛斑點串通肌肉抽搐拘急多見七惡之證者逆始終內外治法俱按癰疽腫瘍潰瘍門螻蛄串螻蛄串生臂內中思傷脾氣包絡凝筋骨如中流矢痛內潰串孔似漏形注此證生於臂內中廉屬包絡經由思慮傷脾脾傷則運化遲故生濁液流於肌肉脾氣滯鬱不舒凝結而成此患初起筋骨如中流矢疼痛漸增漫腫堅硬不紅不熱連腫數塊臂膊不能轉動日久其腫塊漸次潰破孔孔時流白漿內潰串通諸孔外勢腫硬不消膿水淋瀝如漏虛證悉添如面黃食少削瘦甚則午後寒熱交作而成敗證也初起宜服逍遙散外敷太乙紫金錠次服人參養榮湯調和氣血扶助脾胃十中可保二三潰按癰疽潰瘍治法若投藥不效者屬逆逍遙散見背部上搭手太乙紫金錠見胸部脾發疽人參養榮湯見潰瘍門手部手發背手發背初芒刺形三陽風火與濕凝堅硬潰傷筋骨險髙腫速潰易收㓛注此證生於手背屬手三陽經由風火與濕凝滯而成初起形如芒刺漸覺疼痛髙腫紅活焮熱潰速為癰若漫腫堅硬無紅無熱潰遲為疽其證無論形勢大小但潰深露筋骨者難痊初俱宜服羌活散汗之次服內疏黃連湯清之其餘內外治法俱按癰疽腫瘍潰瘍門羌活散羌活當歸各二錢獨活烏藥威靈仙各一錢五分升麻前胡荆芥桔梗各一錢甘草五分生肉桂三分酒水各一鍾煎一鍾食逺服方歌羌活散醫手發背除濕發汗把風追升麻前獨荆歸草烏藥威靈桔桂隨內疏黃連湯見腫瘍門掌心毒掌心毒生赤腫疼經屬包絡積熱成偏於掌邊名穿掌初宜發汗次宜清注此證生於手掌心赤腫疼痛屬包絡經勞宫穴積熱而成若偏於掌邊名穿掌毒一名穿埂毒又名鷀癰初起治同手發背其餘治法俱按癰疽腫傷潰瘍門虎口疽附合谷疔虎口疽生合骨穴經屬大腸熱濕凝根深為疔大為疽堅硬木痛汗針明注此證生於合谷穴在手大指次指岐骨間屬大腸經濕熱凝結而成一名了義毒一名擘蟹毒初起如豆漫大色青木痛堅硬名虎口疽若初起黃粟小皰癢熱焮痛根深有紅線上攻腋內即名合谷疔無論疔疽初俱宜羌活散汗之內疏黃連湯清之疽證膿熟針之餘治法按癰疽腫瘍潰瘍門疔證於初起將疔根挑去有紅絲者當紅絲盡處用針砭斷其餘治法俱按疔門羌活散見手發背內疏黃連湯見腫瘍門病蝦病蝦每在手背生形勢如蝦赤腫疼內宜消毒外湯洗手三陽經熱毒成注此證生於手背屬手三陽經積熱毒盛而成形勢如蝦髙埂赤腫疼痛初宜服黃連消毒飲外用食鹽酒糟香油同炒令香淬以滚湯淋洗患處即消如髙埂不消再用蟾酥餅貼之外用巴膏蓋之以腐盡埂子次敷生肌散仍用膏蓋收斂黃連消毒飲見頭部百會疽蟾酥餅即蟾酥丸作餅見疔瘡門巴膏生肌散俱見潰瘍門手了發手了發生手指岐濕火凝結本於脾初粟漸豆焮熱痛內外治法按疔醫注此證生於手了岐骨縫間除大指合谷穴其餘指了生患即名手了發本於脾經濕火凝結而成初起如粟色紅漸大如豆焮熱疼痛潰後疼痛不止者俟膿塞脫出其痛方止內外治法俱按疔證門調疽調疽大指肺熱生如粟如李青紫疼六日刺出膿血吉黑腐延蔓斷指凶注此證生於手大指由肺經積熱而成初如粟豆漸腫如李青紫麻木癢痛徹心六日刺破出稠膿鮮血者吉出黑血者險初服麥靈丹汗之次服仙方活命飲外敷白錠子其餘內外治法俱同癰疽腫瘍潰瘍門若黑腐延蔓不痛者名斷指屬逆治法與足部脫疽同麥靈丹仙方活命飲白錠子俱見腫瘍門蛇頭疔天蛇毒蛇頭疔皰紫硬疼天蛇毒疼悶腫紅二證俱兼脾經火看生何指辨専經注此二證俱生於手指頂尖夫手指雖各有専經然俱兼脾經火毒而成蛇頭疔自筋骨發出根深毒重初起小皰色紫疼痛堅硬如釘初宜服蟾酥丸汗之外敷雄黃散天蛇毒自肌肉發出其毒稍輕初起悶腫無頭色紅痛如火燎初宜服蟾酥丸汗之外敷雄黃牡蠣散二證膿勢將成俱服仙方活命飲膿熟開之外貼琥珀膏煨膿生肌治之虛不能斂者補之但手指係皮肉澆薄之處不宜灸法亦不宜開早若誤灸開早以致皮裂努肉翻出疼痛倍增者不能速愈慎之手指經絡圖歌俱見首卷雄黃散明雄黃二錢輕粉五分蟾酥二分氷片一分共研細末新汲水調濃重湯炖溫敷於患指用薄紙蓋之日換三四次方歌雄黃散治蛇頭疔紫痛根堅火毒攻氷片蟾酥輕粉末汲水調塗用紙封雄黃牡蠣散牡蠣四錢煆明雄黃二錢另研細共和一處再研勻蜜水調濃重湯炖溫塗於患指能止疼痛日用五六次方歌雄黃牡蠣天蛇毒指頭焮紅悶腫疼二味細研加蜜水調敷止痛效又靈蟾酥丸見疔瘡門仙方活命飲見腫瘍門琥珀膏見頭部髮際瘡蛇眼疔蛇背疔蛀節疔蛇腹疔泥鰍疽蛇眼疔在甲旁生甲後名為蛇背疔蛀節疔生中節骨蛇腹指內魚肚形泥鰍疽生遍指腫牽引肘臂熱焮疼看生何指分經絡總由臟腑火毒成注此證有五如蛇眼疔生於指甲兩旁形如豆粒色紫半含半露硬似鐵釘蛇背疔生於指甲根後形如半棗色赤腫胖蛀節疔又名蛇節疔生於中節繞指俱腫其色或黃或紫蛇腹疔又名魚肚疔生於指中節前面腫如魚肚色赤疼痛泥鰍疽一指通腫色紫形如泥鰍焮熱痛連肘臂初起俱宜服蟾酥丸汗之外敷雄黃散次服仙方活命飲膿熟開之貼琥珀膏煨膿生肌虛不能斂者補之但此五證總不外乎火毒凝結而成至於屬何經臟臨證看生何指以辨之手指經絡各詳注首卷蟾酥丸見疔瘡門雄黃散見蛇頭疔仙方活命飲見腫瘍門琥珀膏見頭部髮際瘡代指代指每生指甲身先腫焮熱痛應心輕潰微膿重脫甲經脈血熱是其因注此證生於手指甲身內由經脈血熱凝結而成初起先腫焮熱疼痛應心宜用甘草朴消各五錢熬水浸洗即瘥痛仍不止三四日後指甲背面上微透一點黃白色此係內膿已成但無門潰出急用線針在指甲身就膿近處撚一小孔膿方得出隨手掜盡餘膿用黃連膏貼之易愈或失治或過敷涼藥以致肌肉寒凝膿毒浸淫好肉瓜甲潰空必然脫落用琥珀膏貼之一兩月即愈黃連膏見鼻部鼻瘡琥珀膏見頭部髮際瘡蜣螂蛀蜣螂蛀由痰氣凝指節堅腫蟬肚形初起不疼久方痛潰久膿清癆病成注此證多生於體虛人手指骨節由濕痰寒氣凝滯而成初起不紅不熱不痛漸次腫堅形如蟬肚屈伸艱難日久方知木痛初腫時宜先服六君子湯益氣除濕化痰外以離宮錠薑汁磨敷或兼陽燧錠於堅痛處灸之自消若失於調治腫處漸漸腐爛膿如清水淋瀝不已腫仍不消然在骨節之處潰久大泄氣血每成瘡癆之證宜豫服人參養榮湯補之外貼蟾酥餅子陀僧膏蓋之遇壯年人如法治之可愈若年老及虛羸之人不能收㓛六君子湯即香砂六君子湯減去藿香砂仁見腫瘍門離宫錠見腫瘍門陽燧錠見首卷烙法人參養榮湯陀僧膏俱見潰瘍門蟾酥餅見疔瘡門瘑瘡瘑瘡每發指掌中兩手對生茱茰形風濕癢痛津汁水時好時發久生蟲注此證生於指掌之中形如茱茰兩手相對而生亦有成攢者起黃白膿皰癢痛無時破津黃汁水時好時發極其疲頑由風濕客於膚腠而成以潤肌膏擦之若日久不愈其癢倍增內必生蟲治以殺蟲為主用藜蘆膏擦之甚效忌動風雞鵝魚腥等物藜蘆膏藜蘆苦參各一兩豬脂油八兩將二味煠枯濾去渣入松香一兩溶化開離火再加枯礬末雄黃末各一兩攪勻候溫塗之以痊為度方歌藜蘆膏用苦參良脂油煠濾入松香再加枯礬雄黃攪殺蟲止癢抹瘑瘡潤肌膏見頭部白屑部狐尿刺狐尿刺生手足間悶腫焮痛紅紫斑螳螂精尿流積毒誤觸肌膚痛不眠注此證大成書名狐狸刺外臺總録二書名狐尿刺由螳螂盛暑交媾精汁染於諸物乾久有毒人手足誤觸之則成此患初起紅紫斑點肌膚乾燥悶腫焮痛不眠十日後腐開瘡口日寬內宜服黃連解毒湯外以蒲公英連根濃煎溫洗若得鮮蒲公英搗汁塗患處更佳蓋螳螂又名野狐鼻涕此證取名蓋本於此將潰治法按癰疽潰瘍門黃連鮮毒湯見耳部黑疔鵝掌風鵝掌風生掌心間皮膚燥裂紫白斑楊梅餘毒血燥熱兼受風毒凝滯源注此證生於掌心由生楊梅餘毒未盡又兼血燥復受風毒凝滯而成初起紫白斑點疊起白皮堅硬且厚乾枯燥裂延及遍手外用二礬散洗之三油膏擦之內用祛風地黃丸料加土茯苓白鮮皮當歸為佐作丸服之甚效若年久成癬難愈又有不因楊梅後無故掌心燥癢起皮甚則枯裂微痛者名掌心風由脾胃有熱血燥生風血不能榮養皮膚而成宜服祛風地黃丸外用潤肌膏久久擦之即愈祛風地黃丸生地熟地各四兩白蒺藜川牛膝各三兩酒洗知母黃蘗枸杞子各二兩莬絲子酒製獨活各一兩共研末煉蜜和丸如梧桐子大每服三錢黃酒送下夏月淡鹽湯下方歌祛風地黃除血熱鵝掌風生服即瘥知蘖蒺藜牛膝莬獨杞同研煉蜜和二礬散白礬皂礬各四兩兒茶五錢側柏葉八兩水十碗煎數滚聼用先以桐油搽患處再用紙撚桐油浸透火點向患處薰片時次用前湯乘熱貯淨木桶內手架桶上以布將手連桶口蓋嚴湯氣薰手勿令泄氣待微熱將湯傾入盆內蘸洗良久一次即愈七日切不可見水方歌二礬掌起紫白斑礬與兒茶柏葉煎先以桐油搽患處油撚燃薰後洗痊三油膏牛油桕油香油銀朱各一兩官粉麝香各二錢研細將三油共合火化入黃蠟一兩溶化盡離火再入朱麝官粉等末攪勻成膏搽患處火烘之以油乾滋潤為度方歌三油膏潤鵝掌風初斑漸裂燥癢攻牛桕香油朱粉麝蠟熬擦患火上烘潤肌膏見頭部白屑風御纂醫宗金鑑卷六十八
