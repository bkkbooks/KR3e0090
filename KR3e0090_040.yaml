body:
  text: 編輯雜病心法要訣目録内傷虚勞勞瘵自汗盜汗失血消渴御纂醫宗金鑑卷四十目録欽定四庫全書御纂醫宗金鑑卷四十編輯雜病心法要訣目録内傷虚勞勞瘵自汗盜汗失血消渴御纂醫宗金鑑卷四十目録欽定四庫全書御纂醫宗金鑑卷四十編輯雜病心法要訣内傷總括内傷勞役傷脾氣飲食傷胃傷其形傷形失節温凉過氣濕熱暑火寒中註勞役傷氣傷元氣也飲食傷形傷胃府也傷氣宜補有熱中濕熱暑熱火鬱寒中之不同傷形宜消有飲食失節過於温凉之不一也内傷外感辨似内傷衇大見氣口外感衇大見人迎頭疼時痛與常痛惡寒温解烈火仍熱在肌肉從内泛熱在皮膚捫内輕自汗氣乏聲怯弱雖汗氣壯語髙聲手心熱兮手背熱鼻息氣短鼻促鳴不食惡食内外辨初渇後渇少多明註内傷外感衇皆大内傷之衇氣口大於人迎不似外感之衇人迎大於氣口也内傷外感皆頭痛内傷之頭痛有時而痛有時不痛不似外感之頭痛常常而痛不休也内傷外感皆惡寒内傷之惡寒得就温衣而即解不似外感之惡寒雖近烈火而仍惡也内傷外感皆發熱内傷之發熱熱在肌肉以手捫之熱從内泛不似外感之發熱熱在皮膚以手捫之熱自内輕也内傷外感皆自汗内傷之自汗氣短乏聲怯弱不似外感之自汗氣壮促語聲髙也内傷外感手皆熱内傷之熱手心熱不似外感之熱手背熱也内傷外感皆鼻不和内傷之鼻息氣短而喘不似外感之鼻息氣促而鳴也内傷外感皆不食内傷之不食口中無味不似外感之不食聞食則惡也内傷外感皆渇内傷之渇初病即渇其飲甚少不似外感之渴三日後始渇其飲甚多也補中益氣湯補中益氣升陽清熱傷氣陷大虚洪頭痛表熱自汗出心煩口渴畏寒風困倦懶言無氣動動則氣髙喘促聲保元甘温除大熱血歸氣术補脾經佐橘降濁散滯氣升柴從胃引陽升陰火腎躁加地蘗陽熱心煩安神寧註補中益氣湯治内傷清陽下陷因勞役過度熱傷元氣故衇虚大而洪也内傷頭痛時作時止也内傷表熱嘗自汗出也心煩氣虚惡煩勞也口渇氣陷不蒸化也畏寒畏風表氣虚失衞也困倦懶言中氣乏不周也動則氣喘上氣不足息也保元謂人參黄耆甘草名保元湯也臣當歸和脾血白术益脾氣佐橘皮降濁散胸中滯氣升柴升清從胃中引陽也陰火時顯躁熱加黄蘗生地補水救隂陽熱晝夜心煩合硃砂安神丸瀉火安神調中益氣湯調中弦洪緩沉澁濕熱體倦骨痠疼氣少心煩忽肥瘦口沫食出耳鳴聾胸膈不快食無味二便失調飱血濃保元升柴蒼橘蘗去蘗加木亦同名註調中益氣湯亦治内傷清氣下陷濁氣上乘清濁相干而兼濕熱者故二便不調飱瀉膿血也此湯與補中益氣湯雖互相發明然其證衇則不可不分别也内傷之病脾胃元氣一虚四藏失其調和所以五臟之衇交相混見故肝弦心洪脾緩之脈反見於上按之沉澁肺衇而反見於下也身肢重倦氣不周也骨節痠疼血不榮也氣少中氣乏也心煩心血少也忽肥忽瘦者火乘土位上併陽分則血衇上行而上盛故面赤紅而肥下併隂分則血衇下行而上虛故面青白而瘦即今之虚損病人早則面青白瘦而惡寒午後則面紅赤肥而發熱者是也口沫謂口中沃沫脾不散精也食出謂食入反出胃虚不納也耳鳴聾謂耳鳴耳聾隂火上衝也胸膈不快濁氣滯也飲食無味胃氣傷也二便不調謂大便時瀉不瀉小便時利不利脾濕不分也飱謂完榖不化之飱瀉脾虚濕不化也血膿謂大便後或見膿見血脾濕熱釀成也保元謂保元湯即人參黄茋炙草升麻柴胡蒼术橘皮黄蘗也去黄蘗加木香亦名調中益氣湯以熱少氣不和者宜之也升陽益胃湯内傷升陽益胃湯濕多熱少抑清陽倦怠懶食身重痛口苦舌乾便不常灑灑惡寒屬肺病慘慘不樂乃陽傷六君白芍連澤瀉羌獨黄茋柴與防註内傷氣虚濕多熱少遏抑春生清氣不得上升脾胃之證宜服此湯其證倦怠懶食身重而痛口苦舌乾便不常謂大便不調小便頻數不如常也灑灑惡寒衞氣不足屬肺皮毛之病也慘慘不樂面色不和乃陽氣傷而不伸也六君謂人參白术茯苓炙草橘皮半夏也加白芍黄連澤㵼黄茋羌活獨活柴胡防風即是升陽益胃也補脾胃瀉隂火升陽湯補中升陽瀉隂火火多濕少困脾陽雖同升陽益胃證然無瀉數肺陽傷補脾胃氣參耆草升陽柴胡升與羌石膏芩連瀉隂火長夏濕令故加蒼註内傷氣虚熱多濕少隂火困脾陽氣不得上升脾胃之證宜服此方此方所治雖同升陽益胃之證然無大便不調小便頻數灑灑惡寒肺病慘慘不樂陽傷之證也内傷補中調中益胃等湯加減法冬加薑桂草蔲益秋芍白蔲縮㯽榔夏月氣衝芩連蘗春加風藥鼓清陽長夏沉困精神少人參麥味澤苓蒼肺熱咳𠻳減參去春加金沸款冬芳夏加麥冬五味子秋冬連根節麻黄頭痛蔓荆甚芎入巔腦藁本苦細嚐沉重懶倦或嘔逆痰厥頭疼半夏薑口乾嗌乾或表熱加葛生津清胃陽大便燥濇元明粉血燥歸桃熟大黄痞脹香砂連枳朴寒減黄連加炒薑胃痛草蔲寒益智氣滯青皮白蔲香腹痛芍草芩桂審臍下痛桂熟地黄内外煩疼歸和血脇下痛急草柴良身重脚軟已蒼蘗身疼發熱藁防羌註冬加乾薑官桂草豆蔲益智助陽氣也秋加白芍白豆蔲縮砂仁㯽榔助燥収也夏月加黄連黄芩黄蘗降隂火也或腹中氣上衝逆屬隂火衝上雖非夏月亦加之春加風藥謂𦍑活獨活防風藁本之類佐參耆之品能鼓清陽之氣上升也長夏身肢沉困精神短少加人參麥冬五味子恐暑傷氣也加澤瀉茯苓蒼术去脾濕也肺中有熱咳𠻳減人參遠肺熱也春加金沸草欵冬花散肺風也夏加麥冬五味子保肺氣也冬加連根節麻黄散肺寒也頭痛加蔓荆子引太陽也痛甚加川芎上行捷也巓痛腦痛加藁本入督衇也苦頭痛加細辛走少隂也痰厥頭痛沉重懶倦或嘔逆痰涎加半夏生薑治痰逆也口乾嗌乾或表發熱加葛根生津解肌也大便燥澁加元明粉血虚燥加當歸血實燥加桃仁熱實燥加大黄心下痞脹氣不快加木香食不消加砂仁心下結熱加黄連心下結氣加枳實胃氣壅塞加厚朴如胃中寒或冬月減去黄連加炒乾薑胃痛加草豆蔲胃寒或唾沫加益智氣滿不快加白豆蔲青皮腹痛加白芍甘草審其有熱加黄芩有寒加官桂臍下痛加肉桂熟地黄腹内身外刺痛此屬血澁不足加當歸以活血也脇下痛或急縮加甘草柴胡以和肝也身重脚軟加防己蒼术黄蘗去濕熱在内也身痛發熱加藁本防風羌活疎風在表也清暑益氣湯清燥湯長夏濕暑交相病暑多清暑益氣功汗熱煩渇倦少氣惡食尿澁便溏行補中去柴加蘗澤麥味蒼麯甘葛青濕多痿厥清燥地豬茯柴連減葛青註長夏之令暑濕炎蒸交相為病暑多濕少為病其證則自汗身熱心煩口渴倦困少氣惡食小便澁少大便稀溏宜清暑益氣湯即補中益氣湯去柴胡加黄蘗澤瀉麥冬五味子蒼术神麯甘葛青皮也若濕多暑少為病則成痿厥之證腰以下痿軟難於轉動行走不正兩足欹側宜清燥湯即本方更加生地豬苓茯苓柴胡黄連減去甘葛青皮也升陽散火湯火鬱湯血虚胃弱過食凉陽鬱於脾散火湯肌膚筋骨肢困熱捫之烙手熱非常羌獨芍防升柴葛人參二草棗生薑火鬱加葱減參獨惡寒沉數發之方註二草炙甘草生甘草惡寒謂身雖有如是烙手之熱而反惡寒衇来沉數則可知火鬱肌裏宜以此方發之白术附子湯加味理中湯内傷水来侮土病寒濕白术附子湯涎涕腹脹時多溺足軟無力痛為殃腰背胛眼脊背痛丸冷隂隂痛不常蒼附五苓陳半朴虚宜理中附苓蒼註東垣内傷熱中之病用補中益氣湯寒中之病用白术附子湯寒中為水来侮土寒濕之病其證内則腹脹多溺涎涕外則足軟胛脊腰背睪丸痛脾胃寒濕而氣不虛者宜用是方即五苓散加蒼术附子陳皮半夏厚朴也若脾胃寒濕而氣虚者則宜用理中湯加附子茯苓蒼术是也人參資生丸資生脾胃俱虛病不寒不熱平補方食少難消倒飽脹面黄肌瘦倦難當註繆仲醇製資生丸方為脾胃俱虚不寒不熱平補之藥其所治之證乃飲食減少過時不化倒飽脹悶面色痿黄肌肉漸瘦困倦無力也方見諸書故不録藥味清胃理脾湯清胃理脾治濕熱傷食平胃酌三黄大便黏穢小便赤飲食愛冷口舌瘡註清胃理脾湯即平胃散加黄連黄芩大黄也酌三黄者謂有熱滯而不實者不可入大黄也傷食謂傷食病證如痞脹噦嘔不食吞酸惡心噎氣之類更兼大便黏臭小便赤澁飲食愛冷口舌生瘡皆傷醇酒厚味濕熱為病之證也理中湯理中治虚寒濕傷食少喜熱面青黄腹痛腸鳴吐冷沫大便腥穢似鴨溏註白术附子湯治脾胃寒濕形氣實者也理中湯治脾胃寒濕形氣虚者也虚者其證食少喜食熱物面色青黄腹痛膓鳴吐冷涎沫大便腥穢不臭似鴨糞澄澈清溏也故宜此湯消食健脾丸胃强脾弱脾胃病能食不化用消食平胃炒鹽胡椒共麥蘗查麯白蒺藜註脾胃病中有胃強脾弱一證胃强所以能食脾弱不能消化宜服消食健脾湯丸助其消化用蒼术陳皮厚朴甘草炒鹽胡椒山查神麯麥芽白蒺藜末蜜丸服之更節其飲食自然脾胃和而能健運矣開胃進食湯開胃進食治不食少食難化胃脾虚丁木藿香蓮子朴六君炒麥與神麯註此方治不思飲食少食不能消化脾胃兩虚之證方即六君子湯加丁香木香藿香蓮子厚朴縮砂麥芽神麯也平胃散一切傷食脾胃病痞脹噦嘔不能食吞酸惡心並噫氣平胃蒼朴草陳皮快膈枳术痰苓半傷榖二芽縮神麯肉滯山查麫莱菔滯熱芩連蘗大宜註傷食等證宜用平胃散即蒼术厚朴甘草陳皮也快膈加枳實白术有痰加半夏茯苓傷榖滯者加麥芽榖芽縮砂神麯傷肉滯者加山查傷麫滯者加萊菔有熱者加黄芩黄連黄蘗大黄酌而用之葛花解酲湯葛花解酲發酒汗懶食熱倦嘔頭疼參葛四苓白蔲縮神麯乾薑陳木青註傷酒宜用葛花解酲湯汗之汗出立愈其證頭痛懶食嘔吐身熱倦怠而煩似乎外感而實非外感皆因酒所致也方即人參葛花白术茯苓豬苓澤瀉白蔲縮砂神麯乾薑陳皮木香青皮秘方化滯丸秘方化滯寒熱滯一切氣積痛攻方巴豆醋製稜莪术青陳連半木丁香註秘方化滯丸治不論寒熱一切氣滯積痛攻下之妙藥也即巴豆三稜莪术青皮陳皮黄連半夏木香丁香也此方出丹溪心法附餘書中屡試屢騐按證隨引量其老少虚實增損進退以意用之久久自得其效虛勞總括虛損成勞因復感陽虛外寒損肺經隂虚内熱從腎損飲食勞倦自脾成肺損皮毛灑寒𠻳心損血少月經凝脾損食少肌消瀉肝損脇痛懶於行腎損骨痿難久立午熱夜汗骨蒸蒸從下皮聚毛落死從上骨痿不起終恐懼不解則傷精怵惕思慮則傷神喜樂無極則傷魄悲哀動中則傷䰟憂愁不已則傷意盛怒不止則傷志勞倦過度則傷氣氣血骨肉筋精極註虛者隂陽氣血榮衞精神骨髓津液不足是也損者外而皮衇肉筋骨内而肺心脾肝腎消損是也成勞者謂虚損日久㽞連不愈而成五勞七傷六極也因復感者謂不足之人陽虚復感外寒則損從皮毛肺始隂虚更生内熱則損從骨髓腎始内傷飲食勞倦則損從肌肉脾始此虚損成勞之因然其證有五一損皮聚毛落灑淅惡寒咳𠻳肺勞也二損血衇虚少男子面無血色女子月經不通心勞也三損飲食減少肌肉消痩大便溏瀉脾勞也四損兩脇引胸而痛筋緩不能行肝勞也五損骨痿不能久立午後發熱盜汗骨蒸腎勞也從下腎藏損起者損至皮聚毛落則死也從上肺藏損起者損至骨痿不能起於床則終也從脾藏損起者或至皮聚毛落或至骨痿不起皆死也虚損為七傷之證一恐懼不解則傷精精傷則骨痠痿厥精時自下蓋五藏主藏精者也不可傷傷則失守而隂虚隂虚則無氣無氣則死矣一怵惕思慮則傷神神傷則恐懼自失破䐃脱肉毛悴色夭死於冬也一喜樂無極則傷魄魄傷則狂狂則意不存人皮革焦毛悴色夭死於夏也一悲哀動中則傷䰟䰟傷則狂妄不精不精則不正隂縮而攣筋兩脇骨不舉毛悴色夭死於秋也一憂愁不已則傷意意傷則悗亂四肢不舉毛悴色夭死於春也一盛怒不止則傷志志傷則喜忘其前言腰脊不可以俯仰屈伸毛悴色夭死於季夏也一勞倦過度則傷氣氣傷則火愈壯壯火則食氣故無氣以動喘乏汗出内外皆越則氣日耗氣日耗則死矣虛損為六極之證一數轉筋十指爪甲痛筋極也一牙齒動手足痛不能久立骨極也一面無血色頭髮墜落血極也一身上往往如鼠走削瘦乾黑肉極也一氣少無力身無膏澤翕翕羸瘦眼無精光立不能定身體苦痒搔之生瘡精極也一胸脇逆滿恒欲大怒氣少不能言氣極也按前人分七傷之證似多不經依内經改之庶後學易明也虛勞死證隂勞細數形盡死陽勞微革氣脱終枯白顴紅一側卧𠻳啞咽痛咯星紅五藏無胃為真藏形肉雖存不久停一息二至名曰損一息一至行尸名大骨枯槁大肉䧟動作益衰精髓空真藏未見一嵗死若見真藏尅期凶喘滿動形六月死一月内痛引肩胸身熱破䐃肉盡脱十日之内不能生真藏衇見目眶陷目不見人頃刻傾若能見人神猶持至所不勝日時終註隂虛之勞衇細數則必形消著骨而後死者隂主形也陽虚之勞衇微革則不待痿盡忽然而脱者陽主氣也五藏之衇無和緩象為無胃之真藏衇即形肉雖存亦必不久於人世也一息二至損病之衇也一息一至行尸之衇也大骨顴肩股腰之大骨也大肉頭項四肢之大肉也枯槁者骨痿不能支也陷下者肉消陷成坑也動作精神漸衰真藏衇不見期一嵗死若眞藏衇見遇所不勝之時日凶可期也若真藏衇不見有是證者喘滿動形六月而死有是證者五藏内損痛引肩胸者一月而死有是證者肉盡之處皆枯燥破裂謂之破䐃身熱不已十日内死真藏衇見目眶下陷視不見人頃刻而死若能見人則神尚未去至所不勝之日時而死也虚勞治法後天之治本血氣先天之治法隂陽腎肝心肺治在後脾損之法同内傷註後天脾胃水榖生化榮衞故治法本乎氣血先天腎藏精氣生化之原故治法本乎隂陽五藏虚損治法俱在於後而脾藏虚損治法已載内傷故曰同内傷也拯隂理勞湯隂虚火動用拯隂皮寒骨蒸咳𠻳侵食少痰多煩少氣生衇歸芍地板貞薏苡橘丹連合草汗多不寐加棗仁燥痰桑貝濕苓半阿膠咳血骨熱深註此方即人參麥冬五味當歸白芍生地龜板女貞薏苡橘紅丹皮蓮子百合炙草也汗多不寐俱加棗仁咳而𠻳痰加桑皮貝母𠻳而濕痰加茯苓半夏咳𠻳咯血加阿膠骨蒸熱深加地骨皮也極陽理勞湯陽虛氣弱用拯陽倦怠惡煩勞則張表熱自汗身痠痛減去升柴補中方更添桂味寒加附瀉入升柴訶蔲香夏咳減桂加麥味冬咳不減味乾薑註此湯即人參黄耆炙草白术陳皮肉桂當歸五味子也倦怠懶於動也惡煩勞動則氣張而喘乏也惡寒加附子洩瀉仍入升麻柴胡更加訶子肉蔲木香也夏月咳𠻳減肉桂加麥冬五味子冬月咳𠻳不減肉桂更加五味子乾薑也六味地黄湯都氣湯七味地黄湯生衇地黄湯桂附地黄湯知蘗地黄湯金匱腎氣湯腎虛午熱形消瘦水泛為痰津液傷咳𠻳盜汗失精血消渇淋濁口咽瘡熟地藥萸丹苓澤加味勞𠻳都氣湯引火歸元加肉桂火妄刑金生衇良桂附益火消隂翳知蘗壯水制陽光車牛桂附名腎氣陽虚水腫淋濁方註午熱午後發熱也水泛為痰謂日食飲食所化津液腎虚不能攝水泛上為痰也盜汗謂睡而汗出覺而即止之汗也失精遺精也消渴謂飲水而即消渴仍不止也淋者尿淋漓不利也濁者尿之前後有濁液也口咽生瘡虚火炎也均宜六味地黄湯治之勞𠻳加味謂加五味子名都氣湯也引火歸元加肉桂名七味地黄湯火妄刑金加生衇飲名生衇地黄湯也桂附謂加肉桂附子知蘗謂加知母黄蘗車牛桂附謂加車前牛膝肉桂附子名桂附知蘗腎氣等湯也大補隂丸滋隂降火湯大補隂丸制壯火滋陰降火救傷金龜板知蘗地髓劑二冬歸芍草砂仁欬加百味汗地骨血痰金貝虚耆參虛熱無汗宜散火有汗骨蒸亦補隂註隂虚火旺無水以制宜用大補隂丸滋水制火方即龜板知母黄蘗生地為末豬脊髓煉蜜為丸若火旺無制妄行傷金肺痿欬𠻳宜用滋隂降火湯救其傷金方即大補隂丸加麥冬天冬當歸白芍炙草縮砂欬甚加百合五味子盜汗加地骨皮咯血加鬱金痰多加川貝母氣虚加人參黄耆凡虚熱如火烙手無汗者為火鬱宜升陽散火湯有汗者為骨蒸亦宜大補隂丸及滋隂六黄等湯也保元湯一切氣虚保元湯耆外參内草中央加桂能生命門氣痘瘡灰陷與清漿註保元湯即人參黄耆炙草也黄耆補表氣人參補裏氣炙草補中氣加肉桂能生命門真氣且能治小兒痘瘡灰白頂陷清漿四君子湯五味異功湯六君子湯七味白术湯四獸飲脾胃氣虛四君子衇軟形衰面白黄倦怠懶言食少氣參苓术草棗薑強氣滯加陳異功散有痰橘半六君湯肌熱㵼渴藿木葛虛瘧六君果梅薑註治氣虛兼氣滯不快依四君加陳皮名五味異功散治氣虚兼有痰飲依四君加橘紅半夏名六君子湯治氣虚肌熱渴瀉依本方加藿香木香葛根名七味白术散治氣虚久瘧留連不愈依六君子湯加草菓烏梅生薑名四獸飲芎歸湯開骨散一切血病芎歸湯産後胎前必用方氣虚難産參倍入交骨難開龜髮良註芎歸湯即川芎當歸又名佛手散氣虚産難或時久傷氣依本方倍加人參臨産交骨難開依本方加整龜板一具本人梳下亂髪一團他人梳下之髪亦可名開骨散四物湯聖愈湯六物湯加味四物湯地骨皮飲調肝養血宜四物歸芎芍地酌相應氣虚血少參耆補氣燥血熱知蘖清寒熱柴丹炒梔子但熱無寒丹骨平熱甚芩連寒桂附止血茅蒲破桃紅註調肝養血宜四物湯即當歸川芎白芍熟地黄酌相應謂補血用白芍熟地破血用赤芍凉血用生地氣虚血少宜加參耆名聖愈湯氣燥血熱宜加知蘗名六物湯血虚寒熱往來宜加味四物湯即本方加柴胡丹皮炒梔子也血虚惟發熱不惡寒宜地骨皮飲即本方加地骨皮牡丹皮也血分熱甚依本方加黄芩黄連寒甚加肉桂附子破血加桃仁紅花止血加茅根蒲黄炒黑八珍湯十全大補湯人參養榮湯一切氣血兩虚證八珍四物與四君氣乏色枯毛髮落自汗盜汗悸忘臻發熱欬𠻳吐衂血食少肌痩泄瀉頻十全大補加耆桂榮去芎加遠味陳註氣虚四君子湯血虚四物湯氣血兩虚八珍湯八珍者即四君四物也若有氣乏色枯毛髮脱落自汗盜汗心悸徤忘發熱欬𠻳吐血衄血食少肌瘦泄瀉等證則宜十全大補湯即八珍湯加黄耆肉桂也人參養榮湯即十全大補湯減去川芎更加遠志五味子陳皮也小建中湯黄耆建中湯當歸建中湯䨇和飲虚勞腹痛小建中悸衄之血夢失精手足煩熱肢酸痛芍草飴桂棗薑同衞虚加耆黄耆建榮虚當歸建中名温養氣血雙和飲三方減飴加地芎註諸虚勞極裏急腹痛宜以小建中湯温和脾胃並治裏虛心悸衄下亡血夜夢失精手足煩熱四肢痠痛血液虧損等證是方白芍藥甘草飴糖中桂大棗生薑也若衛氣虚者加黄耆名曰黄耆建中湯若裏不急腹不痛有是證者則當以温養氣血用雙和飲即此三方減去飴糖加入熟地川芎乃八珍湯減人參白术茯苓加黄耆中桂盖以補隂血為主也補肝湯補肝湯治肝虚損筋緩不能自収持目暗䀮䀮無所見四物酸棗草𤓰宜註補肝湯即當歸川芎白芍熟地酸棗仁炙草木𤓰也加味救肺飲加味救肺治肺損𠻳血金家被火刑歸芍麥味參耆草百花紫菀馬兠鈴註加味救肺飲即當歸白芍麥冬五味子人參黄耆炙草百合欵冬花紫菀馬兠鈴也天王補心丹天王補心心虚損健忘神虚煩不眠栢子味苓歸地桔三參天麥遠硃酸註是方即栢子仁五味子茯苓當歸生地桔梗丹參人參元參天冬麥冬遠志硃砂酸棗仁歸脾湯歸脾思慮傷心脾熱煩盜汗悸驚俱健忘怔忡時恍惚四君酸遠木歸耆註悸心自跳動也驚目觸物駭也健忘言事易忘也怔忡心衝動甚也恍惚心時不明也方乃四君子加酸棗仁遠志木香當歸黄耆人參固本湯丸保元生衇固本湯固本肺腎兩虚病肺痿欬血欲成勞二冬二地人參共保元生衇脾同調註人參固本湯丸即人參天冬麥冬生地熟地也依本方冄加保元之黄耆炙草生衇之五味三方合一名保元生衇固本湯同調謂同調脾肺腎三經虚也逍遥散逍遥理脾而清肝血虚骨蒸煩𠻳痰寒熱頰赤脇不快婦人經病衇虚弦术苓歸芍柴薄草加味梔丹肝熱添肝氣滯鬱陳撫附熱加呉萸炒黄連註是方即白术茯苓當歸白芍柴胡薄荷甘草也肝氣熱依本方加炒梔子丹皮名加味逍遥散肝氣滯加陳皮肝氣鬱加撫芎香附肝氣鬱熱加呉茱萸炒川黄連惟薄荷只可少許為引不宜多用癆瘵總括癆瘵隂虚蟲乾血積熱骨蒸欬𠻳痰肌膚甲錯目黯黑始健不瀉下為先註久病癆疾而名曰瘵瘵者敗也氣血兩敗之意也有隂虛乾血者有隂虚積熱者當以諸補隂藥治之肌膚甲錯謂皮膚乾澁也目黯黑者謂目黑無光也始健謂初病尚壯不瀉謂久病不瀉也二者皆可以攻下為先治也癆瘵治法癆瘵至瀉則必死不瀉能食尚可痊初取利後宜詳審次服柴胡清骨煎虚用黄耆鼈甲散熱衰大補養榮叅皮熱柴胡胡連入骨蒸青蒿鼈甲添隂虛補隂諸丸劑陽虛補陽等湯圓欬𠻳自同欬𠻳治𠻳血成方太平丸註癆瘵之人病至大便泄瀉則必死矣若不瀉能食尚堪任藥攻治故可痊也初取利後審其熱之微甚人之強弱若熱甚人强宜用柴胡清骨散熱不甚人弱宜用黄耆鼈甲散熱微人弱宜用十全大補人參養榮等湯若皮外發熱加柴胡胡連骨内蒸熱加青蒿鼈甲午後隂虚發熱宜用補隂諸丸湯藥陽虛惡寒清瘦宜用補陽諸丸湯藥欬𠻳不已同欬門方叅而治之𠻳血者宜用成方太平丸可也大黄䗪蟲丸大黄青蒿煎傳屍将軍丸乾血大黄䗪蟲治積熱蒿黄膽便煎癸亥腰眼灸七壮後服傳屍将軍丸註大黄䗪蟲丸有成方大黄青蒿煎即青蒿大黄豬膽汁童便煎癆瘵日久有生惡蟲身死之後多遭傳染甚而滅門名曰傳屍癆宜癸亥日灸兩腰眼各七壮後服傳屍将軍丸此方載丹溪心法書中柴胡清骨散清骨骨蒸久不痊熱甚秦知草胡連鼈甲青蒿柴地骨韭白髓膽童便煎註此方乃秦艽知母炙草胡連鼈甲青蒿柴胡地骨皮韭白豬脊髓豬膽汁童便也黄耆鼈甲散黄耆鼈甲虚勞熱骨蒸晡熱渴而煩肌肉消痩食減少盗汗欬𠻳出血痰生地赤芍柴秦草知耆菀骨半苓煎人參桂桔俱減半鼈甲天冬桑倍添註此方即生地赤芍柴胡秦艽炙草知母黄耆紫菀地骨皮半夏茯苓人參桂枝桔梗鼈甲天冬桑白皮也自汗盜汗總括自汗表陽虚惡冷陽實蒸熱汗津津盜汗隂虚分心腎心虚不固火傷隂註無因汗出謂之自汗自汗謂表陽虚汗出則惡寒冷宜用後方若蒸蒸發熱汗出不惡寒則為裏陽實宜以調胃承氣湯下之睡則汗出覺則汗止謂之盜汗盜汗為隂虛當分心虚不固心火傷隂也黄耆六一湯玉屏風散黄耆建中湯自汗表虛黄耆草玉屏風散术耆防氣虚加參陽虛附血虛黄耆建中湯註黄耆六一湯即黄耆六錢甘草一錢也玉屏風散即黄耆白术防風也二方皆治表虚自汗若氣虚加人參陽虛加附子可也若不惡寒不氣少則為血虛不可用參附宜黄耆建中湯即小建中湯加黄耆也方在傷寒門當歸六黄湯酸棗仁湯盜汗心火下傷隂歸耆二地蘗連芩心虚酸棗芍歸地知蘗苓耆五味參註當歸六黄湯治心火傷隂盜汗即當歸黄耆黄芩黄連黄蘗生熟地黄也酸棗仁湯治心虛不固盜汗即酸棗仁當歸白芍生地知母黄蘗茯苓黄耆五味子人參也失血總括九竅出血名大衄鼻出鼻衄腦如泉耳目出血耳目衄膚出肌衄齒牙宣内衄𠻳涎脾唾腎咯心欬肺嘔屬肝精竅溺血膀胱淋便血大腸吐胃間註九竅一齊出血名曰大衄鼻出血曰鼻衄鼻出血如泉曰腦衄耳出血曰耳衄目出血曰目衄皮膚出血曰肌衄齒牙出血曰齒衄又名牙宣此皆衄血隨所患處而命名也若從口出則為内衄内衄出血涎𠻳出於脾唾出扵腎咯出於心欬出於肺嘔出於肝吐出於胃溺血從精竅而出淋血從膀胱而出嘔吐之分嘔則有上逆漉漉之聲吐則無聲也失血死證失血身凉衇小順大疾身熱卧難凶口鼻湧出而不止大下潰腐命多傾註大疾衇大疾也卧難不能卧也大衄大下血出如湧泉不止内潰腐屍之氣則命傾也失血治法陽乘隂熱血妄行血犯氣分不歸經血病及府滲入濁由来藏病溢出清熱傷失血宜清熱勞傷理損自然平努即内傷初破逐久與勞傷治法同註凡失血之證陽盛乘隂則血為熱廹血不能安於衇中而妄行氣分不能回歸經衇也若血病傷及於府者則血滲入腸胃濁道上從咽出下從二便而出也血病傷及於藏者則血溢出胸中清道上從喉出下從精竅而出也夫血藏於藏内行於衇中軀殻之中不可得而見也非有損傷不能為病而損傷之道有三一曰熱傷宜以清熱為主一曰勞傷宜以理損為主一曰努傷初宜以破逐為主久亦宜以理損為主也犀角地黄湯熱傷一切失血病犀角地黄芍牡丹胸膈滿痛加桃大熱甚吐衄入芩連因怒嘔血柴梔炒唾血元參知蘗煎咯加二冬𠻳二母涎壅促𠻳鬱金丸註熱傷一切失血之病皆宜犀角地黄湯若胸膈滿痛是為瘀血加桃仁大黄若吐血熱盛加黄芩黄連因怒致吐血及嘔血者加柴胡炒梔唾血加元參黄蘗知母咯血加天冬麥冬𠻳血加知母貝母涎壅氣促陣陣急𠻳帶出血者宜鬱金丸方在後加味救肺飲加鬱金湯勞傷吐血救肺飲𠻳血加調鬱金湯形衰無熱氣血弱人參養榮加麥良註救肺飲即虛勞門之加味救肺飲加調鬱金末也若氣血虛弱不見火象宜用人參養榮湯加麥門冬也芎歸湯飽食用力或持重努破衇絡血歸芎嘔血漉漉聲上逆跌撲墮打有瘀行註飽食用力或因持重努傷衇絡失血湧吐宜用芎歸飲引血歸經及嘔血跌撲墮打傷其衇絡令人大吐者亦皆宜之其有瘀血者或加大黄以下之或加桃仁紅花以破之或加鬱金黄酒以行之參地煎參地衂吐血不已熱隨血減氣隨亡氣虚人參為君主血熱為君生地黄註參地煎即人參生地黄也凡因熱傷衂吐血不已者則熱已隨血減然氣亦隨血亡也氣虚甚者當倍人參為君血熱者宜倍生地為君時時煎服自止也瀉肺丸𠻳血壅逆虛蘇子積熱痰黄瀉肺丸蔞仁半貝金葶杏三黄惟大有除添註𠻳血痰壅氣逆形氣虚者蘇子降氣湯降之方見諸氣門痰黄積熱形氣實者用瀉肺丸下之即栝蔞仁半夏浙貝母鬱金苦葶藶子杏仁黄連黄芩大黄也惟大黄形氣實者加之若形氣虚者或大便溏瀉則減去不用保肺湯保肺肺癰吐膿血白芨薏苡貝金陳苦梗苦葶甘草節初加防風潰耆參註保肺湯即白芨薏苡仁貝母金銀花陳皮苦桔梗苦葶藶甘草節也初起加防風潰後加生黄耆人參牛膝四物湯尿血同出痛淋血尿血分出溺血名溺血精竅牛四物淋血八正地金通註淋血溺血二證若尿與血同出而痛名曰淋血尿與血分出名曰溺血溺血為精竅之病用四物倍加牛膝淋血為尿竅之病用八正散加木通生地鬱金治之珀珠散溺血諸藥而不效塊血竅滯莖急疼珀珠六一硃砂共引煎一兩整木通註溺血一證乃精竅為病每因忍精不泄提氣採戰或因老年竭慾而成服諸藥不效者所溺之血成塊竅滯不利莖中急疼欲死者用珀珠散日三服每服三錢引用整木通去粗皮黄色者煎湯調服其方即琥珀末一錢珍珠末五分硃砂末五分飛滑石六錢甘草末一錢合均分三服若其人大便結燥不通以八正散加牛膝鬱金下之有熱尿澁以導赤散加牛膝鬱金清之利後仍服此藥自有奇功槐花散便血内熱傷隂絡風合腸風濕藏瘍槐花側枳連炒穂風加秦防濕楝蒼註便血二證腸風臟毒其本皆熱傷隂絡熱與風合為腸風下血多清熱與濕合為臟毒下血多濁均宜槐花散即炒槐花炒側栢葉醋炒枳殻川黄連炒荆芥穗為末烏梅湯調服腸風加秦艽防風臟毒加炒苦楝炒蒼术若大腫大痛大便不通當以臟毒未潰之瘍治之非臟毒下血之病也升陽去濕和血湯便血日久涼不應升補升耆蒼桂秦歸芍丹陳二地草熱加萸連虛人參註便血日久服凉藥不應宜升補用升陽去濕和血湯即升麻黄耆蒼术肉桂秦艽當歸白芍丹皮陳皮生地熟地生甘草炙甘草也有熱稍加呉茱萸炒川連虚加人參可也消渴總括試觀年老多夜溺休信三消盡熱乾飲多尿少渾赤熱飲少尿多清白寒註上消屬肺飲水多而小便如常中消屬胃飲水多而小便短赤下消屬腎飲水多而小便渾濁三消皆燥熱病也然試觀年老好飲茶者夜必多溺則休信三消皆熱而亦有寒者矣飲水多小便少而渾赤者屬熱是火盛耗水而渾也飲水少小便多而清白者屬寒是火虚不能耗水也消渴生死三消便鞕若能食衇大實强尚可醫不食舌白傳腫瀉熱多舌紫發癰疽註三消飲水多不能食若能食大便鞕衇大强實者為胃實熱下之尚可醫也若不能食濕多舌白滑者病久則傳變水腫泄瀉熱多舌紫乾者病久則發癰疽而死也消渴治法竹葉黄耆湯便鞕能食衇大强調胃金花斟酌當不食渴瀉白术散竹葉黄耆不瀉方黄耆黄芩合四物竹葉石膏減粳薑氣虚胃熱參白虎飲一溲二腎氣湯註調胃謂調胃承氣湯金花謂梔子金花湯方俱在傷寒門酌其所當用可也不食而渴已屬胃虚兼之泄瀉胃虛無熱矣故用七味白术散方在虚損門若不食而渴亦不瀉者是雖虚而猶有燥熱也宜用竹葉黄耆湯即黄耆黄芩當歸川芎白芍生地竹葉石膏人參炙草麥冬半夏也若氣虛胃熱盛者宜用人參白虎湯若下焦虛寒飲一溲二者宜用腎氣湯御纂醫宗金鑑卷四十
