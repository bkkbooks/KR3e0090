  text: 編輯婦科心法要訣目録胎前諸證門胎前總括惡阻總括惡阻證治保生湯加味六君湯加味溫膽湯胞阻證治加味平胃散延胡四物湯加味膠艾四物湯蜜消湯膠艾四物湯加味芎歸飲導赤散五苓散子腫子氣子滿脆腳皺腳證治茯苓導水湯子煩證治知母飲子懸胎上逼心證治紫蘇飲子癎證治羚羊角散鈎藤湯子嗽證治枳桔二陳湯桔梗湯轉胞證治舉胎四物湯阿膠五苓散子淋證治加味五淋散激經胎漏尿血總括激經胎漏尿血證治阿膠湯黃耆湯銀苧酒加味四物湯胎不安小産墮胎總括胎不安小産墮胎證治加味聖愈湯加味佛手散十聖散加味芎藭湯益母丸墮胎下血不止證治瘀血不出證治獨參湯回生丹子死腹中證治佛手散平胃散辨子母存亡胎兼癥瘕胎不長證治子瘖證治子啼腹內鐘鳴證治黃連煎藏燥證治甘麥大棗湯鬼胎總括腸覃石瘕證治香棱丸胎前母子盛衰御纂醫宗金鑑卷四十六目録欽定四庫全書御纂醫宗金鑑卷四十六編輯婦科心法要訣目録胎前諸證門胎前總括惡阻總括惡阻證治保生湯加味六君湯加味溫膽湯胞阻證治加味平胃散延胡四物湯加味膠艾四物湯蜜消湯膠艾四物湯加味芎歸飲導赤散五苓散子腫子氣子滿脆腳皺腳證治茯苓導水湯子煩證治知母飲子懸胎上逼心證治紫蘇飲子癎證治羚羊角散鈎藤湯子嗽證治枳桔二陳湯桔梗湯轉胞證治舉胎四物湯阿膠五苓散子淋證治加味五淋散激經胎漏尿血總括激經胎漏尿血證治阿膠湯黃耆湯銀苧酒加味四物湯胎不安小産墮胎總括胎不安小産墮胎證治加味聖愈湯加味佛手散十聖散加味芎藭湯益母丸墮胎下血不止證治瘀血不出證治獨參湯回生丹子死腹中證治佛手散平胃散辨子母存亡胎兼癥瘕胎不長證治子瘖證治子啼腹內鐘鳴證治黃連煎藏燥證治甘麥大棗湯鬼胎總括腸覃石瘕證治香棱丸胎前母子盛衰御纂醫宗金鑑卷四十六目録欽定四庫全書御纂醫宗金鑑卷四十六編輯婦科心法要訣胎前諸證門胎前總括妊娠胎前病惡阻胞阻腫滿氣煩懸癎嗽轉胞與子淋激經胎漏胎不安小産死胎胎不長子瘖臟燥鬼胎連餘病當參雜證治須知刻刻顧胎原注此言妊娠胎前有惡阻胞阻子腫子滿子煩子懸子癎子嗽轉胞子淋激經胎漏胎動不安小産墮胎子死腹中胎姜不長子瘖臟燥鬼胎等證皆當一一詳辨熟記其餘胎前傷寒傷食瘧痢霍亂泄㵼當於雜證門中參考治之但須時刻保護胎原不致誤犯為要也惡阻總括惡心嘔吐名惡阻擇食任意過期安重者須藥主胃弱更分胎逆痰熱寒注婦人受孕月餘之後時時嘔吐者名曰惡阻若無他病擇食者須隨其意而與之輕者過期自然勿藥而愈重者須以藥治之當以胃弱為主更審其或因胎氣阻逆或痰飲阻逆與夫兼熱兼寒而分治之惡阻證治保生湯胎氣阻逆惟嘔吐無他兼證保生湯砂术香附烏陳草量加參枳引生薑注惡阻有因胎氣阻逆者乃受胎後胞門閉塞藏氣內阻挾胎氣上逆於胃故令惡心嘔吐也若平素胃虛所致雖無痰飲寒熱相兼而亦有惡阻證者宜用保生湯即砂仁白术香附烏藥陳皮甘草也引用生薑者以止其嘔也若氣弱者量加人參氣實者量加枳殼加味六君湯痰飲惡阻吐痰水煩眩加味六君湯枇杷藿香旋縮枳熱祕芩軍寒桂薑注惡阻因於痰飲者其吐必多痰水且心煩頭目眩暈必其人平素胃虛中停痰飲也宜用加味六君湯於六君湯內加枇杷葉藿香旋覆花縮砂枳殼若胃熱便祕加黃芩大黃以利之胃寒喜熱加肉桂乾薑以溫之六君湯方見首卷加味溫膽湯熱阻惡食喜凉漿心煩憒悶溫膽湯橘半茯甘與枳竹更加芩連蘆麥薑注惡阻因於胃熱者必嘔吐心中熱煩憒悶喜飲凉漿也宜用加味溫膽湯其方即陳皮半夏茯芩甘草枳實竹茹名溫膽湯更加黃芩黃連蘆根麥門冬引生薑也胞阻總括妊娠腹痛名胞阻須審心腹少腹間傷食心胃胎腰腹少腹胞寒水尿難注孕婦腹痛名為胞阻須審其痛或上在心腹之間者多屬食滯作痛或下在腰腹之間者多屬胎氣不安作痛若在少腹之間者則必因胞血受寒或停水尿難作痛也胞阻證治加味平胃散延胡四物湯心胃痛多傷食滯蒼朴陳甘果枳麯便祕加軍倍甘草胎動延胡四物宜注孕婦心胃作痛者多因傷食停滯宜平胃散即陳皮厚朴蒼术甘草也加草果枳殼神麯以消之若更大便祕結日久則加消黃以攻之然必倍甘草以緩其峻性庶不傷胎若腰腹作痛胎動下血則當用四物湯君以延胡以定痛而保胎也四物湯方見首卷加味膠艾四物湯蜜消湯腹腰痛甚防胎墮膠艾四物杜酒葱外邪宜加羌獨活內熱便祕蜜消攻注胞蒂繫於腰凡腹腰痛者須防胎墮宜用膠艾四物湯加杜仲大豆淋酒葱白以定痛而保胎若因外感風寒之邪則加羌活獨活以散之若內熱大小便閉者則用蜂蜜芒消煎湯以攻之經曰有故無隕是也膠艾四物湯方見首卷加味芎歸飲導赤散五苓散胞血受寒少腹疼參吳膠艾草歸芎尿澀熱甚導赤散木通生地甘草靈水盛陽虛五苓效术澤肉桂茯豬苓注少腹作痛者乃胞中之血受寒也宜加味芎歸飲溫之其方即人參吳茱茰阿膠蘄艾炙甘草當歸川芎也若因尿澀而痛則是膀胱水病熱甚則以導赤散清利之其方即生地木通甘草也若水盛陽虛不化則以五苓散滲利之其方即茯苓白术澤瀉豬苓肉桂也子腫子氣子滿脆腳皺腳總括頭面四肢腫子腫自膝至足子氣名腫脹喘滿曰子滿但腳腫者脆皺稱注頭面遍身浮腫小水短少者屬水氣為病故名曰子腫自膝至足腫小水長者屬濕氣為病故名曰子氣遍身俱腫腹脹而喘在六七個月時者名曰子滿但兩腳腫而膚厚者屬濕名曰皺腳皮薄者屬水名曰脆腳大凡水之為病多喘促氣之為病多脹滿喘促屬肺脹滿屬脾也以其人素有水氣濕邪故受孕有腫滿之證兒未成形被水浸漬其胎每致損壞成形尚可調治故在五六月後有是證者多有生育者也子腫子氣子滿脆腳皺腳證治茯苓導水湯妊娠腫滿與子氣水氣濕邪脾肺間水氣浸胎喘難卧濕氣傷胎脹難堪均宜茯苓導水治香瓜檳腹四苓攢桑砂蘇陳脹加枳腿腳防己喘葶添注妊娠水腫脹滿子氣皺腳脆腳等證皆由水氣濕邪傷於脾肺為病也若水氣盛而浸胎則必喘而難卧若濕氣盛而傷胎則脹滿難堪皆宜用茯苓導水湯治之方用木香木瓜檳榔大腹皮白术茯苓豬苓澤㵼桑皮砂仁蘇葉陳皮以和脾肺而利水濕脹甚者加枳殼以破結腿腳腫者加防己以利下濕喘者加苦葶藶以泄上水也子煩證治知母飲孕婦時煩名子煩胎熱乘心知母痊子芩知麥苓耆草犀熱參虛膏渴煎注孕婦别無他證惟時時心煩者名曰子煩由胎中鬱熱上乘於心也宜用知母飲即子苓知母麥冬茯苓黃耆甘草熱甚者加犀角氣虛加人參口渴加石膏煎服子懸胎上逼心證治紫蘇飲胸膈脹滿子懸名喘甚由胎上逼心紫蘇飲用歸芎芍陳腹蘇甘虛入參注孕婦胸膈脹滿名曰子懸更加喘甚者名曰胎上逼心俱宜紫蘇飲即當歸川芎白芍陳皮大腹皮蘇梗葉甘草虛者加人參煎服子癎證治羚羊角散鈎藤湯暴仆抽搐不識人須臾自醒子癎名羚羊角散防獨杏五加棗草薏苡仁茯苓木香羚羊角抽搐鈎藤湯寄生人參茯神歸桔梗口喎肢廢中風成注孕婦忽然顛仆抽搐不省人事須臾自醒少頃復如好人謂之子癎乃肝心二經風熱所致宜用羚羊角散即防風獨活杏仁酸棗仁五加皮甘草薏苡仁茯苓木香羚羊角也抽搐甚者用鈎藤湯乃鈎藤桑寄生人參茯神當婦桔梗也若口眼喎斜半身不遂則已成中風廢證當參風門治之子嗽證治枳桔二陳湯桔梗湯妊娠咳嗽名子嗽隂虛痰飲感風寒痰飲二陳加枳桔風寒桔梗湯可安紫蘇桔梗麻桑杏赤苓天冬合貝前久嗽隂虛宜清潤麥味地黃湯自痊注妊娠咳嗽謂之子嗽嗽久每致傷胎有隂虛火動痰飲上逆有感冒風寒之不同因痰飲者用二陳湯加枳殼桔梗治之因感冒風寒者用桔梗湯即紫蘇葉桔梗麻黃桑白皮杏仁赤茯苓天冬百合川貝母前胡也若久嗽屬隂虛宜滋隂潤肺以清潤之用麥味地黃湯治之六味地黃湯方見首卷轉胞證治舉胎四物湯阿膠五苓散飲食如常煩不卧不得小便轉胞稱舉胎救急丹溪法四物升麻參术陳服後探吐吐再服不應阿膠入五苓注妊娠胎壓胞系了戾不得小便飲食如常心煩不得卧者名曰轉胞宜用丹溪舉胎法令穩婆香油塗手舉胎起則尿自出以暫救其急然後以四物湯加升麻人參白术陳皮煎服服後以指探吐吐後再服再吐如此三四次則胎舉而小便利矣如不應則是有飲用五苓散加阿膠以清利之四物湯方見首卷子淋證治加味五淋散子淋頻濁窘澀疼五淋梔苓歸芍芩甘草再加生地澤車前滑石木通尋注孕婦小便頻數窘澀㸃滴疼痛名曰子淋宜五淋散即黑梔赤茯苓當歸白芍黃芩甘草加生地澤㵼車前子滑石木通以清熱而利水則小便自通矣激經胎漏尿血總括妊娠經來名激經胎漏下血腹不疼若是傷胎腹必痛尿血漏血要分明注婦人受孕之後仍復行經者名曰激經為血有餘若孕婦無故下血或下黃汁豆汁而腹不痛者謂之胎漏若其胎已傷而下血者其腹必疼孕婦又有尿血一證腹亦不痛然與胎漏之證又不同蓋尿血出於溺孔漏血出自人門三者俱下血而各不同治者不可不詳辨也激經胎漏尿血證治阿膠湯黃耆湯銀苧酒加味四物湯激經無病不須治子大能食經自停胎漏下血多因熱四物阿膠梔側芩或下黃汁豆汁樣黃耆糯米苧根銀若是尿血膀胱熱四物血餘共茅根注激經無他證相兼者不須用藥其胎壯子大能食其血而經自停若胎漏下血多屬血熱宜阿膠湯清之其方即四物湯加阿膠黑梔側柏葉黃芩也或漏下黃汁或如豆汁甚多者其胎乾枯必倚而墮宜用黃耆湯即黃耆二兩糯米一合煎服或銀苧酒即苧麻根紋銀煎酒服若尿血則是膀胱血熱宜四物湯加血餘白茅根以凉之四物湯方見首卷胎不安小産墮胎總括血氣充實胎自安衝任虛弱損胎原暴怒房勞傷肝腎疾病相干跌朴顛五月成形名小産未成形象墮胎言無故至期數小産須慎胎為欲火煎注孕婦氣血充足形體壯實則胎氣安固若衝任二經虛損則胎不成實或因暴怒傷肝房勞傷腎則胎氣不固易致不安或受孕之後患生他疾干犯胎氣致胎不安者亦有之或因跌撲築磕從髙墜下以致傷胎墮胎者亦有之然小産墮胎亦自有别五七月已成形象者名為小産三月未成形象者謂之墮胎以上小産墮胎皆出有因若懷胎三五七月無故而胎自墮至下次受孕亦復如是數數墮胎則謂之滑胎多因房勞太過欲火煎熬其胎因而不安不可不慎者也胎不安小産墮胎證治加味聖愈湯加味佛手散十聖散加味芎藭湯益母丸胎傷腹痛血未下聖愈湯加杜續砂下血腹痛佛手散膠艾杜續术芩加十全續縮減苓桂因病傷胎十聖誇跌撲芎藭調益母怒勞逍遙地黃佳注妊娠胎傷若腹痛不下血者宜用聖愈湯加杜仲續斷砂仁安之若下血腹痛者宜用佛手散加阿膠蘄艾杜仲續斷白术條芩安之若因母病以致傷胎欲墮者宜十聖散即十全大補湯減茯苓肉桂加續斷砂仁若因跌撲築磕傷胎欲墮者宜芎藭湯調益母丸服之芎藭湯即川芎當歸也若暴怒房勞傷肝腎以致胎動不安者宜逍遙散地黃湯治之聖愈湯佛手散逍遙散地黃湯方俱見首卷墮胎下血不止血瘀不出證治獨參湯回生丹墮胎暴下血不止面黃唇白獨參湯惡血不出凝脹痛回生益母酌相當注妊娠胎墮後血暴下不止面黃唇白者名脫榮宜用獨參湯峻補其氣以生其血所謂無形能生有形也若惡血瘀滯不行腹脅脹痛者宜於回生丹益母丸酌其虛實緩急相當而用之回生丹見産後彚方子死腹中總括子死腹中須急下舌青腹痛冷如氷時久口中穢氣出寒熱峻緩詳斟平注凡一應傷胎子死腹中者須當急下勿使上奔心胸然必驗其舌青面赤肚腹脹大腹冷如氷久之口中有穢氣出者方可議下然猶必審其人之虛實寒熱或宜寒下熱下峻下緩下隨其宜而施之子死腹中證治佛手散平胃散加芒消方下胎緩劑佛手散峻劑平胃加芒消宜熱宜寒須細審産婦虛實莫溷淆注孕婦子死腹中宜下者緩下用佛手散峻下用平胃散加芒消或宜寒下或宜熱下須細細詳審而投之蓋以産母之虛實或緩或峻不可溷淆輕率以致誤也佛手散方見首卷辨子母存亡妊娠一切垂危候母子存亡可預推面赤舌青必子死面青舌赤母命危面舌俱青口吐沫子母俱亡二命虧注凡妊娠一切凶危之候欲知母子存亡者當於孕婦面舌之色定之若面赤舌青則其子必死面青舌赤則其母必亡若面舌二者俱見青色口角兩邉流涎沫者則子母二命俱不能保也胎兼癥瘕妊娠有病當攻下衰其大半而止之經云有故而無殞與病適當又何疑注凡孕婦素有癥瘕舊疾或有新病應攻下者但攻其大半餘俟其自消不可盡攻經云有故無殞言藥雖峻有病則病受之不能傷胎也攻其大半與病相當又何疑於有妊必不可攻之說耶胎不長證治八珍湯六君子湯胎萎不長失滋飬氣血不足宜八珍脾虛胃弱六君子榖化精微氣血生注妊娠五六個月胎萎不長由於妊母禀賦虛弱若屬氣血兩虛者宜用八珍湯若脾虛胃弱者宜用六君子湯但使飲食強壯俾水榖運化精微則氣血日生而胎自長矣八珍湯六君子湯方俱見首卷子瘖證治子瘖聲啞細無音非謂絶然無語聲九月胎盛阻其衇分娩之後自然通注妊娠九月孕婦聲音細啞不響謂之子瘖非似子啞絶然無語也蓋少隂之衇絡於舌本九月腎衇飬胎至其時胎盛阻遏其衇不能上至舌本故聲音細啞待分娩之後腎衇上通其音自出矣子啼腹內鐘鳴證治黃連煎腹內鐘鳴與兒哭子啼之證出偶然空房鼠穴土能治黃連煎湯亦可捐注孕婦腹內有鐘聲或嬰兒在內啼哭者名曰子啼古書雖載其證然不經見或偶然有之古方用空房中鼠穴土同川黃連煎湯名黃連煎飲之自愈臟燥證治甘麥大棗湯臟燥無故自悲傷象若神靈大棗湯甘草小麥與大棗方出金匱效非常注孕婦無故時時傷悲哀痛象若神靈慿依者名曰臟燥宜用金匱甘麥大棗湯服之其方即甘草小麥大棗三味煎服其效非常也鬼胎總括邪思情感鬼胎生腹大如同懷子形豈緣鬼神能交接自身血氣結而成注鬼胎者因其人思想不遂情志相感自身氣血凝結而成其腹漸大如懷子形狀古云實有鬼神交接其說似屬無據婦人石瘕腸覃二證亦俱如懷孕之狀由氣血凝結而成則可知其必無是理矣腸覃石瘕證治香稜丸腸覃石瘕氣血分寒客腸外客子門二證俱如懷子狀辨在經行經不行石瘕吳萸湯最效腸覃香棱丸若神丁木茴香川楝子青皮廣荗與三稜注經云寒氣客於腸外與衛氣相摶氣不得榮因有所繫瘕而內著惡氣乃起瘜肉乃生始如雞卵稍以益大如懷子狀按之則堅推之則移月事以時下石瘕生於胞中寒氣客於子門子門閉塞氣不得通惡血當下不下衃以留止日以益大狀如懷子月事不以時下皆生於女子可導而下由經文觀之二證雖皆如懷子狀腸覃氣病而血不病故月事以時下石瘕先氣病而後血病故月事不來也石瘕宜吳萸湯腸覃宜香稜丸即木香丁香茴香川楝子青皮廣茂三棱醋煮麵糊為丸也吳茱萸湯方見首卷胎前母子盛衰母盛子衰胎前病母衰子盛産後殃子母平和無衰盛坦然分娩不須忙注此言觀孕婦與所懷之胎有盛衰之辨也若娠母氣血壯盛而胎元弱者胎前必多病若孕婦衰弱而胎元壯實則産後其母必多病若子母俱和平無偏盛偏衰則胎前産後均平安無疾可坦然無憂也胎前有餘詳不足産後不足審有餘産後惟多虧損病胎前子母盛衰知注古云胎前無不足産後無有餘此言其常也然胎前雖多有餘之證亦當詳察其亦有不足之時産後雖多不足之病亦當詳審其每挾有餘之證也欲知産後常多虧損之故於胎前子母盛衰求之可預知也胎前門彚方保生湯人參甘草各二錢半白术香附子烏藥橘紅各五錢右銼每服三錢薑五片煎服加味六君湯人參白术土炒茯苓陳皮半夏各一錢五分製甘草五分炙藿香葉枇杷葉各一錢炙縮砂仁枳殼各八分炒右銼加生薑煎服加味溫膽湯陳皮半夏製茯苓各一錢甘草五分炙枳實竹茹黃芩各一錢黃連八分麥冬二錢蘆根一錢右銼薑棗煎服加味平胃散厚朴薑汁炒蒼术米泔浸炒陳皮甘草炙人參各一錢右為末每服三錢加薑煎服延胡四物湯當歸川芎白芍熟地各七錢五分延胡索二兩酒煮右銼水煎服加味膠艾四物湯當歸熟地阿膠白芍各二錢杜仲一錢五分川芎蘄艾各八分右加葱白三寸大豆淋酒煎服蜜消煎蜂蜜芒消右煎溶化服加味芎歸飲川芎二錢當歸五錢人參一錢吳茱萸五分阿膠二錢蘄艾八分甘草五分炙右銼水煎服導赤散生地三錢木通二錢甘草稍一錢燈心一團煎服五苓散白术土炒茯苓猪苓澤㵼各二錢半桂三分右銼作一服水煎服茯苓導水湯茯苓檳榔猪苓縮砂木香陳皮澤㵼白术木瓜大腹皮桑白皮蘇梗各等分右加薑煎服脹加枳殼喘加苦葶藶子腿腳腫加防己知母飲知母麥冬甘草各五錢黃耆子芩赤苓各七錢五分右㕮咀每服四錢水一盞煎至七分去滓入竹瀝一合溫服紫蘇飲當歸川芎白芍各二兩陳皮蘇莖葉大腹皮各一兩甘草五錢炙人參