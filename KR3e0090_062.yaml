人參粳糯米蜜糖蓮芡白雲苓洗滌類方洗有蕩滌之功滌洗則氣血自然舒暢其毒易於潰腐而無壅滯也凡腫在四肢者溻漬之在腰腹脊背者淋之在下部者浴之俱以布帛或棉蘸洗稍溫即易輕者日洗一次重者日夜洗二次每日洗之不可間斷凡洗時冬月要猛火以逼寒氣夏月要明窗以避風凉若不慎此輕則有妨收口重則恐變純隂夫洗藥不一如初腫與將潰者俱用葱歸溻腫湯燙洗如隂證不起者俱用艾茸湯敷法如潰後俱用猪蹄湯燙洗用猪蹄湯者以助肉之氣而逐腐也此滌洗之法乃瘍科之要藥也葱歸溻腫湯此湯治癰疽瘡瘍初腫將潰之時用此湯洗之以瘡內熱癢為度獨活三錢白芷三錢葱頭七個當歸三錢甘草三錢右五味以水三大碗煎至湯醇濾去渣以絹帛蘸湯熱洗如溫再易之方歌葱歸溻腫洗諸毒初起將潰用之宜洗至熱癢斯為度獨芷葱歸甘草俱艾茸敷法此膏治隂瘡黑陷而不痛者用之為良以知痛則生不知痛出紫血者死然必內服大補回陽之劑以助之硫黃五錢雄黃五錢艾茸一斤右以硫雄二味為末同艾入水煎半日水將乾取艾出搗爛溫敷患處再煎再易十餘次為度方歌艾茸敷法治隂瘡黑陷不痛用之良石硫雄黃同艾煮搗成膏敷定能康豬蹄湯此湯治癰疽諸毒流膿者熬好洗之以助肉氣消腫散風脫腐止痛去惡肉活死肌潤瘡口如腐盡者不必用之當以米泔水熱洗之令瘡潔淨不可過洗過洗則傷水皮膚破爛難生肌肉斂口矣黃芩甘草當歸赤芍白芷蜂房羌活各等分右七味共為粗末看證之大小定藥之多少先將獖豬前蹄一隻用水六碗煮蹄軟為度將汁濾清吹去汁上油花即用粗藥末一兩投於汁中再用微火煎十數沸濾去渣候湯微溫即用方盤一箇靠身於瘡下放定隨用軟絹蘸湯淋洗瘡上并入孔內輕手捺盡內膿庶敗腐宿膿隨湯而出以淨為度再以軟帛叠七八重蘸湯勿令大乾覆於瘡上兩手輕按片時帛溫再换如此再按四五次可以流通血氣解毒止毒去瘀也洗訖用絹帛挹乾即隨證以應用之藥貼之方歌豬蹄湯治癰疽毒已潰流膿用此方消腫散風能止痛芩甘歸芍芷蜂羌膏藥類方萬應膏此膏治一切癰疽發背對口諸瘡痰核流注等毒貼之甚效川烏草烏生地白斂白芨象皮官桂白芷當歸赤芍羌活苦參土木鱉穿山甲烏藥甘草獨活元參定粉大黃各五錢右十九味定粉在外用淨香油五斤將藥浸入油內春五夏三秋七冬十候日數已足入潔淨大鍋內慢火熬至藥枯浮起為度住火片時用布袋濾去渣將油稱準每油一斤對定粉半斤用桃桞枝不時攪之以黑如漆亮如鏡為度滴入水內成珠薄紙攤貼方歌萬應膏用貼諸毒發背癰疽對口瘡川草烏同地蘝及象皮桂芷芍歸羌苦參木鱉穿烏藥甘獨元參定粉黃紺珠膏此膏治一切癰疽腫毒流注頑臁風寒濕痺瘰癧乳癰痰核血風等瘡及頭痛牙疼腰腿痛等證悉驗製麻油四兩製松香一斤右將麻油煎滚入松香文火溶化桞枝攪候化盡離火下細藥末二兩三錢攪勻即傾於水內拔扯數十次易水浸之聽用一瘀血腫毒瘰癧等證但未破者再加魏香散隨膏之大小患之輕重每加半分至三二分為率一毒深膿不盡及頑瘡對口等證雖潰必用此膏獲效一未破者貼之勿揭揭則作癢痛亦勿揭能速於成膿患在平處者用紙攤貼患在灣曲轉動處者用絹帛攤貼一臁瘡及臀腿寒濕等瘡先用茶清入白礬少許洗淨貼之見效一頭痛貼太陽穴牙痛塞牙縫內一內癰等證作丸用蛤粉為衣服下一便毒痰核多加魏香散如膿瘡再加銅青如蟺拱頭癬毒貼之亦效製油法每麻油一斤用當歸木鱉子肉知母細辛白芷巴豆肉文蛤打碎山茨菰打碎紅芽大㦸續斷各一兩槐桞枝各二十八寸入油鍋內浸二十一日煎枯去渣取油聽用查朝鮮琥珀膏多續隨子此方宜加之製松香法擇片子淨嫩松香為末十斤取槐桞桃桑芙蓉等五樣枝各五斤銼碎用大鍋水煎濃汁濾淨再煮一次各收之各分五分每用初次汁一分煎滚入松香末二斤以柳槐枝攪之煎至松香沉下水底為度即傾入二次汁內乘熱拔扯數十次以不斷為佳候溫作餅收之餘香如法膏內細藥方乳香沒藥各五錢明雄黃四錢血竭五錢麝香一錢輕粉二錢右為細末加入膏內用魏香散乳香沒藥血竭各等分阿魏麝香各減半為末罐收聽用方歌紺珠膏貼癰疽毒流注頑臁濕痺名瘰癧乳癰痰核塊血風頭痛及牙疼松香化入麻油內乳沒雄黃竭麝輕隨證更加魏香散麝香魏竭乳沒并陀僧膏此膏專貼諸般惡瘡流注瘰癧跌撲損破金刃誤傷等證用之有效南陀僧二十兩研末赤芍二兩全當歸二兩乳香五錢研去油沒藥五錢研去油赤石脂二兩研苦參四兩百草霜二兩篩研銀黝一兩桐油二斤香油一斤血竭五錢研孩兒茶五錢研川大黃半斤右藥先將赤芍當歸苦參大黃入油內煠枯熬至滴水不散再下陀僧末用槐柳枝攪至滴水將欲成珠將百草霜細細篩入攪勻再將羣藥及銀黝篩入攪極勻傾入水盆內衆手扯千餘下再收入磁盆內常以水浸之方歌陀僧膏貼諸惡瘡流注瘰癧跌撲傷陀僧赤芍歸乳沒赤脂苦參百草霜銀黝桐油香油共血竭兒茶川大黃巴膏方此膏貼一切癰疽發背惡瘡化腐生肌甚效象皮六錢穿山甲六錢山梔子八十個兒茶二錢極細末另研人頭髮一兩二錢血竭一錢極細末另研硇砂三錢極細末另研黃丹飛香油桑槐桃柳杏枝各五十寸右將桑槐桃柳杏五枝用香油四斤將五枝煠枯撈出次入象皮穿山甲人頭髮煠化再入山梔子煠枯用絹將藥渣濾去將油復入鍋內煎滚離火少頃每油一斤入黃丹六兩攪勻用慢火熬至滴水中成珠將鍋取起再入血竭兒茶硇砂等末攪融用凉水一盆將膏藥傾入水內用手扯藥千餘遍换水數次拔去火氣磁罐收貯用時不宜見火須以銀杓盛之重湯炖化薄紙攤貼方歌癰疽發背用巴膏象甲梔茶髮竭硇枝用桑槐桃柳杏黃丹攪和共油熬亞聖膏此膏治一切破爛諸瘡並楊梅結毒貼之甚效象皮一兩驢甲一塊蹄即懸雞子清三個木鱉子七個蛇蛻二錢蟬蛻四錢血餘三錢穿山甲六錢槐枝榆枝艾枝柳枝桑枝各二十一寸黃丹黃蠟麻油三斤右將藥浸七日煎如常法濾去渣每淨油一斤入黃丹七兩煎成膏入黃蠟五錢化勻再加血竭五錢兒茶三錢乳香三錢沒藥三錢煆牡厲五錢五靈脂五錢右五味研極細末入膏內成膏出火攤貼方歌亞聖膏治破爛瘡楊梅結毒貼之良象驢雞鱉蛇蟬蛻血甲槐榆艾柳桑丹蠟麻油勻化後竭茶乳沒蠣靈襄綘珠膏此膏治潰瘍諸毒用之去腐定痛生肌甚效天麻子肉八十一粒雞子黃十個麻油十兩血餘五錢黃丹二兩水飛白蠟三兩血竭三錢硃砂二錢輕粉三錢乳香三錢沒藥三錢兒茶三錢氷片一錢麝香五分珍珠三錢右將麻油煠血餘至焦枯加麻子肉雞子黃再煠枯去渣入蠟候化離火少時入黃丹攪勻再加細藥和勻收用攤貼方歌綘珠化腐主生肌麻肉雞黃油血餘丹蠟竭砂輕乳沒兒茶氷麝共珍珠研細和勻隨證用乳岩須要入銀硃乳岩加銀硃一兩絳紅膏此膏治一切腫毒已成疼痛不消者貼之悉效銀硃五錢右一味為細末以生桐油調攤如膏先用神燈照後貼此膏方歌絳紅膏治毒已成腫痛難消用最靈一味銀朱為細末桐油調和貼之平加味太乙膏此膏治發背癰疽及一切惡瘡濕痰流注風濕遍身筋骨走注作痛湯燙火燒刀傷棒毒五損內癰七傷外證俱貼患處又男子遺精女人白帶俱貼臍下臟毒腸癰亦可丸服諸般瘡癤血風癩癢諸藥不止痛癢者並效白芷當歸赤芍元參各二兩柳枝槐枝各一百寸肉桂二兩沒藥三錢大黃二兩木鱉二兩輕粉四錢見星研不生地二兩阿魏三錢黃丹四十兩水飛乳香五錢血餘一兩右將白芷當歸赤芍元參肉桂大黃木鱉生地八味併槐柳枝用真麻油足稱五斤將藥浸入油內春五夏三秋七冬十入大鍋內慢火熬至藥枯浮起為度住火片時用布袋濾淨藥渣將油稱凖用細舊絹將油又濾入鍋內要清淨為佳將血餘投上慢火熬至血餘浮起以柳枝桃看似膏溶化之象方算熬熟淨油一斤將飛過黃丹六兩五錢徐徐投入火加大些夏秋亢熱每油一斤加丹五錢不住手攪候鍋內先發青烟後至白烟叠叠旋起氣味香馥者其膏已成即便住火將膏滴入水中試軟硬得中如老加熱油如稀加炒丹每各少許漸漸加火務要冬夏老嫩得所為佳候烟盡掇下鍋來方下阿魏切成薄片散於膏上化盡次下乳沒輕粉攪勻傾入水中以柳棍樓成一塊再换冷水浸片時乘溫每膏半斤扯拔百轉成塊又换冷水浸隨用時每取一塊銅杓內復化隨便攤貼至妙方歌太乙膏治諸般毒一切瘡傷俱貼之白芷當歸赤芍藥元參桂沒柳槐枝大黃木鱉輕生地阿魏黃丹乳血餘白膏藥此膏專貼諸瘡腫毒潰破流濃甚效淨巴豆肉十二兩萞麻子十二兩去殼香油三斤蝦蟇五個人髮一團各銜活鯽魚十尾先將巴豆肉萞麻子入油內浸三日再將蝦蟇浸一宿臨熬時入活鯽魚共煠焦去渣淨慢火熬油滴水成珠離火傾於淨鍋內再加官粉二斤半乳香末五錢不時攪之冷定為度用時重湯炖化薄紙攤貼方歌白膏專貼諸瘡毒巴豆萞麻浸入油活鯽蝦蟇同煠後再將官粉乳香投化腐紫霞膏此膏善能穿透諸毒凡發背已成瘀肉不腐及不作膿者用此膏以腐爛瘀肉穿潰膿毒其功甚效金頂砒五分潮腦一錢螺螄肉二兩晒乾為末用肉輕粉三錢血竭二錢巴豆仁五錢白仁研用右各為末共碾一處磁罐收貯臨用時用麻油調搽頑硬肉上以棉紙蓋上或膏貼俱可方歌化腐紫霞膏穿毒透膿化腐效如神金砒潮腦螺螄肉粉竭麻仁巴豆仁貝葉膏此膏貼癰疽發背一切潰爛諸瘡麻油一斤血餘雞子大一個白蠟二兩右將血餘以文火煠化去渣下火入白蠟溶化候溫用棉紙剪塊三張張張於油蠟內蘸之貼於磁器幫上用時揭單張貼患處日换八九次力能定痛去腐生肌其功甚速切勿忽之方歌貝葉膏治潰爛瘡去腐生肌功效強血餘麻油煎渣去下火入蠟化貼良碧螺膏此膏治下部濕瘡疥癬并結毒痰串癧瘡松香取嫩白者佳為末篩過用銅盆以豬油遍搽之入水至滚入香不住手攪之以香沉底為度即傾冷水中拔扯百十次以不斷為度右將麻油煎滴水成珠入松香一斤文火溶化看老嫩取起離火住滚徐徐入糠青膽礬各淨末五錢以柳枝左攪勻為度如老加熟豬油二三錢用緑紙薄攤貼之方歌碧螺膏治疥濕瘡豬脂麻油嫩松香再入糠青膽礬末緑紙攤貼效非常麻藥類方瓊酥散此散治一切腫毒等瘡服之開針不痛蟾酥一錢半夏六分閙羊花六分胡椒一錢八分川椒一錢八分蓽茇一錢川烏一錢八分右七味共為細末每服半分黃酒調服如欲大開加白酒藥一丸方歌瓊酥散是麻人藥開針不痛用蟾酥蓽茇閙羊生半夏胡椒川椒與川烏整骨麻藥此藥開取箭頭服之不痛麻黃胡茄子薑黃川烏草烏各等分閙羊花倍用右六味共為末每服五分茶酒任下欲解用甘草煎湯服之即蘇方歌整骨麻藥取箭頭不傷筋骨可無憂麻黃薑黃胡茄子川草烏與閙羊投外敷麻藥此藥敷於毒上麻木任割不痛川烏尖五錢草烏尖五錢蟾酥四錢胡椒一兩生南星五錢生半夏五錢一方加蓽茇五錢一方加細辛一兩右為末用燒酒調敷方歌外敷麻藥調燒酒刀割不痛效最神川草烏蟾椒星夏一加蓽茇一加辛去腐類方腐者壞肉也諸書云腐不去則新肉不生蓋以腐能浸淫好肉也當速去之如遇氣實之人則用刀割之取效若遇氣虛之人則惟恃藥力以化之蓋去腐之藥乃瘍科之要藥也白降丹此丹治癰疽發背一切疔毒用少許瘡大者用五六釐瘡小者用一二釐水調敷瘡頭上初起者立刻起皰消散成膿者即潰腐者即脫消腫誠奪命之靈丹也硃砂雄黃各二錢水銀一兩硼砂五錢火硝食鹽白礬皂礬各一兩五錢先將硃雄硼三味研細入鹽礬硝皂水銀共研勻以水銀不見星為度用陽城罐一個放微炭火上徐徐起藥入罐化盡微火逼令乾取起如火大太乾則汞走如不乾則藥倒下無用其難處在此再用一陽城罐合上用棉紙截半寸寬將罐子泥草鞋灰光粉三樣研細以鹽滴滷汁調極濕一層泥一層紙糊合口四五重及糊有藥罐上二三重地下挖一小潭用飯碗盛水放潭底將無藥罐放於碗內以瓦挨潭口四邉齊地恐炭灰落碗內也有藥罐上以生炭火蓋之不可有空處約三炷香去火冷定開看約有一兩外藥矣煉時罐上如有緑烟起急用筆蘸罐子鹽泥固之紅升丹此丹治一切瘡瘍潰後拔毒去腐生肌長肉瘡口堅硬肉黯紫黑用丹少許雞翎掃上立刻紅活瘍醫若無紅白二丹决難立刻取效硃砂五錢雄黃五錢水銀一兩火硝四兩白礬一兩皂礬六錢先將二礬火硝研碎入大銅杓內加火消一小杯炖化一乾即起研細另將汞硃雄研細至不見星為度再入消礬末研勻先將陽城罐用紙筋泥搪一指厚隂乾常輕輕撲之不使生裂紋搪泥罐子泥亦可用如有裂紋以罐子泥補之極乾再晒無裂紋方入前藥在內罐口以鐵油盞蓋定加鐵梁盞上下用鐵鑻鐵絲扎緊用棉紙撚條蘸蜜周圍塞罐口縫間外用熟石膏細末醋調封固盞上加炭火二塊使盞熱罐口封固易乾也用大釘三根釘地下將罐子放釘上罐底下置堅大炭火一塊外砌百眼爐升三炷香第一炷香用底火如火大則汞先飛上二炷香用大半罐火以筆蘸水擦盞第三炷香火平罐口用扇搧之頻頻擦盞勿令乾乾則汞先飛上三香完去火冷定開看方氣足盞上約有六七錢刮下研極細磁罐盛用再預以鹽滷汁調罐子稀泥用筆蘸泥水掃罐口周圍勿令泄氣蓋恐有緑烟起汞走也緑烟一起即無用矣方歌白降丹為奪命丹拔膿化腐立時安硃雄汞與硼砂入還有消鹽白皂礬若去硼鹽紅升是長肉生肌自不難元珠膏此膏治腫瘍將潰塗之膿從毛孔吸出已開針者用撚蘸送孔內呼膿腐不净塗之立化木鱉子肉十四個螌八十一個柳枝四十九寸驢甲片三錢草烏一錢麻油二兩右藥浸七日文火煠枯去渣入巴豆仁三個煎至黑傾於鉢內研如泥加麝香一分攪勻入罐內收用方歌呼膿化腐用元珠木鱉螌共桞枝驢甲草烏油內浸煠枯巴豆麝香施生肌類方凡大毒潰爛內毒未盡若驟用生肌則外實內潰重者逼毒內攻輕者反增潰爛雖即收口其於旁處復生大疽是知毒未盡不可驟用生肌藥也只以貝葉膏貼之頻换俟生肉珠時方用生肌藥如元氣弱者須當大補以培元氣生肌定痛散此散治潰爛紅熱腫痛有腐者用此化腐定痛生肌生石膏一兩用甘草湯飛五七次為末辰砂三錢冰片二分硼砂五錢右四味共為末撒患處方歌生肌定痛治潰爛腫疼紅熱實相宜石膏飛過辰砂用共入冰硼細撒之輕乳生肌散此散治潰爛紅熱腫痛腐脫者用此定痛生肌石膏一兩煆血竭五錢乳香五錢輕粉五錢冰片一錢有水加龍骨白芷各一錢不收口加雞內金一錢炙右為末撒之方歌輕乳生肌治腐脫石膏血竭乳輕冰若然有水加龍芷收口須添雞內金薑礬散此散治一切諸瘡發癢者用此撒之甚效枯礬乾薑右等分為末先用細茶食鹽煎湯洗之後用此散撒之冷瘡不收口者用乾薑一味為末撒患處覺熱如烘生肌甚效方歌薑礬最治諸瘡癢先用鹽茶煎洗之若是冷瘡不收口乾薑一味撒生肌腐盡生肌散此散治一切癰疽等毒諸瘡破爛不斂者撒上即愈兒茶乳香沒藥各三錢冰片一錢麝香二分血竭三錢旱三七三錢右為末撒之有水加龍骨一錢煆欲速收口加珍珠一兩蟹黃二錢團臍蟹蒸熟取黃晒乾取用法取或用猪脂油半斤去渣加黃蠟一兩溶化傾碗內稍溫加前七味調成膏攤貼癰疽破爛等證若杖傷則旱三七倍之一用鮮鹿腿骨紙包灰內煨之以黃脆為度如黑焦色則無用矣為細末撒之生肌甚速方歌腐盡生肌瘡不斂兒茶乳沒冰麝香血竭三七水加骨收口珍珠共蟹黃或用猪油溶黃蠟調前七味貼之良一用火煨鹿腿骨為散生肌效甚長月白珍珠散此散治諸瘡新肉已滿不能生皮及湯火傷痛并下疳腐痛等證青缸花五分輕粉一兩珍珠一錢右為末撒之下疳腐爛用豬脊髓調搽一用雞子清傾瓦上晒乾取清為末撒之方歌月白珍珠皮不長并醫湯火下疳瘡青缸輕粉珍珠共豬髓調搽真妙方一用雞清傾瓦上晒乾為末撒之良五色靈藥此五色靈藥治癰疽諸瘡已潰餘腐不盡新肉不生撒之最效食鹽五錢黑鉛六錢枯白礬枯皂礬水銀火硝各二兩先將鹽鉛鎔化入水銀結成砂子再入二礬火硝同炒乾研細入鉛汞再研以不見星為度入罐內泥固濟封口打三炷香不可太過不及一宿取出視之其白如雪約有二兩為火候得中之靈藥如要色紫者加硫黃五錢要黃色者加明雄黃五錢要色紅者用黑鉛九錢水銀一兩枯白礬二兩火硝三兩辰砂四錢明雄黃三錢升煉火候俱如前法凡升打靈藥硝要炒燥礬要煆枯一方用燒酒煮乾炒燥方研入罐一法凡打出靈藥倍加石膏和勻復入新罐內打一枝香用之不痛方歌五色靈藥白用鹽黑鉛硝汞皂枯礬欲成紫色硫黃入黃者雄黃加五錢紅去皂鹽鉛重用硃砂飛盡必須添生肌玉紅膏此膏治癰疽發背諸般潰爛棒毒等瘡用在已潰流膿時先用甘草湯甚者用豬蹄湯淋洗患上軟絹挹淨用抿欛挑膏於掌中捺化遍搽新肉上外以太乙膏蓋之大瘡洗换二次內兼服大補氣血之藥新肉即生瘡口自斂此外科收斂藥中之神藥也當歸二兩白芷五錢白蠟二兩輕粉四錢甘草一兩二錢紫草二錢瓜兒血竭四錢麻油一斤右將當歸白芷紫草甘草四味入油內浸三日大杓內慢火熬微枯色細絹濾清將油復入杓內煎滚入血竭化盡次下白蠟微火亦化用茶鍾四個預放水中將膏分作四處傾入鍾內候片時方下研極細輕粉各投一錢攪勻候至一日夜用之極效方歌生肌玉紅膏最善潰爛諸瘡搽即收歸芷蠟輕甘紫草瓜兒血竭共麻油瑩珠膏此膏治潰瘍去腐定痛生肌并楊梅瘡杖臁瘡下疳等證白蠟三兩豬脂油十兩輕粉一兩五錢末樟氷一兩五錢末先將白蠟脂油溶化離火候溫入輕粉樟氷攪勻候稍凝再入氷片末一錢攪勻成膏罐收聼用凡用先將甘草苦參各三錢水煎洗淨患處貼膏杖瘡用荆川紙攤極薄貼之熱則易之其疔瘀即散疼痛立止楊梅瘡加紅粉二錢頑瘡乳岩加銀硃一兩臁瘡加水龍骨三錢或龍骨四錢方歌瑩珠膏用治潰瘡定痛生肌功效強白蠟豬脂樟氷粉楊頑乳杖并臁瘡呂祖一枝梅此藥治男婦大人小兒新久諸病生死難定之間用芡􅧙大一餅貼印堂之中㸃官香一枝香盡去藥已後一時許視貼藥處有紅斑暈色腫起飛散謂之紅霞捧日病雖危篤其人不死如貼藥處一時後不腫不紅皮肉照舊不變謂之白雲漫野病雖輕淺終歸冥路小兒急慢驚風一切老幼痢疾俱可貼之凡病用之皆可預知生死也雄黃五錢巴豆仁五錢油不去硃砂三分五靈脂三錢銀朱一錢五分萞麻仁五分麝香三分右各研細於端午日淨室中午時共研加油燕脂為膏磁盒收藏勿經婦人之手臨用豆大一圓掜餅貼印堂中其功立見用過餅送入河中方歌呂祖一枝梅驗病定人生死印堂中紅斑腫起斯為吉無腫無紅命必終藥用五靈萞麻子砂銀巴豆麝香雄御纂醫宗金鑑卷六十二
