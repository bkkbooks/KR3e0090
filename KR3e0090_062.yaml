body:
  text: 編輯外科心法要訣目緑腫瘍主治類方仙方活命飲神授衛生湯清熱消風散乳香黃耆散內疏黃連湯回陽三建湯竹葉黃耆湯內消散內固清心散琥珀蠟礬丸護心散透膿散托裏消毒散神功內托散復元通氣散雙解貴金丸黍米寸金丹麥靈丹保安萬靈丹腫瘍敷貼類方如意金黃散五龍膏四虎散真君妙貼散二青散坎宮錠子離宮錠子白錠子蝌蚪拔毒散二味拔毒散回陽玉龍膏冲和膏鐵桶膏烏龍膏神效干捶膏馬齒莧膏潰瘍主治類方四君子湯四物湯八珍湯十全大補湯人參養榮湯內補黃耆湯異功散理中湯六君子湯香砂六君子湯托裏定痛湯聖愈湯柴胡四物湯地骨皮飲知蘗四物湯三黃四物湯補中益氣湯人參黃耆湯獨參湯溫胃飲橘皮竹茹湯胃愛丸二神丸加味地黃丸參术膏八仙糕洗滌類方䓤歸溻腫湯艾茸敷法豬蹄湯膏藥類方萬應膏紺珠膏陀僧膏巴膏亞聖膏絳珠膏絳紅膏加味太乙膏白膏藥化腐紫霞膏貝葉膏碧螺膏麻藥類方瓊酥散整骨麻藥外敷麻藥去腐類方白降丹紅升丹元珠膏生肌類方生肌定痛散輕乳生肌散薑礬散腐盡生肌散月白珍珠散五色靈藥生肌玉紅膏瑩珠膏呂祖一枝梅御纂醫宗金鑑卷六十二目録欽定四庫全書御纂醫宗金鑑卷六十二編輯外科心法要訣目緑腫瘍主治類方仙方活命飲神授衛生湯清熱消風散乳香黃耆散內疏黃連湯回陽三建湯竹葉黃耆湯內消散內固清心散琥珀蠟礬丸護心散透膿散托裏消毒散神功內托散復元通氣散雙解貴金丸黍米寸金丹麥靈丹保安萬靈丹腫瘍敷貼類方如意金黃散五龍膏四虎散真君妙貼散二青散坎宮錠子離宮錠子白錠子蝌蚪拔毒散二味拔毒散回陽玉龍膏冲和膏鐵桶膏烏龍膏神效干捶膏馬齒莧膏潰瘍主治類方四君子湯四物湯八珍湯十全大補湯人參養榮湯內補黃耆湯異功散理中湯六君子湯香砂六君子湯托裏定痛湯聖愈湯柴胡四物湯地骨皮飲知蘗四物湯三黃四物湯補中益氣湯人參黃耆湯獨參湯溫胃飲橘皮竹茹湯胃愛丸二神丸加味地黃丸參术膏八仙糕洗滌類方䓤歸溻腫湯艾茸敷法豬蹄湯膏藥類方萬應膏紺珠膏陀僧膏巴膏亞聖膏絳珠膏絳紅膏加味太乙膏白膏藥化腐紫霞膏貝葉膏碧螺膏麻藥類方瓊酥散整骨麻藥外敷麻藥去腐類方白降丹紅升丹元珠膏生肌類方生肌定痛散輕乳生肌散薑礬散腐盡生肌散月白珍珠散五色靈藥生肌玉紅膏瑩珠膏呂祖一枝梅御纂醫宗金鑑卷六十二目録欽定四庫全書御纂醫宗金鑑卷六十二編輯外科心法要訣腫瘍主治類方仙方活命飲此方治一切癰疽不論隂陽瘡毒末成者即消已成者即潰化膿生肌散瘀消腫乃瘡癰之聖藥誠外科之首方也故名之曰仙方活命飲穿山甲三大片炒皂刺五分歸尾一錢五分甘草節一錢金銀花二錢赤芍藥五分乳香五分沒藥五分花粉一錢防風七分貝母一錢白芷一錢陳皮一錢五分右十三味好酒煎服恣飲盡醉方歌仙方活命飲平劑瘡毒癰疽俱可醫未成即消疼腫去已成膿化立生肌穿山皂刺當歸尾草節金銀赤芍宜乳沒天花防貝芷陳皮好酒共煎之神授衛生湯此方治癰疽發背疔瘡對口一切丹瘤惡毒諸證服之宣熱散風行瘀活血消腫解毒疏通臟腑乃表裏兩實之劑功效甚速皂角刺一錢防風六分羌活八分白芷六分穿山甲六分炒連翹六分歸尾一錢乳香五分沉香六分金銀花一錢石决明六分天花粉一錢甘草節一錢紅花六分大黃二錢炒酒拌右十五味水二碗煎八分病在上部先飲酒一杯後服藥病在下部先服藥後飲酒一杯以行藥力如氣虛便利者不用大黃方歌神授衛生表裏劑癰疽諸瘡惡毒良行瘀活血兼消腫表裏疏通實劑方皂刺防風羌芷甲連翹歸尾乳沉香金銀石决天花粉甘草紅花共大黃清熱消風散此方治癰疽瘡腫已成未成之際無表無裏故外不惡寒內不便祕惟紅腫焮痛髙腫有頭者宜服此藥以和解之也皂角刺一錢防風五分陳皮一錢連翹一錢去心花粉五分柴胡一錢黃芩五分川芎五分白芍五分甘草五分當歸五分黃耆一錢金銀花五分蒼术一錢炒紅花一錢右十五味水二鍾煎八分食遠服方歌清熱消風無表裏癰疽諸毒和解方皂刺防風陳翹粉柴芩芎芍草耆當銀花蒼术紅花入婦女還加香附良若婦人加香附子用童便炒乳香黃耆散此方治癰疽發背諸毒疔瘡疼痛不可忍者乃氣虛不勝毒之故也服之未成即消已成即潰不用刀砭惡肉自脫并治打撲損傷筋骨疼痛之證當歸一錢白芍一錢炒人參一錢生黃耆一錢川芎一錢熟地一錢乳香五分沒藥五分陳皮一錢粟殼一錢膜蜜炙去筋甘草節一錢右水二鍾煎八分量病上下食前後服之方歌乳香黃耆治氣弱癰疽諸毒痛難當未成即消已成潰歸芍參耆芎地黃乳沒粟陳甘草節更醫打撲筋骨傷內疏黃連湯此方治癰疽陽毒在裏火熱發狂發熱二便祕澀煩躁嘔噦舌乾口渴飲冷等證六衇沉數有力者急宜服之以除裏熱山梔一錢連翹一錢薄荷一錢甘草五分黃芩一錢黃連一錢桔梗一錢大黃二錢當歸一錢白芍一錢炒木香一錢檳榔一錢右水二茶鍾煎八分食前服加蜜二匙亦可方歌內疏黃連瀉裏熱癰瘡毒火陽盛狂腫硬發熱二便祕煩躁乾嘔渴飲凉梔翹薄草芩連結大黃歸芍木檳榔回陽三建湯此方治癰疽發背初起不疼不腫不紅不熱堅如頑石硬若牛皮體倦身凉衇息遲細色似土硃粟頂多孔孔孔流血根腳平散軟陷無膿皮不作腐頭溫足凉者並急服之人參一錢附子一錢當歸一錢川芎一錢甘草五分茯苓一錢生黃耆一錢枸杞一錢紅花五分紫草五分獨活五分陳皮一錢蒼术五分炒厚朴五分炒木香五分山萸肉一錢右十六味加煨薑三片皂角樹根上白皮二錢水二碗煎八分入酒一杯隨病上下食前後服之用棉帛覆蓋瘡上常令溫暖不得大開瘡孔走泄元氣為要方歌回陽三建治隂疽體倦身凉衇細遲不腫不疼不紅熱堅如頑石硬如皮根平軟陷無膿腐參附歸芎草茯耆枸杞紅花與紫草獨陳蒼朴木山萸竹葉黃耆湯此方治癰疽發背諸般疔毒表裏不實熱甚口中乾大渴者服之生津止渴人參八分生黃耆八分石膏八分煆半夏八分製麥冬八分生地二錢白芍八分甘草八分川芎八分當歸八分竹葉十片黃芩八分右十二味水二鍾薑三片燈心二十根煎八分食遠溫服方歌竹葉黃耆口乾渴清熱補正助生津參耆膏夏麥冬地芍草芎歸竹葉芩內消散此方治癰疽發背對口疔瘡乳癰無名腫毒一切惡瘡能令癰腫內消使毒內化尿色赤汚從小便而出勢大者雖不全消亦可轉重為輕移深居淺知母一錢貝母一錢花粉一錢乳香一錢半夏一錢製白芨一錢穿山甲一錢皂刺一錢銀花一錢右九味水酒各一碗煎八分隨病上下食前後服之留藥渣搗爛加秋芙蓉葉一兩研為細末再加白蜜五匙用渣調敷瘡上一宿即消重者再用一服方歌內消散用化諸毒毒化從尿色變行知貝天花乳夏及穿山角刺共金銀藥渣搗和芙蓉葉白蜜調敷毒即平已上諸方治癰疽七日以前瘡勢未成形體壯實而表裏之證相和者宜服病退即止如過七日以後形勢已成則宜托裏消毒等湯使毒現於外以速其膿若仍用前散下之藥恐傷元氣致生變證也內固清心散此方治癰疽發背對口疔瘡熱甚掀痛煩躁飲冷其人內弱服之預防毒氣內攻於心也菉豆粉二兩人參二錢氷片一錢雄黃二錢辰砂二錢白豆蔲二錢元明粉二錢茯苓二錢甘草二錢乳香二錢右十味為細末每服一錢五分蜜湯調下不拘時服方歌內固清心防毒攻內弱毒氣入心中掀痛熱甚兼飲冷豆粉人參氷片雄辰砂白蔲元明粉茯苓甘草乳香同琥珀蠟礬丸此方治癰疽發背瘡形已成而膿未成之際其人即不虛弱恐毒氣不能外出內攻於裏預服此丸護膜護心亦且活血解毒黃蠟一兩白礬一兩二錢雄黃一錢二分琥珀一錢極細另研硃砂一錢研細白蜜二錢右上四味先研細末另將蠟蜜入銅杓內溶化離火片時候蠟四邉稍凝方將藥味入內攪勻共成一塊將藥火上微烘急作小丸如菉豆大硃砂為衣磁罐收貯每服二三十丸食後白湯送下毒甚者早晚服其功最速方歌琥珀蠟礬治癰毒未出膿時平劑佳預服護膜能解毒蠟礬雄珀蜜硃砂護心散此方治瘡毒內攻口乾煩躁惡心嘔吐者服此藥護心解毒也菉豆粉一兩乳香三錢淨末硃砂一錢甘草一錢右四味研細末每服二錢白滚湯調服早晚二次方歌護心散治毒內攻煩躁口乾嘔逆冲豆粉乳香硃共草二錢調下有神功透膿散此方治癰疽諸毒內膿已成不穿破耆服之即潰破毒出生黃耆四錢穿山甲一錢川芎三錢當歸二錢皂角刺一錢五分右五味水三鍾煎一鍾瘡在上先飲酒一杯後服藥瘡在下先服藥後飲酒一杯方歌透膿散治膿已成不能潰破劑之平用此可代針瀉毒角刺歸耆山甲芎托裏消毒散此方治癰疽已成內潰遲滯者因血氣不足不能助其腐化也宜服此藥托之令其速潰則腐肉易脫而新肉自生矣皂角刺五分銀花一錢甘草五分桔梗五分白芷五分川芎一錢生黃耆一錢當歸一錢白芍一錢白术一錢人參一錢茯苓一錢右十二味水二鍾煎八分食遠服方歌托裏消毒助氣血補正脫腐肌易生皂角銀花甘桔芷芎耆歸芍术參苓神功內托散此方治癰疽腦頂諸發等瘡日久不腫不髙不能腐潰衇細身凉宜服此溫補托裏之劑以助氣血也人參一錢五分附子一錢製川芎一錢歸身二錢黃耆一錢白术一錢五分土炒白芍一錢炒木香五分研穿山甲八分炒甘草五分炙陳皮一錢白茯苓一錢右十二味煨薑三片大棗二枚水二茶鍾煎八分食遠服方歌神功內托隂毒證不腫不髙不潰疼參附芎歸耆术芍木香山甲草陳苓復元通氣散此方治乳癰腹癰便毒耳痛耳聾等證皆由毒氣滯塞不通故耳服之則氣通毒散青皮四兩陳皮四兩栝蔞仁二兩穿山甲二兩金銀花一兩連翹一兩甘草二兩半炙半生右七味研末每服二錢黃酒調下方歌復元通氣乳腹癰便毒兼治耳痛聾青陳蔞甲銀翹草一服能教毒氣通雙解貴金丸此方治背疽諸毒初起木悶堅硬便祕衇沉實者悉效隨證加藥服法列後生大黃一斤白芷十兩右二味為末水丸每服三五錢五更時用連鬚葱大者三根黃酒一碗煮葱爛取酒送藥服畢蓋臥出汗過三二時俟大便行一二次立效按此宣通攻利之劑也濟之以葱酒力能發汗故云雙解弱者隨用中劑行後以四君子湯補之老人虛人每服一錢用人參加生薑煎湯送下過一時再一服得睡上半身得汗則已方歌雙解貴金治諸毒腫瘍初起木硬堅大黃白芷為丸服葱酒煎送汗下痊黍米寸金丹此方乃異人所傳常有暴中急證忽然卒倒者撬開牙關研灌三丸其人即活又能治發背癰疽遍身壅腫附骨癰疽等證也凡初起憎寒壯熱四肢倦怠沉重者不分表裏老幼輕重並宜服之乳香沒藥各一錢狗膽一個乾者鯉魚膽三個隂乾硇砂二錢蟾酥二錢狗寶一錢麝香五分白丁香四十九個蜈蚣全者七條酥炙黃蠟三錢烏金石一錢頭胎男乳一合輕粉一錢雄黃一錢水銀煉粉霜白色者三錢右十六味為細末除黃蠟乳汁二味熬成膏子同藥和丸如菉豆大小兒用一丸大人三丸重者五丸冷病用葱湯熱病用新汲水送下衣被密蓋勿令透風汗出為度諸病如失方歌黍米寸金竒效方癰疽發背服之良乳香沒藥狗鯉膽蟾硇寶麝白丁香蜈蚣黃蠟烏金石男乳輕雄共粉霜麥靈丹此丹能治癰疽惡毒無名諸瘍及疔瘡回裏令人煩悶神昏或婦人初發乳證小兒痘疹餘毒或腰腿暴痛等證鮮蟾酥二錢活蜘蛛二十一個佳黑色大者定心草一錢即兩頭興鼠糞飛羅麵六兩右四味共研一處用菊花熬成稀膏和好撚為麥子形如麥子大每服七丸重大者九丸小兒輕證五丸在上俱用滚白水服在下用淡黃酒送服每一料加麥子一合收磁罐內方歌麥靈丹治疔毒疽鮮蟾酥與活蜘蛛定心草共飛羅麵黃菊熬膏相合宜保安萬靈丹此方治癰疽疔毒對口發頤風寒濕痺濕痰流注附骨隂疽鶴膝風及左癱右瘓口眼歪斜半身不遂血氣凝滯遍身走痛步履艱辛偏墜疝氣偏正頭痛破傷風牙關緊閉截解風寒無不應效茅山蒼术八兩麻黃羌活荆芥防風細辛川烏湯泡去皮草馬湯泡去皮川芎石斛全蠍當歸甘草天麻何首烏各一兩雄黃六錢右十六味為細末煉蜜為丸重三錢硃砂為衣磁罐收貯視年嵗老壯病勢緩急斟酌用之如惡瘡初起二三日間或癰疽已成至十日前後未出膿者狀若傷寒頭痛煩渴拘急惡寒肢體疼痛惡心嘔吐四肢沉重恍惚悶亂皮膚壯熱及傷寒四時感冒傳變疫證惡寒身熱俱宜服之用葱白九枝煎湯調服一丸蓋被出汗為效如汗遲以葱湯催之其汗必出如淋如洗令其自收不可露風患者自快瘡未成者即消已成者即髙腫潰膿如病無表裏相兼不必發散只用熱酒化服又按此方原載諸風癱瘓門中今移録於此者蓋瘡瘍皆起於榮衛不調氣血凝滯始生癰腫此藥專能發散又能順氣搜風通行經絡所謂結者開之也經云汗之則瘡已正與此相合也服後當避風忌冷物戒房事如婦人有孕者勿服方歌萬靈丹治諸痺病此藥猶能治腫瘍發表毒邪從汗解通行經絡效非常麻黃羌活荆防細川草烏芎石斛蒼全蠍當歸甘草等天麻何首共雄黃腫瘍敷貼類方凡腫瘍初起時腫髙赤痛者宜敷凉藥以寒勝熱也然亦不可太過過則毒為寒凝變為隂證如漫腫不紅似有頭而不痛者宜敷溫藥乃引毒外發也經云發表不遠熱敷熱藥亦發表之意凡調敷藥須多攪則藥稠黏敷後貼紙必須撕斷則不崩裂不時用原汁潤之蓋借濕以通竅乾則藥氣不入更添拘急之苦矣凡去敷藥必看毛孔有汗意者為血衇通熱氣散也反此者逆如意金黃散此散治癰疽發背諸般疔腫跌撲損傷濕痰流毒大頭時腫漆瘡火丹風熱天泡肌膚赤腫乾濕腳氣婦女乳癰小兒丹毒凡一切諸般頑惡熱瘡無不應效誠瘡科之要藥也南星陳皮蒼术各二斤黃蘗五斤薑黃五斤甘草二斤白芷五斤上白天花粉十斤厚朴二斤大黃五斤右十味共為咀片晒乾磨三次用細絹羅篩貯磁罐勿泄氣凡遇紅赤腫痛發熱未成膿者及夏月時俱用茶清同蜜調敷如欲作膿者用葱湯同蜜調敷如漫腫無頭皮色不變濕痰流毒附骨癰疽鶴膝風等證俱用葱酒煎調敷如風熱所生皮膚亢熱色亮遊走不定俱用蜜水調敷如天泡火丹赤遊丹黃水漆瘡惡血攻注等證俱用大藍根葉搗汁調敷加蜜亦可湯潑火燒皮膚破爛麻油調敷已上諸引調法乃别寒熱溫凉之治法也方歌如意金黃敷陽毒止痛消腫實良方南陳蒼蘗薑黃草白芷天花朴大黃五龍膏此膏治癰疽隂陽等毒腫痛未潰者敷之即拔出膿毒五龍草即烏蘝莓詳本草綱目蔓草部俗名五爪龍江浙多産之金銀花稀蘞草車前草連根葉陳小粉各等分右四味俱用鮮草葉一處搗爛再加三年陳小粉并飛鹽末二三分共搗為稠糊遍敷瘡上中留一頂用膏貼蓋避風為主若冬月草無鮮者預採蓄下隂乾為末用陳米醋調敷一如前法并效如此方內五龍草或缺少不便倍加稀蘞草亦效方歌五龍膏用拔膿毒平劑五龍草銀花蘞草車前俱搗爛小粉飛鹽攪糊搽四虎散此散治癰疽腫硬厚如牛領之皮不作膿腐者宜用此方草烏狼毒半夏南星各等分右四味為細末用猪腦同搗遍敷瘡上留頂出氣方歌四虎散敷隂疽癰頑腫不痛治之平厚似牛皮難潰腐草烏狼毒夏南星真君妙貼散此散治癰疽諸毒頑硬惡瘡散漫不作膿者用此藥敷之不痛者即痛痛者即止如皮破血流濕爛疼苦天泡火丹肺風酒刺等證并用之皆效蕎麵五斤明淨硫黃十斤為末白麵五斤右三味共一處用清水微拌乾濕得宜趕成薄片微晒單紙包裹風中隂乾收用臨時研細末新汲水調敷如皮破血流濕爛者用麻油調敷天泡火丹酒刺者用靛汁調搽并效方歌真君妙貼硫二麵水調頑硬不痛膿油調濕爛流血痛靛汁泡丹酒刺風二青散此散治一切陽毒紅腫疼痛臖熱等證未成者即消青黛黃蘗白斂白薇各一兩青露三兩蓉葉即芙白芨白芷水龍骨即多年艌船舊油灰白鮮皮各一兩天花粉三兩大黃四兩朴硝一兩右十二味為末用醋蜜調敷已成者留頂未成者遍敷方歌二青散用敷陽毒腫痛紅熱用之消黛蘗斂薇青露及芷龍鮮粉大黃消坎宫錠子此錠子治熱毒腫痛焮赤諸瘡并搽痔瘡最效京墨一兩胡黃連二錢熊膽三錢麝香五分兒茶二錢氷片七分牛黃三分右七味為末用豬膽汁為君加生薑汁大黃水浸取汁釅醋各少許相和藥成錠用凉水磨濃以筆蘸塗之方歌坎宮錠子最清凉熱腫諸瘡并痔瘡京墨胡連熊膽麝兒茶氷片共牛黃離宮錠子此錠子治疔毒腫毒一切皮肉不變漫腫無頭搽之立效血竭三錢硃砂二錢膽礬三錢京墨一兩蟾酥三錢麝香一錢五分右六味為末凉水調成錠凉水磨濃塗之方歌離宮錠治諸疔毒漫腫無頭凉水塗血竭硃砂為細末膽礬京墨麝蟾酥白錠子此錠專敷初起諸毒癰疽疔腫流注痰包惡毒及耳痔耳挺等證白降丹四錢靈藥即白銀黝二錢寒水石二錢人中白二錢右四味共為細末以白芨麵打糊為錠大小由人不可入口每用以陳醋研敷患處如乾再上自能消毒方歌白錠專敷初起毒癰疽疔腫與痰包降丹銀黝人中白寒水白及醋研消蝌蚪拔毒散此散治無名大毒一切火毒瘟毒敷之神效寒水石研極細末淨皮硝研極細末川大黃各等分末研極細蝦蟆子初夏時河內有蝌蚪成羣大頭長尾者撈來收罈內泥封口埋至秋天化成水右用蝌蚪水一大碗入前藥末各二兩隂乾再研勻收磁罐內每用時以水調塗患處方歌拔毒散治無名毒火毒瘟毒俱可施寒水消黃蝌蚪水浸乾藥末水調之二味拔毒散此散治風濕諸瘡紅腫痛癢疥痱等疾甚效明雄黃白礬各等分右二味為末用茶清調化鵝翎蘸掃患處癢痛自止紅腫即消方歌二味拔毒消紅腫風濕諸瘡痛癢寧一切肌膚疥痱疾雄礬為末用茶清回陽玉龍膏此膏治癰疽隂瘡不發熱不臖痛不腫高不作膿及寒熱流注冷痛痺風腳氣手足頑麻筋骨疼痛及一切皮色不變漫腫無頭鶴膝風等證但無肌熱者一槩敷之俱有功效軍薑三兩炒肉桂五錢赤芍三兩炒南星一兩草烏三兩炒白芷一兩右六味製畢共為細末熱酒調敷方歌回陽玉龍隂毒證不熱不疼不腫髙軍薑桂芍星烏芷研末須將熱酒調冲和膏此膏治癰疽發背隂陽不和冷熱相凝者宜用此膏敷之能行氣疏風活血定痛散瘀消腫祛冷軟堅誠良藥也紫荆皮五兩炒獨活三兩炒白芷三兩赤芍二兩炒石菖蒲一兩五錢右五味共為細末䓤湯熱酒俱可調敷方歌冲和發背癰疽毒冷熱相凝此藥敷行氣疏風能活血紫荆獨芷芍菖蒲鐵桶膏此膏治發背將潰已潰時根腳走散瘡不收束者宜用此藥圍敷膽礬三錢銅緑五錢麝香三分白芨五錢輕粉二錢鬱金二錢五倍子一兩微炒明礬四錢右八味共為極細末用陳米醋一碗杓內慢火熬至一小杯候起金色黃泡為度待溫用藥末一錢攪入醋內炖溫用新筆塗於瘡根周圍以棉紙覆蓋藥上瘡根自生皺紋漸收漸緊其毒不致散大矣方歌鐵桶膏收毒散大周圍敷上束瘡根膽礬銅緑及輕粉五倍明礬麝鬱金烏龍膏此膏治一切諸毒紅腫赤暈不消者用此藥敷上極有神效木鱉子二兩去殼草烏半兩小粉四兩半夏二兩右四味於鐵銚內慢火炒焦黑色為度研細以新汲水調敷一日一換自外向裏塗之須留瘡頂令出毒氣方歌烏龍膏用治諸毒赤暈能收治腫瘍木鱉草烏小粉夏凉水調敷功效良神效千槌膏此膏專貼瘡瘍疔毒初起貼之即消治瘰癧連根拔出大人臁瘡小兒蟺拱頭等證並效土木鱉五個去殼白嫩松香四兩揀淨銅録一錢研細乳香二錢沒藥二錢萞麻子七錢去殼巴豆肉五粒杏仁一錢去皮右八味合一處石臼內搗三千餘下即成膏取起浸凉水中用時隨瘡大小用手捻成薄片貼瘡上用絹蓋之方歌千捶膏貼諸疔毒瘰癧臁瘡蟺拱頭木鱉松香銅乳沒萞麻巴豆杏仁投馬齒莧膏馬齒莧性味清凉能解諸毒今用此一味或服或敷甚有功效所治諸證列後一治楊梅遍身如癩喉硬如管者取莧碗粗一握酒水煎服出汗一治發背諸毒用莧一握酒煎或水煮冷服出汗再服退熱去腐三服即愈并杵莧敷之一治多年頑瘡臁瘡疼痛不收口者杵莧敷之取蟲一日一換三日後腐肉已盡紅肉如珠時換生肌藥收口一治面腫脣緊搗汁塗之一治婦女臍下生瘡痛癢連及二隂者用莧四兩青黛一兩研勻敷之一治濕癬白秃取石灰末炒紅用莧汁熬膏調勻塗之一治丹毒加藍靛根和搗敷之方歌馬齒莧膏只一味楊梅發背服敷之頑瘡面腫搗汁用婦女隂瘡共黛施濕癬白秃加灰末丹毒藍根相和宜潰瘍主治類方四君子湯人參茯苓白术各二錢土炒甘草一錢右四味薑三片棗二枚水煎服四物湯川芎一錢五分當歸三錢酒洗白芍二錢炒地黃三錢右四味水煎服八珍湯人參一錢茯苓一錢白术一錢五分甘草五分炙川芎一錢當歸一錢白芍一錢炒地黃一錢右八味水煎服十全大補湯於八珍湯內加黃耆肉桂水煎服人參養榮湯於十全大補湯內去川芎加陳皮逺志五味子水煎服內補黃耆湯於十全大補湯內去白术加逺志麥門冬水煎服按四君子湯補氣不足者也四物湯補血不足者也八珍湯雙補氣血不足者也十全大補湯大補氣血諸不足者也人參養榮湯去川芎者因面黃血少加陳皮以行氣之滯五味子以收斂氣血遠志以生心血也內補黃耆湯治潰瘍口乾去白术者避其燥能亡津也加遠志麥冬者以生血生津也如痛者加乳香沒藥以定痛硬者加穿山甲皂角刺以消硬也已上諸方凡癰疽潰後諸虛者悉凖於此當隨證酌用之方歌四君參苓白术草四物芎歸芍地黃二方雙補八珍是更加耆桂十補湯榮去芎加陳遠味內去术加遠冬良痛甚乳沒硬穿皂潰後諸虛酙酌方異功散人參二錢白术二錢土炒茯苓一錢甘草五分炙陳皮五分右五味薑三片棗二枚水煎服理中湯人參二錢白术三錢土炒乾薑一錢甘草五分炙右四味水煎服六君子湯人參二錢白术二錢土炒茯苓一錢甘草一錢炙陳皮一錢半夏一錢五分製右六味薑三片棗二枚水煎服香砂六君子湯人參一錢白术二錢土炒茯苓一錢甘草五分炙藿香一錢香或木陳皮一錢半夏一錢五分製砂仁五分右八味薑三片水煎服按四君子湯加陳皮名異功散潰後脾虛氣滯者宜之四君子湯減茯苓加乾薑名曰理中湯潰後脾虛寒滯者宜之蓋氣虛則陽虛陽虛生寒故於補氣藥中加溫熱之味也四君子湯加陳皮半夏名六君子湯潰後氣虛有痰者宜之六君子湯加藿香或木香砂仁名香砂六君子湯潰後胃虛痰飲嘔吐者宜之無痰飲氣虛嘔逆甚者加丁香沉香潰後氣虛有寒加肉桂附子潰後瀉者加訶子肉豆蔲腸滑不固加鶯粟殼食少咳嗽者加桔梗麥冬五味子渴者加乾葛傷食脾胃虛弱加山查神麯穀芽或麥芽此皆潰後氣不足者以四君子湯為主隨證加減也方歌四君加陳異功散理中減苓加乾薑有痰陳半六君子嘔吐砂仁木藿香逆加丁沉寒桂附瀉加訶蔲粟滑腸咳桔冬味渴加葛傷食查麯穀麥良托裏定痛湯