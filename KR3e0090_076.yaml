body:
  text: 編輯外科心法要訣目録嬰兒部赤遊丹毒胎瘤紅絲瘤胎􅬌瘡痘癰葡萄疫胎驚丹毒滯熱丹毒嬰兒瘡瘍垂癰胎風臍瘡臍突隂腫脫肛肛門作癢遺毒痘裏夾癭痘疔痘裏發丹痘爛痘風瘡逐日人神所在不宜針灸歌十二時人神歌十二支日人神所在歌十干日不宜用針犯之病多反覆九宫尻神圖九宫尻神歌升打靈藥固罐法升打靈藥封罐口法煉金頂砒法製寒食麵法御纂醫宗金鑑卷七十六目録欽定四庫全書御纂醫宗金鑑卷七十六編輯外科心法要訣目録嬰兒部赤遊丹毒胎瘤紅絲瘤胎􅬌瘡痘癰葡萄疫胎驚丹毒滯熱丹毒嬰兒瘡瘍垂癰胎風臍瘡臍突隂腫脫肛肛門作癢遺毒痘裏夾癭痘疔痘裏發丹痘爛痘風瘡逐日人神所在不宜針灸歌十二時人神歌十二支日人神所在歌十干日不宜用針犯之病多反覆九宫尻神圖九宫尻神歌升打靈藥固罐法升打靈藥封罐口法煉金頂砒法製寒食麵法御纂醫宗金鑑卷七十六目録欽定四庫全書御纂醫宗金鑑卷七十六編輯外科心法要訣嬰兒部赤遊丹毒胎毒初患赤遊丹腹肢先後內外參內服外貼兼砭血紅輕紫重黑難痊注小兒赤遊丹之證皆由胎毒所致欲發之時先身熱啼呌驚搐不寧次生紅暈由小漸大其色如丹遊走無定起於背腹流散四肢者順起於四肢流入胸腹者逆或初生之後外用熱水洗浴兼以火烘衣物觸動內毒遂成此證治之者先宜砭出惡血看血色紅者輕紫者重黑者死次宜牛羊肉片遍貼紅暈處微乾再易俟肉片不乾換如意金黃散用藍靛清汁調敷內初服大連翹飲次服消毒犀角飲大便祕結加生大黃三五分若煩躁唇焦面赤者宜服五福化毒丹若失治毒氣入裏腹脹堅硬聲音雌啞吮乳不下咽者宜服紫雪散下之一二日間身輕腹軟熱退身涼砭處肉活乳哺如常者生反此者不治大連翹飲連翹去心當歸赤芍防風木通滑石水飛牛蒡子炒研蟬蛻去足翅瞿麥石膏煆荆芥甘草生柴胡黃芩梔子生研車前子各五分水二鍾燈心二十根煎八分子與乳母同服方歌大連翹飲赤遊丹歸芍防通滑蒡蟬瞿麥石膏荆芥草紫芩梔子共車前消毒犀角飲犀角鎊防風各一錢甘草五分生黃連三分生水二鍾燈心二十根煎四分徐徐服之方歌消毒犀角飲黃連防風甘草共和煎赤遊丹毒啼驚搐氣粗身熱服之安五福化毒丹黑參赤茯苓桔梗各二兩牙消青黛黃連龍膽草各一兩甘草五錢生人參硃砂各三錢氷片五分共研細末煉蜜為丸如芡實大金鉑為衣每服一丸薄荷燈心煎湯化服方歌五福化毒清熱速瘡瘤丹毒服即除參苓桔草消氷黛黃連膽草黑參硃如意金黃散見腫瘍門紫雪散見舌部重舌胎瘤嬰兒初産患胎瘤胎熱瘀血是根由色紫漸大熟透刺放出膿汁自可瘳注此證由胎前孕母積熱以致胞熱更兼血瘀滯結而成多生頭上及胸乳間初如李核漸大如饅色紫微硬漫腫不甚疼痛嬰兒初生即有者候過滿月熟透方可針之放出赤豆汁或膿水汁其腫即消初服五福化毒丹兼貼黃連膏潰貼生肌玉紅膏生肌斂口若滿月後生者必待膿鼓熟透針之若瘤皮含血絲者詳注於紅絲瘤五福化毒丹見赤遊丹毒黃連膏見鼻部鼻瘡生肌玉紅膏見潰瘍門紅絲瘤嬰兒初生紅絲瘤皮含血絲先天由精中紅絲腎伏火相傳患此終難瘳注此證一名胎瘤發無定處由小漸大嬰兒落草或一二歲之間患之瘤皮色紅中含血絲亦有自破者治法雖同胎瘤但此患由先天腎中伏火精有血絲以氣相傳生子故有此疾終變火證潰處亦難收斂胎􅬌瘡􅬌瘡始發頭眉間胎中血熱受風纒乾癢白屑濕淫水熱極紅暈類火丹注此證生嬰兒頭頂或生眉端又名奶癬瘡起白屑形如癬疥由胎中血熱落草受風纒綿此係乾􅬌有誤用燙洗皮膚起粟搔癢無度黃水浸淫延及遍身即成濕􅬌俱服消風導赤湯乾者抹潤肌膏濕者用嫩黃蘗頭末與滑石等分撒之膿痂過厚再以潤肌膏潤之又有熱極皮膚火熱紅暈成片遊走狀如火丹治法不宜收斂只宜外發宜服五福化毒丹亦以潤肌膏抹之癢甚者俱用烏雲膏搽之乳母俱忌河海魚腥雞鵝辛辣動風發物緩緩自效消風導赤湯生地赤茯苓各一錢牛蒡炒研白鮮皮金銀花南薄荷葉木通各八分黃連酒炒甘草各三分生燈心五十寸水煎徐徐服方歌消風導赤醫胎􅬌疏風清熱蒡黃連白鮮生地赤苓薄銀花燈草木通甘烏雲膏松香末二兩硫黃末一兩研勻香油拌如糊攤南青布上少半指厚捲成條線扎之再用香油泡一日取出刮去餘油以火點著一頭下用粗碗接之布灰陸續剪去取所滴藥油浸冷水內一宿出火毒抹用方歌烏雲膏搽胎􅬌瘡油拌松香末硫黃布攤捲扎香油泡火燃去灰用油良潤肌膏見頭部白屑風五福化毒丹見赤遊丹毒痘癰痘癰毒留經絡中發無定處腫不紅留於肌肉為易治結於骨節難成功注此證因出大痘漿灌不足以致毒漿不得透發留結經絡之中隨處可生小如李者為毒大如桃者為癰漫腫不紅亦無焮痛身熱多煩若生單個者毒在肌肉屬順易治連發𢾗處者船小載重屬險若結於骨節之間或成對發出者其毒已盛潰破之後滲泄氣血不能斂口屬逆初發不可強消俱宜服透膿散外敷烏龍膏膿熟針之加味太乙膏貼之若氣血虛弱者兼服保元湯潰後潮熱全退毒氣方淨否則他處又發忌生冷硬麵發物保元湯人參白术土炒當歸黃耆各一錢甘草三分炙生薑一片紅棗肉二枚水二鍾煎八分食逺服方歌保元湯補真元氣脾胃虛弱服更宜人參白术炙甘草當歸薑棗共黃耆透膿散烏龍膏俱見腫瘍門加味太乙膏見潰瘍門葡萄疫葡萄疫同葡萄狀感受癘疫鬱凝生遍身發點青紫色毒攻牙齒類疳形注此證多因嬰兒感受癘疫之氣鬱於皮膚凝結而成大小青紫斑點色狀若葡萄發於遍身惟腿脛居多甚則邪毒攻胃以致牙齦腐爛臭味出血形類牙疳而青紫斑點其色反淡久則令人虛羸初起宜服羚羊角散久虛者宜服胃脾湯米疳水潄口以非疳散日擦四五次即效近見中年之人下虛者亦患此證治法同前羚羊角散羚羊角鎊麥冬去心黃芩知母牛蒡子炒研防風元參各八分甘草二分生水二鍾淡竹葉十片煎六分食逺服方歌羚羊角散麥冬芩知蒡防風草元參葡萄疫發初宜服煎加竹葉效如神胃脾湯白术土炒逺志去心麥冬去心沙參茯神陳皮各六分五味子甘草各五分炙水二鍾煎六分食逺服虛弱自汗者去沙參加人參黃耆各五分方歌胃脾湯治葡萄疫日久虛添羸弱宜术逺麥冬五味子沙參甘草茯陳皮非疳散氷片四分人中白煆去臭氣存性五倍子各一兩色存性炒茶褐共研細末先用米泔水潄口後擦此藥方歌非疳中白煆五倍二味同研氷片兌醫治諸疳患處擦清熱止疼去臭穢胎驚丹毒胎驚丹毒面初生形如水痘根微紅時出時隱延頸項繼發丹毒赤遊同注此證因孕母受驚傳襲子胎嬰兒初生之後周歲以上忽兩眼胞紅暈面色青黯煩熱夜啼或面如燕脂此屬伏熱在內散發於面狀如水痘根腳微紅時出時隱延及頸項繼發丹毒初用四聖散洗目其形色順逆治法皆同赤遊丹若此患延及胸乳痰喘抽搐此屬火毒攻裏防變驚風宜服百解散五和湯救之四聖散木賊秦皮紅棗子燈心黃連各五錢共研粗末每用二錢水一鍾煎七分去渣頻洗兩目方歌四聖散治熱毒侵木賊秦皮棗燈心再入黃連研粗末煎湯去渣洗目頻百解散乾葛二兩五錢升麻赤芍各二兩甘草一兩五錢生黃芩一兩麻黃七錢五分炙肉桂二錢五分去粗皮揀薄者刮共研粗末每服二錢水一鍾薑二片蔥一根煎七分不拘時溫服方歌百解驚丹毒內攻煎服不致變驚風乾葛麻黃芩桂草升麻赤芍共薑蔥五和湯大黃枳殼麩炒甘草各七錢五分炙赤茯苓當歸各五錢酒洗共研粗末每服二錢水一鍾煎七分不拘時服方歌五和甘草並當歸赤苓枳殼大黃隨驚丹延乳添抽搐煎服火毒即刻推滯熱丹毒滯熱丹毒赤遊形傷乳多食滯熱生較之赤遊走緩慢先宜消食次宜清注此證初發形若赤遊丹較之赤遊丹遊走緩慢因嬰兒乳食過多不能運化藴熱於內逹於肌表而生發熱面赤口酸舌有黃胎宜服保和丸先消食滯若脣焦便祕者宜一捻金服之丹毒仍作者宜犀角散服之其餘治法俱按赤遊丹保和丸白茯苓半夏製山查肉神麯各一兩炒陳皮蘿蔔子炒連翹各五錢去心右研細末粥丸如梧桐子大每服三十丸白滚水化下方歌保和丸用茯苓夏陳皮蘿蔔子山查神麯連翹丸水服能消乳積效堪嘉一捻金人參大黃黑丑白丑檳榔各等分共為細末每服一字蜜水調下方歌一捻金醫食火積脣焦便祕服通利大黃黑白丑人參檳榔為末須加蜜犀角散犀角屑升麻防己山梔生朴消黃芩黃耆各一錢牛黃五分右為細末每服五分竹葉煎湯調下量兒加減用之方歌犀角散消丹毒赤升麻防己共山梔消芩黃耆牛黃末竹葉湯調服無時嬰兒瘡瘍嬰兒瘡瘍乳火成因食厚味滯火凝更兼六淫氣感受腫潰治法按疽癰注凡嬰兒生瘡瘍小癤多由乳母七情之火或過周嵗能飲食者由過食乾焦厚味而生滯火更兼六淫之氣感受皆能成之但發表攻裏托裏消毒等法及腫潰外治俱按癰疽腫瘍潰瘍門嬰兒純陽火證居多非峻劑不能勝其病但肌體臟腑柔脆應效即止不可過劑垂癰嬰兒垂癰上腭生喉前結腫色紅疼積熱凝結宜刺破服五福丹抹氷硼注此證生於喉前上腭下垂如珠紅腫脹痛不能吮乳三四日後宜用針刺一二分放出膿血其腫痛即減由積熱凝結而成宜服五福化毒丹兼用氷硼散抹於癰處日三抹之乳母當忌魚腥辣物五福化毒丹見赤遊丹毒氷硼散見口部鵝口瘡胎風胎風初起皮色紅狀如湯潑火燒同證由孕母多積熱清胃湯服即有功注此證又名胎赤嬰兒初生身熱皮紅狀如湯潑火燒由孕母過食辛香熱物以致脾胃積熱乳母宜服清胃湯嬰兒亦飲少許外皮焮赤用煆石膏研細敷之如無焮赤乃孕母脾虛用粳米粉敷之若兒大能食米麵身熱皮紅者係腑熱內蒸濕氣外乘之故即名玉爛瘡宜如意金黃散蜜水調敷內服導赤湯即效清胃湯見齒部牙衄如意金黃散見腫瘍門導赤湯見口部口糜臍瘡臍瘡兒臍被水傷草紙燒灰敷最良久而不愈風邪襲恐發風癎緊緊防注此證由水濕傷臍所致若久不愈則發抽搐又因風邪外襲也恐變風癎宜大草紙燒灰敷之或加枯礬或再加龍骨燒灰等分入麝香少許撒之即效臍突臍突胎中積熱生總由孕母失調停兒臍突出腫赤大宜清母子即臍平注此證兒臍突出赤腫虛大是也由孕母失於調停兒在胞胎受母積熱既生之後兒臍即腫宜清母子之熱兒臍不必敷治恐反為害如旬日外兒臍忽腫如吹不赤捻動微響或驚悸作啼者宜用白芍藥湯加薏苡仁令兒服之外以外消散敷之即愈白芍藥湯白芍一兩酒炒澤瀉五錢甘草一錢二分生肉桂一錢者刮去粗皮揀薄共研粗末每用二錢水一鍾煎四分空心頻服臍下痛加鈎藤一錢生薑一片食鹽五釐方歌白芍藥湯澤瀉甘再加肉桂共粗研專醫臍腫驚啼呌空心煎服整二錢外消散大黃牡蠣各五錢煅朴消二錢共研細末用活田螺數十枚洗淨再以清水半盆養之過宿取田螺清水調藥敷於患處其螺仍放水中勿害方效方歌外消散敷臍突冒大黃煅牡蠣朴消活田螺用清水泡過宿取水將藥調陰腫陰腫之證小兒生久坐隂濕寒氣凝或因怒呌氣結閉寒熱虛實擇可行注此證即古名脫囊由久坐陰濕之地為寒氣所凝而成間或有因怒呌氣閉結聚於下而成者俱宜用桃仁丸主之若寒氣客於厥隂少陰者則隂囊腫痛腹痛冷汗引縮二子入腹痛止方出謂之內弔宜烏梅散勻氣散主之有隂莖全縮不見或不縮而陰囊腫大光亮不燥不疼者肝腎氣虛也宜橘核煎湯調勻氣散服之囊腫及四肢俱腫二便不利者膀胱蘊熱風熱相乘也宜白牽牛散主之若女兒陰戶腫脹者心熱相傳也宜導赤湯服之或五苓散用薏苡車前子煎湯調服外治法俱敷立消散甚效桃仁丸桃仁七錢五分微黃去皮尖炒白蒺莉微炒去刺桂心丹皮各五錢黑牽牛二錢五分頭末右為細末煉蜜和丸如黍粒大每服十丸黃酒送下方歌桃仁丸逐隂腫疾怒氣閉結或濕襲蒺莉牽牛桂丹皮研末蜜丸如黍粒烏梅散烏梅肉甘草半生半炙元胡索各五錢鈎藤鈎乳香沒藥各二錢五分共搗粗末每服二錢水一鍾煎七分服方歌烏梅散用乳香沒鈎藤甘草元胡索陰囊腫兼腹中疼煎服必先研粗末勻氣散桔梗二兩炒陳皮一兩去白茴香炒縮砂仁各五錢炒甘草四錢炙薑炭二錢五分共研細末每服五分或一錢白滚水調下方歌勻氣散因外寒侵陰囊腫痛汗淋淋桔梗陳皮甘草炙茴香薑炭縮砂仁白牽牛散白牽牛半生半熟甘草炙橘紅白术土炒桑白皮木通各一錢水煎服方歌白牽牛散草橘紅白术桑白皮木通陰囊相兼四肢腫能逐膀胱熱結壅五苓散白术土炒赤茯苓各一錢五分豬苓澤瀉各一錢桂心五分水煎服方歌五苓白术桂心加赤茯苓除心火邪豬苓澤瀉能分利調和臟腑效堪誇立消散赤小豆風化硝赤芍枳殼商陸各五錢見火曬乾共研為末俱不宜用側柏葉煎湯候冷調敷腫處方歌立消隂囊腫痛注因受風寒濕熱毒赤小豆與風化硝芍枳同研加商陸導赤湯見口部口糜脫肛小兒脫肛肺虛源補中益氣湯居先腫硬作痛除積熱臟毒翻肛臟連丸注此證由小兒氣虛肛脫於外用補中益氣湯加羌活白芍煨薑主之如腫硬疼痛者有濕熱在內當用清熱除濕之劑以清之若生臟毒肛門翻出者以臟連丸為主外治以五倍子老蔥頭朴消煎湯洗之腫用坎宫錠子塗之俱效補中益氣湯見潰瘍門臟連丸見臀部痔瘡門坎宮錠子見腫瘍門肛門作癢肛門作癢係蟲傷下唇必生小白瘡九味蘆薈丸與服外撒銅緑共雄黃注此證係小兒肛門作癢由蟲蝕也視其下唇內必生小白瘡或耳之前後結小核如串珠者是也書曰下唇有瘡蟲蝕其肛宜用蘆薈丸服之外用雄黃銅緑等分為末撒之即效蘆薈丸見齒部牙衄遺毒遺毒稟受結胎先無皮身赤未易痊肌膚紅點次斑爛染受尚可稟毒難注此證係先天遺毒於胞胎有稟受染受之分稟受者由父母先患楊梅而後結胎元嬰兒生後則周身色赤無皮毒攻九竅以致爛斑患此難愈百無一生染受者乃先結胎元父母後患楊梅毒氣傳於胎中嬰兒既生則頭上坑凹肌膚先出紅點次發爛斑甚者毒攻口角眼眶耳鼻及前陰穀道破爛初宜人中黃細末三五分土茯苓煎湯調稠日用二三服腫用太乙紫金錠水磨塗之破爛者用黃蘗蜜炙為末撒之乾用香油調搽投藥應效者後服二黃散十中可保三四若毒延遍身日夜多啼不喫乳食者屬毒甚氣微終難救治二黃散胡黃連山慈菰各二錢甘草一錢五分生牛黃七分右為細末每服三分蜜湯調服方歌二黃散治遺毒方胡連甘草共牛黃山慈菰研為細末每服三分加蜜湯太乙紫金錠見胸部脾發疽痘裏夾癭痘裏夾癭生頸項形如桃李瓜棗狀證兼身熱多渴煩痰氣凝結致此恙注此證結於頸項或生耳後腋下形如桃李棗瓜身熱煩渴由痰氣凝結所致痘初起即發癭者治宜托裏消痰解毒如木通桔梗生地甘草蟬蛻芍藥荆芥等藥缺一不可若芩連等藥及耗爍之劑俱不可用若痘發在三四日而作癭者則毒隨痘泄毒隨痘灌自可挽全而無害宜服三消散倘斯時紅腫將膿一潰則元氣泄而痘漿必不能充灌乘未潰時急用黃耆衛元湯補之若痘至七八日灌漿時而發癭者沖和飲子主之若痘瘡蒼蠟色而作癭者宜消毒兼保元氣潰後宜生肌玉紅膏貼之三消散當歸赤芍天花粉甘草牛蒡子炒研白茯苓生地黃紅花蟬蛻去足翅木通半夏各八分製水二鍾燈心二十根煎六分服方歌三消痘發三四日痰凝結癭須當治歸芍天花甘蒡苓生地紅蟬通夏製黃耆衛元湯黃耆人參當歸桔梗紅花甘草炙白芍酒炒防風各一錢水煎不拘時服方歌黃耆衛元癭腫起已潰未潰急補之人參歸桔紅花草防風芍藥服無時沖和飲子麥門冬去心人參桔梗當歸黃耆柴胡白芍酒炒白茯苓天花粉荆芥防風連翹白术各七分土炒水煎服方歌沖和飲子麥門冬參桔歸耆柴芍苓花粉荆防翹白术痘發七天痰氣凝生肌玉紅膏見潰瘍門痘疔痘疔不與痘瘡同俗呼賊痘是其名色紫黯黑硬如石諸證蜂起難灌膿疔有多般須宜記再審何處發其形捲簾疔生舌根底大小不一最易明火珠痘生鼻孔內闐塞噴火面赤紅眼沿生疔名忘汲腫如封蛤熱煩增豢虎疔於耳內見腎毒攻耳致成形燕窩疔生兩腋下面赤譫語更腫疼注命疔生足心裏紫筋直透足股中透腸疔在肛內發痛如錐刺一般同驪龍疔生尿孔內身熱譫語便不通法按疔名施藥治自然諸證悉能平注此證名多治不一法痘生五六日間或三五枚或六七枚雜於諸痘之間其色紫黯甚則黑硬如石有此以致諸證蜂起不能灌膿如捲簾疔生於舌根底小如黑豆大似葡萄令兒舌捲喉痛急用銀鈎鈎破儘淨惡血隨以苦茶潄口搽拔疔散再以氷片硼砂青黛黃連薄荷荆芥炒殭蠶共為細末吹用火珠疔生於鼻孔內闐塞噴火面赤眼紅亦用銀鈎鈎破用黃連膏加氷片滴入鼻孔內服瀉金散忘汲疔生於眼沿腫如封蛤煩熱面紫宜挑破用燕脂嚼汁點之兼蒲公英菊花煎湯洗之豢虎疔生於耳內於膿成之時宜挑破搽拔疔散燕窩疔生於腋下腫破面赤譫語如疔在左腋潛注則右體之痘沉伏失色右亦如之亦挑破去其根用拔疔散搽之服消毒飲子注命疔生兩足心腫硬如錢如豆如椒有紫筋直透足股挑之去淨血用田螺水點之次用愼火草菉豆浸脹搗爛敷之透腸疔生肛門旁在六七朝腫硬如錐挑之銀花防風煎湯令洗之次用輕粉珍珠氷片白斂末塗之內服黃連解毒湯驪龍疔生尿孔內於五六朝身熱譫語眼翻肢厥腹脹小便閉澀急用蟾酥牛黃氷片麝香研末次用黃連細茶濃煎候冷取半匙調末以細軟稻心蘸之送入孔內服消毒飲子甚效瀉金散犀角鎊牛蒡子炒研紅花生地桔梗赤芍紫蘇甘草各一錢生水煎服方歌瀉金散治火毒疔面赤眼紅鼻內疼犀蒡紅花生地桔赤芍紫蘇甘草生消毒飲子白茯苓生地連翹去心牛蒡子炒研紅花甘草生犀角鎊木通赤芍各一錢燈心二十根水煎服方歌消毒飲子苓生地翹蒡紅花甘草犀木通芍藥燈心共善却疔毒火證宜拔疔散見牙齒部牙疔黃連膏見鼻部鼻瘡田螺水見臀部黃連解毒湯見耳部黑疔痘裏發丹痘裏發丹因熱極宜施涼血散毒劑塗抹內服量寒涼外用化斑湯洗浴注此證由內熱甚極而成內宜服生地牛蒡芍藥甘草木通荆穗等藥其毒自消腫痛者加柴胡羌活頭頂盛者毒湊上焦也宜用炒黃連柴胡甘草車前子梔子等藥外用化斑解毒湯洗浴量服寒涼藥及豬膽京墨氷片塗抹丹之形色與赤遊丹毒參考化斑解毒湯見肋部內發丹毒痘爛痘爛浸淫無完膚水淬茶葉帶濕鋪上隔草紙令兒卧一夜膿乾爛即除注此證係出痘破爛身無完膚膿水浸淫沾黏衣服宜用茶葉揀去梗入滚水一煠即撈起再揀去梗濕鋪牀上上隔草紙令兒卧之一夜膿乾甚效痘風瘡痘風瘡生先作癢次延成片水浸淫痘後遇風甚成癩麥餞散搽效可申注此證由痘後遇風所致先發細瘡作癢次延成片脂水漸長浸淫宜滲濕救苦散搽之兼避風戒口甚者搔癢毒水浸淫肌無完膚即成痘癩急用十全大補湯大補氣血兼散風苦參丸以清熱解毒二方合而服之外塗麥餞散甚效滲濕救苦散蜜陀僧滑石各二兩白芷五錢右研細末乾用白蜜調搽濕則乾撒方歌滲濕救苦散白芷蜜陀僧研入滑石痘風瘡起癢成片白蜜調搽可去之麥餞散小麥一合存性炒焦硫黃四錢白砒一錢共研細又加煙膠末八錢枯礬末川椒末各三錢共和勻先以蔥湯洗淨患處香油調塗油紙蓋扎三日一換方歌麥餞痘風成癩恙小麥炒加砒硫黃次入煙膠枯礬末川椒調油搽上良十全大補湯見潰瘍門散風苦參丸見發無定處癬逐日人神所在不宜針灸歌人神走注須當記足大指兮屬初一外踝二日股內三四日在腰五口寄六手七日內踝存八腕九尻腰背十十有一日鼻柱間十二日兮在髮際十三注於牙齒中十四常在胃腕聚遍身十五十六胸十有七日氣衝集十八股內足十九二十日在內踝麗二十一日手小指念二外踝神所寓肝及足兮二十三在手陽明念四日二十五日足陽明念六在胸念七膝二十八日伏於陰念九即在膝脛室三十日兮在足趺人神所在刺灸忌十二時人神歌子踝丑腰寅在目卯面辰頭巳手屬午胸未腹申在心酉背戌頭亥股續十二支日人神所在歌子不治頭君須認丑日腰耳寅胸應卯日鼻脾辰膝腰巳手午心真捷徑未頭手足申頭背酉行膝背同其類戌日在隂頭面間亥日遊行頭頸位十二支神禁灸歌男除女破應該會十干日不宜用針犯之病多反覆甲不治頭乙耳喉丙肩丁背與心求戊己腹脾庚腰肺辛膝壬當腎脛收癸日不宜針手足十干不犯則無憂此神農所置一歲起坤二歲震逐年順飛九宮周而復始行年到處則所主敗切忌針灸愼勿犯之否則變生他病九宮尻神歌尻神所在有根由坤內外踝聖人留震宮牙口腨宜記巽位還居乳口頭中宮肩骨連尻骨背面目從乾上遊手膊兌宮難砭灸艮宮腰項也須休離膝肋脅針難下坎肘還連肚腳求為醫精曉尻神訣萬病無干禁忌憂升打靈藥固罐法宜用陽城罐將罐熇熱搗大蒜於罐外遍擦之再熇再擦如是三四次次以薑醋入罐內蕩之煮之以乾為度次用黃土二分煤灰二分以馬毛以鹽水合之固罐一指厚陰乾裂縫再固必要完固聼用升打靈藥封罐口法入藥畢蓋鐡盞用鐡絲鑻畢用石膏無名異等分食鹽減半俱煅過為極細末醋調成膏次加炭火二三塊於盞內燒盞熱以筆蘸藥周圍塗之隨乾隨塗以口平為率一用石膏生白礬食鹽三味等分為末水調塗之如前煉金頂砒法用鉛一斤小罐內炭火煨化投白砒二兩於化煬鉛上煉煙盡為度取起冷定打開金頂砒結在鉛面上取下聼用製寒食麵法用白麵一斤外再以麵半斤水調稠厚趕成薄片二塊將前麵包合於內周圍揑緊於清明正日蒸熟挂透風處隂乾用麵包藏勿經女手愈久愈效御纂醫宗金鑑卷七十六
