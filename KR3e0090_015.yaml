body:
  text: 訂正傷寒論註目録辨可汗病衇證篇辨不可汗病衇證篇辨可吐病衇證篇辨不可吐病衇證篇辨可下病衇證篇辨不可下病衇證篇御纂醫宗金鑑卷十五目録欽定四庫全書御纂醫宗金鑑卷十五訂正傷寒論註目録辨可汗病衇證篇辨不可汗病衇證篇辨可吐病衇證篇辨不可吐病衇證篇辨可下病衇證篇辨不可下病衇證篇御纂醫宗金鑑卷十五目録欽定四庫全書御纂醫宗金鑑卷十五訂正仲景全書傷寒論註辨可汗病衇證篇夫以為疾病至急倉卒尋按要者難得故重集諸可與不可方治比之三陰三陽篇中此易見也又時有不止是三陰三陽出在諸可與不可中也註夫以疾病至急倉卒尋求治法難得其要者汗吐下也故重集汗吐下諸可與不可與之法比之三陰三陽篇中則易見也又時有不止是三陰三陽篇中者亦出在諸可與不可與中也大法春夏宜發汗註春夏陽氣舒暢故宜發汗醫治常道此大法也集註程應旄曰春夏宜發汗者發汗有助宣陽氣之功等於春夏發生長育之義今人多以麻桂二湯作春夏之禁藥其輕於畔經者由其未明天道也凡發汗欲令手足俱周時出以漐漐然一時間許亦佳不可令如水淋漓若病不解當重發汗汗多者必亡陽陽虚不得重發汗也註凡發汗令手足俱周時出是欲汗緩出周遍則邪氣悉去正氣不傷也以漐漐然不得令如水淋漓為度不欲汗急出過多也若急出過多則邪氣不盡正氣反傷矣倘若病不解當重發汗但前汗已多更汗必亡其陽陽虚即病不解故不敢再發其汗也集註成無己曰汗緩緩出則表裏之邪悉去汗大出則邪氣不除但亡陽也陽虚為無津液故不可重發汗方有執曰此丁寧發汗之節度也張錫駒曰汗乃津液汗多則亡津液何以又謂亡陽也經云上焦開發腠理薰膚充身澤毛若霧露之溉盖汗雖津液必藉陽氣之薰蒸宣發而後出故汗多亡津液而陽亦隨之俱亡也凡服湯發汗中病即止不必盡劑也註服湯發汗汗出病解便可止再服不必定然盡劑集註張應旄曰中病即止亦麻黄桂枝互舉之詞示撙節於中字所以嚴不中之禁也凡云可發汗無湯者丸𣪚亦可用要以汗出為解然不如湯隨證良騐註凡云可發汗無湯者一時倉卒無湯以丸散代之亦可要不過以汗出為解耳然丸散乃定劑不如湯可隨證而進其騐甚凖故曰良也集註程應旄曰丸𣪚僅可從權隨證則不如湯夫病衇浮大問病者言但便鞕耳設利者為大逆鞕為實汗出而解何以故衇浮當以汗解註衇浮大屬表未解雖有便鞕裏實亦不可利下何以故因衇浮也當先解其外表解熱除内外和諧而大便自通矣設用利藥是為大逆也集註成無己曰結胸雖急衇浮大尤不可下下之即死況此便鞕乎論中有云本發汗而復下之此為逆若先發汗治不為逆此之謂也辨不可汗病衇證篇衇濡而弱弱反在闗濡反在巔㣲反在上濇反在下㣲則陽氣不足濇則無血陽氣反㣲中風汗出而反躁煩濇則無血厥而且寒陽㣲發汗躁不得眠註浮而無力濡衇也沉而無力弱衇也浮中沉俱無力似有似無㣲衇也滯而不流利濇衇也巔謂浮也上謂寸也下謂尺也衇濡而弱弱反在闗濡反在巔㣲反在上濇反在下謂闗衇浮濡沉弱寸衇㣲尺衇濇陽虚則寸衇㣲血少則尺衇濇此陽虚血少不可汗之衇也陽虚當汗出惡寒血少當心煩發熱此陽虚血少不可汗之證也若誤認為太陽中風而發其汗必致陰陽相失而兩亡則反煩躁不眠厥而且寒矣衇濡而弱弱反在闗濡反在巔弦反在上㣲反在下弦為陽運㣲為陰寒上實下虚意欲得温㣲弦為虛不可發汗發汗則寒慄不能自還註此謂闗衇浮濡沉弱寸衇弦尺脉㣲也弦為少陽熱邪之證㣲為少陰寒邪之證故曰上實下虚也然㣲弦同見虚實未審惟察其人意欲得温則非惡寒在表而是畏寒在裏也故不可發汗若誤發其汗則陰愈盛而生寒慄陽愈衰而不能自還矣諸衇得數動㣲弱者不可發汗發汗則大便難腹中乾胃燥而煩其形相像根本異源註凡諸病得數動衇者有餘證也可發汗若按之㣲弱者是外假實而内真虛也不可發汗若誤發其汗傷其津液則腹中乾大便難胃燥而煩其形似胃實熱結之陽明究其根本實由發虛家汗致成津枯虚燥之陽明也故曰其形相像根本異源也集註程知曰動數為實㣲弱為虛發汗動津液則便難腹乾胃燥而煩此與陽明裏熱之證雖曰其形相似而根本則有虛實之不同也張志聰曰動數陽衇也㣲弱陰衇也諸衇得動數㣲弱者猶言左右三部或得動數之衇而按之㣲弱者皆不可發汗發汗則津液内竭故大便難水氣外洩故腹中乾火熱上蒸故胃燥而煩其形相像者汗後而燥證相同也根本異源者動數之衇屬乎陽㣲弱之脈屬乎陰有陰有陽有虚有實也厥衇𦂳不可發汗發汗則聲亂咽嘶舌萎聲不得前註可發汗之衇必陰陽俱𦂳今厥而衇𦂳乃少陰之𦂳非太陽之𦂳也若發其汗則傷少陰之氣聲亂咽嘶舌萎聲不得前之證作矣集註成無己曰厥而衇𦂳則少陰傷寒也法當温裏而反發汗則損少陰之氣其衇不能入肺中循喉嚨挟舌本故聲亂咽嘶舌萎聲㣲言語不得髙也魏荔彤曰此叚就厥證論衇知陽虚禁汗因明諸逆發汗之貽悞也厥者凡厥有冷厥熱厥蚘厥寒熱相勝之厥但見𦂳衇無論何厥病皆在陰若發汗反攻其陽則氣散血竭夫舌根於腎聲出於肺聲亂咽嘶肺氣欲絶也舌萎即萎不為用也聲不得前本氣不振也皆由於發汗散亡其腎肺二臓真氣也動氣在右不可發汗發汗則衂而渴心苦煩飲即吐水動氣在左不可發汗發汗則頭眩汗不止筋惕肉瞤動氣在上不可發汗發汗則氣上衝正在心端動氣在下不可發汗發汗則無汗心中大煩骨節苦痛目暈惡寒食則反吐穀不得前註動氣者築築然氣跳動也臍之上下左右四蔵之位也四蔵之氣不安其位故動也縁素為客邪所據本蔵之氣已失其守尚頼中州胃氣為主即有表邪不可發汗恐胃中之氣液兩傷本蔵失養則所不勝之邪因而同病也動氣在右肺氣不治心不恒徳若誤汗之則心氣愈熱血衇沸騰故衂而渴苦煩也肺失治節不能通調水道故飲即吐水也動氣在左肝氣不治肺不恒徳若誤汗之則肝虛失升故頭眩也若汗出不止津液失養筋肉故惕瞤也動氣在上心氣不治腎不恒徳若誤汗之則心氣虚故腎氣上衝正在心端也動氣在下腎氣不治脾不恒徳若誤汗之腎水虚竭故骨痛惡寒無汗心煩目暈也脾土過燥不守常化故食則反吐穀不得近也集註程知曰此言動氣不可發汗也盖正氣内虚蔵氣不治故氣築築然動動氣為裏虚故不可發汗程應旄曰藏氣不安其位故動因素有邪據本蔵之氣反在依附之間最易離經所恃奠定之者全頼胃氣為之主發汗虚其胃氣則四蔵失所養反被邪攻各見離經之象病雖左右上下之不同要其失於建中之義則一也咽中閉塞不可發汗發汗則吐血氣㣲絶手足厥冷欲得踡臥不能自温註少陰之衇循喉嚨繫舌本咽中閉塞少陰之氣不能上通也若强發少陰汗陽㣲不能作汗必動其血故吐血氣㣲絶踡臥厥冷不能自温也集註程知曰咽中閉塞不可發汗盖陰邪盛也强發其汗必動其血至於吐血氣欲絶則併腎中之㣲陽不能自存故遂手足厥冷欲得踡臥不能自温夫下厥上竭踡臥厥冷在少陰皆危證也程應旄曰汗劑為陽施於陰經則逆咽中閉塞由少陰液少腎氣不能上通也發少陰汗則下厥上竭故見證如此欬者則劇數吐涎沫咽中必乾小便不利心中饑煩晬時而發其形似瘧有寒無熱虛而寒慄欬而發汗踡而苦滿腹中復堅註欬者則劇欬之甚也數吐涎沫肺傷液耗矣故咽乾小便不利心中饑煩也晬時週時也謂週時一發其形似瘧有寒無熱中虛而生寒慄也若誤以為形寒之欬而發其汗則肺氣既虚而衛陽又亡陽氣兩傷不能温及中下陰氣凝於内外自踡而苦滿腹中復堅矣集註程知曰此承上言濡弱弦㣲之衇其有欬者則病劇而不可汗也欬則數吐涎沫其咽中必乾小便必不利膈中陽虚必心中饑而煩衛氣一日夜五十度週於身陽虚不能自衛故晬時寒慄如瘧但有寒無熱此而發汗則陽氣愈虚陰寒益盛必踡而苦滿腹中轉堅也欬而小便利若失小便者不可發汗汗出則四肢厥而逆註欬多飲病小便應不利若小便利知無飲也今欬而遺失小便是不但無飲且係下焦陽虛膀胱不固之欬也故不可發汗汗出則陽氣愈衰四肢逆冷矣集註程知曰内經謂腎欬不已膀胱受之膀胱欬狀欬而遺尿故欬而小便利若失小便者是腎中陽虚也發汗則陽氣益亡故厥冷諸逆發汗病㣲者難差劇者言亂目眩者死命將難全註不當汗而汗當汗而過汗皆致逆故曰諸逆也發汗致逆之病病㣲者難差病劇者則死劇者謂陽脱見鬼則言亂陰脱目盲則目眩也集註程應旄曰諸逆屬少陰居多陰寒極矣發汗是重奪其陽雖有㣲劇不同皆闗於死明乎陽為人命之根也傷寒頭痛翕翕發熱形象中風常㣲汗出自嘔者下之益煩心懊憹如饑發汗則致痙身强難以屈伸熏之則發黄不得小便灸則發欬唾註頭痛翕翕發熱汗出則嘔形相中風者當以桂枝湯解肌若下之重則變結胸痞鞕輕則為心中益煩懊憹如饑不以桂枝湯解肌而以麻黄湯發汗表虚風入則致痙故身强難以屈伸也或以火熏蒸刼汗則不得小便熱従濕化而發黄也灸則火邪傷肺故發欬唾不已也集註成無己曰若反下之邪熱乗虚流於胸中為虚煩心中懊憹如饑若發汗則虚表熱歸經絡熱甚生風故身强直而成痙若熏之則火熱相合消爍津液故小便不利而發黄肺惡火灸則火熱傷肺必發𠻳而欬唾也髙士宗曰汗下火熏施治各異損正則一故舉下之熏之與發汗而並論之也魏荔彤曰此申明雖有表證宜汗亦當詳察知禁也似中風頭痛翕翕發熱桂枝證也嘔則仍是水飲内畜矣誤下益煩懊憹如饑則未下時已煩可知此特更甚耳若再誤汗表虛風入故身强難以屈伸火熏逼汗熱入於裏故小便不得盖小便利者不成黄證發黄則小便為濕邪所阻熱邪所耗可知灸則熱上衝故欬唾膿血也辨可吐病衇證篇大法春宜吐註汗吐下治病之大法謂春宜於吐者是象天之春氣上升以立法也然凡病有當吐者則吐之又不可一㮣而論也集註程應旄曰吐法從升有發陳之義故曰春宜吐凡用吐湯中病便止不必盡劑也註凡用吐湯原以去上焦之邪中病即止若病去而過用之反傷中氣所以不必盡劑也集註程應旄曰吐以去上焦之邪上焦為清陽之分吐之過劑則邪去而所傷者膻中之陽陽固不可不寶惜也病胸上諸實胸中鬱鬱而痛不能食欲使人按之而反有涎唾下利日十餘行其衇反遲寸口衇惟滑此可吐之吐之利則止註胸上諸實謂或痰或熱或寒之類也諸實為病故胸中鬱鬱而痛不能食也欲使人按之不但痛不能減而反有涎唾知邪在胸中盛滿得按而上溢也經曰下利衇遲而滑者内實也今下利日十餘行其衇反遲寸口惟滑知寒實在上水不下輸膀胱而走大腸也故但吐之利自止也集註張璐曰痛不得食按之反有涎唾者知有寒痰在胸中也下利衇遲寸口惟滑者為膈上實故吐之則利自止也病手足逆冷衇乍結以客氣在胸中心下滿而煩欲食不能食者病在胸中當吐之註病人手足厥冷衇乍結者以寒邪結氣結在胸中陽氣不能四達也心下滿而煩者實結則滿陽鬱則煩也欲食不能食者是客氣病在胸中故當吐之也集註成無己曰此與𤓰蒂散證同彼云衇乍𦂳此云衇乍結惟此有異𦂳為内實乍𦂳則邪在胸中實而未深也結為結實乍結則邪在胸中結而未深也雖所治俱同但輕之重之不無别也程知曰衇来緩時一止復来曰結結者痰氣結滯之名此與𤓰蒂散證同但彼云衇乍𦂳則為寒邪盛此云衇乍結則為痰氣實也張錫駒曰病人手足厥冷者氣機内結不能外逹於四肢也心下滿而煩者邪實則滿正傷則煩也魏荔彤曰衇乍結非衇之本然乃有形之邪阻礙其胸中宗氣故榮衛之氣不能暢行非同於氣血虚㣲不能流布之結也宿食在上脘者當吐之註胃有三脘宿食在上脘者痛在胸膈痛則欲吐可吐不可下也在中脘者痛在心口痛欲吐或不吐可吐可下也在下脘者痛在臍上痛不欲吐不可吐可下也故曰宿食在上脘者當吐之此詳凡在上者皆可吐也集註成無己曰宿食在中下脘則宜下宿食在上脘則當吐内經曰其髙者因而越之其下者引而竭之方有執曰上脘謂胃府之口也張志聰曰胃為水穀之海有上脘中脘下脘之分上主納中主化今食在上脘不得腐化故為宿食當吐之程應旄曰宗氣聚於胸中升降呼吸出焉清陽之分豈容濁物留滯吐以宣之使無障礙也若屬表邪傳入無形而有形則痞滿結胸另有治法均非宜矣辨不可吐病衇證篇具見六經中辨可下病衇證篇大法秋宜下註天至秋則氣降物至秋則成實實則宜下凡邪在下者俱宜取法乎此義也凡可下者用湯勝丸散中病便止不必盡劑也註湯者盪也丸者緩也下藥貴速故凡服下藥用湯所以勝丸也中病即止不必盡劑者恐盡劑反傷其正氣也集註程應旄曰用湯勝丸貴活法也中病即止示節制也下利三部衇皆平按之心下鞕者急下之宜大承氣湯註下利心下鞕者諸㵼心湯證也若寸闗尺三部衇平實有力雖下利仍宜攻其鞕也集註方有執曰三部衇皆平血氣和可知矣心下鞕實也所以急下之也張錫駒曰本經云若自下利者衇當㣲厥今反和者此為内實也宜下之下利衇遲而滑者内實也利未欲止當下之宜大承氣湯註衇遲不能兼滑惟浮取之遲沉取之滑則有之矣今下利衇遲而滑謂浮遲而沉滑也浮遲則外和沉滑則内實欲止内實之下利仍當下之使積去則利自止宜大承氣湯集註程應旄曰遲而滑滑在下而遲在上知為物阻之遲非寒陰之遲故但下其所阻則内實去而利自止矣問曰人病有宿食何以别之師曰寸口衇浮而大按之反濇尺中亦㣲而濇故知有宿食當下之宜大承氣湯按尺中㣲字當是大字若是㣲字斷無當下之理註寸口衇浮而大按之反濇謂按之且大且濇且有力也闗上尺中亦然大濇有力為實而不利之證故知有宿食也當下之宜大承氣湯集註程知曰滑為有食結滯經宿則衇澁矣尺以候内沉以候裏故宿食之衇按之反濇尺中亦大而濇也下利不欲食者以有宿食故也當下之宜大承氣湯註初下利不欲食者是傷食惡食故不欲食也若久下利不欲食者是傷脾食後飽脹不欲食也今初下利即不欲食故知有宿食也當下之宜大承氣湯無疑也集註程應旄曰傷食惡食故不欲食與不能食者自别下利有此更無别様虚證知非三陰之下利而為宿食之下利也故當下之下利差至其年月日時復發者以病不盡故也當下之宜大承氣湯註下利差後至其年月日時而復發其利者此宿食積病攻之不盡故也若其人形氣不衰飲食尚强當攻其未盡自不復發矣宜大承氣湯集註方有執曰其期也謂周其一年之月日期也程應旄曰下利差後而餘邪之棲於腸胃迴折處者未盡是為伏邪凡得其候而伏者仍應其候而伸下則搜而盡之矣下利衇反滑當有所去下乃愈宜大承氣湯註此承上條互發其義以詳其衇也下利衇反滑是證虛衇實不相宜也若其人形氣如常飲食如故乃有當去之積未去也下之乃愈宜大承氣湯集註程應旄曰滑為實故可行通因通用之法病腹中滿痛者此為實也當下之宜大承氣湯註腹中不滿而痛者病或屬虚若滿而痛則為實矣當下之宜大承氣湯集註張璐曰腹中既滿且痛為實結無疑急湏下之程應旄曰病腹中滿痛雖在陰經亦可下不必其為陽明矣傷寒後衇沉沉者内實也下之解宜大柴胡湯註傷寒後不解衇沉沉而有力者内實也宜以下解然其人必午後小有潮熱故取大柴胡兩解之也衇雙弦而遲者必心下鞕衇大而𦂳者陽中有隂也可下之宜大承氣湯註雙弦謂左闗右闗皆見弦衇也左闗衇弦肝本衇也右闗衇弦木刑土也弦者飲也遲者寒也心下鞕者是肝邪挟寒飲而傷胃故不可下乃生薑㵼心湯證也若衇大按之𦂳是陽有餘而陰亦實也乃有餘之鞕非胃傷者比故可下之宜大承氣湯也辨不可下病衇證篇衇濡而弱弱反在闗濡反在巔㣲反在上濇反在下㣲則陽氣不足濇則無血陽氣反㣲中風汗出而反躁煩濇則無血厥而且寒陽㣲則不可下下之則心下痞鞕註此即前不可發汗之條所謂闗衇浮濡沉弱寸衇㣲尺衇濇陽虚血少之證也汗既不可下亦不可均為陽虚故也若誤下之則寒虚内竭心下痞鞕必成太陰誤下下利之痞鞕矣集註程應旄曰誤汗亡陽分之陽誤下亡陰分之陽無陽則陰獨而地氣得以上居故心下痞鞕衇濡而弱弱反在闗濡反在巔弦反在上㣲反在下弦為陽運㣲為陰寒上實下虚意欲得温㣲弦為虚虚者不可下也註此亦前不可發汗之條所謂闗衇浮濡沉弱寸衇弦尺衇㣲上實下虚之證也㣲弦為虚既不可汗亦不可下下虚故也集註成無己曰虚家下之是為重虚衇濡而弱弱反在闗濡反在巔浮反在上數反在下浮為陽虚數為無血浮為虚數生熱浮為虚自汗出而惡寒數為痛振而寒慄㣲弱在闗胸下為急喘汗而不得呼吸呼吸之中痛在於脇振寒相搏形如瘧狀醫反下之故令衇數發熱狂走見鬼心下為痞小便淋漓少腹甚鞕小便則尿血也註此謂闗衇浮濡沉弱寸衇浮尺衇數也闗濡弱為中氣虚乏寸浮無力為陽虚尺數無力為血虚陽虚故汗自出而惡寒血虚故身痛振寒而慄中氣虚乏故胸膈氣急喘汗而不得呼吸呼吸之中痛引於脇也振寒相搏形如瘧狀裏邪不實表邪未解醫反下之虚陽未罷之表盡陷扵裏故令衇虚數無倫發熱狂走見鬼心下為痞少腹甚鞕小便淋漓尿血也集註張璐曰寸口浮濡而闗弱尺數者以其人陽氣本虚虚陽陷扵陰分也若誤下傷血必致狂走痞滿尿血也魏荔彤曰前虚寒之忌下易知此虚而兼熱之忌下難知故兩條相映互言以示禁也衇濡而𦂳濡則衛氣㣲𦂳則榮中寒陽㣲衛中風發熱而惡寒榮𦂳衛氣冷㣲嘔心内煩醫為有大熱解肌而發汗亡陽虚煩躁心下苦痞堅表裏俱虚竭卒起而頭眩客熱在皮膚悵怏不得眠不知胃氣冷𦂳寒在闗元技巧無所施汲水灌其身客熱因時罷慄慄而振寒重被而覆之汗出而冒巔體惕而又振小便為㣲難寒氣因水發清穀不容間嘔變反腸出顛倒不得安手足為㣲逆身冷而内煩遲欲從後救安可復追還註衇濡而𦂳謂浮濡而沉𦂳也濡則衛表㣲𦂳則榮裏寒外有發熱汗出惡寒之表内有㣲嘔心煩之裏醫為有熱解肌發汗表陽愈虚而生煩躁裏寒更急心下痞鞕表虚裏冷故卒起頭眩悵怏不眠若徒以客熱在膚不知中寒在裏而以冷水灌身雖客熱因而時罷但慄慄振寒不容不重被而覆之汗出必眩惕振厥逆下利清穀煩躁不安而死以中外之陽兩亡不能復還也集註張錫駒曰汗出而冒巔者汗出則陽氣外亡頭昏冒而目不明故曰冒巔小便為㣲難陽亡而氣不施化也清穀不容間下利清穀無間隙之時也嘔變者嘔出之味變也腸出者下利而廣腸脱出也衇浮而大浮為氣實大為血虚血虚為無陰孤陽獨下陰部者小便當赤而難胞中當虚今反小便利而大汗出法應衛家當㣲今反更實津液四射榮竭血盡乾煩而不得眠血薄肉消而成暴液醫復以毒藥攻其胃此為重虚客陽去有期必下如汚泥而死註衇浮而大謂衇浮取有力按之大而無力乃革衇象也浮為氣實外急大為血虚中空血虚甚則亡陰陰亡則陽無偶也故曰孤陽獨下陰部謂衛陽下就其陰小便當赤而難以胞中虚竭也若陽不下就其陰則小便反利而大汗出是衛陽表虚邪陽内入無陰以化故反更實致津液四射榮竭血盡肉消胃乾煩不得眠也醫不知此乃以中空暴液之陽明誤為胃實復以峻藥攻之則為虚虚胃陽之去可期必下汚穢如涅而死也集註程知曰此言氣實血虚之衇小便利而大汗出者不可下也程應旄曰無陰而孤陽獨下陰部倘得小便赤而難則胞中不虚僅為陽摶陽未離則陰得滯而未散今反小便利而大汗出則衛氣更㣲矣其反更實者非衛陽之實而客陽之實也衛陽猶或抱陰客陽則専於攻陰故津液四射而為小便利為大汗出熱甚逼陰所以榮竭血盡乾煩而不得眠血薄肉消而成暴液暴液云者㸃滴皆火氣煎熬而出也毒藥攻胃則土敗而四蔵無生下如汚泥而死矣傷寒衇陰陽俱𦂳惡寒發熱則衇欲厥厥者衇初来大漸漸小更来漸大是其候也如此者惡寒甚者翕翕汗出喉中痛若熱多者目赤衇多睛不慧醫復發之咽中則傷若復下之則兩目閉寒多便清穀熱多便膿血若熏之則身發黄若熨之則咽燥若小便利者可救之若小便難者為危殆註傷寒衇陰陽俱𦂳惡寒發熱太陽表證也則衇欲厥謂浮𦂳之衇初大漸小知為欲厥之衇也初来大陽為之也故發熱漸漸小陰為之也故發厥更大更熱更小更厥是其候也如此者當以寒熱别其厥惡寒甚翕翕汗出咽中痛是少陰寒厥也發熱多目赤衇多睛不了了是陽眀熱厥也寒甚熱多之厥而誤發之則咽痛似傷而誤下之則兩目多閉凡厥者必下利寒厥之利下利清穀也熱厥之利下利膿血也此又以利辨厥之寒熱也若以薫蒸取汗則發身黄濕熱合也若以火熨取汗則咽燥火甚傷津也若小便利者則陰未亡故可救之小便難者則陰已亡為危殆也集註程知曰言外傷扵寒為濕熱之病不可汗下薰熨也張璐曰衇来厥者知厥逆之寒熱交勝也初来大者為邪氣鼓動漸漸小為正氣受傷更来漸漸大為邪氣復進也盖因其人正氣本虚不能主持隨邪氣進退故其衇亦隨邪氣進退忽大忽小也小便利者津液未竭小便難者津液已絶為危殆也傷寒發熱口中勃勃氣出頭痛目黄衂不可制貪水者必嘔惡水者厥若下之咽中生瘡假令手足温者必下重便膿血頭痛目黄者若下之則目閉貪水者若下之其衇必厥其聲嚶咽喉塞若發汗則戰慄陰陽俱虚惡水者若下之則裏冷不嗜食大便完穀出若發汗則口中傷舌上白胎煩燥衇數實不大便六七日後必便血若發汗則小便自利也註傷寒發熱口中勃勃氣盛而出頭痛目黄將欲作衂衂不可制以陽邪盛故衂之甚也貪水者水與熱摶故嘔也惡水者裏陰寒盛故厥也傷寒發熱口中出氣盛者若下之熱邪入淺咽中生瘡入深下重膿血頭痛目黄者若下之則兩目閉液傷乾濇也貪水者若下之熱去水停故肢厥聲嚶咽喉塞也若發汗過多亡陽故戰慄表裏俱虚也惡水者若下之裏寒更甚故不嗜食下利完穀也若發汗動其虚陽故口中瘡舌上白胎煩燥也若衇數有力不大便而惡水熱在於陰故六七日後必便血也若更發其汗陰陽俱虚故小便自利也集註程知曰傷寒發熱熱在表也口中勃勃氣出熱在裏也頭痛目黄衂不可制所感之寒與所鬱之熱共蒸於上也此當以貪水惡水辨之貪水者隂虚而熱勝水入而熱與之拒故嘔也惡水者陽虚而寒勝水入而陽氣不任故厥也盖熱氣挟寒邪上蒸法當辨寒熱多寡而用清解設不知而妄下之是强抑之而邪不服必至咽瘡若手足温而不厥者其熱為勝必以下而致便膿血也頭痛目黄者下之則熱内䧟而目閉若貪水者陰虚為寒下所抑其衇必厥其聲必如嚶兒餲塞不揚也此而更發其汗則亡陽戰慄陽亦與陰俱虚矣若惡水者陽虚加之寒下則有裏冷不嗜食大便完穀出之變也此而更發其汗則虚陽外發必口爛舌白胎而煩燥也衇數實不大便者至六七日後當便血此當下之若更發其汗則非惟大便不行併小便亦為之不利矣㣲則為欬欬則吐涎下之則欬止而利因不休利不休則胸中如蟲囓粥入則出小便不利兩脇拘急喘息為難頸背相引臂則不仁極寒反汗出身冷若氷眼睛不慧語言不休而穀氣多入此為除中口雖欲言舌不得前註陽盛為痰陽虚為飲欬而衇㣲為陽虚之欬故欬則吐涎飲也若衇實下之可也今衇㣲下之寒虚更甚故欬雖止而利因不休也胸中如蟲囓是胃寒蟲動故粥入則出也下利上吐中寒也小便不利停飲也兩脇拘急喘息為難頸背相引臂則不仁此皆中外寒飲之證比之少陰停飲此無身痛彼無項背相引臂則不仁也若極寒而甚則反汗出身冷如氷目睛不慧語言不休而死也以如是之證而穀氣多入此為除中口雖欲言舌短難伸亦死也集註張璐曰誤下之下利不止胃中空虚而反暴食為除中少陰虚寒而反冷汗為外脱及口雖欲言舌萎不能前等死證皆起誤下之害如是衇數者久數不止止則邪結正氣不能復正氣却結於蔵故邪氣浮之與皮毛相得衇數者不可下下之必煩利不止註衇數者謂久數不止有熱之人也若衇數動時一止熱仍不退是邪氣結正氣不能復正氣結於蔵邪氣浮於外故也衇雖數促不可下也若誤下之則邪熱乘虚入裏必煩利不止也衇浮大應發汗醫反下之此為大逆註衇浮大此為表實之衇應發其汗若醫誤以大為裏實而反下之此為大逆也集註程應旄曰衇大與衇浮而大差别盛實純在表也雖有裏症仍宜従表發汗下之則為大逆動氣在右不可下下之則津液内竭咽燥鼻乾頭眩心悸也動氣在左不可下下之則腹内拘急食不下動氣更劇雖有身熱臥則欲踡動氣在上不可下下之則掌握熱煩身上浮冷熱汗自泄欲得水自灌動氣在下不可下下之則腹脹滿卒起頭眩食則下清穀心下痞也註動氣在右肺失治矣下之則肺先虚津液内竭故咽燥鼻乾頭眩心悸也動氣在左肝失治矣下之則肝氣益急故食不下腹内拘急動氣更劇表實未減裏虚益甚故雖有身熱臥則欲踡也動氣在上心失治矣下之則陰液益傷心火更甚故掌心握熱煩熱汗出欲得水澆即有身上浮冷亦火盛格陰使然也動氣在下腎失治矣下之則寒虚内甚而腹脹滿故卒起頭眩心下痞滿食則下利清穀也集註程應旄曰動氣誤下是為犯蔵左右上下隨其經氣而致逆故禁同汗例咽中閉塞不可下下之則上輕下重水漿不下臥則欲踡身急痛下利日數十行註咽中閉塞燥乾腫痛者少陰陽邪也宜下之今不燥乾不腫痛者少陰陰邪也不可下下之則陽愈衰陰愈盛故曰上輕下重也水漿不入臥欲踡身急痛下利日數十行中外陽虚也集註張璐曰言初病咽乾閉塞以其人少陰之真陽素虧故汗下俱禁若下之則少陰虚寒諸證蜂起矣程應旄曰腎邪上逆故有咽中閉塞之證下之陽氣益虚陰氣益甚故有上輕下重等證諸外實者不可下下之則發㣲熱亡衇厥者當臍握熱註諸外實者裏必虚即有不大便無所苦之裏亦不可下若下之外發之熱雖㣲内虚之寒則盛若無衇而厥當臍握熱始暖亦寒之甚也集註方有執曰諸外實指一切之邪在表而言也發㣲熱邪入裏也無衇陽内陷也程知曰下之則表邪内陷外不熱而内發㣲熱也其亡衇而厥者則寒氣内深惟當臍一握熱耳太陽病有外證未解不可下下之為逆註此重出以申叮嚀告戒之意集註程應旄曰未解較不解稍異勢雖欲下仍湏俟之病欲吐者不可下嘔多雖有陽明證不可攻之註欲吐者邪在膈上可吐之證也嘔多者邪在少陽可和之證也雖具裏證戒人不可先攻下也夫病陽多者熱下之則鞕註陽病裏熱多者宜乎下表熱多者宜乎汗若表裏熱多當兩解也若單下之表不解則裏虚表熱内陷因作鞕也集註張璐曰陽熱證多即有陽明證見亦屬經證不可下也不當下而誤下之則陽邪乘虚内陷不作結胸則為痞鞕也程應旄曰陽病謂表裏熱俱多下之則胃中水竭其鞕也非轉屬陽明之鞕也無陽陰强大便鞕者下之必清穀腹滿註亡陽陰盛燥而無熱雖大便鞕者此乃不大便無所苦之鞕也下之則中寒猶盛故必利清穀腹滿矣集註成無己曰無陽者亡津液也陰多者寒多也大便鞕則為陰結下之虚胃陰寒内甚故清穀腹滿方有執曰陰以寒言强猶言多也清穀陰不能化也腹滿陰寒凝滯而内脹也傷寒發熱頭痛㣲汗出發汗則不識人熏之則喘不得小便心腹滿下之則短氣小便難頭痛背强加温鍼則衂註傷寒發熱頭痛背强㣲汗出若不惡寒非温病即邪傳陽明也若誤發汗不成風温外熱如灼必成陽明熱甚神昬不識人也以火熏温鍼刼之火氣入裏壅塞於胸則喘於腹則滿也火傷衛分津液則不得小便火傷榮分血衇則必作衂也若下之則中氣傷故氣短津液傷故小便難也集註程應旄曰此證近於温有熱無寒汗下温鍼均在所禁也下利衇大者虚也以强下之故也設衇浮革因爾腸鳴者屬當歸四逆湯註下利衇大裏虚也以其不當下而强下之故也設衇浮革者謂衇浮大按之空虚表急裏虚因爾腸鳴屬當歸四逆湯和其表而温其裏也集註成無己曰浮為虚革為寒寒虚相搏則腸鳴與當歸四逆湯音切漓林知切嘶先齊切萎於危切悵丑亮切怏於亮切勃蒲沒切嚶於更切囓魚結切握乙角切御纂醫宗金鑑卷十五
