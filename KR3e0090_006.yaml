body:
  text: 訂正仲景全書傷寒論注太隂全篇目録理中丸乾薑黃連黃芩人參湯厚朴生薑半夏甘草人參湯桂枝加芍藥湯桂枝加大黃湯御纂醫宗金鑑卷六目録欽定四庫全書御纂醫宗金鑑卷六訂正仲景全書傷寒論注太隂全篇目録理中丸乾薑黃連黃芩人參湯厚朴生薑半夏甘草人參湯桂枝加芍藥湯桂枝加大黃湯御纂醫宗金鑑卷六目録欽定四庫全書御纂醫宗金鑑卷六訂正仲景全書傷寒論注辨太隂病脈證并治全篇六氣之邪感人雖同人受之而生病各異者何也蓋以人之形有厚薄氣有盛衰藏有寒熱所受之邪每從其人之藏氣而化故生病各異也是以或從虛化或從實化或從寒化或從熱化譬諸水火水盛則火滅火盛則水耗物盛從化理固然也誠知乎此又何疑乎陽邪傳隂變寒化熱而遂以為竒耶自後漢迄今千載以來皆謂三隂寒邪不傳且以傷寒傳經隂邪謂為直中抑知直中乃中寒之證非傳經之邪耶是皆未曾熟讀仲景之書故有此誤耳如論中下利腹脹滿身體疼痛者先溫其裏乃攻其表溫裏宜四逆湯攻表宜桂枝湯此三陽陽邪傳入太隂邪從隂化之寒證也如少隂病下利白通湯主之此太隂寒邪傳少隂之寒證也如下利清穀裏寒外熱汗出而厥者通脈四逆湯主之此少隂寒邪傳厥隂之寒證也皆歷歷可據豈得謂傷寒隂不相傳無陽從隂化之理乎夫太隂濕土純隂之藏也故病一入太隂則邪從隂化者多從陽化者少從隂化者如論中腹滿吐食自利不渴手足自溫時腹自痛宜服理中四逆輩者是也從陽化者如論中發汗後不解腹滿痛者急下之宜大承氣湯腹滿大實痛者宜桂枝加大黃湯主之者是也蓋脾與胃同處腹中故腹滿腹痛兩皆有之然腹滿為太隂主病心下滿為陽明主病其陽明亦有腹滿者以陽明腹滿與熱同化故必有潮熱自汗不大便之證而不似太隂與濕同化有發黃暴煩下利穢腐之證也誠能更於腹之時痛大實痛腹滿痛處詳審虛實斟酌溫下則了無餘義矣故以此括之自知太隂之要法也太隂之為病腹滿而吐食不下自利益甚時腹自痛若下之必胸下結鞕按吳人駒曰自利益甚四字當在必胸下結鞕句之下其説甚是若在吐食不下句之下則是已吐食不下而自利益甚矣仲景復曰若下之無所謂也注太隂脾經也其脈布胃中絡於嗌寒邪傳於太隂故腹滿時腹自痛寒邪循脈犯胃故吐食不下此太隂裏虛邪從寒化之證也當以理中四逆輩溫之若腹滿嗌乾不大便大實痛始為太隂裏實邪從熱化之證當以桂枝加大黃湯下之矣若以太隂虛寒之滿痛而誤認為太隂實熱之滿痛而下之則寒虛相摶必變為藏結痞鞕及自利益甚矣此太隂病全篇之提綱後凡稱太隂病者皆指此證而言也集注程應旄曰陽邪亦有腹滿得吐則滿去而食可下者今腹滿而吐食不下則滿為寒脹吐為寒格也陽邪亦有下利腹痛得利則痛隨利減者今下利而時腹自痛則利為寒利痛為寒痛也曰胸下隂邪結於胸下之隂分異於陽邪結胸之在胸且按之而痛也曰結鞕無陽以化氣則為堅隂異於痞之濡而耎也彼皆陽從上陷而阻留此則隂從下逆而不歸寒熱大别也吳人駒曰自利有時而腹自痛非若積蓄而常痛者若以諸痛為實從而下之其滿益甚必令胸下皆為結鞕而自利益甚矣傷寒四五日腹中痛若轉氣下趨少腹者此欲自利也注傷寒四五日邪入太隂之時也腹中痛若不轉氣下趨者屬陽眀也今腹中痛轉氣下趨少腹者乃太隂欲作自利之候也此仲景示人不可以諸痛為實而妄議下之意也集注方有執曰腹中痛轉氣下趨者裏虛不能守而寒邪下迫也張璐曰腹痛亦有屬火者其痛必自下而上攻若痛自上而下趨者定屬寒痛無疑魏荔彤曰此重在預防下利而非辨寒熱也玩若字欲字可見其辨寒邪者自有别法自利不渴者屬太隂以其藏有寒故也當溫之宜服四逆輩注凡自利而渴者裏有熱屬陽也若自利不渴則為裏有寒屬隂也今自利不渴知為太隂本藏有寒也故當溫之四逆輩者指四逆理中附子等湯而言也集注程知曰言太隂自利為寒宜溫者也少隂屬腎水熱入而耗其水故自利而渴太隂屬脾土寒入而從其濕則不渴而利故太隂自利當溫也程應旄曰三隂同屬藏寒少隂厥隂有渴證太隂獨無渴證者以其寒在中焦總與龍雷之火無涉少隂中有龍火底寒甚則龍升故自利而渴厥隂中有雷火故有消渴太陽一照雷雨收聲故發熱則利止見厥而復利也魏荔彤曰自利二字乃未經誤下誤汗誤吐而成者故知其藏本有寒也理中丸方人參白术甘草炙乾薑各三兩右四味搗篩蜜和為丸如雞子黃許大以沸湯數合和一丸研碎溫服之日三四夜二服腹中未熱益至三四丸然不及湯湯法以四物依兩數切用水八升煮取三升去滓溫服一升日三服加減法若臍上築者腎氣動也去术加桂枝四兩吐多者去术加生薑三兩下多者還用术悸者加茯苓二兩渴欲得水者加术足前成四兩半腹中痛者加人參足前成四兩半寒者加乾薑足前成四兩半腹滿者去术加附子一枚服湯後如食頃飲熱粥一升許微自溫勿發揭衣被集解程應旄曰陽之動始於溫溫氣得而穀精運穀氣升而中氣贍故名曰理中實以燮理之功豫中焦之陽也蓋謂陽虛即中氣失守膻中無發宣之用六府無灑陳之功猶如釜薪失焰故下至清穀上失滋味五藏凌奪諸證所由來也參术炙草所以守中州乾薑辛以溫中必假之以燃釜薪而騰陽氣是以穀入於隂長氣於陽上輸華蓋下攝州都五藏六府皆受氣矣此理中之旨也若水寒互勝即當脾腎雙溫加之以附子則命門益而土母溫矣白术補脾得人參則壅氣故臍下動氣吐多腹滿皆去术也加桂以伐腎邪加生薑以止嘔也加附子以消隂也下多者濕勝也還用术燥濕也渴欲飲水飲渴也加术使飲化津生也心下悸停水也加茯苓導水也腹中痛倍人參虛痛也寒者加乾薑寒甚也傷寒本自寒下醫復吐下之寒格更逆吐下若食入口即吐乾薑黃連黃芩人參湯主之按經論中並無寒下之病亦無寒下之文玩本條下文寒格更逆吐下可知寒下之下字當是格字文義始相屬注家皆釋胃寒下利不但文義不屬且與芩連之藥不合注經曰格則吐逆格者吐逆之病名也朝食暮吐脾寒格也食入即吐胃熱格也本自寒格謂其人本自有朝食暮吐寒格之病也今病傷寒醫見可吐可下之證遂執成法復行吐下是寒格更逆於吐下也當以理中湯溫其太隂加丁香降其寒逆可也若食入口即吐則非寒格乃熱格也當用乾薑人參安胃黃連黃芩降胃火也乾薑黃連黃芩人參湯方乾薑黃連黃芩人參各三兩右四味以水六升煮取二升去滓分溫再服傷寒醫下之續得下利清穀不止身疼痛者急當救裏後身疼痛清便自調者急當救表救裏宜四逆湯救表宜桂枝湯注傷寒醫不分表裏寒熱虛實而誤下之續得下利清穀不止者寒其裏也雖有通身疼痛之表未除但下利清穀不止裏寒已盛法當急救其裏俟便利自調仍身疼痛不止再救其表可也救裏宜四逆湯溫中勝寒救表宜桂枝湯調榮和衛也集注王三陽曰此證當照顧協熱利須審其利之色何如與勢之緩急不可輕投四逆桂枝也喻昌曰攻裏必須先表後裏始無倒行逆施之患惟在裏之隂寒極盛不得不急救其裏俟裏證稍定仍救其表蓋謂救裏後再行救表也下利清穀不可攻表汗出必脹滿注此詳上條不先救裏而發其表以眀太隂少隂同病之證也下利清穀太隂寒邪已傳少隂即有身痛不可攻表若誤攻其表即使汗出太陽表解而太隂寒凝必脹滿矣下利腹脹滿身體疼痛者先溫其裏乃攻其表溫裏宜四逆湯攻表宜桂枝湯注此承上條互發其證以眀先裏後表之治也下利腹脹滿者裏寒邪也身體疼痛者表寒邪也凡表裏寒邪之證同見總以溫裏為急故當先溫其裏後攻其表溫裏宜四逆湯攻表宜桂枝湯集注方有執曰裏虛表實惟其虛也故必先之惟其實也故可後焉發汗後腹脹滿者厚朴生薑半夏甘草人參湯主之注發汗後表已解而腹滿者太隂裏虛之脹滿也故以厚朴生薑甘草半夏人參湯主之消脹散滿補中降逆也集注成無己曰吐後脹滿與下後脹滿皆為實者言邪氣乘虛入裏而為實也發汗後則外已解腹脹滿知非裏實由太隂不足脾氣不通故壅而為滿也與此湯和脾胃而降逆氣宜矣汪琥曰此條乃汗後氣虛腹脹滿其人雖作脹滿而內無實形所以用人參炙甘草等甘溫補藥無疑也張錫駒曰此言發汗而傷其脾氣也脾主腹故腹滿為太隂主病發汗後而腹脹滿則知其人脾氣素虛今脾氣愈虛則不能轉輸濁氣不降清氣不升而脹滿作矣厚朴生薑半夏甘草人參湯方厚朴半斤炙去皮生薑半斤切半夏半升洗甘草二兩炙人參一兩右五味以水一斗煮取三升去滓溫服一升日三服發汗不解腹滿痛者急下之宜大承氣湯腹滿不減減不足言當下之宜大承氣湯注此詳申上條互發其義以别其治也發汗後表已解腹滿不痛者乃腹滿時減減復如故之虛滿也當溫之厚朴生薑半夏甘草人參湯證也今發汗後表不解腹滿大痛者乃腹滿不減減不足言之實滿也當下之宜大承氣湯蓋以裏急先攻裏後和表也集注喻昌曰減不足言四字形容腹滿如繪見滿至十分即減去一二分不足殺其勢也此所以縱有外邪未解而當下無疑耳程應旄曰下之而腹滿如故即減去一二分算不得減下之不妨再下必當以減盡為度也劉宏璧曰太隂無可下之法也設在經則各經已無可下之理在藏則太隂尤無受下之處桂枝加大黃湯安能無疑乎不知脾與胃相表裏也太陽誤下太隂受邪適胃有宿食則脾因胃之實而實亦即因太陽之邪而痛矣既大滿大痛已成胃實又非此湯之所能治故宜大承氣湯也太隂病脈浮者可發汗宜桂枝湯注太隂經病脈當浮緩太隂藏病脈當沉緩今邪至太隂脈浮不緩者知太陽表邪猶未全罷也故即有吐利不食腹滿時痛一二證其脈不沉而浮便可以桂枝發汗先解其外俟外解已再調其內可也於此又可知論中身痛腹滿下利急先救裏者脈必不浮矣集注王肯堂曰病在太陽脈浮無汗宜麻黃湯此脈浮當亦無汗而不言者謂隂不得有汗不必言也不用麻黃湯而用桂枝湯蓋以三隂兼表病者俱不當大發汗也須識無汗亦有用桂枝者程知曰此言太隂宜散者也太隂病謂有腹痛下利證也太陽脈尺寸俱浮今脈浮則邪還於表可知矣故宜用桂枝解散不用麻黃者隂病不得大發其汗也桂枝湯有和裏之意焉程應旄曰此太隂中之太陽也雖有裏病仍從太陽表治方不引邪入藏本太陽病醫反下之因而腹滿時痛者屬太隂也桂枝加芍藥湯主之大實痛者桂枝加大黃湯主之注本太陽中風病醫不以桂枝湯發之而反下之因而邪陷入裏餘無他證惟腹滿時痛者此屬太隂裏虛痛也故宜桂枝加芍藥湯以外解太陽之表而內調太隂之裏虛也若大滿實痛則屬太隂熱化胃實痛也故宜桂枝加大黃湯以外解太陽之表而內攻太隂之裏實也集注趙嗣真曰太隂腹滿證有三有次第傳經之邪有直入中寒之邪有下後內陷之邪不可不辨喻昌曰太陽病之誤下其變皆在胸脅以上此之誤下而腹滿時痛無胸脅等證則其邪已入隂位所以屬在太隂也仍用桂枝解肌之法以升發太陽之邪倍芍藥者以調太隂之氣本方不增一藥斯為神耳大實大滿宜從急下然陽分之邪初陷太隂未可峻攻但於桂枝湯中少加大黃七表三裏以分殺其邪與大柴胡湯同其義也程應旄曰誤下太陽而成腹滿時痛太隂之證見矣然表邪內陷留滯於太隂非藏寒病也仍用桂枝湯升發陽邪但倍芍藥以調和之倘大實而痛於證似可急下然隂實而非陽實仍從桂枝例升發陽邪但加大黃以破結滯之物使表裏兩邪各有去路則寒隨實去不溫而自溫矣然此二證雖屬之太隂實從太陽傳來則脈必尚浮可知桂枝加芍藥湯方於桂枝湯方內更加芍藥三兩隨前共六兩餘依桂枝湯法桂枝加大黃湯方桂枝三兩大黃二兩芍藥六兩甘草二兩炙生薑三兩切大棗十二枚擘右六味以水七升煮取三升去滓溫服一升日三服集解柯琴曰腹滿為太隂陽明俱有之證然位同而職異太隂主出太隂病則腐穢氣凝不利故滿而時痛陽明主內陽明病則腐穢燥結不行故大實而痛是知大實痛是陽明病而非太隂病矣仲景因表證未解陽邪已陷入太隂故倍芍藥以益脾調中而除腹滿之時痛此用隂和陽法也若表邪未解而陽邪陷入陽明則加大黃以潤胃通結而除其大實之痛此雙解表裏法也凡妄下必傷胃之氣液胃氣虛則陽邪襲隂故轉屬太隂胃液涸則兩陽相摶故轉屬陽明屬太隂則腹滿時痛而不實隂道虛也屬陽明則腹滿大實而痛陽道實也滿而時痛是下利之兆大實而痛是燥屎之徵故倍加芍藥小變建中之劑少加大黃微示調胃之方也太隂為病脈弱其人續自便利設當行大黃芍藥者宜減之以其人胃氣弱易動故也注太隂為病必腹滿而痛治之之法當以脈消息之若其人脈弱則其中不實雖不轉氣下趨少腹然必續自便利設當行大黃芍藥者宜減之以胃氣弱難堪峻攻其便易動故也由此推之可知大便鞕者不論在隂在陽凡脈弱皆不可輕下也集注程知曰此言太隂脈弱恐續自利雖有腹痛不宜用攻與建中湯相發明也喻昌曰此假叮嚀與陽明篇中互相發明陽明曰不轉失氣曰先鞕後溏曰未定成鞕皆是恐傷太隂脾氣此太隂證而脈弱恐續自利雖有腹痛減用大黃芍藥又是恐傷陽明胃氣也汪琥曰或問大黃能傷胃氣故宜減芍藥能調脾隂何以亦減之答曰脈弱則氣餒不充仲景以溫甘之藥能生氣芍藥之味酸寒雖不若大黃之峻要非氣弱者所宜多用故亦減之傷寒脈浮而緩手足自溫者繫在太隂太隂當發身黃若小便自利者不能發黃至七八日雖暴煩下利日十餘行必自止以脾家實腐穢當去故也注傷寒脈浮而緩手足熱者為繫在太陽今手足溫故知繫在太隂也太隂屬濕濕與熱瘀當發身黃小便自利者則濕不畜熱不瘀故不能發黃也若至七八日大便鞕則為轉屬陽明今既不鞕雖暴煩下利日十餘行必當自止何也以脈浮緩手足溫知太隂脾家素實邪不自容腐穢當去故也集注程知曰言自利之證脈浮緩手足溫則為脾實也太隂脈本緩故浮緩雖類太陽中風而手足自溫則不似太陽之發熱更不似少隂厥隂之厥逆所以為繫在太隂也太隂濕熱相蒸勢必發黃然小便利則濕下泄而不發黃矣此雖暴煩頻利有似少隂之證然其利當自止所以然者以脈浮緩手足溫知其人脾氣實而非虛寒之比其濕熱所積之腐穢自當逐之而下也若不辨晰而以四逆法治之則誤矣程應旄曰太隂得浮緩手足溫之脈證則胃陽用事自無藏寒之痛隂鬱或有之小便不利必發黃雖發黃不為隂黃若小便自利者不能發黃隂欲鬱而陽必驅至七八日雖暴煩下利日十餘行必自止所以然者脈不沉且弱而浮緩手足不涼而自溫隂得陽以周護則不寒不寒則不虛是為脾家實也經曰陽道實隂道虛隂行陽道豈肯容邪久住此則腐穢當去故耳汪琥曰下利煩燥者死此為先利而後煩是正氣脫而邪氣擾也兹則先煩後利是脾家之正氣實故不受邪而與之爭因暴發煩熱也太隂中風四肢煩痛陽微隂澀而長者為欲愈注太隂中風者謂此太隂病是從太陽中風傳來者故有四肢煩疼之證也隂陽以浮沉言夫以浮微沉澀之太隂脈而兼見陽明之長脈則為隂病陽脈藏邪傳府故為欲愈也集注程知曰傷寒隂邪也故自利宜用四逆傷風陽邪也故煩痛見於四肢凡太隂病脈浮者多是太隂中風喻昌曰微澀之中更察其脈之長而不短知元氣未漓其病當自愈也太隂病欲解時從亥至丑上注邪之解也必於所旺之時亥子丑乃太隂所旺之時也當此旺時故邪不能勝而自解矣音切趨七句切揭音訐腐音府穢於廢切御纂醫宗金鑑卷六
