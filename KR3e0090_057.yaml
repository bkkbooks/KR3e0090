腎經伏毒最可憂鬆肌歸宗兩酌用燕脂貼法莫遲留注痘攢聚於耳後髙骨名曰蒙骩此係毒火發自腎經其證最惡內服鬆肌通聖散外用燕脂膏貼之若更稠密炮熱者以歸宗湯攻之鬆肌通聖散方見蒙頭證治燕脂膏升麻煎濃湯去滓用棉燕脂於湯內揉出紅汁再加雄黃細末調勻貼患處歸宗湯方見發熱證治鎖眼兩眼周圍獨稠密痘名鎖眼毒傷脾外用燕脂膏貼法內服清熱解毒宜注面部俱稀兩眼周圍獨稠密者名曰鎖眼也乃毒熱熾盛傷於脾經外宜貼燕脂膏內服清熱解毒湯燕脂膏方見蒙骩證治清熱解毒湯方見見點證治抱鼻痘如蠶種繞鼻端毒聚脾肺證難延外用燕脂塗鼻上內服黃連解毒煎注面部俱稀獨鼻梁左右密如蠶種者名曰抱鼻此乃毒聚脾肺至危之證先以燕脂膏塗於鼻上繼用黃連解毒湯治之燕脂膏方見蒙骩證治黃連解毒湯方見結痂落痂證治鎖口鎖口梟毒伏脾經或單或雙繞脣生外用針刺燕脂法內服瀉黃散即寧注一嘴角有痘一粒較諸痘獨大板硬無盤名曰單鎖口兩嘴角各有一粒名曰雙鎖口又口之上下四旁連串環繞者亦名鎖口此毒擁于脾也初出急以銀針挑破外以燕脂膏貼之內服瀉黃散使痘轉紅活庶可望生燕脂膏方見蒙骩證治瀉黃散犀角黃連生地青皮木通石膏丹皮荆芥穗牛蒡子炒研大黃紅花紫花地丁引加燈心水煎服方歌鎖口瀉黃散最靈犀連生地青木通石膏丹皮荆牛蒡大黃紅花合地丁鎖脣鎖脣痘聚口脣內腫裂乾黃板硬實瀉黃散內合豬尾燕脂貼法莫少遲注痘出攢聚於脣內者名曰鎖脣輕則焦裂腫痛重則板硬乾黃此毒火發于脾臟也急以瀉黃散合豬尾膏服之外用燕脂貼法若見黑色則血凝毒錮終無救矣瀉黃散方見鎖口證治豬尾膏取小雄豬尾尖血十數滴和梅花氷片少許即調於煎劑內服燕脂膏方見蒙骩證治托腮托腮腮邉痘成攢氣為毒阻起發難急用黃連解毒治板硬紫黯歸宗先注滿面俱稀獨兩腮之痘攢聚成片者名曰托腮乃正氣為毒所阻難以起發也當見點之初毒勢未成即以黃連解毒湯解之如板硬紫黯以歸宗湯攻之黃連解毒湯方見結痂落痂證治歸宗湯方見發熱證治鎖項當喉攢聚名鎖項毒結咽喉命必難音啞聲嗆食難入清金攻毒是良煎注頸項者咽喉之管籥也此處痘出攢聚名曰鎖項若不急治逮毒攻咽喉必發為腫痛音啞聲嗆湯水難下多致不救急用清金攻毒飲庶或望生清金攻毒飲牛蒡子炒研甘草生苦桔梗元參枳殼麩炒殭蠶炒前胡荆芥穗大黃山查蟬退山豆根引加燈心水煎服方歌清金攻毒飲如神牛蒡甘桔合元參枳殼殭蠶前胡穗大黃山查蟬豆根披肩披肩兩肩痘成攢上下阻塞毒透難清熱解毒湯投證便祕歸宗又為先注兩肩之痘粘連成攢其色赤紫滯黯名曰披肩此毒氣不鬆上下阻塞也以清熱解毒湯主之大便祕者以歸宗湯主之清熱解毒湯方見見點證治歸宗湯方見發熱證治聚背背間出痘不宜多若逄攢聚命蹉跎根鬆鬆肌燕脂貼緊硬必勝湯可活注大凡毒發於背者多關生死至於出痘更貴稀疏若背間攢聚粘連者名曰聚背而亦當辨根腳之緊鬆根鬆者毒尚活動內服鬆肌通聖散外用燕脂膏貼之根緊硬者因毒錮血凝急用必勝湯治之然亦死中求活之一法耳鬆肌通聖散方見蒙頭證治燕脂膏方見蒙骩證治必勝湯方見見點證治攢胸胸前出痘貴稀輕攢聚粘連毒熱凝速用涼膈攻毒飲免使梟毒內裏攻注胸膈乃心肺二經部位出痘稀少方吉倘攢簇于此名曰攢胸乃毒熱所致也當以涼膈攻毒飲主之則梟毒不內侵矣涼膈攻毒飲梔子生黃連生石膏生荆芥紫花地丁枳殼麩炒桔梗元參生地牛蒡子炒研大黃赤芍甘草生薄荷木通引加燈心竹葉水煎服方歌涼膈攻毒治攢胸梔連石膏荆地丁枳桔元參生地蒡大黃芍草薄木通斷橋斷橋之痘形甚異腰間絶無上下密氣血阻滯毒熱壅歸宗峻攻痘出吉注痘名斷橋者腰間絶無一點惟身之上下稠密也蓋梟毒壅於上下氣血阻于中宫故致上下隔斷而成最惡之證宜用歸宗湯攻之使無痘處透出方化為吉也歸宗湯方見發熱證治纒腰腰為腎候痘宜疏連珠環繞奈何如治宜攻毒莫少待歸宗急服患能除注腰為腎候痘宜稀疏若連珠環繞名曰纒腰此毒伏于腎也治以攻毒為主宜用歸宗湯治之歸宗湯方見發熱證治囊腹囊腹腹前痘如囊梟毒衝突勢猖狂透毒鬆肌通聖散攻毒歸宗湯甚良注腹前出痘狀如囊聚名曰囊腹是梟毒衝突勢甚猖狂也此地近於臟腑毒易內攻須先用鬆肌通聖散透發其毒再用歸宗湯以攻其毒使地界分明根腳鬆動庶無虞矣鬆肌通聖散方見蒙頭證治歸宗湯方見發熱證治鱗坐鱗坐兩臀痘若鱗急急治之莫逡巡平扁灰滯通聖效板硬紫黯歸宗神注鱗坐者兩臀之痘聚集如鱗也因毒火太甚攢聚於至隂之地若不急治變如反掌如平扁灰滯者鬆肌通聖散主之板硬紫黯者歸宗湯主之鬆肌通聖散方見蒙頭證治歸宗湯方見發熱證治囊毬囊毬痘密在腎囊毒聚於斯最難當即用散結湯調治毒宣熱解始安康注腎囊者乃腎之外候關要處也若痘出稠密乃毒聚於斯也宜用散結湯主之疏解通暢庶可愈矣散結湯荆芥羌活牛蒡子炒升麻川芎丹皮紫花地丁赤芍木通紫草青皮山查引加蘆笋十株水煎服方歌散結湯中藥堪誇荆芥羌蒡共升麻川芎丹皮地丁芍木通紫草青山查抱膝兩膝之痘獨稠密因地命名為抱膝須防行漿難下達速用鬆肌通聖治注抱膝者遍身痘出稀疏獨兩膝攢簇如餅此毒氣凝聚於膝至行漿時恐難下達於足脛也宜用鬆肌通聖𣪚加牛膝透之功效甚速鬆肌通聖𣪚方見蒙頭證治無根足踝以下痘無形毒熱錮蔽勢多凶速宜驅毒扶脾氣快癍越婢湯有功注足踝以下屬於脾經若周身有痘而此地獨無者名曰無根是毒滯於脾也但足為至隂之地非建立中州發越脾氣不能下達故用快癍越婢湯以發之快癍越婢湯黃耆蜜製桂枝防風白芍藥炒甘草生引用生薑紅棗水煎服方歌快癍越婢藥最靈黃耆桂枝及防風白芍甘草薑棗引煎服之後痘自生蛇皮蛇皮痘出似蛇皮隱隱簇簇漫無拘毒輕歸宗湯調治毒重必勝豬尾宜注痘出叢簇成片散漫無拘名曰蛇皮見點之初視其隱隱簇簇細密無倫乃毒火所致以歸宗湯攻其毒甚者以必勝湯佐以豬尾膏救之歸宗湯方見發熱證治必勝湯方見見點證治豬尾膏方見鎖脣證治蠶種痘出形如蠶布種梟毒勢重逆而凶速用歸宗湯救治毒鬆痘起可望生注痘出稠密如蠶布種者名曰蠶種乃梟毒太重凶逆之甚速用歸宗湯攻之使毒鬆痘起方可望生歸宗湯方見發熱證治燕窩痘形纍纍似燕窩聯絡細密不成顆外用燕脂點痘上內服涼血解毒和注痘出纍纍聯絡細密不成顆粒故謂之燕窩宜外用燕脂膏貼法內服涼血解毒湯和之燕脂膏方見蒙骩證治涼血解毒湯方見結痂落痂證治鼠迹四五相連名鼠迹周身為重少見輕速用歸宗攻毒熱相併成泡始堪生注痘出四五粒或六七粒相聚粘連者名曰鼠迹見一二處者輕見周身者為重速用歸宗湯攻之令相併成泡其毒方解始可望生歸宗湯方見發熱證治疊錢痘形平伏無顆粒團團攢聚若疊錢外用燕脂調貼法內服涼血攻毒痊注痘已見點平伏不起顆粒不分團團攢聚狀若疊錢者此血熱毒盛也外用燕脂膏貼之內以涼血攻毒飲治之燕脂膏方見蒙骩證治涼血攻毒飲方見見點證治環珠痘出圍繞若環珠毒氣壅滯宜早圖清熱解毒為妙劑毒解漿生患自除注痘名環珠者以出而圍繞形若環珠也此毒氣壅滯所致宜早圖治以清熱解毒湯主之使毒解漿生其患自除矣清熱解毒湯方見見點證治浮萍視之有點按無形參差紫黯若浮萍速用涼血攻毒劑能使毒鬆色轉紅注浮萍者視之有點按之無形參差不齊痘色紫黯狀如浮萍也此乃血瘀毒熾非急攻不可速用涼血攻毒飲攻之能使毒鬆色轉紅活庶可望生涼血攻毒飲方見見點證治蟹爪痘形連貫顆碎密上濶下細蟹爪形起脹根鬆毒始解清熱解毒服有功注蟹爪者痘形連貫顆粒碎密上濶下細如蟹爪之狀急用清熱解毒湯治之使連貫處起脹根鬆其毒可解也清熱解毒湯方見見點證治薸沙痘形歪斜復扁濶無頂無盤名薸沙通聖歸宗酌量用頂起根鬆痘始佳注薸沙者痘形扁濶歪斜不圓無頂無盤若薸沙細小宜先用鬆肌通聖散主之若色紫黯者歸宗湯主之能頂起根鬆始為佳境鬆肌通聖散方見蒙頭證治歸宗湯方見發熱證治血泡痘夾血泡因肺熱或紫或赤微甚别內服涼血解毒湯外用針刺出惡血注痘當起脹時忽有小泡夾痘而出漸漸長成如白果大毒甚則紫毒微則赤皆謂之血泡此因毒熱在肺傳於皮膚大小不一須內服涼血解毒湯外用銀針刺破流出惡血方保無恙若不急治聼其自破惡汁流染痘亦因之赤爛矣治者宜詳記之涼血解毒湯方見結痂落痂證治水泡水泡濕淫尅脾經手足稠密身面輕內服加味保元劑外塗胡荽官粉靈注水泡者形大皮薄內含一包清水蓋因濕淫之氣侵尅脾經故身面俱少手足獨密以四肢屬脾故也須服加味保元湯外用銀針刺破以胡荽酒調官粉塗患處若延遲不治變成癢塌則難救矣加味保元湯人參豬苓澤瀉白术土炒黃耆蜜炙赤茯苓甘草炙引用生薑水煎服方歌加味保元功最捷人參豬苓共澤瀉白木黃耆赤茯苓甘草生薑同一列胡荽酒胡荽四兩切碎黃酒半斤同煎勿令泄氣候溫調官粉搽敷破處肉腫瘡不腫瘡未起脹肉腫浮皮光色艷最堪愁赤艷羌活救苦治淡紅參歸大補求通身盡赤毒熱熾速以歸宗及早投注痘當起脹時自頭及身漸次同痘浮起此氣領血載其毒外發也如頭身之肉先腫皮色赤艷而痘瘡不腫此為毒邪有餘不受正制宜用羌活救苦湯若皮色淡紅者乃氣血不足不能拘攝毒氣宜用參歸大補湯治之更有通身皮膚盡赤此為毒火熾盛煎灼血分宜用歸宗湯羌活救苦湯蔓荆子羌活牛蒡子炒升麻黃耆生川芎連翹去心桔梗白芷防風人中黃引用荷葉水煎服方歌羌活救苦湯最良升麻川芎合羌防牛蒡黃耆白芷翹蔓荆桔梗人中黃參歸大補湯人參當歸黃耆甘草白芷川芎防風紫草茸木香南山查厚朴薑炒桔梗引用生薑水煎服方歌參歸大補最有靈參耆當歸桔川芎防風白芷木香草厚朴山查紫草茸歸宗湯方見發熱證治乾枯毒火煎灼傷隂血痘體乾枯少潤澤當歸活血加味嘗治若少緩變莫測注色者血之華也血和則滋潤光瑩血耗則乾燥枯竭痘之毒火入于血分輕則焮紅甚則焦紫治以救血為急宜當歸活血湯主之當歸活血湯當歸川芎赤芍生地紅花紫草黃芩黃連大黃水煎服方歌加味當歸活血湯痘色乾枯服最良四物紅花共紫草加入芩連生大黃鋪紅鋪紅多因元氣弱血不歸附毒漫行肌膚盡紅根赤艷氣失統攝痘多凶氣虛九味神功補毒盛涼血解毒清注起脹時血盡歸附于痘根下有紅線緊束乃正形也若元氣虛弱血不歸附致毒氣散漫肌膚之上根色紫艷是氣失統攝之力多致不救若氣虛而痘色微赤者以九味神功散主之毒盛根艷者以涼血解毒湯主之九味神功散人參黃耆生紫草茸紅花前胡牛蒡子炒研甘草生白芍藥酒炒生地黃引用大棗水煎服方歌九味神功治鋪紅人參黃耆紫草茸紅花前胡牛蒡草白芍生地棗相從涼血解毒湯方見結痂落痂證治根窠無暈血虛痘色多散漫根窠淡白少鮮艷芎歸保元湯可投參歸鹿茸有竒驗注痘至成漿時若氣血交會必有一血線緊附根下如珍珠置於燕脂之上粒粒光彩此正形也設平日氣血虛弱當灌漿時頂雖圎滿根下全無紅暈以芎歸保元湯主之虛甚者以參歸鹿茸湯主之芎歸保元湯人參甘草炙黃耆蜜炙當歸酒洗川芎引用龍眼肉水煎服方歌芎歸保元治血虛人參甘草共黃耆酒洗當歸川芎配龍眼作引服無時參歸鹿茸湯方見灌漿證治皮薄漿嫩痘瘡皮薄根不紅待得成膿漿淡清溶溶破爛不完整氣血虛弱證多凶速服十全大補劑氣充血足始堪生注痘瘡賴氣血以成功氣血充實則痘皮蒼老肥滿堅厚若氣血虛縮痘必光亮軟皺溶溶如濕須用十全大補湯峻補氣血庶毒化漿行可保安全矣十全大補湯人參黃耆蜜炙茯苓當歸白术土炒肉桂甘草炙白芍酒炒熟地黃川芎引用煨薑水煎服方歌十全大補湯最靈人參黃耆白茯苓當歸白术肉桂草白芍熟地及川芎空殼無漿痘殼圓融漿不行有虛有實要分明根色淡白血虛弱紫緊由于血熱凝千金內托同四物因證施治莫遲停注痘至行漿時頭面周身外雖脹而內實無漿名曰空殼當别虛實治之如根色淡白者此血虛不能化毒成漿也宜千金內托散根緊而紫者此氣行血滯毒熱伏于血分而不能成漿也宜加味四物湯治之千金內托散方見見點證治加味四物湯生地酒洗川芎白芍酒炒當歸酒洗連翹去心紫草茸酒洗水煎服方歌加味四物湯當歸生地黃川芎白芍藥紫茸連翹良痘頂塌陷痘根雖紅頂塌陷此證多緣氣虛見面白肢冷食懶嘗虛煩便溏身怠倦急用補中益氣湯氣充頂升漿充貫注陷頂者由中氣微弱不能振揚故灌漿時根雖紅潤頂却微塌現證面白肢冷不思飲食虛煩便溏身體怠倦也治宜補氣為主用補中益氣湯則氣足漿升而頂自起矣補中益氣湯黃耆蜜炙白术土炒人參升麻柴胡炒陳皮甘草炙當歸身引用煨薑大棗水煎服方歌補中益氣效如神黃耆白术共人參升麻柴胡陳皮草煨薑大棗及歸身灰陷白陷氣血虛寒不振揚灰白陷頂少膿漿速用參歸鹿茸劑雞冠血酒更堪嘗注痘至灌漿時其色淡白根無紅暈而頂陷者是謂白陷虛極則轉為灰陷由氣虛委而不振血虛漿不能充故一陷而不可遏也治宜大補氣血為主宜參歸鹿茸湯臨服入雞冠血酒日進二三服但得頂起漿行方免無恙參歸鹿茸湯方見灌漿證治雞冠血酒用大雄雞一隻先將白酒一杯炖溫次刺雞冠血數點滴入杯中和勻仍炖溫調煎藥內服紫陷黑陷紫陷黑陷皆毒盛平塌昏黯根不鬆此屬氣血被火欎解毒急宜用歸宗注痘出稠密顆粒碎小根緊昏黯頂凹下而紫者謂之紫陷甚而轉為黑色則為黑陷皆由毒火欎閉氣不宣通故也治宜清熱解毒以歸宗湯主之歸宗湯方見發熱證治板黃漿未充足痘板黃頂塌成片皮硬僵氣滯血凝難灌溉皆緣毒熱侵脾鄉速服清毒活血劑毒化痘起轉安康注板黃者謂灌膿時漿未得半忽然黃色突起乾燥堅硬蓋因梟毒肆害脾鄉故氣滯血凝難以灌溉也須用清毒活血湯治之倘得痘起尚可望生若頭面頸項眼眶脣上及周身黃者則不治也清毒活血湯當歸白芍藥酒炒生地黃紫草茸酒洗黃芩黃連酒炒牛蒡子炒南山查連翹去心人參黃耆生桔梗木通引用燈心水煎服方歌清毒活血湯最靈歸芍生地紫草茸芩連牛蒡山查翹參耆桔梗合木通倒靨倒靨漿清陷不紅痘殼皮皺痂不成速用加味保元劑氣充血足痘收功注倒靨者漿色清稀不足根腳淡白無暈遍體形如豆殼瘡皮皺而似結非結至收靨時終不成痂此因氣血兩虛乏領載之力也宜加味保元湯治之加味保元湯人參黃耆蜜炙甘草炙全當歸酒洗白芍酒炒木香煨白术土炒官桂引用老米水煎服方歌加味保元治倒靨人參黃耆甘草協當歸白芍廣木香白术官桂效更捷痘疔痘疔梟毒亂正瘡色紫黑黯形堅強先出先長妨諸痘針刺隨貼四聖良注痘疔之成由梟毒藴伏錮蔽于肌肉之間痘未出疔先出痘未長疔先長其色紫黑其形堅強五臟各有所見心疔色赤起于顴阜胸乳之處肝疔色紫起于左太陽左脅眼胞兩臀阜之處脾疔色先黃後黑起于腮頰中庭口角肚腹手足之處肺疔色先灰後黑起於右太陽右脅頸項喉突之處腎疔色黑起於地閣後頸耳窖背窬腰脊陽莖之處見時急用銀針刺破以泄毒血刺後用四聖膏貼患處若遲延不治能使痘當發不發當脹不脹當灌不灌而百變生矣四聖膏菉豆四十九粒豌豆四十九粒性俱燒灰存珍珠一分煆頭髮一分燒灰右為細末以棉燕脂水調和成膏將銀針撥開瘡頭然後塗之挑痘疔法痘疔須用針挑撥輕重徐急貴合宜破頂傷肌俱深忌上漿急挑莫遲疑注凡用針挑疔痘時以二指拿針平平入痘撥斷痘中筋絡衆痘即發但挑時輕重疾徐之間貴乎得宜不可挑破痘頂亦不可重入傷肌須待三四五六日上漿之際痘能含針方可挑撥過七日則無用矣治者宜詳識之煮針法甘草生甘遂川烏草烏各等分用水一鍾入砂罐內以水乾為度每次可煮四五針煮完入鵝翎筒內黃蠟塞口收之御纂醫宗金鑑卷五十七
